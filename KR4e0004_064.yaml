body:
  text: 汪先生墓銘新安之㜈源有隱君子曰汪先生諱炎昶字茂逺學聖賢之道不求聞於世年七十八以元重紀至元戊寅四月二十四日終於家𥘉元既㓕宋宋太學生孫公嵩悲哀不自勝歸隱海寜山中誓不與接發為賦詠以寄其無窮之思孫公同時進士許公月卿亦入婺源山中製齊衰服服之以識其終身哀宋之意此二公者皆新安之節義士先生受學於孫公而與許公門人交友故自少慨然無仕進志先生壮時元有天下巳乆宋之遺俗變且盡矣而先生衣冠動作語言禮度猶宋人也後生小子去宋逺無從徴之見先生咸以為前代之遺賢而先生亦曰吾古逸民也學者因稱之為古逸云先生少凝重記憶不能過人然刻苦專䔍雖執七㩀枕不廢誦習力乆思深該貫宏愽遂無所不覽要其歸宿精索於六經而請輯群行為状趙君以未塟辭既而淮琛亦卒後十九年至正丙申某月日壡始買地塟先生於黄京山高路原又以為請趙君乃為状屬余銘余諾之未獲為去塟之歲又二十四年余欲銘先生墓而趙君之死亦巳乆矣於是撫几歎曰先生之卒今始四十餘年而先生之子及門人知其事者皆巳亡矣使復越四十年其能有知者乎為善者固冀人知巳然有善而不聞於来世後死者之責也乃本先生之志為銘以告世之知先生者銘曰朔風荒荒海水赤矣宗社為墟将安即矣冠履倒植命之忒矣高蹈避世舎道焉適矣彼夸者子群趨弱矣人之攸樂我心戚矣為陵為淵孰失得矣嗚呼先生千載是式矣靈槐詩有序四明史氏貴富光榮與南宋相終始非特人事也盖有天道焉元有國百年史氏以忠信文學稱於時者甚衆而禄位弗稱人事不冝然也是亦有天道焉元季兵辭槐生於史氏之庭史氏里人曰是必有異既而槐死於馬里人又曰是必有異未㡬槐果復生南園中里人曰前之異者徴巳徃後之異者将来徴之史氏殆有顯者乎入國朝史氏諸孫靖可以才見推為中書舎人出為泰州守遷肇慶通判前之言者曰是其徴矣然而未也遂相與字槐曰靈槐而歌咏之靖可嘗與余兒璲同官謂余冝賦詩嗚呼天人之際逺矣觀於史氏又何其著明㢤詩曰難諶惟帝厥命孔赫鑒于九有顯相有徳先宋九君既南而微微不遂傾世臣毗之世臣之家鄮山之下嵗時来歸旗節車馬馮軾而趨衮衣珮璜其綬伊何将相之章雄城渠渠黎庻如雨相臣戾止耄倪咸喜豈無公侯孰能後昆三相二王國存與存誰其尸之其徳有始既受多祜又有孫子鉅海湯湯朔風荒荒不淪于危不顯其光孰云菑播而不有穫天将昌之嘉徵允灼崇堂有庭其左有槐匪植而生惟徳是培天實培之或戕于人人力雖勞其能勝天南園膴膴有萌斯糵其本如達靡有摧害始軋而卑忽㧞而穹其兆斯何冝卿冝公明明天子俊乂是使矧茲世家王公之嗣嗟爾君子天休汝􅈾何以占之靈槐在庭元故樗巢䖏士儲君墓銘冝興有䖏士儲君諱能謙字有大系出唐監察御史光羲曽祖進之祖時昇宋承信郎監鎮江税父文辟咸淳庚午鄉貢進士䖏士在元不仕名其室為樗巢語其子曰余生無用于世死必樹吾墓以樗所以志也至正四年六月某日年七十有四而終䖏士生宋季少有能詩名尤愛黄文節公詩天未明擁衾暗誦百餘篇聲抑揚可聽其父進士君喜謂必以文鳴至長能力學閎衍深愽靡所不窺然其於詩最工也事父孝謹父沒居䘮哀四方士送􅌾者数千人直路之地百餘歩草菜盡赭斥浮屠法不用閭里化之御子孫嚴而能教庭序之間不聞譁咲聲諸生從之㳺越月踰旬輙異於人氣和色荘望之者畏親之者悅人與䖏者脫然皆化交友有過正容引大義折之不頋其喜怒故所友多善人力排異端作私論二篇楮錢辯一篇文曰雜著者一十卷詩曰學歩邯鄲集者十五卷樗巢集者一卷䖏士娶蔣氏宋潯州守仰祖支孫先七月卒以䖏士卒之歲七月某日合􅌾蔵林里淡竹原先塋之側子男四人皆通春秋學惟賢元綂乙亥取江浙第四名文觧至正丁亥復選為第一上禮部不利用例任安定書院山長惟志㢘州路􅚨學正惟仁常州路豊積庫副使惟德國朝自常州府教授擢國子助教階将仕佐郎女三人適同郡蔣立本趙濟潘杲孫男十三人抑掓擈播揖撫拓掾搢授掞揆振孫女五人長適蒋遵餘未行𥘉䖏士之􅌾諸子乞銘于翰林學士危君素兵亂亡其序惟銘辭口熟以存於是危君卒巳十有餘年惟徳與余同朝謂余獲友危君請𥙷之乃序而繫以危君之銘銘曰義興之區有墳渠渠其植惟樗卷懐弗舒與天為徒後之徴者在其書故岐寧衛經歴熊府君墓銘熊君伯頴卒其友之仕者為之請銘余曰君與余善且才而文銘余所冝為後数年余致政歸衰老多病未暇具其事而為之請銘者亦亡余曰噫余可負吾友耶乃按故所書為銘君諱䁀字伯頴姓熊氏撫之臨川人世以尚書教授于鄉君少有敏質年十八從父受經義通之每私較試輙冠其鄉人鄉人推讓不敢與齒後六年為元至正七年領江西第九名薦書上燕京就禮部試文彩燁然動人偕試者竊視執筆不敢下衆咸以高第期君有司以君議論竒竟棄不取君絶不力為之計贑郡帥全普庵撒里尤噐君命君擇險隘為守禦備君於皇恐大蓼諸灘設坑穽建砦栅搆屋三千餘間結民兵自守由是贑獨完於他郡戍将三人坐戦敗将加誅君為救觧岀之㑹當大比他郡多以兵廢君獨請全舉行觀者以為異事吉安歲凶全與吉安守有隟禁吉民勿入糴民啼號于道君争曰盗之起者為饑寒所迫也今使君閉糴将開盗門脫吉民事亟生變贑能獨全乎全悟即罷前令君周旋兵間委曲為民皆此類十三年郡多君前績便冝擢君贑縣尹貟外置君耻之辭不受未㡬以父䘮歸服除兵部尚書黄昭江西㢘訪使吴當總兵出閩關辟君叅謀君事君為昭畫䇿甚詳㑹昭與當罷兵柄䇿不行二十一年陳友諒僣號於九江用黄昭觧觀等薦以君為太常卿俾守令踵門起君堅臥不赴既而國朝兵入江西武順寜河王鄧愈聞君賢下令徧索君强起揖王軍門王與君論事合大喜致帳中日夜咨以事一軍驚讙以爲主将得師君見王寛𥙿誠大将材遂委身從之不去賛王取撫州兵不血刃賊酋鄧克明夜遁二十二年皇上親将兵入豫章州郡望風欵附九江亦下君得詔見慰勞甚至二十三年丁母夫人憂後三年以大臣薦徴至南京奉㫖偕諸儒摭古昔嘉言善行作公子書以訓貴戚子弟書成賜襲衣白金㑹𥘉平浙西授湖州府徳清縣丞君招輯綏懐除剔宿蠧創三皇孔子廟建官吏𪠘署到官数月事治政平錢鶴臯反嘉興聲摇徳清民皆逃散君堅坐鎮之錢不敢入吴元年上将正位宸極召儀禮儀除中書考功愽士㝷遷起居注承詔捜括故事可懲勸者書新宫廂壁時上精求禮樂之事嘗召翰林學士朱升等陳樂噐于庭上擊磬命升辯五音升對忤㫖上大怒欲寘諸法君從容論觧之上曰升每謂審音頋不辯宫徴何耶君對曰石音難辯自古而然唐虞惟后䕫能和磬聲書曰於予擊石拊石百獸率舞上曰任此竪儒治樂樂何繇和君具言樂之和由人所致人君能致中和則萬民和萬物和而樂音和矣上怒乃觧釋升不問升既出謝曰非熊君吾屬幾殆舎人耿忠奉使囬奏廣信郡縣官多違法前所陳茶稅失實時新行赦上怒趣中書遣御史徃㢘状丞相李韓公善長諫不聽御史巳受詔丞相復諌不從君與給事中尹正諌曰朝廷新立将布大信於四方今肆赦之後復以細故而煩御史按問既失信且䙝國威上良乆乃曰止其追御史母徃上詔浙西民輸糧京師浙西小不可浙江率五石致一石民甚苦之君叩頭曰國家都金陵以浙西為根本而遽困之農作方興而㒒㒒於道路苟一年不得耕害不淺矣上悅是日即詔罷之明年改元洪武上即皇帝位凡創制更革之典君多預聞上遇君厚毎字稱而不名立浙江提刑按察司以君為僉事階奉議大夫君分部台温二郡經方氏竊㩀之後全乖人道争訟以数百計君悉理其曲直而奏断之凡威取田宅者歸業主得半直者中分之兩造無驗者籍之官豪胥猾隷六百餘户悉屏之别郡偽官悍将二百人其暴如乕狼君出竒計畫刮種類遷扵江淮間民始安枕方氏居黄巖雖嘗簿錄其家珠玉犀象金繒蔵於姻家者動以萬計君皆搜索送諸官温有邪師曰大明教造飾殿堂甚侈民之無業者咸歸之君以其瞽俗眩世且名犯國號奏毀之官沒其産而驅其衆為農其地多倡家中朝使者以事至多挾倡飲有司罷於供應君下永嘉令籍倡户数千械送之京按使者以法鉤連其他贓罪杖流之偽萬户金甲奪三人妻其夫訟則更為娶婦君至三夫皆訴君論金棄市各以其婦歸之平陽軍校掠農妻五年君攝其妻至軍校恐抱二兒泣曰妻去兒孰與飬願公憐我君命寘兒妻側兒避不肯近君曰此非其子詐也詰之果鄰家子罪校如律而断其妻還于農於是軍中所掠婦数百皆相告語夜遣去一營㡬空平陽州吏目杜乙嗜財甚考滿人亰謁御史中丞劉基基詰謁故杜惶駭不能對遽命執訊之杜自陳在州時歛民白金三十兩又受楊某金置殺人罪不問守與佐皆相搆為姦有㫖下君鞫之同知以下吏皆服罪獨知州梅鎰廷辯不巳民数百遮司門外争知州信無辜君将聽之吏白曰今奉詔按獄而釋知州不治情則得矣如身受故出何君再進民詢之辭不變歎曰法以誅罪吾敢身畏譴而誅無罪人乎釋鎰以情聞上可其奏台臨海王叅理妹有姿色許適􅌘縣竺氏其内兄方敏覘其将嫁夜率衆刼至家逼為妻王詣永嘉矦朱亮祖訟事下邑方賄吏欲傳輕典君知有賄急逮吏治之吏具状竟致方死罪而歸女竺氏兵克黄巖時州民乗亂報仇殺一家十餘人永嘉矦受辭令州捕鞫州𥘉附假守捕殺人者十二人獄既成吏受賕釋之詭以死聞縦其餘黨不問君録囚㢘得十二人尚頌繫東郭民家即收掠問状抵官吏以贓罪捕餘黨誅之黄巖官署毀于兵官寓尼寺中并儲糧其間君視糧過寺尼数人来謁皆羙少年也問孰為主者則方氏女弟也君大驚跽州守通判以下切責之令逐尼歸俗而以寺入官州有宋杜清獻公墓杜氏有田若干畆入僧寺儲其租以奉祀僧挾與方氏連奪田以為巳有復墾田侵墓下墓且蝕其孫囬以書聞君執僧寘諸獄瘦殺之追田與囬且令州立祠刻石以旌之寜海强民陳徳仲以憾支觧黎異異妻屡訴無為白之者君受之一夕省黎事有青蛙立案上君曰蛙非黎異乎果異則止勿動吾復爾寃蛙果如君言明日逮陳誅之縣民馮輔卿至正中為亂與方氏連兵既而方氏追殺之且殁其貲産而餘田百餘畒其豪奴吴自取之輔卿妻杜囚服迎拜馬前訴奴君為治奴罪奏以田還之台地産塩塩賤而米貴時官賣塩一斤責米二十五合反貴扵米数倍復輸於杭路險不可舟車民病欲死君上封事乞民得償錢民獲免轉輸之勞凡事之未便者君皆為奏之兩郡民灑然如更生始兩郡旱公所至輙雨民曰此熊使君雨也是年秋始立按察司於山東擇其人行新政上曰無如熊䁀矣遂仍前階改山東開治濟南濟南元有㢘訪司廳事壮麗甲諸道䑓檄君居之時汪丞相廣洋以叅政建行省其中僚吏請君以䑓檄曰省而復之君曰官在政事何如耳豈以公署之麗耶城北有􅋻陋室君就其中治事丞相聞君言戒其屬曰此真憲官也吾等慎母犯之山東為齊魯之域其民敦檏少訟君鎮之以静而以保民為先時河北甫定濟南宿重兵兵肆暴侵民莫敢與較君移牒指揮司禁之黠軍数縱火刼人一家火則一市財皆殫君既申火禁督邑令庀火具為保伍相赴援復懸書通衢戢士卒士不戢坐所轄将火患頓息偏将有受部兵一繒者君收問連其黨獄之諸将大駭挾日出于庭数以黷貨罪准律贖金而縱之諸将又大喜由是莫敢横恣東平矦韓政鎮濟寜奉㫖按籍選壮强為兵東平東昌濟寜三郡民皆驚散将為變君急飛書行部僉事段明徳説韓矦止之分遣官屬招輯俾復業越三月民始定州縣官多失㢘平君隂風跡数十軰悉如法論罷之六郡肅清齊河有强盗刼啇人布千疋縣求盗逸去吏索之村中遇王氏婦不得於姑出走吏見其色動執訊之婦曰我王六家人也吏因考箠使其誣服為盗訛為王六家兒且指平人三十餘人榜掠無完膚問王氏夫安在衆不勝苦詐云巳殺之沈於河矣追所刼布及屍無一是者獄巳具君盡得其情而王氏之夫故在君坐官吏以法而悉遣之君患官好致訟乃令郡若縣各置二暦日著所治獄訟錢粟之績一留郡縣一上之憲府逓更迭易月按暦而鈎考之凡所為事莫敢隱者後遵以為式大明律𥘉頒吏莫能通君日坐堂上立六曹吏堂下條授之與之辯析俾各通其法名聲赫然著聞凡疑獄皆質焉上嘗廷稱曰聞熊䁀為政得體朕甚嘉之二年十月臺臣奏山東憲司缺副使上曰朕得之矣詔陞君為之三年四月封建親王擇王府臣僚上御奉天殿丞相以下咸侍上首問曰山東副使熊䁀稱是選乎衆皆曰賢上大書君姓字于几復問禮部尚書崔亮曰䁀何如對曰䁀誠賢上曰朕固以為足任也遂驛召君五月拜晋王相府右傅階中奉大夫㑹有事于方丘君受告導駕既齋宿習射苑中百官鴈行入上勑近臣以弓矢授君射君文臣素不諳習一發中鵠上喜勺湩飲以賜明日又射上詔君至榻前俯身御弓矢為射容以教君君跪受弓左執之右手指一矢鞬二矢向鵠三發連三中上嘉勞乆之将遣之國上御端門君及秦王相鄭乆成等以次􅈬坐上敷揚治國之道逾數千言反覆奨諭甚至君等皆叩首謝賜食而退乘傳至晋陽議建王都城命工入山度材木治瓦甓四年大興衆築城作王宫君夙夜不懈十月奉相府賀生辰表詣闕至則車駕将幸臨濠勑從行數𬒳召問恩寵有加九月辭於臨濠上倚馬詔以䖏将帥間協和之道且曰汝不善騎勿庸自来君還㑹徙沿邊諸襍羗萬餘入内地䕶卒弗嚴道辭奔散太傅徐魏公逹發兵擒殱之事聞詔使詰責叅政曹興等併免君官左遷大同衛知事五年召還六月除晋王相府叅軍以尚書授玉復奉詔兼授秦王經翰林學士承㫖宋濂時兼太子賛善大夫復薦君說書皇太子前君於書最深每以帝王心法之要陳之太子二王雅加愛重明年上御文華堂召君問曰秦漢以来諸侯王不肖者幾何君謝未攷遂命之蘇州覈糧長罪状君至擇其尤虐民者杖徙之鳳陽事畢復入王府七年三月上御西苑復以諸侯王事為問君復謝未遑改刑部主事奪叅軍所受俸八年正月授岐寜衛經歴賜白金五十兩錢萬二千文上復念君在邊良苦遣使持手詔諭君詔上所親製辭意甚厚有狐裘纊𫀆毳㒝之賜時朶兒只把雖䧏而持兩端君上書萬餘言言状其畧謂西涼岐寜漢唐内地不可棄朶兒只把非有歸向之誠特假我聲援脅服鄰邦為自安計朝廷冝思制之之道急之則必席卷而遁雖得其地而無民緩之則恐羽冀既成而䟦扈冝稍給種糧撫其遺民以安衆心而以良将叅守之則朶兒只把特匹夫耳又将安徃上覽書曰人謂熊䁀迂闊今不迂也九年四月乃徴君還次西涼府打班驛遇朶兒只把叛兵擁君北行君力争不從遂與中使趙某等皆遇害時六月二十三日也壽五十有五後数日亂兵就擒獲君所佩囊中公牘始知君卒跡其骸骨􅌾于某地西凉衛以聞上感悼遣使吊祭命臨川恤其家其子某以某年月日至某地以其骨歸以某年月日塟于某山君學有應世材内行尤脩飾仲弟渙為開封府延津縣上簿受誣以贓罷官死妻子漂流無依貧不能償其贓之半君以巳俸代償之致其妻子于家諸姑適俞氏夫與子俱䘮無所於食君延飬之終其身䘮塟之禮無闕者與人交誠檏不欺臨事善断故居官必有名曾祖某祖某父某俱通經術母某氏有賢行娶某氏男若干人女若干人𥘉君将之𡵨寜子某来見京師君口授所行事俾書之且曰我死生未可必或死我無累汝者當今惟翰林宋先生文可傳我嘗獲先生知汝以此拜乞銘先生必憐汝幸為我銘我無憾矣嗚呼余言豈足恃耶而君惓惓若斯尤可哀也銘曰天祐皇明以民授之必生其人俾左右之啓國之𥘉俊才如雲其心之貞允惟熊君執筆載言侍帝黼扆從容論奏爛然可紀豈徒能言亦見于行繡衣直指以蘇南氓獮强剗穢洗濯積垢南氓稽首君我父母君車自南民望于東帝曰汝来唯民之從齊魯千里厥土薉荒君居二年化為畊桒帝謂相臣䁀也可恃不負吾民寜負吾子維晋巨國維傅大臣将終任之命則孔屯既入授經復出治戎狐裘毳衣唯帝念功封論邊事其䇿甚偉欲召用君君則道死天子聖神用無遺才天困其逢賢者所哀生有事功殁多子孫銘圗其傳以示千祀元故資政大夫江南諸道行御史䑓侍御史周府君慕銘公諱伯琦字伯温姓周氏饒之鄱陽人其先居汝南宋靖康未有諱泰者與宗人益國文忠公必大之父從高宗南徙實公之始遷祖曽大父諱灼鄉貢進士大父諱垕咸淳十年進士某官元累贈正議大夫禮部尚書護軍追封鄱陽郡矦父諱應極有文學仕元歴翰林集賢兩院待制出同知也州路總管府事累贈翰林侍讀學士中奉大夫上護軍追封鄱陽郡公曾祖母某氏追封鄱陽郡夫人母上官氏追封鄱陽郡太夫人公生十一年而侍郡公㳺燕京十五𥙷國子生事吴文正公􅊹鄧文肅公文原虞文靖公集于司業愽士座下作野菊賦禮部尚書元文敏公明善稱之輙有名後五年積分如格陞上舎生又五年丁郡公憂泰定二年用江浙行中書省都事劉君致薦之京師禁林名卿咸欲辟公自佐公以大母春秋高不就十二月授将仕郞廣州路南海縣主簿天暦元年赴南海南海民歲轉輸秋稅于韶縣官督視之黠民賂憲府掾竄名佐吏籍来監稅大斛入小斛出竊具贏以自利及至韶徃徃不能登数督視官𬒳箠繫移檄重徴於民民負荷𥙷輸徃來道路者半載官與民交病之忌掾烕莫敢問者乆公至捕竄名者寘諸法不欲其跡入縣門令民多寡相資自輸于韶不遣一吏而稅先期以辦民樂稱便麥全等十一人以私鬻舶貨繫獄舊官求其賄不得誣為强盗論死公讞囚察其冤遇赦出之二年以祖母䘮觧官歸大府不許趣還會夷獠反檄公捕至百餘人至順元年移攝畨禺縣無籍吏五百人㩀縣㗖民惡少年七十人並縁為姦利公断遣之一縣肅然不敢出聲語縣獄遂空巳而江西行中書省漕糧八萬石于慶逺命公䕶其行公由肇慶臨封道廣西越梧潯象桞諸州水陸四千餘里譏防周慎升斗不耗二年返南海治妖僧獄出所誣平民二十二人是年秋受代去三年七月除太府監照磨兼管勾承發架閣階從仕郎元綂二年入太府公慎簿書歛散之法稽覈詳宻貪吏相吊太府之長以聞于上洊賜衣幣明年重紀至元復有狐裘鞍轡之賜其冬以翰林學士張文穆公起巖歐陽文公玄薦遷徵事郎翰林國史院編脩官預脩泰定帝寜宗實録后妃功臣列傳六年上進四月陞翰林脩撰承務郎同知制誥兼國史編脩如故扈從滦陽屡草詔命賜文綺者四六月奉詔代祀孔于於曲阜九月還都十月追加明宗尊號進寳冊公奉敕篆寳文未幾親祠太廟公與執事賜衣三襲至正元年正月詔書宣文閣榜擢授經郎兼經筵譯文官階儒林郎十月奉勑開宫學於玉德殿西室授宿衛官及翰林學士承㫖和尚等二十五人經中貴人傳㫖命受經生北面行弟子禮太官設饌光禄進酒朝廷公卿皆陪坐時人榮之十一月講大雅文王詩於明仁殿有貂裘之賜明年四月詔引和尚等講書賜中綂楮幣一百定自是特命乗驛從駕盖異数也三年正月陞宣文閣鑒書愽士兼經筵官明年九月復兼授經郎五年正月進說虞書政在飬民之言時河南山東大饑即詔發倉廪賑之後十日復講旅􅋙方作亭䑓於上林亦詔輙工七月除崇文監丞兼經筵官御史臺以嶺南有警奏除僉廣東道肅政㢘訪司事進階朝散大夫賜四品服六年至官乗傳行海豐掲陽又南至海陽程鄉興定長樂河源復東歴愽羅増城東莞又西至肇慶德慶踰年而還周歴所部二千五百餘里罷斥官吏汚穢不職者一百十人誅四十有八人釋獄之無辜者一百十二人疑事不决者决之州縣之獄為之一空薦䖏士陳明等六人于朝建豐湖白鶴二書院以祀蘇文忠公軾羅文質公從彦明法度申教化嶺海稱治復上封事請於南海設科塲以取兩廣之士置尉捕賊無以主簿兼而廢民政及他不便者二十事八年三月仍前官遷福建閩海道未行使者以翰林待制兼國史院編脩官召明年五月進所脩國史擢崇文少監階亞中大夫同檢校書籍事兼經筵官賜三品服十二月賜紫織金對衣一襲十年正月奉香幣及金織文神旙代祀醫巫閭濟瀆北海南至㑹稽而還十一年考試天下士拜翰林直學士太中大夫知制誥同脩國史兼經筵官賜金織文對衣者二十二年四月改兵部侍郞㝷拜中䑓監察御史御史用南士自公始公言弭盗用人等十事賜黄馬一八月還燕都勾校百司刑政錢粟之籍紏劾者甚衆薦中外官一百二十七人舉士二十五人謇謇不阿大臣皆嚴惮之十三年四月中書奏改崇文太監兼經筵官階嘉議大夫詔奉祀江海神循江淮道閩越抵南海南北幾及萬里明年竣事遂丁母夫人之憂寓居姑蘇十五年中䑓以東南方亂起公爲江東肅政㢘訪使公三以憂辭乃起移治於徽明年徙建德又徙紹興又徙衢先是朝廷嘗虗兵部尚書位俟公道不通乃改浙西肅政㢘訪使與江浙行省丞相逹識帖穆爾俱守杭十七年丞相得承制行事假公參知政事時張士誠㩀姑蘇未即順命廷議以重爵懐之公徃授太尉誥諭以大義士誠稽首稱臣是年冬璽書至拜公為真仍賜金織文對衣十八年丞相以漕粟事屬公公分僚屬治姑蘇十九年江浙試進士公實臨考北士避兵江南者亦權冝取之或貧不能上禮部白丞相以學官禄之七月丞相復承制授公行省左丞分治于蘇二十年公運米十五萬石至燕都明年亦如之九月使者航海以同知太常禮儀院事徴公謝病不能赴二十三年真拜江浙行省左丞階資善大夫丞相自臨門趣公公強起視事数日即引年致政閉門而臥二十四年九月特際資政大夫江南諸道行御史臺侍御史而時事巳不可為公憂憤絶食幾死者数矣後三年國朝禽士誠浙西平公稱病彌甚引歸鄱陽洪武二年六月某日卒于家享年七十又二某年月日塟於某山之原公自諸生起家禄食四十餘年居朝㝡膺眷注順帝常字稱之博學能文辭大小篆尤名于世宮額寳文多公手書所著有堅白居士集三十卷詩三十卷說文字原六書正偽共八卷翰林志十卷蔵于家始娶江氏宋丞相文忠公萬里之曽孫後娶錢氏興國路經歴天祐之女並封鄱陽郡夫人子男四人宗仁台州路總管府判官宗義國子生宗禮江浙行中書省檢校官宗智兩浙轉運塩使司照磨宗禮宗智皆先卒孫男四人某某某某𥘉公臥病姑蘇濂以總裁元史𬒳召見公于逆旅公老思歸守臣㽞不遣濂為道聖天子優禮舊臣之意俾致公于家公歸遂卒元史雖為之立傳恨不能知其詳今宗仁以門人謝徽状請銘故不復辭而備著之使讀者可互見焉銘曰維天上才咸䧏之衷豈以南北而有不同泰山徂徠有櫟有楓江潭之間亦産栢松世之𥚹量偏曲不通互毀交戕戾乎大中宋遷三吴多士景從或夷大難或奏駿功偉碩光明與汴俱崇荆楚之西越蜀之東将相王矦皆人中雄曷不觀之益國文忠起大江西輔相孝宗有文既宏厥德亦豐厥聲渢渢銘于䁀鍾惟侍御史才贍而充古今雖殊後先比隆自為小官摧屠姦凶持斧南巡嶺海為空歸服豸冠上逹帝聰風節巍然與國齊終匪不能言時則弗容就其所為則巳顯融我銘其封以焯其庸以悼其逢惟昧之攻以昭于無窮
