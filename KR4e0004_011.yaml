body:
  text: 嘉瓜頌皇明式于九圍徳漸仁𬒳和氣薰蒸靈物効祥乃洪武五年夏六月嘉瓜生于句容張觀之園雙實同蔕圓如合璧竒姿分輝紺色交潤誠爲曠世之産壬寅京尹臣遇林亟以素匭圖其形于上移文儀曹請以奏聞癸卯尚書臣凱等奉瓜以獻時上御武楼中書右丞相臣廣洋左丞臣庸同知大都督府事臣英御史中丞臣寕翰林學士臣濂咸侍左右天顔怡愉重瞳屡囬良久乃言曰徴之徃牒其事云何丞相奏言漢元和中嘉瓜生于郡國唐汴州亦獻嘉瓜禎祥之應有自來矣陛下勵精圖治超漢軼唐故天錫之珍符太平有象實見于兹上謙讓弗居俄以靈貺之臻復不可不承乃詔内臣寘諸乾清宫翌日甲辰薦諸太廟臣濂退而思之夫瓜蓏之属也其蔓逺引其葉阜蕃諸傳有之神瓜合形表緜緜之慶此固兆聖子神孫享億萬載無疆之祉况瓜之所岀夲扵囬紇中國討而獲之故名爲西方今皇上命大将軍統師西征甘粛西凉諸郡俱下而瓜沙巳入職方行見西域三十六國同心來朝駢肩入貢天顯叶瑞其又不在扵兹乎然而異畒同頴周公作歸禾之萹三秀合圖班氏有靈芝之歌矧此嘉植含滋發馨昭宣我神應焜煌我王度寕可喑黙而遂巳乎顧臣駑劣不足以羙盛徳之形容謹上其事願宣付史舘以備實録復繫之以頌頌曰乹道載清坤維用寜保合大和發爲休禎句容之墟物無疵癘神瓜挺出殊實同蔕瓜孰非單比合而生二氣毓質雙星降精宻房均甘氷圭競爽明月重輪彷佛堪象豈無賔連産於戸東叶疇若兹瓜恊瑞聮祥亦有華平張翠作盖疇若兹瓜交輝映彩其兆伊何蘿圖緜延西域既柔徳冐八埏郡臣曰都載拜稽首神休滋彰天子萬夀粤從啓運靈貺疊甄兩岐秀麥合拊孕蓮矧此貞符近在輦轂王化自邇逺無不服帝曰吁㢤朕猶慊然瑞當在人物胡得專使物爲祥冝獻清廟自我先人積慶所召孰瑞不矜帝則弗居唯親是思我民之圖以實應天斯乃盛徳小臣作頌以示罔極蔣山廣薦佛會記皇帝御寳曆之四年海宇無虞洽于大康文武恬嬉雨風時順扵是㳟黙思道端居穆清罔有三二與天爲徒重念元季兵興六合雄争有生之類不得正命而終動億萬計靈氛紏蟠充塞下上吊奠靡至㷀然無依天隂雨濕之夜其聲或啾啾有聞宸衷衋傷若疚在躬且謂洗滌隂欝升陟陽明惟大雄氏之教爲然乃冬十有二月詔徴江南有道浮屠十人詣于南京命欽天監臣差以糓旦就蔣山太平興國禪寺丕建廣薦法會上宿齋室却葷肉弗御者一月復敕中書右丞相汪廣洋左丞胡惟庸移書於城社之神具宣上意俾神逹諸冥期以畢集五年春正月辛酉昧爽上服皮弁服臨奉天殿群臣服朝衣左右侍尚寳卿梁子忠啓御撰章䟽識以皇帝之寳上再拜燎香于爐復再拜躬眎䟽巳授禮部尚書陶凱凱捧從黄道出午門寘龍輿中備法仗皷吹導至蔣山天界総持萬金及蔣山主僧行容率僧伽千人持香華出迎萬金取䟽入大雄殿用梵法從事白而焚之退閱三蔵諸文自辛酉至癸亥止當癸亥日時加申諸浮屠行祠事巳上服皮弁服榗玉珪上殿面大雄氏北向立群臣各衣法服以從和聲郎舉麾奏恱佛之樂首曰善世曲上再拜迎群臣亦再拜樂再奏昭信曲上跪進熏薌奠幣復再拜樂三奏延慈曲相以恱佛之舞舞人十其手各有所執或香或燈或珠玉明水或青蓮花氷桃暨名荈衣食之物勢皆低昻應以節上行𥘉獻禮跪進清浄饌史冊祝復再拜亞終二獻同其所異者不用冊光禄卿徐興祖進饌樂四奏曰法喜曲五奏曰禪恱曲舞同三獻已上還大次群臣退諸浮屠旋遶大雄氏寳座演𣑽呪三周以寓攀註之意𥘉􅓯山右地成六十坎澷以堊至是令軍卒五百負湯實之湯蒸氣成雲諸浮屠速幽爽入浴焚象衣使其更以綵幢法樂引至三觧脫門門内五十歩築方壇髙四尺上升壇東向坐侍儀使溥博西向跪受詔而出集幽爽而戒飾之詔巳引入殿致三佛之禮聽法扵徑山禪師宗􅘧受毗尼戒扵天竺法師慧日復引而出命軌範師呪飯摩伽陀斛法食凡四十有九飯巳夜将半上復上殿群臣從如𥘉樂六奏徧應曲執事者徹豆上再拜群臣同樂七奏妙濟曲上拜送者再群臣復同樂八奏善成曲上至望燎位燎巳上還大次觧嚴群臣趍出濂聞前事二日凄風成寒飛雪灑空山川慘澹不辯草木鑾輅一至雲𨳩日明祥光冲融布滿寰宇天顔懌如歷陛而升嚴㳟對越不違咫尺俯伏拜跪穆然無聲儼如象馭陟降在廷諸威神衆拱衛圍繞下逮冥靈来歆来饗焄蒿悽愴聳人毛髪此皆精誠動乎天地感乎鬼神初不可以聲音笑貌爲也肆惟皇上自臨御以来即詔禮官稽古定制京師有泰厲之祭王國有國厲之祭若郡厲邑厲鄕厲類皆有祭其興哀扵無祀之鬼可謂備矣然聖慮淵深猶恐未盡幽明之故特徴内典附以先王之禮確然之行而弗疑豈非仁之至者乎昔者周文王作靈䑓掘地得死人之骨王曰更塟之天下謂文王爲賢澤及朽骨而况於人夫瘞骨且爾矧欲挽其靈明於生道者則我皇上好生之仁流衍無際将不間扵顯幽誠與天地之徳同大非言辤之可賛也猗欤盛哉祠部郎中李顔主事張孟兼蔡秉夷臧哲職專禱祠親覩勝因謂不可無紀載以藏名山以楊聖徳扵罔極同請濂爲之文濂以老病固辭弗獲既爲具列行事如右復繫之以詩曰皇鍳九有憲天惟仁明幽雖殊錫福則均死視如生屈将使伸一歸至和同符大鈞其一元綱觧紐亂是用作黒祲盪摩白日爲薄孰靈匪人流血沱若積屍横縱委溝溢壑其二霜月凄苦凉颸酸嘶茫然四顧精爽何依寒郊無人似聞夜啼鑄銕爲心寕免涕洟其三惟我聖皇夙受佛記手執金輪繼天出治軫念幽潜宵不遑寐爰啓靈埸豁彼蒙翳其四皇輿載臨稽首大雄遥瞻猊座如覿脺容香疑霧黒燈類星紅𣑽㖵震雷鯨音號鍾其五鬼宿渡河夜漏将半飈輪羽幢其集如霰神池潔清鮮衣華粲滌塵垢身還清净觀其六迺陟秘殿迺覲慈皇聞法去盖受戒思防昔也昏酣棘塗宵行今焉昭朗白晝康莊其七法筵設食厥名爲斛化至河沙𥘉因一粟無量香味用實其腹神變無方動皆充足其八鴻恩既廣氛盭全消軋坤清夷日月光昭噐車瑞恊玉燭時調大庭擊壤康衢列謡其九惟佛道弘誓㧞群滯惟皇体佛仁徳斯𬒳無潜弗灼有生咸遂史臣載文永垂来裔其十元莫月鼎傳碑莫月鼎諱起炎湖州月河谿人髙祖儔宋政和壬辰進士第一祖慶父濛連起爲顯官月鼎生而秀朗肌膚如玉雪雙目有光射人習科舉業三試扵有司不利乃絶去世故從事扵禪觀之學脇不沾席者數年已而諱道士服更名沾乙自號爲月鼎入青城山丈人觀見徐無極受五雷之法又聞南豊有鄒銕壁者得王侍宸斬勘雷書秘不傳乃亟徃求委身童隷事之會鄒病革将遣去月鼎拜且泣具以實告鄒驚嘆即以其書相授扵是月鼎召雷雨破鬼鬽動與天合雖嬉笑怒罵皆若有神物從之者寳祐戊午浙河東大旱馬廷鸞方守紹興迎致月鼎月鼎建壇塲瞋目按劍呼雷神役之俄天地晦冥震霆一聲大雨傾注穆陵聞之賜詩一章謂其爲神仙云元世祖至元巳丑遣御史中丞崔彧求異人江南物色獲之見帝扵灤京内殿帝詔近侍持果殽觴之時天色爽霽帝曰可聞雷否月鼎對曰可即取胡桃擲地雷應聲而發震撼殿庭帝爲之改容復命諸雨雨立至如紹興時帝大恱賜以内府金繒月鼎碎截之以濟寒窶者帝疑其物微因盛有所賚亦不受㝷有旨俾掌道教事月鼎以老耄辤遂給驛南旋益放於酒無日不醉醉輙白眼望天隂飈翛翛起衣䄂間甞與客飲西湖舟中當赤日如火客請假片雲覆之月鼎笑拾果殻浮觴面頃之雲自湖畔起翳于日下蕃釐觀道士中秋方會飲觴既㪯有雲蔽月久不觧月鼎時寓觀中道士知其所爲急召寘筵端且謝過月鼎以乎指之雲散如洗山岷爲鬼物所憑狂易不可制遍索月鼎不值忽遇諸酒肆月鼎大罵含酒噀之暨歸物怪已息賣餅師積餅于筐時𬒳物竊去月鼎召雷轟雲中斬胡孫首投于前市魁娶婦道爲白猿精所攝抵門但空車焉月鼎禹歩如有指麾状狂飈遽作飄婦還舎問之婦云方在北高峯不知何以至此也月鼎陽狂避世不妄與人接然頗閔疾疢者有来告急或以蟹中黄篆符與之或摘草木葉嘘氣授之無不立愈者故咸以真官稱真官謂其䏻主地上鬼神其靈異之跡士大夫多言之不能盡載嵗庚寅属其徒王継華曰明年正月十又三日将化扵汝家及期暝目而坐継華問身後事月鼎摇手曰俟五事備可也夜将半風雲雷電雨交作月鼎索筆書偈泊然而逝夀六拾九継華奉遺蛻塟于蘇之長洲陳公鄕去丹霞道院三里而近月鼎所受侍宸諸書寳秘一如鄒不輕授人唯継華及無涯潘氏得其傅餘有求者隨其噐小大淺深自撰符篆與之亦多驗継華授張善淵善淵授歩宗浩宗浩授周玄真皆觧狎雷致雨雲而玄真尤號偉特若行醮法能使群鸐囬翔壇上云史官曰魯陽援戈而麾日退三舎鄒衍仰天而哭六月降霜夫以匹夫之微精誠所格而天且應之况葆真之士乎所謂葆真之士其慮冲其志静虚其神凝以全故其一語黙一吸嘘誠可嘯呼麾斥鞭笞魑魅扵指顧之間矣嗚呼此事然也則夫有事周孔之學以致中和之功者其應神速又為何如㢤參天地而妙萬物固冝有在也世之人胡不爾思随物變遷至與人道弗類其可悲也夫抑亦可慨也夫予嘗総脩元史巳類月鼎入釋老傳或以為渉扵怪神止之然予心竊有感也復别書之以示玄學者見山楼記見山楼者上虞魏君仲逺之所建也仲逺居縣西四十里所龍山委蛇走其南将升而復翔其旁支斜迤而西則為福祈諸峯若車若旌若奔馬若渇鹿飲泉不一而足勢之下降為隂阜為連坡為平林一奮一止復襟帶乎後先東則遥岑隱見青雲之端宛類娥眉向羣山相嫵媚為妍其下有巨湖廣袤百里汪肆浩渺環浸乎三方晦明吐呑朝夕萬變方屏挿起湖濵曰夏盖山去天若尺五巖峙谷張尤可玩愛誠越中勝絶之境也仲逺心樂之以為非髙明之居不足延攬精華而領納爽氣扵是搆斯楼日與賢士大夫同登鼎爼既備殽核維旅壷觴更酬呤篇疊咏及至神酣意適褰簾而望逺近之山争獻竒秀晴容含青雨色擁翠不俟指呼􅌂若次苐排闥而入使人涵茹太青空澄中素直欲驂鸞翳鳯招偓佺韓終翩然𬒳髪而下大荒其視起滅埃氛弗䏻自㧞者為何如也伻来俾濂記之夫自辛卯兵興闔廬所在徃徃蕩為灰燼狐狸晝舞鬼燐宵發悲風翛然􅊞人君子每為之永嘅自非真人龍興撥亂世而反之正含齒戴髪之氓孰不在枯魚之肆㢤縱有佳山日在眉睫間将不睱見之矣今仲逺雍容扵觀眺之際亦曰帝力難名而吾民恒獲遂其生爾昔太常慱士施侯作見山閣扵臨川而荆國王文公爲記其事且謂吾人脫扵兵火洗沐仁聖之膏澤餘百年而施侯始得以楼觀自娛仲逺之去亂離僅四三載爾乃能抗志物表脩厥故事如承平時此無他皇化神速有非前代所可及雍熈之治將見覃及扵海内是楼之作其殆兆之先見者欤雖欲不爲之記不可得也第所媿者濂之學識繆悠立言無精魄難以傳逺仲逺尚求荆國其人而爲之庻幾樓之勝槩與雄文雅製同爲不朽耳仲逺名夀延鄭國文貞公二十四世孫群從子姓皆彬彬嗜學文章鉅公多集其門而仲遠尤號翹楚且工扵詩有和平冲澹之趣濂盖聞之丹厓先生云大明勑賜故懐逺大将軍僉江南等處行樞宻院事贈榮禄大夫江西等處行中書省平章政事上柱國追封梁國公趙公神道碑銘有序故懐逺大将軍僉江南等處行樞宻院事趙公之薨距今己十寒暑褒卹雖頒而墓隧之碑未樹其子懐逺将軍同知金吾右衛親軍指揮使司事獻請于大都督府移文中書中書下其事禮部扵是尚書臣凱侍郎臣魯具以事聞上可其奏詔臣濂撰文而臣某書篆以賜之臣濂等受命震惕深懼不足以稱上意退考諸功状而序之曰公𥘉諱某今改賜徳勝姓趙氏濠之鍾離人曽大父小乙府君妣時氏大父省二府君妣王氏父諱仁贈懐逺大将軍同知指揮使司事輕車都尉追封天水郡侯妣李氏封天水郡夫人公世爲良農家状貌魁偉有膂力尤䏻馬上運槊捷疾如飛人不敢猝近嵗壬辰江淮俶擾州縣簡㧞梟銳爲義兵竒公勇悍選爲群隊長公年甫二十有八帥衆接戰必操蝥弧以争先蹈湯赴火有不暇䘏敵人望而畏之然棲棲在下列無有旌其能功者乃赱西營謁歸徳王忙哥隷麾下稍乆察其馭軍無律絶類児戯又欲擇豪傑而依之倀倀未有所歸嵗甲午大明皇帝統領大将南征駐軍滁陽公聞毋夫人在軍中秋七月戊寅遂棄其妻来從及見上轅門喜獲騎将遂賜以今名命爲帳前先鋒已而從上取銕佛岡攻三汊河口破張家寨克全椒後河六丈大樹諸寨㝷出師援六合左股爲流矢所中幾至危殆上親臨視焉歲乙未之春閠正月剗雞籠山群盗與僞将韓溥酣戰直搗烏江下和州而含山次第平三月夜􅊞陳也先營戊申也先来侵力出闘却之夏四月庚申㧞板門寨五月擊長官寨遂取儀真上録公從戰之功超授忠勇校尉管軍總管府先鋒六月丙辰復從上渡大江時元兵屯牛渚劍槊如林常忠武王皷勇先登而奪其营諸将乃下大平連攻蕪湖句容取之秋七月辛卯克溧水八月破溧陽公皆有功歲丙申春二月元将蠻子海牙闞大兵南渡擁兵建柵扵采石磯以断淮西之路時将士家属皆留淮西上慮其心動洊命忠武王帥師攻之公亦在遣中乃以疑兵分其勢然後出正兵與戰短戈方接竒兵遽起而乗之元将大敗而遁三月乙酉大破陳也先营扵方山庚寅下金陵公之績爲諸将先丁酉上命徐魏公取鎮江公副之破貓䝤軍水寨夏四月下丹陽金壇五月平宣城兵鋒所及勢如破竹而所向無前矣轉承信校尉領軍先鋒六月取廣徳秋七月破僞吳張士誠水寨九月復從忠武王攻毗陵會清軍叛與士誠合圍魏公扵牛塘王與公大敗其衆擒其梟将張将軍歲丁酉春三月壬午取毗陵時豪傑雄争而民心無定向曽未幾何廣徳宣城叛公復取之夏六月戊辰取江隂秋七月丙子攻常熟張士徳出挑戰公麾兵而進士徳就縛士徳士誠之弟也遂征甘露望亭無錫諸寨歲戊戍春二月公從大将攻湖州巳而冝興叛秋七月公復取之嵗巳亥夏四月擢懐逺大将軍中奕左副元師五月攻池州取青陽石埭當是時安慶實爲荆椘咽喉之地勢不得不取秋八月公攻之已而取無爲潜山冬十有二月復從大将征杭州嵗庚子春三月還南亰會僞将朱暹来攻冝興公帥師爲援即搗退之夏五月僞漢主陳友諒以重兵􅊞我太平境直犯龍江皇上震怒命諸大将分據險要授以成筭而命公守虎口城虎口城龍江第一関也既而友諒兵大至兵陣既交殺傷相當而伏兵忽起山拗友諒兵大敗擒戮無筭遂復太平秋八月下銅陵之臨山寨冬十月掠黄橋及馬䭾沙歲辛丑春二月征高郵夏四月陞後奕統兵元帥秋八月上親率六師伐僞漢以報龍江之役公從行道經安慶攻破其水寨遂乗風直泝小孤山抵九江九江漢僞都也距九江五里所友諒始知意謂神兵自天而下友諒宵遁遂克九江獲其玉研華盖日月旗等物公復分兵攻黄梅廣濟冬十月克瑞冨臨江吉安諸州復囬師攻安慶下之十有一月壬申進克撫州友諒既遁謀移都武昌公承命攻其沌口埧歲壬寅春正月從上征南昌兵至彭蠡湖南昌降三月取新淦州已而祝某康泰據南昌叛殺守臣葉琛公率精甲從魏公復其城夏四月甲午城破公左肩爲砲所傷久之乃瘳上壮其爲人超授僉江南等處行樞宻院事羅友賢據池州神山寨以叛冬十又一月公與忠武王平之僞漢餘黨建柵南昌之西山號爲八陣指揮十又二月公從趙将軍破之俘獲三千餘人江右州郡雖巳附徃徃觀望狐疑未即决嵗癸卯春三月臨江吉安冨州三城叛公皆先後綂兵復之上以南昌實西江重鎮襟江帶湖控荆引粤非宗藩不足以授綏定之寄扵是詔皇姪大都督授以節鉞徃涖其地而公實綂精兵受節制夏四月壬戌友諒帥強兵十萬攻圍南昌癸亥公統歩卒数千闢城門迎戰僞将金指揮操㦸直前公彎孤一發應弦而仆敵氣大讋而退明日復合自是晝夜環攻城友諒親督促之勢在必求公賛晝秘計分命諸将随方應敵剪獲甚衆六月辛亥公巡城至東門敵發蹶張中其腰膂箭深入約六寸公即㧞出之且撫髀歎曰吾自壮歲從軍傷於矢石屡矣其重無踰扵此者豈命也夫然大丈夫死即死政復何憾所恨者不能從主上掃清中原稍效微勲垂令名扵竹帛爾丁已遂薨扵私第年三十有九軍中涕泣相弔上聞之悼惜不巳遣使者来致祭冬十有一月献護柩車至南京以丙子塟于牛首山安徳鄕下堡之原上念其功復命曰謁者􅉠以布帛菽粟有差嵗甲辰春三月遂命獻代領其衆秋九月下中書議贈公榮禄大夫江西等處行中書省平章政事上柱國追封梁國公敕有司建廟南昌歲時祭享嵗戊申正月乙亥上即皇帝位國號大明建元洪武追念關國元勲皆命配享仁祖淳皇帝廟廷公位居其八實異数也公爲人沈鷙而簡黙剛明而質直馭下嚴肅一號令之加旗幟爲之改色是以戰無不勝攻無不下及從大将征伐尤能恪守軍令不敢違尺寸君子以此多之生平雖未嘗讀書随機應變其智如神動与古名将合兼之臨難不懾奮弗顧身而於孝友之道尤爲篤至信所謂間氣所生之良将也公娶王氏因公来歸殁扵軍追贈梁國夫人繼室朱氏先公若干年卒子男一人獻王氏出也臣聞之龍蛇起蟄山澤通氣與運相值有開必先此古今通義也惟我皇上龍飛臨濠建萬世不㧞之基一時将帥大臣多其鄕里之豪俊如公者亦一人也盖昊天有成命既生聦明睿知爲天下君必有賢臣經綸而翼衛之此意巳定扵冥冥之中久矣公自壮嵗從戎何役不隨何戰不與所以輝耀其威靈者亦云至矣使假之以年勲業炳朗當不止扵斯惜乎不見海嶽大歸扵一綂也其亦命也夫然而聖恩沛滂追命錫爵既備極於寵榮有子䏻令亦足上承宸渥宿衛殿庭公之不沒者盖有在矣古者諸侯計功稱伐書之于太常勒之扵彛鼎以示其不忘是用上遵詔㫖備書公之勲績繫之頌聲以昭示承休扵豊碑焉頌曰洸洸将軍川嶽之英捷如俊鷹金瞳鐡翎臨風一擊百禽震驚當元季世四海雄呑􅌭紛戰塵白晝翳昏執戈而興挐風躍雲真人龍飛届滁之陽單騎来歸願備戎行帝曰俞㢤群慝爾攘元有将臣牛渚駐師公揚靈旗隨帝殄夷㧞其水營雲散鳥飛于時群豪割邑據都伐木建柵壅川爲瀦視帝指呼是剪是屠孰爲最強犬牙其中僞漢居西狂吳在東登我叛人軼我疆封無征弗從有戦必先斬将搴旗電逝飈旋敵人畏之縮衂莫前何彼兇殘犯我龍灣公扼虎口屹爲雄関六軍奮呼殺人如山帝乃誕怒肆行天誅公時在行勇若虎貔俘厥寳玉僞都爲墟胡不爾思復攻豫章峙其氷山以凌太陽公亟出遏殪彼豺狼堂堂晝巡出其東門不虞飛矢竟斃其身軍中慟哭扵夜亦聞天祐大明實生俊英琱戈淑旂綂馭萬兵胡命止斯不觀厥成天聲四震漢踣吳摧中原既定四裔畢来使公之存績用益恢天子念功禮備褒旌錫爵上公配享廟庭命書絢爛榮賁泉城牛首之山有墓在原禮官奉詔表此武勲以鴻厥慶以示子孫閻府君墓碣禮部員外卽閻育泣謂金華宋濂曰育不幸六嵗母夫人亡時年方童而未有所識知又加十六年而先府君棄我諸孤育幸粗有知矣適病癘将始不復知有人間事以故父毋皆從越俗火塟而投骨清淵之中迨今一念及兹痛徹心膂幾不願生存頗聞古昔有招䰟塟衣冠者扵是卜地晨㑹稽賀上祊之原近祖塋若于歩髹木爲柙甓土成竁以洪武某年月蔵之雖扵禮似渉不物人于迫切之至又遑䘏其他異日使吾子孫當時物變遷持一觴酒酹塜前土以致追逺之思不翅足矣冡上有石先府君之遺徳子冝爲文之育将勒焉濂桉府君諱澤字潤民姓閻氏越之㑹稽人自㓜爲吏扵三界巡檢司遷餘姚石堰西埸歴山隂縣及録事司遂陞越府史府公賢之事之劇者恒以属府君不乆輒集府倉之斛皆斵木題湊而成易扵開闔苟通錙銖之隟入糧必加府君知病民命椎銕爲𥿄而錮其四隅鄰府取以爲法已而調衢州會江浙行省檄築諸郡城衢府遂諉之府君府君召大姓于庭取官書驗畒賦之小大咸冝民大恱充廣盈倉副使轉寕國縣典史未上卒時至正丙申三月朔也上距所生大徳癸卯之歲夀五十又四娶何氏同縣曹娥鎮人有婦徳得年四十以重紀至元庚辰某月日卒子男子二長即育以儒貢吏部授以今官階承直即次深子女子三陳彦誠韓泰張漢卿其壻也濂聞招䰟而葬者久矣在漢則新野公主在魏則郭循在晋則曹馥盖無代無之雖袁瓌駁議頗冨而扵即生以推亡依情以處禮二者終有所未盡孝子之扵父毋欲報之情何有紀極天不足以爲髙地不足以爲厚尚可遏之而不得伸邪昔者丁蘭毋亡刻木而奉之有若木其焉可指之爲毋乎亦聊以塞夫罔極之思爾若育之爲出扵念親之切是亦禮之變者也脫議之其将非人情矣乎銘曰孰無父毋孰無丘墓悠悠蒼天我胡獨不然遡風長懐有淚如泉賀上祊之原是爲閻氏之阡述德以昭先百世其傳孫孝子傳孫孝子諱惟中字伯庸濰州昌邑人祖明父琳世爲農孝子朝出耕夜歸讀古人書性雅愛宋名臣言行歷歴能道之凡所謀猶恒取以爲則年及壮用推擇爲寕海州史一年貢益都府瀕行會父卒皇皇如欲無生縣有漢昌邑王癈城舉柩塟城中結庵廬其側藉苫以居矌野無人深夜月冷哭聲依稀隨悲風逺聞人爲泣下曰啜淖糜二盂却酒肉弗御晨起無火掬雪頮靣輙詣墓前拜久之手足皸瘃形容蕉萃甚或勸其還哭而不對閭師韓泰亨帥闔巷民言于縣縣尹戴友諒弗之信将㢘之伺夜半携二蒼頭出風雪中抵庵廬而聽孝子聞足音遥問曰暮夜欲何爲戴嘆息而去以爲不讓古人亟上之府部使者加覆察如縣言請旌其門文逹中書禮部不報孝子長身羙髯善談古今事遇子弟若嚴師家法著于井落多効之娶劉氏從孝子之化居舅䘮亦不近酒肉三載生三子尚志尚文尚徳尚志業爲儒今擢禮部主客主事云史官曰李璮據益都明𬒳兵掠至洪溝去家三十里年始十嵗兵以其童也易之明夜遁倀倀亂行有老父教之曰兒但從吾指以徃即至家矣明如其言走固隄塩埸中草深滅頂而豺狼左右噑明竟得還父母亦避兵方歸舉燈索明不得相向哭燈忽作花復自相慰曰我兒其返乎不然此花何徴也言未訖忽聞叩門聲啓視之明也亟挽以入𥘉父止生明今明之子孫逾四十人而惟中又孝行卓卓如此天之不絶孫氏者其有以㦲其有以㢤送黄尊師西還九宫山序雙井黄尊師中理文節公庭堅之八世孫也年弱冠以門資􅊞爵爲光之固始尉㝷患半身不遂棄官来歸有神師號金花君者謂曰吾䏻療而疾疾愈當爲道士弗聽吾将去尊師曰儻能起癈疾爲全人敢不受命金花君以帛粘其體􅌊燈徧灼之越七日起行尊師曰神師之言猶在耳也小子其敢忘乃去學老子法扵欽天瑞慶宫宫在興國九宫山上即真抆張真君道清錬丹之所居十餘年遂主其徒其徒凡一千人咸服其教恂恂有道行當皇上西平江漢尊師拜迎扵鄂應對稱㫖後八年上思其人復召至南京所以寵勞者甚至既退命儀曹設宴享之薦紳家以為尊師幸逢盛際上簡主知龍光赫赩山中泉石當被餘輝而綽有喜色不可無咏歌以誇張盛羙其西還也相率賦詩餞之而請金華宋濂序之詩曰崔崔九宮山翠𬎼倚曾青飛觀峙後先宸奎爛晶熒中有遯世翁霞衣佩蔥珩仙從一萬指執簡聽使令年来遘兵燹散赱如流星翁獨牽青牛尋雲自躬耕翠華幸江漢扈從森幢旌府伏黄鶴磯再拜陳中情天日下照臨簮裳受餘榮今又奉璽書翩然覲神京太官給珍膳法酒雙玉瓶祗因逢景運重階泰階平致使方外士恩寵霑鴻靈一旦賦歸歟行𥚑逐雲輕自言當弱冠緑𫀆佐山城風露感末疾離家煉黄寜藥烹日月鼎符三龍虎經中氣昭象先玄覽極窈㝠𣣔期啓泥丸翀飛出孩嬰名花滿皇都春風語流鶯景物非不饒歸思竟纒縈芳嵗去如矢逝波日堪驚純陽一銷鑠重隂遂相乗余聞重自愧顛毛類枯莖逐物向役役棲身亦㷀㷀幸有一寸丹能與萬化幷何時滴秋露相期註黄庭介石齋銘金陵管君名豫以時順爲之字以介石題其所居之齋皆取乎大易之義也盖管君嗜學弗懈既習儒家言又通天官之學當皇上龍飛定鼎江左材藝之士無不寵任之管君用薦者擢爲曆官已而建太史監遂改春官之職管君益竭其智慮凡氣朔之盈虚躔度之遅疾或歩或推罔有絲毫愆忒上嘉其勤㑹廷議易太史監爲欽天監遂命管君爲之令管君亦可謂至榮也已然其進學之心猶孳孳也且謂豫以恱樂為義易致沉溺必以中正自期介如石焉則能審其幾微上下之交不至扵謟瀆矣乃掇介石二言以自警嗚呼若管君者其知豫之時順之道乎雖然豫之彖辭有曰天地以順動故日月不過而四時不忒管君苟以順而則天其又有契扵不過不忒之理乎太易之道無所不包故子發其意扵傳注之外而復繋之以銘銘曰豫之爲義動以順苟耽于逸爽其正莭介如石剛且勁其幾始兆見輒定自㣲而彰若龜鏡下不加䙝上弗侫如此進學徳将疑或冥或鳴戕厥性戒之𥘉終制乃勝有齋肅如更嚴靚我銘其楹冝敬聴奉制撰蟠桃核賦有序洪武乙卯夏五月丁丑上御端門召翰林詞臣出示巨桃半核蓋元内庫所蔵物也其長五寸廣四寸七分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子年甲申月丁酉日記其字如前之数亦以金飾之所謂庚子實宣和二年字頗疑祐陵所書既而奉㫖撰賦垂誡方来臣濂謹按王母獻桃事詳見張華博物志弟八卷史𥙷類華言桃七枚大如彈丸遺帝五自食其二以今核觀之且十倍扵彈丸則其實之如斗可知矣豈華出扵傳聞而想像載之歟抑其言足信而後之好事者假托傳㑹之歟不然漢武内傳所謂桃如鳬卵形圓而色青者又果何如歟復按蔡京所記尚方有王毋蟠桃核頗鉅京嘗相祐陵其見與今相符事當可徴然則傳志所載誠有不可信者歟臣敢忘其固陋撰賦一篇俯伏丹陛以獻𥘉則極其形容終則一歸之扵正云其詞曰炎漢六葉實惟武皇闡坤符握乾綱祀汾隂建竹宫叶仁獸在郊赤芝薦芳西海獻續弦之膠弱水来燕卵之香慶諸福之畢集思騎龍扵帝郷幸靈桃之入口傳仙種扵下方想其瑶階露寒彤庭秋逈銀燭未掩畫屏斜映啓承華之秘殿眄瑶池而神騁忽王母兮遥臨托青鳥以傳命欝隹氣之葱蘢覿芳姿之妍靚扵是玳席𥘉延霞觴屡傳蘭辭吐兮襲人縹𬒮舉兮髙鶱紫雲之輜軿暫駐九㣲之燈火猶然乃啓錦懞乃濯翠籩乃出桃實獻于帝前味甘醇而如醴色含腴以不乾鸞刀割蜜神液流泉上滋華池身輕欲仙将懐核而種之斸上林之寒烟王毋㣲咲塵世易遷儻花實之並見歲屡閱扵三千唯紫府之列真視滄海扵桑田彼窺烏牖之小児尚溪測夫幽玄斯核也匪鑄而成非陶而凝籍五行之亭毒資六氣以流形鄙瓠犀之脆薄並玉質之堅貞瓜之不入叩則有聲知何年之中析存半璧之晶熒俯貼金盤巢蓮之龜藏六仰承玉露常滿之桮弗傾鋭首聳兮尖岑豊下橢兮墜星衆皺蹙背文之籀一窪暈面色之頳荷盤欲展蚌甲未扄藏仁之跡猶在含肌之罅如生凾肉好之隱約圍合線之交層龜鶴軒翥兮顯象寳章絢爛兮金明鳯卣鵉彜同蔵珎扵天府星形月魄挟灝氣扵蓬瀛嗟夫自昔仙靈愡怳難憑出無入有變幻莫停橘類盎兮巴園棗如瓜兮漢庭恣燕齊之方士騁詭辨之奔騰瞻雲路之咫尺恨凢骨之難登以雄才之盖世甘昏溺而不醒至若建章月淡甘泉風泠銅莖中峙仙掌髙擎望飈輪兮不来徒馳情扵窈冥苦白日之易短兮竟莫制扵頽齡核雖存而人則逝兮悲秋風扵茂陵矧宣和之繼軌兮慕鼎湖之龍升托青華之帝子設神霄之玄稱何殷鍳之不逺踵覆轍其相仍天啓皇明真人龍興順堪輿之大化調隂陽之至精道徳行兮即龍虎之丹顯忠信昭兮勝鉛汞之功弘以九州爲仁夀之域儕兆民扵喬松之朋柛機流浹太和熏蒸指佞人兮草生屈軼齊氣朔兮階秀尭蓂視區區之遺核𥘉何繫乎重輕此所以革徃古之荒唐法唐虞以作程也誶曰桃有核兮大逾掌歴千齡兮多愡怳嘅靈仙兮勞夣思誰見崑丘兮紫芝長真人出兮海寓寕禮樂爲冠兮仁義作纓簫韶九成兮鳯皇鳴青鳥不敢徕兮幻說清千秋萬嵗兮永長生竊記徽宗本紀宣和元年巳亥二月庚辰改元遂易宣和殿爲保和殿至四年壬寅夏四月丙午詔錄三舘書置宣和殿及太清楼秘閣始重稱宣和今核上之字刻于二年庚子之甲申月乃不書保和而猶襲宣和之名此固不可不疑况丁酉日屬庚子歲癸未月之終今復隷之扵甲申月之首尤有不可得而致詰者頗意此核非漢武時物字亦非宋祐陵所書雜書所載海外之國多大挑雖不可盡信或者得其遺核特依倣而托之者歟然濂年已邁舊學皆廢忘未必其言之足徴也姑書之扵此以俟後之君子云宋學士文集卷第十一鑾坡集卷第一
