body:
  text: 嘉瓜頌皇明式于九圍德漸仁𬒳和氣薰蒸靈物效祥乃洪武五年夏六月嘉瓜生于句容張觀之園雙實同蒂圓如合璧竒姿分輝紺色交潤誠為曠世之産壬寅京尹臣遇林亟以素匭圖其形于上移文儀曹請以奏聞癸卯尚書臣凱等奉瓜以獻時上御武樓中書右丞相臣廣洋左丞臣庸同知大都督府事臣英御史中丞臣寧翰林學士臣濂咸侍左右天顔怡愈重瞳屢回良久乃言曰徴之往牒其事云何丞相奏言漢元和中嘉瓜生于郡國唐汴州亦獻嘉瓜禎祥之應有自來矣陛下勵精圖治超漢軼唐故天錫之珍符太平有象實見于兹上謙讓弗居俄以靈貺之臻復不可不承乃詔內臣置諸乾清宫翌日甲辰薦諸太廟臣濂退而思之夫瓜蓏之屬也其蔓逺引其葉阜蕃諸傳有之神瓜合形表綿綿之慶此固兆聖子神孫享億萬載無疆之祉况瓜之所出夲于回紇中國討而獲之故名為西方今皇上命大將軍統師西征甘肅西凉諸郡俱下而瓜沙巳入職方行見西域三十六國同心來朝駢肩入貢天顯叶瑞其又不在于兹乎然而異畒同頴周公作歸禾之萹三秀合圖班氏有靈芝之歌矧此嘉植含滋發馨昭宣我神應焜煌我王度寧可喑默而遂巳乎顧臣駑劣不足以美盛德之形容謹上其事願宣付史館以備實録復繫之以頌頌曰乾道載清坤維用寧保合大和發為休禎句容之墟物無疵癘神瓜挺出殊實同蒂瓜孰非單比合而生二氣育質雙星降精密房均甘氷圭競爽明月重輪倣佛堪象豈無賔連産於戶東叶疇若兹瓜協瑞聮祥亦有華平張翠作蓋疇若兹瓜交輝映彩其兆伊何蘿圖綿延西域既柔德冒八埏郡臣曰都載拜稽首神休滋彰天子萬夀粵從啓運靈貺疊甄兩岐秀麥合拊孕蓮矧此貞符近在輦轂王化自邇逺無不服帝曰吁哉朕猶慊然瑞當在人物胡得專使物為祥冝獻清廟自我先人積慶所召孰瑞不矜帝則弗居唯親是思我民之圖以實應天斯乃盛德小臣作頌以示罔極蔣山廣薦佛會記皇帝御寶曆之四年海宇無虞洽于大康文武恬嬉雨風時順于是恭默思道端居穆清罔有三二與天為徒重念元季兵興六合雄爭有生之類不得正命而終動億萬計靈氛紏蟠充塞下上吊奠靡至㷀然無依天隂雨濕之夜其聲或啾啾有聞宸衷衋傷若疚在躬且謂洗滌隂鬱升陟陽明惟大雄氏之教為然乃冬十有二月詔徴江南有道浮屠十人詣于南京命欽天監臣差以穀旦就蔣山太平興國禪寺丕建廣薦法會上宿齊室却葷肉弗御者一月復敕中書右丞相汪廣洋左丞胡惟庸移書於城社之神具宣上意俾神逹諸冥期以畢集五年春正月辛酉昧爽上服皮辨服臨奉天殿群臣服朝衣左右侍尚寶卿梁子忠啓御撰章疏識以皇帝之寶上再拜燎香于爐復再拜躬視疏巳授禮部尚書陶凱凱捧從黃道出午門置龍輿中備法仗鼓吹導至蔣山天界總持萬金及蔣山主僧行容率僧伽千人持香華出迎萬金取疏入大雄殿用梵法從事白而焚之退閲三藏諸文自辛酉至癸亥止當癸亥日時加申諸浮屠行祠事巳上服皮辨服榗玉圭上殿面大雄氏北向立群臣各衣法服以從和聲郎舉麾奏恱佛之樂首曰善世曲上再拜迎群臣亦再拜樂再奏昭信曲上跪進熏薌奠幣復再拜樂三奏延慈曲相以恱佛之舞舞人十其手各有所執或香或燈或珠玉明水或青蓮花氷桃暨名荈衣食之物勢皆低昻應以節上行𥘉獻禮跪進清淨饌史冊祝復再拜亞終二獻同其所異者不用冊光祿卿徐興祖進饌樂四奏曰法喜曲五奏曰禪恱曲舞同三獻已上還大次群臣退諸浮屠旋繞大雄氏寶座演𣑽呪三周以寓攀注之意𥘉􅓯山右地成六十坎漫以堊至是令軍卒五百負湯實之湯蒸氣成雲諸浮屠速幽爽入浴焚象衣使其更以綵幢法樂引至三解脫門門內五十步築方壇髙四尺上升壇東向坐侍儀使溥博西向跪受詔而出集幽爽而戒飾之詔巳引入殿致三佛之禮聽法于徑山禪師宗􅘧受毗尼戒于天竺法師慧日復引而出命軌範師呪飯摩伽陀斛法食凡四十有九飯巳夜將半上復上殿群臣從如𥘉樂六奏遍應曲執事者徹豆上再拜群臣同樂七奏妙濟曲上拜送者再群臣復同樂八奏善成曲上至望燎位燎巳上還大次解嚴群臣趍出濂聞前事二日凄風成寒飛雪灑空山川慘淡不辨草木鑾輅一至雲開日明祥光冲融布滿寰宇天顔懌如歷陛而升嚴恭對越不違咫尺俯伏拜跪穆然無聲儼如象馭陟降在廷諸威神衆拱衛圍繞下逮冥靈來歆來饗焄蒿悽愴聳人毛髮此皆精誠動乎天地感乎鬼神初不可以聲音笑貌為也肆惟皇上自臨御以來即詔禮官稽古定制京師有泰厲之祭王國有國厲之祭若郡厲邑厲鄉厲類皆有祭其興哀于無祀之鬼可謂備矣然聖慮淵深猶恐未盡幽明之故特徴內典附以先王之禮確然之行而弗疑豈非仁之至者乎昔者周文王作靈臺掘地得死人之骨王曰更葬之天下謂文王為賢澤及朽骨而况於人夫瘞骨且爾矧欲挽其靈明於生道者則我皇上好生之仁流衍無際將不間于顯幽誠與天地之德同大非言辭之可贊也猗歟盛哉祠部郎中李顔主事張孟兼蔡秉夷臧哲職專禱祠親覩勝因謂不可無紀載以藏名山以楊聖德于罔極同請濂為之文濂以老病固辭弗獲既為具列行事如右復繫之以詩曰皇鍳九有憲天惟仁明幽雖殊錫福則均死視如生屈將使伸一歸至和同符大鈞其一元綱解紐亂是用作黑祲蕩摩白日為薄孰靈匪人流血沱若積尸橫縱委溝溢壑其二霜月凄苦凉颸酸嘶茫然四顧精爽何依寒郊無人似聞夜啼鑄鐵為心寧免涕洟其三惟我聖皇夙受佛記手執金輪繼天出治軫念幽潜宵不遑寐爰啓靈埸豁彼蒙翳其四皇輿載臨稽首大雄遙瞻猊座如覿脺容香疑霧黑燈類星紅𣑽㖵震雷鯨音號鍾其五鬼宿渡河夜漏將半飈輪羽幢其集如霰神池潔清鮮衣華粲滌塵垢身還清净觀其六乃陟祕殿乃覲慈皇聞法去蓋受戒思防昔也昏酣棘塗宵行今焉昭朗白晝康莊其七法筵設食厥名為斛化至河沙𥘉因一粟無量香味用實其腹神變無方動皆充足其八鴻恩既廣氛盩全消軋坤清夷日月光昭器車瑞協玉燭時調大庭擊壤康衢列謡其九惟佛道弘誓拔群滯惟皇體佛仁德斯𬒳無潜弗灼有生咸遂史臣載文永垂來裔其十元莫月鼎傳碑莫月鼎諱起炎湖州月河溪人髙祖儔宋政和壬辰進士第一祖慶父濛連起為顯官月鼎生而秀朗肌膚如玉雪雙目有光射人習科舉業三試于有司不利乃絶去世故從事于禪觀之學脅不沾席者數年已而諱道士服更名沾乙自號為月鼎入青城山丈人觀見徐無極受五雷之法又聞南豐有鄒鐵壁者得王侍宸斬勘雷書祕不傳乃亟往求委身童隸事之會鄒病革將遣去月鼎拜且泣具以實告鄒驚嘆即以其書相授于是月鼎召雷雨破鬼魅動與天合雖嬉笑怒罵皆若有神物從之者寶祐戊午浙河東大旱馬廷鸞方守紹興迎致月鼎月鼎建壇場瞋目按劍呼雷神役之俄天地晦冥震霆一聲大雨傾注穆陵聞之賜詩一章謂其為神仙云元世祖至元巳丑遣御史中丞崔彧求異人江南物色獲之見帝于灤京內殿帝詔近侍持果殽觴之時天色爽霽帝曰可聞雷否月鼎對曰可即取胡桃擲地雷應聲而發震撼殿庭帝為之改容復命諸雨雨立至如紹興時帝大恱賜以內府金繒月鼎碎截之以濟寒窶者帝疑其物微因盛有所賚亦不受尋有旨俾掌道教事月鼎以老耄辭遂給驛南旋益放於酒無日不醉醉輒白眼望天隂飈翛翛起衣䄂間嘗與客飲西湖舟中當赤日如火客請假片雲覆之月鼎笑拾果殼浮觴面頃之雲自湖畔起翳于日下蕃釐觀道士中秋方會飲觴既舉有雲蔽月久不解月鼎時寓觀中道士知其所為急召置筵端且謝過月鼎以乎指之雲散如洗山岷為鬼物所憑狂易不可制遍索月鼎不值忽遇諸酒肆月鼎大罵含酒噀之暨歸物怪已息賣餅師積餅于筐時𬒳物竊去月鼎召雷轟雲中斬胡孫首投于前市魁娶婦道為白猿精所攝抵門但空車焉月鼎禹步如有指麾狀狂飈遽作飄婦還舍問之婦云方在北高峯不知何以至此也月鼎陽狂避世不妄與人接然頗閔疾疢者有來告急或以蟹中黃篆符與之或摘草木葉噓氣授之無不立愈者故咸以真官稱真官謂其䏻主地上鬼神其靈異之跡士大夫多言之不能盡載嵗庚寅屬其徒王繼華曰明年正月十又三日將化于汝家及期暝目而坐繼華問身後事月鼎搖手曰俟五事備可也夜將半風雲雷電雨交作月鼎索筆書偈泊然而逝夀六拾九繼華奉遺蛻葬于蘇之長洲陳公鄉去丹霞道院三里而近月鼎所受侍宸諸書寶祕一如鄒不輕授人唯繼華及無涯潘氏得其傅餘有求者隨其器小大淺深自撰符篆與之亦多驗繼華授張善淵善淵授步宗浩宗浩授周玄真皆解狎雷致雨雲而玄真尤號偉特若行醮法能使群鸐回翔壇上云史官曰魯陽援戈而麾日退三舍鄒衍仰天而哭六月降霜夫以匹夫之微精誠所格而天且應之况葆真之士乎所謂葆真之士其慮冲其志靜虛其神凝以全故其一語默一吸噓誠可嘯呼麾斥鞭笞魑魅于指顧之間矣嗚呼此事然也則夫有事周孔之學以致中和之功者其應神速又為何如哉參天地而妙萬物固冝有在也世之人胡不爾思隨物變遷至與人道弗類其可悲也夫抑亦可慨也夫豫嘗總修元史巳類月鼎入釋老傳或以為涉于怪神止之然豫心竊有感也復别書之以示玄學者見山樓記見山樓者上虞魏君仲逺之所建也仲逺居縣西四十里所龍山委蛇走其南將升而復翔其旁支斜迤而西則為福祈諸峯若車若旌若奔馬若渴鹿飲泉不一而足勢之下降為隂阜為連坡為平林一奮一止復襟帶乎後先東則遙岑隱見青雲之端宛類娥眉向羣山相嫵媚為妍其下有巨湖廣袤百里汪肆浩渺環浸乎三方晦明吐吞朝夕萬變方屏插起湖濵曰夏蓋山去天若尺五巖峙谷張尤可玩愛誠越中勝絶之境也仲逺心樂之以為非髙明之居不足延攬精華而領納爽氣于是搆斯樓日與賢士大夫同登鼎爼既備殽核維旅壷觴更酬呤篇疊咏及至神酣意適褰簾而望逺近之山爭獻竒秀晴容含青雨色擁翠不俟指呼􅌂若次苐排闥而入使人涵茹太青空澄中素直欲驂鸞翳鳯招偓佺韓終翩然𬒳髮而下大荒其視起滅埃氛弗䏻自拔者為何如也伻來俾濂記之夫自辛卯兵興闔廬所在往往蕩為灰燼狐狸晝舞鬼燐宵發悲風翛然􅊞人君子每為之永慨自非真人龍興撥亂世而反之正含齒戴髮之氓孰不在枯魚之肆哉縱有佳山日在眉睫間將不睱見之矣今仲逺雍容于觀眺之際亦曰帝力難名而吾民恆獲遂其生爾昔太常慱士施侯作見山閣于臨川而荆國王文公為記其事且謂吾人脫于兵火洗沐仁聖之膏澤餘百年而施侯始得以樓觀自娛仲逺之去亂離僅四三載爾乃能抗志物表修厥故事如承平時此無他皇化神速有非前代所可及雍熙之治將見覃及于海內是樓之作其殆兆之先見者歟雖欲不為之記不可得也第所愧者濂之學識繆悠立言無精魄難以傳逺仲逺尚求荆國其人而為之庶幾樓之勝槩與雄文雅製同為不朽耳仲逺名夀延鄭國文貞公二十四世孫群從子姓皆彬彬嗜學文章巨公多集其門而仲遠尤號翹楚且工于詩有和平冲淡之趣濂蓋聞之丹崖先生云大明勑賜故懷逺大將軍僉江南等處行樞密院事贈榮祿大夫江西等處行中書省平章政事上柱國追封梁國公趙公神道碑銘有序故懷逺大將軍僉江南等處行樞密院事趙公之薨距今己十寒暑褒恤雖頒而墓隧之碑未樹其子懷逺將軍同知金吾右衛親軍指揮使司事獻請于大都督府移文中書中書下其事禮部于是尚書臣凱侍郎臣魯具以事聞上可其奏詔臣濂撰文而臣某書篆以賜之臣濂等受命震惕深懼不足以稱上意退考諸功狀而序之曰公𥘉諱某今改賜德勝姓趙氏濠之鍾離人曽大父小乙府君妣時氏大父省二府君妣王氏父諱仁贈懷逺大將軍同知指揮使司事輕車都尉追封天水郡侯妣李氏封天水郡夫人公世為良農家狀貌魁偉有膂力尤䏻馬上運槊捷疾如飛人不敢猝近嵗壬辰江淮俶擾州縣簡拔梟鋭為義兵竒公勇悍選為群隊長公年甫二十有八帥衆接戰必操蝥弧以爭先蹈湯赴火有不暇恤敵人望而畏之然棲棲在下列無有旌其能功者乃赱西營謁歸德王忙哥隸麾下稍久察其馭軍無律絶類兒戲又欲擇豪傑而依之倀倀未有所歸嵗甲午大明皇帝統領大將南征駐軍滁陽公聞毋夫人在軍中秋七月戊寅遂棄其妻來從及見上轅門喜獲騎將遂賜以今名命為帳前先鋒已而從上取鐵佛岡攻三汊河口破張家寨克全椒後河六丈大樹諸寨尋出師援六合左股為流矢所中幾至危殆上親臨視焉歲乙未之春閠正月剗雞籠山群盜與僞將韓溥酣戰直搗烏江下和州而含山次第平三月夜􅊞陳也先營戊申也先來侵力出鬪却之夏四月庚申拔板門寨五月擊長官寨遂取儀真上録公從戰之功超授忠勇校尉管軍總管府先鋒六月丙辰復從上渡大江時元兵屯牛渚劍槊如林常忠武王鼓勇先登而奪其營諸將乃下大平連攻蕪湖句容取之秋七月辛卯克溧水八月破溧陽公皆有功歲丙申春二月元將蠻子海牙闞大兵南渡擁兵建柵于采石磯以斷淮西之路時將士家屬皆留淮西上慮其心動洊命忠武王帥師攻之公亦在遣中乃以疑兵分其勢然後出正兵與戰短戈方接竒兵遽起而乘之元將大敗而遁三月乙酉大破陳也先營于方山庚寅下金陵公之績為諸將先丁酉上命徐魏公取鎮江公副之破貓獠軍水寨夏四月下丹陽金壇五月平宣城兵鋒所及勢如破竹而所向無前矣轉承信校尉領軍先鋒六月取廣德秋七月破僞吳張士誠水寨九月復從忠武王攻毗陵會清軍叛與士誠合圍魏公于牛塘王與公大敗其衆擒其梟將張將軍歲丁酉春三月壬午取毗陵時豪傑雄爭而民心無定向曽未幾何廣德宣城叛公復取之夏六月戊辰取江隂秋七月丙子攻常熟張士德出挑戰公麾兵而進士德就縛士德士誠之弟也遂征甘露望亭無錫諸寨歲戊戍春二月公從大將攻湖州巳而冝興叛秋七月公復取之嵗巳亥夏四月擢懷逺大將軍中奕左副元師五月攻池州取青陽石埭當是時安慶實為荆椘咽喉之地勢不得不取秋八月公攻之已而取無為潜山冬十有二月復從大將征杭州嵗庚子春三月還南亰會僞將朱暹來攻冝興公帥師為援即搗退之夏五月僞漢主陳友諒以重兵􅊞我太平境直犯龍江皇上震怒命諸大將分據險要授以成算而命公守虎口城虎口城龍江第一關也既而友諒兵大至兵陳既交殺傷相當而伏兵忽起山拗友諒兵大敗擒戮無算遂復太平秋八月下銅陵之臨山寨冬十月掠黃橋及馬䭾沙歲辛丑春二月征高郵夏四月升後奕統兵元帥秋八月上親率六師伐僞漢以報龍江之役公從行道經安慶攻破其水寨遂乘風直泝小孤山抵九江九江漢僞都也距九江五里所友諒始知意謂神兵自天而下友諒宵遁遂克九江獲其玉研華蓋日月旗等物公復分兵攻黃梅廣濟冬十月克瑞冨臨江吉安諸州復回師攻安慶下之十有一月壬申進克撫州友諒既遁謀移都武昌公承命攻其沌口埧歲壬寅春正月從上征南昌兵至彭蠡湖南昌降三月取新淦州已而祝某康泰據南昌叛殺守臣葉琛公率精甲從魏公復其城夏四月甲午城破公左肩為炮所傷久之乃瘳上壯其為人超授僉江南等處行樞密院事羅友賢據池州神山寨以叛冬十又一月公與忠武王平之僞漢餘黨建柵南昌之西山號為八陳指揮十又二月公從趙將軍破之俘獲三千餘人江右州郡雖巳附往往觀望狐疑未即决嵗癸卯春三月臨江吉安冨州三城叛公皆先後統兵復之上以南昌實西江重鎮襟江帶湖控荆引粵非宗藩不足以授綏定之寄于是詔皇姪大都督授以節鉞往涖其地而公實統精兵受節制夏四月壬戌友諒帥強兵十萬攻圍南昌癸亥公統步卒數千闢城門迎戰僞將金指揮操㦸直前公彎孤一發應弦而仆敵氣大讋而退明日復合自是晝夜環攻城友諒親督促之勢在必求公贊晝祕計分命諸將隨方應敵剪獲甚衆六月辛亥公巡城至東門敵發蹶張中其腰膂箭深入約六寸公即拔出之且撫髀歎曰吾自壯歲從軍傷於矢石屢矣其重無踰于此者豈命也夫然大丈夫死即死政復何憾所恨者不能從主上掃清中原稍效微勳垂令名于竹帛爾丁已遂薨于私第年三十有九軍中涕泣相弔上聞之悼惜不巳遣使者來致祭冬十有一月獻護柩車至南京以丙子葬于牛首山安德鄉下堡之原上念其功復命曰謁者􅉠以布帛菽粟有差嵗甲辰春三月遂命獻代領其衆秋九月下中書議贈公榮祿大夫江西等處行中書省平章政事上柱國追封梁國公敕有司建廟南昌歲時祭享嵗戊申正月乙亥上即皇帝位國號大明建元洪武追念關國元勳皆命配享仁祖淳皇帝廟廷公位居其八實異數也公為人沈鷙而簡默剛明而質直馭下嚴肅一號令之加旗幟為之改色是以戰無不勝攻無不下及從大將征伐尤能恪守軍令不敢違尺寸君子以此多之生平雖未嘗讀書隨機應變其智如神動與古名將合兼之臨難不懾奮弗顧身而於孝友之道尤為篤至信所謂間氣所生之良將也公娶王氏因公來歸殁于軍追贈梁國夫人繼室朱氏先公若干年卒子男一人獻王氏出也臣聞之龍蛇起蟄山澤通氣與運相值有開必先此古今通義也惟我皇上龍飛臨濠建萬世不拔之基一時將帥大臣多其鄉里之豪俊如公者亦一人也蓋昊天有成命既生聰明睿知為天下君必有賢臣經綸而翼衛之此意巳定于冥冥之中久矣公自壯嵗從戎何役不隨何戰不與所以輝耀其威靈者亦云至矣使假之以年勳業炳朗當不止于斯惜乎不見海嶽大歸于一統也其亦命也夫然而聖恩沛滂追命錫爵既備極於寵榮有子䏻令亦足上承宸渥宿衛殿庭公之不沒者蓋有在矣古者諸侯計功稱伐書之于太常勒之于彛鼎以示其不忘是用上遵詔㫖備書公之勳績繫之頌聲以昭示承休于豐碑焉頌曰洸洸將軍川嶽之英捷如俊鷹金瞳鐡翎臨風一擊百禽震驚當元季世四海雄吞􅌭紛戰塵白晝翳昏執戈而興拿風躍雲真人龍飛届滁之陽單騎來歸願備戎行帝曰俞哉群慝爾攘元有將臣牛渚駐師公揚靈旗隨帝殄夷拔其水營雲散鳥飛于時群豪割邑據都伐木建柵壅川為瀦視帝指呼是剪是屠孰為最強犬牙其中僞漢居西狂吳在東登我叛人軼我疆封無征弗從有戰必先斬將搴旗電逝飈旋敵人畏之縮衄莫前何彼凶殘犯我龍灣公扼虎口屹為雄關六軍奮呼殺人如山帝乃誕怒肆行天誅公時在行勇若虎貔俘厥寶玉僞都為墟胡不爾思復攻豫章峙其氷山以凌太陽公亟出遏殪彼豺狼堂堂晝巡出其東門不虞飛矢竟斃其身軍中慟哭于夜亦聞天祐大明實生俊英雕戈淑旗統馭萬兵胡命止斯不觀厥成天聲四震漢踣吳摧中原既定四裔畢來使公之存績用益恢天子念功禮備褒旌錫爵上公配享廟庭命書絢爛榮賁泉城牛首之山有墓在原禮官奉詔表此武勳以鴻厥慶以示子孫閻府君墓碣禮部員外即閻育泣謂金華宋濂曰育不幸六嵗母夫人亡時年方童而未有所識知又加十六年而先府君棄我諸孤育幸粗有知矣適病癘將始不復知有人間事以故父毋皆從越俗火葬而投骨清淵之中逮今一念及兹痛徹心膂幾不願生存頗聞古昔有招魂葬衣冠者于是卜地晨㑹稽賀上祊之原近祖塋若于步髹木為柙甓土成竁以洪武某年月藏之雖于禮似涉不物人于迫切之至又遑恤其他異日使吾子孫當時物變遷持一觴酒酹塜前土以致追逺之思不翅足矣冡上有石先府君之遺德子冝為文之育將勒焉濂桉府君諱澤字潤民姓閻氏越之㑹稽人自幼為吏于三界巡檢司遷餘姚石堰西埸歷山隂縣及録事司遂升越府史府公賢之事之劇者恆以屬府君不久輒集府倉之斛皆斫木題湊而成易于開闔苟通錙銖之隟入糧必加府君知病民命椎鐵為𥿄而錮其四隅鄰府取以為法已而調衢州會江浙行省檄築諸郡城衢府遂諉之府君府君召大姓于庭取官書驗畒賦之小大咸冝民大恱充廣盈倉副使轉寧國縣典史未上卒時至正丙申三月朔也上距所生大德癸卯之歲夀五十又四娶何氏同縣曹娥鎮人有婦德得年四十以重紀至元庚辰某月日卒子男子二長即育以儒貢吏部授以今官階承直即次深子女子三陳彥誠韓泰張漢卿其壻也濂聞招魂而葬者久矣在漢則新野公主在魏則郭循在晋則曹馥蓋無代無之雖袁瓌駁議頗冨而于即生以推亡依情以處禮二者終有所未盡孝子之于父毋欲報之情何有紀極天不足以為髙地不足以為厚尚可遏之而不得伸邪昔者丁蘭毋亡刻木而奉之有若木其焉可指之為毋乎亦聊以塞夫罔極之思爾若育之為出于念親之切是亦禮之變者也脫議之其將非人情矣乎銘曰孰無父毋孰無丘墓悠悠蒼天我胡獨不然遡風長懷有淚如泉賀上祊之原是為閻氏之阡述德以昭先百世其傳孫孝子傳孫孝子諱惟中字伯庸濰州昌邑人祖明父琳世為農孝子朝出耕夜歸讀古人書性雅愛宋名臣言行歷歷能道之凡所謀猶恆取以為則年及壯用推擇為寧海州史一年貢益都府瀕行會父卒皇皇如欲無生縣有漢昌邑王廢城舉柩葬城中結庵廬其側藉苫以居矌野無人深夜月冷哭聲依稀隨悲風逺聞人為泣下曰啜淖糜二盂却酒肉弗御晨起無火掬雪頮靣輒詣墓前拜久之手足皸瘃形容蕉萃甚或勸其還哭而不對閭師韓泰亨帥闔巷民言于縣縣尹戴友諒弗之信將廉之伺夜半携二蒼頭出風雪中抵庵廬而聽孝子聞足音遙問曰暮夜欲何為戴嘆息而去以為不讓古人亟上之府部使者加覆察如縣言請旌其門文逹中書禮部不報孝子長身美髯善談古今事遇子弟若嚴師家法著于井落多效之娶劉氏從孝子之化居舅喪亦不近酒肉三載生三子尚志尚文尚德尚志業為儒今擢禮部主客主事云史官曰李璮據益都明𬒳兵掠至洪溝去家三十里年始十嵗兵以其童也易之明夜遁倀倀亂行有老父教之曰兒但從吾指以往即至家矣明如其言走固隄鹽埸中草深滅頂而豺狼左右嗥明竟得還父母亦避兵方歸舉燈索明不得相向哭燈忽作花復自相慰曰我兒其返乎不然此花何徴也言未訖忽聞叩門聲啓視之明也亟挽以入𥘉父止生明今明之子孫逾四十人而惟中又孝行卓卓如此天之不絶孫氏者其有以㦲其有以哉送黃尊師西還九宫山序雙井黃尊師中理文節公庭堅之八世孫也年弱冠以門資􅊞爵為光之固始尉尋患半身不遂棄官來歸有神師號金花君者謂曰吾䏻療而疾疾愈當為道士弗聽吾將去尊師曰儻能起廢疾為全人敢不受命金花君以帛粘其體􅌊燈遍灼之越七日起行尊師曰神師之言猶在耳也小子其敢忘乃去學老子法于欽天瑞慶宫宫在興國九宫山上即真抆張真君道清錬丹之所居十餘年遂主其徒其徒凡一千人咸服其教恂恂有道行當皇上西平江漢尊師拜迎于鄂應對稱㫖後八年上思其人復召至南京所以寵勞者甚至既退命儀曹設宴享之薦紳家以為尊師幸逢盛際上簡主知龍光赫赩山中泉石當被餘輝而綽有喜色不可無咏歌以誇張盛美其西還也相率賦詩餞之而請金華宋濂序之詩曰崔崔九宮山翠𬎼倚曾青飛觀峙後先宸奎爛晶熒中有遁世翁霞衣佩蔥珩仙從一萬指執簡聽使令年來遘兵燹散赱如流星翁獨牽青牛尋雲自躬耕翠華幸江漢扈從森幢旌府伏黃鶴磯再拜陳中情天日下照臨簮裳受餘榮今又奉璽書翩然覲神京太官給珍膳法酒雙玉瓶祗因逢景運重階泰階平致使方外士恩寵霑鴻靈一旦賦歸歟行𥚑逐雲輕自言當弱冠緑𫀆佐山城風露感末疾離家煉黃寧藥烹日月鼎符三龍虎經中氣昭象先玄覽極窈冥𣣔期啓泥丸翀飛出孩嬰名花滿皇都春風語流鶯景物非不饒歸思竟纒縈芳嵗去如矢逝波日堪驚純陽一銷鑠重隂遂相乘余聞重自愧顛毛類枯莖逐物向役役棲身亦㷀㷀幸有一寸丹能與萬化並何時滴秋露相期注黃庭介石齊銘金陵管君名豫以時順為之字以介石題其所居之齊皆取乎大易之義也蓋管君嗜學弗懈既習儒家言又通天官之學當皇上龍飛定鼎江左材藝之士無不寵任之管君用薦者擢為曆官已而建太史監遂改春官之職管君益竭其智慮凡氣朔之盈虛躔度之遲疾或步或推罔有絲毫愆忒上嘉其勤㑹廷議易太史監為欽天監遂命管君為之令管君亦可謂至榮也已然其進學之心猶孳孳也且謂豫以恱樂為義易致沉溺必以中正自期介如石焉則能審其幾微上下之交不至于諂瀆矣乃掇介石二言以自警嗚呼若管君者其知豫之時順之道乎雖然豫之彖辭有曰天地以順動故日月不過而四時不忒管君苟以順而則天其又有契于不過不忒之理乎太易之道無所不包故子發其意于傳注之外而復繫之以銘銘曰豫之為義動以順苟耽于逸爽其正莭介如石剛且徑其幾始兆見輒定自微而彰若龜鏡下不加䙝上弗侫如此進學德將疑或冥或鳴戕厥性戒之𥘉終制乃勝有齊肅如更嚴靚我銘其楹冝敬聽奉制撰蟠桃核賦有序洪武乙卯夏五月丁丑上御端門召翰林詞臣出示巨桃半核蓋元內庫所藏物也其長五寸廣四寸七分前刻西王母賜漢武桃及宣和殿十字塗以金中繪龜鶴雲氣之象後鐫庚子年甲申月丁酉日記其字如前之數亦以金飾之所謂庚子實宣和二年字頗疑祐陵所書既而奉㫖撰賦垂誡方來臣濂謹按王母獻桃事詳見張華博物志弟八卷史𥙷類華言桃七枚大如彈丸遺帝五自食其二以今核觀之且十倍于彈丸則其實之如斗可知矣豈華出于傳聞而想像載之歟抑其言足信而後之好事者假托傳㑹之歟不然漢武內傳所謂桃如鳬卵形圓而色青者又果何如歟復按蔡京所記尚方有王毋蟠桃核頗巨京嘗相祐陵其見與今相符事當可徴然則傳志所載誠有不可信者歟臣敢忘其固陋撰賦一篇俯伏丹陛以獻𥘉則極其形容終則一歸之于正云其詞曰炎漢六葉實惟武皇闡坤符握乾綱祀汾隂建竹宫叶仁獸在郊赤芝薦芳西海獻續弦之膠弱水來燕卵之香慶諸福之畢集思騎龍于帝鄉幸靈桃之入口傳仙種于下方想其瑶階露寒彤庭秋逈銀燭未掩畫屏斜映啓承華之祕殿眄瑶池而神騁忽王母兮遙臨托青鳥以傳命鬱隹氣之葱蘢覿芳姿之妍靚于是玳席𥘉延霞觴屢傳蘭辭吐兮襲人縹𬒮舉兮髙鶱紫雲之輜軿暫駐九微之燈火猶然乃啓錦懞乃濯翠籩乃出桃實獻于帝前味甘醇而如醴色含腴以不乾鸞刀割蜜神液流泉上滋華池身輕欲仙將懷核而種之斸上林之寒烟王毋微笑塵世易遷儻花實之並見歲屢閲于三千唯紫府之列真視滄海于桑田彼窺烏牖之小兒尚溪測夫幽玄斯核也匪鑄而成非陶而凝籍五行之亭毒資六氣以流形鄙瓠犀之脆薄並玉質之堅貞瓜之不入叩則有聲知何年之中析存半璧之晶熒俯貼金盤巢蓮之龜藏六仰承玉露常滿之杯弗傾鋭首聳兮尖岑豐下橢兮墜星衆皺蹙背文之籀一窪暈面色之頳荷盤欲展蚌甲未扄藏仁之跡猶在含肌之罅如生函肉好之隱約圍合線之交層龜鶴軒翥兮顯象寶章絢爛兮金明鳯卣鵉彜同藏珍于天府星形月魄挾灝氣于蓬瀛嗟夫自昔仙靈愡恍難憑出無入有變幻莫停橘類盎兮巴園棗如瓜兮漢庭恣燕齊之方士騁詭辨之奔騰瞻雲路之咫尺恨凡骨之難登以雄才之蓋世甘昏溺而不醒至若建章月淡甘泉風泠銅莖中峙仙掌髙擎望飈輪兮不來徒馳情于窈冥苦白日之易短兮竟莫制于頽齡核雖存而人則逝兮悲秋風于茂陵矧宣和之繼軌兮慕鼎湖之龍升托青華之帝子設神霄之玄稱何殷鍳之不逺踵覆轍其相仍天啓皇明真人龍興順堪輿之大化調隂陽之至精道德行兮即龍虎之丹顯忠信昭兮勝鉛汞之功弘以九州為仁夀之域儕兆民于喬松之朋柛機流浹太和熏蒸指佞人兮草生屈軼齊氣朔兮階秀堯蓂視區區之遺核𥘉何繫乎重輕此所以革往古之荒唐法唐虞以作程也誶曰桃有核兮大逾掌歷千齡兮多愡恍慨靈仙兮勞夢思誰見崑丘兮紫芝長真人出兮海寓寧禮樂為冠兮仁義作纓簫韶九成兮鳯皇鳴青鳥不敢徠兮幻說清千秋萬嵗兮永長生竊記徽宗本紀宣和元年巳亥二月庚辰改元遂易宣和殿為保和殿至四年壬寅夏四月丙午詔録三館書置宣和殿及太清樓祕閣始重稱宣和今核上之字刻于二年庚子之甲申月乃不書保和而猶襲宣和之名此固不可不疑况丁酉日屬庚子歲癸未月之終今復隸之于甲申月之首尤有不可得而致詰者頗意此核非漢武時物字亦非宋祐陵所書雜書所載海外之國多大挑雖不可盡信或者得其遺核特依倣而托之者歟然濂年已邁舊學皆廢忘未必其言之足徴也姑書之于此以俟後之君子云宋學士文集卷第十一鑾坡集卷第一
