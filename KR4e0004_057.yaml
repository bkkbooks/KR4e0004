body:
  text: 重塑釋迦文佛卧像碑銘蘇州報恩萬嵗教寺乃吳赤烏𥘉大帝為乳母陳氏所建名曰通玄唐玄宗因其年改作開元吳越錢武肅王為之起廢碣以支硎山報恩寺舊額宋徽宗崇寧𥘉加以萬歲之號至佛日嵩公來為住持專講華嚴經疏尊為賢首教寺寺有淳祐巨閣七楹間下覆釋迦文佛滅度之像相傳自唐則有之州民攀慕徼福者殆無虛日元季偽吳張士誠據有其地惑五行家之言強謂佛卧非吉徴更造立像民情焦然弗寧及偽吳亡德巖法師俯徇群請起主寺事不二三年殿堂樓閣門廡寶塔之屬皆一一葺治易腐為堅煥焉如新巳而嘆曰諸役幸粗完像可不復于古乎于是走告民間不分耄倪皆舉手加額兢輸貨泉以後為愧法師乃戒摶土之工斫嘉木為骨骼承以髙座塑卧像其上塗以五色覆以綵衾諸弟子涕淚悲泣環列前後摩耶佛母亦立其側悵然興哀唯曼殊普賢二大士神情間曠超出死生之外用意精緻形模宛然像長六十六尺六寸髙一十二尺曼殊等像髙一十八尺經始于洪武十二年春三月某日其年夏五月某日訖功縻錢萬有竒用功百有竒伻來俾濂記之嗚呼佛之法身猶如虛空本無去來何有生滅其示八相以覺群迷不過􅑙本垂迹俾同人法而巳本則真諦迹則俗諦真俗混融皆不思議之事烏可以異觀哉况八萬四千無非度門觸類而入洪纎畢逹姑以入滅論之實具華嚴五教大旨小乘雖除我執未逹性空但知實色故示之以涅槃非近于愚法聲聞教乎色法二相本無自性皆從緣生滅度之際斷緣歸空非近于大乘始教乎應身雖法亦屬幻有幻有既滅真空獨存真空既存幻有亦住二體互融了不相礙非近于大乘終教乎滅而非滅非滅而滅非滅而有既滅而空空有雙泯理事交奪如如不動無即無離非近于大垂頓教乎間居然唱滅靈山會上儼爾常存隨舉即色隨舉即空如示一身不起于座如化多身遍滿塵剎無量為一一為無量力用相收縱橫自在非近于一乘圎教乎諸有情衆若勝若劣來曕靈像隨其機宜證入教位至于混極不翅親聞盧舍那演説圎滿修多羅之為快法師此舉其于樹數基續慧命有功于法門甚大非止福澤𬒳于一州而巳抑濂聞昔人設像俱有所表見非苟然也如來中居表衆生大覺之心飲光勝尊在左表自利之行慶喜在右表利他之行曼殊乘師子表大智而降嗔也普賢騎象王表大行以制貪也他如劔斧兩神則表觀空擇法二智取義深逺使人目擊而道存故歷代襲之定為常法而此涅槃之像奈何獨無所表乎濂因略舉雜華之説斷然謂五教之理咸具不然佛法遍滿一切處是果何言哉濂既為作是記殷勤遐仰復學主夜神以偈贊佛之語繫之于後法師名淨行德巖其字也博通帝心雲華賢首清涼定慧諸家書力振其宗于將墜之時一彈指間悉起諸廢其化導有緣以成法師之志者善長正宗二沙門也偈曰世雄大悲利群物果後示權不思議既由應身顯法身從體起用宣妙法人機既得饒益故唱入滅度示化儀化儀有始而有終所以懲創懈怠者七寶牀中右脅臥慧曰一朝竟西沒娑羅樹林皆變白諸天哀號雨天華四衆圍繞共悲哽妙香結樓奠金棺發三昧火而自焚各分設利建塔廟如來雖入般涅槃畢竟終無涅槃者是知一性鎮常住不從變易有生滅倬哉賢首古伽藍三吳法會斯第一乃造涅槃微妙相因相攝入有情衆近遭紛更紊常制緇素煢然失依怙有大比丘起復古最先輔苴諸樓閣一一莊嚴成妙境次令埏土肖靈像五色交纏廣博身州民瞻禮至灑泣如還故鄉逢故物此即大乘正法門種種皆能濟群品觀者毋以像觀像如觀雜華大經王字字化為法𦦨雲雲中化佛皆現前一身示現無量身無量身中現一身令我悉除邪見綱直濟難思解脫海行住坐臥皆見佛佛之智慧如虛空無性無生無所依大光明藏時時現與我無同亦無别從上所言真實法衆生慎勿懷疑念華嚴法師古庭學公塔銘吳郡有髙行浮屠曰古庭學師傳華嚴之教于寶覺法師簡公凡清涼大疏鈔及圎覺楞嚴起信諸部皆能融會甚深微妙之旨遐邇嗜學之子斂袵遡瞻不翅卿雲德星以獲一見為快師因造十玄門賦以示圎宗大旨叢林傳誦以為能發越賢首諸祖之意他師好為立異有以應觀法界性為十界差别事唯心造為真如之理者師彈指曰真如生滅倒置錯亂一至于此耶是可為太息也其于匡衛宗乘唯恐稊稗之混黍苗固若甚嚴然其植心平易不肯沉溺專家以殊户異軌為髙理之所在輒幡然從之每升堂示衆曰吾宗法界還源非徒事于空言能于禪定而獲證入者乃為有得耳既而又曰吾蚤通法華雖纍入法華三昧然長水璿問道于琅琊覺又從靈光敏傳賢首教靈光天台之人也古人為法乃爾吾徒可專守一門乎君子美其至公無我一掃近代互相矛盾之陋故師見諸著述者咸有可觀師嘗與同學原澄以一乘同别之義更質疊難為法華問答若干篇復因主修法華期懴撰法華隨品贊三十篇辨正教門關鍵録若干卷及詩文並行于世鳴呼有若師者其與不可傳者沒矣可使之弗耀于來裔乎宜其弟子處仁法慧圗之之堅也謹按九皋聲公啓宗佑公所造行業記師諱善學自號為古庭生儒家馬氏自幼離俗往大覺院學出世間法恍若青蓮華超出淤泥亭亭淨植至治癸亥師年巳十七矣始受度為大僧投華嚴諸師而窮其説久未有所入時寶覺講經曹溪師亟從之慧解濬發閗其演説勢若破竹然數節之後皆迎刃而解寶覺善甄别人物絲毫不少貸獨譽公不置間勉其門人曰學上人可謂名實相副矣爾曹能如其賢吾宗庶幾其復振乎自是名稱勃然而興老師宿學亦推之為人望别傳教公在報恩遂聘之出典賔客久之滸溪之光福偶乏首懴者古田滋公命師司之又久之無言宣公來繼報恩之席復延之于上座分筵説經聲采一時震動江南行宣政院請師開法崑山薦福寺宣公欲攝受為弟子師笑曰吾得法于寶覺忍背之乎力拒不聽賦曹溪水四章以見志越二年即棄去還東林隱居專修白業謂同志曰吾始習晉水源華嚴懴法行之巳久及觀天竺慈雲式淨土懴儀明白簡要五晦諸文皆出華嚴吾欲藉是以祈生安養耳掌教者尊師之道不容肥遁自逸強主陽山之大慈先聲所𬒳非惟天人具欽而山川草木亦若動色相慶皇朝龍興庶事一新滸溪人戀嫪師為尤切聚黑白若干衆具疏幣雜以香華威儀請師居之師亦將大弘賢首之教以續佛慧命雖當儉歲躬分衛以食衆會天復旱院有觀世音銅像素著靈異郡二千石率僚屬迎致府𪠘屬師如其法榮之大雨三日由是士民知禎祥所致施者接踵而集師方思有所建置院僧以官賦違期當徙虔州有司知師專任講道欲與辨析之師曰吾為主僧法當坐敢纍他人邪遂毅然請行或讓師為迂師曰宿業巳定不可逭也行抵池陽馬當山示疾而化洪武庚戌四月二十日也春秋六十有四以某年月日建塔于某處藏焉師形貌尫瘠退然若不勝衣戒檢精嚴護持三業唯恐有所染汙獨居屋漏法衣不離體三藏諸文未嘗釋手雖盎無斗儲處之𥙿如謙恭自牧豎子來見亦無惰容勤于誘掖有不領解者方便比喻至于反覆數四必俟其心悟始罷云嗚呼大覺如來設為度門雖萬别千差不過因機應化如大醫王隨病制方𥘉非有所同異也其立異同者乃末流之弊耳唯我清涼大士一遵如來遺教學無常師問律于澧公受南山行事于曇一傳涅槃起信論法界觀還源記于瓦官咨雜華于大詵習天台止觀法華維摩等疏于荆溪參決南宗禪法于牛頭忠徑山欽如此之類復不一而足所以群機盡攝萬理俱融卓然為一代人天之師今觀師升堂示衆之言蓋深有契于大士者也曾不得大行其志于時而夙因已不可逃矣哀哉濂于諸宗之文頗嘗習讀每病台衡賢首二家不能相通欲和會而融貫之恨鮮有可言斯事者不知世上乃復有師乎于是發不及見之之嘆既序其事復綴之以銘曰賢首之學雜華為尊建立六相條分十門固自以為瑣瑣而不可易至若天台性善性惡三觀三德之旨一念三千之文又曷嘗不引之而示人况修門之注釋乃止觀熏習次第亦不外之而立言念古昔之諸祖皆契經之由循𥘉何心于矛盾唯欲鑒于群昏或謂無斷伏分齊而失修證之道乃後裔之紛紜卓哉學師所見離倫剪剔其末枝融通其本根談諸法之相即含性具之緣因庶幾森萬象于寸心合千江於一源觀會通于大府闢局隘之專門奈之何道未克施而遂遘于邅迍安養之生固知可以無憾但學子之亡師譬猶渡河而失筏登陸而折轅企瞻弗及鬱邑難伸評群行以成章命勒之翠珉淨慈禪師竹庵渭公白塔碑銘濟北正宗傳至我大慧普覺禪師以大乘根器總攝天上人間諸文字相化為慈雲遍布索訶世界鼓以雷風澍為法雨有識含靈咸𬒳霑潤既而圎鑑光師為其世適自時厥後以次相傳若光孝簡師若育王觀師若佛智熙師若廣智全悟欣師後先勃興荷擔正法其所以黼黻宗綱折衝外侮皆兼用辭章為佛事至今聲聞烜著于霄壤間爛然如日星之光何其雄哉今清逺師則全悟俗姓之甥而法門之嗣子也𥘉清逺之生有靈芝産于庭槐占者云芝乃靈秀所凝是子將以文顯乎已而果英發誦書攻文不待師授而知解日勝時全悟以太中大夫住持集慶大龍翔寺聞之喜曰此吾宗千里駒也亟挽致座下集慶為東南都會而行御史臺涖焉四方名薦紳無不翕聚無不與全悟遊𥘉科第一人張公起巖來為中丞尤號最厚翰林承旨張公翥中書左丞危公素時尚布衣亦往來乎其中四三君子或發天人性命之祕或談古今治忽之幾或輪文辭開闔之法清逺咸得與聞之反覆參求益探其閫奧其學于是大進形諸篇翰如千葩競放錦麗霞張而不見春風煦嫗之迹沉冥盡斂精明自然老于文學者爭歆慕之歡曰此文中虎也清逺恚曰公等謂吾專攻是業耶佛法與世法不相違背故以餘力及之將光潤其宗教爾苟用此相夸豈知我哉一日全悟警厲諸徒衆未有對清遠直前肆言如俊鶻橫秋目無留行全悟振威叱之衆為駭愕清逺氣不少沮如是詰難至于二三全悟莞爾而笑曰汝可入吾室矣命為記室向之歆慕者則又曰清逺所證悟巳造殊勝徒以文夸之冝其恚也全悟瀕沒亦呼而告之曰吾據師位者四十餘年接人非不夥能弘大慧之道使不墜者唯汝與宗泐爾汝其懋哉宗泐字季潭今大天界寺主僧也寺即故龍翔云全悟既示寂清逺肆為汗漫遊見虞文靖公集于臨川謁大司徒楚國歐陽文公玄于瀏陽二公聞其雄辨蜂起文彩彰露僉曰是無忝于舅氏者也浙江行省丞相康里公重其文行遣使者具書弊筵主會稽之寶相未幾遷杭之報國轉湖之道傷雖當兵燹相仍之際為法求人無少退轉國朝洪武𥘉淨慈禪林虛席四衆一心復請為主持會儀曹奉詔設無遮大會于鍾山二浙名浮屠咸集清逺一至京師遂退居錢唐之梁渚梁渚乃全悟藏爪髮之地問道者接踵而至不翅住山時八年十二月四大若有所惱召門弟子善解屬以後事怡然而逝是月之十六日也踰七日火化得不壞者三曰齒牙曰鉢塞莫曰室利羅十年十二月二十六日祔葬爪髮塔之東若干步所度弟子某某嗣師之道出主名山者某等若干人四會語有録其詩文曰外集者凡若干篇不待結集而盛行于時所書草隸亦遍流四方清逺善鼓琴同𫀆以無益風之清逺笑曰非尓所知是亦般若所寓也清逺軀分短小神宇超朗終身持誦金剛般若經未嘗虛日報國入院季秋而山丹發花一枝五蕚如佛手然淨慈行化有陳氏婦預夢神僧臨其門及清逺至稽首作禮願為尼以相依清逺舉大法以開導之其婦恍若有所悟入清逺行未百步而婦竟與家人别坐脫而去生平守道弗變元至正末避地匡廬悍兵來索金帛清逺瞋目訶之曰浮屠烏有是物耶兵怒拔劒欲殺之清逺引頸就劔兵嘆息而去清逺偉行甚衆舉此例知餘不詳載也清逺諱懷渭清逺其字也晚自號竹庵南昌魏氏子世夀五十又九僧臘四十云濂聞之世間萬事皆可偽唯死生之際不可偽有若清逺凡夫俗子孰不以文辭僧目之及其亡也三事不壞光明熾盛驚動當世非有證入毗盧性海寧有是靈驗哉大慧以來纍葉相承蓋亦若斯而巳濂長清逺八歲雖屢承容色官守所拘不暇以宗乘相叩擊今九京不可作矣其入室弟子報國道謙持自為事狀同鍾山德瓊以塔上之文為請因略其細而掇其大書而遺之使刻焉銘曰大慧正友七葉相承焜耀鏗鍧以文華稱文非徒文般若為體其本既弘用則自偉譬諸雲氣遙映日光東西照之霞纈錦章所以逹人兼治弗廢黼黻折衝莫非佛事堂堂渭師結秀之姿庭槐有知應在瑞芝既抵碩師日交簮組文彩聲明一時彰著人見其粗玉貫珠聮我窺其精説法熾然持此應緣隨時順逆飛鴻度空曽無一迹報身已滅大火方融舍利粲粲叢生其中矧是三德熏修所致世間萬物唯此無偽靈明上通所遺者文因文而入不限見聞山色溪聲皆歸實相于此見師是謂無妄梁渚之虛雙塔巍巍惟舅洎甥先後聮輝山石可泐川流可息此人天師永保貞吉翰林云云撰元故演福教寺住持瞽庵講師示公道行碑銘台衡之學至佛海大師澄公光眀俊偉如日出扶桑四方之人無不瞻仰故其入室弟子各能具大無畏得無礙智而闡教于一方及其化去豫多托群行而銘其塔若今瞽庵示公之殁其烏得無辭乎瞽庵夀六十九國朝洪武四年出遊虎林以某月日順寂于太平興國傳法教寺神思不亂如返故廬六年三月七日其從子延慶住持智曉函靈骨歸藏受經祖塔之側復恐無以傳來裔持狀來徴銘按狀台之寧海有盧某者謹敕之士也其娶金氏金夢寶陀大士現五色雲中覺而有娘及生一男子自幼遠長灑然有出塵之思衆咸曰是子從佛乘中來耶年二十一投會稽悟本院為沙彌一山元公為之脫白一山度弟子四人取醍醐經開示悟入為之名而瞽庵遂名顯示號之曰瞽庵元天曆𥘉受毗丘大戒即踰濤江而西欲講天台教觀時天岸濟公方主萬夀圓覺寺瞽庵往事焉久之濟公見其天機峻利有一日千里之勢乃曰子盍從吾師遊乎他日大顯南嶽一宗吾于子有望矣濟公之師即佛海也佛海倡道于上天竺靈感觀音教寺來受經者雲蒸海湧瞽庵厠多士中晝夜研摩三觀十乘之旨察其密微至于蠶絲牛毛設有疑悶進質諸佛海退與四方俊彥縱橫講切不至于洞逹弗措也真積日久大小乘部文義句悉貯心胸有叩之者辨口如水東注不見其所窮朋類推服恆以為不可及佛海器之命其司賔及佛海退居南天竺虎岩頥公來紹其後升掌懴摩而賢叟思公又延居第一座鍊徒牧衆不異于常時至正五年始出世隆夀教寺強畎人侵者復之殿序僧毀者葺之一坐十二春秋雖蕞爾小剎聲望頓增遷雷峰顯嚴教寺破屋殘僧觸目皆凄涼之境瞽庵既至學徒散者漸集迄復伽藍舊規人以為難越六年江浙省臣力聘主崇恩演福教寺寺當兵燹之餘鞠為荒墟瞽庵創丈室五楹間以納負笈之士遇有咨問者悉竭平昔所藴亹亹而語之至于南屏霅川之同異尤嚴于斷制厯引諸家經疏辨證無遺或譏其過勞輒笑曰為法忘軀桑門之常事尓子以為勞乎巳而兵禍日亟飄然東邁向悟本樵山祖塔棲焉屏絶人事顓至于西方淨土之學終日繫念未嘗少忘屢有靈瑞之應瞽庵古貌長身寡言笑以清儉自持一榻二十年瀟然如在逆旅當時齒臘相亞職業相肖咸據席名山瞽庵視之淡然雅不事干謁其出世為人皆迫于群情不得巳而起性不樂時俗藻麗章句凡有述作一本山家諸師之論其所度弟子某等若干人其嗣法者祥符思賢等若干人嗟夫大化絪緼變合無垠而獲生人道為難既幸為人得服福田衣又難雖服福田衣從桑門之後而聞諸大法又難法或可以治諸躬至于收攝一切有情使其解脫則又難之最難者也瞽庵于此數者皆可以無憾狀謂能衍佛海之道傳之方來動靜出處綽有可觀者誠可信不誣也序而銘之孰謂非宜銘曰維木之生兮處乎鄧林雨露所滋兮其崇百尋材既足用兮嘉聞孔章締搆攸宜兮清廟明堂取以嫓師兮佛􅺾類之道積厥躬兮位亦克施玄風四播兮象龍駿奔足躡紺蓮兮口舒露雲一氣回斡兮造化發機區萌畢逹兮有鬯無夷安養固遐兮最邇者心彈指即至兮何闡古今幻生終滅兮有弗滅存一真獨露兮無身而身樵山不老兮青色如藍銘此塔婆兮來者是監佛鑑圎照論師大用才公行業碑濂之方外友具庵法師玘公手造行狀一通來謂濂曰吾宗有大道師曰佛鑑圎照論師以至正十九年三月十九日滅度于南山演福教寺其未滅度時頭目忽岑岑然乃召弟子謂之曰我生緣將盡即焚香面西而坐厲聲稱西方佛號晝夜六時聲無暫輟至于浹日又曰爾等勿謂修持無驗吾淨土緣稔三昧現前矣吾其行哉即具浴更衣據觚翰為書以别相知者復作辭世偈一手合掌而逝一城之人無不悼惜及舁龕就火省院重臣憲漕逹官皆執纚紼以從五色神光自龕中發火巳舌如紅蓮齒牙如珂貝舍利如菽者滿地萬衆兢取灰燼一時俱盡後至者穴地尺餘亦得之某年月日建塔寺之南偏安養蘭若奉諸舍利等藏焉惟古之大德視死生為一朝固無事乎表襮然不托文章之家登載徽行何以聳善而扶教今其得法上首大山等既巳修塔建祠而法孫普福主山守仁復以塔上之文為請願有以慰其遙思遂以其狀相授濂按狀而序之曰論師諱必才字大用姓屈氏台之臨海人所謂四字名號帝師大寶法王之所卑也父諱哲明大經為科目之儒母趙氏嗜善弗厭而崇佛尤至西域𣑽僧入夢顯徴而論師降生甫能言輒記孝經一卷七歲善屬句脫口而就聲文諧協宛有思致年十二受經于西江瞿公瞿公居越之報恩實剡源暹公諸孫通天台教觀論師挾册而從之巳而祝髮受具足戒十六出遊虎林謁湛堂澄公于南天竺湛堂見其顔貌峻拔出語皆中肯綮即以法器期之命典賔寮時玉岡潤公自集慶維那來居第一座學子歸之如雲論師亦執經入室雖流金之暑折膠之寒足不踰户限如是者十年凡山家部味之玄教觀之要一經指授意釋心融無不臻其閫奧玉岡嘆曰是子非靈山會上業巳習之烏能致此哉一時儕類如我庵無公絶宗繼公英聲偉望超出時流至于剖決宗旨議定教章必推論師為上首舉無異辭玉岡出世海鹽當湖德勝寺延論師分座講經雨注河翻縱橫無礙聽者咸詫不異北峯之在世也泰定元年玉岡升遷演福行宣政院請論師繼其教席當是時湛堂聲稱喧播中外衆意論師必願為之子升堂演唱之際論師獨歸之玉岡君子謂其知義益推重之至正二年轉杭之興福三年亦升住演福康里丞相屢致薌幣咨決心法一時貴人畯士罔不望風作禮施金帛者由是充牣論師隨受隨散首新大雄殿于兵燼之餘既而三門兩序成未幾彌顯之堂又成晚建萬佛寶閣其崇以尺計者一百三十有竒金碧輝煌像變絢麗法筵之盛特冠南北諸剎非惟留心有為功業而巳凡其所蒞講演大小部文終而復始修禮期懴至若干會其見于著述者有妙玄文句止觀三大部增治助文法華涅槃二經講義荆溪章安法智三祖禮文並行于世而詩偈二編别傳登門受業者前後恆𢾗百人出據師位者在在有之世夀六十八僧臘僅五十六竟尓西歸矣悲夫論師為人凝重簡默觀行精勵孜孜修學無斯須懈怠每夏終制解同業者皆囊衣篋帙而旋故鄉法師獨掩關謝客益加磨淬人不堪其清苦而處之欣欣也故其德業所就光明俊偉若此善乎具庵贊論師之行曰論師以恢涵之量邁遠之識于空壞劫中建住成之效而人或有可齊者至于發性具之微肆辨説之雄燦真燈于既昏膠慧命于將墜此豈世力之所能為哉嗚呼斯言至矣盡矣濂縱欲竭其世諦文字以美盛德之形容其何能度越之哉是用不辭姑評隲其本末而序列如右復繫之以銘曰清明在躬志如神有開必先理乃申巨顙深目疑應真飛空而來杖刺閽二股六環聲振振夢中乘此大願輪性靈無障如夙熏雙矑一鑠無全文耳入心通俱正因超然直詣止觀門袖有神珠光燉燉欲與迷轍開重昏南東西北方位分勝劣欲往咸知津三鎮招提道益尊師子作座寶華茵一音演法春雷震天雨雜華飛􅌭紛龍鬼聳聽來侁侁有時撥動三昧雲幻出樓閣撑秋旻昔也劫灰巳四堙夜半荒墟牛馬磷今焉五彩絢嶙峋化佛無數黃金身神機妙用翕然臻但見協氣恆煙煴安樂淨域空中存銀沙寶樹琉璃園鳥鳴籟動宣祕言金臺來迎欻孤騫青蓮為屋翡翠軒左右旋繞千幢幡法門明驗此無諼心境叵得染淨泯不礙緣生想相勻人人負此希世珍慎毋遺棄淪荆榛弗信來徵圎照墳具官某撰宋學士文集卷第五十七芝園後集卷第七
