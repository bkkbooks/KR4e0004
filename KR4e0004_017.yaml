body:
  text: 恭題御製方竹記後皇帝視朝之暇燕處武楼中毎召一二臣隣諮詢治道時吏部尚書臣詹同在帝左右歴談古帝王事旁稽物理而偶及扵竹帝曰竹之類其亦多乎臣同對曰其類實䌓晉戴凱之所譜至五十餘種或根如盤輪或節若束針或細則勝箭或鉅可爲舟有未䏻歴舉者大槩其色皆青其體皆圓也唯吳越山中有名方竹者最爲佹異四稜直上弗偏弗頗若有㢘隅不可犯之色以故士大夫愛之徃徃采而爲笻帝曰信有諸乎臣同復對曰老臣焉敢謬言既退獲一枝以獻帝摩挲觀之悦曰臣同其亦信人㢤扵是親御翰墨草方竹記一通始言品物之夥中序格致之難及其未也謂臣同爲人俊聖製雖多未甞輕以予人臣同以文學侍從之臣簡在帝心者久故特𬒳是賜焉夫臣以誠而事上君以恩而逮下唐虞盛治一且復見三十餘年之後何其懿㢤臣同冝勒諸金石與典謨訓誥之文並藏子孫之多永永傳之無極臣同受賜以洪武癸丑歲五月之戊辰越二十七日實六月乙未臣濂謹熏沐而題其後云臣濂拜手謹記大明故中順大夫禮部侍卽曽公神道碑銘有序治古之時非惟道徳純一而政教脩明至扵文學之彦亦精贍宏愽足以爲經濟之用盖自童丱之始十四經之文畫以歲月期扵黙記又推之扵遷固范曄諸書豈直覧之其黙記亦如經基本既正而後徧觀歷代之史察其得失稽其異同㑹其綱紀知識益且至矣而又參扵秦漢以来之子書古今譔㝎之集録探幽索㣲使無遁情扵是道徳性命之奥以至天文地理禮樂兵刑封建郊祀職官選舉學校財用貢賦户口征役之屬無所不詣其極或廟堂之上有所建議必旁引曲證以白其疑不翅指諸掌之易也自貢舉法行學者知以􅎥經擬題爲志其所㝡切者唯四子一經之箋是鑚是窺餘則澷不加省與之交談两目瞪然視舌本強不䏻對嗚呼一物不知儒者所恥孰謂如是之學其能有以濟世㢤此濂銘亡友曽公之墓憤激于中而復繼之永嘅也公諱魯字得之曽其氏也孔門弟子郕公五十七代孫其居新淦吉陽里者巳久世裔之傳與夫轉徙之詳昔以著扵公之先墓兹不重載曾大父兼善宋贈大理評寺祖天麒宋宣教卽軍噐監主簿父順元韶州路儒學教授妣劉氏公年七歲䏻暗誦九經一字弗遺奉禮卽蕳君正理欲以神童舉于朝其父力止之及齒稍長取三史日記之㝷及其餘数千年間國體治亂人材忠佞制度㳂革咸䏻言之有叩之者如山川出雲層見疊敷杳莫察其端倪公殊不以爲足所藏子集動至数百家各攬其精而掇其華聞有僻書隱牒不憚道里之逺必購得之既得必篝燈讀之逹旦不寐發爲辭章龎蔚炳朗毅然有不可奪之氣廬陵劉提舉岳申與之語連日夜弗休嘆曰不意後生中䏻至扵斯也其将以文鳴乎杜内翰鄕之丈人行也公負笈從之㳺益充拓其所未寤至疑辨惑惟日不足遂以博極群書稱于時公猶謂未要扵至道述長書一通謁虞文靖公集扵臨川虞公大恱曰昔程子與張敬夫年十六七脫然有志聖賢之道于䏻如是復何譲古人公年盖十九矣由是益潜心濂洛關閩之學分别義理宻如蠶絲牛毛而尤愛吳文正公澂之書吳公亦居臨川其著書滿家無大無小公一一訪獲之玩繹未甞釋手久之充然有得盤桓林泉以道自娱若将終身焉至正壬辰天下大亂州縣所在繹騷公召里諸豪集徤児持兵以保障乎一方仍椎牛釃酒𨳩陳􅊇順禍福言甚剴切衆皆聳耳而聽卒無敢犯非義者人號曰君子郷及入國朝有詔纂脩元史勒成一代之典遣使者起公于家公賛决部居𥙷苴罅漏者不一而足其功爲㝡多史成上坐端門召諸史臣有白金束帛之賜公居其首焉公将乞身還山㑹朝廷𨳩局編類禮書輿論以老成之士無踰扵公者共堅㽞之議禮之家有如聚訟自古難㝎扵一公當群言沸騰之中掦言曰某禮宜據某書則是從某說則非有不服者争相辨詰公厯舉傳記荅之各心醉而去俄選入儀曹爲祠部主事階承事卽時洪武二年十二月也常忠武王薨髙麗王遣使来祭公索其文觀之使者靳不與公不可使者不得巳出之外則襲以金龍黄帕内則不書洪武之號公責之曰龍帕固疑誤用若納貢稱藩而不奉正朔君臣之義果安在耶使者頓首謝過皆命易去之乃巳安南来貢主客曹已受其表将入見公取其副覧之其王乃陳叔明公曰前王陳日熞爾今驟更名必有以也亟白尚書詰之使者不敢諱盖日熞爲叔明所逼而死遂篡其位中心懐􅘨故託脩貢以覘朝廷之意上聞之曰島夷何狡徻如此却其貢不受五年二月上問丞相曰曽魯在禮部今何職耶對曰不過主事爾即日超六階拜中順大夫禮部侍卽公以順字犯父諱辭就朝請下階吏部以國法有㝎不之許倭夷入㓂戌将毎捕獲之上憫其無知命儒臣草詔歸其俘公之所譔有中國一視同仁之語上恱曰頃觀陶凱文巳起人意今魯復如此文運庻其昌乎凱禮部尚書也八月奉㫖考亰畿郷試入院之後忽吐血一升公猶力疾閲卷不息自是遂奄奄不振九月膏露降鍾山群臣咸見諸咏歌公獨譔賦以進十月上将郊祀出宿齋宮命取諸作使侍臣更畨誦之至公獨曰此曽魯作耶援據既精鋪叙有法豈新進之可驟至㢤十又一月疾逾篤上章乞骸骨甚至中書以聞上惻然許之十又二月辛夘歸舟至南昌公謂次子圭曰吾命止明日不能至家矣然吾以一介韋布之士受國寵恩位躋法從又得守正而斃死復何憾所憾者不見二孫之成立也即趣具觚翰爲書戒之壬辰次石岐潭果歛栣而逝距家纔两驛爾丙申致故居丁酉始具棺歛擇地扵縣南屏山之陽以六年某月某甲子祔葬九世祖高安府君之塋從治命也公蓄徳熈和人近之者温如春風不見忿戾之色然其人則山澤之癯身退然若不勝衣未甞有所矯飾其處家也事親克孝父䘮哀毁致疾踰年而後能起巳而二兄諸姪相継捐舘公抆淚經紀㐫事三年間葬十餘䘮且撫存其孤惸惟恐或失其所平生輕財伏義喜周人之急四方賔客日登其門公倒屣迎之了無倦容甞一試江西鄕闈有司寘諸乙榜人爲不平而公亦澹如也其出仕也精白一心有知無不爲凡典禮渉扵制度者必經公損益而後㝎雖古者吏牘之䌓簡署字之上下人所不能知公獨稽諸書以爲决公誠所謂濟世之學者非邪公屬文不喜㽞槀其徒雖有所輯録猶未成書其自著書有六一居士集正訛南豊類槀辨誤藏于家他咸未脫槀當公脩元史時濂實爲揔裁及入南宮又有僚友之好故相知號爲㝡深共坐官齋更析互辨毎至夜分嘆末學之空虚傷古道之寥落又復相視辴然一笑嚴陵徐尊生甞有言曰南京有博學之士二人一以舌爲筆一以筆爲舌其意盖指公與濂嗚呼尊生過矣濂也何人而敢上儷扵公㢤雖然公未甞欲棄濂也相期他日幸歸休必胥㑹焉共成一書庻可籍手以見前賢公今不可作矣故因銘墓之文而屡興懐扵治古之時也世之讀者必将深感焉公讀書之室曰守約齋學者遂稱爲守約先生享年五十四歲娶聶氏先二十年卒公再不納配一榻簫然如山林枯槁之士人難之子男二人長塾今来請銘者次即圭出爲仲兄後女一人應真適劉奉孫二人正龍夢龍銘曰氣化紏纏人文昭宣萬類斯甄兮天沒地施一偶一竒形聲相資兮載籍􅌭紛六藝攸尊各闢其門兮枝分葉敷散爲千塗混其精觕兮彌綸大邦文物采章有變有常兮不生碩儒孰軋其樞孰苞其腴兮玉笥之陽神珠吐芒莫自翳蔵兮大明麗天束帛戔戔蒐羅俊賢弓衮褒鉞誅寓扵䇿書輿論所乎兮儀曹之升議禮稽經日維烝烝兮黼黻帝猷上窺殷周功在刪脩兮所積之訦所發之深𨳩陽闔隂兮正笏垂紳其色誾誾邦之老臣兮媚學蹮蹮其中枵然何翅霄淵兮天胡降䘮一鑑之亡四國之傷兮其神上征化爲列星寒光晶熒兮下射屏山馬鬛桓桓名在不刋兮故民匠提舉司知事許府君墓志銘濂在詞林時聞有衣冠之胄許其氏而進其名者䆠㳺于外不勝其思親之情春華之朝秋月之夕恒至扵瞻望隕涕郷友王内翰徵濂爲辭以少慰其深衷後四年與進㑹南京進乃言曰昔者思吾父而不獲見吾父固無恙也而中心猶怦怦然今父則逝矣屢欲相從扵泉䑓恐乖以死傷生之訓輙苟存視息以迄干今然則何以自靖其心㢤惟墓門有石可以鐫遺行而敡休聲夫子甞厚我矣敢縁此故稽䫙再拜以請願夫子終惠之謹按歐陽時中所爲状府君諱嗣宗字原仲姓許氏其先洛陽人有諱叔向者仕唐爲某州刺史生安福令嶽胤值黄巢亂棄官歸袁之萍鄕萍郷之有許氏自此始安福生二子曰宗曰載皆多孫子宋時以文學自奮爲郡僚属及縣令長者前後相望家牒燬干兵咸無所徴曽祖某祖季謙某年進士某官父斗祐府君生有異質嗜學弗倦取六經百氏晝夜探其精㣲已而嘆曰爲學貴行不行而能言雖如簇錦将何施邪益竱心家政旁及樹藝之事久之貲若産超扵前人遂以事親訓子姓爲務家西百餘歩斸土爲臺引清流遶之竒葩叢篁環列扵左右檂英凉翠盖欝然云府君建聚景樓其間翼以衆芳俯清天心水面諸亭幽静軒敞一塵弗侵府君奉板輿㳺其中俾童冠者隨薦紳家嚅嚌群書孳孳弗之觧稍有餘暇輙集賔朋雅歌投壼以自樂府君曰可則可矣苟不以禮自治何以示悠久乃稽諸子冠婚䘮祭之禮肄習而行復擇並舎常稔之田五十畮焚其質劑永收其入以供四時祀事州里之間有㐫䘮單窶弗自支者且振而給之大司徒楚國歐陽文公當世大儒也義府君之爲人結爲交友甞寄詩以寓其意至正𥘉當路薦爲唐州等處民匠提舉司知事命書旣下州人士具壷觴以爲夀府君笑曰吾秋髮種種矣尚何情落䆠轍㢤辞弗赴壬辰之亂吳楚之兵日格闘弗休唯萍郷受禍最酷父子相枕籍而死鄕無完家府君能先事而避轉徙餘三十所一門䏻獨安存不異承平時及天下大㝎府君退隱雙清精舎林壑秀羙目斷無來人府君拄頰㸔雲縹緲輪囷卷舒自如悠然有㑹心處則與高人勝士酣歌互荅有不知夕陽之在樹也巳而遘㣲痾却藥不之御氣息奄奄猶力疾命諸子曰而等當以忠厚継其家言訖而逝時洪武四年七月二十四日也壽年七十有七娶彭夫人生四男子庭蘭庭秀庭桂庭春庭蘭蚤世庭桂今更名進即濂所爲賦思親辞者入國朝用上官薦擢廣信府知事階将仕卽請寛賦以恤民脩學以化俗人懐之孫男五人觀恂惠憧惺越三年一月十九日蔵府君扵縣之名教里三峯山下惟府君之讀書不眩其文而食其實故以之治家則大穣以之奉親則恱而愉以之勵子姓則飭以脩以之辟地則能去危而就安何莫非推其所學也視彼膠固章句資爲絺繪之辭以譁世者有間矣銘曰我經我舒我已食其腴我心之匪怍我将還其樸智以全其生禮以惇其薄有家之穰穣有聞之章章有子之鏘鏘維士也良而其行也又方采掇其英叶銘以昭其蔵黄瑄字辭宣之爲文上從而下從二從囬乃取風囬轉以宣通隂陽之義㝷復借爲布爲緩爲明爲徧不一而之若加之以玉則又爲瑄盖玉則象形宣則諧聲也爾雅云璧入六寸謂之瑄漢代郊祀則有司奉瑄玉而瑄又通作宣然則瑄玉者亦玊中之㝡貴者歟先師黄文獻公之嫡孫名瑄濂因字之曰伯宣且朂之曰天地之間貴者爲玉賤者爲石石譬則小人玉譬則君子也爾瑄出自瓊瑶之林人固曰此玉也非石也玉則玉矣曷益之以礱琢之功乎不然則玉徒玉爾噐云乎㢤雖然噐幸成矣復局滯扵一而未䏻無施而不當也瑄乎瑄乎其用是而自朂乎嗚呼文獻公蔵噐于身出而薦諸郊廟非特噐而已也有如辟羡起度凡諸玉之用規矩皆自其中出爾瑄慎勿愧之瑄乎瑄乎其用是而自朂乎濂老門人也故扵瑄不敢襃而敢箴系之以誦曰璧大爲瑄孕諸石孚尹夜氣吐秋魄薦郊奠廟神鬼格其儀夐出犧與帛嫓義配名到幽賾爾性爾繕靡朝夕予言服􅈾宜無斁天台顧氏先徳碑顧氏之系岀江左其後遷金華㝷復由金華徙天台相傳以爲顧歡之後歡梁之隱君子也故其地有顧儒嶺有歡溪然世逺宗堙莫䏻知其詳矣至宋南渡後有諱知言者字孚先通黄帝内經之學人有疾注藥起之無靳色㑹疫癘大興孚先裹良劑日巡户而與之鄕人感其賜有搏土肖像以爲壽者以子貴累贈宣教卽生商卿周卿商卿字方子用薦者爲郷郡學官遂以明經講授從之者皆爲純䔍君子出言制行能使人慕豔不置閥閱家綦氏伯仲争以門資叙爵幾至破家方子片言喻之輙頓首謝過以官譲其兄周卿字成子擢嘉㝎癸未進士苐官至朝奉卽奉國軍簽判𥘉娶貴族施氏石樓縣令碩乃件繫之請予爲之記嗚呼世之求文者奚翅數百罔不欲譽已之善而扵其先徳則未甞少㽞意焉碩乃䏻一反其所爲得非知識度越扵人㢤因不欲辭而書以遺之使碩之後人庻幾有所徴焉奉議大夫國子司業金華宋濂譔臧士幾字辞臧君哲字曰丈濬宻人也以儀曹屬時詔爲司隷然其爲人秀頴而嗜學賢士大夫愛之頗謂其名若字皆盛徳事殊非所以自稱盍更之君来請扵予予􅎥程子哲人之幾之義字曰士幾幾者善悪之發榮辱之主也可不慎歟慎之如何曰誠而已矣作字辞辞曰心神變化乗氣機弩牙既幹鈞石随或黒或白迺異岐君子防之樹城陴嚴以金皷列旌旗百體從令志則熈尚慎旃㢤無殆而西域浦氏㝎姓碑文起居注浦君與予爲同朝友自序其世系及㝎姓之因請予文以勒諸碑予讀已嘆曰是不亦君子之道歟浦君西城阿魯温人髙祖以上忘其名曽祖哲立理元太祖時遷幽之宛平生中順大夫同知温州路捴管府事道吾道吾字善𥘉因䆠于抗復居錢塘拱衛郷生六子曰沙的曰黒黒曰福州錄事司逹魯花赤㤗住丁曰六十曰刺哲曰馬思護黒黒生二子曰江浙行省宣使羅里曰賽魯丁六十生一子曰木八刺贅扵女氏復遷扵永嘉䏻務廢舉之術家饒扵貲刺哲生三子曰道刺沙曰溥博即浦君其字爲仲淵曰忻都馬思護生三子曰哈山唯是再世多已物故唯木八刺父子及浦君存浦君性頴悟父與其毋聶夫人訓之尤䔍去從名師傳通詩毛氏箋而折衷以朱吕之傳發爲文辞其光燁然也中至正壬寅江浙鄕闈一榜辟教諭徳清轉嘉興遂占籍嘉興卜魏車爲氏者雖更僕有所不能盡此無他扵里無所悖扵事有所據先王制禮亦未甞不與之也今浦君之爲上符古義下合時冝非卓見絶識不得與扵此彼拘拘守常之士則曰我先祖未之䏻行也是悪足以論變通之故嗚呼若浦君者不亦君子之道歟予既詳論㝎姓之因而并述其世系相傳次第使刻焉初中順公南征有功授武畧将軍大都都鎮撫前至元末論事忤丞相岀爲衢州判官已而換文資任杭州治中階奉訓大夫民皆安其政後以前官致其事卒葬杭城靈芝寺左聚景園中而刺哲君祔焉刺哲君後遷方家谷陳寺山之陽浦君以圖譜久䘮唯恐其事泯泯請附書于末使後裔有所考云生生堂記生生堂者東陽陳澤氏之所居也縣南八十里有鄕名瑞山陳氏世家其中至諱宗譽字彦聲者有徳扵郷又能與六務觀父子㳺而其諸孫黼東莱吕成公第子擢淳熈􅉝丑進士第累官駕部卽中林正惠公實以女妻之澤民盖其十世從孫也澤民思繼承家學岀從名師巨儒㳺精扵科目之業有司貢上選曹試經義合格署通判于漳州将上以堂記屬予予頗聞縣之仁壽鄕在東北四十里而近有簮纓家亦與澤民同姓而譜諜不通非其族也甞搆宅一區方建前楹有鳩鳴其上占之者云此宅當属之張氏後六十年復歸于陳未幾西鄰張氏果来居之張既不振人士皆謂復還于始搆之家不知乃澤民竟以重貲獲之也僂指計之誠甲子一周矣噫亦異㢤澤民遂筮日自瑞山而遷當春氣煦明卉木含榮有嚶其鳴澤民刲羊刺豕具尊爼合賔􅊚而燕樂之酒㣲酣坐客撃案爲節而歌之曰有巋者堂髙明之居蔚蔚紆紆曲撩而交䟽惟徳之符㝠数懸應不爽乎錙銖繼有賡之者曰新居其遷茀禄其延族姓其聮演迤而芊緜扵是州邑之間咸稱事有前㝎澤民之遷居有不偶然者澤民囙取書中生生自庸之義用以名其堂嗚呼生生之義雖見扵書而莫備扵易易云生生之謂易夫隂之生陽陽之生隂生生相續變易而不窮澤民之居扵此他日子孫衆多甚欲有類扵易之言有類扵易之言則生生不息矣雖然非積善之家未足以致之然所謂善者何盡孝以事親竭忠以事君徳義以提身信愛以睦鄰仁惠以及民五者備矣方不愧名堂之義爵禄之来當未艾也駕部翁孫豈得專羙扵前㢤占者之云盖出扵機样小数而非君子之大道此勿論焉可也予老矣文辞卑陋不足應人之求人翻疑爲矯集其門者日益􅌭紛也卷軸之積動如束筍近亦力排而深絶之矣以澤民郷人也義不得辞聊相與一言之送刑部尚書李公新除浙江行省叅知政事序大丈夫生扵世也先貴乎立志志既立不加之以問學猶玉巵無當其質雖羙弗適扵用也問學既充不遘其時猶操瑟立齊王之門雖有其藝而三年不得入也時既逄矣苟處之閑曹冷局淹囬下僚猶瞻仰岱嶽之巍峩亦未易呌閶闔而呈琅玕也古之人固曰不可企及亦其全是数者然後能立事功而垂竹帛也歟晉康李公文彬噐度宏偉昻然負髙志愽習經史必期明體以逹諸用當是時無有尉薦之者浮沉府掾中日以澤物爲巳任㑹海内不静群盗磨牙吮血殺人如麻公集兵二萬人保障封川肇慶新昌徳慶四郡凡十五年强兵如九江劇盗如三山龍潭卒不能犯境莫府上其功雖累加以重爵公惟知恤民爲急而無所外慕由是薦紳之勝流岩穴之處士與夫枝藝百工商賈之屬咸驩然稱之曰活我子女全我室廬存我金繒者其惟我李公乎公猶欿然每以爲未足及天兵下廣東徳慶侯實緫戎事聞公之名遣使者聘起之既入見上署為中書斷事官遷大都督府持法平允聲譽翕然有聞㝷改小司冦未幾陞秋官又未幾上御外朝親擢爲浙江行中書參知政事中外莫不慕豔之夫以公之賢䏻遭四海雍熈之世上簡萬乗之知入司喉舌翔翶法從出鎮行垣儀刑州牧銀章艾綬蔚乎其光華画省長棘儼乎其雄邃足以行所志而不負其學矣大丈夫之際遇有如此者可不謂之榮乎抑予聞嶺南郡縣以百餘計而東廣爲㝡盛其出而仕者未甞無其人唯張文獻公暨余㐮公卓然清風振起百世公固廣産也中朝士大夫寕不以望二公者爲公望乎公之徃也推體用之學以施于民凶姦之未屏也我則鋤剗之仁化之未孚也我則宣布之人風之未淳也我則移易之民瘼之未瘳也我則蘇息之水利之未脩也我則平治之庶幾無負聖天子寵眷之深意它日良史氏必録公之勲業焜燿簡書較之二公未知其孰優孰劣此盖邦家之榮非一身之榮也公其朂㢤處州教授吳君妻丘氏孟貞墓銘孟貞出陽榖丘氏世爲名胄有諱某者能挽強命中夜樹火二百歩矢一發應弦火㓕元至元中從㐮愍公唆都帥師平宋辟爲征南元帥府奏差積勞行陣間例可得一官辭遂㽞居括蒼娶錢塘逯氏生一女即孟貞復以貞爲名始成童輒哭父佐諸兄奉毋盡孝以劉向列女傳自随指貞行者曰期無媿此可矣性恬静不樂侈靡粉黛綺紈之屬悉斥去唯節序稍一御焉同縣吴君世昌字伯京年始加布以明經領江浙行中書文觧閭右族争以女歸之不聽聞孟貞爲人乃委禽焉旣歸奉尊章和先後一周旋矩彠中無踰節者六親交譽之伯京女兄行有期冠服什噐或闕孟貞挈已所有者爲助尊章春秋髙内政悉孟貞所治同㸑三百指洪纎之費皆入念慮間不侈不陋咸安之伯京爲寕海校官孟貞侍姑徃而舅㽞于家寕海多鮭蛙之屬味頗甘脆孟貞先寄而後奉姑及殁哀傷骨立幾至滅性孟貞視巳子與群從中親之子同日聚家塾中執經諷咏羞服如一人不能辨其親踈至正丙申歲大儉斗米或至錢千道殣相望孟貞缩食以振族􅊚人尤以爲難壬寅兵洊起孟貞避地青田徙少㣲山中語及兵革毎驚怖巳而深入周阬林樾蓊茂目断無来人孟貞恒欝欝不樂矯首思西歸得疾不起至正甲辰七月十又五日也其年十一月二十四日奉柩旋葬南明山年五十七生二子長公願字從善今以字行次公顯孫男二維綸女四緑縁繒綉綉先卒孟貞質直無僞不妄言咲人有過甞怒詰之一旋踵間煦如陽春故傔媵亦無怨者晚唯喜讀易䔍扵教子懸燈而坐不至夜分不休伯京宋太常少卿安國之五世孫太常使金𬒳向七年而不變節還知袁州而終伯京以文學紹前人入我國朝擢處州府儒學教授孟貞葬後之八年當洪武辛亥從善應州郡辟舉以尚書試藝銓曹擢編脩翰林轉工部水部主事階承事卽從善久與予㳺乃以從弟朝列大夫知廣平府事公逹所爲状徵予銘嗚呼孟貞雖讀書予知不敵扵薦紳之家矣孟貞之制行反章章若此者其果何如㢤其果何如㢤銘曰繄夫人有令姿斥綺紈攻書詩匪空文行必随一周旋悉中規恊宗婣如春熈施則均忘其私才有爲内政治兵祲興西東馳心欝摇久弗舒竟觀化入扵機南明山靈氣滋體魄寕悶于斯魏賢毋宋夫人墓銘有序魏夫人宋氏諱秀英世爲蒲圻簪纓家父諱某别號俊齋毋某氏年及䈂歸同縣魏君雲瑞奉尊章盡道中外多之君姑卒擗踊哭泣幾欲無生絶酒肉弗御者三載其毋没亦如之此夫人䏻孝也魏君旅死齊安夫人瞻望弗及含泣遣冢子載柩還或曰屍渉江蛟龍必覆舟曷若焚骨而遵陸乎夫人曰焚屍之俗起羗胡亟夏無是也棄夫體烈熖中逆天孰甚焉弗聽㝷扶櫬歸或又曰櫬幸歸矣然不冝入内隂陽家謂犯大殺違之不祥夫人曰吾夫也使居于外魂無知則巳設有知䏻自安乎遽出擁入中堂朝夕哭奠毀瘠弗支此夫人知禮也里有龔甲客豪族周一家勢鴟張甚龔語周曰魏君死子絶㓜且懦家多良田園吾善效魏君書僞爲質劑示之無不得者周行其言夫人怒令冡子辨扵縣官久不直夫人檢魏君手書数通爲左驗周雖効魏君書終不近事因暴白此夫人有識也夫人寡居久家益向落恬然能自安甞立諸子扵庭誨之曰汝父巳逝獨老身之存内難未已而外侮又至一婦人撑支寕得幾何汝兄弟苦學宜甞熊膽丸分隂是競庻幾有成若逐牧猪奴嬉戯則予望孤矣諸子因惴惴自脩此夫人善教也夫人既老諸子卓然有立搆新廬以奉之含飴弄孫熈熈然自寕君子謂爲苦節之亨至正庚寅十又二月忽暈眩仆地巳而起曰吾将不久扵人世命舁棺至以水實之恐其有滲漏也又命懸衣衾扵楎椸有余悉分之親愛者除夕連飲椒觴談笑自如明日乃辛卯歲元旦夫人出坐堂上子姓親戚各爲夀畢欣然曰我明日将逝不復與爾軰獻酬矣爲我謝某嫗等各強食自愛至期沐浴更衣端坐如平時呼仲子謂曰吾年七十有六夀亦足矣雖死何憾語畢而逝其年十一月十五日權暦魏君墓左洊卜黄盖湖東之某山以洪武某年月日遷塟焉夫人之子三人孟季皆夭唯仲子觀顯任近自蘇州守擢參知四川行省政事㝷以蘇爲劇郡詔還舊職孫男曽孫男皆濟濟滿庭其名皆見濂所撰魏君墓銘兹不書濂聞死生之際最人之所難雖平日號知道者未免顛倒而錯繆如夫人者乃䏻炯炯不亂扵垂絶之時非其所飬之醉確所見之髙明得臻爾邪冝其著扵群行有大異扵人也嗚呼賢㢤濂也不敏與夫人之子觀㳺視夫人猶毋而又同出扵子姓墓文之属不扵濂是托将安之乎濓因采状中所列序而銘之銘曰伊夫人世簮纓秉純慤絶䮦矜奉尊章竭敬誠恊人紀則天經夫君亡涕泗零犯長江揭舟旌蛟龍避波濤平寘柩車奠两楹遏羣訛聳衆聽孰鴟張作梟鳴侵吾疆蝕我坰辨質劑白狂醒外難弭内教興丸熊膽稽开青成令㣧佐明廷享脩祐至髙齡齊物我一死生怱坐亡遽遺形伊夫人衆徳并勒貞石敡休聲題王羲之真跡後昔年危内翰大樸出示羲之野鳬帖且云别有喜色帖在江右出自丞相周益公家傳授次第一一有據須溪劉㑹孟平之謂如蘭亭裝鮓尤爲佳絶濂恨未見之近豫章人士来求墓文忽持此帖爲贄湏溪題識宛然居後因驚喜曰此殆大撲所言者徧示中朝善書者咸㝎為真跡無疑或取唐臨者比之神氣􅗥然不侔鄱陽劉彦炳最號精鍳法書曰閱此而不厭狂欲起舞真偽之辨固自有異㢤湏溪所書名中蔵三代人物字偽署者輙易别謾并及之千巖禪師語錄序徃予家居時甞謁千巖禪師扵烏傷伏龍山當是時遐邇學子望風犇凑曽未幾何化荒墟為楼觀易空寥為金碧鍾鼓之聲上徹霄漢嗚呼何其能也盖禪師以無䏻為能不用為用芳蘭生扵幽谷而馨香逺聞蒼璧韞扵玄璞而光輝外發禪師處扵遐壌而人競從之有道之士其果有異扵庸常者歟且禪師在時其弟子嗣詔甞録其語鍥梓以傳予當獲觀之其敷宣大法如雲雷迭興而九龍噴雨也如大醫王制藥随證而愈疾也如摩醯三眼光明洞照而無不至也由是知禪師之道不實不虚不有不無不中不邉在普應之門盖亦鏗然有聲者也以能以用窺禪師者抑亦末矣禪師旣入寂兵燹方張所謂語録者皆為煨燼經今十有餘年矣一庵鄰上人自㓜侍禪師與聞其道乃以舊本重刻不逺一千餘里来徴予序予謂禪師之道見扵言讀其言自可知其道又何以序文為然稽之古徳其語存于今者多名縉紳為題辭不若是固不是以表正宗之所寄第予也非人惡足為禪師之重䡖以禪師與予交也因不辤而為之書雖然禪師之道不落有無中邉虚實者固不可以語言文字求也欲求禪師之道其亦得魚兎而忘筌蹄者乎禪師行業予甞為撰塔上之銘兹不書上人方閱三藏諸經連年不自休今又孜孜而為是圖亦可謂不悖其師者也題慈受禪師遣墨後右慧林慈受禪師懐深遺墨三𥿄其一言布施其二言小智之樂小法其三言書不必聖人合道者從鑿鑿皆真實語有益後學盖禪師乃雲門之八世孫蔣山之第九祖真證實悟為人大師故其徳聲洋溢乎逺邇雖其身巳殁而靈驗尤為著顕字畫本非其㽞意者筆意圓熟動中規矩世之臨池苦心者或未能遽及誠可寳也金壇一萬中師甞分座說法扵蔣山因購獲之不翅見摩尼珠諷詠之久如聞禪師謦欬之音雖然中師尚勉行其言毋徒玩其遺墨而已也十八大阿羅漢賛東山禪師以所畫應真像求予賛予謂應真何待賛有賛則贅矣東山迫之甚因為說偈其詞曰惟諸應真度嶺渉海各騁神通作此戯劇騎魚駕黿乘蘆履鉢逰行自在眼不見水毒龍猛獸帖耳馴擾最可怖愕嘘氣成塔諸狡獪事不一而足我問應真大乗境界無物不攝物無㽞礙何故執著樂此小法應真漠然似不聞者我乃思惟諸應真像一一現前何不我答諦而視之乃畫師假悟吾一心如良畫師妍媸短長縦横圓方一濡毫間無所不有雖駭人目終非真實由是而觀萬物無實随聲逐色輾轉成妄觀此卷者碩空諸心心空法空必㝎見佛宋學士文集卷第十七銮坡集卷第七
