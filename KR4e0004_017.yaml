body:
  text: 恭題御製方竹記後皇帝視朝之暇燕處武樓中每召一二臣鄰咨詢治道時吏部尚書臣詹同在帝左右歷談古帝王事旁稽物理而偶及于竹帝曰竹之類其亦多乎臣同對曰其類實繁晉戴凱之所譜至五十餘種或根如盤輪或節若束針或細則勝箭或巨可為舟有未能歷舉者大槩其色皆青其體皆圓也唯吳越山中有名方竹者最為佹異四稜直上弗偏弗頗若有廉隅不可犯之色以故士大夫愛之往往采而為笻帝曰信有諸乎臣同復對曰老臣焉敢謬言既退獲一枝以獻帝摩挲觀之悅曰臣同其亦信人哉于是親御翰墨草方竹記一通始言品物之夥中序格致之難及其未也謂臣同為人俊聖製雖多未嘗輕以豫人臣同以文學侍從之臣簡在帝心者久故特𬒳是賜焉夫臣以誠而事上君以恩而逮下唐虞盛治一且復見三十餘年之後何其懿哉臣同冝勒諸金石與典謨訓誥之文並藏子孫之多永永傳之無極臣同受賜以洪武癸丑歲五月之戊辰越二十七日實六月乙未臣濂謹熏沐而題其後云臣濂拜手謹記大明故中順大夫禮部侍即曽公神道碑銘有序治古之時非惟道德純一而政教修明至于文學之彥亦精贍宏博足以為經濟之用蓋自童丱之始十四經之文畫以歲月期于默記又推之于遷固范曄諸書豈直覽之其默記亦如經基本既正而後遍觀歷代之史察其得失稽其異同會其綱紀知識益且至矣而又參于秦漢以來之子書古今撰㝎之集録探幽索微使無遁情于是道德性命之奧以至天文地理禮樂兵刑封建郊祀職官選舉學校財用貢賦户口征役之屬無所不詣其極或廟堂之上有所建議必旁引曲證以白其疑不翅指諸掌之易也自貢舉法行學者知以􅎥經擬題為志其所最切者唯四子一經之箋是鑽是窺餘則漫不加省與之交談兩目瞪然視舌本強不能對嗚呼一物不知儒者所恥孰謂如是之學其能有以濟世哉此濂銘亡友曽公之墓憤激于中而復繼之永慨也公諱魯字得之曽其氏也孔門弟子郕公五十七代孫其居新淦吉陽里者巳久世裔之傳與夫轉徙之詳昔以著于公之先墓兹不重載曾大父兼善宋贈大理評寺祖天麒宋宣教即軍器監主簿父順元韶州路儒學教授妣劉氏公年七歲能暗誦九經一字弗遺奉禮即蕳君正理欲以神童舉于朝其父力止之及齒稍長取三史日記之尋及其餘數千年間國體治亂人材忠佞制度沿革咸能言之有叩之者如山川出雲層見疊敷杳莫察其端倪公殊不以為足所藏子集動至數百家各攬其精而掇其華聞有僻書隱牒不憚道里之逺必購得之既得必篝燈讀之逹旦不寐發為辭章龎蔚炳朗毅然有不可奪之氣廬陵劉提舉嶽申與之語連日夜弗休嘆曰不意後生中能至于斯也其將以文鳴乎杜內翰鄉之丈人行也公負笈從之遊益充拓其所未寤至疑辨惑惟日不足遂以博極群書稱于時公猶謂未要于至道述長書一通謁虞文靖公集于臨川虞公大恱曰昔程子與張敬夫年十六七脫然有志聖賢之道于能如是復何讓古人公年蓋十九矣由是益潛心濂洛關閩之學分别義理密如蠶絲牛毛而尤愛吳文正公澄之書吳公亦居臨川其著書滿家無大無小公一一訪獲之玩繹未嘗釋手久之充然有得盤桓林泉以道自娛若將終身焉至正壬辰天下大亂州縣所在繹騷公召里諸豪集健兒持兵以保障乎一方仍椎牛釃酒開陳􅊇順禍福言甚剴切衆皆聳耳而聽卒無敢犯非義者人號曰君子鄉及入國朝有詔纂修元史勒成一代之典遣使者起公于家公贊決部居輔苴罅漏者不一而足其功為最多史成上坐端門召諸史臣有白金束帛之賜公居其首焉公將乞身還山會朝廷開局編類禮書輿論以老成之士無踰于公者共堅留之議禮之家有如聚訟自古難㝎于一公當群言沸騰之中掦言曰某禮宜據某書則是從某説則非有不服者爭相辨詰公厯舉傳記答之各心醉而去俄選入儀曹為祠部主事階承事即時洪武二年十二月也常忠武王薨髙麗王遣使來祭公索其文觀之使者靳不與公不可使者不得巳出之外則襲以金龍黃帕內則不書洪武之號公責之曰龍帕固疑誤用若納貢稱藩而不奉正朔君臣之義果安在耶使者頓首謝過皆命易去之乃巳安南來貢主客曹已受其表將入見公取其副覽之其王乃陳叔明公曰前王陳日熞爾今驟更名必有以也亟白尚書詰之使者不敢諱蓋日熞為叔明所逼而死遂篡其位中心懷􅘨故託修貢以覘朝廷之意上聞之曰島夷何狡徻如此却其貢不受五年二月上問丞相曰曽魯在禮部今何職耶對曰不過主事爾即日超六階拜中順大夫禮部侍即公以順字犯父諱辭就朝請下階吏部以國法有㝎不之許倭夷入寇戌將每捕獲之上憫其無知命儒臣草詔歸其俘公之所撰有中國一視同仁之語上恱曰頃觀陶凱文巳起人意今魯復如此文運庶其昌乎凱禮部尚書也八月奉旨考亰畿鄉試入院之後忽吐血一升公猶力疾閲卷不息自是遂奄奄不振九月膏露降鍾山群臣咸見諸咏歌公獨撰賦以進十月上將郊祀出宿齋宮命取諸作使侍臣更畨誦之至公獨曰此曽魯作耶援據既精鋪敘有法豈新進之可驟至哉十又一月疾逾篤上章乞骸骨甚至中書以聞上惻然許之十又二月辛卯歸舟至南昌公謂次子圭曰吾命止明日不能至家矣然吾以一介韋布之士受國寵恩位躋法從又得守正而斃死復何憾所憾者不見二孫之成立也即趣具觚翰為書戒之壬辰次石岐潭果斂栣而逝距家才兩驛爾丙申致故居丁酉始具棺斂擇地于縣南屏山之陽以六年某月某甲子祔葬九世祖高安府君之塋從治命也公蓄德熙和人近之者溫如春風不見忿戾之色然其人則山澤之癯身退然若不勝衣未嘗有所矯飾其處家也事親克孝父喪哀毁致疾踰年而後能起巳而二兄諸姪相繼捐館公抆淚經紀凶事三年間葬十餘喪且撫存其孤惸惟恐或失其所平生輕財伏義喜周人之急四方賔客日登其門公倒屣迎之了無倦容嘗一試江西鄉闈有司置諸乙榜人為不平而公亦淡如也其出仕也精白一心有知無不為凡典禮涉于制度者必經公損益而後㝎雖古者吏牘之繁簡署字之上下人所不能知公獨稽諸書以為決公誠所謂濟世之學者非邪公屬文不喜留稿其徒雖有所輯録猶未成書其自著書有六一居士集正訛南豐類稿辨誤藏于家他咸未脫稿當公修元史時濂實為揔裁及入南宮又有僚友之好故相知號為最深共坐官齋更析互辨每至夜分嘆末學之空虛傷古道之寥落又復相視辴然一笑嚴陵徐尊生嘗有言曰南京有博學之士二人一以舌為筆一以筆為舌其意蓋指公與濂嗚呼尊生過矣濂也何人而敢上儷于公哉雖然公未嘗欲棄濂也相期他日幸歸休必胥會焉共成一書庶可籍手以見前賢公今不可作矣故因銘墓之文而屢興懷于治古之時也世之讀者必將深感焉公讀書之室曰守約齋學者遂稱為守約先生享年五十四歲娶聶氏先二十年卒公再不納配一榻簫然如山林枯稿之士人難之子男二人長孰今來請銘者次即圭出為仲兄後女一人應真適劉奉孫二人正龍夢龍銘曰氣化紏纏人文昭宣萬類斯甄兮天沒地施一偶一竒形聲相資兮載籍􅌭紛六藝攸尊各闢其門兮枝分葉敷散為千塗混其精粗兮彌綸大邦文物采章有變有常兮不生碩儒孰軋其樞孰苞其腴兮玉笥之陽神珠吐芒莫自翳藏兮大明麗天束帛戔戔搜羅俊賢弓衮褒鉞誅寓于䇿書輿論所乎兮儀曹之升議禮稽經日維蒸蒸兮黼黻帝猷上窺殷周功在刪修兮所積之諶所發之深開陽闔隂兮正笏垂紳其色誾誾邦之老臣兮媚學蹮蹮其中枵然何翅霄淵兮天胡降喪一鑑之亡四國之傷兮其神上征化為列星寒光晶熒兮下射屏山馬鬛桓桓名在不刋兮故民匠提舉司知事許府君墓志銘濂在詞林時聞有衣冠之胄許其氏而進其名者宦遊于外不勝其思親之情春華之朝秋月之夕恆至于瞻望隕涕鄉友王內翰徵濂為辭以少慰其深衷後四年與進會南京進乃言曰昔者思吾父而不獲見吾父固無恙也而中心猶怦怦然今父則逝矣屢欲相從于泉臺恐乖以死傷生之訓輒苟存視息以迄干今然則何以自靖其心哉惟墓門有石可以鐫遺行而敡休聲夫子嘗厚我矣敢緣此故稽顙再拜以請願夫子終惠之謹按歐陽時中所為狀府君諱嗣宗字原仲姓許氏其先洛陽人有諱叔向者仕唐為某州刺史生安福令嶽胤值黃巢亂棄官歸袁之萍鄉萍鄉之有許氏自此始安福生二子曰宗曰載皆多孫子宋時以文學自奮為郡僚屬及縣令長者前後相望家牒燬干兵咸無所徴曽祖某祖季謙某年進士某官父斗祐府君生有異質嗜學弗倦取六經百氏晝夜探其精微已而嘆曰為學貴行不行而能言雖如簇錦將何施邪益竱心家政旁及樹藝之事久之資若産超于前人遂以事親訓子姓為務家西百餘步斸土為臺引清流繞之竒葩叢篁環列于左右檂英涼翠蓋鬱然云府君建聚景樓其間翼以衆芳俯清天心水面諸亭幽靜軒敞一塵弗侵府君奉板輿遊其中俾童冠者隨薦紳家嚅嚌群書孳孳弗之解稍有餘暇輒集賔朋雅歌投壼以自樂府君曰可則可矣苟不以禮自治何以示悠久乃稽諸子冠婚喪祭之禮肄習而行復擇並舍常稔之田五十畝焚其質劑永收其入以供四時祀事州里之間有凶喪單窶弗自支者且振而給之大司徒楚國歐陽文公當世大儒也義府君之為人結為交友嘗寄詩以寓其意至正𥘉當路薦為唐州等處民匠提舉司知事命書既下州人士具壷觴以為夀府君笑曰吾秋髮種種矣尚何情落宦轍哉辭弗赴壬辰之亂吳楚之兵日格鬪弗休唯萍鄉受禍最酷父子相枕籍而死鄉無完家府君能先事而避轉徙餘三十所一門能獨安存不異承平時及天下大㝎府君退隱雙清精舍林壑秀美目斷無來人府君拄頰看雲縹眇輪囷卷舒自如悠然有會心處則與高人勝士酣歌互答有不知夕陽之在樹也巳而遘微痾却藥不之御氣息奄奄猶力疾命諸子曰而等當以忠厚繼其家言訖而逝時洪武四年七月二十四日也壽年七十有七娶彭夫人生四男子庭蘭庭秀庭桂庭春庭蘭蚤世庭桂今更名進即濂所為賦思親辭者入國朝用上官薦擢廣信府知事階將仕即請寬賦以恤民修學以化俗人懷之孫男五人觀恂惠憧惺越三年一月十九日藏府君于縣之名教里三峯山下惟府君之讀書不眩其文而食其實故以之治家則大穰以之奉親則恱而愈以之勵子姓則飭以修以之辟地則能去危而就安何莫非推其所學也視彼膠固章句資為絺繪之辭以譁世者有間矣銘曰我經我舒我已食其腴我心之匪怍我將還其朴智以全其生禮以惇其薄有家之穰穰有聞之章章有子之鏘鏘維士也良而其行也又方采掇其英叶銘以昭其藏黃瑄字辭宣之為文上從而下從二從回乃取風回轉以宣通隂陽之義尋復借為布為緩為明為遍不一而之若加之以玉則又為瑄蓋玉則象形宣則諧聲也爾雅云璧入六寸謂之瑄漢代郊祀則有司奉瑄玉而瑄又通作宣然則瑄玉者亦玊中之最貴者歟先師黃文獻公之嫡孫名瑄濂因字之曰伯宣且朂之曰天地之間貴者為玉賤者為石石譬則小人玉譬則君子也爾瑄出自瓊瑶之林人固曰此玉也非石也玉則玉矣曷益之以礱琢之功乎不然則玉徒玉爾器云乎哉雖然器幸成矣復局滯于一而未能無施而不當也瑄乎瑄乎其用是而自朂乎嗚呼文獻公藏器于身出而薦諸郊廟非特器而已也有如辟羡起度凡諸玉之用規矩皆自其中出爾瑄慎勿愧之瑄乎瑄乎其用是而自朂乎濂老門人也故于瑄不敢褒而敢針系之以誦曰璧大為瑄孕諸石孚尹夜氣吐秋魄薦郊奠廟神鬼格其儀敻出犧與帛嫓義配名到幽賾爾性爾繕靡朝夕豫言服􅈾宜無斁天台顧氏先德碑顧氏之系出江左其後遷金華尋復由金華徙天台相傳以為顧歡之後歡梁之隱君子也故其地有顧儒嶺有歡溪然世逺宗堙莫能知其詳矣至宋南渡後有諱知言者字孚先通黃帝內經之學人有疾注藥起之無靳色會疫癘大興孚先裹良劑日巡户而與之鄉人感其賜有搏土肖像以為壽者以子貴纍贈宣教即生商卿周卿商卿字方子用薦者為鄉郡學官遂以明經講授從之者皆為純篤君子出言制行能使人慕豔不置閥閲家綦氏伯仲爭以門資敘爵幾至破家方子片言喻之輒頓首謝過以官讓其兄周卿字成子擢嘉㝎癸未進士苐官至朝奉即奉國軍簽判𥘉娶貴族施氏石樓縣令碩乃件繫之請豫為之記嗚呼世之求文者奚翅數百罔不欲譽已之善而于其先德則未嘗少留意焉碩乃能一反其所為得非知識度越于人哉因不欲辭而書以遺之使碩之後人庶幾有所徴焉奉議大夫國子司業金華宋濂撰臧士幾字辭臧君哲字曰丈濬密人也以儀曹屬時詔為司隸然其為人秀頴而嗜學賢士大夫愛之頗謂其名若字皆盛德事殊非所以自稱盍更之君來請于豫豫􅎥程子哲人之幾之義字曰士幾幾者善惡之發榮辱之主也可不慎歟慎之如何曰誠而已矣作字辭辭曰心神變化乘氣機弩牙既幹鈞石隨或黑或白乃異岐君子防之樹城陴嚴以金鼓列旌旗百體從令志則熙尚慎旃哉無殆而西域浦氏㝎姓碑文起居注浦君與豫為同朝友自序其世系及㝎姓之因請豫文以勒諸碑豫讀已嘆曰是不亦君子之道歟浦君西城阿魯溫人髙祖以上忘其名曽祖哲立理元太祖時遷幽之宛平生中順大夫同知溫州路捴管府事道吾道吾字善𥘉因宦于抗復居錢塘拱衛鄉生六子曰沙的曰黑黑曰福州録事司逹魯花赤泰住丁曰六十曰刺哲曰馬思護黑黑生二子曰江浙行省宣使羅里曰賽魯丁六十生一子曰木八刺贅于女氏復遷于永嘉能務廢舉之術家饒于資刺哲生三子曰道刺沙曰溥博即浦君其字為仲淵曰欣都馬思護生三子曰哈山唯是再世多已物故唯木八刺父子及浦君存浦君性頴悟父與其毋聶夫人訓之尤篤去從名師傳通詩毛氏箋而折衷以朱吕之傳發為文辭其光燁然也中至正壬寅江浙鄉闈一榜辟教諭德清轉嘉興遂占籍嘉興卜魏車為氏者雖更僕有所不能盡此無他于里無所悖于事有所據先王制禮亦未嘗不與之也今浦君之為上符古義下合時冝非卓見絶識不得與于此彼拘拘守常之士則曰我先祖未之能行也是惡足以論變通之故嗚呼若浦君者不亦君子之道歟豫既詳論㝎姓之因而并述其世系相傳次第使刻焉初中順公南征有功授武略將軍大都都鎮撫前至元末論事忤丞相出為衢州判官已而換文資任杭州治中階奉訓大夫民皆安其政後以前官致其事卒葬杭城靈芝寺左聚景園中而刺哲君祔焉刺哲君後遷方家谷陳寺山之陽浦君以圖譜久喪唯恐其事泯泯請附書于末使後裔有所考云生生堂記生生堂者東陽陳澤氏之所居也縣南八十里有鄉名瑞山陳氏世家其中至諱宗譽字彥聲者有德于鄉又能與六務觀父子遊而其諸孫黼東萊吕成公第子擢淳熙􅉝丑進士第纍官駕部即中林正惠公實以女妻之澤民蓋其十世從孫也澤民思繼承家學出從名師巨儒遊精于科目之業有司貢上選曹試經義合格署通判于漳州將上以堂記屬豫豫頗聞縣之仁壽鄉在東北四十里而近有簮纓家亦與澤民同姓而譜諜不通非其族也嘗搆宅一區方建前楹有鳩鳴其上占之者云此宅當屬之張氏後六十年復歸于陳未幾西鄰張氏果來居之張既不振人士皆謂復還于始搆之家不知乃澤民竟以重資獲之也僂指計之誠甲子一周矣噫亦異哉澤民遂筮日自瑞山而遷當春氣煦明卉木含榮有嚶其鳴澤民刲羊刺豕具尊爼合賔􅊚而燕樂之酒微酣坐客擊案為節而歌之曰有巋者堂髙明之居蔚蔚紆紆曲撩而交疏惟德之符冥數懸應不爽乎錙銖繼有賡之者曰新居其遷茀祿其延族姓其聮演迤而芊綿于是州邑之間咸稱事有前㝎澤民之遷居有不偶然者澤民因取書中生生自庸之義用以名其堂嗚呼生生之義雖見于書而莫備于易易云生生之謂易夫隂之生陽陽之生隂生生相續變易而不窮澤民之居于此他日子孫衆多甚欲有類于易之言有類于易之言則生生不息矣雖然非積善之家未足以致之然所謂善者何盡孝以事親竭忠以事君德義以提身信愛以睦鄰仁惠以及民五者備矣方不愧名堂之義爵祿之來當未艾也駕部翁孫豈得專美于前哉占者之云蓋出于機樣小數而非君子之大道此勿論焉可也豫老矣文辭卑陋不足應人之求人翻疑為矯集其門者日益􅌭紛也卷軸之積動如束筍近亦力排而深絶之矣以澤民鄉人也義不得辭聊相與一言之送刑部尚書李公新除浙江行省參知政事序大丈夫生于世也先貴乎立志志既立不加之以問學猶玉巵無當其質雖美弗適于用也問學既充不遘其時猶操瑟立齊王之門雖有其藝而三年不得入也時既逄矣苟處之間曹冷局淹回下僚猶瞻仰岱嶽之巍峩亦未易呌閶闔而呈琅玕也古之人固曰不可企及亦其全是數者然後能立事功而垂竹帛也歟晉康李公文彬器度宏偉昻然負髙志博習經史必期明體以逹諸用當是時無有尉薦之者浮沉府掾中日以澤物為巳任會海內不靜群盜磨牙吮血殺人如麻公集兵二萬人保障封川肇慶新昌德慶四郡凡十五年強兵如九江劇盜如三山龍潭卒不能犯境莫府上其功雖纍加以重爵公惟知恤民為急而無所外慕由是薦紳之勝流岩穴之處士與夫枝藝百工商賈之屬咸歡然稱之曰活我子女全我室廬存我金繒者其惟我李公乎公猶欿然每以為未足及天兵下廣東德慶侯實總戎事聞公之名遣使者聘起之既入見上署為中書斷事官遷大都督府持法平允聲譽翕然有聞尋改小司冦未幾升秋官又未幾上御外朝親擢為浙江行中書參知政事中外莫不慕豔之夫以公之賢能遭四海雍熙之世上簡萬乘之知入司喉舌翔翶法從出鎮行垣儀刑州牧銀章艾綬蔚乎其光華畫省長棘儼乎其雄邃足以行所志而不負其學矣大丈夫之際遇有如此者可不謂之榮乎抑豫聞嶺南郡縣以百餘計而東廣為最盛其出而仕者未嘗無其人唯張文獻公暨余襄公卓然清風振起百世公固廣産也中朝士大夫寧不以望二公者為公望乎公之往也推體用之學以施于民凶姦之未屏也我則鋤剗之仁化之未孚也我則宣布之人風之未淳也我則移易之民瘼之未瘳也我則蘇息之水利之未修也我則平治之庶幾無負聖天子寵眷之深意它日良史氏必録公之勳業焜耀簡書較之二公未知其孰優孰劣此蓋邦家之榮非一身之榮也公其朂哉處州教授吳君妻丘氏孟貞墓銘孟貞出陽榖丘氏世為名胄有諱某者能挽強命中夜樹火二百步矢一發應弦火滅元至元中從襄愍公唆都帥師平宋辟為征南元帥府奏差積勞行陳間例可得一官辭遂留居括蒼娶錢塘逯氏生一女即孟貞復以貞為名始成童輒哭父佐諸兄奉毋盡孝以劉向列女傳自隨指貞行者曰期無愧此可矣性恬靜不樂侈靡粉黛綺紈之屬悉斥去唯節序稍一御焉同縣吳君世昌字伯京年始加布以明經領江浙行中書文解閭右族爭以女歸之不聽聞孟貞為人乃委禽焉既歸奉尊章和先後一周旋矩彠中無踰節者六親交譽之伯京女兄行有期冠服什器或闕孟貞挈已所有者為助尊章春秋髙內政悉孟貞所治同㸑三百指洪纎之費皆入念慮間不侈不陋咸安之伯京為寧海校官孟貞侍姑往而舅留于家寧海多鮭蛙之屬味頗甘脆孟貞先寄而後奉姑及殁哀傷骨立幾至滅性孟貞視巳子與群從中親之子同日聚家孰中執經諷咏羞服如一人不能辨其親踈至正丙申歲大儉斗米或至錢千道殣相望孟貞縮食以振族􅊚人尤以為難壬寅兵洊起孟貞避地青田徙少微山中語及兵革每驚怖巳而深入周坑林樾蓊茂目斷無來人孟貞恆鬱鬱不樂矯首思西歸得疾不起至正甲辰七月十又五日也其年十一月二十四日奉柩旋葬南明山年五十七生二子長公願字從善今以字行次公顯孫男二維綸女四緑緣繒繡繡先卒孟貞質直無偽不妄言笑人有過嘗怒詰之一旋踵間煦如陽春故傔媵亦無怨者晚唯喜讀易篤于教子懸燈而坐不至夜分不休伯京宋太常少卿安國之五世孫太常使金𬒳向七年而不變節還知袁州而終伯京以文學紹前人入我國朝擢處州府儒學教授孟貞葬後之八年當洪武辛亥從善應州郡辟舉以尚書試藝銓曹擢編修翰林轉工部水部主事階承事即從善久與豫遊乃以從弟朝列大夫知廣平府事公逹所為狀徵豫銘嗚呼孟貞雖讀書豫知不敵于薦紳之家矣孟貞之制行反章章若此者其果何如哉其果何如哉銘曰繄夫人有令姿斥綺紈攻書詩匪空文行必隨一周旋悉中規協宗姻如春熙施則均忘其私才有為內政治兵祲興西東馳心鬱搖久弗舒竟觀化入于機南明山靈氣滋體魄寧悶于斯魏賢毋宋夫人墓銘有序魏夫人宋氏諱秀英世為蒲圻簪纓家父諱某别號俊齋毋某氏年及笄歸同縣魏君雲瑞奉尊章盡道中外多之君姑卒劈踊哭泣幾欲無生絶酒肉弗御者三載其毋沒亦如之此夫人能孝也魏君旅死齊安夫人瞻望弗及含泣遣冢子載柩還或曰尸涉江蛟龍必覆舟曷若焚骨而遵陸乎夫人曰焚尸之俗起羌胡亟夏無是也棄夫體烈熖中逆天孰甚焉弗聽尋扶櫬歸或又曰櫬幸歸矣然不冝入內隂陽家謂犯大殺違之不祥夫人曰吾夫也使居于外魂無知則巳設有知能自安乎遽出擁入中堂朝夕哭奠毀瘠弗支此夫人知禮也里有龔甲客豪族周一家勢鴟張甚龔語周曰魏君死子絶幼且懦家多良田園吾善效魏君書偽為質劑示之無不得者周行其言夫人怒令冡子辨于縣官久不直夫人檢魏君手書數通為左驗周雖效魏君書終不近事因暴白此夫人有識也夫人寡居久家益向落恬然能自安嘗立諸子于庭誨之曰汝父巳逝獨老身之存內難未已而外侮又至一婦人撑支寧得幾何汝兄弟苦學宜嘗熊膽丸分隂是競庶幾有成若逐牧豬奴嬉戲則豫望孤矣諸子因惴惴自修此夫人善教也夫人既老諸子卓然有立搆新廬以奉之含飴弄孫熙熙然自寧君子謂為苦節之亨至正庚寅十又二月忽暈眩仆地巳而起曰吾將不久于人世命舁棺至以水實之恐其有滲漏也又命懸衣衾于楎椸有余悉分之親愛者除夕連飲椒觴談笑自如明日乃辛卯歲元旦夫人出坐堂上子姓親戚各為夀畢欣然曰我明日將逝不復與爾輩獻酬矣為我謝某嫗等各強食自愛至期沐浴更衣端坐如平時呼仲子謂曰吾年七十有六夀亦足矣雖死何憾語畢而逝其年十一月十五日權曆魏君墓左洊卜黃蓋湖東之某山以洪武某年月日遷葬焉夫人之子三人孟季皆夭唯仲子觀顯任近自蘇州守擢參知四川行省政事尋以蘇為劇郡詔還舊職孫男曽孫男皆濟濟滿庭其名皆見濂所撰魏君墓銘兹不書濂聞死生之際最人之所難雖平日號知道者未免顛倒而錯繆如夫人者乃能炯炯不亂于垂絶之時非其所飬之醉確所見之髙明得臻爾邪冝其著于群行有大異于人也嗚呼賢哉濂也不敏與夫人之子觀遊視夫人猶毋而又同出于子姓墓文之屬不于濂是托將安之乎濓因采狀中所列序而銘之銘曰伊夫人世簮纓秉純慤絶驕矜奉尊章竭敬誠協人紀則天經夫君亡涕泗零犯長江揭舟旌蛟龍避波濤平置柩車奠兩楹遏羣訛聳衆聽孰鴟張作梟鳴侵吾疆蝕我坰辨質劑白狂醒外難弭內教興丸熊膽稽开青成令㣧佐明廷享修祐至髙齡齊物我一死生匆坐亡遽遺形伊夫人衆德并勒貞石敡休聲題王羲之真迹後昔年危內翰大朴出示羲之野鳬帖且云别有喜色帖在江右出自丞相周益公家傳授次第一一有據須溪劉會孟平之謂如蘭亭裝鮓尤為佳絶濂恨未見之近豫章人士來求墓文忽持此帖為贄須溪題識宛然居後因驚喜曰此殆大撲所言者遍示中朝善書者咸㝎為真迹無疑或取唐臨者比之神氣􅗥然不侔鄱陽劉彥炳最號精鑒法書曰閲此而不厭狂欲起舞真偽之辨固自有異哉須溪所書名中藏三代人物字偽署者輒易别謾并及之千巖禪師語録序往豫家居時嘗謁千巖禪師于烏傷伏龍山當是時遐邇學子望風奔湊曽未幾何化荒墟為樓觀易空寥為金碧鍾鼓之聲上徹霄漢嗚呼何其能也蓋禪師以無能為能不用為用芳蘭生于幽谷而馨香逺聞蒼璧韞于玄璞而光輝外發禪師處于遐壤而人競從之有道之士其果有異于庸常者歟且禪師在時其弟子嗣詔嘗録其語鍥梓以傳豫當獲觀之其敷宣大法如雲雷迭興而九龍噴雨也如大醫王制藥隨證而愈疾也如摩醯三眼光明洞照而無不至也由是知禪師之道不實不虛不有不無不中不邉在普應之門蓋亦鏗然有聲者也以能以用窺禪師者抑亦末矣禪師既入寂兵燹方張所謂語録者皆為煨燼經今十有餘年矣一庵鄰上人自幼侍禪師與聞其道乃以舊本重刻不逺一千餘里來徴豫序豫謂禪師之道見于言讀其言自可知其道又何以序文為然稽之古德其語存于今者多名縉紳為題辭不若是固不是以表正宗之所寄第豫也非人惡足為禪師之重輕以禪師與豫交也因不辭而為之書雖然禪師之道不落有無中邉虛實者固不可以語言文字求也欲求禪師之道其亦得魚兔而忘筌蹄者乎禪師行業豫嘗為撰塔上之銘兹不書上人方閲三藏諸經連年不自休今又孜孜而為是圖亦可謂不悖其師者也題慈受禪師遣墨後右慧林慈受禪師懷深遺墨三𥿄其一言布施其二言小智之樂小法其三言書不必聖人合道者從鑿鑿皆真實語有益後學蓋禪師乃雲門之八世孫蔣山之第九祖真證實悟為人大師故其德聲洋溢乎逺邇雖其身巳殁而靈驗尤為著顯字畫本非其留意者筆意圓熟動中規矩世之臨池苦心者或未能遽及誠可寶也金壇一萬中師嘗分座説法于蔣山因購獲之不翅見摩尼珠諷詠之久如聞禪師謦咳之音雖然中師尚勉行其言毋徒玩其遺墨而已也十八大阿羅漢贊東山禪師以所畫應真像求豫贊豫謂應真何待贊有贊則贅矣東山迫之甚因為説偈其詞曰惟諸應真度嶺涉海各騁神通作此戲劇騎魚駕黿乘蘆履鉢逰行自在眼不見水毒龍猛獸帖耳馴擾最可怖愕噓氣成塔諸狡獪事不一而足我問應真大乘境界無物不攝物無留礙何故執著樂此小法應真漠然似不聞者我乃思惟諸應真像一一現前何不我答諦而視之乃畫師假悟吾一心如良畫師妍媸短長縱橫圓方一濡毫間無所不有雖駭人目終非真實由是而觀萬物無實隨聲逐色輾轉成妄觀此卷者碩空諸心心空法空必㝎見佛宋學士文集卷第十七鑾坡集卷第七
