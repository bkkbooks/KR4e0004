front:
  text: 宋學士文集序翰林學士金華宋公景濂自少以文雄一時人不逺數千里求之殆徧扵中國四夷矣其居家所作者曰潜溪集其在朝所作者曰翰苑集潜溪集凡若干卷故翰林承旨歐陽文公爲之序而翰苑集復萃記序碑銘表傳雜說釐爲前後續别四集云余甞讀而好之浩乎莫窮其所至乃撫卷而歎曰文章經國之要也豈直一藝而巳㢤而與時升降其變不一在唐則宗昌黎韓子在宋則宗廬陵歐陽子韓子之文祖扵孟子而歐陽子之文又祖扵韓子皆所謂傑出扵千百者也在元則宗蜀虞文靖公金華黄文獻公亦若韓子之在唐歐陽子之在宋矣然文靖公之放言極論縱横無窮其氣𦦨莫敢迫而獻文公之不失凖繩卑不可隆而髙不可抑也公起而繼之自五經子史靡不通䆒其造理也精其攷事也愽故發之扵文章悉鏟近習之陋學者復翕然宗之國朝龍興遂以布衣登侍從之選歴十餘年凡奉詔撰述莫不曲盡其體勒之金石播諸筦絃寔與虞黄二公相後先巳雖然虞黄二公属重熈累洽所以黼黻一代之盛者爲易今國家文運方興之時将昭武功而宣文徳以新四方之觀聽使知大明之超軼三五豈不爲難乎大抵先秦兩漢以來聖人之經汨扵諸子道固晦而未明也故各騁異同之說以誇耀一世恒病其駁而不純及宋周程朱子大發其閟是非邪正奚趐黑白之形而後之立言者由是求合於道亦旣無弊矣又惜蓄之無源而徒剽竊陳腐皮離蔓衍之爲工孰知其去古益逺而益抗不亦悲夫嗚呼公之文可謂至純矣正聲勁氣充塞宇宙星辰河漢山川草木風雨雷電鬼神變化龍跳虎躍雖極瑰詭竒絶之觀惡足以喻耶昔公之揔脩元史也余獲預編纂之列熟其議論觀其儀矩非一日矣故知公爲深而推公爲重輙爲之說如此尚俟知言者於後而非謏其所好云洪武八年歲在乙卯冬十有一月既望將佐仕郎國子助教檇李貝瓊序宋學士文集目録朝京槀目録卷第一
