body:
  text: 新刻楞伽經序洪武十年秋九月丙子朔濂朝京師冬十有月丙申入辭將還山時皇上御武樓下顧濂言曰卿言楞伽為逹摩氏印心之經朕取而閲之信然人至難持者心也觸物而動淵淪天飛隨念而遷凝氷焦火經言操存制伏之道實與儒家言不異使諸侯卿大夫人咸知此縱未能上齊佛智其禁邪思絶貪欲豈不胥為賢人君子之歸濂謹對曰誠如聖諭第其文學簡古義趣淵微宋臣蘇軾頗嘗患其難讀耳上曰此書生纏蔽文義之過也朕于宮中略覽數過已悉領其大㫖即勑奉御取經示濂且默誦曰如佛語心品第一卷所言諸識有二種生謂流注生及相生有二種往謂流注及相住有二種滅謂流注滅及相滅此三相者最為微隱唯佛能䆒言之第四卷所言自心妄想非性智慧觀察不墮二邉先身轉勝而不可壞得自覺聖趣是般若波羅蜜此言六度萬行互相融攝成菩提分皆由般若成立尤為深切若般若心經若金剛般若經皆心學所繫不可不講習也言己上復口解心經數章睿識神見皆超出乎常倫於是賜食禁中而退又明日戊戌考功監臣某奉㫖于大天界寺俾天下諸浮屠咸讀三經命既下育王禪師崇𥙿靈承德意孶孶如弗及且以二經世已盛行獨楞伽見者殊寡乃購求雷庵受公集注鏤版而行之徴濂為其題辭惟我釋迦如來五時說法而此楞伽寶與維摩思益楞嚴三昧金光明勝鬘等經皆在第三方等時所說疏經之家謂以楞伽為名實相為體佛語心為宗自覺聖智為用經凡一百五十一品兹所存者特其一爾其言幽眇精深誠為攝心樞要之書也欽惟皇上以生知之聖一觀輒悟詔天下諸浮屠是習是講將使真乘之教與王化並行治心繕性逺惡而趨善斯心也即如來拯度羣生之心也何其盛哉禪師敬恭明詔罔敢逮遑日以流通為務亦可謂之賢矣為沙門之學者宜受而持之庶幾上報寵恩而不負靈山之付囑濂故備著天語之祥于篇首使讀者各有所警發焉十一年春三月約之禪師畫像贊龎蔚之姿宏辨之才一衲三十年脅不沾席談玄八萬偈舌若驚雷崖樹重榮兆法門之復振塔光呈瑞疑古佛之再來炯炯乎眼光閃鑠沉沉乎氣宇弘恢渢渢乎九江風動澄澄乎玉几天開蓋真超于實際斯不染于纎埃彼自安于部婁曽莫陟其崔嵬倘于斯而觀感庶立懦而興頽故新昌楊府君墓銘越之新昌有大山曰彩烟與沃洲天姥鄰而彩烟尤為峻絶逺望之如雲霞繽紛天際故名山之絶頂其平如掌沃野數千里桑麻蔚若犬雞之聲相聞或者嫓之武陵源云大姓楊氏自隋末來居之閲數百年而書詩之澤有引弗替在宋之時父子兄弟至連舉于有司而嘉泰壬戌進士轟其仕為尤顯官終朝奉大夫知廣德軍州事贈奉直大夫廣德之從子佑祖亦由太學舉進士為婺之浦江丞浦江生旵旵生禔禔生府君諱居字溫如生三月而其母梁氏亡父命乳母鞠之性頴悟八歲能賦詩及長聞天台于先生子惠傳伊洛性理之學執經而受其說久之融通諸家言而貫以一致神暢心怡實欲起古人千載之上與之晤語既又以為言之不文不能以行逺復從同郡韓莊莭公遊取文章大家曰研摩之其于分章遣辭之法辨其類不類尤嚴其界域時先師黃文獻公以文名當代府君撰長書贄見之公讀已噴噴賞愛更揭諸座右賔至則指以示之曰是豈非文耶公為人極慎許可其器重之若此府君嘗以春秋學應書鄉闈不利遂掩關不出下惟而講授四方學子趨之者如雲府君曰據髙座隨其性資而開導之如蒙大霧而行不自知其沾濡之至學成而去多著名于時人問之則曰我楊先生弟子也恩義隆洽不敢更名他師府君性至孝父有疾晝侍左右夜不敢解衣寢臨穴之日號絶于地良久而蘇歲時祭祀必預齊戒眠滌灌盛服拜跽儼如祖考之在乎上瞻塋有田為豪民所據府君帥宗人白于官復之仍創庵廬以居守者府君介而通莊而能溫未嘗妄言笑一動一靜皆可為式程善古文辭尤長于詩騷亦有愛齊稿若干卷藏于家府君出處之際唯道之從視不義富貴真若浮雲臨財尤廉路拾遺金俟其主還之里有喪及飢餓者恆周之學者方自以為得師年六十六不幸以洪武九年丙辰冬十一月二十九日卒家明年丁已春三月十九日窆于金山之原在家西四里而近娶同邑趙氏生男子四長宗學先卒次須學去為浮屠更為𣑽噩有聲叢林間次願學繼父之業次學女子一歸士族盛必勝孫男一自牧女一尚幼豫聞之文者將以載道道與文非二致也自夫世教衰民失其正髙談性命者每鄙辭章為陋習拘泥辭章者輒斥性命為空言互相譏詘莫克有㝎殊不知道與文猶形影然有形斯有影其可岐而二之乎是可嘆也已府君以超卓之姿窮理攻文孜孜弗之倦務欲合而一之亦可謂知道者矣銘曰大道流行日用昭宣非文載之道孰與傳安可岐之徇于一遍迂夫曲士牢執弗遷擲埴索涂何住不顛有倬夫子式窺其全以彼校此孰為愚賢鐫石幽墟過者察焉望雲圖詩序思親望雲圖者為福建承宣布政司右參政唐公作也公名俊字士明念親之不見日遑遑焉而求昧昧焉而思終無以宣其情圖之所以志之也間以書致辭于濂曰俊之先為睢陽人金季兵亂大父避地南陽遂家焉大父生三男子而先君居其二先君諱德謙蔚為才行之士元至止中汝頴大盜起先君棄損諸孤窀穸之事甫畢而南陽陷矣俊時在童孺函隨母夫人陳氏出避晝伏霄行至魯山匿焉未幾魯山又𤇺火連天竟失母夫人所在家屬亦東西作風雨散去俊㷀㷀無依朝夕嗚嗚泣曰哀哉吾母其存乎亡乎苟亡矣遺骸將何人瘞之乎然河南逹鄊里為近吾當忍死往而訪之乎于是間關是走河南竄身兵籍中逄故時父老問之自南陽來者又問之有出入軍中者又問之如是者六年心勦形瘵竟莫可蹤跡復鳴鳴泣曰哀哉吾毋豈果遂亡矣乎毋既不可見何如勿生之為愈乎巳而私自念宗系之不絶者一線爾苟先朝露而自棄祀事將墜幾不為若敖氏之餒鬼乎宜擇真主而事之一且獲見天日雖不得奉母歲時持一杯酒走酹墳上土比之徒死不翅霄淵之殊此志或可自遂乎當是時大明皇帝㝎鼎金陵德綏威讋萬方嚮化俊乃閒道內附期厠名行伍中以苟全性命而己宸衷見憐視之如舊臣賜以厚祿寵以名爵使再造其家室自兵馬副指揮入轉而至今官階躋二品此平昔夢寐之所不到俊每念聖德如天無際而父母不得同與恩榮益至感泣不能自已頗憶先君言堪輿家謂大父墓最佳中支當有躋膴仕者母撫俊頂言曰他日將在吾兒邪今其言固驗非惟父母不之見而族屬無一人存者不亦悲夫願吾子為文之將示諸子孫以志吾無窮之思也濂讀之不覺潸然出涕嗚呼有是哉人之壯年有大父母父母俱存而號重慶者矣下此則父與母無故而號具慶者矣又下此則二親或有一存而稱偏侍者矣公自幼齡輒喪先府君當干戈搶攘之際而毋夫人隔絶又死生不可知宜公雙淚既盡而繼之以血也雖然公無用爾也古之人所謂孝也非止得養親而巳身者親之枝親雖忘而身存猶親之存也能敬其身是謂不死其親言也弗爽于貞行也允契于軌內外一致而無所違越非孝乎撫世酬物而一本于誠匑匑然謹畏唯恐失之行之于家推之于國逹之于天下皆弗悖于道也庸非孝乎出鎮名藩承宣敷化使萬姓咸蒙正治之澤家給而人足皥皥熙熙如唐虞時庸非孝乎三者雖皆敬身之事此又移孝為忠之大者公䏻行之他日良史氏必大書曰唐某之子俊其治行如古名臣可為法于後世則公之親亘萬世而不死矣公之為孝也不亦大哉濂知公為人誠慤而廉介其拜御史持部使者節三預北平省事皆以美政著稱故濡毫而縷言之一以釋公之憂一以進公於道云義烏方府君墓志銘府君諱天瑞字景雲姓方氏宋元豐間有諱沉者自嚴陵白雲原徙居義烏之稠嚴今九世矣當五世時又有諱應龍者登嘉定癸未進士第官終大冶丞其族望嘗顯矣府君曽祖諱淵祖諱菘之父諱汝霖母喻氏紹興丁丑進士工部郎中喻公良能五世孫也府君六歲時與羣兒戲于池濵一兒俯身攀藕花忽墮水中羣兒皆驚奔府君急執其足揚聲大呼人聞而耒抱兒還其父逮長讀書窮㫖趣孳孳弗少懈其父以食指之繁故廬迫隘不足以容别買宅一區于三里外命府君居之府君昏㝎辰省雖大暑寒不廢父母憐其勤力止之府君跪對曰子職當如是不為勞也府君之配曰朱氏承直郎廣德路總𬋩府經歷諱約之女也府君相敬如賔終其身無片言乖戾或者嫓之梁伯鸞朱殁府君一念之輒垂涕與人交重然諾一旦暴風疾雨府君擔簦躡屫倉皇欲就塗家人謂曰非有至急之故何遽往也府君笑曰吾與人期不欲爽信耳其遇宗族內外􅊚多煦煦有恩意有稱貸者或不能償置不問府君長身鶴立美鬚髯樂賔友過從當酒酣耳熱髙談雄辨驚動四筵徐而察之皆根據經史出人思慮之所不到時論多之府君有兄二人孟曰天與字景賢仲曰天錫字景範景賢博通書傳善滑稽士無賢不肖皆樂與遊尤精黃帝內經之學有疾者恆依之景範淵深而簡默遇勝友論詩輒抵掌劇辨衮衮如泉源發不見其窮府君固難為弟矣亦復翹然與之抗衡非聰明絶倫不能也府君年七十九疾病頗侵凌知其不可治乃絶醫賦詩一章示子孫大意以為吾讀孔氏書死生終始之說粗若知之萬事悠悠當同一夢彼浮屠氏所謂天堂地獄不過托是化為善而已吾家素絶之不必用也今死矣與明月清風浮遊於天地間耳尚何道哉書畢而終實洪武九年十一月二十一日也府君生平嗜呤有詩集二卷藏于家妻即朱氏無子而先卒鞠景賢次子樵為嗣既而少房馬氏生子男子二人曰士龍曰士信子女子一人曰丑姬徴事郎中書舍人宋璲其壻也孫男二人某某以某年月日葬某山之原𥘉豫與府君二兄交甚洽繼識府君于白麟溪上府君方為女擇配豫兒璲始九歲操觚作蠅頭細字謄于所造文辭府君心恱遂成婚􅊚家府君當有疾時璲將來南京省余往謁府君道别府君執璲辟言曰汝尊公當代文士第一流吾旦暮死不復與子相見願為求墓上之銘足矣璲泣而别未幾果以訃聞豫亦為泣下霑襟今豫致政還家府君從孫衡備書其事行士龍持以來請豫惡得不為之銘銘曰稠巖陽三鳯翔一鳯後逝雲為鄉梧桐菶菶空髙岡緬懷德輝人可忘朱氏家慶圖記浦陽江上有朱仲賢氏年垂七十而其夀母尤夫人則歷九十二春秋矣猶康寧飲啖如恆人當候序和適夀母出坐鞠隱堂中仲賢率家屬分立左右稱觴為歡州里觀者奠不徘徊歎慕縣校官張君正卿獨曰是亦希有事也不可以不識命畫史作家慶圖裝裭成卷持示金華宋濂指曰鶴髮垂領神色恬康危坐榻上者夀母也其右方帶襞積冠張拱前趨而角巾三人從子男子也五冠者與一童子列其後者孫也二兒挾册徐行自語顧語者曽孫也其左方盛服而參差立者四子婦也三兒二大一小大者携小者行手中執鞠花者曽孫女也重立于右上二抱嬰孩一獻桃一捧茗甌者四孫之配也一俯倚榻上一牽夀母衣一熙然侍立其側者三孫女也指畢合而計之凡二十又八人且曰先生史官也其言信于海內願為序而傳之嗟夫夀之為言久也最人之所不可得也然亦有得焉而㷀然索居者非夀也又有得焉而謀不及朝夕者非夀也又有得焉而左右不能孝且養者非夀也又有得焉而體尫氣羸十日九疾者非夀也又有得焉而禍患迭嬰中心靡寧者非夀也今夀母享此髙年尊安無疾孫子秩秩皆䏻盡養家道豐𥙿心志怡愈是無五者之失而有其足之樂矣得不為希有之事乎正卿之為是舉冝也非過也且昔人之所至願一則曰夀二則曰夀非惟欲乎已又且祝于人豈不以夀出乎天而非人之所䏻乎設或有之誠可歌也已吾婺素號文獻之邦振黃鍾之鏗鍧剪毛羽之紛㽔者比比有之其能為仲賢撰為賦頌矣乎金華永寧禪庵記金華縣東五十五里有一土阜延袤數里餘曰羅漢山先是宋元豐間里之善士鄭君克允與其弟克明于其地冶鐡鑄阿羅漢像五百一十有八山因是而得名像今猶在西巖石佛寺克允則資政殿學士鄭忠愍公剛中之大曽父也二百餘年之後有楊民子名允真者居于山側與其室人王氏本净尊禮大雄氏之道同往烏傷伏龍山謁千岩禪師入室弟子蘭室馨公受大乘三聚戒疑神入空以縛禪為事一夕夢異僧若來自西域者告曰汝宜于羅漢山建永寧庵以修學禪㝎覺而異之即其地經行見其坡陀演迤氣象夷曠遂欣然入念慮銖積寸纍搆佛廬三楹間中塑觀音大士華冠瓔珞寶相殊勝時則至正戊戌之春也樂善之徒捐山若園五十畒奉之允真手植青松蔚乎成林而庫樓西廡俱先後就緒什器百需之物亦莫不備給持瓶錫而來過者日暮塗逺一時一憩神靈之區應真之所示現夫豈偶然必有龍鬼晝夜護持使般若之種孽芽其間亦其勢之焉允真欲為久圖請豫文勒石俾世世擇異姓有善行者主之而楊氏之族人不與也豫聞神所必至也羅漢之山昔嘗産鐡鄭君兄弟命金工鑄諸像像成而鐡已竭協氣充牣祥光未散禪庵之建實符嘉應宜乎允真之城此不難也然而造者不難而繼者為難嗣主其席者尚思允真之勞勩一椽片瓦視之不翅寶璐庶幾繩繩相傳至永久而弗墜苟或不然則夫冥報之撡具諸載籍豫何忍言之讀斯文者尚知所自警哉允真字無識敦實而無為最為近道父曰天祐毋姓金氏云題㝎武蘭亭帖後世之論㝎武蘭亭其說頗不同有謂唐太宗詔歐陽詢搨本刻石禁中至晋時契丹輦至殺胡林棄而北歸宋慶曆中韓忠獻公壻李氏者獲之至宋景文公帥㝎武始從李氏之子購藏庫中相傳得于孟水清者蓋非也熙寧中薛師正出守甚珍惜之别刻以惠求者師正之子紹彭又勒于他石潜易元刻以歸長安是㝎武有三刻矣有謂太宗既葬繭𥿄蘭亭而刻石亦見殉昭陵既發耕氓負石為搗帛用㝎武一士人見四周龍鳯文隱起知為禁中本以百金市之以歸謂之古㝎本王君貺知長安移文索入公庫又謂之古長安本既而公庫火石焚馮當世再入石是㝎武則有二刻矣傳聞異辭是二說者巳不䏻歸于一致况欲索于肥瘦完損之間邪自後轉相摹刻者凡九十餘本而吾婺梅花本而下亦且十家則其去真益逺矣此帖出于蘇才翁東齊所藏元祐戊辰米南宫又獲之才翁之子洎洎字及之亦佳士也上有范文正公題識韓魏公家記及錢氏忠孝家趙彞齊字印精神氣韻實與他本懸絶當為㝎武𥘉本無疑同郡周君致肅冒熱來求題謾一疏之不覺其辭之繁也題恱生堂稧貼右蘭亭恱生堂本係宋相賈師憲命其客廖塋中參較㝎武諸本采字之精善者輯成一帖始命金華良工王用和勒石經一年乃成賈諸恱生堂中尋𥙷用和武階以報之濂按師憲遭竄逐時朝廷命王孟孫簿録其家石刻蘭亭多至八千匣當時方回奏劄亦頗及之度其所藏者善本必多故廖所采輯薦紳家號為至精先師內翰公嘗摹搨為卷而以趙文敏公所臨者繼其後誠可謂雙絶矣公之孫栁穆能寶此卷于戎馬劫灰之餘穆亦賢乎哉跋栁先生上京紀行詩後濂以元統甲戌伏謁先生于浦江私第出示上京紀行詩卷乃永嘉薛君宗海所書時先生自江西儒㙜解印家居上距分教灤陽賦詩之年實延祐之庚申己歷十五春秋洪武丁已之正月濂方謝事歸田幸獲重觀于蘿山書舍相去元統甲戌復四十有四年于是先生墓上之草亦三十六新矣嗚呼六十年間人事變遷乃弗齊若是不亦悲夫先生之孫叔雍以濂嘗受業先生之門請題識其末三復之餘慨然為之興懷先生之詩與薛君之字人咸知貴之有不待區區之贊也跋王獻之保毋帖右王獻之保母帖說者謂勝于㝎武蘭亭𥘉刻蓋此帖乃獻之親書于甎而又晋工刻之若蘭亭則馮承素等鉤摹而又唐工鐫之所以精神氣韻敻然不侔也或者不知猶妄有所疑姜堯章乃作辨評一篇設為問答援據甚詳博雅君子宜取而覽之正不必求題識之多也題錢舜舉應真圖錢舜舉所貌應真渡水圖備極情態此畫史恆事爾或者妄謂應真實然則過矣觀者當具金剛眼而弗為𥿄墨所惑可也跋假氏墓志銘後右大司徒歐陽文公所造廬陵假君雲亨墓碑君之子德輔德文既鐫石龍坑冢上元季之亂碑與亭俱燬公之遺墨幸得僅存因重裝為卷請豫識之嗚呼公之文在天地間流傳當無窮固不繫碑之有無然而事變不可料公自擢第以來文稿百有餘冊藏于瀏陽里弟者亦燬于兵其孫估唯收在燕所録二十四卷奔走四方凡見公文必躬寫而附入之豫嘗為其作序以傳惜乎德輔不及録此文以遺之也至於假君之賢行公巳備書豫不敢勦說而瀆告焉德輔兄弟能惓惓寶此而不忘亦可謂不死其親者矣孫伯融詩集序詩道之倡其有師友淵源乎非師不足盡傳授之祕非友不足成相觀之善無是二者不可以言詩也當元之季有丁仲容先生者自天台來客建業以能詩鳴方其岸幘談笑有持卷來求者輒索酒飲數觥操觚如飛風雨疾而龍蛇蟠語意渾涵絶無斫削之跡讀之者皆驚以為仙才當是時夏煜允中為先生入室弟子其氣韻酷類而橫逸滂沛過之伯融進受指盡于先生退交允中日取唐諸家詩而紬繹之稽其聲律求其指趣察其端倪已而學大進士大夫稱曰之是肖乎允中者也或曰非也脫凡近而逰髙明鼓俠氣而超氛壒其髣佛乎先生者邪豫來南京而先生墓木巳拱獨允中共吟嘯于風月寂寥之鄊舂容乎大篇鏗鏘乎短韻無日無之允中間持伯融之詩相與諷詠豫謂允中曰自科舉之習勝學者絶不知詩縱能成章往往如嚼枯蠟較之金頭大鵝芳膄滿口者有間矣如伯融者何處可得邪允中深以豫言為然時伯融總戎于括豫不及見未幾伯融死于難後三年允中亦殁豫今耄矣私竊以謂先生之詩已􅍢板傳世每念允中之名泯泯訪其遺藁三十餘首録藏青蘿山房頗恨伯融之什未有所托金陵蔣行簡伯融之弟子也乃搜輯遺失釐為若干卷介翰林典籍蔡宗默求豫序其首烏乎道隱民散久矣朝執經于講惟暮反眼相視若塗人者有之有如行簡之不忘其師非紛紜百鳥中見此孤鳯凰歟因不辭為稽其師友淵源次第而為之序聞之者可以勸矣伯融諱炎姓孫氏句容人元季落魄不仕及皇上㝎鼎建業出為江南行省掾同知池陽府已而升知府事遷本省都事總制處州軍馬苗寇賀甲李乙叛遂遇害朝廷以其不屈志辱國贈徴事郎封丹陽縣男為人磊落有俊氣藐然白面書生而其胸中藏百萬兵使其賦命之厚勳業可立致今但以詩名于世惜哉雖然伯融藉此亦足為不杇矣跋髙宗所書神女賦右宋思陵所書神女賦法度全類孫過庭旦善用筆沉䝘之中兼有飄逸之態然思陵極留心書學九經皆嘗親寫故其用功為最深此卷乃禪位後所書時春秋已髙而猶弗之廢誠可謂勤也已使其注意于虞夏啇周之治父讎不至不報王業未必偏安抑又可歎哉卷首有奎章閣鍳書博士印蓋天台柯敬仲為是官時所鍳㝎云題伊尹古像卷後余嘗觀孫季昭示兒編其言書所載伊尹放太甲于桐放當作教以其篆文相近故訛爾其論甚偉句曲外史張天雨能取其說書于伊尹古像之後誠知言者哉雖然汲冡竹書所載又何其與此異也題子昻書髙上大洞玉經後右玉晨上文三十九章趙魏公六十四歲時所書多取法于黃庭內景經故韻度極可觀或者謂公晚年專倣李北海其言過矣豫見公書此經凡四數而此卷尤為精絶誠可寶也題鮮于伯機所書蘭亭記後鮮于奉常公嘗見葉秋㙜書反覆諦視至欲下拜秋㙜之書人頗譏其陋公獨知其用筆之妙字學雖淺藝非功力精到亦不足以相知况其他者乎豫藏公所書濟石硯賦自謂可入妙品今觀此卷實可與之抗衡非真知書中意者未必以豫言為至當也題剡源清茂軒記後剡源先生戴公以文辭名天下曾未百年學者鮮有見其全集者豫總修元史欲為先生立傳于是白丞相下有司即先生之家謄其文藁二十卷以上至今藏之祕府中書舍人毛君集出示先生所造清茂軒記正在槀中其為真筆無疑蓋毛君從祖震卿與先生為忘年交故先生不靳而為之記發明山水之勝分明如晝今之能文者雖多如蝟毛求如先生絶不可得毛君乃能重書以傳亦可謂賢子孫矣哉跋米南宫夷矌帖豫嘗評海嶽翁書如李白醉中賦詩雖其姿態傾側不拘禮法而口中所吐皆成五色文今觀與李邍手帖因書其語而歸之邍字夷矌公擇子也大觀間嘗為顯䆠云跋樂貞婦傳後樂貞婦陳氏蚤喪夫而養姑終身撫二子至于成立豫揆陳氏之意則曰是婦道當然爾何有他覬哉使陳氏所見于此毫髮有未盡瓦鐙敗帷之苦未必能甘也議者不察以不得旌表門閭為陳氏恨旌表朝廷事也于陳氏何與焉逹摩大師贊括蒼吳福平川以善畫名叢林間龍門海公請寫𥘉祖圓覺大師真像威德如生觀者聳然起敬翰林學士承㫖宋濂為之造贊而國子博士鄭君仲舒書之贊曰系傳香至法證圓真闢六宗之異户歸甘露之一門操智慧刀斬纒蔽之枝葉裂煩惱綱見清淨之本根重冥穩泛己歷三年之久少林璧觀竟忘九載之勤流支屢毒而甘之如蜜葱嶺遊行而殁兮若存精明焜煌乎日月氣宇函蓋乎乾坤此所以一花五葉之記遍周沙界而大法彌尊也邪活水軒銘吳府紀善張德麟氏㑹稽山隂人築居鑑湖之側讀書鼓琴樂周公孔子之道見原泉之流不息因取子朱子詩以活水名其軒請豫造記豫謝曰軒名包義甚博索文者又接踵而至俟還山中却為之德麟曰麟從藩王出入行無㝎蹤願遺之一言不敢以多求為也豫因曲徇其意為製銘曰泉出地上昭厥源東流弗息日奫沄譬猶嘉木下有根修幹上撑枝葉藩君子玩之道則存錙銖有間體遂昏潢汙行潦勢吐吞朝雖盈盕不及曛我銘我軒辭則勤行之不己德乃純題馬氏譜圖後同郡馬生銓其先出于唐太師北平莊武王燧北平五世孫大同來為婺之東陽縣令咸通五年遂卜居松山之下縣令十世孫承節郎喬嶽宋崇寧五年又自松山遷仁夀之兜鍪山承節七世孫克復嘗以武顯節制婺州屯戍軍馬兼中書省計議官兼浙東降斷斬斫使討寇事計議四世孫則銓也銓以縣學弟子員貢入成均惓惓于譜事唯恐廢墜間請豫題其後豫覽隋唐藝文志載郡國所上氏于書凡數千卷藏于官所以然者辨貴賤别昏姻謹本支也自氏族之學弗講士大夫家亦鮮有習之者往往未歷數世巳藐然不識為何人可嘆也今生能有志于此晝夜弗忘不亦忠厚之士哉豫特表而出之以勵世之人使不忘其所自元故徴士周君墓志銘君姓周氏諱自立字本中裔出汝南𥘉遷黃之永安唐季有為袁州刺史者因家宜春繼徙廬陵子孫衆多又自廬陵分居新喻天柱山之陽曾大父䁀臣宋太學某齊生大父宗缶以文學名江文忠公極禮下之後用薦者授迪功郎監廣西經略安撫司庫辭不赴門人私諡文範先生父雲龍元瑞州路儒學録有文集若干卷博學者君自以奕葉為儒繼承不易孳孳問學雖寒之折膠暑之鑠金亦不敢輒廢下筆為文翩翩然成五采矣父既蚤殁獨奉母某氏居家苦貧傭書以奉甘㫖從兄自強為廣西宣慰司都事以書來徴會欲白上狀拜而請銘且繼之以泣于家食時自來為義烏尹頗與自強交視孟東契家子姓也義不得辭銘曰孝友行于家既質且葩又何必金章盩綬而始為華我銘斯墳言則非夸故蔣府君墓銘余官詞垣時編修蔡玄與蔣敬偕來玄代敬致辭曰敬舊從遊于句曲伯融孫先生伯融總兵于栝而殁于王事敬痛其師之亡而其詩不傳今來輯成編將刻諸梓願為序以冠萹端于私自念近時為師弟子者一轉盻間如不相識然若敬者亦可謂之知義者矣意其必有所自頗竊識之及余致政還山敬持元進士東原牛繼志之狀請銘其先府君墓狀中𫐠其冢三世以孝聞則其所涵濡者深矣宜乎敬之制行不忘其師也府君諱成字翁輔蔣其姓也其先為汴人宋建炎𥘉扈蹕南渡遂家建業之錦繡里曽大父某大父某父某字秀之母郭氏閨閫肅穆可為女中師府君生而敻異不與恆兒同少長事親曲盡其孝敬一蹞步之間常恐親之飢且寒盻盻焉懸懸焉若無所置身見親破顔一笑輒喜劇不知手足之舞蹈士君子咸曰公輔之祖若父䔍于倫品人競稱之為純孝而公輔又能繼之吾聞孝子之家其後必昌庶有望于斯人歟府君非惟能孝也其友二弟甚至庭無間言仲弟彬為泰州吏目先三年卒季弟順先一年卒府君竭力經營其後事甚悉府君非惟䏻友也與人交務崇信讓雍雍雅雅絶不與物競唯恐傷之不幸以洪武七年五月十日卒享年五十又九其年六月八日葬于城南撥雲山之原禮也娶劉氏子男子一人敬其字為行簡為人謙慎重然諾一時名士多與之逰子女子二人長蚤世次適徐信孫男一人真童孫女一人在室豫聞孝者群行之冠冕人有行之者則百善至而百邪去府君能繼先人遺躅而益有光焉以增夫名教之重此而不銘惡乎銘銘曰才豔而荂裁雲剪霞未能振德之華恪遵天經篤行于庭斯可通于神明昧昧思之孰為重輕讀銘者當蹶然而興全有堂針全有堂者何監察御史黃君鄰讀書之室也缺者全之反其謂之全者何無毫毛之不備也無者有之對其謂之有者何心中本具不假外求也其謂全有者何天德也天德之著也如鑑之明也萬里森然隨物而應之也既曰全有或乃斫之喪之以至弗完者何人僞之滋也人僞之滋非學不足克之也克之者何整爾甲礪爾戈力戰而勝之也是故生而能全之謂聖人修而復全之謂賢人棄而不知求全之謂愚人三者之不同奈何敬與怠之謂也黃君欲全其所有非敬將何以全之黃君以政學聞于時復遑遑自治不知其殆之求全者歟為之曰繄天扃顯性靈萬象森森炯以貞愚不縮智不贏毫末咸具天人并君子乾乾守以誠其有乃全百體寧宋學士文集卷第四十五芝園集卷第五
