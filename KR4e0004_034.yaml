body:
  text: 御賜井露漿詩序洪武癸丑正月始和越四日丙午時加巳皇上御武樓之便閣召御史中丞臣寧太子贊善大夫臣濂賜坐左右上談嘉祥之應敕中貴人取所儲膏露于宫中俄盛以翠罌跪進上前皆玉潔珠圓世所未覩巳而詔舁㸑器至用金杓煉水二升火既勻水勢成濤上起自龍帳中親啓罌以投須臾融化與水為一上取杓中瀉二內侍舉幕承之查滓巳净重漉以綘紗囊上飲一爵而分賜臣寧與臣濂焉且曰此天地至和所凝也卿等服之去沈痾而衍遐齡臣寧等跪飲其味井如飴而弗􅕹其氣清于蘭而不豔一入口間神觀殊覺爽越飄飄然欲御風而行于是各奠爵于几頓首于地而退臣寧謂臣濂曰唐之李白召對金鑾殿玄宗調羹以賜方䇿尚載之以示後世矧今聖天子親挹天乳以沃近侍微臣共享二氣禎祥此玄黃覆持之恩不可忘也宜發為聲詩以彰君之賜臣濂伏聞王者有德上通于天嘉氣協應鴻羡滋播今甘露頻降大和坱圠民物敉寧洽于大康是皆一人有慶使臣庶永有攸賴方將涵育靈澤衣𬒳上德惟思日孜孜以圖報為事皇上不自滿假錫釐羣臣霑丐天漿上昭靈貺此與黃帝出馬腦甕甘露頒賜百僚之意同誠非玄宗之所擬也盛德所覃接肌藏髓矌世竒逢豈容喑默乃稽首再拜造詩一章以侈上之賜從而屬和者凡若干人録成一卷傳示萬世子孫荷天之休至于無疆云恭跋御賜詩後臣聞自古人君有盛德大業者其積慮深長而詒謀悠久必日與文學法從之臣論道而經邦當情意洽孚之時或相與賡歌或褒以詩章或燕之內殿君臣之間實同魚水非直以為觀美所以禮賢俊示寵恩而昭四方也有如唐之文皇宋之太宗其事書諸簡編者可以見之矣皇明紀號洪武之八年秋八月甲午皇上覽川流之不息水容澄爽油然有感于宸衷陋尹程秋水賦言不契道乃親更為之賦成召禁林羣臣觀之且曰卿等亦各撰賦以進臣率同列研精覃思鋪叙成章詣東皇閣次第投獻上皆親覽焉復置品評于其間巳而賜坐敕太官進天厨竒珍內臣行觴觴巳上顧臣曰卿何不盡飲臣出跪奏曰臣荷陛下聖慈賜臣以醇酎敢不如詔苐臣年衰邁恐不勝杯酌志不攝氣或愆于禮度無以上承寵光爾上曰卿姑試之臣即席而飲將徹上復顧臣曰卿更宜釂一觴臣再起固辭上曰一觴豈解醉人乎卒飲之臣舉觴至口端又復瑟縮者三上笑曰男子何不慷慨為臣對曰天威咫尺間不敢重有所瀆勉強一吸至盡上大恱臣顔面變頳頓覺精神遐漂若行浮雲中上復笑曰卿宜自述一詩朕亦為卿賦醉歌二奉御捧黃綾案進上揮翰如飛須臾成椘辭一章臣既醉下筆傾欹字不成行列甫綴五韻上遽召臣至命編修官臣右重書以遺臣遂諭臣曰卿藏之以示子孫非惟見朕寵愛卿亦可見一時君臣道合共樂太平之盛也臣行五拜禮叩首以謝上更敕給事中臣善等賦醉學士歌云臣既退竊自念曰臣本越西布衣粗籍父師明訓弗墜箕裘之業而已一早遭際聖明遣使聘起之踐歷清華地躋禁近無一朝不覲日月之光如此者凡十又七年叨冒恩榮敻絶前比所幸犬馬之力未衰誓將竭奔走之勞以圖報稱今天寵屢加雲漢之章照燭下土臣竊自靖度何足以堪之雖然傳有之泰山不讓土壤故䏻成其大河海不擇細流故䏻就其深王者不郤衆庶故䏻明其德洪惟皇上尊賢下士講求唐虞治道度越于唐宋逺甚雖以臣之至愚亦昭𬒳非常之殊渥六合之廣其有抱藝懷才者孰不思踊躍奮厲以揚于王庭哉臣按南有嘉魚之詩有曰君子有酒嘉賔式燕以樂序者謂太平之君子至誠樂與賢者共之也皇上寵恩之便蕃抑過之矣又按天保之詩有曰罄無不宜受天百祿降爾遐福惟日不足序者謂臣䏻歸美以報其上臣雖無所猷為願持此以頌禱于無窮哉古者侈君之命勒諸鼎彛藏諸宗廟嗣世相傳以至于永久臣敢竊援此義礲玉為軸裝禠成卷什襲珍藏以顯示來裔給事中臣善等應制諸詩附録其後而賢士大夫聞風慕豔而有作者又别見左方云是歲九月戊午朔具官臣金華宋濂謹記𥙷張馮加冠字辭有序瑞安張生馮宋金部郎中聲道諸孫也以文學薦于朝擢奉常贊禮郎奉常所典祀天神饗人鬼祭地祗之禮其責任為甚重馮䏻周旋佐助而無越禮愆度君子稱之馮當冠時大賔字之曰子翼而未有造祝辭者邇來監祀廣西行中書其參知政事黃君子雍嘗為推說字義而序之馮事豫頗謹間復以祝辭為請豫按士冠禮載其三加之辭甚具辭古也而字說則今也子雖不敏弗䏻從大賔與聞制字之義之意難固拒也遂黽勉以𥙷其辭辭曰冠而有字為敬其名曷為敬之期學之凝學將焉施莫重夫祭大嘏之受因神所致孰有賢行慎擇為尸豫撰􅍏几庶堪馮依豈惟佐食宿有命戒皇尸戾止益䖍弗懈侃侃工祝左承右趍既贊道之復扶助之馮之謂何如神斯據翼之謂何如鳥展翅百靈􅌭紛儼乎若臨洞徹上下精白一心詩咏卷阿歸于孝德放諸四海凖是為則爾職贊禮陟降廟郊周折圓方弗愆絲毛非志之醇疇䏻及此宜勵其功慎終如始自此而推泉逹火然孝親忠君其道一原內涵外充一循乎敬大本既敦末罔不正爾有長才發軔在兹何逺弗召何福弗宜探名索字孳孳不巳賢亦何人睎之則是人虎說莆田壷山下有路通海販鬻者由之至正丁未春民衣虎皮煆利鐡為瓜牙習其奮躍之態絶類乃出伏灌莾中使偵者緣木而視有負囊至者則嘯以為信虎躍出扼其吭殺之或臠其肉為噬齧狀裂其囊拔物之尤者餘封祕如故示人弗疑人競傳壷山下有虎不食人惟吮其血且神之已而民偶出其婦守巖穴聞木上嘯聲急意必有重貨乃䝉皮而搏之婦人質脆柔販者得與抗婦懼逸去微見其跖人也歸謀諸鄰譟逐之扺穴獲金帛無算民竟逃去嗚呼世之人虎豈獨民也哉送㑹稽景德輝教授鄊郡序成周之時自國都以逹于家于黨于術無不置學學必立師師必以仕焉而止及道明德充者為之然以其國之賢還教其國之人不翅父兄之臨子弟名實之素孚而不藐然無聞也情文之素稔而不渙然無屬也于是其言易入其教易行秩秩而相親欣欣以相愛恩義兩盡薰為太和德成材逹有非後世之所䏻及也㑹稽古諸侯之國今為浙河東大郡㑹學官闕教授員鄊之子弟咸曰言篤而行醇惟我景先生則然其黃髮老成人又曰擩嚌經腴朝夕不自饜著述成書惟我景公則然既而郡僚聞之府公亦聞之相與謀曰府庠之無師二千石之責也景君之賢信如子弟老成人之語以鄉人之所尊而為鄊弟子之所師未見其不可也盍上其事于選曹乎選曹既從其請試景君以春秋經義一通白于丞相府報下如章景君將東還涖教事詞林編摩之英成均宿學之士藩府賔僚之賢咸造文若詩榮之而以首簡授濂序嗟夫師道之不立也久矣頗求其故後世拘于選格多用異邦人為之師其實未易孚其情未易檢往往若秦越之相視曰夜幸代者之至則望望然去矣今景君之獨能致是者何哉亦曰聖天子在上旰食宵衣以成周為法然後得遂其所志如斯爾景君之行也當思南渡羣賢之子孫咸萃是邦或以德行文辭著或以道學政事聞世之相去未逺也文獻猶有足徴景君能于此盡心焉則移風易俗之效將粲然可觀矣若曰吾耄及之他尚何所圖不過便祿養于枽􅎚之邦而已豈惟非鄊之父兄子弟之所望雖濂亦將致尤于景君濂知景君决不爾也故人有宋無逸許時用二君亦鄊先生也聞景君講道于鄊也其將有以翼助之哉景君名升其字為德輝云送徐教授纂修曰曆還任序洪武六年秋九月皇帝御謹身殿從翰林學士宋濂之請妙東文學之士四三人纂修大明日曆而詔濂與吏部尚書詹同司總裁事當是時杭州府學教授徐君大章實在選中開局于內府日給太官之膳而令中貴人護閽非奉敕㫖不敢入其事至嚴也濂時與大章辰入而申出凡興王出治之典命將行師之績采章文物之懿律曆刑法之詳咸以事繫日以日繫月以月繫年必啇榷而謹書之濓年加耄不能有所猷為唯發凡舉例而已其助我者大章之力居多越四月書成共一百卷遴日上奏登盤龍金匱中奠于丹陛之下縉紳之家爭欲薦大章入詞林大章堅以足疾辭濂因為陳情于上乃詔賜文綺纎繒各三裝錢六千文仍俾其職為真故事教授試職三年俟育材奏功方許真授大章待未朞年乃異數云大章將還涖教席濂餞之秦淮河上與之言曰教授之職雖設于宋其任亦云重矣在紹聖𥘉詔令中制科及進士第上五人禮部奏名上三人府監廣文館第一人始令為之大章起布衣而輒􅈾其任豈無其故耶漢法太史公位丞相上天下計書先上太史公副上丞相由唐及宋宰相皆兼史官其重如此大章以一教授之微乃召入史館與編摩之列又豈無其故耶蓋大章博覽載籍發之于詞章霞粲波縈峻潔鮮朗威儀儼雅又足為後進師表聲名籍籍起儒林間當此聖明之朝材咸求實不于其官于其人故大章致此無難也然而黃琮之貴必登于方明大雅之音必奏于清廟理勢則然大章以溫然之姿鏘然之文乃鰓鰓下教于一郡如惜才之論何濂誠耄矣髮種種𬒳肩矣聰明不及于前時矣詞林清切之班非大章誰所宜堪行將力薦而用之脫使大章實不良于步趍雖卧治之亦可也大章以為何如明年春正月友生金華宋濓序送許存禮赴北平教授任序鴻儒之胄傳經為難非藏髓以接肌盍鈎深而致逺欲承家學罔匪俊賢景伯之貫五經仲師之明三統咸號善繼致宣令聲有如婺郡許文懿公為武夷之世適作寓內之人師繭絲馬鬛析理義之精微粉墨鉛黃發箋文之樞要完經翼傳著𫐠滿家簞食瓢飲肥遁終世其克生于令子遂允蹈于前猷務純楙以自持斂華英而弗耀倡道丹溪襟佩坌集揚徽京輦薦牘交馳天池卒馳于鯤鵬鍾阜竟辭于猿鶴于是上名宰府試藝銓曹典五教于北藩列諸生于東序朝紳恱懌矦服推尊斜川無愧于小坡西平咸稱為有子况當勝國之都嘗為人物之藪教鐸斯振一是韶濩之音藝圃深培竚見菁莪之盛如濂不敏比德知慚秋髮盈簮慨年華之易邁春花夢筆覺文彩之已非粗叨鼎鍾之榮敢忘枽􅎚之敬偶它鄊之相遇慰昔日之襟期把酒臨風髙情闓朗炙燈論道玄義昭融胡墨突之未黔遽江帆之催發雖無藻思強綴蕪辭繼前古之芳音首羣英之雅製云爾詩曰有菀者栁生于河糜折以送子而興我懷我懷伊何鄊之文獻人逺言微不絶如線之子之生實紹前徽彬彬其文郁郁其儀蘭在逺林其香苾芬豈期人知人輒有聞我傳我經其謨孔臧以迪以將以牗其衷叶遙遙北藩在燕之墟土俗徑悍柔以書詩不見白雲英英在山起而為澤卉木斯蕃教雨之施功亦如此苟專丘􅊤孰為𣏌􅎚學貴有用于子實多目送征帆其如别何其如别何獻此春酒後夜相思白月在栁洪武九年正月十八日葉夷仲文集序臨海葉君夷仲宋丞相西澗先生族諸孫也夷仲生有異資其文辭之進如榮木升而春濤長日新月盛蓋未巳也頃由茂才舉于鄉奉使安南不辱君命以功擢髙唐州判官轉知睢寧縣為學猶孳孳不懈其弟廣武衛知事惠仲類集成編釐為若于卷來徴豫序其請至六七而不倦豫齒加長志氣摧攝操觚所云云皆無精魄頗類䆿語者讀夷仲文方畏敬之弗睱尚奚敢序之哉雖然不敢無一言也昔者先師黃文獻公嘗有言曰作文之法以群經為本根遷固二史為波瀾本根不蕃則無以造道之原波瀾不廣則無以盡事之變舍此二者而為文則槁木死灰而已豫竊識之不敢忘于是取一經而次第窮之有不得者終夜以思思之不通或至逹旦如此者有年始粗曉大㫖然猶不敢以為是也復聚群經于左右循環而溫繹之如此者亦有年始知聖人之不死其所以代天出治範世扶俗者數千載猶一日也然猶不敢以為足也朝夕諷咏之沉潜之益見片言之間可以包羅數百言者文愈簡而其義愈無窮也由是去讀遷固之書則勢若破竹無留礙矣權衡既懸而百物重䡖無遁情矣然猶不敢以為易也稽本末以核其凡嚴褒貶以求其斷探幽隱以究其微折章句以辨其體事固粲然明白而其制作之意亦皎然不誣也由是以㝎諸子百家之異同若别白黑而絶無難矣及夫物有所觸心有所向則沛然發之于文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無所遺也嗚呼豫以五十年之功僅僅若此今年日逾邁慨兹舊業反成荒落將何以為夷仲言哉夷仲諸作溫醇而有典則飄逸而有思致其辭簡古而不龎其神豐腴而不瘠可謂䏻言之士矣求諸輩行之中未見其敵也進進不已何古人之不可至哉豫因忘其固陋以平日所自得者序諸篇首夷仲宜有取焉雖然文辭道之末也夷仲方與有民社之寄當務為政以德而昌其道哉洪武九年正月望日具官金華宋濂序題商山四皓圖右四皓圖一卷所謂四皓者昉見史記張良世家則東園公綺里季夏黃公甪里先生是也𥘉不知其姓名按陳留志園公姓庚名秉字宣明居園中因以為號夏黃公姓崔名廣字少不誣也由是以㝎諸子百家之異同若别白黑而絶無難矣及夫物有所觸心有所向則沛然發之于文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無所遺也嗚呼豫以五十年之功僅僅若此今年日逾邁慨兹舊業反成荒落將何以為夷仲言哉夷仲諸作溫醇而有典則飄逸而有思致其辭簡古而不龎其神豐腴而不瘠可謂䏻言之士矣求諸輩行之中未見其敵也進進不已何古人之不可至哉豫因忘其固陋以平日所自得者序諸篇首夷仲宜有取焉雖然文辭道之末也夷仲方與有民社之寄當務為政以德而昌其道哉洪武九年正月望日具官金華宋濂序題商山四皓圖右四皓圖一卷所謂四皓者昉見史記張良世家則東園公綺里季夏黃公甪里先生是也𥘉不知其姓名按陳留志園公姓庚名秉字宣明居園中因以為號夏黃公姓崔名廣字少通齊人隱居夏里修道角里姓周名術字元道河內軹人孔父祕記又作祿里此皆王劭據崔氏周氏世譜及陶潜賢輔録而為此說綺里季則無聞焉或曰姓氏書云綺里姓季其字也豫方疑其誕妄不經及讀顔師古漢書注果謂四人者匿迹逺害氏族無得而詳皆後世皇甫諡圈稱之徒及諸地里書說所傳㑹可見古人讀書精審固有以及之者矣而周公謹所著齊東野語又呫呫不置者何耶非惟此也傳記所載如伯夷叔齊之類一一具氏名甚悉經中既無明文不知後世何因而知之耶一笑而斥之斯可矣然自舊以夏黃公為一人而畢士安則謂綺里季夏為一人黃公别是一人其說尤異據漢惠帝時所刻四皓神座一曰園公二曰綺里季三曰夏黃公四曰角里先生惠帝去四皓不逺足以證士安之謬矣偶題此圖遂牽聮而書之畫之工拙尚未睱論也濟南李氏先塋碑銘濟南李氏世居章丘臨濟鎮鎮東北一里有纍葉之塜墓存焉傳至二府君始遷濟陽曲堤鎮娶解氏生二子曰載曰某載娶某氏陳氏生五子曰某曰信曰某曰良曰溫信秉性剛明州里有不直者必來赴訴片言之頃皆心服而去嘗為官督租賦不約而集行尤方嚴人聞謦咳音皆斂容避不敢慢娶王氏年九十二而終生三子曰貴曰直曰顯貴字國寶度量絶人喜怒不形于色威儀修飭望之儼然不幸商于河南歿而不返娶蘇氏生一子彬字文質蘇氏感家門凋瘁攻苦食淡與文質共挽一車採桑風雨中早夜事蠶績以養姑姑歿蘇氏猶康強見孫吉䏻讀書造文出訓鄊之弟子員持束修來上泫然流涕曰李氏一門之責悉歸是子矣年七十九以至正三年十一月二十四日而終文質天性至孝奉祖父母及母未嘗有違禮每得一井腴不獻弗敢先嘗一日稍有酒過輒深悔曰為人子者可以沉湎而遺親憂乎遂覆杯十年不飲首倡宗黨買田于縣北二百步作為新阡繚以周垣用昭穆序􅌾凡族屬有不䏻藏者咸與焉回河鎮相傳有鬼兵至居民競負囊槖來寄文質笑曰惡有是必訛言也巳而事果帖帖悉以其物歸人人有遺垂髫女者文質偶拾之浹旬其父來告文質亟出女還之其父牽羊載酒為謝文質曰汝女既歸汝矣何假此為峻却而不受性嗜賔朋延納無倦色甚至傾資遇之故人多愛敬踰于骨肉苟有過面責其非䏻改則喜逰行里中或見女婦無論親踈輒引身避之然御家甚嚴訓諸子以學晝夜程督不少恕嘗指登科記示之曰吾兒得掛名其間志願足矣復戒曰讀書不患不登科登科即為官矣為官而貪墨譬如明珠彈雀所得者少而所失者多人以為名言年七十以至正十年十月十日而終娶周氏生一子曰忠繼劉氏生三子曰賢曰吉曰仁劉氏事姑以孝御下以寬遇夫以敬內外宗戚無不得其歡心撫忠不翅所生子見吉登至正甲午進士第及為河間録事迎劉氏就養僚屬率騶從迓之羅拜車下母喜曰汝父疇昔用心之若恨不令一見之耳年六十又六以某年五月五日而終忠字思庸年五十二卒娶張氏生二子曰益歿于兵曰某夭賢字思哲年三十八卒娶禇氏生二子曰某曰某皆歿于兵吉娶禇氏年三十六亦歿于兵豫幸與吉逰吉自狀其先世行實衮衮數千言且作書來告曰吉也罪戾深重天降酷罰連年兵禍相仍李氏一族不絶僅如一線惟我曾祖考妣葬于縣東某地先塋之側而祖妣暨考妣則藏于新阡其嘉言善行固不䏻䆒其詳至于名諱及卒葬歲月亦或有所遺失今弗圖則後嗣何䏻知之願先生為文刻置新阡豫讀其狀纒綿悲愴之辭層見而疊出有以知吉思深而忠若不覺為之墮淚乃掇其大者繫之銘辭而遺之嗚呼若吉者不亦孝子慈孫也哉吉字思迪今以字行文行兼美出仕國朝今遷徴事郎知揚州府髙郵州事云銘曰堪輿之中氣化冲融莾無端倪兮一禍一福相為倚伏曷得而推兮人衆者勝天亦䏻㝎理將可期兮李氏之先善弘慶綿宜昌􅍏施兮家之分崩族之僅存適逢亂離兮往過來續無往不復大化無私兮碩果不食其發必亟孰閼其馳兮孳植敷蕃自一而千起于毫絲兮屈為伸根衰為盛門循環以時兮考古驗今斯言可徴有若蓍龜兮莫堅匪石大書深刻史官之辭兮題雍禪師塔銘後長沙歐陽信本書在唐評為妙品鄭漁仲金石略所載凡二十三種而行于南北者惟僧雍塔銘及醴泉銘而已二銘多所翻刻南本失于瘦北本失于肥殊無精絶之本豫嘗于越見胡文恭公所藏醴泉銘肥瘦適均精彩煥發識者㝎為𥘉刻今觀此塔銘其神氣絶與之類誠可寶玩也然塔銘尤信本得意書姜堯章謂勝于醴泉駸駸入于神品其亦知言也哉元諸大老置品評于其間者凡十又三人豫尚何言庸掇拾緒餘而書于左方云宜春夏都事遺像贊以忠字尚之其才孔良其氣則剛沉潜乎仁義之府擩嚌乎禮樂之場窮春秋而寓衮斧法茮粟以為辭章使之􅌹城而居則可以攀次公之黃使之入直鑾坡則可追文成之張胡為乎低回下列莫展一長託使車以遐覽竟仙遊于五羊豈詘于人者難知而信于天者不亡後千百年剛風鬱滂當見騎麒麟而下大荒者耶韋軒銘閩有大儒曰朱公喬年自以性偏于剛效西門氏佩韋以為警因號其齊曰韋靖江府伴讀陳伯武亦閩人也有景行先哲之志用韋名軒所以禔其身者勤矣濂懼其矯枉而過正也為之銘銘曰韋之為義乃獸之皮可以束物枉戾而相違故其文上下為舛而中則從圍自非柔而熟之安䏻變生革而如脂古先君子佩之自隨蓋戒夫剛悻以自好狠愎而為非矯其過固不宜不力若馴致于純柔純弱又必招削薄之譏嗚呼噫嘻大中之為物也微若神蓍坦若九逵何不泄泄于于濶步而長趍近則入善人之室逺則為聖賢之歸不亦暢志乎而陳氏之子問學得師木漸者必上升膏蓄者必有輝指柔人以作極纂前修之風徽豫造銘而昭之竟不敢褒而規楷木杖銘客有遺豫孔林楷木杖者橫文如蛇腹節節可觀刻斯銘銘曰托根兮孔林有文橫橫兮如玉如金千載寂寥兮孰白爾扶持之心宋學士文集卷第三十四翰苑别集卷第四
