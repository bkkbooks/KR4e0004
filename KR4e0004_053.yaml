front:
  text: 以嶽祗而與昊天抗在古所未聞質之于禮誠有難言者乎皇明御極一以禮事神而不敢褻特降璽書正名定號曰東嶽泰山之神命使者至山麓望祭勒石廟中以示敬恭明神之意歷代之陋至是而盡革矣然而州邑之間復或祀之如故者皇仁溥博從民之欲而不忍咈其情所謂有其舉之莫敢廢也嗚呼先王之禮山川有能潤于百里者皆秩而祭之况泰山之雲不崇朝而遍雨乎天下尸而祝之其亦本乎人情哉濂官儀曹時嘗與討論典禮因推璽書之所及以定天下百神名號亦既奏聞列之祀典而頒行四方今從顯等之請故備書之以見禮之不可紊者如比顯等韋布之士也非有官守之責而能致力于神惓惓乃爾可不謂之賢乎後之人尚察其衷而蹈其轍斯可也
