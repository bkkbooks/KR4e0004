body:
  text: 題栲栳山人詩集後餘姚岑公靜能志節之士也其居鄉也人皆敬而憚之是何不可乎于是各捐私槖而興修之不足則遣緩頰之徒説諸有力者土木之材不期月而集新作寢宫以間計者三正殿則葺而完之其間如寢宫之數東西二序各二十有二皆易朽腐而為堅良然神道貴清靜恐細氓之或瀆也創外門以扃鐍之像設䵝昧剝蝕者施册艧以藻飾之殿閣深沉儀容嚴飾靈颷襲人如將見之經始于洪武十年某月某甲子告成于十一年某月某甲子仍擇純行道士周節亨為其主守歸田若干畝收其粟以給羞服薌燈之費為慮甚周而成功甚巨也介濂學子葛信來求記濂聞岱宗地祗之屬不可以形像求也古者北郊與享之外唯魯君得專祠于壇亦無所謂廟也其建廟設像于桑乾河北則自元魏始魏之廟止于桑乾而已而不及乎其他也五嶽各于山趾立廟復自李唐始唐雖立廟而加之王爵猶未遍于寰宇也四海郡縣皆有廟以祭復自趙宋始宋則封之曰帝與昊天上帝並稱矣夫以嶽祗而與昊大抗在古所未聞質之于禮誠有難言者乎皇明御極一以禮事神而不敢褻特降璽書正名定號曰東嶽泰山之神命使者至山麓望祭勒石廟中以示敬恭明神之意歷代之陋至是而盡革矣然而州邑之間復或祀之如故者皇仁溥博從民之欲而不忍咈其情所謂有其舉之莫敢廢也嗚呼先王之禮山川有能潤于百里者皆秩而祭之况泰山之雲不崇朝而遍雨乎天下尸而祝之其亦本乎人情哉濂官儀曹時嘗與討論典禮因推璽書之所及以定天下百神名號亦既奏聞列之祀典而頒行四方今從顯等之請故備書之以見禮之不可紊者如比顯等韋布之士也非有官守之責而能致力于神惓惓乃爾可不謂之賢乎後之人尚察其衷而蹈其轍斯可也題栲栳山人詩集後餘姚岑公靜能志節之士也其居鄉也人皆敬而憚之是何也其出言可為世則其制行可為世範所以名閥之家雖至凋瘁多藉之以自立崛起寒微之莗縱富埒公侯亦不為凌躐之事設有之往往私相謂曰岑先生莫知之乎復退縮不敢吐氣或者不知徒謂公為詩人嗚呼公果詩人也哉廣西部使者虞泰魯瞻其鄉中子也力請豫題聊紀公之賢行以示讀公詩者題子昻書招隱卷後右趙魏公所書招隱士一篇公自大德三年八月改集賢直學士行江浙等處儒學提舉至七年十月巳閲五載而公年亦五十矣鄉先生方君夀甫從其父巖南翁遊杭提舉官署時寓于杭府故先生得見公而請書此卷也卷左有翰林待制栁公長薌山長吳公題識二公皆濂所嘗師事者九京不可作矣披玩數四不覺淚落𥿄上故仙居陳府君墓志銘古者鼎有銘銘者自名也自名以稱揚其先祖之美而明著之于後世也嗚呼孝子慈孫欲顯其親也尚矣後世不銘之于鼎而以懸棺之石代之不自著名而假諸能言者述之其事雖殊而其心一也台之仙居有陳瑜者自縣諸生選入太學與豫兒中書舍人璲交甚洽瑜方𬒳旨核實征稅于安吉而以父憂還瑜思有以顯其親走湖州謁教授童君冀托其孝行成狀復持璲書走青蘿山中請豫製銘樹之于墓道蓋瑜之先本金華人六世祖始遷而豫與童君皆世占金華之籍鄉人之言當取信于世此瑜之意尤加勤者也豫何敢辭瑜之父諱嗣字自得母夫人青年喪夫以貞節自持自得養之無不竭其衷夫人春秋髙沉痾荏苒隂虧不足以制陽痰液膠澀口鼻間氣弱不可出鬱塞無以自暢自得跪床下吸而吐之日以為常嗚呼汚惡人之所難近自得為之若易易然非其心誠愛親者不能也斯事且爾則凡謹衣之燠寒藥之􅑙升食之蚤莫宜不言而可諭矣嗚呼人子之身親體所分也何敢有焉身且不敢有則凡癢痾疾痛舉切于心生養死藏必誠必信而無錙銖之不盡焉如自得者殆將無慊于兹也使自得享有爵位則移而逹之事君也必忠惠民也必仁臨下也必寬惜為時命所拘而所及者不過振其宗姻恤其比鄰而已可勝嘆哉孔子之教以孝為天經地義諄諄然著之于經豫學孔子者也自得孝行有如是者烏得不揚之章之以為世勸乎自得性嗜學幼時厄于單窶晝則注意米鹽細務夜則爇薪誦書逮長家䆮饒遇有可矜輒施與不靳鄉黨稱為善士生于元延祐乙卯正月十四日殁于國朝洪武戊午三月二十三日夀六十四卜以明年已未月日葬于山之原曾祖儼祖淳父宏義母陸氏元配王氏先卒繼室董氏子男子三人長瑜有文學溫溫然如玉即來徴銘者次璞次琳皆業儒子女子二適某某云銘曰家享千金埒于封君苟于道無聞愧于七尺之身三組銀黃為鄉為郎儻昧其天常筋骸雖疆而人心巳亡君子哉若人篤孝于親瑞世之珍鳳風麒麟惇史造文勒石墓門以揚清芬以勗其後昆題七才子圗右七才子圖蓋唐檢校左僕射同中書門下平章事韓滉所作滉善書得顛旭筆意畫則與宗人韓幹齊名其妙不待贊也宋宣和間嘗入御府故用小璽識于前後其第六璽乃帝筆二字見于義雲章及林罕偏傍記或者以此圖乃祐陵所臨祐陵作畫固有晉唐風致然畫後必有署押豫于中祕屢見之因知其非也或又歸之丘文播文播雖亦畫七才子其運思平凡烏足以敵是哉黃金白璧可得而此卷未易得尚永寶之淨慈禪寺第七十六代住持無旨禪師授公碑銘臨濟之道十一傳至圓悟而益盛圓悟又五傳至破庵松源兩支分峙譬諸南北二斗爛然在天光芒參列瞻者目眩由是子孫布滿四海之內執法輪樞機晝夜弗停大法昭明若親覩世尊于耆闍崛山一切有情無不攝授可謂極光明盛大者矣有如無旨禪師授公則松源六葉孫其授受分明證悟真切𣑽行有足書者入室弟子文郁不逺千里持法藏大師夀公所為狀來徴銘狀文淵慤而無誇辭是用據之以成序序曰公諱可授無旨其字也一號休庵台之臨海李氏子自幼處童子中屹然如稚松超乎蒿菣不與之齊然王之法視塵坌膠轕若將溷焉年十二即思舍族而去時季父仲智為僧于同里石門寺乃往為驅烏仲智竒其風骨亢爽俾至越之九巖從萬壑觀公遊授之內外典皆了逹大旨十九得度受具為大僧巳而嘆曰所貴為比丘者務欲究明心宗爾苟纏蔽文字相中何時能脫離邪竟杖䇿而出遍歷諸名山下語多不契復退潛一室加澄靜之力久之參普覺明公于靈隱靈隱列在五山僧指盈萬其門庭嚴峻未易叩擊公直入無畏問答之頃疑情盡釋普覺以其俊爽欣然印可之特命充堂司公不復辭振挈綱維四衆恱服尋還石門白巖貞公主真如豔禪師公制行之堅延居上座助揚正化聲聞燁然騰緇素間元重紀至元六年出世大雄山之安聖執香自敘實上嗣普覺之世人信之無異辭閲五年遷隆恩又二年輔白巖故處明年行宣政院選主龍華一座十三春秋百廢具興山門為之改觀公凡四坐道埸皆不出乎台境諸方欲倚之以為重競來聘致漠然若不聞作休庵于西塢日修淨土法門念佛三昧且曰此即禪定之功也惡可強分同異哉國朝洪武六年杭之中天竺寺以府侯之命起公主寺事公勉強應之行至錢塘江濵淨慈諸勤舊相與謀曰此大善知識胡可失也天竺尚可致吾屬獨不能邪帥衆邀于道擁居其位公屢却之不聽色頩然不怡時當歲儉問道者如雲糗粻方患不繼而施者踵至居二載擊鍵雅集衆再三申精進之戒手撾鼓而退歸卧竹院曶示微疾端坐西向召左右謂曰吾將逝矣左右進觚翰請書偈公麾去之曰吾宗本無言説乃合爪連稱佛號至聲漸微而寂時八年八月十一日也世夀六十九僧臘五十龕留七日顔貌不變用闍維法從事齒牙貫珠不壞設利羅光色晶瑩如金銀水精者遍滿于地見者聞者無不哀慕太息其徒自省等斂其不壞者并遺骼歸龍塔而藏焉公儀觀雄碩識見敻卓其于榮名利養視之如無物出專法席皆迫于不得巳會朝廷設善世院總統天下釋教事或勸公求檄以主名山公笑而不答然其所蒞之處不以恬退而不加之意必革其弊習新其規制使可貽于悠久所度弟子某等若干人得其法者則某某也五會語多肆口而説曽不經思四方先巳傳誦不俟刋行平居遇物成味率出人意表自省與文介類為十卷公戒勿示人亦不敢流布公之言論屢行為當時推重至于尊賢尚德推已及物尤非人之所及叢林孰不能言之兹可略云嗚呼大雄氏之設教法門雖廣其所以攝妄念明真性者則一而巳因根器之或不齊而誘掖化導之方不容不異有若思惟修之道與期生安養之功咸能拔迷津而升覺岸者也是故先德恆並行而不相悖宗照夀公得法于天台詔國師圓照本公傳道于天衣懷禪師二公兼修淨土之業俱有上品受生之徴載諸方䇿可考不誣今吾授公瀕沒之際又加跌西向念佛而化然而三公皆主乎淨慈者也何其重徽而疊照哉當必有其故矣昧者不察強謂觀念之未能忘于形迹乃好誇過髙之諭非事實也于是直書其故使知佛法無二致以為後來者之勸銘曰能仁立教廣開度門萬别千差終歸一源禪那之修曰祛忘慮觀念之勤亦依真住均為攝念奚分異同一心既昭衆法自融所以先德內而不外破妄顯真兼行無礙公由幼齡挺然弗羣有慕空宗留神竺墳法海冥茫屢形嘆息掬沙算之數何能畢持智慧刀斷其縶維八荒洞然不懸毫絲安養導師實我依怙一塵不立即為淨土空有俱息能所亦捐至無念處三昧現前出世鄉邦四占淨域化熱惱埸入清涼國黑白歆豔如渴思漿飛錫所及熙如春陽腳踏濤江來赴天竺中道要遮奪去何速南屏草木大根小莖法雨普沾軋者皆萌俄結雙趺稱佛而化金臺來迎白光交射何以驗之見于茶毗設利􅌭紜光如流離龍華之阿有塔如筍琢石鐫文為世規凖旌義編引浦江鄭氏世居縣東二十五里卿名感德里曰仁義其逺祖沖素處士綺自宋建炎𥘉至今同居巳十世歷二百五十餘年守詩書禮樂之教弗墜宋元二史俱載孝義傳中然其持守之規前録五十八則六世孫龍灣稅課提領大和所建後録七十則續録九十二則七世孫青摙府君欽江浙行省都事鉉所輔皆巳勒石鋟板當時公卿大夫士所遺詩文亦類為麟溪集二十二卷刋示後昆今八世孫太常博士濤復以為三規閲世頗久其中當有隨時變通者乃帥三弟泳澳湜白于二兄濂源同加損益而合于一其聞諸父之訓曾行而未登載者因增入之總為一百六十八則文辭之屬選有繫于事實者則録之釐為三卷通名曰旌義編既刻板可模印請言其故于篇端豫與源為姻家濤為同門友而泳等又皆執經從余學義不容辭嗚呼是編之行其于厚人倫美教化之道誠有益哉故浦江義門第八世鄭府君墓版文浦江義門其第八世主家政者曰鄭渭字伯陽宋龍遊丞德圭之曾孫東野處士文嗣之孫元贈中書禮部郎中鑑之子年七十二以洪武十年九月十九日終于家十一月二十四日葬于縣東三十里杉柏墓之原其子梴桶與其孫炯勳合辭請銘于太史氏濂濂乃為之銘曰維伯陽父自幼頴發佐諸父齊家才超然自見也泉布出納及米鹽細務一一鉤校使無所漏也更繇之繁身獨任之戴星往來踰三十春秋不憚煩也辭意懇欵一本諸誠無纎毫人偽也化行鄉邦三尺之童率皆信服爭呼之為長者也縣之大夫踵門問政告之以利病民隂受其賜也方嶽重臣嘉其篤純欲辟為從事辭不為也上繩祖武下儀曽循蹈矩彠晝夜兢兢自惕也大田以祭儼若祖考之臨勒石示訓戒勿質鬻之也合㸑十世中更亂離左抗而禦卒使危復安也羣從同樂熙熙然如春和氣襲人見者革面也宅心忠厚不動聲氣寧人加巳誓不先人也國𥘉定賦郡田一斛驟增其半白于當路而蠲之也姻家析資陳之以秉彛不以巳之親踈為厚薄人服其均且平也宗族有早孤者收而鞠之斂其租入逮長而悉歸之也有盜持斧斤入林僮往禦之反為盜所歐僮妻往護夫足墜塹死禁僮勿訟反遺之槥櫝也職此之故聞其捐館一郡為之出涕貴賤賢愚無間然也其妻吳𥙿字曰靜安能誦詩書為一家女師足以配君子也嗚呼世不逮古夫妻相虐而兄弟為仇比比皆然也有若伯陽父實中流之砥柱彛倫賴以扶樹名教賴以增重奈何去昭昭而就冥冥也青山不移流泉不改而形容不可復覩苟可贖之當人百其身也嗚呼勒銘斯阡言有盡而情無窮過者讀之不為之涕泗汍瀾非仁人也宋學士文集卷第五十三芝園後集卷第三
