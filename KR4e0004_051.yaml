  text: 宋學士文集卷第五十一芝園後集卷第一
  hash: sha256:3e7c847ec3e1d5937d7e4187fd2661a8ea5a3c6332568fd21180b5841c082727
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_051-1a}
body:
  text: 徐教授文集序曹丕有言文章者不朽之盛事其故何哉夫山之巍然有時而崩也川之泓然有時而竭也金與石至固且堅亦有時而銷泐也文辭所寄不越乎竹素之間而謂其能不朽者盖天地之間有形則弊文者道之所寓也道無形也其䏻致不朽也宜哉是故天地未判道在天地天地既分道在聖賢聖賢之殁道在六經凡存心養性之理窮神知化之方天人應感之機治忽存亡之候莫不畢書之皇極頼之以建彛倫頼之以叙人心頼之以正此豈細故也哉後之立言者必期無背扵經始可以言文不然不足以與此也是故揚沙走石飄忽奔放者非文也牛鬼蛇神佹誕不經而弗能宣通者非文也桑間濮上危絃促管徒使五音繁㑹而淫靡過度者非文也情縁憤怒辭專譏訕怨尤勃興和順不足者非文也縦横捭闔飾非助邪而務以欺人者非文也枯瘠苦澁棘喉滯吻讀之不復可句者非文也痩辭隱語雜以詼諧者非文也事類失倫序例弗謹黄鐘與瓦釡並陳春穠與秋枯並出雜亂無章刺眯人目者非文也臭腐塌茸厭厭不振如下俚衣装不中程度者非文也如斯之類不䏻偏舉也必也旋轉如乾坤輝映如日月闔闢如隂陽變化如風霆妙用同乎鬼神大之用天下國家小而為天下國家用始可以言文不然不足以與此也故所貴乎文者前乎千萬世而不見其始後乎千萬世而不知其終有不可一刻而離去者其䏻致不朽也宜哉丕也惡足以知之徒以魯國孔融等七子學無所遺辭無所假足以令聲名傳後而巳安知其文㢤傳有之言以足志文以足言言之無文行之不逺此則文之至者也文之至者文外無道道外無文粲然載扵道徳仁義之言者即道也秩然見諸禮樂刑政之具者即文也道積扵厥躬文不期工而自工不務明道縦若蠹魚出入扵方冊間雖至老死無片言可以近道也夫自孟氏既沒世不復有文賈長沙董江都太史遷得其皮膚韓吏部歐陽少師得其骨骼春陵河南横渠考亭五夫子得其心髄觀五夫子之所著妙斡造化而弗違百世以俟聖人而不惑斯文也非宋之文也唐虞三代之文也非唐虞三代之文也六經之文也文至扵六經至矣盡矣其始無愧扵文矣乎世之立言者奈何背而去之吾友天台徐君大章賦資絶倫自少學文即期以載道非六經所存不復輕寘念慮扵其間含積既乆燁然以文名江南洪武中嘗召入史舘與脩大明日曆遂出教授武林日以横經講道為事逺近生徒莫不趨之猶水之赴壑當脩日曆時予適為之緫裁每與大章論文竊嘆今之作者何其與古異也大章深以予之言為然去歲過武林獲觀其文集若干卷今山居多暇因徇大章門人之請漫為序其篇端嗚呼世有豪傑之士知文與道非二致者必以余說為不謬苟非其人則以好髙尚誇尤之矣予一聽焉無事乎辨也栁庵偈本然凈上士吳興人也問道扵净慈同庵禪師巳而充侍司陞主蔵經之室結廬苕谿上環植垂栁遂扁曰栁庵因以自號黄鶴仙人為繪成圖予謁同庵南屏山中本然乃来徵予說偈偈曰栁乃植物類既巳强名栁庵與栁異趣曷以栁名庵庵栁不相渉况復號諸人若使㑹于一適越而首燕雖欲强相從畢竟無合日咄兹繪事假非栁亦非庵庵中亦非人無一是真實咸因觚翰力幻出諸影像盲者来捫摸但見𥿄成軸絶類𣑽志家夢中而說夢重重皆虚妄誰為能覺者衆生强分别見異不見同世間諸品類随念各現前諸佛善圓融見同不見異萬彚方芸芸含攝盡歸一非指可喻指非馬可喻馬難以目之覩乃成心所障有人斯有庵内庵斯有栁三者無二相物我齊冥故上士志心聽我說栁庵偈白石雖點頭未嘗談一字松風閣記夫風者天地之噫氣然則生生者誰㢤生之者靜之體而應之者動之用也當其萬竅怒號前者唱于而随者唱喁咸物之自取也庭宇之松蒼髯奮傑扵晨露夕月之中遇鮮颷過之冷冷然如鸞鳯之鳴如琴瑟之音昔者陶隱居恒樂之後世幽人狷士又從而效之或取以名其室焉方外恬師靜庵来徴所謂松風閣記予請極其變者而言之可乎始風之未生也歛神功扵寂黙之中昏昏冥冥萬象雖具不見其跡天機一動随品物以流形大海遇之重波複浪一瀉萬里千山逢之鱗甲掀動笙鏞閒作經􅉉蔔之林則郁烈酣潤清芬之􅊞人入鮑魚之肆則腥穢逆鼻觸之而􅎪嘔如此者不可以一二数苟獨指松而爲言非所以極風之變者也然其變者豈皆有擊扵風之動㦲先覺有云風性本靜以縁起故動儻其性本動則寜有靜時是則物各有以自取也且以吾心言之大用繁興之時怒氣熾然如霆奔火烈喜色熈然如霧廓霞舒興哀則千人霣涕鼓勇則萬夫莫敵皆此一心之變也然心果有變乎心無變其所變者緑爾故當本體澄湛之際無物不有而無一物之留以近取譬所謂生之者靜之體而應之者動之用豈非然歟予家浦陽大山中青松羅桓舍之北南明月之夜白露𥘉零黙然出坐庭際松聲到耳乍大乍小或亟或徐中心頗樂之方知隱居酷愛之者良有以也自松聲而推之世間之聲萬變不齊雖不可勝窮其道亦不外是矣嘗一滴之醎而知滄海之性窺寸隙之光而見日輪之體又何以紛紜爲㢤恬師學佛之流故予極其變而告之湏知變之中而有不變者存不變者何前所謂心者是也心無體叚無方所無古今無起㓕三世諸佛不見其有餘河沙凢夫不見其不足恬師䏻索之扵此焉則松風朝夕所演無非大乗微妙之法隱居惡足以語此㢤閣在越之耶溪上季蘅若公之所建者因得徑山範公所書松風二大字遂揭以為名予謂徑山古之名徳其字不可䙝玩宜别求善書者易之既告之故復為記其事如右其詳則見天竺法師道公所為文其妙無以加矣予何言㦲永明智覺禪師遺像賛禪師諱延壽字冲玄餘杭王氏子也得法扵天台韶國師大弘法眼正宗華夷尊慕産下弟子至二千人凈慈禪寺蔵其遺像雖多歷年所儼若生存㑹濂過錢塘其住持同庵簡公以像求賛濂因造之而請同庵繕書其上賛曰我聞智覺大道師進脩精明無與等誦經羣羊来跪聽習定鳥巢衣襵中一旦撥𨳩光眀蔵際天蟠地悉𨳩朗如揭日月照羣迷無有擿埴索塗者諸法盡從䤸生㓕此實佛語非我語人知生㓕總由縁庻㡬不為識神惑因病發藥此為最何翅藥王奪命丹四性寂然本不生三知廣喻益親切有如慈母扵赤子煦嫗護持不少忘性相三宗互矛盾有礙如来正法輪更相質難辨異同折以一心歸覺路譬猶欲適長安者道塗紛紜走車馬或南或北或西東及其至䖏見不别呼為宗鏡名實稱萬别千差咸照了道髙非特𬒳真丹海外之邦尤企豔金絲伽黎及澡瓶遣使来施不復吝我與導師有宿因般若光中無去来今觀遺像重作禮忽悟三世了如幻靈山一㑹猶儼然願證如如大圓智魚籃觀音像賛予按觀音感應傳唐元和十二年陜右金沙灘上有羙豔女子挈籃粥魚人競欲室之女曰妾能授經一夕䏻誦普門品者事焉黎明䏻者二十女辭曰一身豈堪配衆夫邪請易金剛經如前期能者復居其半女又辭請易法華經期以三日唯馬氏子能女令具禮成昏入門女即死死即糜爛立盡遽瘞之他日有僧同馬氏子啓蔵觀之唯黄金鎻子骨存焉僧曰此觀音示現以化汝耳言訖飛空而去自是陜西多誦經者烏傷劉某命括人吳福用金碧畫成一燈月旦十五日展而謁焉請予序其事序以繫之賛曰惟我大士慈憫衆生耽着五欲不求觧脫乃化女子端嚴姝麗因其所慕導入善門一刹那間遽爾變壊昔如紅蓮芳豔􅊞人今則臭腐蟲蛆流蝕世間諸色本屬空假衆生愚癡謂假為真類蛾赴燈飛逐弗巳不至隕命何有止息當知實相圓同太虗無媸無妍誰能破壊大士之靈如月在天不分凈穢普皆照了凢皈依者得大饒益願即同歸薩婆若海蘿山遷居志余世居金華孝善里之潜谿其地在縣東七十里禪定院側溪之東即入義烏境元重紀至元元年乙亥正月十五日授經浦江義門鄭氏乆之以其家九葉同居乃願卜隣焉相地扵仁義里孝門橋之上其地直縣東三十里有山曰青蘿至正六年丙戌十月二十七日扵山趾建寝窒三楹間繚以周垣前敞小門十年庚寅二月十五日携家自金華来遷掲其扁曰潜谿示不忘本也十四年甲午十二月八日再搆前軒如寝室之数東西榮之屬以次告完扁軒曰青蘿山房因舊山而志新築也十八年戊戌六月十八日國兵取浦江遂避入諸暨兵雖定浦江當戎馬之衝不可居十九年己亥三月十五日還潜谿故廬越九載始重葺治扵是復来遷時國朝呉元年丁未四月一日也惟古人最重遷以墳墓在斯親戚在斯不敢輕扵棄去或去之必出扵勢之不得巳今予豈有他哉特欲薫漸孝義之風以朂我後人爾然蘿山之望潜溪朝發而夕至非若别郡千百里之逺宗屬之胥㑹先塋之展省固未嘗廢其與弗遷者𥘉何異㢤余既来遷偶閱宋嘉定末官給地劵所居左右曰宋公園園與予姓同亦似不偶然者豈其数或前定歟子子孫居扵此者毋析㸑毋爲不義母侵蝕比隣日衣𬒳乎詩書耕則爲良農學則爲良儒庶㡬不負予之志也題宋儒遺墨後鄉先生宗正丞朱公冠之甞以厲志自號袁正肅公廣微爲作大字書且造銘辭一通先生之志剛大堅勁袁公之銘雄渾剴切皆學者所當則傚裝裭成卷以示諸人理宜然也卷後附以童仲光詩仲光名必大嘉定丁丑進士官至知英徳府晚自號爲盤隱詩序之舉𥙿齋即馬華父東巖主人即虞從道也次附袁公荅書正先生令縉雲日所遣先是先生平反董氏冤獄袁公噐其材遂力舉其爲縣書稱毅齋即先生之師徐文清公崇父也次附丞相葉西澗鎮之書先生改官除幹辨行在諸司糧料院時所遣西澗試上舎時東巖㧞為兩優釋褐第一先生為東巖宻友故因縁締交此盖賀生辰囬劄也次附太中大夫王某書名将磨㓕不可辨不知為誰書中云望門墻数舍又稱契弟必先生鄊里人竊意義烏王氏宋季無為太中大夫者太中大夫雖從四品號為侍從官極不易致豈或旁縣之人邪次附馬荘敏公華父書書謂䝉齋老師者即袁也袁公之殁痛悼驚呼甚切則先生為國愛賢之誠可知矣惟是諸君子皆一時行義之士顧瞻遺墨儼若接乎容聲之間景行行止之心人孰無之為之掩卷太息而不䏻自巳也楚相府長史朱君伯清索題甚急即欲據筵䟽之其中多有可言者惜乎匆遽不能致詳也浦陽栖靜精舍記浦江縣東十五里其地曰花山地勢夷曠宜學佛者居之元至正己亥同縣凈住院沙門明叟昌公與其弟子無聞聦公卓錫于並晝夜以禪寂為務庚子建演法堂成辛丑佛闕成壬寅大佛寳殿成三門兩序庖庫像設以次咸具皆二公之締搆而諸徒智觀如玢䖏仁行滿竭力佐佑始克告完扵是置山林田園各若干畆用給薪米之費定為成規使甲乙相傳戒勿血食醪飲違佛大禁鷄鳴而起日入而息􅌊香𣑽唄以祝釐報上不敢怠遑昌公遂名之曰栖靜精舍云𥘉千巖禪師長公說法義烏伏龍山昌公實徃咨叩禪師憫其求道懇切示以禪要昌公遵行甚力逮夫功至心空一旦無疾辭衆而說偈云生本非生㓕亦無㓕撒手便行虚空片月說已端坐而逝時國朝洪武丙辰十月三日也昌公既順寂聦公繼之弗懈益䖍深懼来者不知植業之艱勤来徴予文為記俾嗣葺之以致悠乆予㳺䆠南京二十年今始納禄而歸州里之事皆若無聞知每見白麟溪隱者鄭源談昌公之制行甚峻而左溪曰師亦備道聦公護戒絶謹因不讓而為之言曰佛之妙法如芬陀利華雖生扵水不着扵水清凈自然無所染汚故契經有云扵身無所取扵脩無所著扵法無所住所以然者盖恐堕扵有漏之因也然而根有勝劣功有偏圓未可一軌齊之𥘉機之士必假法像以攝麄執積乆馴熟至扵心法兩忘始為得之不宜遽謂崇建塔廟之為非也從有漏以至無漏法門次苐豈不粲然可徴者乎昌公之建立扵𥘉栖禪靜寂洞徹心源談笑去来曽無留礙此又非明效大驗乎嗣守之者宜鑑昌公之所證毋廢其舊規毋墮其成事缺則𥙷而葺之弊則更而新之庶㡬不墜前人之志可以入善提之門而超煩惱之海矣乎昔我大雄世尊以聖賢天人脩行住䖏付嘱星宿天龍藥义大鬼神䓁分布守護故凡佛刹之所營創幽明之際必有尸之者矣豈曰偶然之故㢤不惟僧伽之徒當繼承惟謹世之宰官及賢士大夫多寳長者亦思因果之不昧相與護持之使其永勿壊可也是為記故上虞魏君妻馮夫人墓志銘上虞魏君道全既䘮其妻夫人哀悼不置乃自摭羣行為書一通遣其子倫来浦陽江上徴予述隧道之銘嗚呼夫婦為五倫之始生則愛恤殁又䏻致思而圖其不朽庸非盡其道者邪是可銘巳夫人諱淑貞姓馮氏越之餘姚人父諱伯玉熈行素洽扵鄊娶魏氏生三女子夫人其季也賦資柔慤父母尤所鍾愛非簮纓之家不行時魏君之父諱夀康實唐文貞公徴二十四世孫又以貲雄于時書詩爼豆之習翕然播于儒林間文獻黄公溍内翰柳公貫著作李公孝光咸相與過從釃酒賦詩至浹日始去其子弟彬彬雅馴亦重為昏姻未嘗輕就聞馮氏有賢女乃以禮聘歸之夫人既至孝事尊章如孝親友娣姒如女兄弟敬夫如見大賔匡𥙷賛助無所不致其情臨諸子如嚴師一動一靜悉規之以凖繩不使尺寸踰越夫人雖生貴富家自㓜不樂紛華靡麗之飭澹然能自安年踰五十猶服勤絲枲不衰馭傔人媵女亦各有法恩義並至退無後言者閭里貧窶之人苟有稱貸多不責其償月旦之評謂夫人嚴而䏻恭儉而䏻惠信不誣矣生四子長泰次倫以才學推擇為中書宣使轉𥙷直省舍人次樟蚤夭次良夫人生扵元延祐元年二月二十二日卒扵國朝洪武九年四月十六日享年六十有三明年十二月十七日葬扵縣北四十五里伏虎山之原禮也嗚呼自古以来公侯卿大夫下逮士庻人之家無不資内助以為治所以順隂陽辨内外一上下也傳記之所載盖班班可考不誣後世此義或乖遂致巧言如簧而斁倫害政反為家旤君子毎為之慨焉永嘆有若魏君名閥之後防範固有異扵人亦由夫人左右之力為多予甚嘉其行特製銘辭𬒳諸金石以厲世之為人婦者銘曰夫人之行貞而醇相家有道惟孝勤匑匑色養先見聞推此以逹和氣殷秩然有序天則均服循組紃忘眀曛素紈視作錦繡文如此儉徳乆且馴陽隂順軌榮光臻死生有如晝夜輪聞之孰不心酸辛青山欝盤類虎蹲松柏丸丸夾墓門護此靈魄千載存後人慎勿摧為薪宋學士文集卷第五十一芝園後集卷第一
