  text: 宋學士文集卷第五十一芝園後集卷第一
  hash: sha256:3e7c847ec3e1d5937d7e4187fd2661a8ea5a3c6332568fd21180b5841c082727
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_051-1a}
body:
  text: 徐教授文集序曹丕有言文章者不朽之盛事其故何哉夫山之巍然有時而崩也川之泓然有時而竭也金與石至固且堅亦有時而銷泐也文辭所寄不越乎竹素之間而謂其能不朽者蓋天地之間有形則弊文者道之所寓也道無形也其能致不朽也宜哉是故天地未判道在天地天地既分道在聖賢聖賢之殁道在六經凡存心養性之理窮神知化之方天人應感之機治忽存亡之候莫不畢書之皇極賴之以建彛倫賴之以敘人心賴之以正此豈細故也哉後之立言者必期無背于經始可以言文不然不足以與此也是故揚沙走石飄忽奔放者非文也牛鬼蛇神佹誕不經而弗能宣通者非文也桑間濮上危絃促管徒使五音繁會而淫靡過度者非文也情緣憤怒辭專譏訕怨尤勃興和順不足者非文也縱橫捭闔飾非助邪而務以欺人者非文也枯瘠苦澀棘喉滯吻讀之不復可句者非文也瘦辭隱語雜以詼諧者非文也事類失倫序例弗謹黃鐘與瓦釡並陳春穠與秋枯並出雜亂無章刺眯人目者非文也臭腐塌茸厭厭不振如下俚衣裝不中程度者非文也如斯之類不能偏舉也必也旋轉如乾坤輝映如日月闔闢如隂陽變化如風霆妙用同乎鬼神大之用天下國家小而為天下國家用始可以言文不然不足以與此也故所貴乎文者前乎千萬世而不見其始後乎千萬世而不知其終有不可一刻而離去者其能致不朽也宜哉丕也惡足以知之徒以魯國孔融等七子學無所遺辭無所假足以令聲名傳後而巳安知其文哉傳有之言以足志文以足言言之無文行之不逺此則文之至者也文之至者文外無道道外無文粲然載于道德仁義之言者即道也秩然見諸禮樂刑政之具者即文也道積于厥躬文不期工而自工不務明道縱若蠹魚出入于方册間雖至老死無片言可以近道也夫自孟氏既沒世不復有文賈長沙董江都太史遷得其皮膚韓吏部歐陽少師得其骨骼春陵河南橫渠考亭五夫子得其心髓觀五夫子之所著妙斡造化而弗違百世以俟聖人而不惑斯文也非宋之文也唐虞三代之文也非唐虞三代之文也六經之文也文至于六經至矣盡矣其始無愧于文矣乎世之立言者奈何背而去之吾友天台徐君大章賦資絶倫自少學文即期以載道非六經所存不復輕置念慮于其間含積既久燁然以文名江南洪武中嘗召入史館與修大明日曆遂出教授武林日以橫經講道為事逺近生徒莫不趨之猶水之赴壑當修日曆時豫適為之總裁每與大章論文竊嘆今之作者何其與古異也大章深以豫之言為然去歲過武林獲觀其文集若干卷今山居多暇因徇大章門人之請漫為序其篇端嗚呼世有豪傑之士知文與道非二致者必以余説為不謬苟非其人則以好髙尚誇尤之矣豫一聽焉無事乎辨也栁庵偈本然淨上士吳興人也問道于淨慈同庵禪師巳而充侍司升主藏經之室結廬苕溪上環植垂栁遂扁曰栁庵因以自號黃鶴仙人為繪成圖豫謁同庵南屏山中本然乃來徵豫説偈偈曰栁乃植物類既巳強名栁庵與栁異趣曷以栁名庵庵栁不相涉况復號諸人若使會于一適越而首燕雖欲強相從畢竟無合日咄兹繪事假非栁亦非庵庵中亦非人無一是真實咸因觚翰力幻出諸影像盲者來捫摸但見𥿄成軸絶類𣑽志家夢中而説夢重重皆虛妄誰為能覺者衆生強分别見異不見同世間諸品類隨念各現前諸佛善圓融見同不見異萬彚方藝藝含攝盡歸一非指可喻指非馬可喻馬難以目之覩乃成心所障有人斯有庵內庵斯有栁三者無二相物我齊冥故上士志心聽我説栁庵偈白石雖點頭未嘗談一字松風閣記夫風者天地之噫氣然則生生者誰哉生之者靜之體而應之者動之用也當其萬竅怒號前者唱于而隨者唱喁咸物之自取也庭宇之松蒼髯奮傑于晨露夕月之中遇鮮颷過之冷冷然如鸞鳯之鳴如琴瑟之音昔者陶隱居恆樂之後世幽人狷士又從而效之或取以名其室焉方外恬師靜庵來徴所謂松風閣記豫請極其變者而言之可乎始風之未生也斂神功于寂默之中昏昏冥冥萬象雖具不見其迹天機一動隨品物以流形大海遇之重波復浪一瀉萬里千山逢之鱗甲掀動笙鏞間作經􅉉蔔之林則郁烈酣潤清芬之􅊞人入鮑魚之肆則腥穢逆鼻觸之而􅎪嘔如此者不可以一二數苟獨指松而為言非所以極風之變者也然其變者豈皆有擊于風之動哉先覺有云風性本靜以緣起故動儻其性本動則寧有靜時是則物各有以自取也且以吾心言之大用繁興之時怒氣熾然如霆奔火烈喜色熙然如霧廓霞舒興哀則千人霣涕鼓勇則萬夫莫敵皆此一心之變也然心果有變乎心無變其所變者緑爾故當本體澄湛之際無物不有而無一物之留以近取譬所謂生之者靜之體而應之者動之用豈非然歟豫家浦陽大山中青松羅桓舍之北南明月之夜白露𥘉零默然出坐庭際松聲到耳乍大乍小或亟或徐中心頗樂之方知隱居酷愛之者良有以也自松聲而推之世間之聲萬變不齊雖不可勝窮其道亦不外是矣嘗一滴之醎而知滄海之性窺寸隙之光而見日輪之體又何以紛紜為哉恬師學佛之流故豫極其變而告之須知變之中而有不變者存不變者何前所謂心者是也心無體假無方所無古今無起滅三世諸佛不見其有餘河沙凡夫不見其不足恬師能索之于此焉則松風朝夕所演無非大乘微妙之法隱居惡足以語此哉閣在越之耶溪上季蘅若公之所建者因得徑山範公所書松風二大字遂揭以為名豫謂徑山古之名德其字不可褻玩宜别求善書者易之既告之故復為記其事如右其詳則見天竺法師道公所為文其妙無以加矣豫何言哉永明智覺禪師遺像贊禪師諱延壽字沖玄餘杭王氏子也得法于天台韶國師大弘法眼正宗華夷尊慕産下弟子至二千人淨慈禪寺藏其遺像雖多歷年所儼若生存會濂過錢塘其住持同庵簡公以像求贊濂因造之而請同庵繕書其上贊曰我聞智覺大道師進修精明無與等誦經羣羊來跪聽習定鳥巢衣褶中一旦撥開光眀藏際天蟠地悉開朗如揭日月照羣迷無有擲埴索塗者諸法盡從鏦生滅此實佛語非我語人知生滅總由緣庶幾不為識神惑因病發藥此為最何翅藥王奪命丹四性寂然本不生三知廣喻益親切有如慈母于赤子煦嫗護持不少忘性相三宗互矛盾有礙如來正法輪更相質難辨異同折以一心歸覺路譬猶欲適長安者道塗紛紜走車馬或南或北或西東及其至處見不别呼為宗鏡名實稱萬别千差咸照了道髙非特𬒳真丹海外之邦尤企豔金絲伽黎及澡瓶遣使來施不復吝我與導師有宿因般若光中無去來今觀遺像重作禮忽悟三世了如幻靈山一會猶儼然願證如如大圓智魚籃觀音像贊豫按觀音感應傳唐元和十二年陜右金沙灘上有美豔女子挈籃粥魚人競欲室之女曰妾能授經一夕能誦普門品者事焉黎明能者二十女辭曰一身豈堪配衆夫邪請易金剛經如前期能者復居其半女又辭請易法華經期以三日唯馬氏子能女令具禮成昏入門女即死死即糜爛立盡遽瘞之他日有僧同馬氏子啓藏觀之唯黃金鎖子骨存焉僧曰此觀音示現以化汝耳言訖飛空而去自是陜西多誦經者烏傷劉某命括人吳福用金碧畫成一燈月旦十五日展而謁焉請豫序其事序以繫之贊曰惟我大士慈憫衆生耽著五欲不求解脫乃化女子端嚴姝麗因其所慕導入善門一剎那間遽爾變壞昔如紅蓮芳豔􅊞人今則臭腐蟲蛆流蝕世間諸色本屬空假衆生愚癡謂假為真類蛾赴燈飛逐弗巳不至隕命何有止息當知實相圓同太虗無媸無妍誰能破壞大士之靈如月在天不分淨穢普皆照了凡皈依者得大饒益願即同歸薩婆若海蘿山遷居志余世居金華孝善里之潛溪其地在縣東七十里禪定院側溪之東即入義烏境元重紀至元元年乙亥正月十五日授經浦江義門鄭氏久之以其家九葉同居乃願卜鄰焉相地于仁義里孝門橋之上其地直縣東三十里有山曰青蘿至正六年丙戌十月二十七日于山趾建寢窒三楹間繚以周垣前敞小門十年庚寅二月十五日携家自金華來遷揭其扁曰潛溪示不忘本也十四年甲午十二月八日再搆前軒如寢室之數東西榮之屬以次告完扁軒曰青蘿山房因舊山而志新築也十八年戊戌六月十八日國兵取浦江遂避入諸暨兵雖定浦江當戎馬之衝不可居十九年己亥三月十五日還潛溪故廬越九載始重葺治于是復來遷時國朝吳元年丁未四月一日也惟古人最重遷以墳墓在斯親戚在斯不敢輕于棄去或去之必出于勢之不得巳今豫豈有他哉特欲薰漸孝義之風以朂我後人爾然蘿山之望潛溪朝發而夕至非若别郡千百里之逺宗屬之胥會先塋之展省固未嘗廢其與弗遷者𥘉何異哉余既來遷偶閲宋嘉定末官給地劵所居左右曰宋公園園與豫姓同亦似不偶然者豈其數或前定歟子子孫居于此者毋析㸑毋為不義母侵蝕比鄰日衣𬒳乎詩書耕則為良農學則為良儒庶幾不負豫之志也題宋儒遺墨後鄉先生宗正丞朱公冠之嘗以厲志自號袁正肅公廣微為作大字書且造銘辭一通先生之志剛大堅徑袁公之銘雄渾剴切皆學者所當則效裝裭成卷以示諸人理宜然也卷後附以童仲光詩仲光名必大嘉定丁丑進士官至知英德府晚自號為盤隱詩序之舉𥙿齋即馬華父東巖主人即虞從道也次附袁公答書正先生令縉雲日所遣先是先生平反董氏冤獄袁公器其材遂力舉其為縣書稱毅齋即先生之師徐文清公崇父也次附丞相葉西澗鎮之書先生改官除幹辨行在諸司糧料院時所遣西澗試上舍時東巖拔為兩優釋褐第一先生為東巖密友故因緣締交此蓋賀生辰回劄也次附太中大夫王某書名將磨滅不可辨不知為誰書中云望門墻數舍又稱契弟必先生鄊里人竊意義烏王氏宋季無為太中大夫者太中大夫雖從四品號為侍從官極不易致豈或旁縣之人邪次附馬莊敏公華父書書謂蒙齋老師者即袁也袁公之殁痛悼驚呼甚切則先生為國愛賢之誠可知矣惟是諸君子皆一時行義之士顧瞻遺墨儼若接乎容聲之間景行行止之心人孰無之為之掩卷太息而不能自巳也楚相府長史朱君伯清索題甚急即欲據筵疏之其中多有可言者惜乎匆遽不能致詳也浦陽栖靜精舍記浦江縣東十五里其地曰花山地勢夷曠宜學佛者居之元至正己亥同縣淨住院沙門明叟昌公與其弟子無聞聰公卓錫于並晝夜以禪寂為務庚子建演法堂成辛丑佛闕成壬寅大佛寶殿成三門兩序庖庫像設以次咸具皆二公之締搆而諸徒智觀如玢處仁行滿竭力佐佑始克告完于是置山林田園各若干畝用給薪米之費定為成規使甲乙相傳戒勿血食醪飲違佛大禁雞鳴而起日入而息􅌊香𣑽唄以祝釐報上不敢怠遑昌公遂名之曰栖靜精舍云𥘉千巖禪師長公説法義烏伏龍山昌公實往咨叩禪師憫其求道懇切示以禪要昌公遵行甚力逮夫功至心空一旦無疾辭衆而説偈云生本非生滅亦無滅撒手便行虛空片月説已端坐而逝時國朝洪武丙辰十月三日也昌公既順寂聰公繼之弗懈益虔深懼來者不知植業之艱勤來徴豫文為記俾嗣葺之以致悠久豫遊宦南京二十年今始納祿而歸州里之事皆若無聞知每見白麟溪隱者鄭源談昌公之制行甚峻而左溪曰師亦備道聰公護戒絶謹因不讓而為之言曰佛之妙法如芬陀利華雖生于水不著于水清淨自然無所染汚故契經有云于身無所取于修無所著于法無所住所以然者蓋恐墮于有漏之因也然而根有勝劣功有偏圓未可一軌齊之𥘉機之士必假法像以攝粗執積久馴熟至于心法兩忘始為得之不宜遽謂崇建塔廟之為非也從有漏以至無漏法門次苐豈不粲然可徴者乎昌公之建立于𥘉栖禪靜寂洞徹心源談笑去來曽無留礙此又非明效大驗乎嗣守之者宜鑑昌公之所證毋廢其舊規毋墮其成事缺則輔而葺之弊則更而新之庶幾不墜前人之志可以入善提之門而超煩惱之海矣乎昔我大雄世尊以聖賢天人修行住處付囑星宿天龍藥義大鬼神等分布守護故凡佛剎之所營創幽明之際必有尸之者矣豈曰偶然之故哉不惟僧伽之徒當繼承惟謹世之宰官及賢士大夫多寶長者亦思因果之不昧相與護持之使其永勿壞可也是為記故上虞魏君妻馮夫人墓志銘上虞魏君道全既喪其妻夫人哀悼不置乃自托羣行為書一通遣其子倫來浦陽江上徴豫述隧道之銘嗚呼夫婦為五倫之始生則愛恤殁又能致思而圖其不朽庸非盡其道者邪是可銘巳夫人諱淑貞姓馮氏越之餘姚人父諱伯玉熙行素洽于鄊娶魏氏生三女子夫人其季也賦資柔慤父母尤所鍾愛非簮纓之家不行時魏君之父諱夀康實唐文貞公徴二十四世孫又以資雄于時書詩爼豆之習翕然播于儒林間文獻黃公溍內翰柳公貫著作李公孝光咸相與過從釃酒賦詩至浹日始去其子弟彬彬雅馴亦重為昏姻未嘗輕就聞馮氏有賢女乃以禮聘歸之夫人既至孝事尊章如孝親友娣姒如女兄弟敬夫如見大賔匡輔贊助無所不致其情臨諸子如嚴師一動一靜悉規之以凖繩不使尺寸踰越夫人雖生貴富家自幼不樂紛華靡麗之飭淡然能自安年踰五十猶服勤絲枲不衰馭傔人媵女亦各有法恩義並至退無後言者閭里貧窶之人苟有稱貸多不責其償月旦之評謂夫人嚴而能恭儉而能惠信不誣矣生四子長泰次倫以才學推擇為中書宣使轉輔直省舍人次樟蚤夭次良夫人生于元延祐元年二月二十二日卒于國朝洪武九年四月十六日享年六十有三明年十二月十七日葬于縣北四十五里伏虎山之原禮也嗚呼自古以來公侯卿大夫下逮士庶人之家無不資內助以為治所以順隂陽辨內外一上下也傳記之所載蓋班班可考不誣後世此義或乖遂致巧言如簧而斁倫害政反為家禍君子每為之慨焉永嘆有若魏君名閥之後防範固有異于人亦由夫人左右之力為多豫甚嘉其行特製銘辭𬒳諸金石以厲世之為人婦者銘曰夫人之行貞而醇相家有道惟孝勤匑匑色養先見聞推此以逹和氣殷秩然有序天則均服循組紃忘眀曛素紈視作錦繡文如此儉德久且馴陽隂順軌榮光臻死生有如晝夜輪聞之孰不心酸辛青山鬱盤類虎蹲松柏丸丸夾墓門護此靈魄千載存後人慎勿摧為薪宋學士文集卷第五十一芝園後集卷第一
