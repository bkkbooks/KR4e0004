body:
  text: 故紹慶路儒學正栁府君墓誌銘浦陽桞府君諱卣字致明宋迪功郎嘉興府崇徳縣主簿諱𥙷之之曽孫忠翊郎髙郵軍髙郵縣令元贈奉訓大夫淮安路泗州知州飛騎尉追封浦江縣男諱金之孫翰林待制承務郎兼國史院編脩官諱貫之子府君為兒時重遅不戯潜心扵問學及壮益孳孳自治端凝簡靜若對嚴賔師待制公宦㳺中外者乆家政悉寄府君能斬斬不紊撫世酬物即始而慮終壹歸于誠内翰杜公本修撰張公樞極相推許且謂其不艶榮利有古逸民風淅西部使者聞其賢辟為書吏辭繼以薦者署紹慶路學正亦辭大布寛衣徜徉烟霞泉石間超然自得武威余忠宣公闕来僉淅東憲府行縣過其家深加敬畏退語人曰待制公有子矣元季兵亂府君抱先世遺文潜伏岩穴餘悉不問未㡬家貲旣于盗府君絶無憂色人慰之輙曰此亦命也徒憂将何爲夀七十一以至正已亥十月甲子卒十二月甲申塟通化桐柏橋之東配東陽潘氏有賢行子三長秬夭次穎信之永豊尉贅居興賢女氏後七年卒次穆循循雅飾能繼家學者孫四士唯士忠士恕士魯孫女二適葛信方文烜曽孫男一本濂也不敏受業待制公門與府君交甚洽而濂兄之孫女㬊又歸府君從子穟今穆来徴銘乃造銘曰翁以文嗚發其和平化孚于家庭象賢惟明以繼以承以振其休聲南澗子包公碣烏傷縣西四十里爲南澗子所居其鄊曰智者里名修政南澗子生扵宋咸淳乙丑九月三十日眉目秀整倍書學文皆過人年五歲見伯父記飲中八仙及大曆十才子名随記随失南澗子牽衣問曰翁何徤忘耶兒雖耳聞已熟扵心矣因歷數以對翁大驚及長鋭然尚友古人朝負耒出耕稍睱輙躬親杵􅍫井竈之事及入夜方懸燈挾册琅琅聲不絶終能暗誦春秋左氏傳三十㢧一字不遺名動遐邇閭右之族争聘致爲弟子師南澗子專以講觧章㫖爲第一義且曰自先世逮吾凡十世皆以教授學徒爲業其所相傳不過如此而巳弟子遵其教者皆不悖師說爲良士性嗜酒雖至百觴不亂當酣適之際岸巾獨坐髙歌八韵律賦抑揚髙下音節極可聴聞者猶能識前進風致濂之祖太常府君與南澗子相友善甞延扵家塾俾諸孫師事之而濂甫十二齡亦預其列操觚賦詩動輒十餘首南澗子酷愛之旣而濂以家單稍不事觚翰南澗子移書扵先君尚書公曰公之子終成偉噐豈可使嬰世利而志不專耶外物去来猶春花之開落唯問學乃身中之至實耳先君深悟其言命擔簦逺游至今幸忝簮纓之末皆助導之功也南澗子無機心撫世酬物洞逹出肺腑相示人無賢不肖皆樂親之夀七十二以重紀至元丙子二月十二日卒瀕卒危坐賦詩有脫胎換骨之句俄頃而逝其年十二月二十四日塟于家後五十歩祔祖塋也南澗子諱廷藻字文叔自號南澗姓包氏出合肥孝肅公拯之裔公之子綬生夀年壽年生執中𥘉遷天台執中生通直再遷金華之松溪通直生冀之冀之生昶三遷扵今里昶生凱凱生震震生文煥南澗子父也母盧氏望江丞殷之女繼邢氏南澗子娶史氏生五子士瑞士祥士安士梁士華孫五人文貞文星文旺文彬文賢士梁有學行善繼父業與濂丱角締交間以墓文為屬濂㳺䆠南京二十年乆不克為今年春蒙恩致政而歸士梁復竭蹷而来以申前請近甞謁拜墓下寒草凄迷徒増古今之感乃書其所知者以授士梁不待状之所具也銘曰師道之立善人斯多奕葉傳經無敢訛才良俗善資漸摩何以表之銘澗阿義烏王府君墓誌銘烏傷溪上有王府君者夀五十八以洪武九年夏五月丁已卒家十年春二月壬申塟于同義鄊下澤山之原素服而臨塟者千有餘人皆洒涕而去盖府君忠厚君子也諱順字性之自㓜嗜學甞登許文懿公之門讀書必𣣔見之躬行使物𬒳其澤里有大皷湖瀦水灌田五千畆有竒歲乆岸且崩天稍不雨田咸作亀兆折民遑遑不自寧府君嘆曰此非我之責耶即集众興築之約田而輸作有差自出布錢鑿石作水門視時溢乹而畜洩之民得大利朝廷營建宫室徴木石之工扵郡縣縣吏胥並縁爲姦利不問老㓜癈疾之不可任悉上其名索之弗得輒捕比鄰以代鷄犬不得寧府君白扵縣覈實而作新籍凡有徴發按籍輪役之村疃之中痒痾疾痛者急不能注善藥府君儲峙一室或有求者施之無吝色然恐察之不精且與名士朱君震亯講切内經之說汲汲以濟人爲務鄊閭有单寠者出粟菽相貸而不録其息没則給槥櫝之逋錢乆不䏻庚則焚其劵府君猶以爲未足復謂移風易俗必本扵學乃建書塾招良師會鄊族俊秀俾子弟與之共學甚貧者輒周以羞服月旦十五日具觴豆延其父兄列坐左右立諸生扵堂下府君正衣冠中居以孝弟睦婣之道誘掖而飭導之縣大夫賢其爲人頋左右曰若王性之者豈非一鄊之善士㢤凡持牒来訴有及昏􅊚貲産者下府君調觧之人服其公取决片言之間不復重有辭田賦移易不常官欲重輯之以㝎科繇同義一郷府君實與鈎校之任積弊盡削無敢上下其手者府君遂欲進均役之䇿會病卒乃止大夫聞之頓足曰良士亡矣柰何太息者乆之府君性樂易未甞有憂色見人爲一善事喜動容貌毎行鄊飲酒禮捧大明律寘几案間諄諄爲人講觧使之心領神㑹不敢為非間居無事焚香皷琴以自樂四方賢士無不碩與之交有納交者雖乆留而不厭好法書名畫不翅金玊然顛沛流離亦挾以俱往通周易有所謀為則必揲蓍玩占所言凶吉多驗曽祖益之宋季為越之校官祖文繼父栖妣曽朱二氏妻凡三娶諸助何璉皆先卒今惟朱某存子男子三演溢淳子女子三諸宗陳亨吴童其婿也孫男五至淑至剛至和至誠至隆孫女四皆在室府君旣塟之六月演請同縣宗潤集其行為書一通介學子童徽来謁文古者族則有師閭則有胥各掌其戒令教治屬民讀邦法而書其孝弟睦婣有學者校登夫家衆寡辨其老㓜廢疾之可任者至扵役國事相塟埋之事無不備極其情意嗚呼府君之行何其甚類之使一里得府君焉則一里寧一鄊得府君焉則一鄊治一邑得府君焉則一邑之民咸得其所矣視彼剥蝕扵人扼其喉而盬其腦者抑何逺㢤不可以不銘也其詞曰位不冠纓而惠孚扵民仁矣㢤若人是非紛紜而折以片言信矣㢤若人文質彬彬而令譽振振君子㢤若人銘以昭之掲扵墓門故樓景元甫墓碣禮有之凡有道者有徳者使教焉死則以為樂祖祭扵瞽宗此之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生之類是已嗚呼古禮不行乆矣今之所謂鄊先生者得不近之歟鄊先生謂誰烏傷竹山里有樓君景元以書詩教子其鄊景元日坐臯比申飭五倫之教亹亹不自休受其學者攝其觕踈歸扵宻微必充然有得而後止父旣師之其子又繼之其孫又執經從之先後垂六十年環境之内外率皆其弟子矣扵是相與謀築書齋一區以為講授之地暨殁而塟號泣而執紼者數百人咸曰吾先生亡矣何所受業而辨惑㢤觀者歎慕而去𥘉景元之父玊汝翁習六藝而文景元㓜服家庭之訓長益自振厲從淵頴先生吴公立夫為科目之學未㡬棄去而專攻羣經間發扵詩亦首尾開闔皆中矩度名著逺近縣大夫或出鄊咸望閭欵謁詢以民間利病必懇懇縷陳之乃已景元性淵慤事親䏻盡其養親死經紀䘮事不以煩諸兄諸兄性方嚴景元承事惟謹迨至分田唯受磽瘠者不辭其後兄子有黜其業者為贖而歸之且曰烏可使其無食也遇族婣故舊壹以誠相接無一毫狎昵態晚歲頗好神仙家言杖䇿㳺江東登龍虎名山騁目逺望翛翛然獨立物表意謂古仙人或可見云洪武七年甲寅十月十一日以疾卒于家年七十九臨啓手足無他言唯戒諸子以守詩書之澤使勿墜九年丙辰正月六日奉柩塟于梅口山先瑩之次景元諱光亨景元字也姓樓氏樓故為䆠族宋嘉㝎癸未進士通判吉州元齡其四世從祖也曽大父炎大父建中父有成無為路儒學録即王汝翁也娶劉氏有婦徳濂甞為銘其墓男子四人女子四人孫男三人孫女四人名皆具前銘中茲不書濂今春蒙恩致政而還蘿山景元季子仁夀縣主簿璉件繫羣行而来請曰先夫人之終辱先生賜之銘甫及二載而先君又卒先君平日甞言知我者唯太史公宋君我死若求文䥴墓上吾目暝矣用是不避譴呵重有所瀆願先生進之濂之先廬與景元宻邇而景元長濂僅一十四歲相與論文甚驩聞景元死涕落不䏻牧近雖老病四方求文者類多峻辭其扵景元可得而忘情乎若吾景元生能執詩書之業以淑諸人誠無愧扵鄊先生者死雖未及祭之扵社銘以列之豈過也㢤銘曰一卷之書必立之師牗民孔易斯徳所歸懿㢤樓君侃侃令儀執經據座析分毫絲環而聴者肅其冠衣聚精會神臻于泰熈春融天衷蝉蛻人私俗變淳龎寔由于茲生服明訓殁寓哀思有素者冠溢于中逵彼位崇階澤不下施人孰無舌不一道之太史造銘公厥是非觀者冝式知無愧辭題黙成居士矯齋記後右矯齋記一首黙成先生潘公為同宗伯益作伯益名好謙實復州史君宗囬之子性嗜文史恂恂而馴飭歷官自麗水尉至通判紹興府以終先是伯益從子景良景憲受業吕成公朱文公之門故成公之女歸于景良而景憲之女又適文公長子塾故伯益扵二公之學亦與有聞焉今觀先生以矯名其齋則其志之所存盖可見矣烏傷吴生故衣冠鉅族嗜學成癖尤攻扵詩文太常博士鄭君仲舒生之舅氏也以生可進扵道遂因其字曰仲矯者書先生之記以為朂嗟夫先生楊文靖公之弟子也立朝大節足以㢘頑立儒故文公以剛毅近仁稱之此無他矯之之功也伯益受先生之教扵二百餘年之前仲矯聞先生之言扵二百餘載之後其有𥙷扵身心一也奚必並世而同時㢤借使同時之士有善為文辭者雖揮千百字之多未必敵三百九十二言之簡也仲舒亦可謂善教者矣仲矯尚勉之㢤洪武十年八月十三日前翰林學士承㫖金華宋濂記題李伯時飛騎習射圖濂屡見李伯時飛騎習射圖其描寫位置如一所畫錦𫀆乗馬者四人前一人揵而馳反首左頋右手拽繡毬扵馬後箭中毬上次一人弯弧斫鬉作放箭勢乎猶髙舉未下樓大防詩所謂前騎長纓拖繡毬後騎射中如星流者是也次一人左執弓右持三夭其馬如飛以欲追射毬者最後植青楊枝于平沙繫以絳綃一人躍馬向前斜睨而射之章良能詩所謂紅綃低繋栁枝碧滿滿関弓斫鬃射者是也盖伯時應奉廷試時所見衛士班中飛騎習射拖毬楊枝之戯故追圖若此其精神流動全用篆籕筆寫成固不俟讃羙惜乎此卷但存第二騎餘皆失之終不得其全璧濂囙據所見備書之使讀者瞭然如見畫亦𥙷亡之一義云題趙府君墓銘後右虞文靖公所撰趙府君墓銘府君之子永新使君既摹入石復装潢成卷自題其末使君之子彦方經兵變之後䏻藏弆而勿失携至青蘿山請予識之嗚呼世所貴孝子慈孫者以其表先徳保遺物而已彦方父子其有焉濂雖不敏不能不志慕豔之私也白鹿生小傳白鹿生者諸暨之人也風神俊爽翹然欲超羣其外族曰方建塾聘賢傳舘四方㳺學士生徃受諸經領其玄㫖稍事文墨輙峻潔如淵珠衆譁曰生賦資絶倫非積功所可及盍遜其一席地聲光流婺越間煜煜能動人競要遮作州閭師類弗應浦陽江上有鄭氏一宗累五十室同案而饍戒子姓執贄致辭生躍然興曰是或可為也即日上道臯比中居以倡道為已責與諸生言必稱曰昔之人昔之人日摩月切操行有可觀歷十春秋自以精明不逮前時退居白鹿山戴㯶冠𬒳羊皮裘帶經耕烟雨間暇則吟風弄月傲晲萬象若不知古今之殊軌有識者莫能窮其際髙郵欒鳯来為州牧獨造門拜曰鳯聞先生賢言行無悖古先哲人願為一州學子師生牢讓不起鳯不得已令閭右子弟即其家問道州政有闕失鳯必移書諮訪生白以利病禆助弘多後若干載殿中侍御史唐鐸出守越欲辟起之生力辭如前鐸不敢強生性醇篤無銖髮矯偽與人語出肺肝相示恥為覆藏事乖名義峻言斥之弗少恕家無儋石儲臨財甚介山泯誤坐法當死生憫其惷愚謀諸鄊鄙活之泯輟烏犍為謝生拒之泯頓顙于地潸然隕涕生曰東作方興非牛何以耕俟三冬或可爾至期泯復来請生反覆譬曉之乃巳州人士求連生族祝生持其成暨委禽走介致餼繼以金幣生咲曰孰謂君子而可貨誘乎悉遣去人復譁曰是可以義取者生尚不之欲况其他乎扵是鄊人教子者恒指生為法使學焉生名恒字本𥘉姓楊氏白鹿生因其所居號之云史官曰子與生㳺者三十年不可謂不相如者待罪國史時遂白執政薦之入成均聞生不受州縣辟事乃寢然其行義可法者不當使其泯泯因造為小傳如右隱之與顯非所以論生也俞巨川墓記余致政家居澄坐扵靜軒中日與造化者㳺凡文墨之事一言謝却忽伏龍山海禪師金華童子陽同麗水俞原善連翩而踵余門禪師為原善而致辭曰原善名善衛居栝蒼之麗水其先有諱徳者甞為松陽校官自是以詩書為業校官生義義生通通生明家道雖寖𥙿而敦龎檏茂不為外物而遷朝出耕暮歸讀古人書柔仁自持與人語唯恐傷氣尤懼隷卒不啻避虎狼足迹未甞至公門科繇之應求豪有力者兼之貨賄随其所命不敢出一言較多寡幸其見聴輒閉户自詫曰吾屬無患矣明生涞字巨川年未弱冠見祖父失之太柔慨然曰苟持此而不變其尚足以立家乎或有事州縣巨川奮身直前楫拜上官皆不踰扵禮節吏欲爲姦利輒窮根柢不使其滋蔓凡有所期㑹朝受令逮日落即集羣豪相戒曰是子才智兩全不比其乃公可欺吾當謹避之爾自是其家安輯鷄犬亦不驚貲業益致殷盛然篤於倫品嗜善不厭仲弟巨淵遘風癎之疾巨川晝夜憂如己有之聘醫注藥殆無虚日至而烹錬火候必躬親視之及巨淵亡撫育其二子尤有恩意鄊鄰之中孤嫠者耄且病者困寠無依者振之恤之唯恐有不及俞源有橋二所曰利渉曰康濟溪水暴悍旋踵輒敗壊巨川憫渉者告病皆重建之如履平地去家十里所慧力古招提在焉蕪癈不治而荒榛没人巨川爲造殿堂門廡荘嚴像設無不畢傋具䟽延碧潭澄師主持寺事復施毗盧藏經以實之樊嶺慈仁寺棟宇雖隆而浮屠氏諸像未完巨川召良工搏土造之始稱其伽藍之制其存心為善大率類此年六十三以至正乙未六月十日卒于家某年甲子某月日塟于北山之麓巨川娶陳顔二氏男四人長即原善有學行甞從許文懿公門人逰仲父巨淵䘮在淺土原善造穴扵父墓之側奉而藏焉乃捐私錢築孝思庵買田若干畒入其租以供祀事錙銖不以煩仲父諸子鄊人士稱之次善麟次善詵次善護女三人湯源呉華髙聽其婿也孫人某巨川為人外剛毅而内慈惠遇事以誠畧不尚浮藻知儒術旁通醫藥卜筮之學嗜義如嗜利今不幸已矣原善慕太史公名非一日無以自通扵執事謹介吾儕為之先容願太史公卑矜之賜以冡上之銘也扵是原善出再拜其有請如前而加切焉余與誠意伯劉公伯温御史中丞章公三益甞同朝二公皆括蒼人每品評鄊邦人物輒稱曰麗水俞巨川仁人也其家世以積善稱余固巳聞之矣今原善之至復知詳焉然為善者當有後非惟巨川能亢其宗而其後裔食前人之報者當未艾也爵禄之来夫孰禦之㢤扵是不辭而為之銘銘曰彼悍如狼我仁如麟彼雖嚚嚚我則振振所以才智鍾乎後昆家有餘慶恒在善人紫綬金章行當大其門麗水陳孝女傳碑陳孝女妙珍䖏之麗水人父南溪為神祠祝史蚤夭母某氏更適他族妙珍依大母林氏以生林嬰末疾妙珍刲股雜淖麋以進疾遂瘳或告之曰此若女孫股肉之功也林悲泣曰吾耄矣死固當然何用苦若耶疾復如𥘉妙珍倀倀如有失賣衣走浮屠氏作諸禳榮事皆以應林忽昏眩妙珍觧髮相紏纏哀號良乆乃甦自是氣益弱僅有一絲相屬妙珍計無所出然香右臂上稽顙籲天乞以身代復不應至正四年四月壬申夜夢一丈夫冠烏紗巾服青布袍来告妙珍曰爾勿憂能剔肝食之則愈矣妙珍問曰欲剔将焉從丈夫指右脇示之且俾吞紅藥半丸吞已遂覺甲戌妙珍乃具湯沐浴露禱上下神祗時空中雨墜妙珍之身獨不霑濕若有張盖覆之者妙珍益喜持刀視脇下見紅㾗如縷長可三寸許就痕上割之血滂然流再割之了無所見妙珍懼乃擲杯校卜扵神逮俯身拾之而肝忽出懸亟刄之寘几上爇香自誓云大母倘得生終身持菩薩戒不復適人矣尋取肝聶而切之雜竹萌烹之大母食纔下咽其疾頓失妙珍懲前事戒左右勿漏言然創鉅甚㡬至危殆復夢神人語之曰無傷也冝錬𥿄作灰傳之妙珍從其言果愈時年十四耳後三年林以夀終妙珍造塔瘞之復然頂申前誓棄家為優婆夷前進士永嘉髙明来官郡録事為上其事部使者大名髙履覆按得實以聞次于朝詔有司具烏頭雙表之制旌表其門仍月給粟一斛養其終身時八年春二月也郡守固始黄某以其事有渉名教也命儒學教授鄭汝原為記其事于石云史官曰人子之扵親本宗一氣苟可以死生者勢當共之肯以形體旣分而視之有異耶當親有疾時呼號天地鬼神遑遑求索茫昧中力有可致雖萬死弗之頋又奚暇毁傷絶㓕之計耶或者作人對痛斥之余不知其何所見耶夫孝忠無二道忠臣肝腦塗地世未甞指以為非頋獨扵孝子而疑之耶此决非韓子之文其依倣而托之者耶余聞之慈溪黄東發之言如此因造陳孝女傳故備論之四明阿育王山廣利禪寺碑銘有序四明阿育王山廣利禪寺在郡城東三十里阿育王山即鄮山昔在周厲王時東天竺國有阿育王造寳塔八萬四千貯釋迦文佛真身舎利命耶舎尊者放光役諸鬼神分布扵四天下而鄮山當其一故更名之晋太康三年并州獵師劉薩何受𣑽僧指授即改行爲僧易號慧逹偏求舎利塔扵洛下齊城丹陽皆弗獲行至㑹稽之鄮山忽聞地下鍾聲慧逹哀益切越三日忽舎利與寳塔從地涌出其相青色似石非石髙一尺四寸廣七寸五成四角光明殊勝慧逹見已悲喜交集而塔之出現實肇扵斯時矣義熈元年安帝始構塔亭覆護而度二七僧守之宋元嘉中文帝増創祠宇且以封襲未嚴斵木爲浮圖三成凾之梁普通三年武帝又命建殿堂房廊奉之賜額為阿育王寺大同五年帝令其孫岳陽王察改浮圖為五成繪帝暨昭明太子二像蔵焉仍施黄金五百兩造銅佛四百軀寫經論五百卷鑄四鐡䁀以鎮四角尋蠲復其賦調給兵三十設營防衛陳宣帝度僧守塔如義熈之數唐中宗遣使賜金又下詔加護之至武宗朝并省海内佛寺塔歸越州官庫宣宗立像教重興又入扵開元寺鄮山僧愬扵觀察判官蒯希逸而還之懿宗咸通中又度僧三七人守之梁貞明二年錢武肅王遣弟鏵等迎塔作禮明年正月囬止西陵岸放光照江中其明如晝又改浮圖為九成第三成寘七寳龕用以貯塔周顯徳五年寺災文穆王請致武林龍華寺新其浮圖其成如前數而藻飾有加焉中龕雜用百寳範黃金為座懸珠瓔以荘嚴之宋𥘉寺又新大中祥苻元年復賜以廣利為額拓為十方禪刹其主僧自宣宻素公始可考見宣宻五傳至大覺璉公名振天下仁宗待以殊禮作詩頌十七篇遺之熈寜三年大覺為搆宸奎閣蘇文忠公軾實記其成大覺日與九峯韶公佛國白公參寥潜公講道一室扁曰蒙堂叢林取則焉髙宗即位以寺為舎利所宅親灑宸翰錫名曰佛頂光明之塔大覺十五傳至大慧杲公紹興間来領寺事四方學從川奔濤湧而食或弗繼乃扵奉化忠義鄊隄海塗成田一千餘畒名般若荘大慧四傳至妙智廓公纉承益䖍淳熈元年冬孝宗之子魏王愷出鎮其土二年孟夏四月瞻舎利毫光發祥青紅交絢變幻不一更用黄金為塔而截寳塔扵中冬十月一日孝宗遣内侍省西頭供奉官李𥙿文取塔入内妙智護之行舎利現扵塔顛如月輪相又現兩角如水精珠若此者三御書妙勝之殿四字俾揭扵塔所妙智再傳至佛照光公緇錫坌集不减扵昔時盡鬻賜賚之貲市田四千餘畒視大慧加三倍焉名吉祥荘佛照十五傳至咲翁堪公有權貴人至寺戯問曰舎利何在笑翁指道傍松謂曰此䖏即有巳而松枝皆放光貴人驚異即寺之門巷建二石塔以表之笑翁又傲古制累石為塔者三列扵寺右以瘞僧之歸寂者宋季寺又災寳塔附安别院元至元十三年春三月世祖命使者奉塔至開平龍光華嚴寺尋遷燕都聖夀萬安寺集僧尼十萬扵禁庭太廟青宫及諸官署建置十六壇埸香鐙華旛之奉備極尊崇世祖親幸臨之夜有瑞光從壇發現貫燭寺塔相輪之表又自相輪分金色光東射禁中晃耀奪目世祖大恱命僧録憐占加送塔南還更賜名香金繒詔江浙省臣郡長吏増治舎利殿宇笑翁十二傳至頑極彌公適際良㑹遂以詔書從事曾未㡬何甍棟雄麗如天成地湧上薄雲漢寳塔還于故處頑極四傳至横川珙公道𬒳華夷禪學為之中興僧伽来依法輪者至無席以容二十三年大建堂宇以居之横川九傳至雪窓光公寺復新豪家所據諸荘田土園林盡復之且以詔使之臨祗奉無所至正二年春二月又造承恩閣七楹間黄文獻公潜為之作記雪窓四傳至扶宗宏辨禪師約之𥙿公已歷六十二代矣禪師以咲隱訴公法子入我國朝自廬山圓通選𥙷其䖏戒律精嚴言行一致智慧福徳皆絶出乎等夷從洪武𥘉元以迄今茲一座十年宗綱丕振風雨不動安如泰山寺之勤舊竭其力而翼賛之有若岳林住持象先與公築黄賢塘得田叄千餘畒名報本荘有若雲石起公市史氏之田其數如黄賢塘名忠義荘二荘皆與般若爲鄰大佛寳殿則又雲石葺之三觧脫門則僧伽智華作之修演法之堂并撤其房廬為下蒙堂則白雲住山智珠營之𥙷東塔院者沙門自悟也造西塔院者又象先也西塔肇建扵唐元宗東塔在迦葉足跡之左即寳塔所涌之地下至庫院雜室則出扵比丘智寧之力也凡寺制宜有而摧敗不支者悉舉而更之禪師念締搆之艱不可無以示来者俾其徒師秀至浦陽山中徴文以爲記嗚呼大雄氏真身舎利乃戒㝎慧熏修所成必八吉祥六殊勝之地方妥安之其在震旦者一十有九唯阿育王山顯著特異自晋逮今歷一千九十七年之多國王大臣以及氓隷靡不歸依金銀重寳施之弗吝當其祥光發現瞻之仰之不翅嬰孺之思父母盖如来以慈悲碩力攝受有精神通廣博随念而應所以啓功徳之信心祛塵勞之妄念也何其至歟然而臨師位者多名世之士乗法門之正令飈旋霆奔一入其庭心空疑釋致使舎利之感乆而滋彰名重五山光昭佛日此亦幽明两致其極者也禪師起繼芳躅益殫志慮當皷魚寂寥之時熾然建立金碧燦爛扵水光山色間淛河西東未見有如斯之成者是宜詳紀之使後人扶植扵悠久也寺東一里餘有聖井靈鰻在焉相傳随塔而至呼為護塔神折鮮花誘之輙二紅蟹導之而出因作淵靈廟祀之以其與塔相関也特附見焉銘曰巍巍大雄攝受有情持紅日輪中天而行其一照燭大千洞見豪髮靡物不昭無幽弗逹其二靈明入㓕有不㓕存五色神變萃斯骨身其三無憂之王捶碎七寳造塔收之萬佛旋繞其四誰放指端白毫相光藥又奔逐随光瘞藏其五支那之國海東之域鍾聲發祥塔乃涌出其六上自帝王下逹民萌歷代崇之精白一誠其七唯其所在天龍訶衛有感則通靈光顯瑞其八神鐙暈紅烈火殞空或射九天燁如白虹其九千目環覩如佛出世攀引莫能繼之以淚其十依之主之代有偉人據蓮花座說法如雲其十一四方駿奔孰非龍象一喝之餘凢情俱䘮其十二聲應氣求霧滃雲蒸千有餘歲無廢不與其十三有大導師来接遐軌佛智之孫廣智之子其十四長眉廣顙大類慈恩其徒翼之各展度門其十五湧殿飛樓聳起無際化海為田有禾穟穟其十六像教隡夷嘅其永歎浙河西東似斯實難其十七法王能仁覆燾無外佛子體佛引之勿替其十八昔人有言難逄者時優曇之現四衆来依其十九疇無舎利中含法界亦有樓閣不渉成壊其二十色非青黄其光焞焞不假彈指諸門洞開其二十一苟能荷擔直入無礙手擎摩尼扵法自在其二十一玊几之山其青無瑕法雷常嗚諸天散花其二十三敢告来者以纉以述功烈巍然與山無極其二十四洪武十一年歲次戊午春三月十五日前翰林學士承旨金華宋濂造育王禪師𥙿公三㑹語録序古之人道感而形化曷甞貴扵言㢤甚不得巳而有言言或易扵遺忘又甚不得巳而記録之雖曰形諸簡編然懼不䏻行逺又甚不巳始刻文梓而傳之其言之也𣣔擊豪扵當時其傳之也将澤物扵後世惓惓為道之心為何如㢤此濂扵歷代諸師之言不能無感也激者則曰靈明中居一塵不可留况語言文字紛穢龎雜足以礙冲虚而窒真如逹摩氏東来持楞伽經以印人心楞伽佛口所宣也君子尚謂其墮扵枝蔓况後来師弟子䇿勵之言乎曰不然也人之根性不同而垂接之機亦異其上上者一見之頃情塵自然銷霣何假扵言㢤若下下者朝夕諄諄誨之淡如嚼蠟竟不知其味苟欲絶文字令其豁然自悟是猶采鳬藻扵山顛求女蘿扵海底終不可得也今之去古亦逺矣自大鑑以来其語具在人仰之者如應龍升天海立雲流或現大身或現小身不可以凡情測度儻不因其言而求之則其超然獨立不墮色聲者奚從而知之旣知之必将則而象之若以其窒真如而礙冲虗一切斥去濂不識其可乎不可乎雖然寳積經云如来所演八萬四千法藏聲教皆名為文離諸一切言音文字理不可說是名為義法藏且爾况下扵斯者乎以此観之當畧其文而䆒其義可也然而取魚者必資筌愽兎者當用蹄兎與魚既獲而無事扵蹄筌吾心源旣澄識浪自息復何義之云乎濂之區區又不能無感扵後之人也育王禪師𥙿公三坐道塲䇿勵學徒如青天霹靂聞者掩耳演說無上妙道如升蘇迷盧山濶視四天下百物無所遁藏大司徒楚國歐陽文公謂其言出入宗乗内典左右逄原其文渉獵百氏燦然可賭鞔峯佳山恕中愠公謂其設施踔厲不愧為大慧七世孫皆知言濂頗獲與公㳺甞以賸語三卷質正扵公公不鄙而題識之許其可以入道今已十閲寒暑矣公之徒師秀不逺千里以公三㑹語請濂序而傳之嗚呼公之有言與秀之汲汲圖此者夫豈得已者㢤濂雖不文因不辭而書諸首簡云寳蓋山實際禪居記衢之龍㳺縣北三十五里有山曰寳蓋川媚山明而林樾欝蒼儼與靈區奥壤相将然僻䖏下邑無有啓其閟者𥘉盧江有沙門良亮冶父山實際禪寺無用聦公之弟子也沙門年旣壮出逰叢林歷叩諸師乆未能證入聞千巖禪師長公說法扵㜈之義烏伏龍山凾往見之禪師普應國師本公之嫡子門庭浩蕩後衲雲擁見沙門為人誠慤可與進修時加警䇿之已而命司藏鑰使日閱經律論玄文乆之陞居第一座禪師間謂沙門曰如如真性逈出根塵祥光發現照燭乾坤非有絶念之深功不能超出死生而入常寂之埸子盍縛茅扵重山蜜林而究明之乎沙門躍然以喜即日下山選地以居之至正丁酉春行至今所俯仰四顧有以愜其志遂駐錫焉遐邇嚮慕奔趨恐後富者捐資貧者効力伐石扵巖掄材扵林􅎚人運斤􅚽夫薦圬不戒而集猶務其私僅四三年功即就緒法堂三楹間成未㡬釋迦殿又成其楹間如法堂之數中設三世如来之像左右翼以天王皆用黄金塗之兼之床座華旛及凢供具清浄嚴肅觀者起敬庫院僧室之在東西又如佛殿之數兩廡揆之則溢其五别敞小門樓以為出入之地徑術曲折而蓮花池品列于前四圍有水瓌之蓋一倣伽藍之制沙門因出實際遂以名其禪居云惟大覺世尊其道所𬒳甚廣無與比倫人徒見中國九州能嚴奉之殊不知西南諸國如呵羅單于陀利之属以道里計近或數千逺且二三萬餘而尊崇為尤至國君相祝常以世尊如来稱之則其他㮣可知也此姑置之勿論又自西方言之自中國歷十萬里至五印度從五印度以西又越太海二重始抵西入之境道塗比前奚翅數倍其所歷城郭人民䌓衍富麗又百倍扵中國其地唯知有佛教而巳餘皆無有也至扵巷談里語一擧佛言以爲法戒稍有不信而妄行者衆共棄之以此而觀若東若北莫不皆然是故鄭漁仲有云佛之書徧布天下而儒家之言不越扵䟦提河蓋有以也然乃史傳所載及東伐西使親擊者之所言咸属南閻浮提南閻浮提則好髙四隅之一爾經言百億日月百億妙髙山皆漸佛教則又非管窺蠡測之所敢知也或者則曰佛書多取譬之言果可盡徴乎曰吾儒亦有之也騶衍謂天下有九九州而一九州則有禆海環之人民禽獸莫能相通如此者九則有大瀛海環其外乃天地際焉禹之所序中國九州其扵天下八十一分居其一耳豈獨佛書言之㢤余甞悪夫淺見狹聞之士不足以語大方類夫營寜生人身中㳺泳腸胃自謂江河之廣周流府藏自詫萬里之逺不知身外之境𥘉無涯涘也所以輕扵論議迂固僻陋聞者爲之失笑其不智也亦甚矣今因沙門請記余故特一言之使入此禪居者讀吾之文又有以知大覺世尊其道所𬒳甚廣無與比倫則嚴奉之心逾堅嚴奉之心逾堅則将世世嗣而葺之俾不墜壊庻有以副沙門之所碩欲若但紀其興起歲月稍渉文學者人人能為之又奚假扵余㢤沙門號西山精進入道至老猶不懈云藤杖銘形之圎兮性之堅兮節之全兮吾與子周旋兮楷木杖銘生孔林承聖澤文庚庚光繹繹扶顛持危資爾徳栢杖銘用之則行舎之則藏嘉言孔彰懐允不忘龍㳺重建證果寺記我釋迦文佛慈閔有情設宏濶勝大之教真應弘願罔不霑𬒳故凡日月之所照霜露之所墜皆沐浴至化出離苦輪得清浄行列禦㓂書所載不治而不亂不言而自信不化而自行蕩蕩乎人無能名者信不誣矣是故塔廟之所在金碧焜煌照耀無際雖其淪壊有時或囿乎數曽未㡬何又皆興復如𥘉觀乎此者可見大法之流行與天地相為無窮者矣衢之龍㳺縣東四十五里有證果道塲實始扵唐真觀𥘉縣人士虞道延捐宅宇為之悉入腴田其中己而祝髮受具戒為𨳩山第一祖且以的傳自號脩習禪觀誓不忘扵正宗一時龍象聞風坌集稱為虞延法師云唐季之亂變為瓦礫之區在宋之𥘉休堂慧公甞重興之至宋季又廢無住行公入主法席又從而興之逮元季又廢今住持靜山仁公與其同𫀆本全周公謀曰兹寺自法師創建以来甲乙相傅克底扵今日不翅七百餘年之乆一旦使其堙墜吾儕之恥也盍相與起其廢乎周公然諾之各捐私槖之積以為衆倡乃持歴赱民間民有力者加二公之惇慤各施其所有遂命斵水陶土之工相與從事至正癸卯二月某甲子新造釋迦寳殿殿凡三間演法之堂其數視殿而嬴其三曰觧脫門則數與堂同兩序視門而嬴其二十又五皆次第落成復摶土㨞佛菩薩諸像錬黄金為𥿄而飾之洪武丙辰九月某甲子又建藏經之室一區而懸鍾之楼亦煥然一新至扵棲僧之房凡七各設層搆篴堂靡不具足其制度不異巨刹崇廣嚴麗視昔有加雕甍璇題上凌霄漢彤扉曲砌下映林谷𣑽㖵互聞鍾魚相荅往来觀者咸謂當此象教衰落之時能化灌莾之墟而為無上寳坊非賢且智者能致是手莫不躊歎咏而去仁公亦自以締搆艱勤欲俾後人聞知相與保持扵悠乆忘其春秋之髙奔走青蘿山中徴文以記之余按佛說尊那經云無盡功徳甚深微妙乃有七種而建立精舎實居第二又按福田經云廣師有七徳𣑽天福而興立佛啚僧房堂閣實居第一嗚呼佛言如是世之人往往斥經營塔廟為有漏因果恒棄之而不務亦何可㢤二公惓惓焉以紹述法師爲巳任斯可謂允合契經之㫖者矣雖然楼閣之在世間有成有壊一刹那頃萬變不齊有若吾心所具寳華楼閣先天地而不知所始後天地而不知所終刼火所不䏻焚毗嵐風所不能破真如無礙湛寂常存學佛者又當扵此而求之庻㡬精粗不遺理事雙盡者已斯言也非予之斯言也盖甞風諸師云先師内翰栁公真讃偉䫉長身端嚴若神即而就之煦然春温海濶天髙莫窺覘其宏度霆奔颷竪驅駕乎雄文来趨蹌之佩作儀表扵薦紳出入容㙜振百年之禮樂昭宣帝制煥大號扵乾坤惟其具該博崇深之學所以繼光明俊偉之倫仰瞻遺像有涕沾巾儻使泉㙜之可作庻㡬士俗之還淳門人具官宋濓拜讃宋學士文集卷第四十三芝園集卷第三
