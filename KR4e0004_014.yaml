body:
  text: 吕氏采史目録序皇帝既正宸極龕㝎幽燕薄海內外罔不臣妾慨然憫勝國之亡其史將遂湮微乃洪武元年冬十有一月命啓十三朝實録建局刪修而詔宋濂王椲總裁其事起山林遺逸之土協恭共成之以其不仕于元而得筆削之公也明年秋七月史成自太祖迄于寧宗總一百五十九卷左丞相宣國公李善長率諸史臣上進順帝三十六年之事舊乏實録史臣無所于考闕略不備于是禮部尚書崔亮主事黃肅與濂等發凡舉例奏遣使者十又一人遍行天下凡涉史事者悉上送官今之北平乃元氏故都山東亦號重鎮一代典章文獻當有存者特擇有職于官者行示不敢輕也章貢吕仲善時司膳成均乃𬒳是選是月癸卯即乘驛北去八月丁卯抵北平凡詔令章疏拜罷奏請布在方册者悉輯為一有涉於畨書則令譯而成文其不繫公牘若乘輿巡幸宫中隱諱時政善惡民俗歌謡以至忠孝亂賊災祥之屬或見之野史或登之碑碣或載群儒家集莫不悉心咨訪且遣儒生危於等分行乎灤燕南諸郡示以期日有慢今者罪及之爰自丁丑開局于故國子監至冬十又一月壬辰朔始完以帙計者八十擇髙麗翠紙為之衣舁至行中書借官印識之進于南京乙未赴山東河水方凍大雪深二三尺仲善駕牛車遵陸而行一吸一呼氷生髯間巳未至濟南其􅖴詢大略如北平時又明年春正月甲寅竣事成書又四十帙所拓碑文北平四百通山東一百通不在數中仍印識如前三月壬寅輦還京師巳而諸使者咸集濓于是有所依據修成續史四十八卷夏六月復詣闕上進仲善以功升太常典簿尋為丞且以史事之重不可易視也集為目録四巨編上之而藏其副于家徴濂序其首昔者司馬光既著資治通鑑又略舉事目年經而國緯之名曰目録示學者以樞要也仲善今備述采史綱領明其事之良艱示後人以軌則也書之意雖不同而心之厚于仁則一而已嗚呼史有闕遺久矣如近代衛紹王之朝記注亡失南遷後遂不能紀載當時史臣所屬若得如仲善者豈不有勝竇祥揚雲翼之所録哉順帝乙紀卒得為完書皆仲善之㓛無疑人有功而不知不智也知而不言不仁也濂待罪國史故不辭而為之序使觀者有所徴焉進史後三月日故胡毋歐陽夫人墓志銘有序夫人諱汝圓字某姓歐陽氏世為太和人父宗周毋江氏夫人年十七歸同里胡濟川濟川素為閭右族其逺祖有諱箋者在宋時以明經及第為南城丞逢國大慶獲封其父咨迪功郎毋歐陽氏孺人贊書中有福榮之言遂取以名其堂揚文節公實為作記夫人佐濟川治家政內外咸舉至于科繇之事尤加之意適至正壬辰兵亂江西行中書檄濟川充里之早禾市巡檢為禦寇之計早禾當龍泉永新安福之衝凶竪出沒靡常一障之責誠有難勝任者夫人佐之輪楮幣數萬于公家募驍勇植寨柵相率固守如此者十有餘年卒能全其宗族詩禮絲麻如承平時夫人之力居多視彼強家大姓殱于群寇者相去不翅萬萬夫人事姑樂氏甚孝敬及嬰疾而亡濟川與仲子子璘方受事于贑夫人含泣視事凡棺衾􅊞斂暨賔祭百須之物無不具俟濟川還始殯焉𥘉樂事姑陳氏盡禮今夫人之事樂亦如之議者謂如崔山南家云夫人自歲癸卯辟地武山陽至于乙已江西州郡悉平夫人隨濟川還故里室廬已燬于是相與經營構祠堂以奉胡氏四世神主割腴田以充祭𣏌而曽祖姑蕭氏墓在𣑽安寺傍者亦捐産俾浮屠主之為薌燈之須其奉承先志而知所急類如此其戒飾子孫必令取則于先世且曰昔文莭公記爾家之堂有迪教勵業樹家亢宗之言爾曹不可不朂吾亦歐陽氏也爾能朂之則福榮之名未必専美于前矣夫人素有痰疾至是加劇以洪武庚戍四月壬申卒年五十有五子男三人子瑛子璘子瑀皆克盡子道子瑛先夫人而卒孫男五人相授祖授宗授孔授仙授女三人適某某某子璘卜以某年月日葬于某山之原前葬以鄉先生王君沂所為狀來徴銘先生以文學知名當世狀之所述其言冝可信為之銘曰孝足以奉其姑智足以相其夫力足以植其閭有若夫人其殆繕婦性者歟其殆篤婦道者歟題朝夕針後右朝夕針一名夙興夜寐針凡二百八字南塘先生陳公之所撰也先生諱柏字茂卿台之仙居人與同邑謙齋吳梅卿清之直軒吳諒直翁父子遊而深于道德性命之學蓋自謙齋從考亭門人傳其遺緒而微辭奧旨先生得之為多當時有慥堂鄭雄飛景溫輩行雖稍後而事先生為甚謹人以其學行之同通以四君子稱之今觀先生之著此針本末明備體用兼該非真切用功者當不能為是言鄉先正魯齋王柏會之讀而善焉以教上蔡書院諸生使人録一本置于坐右則其所以尊尚者為何如哉嗚呼前修日逺後生小子不知正學之趍唯文辭是攻是溺志亦陋矣濂故表而出之并繫先生師友之盛于其後以勵同志者云諭頑陶尚書中立為子言臨海林甲一門皆疫死甲獨治喪暨甲殁無人藏其尸家犬奔號里巷若狂已而群犬翕集銜甲衣曵至西郊跑土成坎薶焉坎淺不能容又復曵出如是者四三始壅土覆之而去新昌黃琛甫有牝犬為邏卒所食棄骨屏處其子銜之瘞諸野豫聞撫髀太息每舉諭諸人人輒笑豫誕且謂古無是事昔譙縣崔仲文畜犬會石和以丁奴易之不從和殺仲文奪其犬犬齧和守仲文尸瓜浮土掩之尋牽和衣訴官和伏誅此晉義熙中事也冀州石玄度犬母育一子愛之甚玄度烹子啖之母候骨投地斂置一窟移葬于桑間日夕向桑嘷逾月乃止此宋元徽中事也謂古無是事者過矣夫犬能禦盜齚姦解難報恩傳記所載者紛然也又寧止此二事乎人苦不自重物理有可徴者亦弗之信反指豫為誕豫故書此示之人心尚存其亦有所感夫魏府君墓志銘惟魏氏逺有世序相傳出鄭國文貞公徴𥘉居巨鹿宋靖康之亂其諸孫某隨高宗南渡來知袁州遂家袁之萍鄉歷若干傳至諱某者生南金南夀父子同試荆湖漕司皆入高選南壽遷鄂之蒲圻遂為蒲圻人南夀生太學上舍天福天福生府君諱雲瑞字祥卿頴逹善記問從鄉先生盧應奎講説經旨毫分縷析弗之厭會延祐科試法行府君竭力從事下噬人矣不久必自覆爾姑待之豪右鄭仲淳挾官中氣勢每魚肉民民不敢誰何間誘府君族子為劵欲侵其土疆會省憲兩府交薦府君典教郡庠懼而不敢發其壻郭升之曰吾何畏于彼哉竟踵鄭之為府君詣郭自言期以誠動之郭見府君容貌魁梧論議英發心甚服之巳而請府君作大書府君揮灑如飛郭曰先生竒士也吾幾失之矣請以田劵還而不碩受直也府君操心仁厚而能讋伏暴強類如此府君善學米南宫書得之者不翅拱璧尤喜著述有筆記若干卷藏于家他如先丗決科諸文皆蠅頭細書裝潢成帙以示子孫其皎皎之志猶前日云延祐已未十月十二日卒于齊安郡上距所生至元戊寅十二月草日得年四十又一至治壬戊十月某日權厝于某山祖塋之南後五十年為洪武辛亥某月某日始克卜葬于黃蓋湖之原禮也府君娶宋氏子男三人長法孫蚤卒次已孫今名觀嘉議大夫國子祭酒次虎孫亦蚤卒孫男五人子仁子同子栗子子樂子仁子同皆蚤卒孫女三人王克用熊彰毛藝才其壻也曽孫男三人思植思荗思誠曽孫女一人尚幼濂也不敏官翰林成均時幸與觀為僚友觀乃以祠部主事張孟兼所為狀來謁墓門之銘濂聞府君言行多可書要不止狀之所云而已府君一日方出見家人市物競其價之低昻府君叱曰彼非嗜錙銖之利肯樂于奔走耶何屑與之較也如其欲酬之大司徒歐陽公文玄名世巨儒而每稱府君為賢其往復尺牘藏諸篋笥者墨尚濕也嗚呼俗偷民偽久矣有若府君之行之懿其不為聳善扶世之一助矣乎銘曰人偽方滋動隨欲萌錐刀之末奮襼而爭溫溫吉人與物無營事機之來一接以誠豚魚可孚况乎冠纓懌然心服匪貌與形慶流後嗣學傳一經施于有政物無不平黃蓋之原峯回川縈以琢其珉以掇其英以昭其聲以告諸冥善財南詢華藏海因緣序沙門那道輝以其師淨慈禪師所著善財南詢華藏海因緣一卷示豫先集經以備其事次作偈以釋其義不待詳分科假遍閲疏鈔而經旨瞭然自明嗚呼可謂善談雜華者已夫雜華之宗以言乎性則太虛洞然而無物以言乎相則萬象森然而駢列所謂森然者即行布也一而萬者也所謂洞然者即圓融也萬而一者也圓融不礙行布故一為萬而不見其少行布不礙圓融故萬為一而不見其多此其大較也然而善財之見文殊根本之智已得畢乎一者也而差別之知未圓欲見乎萬者也今姑舉其略而陳之則所不舉者可推而見矣凡其所參五十又三或順或逆或小或大或淺或深皆各有所證其登妙高峯不見德雲而于別峯相見示法普見也見善住空中變化隨念而至明法無礙也見海幢放種種光光中皆有種種竒勝示法無盡也見勝熱婆羅門登山投火得寂靜樂明法無怖也見自在主修學書數算印療病建宅鍊藥及農賈等業示法工巧也見無厭足王決囚可駭及觀宫殿皆是衆寶之所合成明法如幻也見遍行外道調伏九十六衆離諸異見示法普觀也見婆須蜜女身出光明照諸衆生今離貪欲明法無染也見德生童子有德童女證入大悲大智示法幻住也見大莊嚴園毗盧樓閣慈氏領諸菩薩從他方來彈指一聲樓閣門開善財即入見一樓閣中有一切諸妙樓閣一一樓閣中皆有慈氏一一慈氏前皆有善財一一善財皆悉合掌回顧一善財之身遍入一切善財身內一切善財身皆攝歸一善財身內互遍互融互攝互入如燈鏡交光重重無盡善財既證此一切境界莊嚴藏解脫門文殊遂舒金臂過一百一十餘城按善財頂告以法解雖巳周而行未圓之故于是往見普賢在如來前一一毛孔出種種佛剎諸微妙事善財見身在普賢身中交光互現一切投火得寂靜樂明法無怖也見自在主修學書數算印療病建宅鍊藥及農賈等業示法工巧也見無厭足王決囚可駭及觀宫殿皆是衆寶之所合成明法如幻也見遍行外道調伏九十六衆離諸異見示法普觀也見婆須蜜女身出光明照諸衆生今離貪欲明法無染也見德生童子有德童女證入大悲大智示法幻住也見大莊嚴園毗盧樓閣慈氏領諸菩薩從他方來彈指一聲樓閣門開善財即入見一樓閣中有一切諸妙樓閣一一樓閣中皆有慈氏一一慈氏前皆有善財一一善財皆悉合掌回顧一善財之身遍入一切善財身內一切善財身皆攝歸一善財身內互遍互融互攝互入如燈鏡交光重重無盡善財既證此一切境界莊嚴藏解脫門文殊遂舒金臂過一百一十餘城按善財頂告以法解雖巳周而行未圓之故于是往見普賢在如來前一一毛孔出種種佛剎諸微妙事善財見身在普賢身中交光互現一切不思議事悉皆成就嗚呼善財前之所歷者行布也後之所證者圓融也非圓融不足以見體統之全非行布不足以昭發用之盛圓融體用雙泯者也行布則因用而各顯其體者也其後之所證莫知為之先前之所得莫知為之後二之則非也是知盡十方剎土皆是善財盡十方剎土皆是文殊盡十方剎土皆是一大香水海孰為行布孰為圓融哉苟謂其無所證入乎則于涉歷無微不探也苟謂其有所證入乎則性本圓明𥘉無一法之可得也至矣妙矣蔑以加矣雖然經旨宏深非有識者為之開明𥘉機之士何自而知佛國師而下頌而白此者凡十人禪師蓋後出而益竒者也或曰以偈釋經可乎曰如來説經長行之後必以偈重宣之善慧大士用偈釋金剛經而後世箋經家多效之何為而不可也禪師名智順字逆川溫之瑞安人鐡關樞公入室弟子也出世溫之雅山繼主福之東禪雪峰今住持前剎云送和贊善北歸養毋詩序太原和君希文吕忠肅公之高第弟子也在勝國時肄業成均通詩之傳疏積試八分將與有祿食俄丁外艱而去養母太行山中飲水著書以為樂以翰林待制徴不起已而中原板蕩大臣名將爭辟以為屬亦不起會兵荒相仍暴軍掠人以充糧所向殆盡唯希文堡障獲完希文昆弟之孤女十有六人當艱難險阻之中希文又能保全携持而卒歸于士族故人見希文者咸稱之為卓行云入我國朝大將軍徐魏公聞其名薦而起之希文即束裝就道見上于治朝與語甚恱擢為刑部郎中未幾遷太子贊善大夫日侍書東朝間嘗陳其情素云小臣有母春秋之高至八十有四無他兄弟以為養臣行年亦且六十雖有子僅四嵗耳烏鳥私情其能自巳乎言訖􅏰然出涕東朝以其言聞上惻然憫之即日遣北還夫君子之為學劬簡編憊精神窮年矻矻猶以為未足豈務為譁世取寵之具哉亦曰學為忠興孝耳然其道無二致能忠于君必能孝其親希文以胄監之俊英雖出而仕而念毋之切惓惓不少忘所以終遂歸養之志希文亦知所以致此者乎蓋生逢有道之朝皇上執孝道以御天下故希文朝有請而夕戒塗也希文之還服五綵斕斑之衣戲舞親側升堂為夀冝曰此非兒所能天子之恩也耆夀之朋簮纓之儔聞希文之歸必行斚授餼委曲相問勞又冝曰此天子之恩非某所能也州里從遊之彥嘗受經希文者必羅拜後先問朝廷所以遣還之故又冝曰此非豫所能天子之恩也希文果能之則誠知歸美報上之義而無愧于學詩者矣雖然希文固卓行之士其能全家以智活鄉黨以仁裁出處以義固人之所難能然希文不可以是而自足尤當增益其所學他時杖䇿重來推內聖外王之道以輔我國家上躋唐虞三代之盛使事功勒之鼎彜名氏升于史册方無負忠肅公之教不可徇一夫之私行而遽巳也傳曰求忠臣者必于孝子之門豫蓋于希文望之故太和蕭府君墓表大江之西蕭為著姓而居大和之後街者為尤盛唐開元間有從浙水東來為縣遂家焉譜圖闕逸不知其名而相傳且二十九世矣自時厥後擢進士第于奉常者後先相望宋氏南渡有為國子祭酒諱某者實生祕書監清伯祕書生南甫某年進士進士生四子長宗聖次宗陽皆以儒學入仕宗聖則臨江府教授宗陽則太和縣校官也次宗孟漕貢進士次則宗元府君然自祕書而下名皆忘今以其字書府君諱夢得元齋其自號也生四歲而孤鞠于毋夫人倪氏年七嵗夫人使之從師即知樂學九嵗善屬文同肄業者皆畏而愛之巳而與翰林待制楊君景行師事鄉先生逹觀楊氏于是益潛心諸經而于易學尤精至元庚寅詔㝎江南版籍適部使者李公行縣李集多士于庭試以經義中者始得預士籍蠲其科繇府君遂升首選時倪夫人已老府君不復有出仕意科目法行雖舊日同門之友多躋膴仕府君淡然若無營或問之則曰吾毋日薄西山吾尚欲逺遊乎郡二千石及縣大夫數欲剡薦之皆不聽尋與漕貢君于縣西二十里創甘竹别業奉夫人居焉夫人性好施遇內外族姻之急者必思周之府君家雖貧能一如夫人之志女弟及甥女未有所歸府君備資裝配于名族夫人恱而安之及夫人病府君不解衣者數月死則廬墓左三年然後返逺近學者慕府君文行咸碩執經為弟子學成而去若同里楊升雲若永新吳從彥若吉水周通若嘉禾俞鎮皆為名進士其𦦨𦦨于北方者尤多不能悉舉也府君雖不及仕其仁民愛物之心旦旦不忘縣之賦役無藝強有力者脫籍而使窶夫弱子承焉府君毅然曰是奚可哉乃走白上官稽其物産而甲乙之編為義役三年人以為允川梁有敝壞者勉有力葺治之鄉鄰有訟者及相鬪者是非方紏紛能以片言決之不幸以至正甲午八月十一日卒于家夀七十又七以乙未十二月某日葬于家東某山之原娶丘氏子男一人飛女一人歸廬陵易子韶孫男三人曰執曰安曰鳯執鄉貢進士今選為國子録孫女一人同里吳所與其壻也曽孫男四人曰珠曰韶曰規曰忠府君所著書有易學旁通若干卷燬于兵無復存者府君之􅌾周通集群行為狀進士顔成子據之撰銘納玄堂中禮略備矣執復來請曰碩有以表諸墓道嗚呼爵位可致也貨泉可有也聲問可長也唯世惇書詩不可必也簫氏自祭酒士傳經于家至于府君尤能繼其志而不墜其靜也于千其動也徐徐不衒鬻而進趍每深藏而自腴殘膏賸馥霑丐于人者亦足以獲多士之譽斯不亦君子之儒也歟是為表題墨本黃庭經後余嘗見黃素黃庭上下織成玄闌中用丹砂作界道其緭精甚細視之不見絲縷相傳為王羲之書蓋明州刺史李振景福中遺朱友文者友文梁太祖之子後封博王博王薨竟屬陶榖家尋為大師李諱所獲復入宣和內府宋籙既訖流落人間鮮于伯機以重資購得用樓閣錦裝潢成軸題其籖曰琴心玉文趙子昻為之賦詩㝎為上清真人楊許所書且稱其飄飄然有神仙之氣而伯機亦自謂生平書法得之于此為多不知何時又歸喬簣成湯垕二氏喬字仲山湯字君載最號藏書之家今則又入中祕矣子屢閲之其字體絶與墨本不同竟不能别其何者為真也豈揚與許之迹其實有異于羲之耶楊櫄氏出示此卷因備志于其後庶幾同志之士有以訂正之故薑府君墓碣銘有序君諱澤字潤甫姓薑氏其先居蘭溪之髦賢祖某父思齊以資雄于鄉環其居五里所凡山若田皆克有之及君之生其父已五十餘越三年父卒又三年毋時氏亦卒貪夫欺君之孤弱挾黠隸為姦利內蠱而外蝕之并吞幾盡君之女兄道真時已歸金華楊某矣間一歸視君撫君頂泣曰薑氏之世不絶者僅有此息爾苟或凶竪欲去之以滅口則宗祀必絶為若敖氏之餒鬼矣夫豈可哉區區資産有不足計也急挾之以歸楊氏鞠育之如已子稍長俾從鄉先生楊夢牛王月溪趙松坡董覺齋遊志慮淵沖而識見逈拔遂白于縣大夫復其先塋若干所田若千畒雖僅存十一于千百鄉之人士無不謂君為能者已而女兄命贅于同里之王氏君不忍釋之而去遂舍于女兄西遍挾王同居事之如毋與姑每得嘉味必先進不進不敢先食及生子若孫歲時相率坐女兄中堂羅拜于庭不知者以為真其毋姑也君既受女兄卵翼之恩所以思報之者無不備悉志慮及女兄喪夫而無子為立從子恢道為後而躬扶持之其門賴以不墜雖楊氏之姻黨無不以孝弟忠信淑導之有悖戾者懼之以法令亦翕然聽從君再從姪弘道𬒳偽造鈔者所誣弘道𥘉不識其人千夫長帥州官逮繫之從者百餘人君聞之大恐赱州中訴其故官置弘道稠人中命造鈔者執之乃妄曵他男子以前事遂釋丁未歲侵人相食君往糴七閩時流民所在成羣動以數百計乘間鈔道莫敢何問君獨以計脫卒致白粲來歸六親賴之以濟君頗通刑名家書于新令尤所練習或有致訟者質之君為言其利害訟為衰止君晚命仲子遷婺城中往來嬉逰以書史自娛因以盤隱自號一旦有疾度不能以生因泣謂二子曰吾非女兄不克至于是誓將奉窀穸之事庶幾少盡心焉奈何今且先之爾等他日當有以慊吾志遂冥時至正壬午十月三日也夀六十又是年十一月十二日葬于西山先塋之側配王氏後二十三年卒遂合􅌾焉二子曰明道曰懋孫五人曰焴曰蔭曰溥曰繼曰善焴能積學為名儒以薦者為婺州路儒學録尋舉進士擢永平延安丞孫女二人長適默成先生七世孫潘思明次適陳仁曽孫三人曰麟曰堪曰增嗚呼金華為文獻之邦氣習之所移風聲之所𬒳往往人多士君子之行有如君者不幸遭門衰祚薄之餘乃能聳然自異不踣其家復樂導人以為善而攄急報恩之志尤窹寐不忘夫豈無其故哉傳曰大河東流九里餘潤此蓋從古而然也濂不敏幸與焴同出于聞人先生之門墓文之屬有弗得辭其責第深愧者文彩衰弱不足以昭幽廓潛然亦自謂據事直書而無所憾也銘曰孰卑之隆而閼于逢其非天邪一髮之存卒續厥門其非天邪無德弗酬得與善為逑其非天邪發迹詩書有孫為儒其非天邪生遂死安松阡鬱蟠其非天邪卓哉善人延𥙿于後昆其非天邪跋金剛經篆書後是經功德如妙高山縱橫上下難以數量山雖難量終有盡時喻如虛空庶幾無盡濂以古篆寫成卷軸隨寫隨空不見有迹光明熾然遍覆大干是用持寄穆菴禪師禪師所具禪師所言禪師所履與此般若非同非别同别兩冥現前見弗寶積三昧集序録釋氏之書有三法藏焉曰經曰律曰論經則佛與菩薩等所説論則諸賢聖僧所著唯律必佛口親宣而非諸大弟子之得與聞也然而三藏之間統為十二部分為大小中三乘廣大殊勝無所不攝其文久流中國至秦而絶漢遣郎中蔡愔及秦景往使天竺受其書以歸自是譯師疊至代有所增以卷計者梁則五千四百隋則六千一百九十八唐承隋亂之後稍有廢逸開元之目則五千四十八至貞元中則又增二百七十五宋太平興國以來或翻譯或編纂或收貞元未附藏者又增七百七十五逮元有國又增二百八十六其中頗不能盡知今以千文紀之自天至遵為號者五百八十六通為六千二百二十九卷噫嘻其廣矣哉學其書者茫若望洋至于皓首而不能周覽唐僧智升嘗編入中國嵗月及譯人姓氏名曰開元釋教録美矣而不采其文也宋户部尚書王古隨其次苐而釋其因緣至于佛會後先華譯同異咸志之名曰法寶標目佳矣而弗表其義也優婆塞陳實分門别科頗括祕詮名之曰大藏一覽近矣惜糅之自造諸偈而又擇焉不能精也東山立庵大師崇志頗病焉乃于延祐之𥘉掇拾三藏英華上自三寶流通中至天仙天標坤維人倫之几時劫根塵世諦塔寺道具衆器之屬下及珍寶飲食花木禽獸地獄之品析二十門釐為四卷文貫始終事有源委部居整比秩焉不紊遂取法界體性經中語名曰寶積三昧集鍥梓于夀聖禪林立庵既示寂板廢不存白庵禪師萬金以精進力深入禪教三昧旁事孔籍亦臻其閫奧悼立庵利物之心勤而傳世之不逺也復為銓次義例分卷為五重刻而布之以濂閲大藏者凡三稍涉戶庭請序其首簡濂取覽之儼然如探故物雖未獲窺其全而金銀琉璃車渠瑪瑙珊瑚琥珀衆寶之積爛然溢目矣于是互跪作禮而説贊曰巍巍法王寶號為修多羅毗尼阿毗曇二千大千界以及無算數無物不含欇無土不現身護法金剛王手持蓮花杵或執七寶劒各逞神通力晝夜不暫離魔軍及末伽無有能壞者善慧施方便為轉大法輪一轉千佛轉佛佛具千佛千佛亦復然輾轉至無邉此最勝功德如雲雨太空草木花藥等根莖皆沾溉如來真正幢無巨亦無細汪洋四大海了不見涯涘苟取一滳水濕性靡不具炎炎大火聚力可鎔天地餘燼存一粟炎體終弗滅日輪行中天其廣千由旬光入寸隙中圓明具日相若耆闍崛山山石立萬仞一沙細于塵孰敢謂非石所以二尊者各出本來智一取六千卷束之四卷間如將須彌盧納之于針孔一噓寒灰𦦨死後使復然光照閻浮提利彼有情衆智者能移物勿為物所移佛言雖至寶執著亦為障我有大寶藏不落文字中六處放光明七佛時行道時時宣妙法法法悉皆忘㝎見自性佛共成無上道題顧拙軒告命後右拙軒先生顧公告命一通公諱周卿字成子仙居人嘉定癸未賜進士及第任慶元府奉化縣主簿階修職郎故事修職即滿三考關升令録先以合入階官給告公遂入從政郎久之始注授監嘉興府鮑郎鹽場差遣然舊制無從政郎崇寧𥘉以通仕郎易録事參軍縣令至政和中復改以今名乃選人七階之一也比告之首當有十幹暨千文紀號若曰甲天等字第幾之類其尾復欠紹㝎五年七月十三日下十字其背𥿄又當書行在官告院凖鈔出給及寫告棤書當行手分令史主事等名氏而守當官批上本官告命照會亦繼其後歷年之多皆未免殘闕爾吏部主事碩公之六世從孫琢玉為軸重加裝褫持以相示故為詳疏之以備當時與故云于戲世家舊室何處無之未一再傳不知祖諱者有之矣如碩者豈非賢哉豈非賢哉跋蔣山法會記後豫既從祠部羣賢之請為撰法會記一通自謂頗盡纎微近者蒲庵禪師寄至鍾山藁一編其載祥異事尤悉蓋壬子歲正月十三日黎明禮官奉御撰疏文至鍾山俄法駕臨幸雲中雨五色子如豆或謂娑羅子或謂天華墜地之所變十四日大風晝晦雨雪交作至午忽然開霽上恱敕近臣于秦淮河然水燈萬枝十五日將晏蕆事如記言及事畢夜巳過半上還宫隨有佛光五道從東北起貫月燭天良久乃沒巳上三事皆豫文所未及蒲庵以高僧𬒳召與聞其故目擊者冝詳而豫耳聞者冝略理當然也屢欲濡毫輔入之會文之體製巳㝎不復重有變更保寧敏機師請同𫀆以隸古書成兹卷來徴余題故為疏其後使覽者互見而備文云飛泉操浦陽玄麓山有飛泉濂與鄭源先生數觀之造飛泉操鼓之琴書諸崖石其辭曰飛泉兮瀏瀏洗耳固非兮謢飲我牛覆謂我汙兮移彼上流具人之形兮奈何忘人之憂月堀記余退直詞林戴華陽之巾𬒳鹿皮之裘焚香默坐存神規中太和薰蒸百體欣順龍降虎升水溫火寒周流密綿莫究端倪沖陽子自空明洞天翩翩而來碧瞳方頥氣貌充甚謁入揚𬒮言曰月堀之義子知之乎揚雄云西壓月堀指月所生之地也吾意則不然太隂之精朔後魄生至望而盈盈極而衰隨日漸虧晦而復蘇上下二弦虧盈得平氣和弗偏吾煉九還七返靈丹抽添進退之候每于月而取則焉因名其室以月堀所以志之豫曰陽隂不可偏勝也獨陽不生獨隂不成乾坤搆精六子乃凝水坎火離中藏偶竒用竒變偶乾道始茂重隂盡消純陽則昭久而行之與道消搖是謂三一之真也復命之區也若取則乎月無乃專溺于隂乎沖陽子曰二氣之精互為其根房日之兔畢月之烏取象表徴指意甚微陽既含隂隂亦含陽苟舉其偏道則全張子何見之拘邪豫曰言則美矣其理尚有所遺也人身之中有玄牝焉繫乎天根呼吸所關絲絡聮綿枝葉扶踈靜以養之一氣孔神超于象先不見其朕玉色連姢天光內朗蓋以無為而得無為而成孰火能為其候孰鼎能為其爐孰藥能為其材我皆不得而知也假形托物著于丹書顛倒錯亂自漢以來巳如斯矣吾將與子握手空明洞天之上當素月流輝銀鋪水翻瑶露𥘉滳寂然無聲委羽仙人必騎黃鶴而一下之與子稍一叩焉則豫之説為當矣沖陽子喟然而嘆曰道有精粗象分內外非粗不足以别精非外不足以形內𥘉機之徒未忘乎物苟不以此示之必大笑而赱何可與上士玄功之成者並論哉子之説固當而吾之所取喻又豈可少哉于是相視一笑沖陽子揖而退豫送至庭外沖陽子復請曰一隂之生其卦為姤是月堀也一陽之生其卦為復是天根也邵子嘗往來其間而所謂三十六宫都是春者其與吾月堀之義頗有合手豫曰此大易精微所繫雖更僕不能盡也豫惡能知之豫惡能知之君當間諸庖犧沖陽子曰唯沖陽子張姓輔其名以廷翼為字台之黃岩人蓋有道之士也洪武四年正月日玄真遁叟金華宋濂記蟠松説昔人之言喬木必繫于故家者何哉蓋故家者非一世之謂其封培也有其素保衛也有其道所以能上干九霄下蔽萬牛撼雷風而弗驚沐雨露而常新者也嗚呼此亦自承平之時言云爾若夫當戎馬􅌭紛之際無澤不竭無山不童人之屋廬且不能自保其有鬱鬱芊芊巋然而獨存者乎蓋必無也理之所必無而今則或見之者是豈人之所能哉非人之所能則天而巳矣中書左司即中劉君明善居武昌之咸寧其先塋之在崇陽者有松暢茂成林其一最巨者枝柯縈盤勢若長蛟角鬛備具而瓜距奮張尤為可觀者焉當汝頴變作蔓延至武昌愚氓之而應之相與建營結柟山之有木者剪刈無餘而崇陽之蟠松巋然獨存人過之者皆倣徨嘆息指而言曰是蟠松者出于平麓非有絶壑懸崖人迹之所不到也何為能免斧斤之厄乎且其形質與恆松等爾非鑄銅鐵以為枝柯也又何為能自全而不損毫髮乎嗚呼我知之矣持之以智力者不足以禦人事之變感之以慶祥者誠可以俟天命之㝎劉君武昌故家纍世積善之深故天之報施俾其喬木在墟墓間者不異承平時其意若曰善人者天所厚也苟謂天不厚善人盍于蟠松徴之亦如是而已矣雖然天將雨而礎潤潮將生而飇興家將蕃而林木有輝理之常也今蟠松出于百剪刈之餘蒼然而弗渝充然而含滋得不為劉君之家盛大之兆乎矧劉君以濟世之學歷仕熙朝出持憲節入位即官聲譽翕然動于中外其融顯方日進而未已也蟠松之祥又當于足乎徴之昔人又有言曰樹德如樹木木之成材可資于一時德之榮身可𬒳于後裔劉君當益務乎德哉某幸與劉君交于是推原其故作蟠松説宋學士文集卷第十四鑾坡集卷第四
