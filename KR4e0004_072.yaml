body:
  text: 故處州翼同知元帥季君墓銘元季之亂江南諸郡多陷于盜獨處州以士大夫倡義兵堅守而完及今上渡江始降其城邑故處稱善郡是時起兵之士麗水有葉君琛青田有劉君基龍泉有章君溢與三君並稱者曰季君汶亦龍泉人其舉謀興事不甚相遠其後三君在國朝為顯官故天下皆知其名季君早致其事以歸是以其功不顯然其鄉人至今以之擬三君則不以其位也君諱汶字彥父氏為季元至正中率壯士從石抹忠愍公冝孫討賊數戰數有斬獲功授義兵萬戶經略使李國鳳承制改龍泉縣尹不就國兵破處州擢安南翼總𬋩會賀李二將叛殺總制孫炎處大擾君勒部駐白岩出其不意攻之已而中書平章政事邵某亦引兵至左右夾擊遂誅賀李復其城事聞升處州翼同知元帥賜白金盂文綺青田盜葉賢三燒涌城政和兩縣掠婦女畜産而南君告胡總制深伏兵平山嶺邀擊斬之出私財贖軍中所掠耄倪遣還其家民德君肖像而祝者甚衆洪武元年上即位君入見于便殿辭疾乞骸骨上亦老君遂錫宴儀曹賜􅊞衣冠帶金帛遣歸居九歲以十年正月草六日卒壽六十君少讀書多智略事親孝服喪如古禮族人貧者買田以贍之不能學者延師以教之外王父無嗣為立其宗人之賢者且割田卑之祀鄉民老無以飬者月豫粟病則施藥死則給以槥櫝民苦嫁女育女多溺死君説以父子至理有育女者以粟六斛養之嘗出見群嫗灌苗色飢甚遺以襄中金十兩而去其為人望之凛然與之語溫然久而知其為豁然長者也君曾大父諱泰來大父諱僅父諱鏡其先在宋時多顯者娶張氏先卒晚娶葉氏二男子矩概概為母弟漳後一女適張守成孫男四炳允順允齊允忠余與劉君基逰固聞君事及君卒矩復奉工部員外郎劉君狀趨京師請銘且言將以某年月日葬于劍池鄊大運里某山之原不可無銘乃為之銘銘曰元運將傾四方震驚海怪山妖執殳逞兵括有季君實竒壯士手麾義旌從者如水左捕右攘朱衣銅章郤而弗居以待真王真王之興雷轟風行孰戕守臣敢觸天刑長劍如林萬夫一心扼其咽喉執斧砧平帝念峻功賜金賜爵掃除東南罔敢不恪飛龍御天乕拜陛前􅍔亂既息乞身林泉帝曰歸乎齒則既多大帶巍冠輝于鄉閭鄉閭有言君績孔偉死而弗朽不在太史揆行考勳以焯以宣遺德在焉彌久而傳莆田陳府君墓銘君諱中立字誠中姓陳氏莆田之忠門人其先有名畟者宋紹聖間舉進士官奉議郎曽祖諱子文祖諱君保父諱髙有學行學從私諡曰靖逸翰林侍講學士晉安張公以寧銘其墓毋林氏君季父諱齊早死無子君以祖命後之少受經于溫陵盧公琦公以文學著稱君聞其指授色承心辭日騫月邁莆士皆歎服之元至正間部使者行縣集經生試君輒魁諸生會張潞公翥以修撰使莆見君文誦而竒之由是君名益著然就有司試即不利君語人曰我命薄故尓非吾文之罪也遂隱居不復有仕進意晚乃結廬壼山年五十有三以國朝洪武十一年正月十二日終于家君事先有禮每諱日必素服悲哀至終身不怠𥘉君之祖暨父𣣔營義孰以教里中子弟規制未備而殁君繼先志創廟建學學後為祠祀艾軒晦庵夾漈三先生復為祠廟右奉其師盧公之主講説有堂燕居有室凡學之制無所不完割祭田十餘畒以食為師者儲山園之利以資春秋之祭凡為淑人善俗之計者又咸極其慮君日陳經傳為學者剖析聖賢大旨鄊人賴之嗚呼也之為士者其未遇也常以無位不足施其所學為憂及既得位則又顧畏怯縮為其身謀終無所益于人者衆矣夫豈知君子之為善固不在乎位之大小哉若君者一介之士未嘗受釡廋之祿而汲汲焉以化其鄉人為心其亦異于懷祿尸位者多矣君配國清林氏子男曰堂曰基女二長適郡人顧𥘉幼在室皆林氏出堂將以是年某月日葬君于某山之原請銘于太史氏濂濂嘗銘君母墓聞君行冝銘乃銘曰維古之士不以位世降俗偷位斯貴貴而無能冠狗彘豈若夫君賤為庶居家孝友推以義闢廬建學躬訓涖鄉髦如雲聆且肆少長齗齗類洙泗化嚚為良暴更懿醇儒為功斯小試嗟哉後人繼其志廟祀勿忘欽永世戴府君墓志銘府君諱胄字養和戴氏台之黃嚴人其先在米季以詩書家著稱嘗有顯者自府君曽祖敬老祖天鑑父開孫皆不仕府君生十年父稱古賢子事為訓府君指問其父曰此何如人耶父以賢者應之府君曰某以為神人耳固亦人耶其父異其有志既長闓毅通達學周易尤精推驗測究之法他若醫藥兵刑律曆皆習知之壯歲嘗自竒其才赱燕京謁元左丞帖木兒一見語相投留教其子府君時時以計于之左丞每稱善號之曰鵬飛先生言其才當遠致故云將薦于朝府君私歎曰吾以數推之中原將亂矣遂以毋老辭歸益攻其舊學曰吾非不𣣔聞達吾才非不如人然而不淂者有命也已而亂果起坦然不憂若素知之者年七十有三將卒速諸子具酒為樂引杯劇飲焚其所為文謂家人言死乃常事何以憂為凝坐而逝至正二十三年十一月草七日也嗚呼可謂達生者矣府君娶李氏宋將仕郎應彂之孫女子男二建心建則建心為某官女一適某孫男冝詵冝民葬在卒之明年二月草有六日墓在靈山鄉霓奧大嶺之東銘曰孰揭其衷俾周以通孰閼其逢俾寠且窮始若有為而竟靡庸維其靡庸乃潔其躬乃洞其終惟㣧嗣之隆吳郡廣記序吳在周末為江南小國秦屬會稽郡及漢中世人物財賦為南東最盛歷唐越宋以至于今遂稱天下大郡然其因革盛衰之際紀載于簡册者自吳越春秋越絶書以下若晉張勃顧夷隋虞世基唐陸廣微等所述及元和郡縣志寰宇記各有所眀逮宋之時羅處約有圖經朱長文有續記范成大趙與􅊸皆撰類成書厥後有章哲者病其未完作吳事類輔宋亡書頗散軼元趙儀鳳為揔管嘗集諸儒論次遺闕會改官不果成入國朝吳縣教諭盧熊閔前志之紛乖以為苟不合而一之恐不足示來者乃覽衆説撫遺事芟煩取要族别類分為序例一以舉其凡為古今記一以記其事為總序一以核其名為表二以著職官氏族之詳為志八以述地理都邑文學祠祀食貨禮樂兵防天官之屬為列傳若干以見古昔人物之美其目曰名宦名臣儒林文藝良吏忠義孝友高行隱逸而列女之節方伎之良及其事有不可棄者為雜傳附焉揔之為卷五十其後有集文十卷以備文藝之實為外記五卷以存神仙浮屠之可考者題之曰吳郡廣記于是數百里之內二千載之間其事可按書而得矣知府某郡李矦某嘉是書有繫于政也將命工刻板以傳丁內艱去巳而髙郵湯矦德來繼其職遂督成之熊用薦者出由工部照磨為中書舍人以余有同朝之好請敘其首古者列國皆有史官下至州閭莫不有之然不過記言書事而已及漢司馬遷班固創為序紀傳志年表之法由是四海之內無復遺事信史氏之善者也後世之郡淂專社禝山川之祭有政今教化之施嚴如古諸矦之國固不冝無所紀述而况於吳嘗為封國非他郡之比者哉歷漢至今雖間有所作而無完攴以考其事物之全誠政之闕者也熊獨能毅然以筆削為巳任倣史漢之法損益舊典為一郡成書豈非好古之士乎李湯二矦能知所重而圖其傳亦可謂達于政體者矣後之人覽是書治身居官取前之人成憲以為法將見道德興而習俗美勾吳之區與鄒魯無異矣則是書之為教不亦大哉余善熊獨能急世俗之所緩而篤于好古也為序其槩俾刻焉送李參政之官廣西序丈夫生而遇聖神之主承信任之隆而居方伯之位得施賞罰號今于千里之內亦榮矣哉信榮矣然君子不敢以為樂也君聖則望其臣者深君之信任者隆則後世責吾者重所居者高而所治者廣則斯民議吾者衆議吾者曰承君之任如是之大也而敷君之德以澤吾民者猶有未至也後世責吾者曰彼之得君如此之隆也而其事業若斯之隘也吾之君如堯舜矣吾猶未及古之賢臣吾可不自省歟合三者而思之上恐負吾君中恐負吾民下恐不免後世之求備將日夜憂之之不暇奚敢樂乎雖然吾才苟不足居乎位固不敢樂也誠有才焉斯民有未安也吾告于君而圖安之斯民未入乎善也奉吾君之道而教之大而國家之法有未著也吾以所得者告于君為後世慮者或未至也吾將為之贊㫑焉則可以不愧吾之職矣吾職之不愧則吾心可樂矣豈若無能者而戚戚為哉天台李君守恆以美才為上所拔擢任內庭承顧遇者三年今由左通政為廣西布政司右參政余知李君才甚充者也有方伯之樂而無其憂者也于其往道其榮且樂之故以告使致思焉味梅齋稿序洪武𥘉余奉詔總裁元史于時預執筆者凡數十人皆四方豪俊余日與之周旋會聚間一休沐輒相過從飮酒為歡酒闌氣盛撫掌大􅛐論古人文章政事不深夜弗止信一時之樂哉然當是時諸君者皆壯強無恙余雖稍長亦未耄老方以為此樂可以常有未知其為樂也及後未數年人事稍稍乖殊或得州縣官散之南北或以老癃疾疢引歸田里或抵法遇患轉徙逺方求如舊時之歡須臾而不得然後知此樂之難遇每一思之不知俯首愴心而繼之以歎息也又况余年愈耄觸事愈多而英才凋謝愈盡雖𣣔不思何可得哉幸而獲見一人于十餘年之後而又得觀其文辭其慰喜又為何如也若吳郡傅君則明是巳則明在數十人中以能文稱當乖殊之時歸為邑人師得益勉其所學最後獨存而文益進天之于則明可謂加厚矣今年自吳中寄其文曰味梅齋稿者示余皆馳驟可喜嗚呼四方之英俊至是無幾矣然則則明之文其何可少乎題吳節婦詩後余自壯年則聞臨川吳節婦黃氏貞而甚文及頃歲承乏史館總裁有元一代之史四方以節婦狀來上者甚衆余心存黃氏事𣣔為立傳而有司獨逸之殊竊恨焉今年黃氏之從孫吳君伯宗以其所為教子詩示余稱黃氏年二十七而夫泰彂賈死江湖間二子一女幼黃氏苦心瘁形慈鞠嚴教詩其教之一端也余誦其辭愈歎異焉婦人之不二其志者古多有之矣而未必能文也間有能文者矣其行未必皆善也在孔子刪詩之時三千餘篇之中求其備是二者惟共薑之柏舟為然其時去文武周公之化未遠猶且若是况今又二千載之後而黃氏獨有之豈不尤為難能矣乎其難能如此而史遺之誠可恨也然共薑之事𥘉未嘗有傳特以其詩見取于聖人而傳黃氏之詩自誓之堅與之死靡他之語無異至于教子則深計遠慮以聖賢之道望之有如非柏舟之所能過誠使後世有巨人君子者出采而録之其傳世無凝矣惜乎余不足以張之也雖然安和來者無其人乎伯宗慎守以俟之可也惜隂軒記人之異于物者豈特形貌而已哉亦必有道焉尓苟徒飲食以生死生無輔而死無聞則物皆然也奚擇于人乎古君子所以汲汲而不懈者非徒求過于物且求異于庸常之人非特求過于人且求所以治安之而後已蓋天之生君子所以為民物計也凡民之生豈皆怠而嬉哉其所趨者小耳彼幽探而遠取多致而急售相時乘隙以􅗲十一之息者汲汲于財者也朝造而暮謁曲譽而巧頌眴俟顔色以覬人之喜恱信任者汲汲于勢者也衒長而飾智本能而逞功上以欺乎人下以欺其心者汲汲于名者也是皆有所利而為之莫不窮心力竭思慮目不暇暝而身不暇安亦勞且勤矣而君子何取乎君子之所務者徇乎道不徇乎人利乎民不顧乎身若禹益之治洚水焚山澤周公之制禮樂孔子之作春秋孟子韓愈之闢邪説皆焦心苦思東西奔赱食不待飽而衣不務華至于終身而後已曷嘗為其身哉上以憂斯民下以明斯道尓君子之所為固如是也會稽翁昌齡由國子生再擢為監察御史名其燕居曰惜隂其有志于民者乎夫人常患無志有志矣患不學而妄行學矣患無位而不得見于世得位矣患非其職而不獲為今昌齡沈篤而專慤非無志也讀書而能文非不學也國家內外之官各不可越其職而御史于天下事無所不冝言則又居乎可為之位矣以利民之心行利民之政夫何難哉昌齡旦興而夕息坐斯室而思之民或有未安者乎所以休養之者或有未至者乎思而得焉則以告乎上日程而歲較吾之所為果不負斯職與斯民則惜隂之名為不徒矣苟曰簿書而已矣獄訟而已矣是則衆人之事尓雖勤且勞余何取于昌齡哉贈李子貞序昔天下盛時文學行義之士多出于江淮以北今豈異于昔哉何其寥邈而未之見也元興乎朔方其化自北始故士之北産者尤盛于元今皇帝起南方士之盛誠由南方始自南而北理勢之必然也况朝廷思用北方士甚至有一材者即尊顯之所以運化機𣣔其速變也士生其間者安可不勉乎安豐李子貞善讀書有文士之秀者也其婦之弟鄭子端為通事司丞子貞涉逺道而訪之其于行義得矣及其歸也子端須余文贈之亦𣣔化其鄉人以文學乎子貞歸告而父兄語而朋友上方以文治思得竒才而用之有志功名者愼無自棄哉怡養堂記禮之不行常自近而易能者始惟其近也故人忽之惟其易能也故人不加之意焉事親人人之所能也其事朝夕之所習也聖人恐人忽而不加之意自夫起居食息寒暑疾病之微問告拜跪㝎省應對之節皆著之禮經可謂詳且備矣然而能盡之者雖君子猶難之豈事親之禮誠難行哉難乎其當也甘膬之養人所能致也而敬難敬人所能也而愛難敬𣣔其如事大賔則何難之有而非敬親之道也愛𣣔其如愛妻子則何難之有而非愛親之道也故敬而不愛非所以事親也愛而不敬非所以事親也愛而肅恭之禮存焉敬而婉恱之意僃焉斯可以為善養矣凌江劉復𥘉父及繼母具存思盡事親之道名其堂曰怡養而請余記夫記以紀事功著其可見者堂之作吾不得而知其可見者人皆能言之非事之所急也然則舍事親之道何以為復𥘉言乎復𥘉好學愼行不待余言以余事親先于復𥘉則知事親之難莫余若也故推其道以告之俾書之璧使後人有所興起焉錢唐沈君墓志銘司馬遷謂儒者之道博而寡要遷蓋自謂也非所以論儒者也夫自唐虞以來載籍世有𣣔盡而窮之信若博矣苟得其道焉一言可用之終身而行于天下奚謂寡要哉然近世師喪經晦為士者以強記多識為髙而昧于力行問之則無不知惜之于政則患不能于是遷之言若可信矣吾嘗私病之以為儒者之道豈以多識強記為哉亦論其行與事而已其行誠非也雖多識強記烏足謂之儒其行誠君子也為身則端為家則和何暇計其餘哉吾以是求士于今之世生者樂與之交不幸而殁者亦樂為之銘若錢唐沈君者固余之所願有述焉者也君諱禮字仲和沈其姓錢唐其所居少喪父毋劉貧不能自存挾其弟妹歸金華康氏君獨泣曰我沈氏嫡也我去沈氏鬼安所求食乎顧謂弟妹汝善事母我將求盂飯歲時灑先人墓上勿餒我先人為也母子相抱持慟哭而訣君家居素善書以應四方之求至君益刻苦節縮廣致竒異罕有之書列庋左右身處其中晝夜研索遇格言偉論可見于行事者則執筆書之坐右歲久至無虛處每日省觀期不愧於古人行一善則喜否則若不能自容其家人事之終身而不見其悖言戾行其同里之人服之有所爭訟必就而取正凡求書于君君覩其色聞其言未嘗不歎以為君子人而君常以不得養母為戚元至正中𣣔徒步往求而浙水東西兵亂不果及道頗通而母死矣故君尤過哀焉平居多疏食不啖葷肉祭享之日悲慕如𥘉喪者君尤善教子次子新民年十七入國朝由鄉貢進士為太學生君遺書多至數十通皆勉之以忠國事上之道瀕終告其長子貴誠猶以孝友為言嗚呼是非儒者之行耶君之卒以洪武九年七月十二日葬以是月二十日墓在錢唐城西之金固山年五十有一曾祖其祖某父某娶王氏能輔君為善二子貴誠新民一女適姚某新民嘗從余學經來請銘余嘉君故不辭銘曰儒道廣博而周通小無不在大靡窮擴布天下敘一躬淂之成德推建功彼胡不知許以攻非儒之蔽乃其庸沈君好學守厥中六經諸子為垣墉聞義則喜善則從敦願不伐持敬恭家化里閭服且宗使躋于位續愈崇抱德孔多夀不豐天實嗇之匪其凶刻辭昭潛鎮幽宫謝節婦傳節義人性之所有也豈以所居而變哉南雄在嶺之南山毒海悍風氣與中州殊論者或從而訾其習俗其言陋矣若謝節婦者安可輕耶節婦謝氏女南雄人年二十八適郡士鄒永泰居四年生子忠甫十月永泰得疾危懼或死有父母存且子幼莫為計以語覘婦曰吾旦夕死然吾家貧安敢以老親幼子纍爾哉婦流涕曰君豈病而狂易耶君萬一不幸養老撫孤妾職也妾一移足忍見鄒氏兒為人奴隸乎已而永泰卒窶愈甚甔益無朝夕儲節婦躬力蠶織為布帛易粟以奉舅姑忠八歲使就鄉師學節縮服食以資束修禮其舅姑不知其貧及舅姑卒鬻所居廬以易槥櫝行喪治葬務合儀則或閔其艱勸其再事富人節婦曰我豈不知富人勝于鄒氏乎然鄒氏我所安也使我食它人八珍九鼎不若飲鄒氏杯水耳益自操守不少變教其子為儒節婦少嘗讀孝經小學書通達義理故能盡婦道云史官曰嗜欲之性人孰能免哉能以禮義制之則不入于邪僻矣婦之事夫當無恙時指天地神明誓生死不相違棄及遇變故能如其言者蓋鮮矣豈非不達禮義使然耶若謝婦者夫死困厄幾不能為生而處之欣欣然行其自誓之語如合符契非禮義淪于心能致是耶嗚呼禮義足以治人也久矣經畬堂記聖人之言曰經其言雖不皆出于聖賢而為聖入所取者亦曰經經者天下之常道也大之統天地之理通隂陽之故辨性命之原序君臣上下內外之等微之鬼神之情狀氣運之始終顯之政教之先後民物之盛衰飲食衣服器用之節冠昏朝享奉先送死之儀外之鳥獸草木夷狄之名無不畢載而其指歸皆不違戾于道而可行于後世是以謂之經易書春秋用其全詩與禮擇其純而去其偽未有不合乎道而不可行于世者也故易書詩春秋禮皆曰經五經之外論語為聖人之言孟子以大賢明聖人之道謂之經亦冝其它諸子所著正不勝譎醇不逮疵烏足以為經哉自漢以降聖賢不作異説滋橫凡外夷小道以及星曆地理占卜醫藥種樹養馬詭誕淺近之言皆僣以經名千餘年間時益歲加書之以經名者布乎四海之內學者眩于其名趨而陷溺焉者甚衆而五經孔孟之道晦矣然非彼之過也學五經孔孟者不能明其道見諸事功故也夫五經孔孟之言唐虞三代治天下之成效存焉其君堯舜禹湯文武其臣臯夔益契伊傳周公其具道德仁義禮樂封建井田小用之則小治大施之則大治豈止浮辭而已乎世儒不之察顧切切然剽攘摹擬其辭為文章以取名譽于世雖韓退之之賢誨勉其子亦有經訓災畬之説其意以為經訓足為文章之本而巳不亦陋于學經矣乎學經而止為文章之美亦何用于經乎以文章視諸經冝乎陷溺于彼者之衆也吾所謂學經者上可以為聖次可以為賢以臨大政則􅍘以處富貴則固以行貧賤則樂以居患難則安窮足以為來世法逹足以為生民凖豈特學其文章而巳乎錢唐錢鈞質甚敏好學甚篤取退之經畬之言名其齋會余過其郡造􅊇旅徴文甚力余美其志恐其泥于退之之言也推其道以告之使求夫大者焉元武略將軍荆王位下鷹房總管府副總管王府君墓志銘𥘉上即文華堂教育英俊之士余奉詔據席為師太原王璉繇流寓試山東行中書以進士貢上禮部上竒其才擢翰林國史院編修官俾就學堂中則以其先祖墓銘為請巳而除監察御史超山西承宣布政司右參政復以為言未果為後璉再入為御史除福建按察副使書來請曰璉嘗獲受經有師弟子義先祖之銘不于執事是徵而誰徵願弗辭焉余重違其誠乃序而銘之君諱天錫字良卿姓王氏其先居平陽霍邑至大父徙太原崞州武延之建國鄉曽大父諱仲彰大父諱寧父諱輔直俱善士母崔氏君少膂力絶人善騎射讀詩史曉其大義恢廓有氣度家有田千餘畝季父𣣔以磽瘠易其善者君諾諾從其意久之易殆盡卒無一言人以問君君曰季父猶父也子可與父爭耶鄉里少年從君學射君不肻曰射不易學苟非其人祗足助乕翼耳豎子不足教也君居家不問有無日招善巳者飮飮醉無虛日既而歎曰丈夫不取封矦佩銀印死蓬蒿下何益跨一馬携長劍入秦逰延安謁元荆王以藝自薦王語合署鷹房總管府副總管階武略將軍某年月日卒于官年若干夫人范氏生一子中元天長縣尉一女適汴梁翟鵬孫男二長即璉次琮中以今某年月日葬君于某縣某山太史氏曰君子之觀人于其器不于其位以位觀人斯下矣若君之器豈非豁然偉丈夫哉而所得僅若此則璉之顯庸于今者非君之餘德也耶來者能勉於德斯善為君後矣銘曰黃虬髯兮力扼兕佩利劍方抉長矢騎騏驥兮如龍射封貙兮殪豕材既具兮善又多位則卑兮吁嗟奈何身不享兮報則在後繼自今兮寵光其加贈夏安禮序樂昌丞廬陵夏君安禮見余于京師請曰安禮嘗讀古人之文見其聲烈垂于後世若日月之在天心甚慕之然年已不逮矣而每觀其同時之人多托名于文辭之中至今亦賴以不朽一何幸哉自意此由托得其人而然庶或可以自致而先生信今之傳世者碩有以贈我使得置名于其間俾來世有聞焉余告之曰文辭固足傳世也然非君子之所得巳也古之人道德備于身遭時居位而推之于天下若臯陶伊傅𥘉未嘗自有所著而𬒳其澤聞其風者相與紀載其言語行事以傳其次若管仲晏嬰為一國之政亦未嘗著書以傳而後之能言者反假其名以取信于世又其次若秦漢以下將相之獲書于史氏者或出于編葦販繒之流或起刀茟介胄漁鹽之間計其人或目不知書而口不能談豈暇為後世計哉而卒之顯名者其德行功業有足稱也又如班氏所傳循吏以及近代以循良稱者未必皆自能言亦未必托人為紀述而其事愈傳不廢是豈偶致之哉亦能盡其職而已故仕無崇卑能盡其職則榮于當時而傳于後世今安禮思自致于烜赫奚以它人為哉極乎材之所能為充其位之所得為則可矣然世之治民者強者酷虐以立威懦者弛緩以怠事而汲汲惟其身之謀是皆不顧來世者也使稍却慮深思而惟恐其名之泯沒則豈不慙且懼哉安禮處乎下位能不自卑而思善其名亦可謂有志之士矣夫士恆患無志有志未有不至者安禮昔嘗佐澄城知武強赫赫以政事聞民交口稱之繼自于今苟能愈自奮厲他日史氏紀循吏之績以僃國𥘉之政其在安禮也夫其在安禮也夫朱葵山文集序文不貴乎能言而貴于不能不言日月之昭然星辰之煒然非故為是明也不能不明也江河之流草木之茂非𣣔其流且茂也不能不流且茂也此天地之至文所以不可及也惟聖賢亦然三代之書詩四聖人之易孔子之春秋曷嘗求其文哉道充于中事觸于外而形乎言不能不成文尓故四經之文垂百世而無謬天下則而凖之自夫斯道不明學者覩聖賢之文而恱其不朽于是始摹效其語言以為工而文愈削矣夫天之生此人也則有是道也有是道也則有此文也苟能明道而彂乎文則將孰禦乎而能者寡矣斯後世之文所以不逮古也後世之文加之以百言而不知其有餘損其一言而不見其不足以本于道故尓此非彂于不能不言而強言之弊也聖賢之經其所不言也益以片辭則多矣其所言也刪其一言則略矣以其不志于文此文所以卒莫能過也故志於文者非能文者也惟志于道者能之元之未莆田有朱先生文霆以治經取顯官有政事人皆知之而其所為文世則鮮知之其孫進士潚近以示余其言醇而理彰于理不合雖強之言不言其所言者未嘗不本諸道惟其志于道而不以文名故言文者失之嗚呼人能因余言以求先生之文庶幾得其所存先生字原道以泉州路總管致仕其歷官政事見余所撰墓銘故不著姑蘇林君母墓銘姑蘇林君以義請銘其母張夫人之墓其容戚然若有所遺余問曰夫人始卒耶則曰吾母年五十有四以元至正丙戌二月十三日終今三十餘歲矣然則夫人鮮子孫耶則曰吾母生四男曰以仁以義以信以誠二女適某某孫男十有二人孫女十人曾孫男女又十人矣非鮮也然則懼其無聞于後世耶奚為爾戚戚也曰吾母事吾大父母如子事父敬吾父猶大賔撫子與孫也愛而能節以禮其御媪媵也未嘗厲言暴色其可稱者甚衆得其人而書之則傳矣吾非懼是也吾之所甚戚者吾不忍言也余固問之久之則泣而曰蘇之俗嗜浮屠法喪親以燼骨水瘞為貴吾昔無聞知而徇于俗卒後六日奉柩化于吳江之東門外遂之垂虹亭觀音閣下歸骨焉時未知其不可也于今而後知其不可也噫已莫逮矣每念及于兹心腑摧裂而不知天地之廣吾身遑遑乎若無所容也噫誠莫之奈何矣昔有葬衣冠之禮吾嘗聞焉吾母遺衣存吾巳卜地于長洲白馬澗南之髙景山將以今洪武某年月日歸葬所以慰吾心焉耳不合于禮吾不暇計也惟先生刻文于墓左以塞吾悲且俾後人毋蹈吾之過焉嗚呼先王之禮亘萬世而無弊者揆諸道而合驗乎心而安也世遠教微外夷他説得以亂之于是先王之意亡矣然行其説者未嘗不安之也而林君獨能惕然不慊于心天性之存其何可泯哉孝子仁人𣣔盡事親之道者視乎林君亦可以知愼矣夫人諱妙清林君父名某林君通醫有儒行選為某官銘曰夫人衣冠葬于是孝子刻辭昭厥美嗟哉後人愼由禮送吳仲實還金溪序金溪吳君仲實省其兄國子助教伯宗于成均伯宗以余交也偕其來謁仲實氣厚而色溫與之語秩然而有倫恭愼而甚文固巳知其才矣既而復袖其詩十餘萹以見彂而觀之辭繁而不浮理至而不俚其馳騁斂縱多態而有度問之以文學則鮮不能通勸之仕則曰未能也余于是盈信焉士之患常在乎內虛而外衒學未聞道而慕乎爵祿之華內巳足焉而外未能以動人猶以綗蒙錦也久則著而不可掩矣飾乎外而不務充其中譬之土木之質而文繡加焉其始非不眩目凝而視之則可醜矣古之君子是以勤乎其所當修者而不敢計乎其外也今之士則不然未有善焉惟恐人之不知未有才焉惟恐世之不用其未得則呫呫以自衒既得之則又簿卑而思尊此崇替起伏所以數數然也其視仲實之既至而以為不足年及可仕而以為未能者何如哉仲實不見夫善賈乎當衆人競取之時則棄之競鬻之時則填之其不取則已取必窮海內之珍不鬻則巳鬻必獲巨萬之富矣安知仲實之棄之非取不售之非厚售乎仲實歸其兄之僚咸詩以送之余與伯宗善且知仲實之材也故敘以贈之文右相像贊才優德純山時玉溫重厚可以鎮俗仁恕足以澤民或陳經術而侍青坊或秉霜簡而立紫宸終受知于聖主宅右揆而相秦深沉有謀真路國之裔剛毅忠信誠絳矦之倫觀其屹立不動正笏垂紳猶可作懦夫之氣而禠邪侫之魂嗚呼此所謂邦家之重寶廊廟之大臣也歟題張泐和陶詩陶靖節詩如展禽仕魯三仕三止處之沖然出言制行不求甚異于俗而動合于道蓋和而節質而文風雅之亜也他人𣣔效之者雖衆然樂淡泊則蕩而弛慕平易則野而穢惟蘇子瞻兄弟以雄邁之材氣勢可與之相敵然其辭旨則亦遠矣豈不誠難乎哉今之和陶者余嘗見數家最後見句容張泐文伯自九日間居以下皆和之至詠荆軻而止諸四言及形神釋桃源等什則不和恐難繼也文伯産江淮間喪亂之餘獨能致力學問以追古之作者其亦有志者哉王宗普像贊以子為貴介公子耶何其神清氣和無綺紈之態也以子為仙翁釋氏耶何其與時俯仰逰乎方之內也以子為詩人韻士耶何其清竒徑直訥然而謙退也然則果何為者耶蓋迹混乎三者之中而心遊乎埃􅝙之外此吾嘗謂空同子以古之人而處乎今之世也宋學士文集卷七十二朝京稿卷苐二
