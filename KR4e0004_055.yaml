body:
  text: 勃尼國入貢記濂承㫖禁林日福建行省都事沈秩來謁曰洪武三年秋八月秩與監察御史張敬之等奉詔往諭勃尼國冬十月由泉南入海四年春三月乙酉朔逹闍婆又踰月始至其國國王馬合謨沙僻據海中倨傲無人臣禮秩令譯人通言曰皇帝撫有四海日月所照霜露所隊無不奉表稱臣勃尼以彈丸之地乃欲抗天威邪王大悟舉手加額曰皇帝為天下主即吾之君父安敢云抗秩即折之曰王既知君父之尊為臣子者奈何不敬亟撤王座而更設香几置詔書其上命王帥官屬列拜于庭秩奉詔立宣之王俯伏以聽成禮而退明日王辭曰近者蘇祿起兵來侵子女玉帛盡為所掠必俟三年後國事稍紓造舟以入貢爾秩曰皇帝登大寶巳有年矣四夷之國東則日本髙麗南則交趾占城闍婆西則吐蕃北則䝉古諸部落使者接踵于道王即行巳晚何謂三年王曰地瘠民貧愧無竒珍以獻故將遲遲爾非有他也秩曰皇帝富有四海豈有所求于王但欲王之稱藩一示無外爾王曰容與相臣圗之又明日其相王宗恕來曰使者之言良是請以五月五日成行闍婆有人間王日蘇祿來攻王我實帥師却之今聞歸誠中國無我闍婆矣王惑之秩復走見王王辭以疾秩大言謂宗恕曰爾謂闍婆非中國臣邪闍婆尚稱臣于爾國乎何有使者朝還大兵且夕至雖欲噬臍悔可及乎宗恕悚然曰敬聞命矣乃入白王王大㑹其屬共議遣亦思麻逸等四人入朝臨發王以金佩刀吉其布為贈秩毅然辭之王顧近侍曰中國使者廉潔乃如是邪闍婆來人誅索每無厭况強之而不受邪尓曹宜效之秩以涉海萬里不可以無紀乃與敬之各賦一詩王大悅請書于版中懸之既與王别舟行至海口王又惑左右言令人謂亦思麻逸曰使者不受刀布爾等必不還矣秩恐王不安復走王所反覆譬曉之王曰使者之言如此豫中心釋然矣王舉酒為别酹地祝曰願使者蚤還中國願亦思麻逸早歸蔽邦秋八月十五日還京師十六日以亦思麻逸等入見錫燕于㑹同館巳而遣歸寵賚其王甚厚云其所貢物鶴頂生玳瑁大片龍腦米龍腦黃蠟降真諸香其表用金刻畨書倣佛如回鶻書其文鄙陋不足觀皇太子箋用銀箋文與表相類其地炎熱多風雨無城郭樹木柵為固王之所居若樓覆以貝多葉王綰髻祼跣腰纒花布無輿馬出入徒行城中人不滿三千家多業漁剪髮齊額婦人衣短衫僅蔽胸背腰繫花布散髮跣足其物産則吉貝黃蠟降真龜筒玳瑁檳榔煮海為鹽瀝椰漿為酒無稻麥捕生魚蝦蟹食之兼食沙糊沙糊者取樹實為漿澄漉細膩如粉食之能不饑食無器皿以竹編貝多葉為之食畢則棄之畨書無筆札以刀刻貝多葉行之事佛甚嚴以五月十三日為節國人亦于是日作佛事若有燕饗則刲羊豕雞鵝鳴鼓擊鈸以為樂此其大凡也先生職在太史願為詳紀之以昭聖化所𬒳之盛濂聞勃尼在西南大海中所統一十四州去闍婆四十五日程去占城與摩逸各三十日程去三佛齊四十日程歷代未嘗朝貢故史籍不載至宋太平興國二年其王向打始因啇人蒲盧歇遣施弩使副蒲亞利判官哥心等賫表來貢元豐五年二月其王錫理麻喏復遣使如前自後輒不聞元有國百餘年亦不復至方今聖人在上威德之所𬒳無逺不屇璽書一頒輒稽首臣順稽之往古允謂過之至若秩等奉宣德音辭令所加足以讋服其心亦可謂不辱君命者矣其事宜書以俟他時修正史者采焉秩字仲庸湖之烏程人敬之字某州人二人協心謀慮無役不偕行故卒能成功云表文云勃尼國王臣馬合某沙為這幾年天下不寧靜的上頭俺在番邦裏住地呵沒至的一般今有皇帝的使臣來開讀了皇帝的詔書如道皇帝登了寶位與天下做主俺心裏好生喜歡本國地面是闍婆管下的小去處乍消得皇帝記心這幾日前𬒳蘇祿家沒道理使將歹人來把房子燒了百姓每都喫害了記著皇帝詔書來的福廕喜得一家兒人沒事如今本國别無好的東西有些不中的土物使將頭目每替著我的身子根隨著皇帝跟的來的使臣去見皇帝願皇帝萬萬嵗皇太子千千嵗可憐見休怪洪武四年五月勃尼國王臣馬合某表書劉真人事劉真人德仁滄州樂陵人始生有光照其室及長讀書稍通大義㑹宋靖康之亂徙居鹽山大平鄉一日晨起有老叟乘犢車相過托道德經要言授之曰善識之可以修身可以化人仍投筆一枝而去自是玄學頓進從之遊者衆真人乃取所授書敷繹其義以示人一曰視物猶已勿萌戕害凶嗔之心二曰忠于君孝于親誠于人辭無綺語口無惡聲三曰除邪淫守清靜四曰逺勢利安賤貧力耕而食量入為用五曰毋事博奕母習盜竊六曰母飲酒茹葷衣食取足毋為驕盈七曰虛心而弱志和光而同塵八曰母恃強梁謙尊而光九曰知足不辱知止不殆學者宜世守之金大定𥘉詔居京城天長觀賜號東嶽真人傳其道者幾遍國中且善于劾召之術趙氏為狐所祟真人劾之里中塋兆自焚狐數百鳴嘯赴火死人尤神之然其養母如禮及亡喪祭一遵世教無愆度者後若干年追封無憂普濟開明洞微真人德仁卒陳師正嗣師正幼漁于河德仁挈以入道䏻預知吉凶事師正卒張信真嗣有詩文數百篇號玄真集傳于世信真卒毛希琮嗣當金之亡兵戈俶優希琮䏻以柔而存希琮卒酈希誠嗣元憲宗甚尊禮之賜真人號曰太玄名其教曰真大道仍給璽書護之希誠卒孫德福嗣德福卒李德和嗣德和卒嶽德文嗣德文卒張清志嗣自德仁至此世稱之為九祖云史官曰道喪千載諸子之言人人殊德仁在宋金之間􅺾佛老子遺意以化人人亦多從之者蓋其清修寡欲謙卑自守力作而食無求于人實與天理合也天理人心所同固足以感召歟彼得之而此失之其亦有以也夫文原余諱人以文生相命丈夫七尺之軀其所學者獨文乎㦲雖然余之所謂文者乃堯舜文王孔子之文非流俗之文也學之固宜浦江鄭楷義烏劉剛楷之弟柏嘗從豫學巳知以道為文因作文原二篇以貽之其上篇曰人文之顯始于何時實肇于庖犧之世庖犧仰觀俯察畫竒偶以象陽隂變而通之生生不窮遂成天地自然之文非惟至道含括無遺而其制器尚象亦非文不䏻成如垂衣裳而治取諸乾坤上棟下宇而取諸大壯書契之造而取諸夬舟楫牛馬之利而取諸渙隨杵臼棺槨之制而取諸小過大過重門擊柝而取諸豫弧矢之用而取諸暌何莫非粲然之文自是推而存之天衷民彛之叙禮樂刑政之施師旅征伐之法井牧州里之辨華夷內外之别復皆則而象之故凡有關民用及一切彌綸範圍之具悉囿乎文非文之外别有其他也然而事為既著無以紀載之則不䏻以行逺始托諸辭翰以昭其文略舉一二言之禹敷土隨山刋木奠髙山大川既成功矣然後筆之為禹貢之文周制聘覲燕享饋食昏喪諸禮其升降揖讓之節既行之矣然後筆之為儀禮之大孔子居鄉黨容色言動之間從容中道門人弟子既習見之矣然後筆之為鄉黨之文其他格言大訓亦莫不然必有其實而後文隨之𥘉未嘗以徒言為也譬猶聆衆樂于洞庭之野而後知其音聲之抑揚綴兆之舒疾也習大射于矍相之圃而後見觀者如堵墻序點之揚觶也苟隃度而臆决之終不近也昔者遊夏以文學名謂觀其㑹通而酌其損益之宜而巳非專指乎辭翰之文也嗚呼吾之所謂文者天生之地載之聖人宣之本建則其末治體著則其用章斯所謂乘隂陽之大化正三綱而齊六紀者也亘宇宙之始終類萬物而周八極者也嗚呼非知經天緯地之文者惡足以語此其下篇曰為文必在養氣氣與天地同苟能充之則可配序三靈管攝萬彚不然則一介之小夫爾君子所以攻內不攻外圗大不圗小也力可以舉鼎人之所難也而烏獲䏻之君子不貴之者以其局乎小也智可以搏虎人之所難也而馮婦䏻之君子不貴之者以其騖乎外也氣得其養無所不周無所不極也攬而為文無所不參無所不包也九天之屬其髙不可窺八柱之列其厚不可測吾文之量得之規燬魄淵運行不息棊地萬熒躔次弗紊吾文之𦦨得之昆侖縣圃之崇清層城九重之嚴邃吾文之峻得之南桂北瀚東瀛西𬈑杳眇而無際涵負而不竭魚龍生焉波濤興焉吾文之深得之雷霆鼓舞之風雲翕張之雨露潤澤之鬼神恍惚曾莫窮其端倪吾文之變化得之上下之間自色自形羽而飛足而奔潜而泳植而茂若洪若纎若髙若卑不可以數計吾文之隨物賦形得之嗚呼斯文也聖人得之則傳之萬世為經賢者得之則放諸四海而凖輔相天地而不過昭明日月而不忒調燮四時而無愆此豈非文之至者乎大道堙微文氣日削騖乎外而不攻其內局手小而不圗其大此無他四瑕八冥九蠧有以纍之也何謂四瑕雅鄭不分之謂荒本末不比之謂斷筋骸不束之謂緩㫖趣不超之謂凡是四者賊文之形也何謂八冥訐者將以疾夫誠撱者將以蝕夫圜庸者將以混夫竒瘠者將以勝夫腴粗者將以亂夫精碎者將以害夫完陋者將以革夫博眯者將以損夫明是八者傷文之膏髓也何謂九蠹滑其真散其神揉其氛徇其私滅其知麗其蔽違其天昧其幾爽其貞是九者死文之心也有一于此則心受死而文喪矣春葩秋卉之爭麗也猿號林而蛩吟砌也水湧蹄涔而火炫螢尾也衣𬒳土偶而不䏻視聽也蠛蠓死生于甕盎不知四海之大六合之廣也斯皆不知養氣之故也嗚呼人䏻飬氣則情深而文明氣盛而化神當與天地同功也與天地同功而其智卒歸之一介小夫不亦可悲也哉豫既作文原上下篇言雖大而非誇唯智者然後能擇焉去古遠矣世之論文者有二曰載道曰紀事紀事之文當本之司馬遷班固而載道之文舍六籍吾將焉從雖然六籍者本與根也遷固者枝與葉也此固近代唐子西之論而豫之所見則有異于是也六籍之外當以孟子為宗韓子次之歐陽子又次之此則國之通衢無榛荆之塞無蛇虎之禍可以直趨聖賢之大道去此則曲狹僻徑耳犖確邪蹊耳胡可行㦲豫竊怪世之為文者不為不多騁新竒者鉤摘隱伏變更庸常甚至不可句讀且曰不詰曲聱牙非古文也樂陳腐者一假埸屋委靡之文紛揉龎雜略不見端緒且曰不淺易輕順非古文也豫皆不知其何說大抵為文者欲其辭逹而道明耳吾道既明何問其餘哉雖然道未易明也必能知言養氣始為得之豫復悲世之為文者不知其故頗䏻操觚遣辭毅然以文章家自居所以益摧落而不自振也今以二三子所學日進于道聊一言之四十二代天師正一嗣教護國闡祖通誠崇道弘德大真人張公神道碑銘有序洪武丁巳冬十有二月五日四十二代天師張公薨于龍虎山之私第年甫四十又三禮部尚書張籌即為奏聞皇上嗟悼者良久且曰朕欲命其遍祠五嶽今方一至嵩山何期大數止于斯耶逐親製文一通遣前浙江行省參知政事安慶為弔祭使仍令其冡子宇𥘉􅊞掌教事戊午春二月十六日宇𥘉奉公冠劔權厝南山先墓之次各十有二月某日卜宅兆于某而瘞之宇𥘉恐遺德未䏻太白于世與群弟子輯為成書使張致和即金華山中請銘神道之碑濂幸辱與公遊義不可辭公諱正常字仲紀姓張氏信之貴溪人漢留文成侯四十六代孫也重紀至元乙亥夏六月十三日其父太玄真人坐而假寐忽見神人飛空而至曰余自華蓋山來遊君家願見容也及覺而公生紫雲覆庭紅光照室人以為祥徴年七歲雙目爛爛如巖下電容止異群童後三歲太玄出遊五嶽名山指相傳雌雄劔及玉刻陽平治都功印曰龍星再集于亥吾兒當持此大振玄風太玄渡淮化去而公之仲父嗣德繼主其教仲父薨衆論咸屬于公公力讓仲父之子正言正言薨公始嗣其職實至正巳亥之歲太玄之懸記至是始驗公升廣筵開演道家玄㫖四海學徒聞者聳然領解時天下大亂經籙祕而不傳者十年公乃啓黃書赤界紫素丹刻之文授其徒胡合真整比以行奉贄來受者川赴雲蒸劒失其一流落鄱陽李氏家夜生光怪公訪而合之辛丑上統大將親取江西公知天運有歸遊遣使者上箋述臣順之意乙已公朝京師上一見恱曰瞳樞電轉法貌昻然真漢天師苗裔也下詔褒美之錫燕者再兼有金繒之賜丙午復入覲京城士庶人求靈符者日以千百計侍史不能給閉關拒之乃相率毀關而入公叩齒集神濡毫篆巨符投朝天宫井中人爭汲之須臾水皆竭見土弗止飲者疾瘳上嘉之令作亭井上號曰太乙泉及還山復詔中貴人賜以織文金衣仍下中書給驛劵卑之以便朝覲洪武戊申上登大寶位建號改元公入賀錫燕于便殿內降制書授以正一教主嗣漢四十二代天師護國闡祖通誠崇道弘德大真人之號仍俾領道教事給以銀印視二品設其僚佐曰贊教曰掌書久之陛辭而歸上御謹身殿從容謂曰卿乃祖天師有功于國所以家世與孔子並傳以迄于今卿宜體之以清靜無為輔豫至治則豫汝嘉賜白金十二鎰新其宅第巳酉春上召公入朝踰月承顧問者四錫燕者一三月十三日上將通誠于天帝致齊三日御衮冕服親署御名于章勑太常設樂手授于公俾祝而焚之禮成燕公于文樓群弟子饗于别館復有金繒之賜庚戌夏上録公之功特敕吏部改贈公父三十九代天師太玄輔化體仁應道大真人嗣成為正一教主太玄弘化明成崇道大真人改封公母明慧慈順仙姑胡氏恭順慈惠淑靜玄君玄君時年八十朝野以為榮是年秋上復召見問以鬼神情狀更給銀印壬子秋復頒制誥以寵之冬十又二月復召入覲癸丑春將還上命留弟子以司祕祝之事丙辰秋上遣使召公公忽先期而至上喜曰卿之來何與朕意相符邪明年之秋朕將遣使祠海嶽諸神卿當妙柬清修之士與其偕來丁巳夏公率群弟子汪弘仁等入覲錫燕午門之城樓上舉爵謂公曰卿宜罄此一觴勑內侍出御製歷代天師贊示公曰他日當書以賜卿翼日詔公從太師李韓公善長祠嵩山分遣重臣與公弟子代祠群望自公而下賜衣各二􅊞楮幣有差既還錫燕如𥘉公自返故里志趣頗異常一日置酒與昆弟酣飲慨然嘆曰五嶽名山先子欲逰而不可得嵩山中峯乃吾祖得太清丹經之所今藉天子威靈幸一至焉咽曦景于層霄邈浮埃于浩劫吾志將有在矣君子疑其言未幾示以微疾端坐榻上屬弟子方從義曰吾無以報國家寵恩爾等宜左右我子孫以贊寧謐之化命取劔印授其子曰我家千五百年之傳在是汝其勉之死生數也吾之不死者其光赫熹四爥寰瀛先天地不知其始後天地不知其終也舉手作一圓象默然而化是夕大崖石崩聲聞數十里云公幼警敏靈籙文祕之屬皆不習而通歲屢旱禹步召風雷精神逹于冥漻甘霖即降或有為魑魅所慿者授以片符輒潜景不見公憫兵戈疫厲之餘沴氣不消舉行玄壇舊典修壇墠建隂陽鼎而鍊度之其徴驗尤夥然其天性夷曠潔而不緇如超萬物之外故以冲虛子自號最愛佳山水仙踪靈跡所在必窮幽極深動至纍日忘返當適意時欲乘白鶴與群仙翶翔紫清之上其于人間事未嘗因此少輟其奉玄君備極孝養暨殁􅌾祭咸盡禮度兵禍相仍傾資募人為兵以捍禦鄉井人賴以安公之玄裔備見世家兹不載其曾大父諱宗演三十六代天師演道靈應冲和玄靜真君妣周氏某玄君其大父諱與材三十八代天師太素凝神廣道明德大真人金紫光祿大夫追封留國公妣易氏妙明慧應常靜玄君其考妣則太玄真人與胡氏也公字觀宇娶盱江包氏宋宏齊先生恢之五世孫子男子四人長宇𥘉即今天師頴悟有文學人稱為列仙之儒近者入朝上召見奉天殿反覆諦視之笑曰絶類乃父寵賚有加焉次宇清次海鵬次勝佑子女子二人一歸鄱陽王嶽一在室惟公生乎神眀之胄簡素端凝用道為體而膠轕遊氛無自入于念慮澄靜之久天光自發所以受知聖君八朝京師天寵使蕃聲聞四逹至于死生之際又䏻不動聲色超然坐脫如行者之返故廬非真有道者豈易致哉是宜銘銘曰天開日明真人上升周流九霄駕輗作軿卿雲英英剛飈冷冷絳節翠旙恍其來迎載稽玄裔歲踰千齡五綵交絢主笈金涇矧有劔印奔星走霆非人莫授恐干鬼刑華蓋神君于焉降精圓目靑朣閃如電熒入朝帝京照耀殿庭進退有儀金衣霞頳帝曰俞㦲爾方外臣輔朕鴻化凝真集神巍巍嵩山嶽之中尊爾往代祠執禮如存庶集靈和以綏兆民皇用褒錫璽書金繒君臣遇合玄德之徴胡為弗留飛神窈冥崩崖墜雷百里震驚圎光有赫四爥寰瀛在天為清在地為寧在人為貞是謂三靈此乃道樞中黃之扃公䏻守一精聚氣凝不死維神所蛇維形白鶴來歸遼東露零洞視萬古後天弗傾佛智弘辨禪師傑峯愚公石塔碑銘有序禪師諱世愚號傑峯衢之西安人其父姓余諱某以書詩傳家母毛氏嘗有妊夢觀世音送青衣童子覺而生師自幼好禮佛塔逮長遂入蘭溪顯教禪寺從孤嶽嵩公供灑掃之役巳而剃除須髮為大僧受具足戒晝夜奉薌燈惟謹用針出指端血書金剛般若尊經忽抵几嘆曰縱䏻盡書一大藏教亦屬有為絶如夢幻不可控摶盍學無為以明心宗乎出謁古崖純公石門剛公涕淚悲泣祈以求端用力之要二公欣然語之師佩受其言不分眀暗兀坐如枯株時年二十五矣師復嘆曰年日以增而學日以退豈非聞見未充無以啓發知解乎踏濤江而西見諸善知識時布衲雍公斷崖義公中峯本公大弘雪岩髙峯之道師一一咨叩下語不契中心慈亂遂止南屏山中三年不踰戶限聞止巖成公倡道大慈山定慧禪寺門庭雖髙峻而獲證悟者甚衆亟往謁焉止巖曰南泉有云不是仙不是佛不是物是何物師聞而愈疑仍還南屏諸緣盡捨類氣絶之人行坐寢食不旬覺知唯一念歷然在太虛中如此者久之一夕坐至夜分聞鄰席僧唱證道歌至不除妄想不求真處豁然如釋重負舉目洞照不見一物留礙喜躍不自勝且曰拂法元在目前秪為太近故人自逺之耳即觚成偈有夜半忽然忘月指虛空迸出日輪紅之句乃走見止巖㑹止巖遊姑蘇走天池求證于元翁信公元翁止巖之師也元翁問曰上士從何來師曰大慈元翁曰大慈鼻孔其深多少師卓錫杖一下元翁曰拗折錫杖爾將何卓師因作禮元翁曰爾可歸見止巖師既見備陳悟由止巖喝曰何處見神見鬼師曰今日捉了賊也止巖曰贓在何處師便喝止巖曰開口合口都不是向上舉將一句來師曰遍界明明不覆藏止巖竪起竹箆請師指名師便掀倒禪床止巖曰爾欲來將虎鬚邪師復作禮止巖連打三下囑曰善自護持他日說法度人續佛慧命次日命為侍者服勤三年又還南屏住山樵隱逸公請司藏鑰尋入大慈為上座元至順二年師歸西安西安烏石山有福慧古剎久廢為瓦礫之區師獨結茅廬以居蛇虎縱橫了無恐怖意鄉民以為有道者負糇糧鹽醯以遺之師澄居攝念影不出山者一十六載聲光日振緇素之士坌集座下恆至二三千指其地或無所容縣大姓陳君嗣宗為造殿堂門廡及經藏鐘樓之屬其制如大伽藍且置山若田取其入以給衆帝師大寶法王聞之賜師佛智弘辨禪師之號至正六年冬江南行宣政院亦録師之行業請主廣德石溪興龍禪寺師祝香報恩歸之于止巖表其自證也嚮化之盛不下烏石時連留三夏烏石之衆念師去鄉里者久如子失母力迎其還適郡境新建佛剎者四曰古望曰龍眠曰寶蓋曰普潤皆延師開山為第一祖師超應之無不感慕而奮迅國朝洪武三年冬十二月郡守黃君鎮戌將徐君與啓普度水陸大齊五晝夜僉謂非師不足拯拔沉淪師勉強成行竣事而返略示微疾召門弟子勉以精進入道索筆書偈云生本不生滅本不滅撒手不行一天明月擲筆而逝是月之十日也越七日奉師全身藏于烏石慈雲塔院師處菩提埸中歷五十夏住人間世閲七十春秋四方參學莫知其數䏻其法者則慧觀慧進德隨等一十五人也所度弟子尤多其存者則慧實道逹等二十又三人也二㑹語四卷巳刋行叢林中云師道價傾四方非惟禪流奔湊而公卿大夫若太尉髙公納麟若中書兵部尚書黃公德昭若浙江行省左丞老老若江東廉訪副使伯顔不花或函香致敬或馳書問道或上謁親問玄要得其之言隻字寶之不翅南金師之法施及人可謂博矣使其正席則惠利所𬒳宜益廣今乃僅止于斯有識者恆傷之紀載遺行以昭示來裔要不得而遽略也德隨既出世西安之崇壽佩師之德不忘與道逹共圗為不朽計結集成狀徴豫為之銘豫聞圓悟之道實發臨濟心髓之祕其五傳至荆叟功用益弘際遇穆陵寵遇甚至荆叟再傳而至天池以慈憫之故誘引𥘉機恆俯而就之不為髙絶難攀之行使人望門而還所以其弟子布滿東南者甚夥若師者則天池之嫡孫也師求道深切如救頭然本心既明出語皆法彈指之頃起大道埸于久廢之餘非其福慧具足為人天師疇克若是邪造銘以勒諸塔一以著師之善繼一以厲來者之進修當有惕然自省者矣銘曰先佛振靈青童應徴拓化原兮生而質美逢佛輒禮性之存兮歷抵諸師答問難疑入無門兮大慈雲矗遮山絡谷法雨均兮奮襼直前一死敢捐心逾痻兮如欒瞑眩有眼不見耳無聞兮其指頓忘夜半月明叶如日輪兮周遍法界無內無外顯一真兮百千妙玄開目洞然照無垠兮為法出世附者川至度迷群兮瓦礫之業化為寶宫金碧文兮公侯之貴馳書奉贄祈普熏兮生滅兩非去住一機漫云云兮太虛凝碧萬里無跡絶纎塵兮烏石聿崇清泉不窮示法身兮遺行有煒表者太史勒堅珉兮寫經為像及血書心經贊無授上士請能細書者寫經成觀音大士像復出指端血書行經于像後來請余贊贊曰法門之相有總有别真身為佛佛說為經經屬于法佛乃屬人人法二相了不相即今因寫經以成佛身縱橫曲折無非經者小如沙塵中含法界可喻總相復刺鮮丹重書契經碩力所致如黃金色大雖徑寸視等針鋒可喻别相總别雖異其理則一由是觀之佛法廣大無所不攝即别即總非别非總上士于此忽然證得展卷之間不見有經經且不有而况于佛乃知妙用在吾一心與經與佛三無差别善思念之我說非妄宋學士文集卷第五十五芝園後集卷第五
