body:
  text: 故賢母熊夫人碣嗚呼是惟賢母熊夫人之墓夫人諱慧清姓黎氏其先贑之寧都人髙祖某宋金𬗋光祿大夫出知撫州因家焉祖天桂以能文五領鄉薦父槱母崇仁李氏夫人生七年母卒煢然無依飬于外家外家婦孫氏淡軒先生轍從女能椎淡軒詩禮之教故夫人通考經論語及涉獵史傳趣向絶出流俗萬萬時同郡熊本萬𥘉以英才自振拔淡軒謂宜配其父乃許妻之待年於家內外事皆攝治豐約中度能者亦以為難李母沒屬遺槖以備嫁資後母移置它産夫人若不聞知益考謹弗懈年十九歸萬𥘉奉舅某姑王氏執婦道甚先是其姒氏性𥚹且嗇謂夫出於前姑與王如不相能百事怠弗治夫人一反其政以所聞詩禮易之躬行實踐恆若惴惴然日執饋食之禮唯恐不及凡事必關決姒氏禮度雍容辭氣願欵有足節日夫人出坐髙堂群子姓鴈行立次苐舉觴上夀邦人榮之會偽漢起兵沔陽延蔓至郡夫人時遘末疾匿西鄰空室時於壞壁見屠戮之慘而終無入室者事定之後他時兵再入急出竄冢舍暴兵奄至鼎侍夫人誓與同死生俄而兵又退遷主安寧鄉萬氏家鄉民大亂將掠寓鼎嘆曰今殆不可免夫匆賊衆相謂曰聞熊毋賢且病吾寧他適弗忍恐之也卒免於難偽漢僣號遣使者徴鼎凡再夫人曰是虜狂悖不知有仁義其敗可立而待也未幾元閩省守臣章完者帥師出杉關以書招鼎夫人曰此固名正言順元運已去不可救藥矣鼎於是皆辭及我皇上定都建業遣衛國公鄧愈取江西聘鼎從事軍中夫人喜曰聞江表有真主興此誠可依也鼎自是顯融于時其明炳幾先類如此不幸以至正癸卯五月二十八日卒夀六十七省臣戍將咸致􅉠奠遂以某月日權厝先塋之次後重刻護法論題辭衢州天寧住持端文禪師不逺千里而來請曰吾宗有護法論凡一萬二千三百四十五言相傳宋觀文殿大學士太保張天覺之所撰其弘宗扶教之意至矣盡矣昔者閩僧慧欽嘗刻諸􅎚翰林侍講學士虞集實為之序兵燹之餘其版久不存端文以此書不可不傳也復令印生刻之今功巳告完願為序其首簡序曰嗚呼妙明真性有若太空不拘方所𥘉無形假沖淡而靜寥漠而清出焉而不知其所終入焉而不知其所窮與物無際圓妙而通當是時無生佛之名無自他之相種種含攝種種無礙尚何一法之可言哉奈何太朴既散誕勝真漓營營逐物唯塵緣業識之趨正如迷人身陷大澤煙霧晦冥蛇虎縱橫競來追人欲加毒害𬒳髮狂奔不辨四維西方大聖人以慈憫故三乘十二分教不得不説此法之所由建立也衆生聞此法者遵而行之又如得見日光逢善勝是自壞法也傳曰家必自毁而後人毁之尚誰尤哉今因禪師之請乃懇切為緇素通言之知我罪我豫皆不能辭矣禪師豫章人知寶大法如護眼目然身服𥿄衣躬行苦行遇川病涉者梁之塗齟齬者甓之枯􅟆暴露者掩之今又刻此論以傳誠無愧於有行沙門者矣故廬陵張府君光逺甫墓碣銘皇上即位之五年朝廷清明百揆時敘乃開文華堂禁中妙柬英材詔詞林羣公分教之車駕幸臨閲其所業文親定優劣上德至渥也時江西張唯流寓河南以尚書領首薦會試南宫未試除國史編修仍俾肄業于堂豫見唯有雋才特請于上録為弟子員唯執經日久忽􅒣欷流涕言曰唯父抱竒節不幸歿於盜手今體魄入土而墓石無文一念及兹將欲無生惟先生矜而卑之豫按亡友吏部員外郎周子諒狀君諱逺字光逺姓張氏吉安永豐人氣岸豁逹不徇於小物當元之季大盜起沔陽蔓延江右陷吉安既而州兵搗走之盜所過井落民皆相挻為變殺掠巨室慘酷不忍聞君怒髮上指日夜建竒䇿剪寇其友有羅惟逺者尚氣節遣人夜致之列酒炙于庭脫冠酣飲夜將半屏左右跽而告曰吾州素號文物之邦一旦盜蹂踐將無遺義不與賊俱生然非公不足濟吾事今郡守梁使君出督兵境上公宜往請師吾隂立部署以俟斫賊無難者羅抵掌于几曰子誠竒男子吾縱無他能敢不從命議既定君冡子庸猶未知君乃叩寢門令出拜復語之故庸曰羅先生若迎官兵至庸持大斧盡殺狐鼠輩不留一人羅舉觴賀君曰大兄有如此豪傑兒事不患不成也未發冦諜知之師衆執羅去祼而鞭之且問曰誰與汝造謀羅罵曰死狗奴吾憤汝不道自欲殺汝何暇與人謀哉賊怒愈鞭之仍授筆𥿄使寫首謀者名羅瞋目視之大書一死字賊反椄羅于樹剖其腹作小竅日增加之羅嚼齒大詈三日而後氣絶將絶詈聲猶含糊在口君幸得脫走吉水及寇勢少戢君還故里寇有知君遣羅事者縶之至營賊競來指曰是嘗欲殺吾屬者君顔色自若從容語賊曰我纓緌之家決不畏死喪節殺即殺毋以多言為遂遇害賊黨忿猶未平并欲屠君介子賢渠魁執不可慨然嘆曰彼固忠義人也寧可使其不血食邪為具棺斂使歸葬里之桐塘聞者莫不霣涕君博通經史篤風義事親以孝聞豪右以科繇困之君奉親避去旁郡不逺百里負米以為飬暨歿號慟幾絶者數四然嫉惡如仇閭師有貸粟多取息者勢橫甚君面斥其非直於州縣閭師恚欲夜繫死君聞州里萬口交譽不忍發而止賔客至門傾有無相接劇談古今事變二千年間如玉貫珠聮客為之傾聽忘日之夕且曲盡物情三尺童子上謁亦以禮受未嘗少忤性不嗜貨殖或勸為子孫計君笑曰能守先業亦足矣何以多為君子稱焉夀五十四遇害於至正戊戍正月其日不可復知自桐塘改葬於大塍之原則洪武辛亥八月某日也君配劉氏輕財重義人有顛連者解衣推食無吝亂離後家單每鬻叉鈿助夫賔客費後君五年卒子三長即庸次即賢有膂力能馳馬奪槊千人中後十一年亦卒季乃唯新擢今官女三俱適士族孫三憲文昌女二在室曽孫一祺君之系出自唐曲江公九齡九齡玄孫洪州都督參軍景重始來江西參軍曽孫簽判虔州洪字宏淵復遷永豐之杏園代多顯官至君曽大父元叔大父瑞伯父亨雖曰不仕咸能世儒業云嗚呼士氣弗振久矣當楚氛膠葛之時為二千石者曽不一舉手障之冦至輒俯首遁去日行百里唯恐不疾誠女婦留鬚鬛者也有如君者藐然一布衣無社稷人民之寄乃能建䇿殺賊不幸事不成雖肝腦塗地而不悔豈非烈丈夫也哉羅氏能從君謀身可死而志不可奪亦可謂慷慨之士取友之端又於君見之嗚呼志莫大於殄冦義莫重於捐生此而不銘惡乎銘銘曰元政陵夷盜起楚區絳巾嘯呼毒氣所侵蠱其良心棄鋤握􅚙叶眷兹廬陵羣邪沸騰千里血腥有夫桓桓髮上指冠誓除暴殘夜則枕矛血淚交流同志之求酣歌慨慷舞劒欲狂維籌之良彼何昏昏漏師弗懲賊我良朋正氣凜然雪為不寒欲膾盜肝君亦𬒳拘詈賊益竒以死徇之雙璧焜煌如星吐芒照耀四方君名岩岩重如泰山一死亦安史官造辭鑽于幽墟後世是師守齋類藁序古之立言者豈得已哉設使道行于當時功𬒳于生民雖無言可也其負經濟之才而弗克有所施不得已而形于言庶幾後之人或行之亦不翅親展其學所以汲汲遑遑弗忍釋者其志蓋如是而已奈何近代多藉為譁世取寵之具褒揚於贈餞之夫獻諛于泉下之鬼組織綺麗張浮駕誕以為能舉世安之曽無有非之者豫不知古之立言者還果如斯否乎此豫於顧君德潤之文不能無所感也德潤名輝鄞人也其大父鄉貢進士應春父學海先生叔川皆名士德潤幼承家學甫十歲即善屬文郡博士俞希魯欲以神童貢辭不就既長大肆力于經傳卓然欲以事功自見會無有薦之者乃閉門却掃喟然嘆曰吾身不遇矣殆將立言矣乎然經以載道史以紀事古先哲王所籍以牖斯民者也我當竭其思慮焉它若遊言枝辭春花秋蘂堪把玩於一時藝焉而巳我則不敢知人以德潤為知言德潤自是默索精思晝夜孜孜唯寐始忘之如此者埀三十年著釋圖一説約六十三圖徽二十一希言二十四事剡六十二治要十八體卦八解八辨十二議二十四傳七記論序文銘各三雜著十八賦六騷十九雜詩三百二十一合三十卷分為前後外三集通名為之守齋類藁云豫嘗受而讀之淵乎其莫窮約乎其若豐暢乎皆有契而混融有弗核焉核必詳也有弗擇焉擇必精也嗚呼其亦庶幾古之所謂立言者乎昔在宋時桃源王説應求亦鄞人同季父致招樓郁楊適杜醇諸公因就妙音院立孔子像講貫經史倡為有用之學學者宗之應求所著唯在立言它則未暇及故有五經發源五十卷奏議書疏詩文二百十一篇薦者列其事召為明州長史應求辭及其既歿敕建桃源書院贈銀青光祿大夫賜𬗋金魚袋嗚呼德潤立言之志未必下于應求今時無有上其名者秋髮𬒳肩亦且巋然老矣惜哉雖然德潤志士也內而不外者也名之聞與不聞非所計也豫故徇其外弟太子正字桂德稱之請序而藏之以俟後世之知揚子雲者元故纍贈奉訓大夫溫州路瑞安州知州飛騎尉追封樂清縣男林府君墓銘府君諱邦福字彥大姓林氏林出殷比干之後辟地林山因以地為氏子孫分居清河至漢太子太傳尊遷濟南晉太傅禮永康間又遷下邳永嘉之亂合浦太守祿又遷閩之溫陵自是閩中多林氏唐貞元中莆有孝子攢為福唐尉棄官廬墓致井露白烏之祥詔立闕旌其門孝子五世孫諱某當五季時仕于唐及沒夫人執氏扶襯還閩道經溫之瑞安值閩亂遂葬于縣之塔石村有馴鹿之祥人號鹿阡執氏卒合葬其地自後九世子若孫咸環葬左右其諱文慶者實夫人之九葉孫生古溪處士諱益甫復遷郡城生台州路總管府照磨諱桓實府君父也照磨君以孫常官七品當封父母援故事讓於祖贈從仕郎江浙等處儒學副提舉妣黃氏贈冝人府君局度孤騫不為屑屑詭行弱冠出遊蘇府公廉其賢辟為史蘇之寓公多權要頥指氣使州縣皆唯唯不敢較府君毅然不為屈有請托者却不聽且曰國法何可以徇人積勞當調州之幕職江浙行中書以管庫缺官借授處州松陽監稅改監紹興如坻倉府君釐革弊政出內皆有程顆粟弗私轉嘉興陶莊務副使時浙西大浸民嘯衆􅟃餱糧與抗者輒見殺上官檄府君攝尉事府君授以籌略分遣弓箭手掩捕之未幾皆獲議法者悉付重典府君走白部使者曰飢民無食雖萬死不顧何往而不為亂原其𥘉情不過魚遊釡中少活須臾之命如法家議無乃太過乎使者以為然免死者數百人轉饒處二州州之務居城闉稅課每屈府君運量有法皆以最登秩滿監衢州常山務絳巾賊起沔陽江浙諸郡皆繹騷弗寧時浙省左丞髙昌公出鎮廣信專總戎事署府君常山尉府君集義旅數千淬礪戈矛使習坐作擊刺之法號令精明部伍整飾不亂狗鼠輩欲乘隙鈔掠者皆吐舌散去會子溫登進士苐擢休寧尹尋輔江南行臺椽迎府君就飬未幾御史大夫子恣為不法人言沸騰溫以親故未忍擲其姦日恆鬱悒不樂府君謂溫曰吾能安吾貧慎毋以老身不行其志也明日溫率同列謁大夫力斥其子之非大夫慙甚既退溫即抗章辭去奉府君還鄉浙省左丞相康里公時承制得專封拜棹府君鄉郡知事郡民舉手加額曰吾州害與利林公知之我民庶有瘳乎適山寇竊發掠慈湖將窺城上下洶洶府君白于府曰事急矣奈何吾將以三寸舌却之乃單舸直走賊巢諭以禍福賊見府君至大駭爭持白刃相脅府君厲聲叱曰朝廷何負爾輩乃敢弄兵反藉使州縣賦斂急或不能堪當訴之方嶽大臣足矣今乃自麗刑憲官軍旦夕且大至舉族當作𦵔醢吾憐汝輩愚特來示以生道乃欲吾脅邪吾不畏死者任爾為之任爾為之賊衆愕眙相顧再拜謝曰明公言良是微公吾屬入鬼籙矣皆俯首退去為良民如𥘉朝廷時遺近臣經略江南官有異績者必超擢之有司方以功狀聞府君竟以疾卒夀六十又七府君明白坦夷不尚鈎距遇事曲直輒辨白無少讓人𥘉難之終服其明斷性好施與人有急難振之唯恐不及處伯仲間無間言尤篤於訓子故卓然皆有成立既而溫改福建行中書省管勾得請于朝封府君文林郎汀州路寧化縣尹夫人王氏贈宜人及溫纍升員外郎加贈奉訓大夫溫州路瑞安州知州飛騎尉追封樂清縣男夫人亦加樂清縣君府君卒之日至正十九年夏五月癸丑葬之日其年冬十二月甲申墓在永嘉縣建牙鄉先塋之側玉夫人先十七年卒子男子四人長即溫奉訓大夫福建等處行中書省左右司郎中次常從仕郎泉州路德化縣尹次嘉福寧州知事次寧行宣政院宣使子女子一人適福州長樂稅課提領項昱孫男七人本秉東乘䇿某某女四人曽孫男二人某某女一人嗚呼天之生材也一元之氣既運無往而弗周譬諸木焉或可為棟梁或可為榱桶未嘗不具特人用之有違其材所以每形君子之歎有若府君材信美矣乃使之淹回下列無以吐其胸中所藴及逄世亂則建䇿禦冦親往諭降卒使革心從化其氣量足以有為使之專城而居必有赫著愷悌之政奈何斫棟與梁而以榱桶用之嗚呼果誰之咎歟然而天定終能勝人府君固不遇矣有子以詩書起家為時名臣貤贈所及至于二千石之榮可無憾于九泉矣濂雖不及拜府君床下而幸與溫遊溫以前進士孔克表狀走金華山中徴豫銘義不得辭銘曰天之生材小大異冝用或倒施乃人之非恂恂林公厥材孔修苟竭其藴可鎮方州關市之征曷我溷之公笑曰嘻我斯受之料量既平出內無愆人或不足我則𥙿然山寇跳踉鋒蝟斧螳以􅟃以攘以撼大邦公乘單舸直入其阻威容言言其氣若虎賊黠而疑羣而趍之執刀圍之人為危之公聲如雷震破賊膽再拜稽首今則焉敢轉彼昏昏易為昭昭棄其戈矛爾􅎟爾苗古有薦士逹諸巗廊孰持使節不發一章公雖不遇有子承家龍光炳煥泉壤增華建牙之鄉馬鬛其封史臣勒辭無愧於衷師古齋針并序師古齋者豫學子連江陳子晟讀書之所也子晟今人也其曰師古者何志所存也志之所存奈何事不師古則苟焉而已言之必弗詳也行之必弗精也弗精且詳則滅裂之弊生而頽惰之氣勝矣能師古則反是然則所謂古者何古之書也古之道也古之心也道存諸心心之言形諸書日誦之日履之與之俱化無間古今也若曰專溺辭章之間上法周漢下蹴唐宋美則美矣豈師古者乎子晟春秋方盛為古文辭水湧而山出薦紳先生交譽之豫恐其或偏也為之針曰爾欲師古古何所師法言大訓日星昭埀爾繹爾思志須刻苦欲禔其身必入其户中唐坦然由户及庭有宧有奧以次而升惟學亦然懼畫於淺日造其深所見乃逺人已兩盡方為極功毋局於文一偏之攻此謂師古古訓是式我作爾針服之無斁吕府君墓銘公姓吕氏諱民順字國安贛州興國人曽大父某大父宏略父志熊妣易氏公生八歲戍將萬夫長過其家憐公黠慧抱置膝間問曰爾能偶句乎曰能因出七言試之即應聲成對一坐皆驚稍長以力本尚義稱家用益𥙿無物不周然好與賔朋遊每逄令節必折簡邀致肆筵宴饗之酣觴淋漓雅歌投壷必盡歡而後止歲甲申犬厲為人災朝疾而暮即殪有一室盡喪者積尸縱橫無人具棺斂公患之與閭右大姓謀俾道家者流熒而除之公齋戒沐浴對越七晝夜儼若有臨其上者厲氣為消邑宰失刺不花敬愛公甚唯公言是聽未嘗干以一髮私鄊民謝氏為強冦所誣搆獄案具將上公從容一言白其冤謝獲免終身不令謝知之俗好競渡當五月五日造船為龍形飾以五采鳴鉦鼓鼓譟奪赤旗以為樂觀者如堵墻公訶子姓曰是非君子之道也禁勿往往輒有罰公蚤喪父言及每埀涕事母夫人唯恐違其意卒以孝聞愛弟民瞻一日不見則愀然不樂民瞻夭遺孤以仁年甫十四公鞠之育之逾於已子以仁復卒生二子尚幼公為保抱携持使守其先業迄今有成公生于至元癸已八月二十日歿於至正乙酉十月某日瀕歿精神不亂呼水起盥手端坐而逝享年五十三以明年丙戍某月日葬于縣西九峯山之原禮也公妻劉氏諱淑仁同縣清德鄉人生二女前卒繼室亦劉氏諱福真亦同縣人家於寶城鄉四子震復鼎益三女適劉平可李永堅張良貴良貴妻少房歐陽氏出孫十人女四人豫躋法從時復實為丞奉常相與交遊極歡復間請銘公之墓豫謂公孝以奉親仁以及物禮以馭下皆可以無憾冝勒銘墓門使百世之下有知公者銘曰世逺道散俗乃分孰能障之狂瀾奔夫君屹立志有存制行如古敻絶群有不信者徴斯文吕母夫人劉氏碣豫既銘吕復先府君之墓復又請曰母夫人劉氏年六十四以至正庚子七月一日卒明年壬子十月某日葬贑州興國大足鄉賴嶺之原與先公異穴其事不敢附書于前銘敢泣血銜辭以請惟先生成之夫人諱福真贑人也父東可為邑之望宗妣某氏生十六年歸吕府君民順顔面嚴冷語言不妄吐黎明出坐堂上戒諸子曰爾治田賦爾應科繇爾懋遷有無如期皆集不敢違尺寸晚則會妾媵于一治絲枲至夜分無先寢者中外畏之如嚴師子姓聞謦咳而至皆肅容拱立俟其過而後去遇鑠石流金之候流汗成漿不敢服短製以見雖嬰兒夜啼者輒紿之曰姒母來姒母來啼亦即止𥘉府君娶劉氏淑仁生二女少房歐陽氏正一生一女未幾後先歿而三女纍然也夫人視之如親産子暨長擇名族歸之裝具充衍無慊及府君歿人有弱其孤幼者搆事擾之或攘其疆畎或徼其貨賄蜂起泉湧夫人處之泰然鄰嫗有窶者其産鬻巳久乘隟數徼其直強謂餘錢未嘗庚夫人如其言與之上下持不可夫人曰貧故也豈其所樂為哉元季兵亂供億日繁千金之家皆赤立夫人能隨機應變有司不敢侮家業卒仍其舊兵定子姓欲析居夫人曰祖宗之業不可失也會娣姒議鳩材建宅一區俾同㸑焉晚年奉浮屠教尤謹朝夕誦佛書纍至數千卷其於世事淡如也子男四孫男十孫女四詳見府君銘中兹不書易曰家人利女貞釋者曰家人之道利在女貞女正則家道正矣又曰有孚威如吉釋者曰必有孚信則能常久必有威嚴則能終吉其夫人之謂乎法當銘銘曰婦子嘻嘻其家乃漓家人嗃嗃其終乃吉有美夫人其志也遐以嚴御衆肅而不譁質而不葩終以肥其家銘以昭之言則非誇恭跋御製詩後釋門宏勝無理不該無事不攝其於忠君愛物之心亦甚懸懸凡可以致力雖身命將棄之况其餘者乎人徒見其厭離生死輒指為􅓦滅之行嗚呼此特見其小乘者爾吾佛之為教豈至是哉天寧禪師祖闡仲猷以髙行僧召至南京會朝廷將遣使日本詔祖闡與克勤俱祖闡不憚鯨波之險毅然請行上壯之賜以法器禪衣之屬令太官進饌饗于武樓下且諭其國敬浮屠冝以善道行化時天界禪師宗泐嘗賦詩餞之其詩上徹御覽遂俯賜和答詩凡一十八韻首言王化無逺邇一視同仁次言冝誘以善道庶契西來祖意次言經涉海洋雖甚艱險君臣大義毋忘次言以平等法行之無有彼此之異末言使畢言旋方盡始終之義其丁寧反覆之意不亦至哉祖闡受命而行自翁洲啓擢五日至其國境又踰月始入王都館于洛陽西山精舍一遵聖訓敷演正法無非約之於善聽者聳愕以為中華之禪伯亟白于王請主天龍禪寺寺乃夢窗國師道埸實名剎也祖闡以無上命力辭之且申布威德罔間內外所以遣使者來之意王恱命揔州太守聞溪宣同僧淨業等奉方物稱臣來貢祖闡既入覲天顔怡恱賜白金一百兩文綺二縑祖闡以謂遭逢盛際躬承光寵不可無以示後裔乃粉黃金為泥書上賜和詩成卷勒其副名山屬濓識其事於左古之帝王寵賚方外之士固不敢謂無之而鮮以天章賁飾之者今祖闡之逢可謂優鉢曇花千年一現者矣其東旋也將見五色天光烜赫於龍山之上晶晶榮榮直燭霄漢飛潛動植皆與有榮耀焉抑濂聞普覺果公昔處浮屠中而念君愛物之念皎如出日張魏公稱其非聲聞獨覺私厭生死者比人至今言之祖闡固普覺諸孫也其出將使指不辱君命倭人慕化稽首來庭豈樂􅓦滅者可冀其萬一哉宜其簡在上心而褒嘉之命屢下也濂不侫忝居法從故不辭而為之書上以昭帝德之廣𬒳下以白釋氏之有良材云李大猷傳李碩證字大猷姑熟人父深肥遁山林以書詩為教自號靜軒母陶氏無嗣晝夜禱於觀自在佛夜夢一比丘尼乘白鹿車抱嬰兒授之曰此福慧兒也善視之既而有娠生未逾月兒忽身熱如火不進乳陶方以為憂復夢前比丘尼持栗數顆嚼食之夢覺兒汗如雨遂瘳年四歲嬉戲父膝下因授以記姓書兒曰此有何義讀之將奚為父大驚更以孝經一誦即能暗記稍長益駿發異常父嘗手書首楞嚴圓覺二經逐卷取讀之力白父母學佛于城南頓覺蘭若祝髮受具戒制今名碩證走大石山中與僧法秀遊秀有髙行願證期取法焉久之杖錫耒南京謁淨覺師於天界禪林師見其俊邁命為侍者謂之曰子才鋭甚冝留意文學他日期子弘宗扶教也於是獨坐一室竺墳魯典無不研窮之著為文辭森然有竒氣一時名公巨卿皆愛敬之與其相倡酬師尋命掌書記洪武戊申出世嘉興水西寺庚戍遷吳興之道埸未幾退居武康山中著觀幻子內外萹以合儒釋一貫之妙其內篇曰釋教其目十則宗本教述會源非即必悟示證朂志古今不昧寂動也外篇曰循本其目如釋教之數則性上性中性下人物道述克巳至樂言命為巳學方也曰適治其目如循本之數則禮樂封建井田兵問用刑尚德儒吏經權三尚圓象也曰史論其目如適治之數而逾其三則宋襄儀秦秦漢文武儒老魏吳漢晉虛玄梁上梁下惰唐後周也皆踔厲前人其光燁燁不可襲祕聲名突起搢紳間癸丑之冬願證還天界濂時侍皇上升武樓遙望禪林顧濂曰其中有良僧乎濂對曰近有二僧從吳越中來皆能文辭上曰其名謂何濂對曰一則願證一則證傳上曰試取觀之濂因進證傳文一編上親覽終卷曰是或儒者之所不及復問願證所著濂對曰太常丞張丁家有往復論性書遂遣中官召丁携書至上復覽如前喜曰論議甚髙其鐡中錚錚者乎明日召見謹身殿慰勞備至敕吏部皆除應奉翰林文字賜苐太平門及妻妾合二凡日用百需之物無不周復命中祕給書籍令閉門習讀三月俟髮長勝冠然後涖職後三月願證有疾上意其沉鬱多痰賜藥吐之疾稍減巳而復劇中使問疾者絡繹于道竟不起病將革時唯仰首言曰死則死所可憾者受上之深恩不能報爾遂口授其友草謝表表未終而逝上夜夢願證耒謝服大布寬衣巾稍欹叩其家人服色正同因移棺撼巾不正上尤嗟異焉時洪武甲寅春二月也夀三十七云史官曰昔在宋時仲靈嵩師鐔津李氏子也每夜戴觀自在像誦其號十萬乃寢自是世間章句不學而能遂作原教論明儒釋一貫以抗諸儒之説韓魏公琦歐陽公修皆尊禮之今願證亦李氏子其母亦纍禱觀音而生亦博極羣書亦著為論説以明儒釋之道亦異矣哉豈弘宗扶教代當有其人濂歟固不敢謂願證之如仲靈也其志之所存抑果有不同者歟然仲靈進正宗記僅得仁宗賜𬗋方𫀆及明教之號願證則屢𬒳龍光親拔為王官使其得壽則道行于時澤兼𬒳于蒸黎不特如仲靈專輔本教而已木方榮而風折之悲夫濂與願證交愛才之念不下於韓歐二公弗忍其名不傳也故徇全室泐公之請具著其事于萹故懷逺將軍髙昌衛同知指揮使司事和賞公墳記公諱和賞畏兀氏世居髙昌曽祖紐憐事元世祖有功封髙昌王祖帖木兒不花中書左丞相父不答失里中書平章政事皆襲王爵母也先忽都封王夫人公性警敏能知時逹變幼亦紹王封鎮永昌洪武三年大兵下蘭州公賫印綬自永昌率府屬詣轅門內附詔授懷逺將軍髙昌衛同知指揮使司事世襲其職公乃開設官署招集降卒數百人會宋國公馮公勝奉敕征井肅命公移鎮西涼轉輸饋餉無乏朝廷嘉之不幸以七年九月二十八日卒于南京之寓舍年二十有八以十月八日葬江寧縣聚寶門外五里吕氏花園上遣使者祭奠恩禮優渥人皆以為榮公妻曰都堅子一人太平女二人在室惟公生于王家暨入國朝榮膺顯爵方以事功自見而賦年不永惜哉因為疏其世系及卒葬大槩納于墓以志其哀故成穆貴妃壙志成穆貴妃孫氏諱某其先世居陳州父和卿仕元朝因家江南毗陵母朝氏妃稟性賢淑聰慧過人父母既亡長兄楧治家事值元末天下大亂妃年十三隨次兄範避兵揚州遇青軍陷城一時離散範不知所在元帥馬世熊妻遂育妃為義女年十八未聘上聞其有容德詔納宫中及至言行皆有禮法如古賢女嘗請于上訪求楧得相見上即位册為貴妃位居衆妃之首妃益小心恭謹事上甚至有警戒相成之助佐皇后以理內治宫壼肅雍上下咸無怨者侍上十有五年生四女其第二女蚤卒洪武七年秋九月癸未妃得疾至庚寅薨年三十有二上為之感悼詔諡成穆復緣人情定議命東宫親王持服一期勑有司營葬具甚厚念其無子賜田租三百石令楧供歲時祭祀之費卜日未得吉停柩宫中者兼旬至十月巳酉始權厝京城朝陽門外禇岡之原禮也塗殯有期謹奉勑書其卒葬歲月納諸壙中嗚呼哀哉宋學士文集卷第二翰苑續集卷之八
