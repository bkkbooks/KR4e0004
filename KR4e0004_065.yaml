  text: 宋學士文集卷第六十五芝園續集卷第五
  hash: sha256:c1ffe93273697b287d9c8a93c84ce73f7a635b3944407ead74cf9ad111ae4585
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_065-1a}
body:
  text: 蘭溪法海精舍記義烏伏龍山有大浮屠曰千巖禪師長公以高峯之孫中峯之子表樹法幢倡明教外别傳之㫖非惟中夏學徒海赴雲蒸逺而龍荒蠻甸辨韓巴𤏡之人莫不持薌膜拜咨决疑情而其上首弟子既皆於道有證各搆蘭若分續化機大江南北往往有焉若今有源師所建法海精舍亦其一也有源名允清金華人淳熙丞相王魯公諸孫蚤嘗受經石門剛公元至正􅉝巳繼往千巖座下得度為大僧留神禪觀脅不沾席者十年一旦入室機鋒相撑觸雹撒飈揚莫窮涯際千岩欣然頷之乃屬其出遊閩浙江淮間以求印可有源所見諸師了不異千岩時退隱故山文彩自露尋以郡守之聘出世衢之子湖安國禪寺遷信之玉山興教禪寺百廢具興皆有光于前人國朝吳元年丁未飛錫蘭溪之龍巖樂其山縈川回風氣襲藏乃嘆曰吾知宫宅地形之術蓋有年矣察其詳徴無有弗驗者如此靈壤可不開般若之埸乎遂即南洲建法海精舍一區越三載乃成後聳傑閣中峙寶殿前敞髙閎兩序衆寮映翼左右有源徴豫為之記豫年踰七十凡索文者皆峻斥見有源素髮垂領道貌淵雅語言悃愊無華不覺心許之因為敷坐而倡言曰法界有情種種傎倒執妄為真四大假合如水上沫聚散無定强指為身六塵緣影如火中𦦨起滅弗停堅認為心隨因成果墮入諸趣出此入彼類風轉輪大覺聖人起哀憐心廣說三乘十二分教使其照知本來真心廣大靈智無物不含元理弗攝心佛衆生三無差别本來真身圎滿空寂周遍百界不動纎塵惟寂智用合三為一人能有所悟入始能了空障執直超無上菩提然非因像生敬因敬生悟思求脫離如無舟筏欲濟大河無有是處古之導師方便設化廣闢精廬為之棲止嚴事像變為之瞻視潔清香華為之供飬皆使其革妄趨真了此身心而巳今有源灼見於斯取則前古鞠明究曛孜孜弗懈亦可謂度越人人者矣雖然此實人天小果之因耳或具大乘器者來遊來止當知萬法本空一塵不立大光普照涉入無礙無佛道可悟無衆生可度洪纎髙下草木走飛色色形形紛紜舛錯皆吾一實境界樓觀云乎哉修證云乎哉嗚呼教外别傳之道廣矣大矣又當從此而參之精舍之建其用錢僦工動以千百計兹不詳書而獨舉身心之要為言者財輕而法重也題傅氏誥勑後傅氏為義烏名族世居雲黃山下自徐陵著善慧大士碑巳載縣之豪傑傅德宣之名其來固巳久矣宋𥘉始自山下分為青岩蘆寨二支皆以書詩為業而蘆寨𥘉遷之祖名雄雄生忠卿忠卿生玘玘生勝元勝元生思某思聰思某生䕫䕫生芷思聰生時中大中大中生奎思聰嘗官迪功郎以時中國學得解進士特封修職郎致仕淳熙十一年五月所下誥是也大中以奎饒州得解進士特𥙷迪功郎致仕紹定五年八月所下誥是也二公雖有長才皆因慶典所推始沾恩命唯芷能擢淳熙五年進士第僅得之台仙居尉以終芷之從曽孫藻以芷遍通六經而文詞蔚贍不能章著于世乃搜芷殘誥與其補充大學生時所給麗字號綾牒聮為一通以繼修􅕄迪功二誥之後示諸子且屬某識之某竊觀先師黃文獻公之所題識深惜傅氏之先懷才而不試謂藻妙齡秀發委祉冝有所在今藻歷官禁林講學東朝拜監察御史出守武昌則其光顯前人者多矣公之先見有若蓍龜似無毫髮之差也因不敢辭本其世系而詳耆之卷內有孺人吳氏誥尾吳氏諸暨流子里人大中之妻也題識中所謂金昌年者字壽翁淳祐七年進士有異政其知慈溪也嘗浚慈湖溉田千頃民至今尸祝之歲月未久鄉人及無有知其名字者故附見焉跋胡方桞黃四公遺墨後右鄉先生手帖四𥿄前二帖則修道先生胡公汲仲巖南先生方公韶卿與梅溪傅君者也後二帖則栁文肅公道傳黃文獻公晋卿與𥘉齊王君者也巖南有異才常遊杭都盡交天下知名士將作監丞方洪竒其文以族子任試國子監舉上禮部不中第㑹天下多故三以䇿告丞相陳冝中不聽後以特恩授容州文學未上而宗籙巳訖終身思宋一飯不能忘每語及之輒涕泗交頥世稱為節義之士胡公實巖南至交而桞黃二公皆其門人是三君子者其學行巳載元史人咸得聞之唯岩南不出仕世之知者或寡故濂特加詳焉梅溪諱光龍字子才時為嘉興路教授仕至福州候官主簿以終𥘉齊諱良玉懷璞其字衢州常山縣教諭今翰林待制禕之父也𥘉齊乃梅溪之甥金華俞恂又𥘉齊之外孫其簡牘流傳蓋有所自云恂來學經於濂以濂常及灑掃栁黃二公之門裝禠成卷俾題其後義不敢辭俞先生墓碑洪武元年八月草有二日元鎮江俞先生卒于家先生年九十矣鄉人學士猶痛其卒之早而嘆恨以為失所師九月十九日葬于崇德鄉鳳皇山之原執紼送者數百人咸哀戚如喪其私親先生善人也德可師而文章有聲于世故人幸其生而悼其死既久而不能忘之先生之先居溫之平陽曾大父某宋紹興司戶參軍大父某為廬江令始遷鎮江父德鄰鄉貢進士趙曾公葵開督荆襄辟為記室參軍兼咨訪籌䇿甚禮重之宋亡為元丞相阿术建行中書於揚州徴為左右司郎中不就以先生貴贈丹陽縣尹至元十六年先生在娠丹陽夢魯公與語若有所屬翼日而先生生故名曰希魯而字則用中也先生為兒童巳卓卓不凡群兒誘之遨譁不為動嗜學強識年十五繼喪二親哀而不越禮季父酉發宋太學生有學行先生師之復受學于陳公膺志超氣明融㑹濬發名士多樂與交年二十四部使者以茂才舉授處之獨峯書院山長終三嵗移饒之長薌書院除慶元路儒學教授教有方士人服之任滿赴吏部群公欲舉為國子助教以母老願得祿江南辭擢歸安縣丞至則修孔子廟學化民出田飬士㑹海溢鹽官令民伐石以為隄郡吏議石盈五十斤乃受細石山積棄不用石湧貴先生命民為竹畚居細石如其數納之價减三之二民悅稱便他邑皆效之嵗凶說巨室出粟振寠夫督輸租稅于杭俾倉吏先小民後及大家小民以不困獄訟務致其情囚廪乏則與其僚為糜更餉升江山縣尹階從事郎先生為書本其風俗申以訓戒懸示民民未久皆從令莫有犯者部使者至怪其無訟密詰之道尹善無異辭乃悅而去郡長吏圭田屬縣境歲遣家童徵租田者告病憚先生嚴明逮去不敢橫丁生母憂服除改丞務郎永康縣尹葺完廟學如江山時聘名儒相講說民咸喜得尹為師里正保首繇于官者前吏苛虐之不得消息先生令其半返舍有徴發則召否不復問郡苻縣編役民之叙為䇿書先生聽民相推排以資力髙下為輕重不使吏持其柄吏噤歎莫敢出語豪民黃私洪之妻與妻謀殺洪繯頸懸屋楣詐為自經而亟焚其尸吏以無可驗弗之詰先生聞召洪叔父問之叔父畏黃不敢泄先生令訴于部使者請委尹鞫即可明部使者果屬先生先生捕其二女奴訊之各引伏妻與黃皆論死先生學行尊雖仕下位公卿貴人皆敬禮之行省每大比輒延先生進退士主其事者三同考者四其門生學徒多貴顯于世而先生年六十有六猶為縣令至正十六年乃上章請謝事明年詔下以儒林郎松江府判官致仕皇上定都金陵聞先生老儒賜以粟聘至問政教之要巳而稱聵辭歸上官其孫桓俾以祿飬恩禮甚至先生于學靡不通為文宏厚凝檏豐衍不窘人多傳而貴之而退然未嘗有驕忲之色遇兄弟姻戚皆盡禮女弟贅壻求異居中柝其財以卑之既柝以侈廢復飬之于家無厭色寬恕樂易與人交不求其備而有善必稱譽使聞于人人望之者敬知之者服久與處者自以為莫及也先生將卒以所著聽雨軒集二十卷授子文圭校遺脫是夕疾作舉手曰吾三日人爾如期問家人以日早晏皆對曰五夜矣强起倚桓背執文圭手而逝先生母王氏繼母張氏生母則周氏俱封冝人娶營田副使陳鈞女封如其姑先三歲卒一子文圭二女適朱昺張伯祥孫男三人長楨夭次桓也同知太原府石州事次彬孫女二適鄭野葛鏞曾孫男三人女二人𥘉先生嘗以銘墓屬其友之子王有壬先生既卒有壬曰先生文邃德髙得名世人銘斯可稱吾其敢為乃狀群行而使桓來請余曰元之混一天下四年而生先生閲九十齡而見其亡始終哉先生之於國也乃為銘曰宋遷而南土裂不完百五十年始歸于元先生之生海宇甫一風氣混融異才乃出少觀其𥘉壯逢其康九十年間見其興亡事功失得可悲可喜誰實使然肉食多鄙豈不得位位與才違微出緒餘為世吏師嘉績如雲道則在此奧論宏言著于千祀人壽之長不與國同或佐其始或成其終孰如先生與國均壽壽則甚多國則巳陋視國可悼匪悼其身後人來觀元之壽臣礲硿子碣礲硿子鄭氏諱斗字德方台仙居人仙居有山髙特者曰石礲硿而礲硿子適家其下人以其德峻拔與山類因號之曰礲硿子云礲硿子少有偉氣學書未成舍去攻醫以藥人病者至視其貧即卑以藥不問直有無大疫起比舍駢首臥姻戚畏懦莫敢顧礲硿子䄂藥出入疫家躬和煮治療不少有惓色人德之既而礲硿子益壯乃更悔悟謂吾先人本以儒顯聞吾可易他術墮先人名即以藥肆授族人之貧者而刻志於學凡聖賢經訓及古今成敗之籍皆探䆒奧密抉擲端緒身由而志存之形諸言動文辭蔚然有古風正家睦族具有典法推其餘以周恤人汲汲不厭元至正癸己大旱民或鬻子以食礲硿子戚之擇腴田易粟富人以賑饑者數百家賴不莩死後二年海氓作亂礲硿子率鄉人避其難偕行者或攘人雞礲硿子不忍責私以資償之後咸悔戢不敢肆盜發括蒼將犯礲硿子鄉邑礲硿子戴鐡帽杖鐡杖練習里中子弟為隊伍以備之盜聞解去守將知礲硿子才可用遣使者持幣蹐廬起礲硿子謀其草事礲硿子知亂不可救拒弗納巳而元亡礲硿子亦且老矣遂隱不復仕惟日推所聞知授其徒同姓來學者飲食之礲硿子方嚴好義有非義者以禮開說使入于善故存而鄉人以為師既卒咸悼惜以為失所依礲硿子年六十國朝洪武十一年二月草有七日卒於家明年正月四日葬于七里之原礲硿子裔出漢安逺矦吉宋建隆𥘉有名修者自永嘉徙仙居歷十一世至户部侍郎雄飛以文學發聞于時台學祠六君子户部其一也從子憲為國子博士遭亂死于孝博士之兄慰實為礲硿子之曽祖大父合父樞妣張氏宋司諌次賢之孫元慶元路教授國真之女夫蚤死以貞節稱礲硿子娶妣兄之女先八年卒三男子曰光明曰顯則曰光韜顯則黃氏出推擇為縣弟子貟貢太學選髙等以鄉先生張君熙狀請銘余與台士遊固知其多竒才晚乃得礲硿子焉於是知余於台士未足以盡交之也銘曰少而竒壯勇於為愈老不衰誰執其機弗大其施有積無虧惟後之垂恭題賜和文學傳藻紀行詩後新知武昌府事臣傳藻以其為監察御史時所受賜和紀行詩四首視臣濂臣拱而言曰天之道不可窺也觀乎日月星辰之晦明則知之地之道不可測也觀乎草木蟲魚之生息則知之聖人天地也其靜也與道謀其動也與神俱苟非發於言語文章何由而見天地之心乎臣獲事皇上二十年睿謨英斷雖非淺陋識所能知至於求賢若不及愛民如赤子此臣之所熟聞者也由此四詩觀之望藻可謂甚切而於民事尤詳及之庸非然哉臣與藻同師且同郡識其為人嘗求其受知之故蓋藻存心恕持法平其以御史使江淮間紀行之詩多寓諷諫之意故上喜而和之益可見上之待藻與藻之事上交盡其道也視夫導君以諛說及與臣下爭名者相去不亦逺哉臣老矣退伏田里久欲無言矣以曾執筆繼史官後敷贊聖治職有冝然者故為藻書之藻自御史轉太子文學後復為御史遂出知武昌云洪武十二年秋七月宋濂題題樓時和勑牒後宋之制群臣有官勳者其所受恩澤可以及其子孫又可推之於姻戚其善善之長抑盛矣哉此乃義烏樓時和以果州防禦使劉滌死事功得𥙷充將仕郎之牒非特見當時制度而先生之遺仁餘澤猶可概見後之觀者寧能無所感乎趙使君像贊宋之王孫元之循吏才優識明政通民治未老而歸臨難不二懦夫觀之可以作氣書劉生鐃歌後伯夷桞下惠飭身制行皆高於當世然揆諸大中之道或不能無過故其流至於隘與不恭甚哉為師之難也近代以文章名天下者蜀郡虞文靖公豫章揭文安公先師黃文獻公及廬陵歐陽文公為最著然四公之中或才髙而過於肆或辭醇而過於窘或氣昌而過於繁故效之者皆不能無弊惟先師之文和平淵潔不大聲色而從容於法度是以宗而師之者雖有髙下淺深之殊然皆守矩蹈規不敢流於詭僻迂怪者先師之教使然也烏傷劉生剛從余學經為文頗久近製國朝饒歌十二曲傳於逺邇士君子稱之顧子豈能使生至是哉實先師之遺教𬒳人深且逺故耳余少於斯文蓋有志焉及今尤真知之然後嘆先師之不可及也後之有志於學者非果有得於古人之法烏知余言為然哉跋鄭仲德詩後浦陽鄭君仲德生之歲與余同其名與余同少而從學於吳貞文公又與余同長而多髯又與余同不善飲酒又同余中嵗自金華徙居青蘿山中又與之同里故余二人交最洽也去年冬余朝京師仲德欣然與余同舟遊三吳山水間起居飲食無有不同者仲德既至喜斯遊之美發為歌詩以寫所遇而余則入侍兩宫晨趨而夕還留數月無一日之暇卒不能繼仲德之作心竊自嘆兹遊也幸與仲德同而景物之佳者皆為仲德所攬結余不獲效焉何其異耶及乎東歸仲德纍以為言余耄昏好睡竟不能成詩以與仲德相馳驟既而笑曰物之同者一則同二則異矣余與仲德方相與如一人仲德之言猶余之言也何必出余之口而後為同耶仲德之詩美矣而余效而似焉尚未免為異苟不之似非自取異耶多言以求異曷若忘言而歸於大同之域也耶仲德知道者也必以余言為然永康徐府君墓銘君姓徐氏䕫友龍名與字也金華之永康所居邑也諱興諱盛及正孫者曾祖祖考也翁氏妣也祗祗翼翼人不見其怠容兵亂家資傾瘁心勩力營度綜核卒完以充歉歲發餘粟振里閭溫而恭好禮而文遇士友有恩其德也七十有九夀也元至正壬辰十二月二十四日卒之時也明年十一月十六日葬之期也元統癸酉九月二十七日卒者其配盧氏也六十者盧氏夀也甲戌十二月二十日盧氏葬也義鄉岡谷之原墓所也道弘道惠道杜子也張某吕某壻也儔俊供倧福寧偉孫也椿桔棠根棋音本儀禧敬曽孫也今為國子生授保定稅課司副使者棠也去君之卒一世矣棠不敢忘而圖銘以傳其志事悲也余與君同郡雖欲辭不得而辭也銘曰善蓄躬豈必名耶全壽終奚以榮耶德其豐厥胤隆隆殆將興耶塤箎軒記泛浙河而南舍舟登陸有地曰漁浦土沃以亢池園樹林碩美蕃茂魚稻充羡百貨之所趨行旅之所集聚似市而不澆近野而不俚故其人多優遊而好文其尤以禮讓為人望者稱華氏余自京師還華氏之秀者曰拱辰侍其父候于河滸逆子至其家館於賔次率其兄弟庭揖畢俯身自東階趨退足武相蹈不越尺寸徐與之言長少相顧擇辭而發懇然不煩秩然不畔于理皆良士也視其室名則曰塤箎而豫昔之所書者拱辰謂盍有以記之天下之物取諸人者有盡而本於天者無窮能充天之所與則得於人者可棄而勿論矣世恆知在外者之可樂而力取於人其受於天者則怠而不顧卒之兩無所得而戚戚以終身豈非惑㦲今華氏兄弟以言乎爵則未嘗仕以言乎財則非甚富以言乎車馬衣服則雅素儉質與凡民等然入其門則父子有禮兄弟有恩忿疾之聲不聞于室和煦之色不絶于面食力而趨事安生以自適雍容怡愈不教而勸而未嘗有資於外物何必取諸人而後可樂哉其善充於天也固美矣天之所與者至重也苟善充之雖困貧甚天猶以為貴也不能充之能位極乎崇高天猶以為賤也若華氏之為天之所貴者也余安敢遺之而不録乎題黃文獻公所書先府君行實後右黃文獻公乞銘於桞文肅公之狀文獻公以學問文章名天下此雖造次所書而考據精詳倫序不紊事信而辭實言遜而禮恭皆可以為法不特字畫之美也濂常執業二公之門於是二公之卒巳久矣永念今昔撫卷慨然題李烈婦墓表墓銘後李烈婦墓文二通余友揭君伯防王君子充之辭也烈婦死十餘年二君文其墓今又十年而二君無在者矣人生不足恃惟令名可以無窮覽斯文者可不深長思乎象山王君墓銘國朝平四明蘭山民為亂寇象山虜縣令丞據縣及縣大姓王君剛甫散家資率敢勇士襲其營破之執縛魁酋數十人跪于庭罵曰汝冦郡縣囚命吏劫平民為害罪當死遂斬之散其餘黨迎令丞以歸郡以其狀聞詔賜白金二十兩縣圖其破賊狀于鳯躍山佛寺之壁是時朝廷聞亂發近兵誅之兵及境欲屠從賊者㑹君巳誅盜兵乃解象山民數百環君拜曰微君吾邑幾以不義死由是君名聞浙水東君諱某剛甫字也其先祖某自升遷閩復自閩徙象山曾祖諱子俊祖諱文盛父諱芝季父芭無子君以父命後之君祖父皆善士世以資聞至君尤敦厚有氣量為學務逹大意能操縱斂散資愈多然好周施喜士人稱其義元季嘗以通蒙古書薦為慶元路蒙古字學録盜起黃岩江浙行中書省檄君攝東門巡檢司事攝六年盜畏不敢一人登陸及君去官東門𬒳兵民追思君歌慕之年六十有八以洪武十二年正月某日客死於京師識君者咸悲傷之君娶葉氏宋丞相夢䁀曾孫女繼董氏許氏子男二人用䁀好學通詩用釜君卒後乃生女四人其二適林文孟林起宗二在室孫男一曰岵銘曰古重巨室齊于世臣望大聲隆可以鎮民民或思亂伺隙以動呵而止之俯伏震忠豈若細人勞而少功勢卑言輕其誰肻從海島之間萬室蟄蟄煮海樵山易化難縶世當治平不敢蹻騰或逆其情據扼阻兵乘亂未弭嘯呼以起火矢風艘入冦東鄙君曰島蛙自投釡中沸湯方然汝計巳窮怒叱壯士盜不可長縛斬軍門以取峻賞大兵東來欲剗穢腥聞難既夷飛書大庭函金走驛一日千里旌爾義勇以勸來者父老相携環拜于塗非君有為幾受盜汚鳯躍之山圗畫君像此則其藏過者稽顙李信甫墓銘建業有䔍行士曰李君諱汝成字信甫居家能惠其鄉信其朋友遊京師卿大夫皆重之勸之仕不聽竟歸賈六合市上物價减恆市人之半客遺錢五十緡而去遣人追之不及抵其家授之人以田宅來粥豫直視物倍問故則曰欲子孫久守之也年七十以元至正戊子八月日卒于家君娶郗氏再娶吳氏年五十無子或謂施金飾浮屠像當得子既而夢神人授二栗後十年連得二子長曰讓次曰疑郗生一女適句容王某孫男四人曰某某某某君之先太原人曾大父某徙潤大父大振遷建業縣曰上元里曰李岡大振曰此符吾姓冝居遂居之通術數父義亦善士子疑好學行義儒生稱之以某年月日葬君于某所來請銘疑言不妄古所謂視其子知其父者疑與君之謂耶銘曰不汲汲於名終以善稱不斷斷於得終以資贏人維其然故有合乎天噫彼力爭而智取者曷不視乎斯阡栖雲室記中峯本禪師結廬姑蘇城西以為禪定之室翰林學士趙文敏公書其扁曰栖雲逮今數十年中峯卒而廬亦頽壞中峯之孫用庵照師作新室於故址復取故名揭之而屬豫以記余笑曰師其欺豫乎哉今之廬非昔時之所築也今之人又非中峯也而猶曰栖雲何哉室廬之壽以百年計人之壽以數十嵗計禦燥濕閲寒暑屹乎有不傾之勢毅然有不亡之意今欲求而見之且不可得矣彼雲者起滅萬狀不可斯須審視奚為而久棲此室哉文敏公取以為名固異矣師取而重揭之又異也余復以言文之不亦甚異乎雖然自其易化者觀之則天地曽無殊於水中之漚自其可久者觀之流電之光可使比於嵗月自其有形者觀之泰山可以齊於毫芒自其無形者觀之一髮可以擬於嵩華久速巨細者跡也有跡者固不足恃以不壞不可以巨細久速論者道也斯道也何間於古今新故之分哉然則安知今之廬異於昔時之所築今之人異於昔之人哉而雲也安往而不在乎嘗試與師登姑蘇之臺而覽古今之變三吳之間崇臺廣榭凉亭燠館敷金碧而炫丹瑶極人力而窮物狀者何可勝數蓋有歌舞未畢而號泣繼之車馬陳于庭而狐兔巳遊于寢者矣彼之富麗竒瑰苟與拪雲之室潔量大小何啻岡阜之於沙塵今彼皆不復得守而此猶能新其棟宇而不廢何耶蓋無道以保身者雖富麗不能久存而有道之士身亡而名立固不隨世以為變遷也吾坐乎斯瞑目而思之充乎室皆雲也皆中峯也大吾耳而接吾目者皆道也中峯之徒苟有志於道孰不可為中峯哉尚何取於區區之故名也乎師近道者盍以吾言求之
