  text: 宋學士文集卷第九鑾坡集卷第九即翰苑前集
  hash: sha256:b027c19a506f22434f77bc09ae656bae713fb397a740eda2927ea2199fe79dda
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_009-1a}
body:
  text: 劉彬卿傳劉彬卿名文質彬卿其字也姓劉氏其逺祖仁贍仕南唐以忠節著子孫居袁者遷于豫章今為豫章人彬卿讀書不泥章句務在躬行年踰三十擔簦赱燕都燕都貴人一見爭相引重薦為太師國王府儒學正升教授皆不赴除承懿寺照磨曾未幾何改繕工司照磨貢新􅔇上亰彬卿旦夕視惟謹諸司同行者以入雨紅腐絓于吏議惟彬卿獨否帝與后妃太子皆賜之衣衣凡五襲人為彬卿榮彬卿曰吾敬君之道當爾也轉詹事院管勾府正司典簿夀福都總管府經歷中書左丞史克新戌遼陽時江南餉道絶各屯田以食軍士食且不給廷議欲徴其米五萬石人難之不敢往彬卿毅然請行初至軍有欲害之者彬卿色不變亹亹為陳利害衆咸感動卒致三千四百斛以歸孛羅帖木兒以中書平章統兵鎮西京人畏其威不敢仰視彬卿持官書至左右索視之弗與遂辭不為通彬卿呼曰朝廷之命將委之草莾耶孛羅聞之竟出見彬卿以官書進孛羅視已謂彬卿曰可與幕府議之彬卿曰官書既達行與否在平章使臣何與焉趨而退孛羅不敢强將宴留之彬卿曰使事巳畢尚何留即日上馬去從事官皆餞之出郊嘆曰此真使者世蓋不多見也府公俱徼僧賕僧訴御史臺臺臣問曰何獨無劉經歷邪僧曰經歷乃儒者理苟直不俟人言不然徒言之無益也且于我無所私焉敢誣之特授大司農司照磨宣政院聞之欲辟為屬弗䏻奪而止時官牛多掠于亂兵貧窶人無所訴富有力者反指以實口沒去牛羊失其租彬卿舍乘傳僞衣醫者服徒行民間廉其實以聞徴富人租而優貧窶之家京南諸倉母慮數十不以時入糧民告病彬卿馳驛察之既至紿驛吏曰吾將使江南尓因託故遲留遍詢倉之前後民盡得其情乃往楫倉使崔甲曰吾使臣爾碩預坐隅以觀美政可乎崔不答彬卿遂坐與談倉中事崔忽拂衣起曰君知有使者事尓乃暇及此耶彬卿罵曰吾農官也吾不叩汝等誰復叩之汝即具文書來上倉中人皆吐舌相顧卒治崔如法逺近不待督而事集巳而升本司都事擢樞密院都事俄復入都水監為丞升少監階中順大夫彬卿性耿介不阿行事絶與流俗異初至燕客塔海平章家平章勸其納少室以奉巾櫛彬卿曰家有糟糠之妻相期至髮白肯中道棄之乎不聽其子時敏方幼一少年誘其馳馬竟跌死或語彬卿冝訟彬卿曰吾兒死生有㝎命可尤人耶經一晝夜忽自蘇後十二年𥙷太宗正府譯曹掾一旦以疾卒彬卿召或者詰之曰此亦墮馬死耶國史掾萬生客死于燕妻子貧不能歸葬彬卿豫錢二千緡俾奉柩還南昌御史大夫朵尓直班有忤相臣出為湖廣行省平章政事省署治武昌道梗未易達必經石頂關歷連雲棧過瞿唐灔澦出萬險而始至從事官皆散去獨彬卿留大夫曰吾國家老臣一死固當彬卿尓家貧尓當從此逝也彬卿曰士窮見節義正在今日大夫何為出此言邪及大夫沒又護其喪還檀州彬卿為人不避事苟使銜命而往雖萬里不辭凡出使即呼官録其行槖且曰去時苟增其一即贓也尤善以形色言人吉凶巧發竒中無毫髮差忒人有意問之輒固閉不答彬卿貌竒古眉毫長寸許雙目深其瞳閃閃照人黟南先生程文以道人劒客目之彬卿年七十餘今猶聞其騎青驢出入于豫章山中云史官曰嗚呼世道既降平日素號士大夫者恆脂韋自保祕孰有如彬卿之剛介者乎與人交也勢盛則趨勢衰則狐鼠竄望其門而畏之孰有如彬卿之不變其初者乎封殖自私汲汲恐或後視人顛連傾覆縱有耳若罔聞知孰有如彬卿惠及死喪者乎自它人言之如彬卿者可謂難矣而彬卿則曰此儒者恆事耳非難也嗚呼若彬卿者不亦君子之人也哉不亦君子之人也哉張中傳張中字景華臨川人也少習儒以春秋應進士舉不中遂放情山水歷遊江右諸郡遇異人授以太極數學談禍福多驗時天下大亂歸隱莫府山與人言避兵之方從之者吉違則凶歲壬寅春正月上帥師下豫章御史大夫鄧愈侍上左右因薦中遣使者召至賜之坐問曰豫㝎豫章兵不血刃市不易肆生民自此蘇息否中對曰未也旦夕此地當流血廬舍焚燬殆盡鐵柱觀亦化為灰燼惟一殿巋然存耳夏四月指揮使康泰反一如中言中自是寵遇有加且言國中大臣將有變上冝預防秋七月平章邵榮參政趙繼祖伏甲北門欲為亂事覺伏誅嵗癸卯夏五月癸未上祭山川百神于覆舟山下問中曰此行何如中對曰吉天馬兩重似拜似舞祀畢上欲還馬忽人立作舞狀巳而俯若拜是日中原贄名馬果符兩重之語中又言省署內當有震驚城中亦擾擾但于上無傷耳六月丁未忠勤樓災藥炮藏樓中遇火怒激如雷省署與樓連內外咸恐僞漢陳友諒圍我豫章三月不解秋七月癸酉上舉兵伐之召問中中對曰五十日當大勝亥子之日獲其首領其戰必在南康上因命中從行舟次孤山無風弗䏻進中曰臣頗習洞玄法當為祭之祭巳風大作遂達彭蠡湖巳丑戰湖中之康郎山常忠武王遇春深入虜舟數四圍之其勢甚危僉以為不可救中曰勿憂也亥時當自出如期果出連戰輒大勝僞吳王陳友仁及將士溺死者無算八月壬戌復大戰流尸蔽江陳友諒中飛矢卒癸亥降其衆五萬自癸酉至癸亥僅五旬唯南康與康郎山小異爾𥘉豫章受圍上問何日圍解中對曰當在七月丙戍暨報至乃乙酉蓋日官算曆是月常差一日實在丙戍解去其他竒中往往類此中為人狷介寡與人言嘗戴鐵冠人因號曰鐵冠子云贊曰濂數與中遊見其人類陽狂玩世者與之語稍涉倫理輒亂以他言竟莫測其故甲辰夏五月同列二博士有咈上意方杜門待罪中叩二人所生年捉筆作點點狀如計數者良久笑曰不逺復期在七月五日濂書而識之至六月之晦有㫖令二人復官頗疑其術之未盡驗及獲見上謝則中所期也中之術亦異哉上嘗親疏十事命濂作傳藏金匱中後六年覩遺槀于故篋因繕録之而并紀所識之事云竹溪逸民傳竹溪逸民者幼治經長誦百家言造文蔚茂喜馳騁聲聞燁燁起薦紳間意功名可以赤手致忽抵掌于几曰人生百嵗䏻幾旦暮所難遂者適意爾他尚何恤哉乃戴青霞冠披白鹿裘不復與塵事接所居近大溪篁竹翛翛然生當明月髙照水光㶑灔共月爭清輝逸民輒腰短簫乘小舫蕩漾空明中簫聲挾秋氣為豪直入無際宛轉若龍鳴深泓絶可聽簫巳逸民叩舷歌曰吹玉簫兮㺯明月明月照兮頭成雪頭成雪兮將奈何白漚起兮衝素波人見之嘆曰是誠世外人也欲常見且不可得况狎而近之乎性嗜鞠種之滿園顧視若孩嬰黃花一開獨引觴對酌日入不倦人讓其留物怒曰舉世無知我知我惟此花爾一息自怡尚可謂滯于物耶復愛梅梅孕緑蕚微吐赤腳踏雪中若溫見輒凝視移時目不瞬且大言曰知我者惟鞠鞠巳謝我去幸汝梅繼之汝梅脫又謝去我當上白鶴山采五芝耳白鶴山蓋溪上諸峰云逸民年五十益恬泊無所繫間私謂其灰曰吾于世味愈孤矣將漁于山樵于水矣其友疑其誕逸民曰樵于水志豈在薪漁于山志豈在魚是無所利也無所利樂矣子以豫果滯於梅與鞠耶君子以其語近道有類于古隱者相與傳其事逸民所未嘗言則無從知之矣逸民陳姓洄其名烏傷人史官曰昔者李白與孔巢父等六人隱居徂徠山世仰之以為不可狎近因號為竹溪六逸寥寥七百年後而逸民亦以竹溪自名若出一轍豈聞風而興起歟縱曰其地或殊人之衆獨有異髙風絶塵照映後先其安有不同者歟士之沉酣聲利而弗返者盍亦知所自警歟夫自范蔚宗箸後漢書以隱逸登諸史傳歷代取法而莫之廢者其意又豈無所激歟雖然逸民之自為則善矣閩二婦傳賴道慈閩古田縣人歸同縣張文孫生一清十五歲而文孫殁于疫道慈甫年二十九黃華亂家又毁于兵羞服且弗完能確然守志弗渝人力撼之泣曰張氏自浮光遷閩其不絶如線者唯此一子耳余奈何去之及一清成人為取婦廖氏生三子頥興野而廖亡繼以陳道真道真亦古田右族既歸一清粥簮珥治財與道慈再植張門一清事道慈孝極㫖甘道真相之唯恐有不足而遇廖之子不翅巳出道慈晚嬰末疾手足不能用道真與媵人余乙恆挾持以就虎子道慈體肥重疲力從事逾十春秋弗厭人難之道真生以寧年十餘日授書十三帙帙三𥿄道真夜宿火至四鼓自起爇燈呼兒誦書坐其傍以俟頃刻皆能暗記黎明命之出送至齊門乃還以寧愛書或忘食道真執七餧之任其恣觀不輟二十七以春秋擢泰㝎丁卯進士第繇國子助教八遷而為翰林侍講學士秩二品纍贈道慈道真皆清河郡夫人一清贈福建江西等處行中書省參知政事文孫贈禮部尚書閩人榮焉謂道慈之節道真之孝皆卓絶不可及殆天報之也道慈卒時年八十而道真則七十云傳有之婦道盡而天倫正有若二婦其所謂盡于婦道者耶王貞婦傳貞婦名順榮字靜安姓王氏台之黃岩金沙里人性莊毅日處深閨人不見其面其父廣東元帥嗣竒之慎擇所配年十七歸同邑楊伯瑞伯瑞以才用世纍官行樞密院斷事官階從四品得封貞婦河南郡君至正間貓獠兵侵天台伯瑞帥師往扼之弗勝遂遇害貞婦時寓四明年二十又七生子慶夀始兩月聞夫亡躑躅欲求死親屬交相慰解遂護喪還􅌾于鄉屏鉛華弗御戴道家冠𬒳鶴氅衣翛然如塵外人未嘗輕于笑語人誚之則曰我未亡人尓尚何心追逐世好耶鄉里小兒欲媚上官以貞婦美姿容喉使聘之不從將以威劫其去貞婦遽引刀斷髮痛詈不少休事遂寢越三年有權貴人聞其賢强委禽焉貞婦度不免拊膺長號呼曰楊樞密何在楊樞密何在妾將相從于泉下因悶絶仆地媵人抉齒以藥灌之移時乃蘇俟間執慶夀手曰吾命婦也不敢虧節以辱汝父汝父亡我非不能死以汝年幼將誰育之即不育嵗時何人持巵酒以酹汝父墳乃忍死至今今汝已十䶖吾復何憂我將死于汝父之墓言訖泣而行慶夀號訴從母林氏林亟往救貞婦以刀自剄不殊林奪刀挽之歸環守至旦稍解貞婦復斷髮如初權貴人曰此烈婦不可強之強之不祥嗚呼女婦之質甚弱耳扣盎足以駭赱之今貞婦乃不為威武所屈若是非其秉志剛見義明有不能也世以丈夫自居者冠帶儼如步趨鏘如議論藹如人倘以女婦目之則頩然怒去及究其所為一遇小利害則甘心喪其所守似婦人女子之不若抑又何說哉然自兵亂以來婦人徇節而不屈者或自剄死或墜崖下死或赴水火而死固人之所難此特出一時義烈所激尓有如貞婦處孤燈敗帷間凄風蕭蕭然中人歲積月深必有甚不能堪者恆人之情寧不為之少衰貞婦之操則愈堅如鐵石百折不撓豈不尤人所難者乎使一卿之得若人必有率德而勵行者由是達之一邑一州無不皆然其于移風俗美教化之道有國家者蓋有賴焉是宜為之傳以俟觀民風者贊曰昔夏侯令女夫死不嫁遂致斷髮為信或蹙迫之急乃割耳與鼻誓不欲類于人至今想其遺風猶凛凛然可畏也今貞婦截髮絶人其厲操蓋與令女同若其持刃自刎比之割耳鼻者且欲並身而捐之其志為益苦矣嗚呼令女不可見有若貞婦其所謂異世而同符者非耶韓節婦傳節婦韓氏名惟秀開封人元四川行省左丞渙之女也年二十一歸耶律文正王四代孫飬正養正時為劉莊場鹽司令甫六閲月沒于官節婦行三年喪乃還父母家適其弟敏以疾卒二子肅寬俱幼節婦與敏妻賈氏約曰吾聞古之烈女不更二夫吾與汝皆簮纓家子冝則效之苟或失恩慮再醮于人縱死為鬼亦當有餘羞耳賈氏恱曰此妾之志也朝夕乎父母舅姑之側旨若甘恐或不備也衣與衾恐或不完也教肅與寬又恐不知其方也左之右之同心弗少懈歲壬辰賈氏亡節婦哭之慟曰尓何遽去豫而死乎豫寧與尓俱亡乎不火食者三日巳而又曰吾苟死其奈父母何遂割情忍泣奉尊撫卑如賈氏存時見寬以才學𬒳選列官國朝再轉為侍儀使節婦今年五十九其母則八十五云史官曰易有之不節若則嗟若無咎又曰安節亨蓋不改其節則必能亨違節之道則哀嗟自已所致無所怨咎矣聖人作易當無物不該推此以喻節婦庶幾亦有合者乎節婦自耶律君沒制行如白壁者三十有八年使令名昭晣于無窮視佊夫骨未寒輒棄之他適為人唾去而弗齒者果孰為亨而孰為不亨乎况節父無子可依毅然堅其苦志于母家此尤卓異可書者故備列之然賈氏能與節婦同志卒以莭終亦賢婦也哉鮑氏慈孝堂銘有序歙之鮑氏故衣冠家也其諱宗岩者身載明德弗售于時人號為棠樾處士當至元丙子郡將李世達軍叛群寇相挺而起肆其屠劉歙民相驚皆風雨散去處士君與其子寶慶教授夀孫共伏大壑中未幾寇嘯呼而至執處士君反接于樹抽刀將剚之教授出泣曰吾父耄矣不足以汚兵鋒願憐而勿殺即殺我請代之言畢引頸就刃處士君曰吾秪生此一兒死我猶可吾兒死則宗祀絶矣慎勿聽之相為讓者良久寇欲捨之或掌制于衆欲兵之又弗忍計未知所㝎忽有風渢渢起林木間類鐵騎蹴踏聲寇相顧怖愕疑官兵將捕已亟相率東趨父子因得釋歙人士咸嘆曰孰謂無天道哉使無天道處士君父子何為乎而弗死也其慈孝之報乎當處士君之受縛子但見其親而不識有身父但見其子而不知有已死生禍福尚不暇慮𥘉不知何名為孝何名為慈乎脫使處士君曰我必如是乃為慈其子又曰我必如是方為孝不幾參于人而不純其天乎嗚呼有若處士君父子足可為世勸矣然子為父死古之人多行之者固可為勸也若父欲存其子而自殞其生其可為勸乎曰非是之謂也處士君為存宗祀也為存宗祀孝之大者也不然則其宗為若敖氏之餒鬼矣用以為勸何不可之有哉豫與鄭內翰子美遊子美歙人也其談處士君事甚悉豫每為之太息慨然遐思其為人今處士君曽孫任詣豫請曰任之祖父嘗以慈孝名堂鄉先達程公已為造記先生能復銘之乎豫因歷序其事而繫之以辭使任勒諸堂上子孫世守之以為式鮑氏之世其益昌矣乎任端恪有學行蓋懿然君子人也銘曰父子之道一體而分天性昭然萬古無昏氣血感通罔間毫髮伊誰梏之户庭胡越惟歙鮑氏世敦詩書子勉于孝父勉于慈宋鼎將移群寇方熾不幸遭之反接于樹有子含淚長跽致辭刀劍在前目不見之無死我親我死則可親死子存千齡亦夭父謂其子我耄及之日月所照寧復幾時兾子之生得存宗祀生生無窮孰謂吾死白刃可蹈難違者天若父若子何人弗賢寇雖匪人天嘏是錫疾飈西來裭盜之魄玄聖樹教重惟五倫五倫有愆曷名為人慶延于家繩繩孫子孝慈之報庶其在此有巋者堂揭以嘉名仰而瞻之如交神明為上或頑為下或悖來遊來觀翻然自悔雙椿堂銘三槐名堂預知顯融之兆五桞有傳式啓肥遁之趣蓋緣辭以達志而其文特繁托物以明類而其義最切粵自前古以逮方今指意固殊塗轍則一有若右司都事某君器局凝逺識度回卓篤愛日之誠隆恱親之道奉其仲父並于嚴君建一室之靚深揭雙椿以為號氣同于祖奚須類我之祝孝推乎親必盡搆堂之志稽之五倫十起之私阿新思繼之晚昭然軌跡莫擬光塵由是美聞流于縉紳永歌傳于緗簡不鄙狂瞽漫紹徽音其辭曰有雙者春離植于庭修莖並擢峻葉均青􅋽氛夕羃灝露晨零材非齊散壽比莊齡美兹華搆托以嘉名雲聮遙戶月淡鮮櫺中有二皓古之夀朋鸐髮齊素台背交升商宣宫奏柏茂松貞厥子能令省署蜚聲絳衣執板賢冠垂纓調陳五鼎飬或三牲簮裳生豔州里流榮雅辭振玉麗句雕瓊文犀作軸翠琰鎸銘禮敦民典孝篤天經名教所繫善俗攸興凡百君子宜鍳冝徴朽室偈并序材仲禪師嘗名其室為朽而徵辭于韓莊節公黃文憲公二公既為之發揮無餘藴矣而材仲又以濂為黃公弟子復令說偈繼之濂也何人而敢犯是不韙哉雖然不敢辭也為之偈曰鄞有開士屢主名剎其所住處邃館曲房堅緻華好開士顧之獨名為朽我問開士彼所謂朽雨風所侵螻蟻所蠧棟撓檐拔今則靚飭如上所云以朽為名不亦厚誣開士答言屬世間相無有弗壞譬如春花朝上穠冶夕則零墜何有真實今之所居雖號堅好我目視之無不朽者楹桷壯麗視如敝漏丹雘絢耀視如䵝昧超然此身如託虗空畢竟虗空無有壞相豈惟是室觀人亦然地水火風假合而成迷者自恃等於金石四大各離身在何處身即是幻世即為夢而况是室終歸于空若能于此入正思惟觀室無室觀身無身庶幾可入真空觀想我問開士善學佛者無欣無厭如開士言是有厭心所謂朽者因堅而名有堅有朽理之必然木縱已朽堅性終在我本無堅朽從何生堅朽未忘心何䏻一况樂觀空是為空病空病不除反實所有我說是室非有非無其室永存何緣䏻如觀空者空而非空空何有礙開士聞已破顔微笑揚眉而語子言固佳但我門中一義不立立即成妄請返塵轅母戲論法章判官像贊唐福州軍事判官章公修實檢校太傅仔鈞之父也其遺像至今蓋四百餘年矣二十世孫御史中丞溢偶于閩中購得之如獲至寶持以示其友宋濂因為作贊贊曰器局深沉容儀嚴肅吁嗟哲人如金如玉餘慶所𬒳孫子若雲重圭疊組至今揚芬四十二代天師張公像贊含冲葆虗執真之樞翊度宣靈契道之符龍虎衛乎左右風霆屬于指呼此古之博大真人而今之列仙之儒者耶含山操二解有序含山操者為和陽王綱妻吳貞媛作貞媛遭兵亂乃能完節蹈水死其不有繫民經之大者乎辭曰含山有雲莫蔽我衣彼荷㦸者迫我以馳我馳我驅泣涕如雨仰視白日光不照下叶地不可穴天不可緣舍旃舍旃我尚何年含山有石其光差差石或可轉我節可虧我夫何之欲從無所舍彼黃泉無相見者叶誰謂淵深我視若陵我死得死中心之寧張孟兼字辭并序國子録張君生于嵗戊寅正月六日以曆推之是月九日始入春則中氣猶居丁丑年之冬其王父府君因以丁命名張君既長聞人先生字曰孟兼兼者何謂臨二嵗之中也夫丁在十毋為火戊則土也火為文明之候非不燁然有光必變而為土然後生物之功遂張君以辭章名世今將刋其華而食其實乎雖然丁離象也戊坤象也離上而坤下于卦為晉彖有之明出地上順而麗乎大明柔進而上行張君又將自此而升乎方今大明御世治具畢舉張君益昭其明德發為人文以黼黻王度物有不資其成者乎是則兼之之義已或謂殷人尚質多以十幹名其與府君之意則敻然殊也張君浦陽人有學得與濂為同門朋詞曰戊為子丁為父火得為土百物之所祖能兼之道為伍碧崖亭辭濓與太常卿魏觀先生遊甚久知其為孝敬之人也先生間嘗來謂濂曰豫家鄂之蒲圻蒲圻有山曰蒲首焉巉然而起如雲旓翠𬎼蕩摩空濛間對峙雙石楹直上如笋中敞碧崖千尋嘉卉靈草雜被之紛紅駭緑儼如圖畫中我先人愛玩而不忘日支笻步其下或濯纓澗底或咏詩坐盤石上或望雲出沒崖谷悠然而忘返遂因以碧崖自號時移事遷層崖絶壁雖蒼然不改于舊而先人則追逐羣仙于風馬雲與中弗能一見之豫每過其下不覺􅏰然出涕故于䆠游所至揭碧崖之名于楣間所以志之志之所以思夫親也雖然名之固寓也而言之則尤寓也曷若親履其地而求先人之遺跡乎當今聖人在上方以孝治天下他日幸遂歸田之請築亭山麓仍以碧崖名之當風日清美與二三子遊其間指而言曰彼清泉瀏瀏而斜出者此先人濯纓之處也磐石纍纍而可坐者此先人咏詩之地也崖谷沉沉靈氣之宣通者此先人望雲出沒之所也一俯一仰無非精神之參會非惟慰其遐思抑將藉是以勵夫所學期克肖乎先人豫雖耄矣此心不敢忘子幸為辭刻諸亭上何如濂曰傳有之舜食則見堯于羹坐則見堯于牆古之上聖猶若斯况下于此者乎人子之于親遇事觸物無有不可感勵者况親之昔日所遊歷者乎斯亭之建當與甄氏思亭並稱其視崇臺芳榭以騁遊觀之娛者果何如也若先生者豈不為孝敬之人哉先生字𣏌山觀其名也學問富而德行修踐揚中外其善政蓋章章云辭曰崖之雲兮英英其升崖之木兮欣欣其榮悵仙人兮何之飊風薄而上征豈降精而委祉兮發為休徴三秀之茁兮膏露之凝渺長思于無窮兮視一息于千齡金可銷而石可泐兮又焉能爽吾之精誠南堂禪師像贊南堂和上既入滅其得法弟子太禪安公思慕之弗置乃繪其像來求豫贊贊曰樹般若幡有舌如霆當空一震百蟄咸醒松源之宗獨造其妙手折蓮花臨風自笑宋學士文集卷第九鑾坡集卷第九
