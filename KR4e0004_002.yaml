body:
  text: 大明敕賜銀青榮祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡忠武神道碑銘有序洪武二年巳酉秋七月七日銀青榮祿大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨于軍中二十三日訃聞皇帝為之震悼罷朝在廷之臣莫不灑泣越明日詔中書㝎議贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王諡曰忠武八月朔日柩車至龍江上往臨奠慟哭而還親為擇地于鍾山草堂之原營見宅兆及棲靈之祠凡百須之具一給于官不以煩其家至冬十月九日始葬復推恩及其三代皆為王爵生榮死哀可謂至矣上猶念其功不置召臣濂于庭而謂之曰朕東撫髙麗西抵土蕃北際沙漠南來交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手録戰伐次苐以授爾尚為文勒諸豐碑以著王之功于無窮馬臣濂受詔而退謹再拜序而銘諸幽王䛭遇春姓常氏濠州懷逺人世為農家賦性剛毅膂力絶人歲壬辰羣雄並起江淮為之鼎沸時王年二十有三為羣盜劉聚所得聚覩王狀貌竒偉拔于行伍而信任之王每出戰必鼓勇爭先聚深喜之王察聚所為終不能有成欲擇所依乙未聞上駐兵和州領衆數十人棄聚來歸居兩月餘請為前部先鋒上曰爾之來者為士卒糧絶故就食耳爾自有主我安得而留之王請之再三至于涕泣上曰尓姑從吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陳于磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乘快舸相繼而至上麾之使前王即捨舟挺戈先登衆皆披靡遂拔采石乘勝取太平從上守禦乃始授總管府先解冬十月升管軍總管丙申春二月元中丞蠻子海牙復以兵屯采石南北不通上慮將士雖渡江而其父母妻孥尚留淮西勢莫可致命王統兵攻之王至設疑兵以分其勢而以正兵與之合及戰別出竒兵搗敗之悉俘其精鋭自是元兵扼江之勢衰矣尋守溧陽攻建康功為諸將先三月從今大將軍右丞相徐公達克鎮江夏四月授承信校尉領軍先鋒秋九月再攻常州會青軍叛去與偽吳張士誠合徐公被圍于牛塘王與諸將力戰大敗其衆擒士誠梟將張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月從徐公下寧國秋八月克馬馱沙冬十月取池州戊戌春擢江南行中書省都督馬步水軍大元帥冬十有二月上親取婺州巳亥夏四月轉鎮國上將軍同僉書江南等處行摳密院事守婺城尋命攻衢州降之冬十月升僉院十有二月攻杭州庚子夏五月召還京師從徐公拔安慶趙普勝之水寨時偽漢陳友諒揚言援安慶王䇿其必攻池州以羸弱守城伏鋭士于九華山明日友諒兵果來攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀擊敗之巳而上整舟師襲友諒留王守京師軍民無敢譁辛丑春三月拜江南行中書省參知政事秋七月從上取安慶破江州回守龍灣冬十有一月張士誠出兵寇長興上時駐九江聞報還京師命王往援士誠兵敗俘殺五千餘人壬寅春修安慶城羅友賢搆亂據池州神山寨將與士誠通杭歙震動冬王往攻之癸卯春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通于安豐王從上擊之將戰王突入其陳三戰三勝敵兵大敗而去俘獲士馬無算遂同徐公圍廬州凡三月城將下適陳友諒攻南昌王解圍而還秋七月從上率諸將往援八月遇友諒于彭蠡湖之康郎山王與之聮舟大戰呼聲動天地無不一當百縱火焚偽平章舟風急火熾十里之間湖水盡赤敵將張㝎邊素號梟猛奮前迎戰王射之㝎邉中矢赱友諒乃退保鞋山諸將以友諒兵尚強請縱其去王獨不言及我師出湖口皆言江流湍急𣣔放舟而下上知其情命以舟扼上流王應之諸將乃遡流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不解上所乘舟及王舟皆膠于沙王既脫御舟而巳舟被圍復力戰而脫于是友諒中流矢死士卒十萬皆降未幾其臣立友諒之子理于武昌冬十月王帥師討之四面合圍甲辰春二月理銜璧出降荆湖之地望風皆附陛中書平章政事秋七月從徐公取廬州八月遂自將兵平臨江之沙坑麻嶺十洞牛陂諸寨進取贛州乙巳春正月克之悉㝎南安南雄韶州夏五月還兵取安襄陽冬十月從徐公克泰州丙午春三月復從克髙郵夏四月淮安濠泗徐宿安豐皆下秋八月諸將攻浙西師次太湖偽萬户尹義等逆戰王擒之直趍湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之偽丞相張士信悉發境中兵為援屯于舊館出我師之背王統竒兵由大全港入結營東阡復出敵背且填壅溝港絶其歸路士誠知事急出親兵拒鬪王一鼓勝之士誠復遣其將徐義統赤龍船親軍來援王復擊敗于烏鎮冬十月舊館降得兵六萬十有一月湖州亦下遂進圍平江丁未圍之益急士誠收合餘燼猶背城百戰降其將士且盡秋九月始克之縛士誠來獻籍其兵二十有五萬乃加授中書平章軍國重事疏封鄂國進爵上公冬十月復授征虜副將軍同徐公奉命北伐戊申春正月上即皇帝位國號大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北將出迎戰王布陳既㝎單騎執弓矢衝入其隊敵發二十騎攢槊刺王王一箭中其前鋒大呼殺入悉獲其衆而河南諸城先後皆平上幸汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北奔師次太原其守將擴廓帖木兒帥衆來禦其鋒鋭甚王與徐公謀曰我騎兵雖集而步卒未至何以能戰莫若遣精騎夜劫其營其衆可亂衆亂主將可縛也徐公如王言擴廓帖木兒果中傷而遁巳酉春正月進攻大同竹貞棄城赱河東又平遂西入秦張良弼遁李思齊迎降奉元鳳翔鞏昌臨洮又平夏五月元將也速兵侵通州有旨命王以所部軍東還拒之遂搗永平過惠州獲江文清士馬以千計至大寧也速遁破開平元君又北奔追至北河俘其宗王三人及平章鼎住等凡得軍士萬人車萬兩馬三千牛五萬全師還燕次桞河川得疾而薨享年僅四十爾王之為人守謙而不矜有功而無過運籌決勝之方不學而能其從大將軍東征西伐則能遵守節制及其自將兵則所至無不克捷由其智識明而材力雄故施之各得其宜嗚呼若王者可謂開國之殊勳者矣王之曽大父四三府君纍贈銀青榮祿大夫柱國中書平章政事追封開平王諡莊簡妣張氏追封開平王夫人大父重五府君纍贈儀同三司上柱國少保中書平章政事追封開平王諡安穆妣陳氏追封開平王夫人父六六府君纍贈開府儀同三司上柱國太保中書右丞相追封開平王諡靖懿妣髙氏追封開平王夫人妻㝎逺藍氏封開平王夫人子男三人曰茂曰升曰森皆上所賜名女三人長許為皇太子妃餘皆幼臣濂聞之昔日唐太宗起義兵而㝎天下當時有尉遲恭者棄劉武周仗劒來從其後輔成唐業而恭之功為多于是生有鄂國之封殁有忠武之諡今王之功非恭所可及上之所以遇王者封諡與之雖同而其王爵之加恩數優渥揆之于唐誠又過之史臣所謂君臣相遇千載一時者豈不異丗而同符也哉是宜銘諸貞石傳之千萬世一以昭聖天子垂念功臣如此之至以著王之勳烈于不朽云爾銘曰聖皇開天豪傑四從龍興而雲虎嘯而風義旗所指山嶽震動飊馳霆舂孰不神竦維忠武王其氣至剛杖劍來從飛渡大江無堅不摧無敵不碎席卷長驅易如拾芥平吳㝎越帖荆撫淮威聲所加小大畢來齊魯既寧汴洛亦㝎直指幽燕不戰而勝元君逺逝六軍倒戈本根既撥何有條柯乃收晉冀乃清秦隴乃徇遼海人百其勇茫茫朔漠灤河所經誓將剗滌邊塵弗驚王之忠精上貫天日燁其有光亘古不殁幅貟之廣漢唐莫過馬蹄所及王功為多十五年間百戰百捷備殫勤勞光輔帝業翊運之勳靖逺之威在古或罕于今見之大功垂成王忽長逝當寧興哀如失一臂爰加恩寵用錫絶計無所出同行者曰我等自分必死聞髑髏山有死馬共烹食之縱死亦得為飽鬼不識可乎王未及行疲極輒晝睡夢一白衣人來謂王曰汝慎勿食馬肉今夜有舟來共載也王以為偶然未之深信俄又夢如初至夜將半夢中髣佛聞櫓聲有衣𬗋衣者以杖觸王之胯曰舟至矣奈何不起王驚寤身匆在舟中見舊所事統領官時統領巳降于元將元將畏舟壓凡有耒附者擲棄水中統領憐王亟藏之皇板下日取乾餱從板隙投之王掬以食度王之渴乃與王約以足撼板王即張口向隙受漿居數日事將泄皆倣徨不自安忽颶風吹舟盤旋如轉輪久不能進元將大恐遍求于禜祈者不可得統領知王能巫術遂白而出之王仰天叩齒若指麾鬼神狀風濤頓息元將喜因飲食之至通州賚王數巨魚送之登岸王歸維揚不樂為軍伍避去旴眙津里鎮擇地而居以巫術行王無子生二女長適季氏次即皇大后晚以季氏長子為後年九十九嵗而薨遂葬焉今墓是巳臣濂聞之君子之制行能感于人固難而能通于神明為尤難今王當患難危急之時神假夢寐挾之以升舟非其精誠上通于天何以致神人之祐而至于斯也王之羣行其詳雖若不可知舉此而推之則其積德之深厚斷可信矣是宜慶鍾聖女誔育皇上以啓大明億萬年無疆之基于呼盛哉昔日史臣贊堯之德首以親九族為言其效至于黎民于變時雍之盛然九族之中母族居其三皇上以念母之故思王不能忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也將見四方嚮風咸知以孝自勉皥皥熙熙臻夫隆平之治不難矣臣濂既序其事復再拜稽首而獻銘曰皇帝建國克展孝思疏封母族自親而推錫爵維揚地邇帝畿立廟崇祀玄冕衮衣痛念宅兆卜之何墟閭師來告今在旴眙皇情恱豫繼以涕洟即詔禮官汝往葺治毋俾蕘豎跳踉以嬉惟我楊王昔隸戎麾獰風蕩海糧絶阻飢天有顯相夢來紫衣挾以登舟神力所持易死為生夀躋期頥積纍深長未究厥施乃育聖女茂衍皇支蘿圖肇開鴻祚峩巍日照月臨風行霆馳自流徂源功亦有歸無德弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民彛津里之鎮王靈所依于昭萬年視此銘詩大明敕賜榮祿大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡武義康公神道碑銘有序皇帝即位之三載混一華夷聲教所被罔間邇遐梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方將胙土分茅以㝎功賞而都督康公薨于陜州上聞之嗟悼不巳既敕有司穿土作室以寧體魄復欲昭其功勳于悠久詔翰林學士臣宋濓稽諸簡牘所書文于堅石以垂示于億萬載臣濂謹按公諱茂才字夀卿康其姓也世為蘄州人曽祖文廣皇贈中奉大夫中書參知政事護國追封京兆郡公祖德懋皇贈資善大夫中書右丞上護軍追封京兆郡公父夀皇贈榮祿大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未幾蘄州陷公結義旅以捍蔽為務受以長官俄遷為鎮撫同諸將復九江搗蘄水黃連寨􅗗蘄州路同知總管府事屯成和之𥙿溪太平之采石使者考其功狀升淮西宣慰副使同知元帥府事又升宣慰使都元帥歲乙未六月上帥師渡江將士家屬尚留于和州上慮公扼采石之衝弗獲渡時出兵挑戰公兵雖寡而以寬弘得士卒心故臨陳人多效死于是數戰不克後數月常忠武王遇春遣遊兵虛撓之公連日發軍以應王度其力疲夜設伏兵質明殱其精鋭殆盡然由收合潰散堅寨于天寧洲明年二月上命諸將以襄陽大炮破其寨公奔行臺便宜升淮南行省參知政事甫踰月上亦克金陵又奔京口舟師追及之公度天命有歸乃率所部餘兵三千解甲來附免冠頓首言前日戰各為其主今日屢敗天數也事至于此死生唯命苟得生全尚竭犬馬之力以圖報效上笑而釋之仍許統所部兵從征又明年授秦淮翼水軍元帥守禦龍灣取江隂之馬馱沙八月偽吳張士誠犯我疆境公驅兵逐之獲其樓船上賜名馬一匹黃金一錠歲戊戍從廖椘公永安攻池州取趙雙刀之樅陽遷都水屯田使兼帳前總制親兵左副指揮使明年八月攻皖城偽將率樓船出戰公復獲之又明年六月偽漢陳友諒傾圃入冦攻陷我姑孰殺戮我吏民意將窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝既不相疑宜作書遣使偽降友諒為內應招之速來仍紿告以虗實使分兵三道以弱其勢友諒果如所言暨至諸將同公奮擊大破之縛其士卒二萬有幣帛白金之賜歲辛丑八月上怒友諒來冦率將士親征公領舟師行擊安慶破江州偽都友諒西遁遂下蘄州興國漢陽公沿流而下克黃梅某家寨十一月取江之瑞昌敗友諒八陳指揮友諒之勢遂衰遷帳前親兵副都指揮使明年九月復龍興又明年攻左君弼于廬州四月友諒圍龍興上親往援公與諸將皆從友諒聞上至亟解圍還七月大戰于彭蟊湖軍聲嘯呼湖水為之起立浮尸蠢蠢動至數十里友諒遂至敗亡又有幣帛之賜十月上親征武昌公從之歲甲辰二月下之友諒之子理銜璧出降三月進金吾侍衛親軍都護府副都護四月從大將軍徐公達洊攻廬州七月下之八月援安豐繼取江陵及湖南諸州加賜幣帛明年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江隂京口上帥大軍水陸並進公在行中及至鎮江士誠兵巳遁又明年正月追至巫子門擊敗其衆獲士卒三千公功為尤多四月搗淮安之馬邏港拔其水寨復獲士卒與艨艟無算淮安平七月遂攻湖州十一月破之進逼姑蘇姑蘇士誠偽都即遣鋭卒來迎鬪大戰尹山橋公持戟督戰益力鋭卒盡覆乃進圍齊門刀劍林立飛鳥不敢下大將軍命諸將合攻之吳元年九月姑蘇平公取無錫州十月升同知大都督府事兼大子右率府使進階榮祿大夫洪武元年上以江南之地既入版圖乃遣大將軍經略中原公從定齊魯之地復由黃河取汴梁下洛陽駐師陜州規運饋餉造浮橋以渡大軍鎮河中善撫綏遺民為之立石頌德絳解二州則公所招徠蔽遮潼關秦人不敢東向二年復從大將軍征漢中奉詔還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懷逺功臣光祿大夫湖廣等處行中書省平章政事柱國追封蘄國公諡曰武義卜以九月二十一日葬于應天府上元縣鐘山鄉之幕府山上親臨奠而百司繼之祭幄相望聮絡原野時人以為榮公娶方氏追封蘄國夫人繼室田氏封蘄國夫人側室朱氏余氏子男三人鐸田氏出鑑朱氏出鎮余氏出公通經史大義事太夫人以孝聞輕財仗義意氣磊落而尤有志于事功值元祚將終其才弗克盡施然而真主龍飛于羣雄之中公即能識之卷甲韜戈率衆臣附坦然而不惑可謂上知天命下本人心者矣由是昭𬒳寵眷倚之以心膂用之為爪牙十餘年間屢從征討茂績竒勳著稱當世存則安富尊榮加以爵位薨則疏封賜諡賁及九泉令名垂于竹帛重祿延于子孫公其可以不朽矣臣濂謹拜手稽首述辭于碑系之以銘深懼不足以稱上報功之意銘曰于赫大明受命于天如日之再照于八埏其一于時康公江險之恃大軍西來視如平地其二巨炮轟雷物莫敢櫻何戰弗潰何守弗傾其三天人攸歸勢何敢抗知幾先來率衆內嚮其四皇帝曰嘻有附匪疏豫開誠心遇爾不疑其五爾礪矛鋋爾部士卒助豫四征以寧方國其六公拜稽首賜死為生誓殫報效如無餘齡其七孰為不庭率師往討矯如翼如風馳電掃其八東吳西楚蹴陳駕張身經百戰凶竪始亡其九大將北伐同取汴洛出鎮于蒲恤其孤弱其十蔽遮河潼以鐵為關誰敢操戈睥睨其間其十一玄龜負碑以頌遺愛民亦何心恩義斯在其十二從伐漢中迢迢西征有命班師中道而薨其十三帝念將臣血戰之苦將疇其勳錫以茅士其十四孰不壽考以樂承平公胡嬰疾隕魄泉扄其十五帝情憫悼恩命絡繹穿山為堂畢兹窀穸其十六名垂于史祿延干家翩然而逝公復何嗟其十七史臣造文大書深刻以昭公勳有永無極其十八大明故資善大夫御史中丞兼太子贊善大夫章公神道碑銘嗚呼是為吾友龍泉章公之墓𥘉豫未識公時輒稔聞其名及公應聘而起同赴于南京同館于青溪同出入禁署以傋顧問如是者四三年私竊以謂生我者父母知我之至者唯公而巳不知公何為去豫而遽死矣乎有善孰豫相孰知我瑕疵而攻之乎神道之銘公之子特以為屬肝腸百裂其何能綴緝言辭乎相知之深者不為之則鋪張君子之休美不識當屬之誰乎因收淚而序之曰公諱溢字三溢姓章氏處之龍泉人逺祖有曰巖者仕宋以兵部尚書守泉州始家于南安至唐康州刺史及又自南安遷建之浦城及生福州軍事判官修修生光祿大夫檢校太傳西北面行營招討制置等使持節高州諸軍事髙州刺史仔鈞娶練氏生子十五人其苐三子獻誠仕南唐為銀青光祿大夫檢校司徒獻誠生文錫仕宋為祕書省校書郎文錫生都官郎中重又自浦城遷于龍泉子孫遂為龍泉人重生吉吉生順順生公琛公琛生世安世安生舉舉生宗宗生鄉貢進士輔輔生聞義聞義生用之用之生強宗強宗生煥文則公之髙祖也曾祖諱斯立祖諱格父諱遇孫母某氏公之始生其音如鐘父母疑為不祥幾棄不舉及成童嶷然莊重不習鄉井輕儇態諸兄出應科繇頗為儕類所侵苦公忿曰彼徒謂我弱尓吾不自厲豈為男子耶乃往受事縣官即有曲者舉正理直之衆始愧服比弱冠從鄉先生王剛叔遊從事于正心修身之學既又聞金華為文獻之邦間出遊以咨叩其統緒浙東憲使秃堅不花請與語恱之巳而改官陜西要公與俱至虎林心忽驚悸力辭而歸扺家父病巳革越八日而逝人以為純孝所感至正壬辰蘄黃妖冦自閩犯龍泉公與從子存仁避亂山中而存仁為冦所執公心計曰吾兄止有一息不可便無後挺身出謂賊曰兒幼無所用我願代之賊聞公名方出重購以求及得公大喜賊帥𣣔問計公正色拒之曰若等皆有父母妻子顧為此滅族事耶賊怒繫之柱以刀磨其脅曰不降者且死公曰貪生惡死固人常情然吾終不為不義屈賊愈益怒曰汝誠不畏死邪公曰死即死何畏乎賊壯之不敢加害公夜紿守者乘間脫身歸乃集里民為兵不旬日擊却之處州府判官以兵來龍泉欲盡誅平民詿誤者石抹將軍冝孫實總兵政公走麾下説曰將軍知賊之由乎曰不知也公曰貧民迫于凍餒故相挻而從盜誠得一循吏招輯之民即乎民耳今不出此而肆行剪屠是殆楊湯以止沸也不識可乎石抹將軍曰善微先生言事幾敗即檄判官毋擅殺石抹將軍服公器識留幕下與議軍事其平屬縣慶元及建寧之浦城松溪羣盜公有力焉上其功江浙行省丞相康里公承制授公將仕郎龍泉縣主簿辭不受海冦起黃岩掠沿海郡縣行省命石抹將軍守台城台之寧海民亦為變攻圍台城急石抹將軍飛檄召公為援公方退居田里得將軍檄即起曰吾邦非石抹將軍人且盡為枯骨今一旦有急政我報德之秋也集趫勇少年數百人晝夜行至城下約內外夾擊賊遂潰海冦亦遁去寧海大飢豪民吳甲蔣乙積粟不糶公言于石抹將軍將軍因屬公行縣振之公至縣即抵二豪罪發其粟振餓夫其尤困者俾僧作糜食之公還龍泉龍泉亦歲儉大家有粟高其直且不發公先以私田易粟貸里人乃行勸分之政民受其惠為多鄰邑青田潘惟賢為盜而龍泉監縣寶忽丁貪虐無狀民因導潘攻縣治寶匆丁棄印走公同其帥王剛叔召豪傑與賊戰敗走之縣治遂復行省給銀幣為賞寶忽丁懼棄職獲罪而愧公有功乃謀害公公方贊元帥黑的兒間府處城未敢發會帥府問寶匆丁罪遂結李溪惡少拒命首害剛叔于家帥府檄兵襲擊之寶匆丁遁去于是處之上縣盜皆蜂起行省移石抹將軍以行樞密院判官分治處州公謂石抹將軍曰松陽小醜不速平將飬成大患邪將軍曰唯君處之公乃遣千戶曹勝安督兵授以方略一戰盡降之分院上其功行省升承事郎松陽縣尹又辭不受元帥葉君琛攻鄭寇于麗水屢為所敗分院調公及樞密院都事胡君深合討之公與胡君統軍至浮雲賊衆來迎戰並山為長陳兵既接我軍張左右翼夾攻之賊大敗直搗其巢穴賊望見公來拜巳曰我非為寇者待我殱此海蠻即降矣海蠻謂葉君所部海軍也公曰吾不知他特捕反者爾賊為內外二寨公麾兵踰外寨立壁或疑壁于兩寨間非利公曰非爾輩所知我既踰外寨則內寨疑其巳降而外寨亦計其疑巳一寨相疑破賊必矣壁未完賊突至相持未有勝負公麾竒兵橫擊賊奔北即移兵圍內寨數重下令急攻遂陷之執鄭置諸法外寨亦降行省復授福建行省檢校官尋又改除奉訓大夫處州路總管府判官皆不受南行臺治書侍御史鐵木烈思分臺于婺長鎗軍叛迫其城治書遣從事楊迪徵師于公公勒所部軍就道長鎗軍聞公至輒引去省憲交章薦于朝除武德將軍僉浙東都元帥府事又辭不受或疑為要名公曰吾所將皆鄉里子弟使其肝腦塗地而吾獨取功名弗忍為也青田賊吳英掠婺之金華永康東陽諸縣聚衆猖獗公議討之分院乃調兵屬公及胡君與賊屢戰皆敗之賊勢蹙縛其黨張貴李興甫等出降遂昌凶右戶閉糴土豪周天覺嘯聚殺之元帥胡君往討天覺負固不服久之始請降公曰此賊不殄必貽後患胡君不聽受其降巳而天覺果以復叛誅始天覺之未降也執其黨與三百人繫諸獄至是胡君欲盡阮之公執不可得生全者十六七時天下日入于亂公結廬匡山上自號曰匡山居士屬其子曰兵將至矣汝曹其保障州里乎巳亥冬王師克處州公又避地入閩中今上皇帝遣使以束帛召公公乃幡然而起與青田劉君基麗水葉君琛金華宋濂同赴召至建業入見上問勞曰我為天下屈四先生耳然四海紛紛何時定乎對曰天道無常惟德是輔惟不嗜殺人者能一之耳上曰卿等其留輔豫矣亡何擢僉營田司事巡行江東兩淮之境田荒蕪及耕墾者皆分籍之差稅賴之以便公以疾在告者久上時遣使存問暨疾小愈即入謁上見其來喜曰疾其瘳乎何遽出也一日上匆念公詢于中書左司都事張來碩曰章溢日來康強否來碩對曰溫日夜念母不置而以主上遇之厚不敢以言鬱鬱成疾耳上即命公歸省賜以白金文琦而留其季子存厚干京師浙東始設提刑按察司即擢公僉其司事尋命還處州代總制胡君入朝而為有厚娶胡君女賜賚優渥且俾存厚入侍皇太子以示親信胡君出師溫州復召公還守處州饋餉供億規措無缺而民不知勞及師旋即以總制事付胡君而還其部王師平荆楚設湖廣提刑按察司遷公僉司事公入見上慰勞之曰紀綱之事今屬卿矣公既至覩荆襄多廢地遂建議分兵屯田且以控制北方計為便上曰所言甚善苐未暇耳湖廣行省鎮撫回回怙勢作威輕重人罪以為常公廉得狀坐以法曽未幾河內道按察使宋思顔以浙東憲史事不白下獄而浙東按察使孔克仁僉事王璹亦以事被逮辭或連公公憂懼不知所為上遣太史令劉君基喻公曰豫素知章溢守法令毋疑也既而胡君以兵入閩陷沒處州之境皆動搖上命升公浙東按察副使往鎮之平陽瑞安浦城福寧軍民等事皆隸焉公辭曰臣前任浙東無狀同列皆獲罪而臣獨蒙寬宥今若加升擢則益重臣過疆埸之事臣身任之萬死且弗避副使之命臣不敢拜上重違其志命仍僉浙東按察司事比至山寨或巳叛公宣布詔旨軍民皆感動乃誅其首叛者餘皆帖帖青田夏清聞胡君敗與福建參政范昌大合寇慶元龍泉時官兵盡戍浦城城中僅足自守公召舊部義兵使據要害列木柵為屯勢相聮絡别命元帥祁興季汶即龍泉縣治亦環植木城賊聞不敢犯公長子存道𥘉以元帥戍浦城及是有旨命存道提兵為遊擊而公即處城坐鎮之公謂父子相統于律不宜乃上奏請罷存道官不允兵戍浦城者以食不繼為病上以屬公洎浙東行省右丞李公文忠李公欲運處州糧餉之公以為舟車不通而軍中所掠糧甚殷請拘入官而均給之兵食乃足青田稅官金甲發其同僚白乙匿官課乙既誅死而甲恣為姦利公訊之甲善口給辨數不置公曰汝罪伏巳明奈何欲以口舌撓法乎其辭遂屈上知為公所鞫當不冤命斬之建寧守將阮德柔遣使來納欵人咸以為詐公曰陳有㝎據全閩勢必不能容故德柔為圖自全計非詐也以其事聞詔許德柔以元官守本郡命比下德柔果為有㝎所并公因留其使厚存恤之溫州茗洋周遂卿恃山險常為冦鄰邑皆患之而郵傅之通平陽瑞安者亦為所要遮公命存道合平瑞總督孫安之兵禽斬遂卿中書命處州造海舟若干艘并僉溪船戶為水軍其戶凡一千既有領之者而又隸于軍府役繁而事擾公上奏設水軍千戶所專統之處多山而少田軍需恆不足胡君為奏免唯輸硫黃白藤于朝而行省復有所科公屢以為言罷之水軍千戶任惟淵朱仲欽共戍青田會冦至仲欽逆戰而惟淵赱還仲欽以無援故敗公斬惟淵以徇遣指揮何世明擊冦赱之惟淵乃胡君所任信者既伏誅部曲莫不股栗浙江行省參政朱亮祖總兵取溫州公調何世明以軍從溫州平公聞其掠人子女命鎮撫林理徴之各部送還其家海隅既寧公請朝京師上報曰吾知卿在邊良苦俟平吳當即召卿尓及浙西諸郡皆平上遣使召公且命分兵征八閩而存道守處州公既入見上嘉奬甚至且諭羣臣曰章溢雖儒臣父子宣力一方寇盜盡平其功誠不在諸將後公再拜謝不敢當明日上召問征閩諸將何如公對曰御史大夫湯和由海道進平章政事胡廷瑞自江西入此固必勝然閩中尤服浙江平章李文忠之威信若令文忠帥師從浦城取建寧此萬全計也即日詔文忠出師如公䇿處州之糧其舊額一萬三千石有畸後以軍興加徵至十倍民不堪命公言之丞相丞相入奏上曰吾勞處民久矣詔從其舊溫州黃宗雲朱君達來附各授以元帥之職還守其土及我師征溫失利輒叛去溫既平君達又請降公曰何物小醜叛而復降苟納之是無法矣奏􅓍之浙江行省丞詔作大舟入海徴輸巨材檄處州與諸府同公曰處婺之交限以峻險縱有水道何從出且凋攰之民曷以勝此公力言于省臣止之洪武元年正月上即皇帝位有事于太廟公與執事畢越翌日召公及劉君基入見上御奉天殿羣臣咸在上歷陳其功並拜御史中丞公辭不允尋兼太子贊善大夫公務存大體不屑屑于細故或以為言公曰憲臺百司之儀表居其職者當先飬人以廉耻使人避而不犯豈直待搏擊為能哉上親祀社稷會大風雨還坐外朝怒儀曹議禮不合以致天變將殺之公奏曰風雨巳連朝無足怪者縱禮官議有未盡陛下一誠自足以格神明碩寬雷霆之怒上為之霽威上􅋢公甚嘗與公及劉君曰二先生年向耄恐感霜露致疾善自衛攝不宜早趍朝也存道部鄉兵萬五千從李公入閩閩平詔存道以兵從海道北征公持不可曰鄉兵農人耳始令征閩許以事平歸農今復調之是爽信也上不懌而罷公繼論奏曰兵巳入閩者俾還州里昔嘗叛􅊇之民冝籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂闊哉非先生為朕一行無能成兹事者公受詔遂行比至處州母夫人巳殁公馳還舍援例乞丁憂詔不允丞相李韓公復貽書道上眷倚之意而遣存厚還其家公灑泣而出日治戎事惟謹鄉兵既集命存道部領由永嘉浮海北行上章乞如律守制詔仍不允巳而章再上上覽之為惻然曰吾固知其情不可奪矣但朕憲臺缺人耳遂可其奏存道至崑山走京師聽進止上諭之曰汝父事朕宣勞為多今汝又帥師北上尚勉立事功以無忝爾父則豫汝嘉因授以處州衛指揮副使戍于上黨尋移平陽公自喪母夫人悲戚過度居常忽忽若無以自存者及營宅兆親負土石而感疾益深子女見之皆相顧悽愴公曰勿憂也吾父母幸以安厝祖宗丘墓幸粗整飾歲時薦饗幸有條序吾庶幾無憾苐荷國厚恩未能報效此為慊耳臨終親友何濬來候曰當收斂此心毋有所執滯公曰吾久巳知之遂薨于龍淵之私苐實洪武二年夏某月某日也享年五十又六訃聞上甚憫悼乃親撰文遣官即其家祭之以其年某月日葬于某山之原公娶陳氏勤儉恭淑克盡內助子男三人長即存道明威將軍處州衛指揮副使次存誠次存厚女二人長適陳某次在室孫男四人集慶集恭集善集正女二人公性篤于孝友父喪未葬而盜發里閈室廬𬒳焚公稽顙籲天火至柩所而滅事母夫人備極孝飬每事必得其歡心與二兄别居巳久既創苐龍淵請二兄同居以奉母怡怡之情藹如也先世有墓祠曰標慶菴公起其廢一新之且益田以供祀事而定祭享之禮命孫子世守之其于宗族里黨患其子弟無所于學則創龍淵義孰延碩師以教之患其死者無所于葬則以玉峯西岡為義阡聽其薶瘞焉又以王剛叔實鄉郡之賢者而石抹將軍能忠于所事即龍泉劍水之陽作祠宇祀之曰忠賢祠蓋凡可以聳善扶義者無不為也公狀貌宏偉器局夷曠而撫世酬物一本于誠一循平禮義外若和緩而其臨大事則論議諍辨不避權勢必折衷于理而後巳其與學士大夫談聖之道如味飴蜜尤篤尚伊洛之學嘗曰古人為學皆躬行實踐人倫日用之間無非學也今人以記誦詞章為務特學之末事耳故公于章句之習皆不以屑意而于綱常之大端有關于世教者恆切切為人言之生平務在濟人利物嘉言善行人皆能道之不可勝紀也余竊聞之章為東南著姓自五季以迄于宋代多顯者內則兩制八座外則州牧邑宰皆未嘗無其人親提師旅捍衛鄊州能成其勳名唯太傳公為尤盛閩人至今道之公當元季紛擾羣盜四起磨牙吮血而桑梓為墟公談笑而起皆劓殄之無遺育處之民至今思之于是聲光流顯上致萬乘之知持節諸部執法中臺其功業視太傳公疑若過之此無他太傳公之所遭者衰世公之所際遇者有道維新之朝也古人所謂能光于前人者公其有焉豫敢評隲公行勒諸堅珉以垂示永久于戲金或可銷也石或可泐也公之功不可忘也銘曰五季之亂殺氣昏大傳隻手障南閩西巖結壘兵雲屯狗鼠偷竊方􅌭紛怒來欲以一氣吞隂功上聞帝為欣敕生蟄蟄千子孫白笏堆床如爛銀匡山繼之譽益振方頥踈髯目電焞音吐鴻鬯鐘在軒蚩蚩赤子扇妖氛額抹絳帕手握􅚙嘯呼不異鬼魅羣公起長驅汗且奔一障仡立無邊塵較之太傅功或殷重徽疊照絶等倫大明天子御紫宸濟濟萬國咸來賔束帛往聘東海濵加以祿爵恩寵新庸田使者勞徠勤繡衣行部照清春貪夫宵遁不待晨一朝南徼將星湮括山恍㧾失嶙峋狐狸跳舞騁妖神帝曰汝溢汝老臣整汝戎斾旋汝轅公車戾止集吏民導宣威德語復諄有叛命者䤋以徇叶坐鎮鄊城如虎蹲大兒遊擊左右巡四郊帖帖多柔馴召還執法居諌垣長跪敷奏嬰􅊇鱗萱堂風慘逝驚魂上表陳情達帝閽哀號負土自築墳因劬致疢亟返真聞之孰不淚霑巾公知學術歸一原時㪺濂洛溉本根所以不坐枝葉繁文事武備道乃存黃腸題湊藏山樊大書遺行勒堅珉傳千百載欺無諼宋學士文集卷第二鑾坡集卷第二
