body:
  text: 王節婦湯氏傳婦以節名非常也變也變而不失其正不亦善之善者乎若王節婦者是以節婦名慕貞姓湯氏世居武林施水坊父榮母戚氏慕貞生十七年同里王君暹聞有容徳俾其子常奠鴈納為室既歸三族媪御交譽之常字彦常少有逺㳺志既生女及男驥元至正乙未出啇番禺巳而之桂林後六年死焉慕貞二十七矣遥望南海淚眼無乾時上承舅姑米薪塩醯之費靡不經度不足使蒼頭貿易以給舅姑忘其子之亡舅嘗患疽慕貞稽顙北辰乞以身代疾乃瘳舅有女兄二人年耄無所依慕貞迎還扵家忠養同其姑夫之季弟曰暉娶史氏育二女貧不能嫁慕貞擇良婿治嫁具遣之暉與史旅死三衢慕貞不惮千里之逺耴二䘮蔵諸先塋其訓驥尤切俾事賢傳受春秋三傳之學國朝洪武癸丑取浙江行省第六名文觧貢入成均選授吴王府伴讀朝夕陳訓于王久之拜監察御史近以使事入閩過其家方嶽大臣洎部使者交謁于門問母夫人無恙人為慕貞榮慕貞不自樂也且曰我未亡人爾自意危如朝露不復有今日幸視驥加長歲時持一觴酒酹王家墳上庻他日九泉見彦常無慚色爵禄之有無皆天也奚暇計㢤君子愈賢之嗚呼婦之青年䘮夫最號多艱儻居貴富家有傔媵足以備驅役闔廬足以蔽雨風粟帛足以供衣食猶可自安苟或煢㷀弔影室如懸磬忍寒夜織機聲與候蟲齊鳴逹曙不休自非鐵心石腸未必不為之動也學士大夫讀四庫之書平日抗手論天下事何䖏更有豪傑一遇絲髮利害反眼若不相識視女婦未嘗知書者乃有所不及可勝嘆㦲濂扵慕貞之事不得不為之紀載也夫移風俗羙教化之道慕貞實有焉因具書之以厲為人婦者賛曰婦以節名𥘉非羙稱唯王婦湯守變以貞心堅同石操㓗如氷太史作傳永揚休聲前翰林學士承㫖嘉議大夫知制誥兼修國史兼太子賛善大夫金華宋濂撰佛心慈濟妙辯大師别峯同公塔銘華嚴建宗始扵帝心大士帝心作法界觀門及妄盡還源觀以傳雲華雲華傳賢首賢首既終而其徒慧苑等悉叛師說後百有餘年僧統清凉國師遥遵遐軌丕弘教緒國師傳圭峯圭峯傳奥奥之後又復廢逸朗現父子相繼而作𥙷葺粗完現傳璿璿傳源二師隂搜陽闡其宗扵是乎中興源傳仲仲傳觀觀傳㑹㑹傳心心傳悟悟號竹坡自呉来越𨳩法景徳教寺越之有賢首教自悟始悟傳介介傳瓊瓊傳東山萃冥承國師之㫖大䏻發越受學者至千餘人萃傳春谷遇遇傳今佛心慈濟妙辯大師同公上遡圭峯凡一十六代矣公諱大同字一雲其號别峯越之上虞王氏子世推簮纓之族父友樵母陳氏姙師巳十月父見龎眉僧振錫而行問僧来自何所曰崑崙山也竟排闥而入父急追之寂然無有也暨出聞房中兒啼聲笑曰兒豈向来浮屠耶㓜極俊爽覧諸載籍輙㑹其玄奥父援以辭章之訣握筆翩翩輙有可觀遂以纉承家學屬之母獨嘆曰是子般若種也可俾其纏繞塵勞乎命捨家入㑹稽崇勝寺從僧貴㳺已而鬀落受菩薩戒㑹春谷講經景徳公復徃依之獲授五教儀玄談二書又謁懐古肇師受四種法界觀懐古春谷皆東山大弟子深扵華嚴之學者也公天分既髙又加精進之功凡清凉一家䟽章悉攝其㑹通而領其樞要義趣消融智光發現識者心服之春谷陞主寳林華嚴教院召公謂曰子學精且愽矣恐滯扵心匈以成麄執曷從事思惟修以剗滌之乎公即出錢唐見佛智熈禪師扵慧日峯下舊所記憶者一切棄絶唯存孤明耿耿自照如是者閱六暑寒佛智嘉其有成欲縻以上職不聽而去俄上天目山禮普應本禪師普應見已期之如佛智公将久留普應曰賢首之宗日逺而日微矣子之器量足以張大之毋久淹乎此也為賛清凉像而遣之公喜曰吾今始知萬法皆本一心不識孰為禪那而孰為敎乗内外自此空矣亟還寳林見春谷且告之故春谷曰可矣乃命之司賔㝷陞上座當時相從者皆宏偉之龍象公為分講雜華玄門㑹元統宗必極其所言宋故官徐天祐王易簡聞之相與崇奨弗置聲光煥著五尺童子皆䏻知其名郡守范侯某憐春谷僧臘巳髙風之使譲其席公毅然不荅侯設伊蒲供延公親與之語公曰有是㢤所貴乎道者在明師弟子之分垂訓後人苟乗其耄而攘其位豈人之所為乎明公縦愛我厚名義不可犯也侯不覺離席把公臂曰别峯誠非常人也元延祐𥘉始用薦者出世蕭山凈土寺公自念圭峯以来累葉相承其間或絶或續繫執法者之賢否遂發弘誓力持大法晨講夕演雖至扵勞勩弗敢少懈天曆𥘉朝廷新設廣教都總管府遴選名山主僧一歸至公陞公住景徳重紀至元中行宣政院遷主嘉禾之東塔公不赴時宰臣領院事乃改寳林寳林清凉肄業之地人咸爲公榮公固守謙退遲囬不上州牧邑尹山林友社交䟽延請亦不允至第二䟽始投𬒮而起倣終南山草堂故事建髙齋闢幽舍招徠俊乂浙水東西莫不擔簦躡屩爭集輪下公竭忱𨳩授比景徳爲由勤法筵之盛不减東山時公復念許玄度皮道輿蕭察三公程師孟汪仲舉二郡守有修建塔廟之勲立五賢祠以世祀焉至正𥘉順帝御宣文閣近臣有以公之道行聞者帝嘉之特賜金襴伽黎衣帝師大寳法王亦俾以六字師號隱然作鎮江南宗門恒倚之以爲重状元忠介公㤗不華守越病旱無以禳僉謂非公不可公爲爇香臂上以請雨即澍公蒞事一紀餘以疾固辭堅臥崇福庵中未㡬部使者持節行郡迫起之元季寺焚于兵公奮然有為創演法堂及方丈室皆六楹間堂以實三蔵𣑽典室以修首楞嚴期殿閣門廡将次第經營而時事日棘公因退䖏膽愽迦室年垂及扵八十矣皇明御極四海更化設無遮大㑹扵鍾山名浮屠咸應詔集闕下入見扵武楼獨免公拜跽之禮命善世院護視之次日復召賜食禁中及還復有白金之賜洪武二年冬十二月得疾乆不瘳口占辭衆語端坐而蛻實三年春三月十日也世夀八十一僧年六十五越七日遵治命就城南竹山凖法闍維收餘燼瘞焉所度弟子㤗来元善如坻性􅊹慧朗智僊真詣總該其嗣法分布列刹者則妙心大衍臯亭善現髙麗若蘭景徳仁靜姜山明善延夀師顗南塔國琛福城大慧景福性澄妙相道偁法雲道恱小寳林日益凈土𣑽翺也公神宇超邁伏犀挿腦長身而玉立羙談吐遇王公貴人䡖重教門者發論衮衮弗休其挺已衛道理或不直雖斧鑕在前不少挫其氣中之詳而為銘文辭雖繁而不敢殺者稱人之善法當如爾也銘曰中天調御說大華嚴最勝種智萬有俱含煌煌帝心冥承遐受昏䝉之中鑿𨳩户牗熾極而衰微𦦨欲灰不有清凉曷振其頽黄龍入夢鱗鬛照日首枕尾蟠㙜之南北曽未再傳離而去之諸師繼興是考是毗載之則升委之則墜丕弘在人道何行廢奕葉之餘靈承者公搴華茹滋號為法雄謂彼雜華如来智海扵覺定中而得自在帝珠出現寳鏡臨空交光互照真俗俱融不善效之或膠扵相若不剗除孰非吾障旋光内燭耿耿孤明一法不立廓落無營安住毗盧靈慧自發内外皆空觀心無物出世度人從者如林據摩尼坐揚清凈音旃檀熏心醍醐灌頂香味所加動靜雙領詔下九門召入禁廷恩光赫赩佛日増熒賢首之宗非公誰寄慧力之施兹焉為至報縁巳終䡖如蛻蝉定光常寂白虹在天龍鬼護塔隂颷颯爽塵沙有生望門稽顙題蔣伯康小傳後吾婺自東莱吕成公傳中原文獻之正風聲氣習藹然如騶魯而其屬邑東陽為尤盛有若李正節侯茂欽信國葛端獻公容甫監察御史喬公世用通判眉州趙公周錫皆成公之髙第弟子或以忠義顯或以政事稱或以文學著傳之當世布之簡書相去一百餘載人猶象而法之嗚呼何其盛也今觀蔣君伯康小傳述其立身行已動法古人阽危之際又能力持其家使勿墜斯可謂之賢矣此固伯康問學之羙所由致自非前修流風遺澤有以薫蒸之亦未必遽至扵斯也嗚呼維桑與梓必恭敬止矧吾父母之邦賢哲奮興前𬒳後承雖隱顯之或殊揆諸物則民彛之懿皆可以無媿聞風而興起者孰謂後無其人乎故因稱伯康之賢特推其本而言之忠厚君子當有取焉洪武十二年九月二十二日金華宋濂識志實與孔子同是亦孔子之孝子也當今學者瀾倒波随一惟卑陋之歸伯清能尊朱子之學而扶導之豈非朱子之孝子乎夫孝者善繼人之志者伯清實有焉伯清名濂官至楚相府長史其父𥙿軒先生師事許文懿公公則上承朱子六傳之緒其家學淵源盖有所自云洪武十二年九月二十四日同郡宋濂序元故䖏州路總管府經歷祝府君墓銘濂朝京師麗水祝君彦方以莱州通判引年辭歸詣濂請其先府君之銘曰昔季父公榮之墓辱表而銘之矣先君政事文行君子稱之而銘闕未具敢復持状以請濂受而諾之未遑也及歸蘿山彦方復命其子金来速曰塟距今五年矣銘其可後願終卑之無譲按國史編脩吴從善状府君諱大明後避國號更之爲大朋字公亮勇扵爲學古今載籍皆探索其大㫖元延祐𥘉受薦爲武義儒學教諭以出粟賑饑陞吉之書每謂人曰朱子之學菽粟布帛也天下一日不可無也伯清既受薦爲國史編脩上簡主知特詔授經扵楚王府其見扵辭章資爲講說皆以朱子爲宗巳而不俟引年納禄而歸寄迹浦陽江上日取朱子書温繹之察除陽鬼神之運行驗心情性命之發舒明白昭著循環無窮皆本乎道體之妙所見端確所得粹凝扵是即朱子精語編成理學纂言一書其凡例全倣近思録其所采語録雖雜以方言唯恐失真片辭不敢移易氣象或不類者刪之其扵文集則節取切而要者載焉凡八千三百條方之於諸家殊適厥中取而讀之不翅親逢朱子在坐而見門人難疑荅問之盛不知其身生扵二百年之後也伯清嘉惠後學之功何其至歟世之好著書者多矣恃一偏之見操無根之學肆口詆斥恬不自愧何嘗䏻窺朱子之藩籬是皆獲罪於伯清者也抑嘗聞孔子天之孝子也以其扶持天地植立綱常爲千萬世計也朱子之志實與孔子同是亦孔子之孝子也當今學者瀾倒波随一惟卑陋之歸伯清能尊朱子之學而扶導之豈非朱子之孝子乎夫孝者善繼人之志者伯清實有焉伯清名濂官至楚相府長史其父𥙿軒先生師事許文懿公公則上承朱子六傳之緒其家學淵源盖有所自云洪武十二年九月二十四日同郡宋濂序元故䖏州路總管府經歷祝府君墓銘濂朝京師麗水祝君彦方以莱州通判引年辭歸詣濂請其先府君之銘曰昔季父公榮之墓辱表而銘之矣先君政事文行君子稱之而銘闕未具敢復持状以請濂受而諾之未遑也及歸蘿山彦方復命其子金来速曰塟距今五年矣銘其可後願終卑之無譲按國史編脩吳從善状府君諱大明後避國號更之為大朋字公亮勇扵為學古今載籍皆探索其大㫖元延祐𥘉受薦為武義儒學教諭以出粟賑饑陞吉之層山鎮廵檢吉俗多喜譁訐女婦童子咸習法律如老吏府君至召耆老于庭告之曰所貴乎羙俗者以人有忠厚長者之風今閭閻細民不務掩匿人過失惟以機穽相傾擠俗之詭薄孰加扵此此固耆老不能教誨之失也吾竊為諸君恥之扵是父兄訓其子弟使為淳篤姦妄帖息既而以親老自免歸用事者惜府君才復起管勾台州杜瀆塩塲塲課額固重塩廪又瀕海海潮溢損塩以千百計竈氓鬻家貲償官猶不足相率逋逃他邑前吏莫敢為計府君言扵朝得减額三之一及罷章安牛頭諸屯民頼以寜轉䖏州司獄改永嘉塩塲司丞歲終課増倍都轉運司才之俾兼督隣邑五塲有能聲至正十二年盗起龍泉江浙行中書命攝䖏州路録事從擊賊真授從仕郎潭州路録事未㡬辟為掾屡受丞相命賛諸将幕府多出竒謀㝷與大将語不合去十八年使者經畧江南最其勞績承制擢承直郎䖏州路總管府經􅍓府君捐貲財助守臣石林忠愍公築䖏州城明年敵兵破樊嶺關關吏率兵近道過府君里府君怒與少子桐山廵檢嶽執兵當道呼曰國家養若曹以備難也今敵来不戦走将何為請亟返潰兵不聴刺嶽嶽死之城破府君不復有禄仕意築别業以居服隱者服日與士友逰眺賦詩為樂所為詩曰樵隱集凡若干卷如是者十有七年年八十二以國朝洪武八年正月四日終是月日即塟焉先是彦方自安陸同知歸省府君謂之曰吾以六物歩之當終於卯歲若歲行在卯其死矣夫彦方泣識之既而果然府君容貌凝重人望而畏服事母吕氏能孝吕多病湯藥必手製乃進日侍床下忘與濯之節垢積如漆弗顧也吕好佛老家書曲承其意同孝經刋梓摹印千餘卷以傳及卒刻木為像率家人事之若平生撫二弟有恩其一公榮名載元史孝友傳中公榮病躬禱于祖考請假其夀其一公旦早卒遇三孤兒與巳子無異事先尤致謹先塋在良山月朔望走謁至老不廢建舍塋側分田為祠祀之資佛老舍近塚墓者亦割田與之祝氏散居他郡􅍓訪其傳序之詳列扵家牒里有官橋水漲輒奔悍民頗病渉府君造舟以濟斥田遺操舟者使歲繕之府君嘗創義庄合族以居建學以㳤鄉之子弟志之所存甚逺舉其著者其餘可類推也府君娶林氏宋户部侍郎覺之諸孫母儀婦道皆可以無愧前一年卒塟于良山而府君與之同穴男三人長嵩䖏州路松陽主簿其次名岑彦方也今以字行仕都邑二十年以政事稱少子即嶽孫男八人鐡鋪金錠鉉鑰鐘鉞鐡黄陂縣主簿鐘泗州判官一女適陳慶曾孫男八人濟潜濬漢溢濛淵源曾孫女三濂昔銘公榮墓嘗備載其先官諱里居固知祝氏之積累者深逺矣府君之行扵家於邦無不可稱述不亦善為人後㦲府君父紹祖之琦曾祖䛬宋潭州司户參軍其始遷麗水之祖曰寔以子坦為兵部侍郎贈金紫光禄大夫司徒河南郡公其墓在今宣慈鄉之杉坑至府君凡一十四世云銘曰祝氏之傳自軒轅譬如江漢逺有源光𥘉受地為封君後微并齊宗始分巡更晋亂遂南奔宣城徙家居信安唐衰五季相噬吞光禄始基赫有聞麗水之族久愈蕃盂縣死邊史焯勲後生綿延千子孫惟君嗜學賢且文𥘉為求盗化㐫嚚奸譎為止風還淳海潮駕風圯塩囷鹵丁號泣訴秋旻騰書减徴逹天閽逋逃復返歌至仁兵興屡參大帥軍指捕山㓂如殪豚破家築城酬寵恩國難是赴寜顧身大兵西来捷如神守戍夜遁不敢眴君聞怒視手握􅚙舉家障道遏且言國何負若棄不援海内既宴棲丘園目視利禄如浮雲匪惟有政可著論孝反内充外行敦人有其一且難臻矧兹章明非昧昏史著厥弟此其昆比徳無愧銘宣均紀揚始終表茲墳宰木有朽名長存靈隱良禪師遺像賛眼光閃鑠如秋隼之横寥廓也威鋒峭崿猶扵莵之居踞叢薄也文彩彰灼藻火施而江漢濯也正令揮霍舂雷霆而撒霰雹也縈然而若有着也悠然而無所泊也洸然而不可度也沉然而堪任其託也是無忝佛智之孫廣智之子超然而頓覺者也宋學士文集卷第五十八芝園後集卷第八
