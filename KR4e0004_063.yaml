  text: 宋學士文集卷第六十三芝園續集卷第三
  hash: sha256:a80be85c70296ebfc1e3d6bead438c627a70b5a417fcf1977c737ddf238ca2a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_063-1a}
body:
  text: 深􅒁先生吳公私諡貞文議斯文天地之元氣得其正者其文醇得偏者其文駁世之治也正文行乎上則治道修而政教行世之亂也正文欎乎下則學術顯而經義章斯文之正非謂其富麗也非謂其竒佹也非謂其簡澀渙漫也本乎道輔乎倫理據乎事有益乎治推之於千載之上而合參之於四海之外而凖傳之乎百世之下而無弊若是者其惟文之正者乎文苟得其正則窮泰何足以纍之浦陽深􅒁先生吳公天賦絶人精識邁古咀嚌六經以求其道饜飫百家以盡其用貫穿該博洞視當世瑰瑋弘大不愧前古其陳理也明而嚴其敘事也精而當其道情也周而婉其賦物也深而遒年未弱冠志意廓然憤東夷之不恭則欲蹈虜庭而陳説覽時政之多僻則欲告時君以仁義以聖人之志莫顯於春秋也則排異説而務得褒貶之中以三代之政莫著於書詩也則略傳注而務得理事之實以亞聖莫盛於孟子也則斥史遷之妄而傳之以詞賦之祖莫忠於離騷也則法而式之以古樂府之作隨三代而升降也則撰而次之搜抉隱伏擲紏訛謬神行電逝川流石止傑乎雄哉先生之於文可謂貞而有則矣先生既不喜仕後用薦者為長薌書院山長而終史臣嘗附于元之列傳門人私以淵潁易名或竊病其未稱於是更諡曰貞文先生庶使來者知浦陽之文自先生始大盛而正文之不遇可為當時惜也吳先生碑元國子博士吳先生既卒三十有七年其子今翰林待制沉告于太史宋濂曰先君學行海內靡不聞之然知而尤詳者莫如鄉人鄉人知者衆矣好道而諒直者宜莫如子圗其傳俾久弗忘非子之屬而誰屬濂於先生固弟子行幸執筆從士列咸餘教所暨且與沉友老矣寧敢卒辭先生吳氏諱師道字正傳婺之蘭溪人少勇於學不督而勤始為文辭輒驚駭長老未冠讀真文忠公書大悔𥘉所為非是即以聖賢自師時許文懿公以朱子之學淑學者先生持所悟識造門質難許公甚禮敬之授以所受心領意繹日開歲化斂戢充擴刻削就規矩燁然有聞於時至治元年舉進士登科授高郵縣丞階將仕郎漕渠決泛原陸漕不通先生集工隄之三年以外艱歸復除改寧國録事轉從仕郎天曆元年徴江淮兵過郡將弗撿下兵白晝揮刀戟走市怖人􅐁資貨不與紫楊道上縱火焚廬舍橫甚自郡守以下皆畏噤不敢治視民戚若不知先生曰兵無狀賊天子民不治且不可制索馬從數卒行市捕得縛市門榜掠令衆衆譁操仗呼曰何録事乃敢爾吾曹死耳不忍為人辱必殺録事先生聞之獨出喻其衆曰録事儒者易殺敢殺者來録事不汝禦也衆􅌓眙不敢有言退相戒曰它人易凌慎勿犯吳録事明年飢先生平價勸分得粟萬餘石食城中民既而宣城民仰縣官食者三十三萬口廉訪使者以先生能吏檄攝縣振飢悉召大姓第其家為九等出粟有差得三萬七千陸百石飢者以不殣死又明年春未麥先生白廉訪使者請諸朝發官廪十萬計使者亦遣椽吏出貨旁縣復獲鈔數萬定選廉察吏賦民先生任三之二藉民為曹伍以次呼名受錢粟襁負充庭中若無一人然有既受而易服重至者先生目吏取其人於衆中詰之具伏左右相顧疑為神明居五載條教修完事治姦息廉訪使者薦于朝以疾引歸重紀至元之𥘉遷文林郎池州建德縣尹新孔子廟堂廣學舍豪氓侵郡學田七百畝郡下先生問狀按圖繩豪民歸諸學建德非茶區民苦茶稅先生言不便報減稅民賴之中書左丞吕公思誠侍御使孔公思立薦先生經行高宜為人師召入為國子助教階承務郎踰年陛博士進儒林郎先生聲著中朝者久士子聞先生至喜曰是㜈吳先生耶相率持所疑揖問開以機鑰皆歎服去先生因推所聞陳説誨誘端簡嚴肅經義一本朱子排斥異論有詆朱子者惡絶弗與言𥘉許文正公衡在成均時宗朱子以為教其法具在先生守不變學者信嚮如文正時禁林近臣復薦先生才任修史未報至正三年先生以內艱南還明年江浙行省中書當大比聘先生去取士疾作不能行上書請致其事八月十七日卒家壽六十二既卒命書下以奉議大夫禮部郎中致仕五年九月十七日葬銅山鄉中徐之原先生之先居信安四世祖𣏌徙蘭溪曽祖輝祖儒宗宋國子進士考􅙫世父幸無子以考命後之􅉝贈應奉翰林文字從仕郎妣龔氏贈冝人先生娶徐氏封如龔氏二男子長深先卒次沉也一女適徐虎臣孫男若干人先生於書無時不觀故無所不熟涵畜淵邃不可涯涘為文務自理出暢而不繁崇而不矯有蘭溪山房類稿二十卷易書詩皆有雜説通十卷戰國䇿校注十卷絳守居園池記校注一卷敬鄉録二十三卷自聖賢之學不傳篤信者失之拘而不適於用喜功者失之詭而不合乎義二千年間非無豪傑之士而功烈不少見於世者不以斯耶宋之君子後先繼出推明闡抉疏闢扶樹理無不章事無不備雖聖賢復生為後世計無以加矣然而卒未有繇其説而大有為於天下者豈非有志者鮮哉先生蚤有所聞尊而行之守道而不遺乎事致用而必本於道施其緒餘於郡邑巳足以震耀當世使假之以髙位而獲大行𬒳其潤澤者夫豈細哉卒止於斯謂之天也非耶雖然觀其所自立不既偉矣夫銘曰聖學之傳猶日麗天光華赫如照𬒳八埏有足者行有目者覩致用成功咸以日故使日自明明不照物雖曰行天何取於日其或善燭而不能遐如膏與薪厥功幾何道積于躬用見乎世微之一毫大之無外在聖有作佐啇造周天苞地含嶽立川流區區霸功實悖於道卑曲偏岐膏薪之耀歷世二千濂洛擴之有支而南考亭拓之夷其榛荒亦有車馬有駕而行可盡天下彼惛不由狹徑是趍殫其智能陷於泥塗惟㜈有傳考亭之適先生是承孔武且力涵而俾深植而俾成濯其光晶有燁其明始奮而仕不辭下位道無粗精崇􅋻一致繩豪鋤疆煦其弱羸父嚴母慈亦作之師廷臣咸言其道可斆帝曰汝來掌我邦教有肅威儀有秩詩書大帶玄端開陳聖謨使陟而升可澤四海世方仰之曷為不待不顯者身道則不亡遺書滿家百世彌章世觀其書將考於為勿謂易知斯道在斯元故祕書少監揭君墓碑有元盛時荆楚之士以文章名天下者曰虞文靖公集歐陽文公玄范文白公梈揭文安公徯斯海內咸以姓稱之而不敢名其後三公皆死無繼者獨文安冢子諱汯君以文學仕順帝時至國亡而後終人謂揭氏有後君字伯防少敦檏苦學同舍諸生巳成誦出嬉遨君獨坐諷不休夜爇薪以繼必至精熟乃巳年十八盡通六經大義肄舉子業試不合有司既棄去取諸子百氏書窮研之攻古文辭侍父入燕都輔太學生端方有威儀六館士敬憚之或譁笑方殷聞君履聲輒止是時虞公及歐陽公皆在朝廷交稱君美以為文安慶至正年文安薨天子錫金錢百僚皆致賻檖人勸君輸貨縣官而給鹽淮安可獲利數倍且無遺路虞君哭不從曰汯敢家先君之喪乎至家援禮制儀戚易兩至服闕以蔭輔祕書郎階承務郎遷翰林國史院編修官轉太常博士再入翰林為修撰仍兼國史編修階三轉至奉議大夫代祀北嶽北鎮還拜江南行臺監察御史未上留為禮部員外郎階朝列大夫十八年奉詔諭江西至七閩會為漢陳友諒陷江西不得往改僉江西湖東道肅政廉訪司事加朝散大夫治建寧既而友諒兵寇杉關下邵武據延平建寧受圍大軍退保福州城中吏民相繼出奔惟經略使普顔不花尚在君請與之謀經略聞君至迎曰僉事猶未行耶君憤曰經略何為發此言今盜賊圍孤城正吾與經略致死時也吾死將與此城俱顧獨走欲安之乎經略起問計君為之畫䇿經略歡曰吾志決矣即當如君言部𣪚卒得千人命建寧總管阮德柔將之出戰不利民大讋君集衆告以福禍謂并力禦賊則妻子可生緩將為俘虜語甚切民感泣請各自效無老少悉乘城固守君往來撫勞之分壯者千人助德柔戰屢捷勢稍張城外有山曰黃華高出城上君恐賊窺見虗實作層樓蔽之命守者鍛鐡為長鉤廣儲水樓下以俟衆不知所為及賊據山以火攻樓即以長鉤曵之隨以水火尋息復預積濕薪枯秸城下賊穿隧以入燎煙於隧熏之死者甚衆賊揚言攻城西君察其旗亂而氣怠命備城東巳而果攻城東知有備驚駭而退是時內外相持逾十旬樵蘇道絶徹民居以炊經略憂以問君君曰士氣在乎作之爾且直壯曲老吾以王師討賊何憂不勝乃槌牛釃酒勞將士以義激之皆踊躍請戰空一城鼓譟助之聲如雷霆賊衆數萬逆戰君戎服出陳後督諸將盡力俄矢石亂下或請少避其鋒君叱曰破賊在今日敢言退者斬於是士卒殊死鬪自寅至午焚其三柵乘勝奔之是日福州援兵繼至賊敗走復延平等三州獲勝兵千餘人咸欲繫獄論其叛逆罪君曰大盜未殄脅從者可勝誅耶誅桀黠者數人悉縱之耕及諸將上功于朝𬒳褒擢君未嘗出口或為君冤君曰吾職耳可徼功乎改江西行省郎中未赴以工部郎中召時淮浙亂道不通留家四明之慈溪挾子樞浮海而北過黑水抵鐵山卒遇倭寇同行多𬒳害君脫走趨遼東轉之山東制下升祕書少監階中順大夫而齊國忠襄察罕帖水兒在洛遣使迓君君赴洛留歲餘承制授刑部侍郎不就二十八年踰太行至燕都未久大明兵圍城七月十八日順帝宵遁明日君覺之遑遑北走樞夫君所在號哭而追及于海子稿君罵曰吾死職義也爾來欲何為奮然行弗顧樞泣抱持賔客故人亦稍至遂強振君歸環立守之君擁衾臥不食樞叩頭流血請所親厚者交進慰解乃起食一餐八月二日兵入燕凡仕者例從南亰君至稱疾弗仕踰年反慈溪洪武六年二月八曰卒于寓舍年七十四月一日權厝舍西香蘇山之原以某年月日葬某地君事繼母以孝聞撫庶弟有恩六主文衡所得多竒士交友皆當世名人為文敦深簡質有父風務關倫教不為浮豔語集毀于兵存者若干卷藏於家君自視欿然接人和而有禮寡言峻行來嘗有矜大之色雖家人不見其疾言厲氣平居非疾病必冠帶為私書皆端謹可觀𥘉君之曽祖贈嘉議大夫禮部尚耆上輕車都尉追封豫章郡侯惟聰祖贈中奉大夫江西等處行中省參知政事護軍追封豫章郡公諡貞文來成世居豐城皆以厚德稱至文安遂以布衣致位翰林侍講學士中順大夫知制誥同修國史同知經筵事追封豫章郡公而推恩及於二代郡侯之配黃氏何氏郡公之嬪黃氏文安之室李氏程氏皆封預章郡夫人君起其後又能世其家有聞于時而君之子樞樂復好學問不失儒行當可繼於君嗚呼爵祿之繼可幸致也而繼其文學為難文學可免而修也而繼其道德為難若君者可謂兼之矣君娶曾吳易三氏曽早卒吳易二氏皆封靖安郡君子男四人棐丑夭其二郎樞樂二女適盛伯剛某君之居慈溪與今晉王傅桂君彥良交君卒彥良持樞狀來速銘銘曰自古有國貴惟世臣匪爵之仍有德有文朔元百年中有揭氏位雖弗崇其德可持揭氏之先豈無侯王盛莫與紀靡久卒亡維文安公敦厚凝確際時休明典帝制作德尊望隆震撼四方執造化機闔隂闢陽人止其身公又有子緝其休聲克闡克似豈惟文辭亦有事功建略南藩剪屠姦凶仗義為城奮作士氣章甫申申復地千里褒寵之加非我敢知勞烈雖多乃職之冝邦國殄喪吾能獨存奉身以歸敢汚先君生既有開殁則有承凡時之人其誰與京天匪私君以彰世德德著穹碑來者咸式鄧錬師神谷碑皇上既撫有方夏修天地百神之祀為生民祈福祥弭災癘以為非有道之士不足以交神明洪武四年乃詔龍虎山嗣漢天師張公正常擇其徒之可者以名聞詔至闕下問以雷霆鬼神之事於是鄧君仲修等述感化之由以對上説賜坐錫燕詔館之於朝天宫祠禱之事多屬焉五年春三月不雨上以農病播種憂之仲修奉詔設壇場行驅召風雷之法天大雨賜白金若干兩後三年秋七月復不雨御史大夫率儀曹承詔臨視禱三日不效仲修退坐齋室默運玄化出杖劍一叱雲合雨如注是嵗冬無雪詔李韓公及丞相致上命以禱期以三日雪至期果然上甚寵異之每召見與語嘗賜以詩及御注道德經命與住持朝天宫宋宗真修祠祝科儀行于世十年奉命之會稽祭帝禹及宋阜二穆陵還明年張公卒於是仲修請歸視張公葬而仲修亦老矣乃請於公之子嗣師曰吾身雖處輦轂下然茲山師友之所居吾心未嘗違去也嗣師知其意卑以琵琶之峯郭塢之原仲修更名曰神谷顧其門人曰吾􅋖逰時藏吾遺蛻于此既而復來京師與余言其故且曰吾幸從先生逰吾冡必得先生銘然孰若及吾存而見之余曰仲修學長生久視之術固蘄不死余將托仲修而長存而仲修乃欲屬余以不杇乎然余厚仲修不敢辭仲修名今以字行臨川人曾大父某宋某官大父小父韶仲修生時有雙鶴飛翔之異年十二入山之紫微院師留君敬斌十八服道士服嘗出遊見道人於仙岩石上授以縱閉隂陽麾斥鬼物之法又從隱者野庵金志陽傳性命之説龍乕大丹之祕世之碩師皆禮重之纍贊其教於山中嘗提點溫州玄妙觀主杭之龍翔宮四方人願傳其道者甚衆其所得者蓋深矣余固不能盡知也然仲修弟子為余言仲修喪父盡禮嘉禾生其隴上哭母哀泉為之涸其行又有出於所見之外者而余與仲修交甚久觀其卑讓不伐言語若不出言嗚呼學道者固如是哉銘曰老子之道充以夷顯可用世微守雌厥文五千意易知今之宗者皆其支漢留侯孫號天師玉章寶劍大綘衣指麾呵叱運化機驅役鬼物如群兒東南名山雄且竒左龍右虎相委蛇涵靈蓄怪鬱靡施天使道術嗚於斯傳世四十嗣不衰前者既倡後輒隨百千弟子傑者誰鄧君挺然熊豹􅐾弱齡恍遇生安期㖟以寶訣行如飛野庵之叟髮垂頥窮崖屹坐闢兩扉稽首長跽叩幽微語以一氣凝丹基心得其意忘其辭虛極靜篤中赫熹赤光射牗如渴霓小試餘技為世推呼吸雷電囚蛟螭璽書下徴祝國釐禜祈旱潦捷斯須龍顔每為興嘆咨歲時竹宫常侍祠霞裳瑶冠光陸離功利默默彼蒸黎容色不老難端倪夀命豈與恆人齊胡為此丘穴深巇欲藏冠劒誑後來神仙不死誰謂非所示者幻同人為逰行八極當來歸千載弗朽徴斯碑杜環小傳杜環字叔循其先廬陵人侍父一元遊宦江東遂家金陵一元固善士所與交皆四方名士環尤好學工書謹飾重然諾好周人急父友兵部主事常允恭死於九江家破其母張氏年六十餘哭九江城下無所歸有識允恭者憐其老告之曰今安慶守談敬先非允恭友乎盍往依之彼見母念允恭故必不遺棄母母如其言附舟詣談談謝不納母大困念允恭嘗仕金陵親戚交友或有存者庶萬一可冀復哀泣從人至金陵問一二人無存者因訪一元家所在問一元今無恙否道上人對以一元死巳久惟子環存其家直鷺州坊中門內有雙橘可辨識母服破衣雨行至環家環方對客坐見母大驚頗若嘗見其靣者因問曰母非常夫人乎何為而至於此母泣告以故環亦泣扶就坐拜之復呼妻子出拜妻馬氏解衣更母濕衣奉糜食母抱衾寢母母問其平生所親厚故人及幼子伯章環知故無在者不足付又不知伯章存亡姑慰之曰天方雨雨止為母訪之苟無人事母環雖貧獨不能奉母乎且環父與允恭交好如兄弟今母貧困不歸他人而歸環家此二父導之也碩母無他思時兵後嵗飢民骨不相保母見環家貧雨止堅欲出問他故人環令媵女從其行至暮果無所遇而返坐乃定環購布帛令妻為製衣衾自環以下皆以母事之母性𥚹急少不愜意輒詬怒環私戒家人順其所為勿以困故輕慢與較母有痰疾環親為烹藥進匕筯以母故不敢大聲語越十年環為太常贊禮郎奉詔祠會稽還道嘉興逢其子伯章泣謂之曰太夫人在環家日夜念少子成疾不可不早往見伯章若無所聞第曰吾亦知之但道逺不能至耳環歸半歲伯章來是日環𥘉度母見少子相持大哭環家人以為不祥止之環曰此人情也何不祥之有既而伯章見母老恐不能行竟給以他事辭去不復顧環奉母彌謹然母愈念伯章疾頓加後三年遂卒將死舉手向環曰吾纍杜君吾纍杜君願杜君生子孫咸如杜君言終而氣絶環具棺槨殮殯之禮買地城南鍾家山葬之歲時常祭其墓云環後為晉王府録事有名與余交史官曰交友之道難矣翟公之言曰一死一生乃知交情彼非過論也實有見於人情而云也人當意氣相得時以身相許若無難事至事變勢窮不能蹈其所言而背去者多矣况既死而能飬其親乎吾觀杜環事雖古所稱義烈之士何以過而世俗恆謂今人不逮古人不亦誣天下人哉東丘郡侯花公墓碑皇上渡江之六年庚子夏閏五月癸酉偽漢主陳友諒以舟師入冦圍太平行樞密院判花公率麾下三千餘人結陳迎戰三日賊不得入乙亥城中乏食公士馬憊城陷賊縛公急公怒奮身大呼縛盡解起奪守者刀殺五六人罵曰虜非吾主敵也曷不趣降賊怒碎公首縛於舟檣衆射之公至死罵賊不少變巳而賊犯龍江上命諸將力戰賊敗遁去後五年甲辰上即吳王位追封公東丘郡侯又十六年其子僉水軍左衛指揮司事煒泣曰先公殁今二十年無文銘于神道竊恐忠烈不白於後世敢請惟公勳業始卒冝載國史余嘗待罪太史氏不敢以耄辭公諱雲姓花氏世為懷逺人自考以上姓名皆亡莫知遷徙世次然皆不顯公少孤隨母嫁張氏貌偉而黑驍勇絶人儕輩畏服之歲癸巳杖劍謁上于臨濠上竒其材力俾將兵略地所至輒克破懷逺城口虜其帥以歸進攻全椒拔之群冦據繆家寨公俟夜襲之寇散走上將取滁州單騎前行遇賊數千人於道拔劔躍馬衝其陳而過賊驚曰此黑將軍勇甚不可與爭鋒兵既至遂克除甲午從上取和州得卒三百以功授管勾明年乙未率所部先渡江上克太平以公忠勇可信任命宿衛左右丙申上破集慶公得兵千人升總管徇鎮江丹陽丹徒金壇諸縣皆下之過馬馱沙劇盜數百遮道索戰公且行且鬪三日夜皆禽殺之授前部先鋒攻常州拔其城駐守牛唐營夏六月立行樞密院於太平遂拜公院判階安逺大將軍丁酉春正月克常熟州獲卒萬餘命公將之秋七月以兵三千之寧國陷山澤中者八日群盜蟠結梗道公操矛鼓譟出入營壘間斬首千百計而身中一矢還命守太平後四年遂卒卒時年三十有九夫人郜氏公與偽漢戰時一子方三歲夫人以牲酒祭家廟會家人泣曰今城且破吾夫忠義人必以身死之吾夫死吾必不獨生然不可使花氏無後嬰兒在若等善撫育之聞公就禽夫人赴水死年甫三十有五侍兒孫氏瘞夫人尸遂抱兒以行偽漢軍虜之至九江軍中惡飬小兒孫氏以而授渙家屬之曰此兒良冝善視之是年冬王師伐偽漢漢敗孫氏至渙家視兒在瞷渙人出竊負以走夜宿陶穴中天曙脫簮僦舟渡江遇漢濆軍奪舟棄江中孫氏抱兒遇斷木浮至附之入葦洲採蓮實哺兒七日不死夜半聞人語聲呼之逢老父號雷老告之故與其俱行明年􅉝丑春二月逹上所孫氏泣抱兒拜上上亦泣置兒于膝曰此將種也賜雷老衣遣之復其徭巳而令人追之忽不見兒八嵗侍皇太子就學年十三授乕賁右衛副千户後七年拜今官即煒也煒於洪武丁巳偕孫氏至太平奉夫人骸骨歸乃束草像公以二月巳未合􅌾上元縣南五十里之水橋嗚呼觀公之死賊與妻妾之報公可以知公之為人矣天不殄其後豈不冝哉銘曰雲雷遘屯區宇分篤生真人鎮乾坤騎龍鞭霆下天門前翼後衛蓊若雲誰其最雄花將軍力驅智駕敵萬人蹂躒群盜猶麚麏大刀長戟屬櫜鞬左麾右刺流電奔緋衣緇辨貔虎屯駐馬飲江江水渾吳楚之城殺氣昏手挽天河洗妖氛軍聲隆然若雷震遭者膽落兩足蹲元戎開府大江濆腰佩兵符威令尊控制上遊為國藩偽漢恃力不圖存建旗揚帆事鉦鼖艨艟蔽江躡鉤援槌牛享士士氣伸馳馬督戰寧顧身賊熖熾若烈火焚大戰三曰勢愈殷單騎赴之齒囓齦怒髮上指目吐煙叶汝賊凶頑犬與豚願醢汝肉一口吞賊慙耳塞不忍聞至死不屈酬國恩飄然乘雲叩帝閽請為厲鬼扼賊元賊當殛死洗厥冤天子下詔褒忠勳東丘立矦賁九原孤兒保育寵便蕃不墜宗祀天所敦生為烈士死明神神靈在天光焞焞嗟爾來觀萬子孫繼忠思孝慎勿諼弗信請考太史文
