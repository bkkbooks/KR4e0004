body:
  text: 義門銘天地之間有大防焉孝友之謂也水之始也濫觴爾苟無土以障之則必至於滔天火之𥘉也螢爝爾苟非水以制之則必至於燎原人心感物而動不能無欲其端亦甚微不有孝友之人出為表式則淪胥以成風而彛倫斁矣昔者先王有見於斯雖委巷刺草之民能行之者必旌命之所以賛王治章人風而挽之於正也世之評唐史者且謂張公藝李知本劉君良孝行推於友睦数世不衰真豪傑之士嗚呼當是時金章紫綬之賢皁盖朱轓之英布列中外未嘗無之顧以豪傑歸於閭巷之士者以其不俟教令所加而後奮也嗚呼南陔白華之詩盖亦啇之末世周之盛徳也斯民以孝友著稱君子可以觀其世矣浦陽黄氏其先與文節公廷堅同所自出有諱度者宋隆興癸未進士亦諸祖也元至正中傳至諱珪君生三子其二曰隆曰生隆生一子曰逢原生生二子曰逢吉曰逢昌逢吉兄弟亦各生子至十有餘人三世之間孝友無間言逢吉乃殚志竭慮設為教條既鑱諸樂石復遣從子宿請濂銘之嗚呼子壮而分婦姑反唇相稽秦之俗巳然矣况去古日逺風氣日益漓黄氏能不染於末習卓然不變其恒度豈非真豪傑者耶浦陽以義居聞者二三人唯鄭綺之家巳至十葉黄氏知感慕而興起進脩益力烏知不綺若耶雖然許史之稱未足為貴也猗頓之貨未足為富也唯孝友積諸躬令名昭于時其為貴且富也大矣所謂特立兩間而無愧稽諸賢哲而有徴著之後世而可法何莫不由於斯黄氏孫曽可不思自朂㢤能如濂言揆之張公藝之流他日可馴致矣詩有之風雨如晦鷄鳴不巳濂於黄氏盖深有望焉銘曰浙河東疆地曰浦陽厥氏維黄雙井同枝科名陸離世服詩書有儒其冠以義爲藩奕葉共飱視其齋庭左史右經踵武绳绳視其房除前絲後纑燈火與俱至和所形揖譲而升穆然無聲既衍而葩實而匪夸三代一家世道下趨子父割閨婦姑勃蹊十室九衰瀾倒波頺萬夫莫囬蝇聲方冥忽聞怒霆孰不爲驚植範建防翼法輔常斯徳之亢造端非難延𥙿維艱任重於山如爲髙陵世益代増非人獨能如松之青故隕新承所以永貞古先與謀庻行之脩其道曷由執敬爲符夙夜究圗百世如初鄭景彛傅鄭銘字景彛㜈之浦江人世以孝義顯聞景彛自㓜濡染之深卓然有以自立面目嚴毅不妄言笑人多敬畏之從父大和司家政察其爲人可成遠大器聘鄉先生吴公莱爲之師吴公授以春秋三傳之學發凢舉例㑹諸說而折衷之景彛即能領解其趣有所質問咸中肯綮吴公極鍾愛遂相親如父子金華胡君翰亦来從吴公逰景彛與之晝夜相摩切凡天地萬物之理内聖外王之道古今事㑹之變無不及之講覈既乆精神發舒大肆其力於古文辭吴公品評至嚴一辭稍不脩輙以爲詬病故景彛之文幅尺弘而体式備胡君之文意度宻而波瀾張皆燁燁有光于時之𥘉景彛早䘮父事母黄氏至孝飲食必慎擇以進黄氏嗜鰇魚雖卒不可得必徧求之以悅其意㑹有疾益思得魚巳而獲魚芼以香糝上之疾遂瘳奉諸兄如嚴父進退執禮甚恭不命之坐不敢坐蓮塘張翁無子聞景彛賢而有文命爲贅婿景彛能當翁意翁亦以客禮侍之然翁頗木訥自重景彛亦自韜秘絶不與人交終日嘿嘿而坐或焚香以銷世慮既而彈指歎曰吾誦詩讀書亦頗有志於事功柰何欝欝乆居此耶黄氏殁其志㴚孤景彛居䘮盡禮出入必布褁鞍轡三年不御酒肉翁大享賔樂作景彛潜避去翁不懌或爲觧曰居䘮不聽樂其家法自當爾翁何恠耶翁自是不敢强翁既耄欲以貲産悉屬之景彛辭請以俾諸族子翁不可姑受其三之一翁之亡皆景彛塟薶之他受田者漠如也景彛之仲兄鉅殁以次當長其家哀痛弗忍請至終䘮群從固請乃泣告外姑以歸籍所得翁之田廬歸于公復自念乆居於外不親家事能荷負者莫如從子渭又宗子也遂為文告先祠譲之渭亦固辭因虚其席年六十二卒景彛臨事重然諾不苟於取與鮑溪水惡春漲多溺人景彛架石橋其上潘氏子母老無飬給其衣食終身人又稱景彛為惠人云史官曰濂聞浦陽鄭氏家九葉同居最多令子弟而授經者之師吴公先生又一時名士心極傾下之後十五年濂以非材来繼吴公後始得與景彛交徴諸所聞益信景彛岀所作賦数首峻㓗荘凝絶似其為人而他文辭亦稱濂方惜景彛之學未暴白于世且謂玉光劍氣終有不可掩者而景彛忽作土中人矣不亦悲夫濂與景彛暨胡君皆吴公門人胡君既銘景彛之墓濂亦不能無情遂述為小傅一通以傅嗚呼有才無命世之如景彛者不少寜不使濂重有所感乎傅同虗感遇詩序洪武七年十一月二十三日皇上御東皇閣以靈寳齋科失於文繁詔朝天宫道士提點宋真宗等簒脩以適厥中而傅君同虗與焉上既面受以芟摭之要復賜之坐設筵以宴享之酒半酣命賦嚴冬如春暖詩同虗與鄧仲脩次第成跽奏上前龍顔大悦且親御翰墨成長句一首内史讀示至再既而㽞中不下遂令各沉醉而退同虗自念巖穴微臣上承天日照臨光輝赫赩誠千載之竒逢乃自撰古律二十韵以紀感遇之盛才華之士歆豔弗置從而屬和之同虗聚為卷軸以濂侍上左右親覩其事來徴序於首簡濂聞道家者流盖出於古之史官而其為書有皇帝君臣十篇力牧二十二篇伊尹五十一篇太公二百三十七篇管子八十六篇皆言治國之道非但如老聃荘周之所談而巳故或者稱其術與虞書所載者合良不誣也不然漢之用盖公言何以致清静無為之治㢤齋科之行符籙之傅特其法中之一事爾欽惟聖皇垂拱法官凝神穆清方之臣臣屡蒙寵眷上之所以遇下者其禮甚渥同虗感激奮勵中心弗能忘形之咏歌亹亹不巳下之思報其上者亦無所不用其情猗歟盛㢤雖然君臣之際如此上之有望於同虗者豈直齋科之文㢤同虗誠能以盖公自期使世之人咸知道家功用足以濟世而安民信為偉丈夫矣前所謂千載之竒逢者實在於兹同虗尚朂之㢤和詩者自鄧次宇而下凡十又三人云徑山興聖萬壽禅寺住持竺逺源公塔銘徑山禅師入寂巳久古縉州男子實為之銘其序曰禅師諱正源字竺逺歐陽其氏也文忠公爲逺祖而南康其所居也年二十七受具戒越四十五載當元至正二十一年六月廿六日壽七十又二而逝其始與卒也大辨和上虚谷靈公以道徳名東南其傳法師也觀音興聖道塲靈隱徑山其所主伽籃也始見陵公公以龍潭㓕𥿄炬語問之禅師應之曰焦石可破層冰公曰破後奚為復應之曰探索乃知公詰曰所知者何事方思對其語公遽舉杖擊之悚然黙喻由是智開識融外内無礙雄談慧辨動静皆空叩之者無窮歸之者有容近者化而信遠者慕而宗又能飾之以文持之以勤位尊而不以為榮徳盛而守之以謙所得乎道而出乎世者也居道塲増其室廬之未俻者主徑山㷊亂兵遺骼之暴露者在靈隱楼閣皆為煨燼惟其所君獨存類有神以相之者其建功動物之可見者也生之夕梵僧見夣於其母及将殁也預吿日期書偈而化弟子分瘞爪髮於道塲舎利叢叢然生其靈異之顯著者也元之帝師聞其賢錫以佛慧慈照普應禅師之號五主巨刹皆方鎮大臣遣使者所邀致其法浮於人者深也廣化圓伊本覺文煜興聖宗德承天道瓊净光智聚大慈等若干人其得法弟子也某等若干人其所度學子也徑山其白塔所在也全身而瘞者禆師之意也二十二年某月日其瘞之時也集而傅之者其所說法也法不可以迹求道不可以形著雖無塔可也有塔矣雖無文可也冝無文矣繁其辭者過也故畧而約之畧而約之者古之道也以古道豦禅師者余志也謂余爲蕳者非知道者也請銘者誰圎伊也銘曰道之原本無言兮以言求道道豈宣兮有倬逹摩號爲禅兮指心見性簡且專兮弊而失宗口耳是傳兮襲訛蹈誕欺昏頑兮虗石嶄嶄法雷震天兮餘音所及讋以顛兮師奮大勇直走其前兮象據獅吼泝幽玄兮五涖名山從者千兮扶堙䟽滯導百川兮洗濯白日光爛然兮有目皆覩照八埏兮文辭如雲來翩翩兮即而索之以絙縶煙兮道且不有矧簡編兮又况幻形同蛻蝉兮閟塔鑱文不愈衍兮有文之文多紏纒兮文而無文道乃全兮師道如羿此遺弦兮因粗解妙在後賢兮松隱庵記唯庵然禅師有道之士也嘗謁石室珙公於霞霧山公告之曰子去我而求憇息之所其必松江之華亭乎華亭民富而趨善富則樂於施與趨善則可化以吾佛之道其必有以䖏子矣書松隱二字授之以行師如其言至華亭郭匯之陽止焉郭匯者去華亭三十里赤松溪之所注也前有查山後有九峯皆先哲示化之地師憶懸記遂結茅而居其中里人吴某聞之捐金帛割土地之籍來上碩師上勿去遐邇相継輦石與土堙匯増址以相其役而金彭邵三氏以創建為巳任始工於元至正壬辰越二年甲午而佛有殿僧有堂亢而為門夾而為廡凡日用之所冝有者皆具取石室所書名之曰松隱庵師恐歲月滋乆無知庵之始末者命其徒慧開同净慈蔵史可傳請文而刻之夫天下之民未有與人以物而不求報者争尺布銖金多至相毆詈戕害雖親戚不復顧念至見釋氏之徒献所有捨所愛累千萬不敢靳者其故何㢤盖我大雄氏以慈悲方便攝受群迷慧力足以破貪法智足以祛惑故人樂而趨之庻幾期於妄息而真顯乎或者不知徒謂釋氏能以祻福鉗制人故有所兾而為之嗚呼是何待釋氏之至淺㢤然余有一言焉今之細民竭三時之力欲其室廬之完饘粥之充而不可得釋氏之徒皆坐而享之苟不力求其道無沗於大雄氏之教則因果之皦然者甚可懼也有若師者無求於民而民自赴之其道盖有度越於人者矣承巳成之業者多怠而不知自脩故詳其辭以告後之人豈非師之所碩乎師松江人少祝髪於無用貴公中謁千岩長公於聖壽寺遂傳其道後嗣主其席刺血寫經天花毿毿滿庭云天龍禅師無用貴公塔銘有序師諱守貴字無用水庵其别號也俗世甄氏世居婺之浦江其家業於耕樵毎使之行饁田間師志弗樂也乃同鄉童子從師傅學讀書元至治癸亥師年十八矣入里之康侯山依浮圗法為僧群僧各分檀越家遇其作齋㑹輙持皷螺應之師又弗樂泰定乙丑師年二十翩然徃浙水西日以問道為事適千岩禅師長公縛禅於龍華寺山師徃拜之授以向上一機㝠叄黙究恍若有所契師因弗欲辭去龍華與天龍院隣天龍沙門大道平公方務起廢力挽千岩主之丁邜春正月笑隱訢公言千岩行業於行宣政院将俾出世住大禅坊千岩竟遁逃不見使者乆之夜渡濤江東走烏傷伏龍山師復與之俱山有廢刹曰聖壽千岩為一新之遂命師領其徒至正丙戌師還天龍徃叄中峯本公断岩義公梁山寛公其反覆扣荅不異見千岩時師太息曰千江雖殊而明月則一吾今後無疑矣戊子之夏退居嘉興建庵為佚老計庚寅秋七月十日夣大道来别曰吾巳棄人間世矣師大驚急拏舟徃視之大道果告寂後因名所居庵為應夣黄文献公為記其事云師自是復住持天龍天龍素無恒産募齊民二千家每臨食時輙取一小甌聚之飬四衆大道既建大殿三門兩序及塐佛菩薩阿羅漢諸像師繼其後益殚志畢慮為造僧室與演法堂堂上為閣以妥吴越錢氏所造大悲尊象又買並寺之地以為𬞞畦而寺制所有者小大咸飭鍾魚互荅經唄兼舉隱然如大伽藍矣􅉝丑八月二十日作偈一首副以高麗净瓶寄别江浙行省丞相逹識帖穆爾公明日趣作浴事索筆書頌曰一蝸臭殻内外穢惡撒手便行虗空振鐸天龍一指今猶昨擲筆而化丞相聞之大加歎異遣官僚為具後事以某月日造慈濟塔院於天龍西崗奉全身塟焉師平生不畜長物寒暑唯一布衣戒行甚峻常落一齒其左右櫝蔵之中生舎利羅五色燁然日見増長七十有二僧臈五十又四所度弟子善法住侍德盛等若干人余與千岩結方外之交揮麈談玄無月不㑹而師又與余同鄉里故於師之傳授行業知之實詳銘非余孰冝為之德盛之請有不得而辭也銘曰伏龍之山懸岩千尺誰陟其顛奮身一擲軀命既絶萬緣頓息絶後復生真体軒兀如摩尼珠其光五色照耀東南不落名迹天龍一指斯為獨得無用之用動而常寂化為楼閣荘嚴凈域苟以為是渉乎相執以空為楮以無為筆焯德示後用垂千億新刻法華經叙賛蘭溪天真禅師竺源逺公發真正心務欲流通大法請故翰林侍講學士陳公達繕書法華經七卷鍥諸文梓歴三年始成復不惮溽暑竭蹷来青蘿山中俾余作賛惟此法華經王乃三界大師第五時所說凡六萬九千七百二十四言盖前四時之所開演若華嚴則觕妙適均若鹿苑則純觕無妙若方等則為觕者三為妙者一若以般若較於方等减去一觕而其妙正同度門雖弘皆未能徧收群機唯至法華開權顯實而使蔵通別三者咸歸一乗所謂純圎獨妙者也嗚呼世尊五十年間說大乘經諸佛境界不共三乗位次者其尚有加於此歟書冩而刋布之冝也斯賛之所由作其辭曰維妙法華經中之王如山宗岱猶河趨海其義云何大寂定塲獨一乗法無二無三大真毗丘㣲彼哲士假􅒀翰力寫卷凡七其𥘉肇自片言之微漸成文句遂折品第中間無算塵沙黙畫縱横順逆左右鉤連諸變幻事一一皆從三千徃相熾然出現若正若依以及假名攝歸一妙無餘欠者虗空有盡而此功德歴刼無盡法界衆生與佛真身本来不異鷄號而興至於日沒擾擾前塵分别影事妄勝真迷不自覺知入生死輪如来哀愍以方便故說大乗法蘇迷盧山廣愽高勝或可挾持此脩多羅未易得聞乾闥婆城日高則隱或可控搏此脩多羅未易得聞優曇鉢華千年一現或可獲覩此脩多羅未易得聞我今讃揚實本佛言𥘉非誑語諸有情衆生希有想生難遇想生精進想或於其間領解義趣不昧一心相由是空法由是假中體絕待三一圎融脩性冥泯大光普照明了無礙弹指之間證無上慧洪武十三年夏五月十五日前翰林學士承㫖嘉議大夫知制誥兼脩國史氣太子賛善大夫金華宋濂景濓撰故温州路總管府判官宣君墓誌銘始濂㳺學諸暨時與烏傷楼君彦珍浦陽宣君彦昭鄭君浚常浚常之弟仲舒同集白門方氏之義墪墪師乃吴貞文公立夫盖鄉先生也彦珍最先還而濂與彦昭浚常兄弟講學将一期當夜坐月白俟公熟寝輙携手出歩月下時皆羙少年不渉事兢跳踉偃仆為嬉戯或相訾謷或角觝其力至不勝乃止獨濂檏戇易侮不敢時相遂為驩彦昭於其間尤號雄俊彦昭䫜目穹鼻湏髥森然如㦸顔面鐡色類河朔間偉人見者莫不畏之巳而各西東散去浚常仲舒之燕都客太傅右丞相家馴致顯仕浚常官至僉江東建康道肅政㢘訪司事仲舒累遷太常愽士彦珍受太師德王薦為玉龍千户所管民司長官彦昭知印行宣政院以年勞入選擢承事郎温州路平陽州判官轉本路總管府判官歲􅉝丑浚常早卒後九年巳酉彦珍亦卒又四年壬子彦昭亦受誣以死其幸存而未死者唯濂與仲舒爾浚常彦珍之墓濂常為之銘仲舒謂濂不可獨後於彦昭嗚呼前後未五十年而世變不可知者已如此銘其可足恃耶雖然不敢辭也彦昭姓宣氏岊其諱也世為浦江人生長富家而不染綺紈之習别無嗜好唯購書不知休或請脫衣巾以償亦不靳入仕極清白凡所需之物必取給于家毫分不受於民在平陽時吏􅊢畏其不相容各去而更他業儒生有百畆之園為勢家所侵雖屡訴有司輙以厚賄屬吏連年不决彦昭立断還之儒生凾金為謝彦昭叱去曰顧法當爾吾豈私汝者耶彦昭恐童奴隂受之陽縛就地持杖大聲曰儒生所送金何在童奴垂涕曰某實不受金彦昭釋之曰吾姑試汝爾後十日儒生畫菜一本裝潢成㡧入謝曰判官清苦敢以一菜為献彦昭曰是雖微物終有私意存遂題識而歸之天大雨民與軍争簦民曰我物而軍取之軍之辭亦然絶無證左者彦昭命裂而為二並驅出使隷卒踵其後軍忿譟不巳民曰汝自失簦於我何損耶隷卒以聞彦昭杖民令買簦償軍其在温府治聲如平陽㑹大俠起東海来攻府城戍将問計於彦昭彦昭曰此烏合之衆耳冝帥精鋭大開城門搗退之㓂果敗北自是屡戦屡捷戍将氣驕頗易之㓂乗隙入城戍将𬒳擒而彦昭亦受縛彦昭瞑目駡曰天子何負於汝乃搆亂邪㓂怒欲兵之民翼蔽其背泣曰寜殺我母殺我判官㓂義之而止彦昭得解夜縋城而出請兵於方嶽連帥欲為殄㓕之計無有聽之者彦昭知時事不可為歸臥孫井山中巳而元亡大明受命有詔起江南文學之士而彦昭與焉上将官之彦昭辭以疾不受復還故山彦昭之兄財賦總管府知事彦髙風流醖籍為多士之冠彦昭與共論上下二千年治亂至抵几太息間操􅒀成詩酬荅不巳襟懷冲曠外物若不能擾之兄弟又善音樂遇風日和麗對坐海棠洞底取檀槽琵琶弹之侑以樂府新聲釃酒仰天而飲不至於醉不休㑹婚家乾沒里氓田氓撾登聞皷訴冤誣彦昭關通州縣以致事不直彦昭實不與聞也逮彦昭至刑部婚家引伏部吏并罪彦昭彦昭抗辭曰我實無罪奈何不為白行當於殿陛前辨之吏怒下獄幽之彦昭氣憤憤無所洩不食三日死口鼻出涎涕凝結鬚上成冰實洪武壬子正月某日也壽六十其子騏收骨歸塟於某鄉某山之原禮也彦昭曽大父某大父某父嗣良母某氏娶方氏生三子長即騏次駰次駱女一適洪某孫男三某某某嗚呼彦昭之事行其都凡如此濂謹為序之皆出於人心之所同不敢以私好變易其辭盖期傳信於来世云復收淚而著銘曰非學之弗蘉胡軋之而使屯邪非才之不揚奈何不得以伸邪百齡幾何孰為短長逹人大觀其得䘮固均邪墓草荒凉青而復黄寜不使余感舊而傷神涕淚而沾巾耶
