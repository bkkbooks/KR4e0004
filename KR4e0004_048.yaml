body:
  text: 李徴君像贊嗜義親賢以道自娛懿哉若人君子之儒詹士龍小傳詹士龍字雲卿光之固始人父某宋開慶中都統勇勝軍守鄂以偏師巡渠巴諸州與元兵戰南平身嬰九創𬒳執發憤不食卒元兵破鄂降其軍士龍生三歲同母胡氏北遷董忠獻公文炳以其父忠也鞠為子文炳長子名士選故命其為士龍飲食衣服一視諸子外人不能辨諸兄忌之罵曰虜子見幸乃同我輩耶士龍不知其故泣訴文炳文炳曰爾真吾子飛語慎毋聽也士龍哀祈益切文炳頗漏言士龍晝夜流涕欲復詹為姓受文炳邜翼恩深未敢言一日獵滹沱河遂陳前志文炳戲曰爾投石水中石浮吾當爾從也左右皆笑士龍仰天祝曰天若不絶詹氏石當浮因投石水中石盤旋急流中若沉浮者數四文炳以手拍鞍曰詹都統之靈其不死乎即令士龍復詹姓文炳薨為服齊衰三年歲時祭祀必先設神主率家人奠之士龍後用文炳弟文忠薦為髙郵興化尹士龍修築捍海堰三百里數郡利之𥘉發地獲范希文石記曰遇詹再修事蓋前定云轉兩淮都轉運監使司判官改淮安路總管府推官拜江南行臺監察御史時姦臣柄國虐𦦨方熾士龍上章劾之未幾事果敗士龍退隱興化葺草堂德勝湖上若將終身朝廷念其老成以廣西廉訪僉事起之居二年鬱鬱不樂乃移疾而歸年五十八卒子澍嶽州華容尹文炳妻以從女實因前好云史官曰精誠之格將何所不至上致日星之應下召物産之祥古則有矣今觀士龍投石之事其惡可不信哉或者致疑天人之間視之若茫然不相通過矣豫總修元史時有司不以聞失於紀載因徇其孫壻余文升之請刪其墓志為小傳一通以傳復古軒記臨川饒君孟持其五世祖某府君嘗嗜琴琴有復古玉髓二張其材孔良蛇腹斷而金沙明試一鼓之獨鶴夢回而滿山風露也寒泉漱巖而山鬼夜聽也可謂清且古矣府君雖殁歷世寶祕不翅孔氏之遺履時出玩之思府君之不可見慨然髙山仰止之情元季兵燹方張白晝為人持去煙海茫茫竟不知墜於何所如是者有年一旦外孫樂安夏氏匆購得焉舉以奉孟持孟持反覆拂拭不覺悲喜交集玉髓頗殘闕唯復古嶽沼暉軫咸具孟持取水精絃𬒳之方布瓜指其𥘉則嗚嗚然已而復洋洋然亦似傷其流落而慶其復還也孟持刲羊豕列豆籩燕饗三族合芳水為櫝尊閣堂中遂以復古題其榜云春秋之義大復古其謂復古者所繫甚大非一器物之謂也雖然有人於此闔廬為人所攘巳而還之可以謂之復乎曰復則復矣而非古也疆畎􅟃於強暴取而歸之可以謂之復乎曰復則復矣而非古也巵匜杯棬之屬為貪者所竊四力追而有之可以謂之復乎曰復則復矣而非古也然則何謂而可斯二琴者相傳或為雷威所斫由唐涉宋歷五六百年之久所獲非一人所閲非一家始為府君之所有府君之後又奪於他姓今復歸之孟持正如寶玉大弓之再得不謂之復古也謂之何哉不可以一器物之微而遽少之也然而豫又有説焉古之人朝出耕夜歸讀古人書今則飽食以嬉我當復之古之人入孝出弟如用菽粟布帛斯須不可離今或有凌犯之者我當復之古之人事君如事天一動二靜􅌂如有赫其臨今則鮮有致其身者我當復之夫然故復古之功大矣二琴云乎哉孟持勉旃可也東軒集序東軒集者天台方君明敏之所作也明敏仕於元嘗參知政事於江浙行中書襟韻蕭灑而氣岸偉如發於聲詩往往出人意表其弟明則繕鈔成帙同子學子桂慎請豫評之豫曰古詩俊逸超群如王子晉鶴背吹笙隨風抑揚聲在雲外律詩清麗婉切譬猶長安少年飲酒百華埸中鶯歌蝶拍春風煦然撲人終日傳杯而醉色不起詩人之趣至是亦可謂之不凡矣明則曰請為之序以傳何如余曰寶劍薶於豐城而紫氣上浮於天猗蘭生於幽谷而秋馨播于九衢詩佳矣不必藉序以傳也曰此固然矣願卒一言之曰詩之古者莫三百篇若也篇首各有小序所以序作者之意而非後世通為之序也漢魏以降作者鮮自白其意讀之者不能知乃私自臆度此為某事而發此為某時而嘆使若人不死即而叩之恐其未必爾也故豫嘗有言作詩必自序非他人之可與聞此言似不可忽也曰固哉吾子之為詩也可以序可以無序序之將何傷焉余無以辭因取所評者書之於首簡云明敏於書無所不讀最善談名理與人交煦煦有恩意君子賢之其所長者不特能詩而已也貞白堂記臨川許君仲孚闢貞白堂一所與環翠亭相映接蓋為讀書地也間耒徴豫記余聞仲孚清修而嗜學堂下種梅花數樹當霜雪嚴沍之際衆芳搖落而是花獨翹然散而為春研氷玉其葩一塵不緇仲孚嘆曰其所謂貞白者非子也耶乃約二三勝友日吟哦其下超然神逰如升天際恍不知貞白之在巳耶抑果梅之有貞白耶客有歌之者曰遊氣冉冉兮將汙人曠獨處兮誰與鄰姑射仙人兮玉為神驂靑鸞兮服素裙望之不見兮隔河津青鳥不徠兮會無因仲孚從而𢋫之曰天風翛翛兮生翠寒白月流光照松壇美人徠兮佩珊珊殷勤遺我青琅玗我將搗之奉晨餐歌巳二人相視而笑豫家芙蓉山之陽懸崖萬丈蒼官青士日駢立乎其間方滴露研朱入朝真洞點易聞仲孚之事不覺矍然而嘆曰我等其有激而然耶雖然物我之立皆成於相形而泯於相忘非貞則無有偏也非汙則無有白也豫嘗觀心皎如明鏡中懸萬象自見求其貞白且不可得况假物之云哉况乎天地中萬彚藝藝自形自色杳不知其故雖造物者隨氣運行色色形形亦若不知其故是果孰為之樞紐乎問諸兩間兩間不言叩之百物百物不言質諸神扃則曰是在我矣斯貞白之義巳仲孚曰子玄言也不知者謂涉於虛無恍惚殆非也請記諸壁何如於是乎書李太白像贊元行臺治書侍御史亦憐真班所藏李太白像係祕閣傳本吾友危君太朴嘗為之贊自後流落於金陵駱氏酒家洪武己酉秋郡士王宗溥購獲之尋以摹本見貺因造贊曰長庚降精下為列仙陵厲日月呼吸風煙錦衣玉顔揮毫帝前氣吞閹豎視若烏鳶頻挫萬象隨機回旋金童耒迎絳節翠􅎶下土穢濁孰堪後先辴然一笑騎鯨上天元贈武略將軍同知臨洮府事武騎尉追封榮陽縣男朱府君墓志銘府君諱壵字子厚姓朱氏其先出于唐同鳳閣鸞臺平章事敬則之裔敬則居亳之永城世以孝義𬒳旌顯一門六闕相望而子孫尤貴富邦人慕艷有金頭公銀頭公之號兩族敘昭穆而葬占地百餘畝亦目曰宰相林則當時簮笏蟬聮朱紫赫赩可知矣世逺譜廢子孫分適他州莫能究其詳府君銀頭公之後也五世祖某宋建炎𥘉扈蹕南渡寓於霍丘仍以資雄于時曾祖某通判淮安州祖某提點夀春府稅課司遂居夀春之下蔡父某咸淳末嘗舉進士未及官而宋亡入元以儒入仕授為無州學正母胡氏府君幼不好弄嶷然如老成人及長孳孳嗜學求名講師而事之知解既至不欲墮於一曲凡天官地理卜筮醫藥之屬咸究其玄旨晚而學易隂陽消長之理吉凶存亡之故觀象玩辭使心與理相涵無少爽者終日默坐視流俗紛紜絶不與兢人以為迂則笑曰主靜乃吾學也鄉鄰有鬪者諭以訟終凶之義釋然而去若不能凶喪及無食與衣者竭其力周之自奉甚儉一豆一簟猶不盡食事繼母張氏如親母唯恐有毫髮違其意令聲流聞莫不髙府君之行郡國將辟起之不聽部使者行縣又以茂材舉河南行中書遂署安豐路儒學正府君曰與其身有虛名孰若心無慚德辭不赴鄉子弟擔簦從之遊日談道德仁義刮摩其故習亹亹數千言弗倦暇則鼓琴咏詩以自娛或時出佳山水間嘯歌忘返夀始五十以延祐戊午秋九月某日終于家以某年月日葬于縣西孤山祖瑩之左娶劉氏子男三人曰某曰某曰復女一人適某元季府君以復貴贈同知臨洮府事階武略將軍勳武騎尉爵滎陽縣男劉氏贈滎陽縣君入我國朝河南山東相繼降復例遷京師有薦其文學於上者得召見擢國子助教侍經親王升燕府參軍轉長史豫時沗職禁林兼青宫贊善日與𣸪遊復凝重醇慤有儒者氣相豫甚重之會子蒙恩歸田復持燕相府録事楊哲之狀求銘府君墓哲序事精贍且燁然有竒氣於是粗加櫽括而繫之以銘銘曰水若有源長流弗虧豈無潢汙朝滿夕除猗歟府君逺有世序邦人豔之綿延簮組嗜書不厭幾欲成癖晚而潛心我學吾易觀易玩辭孰出範圍參諸天人或驗事為發聞于時郡國交辟有儒一宫可涖其職縻身下列揖拜上官豈若肥遁白雲青山令子既顯褒贈攸冝九泉冥冥燁其有輝况今遭逢六合重熙龍光下𬒳行當見之孤山鬱蒼中有玄堂太史勒銘永固其藏題蛺蝶圖後右蝶戲長春圖乃院人馬逺子名麟者所畫美人朴頭蝶筆勢圎徑意非李伯時不能到二畫皆絶品也舊時曾落宫掖故其間有上兄永陽郡王及楊妹子之字妹子縱能工書作畫未必能及此題者專指祐陵以為言則恐不然也題文天祥手帖豫嘗見文山公與黃伯正手帖云贑州大姓起義旅相從者如歐陽冠侯等凡二十三家史多不載其名今莫可考矣寧都陳蒲塘父子亦二十三家之一乃因從子景茂請銘于公答書僅存而其氏名因籍以弗泯不亦幸哉觀公興言宿昔為之哽涕之言則其有感於蒲塘者深矣題大慧禪師遺墨後右大慧和上泉公為僧淸立所作疏凡一百九十四言乃公七十一歲時書其凌厲橫逸之氣老而不衰於此猶事見其髣佛人知仰公者唯知説法如雨如雲覺悟群迷而不知其忠義耿耿注意於家國者甚篤縱有知其忠義者而又不知其戲遊翰墨循蹈矩彠亦自可傳不朽嗚呼若公之應物無方事謂如神龍變化不測者矣疏文不局於駢儷之體而特學趙州公案為言無非欲大法以昭示人人後來沈溺葩藻而於道無輔者其尚以公為鑒哉淸立字無欲公嘗稱其堅厲入道蓋亦佳士云乕林處士贊虎林處士王君年踰七十而視聽如少壯時其孫監察御史驥從豫受經者久間來請贊贊曰素髮埀埀中心熙熙儉勤作肥家之本嚴厲為馭衆之基好施之仁久而彌篤嫉惡之氣老而不衰吹鳯簫於明月之夜飛羽觴於百花之時大布寬衣容與委蛇不知者謬稱虎林處士知之者以為瓊臺之神仙乎而元故從仕郎興化路總管府經歷李公墓志銘有序公諱約字審𥘉姓李氏唐江西觀察使憲七十世孫而憲則西平忠武王之弟七子也憲為袁州刺史遂家屬縣之宜春五世孫服遷分宜之白芒里七世至時舉宋忠訓郎復遷吉之廬陵縣忠訓生舟迪功郎龍南縣尉龍南生允元允元生去邪去邪生則武則武生誼元𥘉廬陵鳳山書院主領即公之父也公有大志應進士舉不利即棄去飄然遊燕都逹官貴人見其儀觀秀偉舉為茂材異等署縉山縣學教諭未機改龍泉轉太和州學正永州路太平寨巡檢江州路學教授廣東宣慰司辟為令史以年勞上銓曹除贑州路總管府知事攝司獄之職廬陵毆陽某商番禺道出于贑必假館楊氏楊逋其泉久弗償毆陽與絶交楊銜之毆陽自番禺還贑值灘險覆舟楊誣其詐不輸稅于官官下毆陽于獄公廉知其實白出之楊服罪張甲有妹歸李乙為姻家兄弟甲與周丙共牛而耕丙僦乙屋以居巳而甲因他事持刃自刎死乙與丙不相能陳丙殺牛而甲不從遂見害丙不禁搒掠自誣服公徴其牛牛存遂釋丙非辜乙抵罪冨氓賴氏兄弟兄無嗣弟産二兒曰邦獻曰邦毅弟以疾卒瀕卒請於兄曰願以邦獻為兄後邦毅弱未有知幸司其業劵俟長還之越數年兄亦卒邦獻欲軋沒之邦獻所繼母心為不平悉取授邦毅邦獻訟弟與母媵人私遂盜劵去吏持為竒貨久不解公召其兄弟于庭泣謂之曰官政成即代去兄弟埀白相與居與其殫財而健訟曷若分財以全骨肉乎兄弟皆叩頭請自新且致二鹿加厚弊為公夀公却之兄弟請益切乃受其一轉興化路總管府經歷階從仕郎其為政如贑州民冤得直者多請浮屠誦佛書徼福于公公不顧也屬縣仙遊令馬某虐用其民民不堪陳一壼謀變焚其官署馬趨匿山澤中大府檄公捕一壼仙遊民聞公至皆執刃歡呼共縛一壼置檻車縣境帖帖部使者謂非公攝縣事不足寧民強起公赴之民復歡曰父母耒矣公至未久馬遽出視事公辭歸老父百十人列訴部使者願留公使者曰李公義士爾能固請必不忍棄汝翌日老父剪綵為旗幟銜使者命往迎公不得已從之爇香遙拜者前後數千里馬慚其庭中人以語侵公公正色曰仙遊本良民汝既激之反乃嫉人撫摩之邪明當訟汝矣馬俯首不敢言會亢旱公徒步兩舍禜雨於龍湫或曰山髙氣寒非挾纊弗可公不從既而大雨公遘疾趣具湯浴浴正衣冠而坐呼其次子屬曰今日午時吾將終還家可語同氣宜以忠厚存心也言未畢公所乘馬淚下如注公遂逝日簿暮民髣佛見公乘白馬揚靑旗疾行道上騶從甚都冉冉入城隍祠中咸異之馬幸公死夜使人投石公家為妖怪民忿之列挺為備馬乃止一日馬同其黨五人禱城隍神五人者拜起見公據神座其色毅然驚怖而出未幾皆暴卒馬亦為盜所殺云公夀六十三至正癸巳五月十五日卒丁酉三月充奉柩歸鄉里某年月日葬于東向山之原娶郭氏男三人長徴次即充次永女二人適冝春彭琪吉水楊致道孫男四人誠諒謙讓諒即來速銘者孫女五人皆未行豫聞天地正氣人藉之以生者存則為良臣殁則為明神此無他浩然不屈運行於冥冥之中誠能福善而禍淫也鄉先達喻公良倚為台之臨海丞有仁政其卒也人兢夢為其社神列旌旗鳴鉦鼓而去自時厥後屢著靈嚮其事與公頗類人心天理焉可誣也法當銘銘曰浩然之氣塞乎玄黃君子養之至大至剛生為良臣死為明神有光燉燉亘古弗泯猗歟李公為政孔仁滌滯洗冤以子遇民􅊇雛無知公往捕之民兢而趨縛致檻車孰焉夢夢激成禍凶不以為勳覆忌於公民之戴公不翅慈父翩然遐征我民心苦白馬靑旗騶從師師入于神祠十目所窺嫉惡剛腸死亦不渝廟食有嚴生氣凛如銘以昭之偉哉丈夫重興太平萬夀禪寺碑銘洪武七年七月二十四日皇帝御武樓下中書右丞相胡公惟庸率百官晚朝上若曰太平府萬夀禪寺宜復還浮屠氏彼道家者流當自造玄妙觀居之先是有詔江東諸州縣各留寺觀一區以聚道釋之衆余皆罷斥寺適在所斥之數玄妙觀道士以觀基卑陋而寺之室宇尚虛擅假之以為棲止之地越十年皇上知之故特有是詔於是緇流咸集手持香華望闕遙拜以謝寵恩既退復相與言曰寺即吳之化城當吳之時佛法雖至中國而大江以南則無有也赤烏中康居沙門僧會實來祈獲釋迦文佛真身舍利始創三寺其二即金陵之保寧海鹽之金粟其一即今寺也在郡治西北若干步及宋武帝築凌歊臺於黃山嘗幸寺中立為二十八子院度僧一千人寺益增重由唐以來尤多名僧其淸升者築舍利塔大戒壇淸風亭李太白同季父陽氷耒遊為賦詩亭中有升公湖上秀燦然有辨才之句縣令李玄則新造銅鍾白又為作銘一時高風雅韻固已照映古今矣宋景德間敕改化城為萬夀而安撫使張安國書其門額自時厥後明悟大師萬新來為住持當世名士如楊次公郭功父皆與萬新遊其倡酬之詩至今人能誦之元祐𥘉僧文耀進聖德頌六首朝論嘉之奏錫紫衣師號建炎三年寺燬於金兵紹興年郡守郭偉因築州城移寺於武雄營其地去郡冶之東若干步重構之功則慈濟大師藴文也繼藴文而主寺事者乾道元年則法淸併子院為二十而去其八寶祐年則妙淨修放生池鑿石架梁於其上元大德元年則善才創外三門及重閣五楹間嚴奉一大藏教天曆二年則喜聖建大雄調御之殿重紀至正四年則宗明鎛大鴻鍾而覆以岑樓惟兹蘭若自吳至今巳歷一千二百有余歲名人輩出後先經營匪一朝夕矧又遭逢有道之朝尊崇象教使既廢而復興吾儕敢不竭力上承德意寺舊以甲乙相傳子院尚存一十有八盍若合為一更為十分禪剎請髙行僧主之言已衆僧翕然同辭走白于當塗縣曰百福住山海嚴智公廣慈圎悟大師曇芳忠公得法上首也踐履無愧古人願使居之縣言之府府上之儀曹曹曹達于中書得報下如所請海岩既涖事勇於有為既葺調御殿重飾佛菩薩護法天王諸像又建圎悟堂九楹間改子院殿堂作水陸𣑽變修內外三門築周垣三百六十餘丈其用功歲月則自七年之冬以至十年之秋云海嚴以成之為不易也命道證妙期來徴豫記豫以年耄辭而天界大禪師泐公及虛白杲公力為之請乃作而言曰世降道微斯民益難治頑嚚狡狂日接踵而生非西方大聖人演為果報之説豈易懾其非心哉桞子厚所謂隂翊王度者是已歷伐帝王敬恭匪懈而聖世為尤隆蓋以此也况萬夀為一郡之首剎海岩與其徒殫志畢慮唯恐有廢墜又援荆國王文公蔣山故事合諸子院而為一亦可謂之賢矣雖然有成有壞世間相耳毗盧樓閣不離世間不即世間斯得萬劫而長存者善學佛者又當於此求之銘曰像法東流達于真丹赫兮焞焞如日行天大江之南河獨不照神師實求敷其化導精誠上通籲之益堅設利忽降有聲鏗然啓大伽藍如䁀斯峙兹惟化城表法攸寄背孫涉劉大駕幸臨翠華鸞旗焜耀叢林唐宋之間名緇輩出丕建法幢為世楷則薦紳豔之投分惟勤光華所及五色成文髙風雅韻照映今古人天所瞻如到寶所泰運方新室廬尚虛孰意鵲巢而鳩耒居皇明照燭洞見毫髮詔下九天還其故物龍象駿奔有嘆有吁自非帝力奚能致斯乃鳩乃功乃萃乃積精白一心以承休德夷者崇之䵝者飾之缺者完之仆者植之棟宇翬飛丹彠藻麗兜率天宫來移人世有鍾鍠鍠有鼓龎龎説法于堂其聲孔揚聲孔揚黑白聳聽結習皆空各正性命惟皇御曆手執金輪與佛同仁覆燾無垠太史造銘贊揚帝德鑱諸堅珉昭示無極題張尚書具慶堂卷世徒知父母之存為具慶至若人子能發聞于時以顯榮其父母父母雖殁而有不沒者存孰不為之慶幸斯亦可以謂之其慶君子職之而世人未必能知之也錫山張君惟中以碩學雄文致位大宗伯海外蠻夷無不知其姓名其弟所安又能慎守先緒敬其兄如敬父兄宦京師數耒省候之久而後去猶依依不忍别士大夫咸指曰是兄弟也良可謂不死其親矣故入其庭升其堂者榮光休氣浮蕩於後先儼若二老人龎眉鶴髮據筵笑語此無他名不死則其身如不死矣為其姻連為其僚友莫不慶愜于心豈獨其家之子若孫哉不然則父母雖存名氏不出於里閈聚散日逐於齊民縱曰不死與死相去蓋無幾雖日有三牲之養其為慶也隘矣惟中伯仲舊以具慶名堂近歲父母亡墓上之木巳拱猶旦旦念親如存若具慶時每謂人曰我父母未嘗亡也嗚呼可謂能孝也巳濂與惟中交最密不翅異姓兄弟故探其志而疏之以附送所安序後雲故巾山處士林君墓碣銘豫來南京索文者接踵而至多以衰耄力辭一日有持隴上白雲稿相示者勉強一視之彬彬乎卿雲也英英乎嚴花靘妍也冷冷乎若幽人狷士飲氷而嚼雪也豫亟問之斯何人之詩也持者跽而答曰宗之先子所賦也先子諱茂濬字顯之姓林氏世為天台望族生平酷嗜吟上自漢魏下逮唐宋諸家無不漱其芳腴挹其真醇積而後發發必竭盡其興趣雖雕胃琢腎弗顧也嘗搆一室深廣尋丈內外以堊塗之白色晃眩若積雪𥘉霽月光穿漏雖赤日如火涼氣亦翛翛然生先子澄坐其中而吟事益暢遇嘉明至焚香啜茗談古今事上下三千年玉貫珠聮絶纚纚可聽或取雅琴鼓一再行起步白雲縹眇間逺近望之以為神仙中人晚年頗嗜金丹之學取周易參同契與二三友講之嘆曰一氣孔神無為之根水火交搆載其營魂浮遊規中存之又存粗穢既澄遊神九門奈之何狷棄之邪乃調息致修耴心一物一道一之説自呼為三一子通玄之士多竒之集賢院聞其操行清絶不樂仕進因其所居巾山以巾山處士號之先子弗欲也吳元年丁未九月二十八日夜漏下三刻大兵下台城先子亟出沒于河年六十又三洪武八年乙邜某月日葬于臨海縣興國鄊慶善里龜溪之原惟先子素行敦飾親仁善鄰具有恩意而所謂白雲稿者尤為時所傳誦墓門有石不肖願圖文鐫之微顯闡幽在先生一揮翰間耳敢再拜以請嗚呼豫為文所纍幾欲燔毀筆硯若而翁者其事有可書如此又安能靳一辭耶遂序其事而繫之以銘處士曾祖某祖某父某母某氏先配杜氏生珤繼室章氏生宗即耒速銘者以學行舉于朝授南陽府同知鄧州事遷太原府通判女二杜元昭金仲德其壻云銘曰不豔于榮不徇于聲一以詩名弭其人粗發其天倪龍虎功齊寄情五絃羽衣蹁蹮望之若仙尸解于河其幻則那夀何少多邈哉紫虛有鶴耒歸千載之思聲外鍠師字説曇鍠上士以聲外為字請豫為之説夫鍠鍠之聲也聲果在外乎曰外也鍾雖在內其扣擊之也其音逺揚或一里所焉或四三焉或十焉鏗鍧震撼如雷霆發於太空果在外非內也然而人必有形而影始隨之天必行雲而雨始從之銅必成鍾而聲始應之不然則搏泥肖鍾叩之則紞然寂無遐聲削木為鍾撞之魄然縱有聲不踰於户閾矣如是謂之內可也非外也此猶涉於偏也由體以達其用內而外也從末以推其本外而內也此猶局於器也一沙之內法界具焉內乎內而非外也虛空無盡何有限封外乎外而非內也此猶未能忘乎境也我無內孰能求吾之外我無外孰能求吾之內此非內非外也非外非內則內外混融矣雖然聲無內外也心有內外也心生而內外生心滅而內外滅即大雄氏所謂知一切法即心自性者也心實即有心虛即無慎勿為內外所惑也余嘗宴坐般若埸中深入禪定有巨鐘朝夕出大音聲我未嘗聞之也此無他所聞既寂能聞亦泯能所雙絶非聞聞而聞聞自見矣於斯時也求聲之在內者尚不可得况聲外者乎上士以聲外字為蓋欲離夫聲塵而超出其間也非謂鐘之聲有內外也然有外則有內既曰聲外而未忘乎內是逃影而行日中也豫懼其泥夫迹也因辨聲之有內外者以貽之上士四明人蒲庵翁入室弟子也禪宗教典皆潛心探頥而尤精詩文叢林中咸敬祝之蒲庵寓居京師護龍河上上士凡三次來省士大夫髙其行義雲故灊峯先生府君墓志銘大江之西南昌名郡有灊峯先生其學以聖賢為宗其文以理氣為主其行以忠信為本其接人以明體適用為教其生也人尊之師之其殁也人又哀之慕之殁後二十一年而門人弟子與其孤翰林修撰善圖其不朽者甚悉乃集群行成書而以銘文屬筆於濂濂竊聞先生多著書大扺研精易禮之學而及於邵子先天橫渠正蒙諸書共若干万言先生之言曰先天之學心學也其圖皆從中起其前無古而後無今大之為天地小之為民物顯之為禮樂幽之為鬼神逺之為闔闢之𥘉終近之為瞬息之起止莫不具焉邵子以命世人豪乃探是圖著為皇極經世書性命物理之説重明於世學者往往厭其難棄而弗講豫於是有經世書説張子正蒙書實與太極圖通書西銘並傳而未有為之注釋者余於是有正蒙書説禮經殘缺巳久朱子雖定為儀禮經傳而其輯録多出於門人勉齋黃氏與信齋楊氏其中豫奪多有未㝎余於是有禮説易之為書廣大悉備伊洛大儒雖嘗論著而其義皆愈索而愈無窮豫于是有易説吾道不行於時而其見於言者不過如此而巳嗚呼觀先生之言則其心之所存者從可知矣濂雖不文敢不大書揭於墓道以為後進之觀云按狀先生諱隱老字子方姓朱氏南昌之豐城人曽祖某祖三德父應嶽母楊氏先生自幼輒劬書須臾不少怠母若兄頗以為迂靳膏油不多給秋霄月朗每挾册映讀之冬則拾枯薪及爇松明以繼欣然若忘其憂時江村姚公某泳齋洪公某洌泉趙公某皆宋之遺老淹通六藝之故而桂莊塗公應雷又逺承考亭朱子遺緒先生咸執經叩請莫不交與之且曰朱生令器也他日所成當無讓古人負笈而歸兄以先生不事生産作業力求析㸑先生不得巳悉以美田與之自取不毛者由是家䆮貧或憐之勸其俯就科目庶得祿為親養一踐埸屋不中益潛心於聖賢之祕窮索於經驗諸身心唯恐有不合者久之心與理涵瞭然如辨黑白遂倡嗚道學於荷山之陽四方學子悉從之逰先生顔貌嚴毅若不可親近設有疑問如撞巨鐘小大隨應無虛發者𥘉先生伯父曰應五曰應祥曰應焱與其父皆足以師表州里龎眉白髮大布寬衣金舂玉撞塤鳴箎協使人望之而啙窳之意消至是先生又能纘承之不墜士論多之至正壬辰春三月江淮兵動鄉之惡少年為變殺戮到雞犬耄倪皆竄匿先生猶操觚正冠衣而坐從容語鈔掠者曰資財任取之書籍非爾所好也及其再至四三至先生復曰吾家巳罄矣爾幸他之盜素聞其名笑而去無敢縱火者西東鄰數十家皆籍是獲完先生遭時多艱召族姻子弟戒之曰吾宗素以清白相傳寧寒餓而死不可為不義而生終無敢犯教者不幸以至正丁酉十二月八日卒家未殁語善曰吾著書多未脫稿芟繁輔闕之責盡在於汝吾以數推明年江西當大變汝當謹避以免難吾今無所若精神如常時但覺氣息漸微爾已而遂亡戊戌夏四月偽漢陳友諒陷南昌果如先生言後七年癸邜十二月𥘉一日始葬於灊峯之下娶塗李二氏男一人即善克紹其家學者也女二人歸縣人虞淵鄒誼孫二人象環逢掖象環通五經大義年十九前卒孫女一人適羅夀亦里之良族曾孫一人興祖曽孫女二人尚幼濂聞君之立必在乎逺且大者干祿以行志其澤可𬒳於當時著書以明理其功實垂於後丗孰短孰長人必有辨之者雖然人心漓矣士習陋矣翻經取題而媒仕進者有矣求髣佛如先生者尚可得耶銘以昭之亦發濂之深慨云爾銘曰古之聖哲何為作經牖人天明使反諸誠世衰道微耽厥口耳搴英托華以經為戲繽紛外馳奚輔身心寶用瓦礫棄其南金考亭奮興上繼伊洛完經翼傳日星照灼豐城之墟天産碩儒豔其流光漱其芳腴堂虛露涼膏油莫續挾册于庭借月為燭優之柔之茫然遐思饜之飫之如啖甘肥內存于心外著於目明命有赫吾敢不肅出而倡道荷山之陽有聲泱泱逹于四方執經之徒雲合川赴若飲衢尊充足而去俗易風移惇我民彛天不憗遺孰不涕洟玄堂沉沉妥厥靈爽尚卑後人胡福是享永思堂記永之為言長也所謂永思者長思而不忘也長思而不忘者為誰福清林榮得仁也得仁十歲喪父洎長以縣諸生貢上太學選入禁庭為承敕郎謙慎而齊飾聲譽出薦紳間會濂朝京師乃來請曰榮也念父不見或食焉或羮焉或寢且息焉恆懸懸有思思之不得則升髙逺望草木之敷腴山川之鬱紆萬物欣欣有自得意輒泫然流涕曰光景日新吾父獨何之乎將乘海鶴逺逰三山乎抑精神流衍於氣化中冝茫而莫之覩乎何為使我心憂而弗釋也如此者久之因以永思題諸堂楣以志無窮之悲先生願為記之濂曰不然也子之父固亡子幸有母夫人存承候顔色問衣燠寒而進退之弄雛其側以恱之依依嫪戀如羊之跪乳鳥之反哺其樂將無涯視五䁀万鍾若不能過之子何乃自苦日慘然以悲父固當思也思或鬱陶成疾獨不計貽母之憂乎得仁曰堪輿之間當其青年父母俱存者何限雖閭閻小夫亦知割鮮具醪醴稱曰具慶榮始二十又七獨與毋居如之何勿思吾父生我之劬勞欲報之德所謂昊天罔極者也一乘馭則思為其執鞭一就寢則思為其扇枕一有疾則思為其嘗藥今皆不可得已觸目之間無非可感如之何勿思濂曰不然也人心若不知是得隴且望蜀濂也父母皆殁久矣其分當永思乎雖曰偏侍不獨愈於濂乎為子謀者當思盡孝以養母致思貴冨以顯父使人稱之曰某氏之子斯為永思也巳得仁曰非此之謂也盡孝養母榮豈不知之奚俟先生之言若曰致思於冨貴冨纍於千金貴為三事大夫縱可以慰母心而吾父不知享焉終有不愜吾情者事不得其全故也如之何勿思濂曰子之言美矣善矣而又有一説願為子陳之夫為孝子者不當為無益之思而思不死其親可也其謂不死者何子於事君之際則必自思曰此當罄厥忠不可溺于邪侫恐辱吾父也能思是子之父雖死其不死矣乎涖官之時則必自思曰此當廉且勤不可習於貪怠恐辱吾父也能思是子之父雖死其不死矣乎鞫獄之頃則必自思曰此當欽且恤不可務於苛刻恐辱吾父也能思是子之父雖死其不死矣乎交友之中則必自思曰此當主於信不可待以浮偽恐辱吾父也能思是子之父雖死其不死矣乎出言之間則必自思曰此當合於正不可流於詖遁恐辱吾父也能思是子之父雖死其不死矣乎觸類而長之如此可思者甚衆雖更㒒不能盡也子能力行之方可盡永思之道也於子何如榮復泫然流涕曰斯言也榮未之前聞也敢不夙夜祗奉濂既退嘉得仁之能孝也因次第問答之語記諸堂壁云宋學士文集卷第四十八芝園集卷第八
