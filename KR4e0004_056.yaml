body:
  text: 危孝子傳臨海孝子危貞昉字孟陽事親以孝聞其父孝先洪武辛亥進士擢官麟遊丞再遷陵川坐法謫役江浦縣貞昉時為郡諸生聞之奔訴于郡守欲走代之守以其名隸學籍難其行貞昉號泣于庭曰人孰無父哉奈何獨沮于我也左右為之言獲如其請即日上道詣京師伏闕上疏曰臣父陵川丞孝先不幸絓吏議輸作大江之濵筋力向衰不䏻執事而大毋范氏春秋復踰九十旦旦念之恐染霜露之疾無以遂其菽水之忱終天之憾或及其身臣犬馬之齒方殷碩代父作勞使其歸養雖即死無恨聖天子以孝治天下惟哀矜焉疏奏上惻然從之貞昉乃解儒衣易短製欣然就役施施無難色然質體尫弱不勝負任之苦越七月病卒貞昉通周易兼䏻學唐人歌詩性剛直讀古忠孝事斂袵久之且曰使貞昉生其時亦當若是爾遇交友患難蹈湯火赴援不為利害惑卒時年二十八聞者皆悲之為說者曰父子體殊而氣同者也故古之孝子不以身自私非過激也宜也有如貞昉者詣闕上疏欲代父受役毅然以死自誓唯知有父而不知有身其殆近于古之孝子者非邪嗚呼死生于人大矣貞昉之死于孝是有益于天衷民􅉓之重無愧于俯仰無慊于神明奚翅足矣他尚何說哉彼悖德犯上者亦曷嘗不死其死也如敗豚腐鼠人孰稱道之觀吾貞昉則若威鳳之翔千仭可望而不可即得與失又為何如哉貞昉之名宜登國史以風厲四方豫舊史官也特為立傳使秉直筆者他日有采焉靈隱大師復公文集叙才體也文其用也天下萬物有體斯有用也若稽厥𥘉玄化流形品物昭著或洪或纎或崇或卑莫不因才之所受而自文焉非可勉強而致也姑就植者言之黃者白者青者紅者黑而澤者紫豔而腴者翠白而緗緣者五色交糅變幻而不恆者一囿于氣而弗可移也至于洛陽有花則絶類絶倫其植物中之至文者歟尺以動者言之雙角而火鬛者兩羽而飛者炳朗而斕斑者介而紫暈者鱗而含金者衆彩錯布焜煌而難名者亦局乎氣而不能更也至于岐陽有鳯則超群拔萃其動物中之至文者歟非惟物也而人亦然有一人之人有十人之人有百人之人有千萬人之人有億兆人之人其賦受有不齊故其著見亦不一而足所謂億兆人之人聖人是也千萬人之人賢人是也百十人之人衆人是也衆人之文不足論賢人之文則措之一鄉而凖措之一國而凖措之四海而凖聖人之文則斡天地之心宰陽隂之權掇五行之精無巨弗涵無微弗攝雷霆有時而藏而其文弗息也風雲有時而收而其文弗停也日月有時而蝕而其文弗晦也山崖有時而崩而其文弗變也其博大偉碩有如此者而其運量則不越乎倫品之間蓋其所禀者盛故發之必弘所豫者周故該之必備嗚呼此豈非體大而用宏者歟或曰上帝降衷不以知愚而有偏若子之言不幾局囿乎氣而不遷者乎曰非是之謂也其性同其才或不同雖以七十子之從聖人其學各得其才之所近况下此萬萬者乎由是而觀因才所受而自文者人與動靜之物槩可見矣濂之學文五十餘年群書無不觀萬理無不窮碩師巨儒無不親自意可以造作者之域譬諸登山攀躋峻絶不為不力而崇顛咫尺不能到也此無他受才之有限也世固有巵匜者焉有甕盎者焉有沼池者焉有溪澗者焉有湖江者焉有𬈑渤者焉水充其量則止小固不能為大大亦不䏻為小也濂昔官禁林四方以文來見者甚衆晚閲見心復公之作穠麗而演迤整暇而森嚴劍出襓而珠走盤也發為聲歌其清朗橫逸絶無流俗塵土之思置諸古人篇章中幾不可辨遐邇求者日接踵于門既得之不翅木難珊瑚之為貴公卿大夫交譽其賢名聞九天皇上詔侍臣取而覽之特褒美弗置濂因謂當今方𫀆之士與逢掖之流鮮有過之者焉今來朝京師其徒曇鍠編類成書釐為十卷來徴濂為之序嗚呼文者造化之英華古今之綸貫斷不可闕也有若公者拔于十百之中超然騫舉而慕賢者之閫奧其可傳逺無疑濂烏得不倡體用之說以諗同志哉有訕濂陷于一偏而不可為訓者非知言者也不加功于文者也是膠柱調瑟而弗知變通者也重刻金剛般若尊經序贊三界大師所說般若蓋非一種而金剛般若尤為明心之要金剛般若多至五千餘言而阿耨多羅三􅸲三菩提九言又為一經之要九言之中而菩提二字復盡攝其義蓋菩提者覺也佛則䏻覺衆生則迷也此經拳拳勸誘欲衆生去迷而就覺爾比丘弘暢孳孳向道其心堅如鐡石近獲吳興趙魏公孟俯所書是經刻本以閩中未之見也特歸重刻之乃來求贊以廣流通贊曰金剛大碩海普覺于一切衆生正昏迷夜行大澤中冥冥無所覩了不辨南北坑穽在左右蛇虺復橫縱軀命不自保喪壞在俄頃忽遇紅日輪赫然出東方萬象都照了細可分毫毛四維及上下無往不洞逹是經之化導功德亦如是比丘最善巧嗜道如嗜利鍥刻行閩粵見者起信心經如大火聚威欿照天赤衆生妄想心見之作灰燼經如四大海中具萬舟楫衆生沉溺者濟之升彼岸經如香積厨珍膳咸充足衆生饑虛者聞香悉飽滿推類而言之更㒒莫䏻盡佛法難度量贊歎輒成妄返觀自性中各有金剛王與佛本一同慎無輕棄者唐鑄旃檀神王銅像銘狻猊作冠𬒳于背副以黃金神武鎧匡衛正法億萬載故寧海郭君妻黃氏墓銘天地之間為人倫之綱者有三曰君也父也夫也君統臣父統子為綱固宜妻與夫齊亦以繫之者何蓋夫者婦之天婦能尊夫夫䏻統妻則倫紀修明而家政嚴飾不然則反目之禍作而斁諸之事起矣其有生䏻敬夫如賔殁而服喪若父者孰不謂之賢㦲豫于寧海黃夫人之事不䏻無所感也夫人諱珍生有淑質父某與其母王氏絶愛之年十八歸同里郭君仁壽夫人尊之甚異動靜必遵禀而行毫末不敢欺內外諸政率皆親涖雖甚勞勩弗憚君好賔客朝夕酣觴淋漓談辨以為適家單不䏻備物夫人極意營集不使知窘澀之狀君一日入台城殁于旅邸夫人聞之慟絶者數四及靈車至庭撫棺號遂暈眩仆地幾欲無生以湯藥灌之移刻乃蘇治喪一循古禮布苫柩側取石為杭不解衣而臥者三月石有稜當枕處肌肉成創創液浸淫其子泣爭欲以木易之不許二年弗御酒肉柴毁骨立與人言則曰未亡人未亡人未嘗有愈色或曰孝子之喪父其有過于夫人者乎或曰夫人之事夫固至矣其于君舅君姑殆有過無弗及焉事舅姑固孝矣其在家也善奉父母亦有過無弗及焉其後父母無子而終相夫卜宅兆瘞之哀慕至老不衰若夫人者豈古之所謂無愧人道者非邪嗚呼位極三旌有不足榮也祿盈萬鍾有不足貴也名傳四裔有不足多也此權勢者可僥幸而致也惟夫制行可以厚人倫可以移風俗古今人莫不多之貴之榮之亘天地始終而不可泯也其不可泯者非有增三綱九法之重者乎夫人之事烏可使之不傳乎夫人夀五十六卒于洪武己未正月二十三日以其年某月日葬于某山生子四彌逺濬俊女一適傅士常孫三女二豫在京師濬為太學生嘗從豫遊以文學知名于時濬來請銘銘曰振其綱萬目乃張卑尊而有常庶各循乎降衷叶苟反于斯維家之殃懿哉夫人厥德允臧可以重􅉓倫而樹世防彤筆煒煌特以昭其藏明辨正宗廣慧禪師徑山和上及公塔銘姑蘇之區山川清妍其所育人物性多敏慧學禪那者以攻辭翰辨器物為尚雖據位稱太師亦莫不皆然自宋季以迄于今提唱逹摩正傳追配先哲者唯明辨王宗廣慧禪師一人而已師諱智及字以中蘇之吳縣顧氏子父茂卿母周氏師之始生靈夢發祥及入海雲院為童子智光日顯釋書興儒典並進其師嘉之同見閩國王清獻公都中公大賞異留居外館撫之如己子使其祝髮受具足戒師聞賢首家講法界觀往聽之未及終章莞爾而笑曰一真法界圓同太虛但涉言辭即成賸法縱獲天雨寶華于我奚益哉遂走建業見廣智訴公于大龍翔集慶寺廣智以文章道德傾動一世如張文穆公起巖張潞公翥危左丞素皆與之遊以聲詩倡酬為樂師微露文彩珠潔璧光廣智及群公見之大驚交相延譽唯恐後師之同𫀆聚上人訶曰子才俊爽若此不思負荷正法甘作詩騷奴僕乎無盡燈偈所謂黃葉飄飄者不知作何見解師舌噤不能答即歸海雲胸中如礙巨石目不交睫者踰月忽見秋葉吹墜于庭豁然有省機用彰明觸目無障師雖自慶幸然不取正有道恐涉偏執于是杖䇿遊虎林升變徑山謁寂照端公自列其所證甚悉𥘉寂照嘗以法器期師聞其言喜甚因勘辨之師隨機而答隼落秋空而兔走荒原也精神參㑹不間一髮未幾命執侍左右以便咨叩俄遷主藏室師取三乘十二分教益溫繹之宗通說貫衮衮如懸江河聲光煒燁頓超諸老上至正壬午江南行宣政院舉師出世昌國之隆教海濵之民暨清淨四衆手持香華百里歡迎如見諸佛師為升座說法不翅大將樹建旗鼓申令發號聞者靡不畏服乙酉轉鄰剎普慈其激揚誘掖如隆教時戊戌江浙行省左丞相逹識帖穆爾兼領院事延師主杭之淨慈兵燹之餘艱窘危厲人所不䏻堪師運量有方軌範峻整綽有承平遺風較之普慈君子恆謂過之丞相猶謂未盡尊師之道辛丑之秋復請住持徑山𥙷寂照故處師亦不辭而往風動四方考德者愈衆亡賴男子瞿範日叨盤飱主庖者厭之瞿銜而去赴部使者訴院之僚屬受賕誣師為通衷私使者攝師問狀師了無懼色癸卯省憲二府白其冤強師復還徑山緇素駿奔如戴父母至有樂極而悲泣者呈明龍興洪武癸丑詔有道浮屠十人集京師大天界寺而師實居其首以病不及召對乙卯賜還窮隆山山即海雲所在也戊午八月忽示微疾至九月四日索筆書偈而逝九日行茶毗法火𦦨化成五色有氣襲人如沉水香齒牙數珠不壞遺骨紺澤類青流離色室利羅交綴于上是日其徒大均士龍等藏于所居山之隂寶盈分瓜髮歸徑山卜于無等才公塔右瘞焉世夀六十八年為僧五十一夏度弟子若干人嗣其法者若干人師長身山立昻然如孤松在壑威令嚴肅其下無敢方命故所至百廢具興然處事逹變接引後進又如春風時雨之及物使人不自知元帝師以為賢為錫今號云師在天界時濂頗獲聞其緒論于其殁也上首弟子普慶住持道衍藉是之故自狀其行來請銘夫圎眀妙性實具三千四聖六凡悉從中現諸佛不得已而說經雷動蟄驚風行草偃者為明此性也諸祖不得已而忘經絶其枝末直探其本根者亦明此性也性在是則道在是矣奈何道喪性乖非惟學徒為然至于師表當世者一從事于末學曲藝之間以資清玩其去佛祖之道蓋亦逺矣有如師者可不表之以為東南龜鏡哉師出世時窮隆山石夜走及涖普慈神降于人述師清嚴之狀天之生師殆不偶然四㑹語有録其機緣巳備載之兹不敢勦入也銘曰華𣑽諸祖所了唯心函乾蓋坤開陽闔隂萬彚藝藝靡不苞括肯捐全軀而局一髮奕葉相仍軌轍弗殊融通小大無礙無拘猗歟禪師神觀孤聳文彩漸彰雲流山涌一旦易慮靣壁自治攝念入定如斬棼絲秋葉之零飄墮庭戺仰視青天一碧萬里我性之覺澄諸碩師機鋒交觸劔㦸差差出世海濵人天拱手發祥含徴白石夜走全提正印法鼓頻撾以眼聞者斷除空華由其見凝轉識為智珠璣落𥿄亦苐一義方嶽大臣遣使候迎陟于南屏惟德之馨名山列五首曰雙徑匪私于師南東龜鏡輕儇小夫僣不自懲皎皎白璧何憂蒼蠅風騰波掀萬辭嗟惜是非既昭重涖舊席昔師之去泉流哭聲師今之旋卉木含榮世緣已終微笑而滅設利如珠綴于紺骨末學兢奔曲藝宏施胡不反觀本賔在斯遺光所𬒳千載猶淺瞻之仰之誰敢不勉蘇州萬夀禪寺重搆佛殿碑蘇之長洲東北二里萬夀報恩光孝禪寺在焉𥘉晋義熙中有沙門曰法愔自西域至中夏與慧逺法師結社廬山已而來蘇以念佛三昧化導有情蘇人翕然歸之為建淨夀院梁時更名安國唐長夀二年又更名長夀尋毁于兵吳越錢氏有國中吳軍節度使錢文奉重作之又更名安國長吳夀禪院始易禪僧明彥主之宋大中祥符二年丁晋公為奏改為萬夀崇寧二年詔加崇寧于萬壽之上政和𥘉又更名天寧紹興七年復詔更今額為徽宗薦嚴之所元至正末天下大亂寺為兵所焚羣僧散走鞠為椔翳之埸國朝洪武癸丑蒲圻魏君觀來為郡周視廢基蹙額而言曰是剎之廢不得名浮屠不足以起之行中禪師仁公乃寂照和上世適今住虎丘德涵道融堪為人天師且兼通儒家經發為辭章嚴簡而有法內外之學雙至中興之責庶其在是乎遣使者致書幣凡三往而後應之視其寢室則床第篾如也稽其穀粟則盎無斗儲也訊其執役則童隸無有也師泊然獨居若享萬鍾之祿者曾未幾何僧之散者復還逺近清修士魚貫而來有饋食者有供三衣者有施黃白金者禪師曰可矣戒左右重搆大雄殿五楹間鑿石于山市材于江陶瓦于郊工者奏技壯者獻力鞠明究曛不督而集四阿有嚴若翬斯飛丹雘絢爛眩人心目僝工于甲寅春二月至乙卯冬十月厥事告成禪師太息曰寺之凡役殿為巨殿既成門廡堂室當易為爾吾耄矣宜選春秋强盛者繼之禪師乃退居松林蘭若勤舊合輿議延瑩中瓛公嗣其席瓛公嘗請業禪師不復固辭乃走吳江水月廢剎輦致三世如來像妥奉殿中觀者起敬瓛公晝夜孳孳將次第成禪師之志復來請文以示後之人誠可謂賢也巳嗚呼大千界中不離一念建治銷毁隨感而形昔也兹剎付之虐𦦨化樓觀而為灰燼果誰使之哉此一念也今也剪翳剔荒變瓦礫而成𣑽官又孰為之㦲亦一念也善惡之所繫其懸隔有如此者可不慎歟禪師起廢之功無讓于開基瓛公善繼之力必漸復于舊觀皆肇于一念之善者也法社緇衣之士來居于兹來遊于兹尚當擴而充之為聲聞為緣覺為菩提蕯埵雖等妙二覺亦可拾級而升無有出于此念之外者母徒委為有漏因果而忽之哉寺有唐僧貫休所畫十六羅漢像頗著靈異吳越時邵思寶等共建尊勝二石幢今猶存詩曰牽牛南斗姑胥墟義熙神僧建𣑽居相傳正受啓凡夫以法籠絡為周阹汙泥欲現金芙蕖盛衰相尋雲卷舒歲幾及千道如𥘉飛樓湧殿薄太虛鬱攸毒焰翻赤烏化為灰燼無復餘上遮叢棘下夫須白烟斜日寒隼呼虎丘尊者名浮屠見性炯若摩尼珠胸中藏書比石渠應聘而起三嘆吁食無糗糧衣無𥜗赤立何以興吾廬瀟然一榻結雙趺風聲颯颯撼州閭四方聞者魚貫趨布泉盈槖果滿車稇載有若神鬼輸成此寶搆只須臾龍礎承楹列碔砆榱題攢星塗以朱日月回薄氣扶輿攝慳破執道力驅空中樓閣齊毗盧法筵誰嗣乃其徒利如干將溫六瑚吳江有剎委平蕪尚留像變金作膚妙莊嚴像愍且都輦致中座青蓮敷直揭紅日升天衢大綱既挈萬目攄三門夾序暨堂塗勢可馴致當不孤秪今勝槩瓊然殊黑白駢首施拜膜鏜鞳始獲聞鼓魚有情弱質同巴且暮枯寧復論朝腴一念搖曵風中旟大雄慈憫猶已痛乃假塔廟作世模由外修內垢淨除事為不落有與無空空色色皆真如作銘者誰列仙儒鐫之青瑶字縈紆後千百載期不渝八支了義淨戒序贊善世禪師蕯訶拶釋理自天竺來東土敷宣正法化導諸有情衆近依契經開演八支了義淨戒分别事理二犯事犯易遮理犯難制于是推致其極使人咸知法性本空𥘉無證修斷常不立真妄雙泯佛之大戒蓋無踰于此矣禪師既巳著為儀文命其弟子智光譯為華言以廣流通而請金華宋濂為之序濂遂合爪作禮而說贊曰我聞波羅提木義二百五十為防止于中各具四威儀合為一千無剩缺過去見在及未來循環終始至三千若以三千攝衆義分配身口七支間漸成二萬一千數對治三毒諸惡業大無不統小無遺輾轉八萬四千門法門髙深固難測終不䏻違事理外事戒為緣通萬境乃于别别無因果據行凌犯即制伏是則名為别解脫理戒由其斷惑故道性虛通隨類遣不隨緣别起纒縛是則名為正解脫西天佛子最善巧開演八戒度衆生重輕利鈍盡包羅內外無為亦如是法門雖多趨則一此謂持簡以御煩有䏻𬒳此護命鎧魔軍雖强不敢侵三學殊塗戒為首由戒生定以至慧願入毗盧大道埸一念不生成正覺題禊帖唐太宗詔供奉官四人臨摹褉帖趙模諸葛貞得其筆意湯普徹得其形似而馮承素于形意二者兼有之此卷精神飛動下于右軍真跡一等其或出于承素者歟題唐摹東方朔畫像贊右唐人所摹東方朔畫像贊圭角混融而光精燁然非深知晋人筆法者不能豫在中祕獲觀禇登善鈎搨黃庭經與此正同雖𥿄墨亦不殊信可寶也題禇書千文禇遂良書見于石刻者世亦甚鮮况其真蹟乎今觀所書千文柔徑險媚真如鐡線縈結而成或者評為栁誠懸所臨禇書似則似矣其入神處恐非誠懸所至也宋學士文集卷第五十六芝園後集卷第六
