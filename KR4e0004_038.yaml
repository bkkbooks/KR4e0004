body:
  text: 恭題御書賜蘄春侯卷後洪武六年夏六月十又三日皇上幸大本堂堂乃儲君講道之所而諸親王肄業于左右當是時勛舊之子亦聽執經入侍上既至召開平忠武王之子鄭國公常茂蘄國武義公之子蘄春侯康鐸列于階下慰勉再三復敕奉御具觚翰親書二帖一賜茂一賜鐸帖皆八字其賜鐸者云謹承祖業愛爾勤功鐸稽首再拜而受乃命良工用黃綾玉軸裝潢成卷玪襲以示子孫鐸嘗受經于臣濂來請識之臣伏覩國家之遇勳舊義雖君臣情踰父子上下相孚吻合無間蘄國公值四海雄爭之𥘉多樹竒功不幸蚤世不得見今混之盛宸衷憫悼朝夕弗忘既敕近臣經紀家事復令其子習學禁中且以承祖業為朂其恩數至優渥也夫祖業未易承必勤功之人乃克能之聖謨所及正合書中業廣惟勤之義鐸冝拳拳服膺而弗失庶幾上不負君師之訓下可以保前人之功業矣鐸尚朂之哉鐸尚朂之哉帖傍書康二子者以别與茂也二子鐸與其兄鑑鑑今僉廣西護衛指揮使司事云九年秋七月二十二日翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫臣金華宋謹識題梁楷羲之觀鵝圗梁楷東平相義之後善畫人物鬼神學于賈師古宋寧宗時為畫院待詔賜以金帶不受掛于院中而去君子許有髙人之風或者但知筆勢遒徑為良畫師且又謂其師法李公麟皆誤矣贈朱啓文還鄊省親序工部奏差朱旻啓文既書滿將省親虎林山中薦紳家多發為聲詩吳府伴讀王驥與啓文有連遂以首簡請豫序浙河名區虎林甲郡文彩朗耀光衝于牛斗才猷振拔軫接于荆楊故三沈有翹雋之聲二徐為俊髦之冠多歷年所匪惟今斯粵自唐季以來海田屢化獨繁華之如故慶光景之常新富庶亞于咸陽侈麗比于京索停鸞峙鵠山川之靈氣鬱蟠綺陌香衢笙管之春聲宛灘嗟士習之易染憫風俗之頻移儻有拔萃其間實稱良彥行必傳于緗素譽遍播于卿公惟朱氏之名家愜輿清之所屬塤箎交奏四經之義髓昭明黼黻相宣一姓之文鋒犀利棣蕚既形于周雅芝蘭遽産于謝庭華穎高鶱允符二妙之選藻思遄發何慙八斗之才珠彩雖沉玉光難掩遂因文藝上貢銓曹雖王勃之少年豈朱雲之可吏厠行人于起部期試事于薇垣三載積勞行將授政一朝豫告得遂榮親服綵上堂每賦髙年之引奉觴為夀尚瞻遊子之衣春暉淡蕩以娛人秋月連娟而在戶爭誇具慶奚翅前蹤平浦西風催秦淮之急槳遙天去鴈起名勝之長吟不鄙衰孱來徴序引無山東之雅製續洛下之群賢愧陳瓦罍式聮寶卣云爾係之以詩曰松帷落秋隂月魄淡凉夕朝鼓官河棹暮宿青山驛憶昔為行人風雨尚征役王事有程期吾敢思燕息今焉返吾廬搖曳武林陌上堂獻夀觴踉蹡喜增劇衣帶來時香酒仍去年白門前青桂枝寒花破寥閴不見近三年為我動顔色子歸趣誠佳子樂復何極可憐城頭烏肯倦西風翼新刻廣韻後題右廣韻一部雕刻己完可模印然自梁沈約制為聲韻以來隋仁夀𥘉陸法言等繤次成編唐儀鳯末郭知玄復帥其屬而附益之時號切韵天寶中陳州司法孫愐以切韻為繆略復增字四萬二千三百八十三雅俗兼收務矜該博且取周禮之義又更名曰唐韻宋祥符𥘉陳彭年丘雍復重修之又易名曰廣韻至于宋祁景祐集韻之出復增二萬七千三百三十一字而廣韻微矣近代書肆喜簡而惡繁集韻罕傳而廣韻獨盛行濂等奉勑校定一遵洪武正韻分合之例布列如左注則並仍其舊舊韻凡二百又六今省為七十六云洪武九年九月壬子朔翰林學士承㫖金華宋記韻府群玉後題右韻府群玉一書元延祐間新吳二隂兄弟之所集也二隂一名時夫字徑弦一名中夫字復春博學而多聞乃因宋儒王百祿所增書林事類韻㑹錢諷史韻等書㑹稡而附益之誠有便于檢閲板行于世蓋已久矣入我聖朝近臣奉敕編洪武正韻舊韻音聲有失者改之分合不當者更之定為七十六韻今重刻是書一依新定次序而字下所繫諸事並從隂氏之舊因書其故以告來學者洪武八年夏五月既望翰林侍講學士金華宋記贈今儀藏主序豫聞佛書一須彌山攝一四天下一四天下共一日月須彌有百億則日月有百億焉如是乃至恆河沙不可算數之天下佛法未嘗不流布其間况震旦一國邪日本在東海同為震旦之國又可分疆界之內外邪此所以同慕貞乘而至人攝化者亦未嘗遺之也逹摩氏自身毒西來既至中夏復示幻化持隻履西歸後八十六年當推古女主之世逹摩復示化至其國世子豐聰過和之片岡逹摩身為餒者困卧道左世子察其異解衣衣之已而入寂遂藏焉及啓棺無所有唯賜衣存事與隻履西歸絶類所異者當時無人嗣其禪宗爾自時厥後橘妃遣慧蕚致金繒泛海來請齊安國師卒今義空比丘入東其首傳禪宗之碑信不誣矣至覺何之嗣佛海逺道元之承天童净逹摩之宗駸駸向盛原大法之蘖芽實肇見于世子之時歟嗚呼亦可謂逺也巳矣範堂儀公日本之人也俗姓藤氏修習禪觀夙夜匪懈至正壬寅秋航海自閩抵浙叄叩尊宿咨决法要洪武癸丑冬復來蔣山為侍者尋遷掌藏史叢林中以法筵龍象期之範堂以豫頗䆒內典圓頂方𫀆之士無不獲文句而去謁豫以徴贈言豫謂三藏靈文琅亟玉軸世所嚴奉者凡五千四十八卷六百億三萬一千八百八十八言其刋定因果窮䆒性相則謂之經垂範四儀嚴制三業則謂之律研真顯正核僞摧邪則謂之論三者莫不具焉範堂既司之矣司之寧有不受持讀誦之乎脫若以言演說之多無踰于此也如曰直指人心片言己為餘䞉何在于博求耶雖然萬錢陳于前非緡無以貫之萬法𣪚于事非心無以攝之假言以明心挈其綱而舉甚要亦古人之甚拳拳者也大氐人有內外佛性無內外人有東西佛性無東西一真無妄充滿太虗大周沙界細入藐微光輝洞逹皆含攝而無所遺範堂于此而證入焉一念萬年何今何古寂然不動誰佛誰生當此之時殆非世諦文字之可形容也逹摩氏之所傳其大㫖不過如是而已範堂遍叄諸方諸方尊宿以範堂精進多所印可不知曾有不自寶祕而昌言若斯者乎豫見範堂向道之切故舉百億須彌皆有佛法佛法肇興于日本者稍著見焉而末復申之以此者衛法之事嚴而利物之心急也跋黃文獻公送鄭檢討序後自古師弟子間不翅親父子然傳所謂父生之師教之其義誠一也故孔子之稱顔子則曰視吾猶父是顔子以父事孔子矣父子之道天性也父沒而手澤存焉子或見之則泣下霑襟父師一也孰謂為弟子者有不然者乎豫友太常博士鄭君仲舒黃文獻公之髙苐也公懸車家食之時仲舒以外艱服除復入經筵為檢討官瀕行公造序槀一通親加竄改持至浦陽江上與仲舒言别且致餼焉仲舒既屬繕書者入卷乃收序槀祕藏惟謹及公薨裝裭成軸每出展玩曰公吾父師也公不可見矣見公之手澤如見公焉言訖輒悵然遐思嗚呼仲舒之不忘公其盡師弟子之義者哉仲舒義門八世孫家教薰洽在家為佳子弟出仕為名師儒與仲舒遊者見其溫恭可近輒自詫春風和氣之襲人臨川太朴危公稱南冠而北仕者以德行言之當推仲舒為苐一流觀仲舒不忘其師如是餘則從可知矣太朴之言其真足徴哉豫亦灑掃公門與仲舒為同志因相與一言之混成道院記道家者流秉要執本清虗以自守卑弱以自持實有合于書之克讓易之謙謙可以修已可以治人是故老子伊尹太公辛甲鬻子管子蜎子與夫兵謀之書咸屬焉自其學一變而神仙方技之說興欲保性命之真而遊求于外蕩意平心同死生之域而無怵惕于胸中則其玄指復大異于前矣所以劉歆之著七略既書道家入于九流而復别出方技其意豈無見哉嗚呼其傳襲蓋亦久矣婺之浦陽有山拔起曰仙華相傳昔有仙嬪于此乘龍上升山形如翠蓮花猗儺妍麗當晴霞朝絢儼如蓬萊樓閣突兀五雲中疑有古仙人往來其間山南六七里則縣治在焉縣治之東曰東嶺地勢廽旋而靈冲之氣不泄當元之時于錬師某常建道院一區以棲肥遁之士錬師之弟子葛道慶今于東嶺之源復建混成道院凡殿堂門廡暨庖湢之屬具完經始于洪武三年之庚戌落成于六年之癸丑修真之士來鉛汞而錬黃庭者于于而來矣道慶請豫記之豫聞神仙家之說葆精嗇神冥合太虗翛然玄覽却立垢氛之外下上星辰呼吸隂陽超無有而獨存心頗豔之邇年以來刋落世嬰外物之為羈馽者皆釋然謝去思欲排空御氣神遊八極之表俯瞰仙華而時一下之道慶儻相見焉當趨前長揖曰子嘗記我道院矣豈真所謂列仙之儒非邪幸授我以長生祕訣必相與辴然一笑也道慶字處善為人恂恂有禮入道之志蓋堅如鐡石云天台廣濟橋記天台縣西二十里有山曰鷓鴣二水發源其間合流至長洋復折而西與大溪匯然後滔滔東逝當夏潦秋霖水驟進氣勢奔突只尺如隔胡越里人壘石為小橋不能殺水怒竟蝕而去邑大姓洪紹生憂之乃集子姓與謀纍址于淵鑿石于山犬牙相函魚鱗密比架為高梁崇以尺計者二十有五修倍之翼以石欄與橋相齊甓東西兩隄各二百尺有畸傍築庵廬三楹間招浮屠惠澄者守之始事至正己亥之三月訖功于庚子之十一月費錢一萬緡夫工一萬一百橋成隱然如虹霓跨空而收截險利涉之效下視飛濤如履袵席遂名之曰廣濟云豫聞穚之名始于殷至秦漢多異稱以其有小大之殊而濟人之功則一也世道陵夷使拔一毛以利物則頩然怒其視紹生一門見人病猶己病者幾何人哉嗚呼若紹生者亦可謂惠人也巳昔蔡襄記萬安渡石橋不過一百二十二字又葉正則作利涉橋記乃六倍之豫斟酌其繁簡而為斯記俾刻焉紹生字傳可其先有諱漢者唐末自浦江海唐來遷世多儒至紹生益力本尚義其子曰居安居易居息姪曰夢熊濟浩福翁祿翁居易即來請記者今為國子生云贈吳府伴讀陳生孟暘序君子為學能知內而不外斯善矣內則自任之重而不失天分之正茍區區務外則奔趍竭蹶何所不至哉于自官京師南北之學徒頗有來受經者既而多攝御史巡行郡國而陳孟暘亦在其列孟暘所涖光頴徐邳宿五州官書浩穰至萬餘卷孟暘逐一爬梳使枉者直暴者馴且察夫民病請免夏賦之絲頻役之軍與夫挽運芻茭之艱分給滯鹽之便如是者數條右御史大夫陳公即以上聞多有舉行者已而同列之士或擢左右參政或典大郡或僉各郡案察司事人皆曰孟暘之材若是其將自此升哉孟暘適以疾在告人為孟暘惜之孟暘則曰爵祿之來天也吾敢有徼覬之心哉且方嶽之任至重􅗀絲泉粟之殷甲胄獄訟之繁徴科營繕之勞無所不當與倘毛髮不至是負國也吾自度其才可與同列班乎不可也幸仕優而學拾級而升庶幾無曠官僨事之失也况吾母氏年近五十餘日薄西山素髮蕭蕭然垂領僑寓于婺城之間吾心懸懸如飢近已得請于上躡履而迎之以來庶幾吾心安焉不然鍾嗚鼎食以為榮結駟連茵以為侈適足以增夫愧耳子聞孟晹言知有志君子者也內而不外者也拾級而升而無躐進之望者也思孝乎親者也此贈别之言所以不可不作也書史會要序天台陶九成新著書史會要成翰墨之家競欲觀之以謄鈔之不易也共鍥諸梓而以首簡授豫序序曰史以從又持中為義蓋記事者也黃帝時始立史官而蒼頡沮誦實居其職蒼頡制字之人也自時厥後史氏遂掌官書以贊治至周宣王太史籀復造字五十五萹以教童幼所謂史者豈非字學之本源乎然則紀歷代之善書者名曰書史非僣也冝也九成本衣冠子自青年即精䆒六書之法備知字文相生之意乃辨析古文篆籀分隸行草諸家異同并載其人而附見焉先之以帝王次之以名臣又次之以材士大夫起自三皇迄于國朝凡名一善者悉具録之其事核其論確而有徴皆遍采史傳及前修所著書不復以異議叄乎其間書成釐為七卷豫嘗取而觀之不覺喟然嘆曰夏殷而上左史記言右史記事周則大史小史內史外史御史分掌其事其任至重也大則國家禮樂刑政治忽善惡固無所不當紀小則一事一物該古今而資問學者亦不可不明辨如此而名之曰史庶幾可也穠葩豔卉隨春開落何𥙷于事功陸佃集之號為花史硯雖適用不過一石何關于治教米芾編之目為硯史是則奚可哉必也如吾九成精䆒六書直探皇頡史籕之本源歷代字體變化如浮雲者皆可考見致知格物之學似不為無助茍稱書史孰謂非冝哉抑豫聞六書居六藝之一周官保氏掌飬國子則教之蓋自聖人以書契代結繩之治實取諸夬夬揚于王庭其用最大冝其天下無不學學之當無不至也豫又獨慨近世以來徇末而忘本濡毫行墨春蛇秋蚓之連翩輒揚眉以驕人曰此斯氷也此右軍大令也有識者觀之曽不滿夫一哂讀九成之書者不知能一自警否乎九成名宗儀積學能文辭嘗覽雜傳記一千餘家多士林所未見者因倣曽慥類說作說郛若干卷曽所編者則略去之君子謂其尤精博云括蒼吳氏世系碑銘有序惟吳氏出自姬姓自泰伯仲雍避其弟季歷去之勾吳周武王封其裔孫吳周章為吳子至夫差為越所滅子孫以國為氏分處北南厥後有居延陵者莫知幾世又自延陵遷湖之德清至宋大理評事景生子曰庠庠官處州始從德清來占籍焉庠生三子曰感曰乙曰榮感生二子曰安常曰安國安常絶無傳安國字鎮鄉宣和𥘉以大學上舍釋褐進士纍官太常少卿使金不辱命還知袁州夀五十六而終娶周氏生一子曰邦老歷官知吳縣復居德清乙生一子曰安上安上生七子而名聞者三曰企曰顯曰邦而生俱由舍選出身企纍知定海縣顯再轉國學正曰邦煥省試第一人邦煥之子曰友龍漕試亦苐一人其後皆為賢師儒亦絶不傳榮生二子曰安禮曰端朝絶不傳安禮生三子曰邦明曰邦本曰邦彥邦明邦彥皆絶不傳邦本一名挺字挺才因父有疾遂精于醫以淮南東路安撫使司凖備將領同司農少卿湯碩使金亦不屈節夀六十二而終娶潘氏毛氏生一子曰嗣英字華叔𥙷迪功郎能繼父學不要利如唐宋清之為內外姻寠者傾資給之殁不能葬亦仰其襄事距城二里所有山曰三巖樂其幽邃預為藏穴于中岡之麓時醉卧其中且于穴前百步築歸愚庵謂其友何宗姚曰君冝為我作墓碣幸生得見之後七年八月癸酉吾當歸窆于此耳至期果然實寶祐三年秋也夀八十五而終娶閭丘氏清簡公昕之孫生三子曰有開曰有光曰有益有開絶不傳有光字行謙能文辭任逹如其父亦精通于醫馬莊敏公來為郡極禮異之尺牘往來幾無虛日壽七十三而終其葬在華叔府君墓東一百步娶薛氏生四子曰嵩之曰泰之曰良之曰衡之嵩之泰之衡之皆絶不傳艮之字止軒性善柔言呐不出口遭宋改物而吏勢益橫競魚肉之甘受而不怨晚以子克家逸豫康寧至七十九而終其葬在華叔府君墓南五步娶趙氏生五子曰祖臯曰祖繼曰祖䁀曰祖謙曰祖成祖臯祖䁀祖成皆絶不傳祖繼一諱元亨字嘉甫通經史百氏書星曆法律亦無不研究詩若文一以理勝事親孝及殁負土成墳結室墳左寢苫枕塊其中服闕始還居室屢燬締搆者凡三必先完諸弟者諸弟有孤女二人未行竭資嫁之性耿介奬善疾惡之行皎皎自信不肻詭隨人來赴訴者得片言各悅服去君子謂其嘉惠里俗靖綏邦人有漢陳實之風私諡曰嘉靖處士云壽七十四而終其葬在止軒府君墓東五步娶趙氏生二子曰世昌曰世德世昌字伯京鄉貢進士今授處州府儒學教授世德字仲懷鄉貢進士衢之美化書院山長世昌娶丘氏生二子曰公願曰公顯公願字從善博學善屬文承事郎工部主事兼吳相府録事娶潘氏生一子曰維公顯娶趙氏生一子曰綸世德娶劉氏生四子曰公進曰公逹曰公述曰公遜公逹賜進士及苐朝列大夫知廣平府事以事免祖謙字某殁葬止軒府君之西三十步娶氏生二子曰德明曰德茂曰德盛德明德勝皆絶不傳德茂娶翁氏生一子曰道臻有益字十朋以儒術稱娶華氏生二子曰夀翁曰嶽老嶽老殁葬毛山去華叔府君之墓五里而近娶氏生二子曰祖稷曰祖華皆絶不傳壽翁字如山宋祕書省檢閲文字元署遂昌尹其葬在華叔府君墓東一百有餘步與行謙府君墓連娶王氏生一子曰祖堅殁葬歸愚庵傍娶陳氏别窆東岡生二子曰世慶曰世善世慶娶王氏生三子曰廣生曰廉生曰庭生廣生更名浩今授承事郎通判饒州府娶王氏生一子曰璿世善娶某氏生三子曰庸生曰唐生曰應生濂在禁林時公願為編修官相從授經者頗久一旦奉其父進士君之命拜而請曰吳氏自吳興徙括今十有一世矣詩書之澤相仍弗墜子孫亦與有祿食大墓在三岩者十亦皆松楸蔚然而樵采有禁豈一朝夕之故哉然宗系漸繁易致于淆亂失今弗圖無以貽示永久爰建祠堂三楹間于中岡之南以奉祀事復掇世系之可徴者件繫成書願先生詳書之使鑱諸石以列於祠中濂聞吳氏之所自出往往指為延陵季子之裔季子之逺孫分為延陵州來二氏矣非吳氏也吳氏自于越滅國之後始建氏于吳其後有出渤海者有出濮陽者有出陳留者各隨其顯望為宗雖紛紜不齊要皆夫差之後非季子也今括之吳徙于延陵恐或者謂出季子之裔故為一辨之而其系次治行夀年卒葬書中可徴者靡不備載不可徴者不敢强也嗚呼氏族之學古人甚重所以昭本支别親踈謹異同世降俗微能存心于此者幾何人哉有如公願父子誠可謂賢矣乎系之以詩曰句吳之裔實出于姬碩大且衍自本逹支浙河東疆有州維括孰其來遷爰震爰發習我爼豆恱我書詩藉寵流榮類體受衣揚名王廷聲讋敵國爾雖渝盟我持我節自時厥後世澤敷滋履義蹈仁唯德是歸癢痾疾痛使我心惻慨彼越秦罔視肥瘠邦侯牧伯識之爭先分庭抗禮如賔大賢有濟厥美孝思罔極負土懷親倀倀如失眼有青白是非攸分不尚詭隨剛腸獨存至今遺胤蒙其休祉文光燁然紆朱拖紫維彼三巖拔起㠝岏岡廽澗縈風氣鬱蟠靈和所鍾生祥下瑞蟄蟄子孫今聞長世譜系昭朗自流徂源惇孝廣敬澆俗其敦我撰碑銘樹于祠下善纘善承朂爾來者跋子昻真蹟後右蘇子瞻寄吳德仁兼簡陳季常詩一首趙魏公子昻所書公時年六十又四其從集賢學士進拜翰林學士承㫖亦僅十有四月耳公自是更不遷官又五年而公薨矣公書之傳世者真贋相半非有識未易辨蓋真者猝難入目筆意流動而神藏不露愈玩愈覺其研贋則其氣索然不待終覽而厭之矣此帖實公晚年妙筆老氣翩翩逼人黃口小兒日百臨摹雖近終不近也公自題為月江學士書月江乃昭文館大學士張克明云菊軒銘金華韓先生進之以耆年碩德為州里後進所矜式文章問學既不獲用于世乃寄情于鞠華東籬之下環植之亡慮數十本蓋以鞠有正色與先生所禀正性相符故當風露高潔之時獨致其研而非凡花豔卉之可同也濂四十餘年之老友也雖不能文為著鞠軒銘一首先生當與我刪之銘曰鞠有正色具中之德君子法之以無頗為僻鞠有落英斯鞠其馨君子餐之期不爽厥真菊兮君子兮合為一兮終無􅑯兮永為民則兮宋學士文集卷第三十八翰苑别集卷第八
