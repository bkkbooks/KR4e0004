  text: 宋學士文集卷第二十鑾坡集卷第十即翰苑後集
  hash: sha256:45f94a04e02259ab91743fdbf1b6d1ba94f54d1a2ea06ca421511a91f8c749ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_020-1a}
body:
  text: 皇明寶訓序皇帝繼天出治御大歷服七緯順度九圍敉寧爰自龍飛之𥘉以迄今茲金匱之藏歲益月增乃徇翰林詞臣之請纂修日曆以成昭代之大典粵洪武癸丑之秋八月甲午帝御東黃閣召臣詹同臣樂韶鳳臣宋濂俾選海內文學之士開局西華門內相與編摩成書而命臣同臣濂為之揔裁九月壬寅臣等既蒞事發所藏而翻閲之仰窺神機􅌖斷逺猶告辰足以明徴定保嘉惠邦家者充牣乎其間臣等因相與言曰日曆之成藏諸天府人有欲見之有不可得者盍如太宗貞觀政要之書編集以傳詢謀既同于是輯成四十類自敬天至制蠻夷釐為五卷揔四萬五千五百餘言皆從記注之真不敢以巳意輕為損益云臣等竊聞之自古開基創業之君其設心也弘其慮事也周一言一動皆可為天下後世法治忽所繫甚為不輕所以大舜有敕天之誡武王有衣鑑之銘埀示于後炳若丹青歷代寶之用為大訓蓋慎之至也肆惟皇上恭膺天命經營四方康濟兆民惟日不足故凡戒飾臣工訓誓將士出經入史亹亹弗倦必欲使其心領神㑹而後巳嗚呼日月之無私也容光其必照焉雨露之無私也百物無不潤焉皇上法天而行覆燾無際恆恐一夫不𬒳其澤故精神之所㑹訏謨之所定誠與虞夏啇周之文相為表裏非太宗所能企及此無他聖學緝熙內外一本于誠而太宗則飾之以詐術故也貞觀政要尚傳之于今則夫寶訓一書垂法于千萬世蓋無疑者非惟繼體守文之主所當朝夕誦詠以知創業之艱難而三事暨大夫誠能佩而行之亦可以盡安上治民之責矣翰林學士承㫖嘉議大夫知制誥兼修國史兼吏部尚書臣詹同翰林侍講學士嘉議大夫知制誥同修國史臣樂韶鳯翰林侍講學士中順大夫知制誥同修國史兼太子贊善大夫臣宋濂等上進大明律表特進榮祿大夫中書右丞相臣等誠惶誠懼稽首頓首謹言臣聞天生蒸民不能無欲欲動情勝詭僞日滋彊暴縱其侵陵柔懦無以自立故聖人者出因時制治設刑憲以為之防欲使惡者知懼而善者獲寧傳所謂獄者萬民之命所以禁暴止邪飬育羣生者也譬諸禾黍必刈其稂莠而後苗始茂方于白粲必去其沙礫而後食可餐苟梗化敗俗之徒不有以誅之雖堯舜不能以為治矣夫自軒轅以來代有刑官而五刑之法漸著其詳弗可復知逮魏文侯師于李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晋賈充又參漢魏律為二十篇唐長孫無忌等又取漢魏晋三家擇可行者定為十二篇大概皆以九章為宗歷代之律至于唐亦可謂集厥大成矣洪惟皇帝陛下受上天億兆君師之命登大寶位保乂臣民孳孶弗怠其訓迪羣臣諄復數千言唯恐其有犯慈愛仁厚之意每見于言外是大舜惟刑之恤之義也矜憫愚民無知陷于罪戾法司奏讞輒惻然弗自寧多所寬宥是神禹見罪而泣之心也唯貪墨之吏承踵元弊不異白粲中之沙礫禾黍中之狼莠乃不得巳假峻法以繩之是以臨御以來屢詔大臣更定新律至五六而弗倦者凡欲生斯民也今又特敕刑部尚書臣劉惟謙重㑹衆律以協厥中而近代比例之繁姦吏可資為出入者咸痛革之每一篇成輒繕書上奏揭于西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也昜曰山上有火旅君子以明慎用刑而不留獄言獄不可不謹也書曰刑期于無刑言辟以止辟而民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代之凖繩實有合易書之㫖行見好生之德洽干民心凡日月所照霜露所隊有血氣者莫不上承神化改過遷善而悉臻雍熙之治矣何其盛哉臣惟謙以洪武六年冬十一月受詔明年春二月書成篇目一凖之于唐曰名例曰衛禁曰職制曰户婚曰廄庫曰擅興曰賊盜曰鬪訟曰詐僞曰雜律曰捕亡曰斷獄采用巳頒舊律二百八十八條續律一百二十八條舊今改律三十六條因事制律三十一條掇唐律以𥙷遺百二十三條合六百有六分為三十卷其間或損或益或仍其舊務合重輕之冝云謹俯伏闕廷投進奉表以聞臣等誠煌誠懼稽首頓首謹言洪武七年月日具官臣等上表元故文林郎同知重慶路瀘州事羅君墓志銘有序嗚呼士君子立志孰不欲建功名垂竹帛哉或不能逢其時時逢矣或剛正忤物坎壈至死卒無以逹其志志弗逹矣使其名復宋寂無聞其鬼不靈則巳脫稍有知未必不鬱悒于九泉之下操觚任紀載之責者寧不為一動心邪此豫于廬陵羅君殊惻然也嗚呼君諱文莭字仲正姓羅氏羅為江西右族唐肅宗時自洪都遷廬陵之秀川入宋以來家談仁義而人恱書詩以通經上南宮對大廷者幾無虗歲朱紫相承照耀州里起綰郡章者四人而邑之令佐尤夥焉曽祖時誠祖宗權鄉貢進士父履泰字以通為元之巨儒著書滿家春秋禮記周禮三經皆為之集解復衍河洛圖書之義列圖三十多前修所未發出其餘力𥙷正戰國䇿舛誤數百條且為年表以次其先後行丞相府聞其名署東湖書院山長蓋世號通齊先生者也君始能言其父抱就書室抽一卷授之祝其疾讀君指插架牙籖曰吾齒稍長雖盡通之未慊也其父驚喜暨肄小學輒以氣雄諸生莫敢與其齒後從宦東湖賢士大夫咸折輩行為忘年交問學日進水湧而山出撫州判官燕君某辟為郡吏郡有獄疑不决守二爭以為問君歷階而升摘其案語曰如此則為直如此則為枉儕類大慙出竒計沮君㑹朝廷有詔造鹵簿器仗遣君至屬縣督其成君至樂安憩縣𪠘中羣吏更謁互諌以為鬼物所馮不宜居君笑曰惡有是乃酣飲而寢夜漏下十刻月色微明見丈夫長而青立與檐齊君奮起執之曰爾來矣爾來矣應時而滅黎明視之並𪠘有豫章穹隆而敷腴縣人祀以為神君曰其怪在爾矣歷數其罪用竹揳釘之未幾豫章枯死怪遂息郡有織錦工嘗籍于官竟遁入武昌出入辨章溫公門溫勢𦦨熏灼莫敢誰何復嗾君捕之縣知之不敢受君牒君直訴辦章辦章曰爾胡不求之府公乎君如言而往府公搖手相戒亦不復出一語君怒洊走辦章門辦章厲色斥之曰業已屬爾矣復來何邪君曰工合應官繇府若縣謂其為社鼠城狐不能詰區區小人固不知何所指明公乃方嶽大臣不助半指之力如廢王法何辨章語塞即下令捕與之衆益譁曰是尚不畏溫辦章其有我輩乎謀出之益急君懼禍及褁糧馳燕都燕都貴人亦忌君峭直髙門縣薄無可投足者遂入成均為弟子員一日方挾冊諷詠有相者謂君曰君兩顴入鬢當邊徼建功無以久淹為也君遂用國子助教姚公登孫之薦上于集賢集賢移文雲南行中書署君昆明州學正秩滿升授孟傑府君列蠻夷子弟曉之以君臣父子之懿辭氣激烈聽者聳然轉普定府知事廉行彌厲大理金齒宣慰司辟為令史豪酋侵人疆畎持黃金數鎰為君夀乞君勿右訴者君麾之去酋怒曰君賽天赤邪乃不納吾金也賽天赤鎮雲南之名相云君卒奪田歸訴者乾崖湎里當賦金使者至蠻人納賂往往過所賦之數而金又不可免君至憫其愚反覆開導之蠻人鼓舞于庭曰微使者之廉孰能恤我至是亟輸金而還俄入掾雲南行中書雲南驛騎皆官中給直官吏乾沒之以市馬責土酋君曰為天子牧元元者顧若是邪痛懲其弊朝廷以雲南在萬里外下吏部凖循舊比行銓選之法使者至選君承其事君知積弊未去且曰王者無外敢不靈承上命以正其法乎獻五䇿于使者吏受民賕者官不稱職者廩藏不㑹者月日不登者居制未終者皆不調使者大恱悉從之幸門遂塞滇池有神蛇能興雲雨㑹大旱民屢走池上若無聞者君為檄責之片雲歘然興雨因霑足南詔海中積葑成􅌎而浮遊水上夷獠耕稼之號曰葑田田如不繫舟西東無定人交相為盜君命紀字為號疏其步畝及四畔所届上于官官為給劵使者所馮復植木􅍻海岸嚴其畛域不相淆亂或海潮漂蕩有藉以為奸者俾出劵環證之竟歸其田夷獠指示子姓曰此羅掾所賜也否則人盜之久矣監察御史至每召君于庭事難定者必待君言而後决雲南王亦熟君行命升為提控掾史提控掌六房之政人多畏縮不前君益淬濿弗少怠適中朝大臣喜意以失宰相意出參省事鋭意更張庶事悉心任君君知無不言言無不聽名聲翕然動蠻夷中先是蠻夷有鐡甲郎者負固不服至是歡曰天子遣賢輔臣至矣奈何不降帥未附者皆來歸君之功為多鎮戍萬夫長伯胡行事多不法憲府繩之急伯胡擁兵以叛纍歲不能討曲靖宣慰使鬼宗亦蠻酋也助兵一萬夾攻之伯胡就縛莫府上功擢鬼宗參知政事將上省臣上下莫不與之君力爭曰雲南親王臨蒞之地辨章而下多八座大臣何得有蠻酋位邪茍録其功使以參政之名自鎮其土足矣不然國體其謂何空一府咸曰微羅掾幾失之矣鬼宗懼托君鄉人囊金以獻君怒曰腕可斷案不可署鬼宗恚而止君疾惡如仇讎聞部使者德住貪暴賦虎神詩以為風德住銜之賂西行臺御史以專權自恣劾君君走訴中臺遂擊德住去之夷人大快君以常調除承事郎同知彌勒州事政成謁選吏部遇鄉友羅玉于逆旅乃勸君曰君以剛毅取嫉于人致齟齬一世秋髮巳􅌭紛𬒳肩何不謝事以佚老乎君慨然曰子言誠是也乃上乞骸骨之請以文林郎同知重慶府瀘州事致仕年僅六十三耳居數年中原道澀乃犯鯨波之險由海道至閩中而江西兵𦦨方亟遂不可還以至正二十六年十二月壬戍終于福州之民舍君未終謂其友曰此正吾死所也夫何憾時閩猶奉元正朔云其壽八十洪武五年冬君之喪始還明年某月日始祔葬先兆龜山之原君長身而瘠胸襟磊落如青人白日喜面折人過雖王公貴人無所避故有過者常畏君知亦有幸其知以自改者民事有屈而不伸君廉得其實忿忿見乎色必以告司法吏因得白者甚衆知識尤絶人每言某地當有兵變時承平人竸指笑之其後果然始服其先見生平急患難重倫義族叔繼賢久居燕頗饒于資與妻柳皆老而無㣧嗣乃迎羣從子觀逺為後觀逺至甫七日而繼賢夫婦死其服役者羅參出而呼曰我嘗為子矣觀逺何人乃欲與吾事邪觀逺弱噤不能對君亟告公府逐叄盡囊括其資授觀逺且具舟車使扶二喪還江南不特此也凡遘疾疢貧窶及死喪無依流離不能歸者君必捐金倡義士周之𥘉不知其為何如人也君娶劉氏子男二人長大紀有文學而剛介酷肖君次次炳贈畨禺縣主簿𥘉次炳為奏差廣東宣慰府宣慰使釋迦班嘗招峒丁三千即遣征連州峒丁怒至清逺將為變衆憚弗敢往次炳請前峒丁彎弓相向次炳紿之曰宣慰命我來賞汝彎弓何為也峒丁退與清逺令斂繒帛散之乃率以往至連為寇所敗次炳𬒳擒備極慘酷竟不屈而死致有今贈女二人長適郭滋蘭先卒次復為其繼室孫男一人警曾孫男一人某君葬後二年大紀汲汲圖君于不朽以國史編修趙君塤所為狀請撰墓門之銘鳴呼豫昔揔修元史每求剛正之士在下位而不伸者載焉蓋以謂雖不能拔之于當時聊使其暴白于後世庶幾死者無憾而生者不愧惜乎有司不上君之事也于是徇大紀之請執筆而具書之百世之下必有因豫文而知君者雖然豫何人哉文之傳不傳固不可必也所可恃者世人豔君之行頗多多必則效之則效之必相與謹視之文其有不傳者乎信有人如君終至湮沒無聞則夫天理人心皎如出日者果為何說也嗚呼銘曰堪輿之間正氣烈烈在人為剛在物為鐡鐡尚可鎔剛則弗屈挺然常伸欲不可涅其一惟君之生能以志雄遵飬以時日擴以充百壬所忌吾惟正從譬彼川流萬折必東其二古惟正人妖不敢干芃芃豫章變為枯菅誰鎮大藩乃復蔽奸我往折之聞者膽寒其三夷人何知椎結卉服宣厥彛經丕變其俗爾金我辭我直爾曲凡施惠利惟日不足其四威靈既震叛民來歸鐡甲侁侁棄戈而嬉有聲洸洸有澤輝輝有知即為不識位卑其五繡衣孔揚其貪若狼我斧我斨莫不加其亢形之聲歌庶懲而蘉覆謂我狂訾我以凉其六持此而行何適不艱坎壈其躬恬夷其顔胡不爾庸以豕為冠鷹隼一出狐鼠盡跧其七賢否昜位曷以為政君亦何傷人為嗟咏禾黍離矣凉颸棘矣吉士亡矣何嗟及矣其八故文明海慧法師塔銘能仁氏之教流入中夏愈傳愈熾于是諸師各有所建立譬如一燈分為十燈燈之用雖殊而光明則一也天台四教法性觀行之宗自南嶽以來開空假中三觀丕闡三千性相百界千如之妙一念之間具足無减其說尊勝宏特縱歷百千萬劫洸洸乎皎皎乎不可尚巳某竊怪方𫀆之士幸得與聞其教多視為空言卒局于小智之域良可悲也其真見實踐有若文明海慧法師者某安得不喜談而樂道之哉法師諱善繼字絶宗族婁氏越之諸暨人考某妣王氏當有妊夢神人授白美蕖法師乃生始能言見毋舉佛號合爪隨聲和之年稍長季父客授山隂靈祕寺從治春秋經稍竊窺三藏諸書喟然嘆曰春秋固佳乃世間法欲求出世間非釋氏將疇依此身不實有如芭蕉穹官峻爵縱因書而致寧得幾何時邪大德乙巳投其寺僧思恭祝髮明年受具戒從西天竺大山恢公習天台教觀大山甚器重之每言數百人中唯繼上人爾暨大山遷雲間延慶法師復往南天竺從湛堂澄公湛堂器之如大山間問之曰入不二門屬何觀法法師曰三種觀法屬對三部此文既與止觀同成觀體的是從行湛堂又問諸經之體為迷為悟法師曰體非迷悟迷悟由人顧所詮經之㫖何如耳湛堂喜溢顔色曰法輪之轉他日將有望于斯子乎宗周文公時住集慶寺豔法師之學延主賔朋尋領其懴事湛堂復速法師還俾居苐一座南天竺素稱教海法師提唱宗乘有聲絶出于四方㑹湛堂遷上竺而玉岡潤公來𥙷其處仍留法師居其職學徒四集無不涵腴飲醇充足而後去天曆已已法師出世主良渚大雄教寺日講金光明經感法智見夢謂之曰爾所談經與吾若合符節􅌚乎所踐猶未逮其言耳法師遂益篤精進之行至正壬午浙省乎章髙公納璘兼領行宣政院移住天竺薦福教寺某甲子左丞相朵兒只公繼領院事升主天台能仁教寺法師凡三主伽藍執經輪下者多豪俊之士宏闡法華妙玄文句朝講暮解五章四釋奧義昭晣且䇿勵之曰吾祖有云止觀一部即法華三昧之筌蹄一乘十觀即法華三昧之正體須解行並馳正助兼運則圓位可登而不負吾祖命宗之意矣蓋法師抉剔經髓敷繹祖訓如山川出雲頃刻變化而雨澤滂然四施若諸草木纎洪短長無不霑丐識者咸謂慈雲神照之再世云辛卯之春俄謝事超然獨往時剃落師與湛堂歸寂巳久法師既于靈祕葺舊廬以奉祠事又往居南山明靜院灑掃湛堂之塔其報本之念尤惓惓也魯未幾何兵難荐作其高弟是乘請法師東還華徑池深木寒法師歡然就之且以無常迅速嚴修净業繫念佛名晝夜不輟一夕集衆而言曰佛祖弘化貴乎時節因緣緣與時違化焉托乎吾將歸矣遂索筆書偈端坐而逝時丁酉歲七月二十二日也世壽七十有二僧臘六十又三火化牙齒及舌根弗壞舍利纍纍然滿地其徒以某月日斂骨塔于靈祕之西坡所度弟子三十二人嗣其法者則靈夀懷古延慶自朋崇壽是乘廣福大彰雷峯淨昱演福如玘報忠嗣璡車溪仁讓香積曇胄也法師氣局衍𥙿行履淳固山家諸書無不精徹而大江東南恆推為教中之宗􅊰演妙法華金光明諸部經凡若干㑹主修法華淨土懴凡若干期所感靈異不一而足是乘嘗請著書以淑後人法師曰吾宗本離言說不得巳而有言為彰授受也是故意以至章安結集之後不過代相緘授而巳其間或有斥邪衛正者亦豈好辨哉今大經大法粲如日星之懸汝輩宜修習不暇奚俟豫言聞者咸服其一時士大夫若趙文敏公孟俯黃文獻公溍周內翰仁榮李著作孝光張錬師天雨皆結法師為方外交時相唱和于風月􅓦寥之鄉晚與黃張二公欲結樓煩淨社未果而法師殁當沒之日叢林中皆相哀慕曰吾宗法幢仆矣後十七年演福件繫法師梵行徴濂為塔上之銘濂嘗遊文獻公之門聞公談法師之德之盛以為無讓古人恨不得映白月而濯泠風今法師不可見矣幸其嘉猷茂行猶得聞其梗概此無他遺光之所照者尚有人言之後三十年則言之者鮮矣又後三十年則誰復知之者此金石之勒不可不致謹也因從衍福之請歷叙而鋪張之千載之下有來讀斯文者儼然如見法師於定慧光中其有不蹶然興起而惕然自厲者乎銘曰姓具之正宗兮一念具三千三十即一念兮不後亦不先正依及假名兮各含空假中攝歸于一妙兮互具而互融七祖既善闡兮諸佛復靈承洞照六合內兮日月行大清慧命之攸寄兮文明得其宗揔攝大化機兮正受究始終法輪左右旋兮晝夜如環循隨其利鈍根兮導入不二門開權以顯實兮懇懇為敷辭一多暨小大兮非即亦非離明暗色空相兮事法皆􅓦然真勝在妙圖兮非可以言詮談辨析玄微兮人天皆共聽幽通于至神兮現夢顯祥徴三坐大道場兮手執青楊枝灑物了無迹兮物得鬯其私結期修靈懴兮瑞異駢然臻吾法本無作兮有作即為塵啇飊一朝興兮吹仆正法幢清淨大海衆兮䀌然為增傷繼述幸有子兮龍象方駿奔建塔為西坡兮庶以表化源贈雲林道士鄧君序臨川有山曰雲林列三十六峯延亘五十餘里其降勢旁魄壓閩嶠而凌麻姑拱華相而望龍虎靈氣叄㑹非樂道者莫能居之在唐之𥘉有鄧師䢿自鄱陽來采藥山中築瑞雲觀以為錬大丹之所既沒且瘞忽從羅浮寄書還啓棺而視之唯劍履存其後裔多出羽人若仲修君亦其諸孫也仲修生有出塵之趣遂入上清宫為道士探規中天根之冗及抽添沐浴之候遵而行之用志不分忽遇異人仙巖之上出青臺靈書增益其所未能太乙真人知其然又授以清净無為之說使合諸至道仲修欣然言曰吾本粗云立矣當思有以利于物乎乃習召雷役鬼神之術晝夜存心若與明靈居歲丙申錢浦大旱土毛盡焦縣大夫遍走郡望日愈赤如火仲修杖劍登八卦壇叩齒集神飛符空𪷟中雲膚寸而起頃刻霮䨴幾不辨色迅霆一聲起壇東大雨如㵼自時厥後六七年間東浙則蘭溪西浙則嚴陵江東則貴溪或值亢陽越部風紀之賢揔戎鎮戍之將州邑長二之官無不致辭仲修仲修出而應之其致雨咸如錢浦時人竒仲修謂有弭災之功云洪武四年秋八月上召嗣天師冲虛真人至京仲修實輔行九月晦入覲賜食禁中既而辭還山五年三月復詔中書徴有道之士六人而仲修與焉未幾遂選仲修專祝祠之事留居朝天宫㑹天不雨京尹請仲修禱之仲修入室凝神而坐雷雨又隨至上恱出尚方白金以賜焉嗚呼天地之間不過隂陽二氣而巳有能知其化機而轉移之則雨暘可得而求矣昔者董仲舒以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是行之當時未嘗不得其所欲此蓋吾儒之事也奈何古學失傳章甫逢掖之徒棄而不􅊰而道家者流得以倣而行之亦可以一慨矣夫然而天地一太極也吾心亦一太極也風霆雷雨皆心中所以具苟有人焉不叄私僞用符天道則其應感之速揵于桴鼓矣由是可見一心之至靈上下無間而人特自昧之爾仲修遊方之外得諸師祕文行之之久翛翛然不為物役其能感鬼神禦災難也宜哉所以昭𬒳寵渥道光前人而令聞長世也且不忘其本以雲林自號不芒尊師繪三十六峯圖遺之豫因為叙文繫于圖後蓋圖以昭其先而序以著其行云處州福林院白雲禪師度公塔銘師諱智度號白雲因以為字處之麗水人族吳氏年十五慨然有出塵之趣欲就浮屠學其父德大與毋葉民咸鐘愛師峻辭拒斥之師不火食者纍日若將滅性者父母知志不可奪使歸禪智寺空中假公剃髮受具戒即寺側楞伽庵深習禪定每跌坐逹旦不寐如是者四三春秋巳而歎曰六合之大如此頽然滯一室可乎遂出遊七閩遍歷諸山無有契其意者復還郡之白雲山因澄禪師道場遺址築福林院以為牙數珠等法弟大賢上足仁哲奉骨以某年月日瘞于院西若干步善女人唐净德為建塔其上禪師靜謐寡言機用莫測臨衆無切督之威嚴厲之色唯以實相示人所至之處人皆傾慕如見古德或持香華供養或繪師像事之不可以數計空中無見殁師皆為建塔求名公卿撰銘表之師度弟子凡二十人平日隨機開導所作偈頌不容人録故今無傳者豫聞信心為一切功德之母苟䏻信焉奚道之不造奚法之不明自圓悟八傳至于無見究其所得所證何莫不由于此也師自幼齡即䏻信吾佛之道决可脫離死生一息不少怠所以卒䏻徹究心源而縱橫自在也世之知師者孰不曰無見有子而方山有孫者乎誠可尚也豫嘗接師護龍河上無懈容無蔓辭有問則言無則終日澄坐而巳因語二三子曰其所謂信人也哉今弟子某奉道巖之狀求豫為銘豫頗知師銘蓋不可不作也銘曰華頂之峯有道所居隨時演法大音鏗如入其門者無非獅子我福林師聞風而起當機一喝兩耳為聾法體如如情識頓空歷觸諸師見者驚愕言出霆奔無蟄不作振錫而歸我亦何心舉首睇之白雲在岑形雖遁藏文采日露學徒蒸蒸雲輸川赴解爾纏縳祛爾翳昏其心濯濯其容誾誾乘運而遊或出或處葉落歸根古今一軌塵緣既盡翛然而化叶擲筆坐脫如人赴家世相有滅其性常在若謂師亡靑山可改東雒山房序有詩東雒山房者上清羽客周君雒之隱居也雒字彥博嗜學而能文其先居伊雒之上故彥博以雒為名而又以東雒扁其居不忘乎本也蓋彥博之先南遷廣信者多歷年所矣雖然彥博學神仙之道者也他日披丹霞乘青鸞北升嵩髙之巔而俯瞰舊鄉寧不重丁令威之所感乎金華宋濂為賦遊仙之歌使書山房之素壁云歌曰飛騰太微共持瑶華玉管凌雲吹贈清源上人歸泉州覲省序大雄氏躬操法印度彼迷情翊天彜之正理與儒道而並用是故四十二章有最神之訓大報恩中有孝親之戒蓋形非親不生性非形莫寄凡見性明心之士篤報本反始之誠外此而求離道逾逺清源上人曩自蚤歲即豔空門剃落于鳳皇之峯典藏于雙檮之剎無微不探有顯皆窮繼出世于龍華俄分座于天界宜了苦空之相庶盡有漏之因蓼莪忽咏陟屺成思贍巖雲之易孤歎春暉之莫報癡鈍翁之寄像終亦何心陳尊宿之編蒲願終其志于是儒門席上之珍法苑同𫀆之彥察其誠慤各繫聲歌且徴題于首簡用攄發其中情昔者栁州刺史投分濬師及覲省于淮南法鄭商之先犒屬為文采烜著叢林顧豫末學焉敢效顰然而見善不揚非君子之操澆俗弗勵豈逹賢之為有若上人歷抵大方期于深詣其𣣔明心見性者歟雖嘗絶學不廢明倫其知反始報本者歟契經最神之訓如來孝親之戒其䏻服行而弗悖者歟魯典竺墳本一塗轍或者𡵨而二之失則甚矣自慚蹇􅿟馳逐章逢知本迹之不殊思內外之兩盡嘉斯篤行吻合道謨聿增名教之重不昧原本之義表而出之以為世觀焉爾閲江樓記金陵為帝王之州自六朝迄于南唐類皆偏據一方無以應山川之王氣逮我皇帝㝎鼎于兹始足以當之由是聲教所暨罔間朔南存神穆清與道同體雖一豫一遊亦思為天下後世法京城之西北有獅子山自盧龍蜿蜒而來長江如虹實蟠繞其下上以其地雄勝詔建樓于巔與民同遊觀之樂遂錫嘉名為閲江云登覽之頃萬象森列千載之祕一旦軒露豈非天造地設以俟大一統之君而開千萬世之偉觀者歟當風日清美法駕幸臨升其崇椒憑欄遙矚必悠然而動遐思見江漢之朝宗諸侯之述職城池之髙深關厄之嚴固必曰此朕沐風􅌨雨戰勝攻取之所致也中夏之廣益思有以保之見波濤之浩蕩風帆之下上蕃舶接跡而來庭蠻琛聮肩而入貢必曰此朕德綏威服覃及外內之所及也四夷之逺益思所以柔之見兩岸之間四郊之上耕人有炙膚皸足之煩農女有將桑行饁之勤必曰此朕拔諸水火而登于袵席者也萬方之民益思有以安之觸類而推不一而足臣知斯樓之建皇上所以發舒精神因物興感無不寓其致治之思奚止閲夫長江而巳哉彼臨春結綺非弗華矣齊雲落星非不髙矣不過樂管絃之淫響藏燕趙之豔姫一旋踵間而感慨係之臣不知其為何說也雖然長江發源岷山委蛇七千餘里而始入海白湧碧翻六朝之時往往倚之為天塹今則南北一家視為安流無所事乎戰爭矣然則果誰之力歟逢掖之士有登斯樓而閲斯江者當思帝德如天蕩蕩難名與神禹疏鑿之功同一罔極忠君報上之心其有不油然而興者耶臣不敏奉㫖撰記故上推宵旰圖治之切者勒諸貞岷他若留連光景之辭皆略而不陳懼䙝也劉真人傳劉真人思敬吉之青原人少落魄不羈嗜酒好長年術及長遊蜀中從靈寶陳君受丹砂訣行混元之法遍歷海內諸名山年垂五十始入龍虎山為道士自號為真空子尋出主育和道院遂依訣鍊鉛乘為丹砂得服之者疾良愈至元十八年世祖遣御史中丞崔彧至江南搜訪異人遂以真人應詔召對延閣語頗稱㫖上恆苦足疾真人進六甲飛雄丹上吞之瘳復召問曰卿夀幾何對曰踰七十矣曰卿顔何童邪對曰亡思亡慮勿撓其氣唯一唯純以守吾真油油與大化俱有不知春秋之髙矣上恱賜葡萄酒飲之後每賜飲輒醉醉輒仆地而臥上亦不之責由是出入殿廷無禁上與群臣言以真神仙稱之時有賜豫辭不受居八年乞還山中上憐其老許之賜以銅簡鐵笛及百衲𫀆之屬且曰此旌卿之素志也陛辭上方以金甌飲馬湩亟輟以賜之暨還結八卦庵于琵琶峯后神情超朗當月白夜夝時出坐磐石上持鐵笛吹之依稀作鸞鳯鳴間鑿浴丹池疏水一派入池冷然也二十八年八月日正中呼陳錬師與之劇飲飲已曰我明日將死故今與子醉别爾明日叩門無應者力排而入真人巳側臥而逝矣夀蓋八十又一所傳丹經十二方授弟子章希平等迄今行之至正間玄教宗師董公上其事制贈凝妙靈應真人云史官曰周禮訓方氏誦四方之傳道所謂傳道世世傳說往古之事也史傳之得名殆法于此豈細故之云哉夫事不可傳而傳之者非也可傳而不傳者亦非也要在精察之而巳矣真人之殁李君存為序其書方君從義又屬豫作傳二君精察皆勝于余必確然有徵因為著諸簡牘以俟他日修元史者同虗山房記臨川傅鍊師若霖謁豫于鑾坡揖而言曰玄黃之間所貴者虛廓落無象空洞無偶火不䏻爇水不䏻濡玄精攸宅仙靈所都參之于身吻合無殊南乾北坤西坎東離其中軒然如懸黍珠一氣闔闢萬化發舒非跡所繫無形可拘真人遊行精光燁如而虛之為義亦大矣哉赱自得斯祕凝神于靜室間三田流鬯而百靈為之翕集既而受洞玄之文傳太乙之書驅雲役雷以蘇旱暵布氣分神以禜除人災靈響頗著是皆虛之功用使然其或窒塞弗通則粗濁蕪穢亂之何以接溟涬而極髙明乎近者乙已之秋建山房東山故居遂以同虛扁之昭其義也先生以為何如玄真子辴然笑曰幾則幾矣然猶不至也二而未能一也離而未能合也有迹而未能無間也夫同者異之對也同虛者謂其虛相似而不異也而非純虛者也純靈則合合則一一則無間無間則凝于道矣若霖曰夫所謂凝于道者何居曰至道無形契真于天後觀無後前觀無前不欲泊之聽其自全不欲張之懼其或愆貫乎窈冥凝乎太玄出其遺餘亦可延年瑶池之曲具茨之顛餘奬茹芝飄如蛻蟬其視驅役禜除之法其尚何言哉然而事有大小道無精粗皆吾一神之所管攝欲升則升欲況則沈皆隨其力之所加與其時之所届及其成功則亦一而已矣若霖恬淡而好讀書皎皎霞外誠韵勝之士也屢隨嗣天師朝京師天師還龍虎山中若霖獨留侍祠于竹宫則其超詣者可知矣豫故創為新說以記其山房至若莊周之論玄德有謂同乃虛虛乃大者不敢蹈襲而陳之也或曰同虛之義非是之謂也蓋大同而玄虛云宋學士文集卷第二十鑾坡集卷十
