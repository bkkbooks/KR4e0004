  text: 宋學士文集卷第一鑾坡集卷第一即翰苑前集
  hash: sha256:cf03d61239c71868a9a2e1adddf2e4f8cf423b258763e1b0d668a9f54230b735
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_001-1a}
body:
  text: 平江漢頌天命皇帝為億兆生民主旌麾所向悉臣悉庭𥘉以一旅之師興濠泗間遂撫淮南平江東攻浙東西下之版圖所入方數千里㝎都江左發政施仁戴白之叟垂髫之童涵泳至化皡皥熙熙如承平時于時陳友諒據有江漢之地僣居大號賊殺其主飭修蒙衝虐驅蒸黎如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不解皇赫斯怒乃召群臣于庭而告之曰陳虜不道敢屢豫侮昔者蕩搖我邊方侵軼我姑熟偵伺我金陵賴尓一二鄰臣之力攻而敗之豫亦親覆其穴巢中宵竄赱假息武昌子不忍追殱之兾其悔禍以自逭于天刑癸卯之夏乃復圍我豫章是其凶德無厭自取殄滅此天亡之時天之明威豫不敢不順唯爾熊羆之臣不二心之士尚弼豫以成厥功群臣曰都于是右丞臣達參知政事臣遇春帳前親兵都指揮使臣國勝同知樞密院事臣永忠同知樞密院事臣通海備厥戎器簡厥師徒以俟七月癸酉上躬擐甲胄禡纛龍江帥樓船數百蔽江而上陳虜大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子上分舟師為十二屯命達遇春永忠突入虜陳呼聲動天地矢鋒雨集炮聲雷鍧波濤起立飛火照耀百里之內水色盡赤焚溺死者動一二萬流尸如蟻滿望無際已丑焚僞平章舟刈戮餘二千辛卯復酣戰虜將張㝎邊素號梟猛上親禦之將士皆死戰歷一二時遇春等左右夾擊殺士卒無算張中矢百餘而退潜保鞋山不敢吐氣我師亦移據湖口扼彼喉襟列柵南北江岸置火筏中流水陸嚴戒以候其發八月虜食盡遣舟五百艘掠糧都昌又為我大將所獲壬戌虜計窮冒死突出將上趨九江上命諸將一時俱合其大戰如戊子自辰逹酉督戰益急友諒中飛矢斃于舟中癸亥降其衆五萬上命釋之不戮一人凱歌而旋舳艫相銜旌旗飛翩不疾不徐委蛇而來萬姓歡迎俯伏道左山川草木皆有喜氣告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬來攻孫權而周瑜黃蓋敗之于赤壁符堅發長安戎卒六十餘萬騎二十七萬以侵晉而謝玄謝石敗之于淝水然赤壁不過一焚而赱淝水亦不過軍亂而奔𥘉未嘗大戰也史臣且書之以為千古美談矧今湖口之捷血戰纍日天地為之晦冥日月為之無光山河為之震蕩其神功駿烈炳耀鏗鍧與天無極較之二國未足多讓而歌咏不作非甚闕典歟臣謹備著其事撰為頌詞一通以流鴻績于無窮以俟太史氏之采録云其詞曰天眷有德實惟哲皇肆其神略以靖冦攘義旄東指罔敢弗恭風烈虎嘯雲遊龍􅋮長淮既歸江左攸屬浙之東西樹矦置牧乃建國家以奠南服以懷中原以控西蜀蠢爾小醜敢讐大邦集其凶頑鋒蝟斧螳輕涉我疆以跳以踉亦既剪劉僵骸覆江遊齊六軍直傾其穴釋而勿誅俾自懲刷闔胡不然復豕而嘻翹其蟲臂當吾車轍皇用震怒歷告在廷是决不悛命將往征爾選舟師爾整甲兵漕爾糗糧各罄爾誠搖光在申夷則之月禡牙江賔皇秉巨鉞以誓以戒以速其發紀律精明飊火奮激旟旐揚揚艂艭將將豫戈洸洸鎧胄明明載怒載厲載飛載揚雄威所吞巳無荆湘既與虜逢大呼衝擊藥騰藜炮星流火㦸虐𦦨雷奔巨轟雷劈殺氣冥蒙不辨咫尺矢鋒所貫什伍聮聮縱橫交紐命隕弗顛攢桅湊帆筍束蝟編流尸塞川舟行弗前虜魄既禠扶創而逸聚于湖奧僅存喘息我方植柵江之南北火筏在流掩蔽如翼越歷四旬飛赱途窮將冒萬死以絶其衝我師見之千櫓如龍似兔之赱而鷹之促酣戰六時由辰達酉僕姑一發殪此酋首貫睛及顱仆若枯栁大憝既除餘不䏻醜遞相告言我誠不振我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首來降來臣皇曰俞哉汝俘豫受宥汝弗劉豫汝父母汝凍豫衣汝饑豫哺昔何昏迷今始撤蔀奏凱而旋騎吹鬱搖形于樂歌節以鐲鐃飲至于廟頒賞于朝帛堆其家肉登其庖都人聚觀舉手加額或歎或謡有聲嘖嘖干戈相尋匪一朝夕自今升平可坐而莢惟皇神武動則克之群䇿盡屈四方式之惟皇寬慈降則釋之義聲動蕩疇䏻敵之惟皇明斷遇事即决洞見千里不隔一髮所以西征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以幸集尚傳䇿書况兹之功俊偉赫熹揆古無讓可無咏詩臣雖微賤文字是職對揚皇休并獻臣臆三代以還用仁興國皇宜遵行永作民極天降甘露頌洪武二年冬十月十有三日甲戌膏露降于乾清宮後苑蒼松之上皇帝特敕中官折示禁林諸臣光潤如酒凝結如珠肪白飴甘彌布松柯馨烈之氣鬯逹左右勃鬱淋漓薰􅉼太和天休震動中外嘆嗟又明日丙子上御外朝左丞相宣國公臣善長帥羣臣稱賀上若曰甘露之降載在往牒然休咎之徴當以類應朕惡足以致斯卿等尚明為朕言之參知政事臣稼對曰聖人之德上及太清下及太寧中及萬靈則膏露呈瑞陛下恭敬天地輯和民人故天不愛道而嘉祥徽顯也起居注臣觀對曰帝王恩及于物順于人而甘露降陛下誕寬民賦衆庶歡豫底于敉寧神應之臻􅕄此故也翰林侍講學士臣素對曰王者敬飬耆老則甘露降而松柏受之尊賢容衆則竹葦受之今露降于松則陛下飬老之所致也宜以制幣䇿告宗廟頒于史館以永億萬年無疆之聞上情存損挹皆推而不居言既巳丞相帥其班以退翰林學士臣濂竊伏自念氐北有星名為天乳若明而潤則膏露下焉王者德格于上恩覃于下靈氛充牣祕貺斯甄此天人感應之恆理也欽惟皇上興自臨濠匹馬渡江十五年間遂成帝業天瑞育滋不一而足彩霞成鳯卿雲聚繡赤烏飛翔白兔俯伏瑞蓮並萼嘉禾孕文實皆天之所命非人力所致而自致者今又覩兹聖徴則其德洞淪冥功成不宰三瑞沓至千休滋彰有不期然而然者矣雖然傳有之受命不于天于其人休符不于祥于其仁所以孔子之作春秋祥瑞不書而有年則書豈不以天道玄遠難知而人事之為可徵者乎皇上以天縱之聖留神至治以得仁賢為瑞以五風十雨為祥視彼前代植金莖以承液夸嘉瑞以紀年者未嘗不指以為戒則其英明之識超絶之智卓冠百王為法萬世是宜美盛德之形容播諸樂歌被之管絃以示聖子神孫于無窮云其辭曰上天降康甘露之瀼于粲其英純乾發自陽以布于下方凝于休祥其祥伊何靈氣孔多有甘者液載仁惟澤潜靈是錫誕啓皇之德天地相合鴻休翕集厭厭浥匕紛紛密密匪隨日以食兆厥聖徴如卿之雲如景之星如日之重輪冲和氤氲以文我太平惟皇之聖貞符自應不卑而泳不髙而迎茀祿之攸盛惟皇之明貞符爾承不欹而傾不汰而盈茀祿之攸寧休慶之即四國之式有濯厥聲耀于千齡龍馬贊西南夷自昔出良馬而産于羅鬼國者尤良或云羅鬼疑即古之鬼方其地有飬龍坑在兩山之中泓渟􅔿深開闔靈氣而蛟龍實藏其下當春日始和物情酣鬯夷人立栁坑畔擇牝馬之貞者繫之巳而雲霧晦冥咫尺不能辨色類有物蜿蜒上與馬接蓋龍云逮天色開霽視馬傍之沙有龍跡者則與龍遇謹其芻菣而節宣之暨産必獲龍駒焉粵若洪武四年六月壬寅夏國主明升以全蜀降獻良馬凡十而其一色正白乃得之于坑者身長十有一尺首髙九尺足之髙比首而殺其二尺有肉隱起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬為之辟易韀勒不可近近輒作人立而孔上謂天既生此英物必有神以司之親撰祝䇿詔有司以牲牢祀于馬祖然後敕牧副使臣髙敬囊沙四百斤壓之人跨囊上使其遊行苑中久之性漸柔馴適八月癸已上將行夕月之禮于清涼山壇上于是乘之而出如躡雲而馳一塵弗驚皇情恱豫賜其名為飛越峯復命御用監直長臣馬晋臣繪其真形藏焉臣濂稽諸載籍漢之元鼎中有神馬出渥窪水中馬之生于水者尚矣飬龍之說雖相傳于夷人要當可徴不誣也肆惟皇上以大德而位大寶日之所出日之所沒無不梯山航海獻贄奉琛邇者獨角之犀來自九真食火之雞貢于三佛齊之境其他佹形僪狀藉藉紛紛且不一而足而况兹水産之龍馬乎周書有云不寶遠物則遠人格所寶惟賢則邇人安皇上宵衣旰食日懷保于小民岩穴之士搜羅殆盡將圖治安如黃虞時其遐荒殊裔珍育竒産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致于天間十二之中揆之于書前聖後聖蓋同一執轍也其視二師之遣黷武窮兵以索諸大宛者果為何如哉臣濂以文字為職業際兹盛美不敢默而無言謹述贊辭以貽諸後世贊曰天駟熒蛟龍升靈泓澄神馬生祥飈瑞靄晝杳冥天一翕聚通精靈龍胡盈鳬臆輕竹披耳鏡懸晴花雪捲毛光照夜汗溝有血霞流頳振鬛鳴萬馬驚閃流電逐飛星九霄倣佛從龍行但聞瀟瀟風雨聲三川平八極寧真龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑶京皇風清皇道貞皇威明茫莊堪輿內孰敢不來庭陋彼漢將軍空圍二師城乃知天子在樹德不必連年徒用兵代祀髙麗國山川記皇帝受天明命丕承正統薄海內外罔不臣妾德流惠敷浹于神人粵洪武三年春正月二日癸巳上御奉天殿受群臣朝乃言曰朕以菲德惟天惟祖宗是賴位于諸侯王兆民之上郊廟祠享之禮朕不敢不恭然而名山大川能出雨雲以澤𬒳生民者朕于報祈亦罔或弗欽邇者髙麗國奉表稱臣已封其君為王爵錫以金印而其境內山川未遑致祭非一視同仁之意儀曹其議行之于是禮部尚書臣崔亮郎中臣趙時泰員外郎臣蘭以權主事臣黃肅相與具牢醴幡幣選志慮疑一可通神明之士充使者以行有司遂以臣徐師昊名上既復命上出宿齊宫七日始御翰墨撰祝冊至十日庚子昧爽右丞相信國公臣徐達率文武百司序立龍墀之左右上服通天冠絳紗𫀆復臨前殿默思久之方持香以授臣師昊置綵輿中導以音樂出奉天門上親迂玉趾送之臣師昊受命惟謹以夏五月某日甲子至其國某日甲子為壇三成于南門外攝行祀事其國王王顓暨諸陪臣先後駿奔以竭顯相之義當祀之晨天氣宴清海波不驚祥雲瑞飈回旋上下宛若神靈來歆來格僉以謂天子不鄙夷逺民龍光下被人神具欣雖鳥獸魚鱉之屬亦得翔泳于至化之中其于慶幸古所未覩爭欲勒文于石以垂示于無窮臣師昊聞之自古帝王以天下為一家雖海外要荒之地視如咫尺則公羊髙所謂方望之事無所不通者固其宜也肆惟皇上撫有萬邦一遵先王成憲其有事逺徼山川如此之嚴者豈有它哉實為東民徼福使風雨以時年榖順成物無疵癘而巳書曰至治馨香感于神明黍稷非馨明德惟馨神既歆厥明德洞達無間昭報響答當有洋洋臨乎其上者矣臣師昊不佞請書是以為記以昭宣上德軫念遐方之氓不翅中國者當與東海相為無極云是歲某月日記王國祀仁祖廟樂章迎神奏淳和之曲皇圖聿崇茅社受封禮分雖異孝思則同緬懷世德源深流鴻報本有祀式昭神功奉牲奏慶和之曲王國之東清廟翼翼奉我皇祖享祀弗忒薦以牲牷敢曰充腯神其迪嘗純嘏是錫𥘉獻奏保和之曲之舞皇祖載德既淳且仁弗耀其身委祉後人眷兹藩服與祀維寅清醴方薦歆其苾芬亞獻奏清和之曲之舞穆穆靈宫庭燎有煒二觴載升神其樂止其樂伊何錫我繁祉磐石之宗本支百世終獻奏成和之曲之舞神兮下臨陟降在庭不見其形如聞其聲冷風肅然達于兩楹禮成三終神保攸寧飲福奏咸和之曲神具醉止威儀孔肅曰爾孝孫來飲爾福介爾眉夀膺爾百祿子孫保之以引以續徹豆奏嘉和之曲禮備樂舉祀事攸冝孰其尸之廢徹不遲皇哉神惠覃及我私靈氛將逝如何勿思送神奏德和之曲杳兮忽兮神運無迹鸞馭上征星流飈疾其靈在天其主在室億萬斯年孝思無斁諭安南國詔春秋大義亂臣賊子在王法之所必誅不以夷夏而有間也向者安南國王陳日煃薨我國家賜以璽書而立日㷂為王今觀所上表章乃名叔明詢諸使者日㷂為盜所逼悉自剪屠其羽翼身亦就斃此皆尓叔明造計傾之而成篡奪之禍也揆于大義必討無赦如或更弦改轍擇日㷂親賢命而立之庶幾可贖前罪不然十萬大軍水陸俱進正名致討以昭示四夷尓其母悔祭古帝王陵墓文昔者聖帝明王豐功盛德𬒳于生民四海咸賴涉世既逺陵墓所在往往鞠為椔翳祭祀之禮遂致廢而弗講朕既統一天下主百神之祀心甚憫焉因遣使者訪問其處命有司製袞冕之服具牲牢醴齊致祭陵下而焚之然帝王之精神上與天通陟降帝所必能來格于冥冥之中也尚享擬誥命起結文吏部尚書程能而議功㝎勳而頒爵此皆選部主之所以古者置于五曹之右重其任也蓋國家之治在于得人得人之盛繫乎銓衡者甄别其能否然則天官之選可不慎歟具官云云尓尚允釐百工以熙庶績名器之崇􅋻爾當慎其注授之方流品之清濁尓當展其激揚之志時惟稱職汝往欽哉吏部侍郎吏部之設侍郎實古小宰之職凡行選舉封爵勳庸功課之事悉得與聞蓋尚書統之侍郎佐之則其任之不輕也較然矣云云爾其正名而責實簡材而授能使野無遺賢萬邦咸寧則銓核之任得矣朕將觀尓之能尓其母懈于位可吏部郎中吏部為銓綜之司而郎曹之選所以佐理天官簡拔賢俊者也苟不以學行材諝之士為之則何以責其勞效哉云云爾尚審核賢愚公于黜陟使國家有得人之盛而天下蒙至治之澤不其韙與尓其懋哉以稱朕意可司封郎中司封之官參掌官封褒贈之典所以崇有德而報有功也居是選者不宜輕授云云尓尚夙夜勤勞思以大義正厥官勿以私􅋢爽厥序使內而親親外而尊賢皆足以沾朕之恩庶免致曠官之刺矣佇聞嘉猷以對休命可司勳郎中周官有司勳上士二人凡有功者司勳得以告之則其職之設也久矣後世㝎十二級之勳以為賞格故為是官者審察功狀與司封通决于尚書非公明而練習者不足以與兹選云云尓尚計其勳庸之轉遷以㝎資品之髙下庶幾賢者勸而不肖者懲矣尚思自勉以服訓辭可考功郎中考功之職掌文武遷叙資任考課之政令而奉常所㝎諡議亦必覆而上之選部諸司其于關政治之得失者莫此為最郎官之選必得其人云云尓尚平心以馭物使殿最惟允而功用昭彰則責實之效于是乎在爾往欽乃職以稱朕任賢之意可中書左丞朕惟中書政本丞轄之設所以尊朝廷而正紀綱佐冢宰而出治化必有經濟之才任重之器乃稱其選求諸在位兹得其人云云尓尚思朕任屬之意益推材力務展猷為經綸之間必審于治忽㢮張之際必酌乎古今佇觀厥成豈煩多訓可中書參知政事中書出納王命之地朝謀謨于廟堂夕風動于海內然則參預大政者可不慎其選與云是用擢位政府佐理朝綱興禮樂以昭人文審刑賞以順天典賢才之遺佚汝思有以舉之生民之憂戚汝思有以綏之則朕可以不煩而治矣往盡乃職以副朕倚任之意可中書左司郎中左司為中書紀綱之地贊襄治化申明憲度皆其責也郎位之選必擇賢才非廉勤而有為開敏而知務不足以稱其選也云云尓尚母忘恭恪以慎乃職惟至公可以正百司惟至勤可以集庶務爾其念哉母忘朕命中書斷事官中書總天下之務而必設斷事之官所以修明其法禁以防人為非實寓刑期于無刑之意也云云爾尚慎于出入之際母舞于文法而失慘舒之實母流于苛刻而昧寬恕之方則豫一人汝嘉往服訓辭其思實效皇太子與髙麗王書王處海東稱藩奉貢于朝廷者五年于兹矣皇帝嘉王來庭待遇之意甚渥聞王生辰在夏五月特出內府之幣以賜豫亦上體宸衷復以紗若羅各十四端遺王至可領也王尚益勤庶政懷保小民永為我國東藩顧不美歟春和王平安否宜加愛自重進元史表伏以紀一代以為書史法相沿于遷固考前王之成憲周家有監于夏隂蓋因巳往之廢興堪作將耒之法戒惟元氏之有國本朔漢以造家用兵戈以爭強并部落者十世逐水草而為食擅雄長于一隅逮至成吉思之時大會斡難河之上始尊位號漸㝎教條既近取于乃蠻復逺攻于回紇渡黃河以蹴西夏踰居庸以瞰中原太宗繼之而金源為墟世祖承之而宋籙遂訖立經陳紀用夏變夷肆宏逺之規模成混一之基業爰及成仁之主見稱願治之君唯祖訓之式遵思孫謀之是遺自兹巳降聿號隆平豐亨豫大之言鼓倡于天曆之世離析渙奔之禍馴致于至正之朝嬖偉蠱惑于中權姦蒙蔽于外漢網秪因于疏闊周綱遽見于陵遲風憲皆無不捕之猫將士盡成反噬之犬由是羣雄角逐九域瓜分風波徒沸于重𬈑海嶽竟歸于真主中謝欽惟皇帝陛下奉天承運濟世安民建萬世之丕圖紹百王之正統大明出而爝火息率土生輝迅雷鳴而衆響微鴻音斯播載念盛衰之故即推忠厚之仁僉言實既亡而名亦隨亡獨謂國可滅而史不當滅特詔遺逸之士欲求論議之公文詞勿至于艱深事迹務令于明白苟善惡瞭然在目庶勸懲有益于人此皆天語之丁寧愈見聖心之廣大于是命翰林學士臣宋濂待制臣王偉協恭刋裁儒士臣汪克寬臣胡翰臣宋禧臣陶凱臣陳基臣趙塤臣曽魯臣趙汸臣張文海臣徐尊生臣黃箎臣傳恕臣王錡臣傳著臣謝徽臣髙啓分科修纂故上自太祖下迄寧宗靡不網羅嚴加搜采恐玩時而愒日每繼咎以焚膏故于五六月之間成此十一朝之史况往牒舛訛之巳甚而它書參考之無憑雖竭忠勤難逃踈漏若自元統以後則其載籍無存巳遣使以旁求俟續編而上進愧其才識之有限弗稱三長兼以紀述之未周殊無寸𥙷臣某忝司鈞軸幸覩成書信傳信而疑傳疑僅克編摩于歲月筆則筆而削則削敢言褒貶于春秋仰塵乙夜之覽期作千秋之鑑所撰元史本紀三十八卷志五十三卷表六卷傳六十二卷目録二卷通計一百三十萬六千五百餘字謹繕寫成一百二十䇿隨表上進以聞臣某下情無任激切屏營之至臣某中謝謹言元史目録後記洪武元年秋八月上既平㝎朔方九州攸同而金匱之書悉輸于祕府冬十有二月乃詔儒臣發其所藏纂修元史以成一代之典而臣濂臣禕實為之總裁明年春二月丙寅開局至秋八月癸酉書成紀凡三十有七卷志五十有三卷表六卷傳六十有三卷丞相宣國公臣善長率同列表上巳經御覽至若順帝之時史官職廢皆無實録可徴因未得為完書上復詔儀曹遣使行天下其涉于史事者令郡國上之又明年春二月乙丑開局至秋七月丁亥書成又復上進以卷計者紀十表二傳三十又六凡前書有所未備頗𥙷完之其時與編摩者則臣趙塤臣朱右臣貝瓊臣朱世廉臣王廉臣王彛臣張孟兼臣髙遜志臣李懋臣張宣臣李汶臣張簡臣杜寅臣俞寅臣􅎋弼而總其事者仍臣濂與臣禕焉合前後二書復釐分而附麗之共成二百一十卷舊所纂録之士其名見于表中者或仕或隱皆散之四方獨塤而有斯疾乎越一日又問曰病勢稍損否黼對如𥘉越二日又問黼復對如𥘉上惻然曰尓往傳命俾歸飬金華山中父子祖孫歡然同聚疾必易愈愈且速造朝國家文翰庶有賴哉二十四日黼至導宣上㫖臣力疾起拜命越翼日陛辭上敕黃門內使出大府金藉以束帛賜之自後候問之使相屬于道時方嚴肩輿之禁自相國以下至百執事皆弗之許特命中書造安車給健丁六人以載此尤異數也二十八日皇太子以舊學之故復遣內臣存問賚以繒幣白金之屬恩意有加焉三十日上道夏四月十七日方抵金華故居十八日具謝表一通進上并致書太子以寓針規之意上覽之再三喜甚謂太子曰此書汝當日誦一過復親御翰墨賜書褒答其文則上所自製宇乃侍臣代書其外封九字內年月六字及花書則上之親筆也復出官局文綺白繒各一命太子署名緘封遣使者即臣家以賜焉時六月七日也惟上深仁如天厚澤如地凡囿于兩間者莫不同浴神化鼓舞至德以臣之微亦獲霑𬒳寵榮如此之至竊伏自念臣本一介書生應聘而起即典儒臺未幾召入禁中授太子經由是峻登記言之職賜服金紫先後所承恩數不一而足今以微疴之故又勤宸念眷注優異錫豫便蕃此固上天雨露之滋一草一木無不使遂其生成之性而臣區區犬馬之誠所以思報效之者何日而敢忘哉天保之詩曰天保㝎尓亦孔之固俾尓單厚何福不除臣敢誦此詩以答上賜復追疏遭逢之盛于賜書後示諸子孫俾世世母忘上恩云同知臨洮府事班景道除陜西行省參知政事誥陜西在古為雍州之域三秦之地延袤一千餘里土廣物􅎋號稱難治朕嘗建行中書設參知政事以綜核衆務以鎮安萬民然必得同寅協恭之臣共釐治之則事集而功成不難矣具官班某負倜儻之才抱經濟之略朕嘗歷試其為人設施次第綽有可觀故自臨洮别駕特授以參預之職夫别駕四品之秩也較之參預之資實超十階豈不以尓韞此竒才故不次而用之乎爾尚夙夜惟勤思稱朕懷官政之有弊者爾當振而新之民瘼之未瘳者爾當撫而摩之則豫一人汝嘉爾其欽承朕言不再遙授李思齊江西行省左丞誥朕起布衣除暴亂救民于水火之中其有能知天命所在帥衆來歸者朕每嘉焉爾李某當元運之衰奮自汝南擁兵而守秦隴積年屯戌志在保民及我師入關乃西往臨洮巳而率其士馬之衆納欵轅門去危而就安轉禍而為福視彼暗于事幾殘民以逞者相去逺甚可謂通時達變之豪傑矣兹授左轄于外省列之朝班仍給其祿尓尚夙夜恪慎思保令名以稱朕優禮之意尓其懋哉給事中安統除兵部尚書誥兵部司馬之職尚書法從之官古不輕授今難其人蓋戎務之出入馬政之弛張莫不繫焉非有奮厲之才練達之知不足以奉揚威武毗贊機密者矣具官安某粵自蚤歲有志事功自北而南在朕左右及其給事內廷論思獻納之益亦時有焉夏官之選惟爾之能然以八座之貴朕非輕以卑人者也爾尚一乃心力以報朕所以見知之意嗚呼惟秉義守正則可以謹科條惟趍事赴功則可以行邦政尚思自勉服我訓辭侍御史王居仁除山西行省參知政事誥國家之建行中書所以控制方面而布宣政令者也况河東山西之地古為雄藩所轄州郡不翅六十有餘版籍之廣民庶之繁其事亦云夥矣邇者鑄印開省未設丞弼先命近臣為參知政事奏辟官屬以行則是大小之務皆得專達非止參預而巳也與斯選者非得勛舊之臣曷足以重其任哉具官王某才足以匡時謀足以經逺自渡江以來委身事朕凡十五年踐揚中外多著勞烈執法中臺聲聞益著于是簡在朕心俾躋政府嗚呼陳紀立經尓尚膺藩宣之寄安邊靖國尓其盡撫綏之方往惟汝諧毋替朕命恭題御筆後洪武元年夏四月上幸北京五月四日道經下邳駐蹕于東門外設壇具牢醴祭于山川百神祭畢遂升御舟召守土臣四明李侯相親出御筆一道且諭之曰山東故官聽其從宜居處以俟選用相既稽首拜受因復奏曰其有願往南京及旋故鄉者何以遇之上曰卿稽其人數去南京者日豫米二升還故鄉者皆給一斛相退奉詔行之嗚呼非聖德如天一視而同仁者其奚暇念及于此哉越三月燕都遂平懷柔綏徠之效蓋有不疾而速不行而至者矣相既侈兹竒遇裝潢成軸持以示濂濂方待罪國史謹巳備録藏諸金匱復為記其事于左方云宋學士文集卷第一鑾坡集卷第一
