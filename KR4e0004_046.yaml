body:
  text: 故贈将仕佐郎禮部員外郎瞿府君墓誌銘濂侍講禁林時蘇之良士瞿公荘来為典簿其為人也文學蔚茂而勵行堅凝濂甚敬畏之凡應制諸作多出其手率皆稱㫖自是與之締交不翅伯仲然間以先府君墓銘爲属濂以索文者接踵于門雖諾之而未睱為今蒙恩致政家居又復移文以申前請乃序其事而繫之以銘序曰府君諱嗣興字華鄊姓瞿氏其先君河南後徙通州之海門宋末有諱某者避兵南来至姑蘇之常熟家焉生二子曰青曰逹俱有才力能伏其鄊人元兵取江南有劉将軍者徇地至姑熟青與逹帥里中強壮拜馬前迎之有猘犬突出軍中衆􅌓晤持弓不敢發青直前一箭射殺之衆讙曰壮士壮士可官也青曰吾不如吾弟逹将軍遂出旗號俾逹招諭未降者承制授逹為百夫長及宋亡遷蘇州巡鹽大使兼管内六縣捕盗轉憐口提嶺娶某氏府君其子也府君少時家有禄食日從其徙射獵飲酒為樂不喜學書然天資仁善和順未甞有過年十七怯憐口以例革不置官提領君家食甚貧府君即折弓矢脫略紈綺故態躬力穡事以養二親承候顔色唯恐弗至母甞病疽時天熱疽潰臭不可聞人皆掩鼻趨過府君跪床下執蒲葵扇驅蚊蚋以手摩穢剔汗扶其起臥不觧帶者三旬至愈乃止母又甞患積氣危甚醫弗能攻或告以股肉可療其法寘刀盂上而禱于神俟刀躍乃可割府君如其言自旦至晡頓顙于地顙破血流𬒳面刀弗動府君泣曰天忍不閔我耶我縦以身易母猶甘之肉何暇惜乎知刀終不可動起引之割肉寘盂中裂帛漬血褁創戒左右勿泄羔之謬稱他肉以進母不食已五日見羔喜為之握筯食一杯㡬盡食己而瘳毋後感疾思啖菱時菱未葉遍市之不得觧衣入菱澤中哀號索之竟日手足皆腫俄得菱實三馳歸遺毋毋疾如失旣而貧愈甚或隔日一炊府君曰事急矣儻守之而不變如父母何携家入蘇城謁多錢翁有所稱貸多錢翁察府君誠信可仗出資財俾府君懋遷而分其息十之二府君由是稍𥙿凢父母所欲無不致也府君不妄取而好施甞朝出道獲人所遺嚢有楮幣若干錠視其名則市中小夫府君坐不貼席赱其家還之有墜田宅劵書及他貴物于路者府君覧之曰劵書失啓争端端跡其人呼與之其人權貴家奴失主劵畏罪欲求死叩頭謝曰活我者公也氊工王氏大雪凍餓不能起竈突無煙府君憐之天未明携錢二十緍潜投窓隙而去歉歲出糶有寠人来糶衣不掩脛府君受其錢五千陽忘曰汝糴十千邪倍與其粟鬻𬞞者過門府君取𬞞五錢授以楮幣十倍曰汝當以餘錢禆我鬻者咲曰吾安有餘錢邪府君曰汝第持去俟錢多歸我不汝急也其意實予之而不𣣔其知皆此類凡負販者必多給其直家人恠問其故府君曰彼胝肩繭足以求升合利吾忍與之較邪歲丙申常熟凶民来依者數十軰府君僦舎舘而食之癘氣發者相枕藉府君躬視粥藥而時進之卒頼以生府君晚喜浮屠言讀其書豁然若㑹其意者復閱北溪陳氏性理字義即觧其要曰聖賢之學盖如是因戒其二子懋荘曰我少不學至老而始悔若等其勉之二子服父訓刻志事學荘入國朝蔚為名儒從典簿陞禮部員外郎府君及見之曰吾有望矣洪武乙卯九月府君得疾恐念慮或亂畫𥿄為圎圈揭屏間常目之二十七日卒于家卒前一日楚府伴讀陳子晟等道過府君将之亰問府君欲何言府君以两手加額曰語吾兒荘努力供職報天子㤙我死當不恨享年八十有四荘在禮部累請封于朝未報卒後月餘贈将仕佐郎禮部員外郎娶蔣氏贈安人事舅姑如府君之孝舅姑或怒則率子女羅拜于前曰新婦誠可怒願念諸孫貸其罪舅姑意不觧悲請至再三乃已年七十三先九年卒是歲十月二十三日葬扵呉縣横山梅家灣之原與安人合兆男二人即懋荘女三人一夭二適某某孫四人紹緒紳曽孫男二人女一人府君殁之明年荘自員外郎拜福建等處承宣布政司左叅政階通奉大夫扵法當得加贈云者嗚呼孝者天下之大經也一鄊得孝子焉則一鄊睦一邑得孝子焉則一邑順一郡得孝子焉則一郡治此無他人之所秉恒性固未始有殊而移風易俗之道盖莫急扵此也然而孝行之至心與天通韋布之士往往䏻感扵神明發扵祥徴載諸史牒復有不可誣者今府君不自有身唯欲其親之安刲股愈疾固人之所難至扵菱未華時而能獲實者三非神明隂相之未必能致斯則心與天通之驗也在宋之𥘉貴池有孝子者曰葉薈秋九月母有渴疾思生李食之薈號泣樹下忽叢葉中得雙李如彈丸人以爲孝感府君之事寧不與薈類耶薈之名尚傳扵今而弗泯則夫府君者其不當有傳耶兹銘之所由作也銘曰維孝之徳是謂天經秉厥恒性體順逹誠有羙孝子醇懿是循但知有親遑恤其身親病在寝予兮吟呻稽顙于庭籲彼百神我命弗顧體肉何惜親年可延我志則懌求䔖大澤悲啼欲喑豈意未華獲實者三天鍳哀衷顯厥祥徴揚之邇遐聲光騰騰卓行若茲亦足不杇况其立心一歸忠厚推仁惠窮日惟孜孜吾分當然奚求人知施徳不食其子維良上簡帝心參預藩方勒石幽宫文不妄飾此孝子墳過者宜式元封從仕郎江浙等處行中書省左司都事鄭彦貞甫墓誌銘鳴呼大同之世人不獨親其親不獨子其子貨不必藏扵己力悪其不出扵身自大道旣隱情偽日滋此尼父所以有不及見之嘆雖然秉彛天性亘萬古猶一日時縦有汚隆而其道則未甞泯滅有若浦江鄭氏非一家之三代而其七葉之長彦貞君非三代之英乎彦貞諱鉉彦貞字也其家自宋南渡𥘉即合食為義門迄今已歷十世宋元二朝國史皆為立傳家教脩明有遺範二卷俾奕世守之彦貞嗣主其政益匑匑畏謹正已以蒞物或行其所未至或𥙷其所不足家人翕然遵化一堂之上雅雅雍雍動逾千百指愛無不均也情無不一也不知孰為親而孰為䟽也視其貨泉則錙銖皆聚扵公且曰我惡敢私也察其事功則羣趨而競赴又曰此吾分當然也爾何與㢤雖甚勞弗懈義浹仁孚和氣充牣四海之廣莫不聞知過其門入其庭者神暢心怡而鄙吝之萌銷沮無餘退而有言僉謂昔之義居如樊楊張李之流誠所不及而益重彦貞君之善繼先志也彦貞自㓜沉毅端慤屹然如成人雖朋舊不敢狎侮語一近䙝輒白眼望之聞人有輕已之言自責自厲唯恐如其料及壮主貨財倡家意其易惑百端傾誘之毎正色叱之使去倡大詫曰此鐡心石腸人也彦貞事父盡孝父病在枕席其妻卒彦貞不敢哭強顔乾咲以奉湯藥竟不使之知後八日父亦卒彦貞衰慟㡬絶水漿不入口者三日鬚髪為之盡白及至終䘮張外舅必慶憫諸甥㷀㷀無依力勸其更娶彦貞謝曰鉉見後母肆虐戕賊骨肉者多矣忍令吾兒䧟之邪不聽彦貞年未四十君子義之時天下承平衣冠萃于燕都翩然出㳺以充其見聞揭文安公傒斯在禁林黄文獻公溍居成均二公以文辭嗚當世皆折行軰與彦貞交論文談詩或至逹旦不休一時士大夫見彦貞方巖皆敬憚之或酣酒放歌聞履聲即歛容正坐不敢吐氣自時厥後彦貞仲子泳與從子深同講授脫脫太師家彦貞為書数千言陳時政之弊令進于太師太師多采而行之彦貞尚風義舊與參政怱都魯沙㳺其子為武義宰免官留武林貧不能自存彦貞延其家十口来浦江給衣食三十餘年鄰瞽者跛者彦貞憫其顛連養之終身毎夙興告飢者填門彦貞積餘飯親携簞分餉之至老不厭元季兵起州郡俱繹騷大将數綂兵入境服義門名皆戒士卒毋敢犯樞宻判官阿魯灰帥軍五萬一夕驟至奪民廬舎以居二十里之内鷄犬牛羊盡敝彦貞說之曰明公非太師之偏禆乎太師征髙郵尚以無罪去國况明公之士卒恣行不道乎脫有一人言扵朝不識明公将何以䖏之阿魯灰愕然曰業巳如此為之奈何彦真曰為明公計者甚不難浙東據山阻海其民頗柔馴易制明公誠能撫㝎而綏輯之俾他兵不敢東向執政柄者尚敢以嚧咳相驚乎行且録明公之功矣阿魯灰不覺屈膝曰非公不能聞此言命左右致束帛為謝明日下令啓行一軍肅然曽未㡬何國朝大兵取婺州彦貞携家避入諸暨流子里時李曹公文忠統兵来過嘆曰此義門也今世罕見之躬為扃鐍而去事平遣帳前先峯率民兵二千護其家歸浦江人以為彦貞積善之報云彦貞年七十以甲辰之歲四月十四日終于家其月二十八日塟于諸暨州桐山鄊宣山之原家庭内外不問服之有無咸嗚嗚哭哭則盡哀一縣之中若宗黨若婣連若三農百工若鄊士大夫皆素冠拜哭哭亦盡哀傍邑之賢者聞之亦竊哀之曰是家實無愧扵三代使尼父生扵此時未必不樂道之今其七世之長亡矣薰漸之益吾屬将何望乎嗚呼此可以聲音笑貌為之㢤彦貞之致是者必有在矣彦貞之先自歙遷睦又自睦来遷其詳見諸譜圖記同居𥘉祖諱綺字宗文宋乾道中賜號冲素處士朝請郎郎中晏穆為銘其墓父文泰植志不屈人下設施運量大能昌其宗文泰乃青田尉徳璋子出為伯父徳池後徳池之父致則處士曽孫也妻張澄有婦徳敬夫如賔沒齒無一言相加遺男子五人長漢才優識精雖不大聲色弟子莫不畏之量入為出而其致用恒𥙿如也次即咏通經而有文累官從仕郎温州路總管府經歷得封彦貞江浙等處行中書省左右司都事階亦從事郎次湜東陽丞人謂才如長兄次漢江浙行省宣使次漴庻出也女子一人歸東陽蔣嘉亨男孫十人楨掝榦樞模格棠米杲柯女孫八人其二適嘉亨之子昭及其從子明其一嫁同邑張宗餘皆未行曾孫男八人燾爟炎樵熒熉光𦦨濂也不敏與彦貞有連而彦貞子若孫又皆從濂授經其相知實深然而逰䆠南京彦貞之殁歛不得憑棺窆不得臨穴将何以釋其悠悠之思唯紀載羣行鐫之樂石可以垂聲光扵不朽貽矩則扵方来是猶可為也扵是不敢讓姑徇漢等之請而為之銘銘曰大道之行天下為公風氣敦龎臻于太康異體同心情無不通此謂醇熈三代之英世遷俗殊道徳淪䘮紾臂借耰秦法之凉肝膈充窒形骸閉藏愾我窹嘆涕泗沾裳彼羙鄭君沉毅自強上承奕葉合族共焬内教云飭外政復蘉規重矩疊遹有耿光曷以致兹曰率其常或歛而舒或翕而張有子将将有婦洋洋無間戚䟽萃扵一堂孰為尊章誰為父兄至龢丕冐奚有畛封儻渉其庭煦如春陽浃人肌髄薫為善良人亦有言此為世坊非君之賢莫襲其芳襲之斯何旣明且剛以仁為食以義為漿翳䏻使昭枯堪再榮百鳥喧啾忽見鳯凰宜覧徳輝西東翶翔豈意鎩翮竟歸冥茫載者亡車渡者失航瞻望弗及衋然感傷仙華卭卭浦汭湯湯緬懐徳人何日而忘胡府君神道碑毛公神道碑奉國将軍僉大都督府事毛驤来謂濂曰先公以正至辛丑正月朔日棄遺諸孤某月某日遂畢窀穸之禮迄今巳十八春秋㳺䝉天寵之加賁及泉壌而墓上之石未有銘辭大懼無以昭君賜而示子孫願為備書其故俾刻焉按狀公諱麒字國祥姓毛氏世居鳯陽定逺縣之昌義郷生平負英氣多謀畧人恒敬之壬辰之夏汝潁兵火起所在郡縣皆相挺為亂今上皇帝龍興臨濠憫生民之塗炭持三尺劔出而救之一呼之間從者數方直超定逺之池河𥘉縣之大姓陳氏與公謀招健兒為兵屯營其地挾縣尹某為師作堡鄣計聞大軍且至皆弃妻孥作風雨散去公獨扶尹共詣轅門欵附上遥見之令左右問曰爾為何人對曰定逺尹也扶尹者何人對曰縣民毛麒也上壮公所為乃召之前指謂侍臣曰衆皆潰而麒獨降非有識者邪於是寵遇優渥朝夕俾公侍膳與其計征討之事健兒聞公在莫府亦先後出降上取滁州擢公行軍總管府經歴司其倉廩兼掌晨昏暦以将帥之失佐者未㡬取和州軍威益振上以建國之𥘉唯兵食最急仍命公護滁州倉乃帥師渡長江太平望風乞降遂開江南行中書省徴公還陞為郎中當是時上之左右唯公及太師李韓公尤𬒳簡任凡政今之敷布餫餉之轉輸羽檄之交馳皆二公相與恊賛之及建康下遂定鼎焉分道世師日以獻捷聞復陞公為參議官戊戌冬上親征㜈州公實權署中書省事小大庻政咸出公營度人情脗合文武無間言上上将大委任之而公以病告上臨其家坐榻上執手問所苦且勉其善自愛如是者凡三訃聞宸衷憫悼錫贈有加焉且詔參軍胡深選塟地於江寜虎頭山及靈車就塗上復躬御翰墨作文一通御鎮淮橋而祭慟哭良乆直至處所視其下棺始還公之子驤時備宿衛上念公弗置俾􅋮就儒師學親自訓督之命為飛熊衞管軍千户轉振武羽林二衛􅋮感上恩自謂千載一時夙夜思立身揚名以報國顯親為務會大兵征漢鄂定襄沔下吳興俱從征有功洪武元年上郊皇天即帝泣國號大明在廷之臣皆驗勲進官擢􅋮宣武将軍僉羽林左衛親軍指揮使司事仍追封公西河郡伯封公妻周氏西河郡君大将軍徐魏公奉詔征中原而􅋮又從行直搗燕薊元君出奔天下於是大定論功行賞陞驤懷逺将軍同知羽林左衛親軍指揮使司事世襲其職得推㤙二代時重定封贈例司封據令更贈公懐逺将軍同知親軍指揮使司事周氏封㳤人公父文政贈明威将軍親軍指揮使司副使母朱氏贈德人驤室劉氏先封西河郡君至是亦更封㳤人已而􅋮進官羽林左衛親軍指揮使階昭勇将軍滕州叚士雄反驤帥師討乎之倭奴入㓂浙東沿海郡縣皆失寕􅋮會浙江太倉諸軍捕斬五百餘級擭海舟一十二艘倭奴逺遁入奏奉天殿上大恱曽未㡬何驤復超奉國将軍僉大都督府事加贈公僉大都督府事階奉國将軍而明威公亦加昭勇将軍羽林左衛親軍指揮使朱氏加㳤人周氏劉氏皆夫人繼室張氏亦封夫人公生子九人􅋮其長也次曰駿某階羽林衛千户所鎮撫曰駉某階金吾左衛千户所鎮撫曰某曰某曰某曰某曰某曰某女三人二先卒一嫁宿衛舎人沈俊孫六人曰振武曰應孫曰承安曰鎻住曰東乎保曰寳慶烏乎天造草昧之時六合雄争未知鹿入誰手昧者徃徃失於所憑依而公獨能炳於㡬先識真主於龍飛之𥘉扶携臣服獻計宣勞以佐興王之運豈非豪傑之士㢤及乎神武四達方域内附皇上崇德報功之心唯恐有弗及故當時開國元勲無不分茅胙土鉄劵金書傳及來裔柰何公之蚤世不得尽其才而與之並其命也邪雖然􅋮之雄畧超群著竒出入扈從上簡帝心爵位之顯融贈䘏之便蕃尚方新而未艾也公雖殁亦可以無憾矣銘曰猗歟毛公沉毅而雄元運将終亂如聚蠭公奮而興使民為兵執旗一呼從者如星我州我閭我保鄣之俾全其生寧顧我私上天厭亂特命真人驅雷駕雲廓淸妖氣公聞曰噫天胡可違附鳳攀龍兹惟其時我志先定敢徇輿情上謁轅門稽首以迎上嘉其忠寵賚日優談笑折衝帷幄運籌羽檄星馳饋饟弗遺是馳是驅以壮我王師飛渡大江軍威洸洸達于四方無敵不降自參戎閫遂賛中書拾級而陞漸見赫熹卉木方榮嚴霜折之大火始然河水㓕之天若假年勞烈孰侔貂蝉朱紱豈不公侯命也止斯人其柰何中外聞之孰不嘆嗟公雖云亡有子慨慷出入禁庭侍衛帝傍勲名日崇貤典日殷天光照臨燀燀焞焞難逢者時不朽者名名著實并登諸汗靑莫堅匪石以礲以磨史官造銘永鎮山河寧海林貞婦方氏墓志銘有序寧海林可企年垂八十纒綿疾疢偃卧不能興召其甥方孝聞而謂之曰吾耄矣即溘先朝露無所憾苐毋氏貞行未及顯白中心怦怦然類持杵舂繫之者聞汝弟孝孺受經于金華宋太史太史進人以善者也儻孝孺為達其誠太史未必不憫之而寵卑以文也言訖涕泗滂然下孝孺以言予囙不辭而序之曰貞婦諱友弟姓方氏亦寧海人宋某年進士淦之女孝聞之曽祖姑也年二十歸可企之父某時舅巳殁惟姑存秋髮亦繽紛矣當科繇之興黠首籍是以魚肉之夫獨嬰其難且無同氣之親以為助貞婦俛首事紡磚或至鷄號就枕由是給使之用不匱越八載而生四子夫以一疾亡長子年甫踰七餘子生尚㓜貞婦㡬欲無生然恐傷姑之心強顔追逐日夜飲泣吞聲不使聲聞于人里有豪士欲乘其孤婺矛牙凌之貞婦盛氣叱曰我未亡人耳爾誠君子耶當恤我軫我之不睱頋反以相虐耶苟進進不巳謺直于官以懲彼繼者或聞之吐舌相戒莫敢犯卒能樹其門弗墜姑年八十恒多病貞婦敬之如鬼神保之如嬰兒無毫髪忤其意及以夀終帥家人行喪朝夕奠哭如儀學礼君子不能過也訓飭諸子從師問學束脩不足脫簮珥繼之至其成立皆為之授室歲時出坐堂上子婦與諸孫分東西立階下次第舉觴為夀雍穆之氣藹如陽春如是三十年乃卒卒時年八十二某年某月日也以某年月日塟某山之原州里之人至今指其門相謂曰是中有貞婦能皦然自守而致備福之飬今豈復有是人耶相與慕咏而去貞婦四子長可傳次即可企次也任可信諸孫若干人某某孫女若干人歸濟寧知府方去矜及某某去矜孝聞父也予聞夫者婦之天天可背乎背天則非人也有若貞婦之順乎天天之報施如此亦云厚矣㢤銘曰鴻雁真雌而不再雄而况於人乎林氏婦方其始無愧人道乎有人心者孰謂其不能興起乎童真觀音像賛清江鎮曾重刻金華何牖德輝獲陽翟吳道玄所畫童真観音像乃五䑓山碑本以蓮葉為䄄盖而十蓮華圍遶之用表本迹十妙不二門覽者因相生悟而法華之微㫖具見於斯然其運思精深指筆遒勁真殊勝之事也德輝将重刻寘于智者壽聖禪寺翰林學士承㫖金華宋濂為作賛曰我觀大士相示現一切法不坐七寳牀唯籍蓮花葉蓮葉生水中淸浄無染着華身與佛身畢竟同一體如来所說法取喻此最切本迹十妙門不見有二相若從有眼觀見華不見佛一顯而一隱見精不忘故或逢無目人華佛一時現非見却成見功德難思議佛身徧法界是華亦復然華佛二俱泯定得大自在浦陽深溪王氏義門碑銘有序浦陽於婺為山邑唐天寳末始割義烏蘭溪富陽三縣地置之人生其中往往樸茂淳質力農務本耻於華言偽行而以士自命陳文毅公盛稱書傳所載古者禮義之俗殆不是過其言信不誣矣載稽其事梁貞明𥘉縣人何千齡四代同居宋淳熈中鍾宅亦至三世何鍾二氏之間而冲素處士鄭綺奮然興起教子孫無别火而食志確見凝尤非二氏所能及故六傳至文嗣而家益昌元至大末旌其門閭而於力役之征俾無有所與宋元二朝國史皆為之立傳盖自建𥘉迨今已歴十丗踰二百五十春秋矣深溪王氏其先出於烏傷之鳳林有諱萬者字處一擢宋嘉定癸未進士第立朝騫諤凛然不可犯憸人畏之為之歛迹終官太常少卿謚曰忠惠少卿之弟茇三傳至某生二子澄汶澄以忠厚為家州里之無告者煦之以仁人愛戴之不啻其父兄瀕終集家衆言曰汝曹能合族如同里鄭氏吾暝目無憾矣言訖而逝澄生三子子覺子麟子偉子麒出為汶後皆善紹先志子覺生五子應念㦛慶聦子麟生一子憲子偉生二子懃恩而應之伯仲又各生子踰二十人矣子覺與子麟合謀召子姓謂曰一體之分散為九族痒痾疾痛舉切吾身収族而聚居是謂惇本離宗而自矜是謂乖義古之道也今吾家相傳四葉矣和孺之樂雖殷管攝之計未逹庸非闕歟况吾父有遺言欲法鄭氏鄭氏於吾有連其成規具在吾将損益而行之何如於是應念帥諸弟踊躍承命請叅定家則一卷朝夕遵之唯恐有所失馭家之礼質文之兼至應物之務内外之齊飾薰蒸太和之中壹囿範圍之内卿人士莫不感厲而歆艶之子覺且謂不可無以示来者既勒家則于碑而復徴濂文以紀其事昔者成周之世九夫為井井方一里而一夫受田百畝其家衆男為餘夫亦受弍十五畝賦由斯而出夫由斯而定其勢不得不分當是時未聞有同居累世者也其相親相恤之政則有大小宗法存焉大宗譬則幹也小宗譬則枝也技雖有千萬之不齊而其幹終一而巳前王持世之微推盖不得不爾也自夫封建宗法之制壊九族之親漫焉不相統属儼若秦肥之視越瘠仁人義士乃於服尽情遷之時綴之以食而弗殊事雖有異於古不猶行古之道乎㢤浦江蕞爾之邑以義居聞者三人而子覺又不悖先訓蹶然而思繼焉古者礼義之俗誠豈有越於此㢤文毅公之言至是益可徴矣子覺本名閥之後金華諸族亦同出於鳯林其顯融者項背相朢而淳熈宰相為尤著宰相勢隆望重尚未能合族以居而子覺一韋布之士乃㫁然行之斯可謂之賢也矣雖然靡不有𥘉鮮克有終子覺之嗣人尚世守遺法而不墜他時将與鄭氏儷羙而交輝聖朝以孝治天下旌異之典未必為子覺惜也龍光下燭行當炳煥於山川之間矣濂囙不辭而記之又繫之以銘曰易著同人合乹與離上叅于天火之赫熹類族辦物君子以之况我宗屬一氣之為譬猶单幹漸敷群枝服雖少閷情或甚非物我相形矛盾迭馳借耰取箕誶語絲披所幸天衷亘古無虧不有人豪務克已私何能大公㧞其藩籬浦陽之江其流瀰瀰太樸未散民醇俗熈以義聞者接軫聮帷有羙王氏裔出紳緌佩厥先訓如銘䁀彛大合其族嗜義若飴夙夜無諐竭其心思度物引類取式樹規鉅探浩渺細入宻微日約月㑹有文可稽耄倪同心一唱百随孰為範防徴礼與詩以匡念慮以肅威儀如水斯瀦畚築以時㳙滴弗戒不翅漏巵古雲孝弟致家之肥匪間古今驗君著龜維彼崇搆肇自築基既堅旣飾棟宇翬飛維彼珪歩千里在兹行行不息其至無疑上慎㫋㢤勇毅自持誰謂華高企其齊而大史造銘勒之豊碑王氏義祠記義烏之和溪有王府君者諱埜當宋之季來贅竹山樓約家約之妻埜之姑王氏也故約以女妙清歸于埜然王氏愛妙淸甚乃於湖塘上造屋一十七間别寘薪山若干畝𬞞畦若干畝腴田若干畝召妙淸夫婦謂曰此皆吾捐嫁貲所營毫髮不以煩楼氏令悉卑爾主之爾其慎㢤妙淸生二子俱發世唯二女存長曰琇歸同里大姓樓如浚次曰禜妙淸以無嗣㽞瑩於左右延泰不華為贅婿生一子野仙妙清又篤愛之甚教育備至不翅其巳出野仙長復謀於衆命約諸孫淵以女善歸之妙清問言於埜曰吾二人耄矣不幸無子今甥野仙文而有守又妻吾姪之女此而非親将誰親乎吾母氏所卑之業冝具授之更其屋為義祠使歲時具豚酒祀吾之父母舅姑而野先之先祖與焉吾二人他日或終于牖下亦庶㡬有所托矣乃㑹王劉二宗耉老成人造為劵書俾二宗子若孫毋相及也衆皆諾之於是野仙父子遵而行之已五十年矣自時厥後妙清夫婦與野仙之父毋先後捐舘而中遭兵燹之厄劵書皆巳亡去至正乙已秋九月九日埜之季弟䃼歲月滋乆不令子孫或生異圖於其間復集二宗而重造之仍戒厲之如𥘉濂聞之漢儒之論九族有曰父族四毋三族妻二族父之族固為有同姓也母與妻之族則皆異姓也然則異姓其可謂之族乎盖生吾者母也産吾子者妻也氣血之交貫呼吸之相通自一體而分者也故古之稱謂母之考妣為外王父母妻之父母為外舅姑女子之子為外孫而亦頗同於父族者以其為至親也人不幸無後苟命其甥以主祀事未見其不可也苟以為不可較之姓同而情異若無所係属者果何如㢤必有能辨之者矣况禮有常有變卜同宗以為之後者常也選異姓至親以繼之者變也變而不失其正斯善矣野仙之事以義起礼者也二宗之人幸無忘前人之訓而自䧟於不義㢤濂自㓜與野仙為同門有相得甚驩一旦挹杖踵門崇濂為之記濂囙不辭使鐫諸樂石山田之屬其歩畝園落之詳備見石隂野仙字遵礼䝉古人以材辟江西憲府奏差遷七閩官為蘇州某鎮巡檢云題栖雲軒記後余往年讀劉玄靖山栖志見其所載紫岩靈岩勝槩分明如畫時正當袢暑不覺凉颼生肘腋間今年夏六月客有授予蘇太史棲雲軒記記為本庵上士作其狀靈岩之景亦分明如畫蒸溽為之頓消嗚呼囙文辭而想見其處雅興遄發尚忘其時之燠炎况親睹嵬眼澒耳之勝者乎盖玄靖乆栖此山太史亦甞出㳺覧故其言真切有足以動人也何文定公䟦山栖志有云想玄靖一時飛屐上下千峰紫翠間左浮丘而右洪崖其風致猶前日也余今於太史之文亦云若夫雲幻非幻契經多言之苟欲重宣其義非千百年莫能盡他時或造山中當敷座於巒光水影間爲上士說法未晚也宋學士文集卷第四十六芝園集卷第六
