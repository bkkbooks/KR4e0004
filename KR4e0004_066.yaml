body:
  text: 麗水黃府君墓銘元至正中天下方晏然麗水黃君與可獨憂以為大亂將起著書十篇言政治闕失甚悉曰能用吾言庶可救不然莫及矣會朝廷遣使者宣撫四方君即詣使者上之不聽歸臥于家後數年亂果作山東李國鳳經略江南見其書歎曰經濟器也致書辟之卒不起年八十以終君諱許與可其字上世多仕宋不大顯七世祖太學生師恩與兄讓財以義稱祖國華父昶年十七舉于鄉輔大學上舍生君蚤孤知自刻厲讀書攻舉子業試弗利棄不復視慨然慕聖賢之學習五經約知其説尤深於易旁通諸家言目别彚分咸得其統緒狀貌敦碩髯垂至膝下談辨古今事得失成敗如身預而目覩者部使者行縣執賓主禮請見竒其才數欲薦之謝不從惟推所學與其徒相講授性剛嚴逢人不能為卑辭媚色不慊其心者遇諸塗不正視然飬母恭敬溫和極能適其喜怒母卒廬墓左石壁之下遂别號石壁山人讀四書著類觀讀易著大意讀書詩著總斷他若制度文為之説咸有所述所為文通若干卷其於義理蔚如也未卒時自為挽詩謂將死既而病歎曰生而無愧吾榮也死而無虧吾寧也遂卒時至正壬寅四月二十八日後六年為吳元年丁未十一月某日葬于葉同君娶魏氏子男二人文彬文奎女一人適梁某屠出也孫男四人曰夢池夢庚夢裴庶孫夢池以能文辭名仕皇朝為秦府紀善階將仕郎女一人適湯住曾孫男四人曰綸維絅綍君沒􅌾巳久夢池持狀以書拜泣曰先祖既不得志於當時倘不圖其存於後世是生死不遇也烏乎其可余曰君雖不顯其身而有孫以昭楊之斯亦可謂有天道哉銘曰大亂之生其端孔微不有君子孰為蓍龜未形而言昏愚攸諱幸水未泮視如平地政闕教隳安能久存天塞其聰有言莫聞言之在豫從違者人人之方迷聖賢所難叶遺書不亡冡孫是紹載德昭聲是謂天道元故翰林待制柳先生私諡文肅議天地之運隂陽之化置大和於生物之地置大肅於成物之時蓋鬯逹茂遂之極非濟之以至嚴則盛者不堅實者不確而發育於春夏者終不足以有成故降之以霜露沍之以氷霰使昔之驕虛暴溢者一旦收斂縮閉折挫而無遺寓深愛於至畏之中萬物莫知其所由然故肅者天地之所以為教也惟人也亦然導之以柔惠誘之以慈良俾人見之而化者春之和也臨之以儼恪以摧其惰慢之氣持之以介正以格其邪僻之心不怒而威不言而厲者秋之肅也育才莫善於和成德莫善于肅嚴肅之君子其猶霜露之教乎元故翰林待制浦陽柳公先生負瓌雄絶特之才畜峻大剛方之德發而為文則沈雄而雅徑見之於行則端重而遂直怠色不形於面媚言不出於口所學以聖賢為師而不戾俗以為異所至以教化為重而不阿世以為同起為人師入造胄子周旋禮樂之署統教吳楚之區晚歲就徴入掌帝制其於闢異端扶倫紀黜淫祀排勢臣徑氣直辭可輔彛訓危言卓行可激貪懦逮其退而燕處凛然神居屹然山峙喜怒不著語默有恆可謂有德君子矣先生既卒而元亦亡時異典諲節惠之禮未舉門人咸喟歎而稱曰士有易名况先生嘗有位者乎惟先生之文天下靡不聞知以德配之於義為稱先生之德宏深博大兹不敢擬議然表見而易覩者非曰肅乎請遵古者私諡之例以文肅定諡如何衆咸曰允哉遂諡曰文肅云洪武十年春三月己卯朔前某官同縣門人宋某謹議風門洞碑神者變化不測之謂也凡不測之所必有神司之天之高且明不可測也地之廣且厚不可測也故天有帝地有祗嶽鎮海瀆其崇深幽險曖昧惚恍不可測也故皆有神為之主名山經所載五千三百七十山其神有龍身而馬首者有牛身而足肆二首而馬尾者有身如蛇鳥而豹尾虎齒者雖譎誕難徴然不可測之所其神亦變怪無常要不可以常理論也金華縣東南五十里有山曰風門山有石洞洞之户可入二人其內晦如􅃮人怖不敢往以石投之有聲礲礲然莫測其所底止風蓬然從中出襲人毛髮盡竪鄉民異之意其必有神歲時禱祠之多應因號之曰風門洞神久而神與人益習因降于巫言生四子皆為神民信之遂即洞西一里所西溪之原為祠以像神及所謂四子者其來蓋已久元至正丙午夏旱民皆走祠下爭舁其像以歸像至之鄉雨隨以至否則只尺不相及民益大驚不敢慢而琴山里浦二處之民事神尤謹惟恐失其意𥘉里浦民嘗有神次子像靈甚至是嵗琴山民迎禱之得雨而里浦不雨里浦人曰我神也奈何澤琴山而遺我乎遂欲廾去琴山民亦曰我神也神澤我我未有以報請緩之相持者頗久不能止則與之盟曰天雨則以神歸我已而里浦果雨歲以大穰乃還神於琴山於是琴山之民思報神惠復刻木為次子别像而請邑士王間碑神之休烈植之祠下明年琴山有秋而西溪螟為災西溪民疑新像與碑不利也怒沈像於水而碎其碑沈像之嵗西溪民大疫死者十七八神降言將盡殛西溪民民惶懼殺牲叩首請為像以贖辜隊具將樹碑而文巳毁琴山士愈慶乃來言其故請文刻之噫斯事亦異於常理矣然非果異也木石之怪久而不散且能為災警讋人况大山穹谷之靈乎其能出雲雨為休祥不可測度固其常也民祗奉之至於為祠設像亦事之必致耳夫豈不可哉或與之抗則過矣凖禮山川能澤物者則在所祭如神者澤兹邑之民而享其奉非濫也冝也為之民者烏不敬乎絲之以詩曰風門之山蔚穹窿羣峰左右翼且宗勢若萬驥環一龍帝恐地軸膠不通為鑿巨竅貫其胸復驅后祗叱豐隆乎鼓大塊噓雄風至今山竅如截筒有風冷然出其中下深不測上無窮幽怪宜為神所宫惟神受命于祝融身騎赤虬搖緑總四子夾馳乘四熊川君水伯扈以從或珥靑蛇持兩鏦或撼鼉鼓或震鏞欻隂倐陽互冥蒙喜則吐雲怒流虹山民駭贍增敬崇殺牲奠酒陳微衷願施霈澤回秋豐伐山築祠溪水東彩楹畫棟扉則彤縣民歲時來會同携孩扶耋如聚蜂蒲伏祼獻罔不恭有不恭者殃厥躬神為帝臣秉太公願恢至仁綏九農聖經國典祠有功功髙施博名必鴻鐫辭廟門玄碑穹著祥昭異警羣聾千秋萬祀為神雄柳氏宗譜序浦江之栁氏其先居河東宋髙宗南遷時有名鑄者扈從來江南遂家浦江之烏蜀山生一子瀚瀚生森彬森生監藴藴生崇德縣主簿輔之崇德生高郵令元贈泗州知州浦江縣男金髙郵生四子其次諱貫仕元為翰林待制以文章名天下門人私諡為文肅有子三人皆善士而六孫能守其學不墜殁後三十又七年而介孫穆書其始徙傳緒之詳列為譜圖持以示濂濂泣而歎曰天道於是可徴而文肅公有後矣濂少時幸執弟子役於公門公之為人其崇深閎博者固非淺見所能知至其端方直易厚重嚴慤怒氣不形於色惡聲不出諸口不知古之賢者復何如耳世之妄議恆謂賢者言論足以豫奪當世文章足以抉發至理所為與造物者爭強故天道尤忌之而多難為其後是殆不然天惟有所不能也故生賢者出而代之為之政以遂天之生為之教以輔天之成為之文章語言以宣天之道使善者勉而惡者懼賢者何負於天而謂天忌之哉其不然也明矣是論也吾意賢者之子孫而不能自力姑引天道以自恕而非其實也不然自文肅公觀之何其異於彼哉文肅公之傳今三世其諸孫盛矣固可以見天道而未足以盡報賢之意今諸孫皆有德積久必愈昌越十餘世將有傑然秀出者興其間然後可見天道之全也斯譜也君子由是觀天道焉穆之後人安可忽哉文説贈王生黼明道之謂文立教之謂文可以輔俗化民之謂文斯文也果誰之文也聖賢之文也非聖賢之文也聖賢之道充乎中著乎外形乎言不求其成文而文生焉者也不求其成文而文生焉者文之至也故文猶水與木然導川者不憂流之不延而恐其源之不深植木者不憂枝之不蕃而慮其本之弗培培其本深其源其延且蕃也孰禦聖賢未嘗學為文也沛然而發之卒然而書之而天下之學為文者莫能過焉以其為本昌為源博也彼人曰我學為文也吾必知其不能也夫文烏可以學為哉彼之以句讀順適為正訓詁難深為奇窮其力而為之至於死而後巳者使其能至焉亦技而巳矣况未必至乎聖賢非不學也學其大不學其細也窮乎天地之際察乎隂陽之妙逺求乎千載之上廣索乎四海之內無不知矣無不盡矣而不止乎此也及之於身以觀其誠飬之於心而欲其明參之於氣而致其平推之為道而驗其恆蓄之為德而俟其成德果成矣道果至矣視於其身儼乎其有威燁乎其有儀左禮而右樂圎規而方矩皆文也聽乎其言溫恭而不卑皎厲而不亢大綱而纎目中律而成章亦皆文也察乎其政其政莫非文也徴乎其家其家莫非文也夫如是又從而文之雖不求其文文其可掩乎此聖賢之文所以法則乎天下而教行乎後世也今之為文者則不然偽焉以弛其身眯焉以汨其心擾焉以乖其氣其道德蔑如也其言行棼如也家焉而倫理謬官焉而政教泯而欲攻乎虛辭以自附乎古多見其不察諸本而不思也文者果何繇而發乎發乎心也心烏在主乎身也身之不修而欲修其辭心之不和而欲和其聲是猶擊破缶而求合乎宫商吹折葦而兾同乎有虞氏之簫韶也決不可致矣曷為不思乎聖賢與我無異也聖賢之文若彼而我之文若是豈我心之不若乎氣之不若乎否也特心與氣失其飬耳聖賢之心浸灌乎道德涵泳乎仁義道德仁義積而氣因以充氣充欲其文之不昌不可遏也今之人不能然而欲其文之類乎聖賢亦不可得也嗚呼甚矣今之人之惑也聖賢之為學自心而身自身而家其為事亦多矣而未嘗敢先乎文今之人未睱及乎他自幼以至壯一惟文焉是學冝乎今之文勝於古之聖賢而終不及者豈無其故邪不浚其源而揚瀾不培其本而抽其枝弗至於稿且涸不止也然則何為而後可為文也蓋有方焉聖賢不可見矣聖賢之為人其道德仁義之説存乎書取而學焉不徒師其文而師其行不徒識諸心而徴諸身小則文一家化一鄉大則文𬒳乎四方漸漬生民賁及草木使人人改德而易行親親而尊尊宣之於簡册著之於無窮亦庶幾明道而立教輔俗而化民者乎嗚呼吾何由而見斯人於斯世也吾何為而不思夫聖賢之盛也虎林王生黼年甚少讀春秋而好為文問法於豫豫美其有志也以其大者語之太𥘉子碣宋之德深逺矣暨其衰微不振人能取其國而不能絶其子孫百餘年間顯官名士森布於天下當世稱多才者歸趙氏此豈人力乎非天曷能致此乎吾與浦江得太𥘉子諱良本字立道其裔出於周王元儼至太𥘉子十世矣太𥘉子六世祖士翮為處州兵馬鈴轄髙宗時來遷睦卒贈武節大夫武節之子武義即不玷復自睦徙浦江高祖武經郎善近曾祖武翊郎汝沮祖崇徯父必俊自祖以下始不仕皆以儒名至太𥘉子尤異焉太𥘉子少時好讀書從學于鄉先生吳貞文公萊通經史大略不喜專精為章句有得諸心輒見於行事其言纚然可聽其為家以禮取友必君子凡所友者言譽惡諷終身不變也妹歸樓氏喪夫二子楨楠幼樓氏族利其資欲以計奪分之楨訴官未報夭死長老有閔是婦子者為言于縣縣擇可託孤者皆曰莫賢於太𥘉子且其兄也可任縣籍其資月土田符太𥘉子主之太𥘉子視孤甥如子既長授以其籍絲髮無所私太𥘉子行方嚴有度柔仁者咸慕與親剛愎者惴憚不敢過其門翰林制待栁文肅公貫太𥘉子父友雅愛太𥘉子為人命從朱先生震亨遊朱先生老儒通醫術最嚴􅐧不許可庸俗士獨樂太𥘉子盡傳以其術太𥘉子謂吾欲及物而患無其道今乃得之遂發其術濟病者寠人來問藥與畢麾去不取賈監察御史聞太𥘉子精於醫薦于朝授以醫學正太𥘉子笑不就而太𥘉子之嫡亦且長於是太𥘉子謂曰兒善治而家吾將休矣遂闢一室以居研摩飬生之説朝夕粥一器不御醯鹽疏蓏盛暑不箑浴烈寒不附火踰三十年無懈意至老須髮不少白人望之以為真神仙人而太𥘉子亦若有所自得人莫測也洪武六年太𥘉子卒年七十先卒之一日坐床上謂人曰明日良吾將歸矣顧稚子耴筆與簡預書斂􅌾儀曰衣我楮衣屨我繩屨屨二量冝用弊者無華侈汙我至日晨興冠衣正坐啜一食斂乎瞑目撼之則逝矣二月十五日也三十日􅌾于華表山之原夫人戴氏先四年卒合葬焉太𥘉子嫡曰友享孫曰季升季昱曾孫曰同璿同圭同璣濂交太𥘉子翁季間最久法當銘銘曰人之將寐昏氣乘之形憊神疲不能自持矧惟死生世之大事誰能而忘談笑而去猗太𥘉子脫然天遊與道始終知命不憂曷由致斯其欲甚寡形且頓忘孰不可舍世之鄙夫雄傑一時疾病之臨鼠伏狐悲太𥘉之道匪神匪仙充乎兩間無後無前元故朱夫人戚氏墓銘夫人姓戚氏諱某字某婺金華人宋朝奉郎知袁州事如琥之曾孫從政郎廣德軍司法參軍宋祥之孫貞孝先生紹之女年若干歸義烏朱君元踰若干年喪其夫三子皆幼時宋亡為元盜起旁縣焚廬舍剽劫家單甚夫人艱勤悲悴事舅姑無怠容遇諸子有恩而嚴少子嘗戲取人一雞卵夫人怒曰是乃所當取耶笞而責還之稍長遣從許文懿公遊督教愈於夫在時粥叉釧資之俾無倦懈父老病殊殆迎以就養烹藥進食不寐者三月留十年乃終不以喪葬纍兄弟出私資為具女兄歸朱氏蚤死夫人育其三孤兒長兒亡又撫循其男女為擇名族嫁娶族女貧不能行者必以貨助窶家得子多溺死以倫理訓誘俾勿溺資以粟帛里中人德夫人如慈母夫人與娣姒和視娣娰子猶巳子御媵婢仁而威聞夫人謦咳咸肅畏譁者止惰者執業以俟久而知其可事多終身不忍去夫人春秋既高三子冠裳翼然須髮頒白升堂奉觴以次為壽諸婦孫男女數十人列侍左右歡愈竟日年八十時姻連賔客慶問者以千計夫人讀書史為人言皆有詞采可稱述夀八十有七猶康強不衰旦起盥櫛召子孫來前曰吾殆死矣就枕􅌻寐日晡遂卒至正丙戌五月九日也十二月某日遷朱君之柩合􅌾某里東山之原三子長曰震亨有學行人尊之曰丹溪先生次曰巽亨次曰蒙正皆善士孫男五人嗣衍嗣洪嗣紀嗣湜王汝孫女十人皆為巨室妻曾孫男二人文柏文椐女子三一適人其二在室夫人卒三十五年嗣紀以狀拜泣曰夫人於朱氏為賢母宜得銘余曰嘗聞丹溪言信然丹溪學可師法觀丹溪可知夫人賢觀夫人其子之賢益可徵余奚由讓銘曰詩稱賢知多本母氏史傳子輿三遷是紀仁猷義訓與性皆成導之為善川赴木升少閼其端愈長滋戾曷若夙教圖難於易有儒丹溪行介德方匪惟師承惟母之良祗率慈惠具有典則尊章歎咨遐邇遵式黃髮朱顔眉壽樂康環珮紳緌秩其盈堂善慶孔多澤則在後後人勿忘碩儒之母雲寓軒記閩士張君仲育學道龍虎山中扁其軒曰雲寓人聞而疑之曰異哉張君之名軒也夫蒼然而在上者太虛也寓乎太虛者雲也雲之為物一氣上升𥘉無定形當其始生也勃焉如煙鬱焉􅐻旋或搖曵如帶或縈結如蓋或超舉如鴻或變化如龍倏然而雨天下忽然而不見其迹雖雲亦不自知其聚散起滅為何如人之望之一息而萬狀惚恍而不可為像今張君乃欲取以寓其身不亦異乎或聞其言又疑之曰是知雲之起滅而不知外物之起滅者也知張君之寓身於雲而不知其寓意於雲者也彼世之紛紛紏紏朝崇而夕替驟性而歘還毁譽榮辱之出於人者其變亦多矣獨何異於雲乎人惟不知其然也故竭智畢力終身趨走汨沒於其間而不之止若夫知道之士則不然其視天下之物舉不足當其一顧至於身亦自視如委蛻其去留之際不繫繫於物與浮雲無異蓋其所得者深矣今張君獨知之而以雲寓名其軒庶幾達生者之所為彼烏足以知其意哉或者聞其言又疑之曰是求其外而不得其內泥於迹而不通其道者之論也夫有道者用於物而不蔽於物自恆人而觀雲則雲而巳自有道者而觀舒之周遍宇內斂之不見豪髮者非道邪澤潤四海而不以為功與天並存而不知其所終者非道邪衆人資其惠而不能名其德功成則退而不底滯於用者非道邪是則張君取雲以寓意者有在矣彼烏足以知之邪且天地之𥘉未嘗有雲之名也非特無其名也而亦未嘗有雲也非特無雲也而天地亦未始有也隂陽判而後有天地有天地而後雲生焉人見其巍且髙也從而以天名之見其卑且廣也從而以地名之見其絪緼無窮也從而以雲名之是則以天地名天地以雲名雲者亦巳寓矣况復取雲以名軒不猶寓之寓者乎而人又嘵嘵焉而辨之非惑邪吾聞龍虎山中多異人廣成子安期生之流時往來其間張君試見而問之果孰為雲邪孰為寓不寓邪必有以語張君矣又安知不疑吾言為妄邪三人者退張君識其言屬茟於豫請書之坐隅蘇平仲文集序漢武帝欲教霍去病兵法去病辭曰顧方略何如耳濂謂去病真能用兵者古今之勢不同山川風氣亦異而敵之制勝伺隙者常紛然雜出而無窮吾苟不能應之以變通之術而拘乎古之遺法其不敗覆也難哉為文何以異此古之為文者未嘗相師欎積于中攄之於外而自然成文其道明也其事核也引而伸之浩然而有餘豈必竊取辭語以為工哉自泰以下文莫盛於宋宋之文莫盛於蘇氏若文公之變化傀偉文忠公之雄邁奔放文定公之汪洋秀傑載籍以來不可多遇其𥘉亦奚睱追琢絺繪以為言乎卒至於斯極而不可掩者其所飬可知也近世道漓氣弱文之不振巳甚樂恣肆者失之駁而不醇好摹擬者拘於局而下暢合啄比聲不得稍自凌厲以震蕩人之耳目譬猶敝帚漏巵雖家畜而人有之其視魯弓郜䁀亦巳遠矣每讀三公之文未嘗不太息也蓋晚而得乎仲焉平仲文定公之裔孫少警敏絶倫誦説不勞而習中嵗太肆於文辭精博而不粗澀敷腴而不苛縟不求其似古人而未始不似也仕皇朝為國子學正近臣薦其才擢國史院編修官以瞶辭歸濂以翰林承旨致政將還天子命舉可以自代者即以平仲應詔既至復固辭上亦憫其誠特賜文綺遣之天下學士高平仲之文而莫不惜其以疾困也人有困於當時而貴於後世者亦有貴於當世而後乃無聞者其得失久近果何如哉孰知平仲之困乃所以成其至貴者乎濂重平仲最甚序論其文所以歎蘇氏三公之不可及而喜今世之復有斯人也平仲名伯衡其先居眉自文定公長子徽猷閣待制遲來知婺州遂家焉今為㜈之金華人去文定公十世矣題余廷心篆書後右四大蒃豳國忠宣公余闕為浦陽戴君叔能書至正九年公持使者節來鎮浙部濂偕叔能往見公奬厲甚至且各書齋扁為贈公去浙後江南大亂荆楚之域皆為偽漢陳友諒所據公時以淮南行省右丞分治安慶安慶前後皆盜區公獨守六年小大二百餘戰未嘗敗北不幸糧絶城陷公遂赴水死君子稱其大節與日月爭光信哉公文與詩皆超逸絶倫書亦淸徑與人相類然其忠義之氣可以懼亂賊淸惡厲天地因之以位君臣籍之以定斯豈細故雖所書不工猶當傳之萬世况能臻其妙者乎此𥿄所在定有神物呵護見者當如張中丞之詩假太尉之笏聳然起敬不可徒以翰墨視之公唐兀氏余闕其名也字廷心一字天心元統元年進士世居武威今為合肥人翰林學士金華宋某謹題宋學士文集卷第六十六芝園續集卷第六
