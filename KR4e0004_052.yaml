body:
  text: 杭州集慶教寺原璞法師璋公圓冢碑銘洪武元年夏六月二十七日杭之顯慈集慶教寺原璞法師滅度于京城大天界寺父母所生四十六年在菩提位中二十八夏其上首弟子住持圓覺一印升元克勤等以某年月日奉舍利靈骨歸窆于郡之龍井辨才塔南遵像法也後七年克勤奉詔往使日本上嘉其不辱命俾反𥘉服列官于朝濂時待罪禁林克勤數以法師塔銘為屬未幾克勤出鎮方嶽承宣山西瀕行又復諄諄言之繼而一印結集白業成書千餘言遣使者申言之于戲台衡之學佛法之大宗有若法師乃中流之舟楫觀化而往銘其可不造邪不造何以為訓邪法師諱士璋原璞其字也受生于海寧王氏伏犀貫頂目光炯炯射人自幼即决去羶葷弗御即御輒嘔逆不能勝唯日取天竺書習讀之鄰寺僧伽競曰此釋氏種也盍以乞我其父某怒曰吾兒非若倫也俾投城東太平興國傳法寺服五戒服其師某與翰林待制栁公貫遊公嘗憩止寺中親授法師儒家羣經為正句投敷繹㫖要法師聞之有如破竹數節之後皆迎刃而解年一十九始除須髮著僧伽梨尋禀持犯于某師時佛護宣覺憲慈匡道大師自四明延慶遷主武林上天竺觀音教寺大師諱本無字我庵佛海法師湛堂澄公之嫡子令譽隆洽一時名浮圖爭擁輪下法師將擔簦趨之忽夢遊寶所大乘菩薩教之互跪作禮口唱懴辭覺而思之乃普賢净行品偶文也法師以為祥徴佛一見果刮目相視凡天台大小部書以次環授之志慮專一飢則親狎釡􅑄以事烹飪一飽而止寒暑晝夜若不知切身佛護如三吳俾法師遷丈室之西以便飮食逮還見白煙一抹起其寢所則自㸑猶故也佛護隂鑒其勤以逺大期之佛護之門人曰天心瑩素髙亢不服人亦歆豔法師之行約共燈火磨切詰難極于毫絲餘子皆望風而畏稱為雙璧佛護既示寂東𬈑日公來𥙷其處大演摩訶止觀陶冶生徒夏中集讀選法師為之開科譬陟彼山顛阡陌溝遂雖詰曲鈎聮粲然辨數聽者心地朗融如飲甘露東𬈑性嚴毅而寡許可為之喜動顔色遂命其司賔繼升領懴摩事纓緌之士皆願與法師交聲華由此日重元至正十三年江南行宣政院命主州之棲真教寺棲真與南天竺演福鄰古稱教海而大用才公絶宗繼公二大三長老皆在焉法師猶以學之未足時往叩其所未至凡部味教觀之奧偏圓本迹之微疇昔有疑而未徹者二老無不條分縷析以喻之法師彈指嘆曰佛法教藏渺如煙海固非獨善偏長所䏻䆒使吾自畫而不加進其䏻免于專門寡陋乎二十年移住旌德教寺元季兵亂人多為自藏計法師竱心寺事不以世相為纍彰善疸惡風采為之改觀日納清净之衆共講諸經玄疏銷文入相洪纎弗遺才辨清發言與理冥往往推為義中之虎大方自是益斂祍矣皇明龍興當建元洪武之𥘉三宗以今寺主席尚虛白于李曹公文忠公時戍杭遂從所請法師提唱接引如旌德時有過無弗及焉未幾中書𬒳㫖俾浙水西五府浮屠道流共甓京城立善世院以統僧尼同將作監交董其役時方內附相視莫知所為法師獨出方略具有條序十萬之衆多倣之以集事不幸報緣已盡竟入涅槃緇素翕然嗟惜之法師器局瀟灑論議慷慨據直道行不樂俯徇流俗意氣吻合即出肺肝相示否則白眼怒視俊乂來依推食解衣以遇之不計蓋藏有無然精練世故勇于有為棲賢敝陋殿堂門序為之一新旌德籍劵久不白乃為鈎稽欺隱使有文可覆暴橫之徒束手待命始免捧漏沃焦之患每懲諸剎樹徒植黨而為怨尤之府誓不剃度弟子私建退休之室終身踐其言弗渝𥘉法師受經佛護歷職東𬈑佛護既殁或者微以為諷法師中天而螢爝雖多隱而弗見所以尊勝偉特絶非他宗所可及二十餘傳而其道愈大顯此濂于銘普福法師之塔不得不推原其始而盛言之也師諱弘濟字同舟一字天岸生姚氏族世為㑹稽餘姚人父某早忘師從同里寶積寺舜田滿公出家滿公其從父也師駿發絶倫或授法華經輒能記憶年十六受度為大僧日持四分律蹞步之間不敢違越繩尺巳而嘆曰戒固不可緩精教乘以資行解其又可後乎于是往鄞依半山全公讀天台之書久之悉通其玄義嘗修法華金光明淨土期懴聚精㑹神存誠不二􅺾佛于觀定中覩尊者卑以犀角如意自是談辨日增河懸泉湧而了無留礙當是時大山恢公尸松江之延慶越溪澄公主武林之演福法幢雙峙光熖鑠鑠照映大江之南皆延師分座說法而越溪愛師尤篤諸部疑難或有未易决者要其終始而折之師因義觀圓融觸目皆洞然矣泰定元年開法于萬夀圓覺寺浙天南東入其室者瞻力雄披精進鎧手挾弓一戰欲使魔軍降誰為嫡㣧躡狐踪伏犀貫腦氷剪瞳震旦羣書貯心胸一朝易轍𣑽夾攻日狎井竈劬厥躬白煙上出橫晴虹五章四釋昭厥朦事理即具靡弗同肯綮一中萬里融行解雙至方建功三鎮名山黑白從龍興致雲虎嘯風輪下瓶錫無地容法水灌頂障執通亭亭净植青芙蓉以此良師不易逢火風分散報緣終水月鏡像索還空作銘者濂碑則豐千百億劫鎮幽宫普福法師天岸濟公塔銘大雄氏五時說法至于法華方暢出世本懷自鳩摩羅什翻譯東傳震旦而諸師消釋者鮮得其樞要或主一音四相之談或徇四時六宗之教各號專門務相摩軋甚至南三而北七異言喧豗而莫之適從矣惟我天台尊者丕闡前修三觀之說約法華悟門弘演自行因果化他䏻所宗㫖白日正當中天而螢爝雖多隱而弗見所以尊勝偉特絶非他宗所可及二十餘傳而其道愈大顯此濂于銘普福法師之塔不得不推原其始而盛言之也師諱弘濟字同舟一字天岸生姚氏族世為㑹稽餘姚人父某早忘師從同里寶積寺舜田滿公出家滿公其從父也師駿發絶倫或授法華經輒能記憶年十六受度為大僧日持四分律蹞步之間不敢違越繩尺巳而嘆曰戒固不可緩精教乘以資行解其又可後乎于是往鄞依半山全公讀天台之書久之悉通其玄義嘗修法華金光明淨土期懴聚精㑹神存誠不二􅺾佛于觀定中覩尊者卑以犀角如意自是談辨日增河懸泉湧而了無留礙當是時大山恢公尸松江之延慶越溪澄公主武林之演福法幢雙峙光熖鑠鑠照映大江之南皆延師分座說法而越溪愛師尤篤諸部疑難或有未易决者要其終始而折之師因義觀圓融觸目皆洞然矣泰定元年開法于萬夀圓覺寺浙河左右傑偉之士奔走其室唯恐後之議者謂倡佛海之道以播芳䣭實自師始明年鹽官海岸崩民朝夕惴惴恐為魚鱉江浙行省右丞相脫歡甚憂之祈榮觀音大士于上天竺仍請師親履其地建水陸冥陽大㑹七日夜師冥心觀想取海沙詛之親帥其徒遍擲其處凡足跡所及岸為不崩人咸異之天曆元年升主顯慈集慶寺二寺皆杭之名剎師處之泊然集慶適當歲儉遂退處別室蘇人競欲致師以幣來聘住大德萬夀寺一座不移閲六寒暑而小子之有造者為多重紀至元之五年江南行宣政院選主㑹稽之圓通圎通久廢之餘鐘魚絶響師曰此父母邦也吾何避焉欣然東歸闢齊館乞糗粻攝授徒侣多至數百人寺為中興歷四載還隱寶集專修西方念佛三昧當㑹心處不知念而非念非念而念也至正七年夀八十矣錢唐諸名山以耆舊凋謝唯師一人巋然如魯之靈光又以大普福寺起之師堅卧不應門人法航進曰和上自為計固善矣其如斯道何師強赴之居亡何竟拂衣旋故丘開清鏡閣而深蟄焉因覽諸家所注首楞嚴經繁簡失當方將折衷其說為之疏解俄疾作召四衆至以唯心淨土惓惓為勉其中或未解師意師厲聲曰死生難死生難遽索觚翰書偈而寂十六年三月十日也後七日法孫至大清晏以陶器奉蛻質葬于里之峨眉山松花塢師之所自卜也世夀八十六僧臘七十一度弟子若琳永孚等三十六人得法上首出主伽藍者上竺道臻雍熙淨琛普光允中圎通有傳天宫明靜等五人其登門卒業未出世者尚多也師𣑽貌魁碩言吐清麗諸書一過目終身不忘故其本末兼該無所滲漏髙昌總統有般若空利者每謂學兼華𣑽出入經論世無能敵之用其國語與師共譯小止觀文彩煥發髙昌為之赧然自失鄉先逹韓莊節公性稱師才全學博無求于名不過以文寓意巴西鄧文肅公文原亦敬帥有道遺詩叙殷勤有相逢定性三生話之句其為名薦紳推許如此平生以流通教法為第一義建法華本部百十㑹茍有召者未嘗不應屢感天雨華之祥然于佛乘文事俱不偏廢出處語默則未如離乎止觀所著書有四教儀紀正若干卷天岸外集若干卷並刋生于世云夫傳㣧承宗學者多失其真何哉蓋騖于髙逺者有立異之見安于淺陋者無深探之志所以言彌近而彌逺理愈似而愈非唯頴悟之士洞察其微不敢以臆說參合于其間重徽疊照雖百世而無弊可也如師者講貫導化一以止觀為宗如印印泥不差毫髮可謂知尊者翼道之功而號善繼善述者矣豈非賢哉豈非賢哉某等持靈隱禪師元瀞狀來徴銘為之銘曰佛法正傳實推台衡大者鏗鍧萬鼓齊鳴彼傍宗者自謂孤撑以此較之蒼蠅之聲其一纍葉相仍其學孔熾時雨普沾春㬢流麗無物不萌有生咸遂神功妙化此焉為至其二猗歟上師義觀兩融尅期破障息念歸宗煌煌神公心與之通授以如意無礙弗攻其三浙河之西聮揚法幟分座談玄雲行兩施出坐道場歸者如肆為人天師攝伏庶類其四水蟲鼓禍海涯善崩凝神冥漻呪沙為兵變化倏忽風霆流雙足所躡凝如堅城其五此碩力故匪由外假妙經之宣集于蘭若天亦兩華􅌭紛而下有感而應理無愆者其六有聲隆然傾于邇遐遊戲文辭復衍而葩枝枝葉葉如寶蓮花不物于物以道為家其七般若光中無非妙相一鑑之明實含萬象生既不來死亦非往何必興嗟涉有情想其八師有墜言欲了王因唯心净土繫功宜勤日如懸鼓一念不分師雖逝矣言若親聞其九青山崔崔流泉在下廽景斂英絶斥邪窳萬松作花黃金滿塢設利斯藏永奠終古其十廣智全悟大禪師遷塔記廣智全悟大禪師笑隱欣公以元至正甲申五月二十四日示寂金陵龍翔集慶寺其年秋八月十又六日葬石頭城塔院之後岡黃文獻公為撰碑銘虞文靖公著行道記其述禪師行業甚備元季兵亂左右皆軍壘院與記俱廢唯銘獨存且地迫城濠土善崩勢將蝕壙其上首弟子宗泐心甚憂之方議改圖安隱寺僧法壽有地在城南撥雲山與康僧㑹古塔鄰即以歸焉巳而宗泐入奏其事上從之遂捐私資營建祠宇造石塔者三中塔瘞禪師全體傍附二竁一葬前住持覺元曇公遺衣一自為夀藏其東塔則歷代主僧西塔則清淨海衆皆整緻可經久而碑銘亦舁至宇下肇役于國朝洪武甲寅夏四月訖功于秋七月其徒禪師就窆則八月二日也惟事之成壞恆相尋于無窮當垂壞時每逢賢子孫保衛之庶幾可貽悠久所以古者壙有志非直紀述歲月或陵谷變更冀知氏名而薶之其防患亦深且長也今禪師之墓將沒于水宗泐為此懼卜吉兆而未遷其父子之情可謂至矣然又不忍遠離鑿穴而附之又推及于寺衆若尊若卑皆于西東乎塔之則仁之及物為何如哉或者謂釋氏之法絶斥形骸而漫不復顧省豈其然歟宗泐學兼儒釋深逹理事之不二故其為此實與禮經吻合後之人尚體其心而相持于無窮哉宗泐名也其字為季潭奉詔住大天界寺天界即龍翔今改賜兹額云題繼絶宗賦太璞詩後右鏡中憶佛叟所賦太璞詩一章贈其弟子具庵法師具庵久從叟受經傳三觀十乘之旨本末弗遺小大兼舉叟甚愛之故因具庵之名如玘而字曰大璞且為賦是詩惓惓以苦雕琢輕暗投為戒師弟子之間可謂恩之至義之盡者也然而教中諸師自縉雲至左溪以玄珠相付向晦冥息而巳正不欲其暗投况復雕之琢之以傷其璞哉叟之含意也亦深矣具庵嚴奉叟戒祕藏不露道成之後冲然而若虛然而玉氣燁燁上射斗牛終有不可掩者黑白同辭遂推具庵為台宗巨擘具庵雖欲自閟孰得而閟之哉嗚呼名者實之賔也實茂而名彰亦其理當然爾具庵裝詩成軸而徴濂識之于是乎書恭題御訓談士竒命名字義後國朝之制設中書舍人十餘員開署禁中專掌繕書誥勑書畢赴吏部主事遍詣中書省御史㙜大都督府親簽名氏然後頒行湘隂談士竒時官本部主司勳之科洪武十年春三月四日受事于中書舍人忽遇上御步輦而至問曰爾為進士竒跪對臣吏部主事也曰爾何名對曰士竒曰其義曰云何對曰臣聞之于師俊美之謂竒曰爾之入仕儒邪吏邪對曰習刀筆之吏爾考功監令郭傳在側奏曰士竒雖吏頗誠慤自持上因命奉御取筆以進書曰夫吏之為竒公以事法以當如律天下他所不及乃曰竒凡二十二言士竒頓首再拜舞蹈而退士竒既默識之歸紀于簡冊復用金書成卷私竊以謂蟣蝨之臣姓名上徹天聽兼之聖謨洋洋戒勑深至真所謂千載一時者矣乃來請記其事以著寵恩之所自臣濂聞之背私之謂公當理之謂法行法當理則不謬于是非處事無私則允合于公正苟能是雖律之天下人將有所不及始可謂之竒丈夫矣至哉聖人之言何其表裏之兼該本末之詳明也哉士竒宜晝夜欽承以竒自負精白一心盡瘁事國庶幾無愧寵靈之施者矣士竒尚勗之哉士竒通法律歷長沙衡陽二府史升湖廣按察司書吏擢虎賁左衛知事以轉今官云洪武十年冬十一月前具官臣金華宋濂謹訓題東陽二何君周禮義後世有恆言决科之文不足以行逺嗚呼豈其然哉顧其合道與否為何如耳昔吕成公之編文鑑其用意侵精密而張廷堅所著尚書義二篇特載入之與龍圖序諸文並傳四海之中但識字者皆知誦之苟謂其不䏻行逺可乎東陽何氏宋季多以科目發身內舍生夢申與其弟參知政事夢然所作周禮義各一首皆近道之言較之廷堅未見其不及也五世孫觀光唯恐失墜裝裭成卷求豫題而藏之亦可謂孝子慈孫者矣題何氏續書般若心經後泉府都事東陽何公福僧心崇內典特粉黃金為泥寫般若心經僅五十五字而公遽捐館舍後六十年而公之孫觀光始𥙷書為完經𥘉公既寫是經藏篋衍中時聞金石鏗鏘之聲家人亦不知為何祥觀光偶見之遂續其後于是其聲遂絶噫亦異哉稽之在昔宋慶曆中張文定公安道自禁林出守千滁入琅瑘僧舍見楞伽經二卷恍然悟其前身所書尚缺二卷安道遂從而𥙷之世號為二生經今都事公書之于前而觀光續之于後祖與孫同一氣所生者也雖曰異世而精神感通終出一軌較之二生不尤為至近者乎竊惟心經凡更三譯實大部般若之樞要首之以五藴繼之以十二處十八界因其根有利鈍故其說有廣略非夙有緣契莫能注意于斯觀光可謂善繼先志者矣濂又聞安道既見楞伽開卷未終夙障氷解從是有所悟入觀光他日于一言之下洞徹心源其造詣未必出于安道之下也觀光尚勗之哉淨慈寺新鑄銅鐘銘有序前翰林學士承㫖金華宋濂造皇明洪武十一年冬十有一月庚寅杭之淨慈報恩禪寺住持夷簡重冶鐘樓成復聚銅二萬斤鑄巨鐘懸之用物甚弘皆比丘安靜善立化斂所致夷簡請為銘與鐘相為無極銘曰南屏之山中有𣑽官新作巨鐘聲震太空一音普𬒳如佛住世乘戒圓融勝劣無滯人天龍鬼莫不能聞所聞既泯始顯本真昔觀世音由聞而證圓通三昧廓然正定矧其神功闔闢化衡攝其隂趣升為陽明聞聲而覺覺我元性我性本空執覺亦病今三大士成斯勝因以考以擊以警昏昕天光發舒化拂湧出我鐘熾然共宣妙法宋學士文集卷第五十二芝園後集卷第二
