  text: 宋學士文集卷第六鑾坡集卷第六即翰苑前集
  hash: sha256:eb7b2d16d867cc3540340c0899fee6327f87980446790d54fb3d40ffc48c5dcd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_006-1a}
body:
  text: 贈髙麗張尚書還國序皇上誕膺寶曆威服德懷萬邦黎獻共惟帝臣時則有若髙麗處于海東遣使者奉表稱臣貢獻方物上嘉其誠詔錫以璽書金寶仍為髙麗國王且錫以王者禮樂使祀宗廟山川百神于國中王感上恩之優渥也事大之禮弗懈益虔今年春復遣工部尚書張子溫來朝上御奉天殿是之侍儀使自殿中傳宣問王起居且勞子溫跋涉之故皇情謙抑在古所無即日錫燕于會同之館翌日東朝命侍臣饗之自時厥後中書樞府暨御史臺次苐而舉酒觴流行伎樂交作酣暢和適禮意有加焉夫以皇明天覆地載四夷君長孰不重譯來庭使節之往來琛賮之充牣無月無之而于海東之使禮遇尤厚者其故何邪他國之君長非不有其土地人民紐夷俗而蔑禮義騁其詐力惟日不足高麗乃箕子胥餘之邦上有常尊下有等衰實存先王之遺風焉政當以中夏視之未可以外國例言之也矧今聖天子在上雄兵百萬如雷如霆有抗之者無不殞滅然于守禮之國必寵綏而懷柔之唯恐有所不及而髙麗之君亦知天命所屬雖在數千里之外遙瞻天威僅同咫尺致使海東之民安于田里而弗知戈甲之警含哺而嬉鼓腹而遊無異承平之時是所謂君臣交盡其道者也不亦美歟抑豫聞宋之徐兢嘗往其國其國有禮部尚書金富軾者與其弟富轍博學善屬文而進趍詳雅競以綽有華風稱之今子溫之來也應對精明進退有度而文采粲然可觀似無愧于前二子者使不賢而能之乎因其臣之賢則其國君之賢益可信矣子溫之還大夫士多詩之豫因總修元史不暇與子溫接頗樂聞其事而為之序云送安南使臣杜舜卿序天眷有德戡㝎四方以靖安生民于是我皇帝龍飛淮右仗劍渡江天下豪傑雲合景從一鼓而江南平再鼓而汴洛㝎三鼓而齊魯秦晉以寧四鼓而幽燕遼朔悉入版圖曆數攸歸大統以正德威所及雷動風行浩浩蕩蕩覃及無際于時安南國王陳日煃鼓舞皇化遣使稱臣帝嘉其嚮慕之誠詔翰林侍讀學士臣張以寧典簿臣牛諒賜以印綬仍其舊封為王使者齎詔而行未及國而王薨其世子日熙繼志述事守禮惟謹遣陪臣少中大夫杜舜卿告哀于朝請嗣厥位帝帥羣臣素服受舜卿見于西苑之幄殿慰問良久皇情衋然傷悼退而嘆曰日煃率先內附朕意西南之民將有攸賴不知賢王何去朕之急也遂親御翰墨為文一通以祭之辭意悽惻讀者感動即日翰林編修官臣王濂吏部主事臣林唐臣奉命以往且詔世子王其國取前使者所護王印授之其德至渥也嗚呼皇帝君臨萬國如天日之照光無不被而王之父子能守臣節如江水之流勢無不東上以德而化下下以誠而事上君臣之遇合可謂千載一時者矣然而漢置九郡而交址居其一唐分嶺南為二道置節度立五管而安南亦隸焉地雖僻在炎徼涵濡中華聲教者巳久固能尊事大國確守臣職昭被宸眷克保其土地人民與我國家相為悠久播之方今傳之後世書之信史嘉名美績焜耀鏗鍧當非它國之君所可及不亦盛歟在昔之時君子有行役者必賦詩以閔其勤今舜卿崎嶇萬里而來中朝士大夫皆念其賢勞于其還也發為咏歌以道其事夫導宣上德而布之四方者史臣之事也濂雖不敏乃本諸作詩者之意而為之敘云送晉王府王傳李君思迪之官詩序成周之時王者必立師傳尊之曰公而不煩以政務廣厦細氊之上論道而巳自漢以來以王為一等之爵衆建宗親以為雄藩故亦設傳相輔之相則總其國政傳則導以德義歷代相因未之或改我聖天子臨御之三年思固泰山磐石之宗以奠安黎庶九子一孫同日封建為王所以敦展親之道壯維城之勢也于時晉王開國太原詔簡在廷之臣以吏部侍郎李君為之傳命既下為士者曰我知李君文且賢也翩翩乎修辭截截乎雅韻春花明而秋雲敷江濤雄而蛟龍鳴出其緒餘竟擢髙苐遂為甲午科名進士其膺是選也則宜在位者曰我聞李君賢且能也自來京師即膺寵眷居右史有獻替之功佐延安有撫綏之績巳而召入郎曹直躋法從試之也既屢而用之也彌篤其是選也則宜金華宋濂則曰是固然矣然而皇上之意以晉國表裏河山之固北控代朔南接關陜其地為形勝其民儉嗇而易化必得重厚誠慤君子輔王而安輯之此李君所以在選要不止前二者所云而巳也今王雖未出閣李君之行浚治其城隍經營其宫闕勞徠其黎庶然後迎王就國日以法言大訓陳于前俾王為哲王斯民為唐虞之民熙鴻名于無窮垂令德于不刋在此舉矣李君尚朂之哉濂也不敏待罪國史他日幸觀勳績之凝必執筆書之曰出鎮太原自晉王始其導王以德義底于成功自賢傳李君始不其韙歟李君尚朂之哉濂之有望于李君者若斯而巳李君名吉其字曰思迪濟南人庚戌京畿鄉闈紀録序昊天有成命皇明受之謂天下可以馬上得不可以馬上治于是大興文教寵卑四方乃洪武三年夏五月以科目選士詔內外之官胥此焉出閲三月畿甸之士將集試于京府禮部以聞皇帝御謹身殿召前御史中丞臣基今治書侍御史臣𥙿伯俾司去留之任而以翰林侍讀學士臣同弘文館學士臣稼起居注臣韶鳳尚寶丞臣潛國史臣濂佐其事各賜幣帛而勞遣之既受命不敢宿于家即相率詣試所精白一心以承休德先期一日夜漏下十刻始命題至次日黎明給之兵後學廢不敢求備于人其來試者一百三十有三在選者過半焉既撒棘僉謂遭逢盛際文運方開不可無紀述以示于後爰以諸執事及貢士之姓名輯成小録而俾濂序之濂惟天下弗靖者幾二十年干戈相尋曾無寧日今得以涵濡文化而囿于詩書禮樂之中者果誰之賜歟是知帝德廣𬒳其大難名不可以一言而盡也棫朴之詩有曰周王夀考遐不作人聖天子之造士者可謂至矣蒸民之詩有曰夙夜匪懈以事一人凡為士者尚思盡瘁報國以無負于科目哉是為序會試紀録題辭皇明設科倣古者六藝之教參以歷代遺制𣣔兼收文武而任之既詔天下三年一賔興其薦于州郡者凡丑百人五拔其一而授之以官猶以為未足復敕有司自壬子至甲寅三歲連貢歲棹三百人逮于乙卯始復舊制其恩至渥也先是京畿遵行鄉試中程式者七十二未及貢南宫上求治之切皆采用之至有拜監察御史者及是當會試之期若河南若陜西北平若山之西東若江西湖廣若浙江若廣之東西若福建其為行中書十有一俊秀咸集而髙句麗之士與焉右丞相臣廣洋左丞臣惟庸同禮部尚書臣凱臣訓文啓于東朝然後入奏于是詔臣凱與前侍講學士臣庭堅為主司而以侍讀學士臣同國子司業臣濂吏部員外郎臣本前貢士臣恂與考試事上召至內廷親諭以取舍之意臣凱等受命而出交相戒飭期有以副上旨遂議分經而考互相參㝎使無所憾乃進干主司主司遍觀而後次苐之猶慮滄海有遺珠之嘆卷之巳黜者復覆視而致謹焉晝盡其力夜向午燭影熒熒于簾几間不敢自寧士之就試者二百黜者僅八十人署名于榜用鼓吹導至中書揭而張焉甚盛典也書有之野無遺賢萬邦咸寧夫賢之在野無以自見多由進士升名于天府故昔人謂進士為將相科如以宋言之深沉有德如王旦面折廷爭如寇凖出當方面如張詠蓋不可以勝數至今科目倚之以為重與茲選掄者當思以前修自勗以忠貞佐國家而致黎民于變時雍之治庶于明體適用之學或無所愧不然則是録之行他日將有指其名而議之者矣可不慎歟可不慎歟使南稿序吏部考功主事林君元凱奉使安南還以使南稿一編授豫序序曰安南古交趾也漢唐以來其地皆入職方稱臣奉貢比內諸侯近代馭非其術徼其重貨責其躬朝蠻夷始敢為弗恭廷議憤之復有鑄金為人夜光為目之徵而蠻夷心亦離使者至其國多貪夫恱其金貝輒昧昧攫之遂致其褻侮燕于廡下君子每為之短氣方今聖天子御極之𥘉遣使往告即位其國主陳曰煃稽首上表遂仍封為安南王未至日煃卒嗣王日熙有請干朝復詔襲爵如𥘉妙柬廷臣充頒封使者僉謂元凱前進士學古明經尤長于辭令其出使為宜上召至奉天殿親加勞問而遣焉元凱即日上道越五月至其國布宣天子威德君臣恱服乃北面拜跪聽詔如藩臣禮將還日熙遣陪臣夜半持黃金為夀元凱峻却之陪臣舉手加額稱為賢使者而後去肆惟皇上宅居土中逺夷慕化者以其限山絶海使各安于境土而無所利之深合古帝王懷柔之道固當著之史牒垂憲萬世有若元凱之為使義正辭嚴足以聳動羣聽凡其國以利相啖之姦卒無所售亦可謂不辱君命者矣然豫聞序事之體志其大而舍其細故特取蠻夷叛服之由聖世明良之盛書之于首簡至于行役之勞倡酬之適山川土俗之詳已見詩中者可得而略也元凱臨漳人名唐臣今以時制所禁更為弼文辭爾雅吾友王內翰品評閩南人物謂元凱為巨擘云南征録序皇帝即位之二年春正月詔使者易濟往安南告以中夏革命萬邦底寧國王陳日煃遣陪臣同時敏奉表稱臣上嘉其事大有禮降璽書錫以王封仍須之金印敕翰林侍講學士張以寧及典簿牛諒將之以行未及境而日煃卒以寧乃護詔印留洱江上使諒往其國諭以朝廷所以來之意嗣君日熙復遣陪臣杜舜卿來告哀上素服御西苑之幄殿召舜卿入見慰問有加于是親御翰墨製祭文一通命翰林編修王廉充祭吊使既至其君臣出迎于郊議授受之禮往返數四不能決廉厲聲訶之乃奉御製文于綵輿迎入壽光殿别設日煃靈位于殿前使者南向而布宣之日熙率郡臣再拜俯伏以聽成禮而還此皆王化逺𬒳蠻夷之國無不駿奔受命而為之使者所以導宣德意使萬里之外天威咫尺非賢者善于辭令亦豈能之哉廉嘗與濂為文字交遂以所作歌詩曰南征録者授濂序昔吾夫子以誦詩三百能專對于四方然則詩固宜使者之所優為矧本乎人情該乎物理廉蓋學之有素矣發于中而形諸外者夫孰禦哉今觀其措辭和而弗流激而弗怒雅而不凡可謂能專對者非耶廉字熙陽括蒼人以能文辭稱所著迂論數十卷鉤考名物制度之異同千載不決之疑能以意決之詩特其一事爾廉發京師也以三年夏四月其還也以四年春二月上念其勞親擢為工部員外郎以階資躐等力辭不拜今改授澠池丞云剡源集序濂嘗學文于黃文獻公公于宋季辭章之士樂道之而弗巳者唯川源戴先生為然濓因日購先生之文絶不能以多致會有詔纂修元史命濂總裁其事事有闕遺者遂以上聞遣使訪于郡國竊以謂先生著作有關于勝國宜多乃屬使者入鄞遍求之鄞先生鄊國庶幾有得之者曽未幾何有司果以剡源集二十八卷來上濂始獲而盡覽焉因作而曰辭章至于宋季其敝甚久公卿大夫視應用為急俳諧以為體偶儷以為竒靦然自負其名髙稍上之則穿鑿經義􅕍栝聲律孳孳為譁世取寵之具又稍上之剽掠前修語録佐以方言纍十百而弗休且曰我將以明道奚文之為又稍上之騁宏博則精粗雜糅而略繩墨慕古奧則刪去語助之辭而不可以句顧𣣔矯弊而其敝尤滋私自念辭章在世如日月之麗乎天雖疾風暴雨動作無時將不能蔽蝕其精明獨怪夫當時之士奚為乏一人障其狂瀾邪復念豪傑之士何代云無苐區區所見孤陋故鮮能知之非誠然也及覽先生之文新而不刻清而不露如晴巒出雲姿態橫逸而連翩弗斷如通川縈紆十步九折而無直瀉怒奔之失嗚呼此非近于所謂豪傑之士邪蓋先生七歲即知攻文咸淳中入太學以三舍法升內舍生既而試禮部苐十人登進士乙科調教授建寧府及遷臨安教授行戶部掌故皆不就會宋亡為元執政者薦之起為信州教授先生年巳六十一矣尋遷婺州以疾辭後六年終𥘉先生既擢苐憫宋季辭章之陋即濯然自異久之四方人士爭相師法故至元大德問東南文章大家皆歸之先生無異辭先生之殁僅六十年已罕有知其名若字者殊可哀也濂在史局既命彚入儒學傳中及司業成均復將録其剡源集者歸以示諸人而先生之鄊有夏君閲來為國子正方與先生之孫資先謀刻于梓夏君遂以題辭為請且謂知先生之深者唯黃文獻公公既不可作子幸無讓于是忘其僣踰而為序之如此嗚呼豐城之劍荆山之玉縱埋沒泉壤為巳久神光上貫于霄漢者終弗能掩也其先生之謂乎先生諱表元字帥𥘉一字曽伯慶元奉化州人洪武四年秋八月望日金華後學宋濂謹序羅氏五老圖詩卷序明之慈溪羅氏出于唐觀察判官隱之子塞翁塞翁來攝縣令因家焉至宋有名明復及謙者相繼擢苐奉常蔚為書詩之家然而謙之後人多以耆夀稱其諱絅者年八十有四而終絅之子善鄉其卒之年如絅而不及者再期善卿娶某氏生五男子其一曰明逺年八十又三次二曰明傑其年如明逺而少二歲次三曰明德其年如明傑而少十又三歲次四曰明純次五曰明叔明純如明德而少二歲明叔如明純而少三歲惟此五老人者髙邁八帙卑踰六旬當風日和美之時婆娑中庭衣冠偉如珮玉鏘如于于而趍雍雍而語皓髮龎眉照耀後前華帨綵衣給事左右見者驚詫不曰此人世之上瑞則曰是國家之休貞嗟嘆慕豔若有所不及噫亦異哉昔者睢陽固嘗以五老聞矣其系非一姓其生非一門不過仕焉而止優遊鄊梓相與賦詩倡酬人猶以為異而傳之今羅氏則一姓也非直一姓又出一門焉豈帷一門又連苐若兄焉然兄弟之親有一從者有再從三從者有羣從者不能必其同也又同出于一父母焉揆于睢陽之所聞不為尤異者歟尤異之事可不彰而傳之歟藉曰睢陽之傳皆以爵顯而羅氏則隱約于布衣然爵祿有命不可以幸致顯弗顯固不當計也嗟夫人生至欲者莫踰于夀考書之九五福舉以為首詩人善頌雖不一而足尤以此為至碩焉羅氏一門獲之為多誠稀世之盛事厥今之竒逢是宜材士大夫播諸聲詩牘纍篇聮繩繩猶未巳也他日協諸律吕𬒳于管絃使其子若孫持觴為五老人夀非特為一時之美談觀風之使或采而上之則牛酒之寵勞絮帛之敷錫天光下照赫奕于東海之濵矣猗歟休哉顧序睢陽之事者錢公明逸也明逸之文雄故能傳諸久逺若豫荒靡不振之作將焉用之要不足為羅氏之重輕姑述其概于首簡以俟如明逸者刪焉羅氏五昆弟生子二十二人共㸑而食者五世至正𥘉以同居耆德旌其門豫嘗求其故絅孜孜樂善惠利及人者衆善卿生平不害物命其好施如其父歲儉則散粟給宗族無死徙之憂臨殁又聚借貸諸劵焚之然其所培植者逺矣張氏譜圖序張以字為氏出于晉之公族有解張者其字曰張侯故晉國世有張氏而譜家謂少昊弟五子揮為弓正賜姓為張則非也子孫蔓延分適他國而居清河為最盛清河之族布于大江之南其遷江隂者則不知始于何丗圖諜喪漫不可鈎考至月崖翁始入于譜翁諱睴喜聚四庫書多至充棟人有碩購者輒乞與之然博聞強記或以疑難質焉則曰是出于何書何篇從容而起抽架上所有拂塵而驗之無差爽者暉生翊翊生思明通天官之學兼以六物推人休祥宛然目擊閭右民有不平之鳴知思明直而無徇嘗徼而訴之思明出片言理詘者面頸發赤以去不敢譁然尤尚風義州有過客號材大夫者必主之雖至單乏不恤也市有病氓卧道周氣奄奄𣣔絶思明舁至于家召醫調護之愈乃遣東甌書生疫死逆旅中逆旅氏大怖不知所為計思明具衣冠藏之淺土其後竟得以喪歸三山梁先生與思明有連及死無為主後者煢妻與四女日夜相持以號思明為治葬事飲食其妻終身且悉配其女于士族君子稱之曰古有行義之士今惟吾張明德乎明德思明字也後為隂陽學正以終思明生端通毛氏詩用吕肅公之薦入仕四為校官遷浙西部使者掾丁元多故干戈相尋丞相康里公承制行事遂録其軍功超授江浙行樞密院都事端生宣宣能辭章入國朝以考禮𬒳徴來南京尋至史局與修元史上親書其名召至殿庭即日擢翰林國史院編修官人以為異恩云時子適長詞林宣數來請白宣之宗族遭兵亂之餘凋落殆盡所僅存者唯宣之祖若父暨宣兄弟為四人三世自相師友漸摩道義不敢違聖賢之明訓邇者先祖又傾背矣痛念世德弗昭家牒不修皆無以示逺爰輯為一書虛其首簡先生儻卑矜之冠以序文實宣之碩也嗚呼三代之前姓氏分而為二男子稱氏女子稱姓氏所以別貴賤姓所以别婚姻三代之後姓氏合而為一皆所以别婚姻而以地望明貴賤去古為益逺矣夫姓之與氏亦昭然易見者獨混淆而無辨况于遷轉之無常承傳之盛衰又焉能盡知其所自出哉此無他圖譜之局不設中正之簿狀不存亦巳久矣雖有智者出于其後將何徵之邪宜乎宣之痛心疾首而不能自已也豫竊聞之為善者必有後宣之家素以善行聞其後將益蕃歷數十世子孫繼修此譜者屢書不一則指月崖翁為江隂之𥘉祖造端之功豈非宣之所為歟舊譜厄于兵燹有不足恨也或者則曰宇文周之時嘗命叱羅氏為張姓今子何所據獨謂此出于晉之張乎曰叱羅之張稍盛于燕代之間而江南則無有也此非豫之私言也蓋亦有所受之也溧水端氏家牒序惟端氏出于孔門弟子子貢子貢衛人也名賜其姓端木後人以省文獨呼為端端氏之後有遷居汴者一在曹門一在酸棗門二族甚盛曹門之裔曰某府君者為里之蕭氏贅壻宋南渡初蕭氏通判升州府君與之俱寓居烏衣巷中升州即金陵為江南佳麗之地府君之弟四人亦來相依久之蕭遷居溧水之巉山巉山之側有地曰東村府君遂率諸弟㝎居焉大署其門曰曹門端木氏蓋以自表見也府君生某某生彥彥生進義校尉萬以材雄于鄊統縣兵為保障盜不敢犯民懷其德為之立祠進義生省省生夀皆以樂善聞壽生時中性最嗜學朝夕沈酣經史間發為辭章沛如也時中生安不幸早世安生邦逺宇國用幼孤能自振其家每以澤物為務借貸而不償者焚其劵如古之寬厚長者國用生復𥘉字以善精敏通疏有為治之才𥘉由樞府屬連佐大府遂以政事聞復𥘉生四子曰仁慷慨有竒氣亦早卒曰義能負荷家事弗貽親憂曰禮與智從金華許文懿公門人遊循循雅飭有士君子之行然而端氏為溧水大姓群從子弟居山東西前後者餘百家高墉飛甍環數里相接也至正壬辰兵燹方張咸蕩為灰燼雖譜牒之屬片簡隻削亦無存者復𥘉間與豫言愀然不自寧因叩其所記憶者府君父子之名已逸自彥而至復𥘉凡七傳皆係世嫡復𥘉因請豫備著于首篇而四弟之子若孫尚多行當搜采為圖以繼其後至于字某娶某氏壽幾何葬于某地亦以所聞附注其下其無由知者則聞之復𥘉之心可謂至矣昔者黃文節公譜其世系僅六七傳而止其上則闕而不書蓋不𣣔失傳信之義也復𥘉之事何其有合于文節公哉嗚呼譜諜重事也三世不修古者以為不孝奈何世人多忽之而弗講也有若復𥘉殆知本之士也哉陶氏家乘序贊台之黃岩有大姓曰陶氏其先自閩中徙永嘉復自永嘉來徙遂占藉為黃岩人其後族系日滋分而為二房曰赤山曰陶下陶夏之房有諱泰和者遷于湫水即今所謂陶陽也泰和字處溫宋皇祐間仕為處州裏溪都巡檢生子四人長曰埴徙于石塘次曰某字萬里仍居陶陽次曰昉裔絶不傳次曰武功大夫甄甄子三班借職詢别遷于武林蓋自巡檢府君至今祕書丞宗儒巳十有二世矣宗儒字漢生明經善屬文豫供奉詞林時溪生嘗為典籍以同官之故間來請曰惟萬里府君實為陶陽之祖譜尚失其名宗儒深竊憂之使今而不修則其世次或有不能言者矣于是遍求石塘陶陽一譜而一之各疏其名若字娶某氏生子某夀若干于其下無所考者則闕而不書存疑也武林之宗人久不相通其譜之存否不可復知行當采訪而鈔入焉既繕寫成帙滴露研朱而系絡之矣為序其首簡以示後之人夫自唐以前官有簿狀家有譜系凡有司選舉民俗昏聘則互相徵考所以明貴賤别親踈各有統紀不相淆亂也五季以來學失其傳雖嘗號簮紳家者論議非不閎博文辭非不富麗問其所自出則曰我無所于考也問其所承傳則曰曾祖巳上則莫能詳也嗚呼此無他其學之不講其書之不修雖有知者興于其後亦末如之何也巳宜乎以莊為嚴以慶為賀而無所分别也漢生乃能留意于斯鰓鰓焉而不少置其賢度越于諸人者不亦逺乎昔河南劉燁能存其譜自中書侍郎環雋至其身凡十有一世當時以為美談漢生今之所譜揆之于燁復加其一焉又惡知世之人不以美燁者美漢生哉漢生之後嗣尚思謹而續之斯可也豫既欣然為書其事復述為贊曰君子重本必譜其宗惇孝廣愛以協民衷氏族失官士無適從同姓塗人實感于中陶陽之裔家于海東閲世十一益衍而豐爰合親踈以昭異同朂尓後嗣載續載崇宋學士文集卷第六鑾坡集卷第六
