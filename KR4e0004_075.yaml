body:
  text: 長洲練氏義孰記皇上建大號之八年以為天下既巳安輯而化民善俗之道猶有未備乃下詔郡縣凡閭里皆啓孰立師守令以時程督之于是雖窮鄉陋壞莫不有學吳郡長洲縣之尹山民居繁庶習俗嗜利久不知教有司偶遺不舉大姓練塤自謂其父文逹由睦耒居嘗有志而未果今明詔如此而孰不時立恐非朝廷淑斯民意乃與弟箎謀夷土治材作堂三㨕閫以為講習之所旁為四室以供寢處庖湢延儒士髙平范煥為師俾里中子弟就學焉割田三十畝以食之始于洪武十一年正月越七月而後成具以其狀白于縣若郡郡許以為冝塤乃遣書來請文紀成績古之為治者其法雖詳然不越乎養與教而巳養失其道則民貧教失其道則民暴貧則流而為盜暴則去而為邪二者皆亂之始也是以先王重之二十五家之閭必有左右孰孰必有師師必以仕而老于家者為之故是時無不學之民無無孰之地無邪僻淫靡之俗刑罰置而不用亂亡無所自而起其後強大諸矦欲圖得志相與毀詩書六藝之籍使其教壞而不行然尚踰數百年而後絶一民不忍叛其上教之足以感人若是自秦以降無教者亡有教者存得其道者盛以延失其道者衰以促千載一軌也皇上奮然閔前代之失大設學舍以教之𣣔使海內之民皆沾沭禮義此與先王之心何異塤非有化民之貴乃能以淑其閭里是圖豈非君子哉君子之所為貴乎可法于世他日三吳巨族人人能竭奉上設教之意以化其閭巷之民閭巷之民皆知尚禮義耻犯法如成周之時蓋將始于兹乎姑刻其事以俟林氏詩序君子之言貴乎有本非特詩之謂也本乎仁義者期足貴也周之盛時凡遠國遐壤窮閭陋巷之民皆能為詩其詩皆由祖仁義可以為世法豈若後世學者資于口授指畫之淺哉先王道德之澤禮樂之教漸于心志而見于四體彂于言語而形于文章不自知其臻于盛美耳王澤既衰天下覩古昔作者之盛始意其文皆由學而後成于是窮日夜之力而竊擬之言愈工而理愈失力愈勞而意愈違體調雜出而古詩亡矣非才之不若古人也化之者不若而無其本也惟夫篤志之士不係于世之汙隆俗之衰盛獨能學古之道使仁義禮樂備于躬形諸文辭能近于古則君子多之然亦鮮矣至于今又鮮也求之嶺海之陬又鮮也而有林君汝文焉豈不尤可尚乎林君居潮之揭陽學詩三百篇以求先王政教之善治功之隆賢人君子性情之正道德之美以治其身其身醇如也以淑諸徒其徒蔚如也以形乎詩其詞粹如也林君居乎潮非有人諄諄然告之而能致力于此其所得不既深乎潮去京師六千里林君身不出州里而余知其名其所為不既至乎夫不資于口耳之淺而成文者文之善者也不資于爵位之顯而成名者名之髙者也余是以序而論之君名仕猷恭題御裂論語解二章後右解論語二章乃皇上所親製以賜翰林修撰臣孔克表者也𥘉上留心經籍以為經之不明傳注害之傳注之害在乎辭繁而旨深洪武六年乃詔克表及御史中丞臣劉基秦府紀善臣林溫取諸經要言析為若干類以恆言之使人皆得通其説而盡聖賢之旨意又慮一二儒臣末達注釋之凡乃手釋二章以賜克表俾取則而為之克表等承詔釋四書五經以上詔賜名曰羣經類要復裝裭所賜為卷以臣漁嘗與聞斯事請識其左方臣聞聖人之治天下養之以政而教之以道民非養不生非教不明三代以降未有兼之者也欽惟皇上以聖智之資治民之政一法乎古復慮經旨晦而人不知道乃釋諸經以教之其為後世慮者可謂詳且備矣克表適際盛時而預執筆承明詔豈非幸哉昔唐之盛時太宗有志于教化而孔氏曰潁達者實率諸儒為五經疏天下至今傳而誦之不廢今上開物牗民之心過于太宗而克表復為諸儒首孔氏可謂世不乏人矣他日是書之傳將與潁達之疏無異則夫聖謨之詳烏可不知所自哉臣故表而出之使後世知類要之書實本諸此也恭題御製勑符後皇上以上智之聖延攬英傑置之庶位知人善任誠近世所未有洪武十一年詔以大子正字臣桂彥良為晉王右傳且親御翰墨為文勑之識以謹身殿寶其子中書舍人愼裝潢成卷請臣題其後臣惟古明王之待重臣寵之以爵告之以言者有之矣然其時之文多述于代言之人求其出于親製者不可得也親製者如漢武之于吾丘壽王莊助者有之求其褒許隆至教告深切如此者不可得也臣與彥良同朝且同官東宫甚久彥良之為人淳篤和易有長者風當今廷臣鮮見其比上嘗以擬臣濂雖臣亦自以為不及也今勑文以善學孔孟稱之望以王佐之業傳所謂知臣莫若君其此之謂歟雖然今之職為相傅者凡數十人上未嘗以言為賜或賜以言未嘗以稱彥良者許之也彥良獨蒙聖知若是之至安可不思報乎具簿書綜獄訟他人能之者上不以責彥良亦非彥良之所以報上也必也輔王以德義迪王以忠孝使晉國有泰山之安賢王有明哲之譽而彥良之名亦相與流于千萬載此豈非上之望于彥良者歟彥良其可不勉矣正心堂銘有序元臨川監郡芒矦嘗名其燕息之堂曰正心矦既以此自治其身而化其民又推以教其子入國朝長子文縝司教成均思嗣矦德不墜復以堂銘為請三代盛時凡有國有家者皆不敢不學其學未嘗不本于心譬之操權衡以制輕重持規矩以裁方圓凡有形者皆不能違是以事功成而習俗美先王之道既息居乎位者不知學學者不知所本竊竊焉欲以私智小數勝之而民卒不可得而治前代之事如此者多矣而元為甚芒矦生乎其時獨能取聖賢為學之道治其身其天性之過人遠矣文縝又能推之以淑諸人非善繼志者哉銘曰昭哉聖則厥要甚寡正其一心以對天下一心之量天容地深炯若日月孰不照臨其不正時日月方晦昏亂迷惑靡有攸留誠其始萌乃正之功知不周物思誠曷從維知克誠維誠克正正以持身岡敢違令內以為家外以臨民明盡禮樂幽通鬼神世降道離人鮮由學徇其私心狙伺狼攫偉兹芒矦監于大邦揭聖明訓置諸崇堂崇堂嚴嚴筵几具有邦人君子陳説古道孰詭孰端曷從曷違折以片言灼如蓍龜豈徒其名又能允蹈既政以施亦身以教侃侃嗣子先人是程緝其休聲亶為難能勿謂巳遠千載一心聖炳然奚古奚今周節婦傳節婦姓趙氏名淑宋燕懿王之裔安㝎郡王令詪九世孫也令詪從髙宗渡江南居越諸暨遂為諸暨人父孟德有文學生二女節婦長且賢尤愛之授論語孝經列女傳皆能通其義年十八求冝壻者得祠邑周本恭歸焉始歸而姑卒既而舅及兄公姒氏亦相繼死兄公子顯宗尚幼節婦相夫筋喪治葬咸盡禮育顯宗如子歸十一年生三男宗善宗祚宗政宗政始生時天下亂夫嬰疾甚恐不起顧節婦曰今兵革四興嗣子單弱如此我死尓能自保乎節婦嚙指流血泣曰天在斯吾有不能保孤兒者天實誅之夫卒節婦年二十九髽跣號泣泣間含食哺諸兒不暫出户限明年國朝克諸暨與偽吳分邑拒戰兩兵交焚掠家資無纎毫存節婦抱兒及􅢃宗從一媵出走匿惟持田籍以行深山窮谷間飢餓顛踣削木膚采藜藿以食或問其艱勩勸之曰呱􅈱者何足恃奚為自苦耶節婦怒不與言剪鬢髮示之益自裁戢厲色峻辭使人莫敢近兵㝎而歸冨民侵至其田殆盡節婦持田籍與辦卒賴以完知州田若賦髙其行欲上其事于朝節婦曰冝然耳何足上聞力辭不願乃復其家節婦感泣日治麻縷為布帛以繼乏絶市詩書教諸子夜焚松脂于室坐諸子兩旁而口援之或怠睡首俯輒笞咄不少恕諸子皆凛然畏憚如嚴君覩其色變即惴恐莫敢舉目視及長遣從名師逰所友善士相過則喜為之置酒否則憤歎竟日節婦以兄公早沒惟顯宗存為之昏娶先于巳子羞服與諸子同人不知辨諸子遜弟皆有士行宗祚入為太學生以文行稱人咸謂節婦教所致云史官曰世之傳節婦者多貴殺身為難能至于守義不二者則略而遺之余甚惑焉鋒刃之威迫于後湯火在前有所不顧此人情所能勉至于困窮災變切身凍餒顛踣而不渝其志存人之孤非篤于禮義者其孰能之若周節婦是矣嗚呼此豈特賢于女婦而巳哉竹塢幽居詩序天台裴君日英其先故宦族好學多材能嘗挾其所長遊浙水東西士大夫爭慕與交性好竹所居種竹數百至它所必擇有竹家以舍扁其室曰竹䲧幽居留杭者甚久杭守聞其名薦于京師京師為天下大都會􅒡居櫛比求尺寸曠圡不可得􅊇旅家僅可俯仰無從得竹然裴君揭其故名不廢且求能言者咏歌之或疑裴君以為實與名常不相違今在京師非有園林之勝安在其有竹乎裴君曰不然有竹之竹不若無竹之竹之美也有竹之竹適在耳目無竹之竹適在乎心心之所得非若耳目之淺而易忘也吾方有竹時笙乎竹簫乎竹竽乎竹簟乎竹所見所聞日陳吾前者皆竹也然吾未嘗知行之為美也今棄之而居乎此雖不接乎耳目而心恆存焉思竹之聲以為有虞韶之遺音思竹之挺拔特立以為有壯夫偉士之節思竹之歷寒暑而不變以為類乎有道者其虛中不窒似仁其直遂似義其周于用似才其髙自鶱舉不屈儕類下似智取而比德焉無不美者然後知竹之不可得也吾心日存乎竹雖謂之有竹何過乎且古之聖賢後世慕之如神龍威鳳者以其不可見耳聖賢道德雖高使人得接而狎之其不見慢于恆人者鮮矣其與吾好竹之説何異乎余謂裴君蓋善于用物者非世俗玩物者比也記其言于詠歌之首使覽者知其人焉靜學齋記三代以下人物之傑然者諸葛孔明數人而已孔明事功著後世或儕之于伊呂固為少褒或又以孔明與管仲並稱則卑孔明矣以其事言之管仲輔桓公僅以齊霸孔明奉昭烈于艱難之中尺地一民皆奪之于群盜之手徒以大義震撼天下裂天下而三分之使孔明後死後主足輔復漢之奮疆致刑措之治于孔明何有哉在管仲未必能尓也以其本心論之管仲所陳于桓公而見于行事者皆微權小智雖假尊周為名其意則冨強其國而巳固君子所羞道也孔明當于戈鞍馬間所與其主論者必以德義為先其忠漢之心至于瞑目而後巳至今誦其言想其人真伊呂之亞乎史氏不知其本心謂孔明慕管仲樂毅之為人嗟乎孔明豈二子比哉孔明于聖賢之學蓋有聞矣其所謂學須靜也之言信古今之名言也止水之明風撓之則山嶽莫辨渾天之察人撓之則晝夜乖錯況方寸之心乎古聖賢之成勳業著道德于不朽者未有不由于靜者也蓋靜則敬敬則誠誠則明明則可以周庶物而窮萬事矣茍雜然汨其中偶然應乎事卒然措之于謀為其不至于謬亂者鮮哉孔明之學惟本乎此故其所為當世無及焉至今無有非焉者而又從效慕之區區霸術之徒固不能然也然世之慕古人者吾惑焉古人所以為聖賢者其道德著乎其言其才智形乎功業而存乎册書非徒以其名稱之美而已也苟欲效乎孔明于孔明之所學必無不學也于孔明之所能必無不能也而後可孔明之所學而有未至也孔明之所能而有未能也而曰學孔明何可哉于孔明且爾況乎學孔孟之學者而可徒誦其言乎哉近代之所學者浮于言而劣于行孔孟之言非特言而巳也雖措之行事亦然也學者不之察率視之為空言于是孔孟之道不如霸術之盛者久矣欲如孔明者安可得乎錢唐羅宗禮名其弦誦之室曰靜學庶幾慕孔明者余𣣔勉其成也辨孔明之為學與學孔明之道以告之送允師省母序人之生天賦之以性父母遺之以體德莫大焉故雖尊有天下不敢不事天德為聖賢不敢不事親以是身非我有實天與親卑之也夫吾之身既有所本則凡吾所為者豈我之能為哉實天與親之所命而我行之耳安可忘所自而不察乎古之少恩者雖如申韓商鄧著書排擊堯舜孔子之道且不敢遺其親况于佛氏以慈仁為教者乎故棄其親者非佛氏之意愚者失之耳是以佛氏有報恩之經稱父母恩甚至而昔之賢者若陳尊宿之流多能盡于子道近世之稱名浮屠者亦未有不孝其親者也今上𥘉立極猶恐愚者未察詔浮屠各拜其親定著為律于是習俗為之復美天台迪中允師浮屠之秀者違親而從師于外十餘年矣今歲至京師戚然念親不置將别其徒而歸省謁余求序以道其所𣣔行之意迪中通內典攻書而能詩其于事親固無庸告之然四方之學佛氏亦有久違其親者乎聞迪中之風而慕效者必名浮屠也徐夫人墓銘婦德以柔順為美然以之處常可也苟無堅凝之質事變臨之其能自立者鮮矣故持之以堅貞行之以柔順斯足以為賢婦偏一則有虐忘縱佚之失焉若徐夫人者其備婦德者乎夫人姓余氏衢之開化人年二十適邑士徐君安越十三年生四子徐君死舅姑皆老家莫為主資産頗傾蝕夫人日奉羞膳升堂問體安否退則率媵妾治絲縷麻枲歲時機杼之聲聞于鄰里衣服諸子務臻華好青褎綵襟少長嶷嶷然人不知其為孤年七八歲委之于學慈嚴兩至責其成績由是諸子咸為善士而家迄以成舅姑相繼壽終治喪葬以禮鄉人暴強者皆畏其能莫敢凌犯教女語婦必以夫人為則年七十有八以洪武九年九月七日卒于家二十三日葬于淸源里西村之原三男曰祿可詵一女適某孫男五人玄生林璣桂生以國子生擢給事中來請銘銘曰柔順為德斯婦常濟之堅貞家乃昌執偏或墮弱與強二者維全保無爽猗徐夫人婦之良喪夫秉志事尊章內外屹然禮義防躬親織紝靡怠荒家政浸修資大穰男治書詩女衣裳壽彌德備名譽彰孝孫刻銘闡幽光卓哉婦則垂無疆莆田黃府君墓銘莆田黃處士有良壻曰陳熙哀處士之早亡自狀其行千餘言赱三千里來京師請銘且曰處士事繼母孝庶弟出後從父從父愛其女盡以腴田嫁之處士患弟貧割以私田之半族人以田來鬻處士不忍取乞以直而歸之不能為生者加衣食焉以資多為閭里之正里中民買鹽于官及科繇不能庚者出私財代輸有受誣者諍之于縣庭得解乃已每歲首縣次民資力多寡㝎征斂之籍衆不能決處士彂一言皆稱平爭訟者來質是非告以理法舉酒飮之各謝而退藝田家歸粟入以小量遇凶歲則減賈以大量糶之𥘉郡南有僻壤盜常狙伺以剽行旅處士構廬棲僧夜則然燈逹曙盜散去復施貧死者棺三年至二百餘野無暴骨元末兵亂縣命處士帥兵扼險畫捕賊䇿陳于上民藉以安處士讀書有識待物恕以和其生也鄉人教其子俾取為法及其沒識之者無不弔弔者哭必哀至今言善人者稱焉熙又日處士之善蓋多其粗如此其使人感且化者不得而知亦不得而言也然其大者既不可言倘可言者又不得托文以傳焉則何以使為善者慕敢請余曰處士之行誠可傳矣余言之不文烏足以傳耶雖然不可辭也處士諱巳字景陽自唐屯田員外郎潛之子朂不仕王審知始自光徙莆在宋稱書詩之族髙祖審再以進士舉于鄉與從兄某州通判君亮皆有名曾祖文子以五經為州學諭祖來鄉貢進士父元壯母陳氏繼母鄭氏俱名族處士娶林氏無子先二十年卒再娶李氏生子男四人興祖振祖光祖麒祖女三人長壻即熙其二適吳某王某孫男五人隆庸洪某某處士𥘉為長女求壻富人爭𣣔問名不聽聞熙儒士許妻之或謂熙貧非偶處士曰我志決矣卒妻熙熙今為連江儒學教諭有文名君子又多處士善處其女也處士年四十二卒元至正十八年八月草九日後五年殯鳩山下草七年十月十二日權窆山之西今洪武十一年十二月草八日始克葬于白砂之原銘曰人不患財之弗贏而患善無可稱善集于身雖賤為恆垊歷千載而有聲身為鄙夫雖位居九卿溘既死而誰名維處士君足不出州里而化者衆身服乎韋布而德可程斯之謂死而如生上海夏君新壙銘國朝有天下忠吏之病細民公卿廷議以為吏它郡人與民情不孚又多蔽于黠胥宿豪民受其病固無怪莫若立巨室之見信于民者為長使主細民土田之稅而轉輸于官于是以巨室為糧長大者督糧萬石小者數千石制㝎而弊復生以法繩之卒莫能禁是時惟蘇之沈氏以奉法稱天子親召與語賜之酒食時減免其田賦名聞四方而上海有夏君者尤畏謹好禮繇賦皆先時而集不煩徵索愛恤細民銖兩無所妄取民咸恱而德之聮事者皆以為則其所為蓋無愧沈氏而名未若沈氏之顯者聞于上則勢隆而易彰欎于下則雖善而莫著此余因夏氏之請而欲揚之者也君諱宗顯字叔明自其曽祖參祖駟父祥皆居華亭君年十五六喪母以達禮聞服終請于父出從傳朱學數年學有名逰上海樂其土俗遂之長人鄉置田宅徙家以居既而家日殷富益敦行義兄及孀姊老而窶歲時奉粟帛養之葬其喪而恤其子撫異母弟有恩事外舅姑盡子壻禮聘名士為師故人子就學者飮食之旦則冠帶坐堂上子孫盛服入揖立兩序俯首聽教命君各授以事會食遣去至夕取古今事可為法戒者辨析講説勉以為善子孫恭謹願慤不敢嬉遨縱凶歲鄰里皆從君乞粟帛藥餌嫁娶喪災者取資焉故巨室之以長厚稱者必曰夏氏見君者慕其善與君逰者服其才聞君卒者莫不痛惜之也𥘉君年未四十即穿壙為冢於舍西北若干步及年六十有六而卒遂葬焉君之卒以洪武十二年正月二十一日葬以二月九日娶王氏二男曰應炎應霖三女長適趙志學次適趙以仁一在室孫男三人翟彪麟女三人曽孫男一曰綿綿銘曰周法既壞經界隳群氓相啖鼠與狸吏庸俗澆邈不知赤子顚踣吁可悲聖神造謨立治規俾大育小勢相維孰嚚戾法肆攘欺利猶在吻身巳離惟吳夏君懲衆非畏愼奉上仁以綏凶歲彂廩賙困飢帛寒藥疾棺載尸居家孝友此其推子姓願謹習禮儀鄉閭愛戴莫敢違為冨好仁曷能追天錫尓㣧當蕃滋嗟哉巨室宜相師𣣔考令德徵銘詩東陽貞節處士蔣府君墓銘府君諱玄字子晦别字若晦姓蔣氏𥘉周公庶子伯齡受封于蔣子孫氏其國在漢居杜陵者最著兖州刺史詡尤有名詡四世孫山亭鄉矦澄徙居義興之陽羡澄七世孫樞仕晉為吳郡太守復南徙台之仙居唐末五季之亂樞裔孫勛避地婺之東陽仕吳越錢氏為金紫光祿大夫檢校司空兼御史大夫遂家焉府君蓋其後也曽祖諱天廙宋紹㝎中入粟佐邉授迪功郎祖諱沐元南康路建昌縣主簿父諱吉相少俶儻負氣嘗事仁宗于東宫擢典用監知事出為襄陽路榖城縣尉以卒府君生于燕都兒時嶷嶷嶄聳不妄狎笑八齡就師讀書終日據案端坐未嘗旁顧其師竒之使察諸生怠肆者諸生畏憚斂戢莫敢譁年十六侍榖城之官杜門絶賔客不交晝夜攻學母夫人閔其勞節膏油不多與俟母寢以衣衾蔽牅而誦夜參半乃巳穀城涖官剛嚴府君因事進諫多所匡輔出遇其吏民恂恂退抑人不知其為尉子也既冠而歸時許文懿公謙以道德為學者師府君從而受其説識悟過人辨析精確內涵外飾日超月異先輩皆自謂不及然府君務見躬行以禮齊其家奉先祠謁拜祀奠取朱子所修儀文行之歲時率族人祭始遷祖墓祭畢序長幼列坐告之親睦之道屬之近者朔望必會貧者歲周以兩月之粟修建昌所創義孰延師儒教其子姓至於鄉人每歲冬至殺牲置酒會長老俊人行鄉飮禮府君為之講説嘉謨偉行使聽之曰為父兄子弟當如是鄉民莫不化服細民寠者貸以粟不取其贏待以炊者常數十家東陽多宋貴臣挨民藝其田者既入粟半復畝徵其絲民頗苦之府君倡其鄉人曰君子以養野人奈何厲之遂罷不徽人用是德府君稱其善不虛口遇事無大小皆立決不形于謀議所為輒出人意表𥘉延祐中惡少結邏卒誣平民為偽鈔破其家意府君儒生可侮以語撼之兾得賂乃止府君怒赱白大府逮惡少填于法害遂絶由是宿豪文吏搖手相戒不敢過其門府君益刻苦為條法使後嗣可守室廬械器皆預為數世計各極其精善人服其才而惜其不獲施于世也府君饒于資産脫去華靡習聚書萬卷致力其中著四書箋惑大學章句纂要田書述義通若干卷治平首䇿二卷學則二十卷韻原六十卷府君懲士習淪於夷俗獨製古冠衣服之揖讓步趨必以禮法人望之神情夷朗如逸民髙士及即之則雍然和與之語出仁入義愈久而愈無窮年四十有七以至正四年六月辛酉終于家學者私諡貞節先生十二月壬申葬縣南乘驄鄉御史里焉䲧之原娶葛氏宋參知政事端獻公洪之玄孫子男四人大同興宗嘉亨允升女四人適葛實李觀及東陽儒學教諭李思文其一蚤卒孫男十人昭暉旭曄升昱昺昻景旲孫女二人適許益亨鄭格曽孫男五人鈞鑾鎕鎮某女三人允升嘗從黃文獻公溍逰有文用薦者授慶元路儒學正早死而二次子亦繼卒獨大同存善承其家學以故國子祭酒許元狀來請銘余未壯時嘗拜府君于家多其言語儀貌儼然成德人也蓋今四十年而余亦老矣銘烏敢辭銘曰柏之丸丸或朽于山堂之巖巖或病于顛天産其良不需其完人愠以咨我恬以安探聖之源禓道之瀾不諧一時千載之傳叢桂樓記叢桂樓在杭天龍寺之左偏主僧大道禪師作之大道諱善平越漁浦人初受業寺之慶菴吉公尋升天目山問道于普應國師巳而來歸閔天龍之廢且久也慨然有興復之志時瓦礫荊棘散漫左右幾無所容足而大道槖無錙銖獨操一鉢日赱市中得食舁歸以食衆上得錢以易材木金石百用之具不四三年而佛殿三門兩廡皆成四方學徒之來者皆仰以食于是復以其餘作斯樓左丞周君伯琦以叢桂扁之既而大道以至正辛邜七月十一日示寂其徒奉全身瘞諸樓右而建塔其上且請同菴禪師述其故屬余以記斯樓樓乃大道憩息之所將以致其思焉而余獨感大道之立志堅而成功速也今夫有威力以使人者莫過乎有司有貨財以使人者莫過乎富室然其有所興作皆集衆謀役羣力而為之猶且磨以歲月多者數十年少者十餘年而後成今大纍然一僧非有貨財威力之可使人獨用口舌化導市井之民取其財與力以為巳用成宏偉勝大之功若易易焉者雖曰佛氏之教足以動人之信聽然非大道之有志不能也蓋人惟患無志有志矣患守之不堅有志而能堅事無不可為者況一寺乎余嘗病有志者之寡而于大道深有感焉嗚呼後之居斯樓者孰非大道之倫哉讀余言而思大道之為人則斯樓與斯寺不廢矣請記者曰圓淨圓如皆彬彬雅飭有志于禪觀者今居斯樓云王指揮像贊真人龍興山川降精杖劔來從莫非豪英維時王公實將家子乕吼鷹揚萬夫披靡成功錫爵遂鎮一方弛其武威佩玉冠裳何以觀之有燁其像益懋厥勛配古良將蘇都事伯夔像贊子由後平仲父才足以行志智足以成事也苟盡施于時必有大過于人而得位以行者僅出其一二也年齒之高林泉之趣皆公之所宜有固天報善人之所致也惟有子之甚賢以文鳴于治世足以繼絶學于前人楊休聞于不墜也此吾嘗私為之善誦長公之言擬公于朝氏之君成而知其無愧也景㝎諫疏序吾婺奮稱禮義之郡士生其間皆存氣節仗忠義而東陽為尤盛自宋中世以來以直道著稱朝列于國史者甚衆雖布衣下位之士不在諫諍之職而上封事者亦往往有之豈其人皆善為言論哉德澤之所漸濡師友之所講説風俗成于下而至于斯盛也余自少時好觀宋史凡吾郡聞人事有可稱者輒識之既而復歎士之幸獲見于史者如此不幸而遺軼不傳者蓋多有矣往年在翰林始得見東陽賈廷佐上高宗疏廷佐為桐廬主簿憤秦檜主和議紹興戊年上疏論之其辭甚切直而史不載至七世孫權出以示人世之士大夫為文以稱其忠廷佐之名始顯于天下廷佐之鄉人杜士賢在理宗時為武學生景㝎甲子秋因星變求言士賢上疏力攻賈似道誤國今年秋其曾孫實亦以示余其事與廷佐相類然士賢𥘉無一命之爵其言請黜退似道歷數其罪切直頗同于廷佐而實又能趨京師遍求賢薦紳文辭以白之且將刻梓以傳或非廷佐後人所能及余于是又歎忠義之士天雖抑之于當時天每扶植其子孫使昭其聲光于不朽是豈智力所及哉當似道擅權時威𦦨足以生死人士賢彂憤言之不至於殺身者毫髮間耳今似道之後不聞有為士者而人亦羞稱之士賢之子孫方守其遺業不墜而聞士賢之風者雖野人稚子皆嗟慕以為賢善惡之公昭明也如是則夫有志于忠義者尚何所憚而不為哉然則是疏之傳非特可輔史氏之闕為人臣者皆可以鑒矣士賢字希聖後中武科授武岡軍新寧縣簿尉遂攝其令轉綏寧旰𣅿兩縣令以終贈浩然子敘引交神明有道乎曰有無妄而巳矣然則所謂無妄者何也曰其中有物非思慮膠葛之可搖奪也非聲利沉酣之可變易也至虛而神與道合真放之無垠收之則存歷代以來恆有其人也今之近于此者其唯吾浩然子乎浩然子與余同姓其名為宗真遂以其稱浩然者為之字學道于京城報恩光孝觀得靈寶法而能知鬼神之情狀嗣天師知其賢號為體玄妙道純素法師提點觀事會朝天宫虛席中書以為言上召見奉天殿命太官賜饌俾之住持時洪武五年秋七月也又明年正月七日儀曹奉常同傳旨諭之曰凡有事郊社及山川百神當令宗真帥其徒十人前期􅌊芳香潔豆籩以俟臨事之日仍令宗真𬒳法服與祭浩然子拜命惟謹蓋以其精潔而于敬恭明神為冝浩然子由是簡在上心屢蒙召對且賜白玉真仙像二十餘軀以鎮山中龍光赫奕光動林谷采真之士無不歆豔之余嘗見浩然子于冶城山風度凝簡執謙而有容淡然無所纍其心所謂其中有物不為思慮聲利之所惑者誠近之此所以遭逢盛際而眷遇有加焉然而忠君尊上臣子之職也浩然子益冝振祓精明傾竭誠慤以頌禱國祚于無疆非特敬恭明神而巳誠如是雖身居方外而乃心王室𬒳法服以與朝紳之列非僥偉也實宜也浩然子其尚朂之洪武六年冬十有一月金華宋某序桑仁卿傳桑惠字仁卿婺之武義人其先居麗水桑溪南渡後有景昭者始遷婺歷四世皆不墜書詩仁卿幼喪父獨奉母居不能與人浮沉介然自守遇人則翼然恭未嘗往叩富兒門唯日夕訓諸子弟雞𥘉號輒呼起懸燈誦書食時使從師或值雨淖親持蓋候之還人笑其愚勸曰子貧若是甑將生塵矣何不學他技藝朝出門暮可即得錢讀書固佳其效乃如輔風耳仁卿笑曰信如子言吾家學將絶於吾乎矣寧餓而死不能從也乃召其子以時謂曰此妄人耳其愼母聽吾之貧由天于讀書何預哉策勵比前為尤急及見以時明經能文辭鄉校迎為學者師仁卿撫几自慶曰吾將有以見祖宗地下矣仁卿無所于食質田于里翁已而失其劵乃以計紿仁卿至家使重書之或履其跗曰愼勿言翁劵失矣仁卿歎曰吾實得錢言猶在耳而因失劵負之為計固得如內愧何一里譁然稱曰桑仁卿其誠慤人哉未幾卒貧不能斂手足鄉人惜其賢裒錢以葬仁卿娶同縣人項寄瑗其賢絶仁卿固安貧終日樵蘇不㸑項無纎介見于容色淡然能相歡凍餒日不自免聞有佳書必掇所織布帛貿之使讀自時厥後以時以賢良徵主袁分宜之簿州里槜酒將來賀曰仁卿夫婦不負教子今得官歸矣項曰得官不足榮能不負官斯為榮耳以時在分宜數督運萬里外兢兢自持無所遺失再轉為溫州判官遣候人迎養將及門而卒今以三轉為夔州府通判陛至某郎益用政事聞于時論者謂父母之善教云贊曰子弟不患無俊良非父母竭力教之終不能有成也有如仁卿忍貧教子至樵蘇不㸑一不變其志淡如也卒能奮彂有耀于前人則吾所謂父母不力教子子未必有成誰不謂然因作小傳以為世勸焉送王明府之官序我國家重于民社之寄雖遐州僻壤必慎選守令以撫摩其人民蘇息其雕瘵而擢用人才之道必以常從事于朝廷省部者為先以其歷練之精而深達于民情政體也會稽王君元凱受命出宰夔之開縣告行于余徴言為贈兩川入哉版圖未久其民新脫于鋒鏑之餘自非善于承流宣化者未易以􅉼煦生息之也廟堂之議以為元凱久以文墨議論贊佐春官儀文禮法諳集有素其為人持身砥行又端謹清修克稱兹選故有是命余聞昔子遊氏之為武城也以禮樂為教而聖人喜之此千載牧民之良法而近世以來為縣者率以法度束縛而操切之故禮教之澤不下流于民而醇風美俗罕或見之今元凱之往不惟使其百里之內政平訟理而安於田里其所以化導全安之者要必有其道矣他日觀風之使有言于朝者曰西蜀之地有萬家之邑其令之治先政教而後刑罰其民之俗好辭讓而恥鬪爭以故絃歌比屋而囹圄空虛雖在數千里之外而藹然不異乎邦畿之中是冝旌褒其縣大夫之能以為在職者勸若然必元凱之所治也余在禮部常知元凱之為人今守職詞林秉筆史館晨入夜歸無敢暇逸故于元凱之請不及綴緝文辭為贈而姑道其所期望者如此朂之元凱其勿以余言為簡也是為序洪武六年九月既望金華宋某序
