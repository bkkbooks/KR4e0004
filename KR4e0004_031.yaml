body:
  text: 楊氏家傳楊端其先太原人仕越之㑹稽遂為其郡望族後寓家亰兆唐末南詔叛陷播州久弗能平僖宗乾符三年下詔募驍勇士將兵討之端夢神人告曰爾亟往此功名機也端與舅氏謝將軍詣長安上疏請行上慰而遣之行次蜀蠻諜知之斂退者半乃詣瀘州合江徑入白錦軍髙遙山據險立寨結土豪臾蔣黃三氏為久駐計蠻出冦端出竒兵擊之大敗尋納欵結盟而退唐祚移于後梁端感憤發疾而卒子孫遂家于播宋贈太師太師生牧南既嗣世痛父業未成九溪十洞猶未服日夜憂憤其子部射􅊇其志選練將卒伐羅閩時閩附南詔部射深入閩匿將士絶其後部射力戰死其子三公抱父尸不去閩執之以歸牧南卒三公幽于閩半載㑹阿永蠻酋長黑長與閩有連語之曰殺其父而囚其子人弗為也盍歸諸閩不答黑定怒夜以一牝馬竊載與俱歸且發兵納三公界上三公遣衛兵檄召謝巡撿謝帥夷獠􅊇之㑹濟江夷獠匆懷異志引舟岸北呼謝曰為我語若主當免我科賦否則吾不以舟濟三公怒瞋目視舟噓者三舟奔而前三公遂涉夷獠爭持牛釃酒為謝三公剪帛繫獠頸吸水噀之帛㦯蛇形獠伏地哀祈誓輸賦不敢反三公復噀之帛如初三公生二子寶實寶當立自以才不逮讓與實實字真卿聞宋太祖受命即欲遣使者入貢㑹小火楊及新添族二部作亂實同謝巡檢討之夜薄賊營盡殱其衆實傷流矢病創而卒實生昭字子眀既嗣世二弟先蟻各擁強兵先據白錦東遵義軍號下州蟻據白錦南近邑號揚州昭不能制曽未幾何蟻稱南衙將軍舉兵攻先且外結閩兵為助謝巡檢子都統謂昭之子貴遷曰蟻召仇讎而賊同氣罪不容于死盍討之遂大發兵設三覆于髙遙山要其歸而擊之閩大潰赴水死者數明而終官至武經郎生十有三子唯軫軾最良軫字德輿美髯長身狀貌瓌偉剛果勇决人服其能嘗病舊堡隘陋樂堡北二十里穆家川山水之佳徙治之是為湘江軫初無嗣鞠軾子粲為後晚生三子勳䁀以粲賢遂不易初議尤愛軾尋授軾堡政獨築室萬泉以終軫畜一乕馴服左右常駕以出遊人異之官至秉義郎軾字德載沉靜寬厚孝友無間言遇軫諸子不趐若巳出初先據下州世治兵相攻凡七傳至煥軫之幕官猶泳從容白曰骨肉相殘夷狄之俗也上下楊其初由一人而分干戈日夜相尋孰若講信修睦復兄弟之親乎軾欣然曰吾有志久矣子為我往說之泳至下州煥頓䫙受命遂盟而還軾留意藝文蜀士來依者愈衆結廬割田使安食之由是蠻荒子弟多讀書攻文土俗為之大變軾官至成忠郎纍贈武節郎粲字文卿小字伯強幼授大學即掩卷嘆曰此非一部行程曆乎必涉歷之至乃可爾長好鼓琴投壺粲母弟輝有寵于父幾奪其位粲亦欲以位讓之因猶泳言得不廢開禧三年蜀帥吳曦叛粲帥師赴援㑹曦誅不果貢職馬三百黃白金巨萬且請因曦誅大舉北伐以雪光耻上優詔答焉嘉定十二年復輸馬三百于蜀帥蜀帥以聞上益嘉之南􅊭夷穆永忠盜據公家田粲曰穆不道犯王略吾為藩臣可緩其死耶帥衆討平之斬永忠歸其田南平閩酋偉桂弒父自立粲聲罪致討敗其衆于滇池斬首數千級闢地七百里獲羊牛鎧仗各以千計煥違盟鈔掠界上粲遣兵誅之歸煥所掠地賦于珍州下楊平邉患遂熄粲性孝友安儉素治政寬簡民便之復大修先廟建學飬士作家訓十條曰盡臣莭隆孝道守箕裘保疆土從儉約辨賢佞務平恕公好惡去奢華謹刑罰論者多之楊氏居播十三傳至粲始大官終武翼大夫纍贈右武大夫吉州刺史左衛大將軍忠州防禦使賜廟忠烈封威毅侯生三子價佐佑價字善父英偉沈毅自少不群父沒以郡政卑其子文專志飬母端平中北兵犯蜀圍青野原價曰此主憂臣辱時也其可後乎乃移檄蜀閫請自效制置使趙彥訥以聞詔許之馳馬渡劒帥家世自贍之兵五千戍蜀口圍解價功居多詔授雄威軍都統制未幾復白錦堡為播州文領郡價統兵如故蜀警又急詔價以雄威軍戌䕫峽價分署所部屯瀘渝間遣竒兵擊東遂以捷多遷武功大夫閣門宣贊舍人嘉熙𥘉制置使彭大雅鎮渝􅊾價赴援價督萬兵屯江南通蜀聲勢北兵不敢犯孟珙宣撫荆湘余玠制置西蜀皆倚價為重上屢下詔褒美之價指天誓曰所不盡忠莭以報上者有如皎日一日大飯羣僧價趺坐誦佛書數語而終價好學善屬文先是設科取士未及播價請于朝而歲貢士三人云贈開府儀同三司威武寧武忠正軍莭度使賜廟忠顯封威靈英烈侯文字全斌紹定中北兵始入劍文日閲士卒為備蜀中避地者多歸之嘉熙中北兵窺江彭大雅復來徴師價命裨將趙暹師萬兵赴戰石洞峽擊破之以功轉武德郎閣門祗候父卒詔起文視事進武功大夫閣門宣贊舍人文移書余玠曰比年非師如蹈無人之境者由不能禦敵于門戶故也曷移鎮利閬間經理三關為久駐謀此上計也今縱未能大舉擇諸路要險建城濠以為根柢此中計也下則保江自守縱敵去來耳况西畨部落巳為北所誘勢必撓雪外以圖雲南由雲南以并吞蠻部闞雍廣窺沅靖則後門斡腹深可憂也玠偉其論竟徇中計後果如文言淳祐八年西帥俞興西征發兵五千人與俱大戰者三皆捷遷左衛大將軍余玠北伐漢中文命將趙寅㑹兵渝上三次戰又捷十二年北兵圍漠嘉文使總𬋩田萬率兵五千間道赴之夜濟嘉江屯萬山必勝二堡萬以徑弩射之敵不能支遂却加右武大夫寶祐二年北兵由烏蒙渡馬湖入宣化宣撫使李曽伯來徴師文遣弟大聲統兵行大小九戰又捷轉左武大夫五年北兵循雲南將入播文馳奏詔莭度使吕文德偕文入閩諭羣酋內屬大酋勃先領衆降六年拜親衛大夫以解漁城圍剪烏江寇功加忠州團練使景定間劉雄飛夏貴守蜀復江安州餉禮義山戰懸壺平而播兵為多進中亮大夫和州防禦使播州沿邉安撫使爵播川伯食邑七百戶詔雄威軍加御前二字以寵異之歲賜鹽帛給邉用著為令文留心文治建孔子廟以勵國民民從其化卒于咸淳元年贈金州觀察使元贈榮祿大夫同知樞密院事柱國追封播國公諡崇德生一子邦憲字仲武倜儻有大莭好書史善騎射始冠授成忠郎雄威軍副都統通管州事二年閩大舉入冦破立邊諸戍邦憲出師拒之閩敗却尋潜渡烏江步騎猝至民大駭邦憲部署諸將令曰必剪此冦而後朝食蠻聞急引退甫涉江邦憲追擊大敗閩衆于中流斬首千級擒其酋羅汝歸進武莭大夫沿邉安撫使閩又悉兵冦下邑邦憲復敗之獲酋長阿鮓歷舉其罪狀而釋之閩自是懼不復出拜利州觀察使遷左金吾衛上將軍安逺軍承宣使牙牌節度使至元十二年宋平元世祖遣使者詔邦憲內附邦憲捧詔三日哭奉表以播州珍州南平軍三州之地降十五年入朝詔􅊞守如故拜龍乕衛上將軍侍衛親軍都指揮使紹慶珍州南􅊭等處沿邉宣撫使播州管內安撫使播下邑黃平壤近于荆地荆之戍將欲奪而南邦憲發其姦請復歸黃平十八年升宣慰使十九年閩叛詔發諸道兵進討師道播而入邦憲給饋餉命將卒與之俱乃夷之纍贈推忠效順功臣銀青榮祿大夫平章政事柱國追封播國公諡惠敏生一子漢英字熙載五齡而孤二十三年其母貞順夫人田氏挈之朝京師世祖摩其頂熟視良久諭宰臣曰是兒真國器也冝以父爵錫之賜名賽因不花授金乕符龍乕衛上將軍紹慶珍州南平等處沿邉宣慰使播州軍民安撫使賜金繒弓矢鞍勒遣歸二十四年族黨搆亂殺貞順夫人漢英衰經入奏上詔捕賊至益州戮以徇二十七年詔郡縣上計播之鄰境拒命漢英即括戶口租稅籍進世祖大恱加播州等處管軍萬戶二十八年漢英入朝奏罷順元宣慰司升播州安撫司為宣撫司授漢英軍民宣撫使㑹羅甸宣慰使斡羅思誘播下邑黃平諸寨酋詐為新闢境土以獻漢英奏復之斡羅思恚不勝誣言舊有雄威忠勝二軍思播匿弗奏請籍征交州漢英抗言納土時巳􅊢别籍矣御史臺審核上之詔寢其事俄拜漢英侍衛親軍都指揮使成宗即位漢英入朝者三大德三年詔錫漢英世守其土漢英奏改南詔驛道分定雲以東地􅊢播西􅊢新部减郡縣冗貟去屯丁糧三之一民大便之二年部蠻桑柘亂湖廣行省議用兵漢英言賊勢方盛冝招諭之不聽兵出久無功竟以漢英議始相繼降五年右丞劉深討南詔道出播漢英輦運軍食無乏六年閩婦蛇莭宋隆濟叛詔合湖廣四川二省兵征之命漢英以民兵從甫出師卒遇賊漢英力戰大軍繼之降阿苴拔乍籠賊復合拒竟大敗縛蛇莭斬隆濟阿女而乎之以功進資德大夫賜玉帶金鞍弧矢仁宗立顧禮益厚進勳上護軍增賜金帛延祐四年黃平南蠻蘆奔叛新部黎魯亦嘯劫聚亂詔漢英宣撫之二賊降置戍而還漢英為政急教化大治泮宫南北士來歸者衆皆量才用之喜讀濂洛書為詩文尚體要著明哲要覽九十卷桃溪內外集六十四卷賜推誠秉義功臣銀青榮祿大夫平章政事上柱國追封播國公諡忠宣其妻田氏亦善讀書人以為難能無子以弟播州招討安撫使如祖之子嘉貞嗣嘉貞至治二年來朝英宗賜名延禮不花纍官資德大夫湖廣行省左丞沿邉宣慰宣撫使嘉貞卒子資德大夫播州軍民宣撫宣慰都指揮使忠彥嗣忠彥卒子資德大夫紹慶珍州南平等處沿邉宣慰使播州軍民安撫使侍衛親軍都指揮使元䁀嗣元鼎卒無子田氏以如祖季子嘉議大夫湖廣行省參知政事播州沿邉溪洞招討使城之子鏗嗣入我國朝鏗遣使內附授以播州宣慰使實洪武𥘉年云史官曰播州本秦夜郎且蘭西南隅故地夷獠錯居時出為中國患楊端藉唐之威靈帥師深入遂據其土五傳至昭㣧子中絶而貴遷以同姓來為之後又三傳至文廣威讋德懷而群蠻稽首聽命益有光于前人又三傳至選留意禮文尊賢下士荒服子弟皆知向學民風為之一變又二傳至粲封疆始大建學造士立家訓十條以遺子孫其子孫亦繩繩善繼尊尚伊洛之學言行相顧一如鄒魯之俗昔之爭鬪􅟃攘之􅍔亦幾乎熄矣何其盛歟嗚呼楊氏以一姓相傳據有土地人民侈然如古之邦君由唐歷五季更宋涉元幾六百年穹官峻爵圭組照映亦豈偶然之故哉蓋䝉詩書之澤涵濡惟深頗知忠藎報君之道或天有以相之歟楊文公大年所行貴遷之先人誥辭其中書令業則曰向事僞主當朕親征爰屬危機能傾丹欵其莫州刺史延朗則曰奮身軒陛效命疆陲均甘苦而得士心袵金革而從王事以此觀之其功在國家澤𬒳生民可謂厚矣奕世光榮而弗絶者雖本于天其亦有以也哉其亦有以也哉題李霽峰先生墓銘後濂兒時伏讀霽峰先生所撰大都賦即慕艷其人逮長受經于黃文獻公為言先生博學而能文議論英發如寶庫宏開蒼璧白琥黃琮玄圭雜然而前陳光彩照耀不可正視蓋豪傑之士也未及往見而先生竟觀化冥冥之中後三十年而公復薨逝又二十年濂亦髮種種而視茫茫矣慨念疇昔有志弗強賢者不能往親幸獲親者又不能盡傳其所學可勝歎哉先生之曽孫象賢與濂胥㑹南亰出公所撰墓銘及文集序相示三復之餘益重耿耿象賢名垚嗜學而有文今試藝銓曹擢官鄜州别乘先生為有後矣衍齡堂記太常贊禮郎陳君德民屢謁余為衍齡堂記豫曰所記謂何德民曰夀昌有大族曰徐氏其先自太末來遷烏岡至是族益大有一翁名海字季涵年七十八其齒其德群族師尊之嘗建新堂于東山之麓久未有以字之洪武辛亥秋忽夢神人戴瑶冠而𬒳霞衣笑謂翁曰爾堂當名衍齡翁曰其義何居神人曰明發陳德民來可詳叩之既窹翁疑不自釋坐而待旦徐步于庭皋巳而德民果至翁相與執手大笑且言其故德民曰此殆翁之夀徴乎于是命善書者揭之楣間以符神之貺先生之文行于國中流及海外翁旦旦慕之碩求記其事余曰聲聞過情君子之所耻豫夲不能文汰哉子之見許也敢辭德民請之益力乃與之言曰周官有占夢所掌凡六一曰正謂無所感動平安自夢也二曰噩謂驚愕而夢也三曰思謂覺時所思念之而夢也四曰窹謂覺而道之而夢也五曰喜謂喜悅而夢也六曰懼謂恐懼而夢也今翁雖近耄齡內養外充精神恬熙物莫敢攖所謂噩思窹喜懼五者咸無有焉其或出于正夢者歟若正夢者則事幾之所形休禎之先兆也古之人有夢與九齡者矣有加以三齡者矣其後皆驗王者之與士庶人其位雖有尊卑之殊夢之感通理實一也翁之夢將有得夫耆年者歟雖然夀居洪範五福之首而詩人之相頌禱一則曰夀二則曰夀其故何耶苟非夀焉則夫多子孫也膏粱錦繡之為食與衣也谷量馬牛而斛量珠也將焉用之哉將焉用之哉所以人人莫不貴夫夀者蓋以此夫矧衍之為義從水從行水之行䏻長流而不窮齡即年也翁之年自耄以流至期頥冝未有艾也至理斯寓有開必先神人之見夢其誠不可誣哉豫所居與翁鄰郡它日獲歸休當乘欵假馬與德民謁翁于東山之上歌三夀作朋之詩奉觴為翁夀尚未晚也德民以為何如德民曰先生之言至矣送翁好古教授廣州序郡府之設教授自宋之中世始然不輕以卑人嚴立試法即舍人院受題呈大義五道文入等者方白省臣用焉復慮無以統臨之也别設官提其綱要司其舉刺驗其隋勤而惟恐有不及至于閭里有出為句讀師者亦必從所隸屬陳試經義弗悖于理者始聽其法至詳且密矣或者猶病其不法三代大小學為教而徒泥于訓故文詞之間嗚呼可謂難矣近代以來急于簿書期㑹而視教民為悠緩司學計者以歲月序遷豪右海商行賕覔薦往往來倚講席雖有一二君子獲厠其中孤薰而群蕕一鼓吻一投足輒與之枘鑿唯彼飲食是務號稱子遊氏之賤儒者日夕與居是故稍勵廉隅者不願入學而學行章章有聞者未必盡出于弟子員論至于此寧不為之長慨今我皇明一遵三代為治𥘉入小學習以禮樂射數及升大學則明修巳治人之道且為之擇師尤慎府設教授一員必試經義于銓曹文既中格然後白宰相署牘俾權教職三年有成始令為真其視宋益加密矣四方風動無不淬礪濯磨以思顯所學當是時越有翁君好古舊以名經舉進士兼工古文辭有司薦之于朝將官干州縣好古以目眚辭衆惜其才不忍聼其去乃試教官用為廣州教授瀕行陶參政中立朱太史伯賢既各有序贈之好古復來徴豫言豫聞之師曰牧伯以政為治校官以教輔治其職蓋鈞重矣夫以一韋布之儒獲際昌辰與牧伯分庭抗禮得以施化民成俗之道誠非細故哉好古之行也靈承皇上法古興學之意而盡革近代循習苟簡之弊閭里之句讀師必月㑹之授以彛倫大義使漸摩誘掖之庶幾相率而為進德之歸時雖不設提舉官而府尹之統涖部使者之所核實其法尢嚴也豈無以好古學政之善聞于上者好古勗哉母徒泥訓故之繁文為也毋徒溺藻麗之詞章為也好古勗哉題趙博士訓子帖後昔者趙簡子書訓戒之辭以授二子三年而問之伯魯不䏻舉其詞無恤則誦其辭甚習求其簡出諸䄂中君子由是知其賢不肖之分也㑹稽趙君圭玉官法從時其父博士君作訓忠之書寄之圭玉佩服而弗忘復裝禠為㡧軸懸之齊閣不翅盤盂几杖之銘嗚呼圭玉固簡子之逺裔其亦聞無恤之風而興起者歟樓母婁氏墓版文義烏樓璉詣余禁林且哭且拜曰璉也不才幸獲厠名銓曹擢主大同宣寧縣簿歸與母夫人别夫人慘然若不䏻勝情整璉衣出門涕淚䦨干𬒳頰璉恐重傷夫人之意忍泣而往之官僅五月而訃音至矣蒲伏歸伏草土今服既闋吏部用常例别調行有日痛念先母遺德未白舊幸灑掃門庭執弟子之禮敢以墓版文為纍按璉自為狀諱慶字靜嘉婁氏考某妣某氏夫人年二十歸同里樓君光亨婦道修飭甚其姑童氏御家屬以嚴纎芥有失輒鬱鬱不樂冡介間鮮有獲其歡心者唯夫人䏻之處先後唯以柔勝有恃強壓之者夫人俯首避去久之咸愧報夫人亦自如樓君隱居教授州里多宗之每懸燈覽書直至雞號夫人侍左右不敢先寢困睫或不可擘必奮迅自力習以為常嘉朋至備物以饗雖截髮弗暇計其遇族姻不為翕翕而趨不為淹淹而舍始終有恆學者多不及也一旦病痰􅍏喉吻上下隆隆作聲已而蘇明日復卒夀七十八其時則洪武辛亥九月十七日又明年癸丑某月日藏于竹山里先塋之次子另子四玓瓅珍璉璉以明經試吏部入官今為成都府仁夀縣主簿階將仕佐郎子女子三環瑜珥俞盛方錫吳祐其壻也孫男三致中致和致剛孫女四貞姢婉媛皆幼世恆謂隂教不行天下無良婦有若婁氏豈非婦之良者耶奈何䡖言之讀豫銘者尚有所厲也銘曰無非無儀維婦之常不有以昭之孰知其良余銘婁氏之藏百世之下遹有耿光貞節堂記天地之間有大經决不可廢者猶如闔廬以為居稻粱以為食繒布以為服一日無之則人事盡失難以為治此其故何哉苟無闔廬則風雨震凌矣苟無稻粱則道殣相望矣苟無繒布則手足皸瘃矣三者猶難闕一而况于大經乎大經者何三綱之謂也是故臣有二心者為不忠子悖其父者為不孝婦事二夫者為失節彛倫攸斁職此之由其所係于人道之重者何如哉泉南莊氏婦其夫為海鹽陳思恭思恭海賈也育子寶生四月去入海五年而不返或以為死誘莊改適莊心如鐡不為動巳而思恭歸相見之頃悲喜交集居久之思恭復去航海卒溺焉向者誘者譁曰今真死矣奈何莊指寶生曰夫雖死而子存猶不死也吾敢死其夫而去之乎誘者又曰子賢也猶云可也脫有不肖餘生將托之東流乎莊曰此天也吾無所逃也順受之而不失也此其一念之正可以貫金石可以通神明可以耀古今嗚呼孰謂天道無知天道儻無知而寶生何其䏻賢耶此人定勝天之義著矣嗚呼使以莊此心推之子必善事其親而稱孝矣臣必䏻報其上而稱忠矣四海其有不治乎奈何世降俗漓號為士大夫須鬛如㦸議論凌雲霄一則曰我丈夫也二則曰我男子也或遇君父有難作狐鼠竄去往往而是似婦人女子之不若抑又何說哉嗚呼柏舟之詩不作久矣余于婦莊寧不若聞空谷跫音乎然而君子之立志寧暴露而無庇也寧凍餓而殞其生也天地之大經不可失也豫故于莊之事亟稱道而弗置者為其有合于此也寶生介吾友黃彛先生請記所謂貞節堂者寶生其誠賢矣哉因書此授之思恭死時莊年三十七今踰五十矣初思恭嘗娶妻生一子貧寓外家莊遺錢使營生産且償思恭之宿逋此固人之所難以非大節所繫不詳書之送葉别乘之官通州詩序括蒼葉君景龍新拜通州别乘之命將之官前御史尚書劉公伯溫為率朝著簮紱之賢及山林華藻之士以杜甫詩勳業頻看鏡行藏獨倚樓為韻賦詩餞之請豫為之序余謂景龍生名䆠之家自幼習聞詩書禮樂之懿誰不知之弗俟余言也其飭巳廉介操心仁恕每有及物之功弗俟豫言也至于踐剔中外涉歷礲切物態民情無不䏻周知亦弗俟余言也無已則有一焉聖天子在上所以宵衣旰食不敢自睱逸者豈非為斯民乎一州之民欲藉以安者得非托之景龍乎景龍務朂焉可也豫與景龍之兄景淵使君逰姓雖異情則兄弟也于是為序其事復捴用前韻作詩十解繫之首簡云詩曰大明麗曽霄青芝吐葐蒀物微且瑞世入當建竒勳一解而兄我所敬華皓見須鬛謝却山中雲遑遑贊王業二解矧君才患多錦繡照青春摛文追馬卿哦詩學李頻三解鶴汀接清煦蕙幌怯新寒引尊連月吸倚劍帶花看四解一從離巖扄十年服官政炙燈竹素間無一非龜鏡五解朱衣佩銀魚光彩耀一城自顧室罄懸無以贈君行六解幸有緑綺琴寶之如珩璜願君日彈之勿遣匣中藏七解一彈澆風淳再彈民生足衆生靃蘼中行見翹松獨八解栩栩亦有徒如君世寧幾不見庭前竹迎風自相倚九解官道年年别别君重離憂相思定何處鄰笛起江樓十解宋學士文集卷第三十一翰苑别集卷第一
