front:
  text: 宋學士文集卷第五十芝園集卷第十
  hash: sha256:8848447a8affc3361a68b8343a8a3889b8befe3e4451f94e230bea15023e1f3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_050-1a}
body:
  text: 北麓處士李府君墓碣處士姓李諱士華字庭實北麓其自號也其先家廬陵唐開元中逺祖德靈仕為撫州長史因居屬縣之崇仁髙祖昻宋太學上舍生曽祖緘以春秋舉進士至某官祖適父元德母盧氏處士賦才瓌異音聲如鍾幼喪父母二兄亦蚤世時當宋季亡賴男子學㺯兵于村疃暮夜擊人門鈔掠其訾財以去稍與抗直剚以刃處士能自衛卒免其患會宋亡為元更易方笠窄袖衫處士獨深衣幅巾翺翔自如人競以為迂處士笑曰我故國之人也義當然爾府君善治生未幾家大穰遂以訾雄鄊里積粟歲至數千廪遇飢則平價出之飢餓不能出户者計口而周之活者恆百餘人宗姻無業班財以為饋死則給棺槨衣衾葬之善地且恤其遺孤唯恐不及負逋不能庚者苟有所乞輒再與未嘗有靳色或以田廬為償處士正色責之曰先人之業何可廢壞逋尚可紓也慰而遣之伻有盜廪粟者矜其貧益之使去識與不識咸目之為仁厚長者云會朝廷有鬻爵之命富家兒多競奔處士恬不以為意客以空名告身來售處士曰吾愧不能以文學干祿位而涉銅臭之譏雖貴奚益哉府君性純孝能事繼母如親母雖其性剛嚴不可近必下氣婉容得其歡心而後止常以不及終養二親語或臨之輒嗚咽流涕晨昏必展謁先祠遇𥘉度之日號慟抵暮家人不忍見因諱言之訓諸子以學親自督視不至夜分不休也為人豁逹大度不少貶以徇流俗見假巫鬼惑人者力斥去鄊人鬪爭斷斷然正歡折以片言則免冠頓首謝嘉賔欵門倒屣出迎歡然無倦容雖不解飲必使盡醉而去元至正十一年辛未正月五日以無疾終夀八十六後二十二年當國朝洪武五年壬子葬于縣之大龍山之原娶郝陳二氏子四人彬鎬鏞蕃鎬以文行舉于朝擢國子正女三人丁師周晉戴尚德其壻也孫三人雍家奴寶㝎孫女三人尚幼曽孫二人宜夀普蘭曽孫女二人在室自夫仁厚之俗衰學者慨想三代之盛猶神龍遊于玄間欲一見之而不可得嗚呼豈其然哉人有古今心無古今有如處士之行如前所載苟謂之三代之民孰不謂然處士不可作矣豫故特表出之以勵夫人人然而仕之與否是有命也不必為處士惜也銘曰祥麟威鳯隱而弗彰苟一出焉是為希世之祥謂之有邪則固不能以函見謂之無邪則簡䇿所紀何為其周且詳吾謂處士為三代之民亦是類耳世之人無徒委之于渺茫緬懷德人中心孔傷今其巳矣何日而忘貞婦郭丑小傳郭氏丑字道安六合人也美姿容其父彬授之書詩輒通大旨母劉氏得末疾諸弟妹尚幼羞服無所倚賴道安上扶掖母氏起居下撫孩稚潄浣紉綴之事皆親之冬盛寒燈火蕭然持針恆至夜丰不休且不樂靡麗身衣紈素同綺繡女偕坐略不動容目亦不注視至于纂組烹飪不經師授而悉精其能彬絶愛之不肯歸凡子同里鄭玄來求昏彬激曰而能從師攻文辭即可爾玄乃力學道安年十九竟妻玄婦道甚修譽起一鄊間玄以古列女傳難之道安曰某女事如此某女事如彼一一舉之無漏文玄不能屈因加進學功其父讓不恱痛繩之玄悒悒不樂道安曰子但盡誠盡孝他非所知也瞽叟底豫之言豈猶不聞之耶玄釋然道安秉性堅貞強暴欲侵凌道安厲色叱之去其人恃為尊屬屢見白道安彈指出血曰父誤我矣父誤我矣不幸遇此唯有一死爾媵人勸曰何不告夫君知之道安曰吾苟白其故父子何靣目相見耶曰此人倫之變宜走訴父母使其知所忌不敢肆道安曰秪楊惡聲耳無益也不若就死之為安日向中道安潛出沉于河時洪武十年七月十七日也彬聞之悲𣣔無生瘞于楊子西沙清水潭上一夕玄夢其來車馬儀衛甚都且曰妾今在長蘆水府掌鉤考人間善惡念子索居故一來耳不可久留也言畢颯然如雨風而去次夕其姑夢亦如之長蘆在六合城南二十五里云史濂曰郭氏素稱詩禮之家婦人女子亦有異于人彬之姊真適許士瞻生一女而士瞻死年始二十三耳今垂五十而節操􅏮然而道安又貞烈如此誠可謂而仰哉傳言忠節之人殁必為神明長蘆之事雖近誣亦不敢謂決無是理也嗚呼新臺之什孔子刪詩而不刪去者其垂訓也逺矣哉宋學士文集卷第五十芝園集卷第十
