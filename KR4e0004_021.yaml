  text: 宋學士文集卷第二十一翰苑續集卷之一
  hash: sha256:6510db3e815b1d794a4b099f6420e6c7dd47e2bc74dc90bee4fbc5c1b66e6f1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_021-1a}
body:
  text: 瑞巖和尚語録序豫觀大𣑽天王問佛决疑經所載𣑽王以金色波羅夷花獻佛請為說法佛拈花示衆人天百萬悉皆罔措獨金色頭陀破顔微笑佛云吾有正法眼藏涅􅦼妙心實相無相分付摩訶迦葉嗚呼此非禪波羅密之𥘉乎人生而靜性本圓明如大月輪光明遍照凡蘇迷盧境界具濕性者大而河海小而沼沚無不有月是故有百億水則百億之月形焉仰而瞻之而中天之月未嘗分也月譬則性也水譬則境也一為千萬千萬為一𥘉無應者亦無不應者體用一源顯微無間也大聖全體皆真不失其圓明之性如月在寒潭無纎毫障翳清光燁如也凡夫為結習所使業識所縳而唯迷暗是趨如月在濁水固巳昏冥無見加以獰飈四興翻濤鼓浪魚龍出沒變幻恍惚欲求一隙之明有不可得矣故聖人之心主乎靜靜而非靜而動亦靜也凡夫之情役于動動而不靜而靜亦動也吾逹摩大師特來東土以迦葉所傳心學化彼有情或澄濁為清止浪為平直入于覺地而後止故其體常寂而寂無寂也其智常照而照無照也其應常用而用無用也至此則其妙難名矣然未易以一蹴到也惟一惟虛坐忘其軀或緩或徐長與神明居懼其散而弗齊也沒疑情以一之恐其至而自畫也假善巧以引之慮其偏而失正也挽沉溺以返之其道蓋如斯而巳歷代諸師各尊所聞守此而不敢失逮我育王珙公起于東海之濵秉執法柄弘開度門逹摩大師之道煥然中興入其門者無非龍彖而竺元道公號為世嫡今吾恕中愠禪師則又竺元之入室弟子也𥘉受度于元叟端公多聞法要拈香酬恩則歸之道公厥後俯狥衆請出世象山之靈巖黃巖之瑞巖皈依者日益衆名聞東夷使者入貢中國兼奏請住持師因奉詔來南京力辭其行皇上憫其耄也特從所請一旦將歸隱鄞江其徒居頂以二㑹語徴豫序豫久聞師名亦嘗窺見語言之一二兹又獲覩其全驚霆春而疾飈馳山嶽移而海水立鬼神泣而魑魅奔有聞之者凡情盡喪豫故不辭為稽决疑經所載以啓禪源法水月之喻以明性原推逹摩之教以為學源歷題之于首簡豫老且病凡求文􅌭紛于前悉皆謝絶而獨為師拈此者憫大法之陵夷樂師言之契道也徑山愚庵禪師四㑹語序或問于濂曰世間至大者何物也曰天與地也曰至明者又何物也曰日與月也曰然則佛法亦明且大也其與天地日月並乎曰非然也曰其義何居曰天地日月寓乎形者也形則有成壞有限量雖百億妙髙山中涵百億兩矅百億四天下以至于恆河沙數皆有窮也皆有止也此無他囿乎物者也若如來大法則不然既無體假又無方所吾不為成孰能為之壞吾不為後孰能為之先吾不為下孰能為之上芒乎忽乎曠乎漠乎微妙而圓通乎其小無內其大無外真如獨露無非道者所以超乎天地之外出乎日月之上大而至于不可象斯為大矣明而至于不可名斯為明矣是故以有情言之則四聖以至六凡或覺或迷佛法無乎不具也以無情言之則火水土石與彼草木或洪或纎佛法無乎不在也三乘十二分教不能盡宣也八萬四千塵勞門不能染汙也嗚呼罄徂徠之松以為煤斷淇園之竹以為管其能盡贊頌之美乎然而佛法固明且大也其靈明之在人者萬劫雖逺不離當念一念不立即證菩提亦在夫自勉之而巳濂雖不敏每遇學佛者喜談而樂道之𥘉不以其證入淺深而有間其意頗有見于斯也徑山住持以中禪師名智及學徒尊之號曰愚庵俗姓某世居姑蘇得法于元叟端公歷住隆教普慈二剎帝師錫以明辨正宗廣慧禪師之號巳而升净慈遂主今山四據髙座敷揚佛法以聳人天龍鬼之聽緇素相從如雲歸岫其弟子某㑹粹成書介吾友用堂楩公請文以題其首濂懸燈而疾讀之其解人膠纒如鷹脫絛鏇摩雲而奮飛也其方便為人如慈母愛子一步而三顧也其宏機密用如大將臨陳旗鼓動而矢石集也誠一代之宗師而有德有言者歟雖然不二門中一法不存何况于言覽者當求禪師言外之意使意見兩忘而忘忘亦忘方近道矣嗚呼佛法超乎天地之外出乎日月之上豈細故哉人患不求之爾今極其贊頌而書于此録之端實欲起人之敬信也繪畫虛空非愚則惑濂蓋無以逃其責矣宇定齊銘靖江府伴讀方生仲文崇安人以宇定名齊蓋取莊周宇泰定者發乎天光之言釋者謂氣宇開泰則靜定也既靜定矣天光自發人見其人物見其物𥘉無彼此膠葛之異懿哉斯言乎其衛生之說乎或者不察類以周多寓言輒泛引而非之周言固傷乎過高若此者其有不可取乎茍不取不以人廢言之說果何指乎為著銘曰君子養生能兒子乎專氣致柔而肯傷于躁急乎雖終日嘷而嗌不嗄乎此謂大和坱圠而不由喜怒乎外物其能攖乎四體其有不順乎所以神之凝然氣之融然泰而安乎天光照耀物各付物而不淆亂乎夫若是天其天而不參于人乎芒乎忽乎熙熙乎其有出入乎無出入乎夀可至于廣成子乎豫有凝乎無疑乎人讀豫文有能察豫之中情否乎節婦唐氏旌門銘有序皇帝恭膺天命誕敷文教凡有繫于民彛者輒加旌寵郎書所謂表厥宅里樹之風聲者也粵洪武七年春三月姑蘇守臣某上言吳縣編氓張成妻唐妙堅生二子而成卒堅年二十有七乃忍貧鞠育指天自誓曰飛鴻尚不再偶况于人邪遂不施膏沐日處寒燈敗帷中或憐之欲奪其志每涕泣以辭今五十又七二子頗有所成立州里稱之無異辭者里耆某言其狀于縣縣上于府監察御史加覆核焉咸謂得表署其門如制令臣敢昧死上中書以聞制曰可于是符下有司行事并復其力役之征俾無有所與其子彥存竊以為龍光自天照耀下土不可無以宣布上德以昭示悠久請大都督府照磨馬嗣能徴濂著銘鑱諸樂石濂惟夫為婦天大倫之攸繫故士昏禮有云下逹納采用鴈釋者曰取其不再偶也蓋有夫婦而後有父子有父子而後有君臣夫婦之道貞而天下可得而治矣聖皇在御持化機而制六合褒嘉貞節所以化行四方而作新斯民者也濂待罪國史法當備載其事且繫之以銘曰聖人御極惇叙天彛弘敷大訓隂執其機樹之風聲何物不動管攝人心邇赴遐聳有婦氏唐來歸于張克産二雛其夫遽亡泣淚既盡繼之以血相隨九泉乃我之節嗷嗷者雛匪親孰依忍死鞠之心唯天知寒颸蕭蕭燈青在璧月落參橫猶聞夜織或憐其孤風之改圖豈無甘薺何忍茹荼含淚陳辭鴻不重匹人為物靈敢弗之敵厥子既長頭角嶄然苦節之亨由持之堅牧守上言請加褒錫帝曰俞哉朕豈汝惜烏頭雙表有巋者門銀榜漆書其光焞焞皇匪爾私用為世勸推而逹之民罔不變子則盡孝臣冝竭忠三綱既建比屋可封國史造銘勒諸樂石奉揚鴻休以詔罔極金溪孔子廟學碑金溪縣令李子敬修建孔子廟學成廟之殿及㦸門皆仍其舊罅漏者𥙷苴之䵝昧者丹堊之學之論堂廟之西東廡與夫肄業之舍皆新作之論堂為間者三崇二十又二尺縱視崇而弱其一尺橫視縱而强其十尺隸業之舍為間者左右各三兩廡視舍其數各再倍之經始于洪武七年八月至十月訖功嗚呼元季兵亂邑廬盡毀而廟學巋然獨存是固有相之道而賢大夫復能汲汲為此可謂知化原者矣助其成者縣丞楊乾主簿劉祺典史喬思道子敬既相率釋奠已使教諭曽易徴文于濂濂序其故而絲之以詩廟學緣起及三遷之詳則舊記存焉詩曰金溪之山翔躍猶龍下有學宫靈氣所宗篤生大賢惟我陸子䆒明本心逺探聖髓其道朗融白日青天纎塵不驚萬象著懸矧兹鄉學可不亟圖孰其興之實邑大夫機動籟鳴泉赴川增其從之者緝緝繩繩三月之間用幣告成龍礎鳯甍文棁丹楹氣象改觀煥乎聲明人亦有言有詩有書有齊有廬式寧其軀匪居之為娛前軌是趨念此小邦文物則衍其氣夜發電流虹轉學子翩翩期文之顯匪文之為勔惟形是踐我作我詩為勸甚力聖謨孔彰萬古一日有赫其臨敬之無斁題魏教授所受咸淳誥命後宋誥係尚書吏部出給其詳著奏文𬒳旨次弟而復列宰執之名者慎之至也考其所由大槩損益唐誥而為之然唐誥𥘉用𥿄至肅宗時始用絹貞元以後乃更之以綾今用文思阮制敕綾亦其遺制也桐廬魏公新之勑賜進士出身故事循黃甲免試以近及逺恩例注授慶元府學教授此其所受誥也公之曽孫潜再守東昌持此卷求題嗚呼咸淳壬申誥下至今洪武乙邜殆歷一百四年中更宋元之亡兵火膠葛人物凋喪而斯誥乃能獨存非世有賢子孫豈能致是歟此與保曲阜之復者蓋同一尊尚之意故為援筆而識其左方至若公之治行豫已列于墓上之文茲不復云故吉安府安福縣主簿潘景嶽甫墓銘嗚呼是惟景嶽潘氏之墓潘氏逺有世序其居鄱陽郡城者曰某曰某宋嘉定間聮捧貢書于鄊有司榮之為易所宅之坊為擢秀至景嶽凡十有三世云景嶽諱樞景嶽其字也少刻厲經史學及長思以才自表見朝夕芒角撑觸心胸間不吐出不已元季干戈俶擾吉安為劇盜李明父子所據椎埋之徒相推為雄長蠶食十餘州各置僞帥統之而自指吉安為窟宅當是時安福罹屠剽者尤酷至正甲辰冬王師下吉安明父子宵遁安福歸于職方有薦景嶽于上者召見與語竒之擢安福州判官乙已春景嶽獨署州事蚤夜出入士馬間食不暇下咽𥘉李寇俘掠男女數千軍卒將臧獲之景嶽白主帥鄧衛公曰將軍奉揚天威削平大憝渠魁逺竄人心未寧子女係纍者將軍當一切釋之方契伐罪吊民之義耳辭氣激烈聽者悚畏持槊之士或怒視于傍景嶽神色自如不為動衛公獨欣然曰微爾言吾不能知也即令騎兵大索下令曰敢有囚吾民者斬民爭去縛趨景嶽景嶽置空舍戒勿出自坐舍外日設淖糜食之女婦稍豔者俾以塵土涴面衆卒銜憤議乘夜劫舍中景嶽偵知之授以計曰脫有宵警當同聲疾呼已而果然聲聞于外衛公驚起使人問其故景嶽具以實對衛公擒其首惡者鞭之流血咸噤不敢譁景嶽度道塗逺近次第放之其無家者與居旁縣者召其戚屬辨識而歸之大兵還戍安福者僅五百而降卒居其半潜與李寇通晝夜鈔掠為姦利民訴于庭景嶽遣人躡跡之乃自西門入景嶽懼為變愈傷民不敢何問乃如所失償之兵後遺氓鳥形鵠面遁入荒茅中城無吠犬虎狼之跡交道自景嶽之至流亡漸集樹苫廬以居㑹歲儉將有溝壑憂景嶽以計貸粟于民活者幾萬景嶽方喜可以行政降卒終不悛搆永新寨丁二萬鼓譟西下新附戍將賈某首鼠觀望欲下城門鍵鑰不聽民出避景嶽說之曰國家兵威之盛公所知也李明既順復􅊇其滅亡可待固不必汚齒牙頗聞宋將嶽飛能獲冝興民至今尸祝下廢公能行之上必以公為飛矣公其有意否乎賈感悟乃開北門縱之吏民知寇勢張甚乃擁景嶽詣大府乞師先是景嶽嘗上疏陳利害干朝至是命大將王國寶帥師至與賊大戰嘉林渡賊大潰景嶽還州州民見之有泣下者且曰潘判官在吾屬無患矣巳而中山侯湯公統大兵壓境景嶽走轅門獻計公納之秋毫無犯大兵攻永新景嶽集千夫轉輸芻餉夫苦重不前景嶽白于湯公特减輕之與戎馬參錯行無敢侮者别隊卒過郊敓人貨泉景嶽屬吏取之卒刺以矛景嶽曰是不可一朝居也將上其事軍帥懼痛懲卒令謝過而去自後恆帖帖指其城曰中有健吏慎勿犯或欲循舊弊抑農為兵景嶽泣告湯公湯公曰此與山寨何異咸罷之民大恱景嶽遂即州署釋奠孔子復于殷仲堪讀書臺設學以淑俊秀月旦十五日敷繹經史孳孳弗倦洪武戊申改州為縣署為縣主簿階將仕郎前後在官凡九年治為江右諸邑最朝廷嘉其能召赴闕下未及用而殁時癸丑十一月二十一日也年五十一其子桓權厝于京城之南以甲寅十又二月奉柩葬鄱陽某鄉先墓之次禮也景嶽曽祖子培祖志道考希古妣胡氏希古有文學善推易數元隂陽學教授號東湖適士一旦病疫將革胡氏拔鬢毛祝天期以身代翼日而夫愈後五日胡氏果終東湖遭大亂誓不與賊同汙後遇寇將加害景嶽及弟槐楫柄爭欲代死寇憫而釋之人為作五義士傳云嗚呼君子之學在存心澤物而已有如景嶽退然如不勝衣至臨大事以一夫而當萬夫之勇不顧死生利害卒生民人真無愧竒男子也傳有之活千人者其後必封當于其子孫望之豫雖不識景嶽據江西顔文鈞黃盅所録狀具著千篇而絲之以銘銘曰元季繹騷兮妖民夜呼焚毀城邑兮是劉是屠勢如狂瀾兮簸蕩失瀦真人龍飛兮奉行天誅維此安成兮莾為盜區亦既稽首兮入我版圖帝掄良材兮往佩縣符我民曷依兮曰父毋且彼飢吾哺兮危則我扶拔于水火兮置諸康衢一身之弱兮心雄萬夫死生不顧兮唯義是趨志不盡展兮隕魄黃壚聞者酸辛兮淚與涕俱鄱陽之山兮降勢縈紆薦此石章兮過者下車故泰和州學正劉府君墓志銘有序洪武四年春三月永豐儒臣劉于府君應誥來京閏月丙子皇上御外朝召見俾敷繹聖經賢傳府君據其章㫖而疏其㑹通上為首肯再三翼日丁丑復召見勑儀曹賜冠衣又明日戊寅復召見從容謂曰爾能任州邑之職乎府君俯伏歷陳其情素繼曰臣生丁亂離幸際真人啓運獲見天日豈不知效奔走以竭愚衷第以犬馬之齒既衰顛毛種種自度不能有所為矣敢辭上熟視之曰爾誠老矣冝賦詩以見志府君揮毫立就詩進上大恱命太官賜之酒放之還山五年春二月乙巳遘疾三月甲子正衣冠而逝春秋五十有五殁後之三日丁卯􅌾州東某里之巖坑八年春二月其子厚奉前監察御史丁節狀走南京徵濂為之銘當府君之召見也濂實侍上左右親見召𬒳龍光及退食青溪寓舍府君又來謁揚眉吐氣論議頗英發濂意其必享上夀以終孰知别去僅一年遽作土中人矣世事不可料往往如此可不悲夫因不辭序而銘之府君諱于字允恭劉氏其先漢長沙定王之後定王生五子其一封冝春侯凡新淦清江之間有劉姓者皆侯之子孫也九世祖文自新淦遷吉之永豐曽祖洪祖弼父庭蘭皆業儒府君幼淵敏矻矻嗜學書室懸燈屋壁盡黑大父與客坐命群從子弟賦詩府君應口成今體四韻語多驚人客為之動色年稍長以文謁虞文靖公集公深器之至正七年用春秋取鄊試苐三名文解㑹試南宫不利十年復薦于鄊名在苐二北上復不利無幾微不足之色獨謂親友曰中原亂將作乎風氣曰漓而人心不固時鼓邪說以蠱其中譬猶病者巳在心腹間吾得暝目不見之幸矣未幾果然時府君以下第恩例署泰和州學正之官未久而群盜蜂起永豐亦為盜所據府君傷二親之陷徒步犯荊棘晝伏宵行出萬死中竟迎親以就祿養泰和當贑吉之衝時元綱解紐省憲之臣不相能用兵爭彊府君卒調解之民隂受其賜秩滿還鄊烽火猶未息府君潜遁岩穴幅巾杖屨追逐雲月未嘗以世故少嬰其念慮熙和夷冲若將終身焉國朝繼承大統遣使者四出徴辟賢能府君至京師以疾辭越三年遊至又固辭㑹科目之行歷考福建廣東二行省鄊試得士為多人至今稱之府君尚風義立心忠信伯兄蚤世撫諸姪如已出同年友聶克敬擢第而還無以給道塗費府君傾己槖濟之士人劉季恭值嵗儉困悴不能存府君養之于家與其同甘苦他行事多類此云娶王氏吉水士族也以婦道聞子男子四夀厚䁀正皆能繼其業而厚尤善文辭即來速銘者孫五善嘉義幹啓其所著詩文凡若干卷藏于家濂官儀曹時與曽侍郎魯為同僚侍郎府君友也備言府君嗜義如嗜利知無不為或以非理相干輒深閉固拒弗之從豳國忠宣公余闕亦竒其為人當還自燕南嘗作序贈之公極慎許與片言不以假人則府君之為人可知矣使天錫以耆年日坐左右孰陳說道德令學者知所矜式雖曰老而不仕亦當有贊于邦治奈何死之奈何死之不識司化權者果為何如可不悲夫銘曰行潔而明玉之輝只文葩而則錦為姿只鶚方摩雲復退飛只經畬之藝日耘耔只逺探聖髓發樞機只渾以及物自邇推只有聲四逹蔚為人師只烽火相連望絶庭闈只蹈彼虎口終全親以歸只名聞九天錫以冠衣只龍光炳朗照耀里閭只不有君子將孰依只一鑑之亡中心悲只太史勒銘鑽在幽墟只故中順大夫北平等處提刑按察司副使吳府君墓志銘府君諱肜字文明姓吳氏世為臨川人頴異越常流從虞學士集危左丞素學二公深相器重應書鄊闈弗獲選去補江西行省理問所令史益種學績文不倦夜以繼日遂擢至正丁亥進士第授贑州路録事階將仕郎時郡守二皆朝廷重臣苛察繳繞察見淵魚僚屬重足而立莫敢仰視府君以事至府數與之抗辨氣凛凛不回撓初甚怒罵已而反賢之贑俗泥堪輿家說有踰半世不葬其親者府君召父老諭之曲盡倫理不兩月間葬者以千數民家二女咸學浮屠法揚言翛然坐脫無知氓競奔凑之府君坐以左道上官持不可府君謂其毋曰吾聞坐逝者必焚其身以收舍利約以明日行火母亟來謝曰女幸生矣人告妻弟奪其金條脫者絶無左驗府君陽令中析之告者欣然謝去妻之弟獨灑泣不輟乃杖告者而與泣者衆以為神朱甲與湯乙仇抵為盜自刺妻實之官捕湯煅治竟誣伏府君察其色有冤以計紿朱妻出所刺刀其血猶在遂縱湯而罪朱劉漢銜李敬甫無以快其忿搆其集衆攘巳資府君得其情往白守守怒令易辭府君不從更以它吏成案戮李于市當刑之日雷震守廳事吏尋為厲所困自刎死郡兵暴橫虐諸民府君每直之守寖不悅民怨群起而逐之因擁府君為守府君曰擅廢置二千石者族汝曺聽我言當迎守還不然吾决不從汝族也衆皆潰去越翼日復屯城外鼓譟焚廬舍為亂府君請守出共帥壯丁趨火獲造謀者梟其首餘置不問一郡帖帖時營國公火你赤出鎮江西三品以下得專封拜功狀上署府君為郡治中實超四階至正戊戍僞漢兵圍城踰三月府君調度供億無闕及勢蹙慷慨自誓躍馬欲觸鬪民爭擁不得前城陷僞漢竒其才令軍中有生獲吳洽中豫百金府君𬒳執命釋而官之竟以謀脫歸臨川遁匿嵓谷日以奉毋為樂若將終身焉郡既入職方守臣侯至善力薦起之乙巳秋七月拜國子博士成均𥘉設其建立規制及銓選祠祭之事府君皆與聞贊决者甚衆丙午春正月轉同知嚴州府事淅江猶未下曹國公李文忠方議征進府君轉輸餫餉至軍前公以能稱之吳元年丁未召還南京與禁林諸老共議即位郊𣏌儀注洪武戊申春正月擢僉湖廣等處提刑按察司事階奉議大夫三月至官分部荆襄上疏言五事鑄降諸處印沙汰荆州湖泊官省武昌等處批驗所復荆峽二州田額均石首公安江陵三縣水夫科繇秋七月又上疏言興學置安陸驛傳輪役遞運船及給鑄錢諸物價等事上皆從之巳酉秋九月改僉山東提刑按察司事庚戌夏四月以東昌土曠人稀請省博平清平夏津朝城館陶觀城范七縣秋七月超拜中順大夫北平等處提刑按察司副使薦剡人才唯恐失之兩考北平鄊試而得士為尤多癸丑春三月奉旨還京值疾作而終夏四月二十又九日也享年五十又七曽大父某大父某父輔有恩在州里稱為惠人母祭氏元配胡氏前十五年卒繼室彭氏子男四吉祥勝安皆夭唯林童耆齡存女八巳亡其五長適胡中胡氏之兄之子也次適太常掾施興嗣幼在室生平撰述甚多有弱齡壯遊山居南遊金蘭五槀藏于家𥘉府君既殁興嗣以其子幼乃來京師請熊參軍䁀狀其羣行徵豫為之銘其致辭悽以悲豫惻然諾之未及為而興嗣殁方懼吾文無所授而胡中又竭蹶來請辭如興嗣而有加焉遂以卑之府君權厝京師南門外中乃奉其柩歸將以某年月日葬臨川縣之赤岵山并持興嗣之骨還付于其家中亦可謂義士也巳子聞祭統有云銘者論著其先祖之有德善功烈勤勞慶賞聲名列于天下蓋孝子慈孫之所𣣔得者也今不敢廢兹義序而銘諸庶慰府君于九泉之下使興嗣有知亦將無所憾矣銘曰彪蔚炳煥文何彰耶剗凶燭姦政何良耶動合矩度行何方耶位之欲昌而底于亡耶松摧柏焚孰知其為棟為梁耶神理冥茫胡可以測量耶四尺之墳岵山之陽有永其藏慎毋壞傷上虞魏氏世譜序濓居浙河東嘗聞上虞魏氏為簮纓大族其先蓋出于唐鄭國文真公徴之裔公居巨鹿生禮部侍郎叔璘侍郎生武進縣令政始自巨鹿遷居㑹稽之山隂武進生邠州録事參軍珍參軍生莫州司馬明復自山隂徙居餘姚之蘭風司馬生石首縣令實實生廬陵尉潾潾生憲憲生章章生克敬克敬生惟賢惟賢生績績生塤塤生恕恕生和和生傑傑生有聲有聲生義義生安珦凡歷世一十又二雖不與仕籍而能修明禮義蔚為鄉之望宗安珦生宋從政郎良瑞從政生紹興府學録亨之復自蘭風徒居上虞之龍山學録生迪功郎監婺州東陽縣酒稅震龍監酒生文炳文炳生壽延壽延生鎮此其傳絲可見之略者也𥘉侍郎實生二子武進與汝陽縣令殷武也汝陽為北祖至四世孫司空謨遂相宣宗武進為南祖孫子甚多如上所書之外而明之鄞台之臨海比比有之而在上虞者為最盛一門之內惇禮樂而悅詩書由是四方才士大夫慕豔其聲華無不自逺而至當其園亭勝集雅歌投壼酣觴淋漓誾誾然和洽亹亹然旅語或不知夕陽之在樹也故鄊之論閥閲者一則曰魏氏二則曰魏氏云然而歷代以來名門右族若金張若許史者蓋亦多矣未數傳間或至于殄絶宗㣧即不絶亦降于皂隸有不勝感慨者矣魏氏自文真至鎮已二十又五傳其遺風餘烈猶能不廢者其故何哉蓋文貞之事唐立心忠藎奏疏剴切凛乎有三代遺直之風德厚者其流長其效固應爾歟鎮能孳孳弗怠詳譜其所自出粲然有條而不紊豈不誠賢者歟雖然氏族之學尚矣古者有世卿大宗之法得以伸其敬宗之義至于㝎世絲序昭穆又有小史以掌之故其盛衰有徵而親踈備見也古法既廢唯宰相家得著世絲表于史冊猶可髣佛見其遺意若鎮之為其亦可謂有所本歟魏氏之孫子幸襲藏而續書之公矦子孫必復其始他日焉知無文貞之出者歟鎮請户部郎中求序其首簡不揣蕪陋而備著之鎮字士圭有學有文者也故田府君墓志銘同郡田府君卒墓上縣繂之碑未有勒文其子洞命濂學子劉剛集諸行成書來請銘按書所載府君諱貞字子貞田氏田𥘉李姓家杭之新城方臘陷杭有李基者避地婺永康田迪功家迪功無子唯育一女遂留基為贅壻基生子遂後田氏基字伯開府君五世祖也伯開生某某生某某生存理存理生瑞以富甲群族府君實為冡子力佐家政應公府科繇櫛風沐雨皆不憚父既殁為諸弟授室苟可以致力者孳孳弗倦及諸弟求離居府君務盈其欲一髮無係吝人稱其賢府君辭曰兄弟同氣者也豈可競食貨以傷其心此分當然爾至正丁酉寇起縉雲鄊民奔竄巖穴且饑饉頻仍道殣相望府君出粟窖中振之皆羅拜于庭曰我等姓氏已在鬼籍非公誰復生我儻有所役雖使蹈水火無恨府君遂結義旅使捍敵閭井處州守臣石抹將軍及淅東廉訪使者皆材府君命攝巡徼之職辭嵗戊戌天兵下淅東諸郡而七閩地未入版圖福建省臣間道遣使持空名敕書授府君武義尹欲鈎致之府君知天命有歸遂縛使者焚告身絶之府君性剛介聞義勇為所內交皆端人凡憸卑媕婀輩咸唾去不顧建義孰一所聘文行儒為師集鄊子弟教之尤篤于訓子晝夜淬厲必欲其亢宗然見疾病癢痾者心惻然憐之手注善藥使服雖其請再三弗之厭晚年襟度益夷冲家事厲之諸子日磐桓佳山水間翛然不為塵土所染行年六十又六令終于家實洪武壬子正月二十六日也明年癸丑十一月某日葬縣之長安鄊金山之原府君配室徐氏以貞淑聞先七年卒子男子六旭泂遜𬈑奐廣遜𬈑大泂通經而能文嘗貢于鄊取第十名文解已而銓曹授河南都衛斷事官遷湖州府通判焯有聲孫男三寅賔寅恭道同女四吾婺為文獻之邦風聲氣習莫非禮義之所涵濡以故人多士君子之操有若府君制行嚴謹惠利及于一鄊且明炳幾先灼知天命所凝而不惑非有超然卓絶之識不能致也嗚呼賢哉銘曰惟金華文獻邦教斯漸德惟良猗君子制行方恤同氣有如傷出餘粟起羸尫結柴柵禦寇攘遏狂瀾作大防察天命知靡常縳間使絶外望歸有道誓為氓叶著先識播清芳滋遺㣧以文昻佐方州仕寖昌金山原松檜蒼紀茂行薦石章送魏知府起潜復任東昌序望帝奄有九圍宵衣旰食以治安蒼生為務凡守令滿三載者朝京師詔銓曹考核治行其昭著者皆復舊職命儀曹燕饗之或遇有事郊杜令𬒳盛服從公卿大夫之後以與祀事上之意以為能勤民方可以對越明神蓋異數云當是時桐廬魏君起潜自尚寶丞出守東昌三年政成來覲闕下有旨俾復治東昌蓋東昌古博州今轄二州一十六縣正當燕齊要衝會大將軍徐公統十萬雄師北征漠北屯駐州境者三月起潜給舟車芻糧皆無乏絶兼能撫輯創殘之民既煦嫗之又從而勞來之和氣所召鄰郡蝗大集賊稼殊甚而郡獨亡害起潜之來朝也民爭攀轅卧轍有至泣下者嗚呼此豈可以聲音笑貌為哉使其復往治之宜也豫見起潜之還也垂髫之童羣然迎拜馬前曰我使君來也我使君來也脫若我使君不來飢孰兒哺寒孰兒衣乎黃髮鮐背之翁寬衣博帶相與聚首而言曰吾郡自兵燹之後呻吟于灌莾之中􅤒露于雨風之夕今使君闔廬乎我矣生死肉骨乎我矣奈何一旦去之吾儕小人欲效河內之借寇恂蟣蝨姓名不能上干天聽幸賴睈天子明見數千里外復以使君惠我加我幸莫大焉豫知必簞食壺漿爭迎于道周矣巖谷之士方外之徒聞起潜之至亦必嘆曰我等在山林槁項黃馘固無求于世然必無撓我無魚肉我始得遂其恬淡之性使君之重來也吾等其安于所處乎夫然故起潜事書于信史名流于方今矣雖然靡不有𥘉鮮克有終起潜宜益加敬畏之所敬者何天也所畏者何民也一民銜冤天為垂象君子蓋甚懼之起潜能如是則功澤益深令聞長世不止如今日所稱而已也抑豫聞漢法郡守皆久任欲其與民休戚之相繫也非惟增秩賜金故或自丞相出膺郡寄或從方州入秉鈞軸載之方䇿斑斑可考也欽惟聖朝取法前王其久任之意實異世而同符有善者必旌褒有功者必超擢起潜他日之所至冝未可量也起潜尚朂之哉是為序宋學士文集卷第二十一翰苑續集卷之一
