body:
  text: 贈侍儀舍人林成之序余家食時有同門友宣君彥昭為溫之平陽判官當報政而歸州之文學掾林成之實護送來浦陽成之以余頗知學也自浦陽謁豫金華山中相與講學術異同論風俗淳漓至更闌月落蟬聮不得休臨别造四言一章以贈成之既去西東絶不相聞豫亦應中書之出仕䏂熙朝有從平陽來者輒詢之咸言成之處烟霞泉石間詠詩讀書以為樂豫亦為之歡然頗自念相望二千里不知何時與成之盍簮乎今年夏豫在南宫忽有踵門而拜者豫弗能識之叩其姓氏則成之也嗚呼相别未十年壯者日益衰朽至熟視良久亦不記其顔兒之真人事之不堪把玩如此可勝嘆哉于是與之坐而慰勞之成之頗往來于豫門問詩若文之法豫以舊遊之故歷舉體製之殊音莭之異者亹亹列之未幾成之忽來告曰小人有毋貧窶不能存雖幸竊祿于朝而烏鳥私情懸懸不能忘昨巳請于廟堂陳其中情涕與淚俱下執政大臣憐其志子告一百日俾迎飬于南京今將行矣執事其能賜之一言乎夫成之為退思先生五葉孫先生實考亭夫子髙苐世稱十哲之一其家世之懿不俟言也成之以茂才貢上銓曹擢為侍儀舍人出入禁省日覲天顔整肅乎鵷班峙立乎螭拗其寵榮非他職名所可比今又奉板輿迎親而來母子怡愈聚于一堂何人不慕豔之亦何俟豫言也無已則有一焉豫與成之别後成之學問日新豫則摧落不振四庫之書廢忘者十九視舊相見時若兩人焉此無他習與怠相仍氣隨世所移故也成之宜益自奮勵母若子之所為則下不夫家世之懿上無負國家之恩豫與成之言者止此而已若夫溫之先儒卓然以學術名家或沈潜性理或有志事功或推明經制大抵與吾婺諸賢同其于醇疵得失之間多有可議豫雖欲言雖更僕亦不能盡也尚容他日為成之發之成之名伯生䔍實好學有士行絶不同于流俗云飬親園記天台楊君子善謁豫而請曰善之少也習進士業從陳用晉彭允誠二先生遊屢踐場屋輒不利于是棄去㑹海內弗靖奉二親逺竄山谷艱難險阻無不備嘗及今真人啓運六合一家幸得還先人之敝廬竊自念少壯之時思欲沾寸祿以榮親東馳西奔靡有寧歲定省曠而音問踈兹獲婆娑于膝下家公年巳七十又二固幸康強素髮垂領而齒牙且􅏒搖矣毋之年如家公又益其二焉尫羸如不勝衣而出入之氣僅屬愛日之情恆怦怦然頗聞申椒為物性熱而味􅉝能益氣延年明目生津吾親所宜服餌而不可闕者也乃擇家南之沃壤數畝而贏九耕而十耨之使其土疏而壤鹵封為直疄疄各有溝踰三尺輒樹一本以數計之將六伯焉周為儲胥以護之使羊牛不得踐履夏氣方中絳實盈盈綴于枝間舉手觸之馨烈之氣鬯逹于左右遂與子姓采而擷之以奉親有餘則售于千家之市獲其直以還買魚沽酒以為親歡班衣起舞每歌之以侑觴歌曰我藝我椒其實纍纍只薄言掇之其香弗虧只可以延年可以生津只樂兮樂兮吾以奉吾親只歌巳二親亦欣欣為之引滿頽然就醉今善雖出仕與有祿食遐想斯園窹寐不能忘子願為善記之豫聞用天道分地利孔子以為庶人之孝說者謂其順時别五土所宜而播種之以飬其父毋蓋古之士者朝出耕暮歸讀聖人書亦常事爾後世習俗䆮偷雞鳴而起從事於末作始有不知躬耕以為飬者如吾子善于瀾倒波隨之際屹立不遷不亦行古之道哉雖然子善以茂才應辟出仕為時亦既丞京府而贊治化當以守貴富保社稷和民人為孝逺攬深涵淺受而其學益進于前一旦將還東海之上與璞原遊者咸惜其去相率發為聲詩命豫執簡而序之因繫其辭曰世之學者夥矣溺文學者則局促經畬馳驟藝苑其流必外騖而忘返泥苦空者則措情髙逺遊志踈曠其流必內躁而失守所以皆倀倀他適不知正塗之從有若璞原其知真乘法印與儒典並用者歟處乎世間不著世間如環之無端不見其止如刀之剖水不見其跡其知空有相資真俗並用者歟循序而上此焉發軔他時出世為人其知所自重者歟豫儒家之流也四庫書冊粗嘗枝閲三藏玄文頗亦玩索負誇多鬪靡之病無抽關啓鑰之要近惟默坐存誠屏斥而銷霣之于是天光駿發靈景自融方知儀曹之云為漸門者設璞原春秋甚富冝逹圎頓之旨尚思得魚兔而忘筌蹄歟白雲恱公時碩德也身居岩壑名聞禁闕璞原嘗師事而親炙之當以豫言質其然否白雲又將有以為璞原告也􅉝亥京畿鄉闈紀録序進士之科始于陏而盛于唐唐于進士之外又有明經明法書算諸科然皆有學以肄其業每歲之冬州縣館監課試其成者使與計偕其不在館學而舉者謂之鄉貢既上尚書始由户部集閲而關于考功復課試其可者而苐之此其𥘉制也自時厥後其法靡常而諸科或廢或因亦無一定之論唯進士之設行之頗久其得人之盛考諸載籍猶班班可見也皇明誕膺丕圗繼天出治乃法前王建進士科用康保于我蒸民洪武􅉝亥秋八月洊當鄉貢之期凡畿內三州十七府之士皆歡欣相告褁糧而奔走儀曹具以狀聞上親選兵部尚書吳琳國子司業宋濂司考文之任命即日蒞事而中書右丞相汪公左丞胡公復妙柬在廷之臣廉慎而通文藝者為受卷謄録對讀彌封等官期各盡厥職庶有以副上側席求賢之意其不䡖也較然矣夫自歷代以來為之士者焚膏繼晷矻矻窮年欲徼科目以為身榮奈何有終身而不霑一命者設得之秋髮􅌭紛而有弗獲祿食者其間幸無二者之纍拘于歲月又有不能改合入官者何其艱哉今我皇上求治之切一藝一才無不庸擢上苐者固不限資序而爵之或見遺于南宫亦俾其與有祿食寒酸之士一旦遭逢盛際紆朱拖紫秉笏垂紳光顯尊榮照耀耳目此皇恩之滂沛醲郁誠歷代之所無有為之士者動靜云為之間曷思所以致此哉其尸位素餐而不知報國者妄也違道干譽而不務恤民者殆也貪墨敗類喪名檢而墮風教者非人也鄉闈小録成直書首簡用以為多士之規是歲八月十九日金華宋濂謹序雲中辭黃岩有竒士曰許君弼其字廷輔治周昜燁然以文名㑹天下紛擾輒𬒳鐡衣操蛇矛集兵以禦寇尤能挽强命中衆𥘉弗信君設正鵠一百八十步外挾弓矢以往轟然一彂輒中之乃皆歎服由是多驅馳戎馬間及天兵取台州四方次苐平大興文治建科目以取士君慨然曰聖天子在上可以出而仕矣起應書鄉闈遂取浙江苐二名君文解去通判沔陽府剸煩劇如庖丁解牛恢恢乎投刃而有餘地已而復慨然曰豫家之東有委羽山其髙摩天委羽之下又有桃山焉羣峰相與回環日未出常有雲氣起其間縹眇輕盈如兜羅綿籠罩崖谷如翔如舞絶可愛玩有時下覆櫩宇覺此身飄然在雲之中恍欲逐黃鶴仙人吹簫而往來也苐以君恩未報不敢决去他時髮種種當掛冠而歸與雲為朋姑以雲中生自號蓋以表其志云夫雲之為物出乎太虗歘然而有忽然而無其變幻有不可測者當長空晴妍紆徐其興結而為祥鸞散而為綺霞其文采郁如也及其黤黮鬱勃鐵馬長驅雷電為之恍愡而甘霖注焉嗚呼雲哉何其有類于君也然非雲之類君實君有取于雲也樂繁華者贈勺藥以相娛務髙潔者貯秋菊以為糧物何嘗有心而人自强同之爾豫方與君談雲中之趣君忽昻然而來顧豫言曰弼知誦子之文久矣盍為賦雲中辭乎豫聞君襟韻灑落得喪一歸于天故其顔四時無憂色其號為雲中也亦宜為之辭曰委羽之山兮雲薄之勢輪囷兮復㠁嵯膚寸而合兮既合而復離不崇朝兮雨渺瀰渺瀰兮雲之歸玄功泯泯兮邈難知嗟爾雲中之人兮胡不爾思或出兮或處兮恆與雲以相期題山房清思圖書萱草蘭蕙竹石松梅為一卷趙魏公以藝文名天下及用篆籀法施于繪事凡山水士女花竹翎毛木石馬牛之屬亦入妙品修道先生云廣長三萬里上下二百年唯公一人爾信然保寧慧禪師以山房清思圖相示遂書而歸之跋佛頂托鉢歌諸文後穆庵禪師康公耽樂法乘見諸履踐每念先佛以乞食為事日中一食樹下一宿尚恐留情永法乃一切悖之而唯嗜欲是滋是長于是著托鉢之歌古者專務精進無少懈怠得無上道亦無自滿之意末法乃中道迷惑于未足中生滿足證于是書首楞嚴經千種識隂之文在昔陀摩尸利刻苦修行獲遇堅牢比丘相與激勵卒趨覺門而使彌樓犍陀佛法再興末法乃壞散弗收鮮有誠心向道者于是録堅牢石室之偈其一則咏之以巳意其二則證之以古辭大概勉人捨妄入真無乖于聖教而已嗚呼禪師之慮至此其可不為慟哭而流涕矣乎然而豪傑之士何世無之君讀斯卷當有蹶然而興起者豈惟禪師望之豫亦望之無相居士金華宋濂題陶府君墓志銘跋尾右上虞典史陶府君墓志銘一通翰林學士承旨河東張翥仲舉造集賢大學士滕國公保定張􅋒公辨篆題蓋府君之子江浙行樞密院管勾漢生之所請其時則至正二十三年漢生將南轅復求嶺北行省左丞臨川危素太朴書後一年太朴還中朝承㫖翰林始為作烏界道繕謹寫就㑹南北道絶附海舶至江南以歸漢生又一年漢生自江浙行省檢校官升行樞密院都事贈府君承事郎福建江西等處行樞密院都事府君之妻趙氏亦贈宜人漢生既奉命書祭告于墓下復欲請仲舉𥙷入志中而九京不可作矣乃并仲舉舊撰宜人墳記聮為一卷傳示子孫使有所徴焉府君𥘉除大理路儒學教授志中書為文學掾用省文法也漢生兄宗傳時為江浙行省掾未幾亦轉為台之臨海尹陶氏一門父兄子弟其不墜書詩之業往往知自奮如此䆠牒之蟬聮此蓋其權輿哉前史官金華宋濂題茂承齊銘閩人鄭子尚世惇書詩為良士其父周可君尤能以道自娛子江浙行樞密院管勾漢生之所請其時則至正二十三年漢生將南轅復求嶺北行省左丞臨川危素太朴書後一年太朴還中朝承㫖翰林始為作烏界道繕謹寫就㑹南北道絶附海舶至江南以歸漢生又一年漢生自江浙行省檢校官升行樞密院都事贈府君承事郎福建江西等處行樞密院都事府君之妻趙氏亦贈宜人漢生既奉命書祭告于墓下復欲請仲舉𥙷入志中而九京不可作矣乃并仲舉舊撰宜人墳記聮為一卷傳示子孫使有所徴焉府君𥘉除大理路儒學教授志中書為文學掾用省文法也漢生兄宗傳時為江浙行省掾未幾亦轉為台之臨海尹陶氏一門父兄子弟其不墜書詩之業往往知自奮如此䆠牒之蟬聮此蓋其權輿哉前史官金華宋濂題茂承齊銘閩人鄭子尚世惇書詩為良士其父周可君尤能以道自娛所居曰至德里並舍北南環植以蒼松鼓髯奮爪儼若蛟龍然嘗喟然嘆曰始者拱把爾今則大將十圍人之種德其亦有類于是乎御史鄭公過而嘉焉名之曰松莊云周可君既乘風御氣遊神于冲漠之墟而松固無恙寒光凉翠益翹然發舒子尚日徘徊其下仰而慕俯而疑悵然其若思已而曰先子不可見矣倘能承繼之庶幾其不死矣乎乃取詩所謂如松柏之茂無不爾或承之語扁其齊曰茂承蓋萬物榮于春悴于秋各繫其逢唯松也舊葉將落而新葉已生所以四時而恆青子尚欲承父志無須臾間斷其將常茂而益榮者哉子尚亦善于取譬者巳子尚以明經試天官歸教長樂鄉校其將行也介國子録趙伯庸來徵豫銘銘曰有松丸丸兮于彼郊坰來者既續兮往者始零衆悴黃霣兮其色獨青嘉名斯建兮象類之精父經能傳兮于粲其榮繼繼承承兮允有餘馨毋玩葩澤兮忽彼堅貞太史造銘兮勒于軒楹戴亭張氏譜圗記張出自姬姓青陽氏苐五子揮為弓正始造弓矢實張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有卿士張仲其後裔事晉為大夫張侯生老老生君臣君臣生躍􅎅生骼骼孫曰抑朔至三卿分晉張氏事韓匕相開地生平凡相五君平生良字子房其孫子實蕃分布四方有安定范陽太原南陽燉煌修武上谷沛國梁國滎陽平原京兆清河等四十三望大抵皆良之裔故唐𥘉定清河為乙門其所由來者逺矣句容戴亭張氏自汴而遷則始于大理評事要皆出于四十三族之中屢更兵燹圗譜喪不能言其為幾世評事生謙三傳至邦寧邦顯邦寧生孝仁孝榮孝仁生景逢景逢生應珍應蘭應珍生鄉貢進士志禮孝榮生溧陽學諭景先次元英景明景先生應開應熙元英生玉山教諭應辰金壇稅務副使應麒次應麟應時應麒生四子遂遷金壇應麟生志逺志逺生文賢文賢生允鄰允逹允成景明生應和應和生志頴志頴生文原文原生伯常邦顯生日升日升生思恭思恭生雲霓雲霓生天麟天錫天福天錫生文昌文昱文圭文昱知青陽縣自謙逮今十有二世析為三十四支而族屬之衆將數百人當科目之興也以五見其棟試者各有其人冠衣濟如劒佩鏘如論道德而談唐虞􅌭紛而舒徐人或造之但見其棟宇鱗次術徑交羅朝夕循環于詩書爼豆間竟迷其西東故鄉之稱望族者一則曰戴亭張氏二則曰戴亭張氏云先是應和嘗于譜廢之餘搜采而圗之未盡其詳而殁其孫文原出而𥙷其闕請序于申屠推官駉未幾又廢于兵文原之從子允逹恐愈久而愈忘也乃以耳目之所記疏其大槩來謁于豫曰先生有職于太史氏其言必見信于世幸不鄙而文諸碑豫因不辭按史表之法書而遺之嗚呼圗譜局之不見即令史之不設大小宗之法遂廢而弗之講允逹䏻惓惓于圗譜之修亦可謂賢也巳允逹有上行尤致謹于先世遺文裝潢成卷而珍襲之其于崇孝廣敬之道蓋有知無不為云曽侍郎像贊身形之瘦弱也則山澤之臞精神之凌厲也則列仙之儒博極諸書而守之則約智用群類而處之若愚當議禮而考文較損益于錙銖稽百王之軼典翼一代之鴻圗豈非飬德之腴造道之樞而為國之耆艾邦之蓍龜者乎盧龍清隱記盧龍山在京城西北二十五里周遍十二里髙三十六丈山嶺綿延逺接石頭乃江上之關塞比于北地盧龍山因名和陽尊帥駱月溪隱居其中自號曰盧龍清隱請豫友王儀曹本道徴豫文以記之本道述月溪之言曰古人有云心不溷濁謂之清迹不章顯謂之隱豫學老子之法者也朝暮黃梁一盂苜蓿一盤既適而且安間披鶴氅衣手執黃庭經一卷翛然而凝坐九衢十二陌之遊塵莫我之干也寧非清邪名氏不落于聲利之場心迹不屬乎榮辱之境其入也烟霞與之同棲其出也漁樵與之爭席寧非隱邪然而老氏之道清淨而無為隱約以無名不以清為清不以名為名是則無所不名可以治國可以觀兵可以修身可以延齡其小靡不該其大無不并此其為清隱益大矣吾嘗聞之于師而未之能行也姑就其近似者而究心焉雖然豫視古仐不翅一旦暮何為復膠膠于斯人身至中其體含虛不縱不橫非東非西纎如黍珠鴻包玄區火龍因之而飛𦦨水虎以之而生腴庶幾騰神紫府吹簫玄都此殆忘清隱之名而食其實也邪其言若是先生以為何如金華宋濂聞之嘆曰月溪蓋幾于知道者非歟其始也將欲遁世其中也又知其道可以治世其未也又思長生而度世縱豫有所言其何以加于三者之間哉于是偕本道訪月溪于盧龍山中白月獨照萬樹僵立無風乃握手歌曰盧龍之山兮髙岏有儒一生兮煉九還夜半月出兮露浸寥壇紫霞仙人兮駕采鸞七星為衣兮夫容為冠鐵笛一聲烟漫漫擷靈芝兮下空山歌巳二人者相視而笑遂次苐其言而為之記送陶九成辭官歸華亭序君子其可必于仕乎曰否可以仕可以不仕曰仕而不仕亦繫其逢乎曰否可仕而不仕不可也可不仕而强于仕亦不可也唯其義而巳曰義之所在奈何曰義者宜也當其可之謂也欲當其可非守道君子其亦戞戞乎難矣哉嗚呼斯人吾不得而見之矣得見其次焉者斯可矣天台陶宗儀九成有學之士也僑居華亭之泗涇飲水著書多至一百餘卷㑹朝廷設六科以求賢郡守遂以九成為薦將授之以官九成慨然曰不仕古云無義當草昧之𥘉兵戈未息法制未定民氣未蘇吾不可以不仕不仕何以解生民倒懸哉今天清地寧六合一家論道經邦皆䕫龍稷契之彥趨事赴功多龔黃姚宋之儔四方人士樂觀治化之成贏糧而馳騖者動千餘人無事于吾也吾可以不仕矣去而為巢父為許由為嚴子陵擊壤而歌以為太平之幸民不亦可乎白之銓曹銓曹允之列之丞相府相君嘉之于是九成翩然東歸薦紳之家咸唶曰九成之出處其亦合于義哉或曰非是之謂也九成有弟曰宗傳近擢代縣令曰宗儒妙柬為選曹郎官九成之意以謂一家不可以俱仕恐妨進賢之路故力辭之不特如前所云而巳也曰是未知九成者也九成伯仲之才不為不美矣其問學不為不充矣九成之志豈不欲如河東之三薛清江之三孔虎林之三沈番陽之三洪蜚英聲于當時樹芳烈于後世其所以果于辭榮而謝寵者亦度其時可以不仕也避嫌云乎哉雖然九成之歸也結廬泗涇之上日坐臯比橫經而講肄之子弟從之者皆知所以孝弟忠信出而事君又皆知能致其身之義九成有功于國比于它仕者留心簿書期㑹而不知教化者又為何如哉苟謂之仕亦可也抑豫聞國家稽古右文大興文治嚴禁林清切之選增成均弟子之員有如九成之賢其在所棄乎在所取乎九成行哉席不及暖突不暇黔豫知鶴書之赴隴矣九成必不能于果不仕矣九成行哉蘇州重修孔子廟學之碑蒲坼魏公守姑蘇之明年鋤暴樹良無令弗肅上下洽和百廢具興惟孔子廟學弗治棟楹傾欹丹堊䵝昧若不能支旦暮者公顧瞻良久愀然弗寧乃登僚寀縣令丞暨尚義之士咸集于庭喟然嘆曰皇帝以神武定四海即大興文治詔以明經六藝之科頒示郡邑使選弟子貟肄講明體適用之學將以人文化成天下今弊陋至是非所以靈承帝意豫先捐俸為倡爾二三君子幸相與圗之穹殿邃廊䖍奉明禋靈星之門神道所繇其役為最殷吳江葛德潤爾其葺之論堂有嚴兩廡相嚮挾以六齊以通于前門吳江寧璇汝其修之亭號采芹下臨康衢來遊來歌多士攸冝崑山張庸爾其整之公言未巳吳江令許茂進曰邑有八士曰李庚等頗有意乎書詩尊經之閣先賢諸祠遊息三亭以至庖湢橋梁之屬茂率其承之長洲丞丁師尹復進曰許令然矣師尹獨不可為乎若止善堂及中廊逹于閣者當諭群儒使賦金俾里耆唐晟視其役焉公大悅唯周垣四千八百尺未有所屬僚若佐遂以罰布佽助而吳縣令曽輔歡然趍功役邑夫畚粘土繩繩而來事因大集始事于洪武六年二月戊辰而訖功于十二月某甲子如翬斯飛如雲斯凝如濤斯湧深沉而潔清宏麗而靘密一還承平舊觀公帥其屬執豆籩具脯醢以成功告觀者如堵墻莫不嗟嘆自兵興以來學宫所在蹂踐為墟而姑蘇幸僅存非公之至幾何不與之俱廢乎教授貢頴之既宣力于始終復使訓導張田請記其事以垂不朽惟蘇之有學實始于范文正公蓋公景祐𥘉出守鄉郡擇南園之地奏請于朝而建是學為其師者則安定胡文昭公也計當時人物固嘗盛矣數百載之下仰其聲光慕其風烈每使人發不可企及之嘆自時厥後雖有賢愚而學之興廢靡常而二公過化之地流風遺俗終未泯也况今遭逢有道之朝而得良二千石為之師帥豈徒然哉然公興學之志不下于范公者也則夫坐臯比而談經藝者其必將取法于文昭乎明體適用之學吾知駸駸然向盛矣茍不務出此而摘英搴華為譁世取寵之具非區區所敢聞請是刻諸麗牲之碑庶幾蘇之人士知所自朂哉公名觀字把山通周易為人疏逹無疑滯如八窗玲瓏見義勇為雖千萬人不可遏所至輒烈烈有聲同知府事李權通判徐弼推官超霖皆號一時之選與公道合故成事無難者碑為修學作前代興造各自有記皆不書唯當書者不敢拘于文體而不致其詳焉系之以詩曰姑胥之墟有川滮滮折趨南園匯而東流靈氛中啓渙爛弗收自非聖師疇協其休昔有哲人出綰郡章乃搆學宫乃建廟堂廟堂章章學官將將襟佩洋洋來翺來翔盛衰相因揆理則然風摧雨蝕上漏旁穿矧丁艱虞烽火相連誰舉一臂持危扶顛大明當天九服攸同叶攙搶斂翳奎璧吐芒眷我魏公來涖大邦屢形于言我敢逮遑既率部封復登府僚分勞授事具乃教條曽不一朞厥功孔昭化此朽腐鬱為岧嶤孰敦化原孰築教基孰牗民彛匪學曷為我語蘇人公豈爾私耳目苟具必致其思思之如何法孝與忠二者無愧行將天通震澤有石其堅比銅史官勤辭用昭無終泰和劉氏先德録序惟劉娃出自祁其後生子有文在手曰劉纍因以為名事夏孔甲為御龍氏子孫在啇更為豕韋氏又更為唐氏至周又更為杜氏杜氏生士蒍為士師因官命氏又更為士氏至晉士㑹入秦雖復歸于晉而子孫留秦者遂稽劉纍之名别姓劉氏此得姓之所由始凡六更矣自秦歷漢世有其人而劉氏蔓延于四方其在今廬陵者實出于發之後蓋發生倉倉二十餘傳始自長沙遷金陵後唐天成間復自金陵遷廬陵之泰和圗譜之家可徴也或謂從彭城徙建業又徙西昌者殆與所聞異辭泰和之傳况與兄雅弟戎皆通文學雅生俊戎生光而絶况生嵓崟岑專崒專生遜遜生生諒諒生利濟利宿利簡利槩遺胤日滋分為四巨族宋自嘉祐壬寅至寶慶乙酉一百六十四年中舉進士者二十有二自熙寧丙辰至寶慶丙戍一百五十一年中擢進士苐者八授經于庠序蜚聲于州縣遐邇相傳以為盛事鄊邦之間推故家文獻者一則曰泰和劉氏二則曰泰和劉氏云况之七葉孫安尉宗回愳世系相傳久而或紊也始重著譜圖一編十二世孫黃陂令宣復增修之十六世孫鍔復益廣其未備首譜其宗支次表其世科次輯其遺文而名公卿之為劉氏作者亦類解焉通名曰先德録鍔之三子麓嵩野復旁搜曲探倘可入編中者悉謄附焉亦可謂不忘其先者矣嵩與濂為文辭交力以首簡請為序歐陽氏有言曰自受姓命氏以來歷唐虞三代數千載間詩書所紀各有次苐豈非譜系傳之百世而不絶歟嗚呼此濂因嵩之請而重有慨于斯言也士大夫間孰不曰尊祖而敬宗孰不曰辨同而别異及叩其所自出輒舌彊不能下甚至王父之字有不及知者其所以逺于禽獸者幾希此無它詩書之澤弗加譜牒之修不謹不知玩愒之弊遂至于此也有若劉氏恪守明訓集其承傳次苐垂二十代支析派殊整比可觀非世濟其美而能然邪自時厥後苟引之而弗替雖至于百世不絶可也劉氏之子孫上慎旃哉抑濂觀劉氏之中利濟則輸家粟以給邉餉好先則折獄不阿人莫敢變或欲鑿庾嶺以通漕運復論罷之獬則憫饑泯輕陷法網而出諸死地令猷則辭迓吏白金毅然弗之願幼文則捐縣帑以紓長沙制帥之難是五君子者其事多可稱而獬及令猷實同年進士胡中簡公銓周文忠公必大為銘其墓是宜後人之所取法濂所深望者非持繼修其譜圖而已也劉氏之子孫上慎旃哉嵩元名楚至正丙申曽用試取江西鄉試苐二十一名文解今入兵部為職方郎中階奉議大夫文章政事見重當時人謂其能世其家云徑山恱堂禪師四㑹語序根有利鈍故所教有異同悟有淺深故所印有小大施其善公得法最蚤乃出四㑹語俾題首簡豫竊聞之入奧室者能探于幽邃升危岑者始矚于冥茫松月大師印公禪林之獅子法海之長鯨也其稱禪師之道髙于圓照佛照二公其言豈虗發者哉惟賢知賢蓋可徵矣仰前哲之風徽作後武之矩度究其遺轍足證新功是録之行其必有超然獨得于語言之外者乎旃檀大愛妙色三經小引先佛所說旃檀香身大愛妙色三陀羅尼經皆西天譯經三藏朝散大夫試光祿卿明教大師法賢奉詔所譯其在法藏與瑜珈大教王經凡二十七等同車輦字函中功德所𬒳或療惡疾或救海難或出生際諸鬼趣資以解脫誠心求之靡不應感蓋我如來大誓願故神通力故慈憫有情故一彈指頃即能成親無邉殊勝經言可信真實不虛天界沙門太𥘉肇公信之為尤力于是命工鍥梓以廣流通介其同抱一林桂公徴濂引其首大佛法廣如虛空然無始無終無內無外苟欲繪畫而贊咏之非愚則惑矣始書其槩以起讀者之信心云故天台朱府君霞塢阡表孝子之于親曷嘗有紀極哉唯恐其嘉謨懿行不暴白于後世也件繫群事既有狀矣足以昭于人人又有玄堂之銘銘比㧋著矣又有阡上之表焉蓋辭之重􅴰者事必著甚哉孝子之心其有所慎乎仙居朱府君之卒多歷年所其子公立既請縣大夫前進士魏俊民為之銘其二孫木棐猶以為未足復來徴豫文表于墓門揆于古義合矣豫乃按狀而書之曰府君諱嗣夀字得仁姓朱氏世居台之臨海宋殿中侍御史希述其逺祖也殿中君六世祖友直仕為宣撫司某官始遷仙居之東門至府君又六世矣府君之生岐嶷而深沈豐厚而敏慧自為童子時風岸孤騫昻然野鶴之在雞群見者莫不異之及遊鄉校擩嚌群經食芳而潄腴充然若有所得且曰古者為學精神心術一寓之于事為或慮其有不正也必資體驗擴充之功所以皓首窮經不敢䡖置之若拈華􅎥豔鉥心劌腎于辭章間陋之陋者也自是撫世酬物一出于正而異端無實之說了若不經意事父母輒盡其孝奉異母之兄甚于同毋者凡事必咨禀而後行遇弟有恩及其蚤捐館舍諸孤貧喪不得入土府君泣曰兄弟同氣也死而不葬吾心其安乎即命堪輿家卜地而藏焉夫妻相敬如賔自委禽至髮白無反目之失教諸子力田孝弟不許事紛華靡麗遂名堂曰順德且賦詩以示意待族姻廬井曲盡人情不以貴富賤貧而為薄厚疏數春秋祭其先儀文並循家禮升降跪拜如將見聞其容聲人取以為法治家甚嚴子孫朝夕冠帶承候顔色拱聽訓飾不命之退不敢退也晚年築室東園藝鞠花數十本當秋髙氣清金錢纍纍然布柔條間府君熟玩不忍釋去或對之酣觴清詠終曰且謂人曰鞠誠吾良友吾殆托之以逃名乎逹忠介公兼善時出鎮于台聞府君有賢行將剡薦于朝府君謝曰仕將以得祿飬親也親亡以仕何為哉逹公亦不敢疆未幾遘疾府君度不能起召子若孫訓之曰吾晝夜兢兢業業以克至于今日非為仰不愧俯不怍抑且可以見祖宗于地下汝等守爾孝弟篤爾忠信蹈爾禮義厲爾廉恥庶幾不陷于有過之域吾雖死將含笑入地矣已而遂卒時至正乙未十月二十一日也享年六十又九府君曽祖懋宋鄉貢進士祖智父元豪𥙷武學生妣應氏金氏府君金出也娶同縣吕氏先十三年卒子男子二公立公成公成先四年卒子女子一適楊弘祖孫男六木松棠棐棣楫木棐即來謁文者孫女一歸吕志尹卒後當某年月日葬于縣東一里馬裊山霞塢之原禮也嗚呼士君子之立身也其功名烜赫于世則登名于國史其次焉則書諸郡志又其次焉則藉薦紳之立言者以傳及其久也未嘗不與史志相為頡頏有若府君之行斥乎澆漓葆乎醇熙一本乎真誠而弗事乎詭隨此所謂一鄉之善士非歟是宜揭之崇阡以為聳善扶世之計而所愧者豫非其人也雖然豫久居禁林海內名公卿及賢士大夫所銘者多矣鮮有徴文于十九年之後者而木與棐有焉則其久不忘乎親可知矣豫雖欲辭之而烏乎辭之若木與棐者亦可謂之孝孫矣乎是為表題劉氏官誥後宋誥太氐沿櫳于唐唐𥘉以𥿄肅宗朝有用絹者貞元以後始易為綾其制凡三變宋則自國𥘉至季年一皆用綾此其所以異耳烏傷劉公亮以中奉大夫致仕贈其父俊太中大夫蓋大夫乃秦官取掌議論之義漢署太中大夫厯代因之而不廢至宋元豐官制行則以之易諌議大夫若中奉之階始置于大觀間而古制則無之也中奉六世孫剛久從豫遊持誥耒求題豫見名門右族未一再傳祖父之名諱有不知之者剛則能寶此于一百四十餘年之後剛亦賢矣哉故略據所見以告之同郡宋濂記宋學士文集卷第十八鑾坡集卷第八
