  text: 宋學士文集卷第二十四翰苑續集卷之四
  hash: sha256:c3745e90125768a8c8d31d1675dbd51cef7e6223ee0f03d98093c2d9a6a15dca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_024-1a}
body:
  text: 恭題御製文集後臣聞有德者必有言蓋有德者和順積中英華發外無非天然之文不待勉強而後成譬猶大化流行融液通暢而萬物發舒各得生生之妙精神充衍無往不在故大舜作五絃之歌湯為􅐻銘武王造起居之誡皆粲然成文此揚子雲所謂聖人之言炳若丹青也恭惟皇帝陛下統御以來用人文化成天下睿訓諄復惟恐一夫不獲其所天縱聖能形諸萹翰翰奎璧照耀層霄絢采光𬒳上下萬象動色然而建中于民寤寐弗忘則有虞阜財解愠之歌也夙夜修省常如神明森列左右則湯武􅐻杅几杖之銘也仁民愛物之心隨感而見布于方䇿溫潤淵深統貫乎斯道光芒氣𦦨蓋覆乎六合前聖後聖實異代而同符也臣供奉詞林幸日侍几硯仰瞻揮灑之際思若淵泉頃刻之間煙雲盈𥿄有長江大河一㵼萬里之勢跪捧而觀殷彛周鼎未足喻其古也太山喬嶽未足喻其高也風霆流行未足喻其變化也蓋由天德粹純無聲色之好無逰畋耽樂之從聚精會神凝思至道形于心聲同功造化非語言形容之可盡也且當萬幾之暇時御翰墨多不留稿見于侍臣之所録者得若干萹臣竊以為日星昭回于天下飾萬物蒼生無不仰照聖皇之文猶日星也是冝刻于文梓流布四海使見之者咸獲咏嘆文明之化熙熙皥皥相與率德勵行以為忠孝之歸豈不盛哉于是敬録如上文與詩凡五卷續有制作復編類為後集云翰林侍講學士中順大夫知制誥同修國史兼太子􅐌善大夫臣宋濂拜手稽首謹書靈隱和尚復公禪師三會語序無相居士坐清淨室想清淨觀忽有沙門號曰曇鍠合掌頂禮而作言曰我師靈隱三坐道埸法音之震有如轟雷蟄蟲皆興飛行自在各適恆性又如晨鍾人正昏酣一聞音聲颯然驚覺同𫀆宗演及諸上首假觚翰力成文句身唯願居士開光明藏洞照篇端使信心者同入如來大華嚴海居士微笑告沙門言爾師所演大乘正法當時聞者注耳熏心一切纏結悉皆解脫既解脫已萬法皆空何况于言爾等結集翰墨假合畢竟大法果何所寄若謂出于翰墨之間湘竹兔毫魚膠松煤不能説法譬如石工手持錐鑿鑿彼崖石為菩薩相首戴華冠靣如滿月塗以黃金間以五彩珍珠瓔珞種種具足爾意云何是真佛不沙門白言如是如是復告沙門當觀實相惟是像佛四體竒偉𬒳服絢麗固無異者若比真佛神通變化無量無邉二者孰勝以此思惟佛身充滿遍周沙界豈同崖石拘礙方所况此文句才脫口吻即弟二義書之簡編去道逾逺又如畫師和丹抹黛經營想像貌師子王拳毛旋螺利距削鐵威稜氣𦦨可怖可愕迫而視之若飛動爾意云何是師子不沙門白言如是如是復告沙門有像皆假是師子相形模生獰踞視左右亦無異者若此于真奮迅跳擲百獸盡伏二者孰劣以此思惟物唯真者方能動物寓形縑素與木石等况此文句不見形聲徒存其迹用之求道如捕風影沙門當知法尚善權難齊一軌如求兔者必假于蹄欲致魚者定資于筌魚兔既獲筌蹄則棄法因言入言入法空亦復如是是知汝師顯説密説權説實説縱説橫説無非闡揚我佛如來弟一了義有能于此一句之中或四三句或五六句乃至無句勿著色求勿著聲求忽然悟入譬一切衆眇者能視跛者能履瘖者能言疾者能起其為霑丐胡可喻云若執文句反為留礙沙門當知有物混然萬有之宗不依形色不墮斷常入離出微內外體淨衆生迷惑無繩自纏大覺世尊大含攝故大慈憫故别有正傳曰思惟修一念不以為遭逢盛際實千載一時乃録平日所賦并他著餞贈之什共若干卷俾豫題其首簡豫聞昔人論文有山林臺閣之異山林之文其氣瑟縮而枯稿臺閣之文其體絢麗而豐膄此無他所處之地不同而所托之興有異也有立以粹然之學位居柱史日趨殿陛濡毫螭拗回視山林不翅有仙凡之隔故其見于辭者雲錦張而春葩明鍾􅙇奏而音律諧體製正而局度嚴誠可以傳諸當今而垂于久逺者也如豫不敏年日以加文日以退視吾有立之進如水湧山出者寧不愧哉然而有立善古文宏富充贍得作者之體不唯能詩而已邇者執法刑曹處煩劇之務整暇而有餘不唯能文辭而已其政事亦灼然有可稱者異日振厥家聲使金紫公不專美于前豫蓋深有望于有立者也輒序以識之史官金華宋某序書陳思禮陳思禮字用和四明人世為士族思禮生七嵗父德祥殁母石氏誓以節自守夙夜勵思禮以學遇之極嚴雖大雪沒脛必使挾册以往思禮或少懈輒對之泣曰爾父為名儒唯生一子吾所以忍死鞠育者欲爾取法也今奈何背之思禮惶懼却立若無從匿身俟毋怒稍解輒去篝燈誦書自是不至夜分弗休毋年五十五病卒思禮𬒳髮狂號曰吾母何在吾母何在母所以辛勤萬狀而弗釋者為思禮也思禮加冠而母不待飬尚何以生為不如相從于九泉之下魂魄苟有知猶可盡承事之禮不然縱夀百齡何益也乃操刃欲自剄家人奪之環守至旦共譬解之曰爾死則母之祀絶矣母雖死欲使母不死者移孝為忠以顯揚之也思禮收涕謝之服闕入郡庠從名師學明經期以科第起家見諸事功踰四三年思禮二十四矣𥘉母未死時為擇配石氏至是欲成昏思禮掩耳不答其姻其友執其𬒮而群譟之思禮泣曰吾娶則詩書之業蕪矣即不蕪何以自給不與市魁賈竪相逐弗可得也他日何靣目見吾母請緩之其師鍾士懋持之益急曰爾奈何失昏期也思禮不得巳泣從之合巹之夕思禮屢誦蓼莪詩泣曰娶婦為飬姑也吾母今不在寧不肝腸寸裂乎連泣七日夜不輟見者哀矜焉思禮既娶後學功愈自䇿不敢廢洪武六年春詔下郡國徴諸生思禮亦上名吏部已而奉旨入成均為弟子員試藝中選升上舍生先是思禮既喪親夙夜不忘乃以如在扁其堂襲封衍聖公孔君希學為作隸古書之御史中丞誠意伯劉公基參知政事陶公凱暨中朝士大夫皆有詩若文贈之云史官曰豫在詞林思禮時同諸生入謁每言及父母其淚滂然流豫為惻然久之昔者李沆之父獨生沆待之甚嚴或勸之答曰正以一子不可不爾也後沆卒為名臣石氏以一女婦乃能忍哀茹苦而以嚴教子以節自誓以潔白終其身可謂貞婦者矣思禮日夕兢愓惟恐有孤先志思欲以沆自勉不亦孝子之情也哉是皆有係于名教人紀之重不可不書也具列其事于篇上虞縣重修柯韓二閘碑上虞有湖名夏蓋延袤一百餘里縣東北衆水經上妃白馬二陂匯于湖釃為三十六渠支分絡聮以逹于田凡溉一十三萬畝有畸渠之下流建二石閘視時溢乾而畜泄之嵗恆無凶者近代農官失政畚土成塍取給一朝不旋踵而圯傍縣亡賴男子當旱暵時又夜半決防以去然湖並于海鹵水或乘湖入善禍稼舊嘗造隄捍其衝潮汐齧蝕至是亦暴潰民憧憧告病矣乃洪武四年冬臨淮唐侯鐸自殿中侍御史出守會稽上虞會稽屬縣人士群走白侯侯愀然弗寧行海上視決堤與民共約度田以會粟因口以賦庸鑿石為隄自蓮花池至纂風合萬有三千尺始與故石隄屬侯斬牲饗海神已登民謂曰隄幸成二閘無難者會侯召入為卿奉常遂命僚屬集事其柯家閘廣二十有四尺深如廣之數而羸其一先築土樹橛櫛比星攢度久且不壞方敷以石兩翼四隅咸斂甃如法中峙石楹左右皆有副鍥坎陷版以為縱閉復隨土形崇卑疏級為五以瀉水上架石梁以便行者橛以章計者九百八十有五灰以斛量者三百六十又四石以丈數者七百三十有八匠以日考者一千三百其韓家閘廣減前閘之半深比廣倍之石楹唯二級道則減其一仍冠以石梁餘皆同其工物視前匠損四百石損五百灰損六十八橛損二百八十五始事洪武甲寅秋七月訖工于冬十有二月此其大凡也有道浮屠雷峯淨昱乃具事狀介太史氏朱君右徴濂文記其成豫聞成周之時稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮㵼水其為法甚備其為利至久也然而溝澮之屬所可考者其深廣自四尺至八尺或至于尋仭各二先王豈不知害地而廢稼以為不若是則水性失其常溢則有溺患乾則禾將災矣古制不可復見有能設瀦防以惠民者得不謂之賢哉昔者曽文定公之為齊州州城西北有湖疏為水門遇流潦􅤒集則取荆葦為蔽納土于門以防外水之入公為易之以石其深八十尺廣三十尺視水髙下而閉縱之而禁障宣通皆得其節人無後虞今唐侯之為閘也其事與之頗相類世言古今人不能相及果足信之歟是可書已相其成者通判府事吳敬知縣張翼營度督視不憚勞勩者主簿史文郁也司其出內則邑大姓徐某余某法冝牽聮得書海堤别自有記茲可略云絲之以詩曰維夏蓋湖百川所瀦在彼海邦其一釃為通渠行水委蛇溉稻與粳其二制水有閘因時闢闔其法孔臧其三農政斯缺惡壤為堨水失厥防其四侃侃唐侯爰􅖴爰諏中心䀌傷其五曰是弗修民焉有秋敢視為常其六乃登乃屬乃謀乃告乃輯其長其七畝會其粟工來以族筮日奏功其八琢石于山樹橛于灣以楗以梁其九決塞有關既堅且完若首有骯其十昔何怒突今乃順則弗墮我強其十一行彼赤日清流潏潏黃茂芁芁其十二食為民天非稼無年民用卒爽其十三伊誰我憐五馬翩翩朱衣蔥珩其十四成周之制有溝有遂經畫維良其十五古法浸廢河渠興利其效則章其十六漢吏曰循惠孚蒸民唯此之蘉其十七矧乎巨津北枕海濵澤𬒳五鄉其十八侯治之棘行龎心惻不翅父兄其十九越石可泐越川可竭侯功勿忘其二十元故方府君墓碣銘有序府君諱應元字長卿姓方氏其先居河南自東漢司馬府長史河南尹紘始遷歙隋開皇間紘之後泉州長史叔逹又遷莆田之方山唐天寶中叔逹之後華又遷遊洋之大房宋某年末華之後皇祐進士中奉大夫知梅州次彭又遷長壽峰之下某年𥘉次彭曽孫淳熙進士朝請大夫直寶謨閣大理少卿銓又遷郡東卿月坊即今方壺巷也銓生嘉泰進士朝奉大夫直煥章閣廣東經略安撫使淙淙生修職郎龍溪縣主簿栻栻生主管機宜文字寓孫府君之祖也父孰翁母朱氏迪功郎端溪縣主簿洸之孫女府君未逾弱齡考妣先後淪謝獨侍大父與二弟俱破屋傾欹風雨中朝虀暮鹽或不能以自給不得已出從吏及大父殁凡四喪未舉府君黜衣殺食以襄大事服除中書左丞烏古孫良楨時為泉州推官器府君之材命為刑曹史盡心獄事唯恐情弗麗法有乖中典每蹙頞弗寧豫章二賈豎銜人與之仇欲以偽造鈔誣之府君斥曰訊獄當兩造具備人奈何受爾誣禍將不測矣一聽一不聽聽者免不聽者果抵罪死尋為南安縣蘆溪巡徼吏徼民毒溪以漁人飲溪流多誤死巡檢劉萬松雅敬府君命撰文以諭之府君操觚立就言毒溪不仁者三讀者韙之積以年勞當升吏于縣一旦竟棄去弗顧拊髀嘆曰吾為吏巳失身髮將種種尚奔走不止邪乃使其冡子從前進士方遂𥘉鄭獻可遊畫夜程督不少懈見為奕戲怒而投諸江曰此牧豬奴事爾奈何效之遂能堅苦自立不知有寒暑會部使者行縣試士于學其名輒先登府君喜曰此殆發軔耳他時幸爾擢一苐而歸吾死當暝目吾先世以進士起家者六十一人登仕籍者百又四人獨吾遭家多難不能繼前志一念及茲毛髮皆上立爾冝勗之府君性純慤孝友天至言及父母未嘗不嗚咽流涕事仲父如父撫二弟應珠應隆如子應隆無嗣以介子後之而均析其田廬外舅黃若琳外姑朱氏僅生一女歸府君無為主後者府君迎飬于家并奉其四世神主且遺命世祀之冬月蚤作有一夫號而前訊之則曰我畸窮夫也行凍死道塗矣府君解衣衣之立春鞭土牛聚觀者如堵墻隸人執撲疾驅衆皆辟易一兒仆于地人爭踐之府君力以身捍蔽抱兒歸其父時冡子尚幼是夕出遇奔馬急趨蹶道中馬躍而過無毫毛損傷或以為救兒之報府君不嗜酒唯好啜苦茗愛藝蘭蕙花當其含葩弄馨終日玩之至忘寢食視世之升沉事泊如也夀六十有九以至正癸卯正月卒于家其年六月􅌾于城西篠塘山之原配黃氏先年卒合祔焉冡子曰槐生明經善屬文今為郡府學者師介子曰桐生即出後應隆者先六年卒孫男三文焴文炯文烜女三濂聞方氏皆出于方仙君儲之後儲蓋紘之胤也其廟今猶在歙故歙睦㜈越之間多方氏方氏多有顯人而居閩者為尤著閩自梅州之父贈朝議大夫泳叔父諸王宫教授洞俱以詩賦有名天禧間同建義孰于虎蹲岡以教四方學者如陳秀公曽宣靖公夏文莊公皆自逺而來孰中相繼登第者十又七人方氏孫子亦七世聮科積笏滿床而光祿卿偕其勛名尤著登載史册天之報施者可謂侈矣府君有志而無命雖不能享有祿爵以紹其先烈然其秉心仁恕無虧士行又能訓子使勿墜其家學是亦為政豈必紆青拖紫而後為榮哉法當銘銘曰眷彼閩邦族大而龎厥氏維方以經為田薅治既堅嵗乃有年大衣襜如有印纍纍堯行舜趨功烈之凝彤管是登有鍧厥聲君起繼之將躡其為奈數之竒孰恤我艱俯首汗顔刀筆之間位雖孔卑仁或可推亦遂我私獄有重輕稽法緣情唯中則貞有書傳家可趨而汙喟然興嗟白髮𬒳肩所冀後賢是琢是鐫我爵之榮非紫非青榮在六經或窮或通繄命之鍾孰強其逢㣧子之竒能契父期其文陸離豈惟文哉生事死哀執德不回古稱望宗書詩是崇匪專勛庸繼繼繩繩衍之益弘將自此升篠唐之原淑氣盤盤松柏丸丸太史著文碣于墓門以播清芬故陳母林夫人墓志銘有序人子於親孰忍死之哉所以不死之者論著善行使為法于後嗣也斯墓石勒銘之所由始歟莆田林夫人既殁其子熙因比部主事林士衡持狀來徵文濂雖不敏寧不一操觚以慰孝子之情也歟夫人諱道外林氏其姓也唐邵州刺史藴之後其先居莆田之朱倉至五世祖彥髙始别遷郡城之南曽大父少偉宋迪功郎仙遊縣主簿父節元仙遊縣典史母陳氏夫人性柔惠一動一言皆不違繩尺年十四而孤而三弟傫然也夫人蚤作為􅌨總之又從而飲食之母氏為之悅十九歸同郡忠門靖逸處士陳君髙奉尊章以禮處先後以和族姻媪御莫不贊喜凡主饋非精糳弗敢進蒸嘗賔燕悉中條序必潔必豐尤不能自暇逸箕帚烹飪之事咸親涖之時挾媵人蒔園葵畜雞豚唯恐有不及所獲殽羞上諸耉長已則食淡雖不至飫弗恤也舅姑殁執喪如禮卜葬壼山中崖路陟絶歲一展省春秋已髙不憚往林氏六世大墓在縣之文賦里宰木相望每值暮春躬持象錢寓馬焚祭之祭畢涕泗交流曰豫弟及諸姊妹皆亡矣林氏且無後今㢙存者唯老身爾自度筋枯力殫何能久在人世即百嵗後子孫有能祭吾家之先者乎復泣告其族子某書院山長履曰我父粗有不腆之田賦其入猶可供粢盛爾幸為主之毋使林氏為若敖氏之餒鬼也其忠厚惻怛之意油然見于言外聞者哀傷焉夫人生四男子長熖漳州路儒學録前卒次即輝煒熙皆能文輝煒出後諸父熙連江縣學教諭女二一為比丘尼一適蘇隆祖孫男四奎習科舉學沒于兵璧以詩經試銓曹擢為景州吳橋縣主簿階將仕郎歸居尚幼孫女三曽孫男一欽夫人晚遭世難忠門居弟既于兵燹而食貧特甚夫人能自安且曰貧乃士之常何愠也夀七十七以洪武六年閏十一月辛卯卒于壺山寓舍欽實承重熙扶携為位哭弔者無不盡哀七年十一月某甲子合􅌾夫兆其地在南力里亦崙之原禮也自襲斂逮于窀穸其經費實煒終其事云濂聞閥閲之家其風氣之所漸漬雖子女子亦有度越于人者此無他書詩之澤浹髓淪肌愈逺而愈不忘也有若夫人其奉上也孝其遇下也惠其律已也儉其涖事也勤且惕然于春雨秋霜之慘終身而不衰可不為女中之師乎銘以昭之庶以惇彛倫也銘曰有􅍇夫人葆醇熙只芙蓉為冠佩蘭㽔只閫內之政飾且治只上嚴孝敬下則慈只出門聘望冡纍纍只宰木成林動涼颸只霜露之感我其悽只孰知衰暮窮以羈只樂夫天命恆自持只觀化而歸亦奚悲只赤崙之原南力墟只駿發幽潛勒貞辭只後千百載以為期只莆田林氏重建先祠記莆田縣東二十里有山曰榖城岡巒秀拔林樾蒼潤其下匯為巨浸號國清湖在昔盛時一望杳渺無際而波濤吞吐于風日雲月之間真勝絶之境也唐忠臣邵州刺史林藴之裔大理評事某始自長城徙居湖上五傳為睦庵府君格以積慶力本造家又再傳為承奉郎國鈞其族寖大承奉府君于艾軒文節公光朝為諸父行乃建義齋于東井命艾軒為之師倡明道德性命之旨遐邇生徒雲赴川臻唯恐或後東井之學遂聞于天下林氏子若孫亦世擢進士第克守詩禮之訓彌久而彌光其先祠舊在浣錦社者蓋以睦庵為之宗睦庵三子長曰諱某府君名鼻頭房次曰諱旃府君名追逺房次曰諱遷府君名白沙房至今垂十五世二百人之多皆三房之後也于是列為神版者五髙四尺博一尺有八寸下設趺座用粉塗而玄書之其版中起于大理祖父逮睦庵三子而止左右則追逺西則白沙東則鼻頭凡三房之後其物故者輒升名其間當日南至群族相帥合祭其小宗有事于四世别各行之于家歲旦則展謁舉序拜之禮若冠若昏若宦學出入悉于此而告焉諱遷府君九世孫比部主事衡患祠之規制􅋻狹不足以交神明乃與從子厚謀共白于宗長伯濟而改圖之即大理故宅之基建屋三楹間敞以外門俾族之賢者司其啓閉經始于元至正戊戌冬十二月壬寅訖功于皇洪武庚戌冬十一月某甲子群族皆出泉布來助而曰曽恐曰寶曰天禧者為多相地計功終始其役則維卿之力也𥘉睦庵在宋𥘉時已置祭田自後纍增至于二千畝有竒故蒸嘗之禮視他族為特豐元季亂離始不能以自守衡大懼族散宗堙無所繫屬既汲汲先祠之建復徴濂文以昭示于後嗚呼先王之時立宗法以統其屬定廟制以嚴其分制有降殺毫髮之莫踰宗有大小條序之不紊所以維持人心匡扶治道者其事至詳且密也逮乎後世經殘教弛漫焉而弗之講曽未四三傳已藐若秦越之相視當是時也有能以義起禮因祀事而崇考敬雖于古者未能盡合寧不為君子之所取乎此濂于衡之請不敢固辭而亟稱之也濂聞莆陽多名族冠衣濟濟讀書之聲相聞貴名檢而賤浮侈以此見艾軒之教浹人之深而承奉府君建學之功及今猶未泯泯孰謂賢者之澤不悠且長哉詩曰髙山仰止景行行止三房之嗣人尚思朂焉可也衡字士衡通經而有文為名進士云元故延平路總管項君墓志銘有序處之麗水有文學政事之儒曰項君諱棣孫字子華幼歸業郡庠終曰掩扉習讀不復踰户限時沉然若有思縱出亦暗誦中塗口作噞喁勢殊不能自覺也及冠用薦者為本州青田縣學教諭天曆庚午遂擢進士第授同知奉化州事階承事郎調福州路總管府推官改興化路莆田縣尹轉知福清州事丁內艱不赴尋提舉泉州市舶司事秩滿而歸攝鄉郡二守纍階奉直大夫同知延平路總管府事會朝廷遣重臣李國鳯經略江南承制升君為本路總管兼防禦事嵗餘即致其政隱青田之萬藏山以至正丙午八月十九日卒于家享年七十又一矣君在奉化時州之女婦嵗以四月八日群聚大伽藍飯僧誦佛書以求利益動以數千計君以其男女無别有傷治體揭其事康衢禁制之在福州時有海賈林氏嘗駕大舶行諸畨間舶上列旗幟設金鼓以備不虞仇家誣其為亂事上廉訪使者竟簿録其家君為白之活者數百人周生用左道惑衆日以烹煉金石為事愚氓無識指為周神仙生藉是出入官署莫敢何問君叱縛之坐以罪且焚其書譙樓火役巨事殷連年不克就君至召豪右謂曰臺門旅樹古之制也爾等有闔廬以居坐視師帥於上而弗遑恤豈人情也哉皆來赴功不日而告成在莆田時俗悍而少恩或有忿爭輒扼兒童吭而斃之持牒訴縣多陷人于辟君登耆艾于庭諭以父子天性綿延數百言于是更相戒曰是為推官而用法不阿者慎毋輕犯其風頓蘋在泉州時適丁歲儉道殣相望防禦卒出掠鄉落或至殺人君知事且急往白郡守偰玉立共捐俸倡大商入金易粟振之一郡獲寧至正癸巳福安羅源古田諸縣姦民林君樣等嘯衆為變招江西妖人數萬圍福州閩海廉訪使郭興祖檄君集溫陵興化二郡義兵為援君部署有法分數不紊帥之渡江與延平建寧兵會城中聞之士氣百倍盜恐腹背受敵中夜遁去其攝二守時青田寇吳德祥鼓三魁五社民蟠據險阻官兵往往失利君與大帥謀髙城深濠極力備禦仍命其壻祝彥方直抵窟穴歷諭之以福禍德祥感恱歸所執縣尹葉伯顔縣尉薛徹徹秃詣大府以降君為政簡易一以愛民為本未嘗求赫赫之名至于忠義大節持之益力唯恐或失之君子稱焉君之曽祖某祖某皆不仕父祥奉化州吏目以君貴封某郎麗水縣尹母陶氏封冝人配吳氏子男子五人存誠秉禮遵道率性逢原存誠秉禮率性皆先後君卒子女子四人長壻即彥方次歸吳濟二未行孫男六人浩漢潛牧敏孜女一人君卒之明年實吳元年丁未十又一月某日葬君青田嗚鶴鄊文龍原從先兆也􅌾後八年其甥祝金生懼君行事日就泯泯不勝凱風寒泉之思乃奉叔舅遵道命來徴墓上之銘豫聞福乃百順之名宰化權者其施之于人甚吝也有如項君以進士起家歷仕縣若州雖其末年數經兵亂卒能動與吉會優𥙿康樂以考終其身天之錫君蓋厚矣况有仁政以澤民詞章以垂後實應銘法豫雖不及接君遂按繁昌令趙叔懷之狀而件繫之且為銘曰智之營營才之轟轟孰能與福爭矧文足以致榮政足以發聲冝鬯而亨文龍之垌有松列旌馬鬛其形過者必式知為項君之塋周賢母傳周母王氏名妙貞括人祖德潤父思齊辟為州縣吏生十齡見父有戚容問曰家業幸粗給大人當開口笑樂何乃自欎欎邪父曰此事非爾女子所知吾所掌獄案死者欲生之不可得故弗恱爾王氏曰名教自有樂地何不棄之復溫繹書詩邪父曰不意女子能發斯言吾之意正如此耳即日揖上官去人賢之瀕嫁父欲厚其裝環珥鞶􅍤之屬無所不飾王氏視之淡如出示二女弟恣其所取既歸事君舅君姑盡禮處娣姒之間恆欣欣然或主中饋身先之不專役媵人鄰有寒餓及喪禍輒周其急嵗壬寅山寇作避地魯峰顛惡少年欲來侵掠王氏偵得實遣人擲其姦盜驚而潰其母項因世亂來依極力奉之以恱豫其心王氏嘗嬰疾衆醫束手謂不療忽夢老父與易氣及覺氣騰騰從頂升挾日絶粒不食已而復夢氣來復疾頓瘳識者謂為神助云其夫則周世英生男女各二女皆有所歸男曰荃曰茂茂有文學政事出仕矣王氏年今七十云金華宋濂曰豫嘗從史官之後遇人有善者必謹書之將以誘民衷而樹世防也有如周母能成父志推孝于尊章出其餘智亦足破雀鼠輩之姦其中必有大過人者矣于戲賢哉賢而得書亦春秋之法也宋學士文集卷第二十四翰苑續集卷之四
