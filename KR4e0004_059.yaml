  text: 宋學士文集卷第五十九芝園後集卷第九
  hash: sha256:23fb461bd5a4fbda97f6252dea59f9b857cfa9a9fe60e84374ee6db907248d42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_059-1a}
body:
  text: 靈隱住持樸隱禪師瀞公塔銘嗚呼人之生也出沒氣化之中因成果随夙有一定之業世雄氏所謂假使百千刼所作業不亡者一旦遇合雖大覺法王亦或有所不免故濂扵樸隱禪師之事恒若有傷焉師住杭之靈隱入院甫浹日寺之左右序言曰寺政實繁乏都寺僧司之師曰若等盍選其人乎衆咸曰有徳現者稱多才昔掌崇徳荘田䏻闢其萊蕪以食四衆儻以功舉其誰曰不然師諾之先是勤舊有聞歆現之獲田利率無頼比丘請扵前主僧代之及現之𬒳選也大懼發其奸私走崇徳縣列現過失縣令丞寘不問未㡬有健令至上其事刑部刑部訊鞫既得實以師為寺長失扵檢察法當縁坐移符逮師或謂師曰此三年前事爾况師實不知且不識聞宜自辨数可也師笑曰定業其可逃乎至部部主吏問曰現之犯禁尓知之乎曰留九十日乃還他若黄文獻公溍䝉古忠介公㤗不華翰林學士危公素其同辭稱師無異扵虞公名聞行宣政院元至正十六年請師出世㑹稽長慶寺陞天衣萬夀禪寺四方問道者聞風来歸師以氣衰倦扵将迎營精舍一區而歸老焉即前所謂和塔䖏也元云皇明龍興詔天下名桑門建㑹鍾阜升濟幽靈輪畨說戒師與上竺東𬈑日公五臺壁峰金公特𬒳召入内庭從容問道賜食而退巳而辭歸和塔若将終身焉洪武九年冬十二月靈隱虚席諸山交致䟽幣延師主之師不得已而赴未及期年而崇徳之禍作矣嗚呼世之學浮屠者不為不多習教者不必修禪脩禪者未嘗聞教師則兼而有之且通儒家言文又足以逹其意敷闡大論發揮先哲釋門每扵師是頼千百人中不能一二見焉竟以無罪謫死苟不歸之扵定業将誰尤㢤師殁後一年譯請虎丘大師仁公䟽為事状以濂與師友也来徴銘嗚呼師扵死生空矣譬如雲影谷音曾無繫着何假扵銘㦲然不見諸紀載恐無以白師扵天下後世濂因詳著其事而勒諸碑盖誠有傷扵中也師生扵越㑹稽縣父倪機母嚴氏皆號士族其諱元瀞其字天鏡别號為樸隱一時聞人多紀詠之容貌魁偉襟懐煦然如春世間機穽捭闔之術不識為何物性尚風義断江恩公與師締忘年交断江卒師為刋布詩集復請虞公銘其塔三主名山起廢𥙷壊具有成績夀六十七臘五十三三㑹語有録二卷詩文曰檏園集葺若干卷所度徒弟曰自宗曰𣑽詠曰𣑽諤等若干人嗣法而住院者曰禪慧智湛曰龍山普明曰昭福楚黁等又若干人云銘曰我觀群生所作惟業黒白雖殊影響無别囚縁合并如磁引鐡神應自然牢不可脱扵越之墟降生良緇氣量軒然欲吞虹霓義理蠶絲自何而推闢其通塗非東曽書乃經乃史載攻載讀擿其幽微罔不昭燭形諸篇翰龍錦盈束擲地鏗然溪白馬鄉髙撟之原其子扵深懼公之功行世系不昭白于天下晝夜兢惕自為状二萬言来謁新墓之銘濂守官少暇久未克論譔十年春正月䝉恩致政東歸私念公相知特深在前朝時欲尉薦入史舘及令待罪禁林實與公為同僚相得甚驩扵是評隲群行而勒文于碑其文曰公諱素字太樸姓危氏危本姬姓周武王庻子某生而手中有文曰因賜姓危氏封扵新其後居光州晋永嘉中建州刺史京遷建昌之南城唐黄巢之亂全諷與其弟仔倡赤手起兵擒勦黨栁彦章于象牙潭擢撫州刺史累官金紫光禄大夫檢校太傅封南庭郡王南庭之後復遷撫之金溪白馬郷譜圗亡竟逸其名南庭十五世孫宋景定三年進士通直郎知臨安府仁和縣事元累贈中奉大夫浙江等䖏行中書省叅知政事護軍追封汝南郡公炎震公之曽大父也累贈資善大夫河南等䖏行中書省左丞上護軍追封臨川郡公龍友公之大父也累贈榮禄大夫江西等䖏行中書省平章政事柱國追封豫國公永吉公之父也曽祖妣王氏彭氏祖妣劉氏皆封郡夫人郡之名如其夫母鄧氏黄氏並封豫國夫人公自至正二年用大臣交薦入經筵為檢討公年巳四十矣五年改承事郎國子助教七年除應奉翰林文字同知制誥兼國史院編脩官轉宣文閣授經郎兼經筵譯文官階文林郎明年復入翰林為應奉十一年遷儒林郎太常愽士十三年轉奉訓大夫國子監丞擢兵部貟外郎十五年陞奉議大夫禮部郎中拜朝散大夫監察御史遷工部侍郎明年轉朝請大夫大司農丞又明年陞中奉大夫大司農少卿復入禮部為尚書十八年叅議中書省事兼經筵官次年進通奉大夫御史臺治書侍御史二十年拜通奉大夫中書參知政事同知經筵事提調四方獻言詳定使司後四年階陞資政大夫俄除翰林學士承㫖榮禄大夫知制誥兼脩國史孛羅帖木兒入相出為嶺北等䖏行中書省左丞明年棄官居房山二十八年閠七月元順帝北奔淮王帖木児不花監國承制復起為翰林學士承㫖上章控辭已而元亡迨入國朝召至南京洪武二年授以今官三年兼弘文舘學士是年冬監察御史王著等劾公亡國之臣不宜用公坐免詔出居和州閱再嵗而卒公生四歲其大父即使公讀書大父本黄氏子来繼扵危知公䏻亢危氏宗督厲之尤切年十五即通五經大㫖據座為人師與同郡葛君将曽君堅黄君哻葛君元哲更相䇿警窮日夜不休復徒歩走臨川吴文正公澄清江范文白公悙之門質而正之二公皆折行莗與之為禮呉公至恨相見之晚凡所著書多與公參訂之虞文靖公集孫先生轍名徳俱尊其遇之一如呉公由是公之名震動江右間出㳺金陵或以其文示南䑓中丞張文穆公起巖張公以状元為顯官少所稱許獨推服公曰危君為状元庻㡬相當老夫有愧色矣張公入朝遂挾公以行逹官貴人慕公聲華爭欲出其門下更相論薦唯恐失之公之檢討經筵也經筵一月進講者三講文皆属公手公嘗敷繹民惟邦本之言以進典領臣惡其峭直難之公曰經筵之職所以格君心反不以民之疾苦告邪縦加罪罪在操觚者素請當之卒以進講順帝大恱詔賜經筵官酒公不飲復賜馬湩一革嚢金織文幣人一端皆有副已而有詔下中書發錢粟千萬賑河南永平民萬口咸曰活我者經筵官也公復移書執政請脩宋遼金三史乗傳行宋兩都訪摭闕遺書成公之力居多順帝知公問學淵深特命註爾雅較君臣政要公悉心而為之不数月而成及進賜金若干公辭曰臣職也何勞而受賜不敢奉詔㝷有宫人之賜公復辭曰臣有糟糠之妻在大江之南無所用之亦不受其助教成均也六舘生擇所疑群揖難公公片言折之恱而去分監上京輟餐錢建監門葺齋舍勒開國以来分教師之名于石尚書王某致政居蔚州搆暖泉書院請額扵朝他監官以地無先賢故事不從公聽其立師以訓士子順帝以公善筆劄詔書釋氏書公辭曰臣官胄監以教化民彛為職外教之典不宜書無已遷他官乃可耳遂止其授經宫學也受業生皆貴戚大臣子横肆不率度公創教條置帳曆日書其勤惰月㑹而賞罰之皆畏服不敢犯其復應奉翰林也㑹脩后妃功臣傳事多亡逸無據公買餳餅饋宦寺戚里歷歷叩之復參覆得實乃始筆之卒為全史其在太常也請親祀南郊築北郊以斥合祭之非謹謐法嚴祀典以祛謬妄時翰林承㫖張公翥為愽士禮文有闕者同𥙷正之人稱為雙璧其為國子監丞也捐束脩鋟小學書及夏小正經傳考于梓以惠學者其居兵部也奉詔墾田扵雄覇二州相地受畧薙除荆棘闢田㡬千萬畆使民有道民徳之其陞禮部也與許文正公衡之孫克學俱賛皇太子受玉冊故事皇太子謁廟用牲體百官以朝服賀扵東宫公謂克學曰儻有違禮人惟責吾二人盍正之遂徹牲體而以便服賀其擢御史也知無不言御史觀音保等四人以諫死英宗朝公請録其後官之四川行省平章政事嚢加歹天曆𥘉舉兵欲翊戴明宗燕帖木兒伯顔等搆殺之公力為雪其寃容城民魏敬益買田千畆後見鬻田者二十家不能自生以田劵還之公請旌其門以敦㢘譲其在工部也順帝欲以䝉古書譯釋氏三蔵經下部刋行公以無益諌罷之執政居第與燒飯橋近有司希其意欲鑿石易橋公諍止之􅑙香祀嶽瀆故用金十两為香凾吏利金以銅半雜之或造銅凾易金公㢘其状皆執論誅之淮南兵亂公奉㫖㢘問其故㑹維揚京口歲饑民欲相食公便宜諭守臣發楮幣数萬定賑之所全活者甚衆上淮西宣慰使余闕捍賊功状請陞其官秩復請立宋徐節孝書院扵淮安其官大司農也分治京南保定之境㡬無曠土時海輸不至軍國多仰焉新城民田氏聽後妻䜛殺其子公憤之職既不可治乃為文祭其子民悔愧後妻逃去人揺手相戒不用婦言其長禮部也時亂将亟公憂之每陳得失無隱丞相賀惟一曰君向寡言今又何多也公曰時危恩重情豈能黙黙吾不敢畏丞相但畏後世史官耳其叅議中書也論天下事以擇将帥舉賢才為本請專任甘肅行省平章定住總西方兵勿遺其迎帝師悮軍事用樞宻副使普顔不花為中書參政經畧江南以也先帖木兒黄常為禮部尚書頒曆安南立兵農宣撫使司以安畿内任賢守令以撫流竄之民順帝欲以公兼兵農宣撫使公以踈逺辭且諌曰今日之事宜臥薪嘗膽以圗中興可也公言雖愈加切時不能盡用舊制銓曹有行止科吏主之日具内外官十名上中書中書籍以遷擢其後吏怠不為意仕者淹滯有待選十餘年者公責吏日具五名五日一上中書吏樂易集各思奉職而乆滯者獲伸髙原富民劉強通其子婦婦訴官逹刑部吏受賕欲變其獄以俟赦公以事關倫理趣如法論之其轉侍御史也亂兵殺易州逹魯花赤公請假守令以制兵之權㑹中書左丞成遵而下以贓得罪獨賀丞相幹栾平章與公不與皇太子書澄清忠義清白傳家八字以褒賜之其參知政事也刑部尚書朶列圗兼興和路總管與守将有隙守将誣其欲私發官囷粮廷議杖踰百免其官公驗無發封状釋不問都事倪晦與劉哈刺不花同官丞相太不花莫府数以公事忿爭劉怒欲中晦隂結監察御史劉君楚俾擠之㑹晦至燕都嚢故人所寄買馬白金君楚攟其嚢得金下晦獄令自伏為贓状上中書公疑亟為白出之馬徳守徳州俘所獲南軍千户楊甲至都将斬之公召問状乃淮安世襲千户戰敗䧟濟南群盗中陳柔俾詣徳軍饋物徳械送之非賊也公白宰相釋之揚感泣曰參政生我枯骨中惠大無以報然參政長者為公法釋我我不敢私謝期以忠義報可也卒與逆臣孛羅帖木兒戰死之太醫院經歷徐某蔵盗贓盗敗徐就鞫案已具要官庇徐屬公從末减使三返公竟不許嶺北行省參政董復𥘉素有㢘名同省臣飛書言其在稱海宣慰司時取官中米千石公疑其事遣使覈覆之果得其誣孛羅帖木兒廓擴帖木爾俱以平章總兵河南漸主釁端公謂御史大夫普化曰養虎者欲其不相搏噬則别其牢今欲二人無闘莫若加其職而分地䖏之用孛羅帖木兒為丞相治四川以廓擴帖木爾為丞相治河南各責其成功可也大夫曷不為上言之普化如公言順帝及皇太子咸以為然㑹丞相搠思監䘮妻不出事中寝𥘉江南經畧使普顔不花李國鳯請封徽國朱文公為齊國公以龜山楊公豫章羅公延平李公西山真公九峯蔡公從祀扵孔子廟廷公為御史時亦請封謚劉蕡事上中書皆寝不報至是公皆舉行復為文以少牢躬祭賁墓禮部貟外郎姜碩使偽漢陳友諒不屈而死公為奏官其子京畿歉國用不足公奉㫖以錢幣誥勑募民入粟公以義諭民聞者感動荷負来輸者填道至有不願給直者上都宫殿火順帝勅重建大安􅌖思二閣公上書諌曰苟以二閣為祖宗所建四海九州獨非祖宗故物乎㑹皇太子大臣亦以為言遂罷其役其承㫖翰林也翰林修史有司日奉餐錢方為之否則歛手而坐公謂同列曰吾等以史為職且禄巳厚矣奚俟餐錢而後為邪因次第修之其以左丞居嶺北也和寜為太祖肇基之地而無圗志可徴公請扵朝作和寜志先是夏侯尚玄嘗伏闕上䟽言郯王某之寃公髙其義𥙷其子為宣使時埜速達兒為㣧平章挾私憾殺右丞荅里麻巴公曰是尚可以仕邪不去禍且及即上章辨荅里麻巴無罪辭官去居房山臥不起将相重臣皆以書請不聽丞相史列門来問計公曰撫軍院誤國至斯不可救矣亟請河南王廓擴帖木爾總兵以衛畿甸而固守之當時事勢巳不可為及再任翰林僅一日而木兵入燕公曰國家遇我至矣國亡吾敢不死趨所居報恩寺脫帽井傍兩手㩀井口俯身将就沉寺僧大梓與番陽徐彦禮大呼曰公母死公母死公不禄食四年矣非居位比且國史非公莫知公死是死國之史也力挽起之已而兵入府蔵垂及史庫公言于鎮撫吴勉輦而出之由是累朝實録無遺闕者公之力也其入國朝也皇上嘗訪以元興亡之故甚見禮重俾之侍講禁林宋穆陵顱骨為楊輦真珈所發後入宣政院西番僧相傳授為祭噐公言于上索取瘞之聚寳山時公春秋巳髙雅志亦不復仕矣公厚重深中有容寡言笑聞人詆毀如不知與人交有禮雖貴顯恒若貧賤時平生好薦賢先後所引若翰林學士劉君献待制黄君哻等七十餘人至通顯者甚衆累持文衡考試多士人服其公樂善好義若有督之者凡事有關扵名教可以勵風俗者必為之乃巳居官清慎節儉遇凶嵗輒䟽食不御酒食倉吏進禄米贏七斗時斗可易白金五两公命歸之官奉敕書徽政院使秃滿逹兒神道碑其從子以白金五十两為夀公却之曰國體當爾居中書凡請文来謝者皆不受故人妻子不能衣食者厚賙而生之於嘗請仕公曰賢才未進吾敢私尓乎能以徳報怨參政燕人杜翺以公南士欲搆公罪翺死金陵公為文祭之公愽學善文辭至正中獨以文鳴天下凡朝廷制作皆自公出四方欲顯白先徳者皆造公門尤精扵書得片楮隻字者寳秘以為榮有文集五十篇奏議二卷宋史稿五十卷元史稿若干篇蔵于家公娶舒氏先三十年卒再娶趙氏先十一日卒俱封楚國夫人于男子二人扵中至正二十年進士第累官承直郎大都路同知薊州事今為安慶府儒學教授游登仕郎大都路儒學提舉亦前年卒女六人一適同邑曽侁堅之子也餘皆夭孫二人長太平夭次徳童公未仕時舘授貴谿張氏張思伐杏樹以闢家塾有鬼夜叩寢門告公曰吾杏之精也主人将伐願參政生之公即造張力觧而止鬼致白金壷爲謝公辭及公爲參政嘗以滿盈爲懼後陞左丞遂怏怏不樂云嗚呼天之扵人不䏻以俱全也乆矣或授之才而不假以位或卑以位而不卑以時此竒才偉徳之士常困而不施而生民所以鮮䝉其休澤也惟公以淵深之學精純之文嘗都顯要之地位海内仰之如祥雲景星亦可謂有得扵天矣而逢時亂亡不獲大展以死豈不可哀乎雖然觀其所自著者固足以不朽矣銘曰二氣孕精至文廼生凝爲川嶽煥爲日星天地之文因象以示象黙無言非人莫著徃古百代作者孔多迄今有聞其䏻㡬何元興朔方氣淳而龎俊烈宏謨震盪萬邦積盛而彰寔在君子維八十年其績甚偉卓兹危公起大江西奥學醇辭孰能與齊在至正𥘉交薦而陞敷繹聖經以牗帝明中原荐饑黎首告病公跽而言民為國命同列畏聞吐舌改容當宁褒嗟曰維汝功往師成均矇瞽有相化其荒嚚趨厥禮譲貝葉之文有詔俾書非職所宜正色控辭或服豸冠或為宗伯或居中䑓或參廟畫孰寃弗雪孰善弗褒孰蠧孰莠弗除弗薅白之擢之予之錫之剔之殛之扶而植之彼何不思多言是訾曰匪其然吾畏後世南風泱泱耆老論亡屹如丘山以鎮四方疆土日蹙孰不震動謂尚有公恃以無恐權奸肆威盗秉國鈞畏公有言出為籓臣政亂無章倚勢相戮公駭而吁吾胡可禄微服宵趨房山是居庻士遑遑如渉失桴天兵北征驅雷走霆有耳莫掩燕社巳傾公曰國亡吾曷不死公忍不死以存國史大明方隆多士景從有詔任公侍講禁中昔豈不仕弗獲竹道時之可為公則既老維古賢士立徳樹勳苟有弗施著之斯文公文之純大音玄酒道則在兹爵禄何有孰髙為山孰深為淵文之有傳終古昭宣海東石硯銘二形圓如日出海東五色寒芒貫當中發為人文亮天功毓至陽産榑桑玉之英人之章硯銘三玄之胄靜重故夀以墨為守勿䡖售弘經演道尓則茹之掞葩揚藻尔則吐之如鐡之堅尚欲磨而穿况斯石也乎夜窮晝研翕坤闢乾期逺躋扵聖域乎宋學士文集卷第五十九芝園後集卷第九
