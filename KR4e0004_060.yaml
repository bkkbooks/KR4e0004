front:
  text: 宋學士文集卷第六十芝園後集卷第十
  hash: sha256:ba61b1f6faa839a46e4fd6e5c977931769b81296cbf45fb3a47e3c65ce745bc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_060-1a}
body:
  text: 上天竺慈光妙應普濟大師東𬈑日公碑銘皇帝受天明命奄有方夏鴻仁惠澤覃及幽明扵是有學僧伽奉詔入京上御奉天殿丞相御史大夫暨百僚咸在而僧伽魚貫而見時東𬈑大師年最髙白眉朱顔其斑前列上親問以升濟沉冥之道師備述其故上恱顧衆而言曰邇来學佛者唯飽食優㳺沉薶歲月而已如金剛楞伽諸經皆攝心之要典何不研窮其義苟有不通質諸白眉法師可也自後数召見字而不名人皆以為師榮及建鍾山法㑹請師説毗尼凈戒聞者𨳩懌時洪武五年春正月之望也師辭歸杭之上天竺山日修西方安養之學冥心合道不雜一念十二年秋七月朔日夢青蓮華生方池中華色敷腴清芬襲人既窹召弟子妙脩曰此生凈土之祥也吾去人間世殆不逺乎至四日趺坐書頌合瓜而寂世夀八十又九僧臘七十有三其月十日奉全身蔵于山之西峰妙應塔院妙脩乃具行業来言曰先師有墜言吾死非宋學士不可以銘吾塔執事嘗與先師㳺敢援斯故竊有所請濂前年幸謁師見師精神浮動眉宇間戯謂師曰法力所攝師之四體當益強濂歲嵗上京師必過虎林必與師談辯如今日也師曰學士固未艾老身石火電光爾烏能乆乎遂一笑而别豈意師果脩然而西徃乎銘何敢辭師諱慧曰號東𬈑天台赤城人宋丞相賈魏公諸孫志慕空門徃縣之廣嚴依平山等公落髪為桑門時子庭訓公講台衡之學扵赤城師走輪下而受其說依科指授便䏻領其大義觸類而長日增而日益子庭嘆曰投丸下峻坂不足以喻其迅疾也北峯之道其藉之以大昌乎自是子庭一屬意扵師􅍓代相承微㫖所以扶正斥邪伐異歸同者無不言之師之學沉浸醲郁而名動一時矣一旦假寐似見有竹横地下竹上所凝者白粥粲然師因臥而餐之及覺言扵子庭子庭曰竹粥與竺同音子得就地以食其縁殆在上下两天竺之間乎子宜亟行師即持瓶錫而出逺度浙河拜竹屋凈公扵上竺觀音教寺竹屋見師俊頴輒留之所䖏頗卑濕師賦詩以述其事竹屋見之謂其衆曰此郎不凡他日當嗣主兹山不可以少年易之為遷燥剛之地遇之如賔友㑹有營繕之役而施金帛者接踵而至勤舊僧欲掲示氏名以勵其餘選工書者衆卒無以應師揚𬒮出曰吾試為之霞布雲舒精采煥發竹屋見之尤喜且曰吾前言果不謬矣翹翹蒼松挺出扵荆榛之上者非其類也邪命典賔客㝷更掌僧籍竹屋既示寂越溪澄公自演福来繼其後越溪甚器師延居後堂之版首未㡬出世吳山聖水越溪念之弗忍舍復招還山䖏以上座以表儀四衆吴楚閩蜀之士趼足而至者動以百計師隨其性竇淺深而䟽導之作人之盛當時罕有其比元重紀至元四年行宣政院采諸人望以主列刹而師獲住薦福􅍓三暑寒下竺靈山教寺災至正元年宣政使髙公納麟謂非師無以膺起廢之任移師涖之師至脩普賢大士殿雲間大姓蔡氏邀師至家施錢十萬緡師過姑蘇大致香楠為材曽未㡬何大雄寳殿成蔡卒其妻夏氏為刻佛菩薩洎觀自在大阿羅漢諸像黄文獻公溍實為之記四年髙公又遷住上天竺子庭所謂上下两天竺之徴至是益驗矣師知縁契在斯夙夜注心㒺敢怠遑走募多金之家𥘉脩大殿次建三觧脫門次鑄巨鐘搆危楼以冠之次營重閣講堂上祠諸祖下為講法之所他若白雲堂選佛塲及諸寮宇一一皆完復罄已槖甓通塗自普門逹扵三門凡寺制所宜有無不具焉帝師大寳法王嘉師法行賜以金襴法衣及慈光妙應普濟大師之號十六年師自念人貴知止汲将焉求竟撾皷而退隱于㑹稽山水間飄飄然如野鶴孤雲人不知其為師江浙行省丞相逹識帖穆爾公方領宣政院事遣使者以物色訪之力請還山躬帥僚属奉幣以上師知其誠復再正法席前後所住凡二十五年國朝洪武改元始獲謝事扵塔院云師軀幹脩偉眉長三寸餘其白勝雪目睛閃閃射人道徳餘光所照不問耄倪見師經行讙曰我白眉和上来也爭持香華以為供養居常顔面嚴冷片言不妄發即發雖對王公大臣未嘗出一軟媚語至扵誘掖後進辭色温如春陽天台四明所著諸書循環𨳩授止而復𥘉聴者咸謂披青雲而見白日其在京時輿論以瓦官昇元教寺乃天台𥘉釋法華道塲不可乆廢乃以其事上聞即天界禪林别建室廬以存舊號請師𨳩山師為升座說法九府大浮屠皆俯首以聴風聲所𬒳遐邇翕然歸心師所度弟子甚衆其在下竺則圎具等十人上竺近二百人而妙思妙本妙脩為最先嗣其法系者則思齊行樞允鑑允忠良謹普智文㑹元琇景𣑽各闡化扵一方今繼師住上天竺者即妙脩也濂聞法智尊者中興天台之道五傳至北峯為尤盛北峯諸子無不競爽而佛光桐洲剡源為最良剡源之孫曰越溪而桐洲之孫則玉岡也師為佛光再傳之嗣視越溪玉岡為法門兄弟先後同荷大法攝受有情法筵特為江南之最柰何越溪玉岡同年化去而耆徳偉望唯師之存巋然如魯靈光聳人瞻敬三十八年之間其弘宗助教有功多矣苟不勒諸圎廟之碑何以垂示㒺極而慰學者之思㢤乃從妙脩之請而述銘曰人天之際所貴惟誠能貫鐡石可達潜冥世之修學思證無生舎此不務其將孰營倬彼大師為時俊英依科攻義分䟽㝷經春蒸卉木水翻建瓴天延法㣧神夢符禎出演鴻寳丕昭性靈龍鬼夜聴寳華書零肯昧道器一混渭涇飛楼矗矗湧殿亭亭棟吻獸攫桯礎螭擎琅凾飭鳳華簴鏗鯨一實所感百物交并有仆必起無廢不興惟心所證諸縁莫攖塵毫無累體用咸貞聲竭表裏脗合幽明出言石墜轉盻霜凝釋門蓍蔡刹海章程屬兹象末倚作金城豈期蓮蕚遽生凈泓三宗抱戚四衆含情魂㳺樂國魄閟泉扃世相莫廢人文是徴後千百載尚信斯銘春秋本末序洪武十一年复五月皇太子御文華殿命侍臣講讀春秋左氏傳既而曰諸國之事雜見扵二百四十二年之中其本末未易見曷若取春秋分記而類入之分記眉人程公說所述有年表世譜名譜世本附録等類頗失之繁但依世本次第成書先周尊天王也次魯内望國也次齊晋主盟中夏故列之魯後而齊復後扵晋以晋於周魯爲親其覇視齊爲長也自齊而下次宋衛葵陳地醜徳齊而宋以公爵列扵三國之首衛蔡陳之爵皆侯也鄭曹燕秦皆伯也陳蔡獨後異姓也若楚若吴若越以僣號見抑于春秋並居其後而小國戎狄附焉扵是文學臣傳藻等受命纂輯編年一主乎魯雖曰無事一年各具四時諸國依前序次各繫以事其有一事再見及三見者通繫扵主覇者之下若重復者則削之訓詁以杜預為之主凢例所及一一取㫖而後定繕寫為三十卷自春和門投進皇上聞而嘉之賜名曰春秋本末勑内官刋梓禁中以傳示四方臣濂聞諸師云五經之有春秋猶法律之有㫁例也法律則用刑禁暴以為之范防㫁例則斟酌物情是非而定罪之重䡖也是故古之君臣無不習扵春秋使君而知春秋方能盡代天理物之道使臣而知春秋方能盡事君如事天之誠天衷以之而昭民彛以之而正何莫非春秋之教也然而尊王賤覇内夏外夷其書法實嚴必當曲暢以觀其同參互以察其變所謂屬辭比事者始可言也不然如渉彼大海渺無津涯豈一蠡之可測㦲敬惟皇太子殿下潜心聖學其扵六經之文循環讀之而尤惓惓扵春秋今命宫臣纂輯成書一覧之頃其本末瞭然斯殆以人文化成天下也歟皇上以大舜之資善與人同凾命流布扵四海是心也天地之心也臣幸生盛時遭逢兩宫之聖不勝慶忭之至輒忘䟽賤著其述作大意扵篇首其校正無訛者翰林典籍臣劉仲質國子助教臣儲惟徳正書入梓者中書舍人臣朱孟辯臣宋璲臣桂慎鑄印局副使臣詹希元云洪武十二年嵗次已未五月五日前翰林云云臣金華宋濂稽首謹序王冕傳王冕者諸暨人七八歲時父命牧牛隴上竊入學舍聴諸生誦書聴巳輒黙記暮歸忘其牛或牽牛来責蹊田父怒撻之已而復如𥘉母曰児痴如此曷不聴其所為冕因去依僧寺以居夜潜出坐拂膝上執䇿映長明燈讀之琅琅逹旦佛像多土偶獰惡可怖冕小児恬若不見安陽韓性聞而異之録為弟子學遂為通儒性卒門人事冕如事性時冕父巳卒即迎母入越城就養乆之母思還故里冕買白牛駕母車自𬒳古冠服随車後鄉里小児兢遮道訕笑冕亦笑著作郎李孝光欲薦之為府史冕罵曰吾有田可畊有書可讀肯朝夕抱案立庭下備奴使㢤每居小楼上客至僮入報命之登乃登部使者行郡坐馬上求見拒之去去不百武冕倚楼長嘯使者聞之慚冕屡應進士舉不中歎曰此童子羞為者吾可溺是㢤竟棄去買舟下東吴渡大江入淮楚歷覧名山川或遇竒才俠客談古豪傑事即呼酒共飲慷慨悲吟人斥為狂奴北㳺燕都舘祕書卿㤗不花家㤗不花薦以舘職冕曰公誠愚人㦲不滿十年此中狐兔㳺矣何以禄仕為即曰将南轅㑹其友武林盧生死滦陽唯兩㓜女一童留燕倀倀無所依冕知之不逺千里走滦陽取生遺骨且挈二女還生家冕既歸越復大言天下将亂時海内無事或斥冕為妄冕曰妄人非我誰當為妄㢤乃携妻拏隱扵九里山種豆三畆粟倍之樹梅花千桃杏居其半芋一區薤韭各百本引水為池種魚千餘頭結茅廬三間自題為梅花屋甞倣周禮著書一卷坐臥自随祕不使人觀更深人寂輒桃燈朗諷既而撫卷曰吾未即死持此以遇明主伊吕事業不難致也當風日佳時操觚賦詩千百不休皆鵬騫海怒讀者毛髮為聳人至不為賔主禮清談竟日不倦食至輒食都不必辭謝善畫梅不减揚𥙷之求者肩背相望以繒幅短長為得米之差人譏之冕曰吾藉是以養口軆豈好為人家作畫師㢤未㡬汝頴兵起一一如冕言皇帝取婺州将攻越物色得冕寘莫府授以諮議參軍一夕以病死冕状貌魁偉羙鬚髯磊落有大志不得少試以死君子惜之史官曰予受學城南時見孟寀言越有狂生當天大雪赤足上潜嶽峯四顧大呼曰遍天地間皆白玉合成使人心膽澄澈便欲仙去及入城戴大帽如簁穿曵地袍翩翩行雨袂軒著譁笑溢市中予甚疑其人訪識者問之即冕也冕真恠民㦲馬不覂駕不足以見其竒才冕亦類是夫重建寳婺觀碑婺之寳婺觀祠婺女星始作扵唐武徳四年𥘉在郡城西北呉越有國時刺史錢儼徙於子城上西南陬宋淳熈十三年以知州事洪邁請賜今額元九十年毀于火者再皆官作之國朝洪武五年秋觀復災主觀道士楊道可與其徒同姑者徳生徳清謀謂祠星所以休民興役而出扵官是厲民也厲民弗祥乃持曆走境内告于衆庻各出貨泉相厥事而属劉仲謀等十餘人司出納之任伐木扵大山長谷乗流而致于城下僦匠傭工甓城増址作正殿五楹間其南為重閣三間殿與閣之中搆為飛亭亭之後先聮屋以合庭霤三門舊在閣南正直通塗今遷閣東三十歩由門循廊西上抵玄武神祠又折而西始升扵閣三門之右别建玄壇廟餘若齋居賔舘之属各以次就緒而星之像猶未具先是杭州衛都指揮使徐君司馬嘗出鎮扵婺屡徼靈于星祠其在杭也夢有所見遣使者問所湏以像闕告因命斵沉水香爲像名其閣曰靈華而奉像置其上道可復迎其教所嚴事者共祠焉工始扵災之明年越六春秋至十二年冬始成盖役夫糜錢以鉅萬計而有司不知州民􅌚忻趨謁以爲有所憑依不可無以示来者扵是道可持弊走告于濂曰婺以星名州星之澤州民者甚大宋宣和三年方臘反睦将䧟郡統領劉光世討之兵次蘭溪未敢進夢霞冠羽衣神趣之行且以病指告劉至盗黨就禽及謁星祠其像如夢中一指将墜開禧三年大水先期告守土吏爲備民不漂溺景㝎四年武義山㓂爲亂来犯城屯於溪南遇媪鬻屨長数尺盗恠問之媪曰城中人屨皆若是耳盗驚散去元至元十三年郡既降復守元将髙興怒欲屠城夢神論以勿殺明日以火矢射觀矢返堕軍中見巨人坐城上濯足城南水中大駭遂下令風民降不敢栽一人至正十六年沿海翼兵自蘭溪夜叛還謀襲郡城神化婦人導叛兵食瓜田間食巳皆昏迷失道至城而天巳曙官兵有備遂伏誅此皆彰灼可徴之大者而疾􅸳旱澇之禱為尤驗固未易悉数也今觀事幸復乎故皆神靈之所致碩并記之濂曰婺女之扵兹郡猶叅之扵晋陽辰之扵啇丘固宜祠而祭之然惟有國者得祭禮也民之祭者情也先王之教謹禮而不違民之情一乎禮則拘專乎情則濫在人折衷焉耳且田祖先嗇民以其有功一執巳猶思之祭之况昭囬于天恃頼以為司命者乎說者乃謂自南斗十二度至婺女七度為星紀吴越之分皆属焉何獨婺之人得專祠婺女乎是不然呉越之分固廣而斗牛女之所該亦廣苟以纏度細推之郡之墟正上真扵婺女爾星之降祥焉可誣也今道可劬躬焦思而盡力扵神無非為民祈福濂如其請特載星之威靈亡宋學士文集卷第六十芝園後集卷第十
