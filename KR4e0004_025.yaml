  text: 宋學士文集卷第二十五翰苑續集卷之五
  hash: sha256:d39c3e0ac6dc8d41efad4a9716adc3d5d7fd0292058e67ecaaf475ecd2927d69
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_025-1a}
body:
  text: 天界善世禪寺第四代覺原禪師遺衣塔銘有序浮圖之爲禪學者自隋唐以来𥘉無定止唯借律院以居至宋而樓觀方盛然猶不分等第唯推在京鉅刹爲之首南渡之後始定江南爲五山十刹使其拾級而升黄梅曹溪諸道塲反不與其間則其去古也益逺矣元氏有國文宗潜邸在金陵及至臨御詔建大龍翔集慶寺獨冠五山盖矯其弊也國朝因之錫以新額就寺建官縂轄天下僧尼當是時覺原禪師實奉詔涖其職夫當興王之運親受聖皇付嘱以統釋教之事誠優鉢曇華千年一現者也其順寂也惡可不勒群行以貽後世乎師諱慧曇覺原其字也姓楊氏天台人父某母賈氏夣明月自天而堕取而吞之遂有娠及生容貌嶷如長不與群童狎每入塔廟輙對法王瞻禮父母察其有方外縁俾依越之法果寺比丘某年十六爲大僧受具戒已而學律扵明慶杲公習教扵髙麗教公真積力乆忽拊髀嘆曰毗尼之嚴科文之䌓固吾佛祖方便示人若欲截㫁衆流一超直入非禪波羅宻曷能致之時廣智禪師咲隱訢公敷揚大法扵中天笁海内仰之如景星鳯皇師徃造焉俻陳求道之切廣智斥曰從外入者决非家珎道在自已奚向人求耶師退凝神獨坐一室乆之未有所入廣智一日舉百丈野狐語師大悟曰佛法落我手矣只爲分明極翻成所得遅廣智曰爾見何道理敢爾大言耶師展雙手曰不直一文錢廣智頷之乃命侍香天曆二年巳巳龍翔新建文宗命廣智爲開山住持師實從之爲掌臧鑰明年庚午廣智如燕都見文宗扵奎章閣同行者皆股栗不能前師獨神氣恬然廣智嘆曰真吾家師子兒也及歸適寺新鑄銅鐘成廣智曰吾聞非福慧兩全者莫先鳴鐘即令師擊之至順二年辛未出世牛頭山之祖堂寺師畚剔穢荒爲之起廢使殿閣一新且改其號爲祖山寺至正三年癸未遷住清凉廣惠禪寺師撙節諸用其起廢一如牛頭帝師嘉之授以净覺妙辯禪師之號十五年乙未復遷保寧禪寺十六年丙申王師定建業師謁皇上扵轅門上見師氣貌異常嘆曰此福徳僧也命主蒋山太平興國禪寺時當儉嵗師化食以給其衆無闕乏者山下田人多欲隷軍籍師懼寺田之蕪廢也請扵上而歸之山之林木爲樵者所剪伐師又陳奏上封一劒授師曰敢有伐木者斬至今盖欎然云踰年丁酉賜改龍翔爲大天界寺詔師主之毎設廣薦法㑹師必升座舉宣秘法要車駕親帥羣臣幸臨恩數優洽逺邇學徒聞風奔赴堂筵至無所容先是僧堂寮庫有司權以貯戎器乆而不歸上見焉亟命相國李韓公出之且親御翰墨書天下第一禪林六大字懸扵三門洪武元年戊申春三月開善世院秩視從二品特授師演𣑽善世利國崇教大禪師住特大天界寺統諸山釋教事頒䧏誥命俾服紫方𫀆章逢之士以釋氏爲世蠧請㓕除之上以其章示師師曰孔子以佛爲西方聖人以此知真儒必不非釋非釋必非真儒矣上亦以佛之功隂翊王度却不聽上聞寺僧多行非法命師嚴馭之師但誘以善言諸郡沙門汗染習俗實悖教範或勸當痛治師曰諺有云大林有不材之木能盡去乎祗益釋門之累爾事呈露者勿恕可也二年巳酉冬中風得瘖疾遂罷院事三年庚戌春三月疾良已夏六月奉使西域四年辛亥秋七月至省合刺國布宣天子威徳其國王喜甚舘于佛山寺待以師禮九月庚午示微疾食飲弗進甲戌見王有欲歸之意王令名僧咸来相慰乙亥沐浴更衣呼左右謂曰予不能復命矣跏趺端坐夜參半問云日将出否曰未也已而復問至于四三曰日出矣恬然而逝其日盖丙子云壽若干臘若干踰五日顔貌如生王大敬嗼斵香爲棺聚香代薪築壇而茶毗之王與百僚送至壇下命比丘千餘旋繞誦諸陀羅尼呪至火滅方已拾靈骨祔塟其國舎利塔中七年甲寅秋九月丙寅同門友天界住持宗泐奉遺衣蔵于南京聚寳山雨華䑓之側云師廣顙豊頥平頂大耳面作紅玉色耳白如雪目光爛爛射人學者見之不威而懾及即之也盎然而春温其遇禪徒隨機而應未甞務爲竒巧聞者自然有所悟入遭際昌辰寵賚便蕃雖位隆望重恒䖏之若寒素無毫髮自矜意爲人寡言笑喜怒任真不能以貴賤異其顔色當勾稽簿書至不能辨真贗卒爲下人所欺亦弗䘏也然而毗翊宗教無一息敢忘廣厦細旃之間從容召對㩀經持論每罄竭其藴畜松園之復釋道私祖之免皆師之所請也師平生不輕度弟子其嗣法上首蔣山法印國清導升天寜純一道埸願證净戒皆有聞叢林間願證應縁入仕爲應奉翰林文字大懼師行泯沒件繫成書授之净戒以戒尚風義死生不易其操必能昭廓其幽潜今證巳亡矣戒果能謁濂求爲塔上之銘濂甞與師㳺而共願戒交尤洽不得以不敏辭濂聞之龍翔禪林實甲天下創建之𥘉非名徳之重莫能主之是故廣智握真如印柄道明宗甞使輝光照燭扵幽隱矣及今六合載清真人撫運崇尚佛乘錫額建官以統馭其衆非得法扵廣智者亦孰能任其始乎嗚呼何其規重矩疊而一倡一新也在昔馬駒蹴踏氣宇恢弘出其門者無非龍象有是學者因有是師先徳固亦然矣由是方之廣智之傳實由正宗師之所契親得其髓固非常情之可擬議然称人之善必本其父師厚之至也濂敢竊取茲義序其事而爲之銘銘曰金陵有寳刹昔爲潜龍居飛翔起中天樓閣重重現聖皇握金輪重御四大海易爲大天界以表正法故唯師蚤脩證廣智法㑹中帝命作縂持欲符扵前烈扶護法王法如寳雙眼目秪恐昏翳蝕光明不徧照况能攝威儀見者生敬畏統率諸僧伽無不從化者出持使者節直抵中印土道憇一王城懇請爲說法羣羗如見佛膜拜稽首禮四大本假合去住兩無礙笑指空中雲聚散不㽞迹築壇聚衆香付之大火聚沙門餘一千圍遶作𣑽唄收骨蔵勝塔作鎮扵異域睠此行道所何以示四衆同𫀆有大徳假物以顯義遺衣在故篋見衣如見師瘞之雨華䑓當與靈骨同我知此衣中何啻千萬縷絲絲具暖性性圓即菩提師性千古存是有無邉身比之虚空相普見扵一切何假有漏形方號爲真實實際是真空永㫁扵言說我持不壞筆太虚以爲𥿄銘此無縫塔了不見一字若以两耳觀始造不二義孝思庵記錢塘王生驥年二十即以春秋預薦浙江郷闈既貢南宫廷生畊避五代亂以文行稱周乾化中仕呉越官至烏程倅烏程之弟宋錢唐令畎遂居虎林山中實驥之十五代祖也驥之髙祖父韓某曽祖父諱植皆以力本尚義見稱郷人多徳之祖父名暹字子愚錫號爲明誼處士生先君諱常年三十出㳺番禺不幸客死時驥始七嵗無所識知頼大父鞫育教訓以克至有今日先是大父甞圖地扵西湖北山之間曰駝巘嶺嶺有三竒石怪松根蟠其上欎然可觀大父既預爲壽蔵且曰此新兆也吾敢居其首乎南山梯子嶺先世数大墓存焉年逺不敢遷倣古者塟衣冠之義斵木爲主書吾父名諱瘞其中他日吾則祔其旁搆庵廬三楹間顔之曰孝思示後世不忘其先也驥聞而識之乆欲以庵記爲請先生脩史事嚴不敢有所聞毎念驥来南京時大父挈驥拜曽大父墓下慨然曰爾能頗知讀書以亢吾宗非我之功實祖宗之澤是頼爾出扵千里外慎母忘孝思也驥尤不能置于懷願先生嘉惠之孝思之說其見諸傳記者不一而足非止乎詩也然其所謂孝者立身揚名使天下之人皆曰王氏有子豈不爲孝之大者乎若規規不離乎親側號諸人曰我能養我能養而父母之名雖同里閈亦若無聞知如此而爲孝将焉用孝乎今生始加冠巾輙𬒳薦乎郷入侍藩王以文辭上簡帝心其榮可謂至矣榮之至者孝之䔍他日位益顯名愈揚使生者受封爵殁者膺貤典則生之孝又爲何如㢤是則孝思之義巳庸非生之大父所深望者乎予與生有師友之義爲記其庵故不以頌而以規送陳生子晟還連江序洪武七年十一月十二日皇太子臨大本堂召東宫賛讀及諸王府伴讀凡二十五人立庭下諭之曰爾等離父母去墳墓者三年于茲冬氣向深草木揺落寧不惻然動懷土之情乎吾巳爲尔請于上宜各旋歸歸即遄至無以乆淹爲也復命左右出内府錢若干以爲道塗費衆皆羅拜而退時閩之連江有陳生子晟者以周易中第三名文觧上禮部既而䑓臣以其詞章古雅選入爲楚王府伴讀朝夕陳說經義甚爲王所賔禮及奉教令還閩詣予言曰子晟乆侍几杖今将有三千里之行願先生賜一言以自勗也予曰爾之從我者學爲文耳文豈易言㢤翻秋濤之洶湧屹喬嶽而不遷沛元氣之淋漓未足以喻其變化也能知變化則􅞂遷轢固蹴蔡駕韓燁然有光萬丈矣孰能掩之㢤爾以學止扵是乎生曰然予曰未也聖人垂訓皎若丹青所謂載道之經是巳經則萬世之凖繩也推其訓故以覈其原繹其文義以逹其支使言與理相涵而無悖去之者方可排斥毛鄭輕視王馬而靡所不通矣爾以學止扵是乎生又曰然予曰未也上天下地其中爲人號曰三才功用則均上帝所降之衷日保守而弗失氣或我梏也吾則廓而通之欲或我戕也吾則絶而逺之内外混融庻㡬與天爲徒矣與天爲徒則見諸用者窮則獨善其身逹則兼善天下無所入而不自得焉是㪺濂洛之深泓而挹沂泗之清冷者也顧不韙歟生以爲何如生避席而拜請書所與言者佩而行之予老且病四方求文者日相迫趣誓欲燔筆硯以自絶憐生之篤志扵學因冩以爲贈雙鯉軒銘侍儀使唐希孟氏以雙鯉名其奉親之軒志養也養亦多物矣而獨取扵鯉者何親所嗜是謂口體之養者也能竭力扵口體之養則養親之志可知矣希孟以孝聞公卿間予故發其名軒之義而著爲古聲詩焉其詞曰蘇有孝子善事于親父不待養而母獨存孝子曰噫父母生我念父不見雙淚潜堕幸有母存是瞻是依一日不見惄焉踟躇戢戢者魚亦既多㫖母兮所嗜唯河之鯉聶之可膾湘之可羔朝綸夕􅊻胡敢自寧凡厥有魚皆化爲鯉以奉吾母我憂始冩豈望鯉多多母之年百齡猶短中心則然不知我者謂養口體我鯉不烹我情曷巳有華者軒錫以嘉名目恒見之用著吾誠太史作銘惟子是朂移孝以忠永懷百福題盛孔昭文槀後余弱齡時即從黄文獻公學爲文既得户庭而入益求海内諸作者觀之不問在朝與野咸無棄者于今四十有餘年矣大槩氣豪者失扵粗厲體局者不能有所發舒求其臻平和者十無四三彼極盛時且若此况當兵火患難人物眇然之後乎海塩盛潜孔昭甞以進士貢南宫予時濫司文衡頗見孔昭經術甚邃不知其能古文辭也今自定陶移丞淄川持文一帙来見再三讀之雲錦張而五采開韶樂鳴而八音和鳯褰噣而鸞舒翎予不覺嘆曰嗚呼此豈非文㢤當今文士雖多如吾孔昭者其指盖不多屈也然而學無止法孔昭幸毋以所造為巳足益致力焉他日必以文辭黼黻昭代之盛决不後扵他人矣予雖耄日切望之題獨冷齋卷後天氣有隂陽陽氣則熱而隂氣則冷𥘉何闕扵人事唐人徃徃借以為喻謂登樞要者為熱官守閑曹者為冷官見諸詠歌形扵紀載者何其多乎㢤天台張君天秩守道君子也扵世無營朝夕之間唯飲木蘭墜露餐秋菊落英而已遂取杜甫詩中廣文先生官獨冷語以名其齋盖若有激也然予竊有疑焉張君下帷授徒文氊方床積古今圖史左右一啓卷間心融神暢儼然如入春風中和氣烻烻動人若云張君為獨冷吾則未之信也所謂獨冷者必真坐廣文舘中然後方稱斯名尔張君以為何如侍儀使白張君從子也以此卷索題至六七而不倦因濡毫一書之題清㣲法派仙像圖師授貴相承昔人皆以爲重非特道家之爲然也在宋之時明教嵩公懼諸師傳授不明扵後世乃大畫一圖而畧箸其事扵下謂之傳法正宗記今觀清㣲家自魏元君而下共一十七人皆圖厥象霞冠星帙粲粲可覩謂之法派仙像圖噫是不亦異世而同符㢤世有從師不旋踵而背去之者視此可以戒矣像之次弟畫工偶失其序盖不足深辨云題張樗寮手帖張温夫年八十時甞爲周法師竹泉書龍虎福地四大字此其所荅書也書舊蔵神寳府中兵後失之汪君伯通復購而歸之温夫宋之執政子以恩𥙷官仕至直秘閣致仕故其所交皆一時名臣遂以書名天下而金人寳之不翅金璧大抵温夫筆法出扵米南宫南宫始學沈傳師後方入大令之室天馬脫銜追風逐電誠有不可控馭其變至扵温夫極矣臨學之家不知以予言爲何如也温夫爲鵝湖寺書大義道埸扁巳八十又四其挺特之氣至老不衰因并書之使覧其字者可以知其爲人䟦遯山翁行状後何氏爲吾婺甲族簮紱相繼至文定公出上繼考亭遺緒以性命之學衣被後人其名益盛矣遯山翁鳯字天儀公之羣從子言論風範亦可以冠冕風俗五尺之童至今皆能言之盖有其實者雖無文而自彰實或不足而假空言以張之未必能著此無他其理固應爾也濂在禁林翁之諸孫穆持行状求題聊相與一論之或謂翁之行必待文而始傳者抑過矣穆循循雅飭無愧扵文献家子孫云題馮子振居庸賦後海粟馮公以愽學英詞名于時當其酒酣氣豪横厲奮發一揮萬餘言少亦不下数千真一世之雄㢤遺墨之出争以重貨購之或刻之樂石或蔵諸名山徃徃有之則爲人之寳愛可知矣余蔵此卷者乆極爲珍祕今以歸蒲圻魏先生先生博雅君子必有以賞識之斯文爲有所托矣張肯字辭古者冠而字敬其名也三加之後必爲字辭以祝之或稽扵經或㩀扵史凡可以繕性禔身者無不可也由此觀之非惟敬其名抑且以敬其身能敬其身則成人之道具矣姑蘇張君芸已敦實有學之士也甞名其子曰肯又以繼孟字之盖取書大誥之義也雖加冠於首而未有爲之辭者請余𥙷之余雖弗獲從大賔之後與聞酌醴之事然與芸已友也輒陳所見而告之其辭曰冠禮之重爲敬其名苟非其人禮弗虚行伊張氏子世傳以經名子曰肯厥義則宏吾爲爾陳聳耳而聽有法扵先爾基爾楹有菑于前爾播爾營勿違厥時必將必迎勿閼其成載厲載興茲爲善繼父事是繩前者有作後或匪承此謂悖則溺扵淪㝠規既我蹈矩復我程此謂順徳令譽日增二塗之間羙惡所形擇善固執弗撓而傾况爾秀頴如稼之青翹然獨異如木之榮棟梁斯任倉囷載盈上慎旃㢤學惟烝烝余言止矣爾其服膺題易庵卷余聞老易相爲用也乆矣至扵魏伯陽著書明述卦候之㫖而後世丹經咸祖之此不獨形之空言而實見扵行事者也冶城道士王君宗懋名其丹室曰易庵吾友危學士甞爲之記復請余䟦其後嗚呼太極其鼎爐者歟坎離其藥物者歟隂陽其火候者歟王君當有識扵此矣若夫開物成務隨時變通盖出扵是三者之外非更僕不能盡也尚容它日爲王君言之種學齋銘有序姑蘇張君其名爲田其字爲芸已遂以種學號其齋居濂聞之而嘆曰何芸巳之善取義者歟盖其先人子昭君積書滿家而日讀之芸巳又從而繼之非惟芸已也其子肯又能善承而勿使替之是張氏種學者三世矣因爲著銘勒諸齋中一以昭種之之功一以爲芸已父子朂也銘曰我有心田爲寸者方何以種之以道徳爲之秧其葉油油其本洸洸仁耕之而義耨之唯恐渉扵歲荒俟彼西成扵粲其箱可以續烝民之命脉可以佐至治之馨香此韓子之喻崔生所以欲乆積而大昌肯舎已以從人不以禮而爲防有羙君子厥姓惟張通經而探乎玄髓掞文而燁乎星芒取種學而名齋欲孳孳而自彊史官作銘揭之中堂願是藨而是蓘終大迄扵豊穣傅同虗像賛将求子扵外兮則錬精扵三田欲索君扵内兮則㳺神乎八天是皆窺見夫粗迹而未能暢逹其真玄髙岑兮谷綿白鶴舞兮蹁蹮豈非長跨扵洞庭之野吹瓊管而招飛僊者耶䟦廣薦佛㑹記後余既造此記自知筆力衰弱無以發揮聖皇崇尚佛乘之深意豈期大方叢林競相傳布殊用悚反而雪山成上人復索余書一通蔵諸篋衍以上人好學之㓛不欲固辭之雖然予文固非佳然昭代制作之盛足以爲千萬世之法者亦備著扵其間後之續僧史者必當有所擇焉王貞婦傳王貞婦名妙清㑹稽人年及笄歸同里可先樓君生二子叔仁澄叔仁始七歲澄僅四月而樓君亡貞婦毅然以節自誓朝虀暮塩或不能給而貞婦安之從事殘燈敗杼夜參半猶隠隠聞伊軋聲人數有撼之者志如鐡石而弗可動舅姑亦憐其少欲俾更適人貞婦泣曰妾聞婦人於夫一與之醮終身不移妾何敢忘家縱貧得服勞於舅姑之側他日九泉之下當有以見吾夫儻舎之而去雖終日飲醲齧肥犬彘亦不食其餘矧人乎哉妾有死而巳不能從也舅姑見其語剛而意不回復義之貞婦自是事舅姑益致其恭敎二子從良師㳺皆成人知問學亦頗能盡孝見稱於士君子間貞婦夫死時年二十七而今已五十四矣史官曰嗚呼若貞婦者豈不為難哉自隂教乆不行女婦不知書詩謨訓其所欲為鮮克由於禮者矣而貞婦乃能矯然自異如勁松梃梃於蒿萊間是何可及也嗚呼若貞婦者豈不為難哉猗歟詩有序入四言詩類猗與羙君子也君子謂奉常呉鎮卿鎮卿蚤以文顯使于金源不辱君命故作是詩也猗歟君子在括之陽粲然其章有玉其相厥聲孔揚聲之伊何如巖之峩峩不劌不頗屹立而弗阿犬羊羶如其勢綿如酣如連如貪噬我中區君子揚揚爲天子使誕敷皇靈以讋其類彼何人斯是縶是維不虞其無知彼何人斯是維是縶不恤其無拂我金其躬我赤其衷我節之崇以迄于終皦尔之行孰能尤之貞爾之剛孰能柔之㳺麟之冲冲兮鳴鳳之嗈嗈兮我思君子維邦之容兮猗歟九章六章四句二章章三句一章五句予謂作詩必本於三百篇自李陵專於五言歴代因之鮮有復於古者晋魏之間雖有作者音節韻趣亦有難於言矣方與劉先生伯温同倡千古之絶學適呉從善以其逺祖墓銘求題欣然援筆賦之從善有文而又能不忘乎先如此其亦賢子孫也哉玄黙齋銘全椒孫仲善氏名其齋曰玄黙危學士蘇脩皆甞遺之以文仲善復求余繼作脩史事嚴歴數月未能撰述仲善又時趣之今因休沐之暇輙援筆爲之銘夫玄黙者葆和之要也仲善能從事於斯則近道矣銘曰玄兮黙凝神於恍愡黙兮玄欲潜思於九淵曷若渺渺綿綿歸之自然一氣孔神迢乎象先誰為之後孰為之前至矣㢤此所謂鴻濛之根毓丹之田也乆而行之與道周旋可以接韓終之𬒮可以拍洪崖之肩勉旃旃必守夫規中焉大明日暦序洪武七年歲在甲寅夏五月朔日新脩大明日暦成粤從皇上興臨濠踐天位以至六年癸丑冬十又二月凡戒飾之諄複征伐之次第禮樂之沿革刑政之設施羣臣之功過四夷之朝貢莫不具載合一百卷蔵諸金匱副在祕書甲寅以後則歲再脩而續蔵焉嗚呼惟天立辟惟辟奉天其能混合三光五嶽之氣者盖可數也然挺生於南服而致一統華夷之盛自天開地闢以來惟皇上為然其功髙萬古一也元季繹騷奮起於民間以圖自全𥘉無黃屋左纛之念繼憫生民塗炭始取土地羣雄之手而安輯之較之於古如漢髙帝其得國之正二也平生用兵百戦百勝未嘗摧衂以至繼天出治經綸大經皆由一心運量文臣武将不過仰受成筭而巳其獨禀全智三也欽畏天地一動一静森若神明在上及至郊祀存於心目有赫其臨甚至不敢仰視惠鮮小民復恐一夫不獲其所貪墨吏及豪黠之徒有加害者必威之以刑其敬天勤民四也后妃居中不預一髮之政外戚亦循理畏法無敢恃寵以病民寺人之徒惟給事掃除之役此皆古昔所深患今絶無之其家法之嚴五也兵戎國之大權悉歸之於朝廷有事征伐則詔大帥佩将印領之暨旋則上章綬歸士卒單身還第其兵政有統六也嗚呼帝力難名度越前王不可以一二識也今日暦所書籌畧之連功業之著規摹之宏逺其本盖原於此矣然而史事甚重古稱直筆不溢羙不隠惡務合乎天理人心之公無其事而曲書之者固非也有其事而失書之者尤非也况英明之主不世出而記注之官遷易不常無以究夫聖德之髙深臣同暨濂幸獲日侍燕閑十有餘年知之深故察之精察之精則其書也頗謂得其實而無愧兹因日暦成書謹掲其太要扵首簡使它日脩實録者有所採掇庶㡬傳信扵千萬世也其緫裁官翰林學士承㫖嘉議大夫知制誥兼脩囯史兼吏部尚書臣詹同翰林侍講學士中順大夫知制誥同脩囯史兼太子賛善大夫臣宋濓催纂官翰林侍講學士嘉議大夫知制誥同脩囯史臣樂韶鳳纂脩官禮部員外郎臣呉伯宗翰林編脩臣朱右臣趙壎臣朱㢘儒學教授臣徐一䕫臣孫作布衣臣徐尊生其讎校謄寫則臣伯宗臣亷及鄕貢進士臣黄昶囯子生臣陳孟暘開局於六年九月四日歴二百六十有五日始訖事云臣濂謹序通鑑綱目附釋序新安子朱子既釋諸經患史學失褒貶之義無以示勸懲親為通鑑提要以授弟子天台趙師淵㡬道使著其目凡例盖一十九門緫一百三十又三條凡下有月日下有類至詳且悉也師淵遂據提要為綱目五十九卷朱子重為之審定故其中亦頗與凡例弗合書既成流布四方凡例則知者絶少愽學如王文憲公栢僅獲一見於五十餘年之後他固可知已所以尹起莘之著發明劉友益之觧書法皆想像而為之辭徐而察焉或有未慊扵人心者永嘉孔君克表殊竊病焉扵是歴考義例異同凡朱子微意先儒有未發者及發之而未當者皆備䟽其綱之左目中音義事證及名物度數之属亦不可不知仍取史炤胡三省王㓜學三家㑹粹羣書而折衷之通成若干卷名曰通鑑綱目附釋云濂聞作史者實原於春秋雖立言有不同其編年紀事則一而已釋春秋者不趐數百家史固非經也有疑難而不能通者其尚可畧之乎司馬迁史記註者一十又四班固漢史亦至三十迨今猶未已也况朱子上取法春秋大經大法皦如日星文憲公至稱為續經之作其又可與諸史例論之乎孔君之留心於此誠可謂賢也已抑又聞是書之成卷帙浩繁不能無舛訛李心傳謂唐肅宗時直脫二年之事武徳八年以後迄于天佑之季甲子多差而周公謹所䟽為尤多盖又不止乎此也将師淵不暇察邪抑朱子春秋髙而未及悉正之邪孔君尚有以刋定之庶㡬為綱目之忠臣也歟濂侍講禁林孔君来為脩撰出以相示濓為之驚喜且謂其書世决不可無特為序於首簡彼穿鑿性命簸弄詞章而無益於人者視此其亦知愧哉孔君字正夫克表其名也宣聖五十五代孫至正戊子進士博通六籍而文又稱之士林咸推為巨擘云宋學士文集卷第二十五翰苑續集卷之五
