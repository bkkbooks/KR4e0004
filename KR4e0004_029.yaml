front:
  text: 宋學士文集卷第二十九翰苑續集卷之九
  hash: sha256:223106ed5b92152ac4cfa7756c6026d1afab2c6428d6a292cd4fbaaa4538abd5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_029-1a}
body:
  text: 贈惠民局提領仁齋張君序嗚呼醫其難言矣乎人之生也與天地之氣相為流通飬之得其道則百順集百邪去苟失其飬內感於七情外感於六氣而疾疢即生焉醫者診而治之必察其根本枝末其實也從而損之其虛也從而益之隂平陽祕自適厥中粗工或昧乎此實實虛虛損不足而益有餘其病之能起者鮮矣此其難一也氣血之運必有以疏載之左右手足各備隂陽者三陽既有太少矣而又有陽明者何取兩陽合明之義也隂既有太少矣而又有厥隂者何取兩隂交盡之義也何經受病冝用何劑治之治之固不難又當知有引經之藥能循此法則無疾弗瘳矣粗工不辨十二經而一槩施之譬猶羅雀于江罾魚于林萬一或幸而得之豈理也哉此其難二也歲氣有不同攻治亦異其冝曰升降曰浮沉吾則順而承之曰寒熱曰溫涼吾則逆而反之庶幾能全其天和而不致偵倒錯繆粗工則倀倀然當順則反逆當逆則反順如盲人適野不辨乎西東此其難三也病有寒熱熱者當投之涼寒者冝濟之以溫此恆理也然寒熱之勢方劇而遽欲反之必扞格而難入熱因熱用寒因寒用其始則同其終則異庶幾能成其功粗工則不察而混治之此其難四也藥性有隂陽而於氣味見焉然不專于隂陽也又有所謂陽中之隂焉隂中之陽焉差之毫釐繆以千里不可不察也粗工則不核重輕而妄投之過矣此其難五也然此多內經之所明言自裴宗元局為大觀二百餘方經旨晦蝕無有探而究之者至金劉守真張從正李明之等出始一以內經為宗向之晦者昭如也昔之蝕者完如也嗚呼醫其難言矣乎吳士張君仁齋世為名醫從陳鼎庵受內經之學而於劉張李三家之書無不通貫故用藥多竒驗將軍那木哥病危甚張君脈之曰寒涼太過所致冝溫之果瘳中書平章政事李思齊遘疾上遣使者召張君療之張君脈已曰色天不澤尺脈已絶然能食飲主踰月而死後亦然先是全室禪師泐公無病偶張君視脈色張君曰師雖康強其中多滯痰後有中風之患當時咸不以為然至是疾果作手足痿痺不仁張君用辛涼劑汗之下而愈師欲以金繒遺之張君笑曰師何必爾也得宋翰林文一篇不翅足矣師來為豫言豫雖不知醫而醫之諸書頗嘗讀之故為疏五難之説使觀者知其道為不易如此嗚呼醫誠難言矣乎若學如張君察證如張君制藥如張君則不謂之難也已重刋寂照和尚四會語題辭寂照和尚元叟端公既示寂金華黃文獻公為銘其塔蜀郡虞文靖公為序其四會語二公以文辭名天下亦云備矣其入室弟子清泰子楩金山惠明天寧祖闡復合辭請曰舊刋所録先師語不幸燬于兵然非此無以見道之所存竊懼不傳子楩三人者已協力命印生重雕之矣敢重以首簡請為序雖然序猶可略也先師事迹多涉神異狀行者輒諱而不書神異之事大乘者固所不樂聞茍録以示入道之士亦足以起其正信𥘉何傷乎願併識之序中豫不敢辭稽子楩等言公平頂古貌眼光鑠人頷下數髯磔立凛然如雪後孤松坐則挺峙行不旋顧英風逼人凛如也所過之處衆方歡譁如雷聞履聲輒曰端書記來矣噤默如無人賔友相從未嘗與談人間細故舍大法不發一言秉性堅凝確乎不可拔自為大僧至化滅無一夕脫衣而寢其從南屏歸化城受經夏夕啓窗而卧忽一梵僧飛錫而來與談般若樞要亹亹不絶未幾騰空而去虎岩師主雙徑時嘗言道家者流有上謁帝者其還甚逹因叩之答云為選徑山四十八代住持故天閽久不開爾公正符其數公朝京師夢徑山潭龍君持金匙舉食食公數凡十又八公主法席實十八春秋也公將示滅所剪爪髮留瘞化城幻有庵逮啓視之設利纍纍然生矣公之遺事有若此者皆冝輔書以見於世不可略也蓋公道契佛祖名震華夏誠堪輿間氣之所鍾其祥應之至亦出自然非苟涉于神怪者比也文獻所謂門庭之盛規重矩疊法雷普震裂地轟天文靖所謂譬諸名藩鎮以宿將隱然持重風霆不驚握機行令舒卷自由足以使方城連戍有所仰放不敢踰越其言誠不誣哉濂何敢復贊一辭頗念文靖之學粗聞而知之又執弟子之役於文獻之門者最久於是勦其緒論重申之如此嗚呼公之四會語其尚假濂文以傳之哉子楩字用堂惠明字性源祖闡字仲猷皆設化一方黑白咸皈仰云滁陽蔡氏道山阡表祠部主事蔡秉彛詣濂請曰彛之曽大父諱某姓蔡氏𥘉居趙州因官于滁遂家焉娶胡氏無子唯育一女懼蔡氏之不血食也乃命季氏子冬後冬負氣自豪殺人亡命竟不知所終遂以女歸來安之許氏許氏諱清字士廉讀書有賢行平居寡言以儉德自將曽大父愛之曰是類我者也命以為子不聽久之乃相從實彛之大父也不幸為高氏子誣搆以死罪留圜扉者二年資産咸廢而大父無愠容大父復無子亦生一女先是句容龍潭人孔氏有諱善者字國寶幼失怙恃唯二兄存頗虐之依仲父以生一旦告仲父曰兄若弟一氣所鍾也苟戀區區資業使兄𬒳不義之名人其謂我何請避之仲父為之汍瀾出涕且曰吾在子勿憂於是竟決去無留意行至滁大父見之嘉其知彛倫之理與其語又輕財仗義有特逹丈夫志亦以女妙靜妻之刲羊豕大饗姻朋焚香祝天曰吾再世無嗣蔡氏之傳將遂微矣是子其克荷負吾家乎乃後之實彛之父也不數年盡復大父所喪土田人有曲行面直之鄉黨稱其賢生四子長即彛次玄童次壽童次慶直及一女至正甲午三月二十九日滁陷于兵先母與女素英抱莭赴水死玄童慶真皆不知所往獨先人與彛間關渡大江而居金陵先人因憂憤成疾死時八月十八日也彛娶王氏生一子名繼宗嘗念三世皆以異姓為後雖于先王之禮有所未合原其情之所至豈得巳哉彛家素積善天必福之異子孫或衆多各俾一人承蔡許之祀而彛復姓孔氏則於禮為得矣然大父之年僅五十七大母復少四歲而終父視大母之年又少十歲母之年則如其父焉四喪皆於黃道山以昭穆序葬山在州東北十五里曽大父兆域之所在也墓石皆無文願子為通書諸碑以示後人天地開闢厥𥘉生民何嘗知有所謂姓氏聖人者出惡其無貴賤親踈少長之别也於是因生賜姓胙土命氏以至於以字以諡以官以邑而族系漸繁矣蔡本姫姓許本薑姓皆以國氏者也孔本子姓以王父字為氏者也而三者何可同乎雖然凡有姓氏莫非神明之胄而出於炎黃之世所謂二十五宗一十四姓者尤多流雖殊而源則一遽謂之不同亦未見其為可也然彛之為孔氏固為不刋之論彼二氏者豈可忘其所付訖而為若敖氏之鬼哉誠令子若孫繼之一如彛所言亦出於禮之變耳嗚呼氏族之不傳其淆亂無别亦難明矣使彛不自言數世之後惡知有所謂孔氏者哉昔人有云人有姓氏猶衣服之有冠冕裂冠毁冕雖有帶裳幅舄不足以𬒳飾其身其任不為不重矣其任為甚重人反視以為輕有如彛者豈非有識之君子乎某與彛交既久若異姓昆弟然故因其請為表著先塋之碑使後世有考焉彛字秉彛為人慷慨疏通其從政也難集之事談笑而成之人號為長才幼鞠同里王時中家遂壻焉巳而襲其姓時中既有後今請于朝仍氏於蔡云大天界寺住持白庵禪師行業碑銘有序大天界寺住持白庵禪師諱力金字西白吳郡姚氏子其母周氏夢一龎眉僧類應真者直趍房闥麾斥弗退因驚呼而覺遂懷妊時至而育竒芬馥郁滿庭年臨五六方顙圓額白哲如玉琢見者無不憐愛縣大夫時抱載車上歸與妻妾環玩之欲索為子父母靳弗與逮七歲頴悟異常凡書一覽即能記憶或見佛像輒五體投地作禮而退一日請于母曰兒患世相起滅不常將求出世間法可乎母曰出家甚苦爾年幼豈能堪乎曰兒心自樂之想無苦也自後請之不已父母知志不可奪俾依吳縣寶積院道原衍法師為弟子十一歲祝髮受具戒精研三觀十乘之旨領其樞要衍公主秀之德藏師為綱維之職軌範肅然忽喟然嘆曰名相之學略諳之矣盍棄諸緣而往躋覺路乎遂更衣入虎林謁古鼎銘公子雙徑古鼎一見輒以法器相期示以德山見龍潭語師奮迅踊躍直觸其機從而有契銘公俾掌記室曽未幾何分座後堂敷宣大法如山川出雲靈雨霑潤四衆信服復升居前室聲光燁燁起叢林間至正丁酉出世住蘇之瑞光寺會嘉興天寧寺災郡守二咸曰非師不足起其廢具禮幣遣使者力邀致之師至未久􅌂如兜率天宫下現人世道路過者莫不瞻禮贊嘆帝師太寶法王聞師之賢授以圓通普濟禪師之號師自幼喪父唯有母存乃去城東一舍築孤雲庵以奉飬焉同袍或議之師呵之曰爾不見編蒲陳尊宿乎何言之易易也洪武改元皇帝御大寶曆弘闡佛乘首開善世院俾擢有道浮屠蒞天下名山杭之淨慈主席尚虛僉欲起師居之疏與幣交至浙江省臣復遣使趣之師皆力辭乃退居同歸庵迎母以飬僕夫忽夢庵前有瑞花如芙容然光彩絶異或謂夢者曰此花天子當取之而去旦而述其事人以為誕巳而有旨起師住持大天界寺命將下之日乃僕夫所夢之宵也師應詔至闕見上於外朝慰勞優渥即令內官送其入院賜以天厨法饌萬機之睱時召入禁庭奏對多稱旨蓋師精通西竺典及東魯諸書其與薦紳談論霏霏如吐玉屑故咸樂與之遊至于勘辨學子務以直指心源宗説兼行機用迭發尤使者敬仰不置四年春詔集三宗名僧十人及其徒二千建廣薦法會于鍾山命師捴持齋事師能靈承上旨凡儀制規式皆堪傳永久尋以母年耄舉徑山泐公自代復還庵居五年冬詔復建會如四年大駕臨幸詔師闡揚苐一義諦自公侯以至庶僚環而聽之靡不恱服一日忽示門弟子曰吾有夙因未了必當酬之汝等勿以世相遇我未幾示微疾謝去醫藥飲食手書一偈委順而化實六年十二月二十四日也停龕六旬始行茶毗之法視其貌如生數珠齒牙不壞於火設利羅無等觀者競取之而去世壽四十有七僧臘三十又六所度弟子某等二十餘人嗣法上首出住名山者保寧覺慧等又二十餘人三會語有録謀建塔于嘉興城西環翠蘭岩以某年月日舉靈骨及不壞者藏焉師神觀秀偉智辨縱橫以宗教為巳任不畜私財每得財施輒舉以給貧者嘗以楞伽經及法寶壇經乃釋門心要當毒暑時揮汗謄鈔鍥梓以傳師既歿覺慧惟恐其遺行泯泯書夜弗自寧件繫群行為書乞豫為塔上之銘豫惟臨濟之傳至于寂照大師其道益光明盛大故其子若孫亡慮數十人各主名山務識本源至今接武而奮者尚未已也如師者亦其一人焉此無它傳授之真頴悟之正而無它岐之惑也夫塔之有銘始於梁而尤盛於唐以為不若是無以繫學者之思而景先哲之行也豫不敢廢此義遂因慧覺之請為造銘曰一真妙心兮圓同太虛迷者自蝕兮唯塵之拘曷治曷攻兮在靜其慮禪斯有學兮流于中土臨濟正宗兮奕葉其光傳至􅓦照兮愈亢厥宗叶子孫蟄蟄兮各闡化機要使青蓮兮出于汗渠唯師之生兮孰乘願輪豈伊應真兮憫世度人學兼內外兮卓然名家轉彼名相兮為德之華紺目一瞬兮大法畢具見者悟之兮無句之句寶華樓閣兮彈指即成示現世兮何經何營三蒞精藍兮其法益崇曷以徴之兮設利青紅生死去來兮不礙真圓飛鴻印雪兮爪趾宛然塔婆新建兮下瘞靈骨銘以揭之兮來者是則夾注輔教編序天生東魯西竺二聖人化導蒸民雖設教不同其使人趍於善道則一而巳為東魯之學者則曰我存心飬性也為西竺之學者則曰我明心見性也究其實雖若稍殊世間之理其有出一心之外者哉傳有之東海有聖人出焉其心同其理同也西海有聖人出焉其心同其理同也南海北海有聖人出焉其心同其理同也是則心者萬理之原大無不包小無不攝能充之則為賢知反之則愚不肖矣覺之則為四聖反之則六凡矣世之人但見修明禮樂刑政為制治之具持守戒定慧為入道之要一處世間一出世間有若氷炭晝夜之相反殊不知春夏之伸而萬彚為之欣榮秋冬之屈而庶物為之藏息皆出乎一元之氣運行氣之外𥘉不見有他物也逹人大觀洞然八荒無藩籬之限無户閾之封故其吐言持論不事形迹而一趍於大同小夫淺知肝膽自相胡越者惡足以與於此哉宋有大士曰鐔津嵩禪師實洞山聰公之法嗣以二氏末流之弊或不相能也取諸書會而同之曰原教曰廣原教曰勸書曰孝論而壇經贊附焉復恐人不悉其意自注釋之名之為輔教編若禪師者可謂攝萬理於一心者矣豫本章逢之流四庫書頗嘗習讀逮至壯齡又極潛心於內典往往見其説廣博殊勝方信柳宗元所謂與易論語合者為不妄故多著見于文辭間不知我者或戟手來詆訾豫噤不答但一笑而巳今因虛白果公重刻是編其有功學者甚大故執筆言之嗚呼孰能為我招禪師于常寂光中相與論儒釋之一貫也哉獨視霄漢悠然遐思者久之題滑壽傅後昔者太史遷作史記創為記表書傳秉􅊮筆者咸宗之然而傳之為體雖不一不過立論序事二者而已獨為淳于意傳載其應詔所對自齊侍御史成至公乘項處凡二十有三人書治病死生驗者具悉此其故何哉蓋醫乃人命所係不敢不慎故特變例以成文耳襄城滑壽伯仁以醫道髙一時而吾老友朱君伯賢倣史遷法為之傳事核詞古而光𦦨燁然與伯仁遊者鋟􅎚以行伯賢方載筆詞林其言當見信于世它日必有采之入史牒者淳于意之事尚得專美于前哉
