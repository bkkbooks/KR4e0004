body:
  text: 寅齊後記洪武二年春濂以總修元史𬒳召來京然史事貴嚴詔命禮部統之設局分科限絶外內將以日視其成當是時尚書槀城崔公恆往來乎局中濂因稔知公之為人公蓋名亮字宗明翼翼祗慎遇事若臨深淵方今皇上受天明命撫有萬邦日崇大禮以修天神地祗人鬼之祀凡牲醴之豐祝號之雅器幣之莭燔告之嚴皆命公典之公精白一心上承休德夙興夜寐敬畏弗懈君子以謂國家自建禮官其蒞事儼恪未有踰于公者公猶以為未足且以寅名齊請濂記之夫寅者敬之謂也敬固無所不在而驗之于祠饗為尤冝方其齊明盛服以交神明靈颷回薄如將見之于斯時也志㝎神一曾有邪思之可干者乎苟以之奉親以之事君以之修身以之治人其心常弗變焉其有不獲其道者乎始之終之何莫不由于敬也能由于敬則成已成物之功其又有不致其極者乎昔者舜命伯夷典三禮其訓之有曰汝作秩宗夙夜惟寅直哉惟清說者謂即敬以直內之義也今公所居尚書之官古之秩宗也所主天神地祗人鬼之祀古之三禮也其委任之重且専也蓋如此然而皇上神聖端居穆清畏天勤民無一息之或間固巳度絶于帝舜矣公之精白一心上承休德其可不以伯夷自朂者乎此公所以名齊以寅之意也雖然修德莫若敬德日以崇則位日以尊理之常也他日位于三孤寅亮天地以弼於一人濂又烏䏻無望于公乎公如有取于濂言非惟無愧于兹軒亦且有昭于名若字者矣華相先生既為公發明敬怠之說殆無餘藴庸敢掇其緒餘以為後記云玄武石記吳興林君靜嗜道家言事玄武神尤謹一旦出遊虎林道逢羽客髽髻而方瞳揖林君曰吾與子生同里何遽忘之邪問其里居姓名笑而不答强之則曰然也客鼇峰之紫陽庵言訖飄然而逝未幾夜夢羽客持龜與蛇施施而來謂林君曰子能往鼇峰乎吾遲子矣林君異之翼日遂行既至逄龜蛇出洞中巳而不見林君因斸也獲石類鳬卯圓且黝滌而視之玄武神黃帕首按劍坐雲中龜蛇在下衣𬒮翩翩如淡金色背文外為墨緣其內正白别有墨龜昂首行蛇絡之所現之像毫末備悉雖善繪者不是過也林君獲之歡曰此吾之玄徵亟往庵中覔羽客無有也乃懷石以歸畫成二圖徵余為之記余聞天地之運二氣絪緼自色自形其變孔神惟其孔神凡人心思之所能及者物具有焉且玄武之稱見于禮經其為軍陳以象天也蓋玄黑也北方之色也武龜蛇鱗甲之象也取其能禦侮也未聞有所謂神也逮于宋初避聖祖諱始易玄為真其名真武以為神手按劍而足躡龜蛇殆起于道家傳會之說乎其傳㑹固也何為圓石之中果有顯像之異乎夫石與天地俱生而傳㑹者後代也又何為乎吻合無毫髮之爽乎將神變不可測者偶與之合乎抑事之未見巳兆于先乎不特此也棒潼之有神亦非古也天曆中有官于麗水者曰韓氏亦獲玄石石文有神戴席帽乘白騾揚鞭而行一蒼頭後從其與林君所獲無大相逺者不知果何為而然乎豈理之常者可以推理之變者誠不可致詰乎人心至靈一念之感其小者草木或無根而生華其大者日星或退舍而見異况天地間之神出有入無坱圠紛紜又何所不有乎欲徇小夫之末智而致疑于造化之所為可不可乎今林君之為人沉潜而有守而事玄武神又甚謹其必有所感而致于斯乎所謂同里及李自然云者蓋示萬物之理同出于自然知同出于自然則大道可致大道可致則神當在林君之心而不在于石矣林君勉乎哉林君勉乎哉林君字子山靜其名也以瑶臺玄史為之號博學通文詞見羽客以洪武元年八月二十五日入夢則是月之晦獲石乃九月之朔云金華張氏先祠記金華縣東行四十五里有地曰苓唐山川相繆而風氣鬱盤著姓張氏世居其中初張氏有諱隆府君者字亨仲宋建炎初自睦而來為潘氏之贅壻至今其村聚猶仍潘為名府君既占名數于縣日以力本為務未幾家寢穰生三丈夫子曰子政曰子中曰子成皆能紹前業而無爽德子中之子文華俶儻尚竒行鄊先達端明殿學士王公野甚器重之淳祐末公遷沿江制置使欲辟為之屬辭弗赴自時厥後府君之三子遺㣧日滋遂成三大族亡慮十百餘人其出而仕者既以文墨論議著稱于時而退修于家者亦循循雅飭無愧于士君子之行蓋自府君至是亦十有一世矣府君之六世孫榮今為一宗之長乃慨然歎曰吾儕承藉其先祉以克至于今日有闔廬以禦風雨有絲枲膏梁以為之羞服而先祖妥靈之無其所不亦傎手于是與族弟琰力謀之而子姓之中若留鎮琮似四人即捐所居之㕔事三楹間以為之倡榮遂加以塈茨之功繚以垣墉列以龕櫝與夫祭饗百須之器莫不精且良中奉府君原其初遷也旁以三子侑食三族之所宗也而又益之以制屬君府君之流光及是始振示不敢忘也然而世逺屬疏祭不敢用四仲唯據朱徽公所定祀先祖之儀以立春生物之始陳器具饌而行三獻禮月旦十五日之序參族人散處乎東西度不能以皆至唯正月朔旦無小無大咸拜于祠下復會拜別室以叙長幼焉其生子巳命名者續書之于譜圖而後退若夫朝夕汛掃啓閉之職擇謹願者為之主守祭田若干畝則俾三族之嗣人輪掌其租入以供孝祀燕私之事此其大凡也始事于至正乙巳之冬而迄功于丙午之春榮帥宗人數千指皆沐浴盛冠衣入奉明薦甡酒潔清執事儼恪周旋進退濟濟蹌蹌觀者咸恱以為邑之所未覩竣事復遣其孫愈來徴濂文刻示後裔俾世世無有所易其田之鄊落步畝則附見于石隂濂聞之先玉制為廟祭之禮上下隆殺皆有常典牲牢器幣皆有常數固非士庶人可得而行然其親親之仁出于物則民􅉓之懿者𥘉不以賤與貴而有異也今榮乃能于服殺宗遷之後以義起禮而逺祀府君非惟使子若孫不忘其所自出而管攝人心聚合宗族之意實于是乎在不亦孝子仁人之用心也哉嗚呼人非空桑而生孰不本之于祖者方其封殖自厚長慮却顧無所不用其極問其所從來則曰吾不知也問其薦奠之禮則又曰我未之䏻行也所謂報本反始之道顧當是邪視榮之為殆將愧死矣是不可以不書三族之嗣人尚思是纘是承棟宇之必葺也毋使之震凌黍稷之必獲也毋使之穢荒牲牷之必腯也毋使之瘯蠡庶幾濂之文為不徒作矣嗚呼其懋敬之哉其懋敬之哉四明佛隴禪寺興修記沙門行原不逺千里踰大江而來京師謁余而言曰鄞之天童山岑鋭綿鬱上接空際其支隴蜿蜒南下爭竒競秀蒼翠相繆信為靈僧化士之所窟宅後唐莊宗時人見有紅光爥天謂為浮屠氏祥徴因名其地為佛隴焉大比丘咸啓樂其幽邃可以縛禪自天童分其徒結廬以居已而開拓如他伽藍宋治平元年賜額曰保安然猶以甲乙為居守至熙寧五年始釐為十方禪剎主者照珏乃大覺璉公之法嗣黑白瞻依如水赴壑于是悉撤弊陋而更新之夫以有形之物終歸于壞日就月將漸致頽圯元至正某年住持文舜重搆釋迦寶殿未及完而去二十四年江浙行省丞相康里公時領宣政院事選天童內記大基丕禪師主之禪師既至升座說法已環顧而歎且曰起廢吾之責也四輩其無憂居久之歲豐人和儲積漸充禪師曰可矣亟召匠氏𥙷未完之殿堅緻有加若文室若演法之堂則因舊而葺之若三解脫門則新作之以至廡庫庖湢之屬靡不修治如法復集衆因搏土設像如來中居二弟子旁侍曼殊師利及普賢大士或騎獅于或乘白象王東西而從護法大神各執其物𣑽容生動如欲語者經始于二十五年之某月落成于國朝洪武二年之某月惟禪師蚤得法于左菴良公通外內典𣑽行清白薦紳之流皆愛敬之故䏻于干戈俶擾之中成此勝緣了無難者今雖遷住補陀洛迦山而猶窹寐不離于佛隴禪師之功我衆安敢忘莫堅匪石願圖文歸而鑱諸豫聞我佛如來為一大事因緣出現于世蓋以衆生汨沒妄塵念念遷謝起滅不停過去者始息見在者紛拏未來者巳續二六時中不知暫捨以此纒縛沈痼出彼入此猶如車輪回旋無有休止于是興大悲心為說三乘十二分教諄諄誘掖蓋欲衆生捨妄趨真以成正覺像教東漸日新月盛凡方州列邑名區奧壤莫不有𣑽字禪廬以安處其徒衆亦欲解佛之言行佛之行以究夫妙湛圓明之性而已俗習下衰或藉此為利飬而不知先佛忘形為道之計盍不思之香積之供五味豐美視日中一食者為何如穹居華寢方牀邃筵視樹下一宿者為何如是宜精進策勵如上水舟單篙直進如磨鐡杵必𣣔成針不至于成功不止可也禪師之締搆難勤其意誠出于此圓頂方𫀆之士于于而來熙熙而處者尚無負禪師之所望哉雖然如來出紅蓮舌輪遍覆大千界中至今演說妙法大地衆生無不得見無不得聞况日照而月臨風馳而雨駛山峙而川流真常之機時時彂見無一刻止息有能于此證入世間名相一時頓忘其與如來清净法身非同非别回視是剎飛樓湧殿雖居塵世亦與香水海中華藏世界等無有異豫也不敏盡閲三藏灼見佛言不虗誓以文辭為佛事今因行原之請略為宣說以記寺之成使其徒知所自勵若曰專紀嵗月以告耒者嗣葺之則其意末矣育王山廣利禪寺塗田記明之廣利禪寺名列五山為浙河東一大叢林緇衣之士執瓶錫而來者動以千計舊雖多土田而淪沒者過半一遇乏食必持鉢走民間以乞食為事寺之長老普濟禪師光公既為正其侵疆復謀買田以助之既賫志而殁其弟子象先與公恢廓而有為乃慨然曰先師之志我不可不就也市奉化縣腴田若干畝有畸錢以緡計者十千九百有畸俾其徒嘗輸力于其間者若廣融若景鼒等輪掌其事嵗收其入六百斛薦于寺中以補其不足且建屋三楹間以為儲偫之所愛伐堅石屬豫為之文而勒步畝鄉落之詳于石隂豫謂象先之㓛侈矣固不可以不書然為文之躰因其事而著其理始為得之請借田為諭以勵夫進修之士何如象先曰不亦善乎士之進修則不昧因果所謂竊攘質鬻之禍不作吾田固有永而不廢矣豫因請佛為證結跏敷坐為說偈曰大田在海濵厥土帷塗泥何物不可藝藝禾乃有成禾根入上巳當加保衛力涵受及糞壅耘耔復以時勿使惡草生若非雨露滋亦不䏻生成數者既能備時至自然熟嘉穟纍纍然遍及郊野中我心有如田諸種靡不納青黃與白黑隨其所種生菩提譬嘉禾種之即有秋持戒為保衛忍辱為涵受布施為糞壅精進為耘耔智慧為雨露禪㝎道乃成人力一不至田雖號膏腴蒿菜日夜長雉兔之所藏蛇虺共出沒化為荒歲區欲求一粒粟有不可得者我心倘不治其失亦復然治心如治田豈不以此故上人最方便市田繼先志食此緇衣衆頓免饑火煎食者或感觸寧不思前喻嗜道如嗜食㝎知顆粒視如萬金重進道功或怠亦不易消受刻文于貞珉讀者知自勵更加謢持力常使食輪轉寧山續說兵部尚書單公德夫濠梁之人也其與濂交歲行將一周及再會京師公以寧山卷示濂曰名之有字固周道之彌文也字之外又有所謂號焉不幾于彌文之尤者乎此蓋昉于晉流于唐極于宋秦漢以前無是也雖然行之既久孰能廢之吾以寧山為之别稱意將取安靜之義臨川先生既為之說矣子幸為余重言之濂曰昔之人有劉彥冲者所居在屏山之下人因號之曰屏山又有孫明復者家于泰山之陽故人亦號之曰泰山焉皆從其地而實之非徒為是虗稱也今有峯名荆寶氣夜浮而矗起乎濠之西有山名杏靈氛鬱蟠而平峙乎濠之北公𣣔取以為號盍于是乎求之然皆不彼即而獨致意于無形之寧山者豈故與古相戾邪公曰子言固善矣而吾則别有意焉夫自喪亂以來淮椘先𬒳其害崖非不髙也谷非不深也亦罹其蹂踐剪伐之苦盡失其故態古所謂山川鬼神莫能自寧者無甚于斯時也上帝震怒乃命皇上出而平之黃鉞一揮四海底㝎非惟齊民之安至于丘陵草木皆克保其恆性豫驅馳戎馬之間十有餘年冒霜露而衝雨風無斯須之寧今幸列仕熙朝職司喉舌垂紳正笏委委蛇蛇回視昔日之為果何如耶號之以寧山所以志也山且寧民物其有不寧者乎雖然名固寓也字之而又號之寓之寓者也且夫地之載物嶄絶而屹立者人因呼之為山山𥘉不知其名為山也名之為山山且不能自知况山之上又加其名曰某曰某者乎山既無㝎名吾不知孰為寧山而孰不為寧山乎濠梁之間吾廬在焉環吾廬之青翠如沭者皆山也不止荊杏二峯而已也吾苟以寧山加之山亦豈能拒豫者哉吾收山之名而不求山之形蓋欲全其天者爾嗚呼我則人也非山也山則山也非人也人今謂山為我又安知山不謂我為山乎若謂我為山則山與我一矣我與山一則物我齊矣物我既齊而奚虗實之有何當與子遊于莾蒼之區鴻濛之都招亡是公而談齊物者可乎濂矍然而謝曰公所見幾于道矣濂尚何言哉作寧山續說菊坡新卷題辭當塗陶君用髙蓋出于晉徴士元亮之裔凡䆠轍所臨必效前人種菊花滿坡當萬木搖落時花始秀拔低昻枝上若赤金所鑄錢頗可玩用髙公退之餘酌酒與花對恍然如在柴桑籬落間殆忘其章綬之榮案櫝之煩也或者疑之曰仕者樂乎朝市故馳而弗息隱者慕于山林故往而不返有若水之與火未易合也昔者元亮遭時孔艱不能為五斗米折腰向鄉里小兒因有托于菊而逃焉耳今用髙則不然生逢有道之朝亦既由憲史撿校中書而主晝于秋官矣衆咸以致君澤民期之用髙則留情於菊若將與世相違者無乃不顧不美歟豫不敢固辭用髙通儒術為人仁厚士林中多稱之云畫原史皇與蒼頡皆古聖人也蒼頡造書史皇制畫書與畫非異道也其初一致也天地初開萬物化生自色自形總總林林莫得而名也雖天地亦不知其所以名也有聖人者出正名萬物髙者謂何卑者謂何動者謂何植者謂何然後可得而知之也于是上而日月風霆雨露霜雪之形下而河海山嶽草木鳥獸之著中而人事離合物理盈虗之分神而變之化而宜之固巳達民用而盡物情然而非書則無以紀載非畫則無以彰施斯二者其亦殊塗而同歸乎吾故曰書與畫非異道也其初一致也且書以代結繩功信偉矣至于辨章服之有制畫衣冠以示警飭車輅之等威表旟旐之後先所以彌綸其治具匡贊其政原者又烏可以廢之哉畫繢之事統于冬官而春官外史專掌書令其意可見矣况六書首之以象形象形乃繪事之權輿形不能盡象而後諧之以聲聲不能以盡諧而後㑹之以意意不能以盡㑹而後指之以事事不能以盡指而後轉注假借之法興焉書者所以濟畫之不足者也使畫而可盡則無事乎書矣吾故曰書與畫非異道也其初一致也古之善繪者或畫詩或圖孝經或貌爾雅或像論語暨春秋或著易象皆附經而行猶未失其初也下逮漢魏晉梁之間講學之有圗問禮之有圖列女仁智之有圖致使圖史並傳助名教而翼彛倫亦有可觀者焉世道日降人心䆮不古若往往溺志于車馬士女之華怡神于花鳥蟲魚之麗遊情于山林水石之幽而古之意益衰矣是故顧陸以來是一變也閻吳之後又一變也至于關李范三家者出又一變也譬之學書者古籀篆隸之茫昧而唯俗書之姿媚者是耽是玩豈其𥘉意之使然哉雖然非有卓然拔俗之資亦未易言此也南徐徐君景暘攻書史善吟古今詩信為才丈夫也旁通繪事有士韻而無俗姿一時賢公卿皆與之遊名稱籍甚有薦于朝者景暘以母老不仕豫尤愛景暘者于其別去故作畫原以贈焉嗚呼易有之聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象然則象之事又有包乎隂陽之妙理者誠可謂至重矣景暘其亦知所重乎哉椘客對宋子泛舟西上夜泊彭蠡褰蓬而坐時長空無雲明月皎然孤照衆星環列一一可數同舟有椘客者忽指月問曰日月一也此何以有虧盈乎宋子曰不然也月圓如珠其體本無光借日為光背日之半常暗向日之半常明其常明者正如望夕初無虧盈但月之去日度數有逺近人之觀月地勢有正偏故若有虧盈爾曰然則其有夜食奈何曰此為地影之所隔也月上地中而日居下地影既隔則日光不照其隔或寢京畿鄉試䇿問問儒吏之分古無有也蓋儒守道藝吏習法律法律固不出乎道藝之外也奈何後世岐而二之岐而為二果始于何時歟然而儒之與吏各以才顯者亦衆矣以儒言之有以明經為郎出守河南而民以殷富者有以明經入仕刺舉無所避而加光祿大夫者以吏言之有以治獄才髙而舉為侍御史者有以治律令而升封為博陽侯者其果何修而致此歟豈皆以儒術緣飾吏事者歟世道日降事䆮非古為儒者不以明體適用為學而留情于章句文辭之間峩冠博帶論議衮衮非不可也及授之以政則迂闊于事為群吏之所賣為吏者不以致君澤民為務而溺志于簿書期會之末承順以為恭奔赱而效勞非不能也及察其所為則黷貨舞法為民之大蠧古之為儒為吏者其果若是歟誠使儒而不迂吏而不姦皆良材也不知何以擇而用之歟方今聖天子提三尺劍平㝎天下如漢髙帝發政施仁孜孜圖治過唐太宗且以吏弊未除而為生民之害乃徴四方布衣之士畢升于朝命銓曹選而官之髙者擢守今次亦不失為州縣之佐聖德至渥度越前代其所以然者欲使儒術輩吏弊而臻夫太平之治也古語有之法如牛毛弊如蜂午革之之道果何先而何後孰緩而孰急歟考之周禮士多而府史少今世之吏數倍于前事繁政紊按牘紛然所以其弊為滋甚劉炫所謂老吏抱桉而沒者也其可减去太甚而收良吏之績歟稽之漢世以四科取士若曰某以某才堪任某職初不專于一塗所以去弊與利具有其道董子所謂量才授官録德㝎位者也其可行之于今而收賢儒之效歟諸君子讀往聖之書負真儒之學生平立志耻與俗吏為伍其必講之有素矣當斟酌古今之宜逐問以對母謄𥿄上之陳言一則曰在得人二則曰在得人記李歌李歌者霸州人其母一枝梅倡也年十四毋教之歌舞李艴然曰人皆有配偶我可獨為倡邪毋告以衣食所仰不得已與母約曰媪能寬我不脂澤不葷肉則可爾否則有死而巳母懼陽從之自是縞衣素裳唯拂掠翠鬟然姿容如玉雪望之宛若仙人愈致其妍人有招之者李必詢筵中無惡少年乃行未行復遣人覘之人亦熟李行不敢以䙝語加焉李至歌道家逰仙辭數闋儼容默坐或有狎之者輒拂䄂徑出弗少留他日或再招必拒不往益津縣令年頗少以白金遺其毋欲私之李持刀入户以巨木撑拄罵曰吾聞縣令為風化首汝縱不能而忍壞之耶仐冠裳其形而狗彘其行乃真賊爾豈官人耶汝即來汝即來吾先殺汝而後自殺爾令驚赱時監州聞其賢有子方讀書舉秀才聘為之婦李尚處子也居數年天下大亂夫婦逃難俱為賊所執賊恱李有殊色欲殺其夫而妻之李抱其夫詬曰汝欲殺吾夫即先殺我我寧死决不從汝作賊也賊怒并殺之吁倡猶能有是哉可慨也記馮寅賔言椘人多尚鬼事有不直聽之廬陵民相爭憤弗能白舁桐偶神置諸庭日夕祝焉神衣紅綃𫀆儼如生未幾猛乕夜至熟視不敢動忽風吹神衣飄飄然舉虎以為誠人也搏而噬桐木之質虗虎牙入膠焉乕怒碎裂之次夜復至銜其豕以去陷眢井中衆投石殺乕歡然以神為靈噫使神信靈也其當免于身乎永新馮寅賔為豫言寅賔名進士翼翁子其言當不妄記之書穆陵遺骼𥘉至元二十一年甲申僧嗣古妙髙上言欲毁宋會稽諸陵江南總攝揚輦真加與丞相桑哥相表裏為姦明年乙酉王月奏請如二僧言發諸陵寶器以諸帝遺骨建浮屠塔于杭之故宫截理宗頂以為飲器大明洪武二年戊申正月戊午皇帝御箚丞相宣國公李善長遣工部主事谷秉毅移北平大都督府及守臣吳勉索飲器于西僧汝納監藏深惠詔付應天府守臣夏思忠以四月癸酉瘞諸南門髙座寺之西北明年己酉六月庚辰上覽浙江行省進宋諸陵圗遂命藏諸舊穴云嗚呼上之德可謂至矣哉書萬安丞吉安萬安縣有豪民劉仲賢以攘牛殺鄒君瑞父子五人歷時巳久鄒嫗始獲執牒訴諸縣懼不得尸弗録嫗辭嫗哭于庭三日縣丞髙昌萬鵬舉録之俄有大蜂五聚丞之案麾去復至如是者四三丞乃祝曰爾信為鄒之鬼邪明日再聚吾案如期蜂復集丞猶未之信連與蜂期咸如𥘉丞乃上馬抵劉舍反覆蹤蹟之縱無所有匆見五蜂飛集竹坡丞亟令左右具畚鍤斸之四尸藏竹下如生唯孩童尸未獲蜂復導丞至榆木下環繞而悲鳴發之孩體巳腐唯其首獨存獄具斬劉市中嗚呼人不得其死附物以暴冤者至如是夫昔豫友楊觀尹漢川有蛙鳴躍履畔楊曰汝若有所訴當前我蛙即躍而去楊躡其後行二里所見一尸橫焉楊捕逆旅氏一鞫即伏方疑無主名檢尸衣得遇所知為湖南賈人遂伏辜漢川人與豫言豫竊以載籍所見固有若斯者是殆未可信也今觀萬安丞事與之正類徴諸人人言不殊其將弗信矣乎因謹書以為世戒題四十二分金剛經後龍舒王曰休嘗病六家金剛經所譯各有未盡乃采其文義優深似得佛語之真者集為一經而注釋之復患梁昭明太子所分三十二分未盡玄理仍別立章號析為四十有二學佛者喜其據義之弘博也遞相流布唯恐其不傳余竊讀而病焉蓋六朝譯場所選皆一時知名之士然又非止一人有譯語者有譯義者有潤文者有證𣑽語者有正義者有唐𣑽相校者不應舛錯之若是也其間或有不同誠以佛語廣大包羅諸義而譯家各得其一意云耳日休華人素不通天笁之語又未嘗親見所談𣑽本何以考知其得失佛言微妙雖聲聞緣覺或有所未解又何以察其僞真是皆不能無所疑也昔者孫明府患諸家譯是經者文句增减違背佛意遂據天親無著論頌重加刋削修成一部而斥長水孤山二師以為依句而違義正與日休略同大慧杲公直以毁謗聖教闢之孫之書因不行世日休與大慧為同時人惜乎不及一見而針其失也香岩仲模上人出示是經求題謾書于後以俟大慧者之出云題定武舊本蘭亭帖後昭陵既取蘭亭序詔供奉各臨之㫿歐陽詢奪真因勒石禁中所謂長安古本也五季之亂石流落人間慶曆中為李學究者所獲宋景文公帥㝎武復得于李之子匣藏庫中熙寧間薛師正來為守惡其打搨有聲乃刋别本以惠求者已而師正之子紹彭潜模勒他石易古本歸長安且鑱損湍流帶古天五字一二筆為識是則定武巳有二刻矣其後又有棠梨極本洎馮當世錢仲耕曹士冕范序辰恱生堂新塘李氏等本不翅五十餘家雖皆祖㝎武而其筆意相去殆若天淵之懸隔矣今觀大慈禪師所藏肥不剩肉瘦不露骨其殆長安之𥘉刻者歟雖賈魏公積至八千匣之多求其如此本者恐指亦不能多屈也禪師尚永寶之題霜寒帖後濂授經青宫時皇太子欲學書召祕書丞陶宗儒至殿下下教曰晉人法書選真跡之佳者以進宗儒奉教而退于是用綵龍黃帕晨二十軸來上其一即黃庭經絹素精甚幾不見絲縷遙視之瑩然𥿄也字畫頗不類羲之諸名卿則歷書其傳授㝎為真本無疑其一乃獻之鵝群帖却絶佳方信蘇子瞻之言不繆餘帖皆唐宋人所鈎摹不知何以填墨儼如一筆所揮就因憶米襄陽最好臨晉人書王晉卿為其眩惑慙惶幾死近代袁伯長遂謂祕書所藏㦲百卷而宣和號右軍者皆米老一手僞跡蓋亦有此理濂請留鵝群帖而以其餘還宗儒今觀此帖有古文芾字印印雨首正鋭其形如米必襄陽所臨以惑人者然神彩逈拔亦自可寶故識所見題其後而歸之題歐陽率更帖此碑歐陽信本晚年所書筆畫險徑若鑄鐡所成者反覆視之㝎為初刻夲然而信夲雖極力追倣右軍而其規矩媚趣或得于大令為多學大令者羊舍人薄給事為最優自後鮮有聞者唯法極師睥睨而從之至信夲之起殆與之抗衡而無愧者也其有名之跡入宣和內府者凡四十𥿄惜皆不存而金石略所載二十三種亦惟雍禪師塔銘昭陵六馬贊皇甫氏碑醴泉銘盛行耳類皆翻勒之多無以見孤峰崛起四面削成之勢如此本者誠可寶玩覽者當以殷彛周鼎視之題徐原甫墨梅唐人鮮有畫梅者至五代滕勝華始寫梅花白鵝圖而宋趙士雷繼之又作梅汀落鴈圖自時厥後丘慶餘徐熙輩或儷以山茶或雜以雙禽皆傳五采當時觀者輒稱為逼真夫梅負孤髙偉持之操而乃溷之于凡禽俗卉間可不謂之一厄也哉所幸仲仁師起于衡之花光山怒而掃去之以濃墨點滴成墨花加以枝柯儼如踈影橫斜于明月之下摩圉老人大加賞識既巳拔梅于泥塗之辱及逃禪老人楊𥙷之之徒作又以水墨塗絹出白葩尤覺精神雅逸梅花至是益飄然不羣矣同郡徐原甫清曠標韻之士也性愛梅行吟㘴諷無斯須離去間參用𥙷之法與其傳神老幹傾歒而數花翹乎其顛真一絶也世之好事者往往多寶玩之濂因推本而題之若此士大夫有如陳去非和張規臣之作者尚津津而有繼哉題溫日觀蒲桃圖人知中言師以善畫名世而不知其結字清逸有晉人之風知其字之佳者縱有其人而又不知其超悟心宗而有翛然出塵之趣是以趙魏公鮮于奉常雖服其用筆精絶而師之忘去翰墨町畦玩㺯于人間世者要未必能察之也今觀此卷或書雜詩詞或畫蒲桃三數枝意到即成略無礙滯而蛟龍奮迅之勢自不可掩豈所謂天機全者固自有異人人邪跋紫泉頌後天台葉君見泰同易濟奉璽書南諭交趾道經貴州州有紫泉其源在江北去城百餘步而近相傳天下治則出焉洪武元年十一月巳未泉出溢流于江其色深紫光潔可染州守鄒天琦遂請葉君為之頌勒諸樂石豫官左史時臨川獻瑞木木中析有文在內曰天下平一正一反質白而文玄當有文處木理隨畫順成無錯逆者豫既異之今復見紫泉之出如是豈非大明麗天四海將治之兆乎傳曰國家將興必有禎祥信矣哉題友怡堂卷後旴江黃氏有二伯仲曰克明曰克巳賢儒也極相友恭尚懼其道未盡取友怡二字名堂以自朂吾友王君子充實為之記克明從子肅復命濂申其說昔者馬遂良旅食四方兄弟異處顧乃以怡名齊洪景盧為記其事特假託以譏之譏之誠是也濂謂必若黃氏伯仲足不出里門塤箎日奏于一堂之上然後始無愧友怡之名耳然或者猶謂堂之有名非古之義殊不知盤杅几杖皆有銘自成湯吕望以來則然况禮以義起縱曰非古得不為近古者哉子充今之景盧也其當以濂言為可徴矣乎題葉贊玉墓銘後余在浦陽與貴溪葉先生贊玉交先生之子名愛同性潁悟特甚嘗引之升樓出經題試之至正已丑先生父子皆别去不數年天下大亂聲跡不相聞者二十三年矣洪武􅉝亥之二月豫考試春闈及榜出有葉孝友名乃貴溪人恐為先生之子復以名不同為疑時車駕將幸臨濠是月壬申會闈試事方畢癸酉即親䇿于廷甲戍臚傳進士名午門外即日謝恩趨青宮聽注授寫職名為丸耦進而分拈之孝友得為平鄉丞戊寅錫宴中書堂豫𬒳酒上馬出有從傍呼曰君非宋學士邪曰然曰子為誰曰我葉愛同也于是下馬執手相慰勞問何以更名乃知有司誤以其字聞復問先生安否則作土中人已六年矣為之悲喜交集喜則以先生有子悲則以先生之學僅止于斯也嗚呼二十三年之間人事變遷何所不有老身幸未死得與孝友一接豈非天哉然昔見孝友時兩髦𥘉勝簮耳今則以文辭第奉常年且三十有八矣余之顛毛欲不種種尚可得乎俯仰古今而不知中心之慘慘也孝友以蔡君淵仲所撰墓銘相示因題其後而歸之題周母李氏墓銘後梁太常卿任昉著文章緣起一卷凡八十有五題未嘗有所謂題識者題識之法蓋始見于唐而極盛于宋前人舊跡或暗而弗彰必假䏻言之士歷道其故而申之有如箋經家之踈云耳非專事于虗辭也昧者弗之察往往建立軒名齊號大書于首簡輒從人跋其後露才之士復鼓譟而扶搖之嗚呼何其俗尚之不美也臨川周友以危太史所撰母夫人墓文見示請豫申言之豫則以謂必知是而後無愧于題識耳夫發揚其親之德孝子事也何厭乎言之詳使人人皆如友風俗其有不還淳者乎故為記其卷末而歸之知言之士必有取焉題唐臨重告帖後唐臨重告帖豫嘗見于內翰栁公家相傳為薛嗣通之筆其點畫肥瘦及行位疏密與此正同其稍異者南廊墨印則在于左方耳豫以薛書飄逸為疑質之于公公笑曰古人䏻知變通所以為不可及也逮逰四方復見薛所臨唐帖一二皆不類其書方信公之言為足徴也今觀劉先生此卷尤覺精采煥發可玩故為括公語于其後云題北山紀遊卷後同郡許君存禮以北山紀遊卷示濂請題識其後卷間諸詩皆鄉先達司理葉公侍講黃公太常胡公禮部吳公修撰張公之作禮部紀逰二文亦見其中然而待制栁公山長吳公頗皆有所賦詠惜乎未及采録因為檢其遺槀繕書以𥙷焉且為之言曰權德輿稱東陽為山水佳地今自北山言之潜嶽之峰如寶蓮華屹然中居而三洞雙溪之勝映帶後先佳則誠佳矣有若先達諸公咸文章巨儒同生于一時同出于一郡豈非尤佳者乎何以言之人物固藉乎山川而生而山川則專倚乎人物為之引重而此諸公其顯而在上者則巳羽儀文化流聲四方其隱而在下者又能播芳譽于天朝蔚為當世儒宗此非人之瑰傑益以昭夫地靈者歟侍講之詩蓋首倡者而作于至大庚戍之嵗自庚戍逮今五十餘年諸公前後物故而無一存者間嘗采芝山中經諸公倡酬之處岩紅澗碧其餘榮儼然在月有不得不感慨于中者矣嗚呼北山之雄麗不減于昔生祥下瑞當無時而休也惡知無俊偉疊興以繼諸公之軌轍者哉大篇短韻宜不止斯此卷特其權輿者爾存禮尚襲藏以俟存禮許文懿公之子學有淵源而工于文辭非惟其性標雅有山水之嗜而景行先哲之意尤惓惓云題楊𥙷之梅花林君復愛梅逃禪翁善畫梅皆托之以見志者也然二人風措清峻有名于當世頗同君復固終身不仕思陵欲一見逃禪有不可得則䏻髙尚其事尤非懦夫所可及後世欲以繪事求其人是未見其衡氣機者也題江南八景圖後圜悟諸子唯虎丘大慧倡道為尤盛東叟頴公則大慧之曾孫癡絶冲公則虎丘之玄孫也二公皆能克紹前烈其以江南八景圖相贈遺者豈留連于光景者哉蓋心能轉物而不為物所轉雖繪事之微一山一水一草一木無非見其自般若光中發現非知道者要未足以識此也是卷癡絶歸之東叟東叟歸之仰庵仰庵又一二傳而今天王講師藏之頗觀卷中舊題始于宋嘉熙二年戊戌至今國朝洪武四年􅉝亥巳歷一百三十四年其去作畫題詩時又不知其幾春秋矣中間涉歷世變而獨能傲兀于劫火之餘豈易易者哉中有暢文溪題識文溪蓋與􅗄源戴帥𥘉遊亦名僧云題趙子昻馬圖後趙魏公自云幼好畫馬每得片𥿄必畫而後棄去故公壯年筆意精絶郭祐之作詩至以出曹韓上為言公聞之微笑不答蓋亦自負也此圖用篆法寫成精神如生誠可寶玩也贈梁建中序虎林梁君建中妙年嗜伊洛之學而復有志于文辭之事下筆滔滔數百言不能自休取而觀之皆典雅可玩一時大夫士皆稱譽之建中不自以為足復來問文於余余也賦質凡庸有志弗強行年六十曽莫能望作者之户庭間嘗出應時須皆迫于勢之不能自已者爾當何以為建中告哉雖然竊嘗聞之師矣文非學者之所急昔之聖賢初不暇于學文措之于身心見之于事業秩然而不紊粲然而可觀者即所謂文也其文之明由其德之立其德之立宏深而正大則其見于言自然光明而俊偉此上焉者之事也優柔于藝文之場饜飫于今古之家搴英而咀華遡本而探源其近道者則而效之其害教者闢而絶之俟心與理􅉼行與心一然後筆之于書無非以明道為務此中焉者之事也其閲書也搜文而摘句其執筆也厭常而務新晝夜孜孜日以學文為事且曰古之文淡乎其無味我不可不加穠豔焉古之文純乎其斂藏也我不可不加馳騁焉由是好勝之心生誇多之習熾務以恱人惟日不足縱如張錦繡於庭列珠具于道佳則誠佳其去道益逺矣此下焉者之事也嗚呼上焉者吾不得而見之得見中焉者斯可矣奈何中焉者亦十百之中不三四見焉而淪于下焉者又奚其紛紛而藉藉也此無他為人之念弘為巳之功不切也余自十七八時輒以古文辭為事自以為有得也至三十時頓覺用心之殊微悔之及踰四十輒大悔之然如猩猩之嗜屐雖深自懲戒時復一踐之五十以後非惟悔之輒大愧之非惟愧之輒大恨之自以為七尺之軀參于三才而與周公仲尼同一恆性乃溺于文辭流蕩忘返不知老之將至其可乎哉自此焚毁筆砑而遊心于沂泗之濵矣今吾建中孜孜綴文思欲以明道為務蓋庶幾無余之失者而余猶為是强聒者文之華靡其溺人也甚易之故也雖然天地之間有全文焉具之于五經人能于此留神焉不作則已作則為天下之文非一家之文也其視遷固幾若大鵬之于鷦鷯耳建中尚勉之哉建中尚勉之哉洪武元年冬十一月十五日金華宋濂序太史公平生以文章名天下而其該貫籍窮極經史蓄積浩穰與古人爭長者人未必盡知之縱或知而尊之至其立心制行敦大和雅撰諸聖賢之道而無愧者世固未必識也於其大者不之識而謂足以知文章豈果能得其精微之意乎今觀贈錢唐梁先生建中序其論文如此則世之不足知公者宜也彼後生晚學未能執筆輒掎托疵病以議公曾有與之言文哉建中剋苦古學老而不倦亦可以觀公之取友洪武二十三年春正月十日門人謹題
