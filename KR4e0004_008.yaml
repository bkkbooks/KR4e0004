body:
  text: 白雲稿序劉協論文有云論説辭序則易統其首詔䇿章奏則書彂其源賦頌歌讃則詩立其本銘誄針祝則禮總其端紀傳文􅊾則春秋為之根嗚呼為此説者固知文夲乎經而濂猶謂其有未盡焉何也易之彖象有韻者即詩之屬周頌敷陳而不協音者非近于書歟書之禹貢顧命即序紀之宗禮之檀弓樂記非論説之極精者歟况春秋謹嚴諸經之體又無所不兼之歟錯綜而推則五經各備文之衆法非可以一事而指名也蓋蒼然在上者天也天不能言而聖人代之經乃聖人所㝎實猶天然日月星辰之昭布山川草木之森列莫不繫焉覆焉皆一氣周流而融通之苟欲強索而分配非愚則惑矣夫經之所包廣大如斯世之學文者其可不尊之以為法乎吾友朱先生伯賢以純篤之資而留意于辭章先秦兩漢以至近代諸文無不周覽用功之久灼見其是非之真復取近正無疪者聚而為書蠅頭細字動至數十大册時出而諷詠之巳而嘆曰學文不本諸經其猶玩培塿之卑而忽嵩華之髙乎乃復致力于經功益倍于前時越數藏胸中浩然若有所得操觚書之凡隂陽盈虗之運民物倫品之理萬彚屈伸之變皆隨事而著源源乎􅤾知其所窮且其為體多而不冗蕳而有度神氣流動而精魄蒼徑誠可謂粲然藻火之章矣濂之有志為文不下于伯賢古今諸文章大家亦多究心及遊黃文獻公門公誨之曰學文以六經為根本遷固二史為波瀾二史姑遲遲盍先從事于經乎濂取而溫繹之不知有寒署晝夜今巳四十春秋矣用心之苦雖與伯賢同而伯賢之所造詣濂固不能窺見其髣佛也然而太上立德其次即立言立言甚非易也自孟子以來致力于是者非不多求其可與經並傳者舂陵周元公一人而巳元公之言曰文所以載道也輪轅飾而人弗庸徒飾也况虗車乎是則文者非道不立非道不充非道不行由其心與道一道與天一故出言無非經也元公豈嘗拘拘學為文哉濂與伯賢又當共勗之可也伯賢以白雲稿若干卷請余序濂故具論之使知伯賢之文一以經為夲而蹈襲近代以為美者其尚有所彂也哉伯賢名右天台人著書甚多所謂春秋類編三史鉤玄秦漢文衡深衣考邾子世家傳皆別行贈醫師周漢卿序余聞松陽周君漢卿以醫名者久矣一日余壻鄭叔韡復來青蘿山中述其詳曰周君之醫精甚他固不能知姑即士君子所常道者言之括蒼蔣仲良左目為馬所蹄其睛突出懸如桃羣工相顧曰是系絡既損法當眢周君笑不答以神膏封之越三日目如初華川陳明逺患瞽者十齡百藥屢嘗而不見效自分為殘人周君視之曰是翳雖在內尚可治用針從眥入睛背掩其翳下之目歘然辨五色陳以為神武成男子病胃痛當痛不可忍嚼齒刺刺作聲或奮擲乞死弗之得他醫用大攻湯汙皆不損周君以藥納鼻竅中俄大吐吐出赤蟲尺餘口眼咸具痛即止東白馬氏婦有妊歷十四月不産形瘠尫且黑周君脈之曰非孕也乃為妖氣之所乘耳以藥下之一物如金魚疾旋巳永康應童嬰腹疾恆痀僂行久不伸周君解裳視之氣衝起腹間者二其大如臂周君刺其一魄然鳴又刺其一亦如之稍按摩之氣盡解手趨無留行長山徐嫗遘驚疾初發手足顫掉禠去裳衣羸而奔或歌或哭或牽曵如舞木偶粗工見之吐舌走以為鬼魅所惑周君獨刺其十指端出血巳而安虎林黃氏女生瘰􅊓環頚及腋凡十九竅竅破白瀋出右手拘攣不可動體火熱家人咸憂趣匠製棺衾周君為剔竅毋長二寸其餘以火次第烙數日成痂痂脫如恆人于越楊翁項有疣其巨類瓜因醉仆階下疣潰血源源流凡疣破血出弗休必殺人他醫辭不進周君用劑糝其穴血即止烏傷陳氏子腹有由隱起捫之如􅎆或以為奔豚或以為癥瘕周君曰脈洪且芤癰彂于腸也即用燔針如策者刺入三寸餘膿隨針射出其流有聲愈櫧槩黃生背善曲杖而行人以風治之周君曰非風也血澀不通也為刺兩足崑崙穴頃之投杖而去其醫之甚精如此薦紳先生宜有以褒之揚之敢以序文為請余惟古之神醫一橃見病之應因五臟之輸乃割皮解肌決脈結筋搦髓揲荒爪幕以為治所謂鍊精易形者也今則人誰知之其次則湯液體釃鑱石橋引案抏毒尉之法耳是法亦絶不傳其僅存于世者往往不能用用或乖戾以致夭閼而傷生者多矣夫醫者民命所繫一投丸之間一授針之際則安危由此而分何可不致謹于斯邪昔司馬遷立倉公列傳其所治自齊侍御史而下凡十有餘人皆歷疏其病狀辭雖繁而不殺者其意蓋有見于此也余敢竊取斯義備以叔韡所述序次成文以遺周君又安知他日修史傳者無采于余之言哉余耄矣且有脾􅍔吐涎日二三升蔓延將四稔叔韡尚邀周君以起余之疾者乎田氏哀慕詩集引孔子刪詩南陔白華皆存之而弗削者以其能孝也南陔之詩序言孝子相戒以飬意者孝子之所自作交相勸勉而盡其事親之誠至白華之詩乃謂詩子之潔白潔白則其行之純可知豈非人美之而賦是詩者邪雖有在人在巳之殊所以咏歌其志而鼓舞以為文勸者其益不既大哉惜乎有其義而亡其辭也同郡田君奐篤美有馴行其母徐氏卒哀號慟哭將欲無生既葬遑遑焉如有求而弗獲人勸其還舍奐號曰吾母在此吾奈何離母而去也因結廬墓側而依焉人復勸之曰廬墓非古也奐號曰吾恨不死從吾母于地下古與非古吾弗暇計也于是復作為詩歌以自勉寢苫枕塊疏食水飲終三年而後歸鄉之士大夫與巨公碩士聞之咸為太息亦作為篇翰以美之嵗積月增遂成卷帙其婦公陳君本心曰是不可以無傳也將刻諸文梓不逺三百里來青蘿山中而以首簡授余序作者之意余疾病纏綿之餘凡以文為屬者必固閉而力拒之而其請至于三五而不倦因嘆曰夫孝如奐者是亦足稱也卷中諸詩豐縟而紆徐粹雅而沖和固皆一時之傑作苟謂其有合于南陔白華之旨我則不敢知設當孔子之時其刪去與否我亦不敢知此無他二詩之辭既亡縱欲徴之而不可得也雖然孝者天之經地之義無古無今無長無幼無貴無賤有不可得而變易者人能咏歌之而鼓舞之雖孔子復生吾知其或將存之矣是時之傳他日𬒳之管絃諧諸金石使聞之者津津以喜會之者欣欣以勸則為移風易俗之益又豈小哉其視絺辭繪句道淫而宣驕者何如也古鼎和上四會語録序贊古鼎禪宗銘公以臨濟十七世孫四坐道場為黑白之所宗仰一旦祝釐江浙省垣現白光三道丞相康里公見之極加敬禮未幾將示寂語其徒曰觀世音蓮臺至矣安坐而逝及火化舌根齒牙數珠俱不壞五色舍利燦爛無數國史危先生巳托其行業為文勒碑而四會語未有序之者師之得法上首今天界禪師西白金公屬濂作之濂覽巳合爪言曰是真正語是不著有無語是電轟電掃語學者隨所悟入如慈雲遍覆法雨普沾小大根莖皆獲生成非入正知免具大力量者孰能與于此嗚呼世安復有斯人乎哉非謂果無之也求其真淳無偽若師者鮮也濂既為敘其事復歆豔之歆豔之不足復作伽陀一章贊之其辭曰我觀我師四會語一言一句皆真實河沙妙義總含藏其中無餘亦無欠及至能所齊泯時欲覔片言不可得有如十萬虛空界種種色相皆現前或飛或潛或動植以至洪纎髙下等枯榮生死及崩竭了然不染虛空相而亦不出于虗空真相如如不動故師昔嘗登寂照場耳邊一喝三日聾惟聾故使功用絶絶後通身皆是耳自兹出世入翁洲翁洲海水亦生耳但聞魚龍哮吼聲即使波濤增洶湧繼升補陀洛迦山合掌問訊觀世音目能觀色耳聞聲音聲何獨以目觀不知本來無耳目見所不見聞不聞盡大千界無礙者中天笁國凌霄峯所談妙法皆如是只因妙法法難思結集巳落第二義眉間放出白毫光七寶蓮臺向空至此皆逰戲神通事于師之道不相攝師之道大不思議千古贊嘆莫能盡姑以第二門中觀可以洗空于結習可以觸動于悟機可以速證于菩提是宜流通于世間視如照耀光明幢我言或誣有如水用明禪師文集序昔者蘇文忠公與道潛師遊日稱譽之故一時及門之士若秦太虗朝輔之黃魯直張文潛輩亦皆碩交于潛師相與唱酬于風月寂寥之鄉宛如同聲之相應同氣之相求者有識之士疑之則以謂潛師遊方之外者也其措心積慮皆與吾道殊𥘉不可以強而同文忠公百世士及其門者亦英偉非常之流其于方內之學者尚不輕與之進何獨于潛師皆推許之而不置邪殊不知潛師能文辭彂于秀句如芙蓉出水亭亭倚風不霑塵土而其為人脫略世機不為浮纍所縛有如其詩此其所以見稱于君子而其遺芳直至于今而不銷歇也歟四明永樂用明詗公蚤從月江印公究達摩氏單傳之旨踰十餘年不懈自覺有所悟入一旦忽慨然曰世諦文字無非第一義吾可以不求之手于是形之于詩皆古雅俊逸可玩巳而著為文辭章句整而不亂言辭暢而不澀論議正而不阿聲名藉藉起羣公間會先師黃文獻公遊浙水西用明槖其所作來見復成詩八十韻以為贄黃公讀巳大加稱賞遂日與黃公遊及其東還烏傷用明又賦詩餞之黃公因造序文一篇以遺用明其聲氣之同蓋翕如也今年春余奉詔來京師總修元史適與用明會于龍河佛舍用明出詩文各一巨册示余曰子黃公之髙苐弟子也盍為我序其首嗟夫黃公以道德文辭髙出一世固當代之文忠公而吾用明之作亦何愧于潛師顧余視黃秦眺張諸君曾不足以供灑掃之役何敢為用明序乎獨念及黃公之門三十餘年知用明受知為深幸與用明交亦似無間諸君之于潛師者序蓋不得不作也雖然大圓鏡中無一物不攝初無一物可攝實有非世諦文字之所能解此蓋用明與月江講之熟矣奚俟余言哉如攄其鄙見以為敘使後之讀者知古今人未嘗不同不特文忠公之與潛師而巳也水雲亭小稿序余在金華山中觀蛻岩張先生集有跋夢堂噩公用堂楩公吳中唱和卷後其言曰詩家寥寥叢林有人殆與唐皎宋潛方駕余竊以謂夢堂之詩幸巳見其一二矣而不知用堂所賦為何如意其必髙爽而絶塺者乎不然先生何為以如晦寥擬之也及來南京獲與用堂會于護龍河上間出詩文一帙所謂水雲亭小稿者俾余序之非惟其詩可稱道如先生所云其文亦深穩平實而多言外之趣因竊自嘆方外之人其用志不分乃能如斯之工也或謂余曰達摩氏西來其所傳者心法而巳矣何以詩文為哉子所取于用堂者淺矣嗚呼是何言歟是何言歟昔我三界大師金口所宣諸經所謂長行即序事之類所謂偈頌即比賦之屬汪洋盛大反覆開演天地日月山川草木城邑人物飛仙鬼趣羽毛鱗甲莫不攝入故後世尊之號曰文佛如此而能文吾惟恐其不能文也大師姑置之不敢妄論次而毗尼諸聖賢暨天親無著奉化之清泰凡禪林若古鼎銘公笑隱欣公斷江恩公儒林若袁文清公揭文安公黃文獻公皆嘗參叩及交遊云送天淵禪師濬公還四明序文辭之美者見之于世何其鮮哉非文辭之鮮也作之者雖精而知之者未必真知之者固審而揚之者未必至此其每相值而不相成唐有桞儀曹而浩𥘉之文始著宋無歐陽少師而祕演之名未必能傳至于今蓋理勢之必然𥘉不待燭照龜卜而後知之也嗟夫浩𥘉祕演何代無之其不白于當時卒隨煙霞變滅而無餘者豈有它哉由其不遇夫二公故然爾此余讀天淵師之所作其布感于中矣乎天淵名清濬台之黃岩人古鼎銘公之入室弟子嘗司內記雙徑説法于四明之萬夀近歸隱于清雷峯中蓋法筵之龍象也余𥘉未能識天淵見其所裁輿地圖縱橫僅尺有咫而山川州郡彪然在列余固已竒其為人而未知其能詩也巳而有傳之者味沖淡而氣豐腴得昔人句外之趣余固巳知其能詩而猶未知其能文也今年春偶與天淵會于建業因相與論文其辨博而明捷寶藏啓而琛貝焜煌也雲漢成章而日星昭煥也長江萬里風利水駛龍驤之舟藉之以馳也因徴其近製數篇讀之皆珠圓玉潔而法度謹嚴余愈竒其為人傳之禁林禁林諸公多嘆賞之余竊以謂天淵之才未必下于祕演浩𥘉其隱伏東海之濵而未能大顯者以世無儀曹與少師也人恆言文辭之美者蓋鮮嗚呼其果鮮乎哉方今四海會同文治聿興將有如二公者出荷斯文之任倘見天淵所作必亟稱之浩𥘉祕演當不専美于前矣或者則曰天淵浮屠氏也浮屠之法以天地萬物為幻化况所謂詩若文乎是固然矣一性之中無一物不該無一事不統其大無外其小無內誠不可離而為二苟如所言則性外有餘物矣人以天淵為象為龍此非所以言之也天淵將東還賢士大夫多留之留之不得咏歌以别之以余與天淵相知尤深也請序而送之送覺𥘉禪師還江心序往時有大比丘孚中信公以松源五傳之學提唱護龍河上覺𥘉恩公實與之分坐説法鞴宏施烹凡煆聖機鋒所觸抉飊奔霆四衆歸依如水赴海曽未幾何孚中示寂覺𥘉乃出世于建業之聖泉遷永嘉之雅山法道亦既大行于時巳而江心虗席若牧守若戌將若賢士大夫僉以謂江心古叢林思陵昔日駐蹕之地其名列在江南十剎非有名德如覺𥘉不足以厭服人心各具書疏以延致覺𥘉覺𥘉以慈憫故亦起而赴之及我皇上正位宸極隆興佛乘開善世院于大天界寺置統領副統贊教紀化等員海內諸名山悉隸之掄選有禪行涉資級者俾為之主其非才而冒充者斥之于是循例為江心擇賢然終無踰于覺𥘉者統領遂合群議仍請覺初居其職會余奉詔總修元史來南京覺初亦振錫自江心而至握手共語情蓋歡如也覺𥘉一旦忽來别曰吾將還江心子可無一言以贈乎嗚呼大雄氏之道頓與漸之謂也以漸言之𥘉臨十信伏三界見思煩惱外凡之位也次至十住位斷見思惑兼斷界內塵沙及伏界外塵沙用從假入空觀次至十行位斷界外塵沙用從空入假觀次至十回向位則伏無明而習中觀已上之種三十通為三賢內凡之位也次至十地位各斷一品無明證一分中道入等覺位又破一品無明入妙覺位至于妙覺始名為佛以類言之則不階等第直造心源圓妙如如超出三界無煩惱可斷無真乘可證無法門可學無衆生可度此心即佛彼佛即心不去不來忘內忘外不可以形相求不可以方所拘也大抵教中所攝頓漸兼收教外單傳頓為禪旨如來五時所説及拈花微笑無非共一妙用第以根有利鈍之殊故其機有遲速之異耳奈何末流之弊二家角立互相詆訶夫豈佛意也哉頗聞孚中雖參向上一乘日誦法華七卷致感異香滿室不散覺𥘉于禪寂之餘亦留心于教相為人演説弗置是皆不徇一偏而將歸于大同者也敢以此為説以贈覺𥘉覺𥘉其以為然乎否乎雖然大雄氏之道不絶如線扶持而振起之非吾覺𥘉是屬將誰屬邪覺𥘉之還也布大法雲震大法雷澍大法雨使小大根莖無不霑潤豈不弘且偉歟覺𥘉宜憂法道之衰而思日勉焉可也他日余幸杖策束歸訪覺𥘉于海濵升孤之亭步海月之堂見月色與海光同一清淨余與覺𥘉又當相視一笑嗒然而相忘也是為序雪窗禪師語録序或問于余曰菩提達摩西來以不立文字為宗蓋欲掃空諸相直究本心而趨真實覺地者也名山宿德何莫非建摩之子孫為之徒者因其説法往往編以成書號曰語録無乃與不立文字之旨相戾乎曰非是之謂也扶衰救弊各隨其時節因緣有不可執一而論者矣昔我三界大師演説大小乘諸經其弟子結集為修多羅藏至繁且多也復慮後之人溺于見解而反為心纍故以正法眼藏付于摩訶迦葉拈華微笑之間無上甚深妙法含攝無餘此亦化導之一法門耳非真謂鹿野苑至跋提河所言皆當棄之也不然如來自兜率下生何不即以單傳直指示人顧乃諄復勸誘而弗置之邪去佛既遠學者纏繞名義不能出離誠有如如來之所慮者達摩出而救之故取迦葉微笑之旨專以示人蓋亦有所甚不得巳焉尓育王禪師以三昧力入智慧海初説法于白馬寺繼遷開元巳而住阿育王山兼領大童寺事四會之間緇素翕集所以啓人天龍鬼之聽屹立不遷如真正幢涉險度危類大法􅊑若見若聞皆獲利濟至若垂三語以驗來學又如臨萬仞懸崖撒手而立非上根大器豈易入其閫奧者哉虞文靖公贊師之語謂為佛果一枝鳯毛麟角者其言良可信不誣也師入滅之十四年其上首弟子象先輿公月徑滿公以所録語徵余為之序余故舉扶衰救弊各隨其時節因緣者言之于以見達摩之宗非有違于先佛諸師之録非有違于達摩其事雖殊理則同也有若禪師此録之行後有因語言而入者雖不得見師而師之惠利所及益逺矣雖然靈妙一真直超三界其大無外其小無內雖無物之不攝欲求一物了不可得于斯時也無煩惱可除無法門可學無衆生可度無佛道可成尚何有言語文字之足論哉觀斯録者又當于是而求之人能于是求之始于禪師之道與有聞矣禪師名悟光字公實姓楊氏別號曰雪窗成都之新都人南堂禪師語録序豫壯齡時與千巖長公為方外交千巖以南堂禪師偈贊示余余讀之驚曰是有所證悟者之言也絶枝蔓去町畦而不墮于情識之境不意大法凋零而能見斯人哉千岩以余言為然當時之所見僅一二章耳自時厥後或吳或椘或梁宋或魯衛名僧開示多有謁余浦陽江之上者余既見輒問見南堂否曰見之曰有何言遂各解囊相示見漸多則其心慕之為愈至及來京師其弟子祖灊海夀復持三會語卑余而求為之序讀之連日因獲盡其大觀馬嗚呼據獅子坐演如來法其任甚不輕也在他人為之東剽西剠拈綴成篇而椎鑿之䀶故在師則混融無迹不異雲流而天空者矣在他人為之拘滯一隅動輒有礙或得乎此竟遺于彼師于殺活之機縱橫皆自如矣在他人為之氣索神沮不自振拔而無以應來學之求師乃圓滿充足覃及于諸方矣有若師者其所造詣誠非凡情之可度量哉夫以少林西來惟究心源言辭直截初無隱晦傳至大鑒恐為世諦流布不得不祕護而密持之歷代碩師隨時升降慈憫峻厲各立戶庭其接引雖若有不同所以祛逐妄緣而挽入正塗者則一而巳矣逮及宋季尚竒騁異背其師授而流于頗僻者漸多有之君子言之未嘗不為之太息師能循蹈矩彠惟祖武是繩提唱真乘使人復見大鑒遺意其扶樹正宗之功大豈小哉余之慕師非一日巨細之辭皆獲觀焉故知師為獨深而謂非他人之所能及然可惜者師之名位不滿于德使其説法五山布靉靆之慈雲澍滂沱之教雨則其功逺𬒳又不止今之所見而巳雖然名外也非內也德內也非外也師內重而外輕者也苟以在外者之崇庳以為在內者之低昻是不知師者也師之行業余既詳書成記勒之堅珉復為讀斯録者著其説如此千岩在㝎光中乂未必不以余言為然也師諱清欲字了庵南堂其號也族姓朱氏台之臨海人嘗住開福本覺靈岩三禪剎云送季芳聮上人東還四明序吾佛之學明心而巳矣然心未易明也結習之所膠滯根塵之所蓋纏沉冥于欲塗顛倒于暗室而不能自知必處乎重山密林之中木茹澗飲絶去外緣而直趨一真之境水漂麥而不顧雷破柱而弗驚久之馴熟忽然頓悟大地山河咸作碧流離色能如是不可謂無所證入矣然恐墮于空寂未敢自倍又必擔䔲褁糧不逺數百千里求明師而證之機鋒交觸如短兵相接失眼之頃輒至喪身失命及其印可巳㝎退藏于密如護明珠須臾不敢忘去然而修多羅藏其多至於五千四十八卷大無不包細無不統其可委之為賸語耶又必出司藏鑰晝夜研窮之而畢知其説證之于言驗之於心既無分毫之不同矣於是不得巳出世度人續佛慧命其階級之不紊功用之甚嚴乃如此奈之何今之執法柄者或不能皆然也余方為之浩歎不止有若季芳上人其蓋有以起余者哉季芳名道聮鄞人也幼讀傳書窮理命之學長依薦嚴羲公修沙門行尋掌內記於大天界寺遂嗣法于淨覺禪師矩度雍容進退咸有恆則蓋溫然如玉者也叢林之中成器重之或挽其為住持事則謙然不敢當且曰我心學未能盡明也三乘十二分之説亦未能盡通也我歸四明山中求諸巳而巳矣嗚呼若吾季芳之才之美如此苟使之主一剎而領四衆焉何不可者而乃還然不居則夫不及季芳而奔競欲得者為難言矣季芳行哉臨濟之子孫多有隱于鄮山鄞水之間季芳尚即而求之探古佛之真如翻諸經之妙義證入無量薩婆若海江南十剎諸名山當有遲吾季芳來説法者季芳雖欲自謙退不可得矣季芳行哉送用明上人還四明序佛之書其藏有三曰修多羅藏曰毗尼藏曰阿毗曇藏此則華言所謂經律論者也經則諸佛及菩薩天仙皆可演説論則諸賢聖僧皆可著撰惟律非如來金口所宣則有所不可者故自文殊以降不敢贊一辭逮于雙林入滅結集成藏而優波離尊者復口誦聖言十過衆證無差然後宣布其慎重而不輕也蓋如此然而中夏𥘉未之聞也自曇柯羅持僧柢戒本來洛陽始知有律文又至唐之澄照師作戒疏羯磨疏諸書而律學大傳于天下謂之行事防非止惡之宗真悟師起於宋慶曆間復著會正記十二本以弘澄照之旨嗣真悟而興起者則有大智師焉復以法華開顯圎意造資持記雖與會正稍殊亦無非推明澄照之説而求合乎先佛之制嗚呼律學之難明也久矣自非三師者出而恢弘之其有不失靈山之遺教乎有其人則有其政又豈無望後來之法嗣乎用明上人本諸暨楊氏子素稱儒宦之族自幼從叔父白石琪公逰四明遂令捨家于慈溪崇福寺别江舟公育以為法孫别江能窮法華三觀十乘之旨嵗為長期率同𫀆三十人而暗誦之得上人以為能繼其志極愛之而弗忘復命出湖心廣福寺從師而受律文大義所謂四波羅夷十三僧伽婆尸沙二不㝎三十尼薩耆九十波逸提四波羅提提舍尼一百衆學七滅諍大乘𣑽網經十重四十八輕等文皆欲習而通之及典事之久遷靈芝懴司之職今年之春與豫胥會南京其威儀之雅問學之佳既足以動人視聽而遊戲篇翰亦皆清逸有可玩者淨覺大師以碩望宿德為釋子所宗亦以上人為法器俾出世于菩提律寺上人將還四明徴豫言以為贈豫謂律文大義有三師之𫐠作在焉母事乎多言顧力行何如耳然而律主于戒能戒然後能㝎能㝎然後能慧是則戒者作佛之階梯濟人之舟航也可不務乎律之義雖明而所謂持犯開遮之説誰復講而行之為其徒者亦可以永嘆矣上人年甚茂志甚大其進未易量也幸勿安于卑近惑于旁岐恪然以三師之道自期則異日律學之再興者又安知不在于上人乎亦在上人自勉之而巳豫老且多病率爾成文殊無所彂越頗聞白石師內外之學兼備蔚為時之名僧上人幸即而問焉其不斥豫言為誕為繆則幸矣贈㝎巖上人入東序大雄氏之道洪纎悉備上覆下載如彼霄壤無含生之弗攝也東升西降如彼日月無昏衢之不照也弘敷固假于教儀妙悟須資于禪㝎所以銷融其粗濁振拔其精明降伏其塵勞躋登其實際非知力之所強必頓覺而後成蓋亦戞戞乎其難矣為其學者當究厥誠一法不立而日用熾然六入本空而真機獨露雖有所證未能自信于是逺訪師資以求印可利鋒相觸雨雹為之交馳疑網既袪星月為之朗耀非具大慧充大量要不足以與于斯也㝎巖戒師吳興士族積菩提之因勵精進之學美譽流于四方純行信于四衆且以見聞未溥踐履或礙泛東大洋海而覩古佛顯化之迹登天台靈岩而詢應真示現之方波濤㫪撞皆談苦空林木蔥蒨各彰實相此其立志甚不小也嗟夫世道既降正法不傳辭章之錦繡足以移易其性情勢位之微甘足以斫喪其智慧雖方𫀆而圎頂或塵容而俗狀滔滔不返可勝嘆哉有如㝎岩竱心為道如孤雲野鶴弗為世氛之所染如崇蘭幽芷弗為無人而不芳寧不為君子之所取乎所謂充大量具大慧者異日當于之岩徵之也㝎岩之還也且過南潯省親身居桑門心存孝道大雄氏所説大報恩七篇皆言由孝而極其業㝎岩又能行之矣則其所可取豈直前所云云哉會余詞林請書首簡顧文逋之叢沓兼羇思之􅌭紛筆無停思語多未醇同志之士刪而正之可也椘石禪師六會語序大慧提唱圓悟之道于徑山神機妙用廣大無礙入其門者凡情盡喪得法弟子不翅千餘人各闡化原而佛照于其中稱為善繼佛照之後而妙峯紹之妙峯之後而藏叟承之如持左劵相授器度吻合無差爽者寂照在四傳之餘復能克肖前人誠所謂世濟其美者然而諸師證入雖有不同其上接西來宗旨使人離垢氛而發精明者則一而也矣寂照之弟子椘石禪師蚤以潁悟之姿鋭意于道一時名德若晦機若虛谷若雲外爭欲令出坐下師皆謝之惟詣寂照之室反覆叄叩一聞鼓鳴羣疑氷消世間萬物總總林林皆能助發真常之機自是六座道場説法度人嬉笑怒罵無非佛事至于現寶樓間及種種莊嚴導彼未法因相生悟其與一實境界未嘗違背聲聞之起水涌山出逮世緣將盡顔色不異常時翛然坐脫如返故廬則其俊偉光明較于恃口給而昧心學者其果何如也哉嗚呼大慧之道至矣自它宗言之執持正法作獅王哮吼者固往往有其人苐近年以來傳者失真瀾倒波隨所趣日下司法柄之上復輕加印可致使魚目渾珍揚眉瞬目之頃輒曰彼巳悟矣何其易悟哉人遂請之為瓠子之印非特此也五家宗要歷抄而熟記之曰此為臨濟此為曹洞法眼此為溈仰雲門不問傳之絶績設為活機如此問者即如此答多至十餘轉語以取辦於口名之曰傳公案若是者皆見棄于師者也今觀師之六會語小入無內大入無外機用真切無愧先德唯具金剛眼者有以知余言之有在也余耄矣厄于索文者繁多力固拒之此獨樂序之而弗置者憫魔説之害教表正傳以勵世也師諱𣑽琦其字椘石行業之詳則備見塔銘中其來徴序者得法上首瑩中瓛公也宋學士文集卷第八鑾坡集卷第八
