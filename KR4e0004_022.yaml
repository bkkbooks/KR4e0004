  text: 宋學士文集卷第二十二翰苑續集卷之二
  hash: sha256:cba0b19ee55253f0dd9a60717e3c6f73aa43ecf11d39c534c80d2769b5e8917b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_022-1a}
body:
  text: 送戴原禮還浦陽序醫之為道至矣故周官有疾醫視萬民四時之病春之痟首夏之癢疥秋之􅒻寒冬之嗽咳上氣皆分而治之驗其狀而制其祿甚為不輕也後世官寖失職故于其術每擇之不精有人于此能合于古者之道豈不猶空谷足音之可喜者乎如吾同縣戴原禮氏是巳原禮生儒家習聞詩禮之訓惓惓有志于澤物乃徒步至烏傷從朱先生彥修學先生見其穎悟倍常傾心授之原禮自是識日廣學日篤出而治疾往往多竒驗豫請得而詳道之原禮從叔仲章六月患大熱靣赤口譫語身發紅斑他醫投以大承氣湯而熱愈極原禮脈之曰左右手皆浮虛無力非真熱也張子和云當解表而勿攻裏此證似之法當汗遂用附子乾薑人參白术為劑烹液冷飲之大汗而愈櫧槩方氏子婦瘧後多汗呼媵人易衣不至怒形于色遂昏厥若死狀灌以蘇合香圓而蘇自後聞人步之重雞犬之聲輒厥􅊇如𥘉原禮曰脈虛甚重取則散是謂汗多亡陽正合經意以黃茋人參日輔之其驚漸減至浹旬而安松江諸仲文長夏畏寒身常挾重纊食飲必熱加火方下咽微溫則嘔他醫授以胡椒煮伏雌之法日啖雞者三病逾亟原禮曰脈數而大且不弱劉守真云火極似水此之謂矣椒發隂經之火雞能助痰祗以益其病爾以大承氣湯下之晝夜行二十餘頓減纊之半復以黃連導痰湯益竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療原禮曰此鬱病也痰閉于上火鬱于下故長號則氣少舒經云火鬱則發之是已遂用重劑涌之吐痰如膠者無算乃復𥘉樂原忠妻亦蘇人因免乳後病驚身翩翩然如升浮雲之上舉目則室廬旋運持身弗定他醫飲以輔虛治驚皆不驗原禮曰左脈雖芤且澀神色不動是因驚致心包絡積汚血爾法宜下之下積血如漆者一十即愈留守衛吏陸仲容之內子病熱妄見神鬼手足􅽋動他醫用黃連清心湯不中原禮視之曰形瘦而色不澤乃虛熱耳法當以李杲甘溫除大熱之法為治即經所謂損者溫之者也服人參黃茋而安他若此者甚衆豫備聞賢士大夫恆言之今不能悉數也嗚呼有人如此可不謂之合于古道者乎夫醫之為道本于素問內經其學一壞于開元再壞于大觀習俗相仍絶不知究其微指唯執一定之方類刻舟而求劒者人訾之則曰我之用此不翅足矣又惡事內經為宋之錢仲陽獨得其祕于遺經而擴充之金之張劉李諸家又從而衍繹之于是內經之學大明劉之學朱先生得之最深大江以南醫之道本于內經實自先生發之原禮乃其髙弟弟子其用心也篤故造理為特精其傳授有要故察證無不中亦可謂賢也巳矣近來京師薦紳之家無不敬愛之服其劑者沉痾豁然如洗或欲薦為醫官辭不就遂賦詩以餞其東還且請豫為序昔者司馬遷作倉公傳載其應詔所對自齊御史成至公乘項處凡二十有三書治病之狀甚具豫倣此義稍陳原禮療疾竒中者繫之首簡并告周官疾醫四時治證之概世之知言君子必有所擇焉原禮之從父能軒翁豫之同志友也幸以豫言質之送甘肅衛經歷張敏行之官序長安張敏行至正癸卯進士也入國朝以來部使者薦起之擢為翰林典籍時四庫之書多藏文華堂堂在禁中舊為諸俊秀肄業之所抵奉天門不百武事駕嘗幸臨之敏行蚤趨朝已即危坐堂中中使或傳宣索書即啓鑰以上如是者二年雖得時近日月之光然未暇謁其氏名一旦上御東房遙見敏行委蛇入堂召而前問勞備至且曰爾能詩乎對曰臣雖不能碩學焉乃命之題敏行研墨濡毫跪寫以進上覽畢悅曰詩甚佳北産如爾者誠鐡中之錚錚也由是日承顧問見其性秉忠慤可任以事特命為甘肅衛經歷賜內府白金五十兩錢一萬二千文以寵其行凡所與遊皆為賦詩豫時侍講禁林送至都門外執爵立而言曰甘肅在漢為酒泉為張掖等郡𥘉因張騫言建置城府稍彂徙民充實之隔絶西域而斷胸奴右臂當時胸奴悍強西域未盡服故其䇿不得不爾也今皇明在御天威所至如雷如霆西域諸戎稽首稱臣者接踵道路而元君遺㣧奔竄沙漠粗存喘息惴惴自保孰敢持一矢東向非漢時比也聖天子特念生靈久罹兵燹不得以自寧設衛置屯一以備不虞一以招懷創殘之民其責亦甚重也敏行亦知其所以重乎于斯行也當導宣上德曰吾皇一視同仁罔間南朔夙夜唯爾民之憂恐爾寒也使來授爾裘慮爾餒也俾來給爾食或無以耕豫爾牛或無以獵賚爾馬若弓爾其寧哉氓縱曰愚離水火而升袵席云胡不樂將見荷旃𬒳毳者于于而至矣經歷幕府之長無所不當問敏行宜以此報上毋若翰林時危坐咏詩而自逸也他日贊畫成功乘赭白馬周流吊古曰此霍去病擊胸奴處也此公孫賀敗虜兵遺迹也挏馬湩滿壺白眼望天而飲醉後耳熱彂為聲詩以泄生平磊磈之氣斯亦竒男子之事敏行以為如何敏行喜曰先生之言至矣是為序題朱彥修遺墨後右丹溪先生書五𥿄與門人戴仲積及其子原禮者也夫醫之為道本于內經其失傳蓋已久矣金之諸儒劉守真輩獨能逺紹絶學至先生始三傳則授受之正不言可知矣先生之弟子雖衆得其真切者唯仲積父子為優仲積不幸蚤世原禮以其學行于浙河之西從之者日益多由是先生之道沽𬒳滋廣而三尺之童亦知先生之賢此非原禮之所致邪韓子有云莫為之後雖盛而不傳其此之謂歟原禮尤拳拳不忘而以遺墨求題謂見手澤有如見先生焉豫嘗從先生遊而交原禮諸父間甚久故不辭為之而書嗚呼師道立而善人多今於原禮見之西天僧撒哈咱失理授善世禪師誥大雄氏之道以慈悲願力導人為善所以其教肇興于西方東流于震旦歷代以來上自王公下逮士庶無不歸依而信禮之其來非一日矣欲使其闡揚正法隂翊王綱非擇其人曷稱兹任爾撒哈咱失理生于西域樂嗜佛乘纒結頓空冥心契道邇者不憚山川險阻直抵中華衝大磧之埃氛度流沙之莽蒼其志可謂堅且確矣朕嘉其逺誠特加以善世禪師之號爾尚靈承佛敕救濟群生冥頑而怙惡者爾推報應之説以導之貪嗔而敗事者爾舉恬寂之行以啓之庶幾符能仁之本願協大道之至中則豫一人爾嘉爾其懋哉和林國師孕兒只怯列失思巴藏卜授都綱禪師誥浮圖之教入中國者千三百年其徒衆之繁剎寺之廣不設長以統制之則其道不肅其法不嚴非所以示尊崇之意爰選良材用符善道爾孕兒只怯列失思巴藏卜生鄰佛土尊禮碩師其于三乘教法想已聞之熟矣以西土之人長西方之教孰謂非宜今特命爾為都綱副禪師統制天下諸山爾尚精勤弗怠蚤夜孜孜體如來之願力化導有情頑者繩之為良惡者禦之為善其與俱生吉祥相為表裏共闡正宗庶幾隂翊王度之功于是乎在爾其懋哉跋新刻圓覺多羅了義經後大界禪林有比丘曰惟肇具精進力樂善弗倦普願一切有情共升清淨毗盧覺地于是募刋圓覺大經以廣流布且是經者唐長夀二年天竺僧覺救所譯蓋大雄氏為十二大士説本起因地究其所修不越于三觀之義此所謂自誠而明去惑離愛其故為最盛宜乎比丘拳拳樂此而不忘也金華宋濂互跪合掌為之􅐌曰如如圓覺心凡聖本同具何處有善提更無煩惱者真體遍太虗太虗本無相苟一執著間清淨即穢濁雖不容纎塵未嘗離去之有如水中影影像本現前眼耳與鼻口無一不具足若使善泅者捕影于水中汪洋茫渺間見水不見影我身元是佛不待登圓覺茍欲求證時即無能證者此為上根人談此無礙法肇師大方便勸人真正修修之果何為孜孜在三觀庶得祛愛縳超出生死海前言本非實只此可依據竟登涅槃門非真亦非妄此以何因緣萬法本空故贈何生本道省親還鄊序世有恆言閥閲之家能守其田賦為難曰非難也一願欵之人足以易之矣又以能保其闔廬不失先人遺澤為難曰非難也稍知承家之義亦不致于覆墜矣又以能傳龜襲紫為難曰非難也爵祿之來雖曰有命或可以幸致𥘉不可以㝎論也然則孰為難其在紹書詩之業而有光前人乎前人之擩嚌道真吾則兀然如嚼蠟丸前人之立言契道吾則瞪然如立土偶縱使入有田廬出膺膴仕惡在其為賢子孫也哉吾于何生之事不能無感焉生字本道北山先生文㝎公諸孫也先生當宋之季侍宦臨川獲從考亭髙第弟子黃文肅公傳伊洛正宗之學首喻真實刻苦之訓繼聞浹洽四書之旨積力既久道凝德立威嚴莫犯有如泰山之干霄和氣充牣儼若陽春之煦物故其學一傳為王文憲公再傳為金文安公三傳為許文懿公聮蟬散彩焜耀後先使吾婺為鄒魯之俗五尺之童皆知講明道德性命之學者先生之功也在他人夙夜孜孜欲儀形其萬一况其子若孫者乎生嘗從事科舉之業受鄊薦矣會年始踰冠上命肄業成均此天之玉汝于成也向使合試南宮幸擢一苐即隨牒浮沉州縣間而學不暇講矣學未成而仕寧不犯古之明戒哉生今幡然改轍唯乃祖之學是繼斯善矣繼之之道云何心欲其大也萬象無不涵也理欲其精也無一髮之不窮也氣欲其平也勿使粗暴之干也形欲其踐也毋徒為空言以瞽世也文辭足以溺志也非關名教絶之而勿為也異端小道或可觀也屏之斥之唯恐蹈之也如此則庶幾乎近道矣生其朂之哉生在成均援舊比歸省二親前御史中丞誠意伯劉公參知政事陶公嘉生有學而有文首為詩以華其行而詞林胄監之英記注給事之臣郎官藩僚之賢方外名德之士又各分題聮什而請豫為之序嗚呼閥閲之家賢子孫能紹書詩之業者豫不于生望之而孰望之哉生執經從豫學者頗久豫故肆口極言之若夫豫告省親考子常事爾兹可略云朱恱道文稿後題右烏傷宋君悅道所為文一卷豫讀已愛其理明文順顧謂二三子曰辭章之弊久矣梔蠟為葩以逞妖豔非不眩人目睛比之元氣流行千紅萬紫遍彂洛陽名園固自弗佯何也生意之動蕩與死色之不澤者其可以亞論也哉蓋古人之于文以躬行心得者著為言言有醇疪但繫乎學之淺深爾後世則不然以文學文皆億度想像而為之知道君子未嘗不一笑擲之也今悅道之文論議必本諸經而翼以濂洛關閩之説既履康衢矣長安雖逺惡有不至者哉其視顛連榛莽之蹊而虎豹蛇虺縱橫交于前者奚翅萬萬恱道非惟見諸空言又思踐履以驗之此尤度越于人人豫雖留意于文造道不深而出言多疵深有愧于恱道雖欲痛自懲刷而秋髮􅌭紒𬒳肩矣惜哉豫期恱道甚逺恱道器宇清粹誠足以副豫所期他日道明德立而文益昌豫當在知言之列無疑故録與二三子言者題其卷後云送鄧貫道還雲陽序周官之制以鄊三物教萬民而賔興之所謂三物若六德六行六藝是也六行之中而姻居其一焉釋者曰姻者親于外親也夫人之生也內則諸族外則諸親歡然有恩以相愛粲然有文以相接蓋一山乎彛倫之正故賔興之際特于此察其行焉嗟夫世逺俗紛古之道不明久矣今于雲陽鄧貫道氏見之貫道本儒家富而好禮御史大夫陳公之女兄實歸焉當家居時公與貫道無日不相親或講論道德性命之奧或品量古今人物之盛以至雲亭月榭酣觴賦詩以寫沖和之情其樂殆歡如也及元季兵興所在皆繹騷貫道避地巖谷間深蟄而不出公間關走江表擇真主以為依歸自赴于風雲之會名譽日起而勛業日盛貫道之與公不相見者二十有二年矣洪武七年冬貫道思公之切歷湖湘泛大江直抵南京欲與公胥會公聞貫道之至亦喜不自勝出迎于龍江關相與序兵火離合問故舊存殁悲喜交集舉酒酹地各私相欣慶自是共周旋者且一月貫道以離家之久翩然動歸興有不可遏者豫因謂之曰夫自辛卯以來龍虎雄爭塵霾翳昏父子乎西東戚姻乎北南其别離之思蓋有不忍言者今也六合清明車同軌而書同文水陸數萬里山行水宿無一髮蜂蠆之虞有親姻在遐方者不行則已行則刻日可至貫道亦知所以然之故乎誠由帝德廣𬒳如天之覆如地之載蕩蕩乎難名乃克致有是也頗聞貫道富問學能辭章何以不稍攄所藴以禆治化乎貫道則曰吾老矣不能用也雖然雲陽有紫微山七十一峰森列如畫秀氣甚磅礴也自漢以來為侯封之邦唐雖有肥遁之士而無大顯融者至陳公始以正大廉平之學出佐明時而足以當山川之勝貫道之歸也冝以公之事歷言于嵓穴抱道之士且告之曰聖天子在上可以出而仕矣豫敬愛貫道篤親姻之義故舉周官六行之一序以贈之詩自侍講學士樂公而下凡十八人分題為九詠古今詩各賦其一云洪武正韻序人之生也則有聲聲出而七音具焉所謂七音者牙舌唇齒喉及舌齒各半是也智者察知之分其清濁之倫定為角徴宮商羽以至于半商半徵而天下之音盡在是矣然則音者其韻書之權輿乎夫單出為聲成文為音音則自然協和不假勉強而後成虞廷之賡歌康衢之民謡姑未暇論至如國風雅頌四詩以位言之則上自王公下逮小夫賤隸莫不有作以人言之其所居有南北東西之殊故所發有剽疾重遲之異四方之音萬有不同孔子刪詩皆堪𬒳之絃歌者取其音之協也音之協其自然之謂乎不特此也楚漢以來離騷之辭郊祀安世之歌以及于魏晉諸作曷嘗拘于一律亦不過協比其音而巳自梁之沈約拘以四聲八病始分為平上去入號曰類譜大抵多吳音也及唐以詩賦設科益嚴聲律之禁因禮部之所掌貢舉易名曰禮部韻略遂至毫髮弗敢違背雖中經二三大儒且謂承襲之久不欲變更縱有患其不通者以不出于朝廷學者亦未能盡信唯武夷吳棫患之尤深乃稽易詩書而下逮于近世凡五十家以為輔韻新安朱熹據其説以協三百篇之音識者雖或信之而韻之行世者猶自若也嗚呼音韻之備莫踰于四詩詩乃孔子所刪舍孔子而弗之從而唯區區沈約之是信不幾于大惑歟恭惟皇上稽古右文萬幾之暇親閲韻書見其比類失倫聲音乖舛召詞臣諭之曰韻學起于江左殊失正音有獨用當併為通用者如東冬清青之類亦有一韻當析為二韻如虞模麻遮之屬如斯之類不可枚舉卿等當廣詢通音韻者重刋㝎之于是翰林侍講學士臣樂韶鳯臣宋濂待制臣王僎修撰臣李叔允編修臣朱右臣趙塤臣宋廉典簿臣瞿莊臣鄒孟逹典籍臣答祿與權臣孫蕡欽遵明詔研精覃思一以中原雅音為㝎復恐拘于方言無以逹于上下質正于左御史大夫臣汪廣洋右御史大夫臣陳寧御史中丞臣劉基湖廣行省參知政事臣陶凱凡六謄稿始克成編其音諧韻協者併入之否則析之義同字同而兩見者合之舊避宋諱不收者輔之注釋則一依毛晃父子之舊勒成一十六卷計七十六韻共七十萬言書奏賜名曰洪武正韻敕臣為之序臣濂竊惟司馬光有云備萬物之體用者莫過于字包衆字之形聲者莫過于韻所謂三才之道性命道德之奧禮樂刑政之原皆有繫于此誠不可不慎也古者之音唯取諧協故無不相通江左制韻之𥘉但知縱有四聲而不知衡有七音故經緯不交而失立韻之原往往拘礙不相為用宋之有司雖嘗通併僅稍異于類譜君子患之當今聖人在上車同軌而書同文凡禮樂文物咸遵往聖赫然上繼唐虞之治至于韻書亦入宸慮下詔詞臣隨音刋正以洗千古之陋習猗歟盛哉雖然旋宫以七音為均均言韻也有能推十二律以合八十四調旋轉相交而大樂之和亦在是矣所可愧者臣濂等才識暗劣無以上承德意受命震惕罔知攸措謹拜手稽首序于篇端于以見聖朝文治大興而音韻之學悉復于古云洪武八年三月十八日翰林侍講學士中順大夫知制誥同修國史兼太子􅐌善大夫臣宋濂謹序鄭氏聮璧集序磨勘司令鄭君思先間謁濂禁林從容言曰伯父杲齋先生天分絶人嘗矻矻窮經再踐場屋不合主司程度遂棄去遊浙河之左右大肆其力于古文辭久之思如泉源衮衮出不休日試萬言倚馬可待大司徒楚國歐陽文公竒其材欲薦之會疾作而卒先子曲全先生幼喪二親而賦性狷介州里不能容伯父時客授崑山乃走就之求四庫書疾讀雖暑鑠金寒折膠不越戶限未幾下筆為文皆循矩度而不輕于毁譽然剛毅忤物人有不善必折之雖其靣頸發赤弗少貸晚寓蘇之海虞竟以坎壈終惟二父負不世出之才文名相埓遭元季兵亂不沾一命竟捐館舍而其遺文將遂零落不傳此思先日夜痛心而不敢自寧者也伯父為文多不存稿思先自童丱見輒録之積二十春秋得文百篇古今詩四百八十首先子之著作雖存嘗自刪焚僅留三十篇文百篇詩而已于是合寫成書釐為一十四卷題之曰鄭氏聮璧集將鍥文􅎚以行四方敢以首簡序文為請濂受而讀之杲齋之文則氣韻沉雄如老將帥師旌旗火鼓􅌭紛交錯咸歸節度曲全之文則規製峻整如齊魯大儒衣冠偉然出言不煩曲盡情意然皆有臺閣弘麗之觀而無山林枯稿之氣嗚呼是亦可謂能言之士乎昔夏侯湛與潘嶽並姿容其行止之處恆同輿而接茵人謂之連璧然不過取人物之明潔耳𥘉不論其能文也縱曰能文如溫邢之敏贍亦生于異鄊𥘉非出于一姓也縱出于一姓若二謝之藻麗𥘉非出于一門也縱出于一門若二盧之雅逸則一從焉若二弘之典嚴則再從焉而同胞同氣者蓋亦鮮矣嗚呼有若二先生伯仲並以文鳴其亦可謂希世之士乎濂也不敏幸見杲齋于虎林而于曲全則未之識也及官成均乃與曲全之子司令君為同僚司令君善承家學文光赫然為御史為部使者百壬斂迹又以政事聞何鄭氏之多賢哉雖然不開之于先後將何繼不繼之于後前何以昭司令君汲汲為不朽之圖可謂知所本矣濂因備書其事冠諸篇首知言君子必有取焉杲齋諱東字李明曲全諱采字季亮溫之平陽人洪武八年夏四月望日溫州橫山仁濟廟碑記禮者曰能禦大災則祀之能捍大患則祀之先王之制非神𥘉封于唐為平水顯應公尋升王爵賜衮冕赤舄宋纍加通天護國仁濟之號從祀郊壇兼賜仁濟以為廟額元復加威惠進封大和沖聖帝遂易廟為宫逮入國朝一以誠事神以為數加溢美之辭非所以敬恭明神詔禮官定議為橫山周公之神至於廟宇之建修皆郡守任其責可考見者自陳毛喜逮元左答納失里凡一十三人云昔者大禹當洪水橫流之時隨山刋木奠高山大川民始得平土而居千載之下覩河洛者必思禹功而弗忘天衷民彛其不可泯也如此若神之為憫生民之昏墊奮身而興捍患禦災蚩蚩之氓得遂桑土既蠶而不混為魚鱉者果誰之力歟夫禹之功在天下神之澤則𬒳乎一州雖有小大之殊其惠利萬民之心則一而已廟而祝之誠合先王制禮之義孰謂非宜州人士永嘉教諭許士宏訓導張升恐無以示來者介鄉友秦王府紀善林君溫徴濂文勒諸樂石濂既為序其事復作歌一篇使邦人歌以祀神其佐神張鉉字子元郡人由右科進士仕至閣門宣贊舍人剛烈正直嘗上疏言事忤史嵩之𬒳斥而殁既殁而顯靈太守吳泳因并祠之法當附書文中歌曰東甌之地大海濵止斥鹵噴蝕成荒堙止有時魚龍或怒嗔止蹴翻巨浪髙嶙峋止懷襄勢殷莽無垠止惟神我憫眉屢顰止帥衆疏鑿不憚勤止夜役隂兵直逹晨止三江順流若柂紳止盡化魚鱉為衣巾止一旦颶母號秋旻止江流􅊇上波插雲止城廬沉溺在逡巡止神知事急如救焚止灣弓注矢肯顧身止眼不見水唯見民止衝濤直入勇絶倫止海水璧立左右分止赤電飛射光相燉止神乘白龍赴海門􅊒􅊒似聽驚雷奔止水禍頓弭神具欣止有室堪居田可耘止僉言曷以酬大勛止有廟肇祀西洋濆止漸周吳越洎七閩止神功彌盛海宇聞止天兵建隊向空敶止旌旗上著鳥篆文止虜氣讋盡去解屯止况兹狗鼠視欲吞止河道遄復流沄沄止投杖化龍靈迹存止疏封直至帝王尊止冕旒衮衣佩㻞璘止神之正氣塞乾坤止下上日月摩星辰止玄化沕穆合神人止甌民戴神忱且恂止遐邇奔湊川之臻止如見靈旗降􅌭紛止牲牷肥腯酒苾芬止驅斥厲鬼黍稌蕃止太史造文勒堅珉止後千百載期無諼止抱甕子傳豫嘗遊括之少微山俯瞰四周如列屏障山之趾有隨地形髙下為疏圃約二十畝凡可茹者咸藝焉傍列桃杏梨李諸樹時春氣方殷疏苗怒長滿望皆翡翠色樹亦作紅白花􅌭紛間錯如張錦繡假心頗訝之曰是必有異因曵杖而降冉冉至其處氣象幽敻絶不聞雞犬聲遙望草廬一區隱約出竹隂間疑中有隱者亟前候之良久見一士戴棕葉冠身𬒳紫褐裘抱甕出汲水灌畦豫進問曰夫子何名曰山澤之民無所名也強之曰人以其抱甕也遂呼為抱甕子爾曰丈夫處世亦多術矣出則華軒結駟入則鍾鳴䁀食有志者輒能致之夫子恆營營逐逐于一甕間無乃自苦乎抱甕子忽辴然一笑指苔磴揖豫坐置甕于地嘆曰吾受血肉軀與人同豈不樂榮貴與人異哉顧念之頗熟百歲之間寧復幾何與其強情而徇世寧若任真以自放也吾圃之西則九盤山山之顛宋州𪠘建焉側有煙雨樓當山雲𥘉興景象萬態極可玩李鄴侯馬莊敏公嘗登之而感慨矣其東清溪觀秦賢良謫官而來亦遊憩其上時坐鶯花亭賦詩而今竟安在哉非惟人隨流水而逝異日凌霄之崇搆皆蕩為氛埃一凝佇間野草荒煙若愁思之不可禁世事往往類此是何足深道吾所以抱甕出入而弗辭也且當抱甕之時嗒然忘形志慮外絶精神內營目不見色耳不聞聲招之弗前麾之不驚委蛇容裔而萬物莫吾敢攖自以無愧于赫胥尊盧之民子以吾為逐逐營營不亦過歟曰然則灌畦亦有道乎曰有疏性不欲燥燥則生意厄而不伸疏性宜濕濕或過焉則氣傷而寖屈吾日夜調之燮之俾適夫厥中則芃然而秀嫣然而榮矣言訖抱甕而去豫深味其言蓋有道而隱者也所謂強情而徇世曷若任真而自放不幾于樂其天者殿所謂人物代謝而樓觀不能以存一俯仰間而感慨係之不幾于逹人大觀者歟所謂抱甕有術心與耳目之官內而弗外木幾于守一不二者歟所謂藝疏得中不使倚于一偏不幾于治民有政者歟疾起而追之抱甕子入竹隂間閉户高卧扣之不見答若無聞者豫撫然而退史官曰豫既歸金華山日思抱甕子不少置及官南京見朝紳中貌有相肖者問其同列曰是豈括之灌畦者邪曰然曰奈何仕為曰去年應聘而起典儀晉王府轉官起曹剪剔浩穰聲望蓋龎欎云曰其氏名謂何曰此烏傷校官劉浩卿子也名彬其字為宗文豫不覺嘆曰浩卿吾故人也其有賢子若此豫不能知之可愧矣夫雖然宗文當元季政亂肥遁山林若將終身焉及逢有道之朝輒蹶然興起以力政著聞其得出處之正者矣向豫意其為有道之士者果非過歟果非過歟使宗文非有道之士則長往山林而不返矣謂之賢也得乎因記問答之語為抱甕子傳故龍泉湯師尹甫墓碣銘有序湯府君諱京字師尹一字景山處之龍泉人其先與宰相岐國公思退同宗蓋自岐公曽大父太師婺國公載之長子太中大夫稻傳十丗至武翼大夫大莭武翼生望以父蔭讓其弟始不有世祿有子曰鏞生未冠而宋社巳屋遂隱居行義置田二百畝以贍同族黃文獻公溍為記其事實府君之父也府君性聰利群書過目輒成誦逮入州學習進士科試之業下筆光𦦨逼人同舍畏憚之州里有貢之者府君辭曰仕固足以澤物然有命焉不可必致也所可必者其惟醫道乎乃發皇帝內經而精研之久且有所契察脈辨證多著竒驗遂闢仁濟堂居四方善藥于中疾癘者疕瘍者來謁悉與之疹療不責其報復慮義田之入可給於一時他日宗㣧蕃滋當有不可繼者乃與兄濵各捐常稔之田一百畝入之義莊湫隘别建數百楹中為堂曰睦順東西為二齋曰立本曰養原合群族俊彥聘碩帥誘迪之旁列廩庾以貯田粟俟時而分給府君猶以為未足其遇鄊黨耄疾不能存者月豫粟終其身殁而無歸者給槥櫝使之葬嵗或儉閭右發粟多增直邀利府君獨持價弗二恆如粟𥘉熟時香爐峯下道苦惡不利行者府君率群隸平其坑坎取溪中自然石甓之凡二十里所既而抵掌于几嘆曰澤物固吾之素志僅能施之一鄉將若之何浙水東苦口賦食鹽者久之有司苟免督過上官不知病民民病又不能自言必坐致淪胥而後已吾當往陳其弊言行與否則天也即日為書數千言走江浙行省對丞相白之辭氣激烈丞相與其反覆論辨府君以指畫地曰如此則為利如此則為害唯相君所擇耳丞相韙之下轉運使者定議將如府君言會浙東諸郡守亦各上言事聞中書中書移行省召郡守詣憲府聚論奏上減官煮鹽十萬引罷口賦法從商賈轉鬻民間民力大紓實府君倡之及還執綵旗迎于道者肩摩而㭈屬府君自是為善益力郡縣之政不便于民者必詣守令懇懇言之多所更免府君既退絶口不自言或問之則曰我不與聞也晚年嗜種鞠購得嘉種踰百當秋高氣清黃白紅紫盛開爛爛然如張錦繡府君日抱杖嘯咏其間情神恬康有下知老之將至四時燕集內而昆弟外而賔友皆笑歌相酬雖素不解飲必為之霑醉乃已賢士大夫慕豔其髙致盛為詩若文稱述之春秋僅五十至正戊子五月二十六日以疾終于家娶項氏男子一仁鞏女子四王默鮑良知頃房鄭靖其壻也孫男三宗昭宗敬宗瑾孫女一尚幼府君殁後四年其兄濵病革謂子楷曰吾與汝季父平生友愛篤甚今死猶未葬吾病脫有不諱當與之同兆域汝慎勿違吾言兄既卒楷與仁鞏奉二柩窆于麗水縣雲和鄊德廣里吾思嶺之原時某年月日也府君孝弟而寬慤不為浮靡慘核之行雖無意于利逹其濟利人物之志夢寐不能忘嗚呼若府君者不亦有道之士乎哉治古之時鄉田同井出入相友守望相助疾病相扶持故情意之感孚恩義之維繫信有足樂者矣降及後世兼并之俗興往往富埓刲君奴視同類編氓擢筋盬髓以飫其溪壑之欲設有阽危况望其一引手救之乎府君義敦于宗族而推及于鄊黨州閭上疏弭患且解諸郡倒懸之急功益溥矣徴之一族而信徴之一邑而信徴之一郡而信其言人人同無少異者是豈可以聲音笑貌為哉頗聞元季兵亂廬舍無小大皆成煨燼獨府君所建義莊巋然獨存虐𦦨屢及之不待撲而自滅為善者天亦鑒之如此豈特人言哉嗚呼是宜著之為聳善黜惡之戒者已仁鞏奉狀介鄉友刑部主事劉彬來徴銘銘曰維括望宗積慶攸鍾篤生岐公勳業顯融族大以盛分支析㣧孰以義競龍泉為勝有甫者田被乎東阡髙廩屹然拯夫顛連嗣人之繼有引勿替秉仁遷義遹昌厥裔合胡行之自家而推人餒我糜人疢我治物苟可利敢嗇吾施戴天履地庶幾無愧鹹鹺病民民氣不伸袖書侁侁走白相臣辭氣激烈上衝毛髮有智則竭如病斯脫我旋我廬迎者塞塗綵旍夾扶式歌且呼晚尤寡欲知已維鞠爛然盈目壼觴相逐誰非同袍忍鑠其膏不有人豪惠利孰操銘以著德千古弗忒金石消泐此冝罔極宋學士文集卷第二十二翰苑續集卷之二
