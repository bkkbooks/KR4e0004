body:
  text: 故朝列大夫浙江行省左右司都事蘇公墓志銘有序洪武十一年四月二十五日元朝列大夫浙江等處行中書省左石司都事蘇公卒郡之壽俊與旁州之賢凡知公者無不澘然流涕然公以政事聞于時髙年至八十三而終五男子嘗與仕版七孫亦嶄然見頭角皆可以無憾顧乃哀之弗置者誠以一時遺老日就凋謝而公又云亡古今文獻將何從而徴之邪其子祖允等以其年某月日葬公于某山之阡乃命弟伯衡踳門請製墓上之銘濂公之里中子其哀公尤切于他人固不宜以不文為辭𥘉公之生也不聞啼聲視之唯紫胞在地而臍帶縈絡之乳嫗撥開兒始啼識者巳知為祥徴及長學經于許文懿公以才推擇充府史尋入閩海憲府為奏差憲使以廉直為同官所忌嗾御史劾之章未下即命奪使印公毅然持不可使亦攟拾同官之過欲頌繫之公諍曰兩虎共鬪其勢不俱生明公奈何類之巳而皆止汀寇謀襲臨障公往督長吏為備長吏欲藉民為兵公曰民不知兵久矣一旦藉之必大致紛紜此非禦盜是增盜也長吏曰計將焉出公曰吾知所處矣閟兵籍得放逸者二千使帥之擊賊竟獲其首禍者廣東部使者聞公賢稽其年勞辟為書吏南海畨禺二縣輸恆賦之外復有所徴號稅外錢以給上官燕私之須小民怨讟盈道路公聞白罷之朝廷每頒新鈔諸郡部使者必監焚舊鈔此故事也時使者與廣州守有隙恚不往司鈔吏積十五年不得調公復白而焚之俄再入閩輔令史于宣慰司聲稱籍籍行宣政院延公為掾久之趙郡蘇君天爵來參江浙省政極才公復挽之入省公遜與舒常弗之從蘇君遂雨用之君以蘇君知巳遇事失當輒諍凛然有峭直風蘇君敬憚視之異他掾海漕之糧歲不下三百萬漕官多強取嬴無錫州獨不與乃誣其糧惡不宜上供省臣怒欲加罪公命覆核之事獲免海盜起省發官粟募民舟載軍捕之舟未盡發而盜請降省逮民歸粟公曰言猶在耳惡可背之况民得粟必巳食之既今將焉徴即徴唯徴未發者可爾省臣從其言蘄州紅巾搆亂陷于潛昌化犯杭州省臣皆遁參政􅈨君執敬獨坐堂上以死自誓公説樊君曰明公以身死國義則得矣如一城生聚何今城中健兒不下數十萬公庫金帛以萬計與其委諸盜賊曷若募民使戰邪戰而不勝就死何晚也樊君不能從上馬迎戰而死公與掾李樞謀以蘇李署號召民殺賊殺一人即携首受錢二百五十緡民持刀爭奮數日之間獻馘者充庭未幾辨章教化君復杭州公絶口不言功考滿謁選詮曹中書參議汝中柏聞公名家子欲引為右曹掾公察其威權太橫力辭南還擢紹興路蕭山縣尹蕭山民詭名匿其田賦科繇不能均一公令其自實田輯為册書凡有徵發皆視書重輕之兵興以來縣糧輸衢處二州民憚逺征往往皆屬吏吏並緣為姦利糧不時集主運者妻拏恆坐繫公釋之而罪吏期月咸足且為立法每鄉置督運一人趣民各以糧赴江濵仍驗糧寡多賦錢僦舟以行民大便之縣為吳越要衝師旅經從無虛月誅索芻茭少不愜則侵掠居民民畏之甚于鬼公儲峙既豐有犯者擒置于法士卒入城如見大將不敢出語相誰何會歲儉弛湘湖之禁以利民不足啓常平倉以活餓者僚屬力沮之公大言曰發天子粟活天子民有何不可儻有譴責吾自任之民賴以生者以數萬計帥閫以元日至檄縣市殽核諸物公發視恚甚執筆書檄尾曰四郊多壘正臣子痛心疾首之時奈何襲太平故態飲酒為樂邪聞者愧服府公韙公之為有難決之獄移公訊之諸暨知州袁元以散耆年帛不明將搆以贓墨公推其情乃吏與里胥為濫元但不躬給爾公各坐以其罪元致白金為夀公曰吾知執法爾豈私爾邪卒却之嵗餘改本路總管府經歷不上階自承事郎轉文林郎行樞密院照磨偽吳張士誠據姑蘇既降公持詔書往湖州責其戍將潘允明行郊迎禮禮成允明欲西向坐公公正色曰以爵則我幕僚雖相向坐亦以為過然我所持者詔書君敢與詔使抗禮邪挾胡床中席而坐允明懼服臨發贐米百斛錦二十端公笑辭曰君謂使者而可以貨取邪時士誠新授淮南平章政事開省蘇州士誠聞之請于康里丞相曰詔使四出唯蘇照宋廉介士願得為幕屬君恥之不往復超金官參政石抹君宜孫分省于處請公與青田劉君基從石扶君方以討賊自任浙東倚之為重每事必謀于公公勸其禮賢下士安輯流亡招徠群盜撫之以恩石抹君始從之衆心翕然歸後好自用幕下士多散去部將胡君深章君溢亦擁兵觀望公獨左右之不變復移書胡君等惓惓以共濟國事為戒石抹君多用故人攝縣棄竹省承制所用者公曰今朝廷不通事當一出行省奈何違之石抹君愧謝越部書佐李伏喜誇誕石抹君賢之薦授員外郎位居公上數狎侮公人為之不平公不與校既而伏以反覆受賂覺石抹見械繫之公解之曰參政始薦之今乃囚之古之以禮進退人者其亦如是邪伏因得引去經略使李君國鳯循行至處久留不去以十羊授公牧公曰某以非才為省屬天使命之牧羊固當然大敵壓境天使能出竒計殱之雖日烹百羊何害否則某亦不保首領欲久為天使牧羊得乎李君默然元季處多盜征行吏多受盜金既降而復叛公秋毫無所犯大溪吳誠七成禽官簿録其家得帳籍驗之莫府官無不受賂者獨無公名巳而浙水東諸郡悉入皇明版圗而七閩猶未附怨家告公長子仕閩宜謫徙滁陽公就從無難色丞相李韓公憫公無辜欲奏而官之者再公以年耄力辭遂歸卧金華某山中左圖右史超然自得越十二春秋乃終未終一日精神如常時忽不晡食越翼日瞑目端坐至夜諸子進問所欲公曰靜以俟命無所欲也漏下四鼓撼之則逝矣是夜大風雨居民見士馬雜還前籠絳紗燈訶叱東去民叩後來者云接蘇伯夔君子以為異公性敦吝尚風義孳孳務行及物之政唯恐有受其害者至于修水利興學校皆其有成迹然識量堅凝不為威武所遷嘗從大司農受海盜降分北其衆寇不悅嘯其部曲大譟轅門下衆皆相顧失色公獨進曰天子以爾等本良民迫于不得巳為盜故遣使者諭爾降爾果欲反不畏十萬橫磨劔邪俱逡巡而退復從樊君督海漕事用牲牢祠天妃廟始降神寇舟突而入陪祀官解散公謂樊君曰事不可中輟成禮而退神色自若與人交緩急可倚藉部使者有託其妻子者使者亡公禮之益厚避兵登舟逢故人兄弟倣徨走水濵亟呼與共載行數里所又見婦女羣泣亦其友母妻也命舟師迎之或止公曰舟重不能前追兵且及遑恤他人邪公曰死生有命吾不忍獨濟也公之善行如此類者甚夥姑取其著者書之餘不盡載公諱友龍伯夔字也人稱之曰栗齋而不敢字其先居眉州眉山縣文定公轍之長子宋吏部侍郎徽猷閣待制贈少傅遲來知婺州因家金華殁葬蘭溪之紫巖鄉遂為金華人少傅生龍圗閣直學士廣南東路經略使贈少保簡少保生江東提刑祕閣修撰大理卿諤大理生吏部郎中江西提刑林吏部生朝奉大夫顯謨閣待制知貴州熙貴州生通直郎兩淮轉運司幹辨公事圭運幹生從政郎淮安縣主簿鎮淮安君娶潘氏無子以三從弟太學生鎬之次子為後即公是也上距文定公蓋九世矣公娶宗氏忠簡公澤七世孫柔順惠嘉為一鄉婦儀子男子六人四仕于元一仕皇朝一蚤卒祖允將仕佐郎浦城縣主簿師道廣東宣慰使司奏差繼兄肖德後伯衡前鄉貢進士今自國子正擢翰林國史院編修官人辭雄麗較之小坡斜川集有過無不及焉思誠夭止善東陽縣尉崇德將仕郎行樞密院管勾子女子三人長適俞坦道餘皆夭孫男七人恆悟恱恢愷忭欣孫女五人歸曹源宗涵徐道餘在室嗚呼蘇氏之世非惟以文學忠孝著稱而為政及物之美亦代不乏人有若少傅奏減吾婺市羅之額二萬八千有竒民為立祠少保歷典大郡所至以遺愛見思而大理之樹善剗姦吏部之忠厚敦俗奕葉之間簮笏相映公又起而繼之聲名烜赫亦不昭于前烈何其一姓之皆賢哉嗚呼自奮于榮名者易于力而能纘先緒于弗墜者難為謀非天欲報功俾之世濟其美吾知未必能爾也嗚呼是則然矣婺之蘇氏其積纍深長實自少傅始後人因引而伸之公之仁民之功可謂侈矣其子若孫烏有不振拔者乎當知後之視公者亦猶今之視少傅也夫何疑哉伯衡與濂有文字之雅故竭蹶來山中請文遂歷序其事而歸之銘曰眉山蘇氏稱三文光芒萬丈爥乾坤少傅守婺政以仁紫巖生氣凛然存珠明玉潤多後昆簮􅌧􅌭紛絢朝暾貴而尸位玊之珉能守家法斯足珍維公挺生嘉兆甄鳴岐彩鳯瑞世麟從事大府歷粵閩其職雖卑氣益根峭直猶如古諍臣得失利害輒屢陳聞民有病眉則顰浙垣招充幕中賔孰知蘄冦紅為巾嘯聚山澤動作屯犯我屬部窺大藩用姓給號令編民殺賊如殺狐兔群有功默默不自言大官受降東海濵忽爾跳踉欲舞􅚙一叱鼠伏不敢嗔身佩縣章魚懸銀煦嫗扞禦一以恩設心不讓漢吏循拔彼水火脫溺焚錯之華榱藉錦茵參贊宥密待咨詢手持璽書諭嚚昏中坐以示王人尊噉我以利耳不聞括氓搆亂奔狂瀾障遏勿使成瀰漫海桑既變光嶽新携書歸卧丘壑雲執莭不仕為全人庶幾不負名家孫春秋之髙踰八旬倏焉觀化只逡巡大風挾雨來掀翻士馬雜遝向東奔絳紗籠燈光吐吞騶卒前呵肅靈氛生為良臣死明神丈夫如斯世罕倫白石可磨嫓瑶琨史濂造銘焯墓門石從可泐名弗諼遊塗荆二山記濂既遊琅琊山起行至池河驛適郵卒遞內使監公牒至及開緘中藏濠梁古迹一卷宸翰親題其外令濂搜訪與青宫言之濂因啓曰臨濠古迹唯塗荆二山最著按圖經塗山在昔鍾離縣西九十五里荆山亦在縣西八十三里二山本相聮屬而淮水繞荆山之背神禹鑿開使水流二山間其疏鑿之蹤故在人思其功迄今弗能忘青宫曰至中都當共往遊焉余將渡淮狩于王莊先生宜泝流而上屇今懷逺縣治以俟濂奉教行以洪武乙卯冬十一月己巳發舟庚午日曛始泊縣西門而青宫巳駐蹕于門東五里矣辛未濂上謁青宫喜甚下令以壬申遊二山濂至期約懷逺文學掾王景彰宿舟中黎明棹舟至塗山足曵杖入山山傍廢址舊皆民廬前渡石梁復斗折而北纍石為墉多藝椒之園行可三里餘視大磐石青緑間錯頽然欹足坐諦視之乾蘚交封之耳聞有草生石上髙一尺其花可玩不假土力人取懸擔間呼為石蓮華復行四里所巖石犖確插起道左危傾欲飛墜復二里所微徑入灌莾抵崖罅貯泉一泓味甚甘覆以生茨四聖水亭取水以禜雨多驗復一里餘至山顛禹廟在焉廟巳毀唯頽垣破礎存遊目四顧長淮西來渦河北匯而夀春臨濠宿州之境皆在冥茫昏杳中緬想南北戰爭屯戍處為感慨者久之山之下聚落甚盛廟史云名禹會村乃禹會諸侯之地廬舍之比如櫛移踵入廟廟前杏樹一章大可蔽牛二柏參差左右樹東冥小甕杏柯之水時津津滴其中廟史云當晨霧四集水愈多其來如泉可代井汲石碣二一大書有夏皇祖之廟六字下方刻宋慶元𥘉州守劉仲光自造禱雨記一亦記禱雨事皇甫斌紹熙庚戌來為郡命鍾離尉丁大榮作石未剝泐文尚可讀復從廟西循石坡而下巨石危立如人形遙望之一嫗儼然也相傳為啓母石廟史云居人每刲羊豕祭之至有以粉黛飾其貌者聞之不覺失笑山岰舊有僧房今廢久俟鶴駕不來忽使者至云扈從士馬多無橋可以度河青宫不復至矣言未既但見旌旗如錦繡搖曵上荆山矣濂亦下山麓入鯀廟見所題神號鄙俚棄而不睨出讀祖無擇所賦歌京口孫臨為書碑蓋無擇謫守夀春過此而作也復北經縣治折而東行約三里所至荆山梁魏交鬪時就山築堰以灌夀春其遺迹猶班班可見復行三十步崖廣如屋側身而入石平如床座可坐人號為卞和洞自西上復一里所過避雨石石斜倚可避雨故名復六十步至産玉坡竒石駢列玄質而白緣粲如雪西有玉池榛􅍮迷路不可尋景彰欲導遊青峯庵足倦遂止時青宫巳獵逺郊濂因澄舟先還中都云惟二山見諸載記者其説至考烈王始徙都夀春韓非子所載卞和獻玉事乃在厲武文三王之際昭王上接武王巳越十世當三王時鍾離何嘗屬楚而強謂卞和至此山邪新序又謂抱玉而泣在共王之時雜記又謂在懷王及其子平王之時平王乃昭王之父下距懷王九丗共王上至武王亦六世何至顛倒錯亂如是邪濂之存疑而未決者二也大氐山川遺迹非本諸經史者多不可信如葛洪丹井與郭景純之墓在在有之縱以髙世之智將何自辨其真偽邪必欲可信塗山當稽之左氏以夀春為正荆山當正諸史傳以江陵為正有謂塗山氏乃古國名禹曾娶其女者别是一説與此殊不相涉也濂耄矣諸書遺忘欲盡所記憶者未必無舛訛輒緣紀遊因挂漏書之以發同遊者一笑同遊者蓋太子正字桂彥良晉府長史朱伯言楚府長史朱伯清吳府伴讀王致逺及景彰云後一月某曰記義烏重濬繡川湖碑義烏有繡川湖在縣西一百五十步廣袤九里三十步舊設東西中三管稽其戶田之數以均水利其所溉凡八百九十五畝後加疏瀹之功其利愈博以畝計者至于一千五百而嬴東南各有斗門釃以二渠東渠循堤折行會于南又折而東疏為三以逹于田然而衆流行潢汙間挾之入湖其勢易致填閼在宋紹興甲子知縣董爟請湖為放生池嘗一濬之淳熙戊戌縣丞吳沃以春夏暴漲而淫管不能宣泄始更為閘視嬴縮而司啓閉仍架石橋其上人因以吳公名之開禧丙寅縣丞胡衍景定甲子知縣林桂發復皆重濬之自後無繼之者一遇亢陽為沴水輒涸田遂不稔曲阜孔侯來為縣之三年政通人和百廢具興乃躬履湖濵愀然而嘆田無湖是無田也兹非縣令之責乎歸與僚佐謀集八鄉二十八里之民量地定繇分鄉授事各植小幟以别其界域使之不相淆亂嚴示期約責其成功于是畚鍤齊舉有不戒而趨之意侯恐其過于勞也趣承水利之家具酒漿𦵔醢以食之勸相既頻功緒日就湖之北故為官道水齧蝕且盡因築而廣之湖南沿隄亦有曲徑以通人行居民侵塞且及湖百尺皆斥而復之雜藝花栁映帶左右復聚土為山于花島之後經始于今洪武戊午正月十五日至三月十八日湖之濬巳及三之二以東作方興遂輟其功其深約五尺有竒役工三萬二千有竒自興是役晝恆晴夜或雨雪逮夫遂事淫霖久不止君子謂侯愛民之所感是歲婺七縣大旱並湖之田獨獲有秋縣人士懷侯不能忘援昔人名橋故事既名土山為孔公墩以識侯功復來謁豫文為記欲示後之為令者俾嗣濬之余觀載籍之中有民社者能修陂渠之政則屢書之而不厭其詳此無他以民食之所繫故特用是以為勸也昔者史起之為鄴令大興水利以利民至有舄鹵生稻粱之謡逮今五尺之童亦有能知其賢者世之為令者苟能如起之愛民其修名有不垂于無窮者乎繡川湖縣之巨浸一方之所倚賴自景定甲子以迄于兹巳閲一百十五春秋佩銅章墨綬者不知其幾人皆漠然不以為意而孔侯獨能行之可謂無愧昔賢者矣因備書之勒于金石非惟永侯之文抑亦勸來者使則效之也侯名克源字敦夫孔子五十五代孫系之以時曰華川之墟衆水所趨其勢回旋匯而為湖黃流奔衝歲受汙濁不有濬之化為平陸孰為其先澤我甫田孰為其後維今之賢其賢為誰裔自曲阜我煦我育不翅召父百齡絶響曰吾繼之民食攸繫何敢弗思乃程土功乃集徒旅畚鍤齊興其來如雨森之綢綢斥之絿絿翕之鳩鳩離之休休窊者既深壅者斯戢建閘築防莭其出入潦水時行納之若虛猶如東瀛注于尾閭亢陽為沴靡神不格徒爾號呼土毛盡赤我行我野黍苗芄芄亦有流泉其聲潨潀人力勝天遵古之義胡不是修索諸茫昧彼歲遘凶我年獨豐拊巳而思侯誰之功功在不刋非文莫紀采而書之敢告惇史題桂隱遺文後右桂隱黃先生遺文一十二篇其曾孫翰林侍講學士文獻公溍所鈔濂嘗受業公門見公追念先德日搜墜逸手録成編此蓋其藁本也濂之學子同里俞生恂購得之識請其後先生諱夢炎字子暘烏傷人博學工文辭擢宋淳祐十年進士第官至朝散大夫行太常丞兼樞密院編修官兼權左曹郎官以朝請大夫致其事先生能文入仕之詳人類能道之至于志節之卓政事之美則鮮有知之者也先生為人不苟合忠君憂國之竟惓惓不忘故于論對之際數以修君德謹邉事為戒權臣才之欲置諸言路使奉行其風指先生力辭不就此固足以增夫名教之重然其仁民之政尤不可以一二數在淮東制幕建議蠲放屯田租四千七百餘石通判蘇州撙節浮費獲錢十七萬緡以代民租嗚呼先生可謂偉特不群之士矣非公之宏才碩學以繼其後又惡能世濟其美也耶今去公之殁已二十二年公之尚德尊祖之意猶燁然見于觚翰間覽是編者其有不油然而興感者乎非但玩其字畫之妙而已也拾遺六篇公之髙第弟子翰林待制王君禕手抄從公命也恂并裝裭以附其後云鄭氏三子加冠命字祝辭有序浦陽孝義之門曰鄭氏其十世之長仲德甫筮得柔日宿余為賔將冠其從子木杲果余親與之周旋降升以成三加之禮于是稽名定義製字命之夫平土有叢為林因字木曰叔林日在木上為杲因字杲曰叔升丈夫致果為毅因字果曰叔毅命已遂通祝之以辭辭曰三加三醮既備禮儀昭告爾字各宜聽之木從地生含和茹滋孤撑非貴叢生乃竒蔚若鄧林隂陽蔽虧欲搆清廟掄材實宜母學樗櫟擁腫離疏為世鄙賤工師莫窺木其勗哉夙夜克治杲杲出日新陽則微及升扶桑其光陸離嫓諸靈扃皎然弗緇群昏既斂洞察毫絲毋若小夫中霄而趨擲埴索塗陷于汙庳杲尚勗哉賢哲自期人之立志樹德為基唯果而毅篤行不疑譬之大將建以鼓旗奮矛爭先矯亢欲飛毋習巽懦如脂如韋聞過罔悛媕婀委他果尚勗哉振厲有為爾三子者昧昧以思彼蒼者天體物無遺或出或入靡不爾隨尚滌爾心一髮勿私履善蹈道君子之歸苟務口耳言從行違奚翅犢禽安于鬚眉丗之恆流父子異炊脫有不善衆方見嗤兄爾旌門十葉聚居名播寰宇彤筆所書尤當戰惕若臨險戲遵厥祖武全其秉􅉓群翔于堂東塤西箎獨行于庭左矩右規庶幾無愧七尺之軀豫年耄矣百艱備罹涉事既廣理能真知諄諄爾誨辭肯貢諛請書座右視如嚴師
