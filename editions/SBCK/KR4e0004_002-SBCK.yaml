body:
  text: 大明􅃙賜銀青榮禄大夫上柱國中書平章軍國重事兼太子少保鄂國常公贈翊運推誠宣德靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王謚忠武神道碑銘有序洪武二年巳酉秋七月七日銀青榮禄大夫上柱國中書平章軍國重事兼太子少保鄂國常公薨扵軍中二十三日訃聞皇帝爲之震悼罷朝在廷之臣莫不洒泣越明日詔中書㝎議贈翊運推誠宣徳靖逺功臣開府儀同三司上柱國太保中書右丞相追封開平王謚曰忠武八月朔日柩車至龍江上徃臨奠慟􅂘而還親爲擇地扵鍾山草堂之原營見宅兆及棲靈之祠凡百須之具一給扵官不以煩其家至冬十月九日始塟復推恩及其三代皆爲王爵生榮死哀可謂至矣上猶念其功不置召臣濂于庭而謂之曰朕東撫髙麗西抵土蕃北際沙漠􅀯来交趾占城莫不稽首奉命計其開拓之功以十分而言王蓋居其七八朕今手録戰伐次苐以授爾尚爲文勒諸豐碑以著王之功扵無窮馬臣濂受詔而退謹再拜序而銘諸幽王䛭遇春姓常氏濠州懐逺人世爲農家賦性剛毅膂力絶人􅀊壬辰羣雄並起江淮爲之鼎沸時王年二十有三爲羣盗劉聚􅀁得聚覩王狀貌竒偉㧞扵行伍而信任之王每出戰必鼓勇争先聚深喜之王察聚所爲終不􅀎有成欲擇􅀁依乙未聞上駐兵和州領衆數十人棄聚来歸居兩月餘請爲前部先鋒上曰爾之来者爲士卒糧絶故就食耳爾自有主我安得而㽞之王請之再三至扵涕泣上曰尓姑􅀙吾渡江俟克太平委身事吾未晚也夏六月上先抵采石磯元兵陣扵磯上而磯下巨舟如織相距僅三丈餘猝難登岸王乗快舸相􅁇而至上麾之使前王卽捨舟挺戈先登衆皆披靡遂拔采石乗勝取太平􅀙上守禦乃始授總管府先解冬十月陞管軍總管丙申春二月元中丞蠻子海牙復以兵屯采石南北不通上慮將士雖渡江而其父母妻孥尚㽞淮西􅀔莫可致命王統兵攻之王至設疑兵以分其􅀔而以正兵與之合及戰別出竒兵擣敗之悉俘其精銳自是元兵扼江之􅀔衰矣尋守溧陽攻建康功爲諸將先三月􅀙今大將軍右丞相徐公達克鎮江夏四月授承信校尉領軍先鋒秋九月再攻常州會青軍叛去與僞吴張士誠合徐公被圍扵牛塘王與諸將力戰大敗其衆擒士誠梟將張將軍冬十有一月除統軍大元帥丁酉春三月遂克常州遷中翼大元帥夏四月􅀙徐公下寜國秋八月克馬䭾沙冬十月取池州戊戌春擢江南行中書省都督馬歩水軍大元帥冬十有二月上親取婺州巳亥夏四月轉鎮國上將軍同僉書江南等處行摳宻院事守婺城尋命攻衢州降之冬十月陞僉院十有二月攻杭州庚子夏五月召還京師􅀙徐公抜安慶趙普勝之水寨時僞漢陳友諒􅀭言援安慶王䇿其必攻池州以羸弱守城伏銳士扵九華山明日友諒兵果来攻城伏兵四合俘殺萬餘人六月友諒入太平犯龍灣王共謀撃敗之巳而上整舟師襲友諒㽞王守京師軍民無敢譁辛丑春三月拜江南行中書省參知政事秋七月􅀙上取安慶破江州回守龍灣冬十有一月張士誠出兵寇長興上時駐九江聞報還京師命王徃援士誠兵敗俘殺五千餘人壬寅春􅁱安慶城羅友賢搆亂據池州神山寨將與士誠通杭歙震動冬王徃攻之癸卯春正月擒斬羅友賢餘黨悉平三月張士誠遣兵圍劉福通扵安豐王􅀙上擊之將戰王突入其陣三戰三勝敵兵大敗而去俘􅀗士馬無筭遂同徐公圍廬州凡三月城將下適陳友諒攻南昌王解圍而還秋七月􅀙上率諸將往援八月遇友諒扵彭蠡湖之康郞山王與之聮舟大戰呼聲動天地無不一當百縦火焚僞平章舟風急火熾十里之間湖水盡赤敵將張㝎􅁁素􅃅梟猛􅁬前迎戰王射之㝎邉中矢赱友諒乃退保鞋山諸將以友諒兵尚強請縦其去王獨不言及我師出湖口皆言江流湍急􅁒放舟而下上知其情命以舟扼上流王應之諸將乃遡流而上舟蔽江面控湖口者旬有五日友諒軍食乏出江求戰王遣火舟火筏禦之敵兵奔潰追北數十里與之酣戰自辰至未不觧上􅀁乗舟及王舟皆膠扵沙王旣脫御舟而巳舟被圍復力􅀾而脫扵是友諒中流矢死士卒十萬皆降未㡬其臣立友諒之子理扵武昌冬十月王帥師討之四面合圍甲辰春二月理銜璧出降荆湖之地望風皆附陛中書平章政事秋七月􅀙徐公取廬州八月遂自將兵平臨江之沙坑麻嶺十洞牛陂諸寨進取贛州乙巳春正月克之悉㝎南安南雄韶州夏五月還兵取安襄陽冬十月従徐公克泰州丙午春三月復􅀙克髙郵夏四月淮安濠泗徐宿安豐皆下秋八月諸將攻浙西師次太湖僞萬户尹義等逆􅀾王擒之直趍湖州之毘山與敵兵水陸鏖戰敵兵大潰遂抵城下塞其四門晝夜環攻之僞丞相張士信悉發境中兵爲援屯扵舊舘出我師之背王統竒兵由大全港入結營東阡復出敵背且填壅溝港絶其歸路士誠知事急出親兵拒闘王一鼓勝之士誠復遣其􅀅徐義統赤龍船親軍来援王復撃敗扵烏鎮冬十月舊舘降得兵六萬十有一月湖州亦下遂進圍平江丁未圍之益急士誠收合餘燼猶背城百戰降其將士且盡秋九月始克之􅅞士誠来獻籍其兵二十有五萬乃加授中書平章軍國重事䟽封鄂國進爵上公冬十月復授征虜副將軍同徐公奉命北伐戊申春正月上卽皇帝位國􅃅大明改元洪武王與徐公下山東諸郡遂攻汴梁守臣李景昌遁進攻河南敵兵五萬屯于洛水之北將出迎戰王布陣旣㝎單􅀐執弓矢衝入其隊敵發二十􅀐攅槊刺王王一箭中其前鋒大呼殺入悉獲其衆而河南諸城先後皆平上􅄑汴京謀取燕都秋七月徐公與王渡大河河北諸郡又平八月二日燕都不戰而克元君北奔師次太原其守將擴廓帖木兒帥衆来禦其鋒銳甚王與徐公謀曰我􅀐兵雖集而歩卒未至何以䏻戰莫若遣精􅀐夜劫其營其衆可亂衆亂主將可􅅞也徐公如王言擴廓帖木兒果中傷而遁巳酉春正月進攻大同竹貞棄城赱河東又平遂西入秦張良弼遁李思齊迎降奉元鳳翔鞏昌臨洮又平夏五月元將也速兵侵通州有㫖命王以􅀁部軍東還拒之遂擣永平過惠州􅀗江文清士馬以千計至大寜也速遁破開平元君又北奔追至北河俘其宗王三人及平章鼎住等凡得軍士萬人車萬兩馬三千牛五萬全師還燕次桞河川得疾而薨享年僅四十爾王之爲人守謙而不矜有功而無過運籌决勝之方不學而􅀎其􅀙大將軍東征西伐則􅀎遵守節制及其自將兵則􅀁至無不克捷由其智識明而材力雄故施之各得其宜嗚呼若王者可謂開國之殊勲者矣王之曽大父四三府君累贈銀青榮禄大夫柱國中書平章政事追封開平王謚荘簡妣張氏追封開平王夫人大父重五府君累贈儀同三司上柱國少保中書平章政事追封開平王謚安穆妣陳氏追封開平王夫人父六六府君累贈開府儀同三司上柱國太保中書右丞相追封開平王謚靖懿妣髙氏追封開平王夫人妻㝎逺藍氏封開平王夫人子男三人曰茂曰昇曰森皆上􅀁賜名女三人長許爲皇太子妃餘皆幼臣濂聞之昔日唐太宗起義兵而㝎天下當時有尉遲恭者棄劉武周仗劒来􅀙其後輔成唐業而恭之功爲多扵是生有鄂國之封殁有忠武之謚今王之功非恭􅀁可及上之􅀁以遇王者封謚與之雖同而其王爵之加恩數優渥揆之扵唐誠又過之史臣􅀁謂君臣相遇千載一時者豈不異丗而同符也㢤是宜銘諸貞石傳之千萬世一以昭聖天子垂念功臣如此之至以著王之勲烈扵不朽云爾銘曰聖皇開天豪傑四􅀙龍興而雲虎嘯而風義旗􅀁指山嶽震動飊馳霆舂孰不神竦維忠武王其氣至剛杖劍来􅀙飛渡大江無堅不摧無敵不碎席卷長驅易如拾芥平吴㝎越帖荆撫淮威聲􅀁加小大畢来齊魯旣寜汴洛亦㝎直􅃌幽燕不􅀾而勝元君逺逝六軍倒戈本根旣撥何有條柯乃􅀵晋冀乃清秦隴乃狥遼海人百其勇茫茫朔漠灤河􅀁經誓將剗滌􅁁塵弗驚王之忠精上貫天日燁其有光亘古不殁幅貟之廣漢唐莫過馬蹄􅀁及王功爲多十五年間百􅀾百捷備殫勤勞光輔帝業翊運之勲靖逺之威在古或罕于今見之大功垂成王忽長逝當宁興哀如失一臂爰加恩寵用錫絶計無􅀁出同行者曰我等自分必死聞髑髏山有死馬共烹食之縦死亦得為飽􅀑不識可乎王未及行疲極輒晝睡夢一白衣人来謂王曰汝慎勿食馬肉今夜有舟来共載也王以為偶然未之􅀷信俄又夢如初至夜將半夢中髣髴聞櫓聲有衣􅂵衣者以杖觸王之胯曰舟至矣奈何不起王驚寤身怱在舟中見􅃇􅀁事統領官時統領巳降扵元􅀅元將畏舟壓凡有耒附者擲弃水中統領憐王亟蔵之皇板下日取乾餱􅀙板􅂩投之王掬以食度王之渴乃與王約以足撼板王即張口向􅂩受漿居數日事􅀅􅂥皆彷徨不自安忽􅄓風吹舟盤旋如轉輪久不䏻進元􅀅大􅂲徧求扵禜祈者不可得統領知王䏻巫術遂白而出之王仰天叩齒若指麾􅀑神狀風濤頓息元將喜因飲食之至通州賚王􅁆鉅魚送之登岸王歸維􅀭不樂為軍伍避去旴眙津里鎮擇地而居以巫術行王無子生二女長適季氏次即皇大后晚以季氏長子爲後年九十九嵗而薨遂塟焉今墓是巳臣濂聞之君子之制行􅀎感扵人固難而􅀎通扵神明爲􅀹難今王當患難危急之時神假夢寐挾之以升舟非其精誠上通扵天何以致神人之祐而至扵斯也王之羣行其詳雖若不可知舉此而推之則其積徳之􅀷厚㫁可信矣是宜慶鍾聖女誔育皇上以啓大明億萬年無疆之基扵呼盛㢤昔日史臣賛尭之徳首以親九族爲言其效至扵􅀺民扵變時雍之盛然九族之中母族居其三皇上以念母之故思王不􅀎忘封以王爵享以祠廟今又樹碑墓道以紀其異行是皆以孝治天下也將見四方嚮風咸知以孝自勉皥皥熈熈臻夫隆平之治不難矣臣濂既序其事復再拜稽首而獻銘曰皇帝建國克展孝思䟽封母族自親而推錫爵維􅀭地邇帝畿立廟崇祀玄冕衮衣痛念宅兆卜之何墟閭師来告今在旴眙皇情恱豫繼以涕洟卽詔禮官汝徃葺治毋俾蕘豎跳踉以嬉惟我楊王昔隷戎麾獰風蕩海糧絶阻饑天有顯相夢来紫衣挾以登舟神力􅀁持易死爲生夀躋期頥積累􅀷長未究厥施乃毓聖女茂􅄛皇支蘿圖肇開鴻祚峩巍日照月臨風行霆馳自流徂源功亦有歸無徳弗酬典禮可稽聿昭化原扶植政基以廣孝治以惇民彛津里之鎮王靈􅀁依扵昭萬年視此銘詩大明􅃙賜榮禄大夫同知大都督府事兼太子右率府使贈推忠翊運宣力懐逺功臣光禄大夫湖廣等處行中書省平章政事柱國追封蘄國公謚武義康公神道碑銘有序皇帝卽位之三載混一華夷聲敎􅀁被罔間邇遐梯山航海奉贄獻琛上念熊羆之士不二心之臣東征西伐宣勞有年方將胙土分茅以㝎功賞而都督康公薨扵陜州上聞之嗟悼不巳旣􅃙有司穿土作室以寜體魄復欲昭其功勲扵悠乆詔翰林學士臣宋濓稽諸簡牘􅀁書文扵堅石以垂示扵億萬載臣濂謹按公諱茂才字夀卿康其姓也世爲蘄州人曽祖文廣皇贈中奉大夫中書參知政事護國追封京兆郡公祖徳懋皇贈資善大夫中書右丞上護軍追封京兆郡公父夀皇贈榮禄大夫同知大都督府事柱國追封蘄國公母蕭氏追封蘄國夫人公當元之季四方雲擾未㡬蘄州陷公結義旅以捍蔽爲務受以長官俄遷爲鎮撫同諸將復九江擣蘄水黃連寨􅗗蘄州路同知總管府事屯成和之􅁉溪太平之采石使者考其功狀陞淮西宣慰副使同知元帥府事又陞宣慰使都元帥􅀊乙未六月上帥師渡江將士家属尚留于和州上慮公扼采石之衝弗􅀗渡時出兵挑戰公兵雖寡而以寛弘得士卒心故臨陣人多效死扵是數戰不克後數月常忠武王遇春遣㳺兵虚撓之公連日發軍以􅀿王度其力疲夜設伏兵質明殱其精銳殆盡然由􅀵合潰散堅寨扵天寕洲明年二月上命諸將以襄陽大砲破其寨公奔行䑓便宜陞淮南行省參知政事甫踰月上亦克金􅁜又奔京口舟師追及之公度天命有歸乃率􅀁部餘兵三千解甲来附免冠頓首言前日戰各爲其主今日屡敗天數也事至扵此死生唯命苟得生全尚竭犬馬之力以圖報效上􅀏而釋之仍許統􅀁部兵􅀙征又明年授秦淮翼水軍元帥守禦龍灣取江隂之馬䭾沙八月僞呉張士誠犯我疆境公驅兵逐之􅀗其楼船上賜名馬一疋黄金一錠􅀊戊戍􅀙廖椘公永安攻池州取趙雙刀之樅陽遷都水屯田使兼帳前總制親兵左副指揮使明年八月攻皖城僞將率楼船出戰公復􅀗之又明年六月僞漢陳友諒傾圃入冦攻陷我姑孰殺戮我吏民意將窺我南京上召公謂曰爾不疑我乎公復頓首謝上曰汝旣不相疑宜作書遣使僞降友諒爲內􅀿招之速来仍紿告以虗實使分兵三道以弱其􅀔友諒果如􅀁言暨至諸將同公􅁬撃大破之􅅞其士卒二萬有幣帛白金之賜􅀊辛丑八月上怒友諒来冦率將士親征公領舟師行擊安慶破江州僞都友諒西遁遂下蘄州興國漢陽公沿流而下克黄梅某家寨十一月取江之瑞昌敗友諒八陣指揮友諒之􅀔遂衰遷帳前親兵副都指揮使明年九月復龍興又明年攻左君弼扵廬州四月友諒圍龍興上親徃援公與諸將皆􅀙友諒聞上至亟解圍還七月大戰扵彭蟊湖軍聲嘯呼湖水爲之起立浮屍蠢蠢動至數十里友諒遂至敗亡又有幣帛之賜十月上親征武昌公􅀙之􅀊甲辰二月下之友諒之子理衘璧出降三月進金吾侍衛親軍都護府副都護四月􅀙大􅀅軍徐公達洊攻廬州七月下之八月援安豐継取江􅁜及湖南諸州加賜幣帛明年二月改神武衛指揮使五月進大都督府副使閏十月士誠兵犯江隂京口上帥大軍水陸並進公在行中及至鎮江士誠兵巳遁又明年正月追至巫子門撃敗其衆􅀗士卒三千公功爲尤多四月搗淮安之馬邏港㧞其水寨復􅀗士卒與艨艟無筭淮安平七月遂攻湖州十一月破之進逼姑蘇姑蘇士誠僞都卽遣銳卒来迎闘大戰尹山橋公持㦸督戰益力銳卒盡覆乃進圍齊門刀劍林立飛鳥不敢下大􅀅軍命諸􅀅合攻之吴元年九月姑蘇平公取無錫州十月陞同知大都督府事兼大子右率府使進階榮禄大夫洪武元年上以江南之地既入版圖乃遣大􅀅軍經畧中原公􅀙定齊魯之地復由黃河取汴梁下洛陽駐師陜州䂓運饋餉造浮橋以渡大軍鎮河中善撫綏遺民爲之立石頌徳絳觧二州則公􅀁招徕蔽遮潼關秦人不敢東向二年復􅀙大􅀅軍征漢中奉詔還軍中道因疾而薨實八月之三日也年五十有七上下羣臣議贈公推忠翊運宣力懷逺功臣光禄大夫湖廣等處行中書省平章政事柱國追封蘄國公謚曰武義卜以九月二十一日􅁙扵應天府上元縣鐘山郷之幕府山上親臨奠而百司􅁇之􅀕幄相望聮絡原野時人以爲榮公娶方氏追封蘄國夫人􅁇室田氏封蘄國夫人側室朱氏余氏子男三人鐸田氏出鑑朱氏出鎮余氏出公通經史大義事太夫人以孝聞􅁿財仗義意氣磊落而尤有志扵事功值元祚􅀅終其才弗克盡施然而真主龍飛扵羣雄之中公即䏻識之卷甲韜戈率衆臣附坦然而不惑可謂上知天命下本人心者矣由是昭􅀍寵眷􅀝之以心膂用之爲爪牙十餘年間屡􅀙征討茂績竒勲著稱當世存則安富尊榮加以爵位薨則䟽封賜謚賁及九泉令名垂扵竹帛重禄延扵子孫公其可以不朽矣臣濂謹拜手稽首述辭于碑系之以銘􅀷懼不􅁕以稱上報功之意銘曰扵䓇大明受命于天如日之再照于八埏其一于時康公江險之恃大軍西来視如平地其二巨礮轟雷物莫敢櫻何戰弗潰何守弗傾其三天人攸歸􅀔何敢􅎨知㡬先来率衆内嚮其四皇帝曰嘻有附匪䟽予開誠心遇尔不疑其五爾礪矛鋋爾部士卒助予四征以寕方國其六公拜稽首賜死爲生誓殫報效如無餘齡其七孰爲不庭率師徃討矯如翼如風馳電掃其八東吴西楚蹴陳駕張身經百戰􅇯竪始亡其九大􅀅北伐同取汴洛出鎮于蒲恤其􅀌弱其十蔽遮河潼以銕爲關誰敢操戈睥睨其間其十一玄􅀛􅀒碑以頌遺愛民亦何心恩義斯在其十二􅀙伐漢中迢迢西征有命班師中道而薨其十三帝念􅀅臣血戰之苦􅀅疇其勲錫以茅士其十四孰不壽考以樂承平公胡嬰疾隕魄泉扄其十五帝情憫悼恩命絡繹穿山爲堂畢兹窀穸其十六名垂扵史禄延干家翩然而逝公復何嗟其十七史臣造文大書􅀷刻以昭公勲有永無極其十八大明故資善大夫御史中丞兼太子賛善大夫章公神道碑銘嗚呼是爲吾友龍泉章公之墓􅀄予未識公時輙稔聞其名及公應聘而起同赴于南京同舘于青溪同出入禁署以傋顧問如是者四三年􅀻􅀼以謂生我者父母知我之至者唯公而巳不知公何爲去予而遽死矣乎有善孰予相孰知我瑕疵而攻之乎神道之銘公之子特以爲屬肝膓百裂其何􅀎綴緝言辭乎相知之深者不爲之則鋪張君子之休羙不識當屬之誰乎因􅀵淚而序之曰公諱溢字三溢姓章氏處之龍泉人逺祖有曰巖者仕宋以兵部尚書守泉州始家于南安至唐康州刺史及又自南安遷建之浦城及生福州軍事判官􅁱􅁱生光禄大夫檢校太􅀓西北面行營招討制置等使持節高州諸軍事髙州刺史仔鈞娶練氏生子十五人其苐三子獻誠仕南唐爲銀青光禄大夫檢校司徒献誠生文錫仕宋爲秘書省校書􅀰文錫生都官郞中重又自浦城遷于龍泉子孫遂爲龍泉人重生吉吉生順順生公琛公琛生世安世安生舉舉生宗宗生郷貢進士輔輔生聞義聞義生用之用之生强宗強宗生煥文則公之髙祖也曾祖諱斯立祖諱格父諱遇孫母某氏公之始生其音如鐘父母疑為不祥㡬棄不舉及成童嶷然荘重不習郷井輕儇態諸兄出應科繇頗爲儕􅀋􅀁侵苦公忿曰彼徒謂我弱尓吾不自厲豈爲男子耶乃徃受事縣官即有曲者舉正理直之衆始愧服比弱冠􅀙郷先生王剛叔㳺􅀙事扵正心脩身之學既又聞金華爲文獻之􅀖間出㳺以咨叩其統緒浙東憲使秃堅不花請與語恱之巳而改官陜西要公與俱至虎林心忽驚悸力辤而歸扺家父病巳革越八日而逝人以爲純孝􅀁感至正壬辰蘄黄妖冦自閩犯龍泉公與􅀙子存仁避亂山中而存仁爲冦􅀁執公心計曰吾兄止有一息不可便無後挺身出謂賊曰兒㓜無􅀁用我願代之賊聞公名方出重購以求及得公大喜賊帥􅁒問計公正色拒之曰若等皆有父母妻子顧爲此㓕族事耶賊怒繫之柱以刀磨其脅曰不降者且死公曰貪生惡死固人常情然吾終不爲不義屈賊愈益怒曰汝誠不畏死邪公曰死即死何畏乎賊壮之不敢加害公夜紿守者乗間脫身歸乃集里民爲兵不旬日擊却之䖏州府判官以兵来龍泉欲盡誅平民詿誤者石抹將軍冝孫實總兵政公走麾下􅀃曰􅀅軍知賊之由乎曰不知也公曰貧民迫扵凍餒故相挻而􅀙盗誠得一循吏招輯之民即乎民耳今不出此而肆行剪屠是殆楊湯以止沸也不識可乎石抺􅀅軍曰善微先生言事㡬敗即檄判官毋擅殺石抹將軍服公噐識留幕下與議軍事其平属縣慶元及建寕之浦城松溪羣盗公有力焉上其功江浙行省丞相康里公承制授公􅀅仕郎龍泉縣主簿辤不受海冦起黄岩掠㳂海郡縣行省命石抺将軍守台城台之寜海民亦爲變攻圍台城急石抺将軍飛檄召公爲援公方退居田里得􅀅軍檄卽起曰吾􅀖非石抺􅀅軍人且盡爲枯骨今一旦有急政我報徳之秋也集趫勇少年数百人晝夜行至城下約內外夾擊賊遂潰海冦亦遁去寕海大饑豪民吴甲蔣乙積粟不糶公言扵石抹􅀅軍􅀅軍因属公行縣振之公至縣即抵二豪罪發其粟振餓夫其􅀹困者俾僧作糜食之公還龍泉龍泉亦􅀊儉大家有粟高其直且不發公先以􅀻田易粟貸里人乃行勸分之政民受其惠為多隣邑青田潘惟賢爲盗而龍泉監縣寳忽丁貪虐無状民因導潘攻縣治寳怱丁棄印走公同其帥王剛叔召豪傑與賊戰敗走之縣治遂復行省給銀幣為賞寳忽丁懼棄職􅀗罪而愧公有功乃謀害公公方賛元帥黑的兒間府處城未敢發㑹帥府問寳怱丁罪遂結李溪惡少拒命首害剛叔于家帥府檄兵襲擊之寳怱丁遁去扵是䖏之上縣盗皆蠭起行省移石抺将軍以行樞宻院判官分治䖏州公謂石抺􅀅軍曰松陽小醜不速平将飬成大患邪将軍曰唯君處之公乃遣千戸曹勝安督兵授以方畧一戰盡降之分院上其功行省陞承事郎松陽縣尹又辭不受元帥葉君琛攻鄭㓂扵麗水屢爲􅀁敗分院調公及樞宻院都事胡君􅀷合討之公與胡君統軍至浮雲賊衆来迎戰並山爲長陣兵旣接我軍張左右翼夾攻之賊大敗直搗其巢穴賊望見公来拜巳曰我非為㓂者待我殱此海蠻即降矣海蠻謂葉君所部海軍也公曰吾不知他特捕反者爾賊爲內外二砦公麾兵踰外砦立壁或疑壁扵兩砦間非利公曰非爾軰􅀁知我旣踰外砦則內砦疑其巳降而外砦亦計其疑巳一砦相疑破賊必矣壁未完賊突至相持未有勝􅀒公麾竒兵横擊賊奔北卽移兵圍內砦数重下令急攻遂陷之執鄭寘諸法外砦亦降行省復授福建行省檢校官㝷又改除奉訓大夫䖏州路總管府判官皆不受南行臺治書侍御史銕木烈思分臺于婺長鎗軍叛迫其城治書遣􅀙事楊迪徵師扵公公勒􅀁部軍就道長鎗軍聞公至輙引去省憲交章薦于朝除武徳􅀅軍僉浙東都元帥府事又辭不受或疑爲要名公曰吾􅀁將皆鄉里子弟使其肝腦塗地而吾獨取功名弗􅃘為也青田賊吴英掠婺之金華永康東陽諸縣聚衆猖獗公議討之分院乃調兵屬公及胡君與賊屢戰皆敗之賊􅀔蹙􅅞其黨張貴李興甫等出降遂昌凶右戸閉糴土豪周天覺嘯聚殺之元帥胡君徃討天􅁴􅀒固不服乆之始請降公曰此賊不殄必貽後患胡君不聽受其降巳而天覺果以復叛誅始天覺之未降也執其黨與三百人繋諸獄至是胡君欲盡阮之公執不可得生全者十六七時天下日入扵亂公結廬匡山上自􅃅曰匡山居士屬其子曰兵􅀅至矣汝曹其保障州里乎巳亥冬王師克䖏州公又避地入閩中今上皇帝遣使以束帛召公公乃幡然而起與青田劉君基麗水葉君琛金華宋濂同赴召至建業入見上問勞曰我爲天下屈四先生耳然四海紛紛何時定乎對曰天道無常惟徳是輔惟不嗜殺人者􅀎一之耳上曰卿等其㽞輔予矣亡何擢僉營田司事巡行江東兩淮之境田荒蕪及畊墾者皆分籍之差稅頼之以便公以疾在告者乆上時遣使存問暨疾小愈即入謁上見其来喜曰疾其瘳乎何遽出也一日上怱念公詢于中書左司都事張来碩曰章溢日来康強否来碩對曰温日夜念母不置而以主上遇之厚不敢以言􅉱欝成疾耳上即命公歸省賜以白金文􅄾而㽞其季子存厚干京師淛東始設提刑按察司即擢公僉其司事尋命還䖏州代總制胡君入朝而爲有厚娶胡君女賜賚優渥且俾存厚入侍皇太子以示親信胡君出師温州復召公還守䖏州饋餉供億䂓措無缺而民不知勞及師旋即以總制事付胡君而還其部王師平荆楚設湖廣提刑按察司遷公僉司事公入見上慰勞之曰紀綱之事今属卿矣公旣至覩荆㐮多廢地遂建議分兵屯田且以控制北方計爲便上曰􅀁言甚善苐未暇耳湖廣行省鎮撫囬囬怙勢作威􅁿重人罪以為常公㢘得状坐以法曽未㡬河內道按察使宋思顔以淛東憲史事不白下獄而淛東按察使孔克仁僉事王璹亦以事被逮辭或連公公憂懼不知􅀁為上遣太史令劉君基喻公曰予素知章溢守法令毋疑也旣而胡君以兵入閩䧟沒䖏州之境皆動揺上命陞公淛東按察副使徃鎮之平陽瑞安浦城福寜軍民等事皆隷焉公辤曰臣前任淛東無状同列皆􅀗罪而臣獨蒙寛宥今若加陞擢則益重臣過疆􅂣之事臣身任之萬死且弗避副使之命臣不敢拜上重違其志命仍僉淛東按察司事比至山寨或巳叛公宣布詔旨軍民皆感動乃誅其首叛者餘皆帖帖青田夏清聞胡君敗與福建叅政范昌大合㓂慶元龍泉時官兵盡戍浦城城中僅􅁕自守公召舊部義兵使據要害列木柵為屯勢相聮絡别命元帥祁興季汶卽龍泉縣治亦環植木城賊聞不敢犯公長子存道􅀄以元帥戍浦城及是有旨命存道提兵為㳺擊而公即䖏城坐鎮之公謂父子相統扵律不宜乃上奏請罷存道官不允兵戍浦城者以食不􅁇為病上以属公洎淛東行省右丞李公文忠李公欲運䖏州粮餉之公以為舟車不通而軍中􅀁掠粮甚殷請拘入官而均給之兵食乃􅁕青田稅官金甲􅀤其同僚白乙匿官課乙既誅死而甲恣為姦利公訊之甲善口給辨數不置公曰汝罪伏巳明奈何欲以口舌撓法乎其辭遂屈上知為公􅀁鞫當不􅁈命斬之建寜守􅀅阮徳柔遣使來納欵人咸以為詐公曰陳有㝎據全閩勢必不􅀎容故徳柔為圖自全計非詐也以其事聞詔許徳柔以元官守本郡命比下徳柔果為有㝎􅀁并公因㽞其使厚存䘏之温州茗洋周遂卿恃山險常為冦鄰邑皆患之而郵傅之通平陽瑞安者亦為􅀁要遮公命存道合平瑞總督孫安之兵禽斬遂卿中書命䖏州造海舟若干艘并僉溪船戸為水軍其戸凡一千既有領之者而又隷于軍府役繁而事擾公上奏設水軍千戸􅀁專統之䖏多山而少田軍需恒不􅁕胡君為奏免唯輸硫黃白藤于朝而行省復有􅀁科公屡以為言罷之水軍千戸任惟淵朱仲欽共戍青田會冦至仲欽逆􅀾而惟淵赱還仲欽以無援故敗公斬惟淵以徇遣指揮何世明擊冦赱之惟淵乃胡君􅀁任信者既伏誅部曲莫不股栗浙江行省叅政朱亮祖總兵取温州公調何世明以軍􅀙温州平公聞其掠人子女命鎮撫林理徴之各部送還其家海隅既寜公請朝京師上報曰吾知卿在􅁁良苦俟平吳當即召卿尓及浙西諸郡皆平上遣使召公且命分兵征八閩而存道守䖏州公既入見上嘉奨甚至且諭羣臣曰章溢雖儒臣父子宣力一方㓂盗盡平其功誠不在諸將後公再拜謝不敢當明日上召問征閩諸􅀅何如公對曰御史大夫湯和由海道進平章政事胡廷瑞自江西入此固必勝然閩中􅀹服浙江平章李文忠之威信若令文忠帥師􅀙浦城取建寜此萬全計也即日詔文忠出師如公䇿䖏州之粮其舊額一萬三千石有畸後以軍興加徵至十倍民不堪命公言之丞相丞相入奏上曰吾勞䖏民乆矣詔􅀙其舊温州黄宗雲朱君達来附各授以元帥之職還守其土及我師征温失利輒叛去温既平君達又請降公曰何物小醜叛而復降苟納之是無法矣奏􅓍之浙江行省丞詔作大舟入海徴輸鉅材檄䖏州與諸府同公曰䖏婺之交限以峻險縦有水道何􅀙出且凋攰之民􅂚以勝此公力言扵省臣止之洪武元年正月上即皇帝位有事扵太廟公與執事畢越翌日召公及劉君基入見上御奉天殿羣臣咸在上歷陳其功並拜御史中丞公辭不允尋兼太子賛善大夫公務存大體不屑屑扵細故或以為言公曰憲臺百司之儀表居其職者當先飬人以廉耻使人避而不犯豈直待􅅮擊為䏻㢤上親祀社稷會大風雨還坐外朝怒儀曹議禮不合以致天變􅀅殺之公奏曰風雨巳連朝無􅁕恠者縦禮官議有未盡陛下一誠自􅁕以格神明􅂅寛雷霆之怒上為之霽威上􅋢公甚甞與公及劉君曰二先生年向耄􅂲感霜露致疾善自衛攝不宜早趍朝也存道部鄕兵萬五千􅀙李公入閩閩平詔存道以兵􅀙海道北征公持不可曰郷兵農人耳始令征閩許以事平歸農今復調之是爽信也上不懌而罷公􅁇論奏曰兵巳入閩者俾還州里昔甞叛􅊇之民冝籍為軍使北征一舉而恩威著矣上喜曰孰謂儒者果迂闊㢤非先生為朕一行無􅀎成兹事者公受詔遂行比至䖏州母夫人巳殁公馳還舎援例乞丁憂詔不允丞相李韓公復貽書道上眷􅀝之意而遣存厚還其家公灑泣而出日治戎事惟謹郷兵既集命存道部領由永嘉浮海北行上章乞如律守制詔仍不􅁢巳而章再上上覧之為惻然曰吾固知其情不可奪矣但朕憲臺缺人耳遂可其奏存道至崑山走京師聽進止上諭之曰汝父事朕宣勞為多今汝又帥師北上尚勉立事功以無忝爾父則予汝嘉因授以䖏州衛指揮副使戍于上黨尋移平陽公自䘮母夫人悲戚過度居常忽忽若無以自存者及營宅兆親負土石而感疾益􅀷子女見之皆相顧悽愴公曰勿憂也吾父母􅄑以安厝祖宗丘墓􅄑粗整􅅚􅀊時薦饗􅄑有條序吾庶㡬無憾苐荷國厚恩未䏻報効此為慊耳臨終親友何濬来􅀱曰當􅀵歛此心毋有􅀁執滯公曰吾乆巳知之遂薨扵龍淵之􅀻苐實洪武二年夏某月某日也享年五十又六訃聞上甚憫悼乃親撰文遣官即其家􅀕之以其年某月日塟扵某山之原公娶陳氏勤儉恭淑克盡內助子男三人長即存道明威􅀅軍䖏州衛指揮副使次存誠次存厚女二人長適陳某次在室孫男四人集慶集恭集善集正女二人公性䔍扵孝友父䘮未塟而盗發里閈室廬􅀍焚公稽䫙􅈼天火至柩􅀁而㓕事母夫人備極孝飬每事必得其驩心與二兄别居巳乆既創苐龍淵請二兄同居以奉母怡怡之情藹如也先世有墓祠曰標慶菴公起其廢一新之且益田以供祀事而定􅀕享之禮命孫子世守之其扵宗族里黨患其子弟無􅀁扵學則創龍淵義塾延碩師以教之患其死者無􅀁扵塟則以玉峯西崗為義阡聽其薶􅙁焉又以王剛叔實鄉郡之賢者而石抹將軍􅀎忠扵􅀁事即龍泉劍水之陽作祠宇祀之曰忠賢祠盖凡可以􅋍善扶義者無不為也公状貌宏偉噐局夷曠而撫世酬物一本扵誠一循平禮義外若和緩而其臨大事則論議諍辨不避權勢必折􅂨扵理而後巳其與學士大夫談聖之道如味飴􅁡尤篤尚伊洛之學甞曰古人為學皆躬行實踐人倫日用之間無非學也今人以記誦詞章為務特學之末事耳故公扵章句之習皆不以屑意而扵綱常之大端有關扵世教者恒切切為人言之生平務在濟人利物嘉言善行人皆􅀎道之不可勝紀也余􅀼聞之章為東南著姓自五季以迄于宋代多顯者內則兩制八座外則州牧邑宰皆未甞無其人親提師旅捍衛鄊州䏻成其勲名唯太􅀓公為尤盛閩人至今道之公當元季紛擾羣盗四起磨牙吮血而桒梓為􅇕公談􅀏而起皆劓殄之無遺育䖏之民至今思之扵是聲光流顯上致萬乗之知持節諸部執法中臺其功業視太􅀓公疑若過之此無他太􅀓公之􅀁遭者衰世公之􅀁際遇者有道維新之朝也古人􅀁謂􅀎光扵前人者公其有焉予敢評隲公行勒諸堅珉以垂示永乆扵戯金或可銷也石或可泐也公之功不可忘也銘曰五季之亂殺氣昏大􅀓隻手障南閩西巖結壘兵雲屯狗䑕偷􅀼方􅌭紛怒来欲以一氣吞隂功上聞帝為欣􅃙生蟄蟄千子孫白笏堆床如爛銀匡山􅁇之譽益振方頥踈髯目電焞音吐鴻鬯鐘在軒􅃖􅃖赤子扇妖氛額抹絳帕手握􅚙嘯呼不異􅀑鬽羣公起長驅汗且奔一障仡立無􅁁塵較之太傅功或殷重徽疊照絶等倫大明天子御紫宸濟濟萬國咸来賔束帛往聘東海濵加以禄爵恩寵新庸田使者勞徕勤繡衣行部照清春貪夫宵遁不待晨一朝南徼将星湮括山恍㧾失嶙峋狐狸跳舞騁妖神帝曰汝溢汝老臣整汝戎斾旋汝轅公車戾止集吏民導宣威徳語􅃨諄有叛命者䤋以徇叶坐鎮鄊城如虎蹲大兒㳺擊左右廵四郊帖帖多柔馴召還執法居諌垣長跪敷奏嬰􅊇鱗萱堂風􅃤逝驚魂上表陳情達帝閽哀號負土自築墳因劬致疢亟返真聞之孰不淚霑巾公知學術歸一原時􅆽濂洛漑本根􅀁以不坐枝葉繁文事武備道乃存黄膓題湊蔵山樊大書遺行勒堅珉傳千百載欺無諼宋學士文集卷第二鑾坡集卷第二
