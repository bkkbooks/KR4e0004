body:
  text: 送戴原禮還浦陽序醫之爲道至矣故周官有疾醫視萬民四時之病春之痟首夏之痒疥秋之􅒻寒冬之􅎳欬上氣皆分而治之驗其状而制其禄甚爲不䡖也後世官寖失職故扵其術毎擇之不精有人扵此能合扵古者之道豈不猶空谷足音之可喜者乎如吾同縣戴原禮氏是巳原禮生儒家習聞詩禮之訓惓惓有志扵澤物乃徒歩至烏傷􅀙朱先生彦脩學先生見其穎悟倍常傾心授之原禮自是識日廣學日篤出而治疾徃徃多竒驗予請得而詳道之原禮從叔仲章六月患大􅀬靣赤口譫語身發紅斑他醫投以大承氣湯而􅀬愈極原禮脉之曰左右手皆浮虚無力非真􅀬也張子和云當觧表而勿攻裏此證似之法當汗遂用附子乾薑人參白术爲劑烹液冷飲之大汗而愈櫧槩方氏子婦瘧後多汗呼媵人易衣不至怒形于色遂昏厥若死状灌以蘇合香圓而蘇自後聞人歩之重鷄犬之聲輒厥􅊇如􅀄原禮曰脉虚甚重取則散是謂汗多亡陽正合經意以黄茋人參日􅀘之其驚漸减至浹旬而安松江諸仲文長夏畏寒身常挾重纊食飲必􅀬加火方下咽㣲温則嘔他醫授以胡椒煮伏雌之法日啖雞者三病逾亟原禮曰脉數而大且不弱劉守真云火極似水此之謂矣椒􅀤隂經之火雞能助痰祗以益其病爾以大承氣湯下之晝夜行二十餘頓减纊之半復以黄連導痰湯益竹􅄋飲之竟瘳姑􅂫朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療原禮曰此鬰病也痰閉扵上火欝扵下故長號則氣少舒經云火欝則發之是已遂用重劑涌之􅄍痰如膠者無筭乃復􅀄樂原忠妻亦􅂫人因免乳後病驚身翩翩然如升浮雲之上舉目則室廬旋運持身弗定他醫飲以􅀘虚治驚皆不驗原禮曰左脉雖芤且澁神色不動是因驚致心包絡積汚血尔法宜下之下積血如漆者一十即愈㽞守衞吏陸仲容之内子病􅀬妄見神􅄦手足􅽋動他醫用黄連清心湯不中原禮視之曰形瘦而色不澤乃虚􅀬耳法當以李杲甘温除大􅀬之法為治即經所謂損者温之者也服人參黄茋而安他若此者甚衆予備聞賢士大夫恒言之今不能悉數也嗚呼有人如此可不謂之合扵古道者乎夫醫之為道本扵素問内􅀴其學一壊扵􅄏元􅄪壊扵大􅀚習俗相仍絶不知䆒其㣲指唯執一定之方􅁼刻舟而求劒者人訾之則曰我之用此不翅足矣又惡事内經為宋之錢仲陽獨得其秘扵遺經而擴充之金之張劉李諸家又􅀙而􅄛繹之扵是内經之學大明劉之學朱先生得之最深大江以南醫之道本扵内經實自先生發之原禮乃其髙弟弟子其用心也篤故造理為特精其傳授有要故察證無不中亦可謂賢也巳矣近来京師薦紳之家無不敬愛之服其劑者沉痾豁然如洗或欲薦為醫官辭不就遂賦詩以餞其東還且請予為序昔者司馬遷作倉公傳載其􅀿詔所對自齊御史成至公乗項䖏凡二十有三書治病之状甚具予倣此義稍陳原禮療疾竒中者繫之首簡并告周官疾醫四時治證之㮣世之知言君子必有所擇焉原禮之􅀙父能軒翁予之同志友也幸以予言質之送甘肅衞經歴張敏行之官序長安張敏行至正癸􅆗進士也入國朝以来部使者薦起之擢為翰林典籍時四庫之書多蔵文華堂堂在禁中舊為諸俊秀肄業之所抵奉天門不百武事駕甞幸臨之敏行蚤趨朝已即危坐堂中中使或傳宣索書即啓鑰以上如是者二年雖得時近日月之光然未暇謁其氏名一旦上御東房遥見敏行委蛇入堂召而前問勞備至且曰爾能詩乎對曰臣雖不能􅂅學焉乃命之題敏行研墨濡毫跪冩以進上覧畢悅曰詩甚佳北産如爾者誠鐡中之錚錚也由是日承顧問見其性秉忠慤可任以事特命為甘肅衞經歴賜内府白金五十两錢一萬二千文以寵其行凡所與㳺皆為賦詩予時侍講禁林送至都門外執爵立而言曰甘肅在漢為酒泉為張掖等郡􅀄因張騫言建置城府稍彂徙民􅂶實之隔絶西域而㫁匈奴右臂當時匈奴悍彊西域未盡服故其䇿不得不爾也今皇明在御天威所至如雷如霆西域諸戎稽首􅁛臣者接踵道路而元君遺㣧奔􅇡沙漠粗存喘息惴惴自保孰敢持一矢東向非漢時比也聖天子特念生靈乆罹兵燹不得以自寧設衞寘屯一以備不虞一以招懷創殘之民其責亦甚重也敏行亦知其所以重乎扵斯行也當導宣上徳曰吾皇一視同仁罔間南朔夙夜唯爾民之憂恐爾寒也使来授爾裘慮爾餒也俾来給爾食或無以耕予爾牛或無以獵賚爾馬若弓爾其寧㢤氓縦曰愚離水火而升袵席云胡不樂􅀅見荷旃􅀍毳者于于而至矣經歴幕府之長無所不當問敏行宜以此報上毋若翰林時危坐咏詩而自逸也他日賛畫成功乗赭白馬周流吊古曰此霍去病擊匈奴䖏也此公孫賀敗虜兵遺迹也挏馬湩滿壺白眼望天而飲醉後耳􅀬彂為聲詩以􅂥生平磊磈之氣斯亦竒男子之事敏行以為如何敏行喜曰先生之言至矣是為序題朱彦􅁱遺墨後右丹溪先生書五􅁓與門人戴仲積及其子原禮者也夫醫之為道本扵内經其失傳盖已乆矣金之諸儒劉守真軰獨能逺紹絶學至先生始三傳則授受之正不言可知矣先生之弟子雖衆得其真切者唯仲積父子為優仲積不幸蚤世原禮以其學行扵浙河之西􅀙之者日益多由是先生之道沽􅀍滋廣而三尺之童亦知先生之賢此非原禮之所致邪韓子有云莫為之後雖盛而不傳其此之謂歟原禮􅀹拳拳不忘而以遺墨求題謂見手澤有如見先生焉予甞􅀙先生㳺而交原禮諸父間甚乆故不辭為之而書嗚呼師道立而善人多今於原禮見之西天僧撒哈咱失理授善世禪師誥大雄氏之道以慈悲願力導人為善所以其敎肇興于西方東流扵震旦歴代以来上自王公下逮士庻無不歸依而信禮之其来非一日矣欲使其闡􅀭正法隂翊王綱非擇其人􅂚􅁛兹任爾撒哈咱失理生扵西域樂􅄝佛乗纒結頓空􅄀心契道迩者不憚山川險阻直抵中華衝大磧之埃氛度流沙之莽蒼其志可謂堅且確矣朕嘉其逺誠特加以善世禪師之號爾尚靈承佛􅃙救濟群生􅁳頑而怙惡者爾推報應之􅀃以導之貪嗔而敗事者爾舉恬寂之行以啓之庶㡬符能仁之本願恊大道之至中則予一人爾嘉爾其懋㢤和林國師孕兒只怯列失思巴蔵卜授都綱禪師誥浮圖之教入中國者千三百年其徒衆之繁刹寺之廣不設長以統制之則其道不肅其法不嚴非所以示尊崇之意爰選良材用符善道爾孕兒只怯列失思巴蔵卜生隣佛􅁟尊禮碩師其扵三乗教法想已聞之熟矣以西􅁟之人長西方之教孰謂非宜今特命爾為都綱副禪師統制天下諸山爾尚精勤弗怠蚤夜孜孜體如来之願力化導有情頑者繩之為良惡者禦之為善其與俱生吉祥相為表裏共闡正宗庻㡬隂翊王度之功扵是乎在爾其懋㢤䟦新刻圓覺多羅了義經後大界禪林有比丘曰惟肇具精進力樂善弗倦普願一切有情共升清净毗盧覺地扵是募刋圓覺大經以廣流布且是經者唐長夀二年天竺僧覺救所譯盖大雄氏為十二大士説本起因地䆒其所􅁱不越扵三觀之義此所謂自誠而明去惑離愛其故為最盛宜乎比丘拳拳樂此而不忘也金華宋濂互跪合掌為之􅐌曰如如圓覺心凡聖本同具何䖏有善提更無煩惱者真體遍太虗太虗本無相苟一執着間清净即􅁾濁雖不容纎塵未嘗離去之有如水中影影像本現前眼耳與鼻口無一不具足若使善泅者捕影扵水中汪洋茫渺間見水不見影我身元是佛不待登圓覺茍欲求證時即無能證者此為上根人談此無礙法肇師大方便勸人真正􅁱􅁱之果何為孜孜在三觀庻得祛愛縳超出生死海前言本非實只此可依㩀竟登湼槃門非真亦非妄此以何因縁萬法本空故贈何生本道省親還鄊序世有恒言閥閱之家能守其田賦為難曰非難也一愿欵之人足以易之矣又以能保其闔廬不失先人遺澤為難曰非難也稍知承家之義亦不致扵覆墜矣又以能傳􅀛襲紫為難曰非難也爵禄之来雖曰有命或可以倖致􅀄不可以㝎論也然則孰為難其在紹書詩之業而有光前人乎前人之擩嚌道真吾則兀然如嚼蠟丸前人之立言契道吾則瞠然如立􅁟偶縦使入有田廬出膺膴仕惡在其為賢子孫也㢤吾扵何生之事不能無感焉生字本道北山先生文㝎公諸孫也先生當宋之季侍宦臨川􅀗􅀙考亭髙第弟子黄文肅公傳伊洛正宗之學首喻真實刻苦之訓􅁇聞浹洽四書之㫖積力旣乆道凝徳立威嚴莫犯有如泰山之干霄和氣􅂶牣儼若陽春之煦物故其學一傳為王文憲公􅂯傳為金文安公三傳為許文懿公聮蟬散彩焜燿後先使吾婺為鄒魯之俗五尺之童皆知講明道徳性命之學者先生之功也在他人夙夜孜孜欲儀形其萬一况其子若孫者乎生甞􅀙事科舉之業受鄊薦矣㑹年始踰冠上命肄業成均此天之玉汝于成也向使合試南宮幸擢一苐即随牒浮沉州縣間而學不暇講矣學未成而仕寧不犯古之明戒㢤生今幡然改轍唯乃祖之學是􅁇斯善矣􅁇之之道云何心欲其大也萬􅁚無不􅆂也理欲其精也無一髪之不窮也氣欲其平也勿使粗􅁀之干也形欲其踐也毋徒為空言以􅎩世也文辭足以溺志也非關名教絶之而勿為也異端小道或可觀也屏之斥之唯恐蹈之也如此則庻㡬乎近道矣生其朂之㢤生在成均援舊比歸省二親前御史中丞誠意伯劉公參知政事陶公嘉生有學而有文首為詩以華其行而詞林胄監之英記注給事之臣郎官藩僚之賢方外名徳之士又各分題聮什而請予為之序嗚呼閥閱之家賢子孫能紹書詩之業者予不扵生望之而孰望之㢤生執經􅀙予學者頗乆予故肆口極言之若夫予告省親考子常事爾兹可畧云朱恱道文槀後題右烏傷宋君悅道所為文一卷予讀已愛其理明文順顧謂二三子曰辭章之弊乆矣梔蠟為葩以逞妖􅃩非不眩人目睛比之元氣流行千紅萬紫徧彂洛陽名園固自弗佯何也生意之動盪與死色之不澤者其可以亚論也㢤盖古人之扵文以躬行心得者著為言言有醇疪但繫乎學之淺深爾後世則不然以文學文皆億度想像而為之知道君子未甞不一􅀏擲之也今悅道之文論議必本諸經而翼以濂洛關閩之說既履康衢矣長安雖逺惡有不至者㢤其視顛連榛莽之蹊而虎豹蛇虺縱横交扵前者奚翅萬萬恱道非惟見諸空言又思踐履以驗之此􅀹度越扵人人予雖留意扵文造道不深而出言多疵深有媿扵恱道雖欲痛自懲刷而秋髪􅌭紒􅀍肩矣惜㢤予期恱道甚逺恱道噐宇清粹誠足以副予所期他日道明徳立而文益昌予當在知言之列無疑故録與二三子言者題其卷後云送鄧貫道還雲陽序周官之制以鄊三物教萬民而賔興之所謂三物若六徳六行六藝是也六行之中而婣居其一焉釋者曰婣者親扵外親也夫人之生也内則諸族外則諸親驩然有恩以相愛粲然有文以相接盖一山乎􅃔倫之正故賔興之際特扵此察其行焉嗟夫世逺俗紛古之道不明乆矣今扵雲陽鄧貫道氏見之貫道本儒家富而好禮御史大夫陳公之女兄實歸焉當家居時公與貫道無日不相親或講論道徳性命之奥或品量古今人物之盛以至雲亭月榭酣觴賦詩以冩冲和之情其樂殆驩如也及元季兵興所在皆繹騷貫道避地巖谷間深蟄而不岀公間關走江表擇真主以為依歸自赴扵風雲之㑹名譽日起而勛業日盛貫道之與公不相見者二十有二年矣洪武七年冬貫道思公之切歴湖湘泛大江直抵南京欲與公胥㑹公聞貫道之至亦喜不自勝出迎扵龍江關相與序兵火離合問故舊存殁悲喜交集舉酒酹地各􅀻相欣慶自是共周旋者且一月貫道以離家之乆翩然動歸興有不可遏者予因謂之曰夫自辛􅆗以来龍虎雄争塵霾翳昏父子乎西東戚姻乎北南其别離之思盖有不􅃘言者今也六合清明車同􅁤而書同文水陸數萬里山行水宿無一髪􅉕蠆之虞有親婣在遐方者不行則已行則刻日可至貫道亦知所以然之故乎誠由帝徳廣􅀍如天之覆如地之載蕩蕩乎難名乃克致有是也頗聞貫道富問學能辭章何以不稍攄所藴以禆治化乎貫道則曰吾老矣不能用也雖然雲陽有紫㣲山七十一峰森列如畫秀氣甚磅礴也自漢以来為侯封之􅀖唐雖有肥遯之士而無大􅂋融者至陳公始以正大廉平之學出佐明時而足以當山川之勝貫道之歸也冝以公之事歴言扵嵓穴抱道之士且告之曰聖天子在上可以出而仕矣予敬愛貫道篤親婣之義故舉周官六行之一序以贈之詩自侍講學士樂公而下凡十八人分題為九詠古今詩各賦其一云洪武正韻序人之生也則有聲聲岀而七音具焉所謂七音者牙舌唇齒喉及舌齒各半是也智者察知之分其清濁之倫定為角徴宮商羽以至扵半商半徵而天下之音盡在是矣然則音者其韻書之權輿乎夫單出為聲成文為音音則自然恊和不假勉彊而後成虞􅋝之賡􅁔康衢之民謡姑未暇論至如國風雅頌四詩以位言之則上自王公下逮小夫賤􅀠莫不有作以人言之其所居有南北東西之殊故所􅀤有剽疾重遅之異四方之音萬有不同孔子刪詩皆堪􅀍之絃􅁔者取其音之恊也音之恊其自然之謂乎不特此也楚漢以来離騷之辭郊祀安世之􅁔以及扵魏􅀳諸作曷甞拘扵一律亦不過恊比其音而巳自梁之沈約拘以四聲八病始分為平上去入號曰􅁼譜大抵多吴音也及唐以詩賦設科益嚴聲律之禁因禮部之所掌貢舉易名曰禮部韻畧遂至毫髪弗敢違背雖中經二三大儒且謂承襲之乆不欲變更縦有患其不通者以不出扵朝􅋝學者亦未能盡信唯武夷吴棫患之􅀹深乃稽易詩書而下逮于近世凡五十家以為􅀘韻新安朱熹㩀其說以恊三百篇之音識者雖或信之而韻之行世者猶自若也嗚呼音韻之俻莫踰扵四詩詩乃孔子所刪舎孔子而弗之􅀙而唯區區沈約之是信不㡬扵大惑歟恭惟皇上稽古右文萬㡬之暇親閲韻書見其比􅁼失倫聲音􅆾舛召詞臣諭之曰韻學起扵江左殊失正音有獨用當併為通用者如東冬清青之􅁼亦有一韻當析為二韻如虞模麻􅃒之属如斯之􅁼不可枚舉卿等當廣詢通音韻者重刋㝎之扵是翰林侍講學士臣樂韶鳯臣宋濂待制臣王僎􅁱譔臣李叔允編􅁱臣朱右臣趙壎臣宋㢘典簿臣瞿荘臣鄒孟逹典籍臣荅禄與權臣孫蕡欽遵明詔研精覃思壹以中原雅音為㝎復恐拘扵方言無以逹扵上下質正扵左御史大夫臣汪廣洋右御史大夫臣陳寧御史中丞臣劉基湖廣行省參知政事臣陶凱凡六謄槀始克成編其音諧韻恊者併入之否則析之義同字同而兩見者合之舊避宋諱不􅀵者􅀘之註釋則一依毛晃父子之舊勒成一十六卷計七十六韻共七十萬言書奏賜名曰洪武正韻􅃙臣為之序臣濂竊惟司馬光有云俻萬物之體用者莫過扵字包衆字之形聲者莫過扵韻所謂三才之道性命道徳之奥禮樂刑政之原皆有繫扵此誠不可不慎也古者之音唯取諧恊故無不相通江左制韻之􅀄但知縦有四聲而不知衡有七音故經緯不交而失立韻之原徃徃拘礙不相為用宋之有司雖甞通併僅稍異扵􅁼譜君子患之當今聖人在上車同􅁤而書同文凡禮樂文物咸遵徃聖赫然上􅁇唐虞之治至扵韻書亦入宸慮下詔詞臣随音刋正以洗千古之陋習猗歟盛㢤雖然旋宫以七音為均均言韻也有能推十二律以合八十四調旋轉相交而大樂之和亦在是矣所可愧者臣濂等才識闇劣無以上承徳意受命震惕罔知攸措謹拜手稽首序于篇端于以見聖朝文治大興而音韻之學悉復扵古云洪武八年三月十八日翰林侍講學士中順大夫知制誥同􅁱國史兼太子􅐌善大夫臣宋濂謹序鄭氏聮璧集序磨勘司令鄭君思先間謁濂禁林􅀙容言曰伯父杲齋先生天分絶人甞矻矻窮經􅂯踐場屋不合主司程度遂棄去遊淛河之左右大肆其力扵古文辭乆之思如泉源衮衮出不休日試萬言􅀝馬可待大司徒楚國歐陽文公竒其材欲薦之㑹疾作而卒先子曲全先生㓜䘮二親而賦性狷介州里不能容伯父時客授崑山乃走就之求四庫書疾讀雖暑鑠金寒折膠不越戸限未㡬下筆為文皆循矩度而不輕扵毁譽然剛毅忤物人有不善必折之雖其靣頸􅀤赤弗少貸晚寓􅂫之海虞竟以坎􅇄終惟二父􅀒不世出之才文名相埓遭元季兵亂不沾一命竟捐舘舎而其遺文将遂零落不傳此思先日夜痛心而不敢自寕者也伯父為文多不存槀思先自童丱見輒録之積二十春秋得文百篇古今詩四百八十首先子之著作雖存甞自刪焚僅􅅏三十篇文百篇詩而已扵是合寫成書􅁵為一十四卷題之曰鄭氏聮璧集将鍥文􅎚以行四方敢以首簡序文為請濂受而讀之杲齋之文則氣韻沉雄如老􅀅帥師旌旗火皷􅌭紛交錯咸歸節度曲全之文則規製峻整如齊魯大儒衣冠偉然出言不煩曲盡情意然皆有䑓閣弘麗之􅀚而無山林枯槁之氣嗚呼是亦可謂能言之士乎昔夏侯湛與潘岳並姿容其行止之䖏恒同輿而接茵人謂之連璧然不過取人物之明㓗耳􅀄不論其能文也縦曰能文如温邢之敏贍亦生扵異鄊􅀄非出扵一姓也縦岀扵一姓若二謝之藻麗􅀄非出扵一門也縦岀扵一門若二盧之雅逸則一􅀙焉若二弘之典嚴則􅂯􅀙焉而同胞同氣者盖亦鮮矣嗚呼有若二先生伯仲並以文鳴其亦可謂希世之士乎濂也不敏幸見杲齋扵虎林而扵曲全則未之識也及官成均乃與曲全之子司令君為同僚司令君善承家學文光赫然為御史為部使者百壬歛迹又以政事聞何鄭氏之多賢㢤雖然不開之扵先後将何􅁇不􅁇之扵後前何以昭司令君汲汲為不朽之圖可謂知所本矣濂因備書其事冠諸篇首知言君子必有取焉杲齋諱東字李明曲全諱采字季亮温之平陽人洪武八年夏四月望日温州横山仁濟廟碑記禮者曰能禦大菑則祀之能捍大患則祀之先王之制非神􅀄封于唐為平水􅂋應公㝷陞王爵賜衮冕赤舄宋累加通天護國仁濟之號􅀙祀郊壇兼賜仁濟以為廟額元復加威惠進封大和冲聖帝遂易廟為宫逮入國朝壹以誠事神以為數加溢羙之辭非所以敬恭明神詔禮官定議為横山周公之神至於廟宇之建􅁱皆郡守任其責可考見者自陳毛喜逮元左荅納失里凡一十三人云昔者大禹當洪水横流之時随山刋木奠高山大川民始得平􅁟而居千載之下覩河洛者必思禹功而弗忘天􅂨民􅃔其不可泯也如此若神之為憫生民之昬墊􅁬身而興捍患禦菑􅃖􅃖之氓得遂桑土既蠶而不混為魚鱉者果誰之力歟夫禹之功在天下神之澤則􅀍乎一州雖有小大之殊其惠利萬民之心則一而已廟而祝之誠合先王制禮之義孰謂非宜州人士永嘉敎諭許士宏訓導張升恐無以示来者介郷友秦王府紀善林君温徴濂文勒諸樂石濂既為序其事復作􅁔一篇使􅀖人􅁔以祀神其佐神張鉉字子元郡人由右科進士仕至閤門宣賛舎人剛烈正􅀡甞上䟽言事忤史嵩之􅀍斥而殁既殁而􅂋靈太守吴泳因并祠之法當附書文中􅁔曰東甌之地大海濵止斥鹵噴蝕成荒堙止有時魚龍或怒嗔止蹴翻鉅浪髙嶙峋止懐㐮􅀔殷莽無垠止惟神我憫眉屡顰止帥衆䟽鑿不憚勤止夜􅃥隂兵直逹晨止三江順流若柂紳止盡化魚鱉爲衣巾止一旦􅄓母號秋旻止江流􅊇上波挿雲止城廬沉溺在逡巡止神知事急如救焚止灣􅃓注矢肯顧身止眼不見水唯見民止衝濤直入勇絶倫止海水璧立左右分止赤電飛射光相燉止神乗白龍赴海門􅊒􅊒似聽驚雷奔止水禍頓弭神具欣止有室堪居田可耘止僉言曷以酬大勛止有廟肇祀西洋濆止漸周吴越洎七閩止神功弥盛海㝢聞止天兵建隊向空敶止旌旗上著鳥􅂐文止虜氣讋盡去觧屯止况兹狗䑕視欲吞止河道遄復流沄沄止􅄬杖化龍靈跡存止䟽封直至帝王尊止冕旒衮衣佩㻞璘止神之正氣塞乾坤止下上日月摩星辰止玄化沕穆合神人止甌民戴神忱且恂止遐邇奔凑川之臻止如見靈旂降􅌭紛止牲牷肥腯酒苾芬止驅斥厲􅀑􅁰稌蕃止太史造文勒堅珉止後千百載期無諼止抱甕子傳予甞㳺括之少㣲山俯瞰四周如列屏障山之趾有随地形髙下爲䟽圃約二十畮凡可茹者咸藝焉傍列桃杏梨李諸􅀣時春氣方殷䟽苗怒長滿望皆翡翠色􅀣亦作紅白花􅌭紛間錯如張錦綉叚心頗訝之曰是必有異因曵杖而降冉冉至其處氣象幽夐絶不聞雞犬聲遥望草廬一區􅀮約出竹隂間疑中有􅀮者亟前􅀱之良乆見一士戴㯶葉冠身􅀍紫􅄄裘抱甕出汲水􅈅畦予進問曰夫子何名曰山澤之民無所名也强之曰人以其抱甕也遂呼為抱甕子爾曰丈夫䖏世亦多術矣出則華軒結駟入則鍾鳴䁀食有志者輒能致之夫子恒營營逐逐扵一甕間無乃自苦乎抱甕子忽辴然一􅀏指苔磴揖予坐寘甕于地嘆曰吾受血肉軀與人同豈不樂榮貴與人異㢤顧念之頗熟百􅀊之間寧復㡬何與其彊情而狥世寧若任真以自放也吾圃之西則九盤山山之顛宋州􅇬建焉側有烟雨樓當山雲􅀄興景􅁚萬態極可玩李鄴侯馬荘敏公甞登之而感慨矣其東清溪􅀚秦賢良謫官而来亦㳺憇其上時坐鸎花亭賦詩而今竟安在㦲非惟人随流水而逝異日凌霄之崇搆皆蕩為氛埃一凝竚間野草荒烟若愁思之不可禁世事徃徃􅁼此是何足深道吾所以抱甕出入而弗辭也且當抱甕之時嗒然忘形志慮外絶精神内營目不見色耳不聞聲招之弗前麾之不驚委蛇容裔而萬物莫吾敢攖自以無愧扵赫胥尊盧之民子以吾為逐逐營營不亦過歟曰然則􅈅畦亦有道乎曰有䟽性不欲燥燥則生意厄而不伸䟽性宜濕濕或過焉則氣傷而寖屈吾日夜調之爕之俾􅃴夫厥中則芃然而秀嫣然而榮矣言訖抱甕而去予深味其言盖有道而􅀮者也所謂强情而狥世􅂚若任真而自放不㡬扵樂其天者殿所謂人物代謝而樓􅀚不能以存一俯仰間而感慨係之不㡬扵逹人大􅀚者歟所謂抱甕有術心與耳目之官内而弗外木㡬扵守一不二者歟所謂藝䟽得中不使􅀝扵一偏不㡬扵治民有政者歟疾起而追之抱甕子入竹隂間閉户高卧扣之不見答若無聞者予撫然而退史官曰予既歸金華山日思抱甕子不少置及官南京見朝紳中貌有相肖者問其同列曰是豈括之􅈅畦者邪曰然曰柰何仕為曰去年􅀿聘而起典儀晋王府轉官起曹剪剔浩穣声望盖龎欎云曰其氏名謂何曰此烏傷校官劉浩卿子也名彬其字為宗文予不覺嘆曰浩卿吾故人也其有賢子若此予不能知之可愧矣夫雖然宗文當元季政亂肥遯山林若将終身焉及逢有道之朝輒蹶然興起以力政著聞其得出處之正者矣向予意其為有道之士者果非過歟果非過歟使宗文非有道之士則長徃山林而不返矣謂之賢也得乎因記問荅之語為抱甕子傳故龍泉湯師尹甫墓碣銘有序湯府君諱京字師尹一字景山䖏之龍泉人其先與宰相岐國公思退同宗盖自岐公曽大父太師婺國公載之長子太中大夫稻傳十丗至武翼大夫大莭武翼生望以父䕃譲其弟始不有世禄有子曰鏞生未冠而宋社巳屋遂􅀮居行義置田二百畮以贍同族黄文獻公溍為記其事實府君之父也府君性聰利群書過目輒成誦逮入州學習進士科試之業下筆光􅆋逼人同舎畏憚之州里有貢之者府君辭曰仕固足以澤物然有命焉不可必致也所可必者其惟醫道乎乃􅀤皇帝内經而精研之乆且有所契察脉辯證多著竒驗遂闢仁濟堂居四方善藥扵中疾癘者疕瘍者来謁悉與之胗療不責其報復慮義田之入可給於一時他日宗㣧蕃滋當有不可􅁇者乃與兄濵各捐常稔之田一百畮入之義荘湫隘别建數百楹中爲堂曰睦順東西爲二齋曰立本曰養原合群族俊彦聘碩帥誘迪之旁列廩􅁃以貯田粟俟時而分給府君猶以爲未足其遇鄊黨耄疾不能存者月予粟終其身殁而無歸者給槥櫝使之􅁙嵗或儉閭右􅀤粟多増直邀利府君獨持價弗二恒如粟􅀄熟時香爐峯下道苦􅁖不利行者府君率群􅀠平其坑坎取溪中自然石甓之凡二十里所既而抵掌于几嘆曰澤物固吾之素志僅能施之一郷􅀅若之何浙水東苦口賦食塩者乆之有司苟免督過上官不知病民民病又不能自言必坐致淪胥而後已吾當徃陳其弊言行與否則天也即日為書數千言走江浙行省對丞相白之辭氣激烈丞相與其反覆論辨府君以指畫地曰如此則為利如此則為害唯相君所擇耳丞相韙之下轉運使者定議􅀅如府君言㑹浙東諸郡守亦各上言事聞中書中書移行省召郡守詣憲府聚論奏上减官煮塩十萬引罷口賦法􅀙商賈轉鬻民間民力大紓實府君倡之及還執綵旗迎于道者肩摩而㭈属府君自是為善益力郡縣之政不便扵民者必詣守令懇懇言之多所更免府君既退絶口不自言或問之則曰我不與聞也晩年嗜種鞠購得嘉種踰百當秋高氣清黃白紅紫盛開爛爛然如張錦繡府君日抱杖嘯咏其間情神恬康有下知老之将至四時燕集内而昆弟外而賔友皆􅀏􅁔相酬雖素不觧飲必為之霑醉乃已賢士大夫慕􅃩其髙致盛為詩若文􅁛述之春秋僅五十至正戊子五月二十六日以疾終于家娶項氏男子一仁鞏女子四王黙鮑良知頃房鄭靖其壻也孫男三宗昭宗敬宗瑾孫女一尚㓜府君殁後四年其兄濵病革謂子楷曰吾與汝季父平生友愛篤甚今死猶未􅁙吾病脱有不諱當與之同兆域汝慎勿違吾言兄既卒楷與仁鞏奉二柩窆于麗水縣雲和鄊徳廣里吾思嶺之原時某年月日也府君孝弟而寛慤不為浮靡慘覈之行雖無意扵利逹其濟利人物之志夣􅄰不能忘嗚呼若府君者不亦有道之士乎㢤治古之時郷田同井出入相友守望相􅂇疾病相扶持故情意之感孚恩義之維繫信有足樂者矣降及後世兼并之俗興徃徃富埓刲君奴視同􅁼編氓擢筋盬髓以飫其谿􅐿之欲設有阽危况望其一引手救之乎府君義敦扵宗族而推及扵鄊黨州閭上䟽弭患且觧諸郡倒懸之急功益溥矣徴之一族而信徴之一邑而信徴之一郡而信其言人人同無少異者是豈可以聲音􅀏貌為㢤頗聞元季兵亂廬舎無小大皆成煨燼獨府君所建義荘巋然獨存虐􅆋屡及之不待撲而自㓕為善者天亦鑒之如此豈特人言㢤嗚呼是宜著之為聳善黜􅁖之戒者已仁鞏奉状介郷友刑部主事劉彬来徴銘銘曰維括望宗積慶攸鍾篤生岐公勲業顕融族大以盛分支析㣧孰以義競龍泉為勝有甫者田被乎東阡髙􅅒屹然拯夫顛連嗣人之􅁇有引勿替秉仁遷義遹昌厥裔合胡行之自家而推人餒我糜人疢我治物苟可利敢嗇吾施戴天履地庻㡬無愧鹹鹺病民民氣不伸䄂書侁侁走白相臣辭氣激烈上衝毛髮有智則竭如病斯脫我旋我廬迎者塞􅂗綵旍夾扶式􅁔且呼晚􅀹寡欲知已維鞠爛然盈目壼觴相逐誰非同袍􅃘鑠其膏不有人豪惠利孰操銘以著徳千古弗忒金石消泐此冝罔極宋學士文集卷第二十二翰苑續集卷之二
