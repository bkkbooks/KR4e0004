  text: 宋學士文集卷第十五鑾坡集卷第五
  hash: sha256:28d4b4682c353014a430d5ffcefedf911820a5b0275ae414e973f4a4017d85ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_015-1a}
body:
  text: 郊禋慶成詩序皇帝自登大寳主百神即有事于昊天上帝以仁祖淳皇帝配神作主于今五載弗􅈈益恭粤洪武壬子冬十一月辛酉長日至復遘其時前期丙辰上御奉天殿集臣工于庭告以誓命戊午出宿齋宫有司汜掃反土鄕爲田燭各戒具􅁱罔敢弗肅及期行事百辟􅀸士後先駿奔牲牷肥腯圭幣温緻噐用質雅酒齊苾芬樂舞具舉升煙上聞皇心内外質文两盡上帝居歆福禄攸降旣竣事禮部尚書陶凱工部尚書黄肅工部待卽牛諒晉府參軍熊鼎磨勘司令吳雲兵部􅀰中劉崧工部主事周子諒秘書監丞陶􅁩晉府録事張孟兼吳府錄事吳􅀙善咸謂皇帝升中于天國之大典幸際熈明與扵執豆􅇼之列不可無篇什以紀慶成昭示萬世遂以唐詩星臨萬户動月傍九霄多爲韻各賦詩一章而屬濂序之濂聞郊祀之禮始扵有虞氏至周大備秦漢以来寖渉不經且惑扵六天六帝之說莫之􅃴従君國子民者亦罕􅀎躬嚴祀事徃徃遣大臣攝之肆惟皇上一據禮經而洗千古之陋每嵗親升泰壇昭事上帝恪恭寅畏有赫其臨隂歛陽舒降甘風雨覃及寰宇物無疵癘行見鳯皇降而􅀛龍假矣聲歌之發兹非其時乎昔者周人之頌􅀁謂昊天有成命者郊祀天地也思文者后稷配天也二詩辭氣奥宻卒未易暁然非卜商之序掲其宏綱後世何自而明之羣公之什優柔而雅馴整肅而泰豫􅁕以羙盛徳形容而告扵神明善言詩者謂其有得周人之微㫖􅀁可愧者濂非卜商之識僣序作者之意君子其謂斯何雖然一代之成憲後王之􅀁取法者其大㮣亦頗著見扵間云是􅀊十有二月甲戌朔金華宋濂謹序昭鍳錄序洪武六年三月癸卯朔上詔秦相府右􅀓臣文原吉翰林􅁱撰臣王撰國子􅀶士臣李叔尤助教臣朱復秦相府錄事臣蔣子杰晉府紀善臣吕宗盛錄事臣杜環燕府録事臣張雲翀吳府錄事臣吳􅀙善椘府錄事臣王鏞靖江府錄事臣宋善􅁼集歴代諸王事實既受命乃取東觀諸史相與研摩善與惡可爲勸懲者咸采焉其文蕪事泛則剛取其大槩或有奢􅁋不軌無復人理者輙棄而不􅀵越二十又二日甲子書成繕冩爲二卷臣原吉等詣􅆣投進仍請以太子賛善大夫臣宋濂爲之序上可其奏先是有詔禮部亦􅁱是書前尚書臣陶凱今尚書臣牛諒主事臣張籌遂録爲一卷上塵乙夜之覧然二書義例夲同無大相逺臣籌因會粹衆論合而爲一承詔刻梓以傳名之曰昭鍳臣濂因得而序之臣濂欽惟皇上旣正天位即㝎青宫衆建諸子爲王作鎮䧺藩扵是蔽自淵􅂨錫以寳訓凡箴戒之諄切禮儀之等第兵衛之出入與夫職制營膳法律洪用之屬具錄成書共一百一十有餘條然慮其文太繁前史之事可據以爲鍳戒者多扵各條之下微注其綱而其目則悉載此書庻幾得以互見其爲聖子神孫建萬世之丕基者可謂􅀷且長矣扵戯盛㢤然代天而理物者天子也佐天子謹藩制以壮磐石之宗者諸王也天子則元首諸王則手􅁕是謂一體者也其可不同心而同徳者乎昔之賢王有見扵此敬以􅁱身禮以齊家政以馭衆夙夜戰兢唯􅂲不䏻盡屏翰之􅀉故禄位傳諸無窮聲光顯于来世其或不賢而弗之察欲縦情逸且失其秉彜之性而欲久享爵秩抑亦難㢤觀錄中􅀁紀歴歴蓋可数也傳曰義勝欲者􅀙欲勝義者㐫又曰惟命不于常道善則得之不善則失之矣嗚呼寳訓具在赫若日星之臨覧是錄者其懋戒之㢤其懋戒之㢤是嵗五月三日臣濂拜手稽首謹序楞伽阿䟦多羅寳經集註題辭大䧺氏􅀁􅀃阿䟦多羅寳經凡經三譯其四卷者宋元嘉中中印度求那䟦陀羅也其十卷者後魏延昌中北印度菩提流支也迢至扵唐寳义難陀来自于闐復以䟦陀之譯未弘流支之義多舛與僧復禮重翻爲七卷則久視􅀄也扵是判教諸師提綱挈領李通玄則以五法三自性八識二無我爲言智􅁴延夀則以實相佛語心自覺聖智爲言一則因理以顯事一則􅀙事以推理理事兼究則經之奥義無餘藴矣然自菩提逹摩東来震且謂此經四卷可以印心遂授其徒慧可故宗禪㝎者世受其􅀃而其文辭簡嚴卒未易通􅀁以傳之者寖微至宋張文㝎公方平見扵南譙悟其爲前身􅀁書乃以錢三十萬屬蘇文忠公軾印施江淮間蘇公親爲書之且記其事自是流布漸廣雷庵禪師正受病句讀之難通也與同􅂁智燈據䟦陀之本而参以魏唐二譯原其異同歴䟽扵經文之下復稽唐註古本暨宋僧寳臣閩士楊彦國之說而折􅂨之凡經綸䟽録有渉扵經者亦撫其精華附焉名之曰楞伽寳經集註自慶元乙夘之三月至丙辰之四月始克就緒其用心可謂勤矣且如来說經不即語言不離語言矧此楞伽實詮圓頓八識洞然號如来蔵大包無外小入無内本性全真即成智用觀身實相與净名同若彼二乗滅識趣寂譬如迷人忘已之頭狂赱呼號別求首領此乃諸佛心地法門不假􅁱證現前成佛禪宗之要盖莫切扵此矣或者則曰西来之宗一文不設若謂􅀄祖持此印心非愚則惑子不聞逹觀頴公之言乎曰不然也佛法随世以爲教當逹摩時衆生滯相離心故入義學者悉斥去之逹觀之言猶逹摩之意也苟不察其救弊微權而據以爲實則禪那乃六度之一先佛􅀁指持戒爲禪㝎智慧之本者還可癈乎雷庵之註其有功扵禪宗甚大非上根宿智不知予言之爲當也此經舊甞刻板姑蘇㓜住庵近毀扵火天界禪師白庵金公意欲流通乃購文梓重刻于旃檀林来徴余爲之序予㓜時頗見正平張戒集三譯之長采諸家之註成書八卷以傳大意略同惜雷庵不及見之白庵妙悟真乗旁通儒典爲業林之􅀁宗師苟求其􅀃而􅀘入之則其功又豈不大扵雷庵哉劉參軍黄牒䟦尾西昌劉氏素號簮纓家由宋治平元年至咸淳十年擢苐奉常者八人與鄕闈之貢者又二十九人其諱在中字伯正者凡四􅀍薦送方登建炎二年進士苐授文林卽永州錄事叅軍此盖其九月􅀁受黄􅃙也宋舊制告與􅃙多兼給思􅁜以建炎元年五月一日即位扵應天府戎馬紛紜庶事草創其月十七日始詔文武官自太中大夫正任觀察使以上並命辭給告餘則令吏部具鈔降􅃙則當時給􅃙者頗衆不特􅀄入官令録而巳後因臣僚奏請洊詔巳給􅃙官俟法物成時逐等依舊給告則三年三月九日也牒後􅀁書中太夫守右丞朱中大夫守左丞顔而不着其名朱名勝非謚忠靖顔則名岐盖元年十一月思􅁜註蹕惟􅀭越十日擢岐與許景衡爲尚書左右丞二年五月十三日景衡罷而勝非代其位以月日較之必知其爲二人矣又書正議大夫守右㒒射而不着其名氏當是黄潜善無疑或謂爲李綱殆非也綱自元年七月五日自右僕射升左僕射潜善􅀙門下侍郎爲右僕射是月綱即出提舉洞霄宫二年十二月十九日潜善始拜左相此牒給扵是嵗之九月其以右僕射繫銜非潜善而何職事銜之上三人者並加守字凡階高而官卑者稱行階卑而官高者稱守官階同則無之此猶循唐制也嗚呼潜善主和誤國真姦臣之雄不􅁕汚君子齒頰岐亦小人力黨張􅀖昌詆綱爲金人􅀁惡不可使秉鈞軸章至五上而不愧唯勝非差強人意律以春秋責備之義亦有不得免焉區區貴冨􅀎幾何乃無􅀁忌憚至扵如此墓骨巳杇覧其官氏人猶指議之有憤惋不平之氣果何爲者㢤參軍八世􅀙孫職方􅀰中崧出此扵破壞之餘潢飾以成卷軸然自宋迄今已歴二百四十又五年矣宋之取士用辰戍丑未年建炎二年屬戊申其秋親試進士賜李易以下四百五十人及第出身有差盖元年丁未翠華出幸江南故無暇及之爾因并書之以解讀者之疑云洪武五年冬十月一日太上清正一萬夀宫住持提􅀧張公碑銘有序龍虎名山蟠踞上饒之區重岡􅃨巒自中閩来若翠􅅋戎旃環衛其背而雲林二十六􅄘森列内向如拱如趨如冠劒而迎至琵琶之􅈐止焉大川西㵼仙岩㧞起天半而絶其衝靈氣翕合欝爲仙人􅀁都歴代以来其侍祠竹宫而峻陟崇班者相􅁇乎後先或葆熈餐醇扵巖谷之下聲光燁然多與名薦紳相埒及其終也飛騰觧化游神丹臺下上矣氛曾不得以凂之如吾張公􅁱文盖亦其中之有聞者歟公諱友霖脩文其字也信之貴溪人父漢良有馴行人稱文穆先生毋汪氏公之生也有霞光香氣之異居亡何老父秋髪􅌭紛怱曵杖而至顧文穆言曰爾児方外之噐也冝謹視之言訖失老父􅀁在年十二志恬慮冲皦皦如􅀌鶴獨立文穆以其生有玄徴俾入龍虎山􅀙周尊師復禮㳺尊師學行融洽貫老易爲一􅂗公晝夜窮研而受其說以九經爲淵源百氏爲支􅂀􅈁析毫分而極其根柢之􅀁會閱六年始著道士服事周君貴徳爲弟子時桂心淵隐匡廬金志陽居武夷二人者世號爲真仙翁􅁱丹之士依之者成市公皆躡屩擔簦徃拜其坐下傳其三皇内文九鼎丹法􅀁謂延齡度世者頗領其幽玄歸參天道運化三洞四輔海嶽洞府日月星斗諸書或合或離􅀋有以取舎之復自嘆曰吾春秋方盛撫世微權要不可無見也乃出力扵詩章古文辭課之扵虚無扣之扵寂寞盖混混乎其不可竭矣虞文靖公集以文䧺海内公爲書千数百言暨􅀁爲雜著一編遣其徒張自賔徃質之文靖􅀷加敬嘆與之相辨難者甚至自是及門受業者日衆其􅀙之求文户外亦􅋰滿矣公則又曰此當寘之二毛巳在顛其尚不求歸宿之地乎扵是刋落葩藻與道夷猶至和薫蒸四體盎睟泉渟谷虚􅑡契玄極有不知􅀊月之易遷者嗣天師太乙明教廣玄體道大真人張公嗣徳嘉公玄學淵邃辟爲教門講師􅁱文輔教簡正法師兼元壇􅁱撰太乙之緒再傳實爲四十二代而張公正常起承之入我國朝錫以護國闡祖通誠崇道弘徳大真人之號累詔至南京公皆爲輔行翊賛相導靡不備至洪武辛亥秋八月更辟教門高士㝷提􅀧大上清正一萬夀宮而諸宫觀之事咸蒞焉未幾興髙行道士黄棠吉鄧仲􅁱同􅀍召公奏對稱㫖賜食禁中而退冬十月大駕幸鍾山崇禧寺復燕勞有加明年壬子春公屢乞還山上欲屬以禜祈之事命中書㽞之且有白金之賜秋七月公示微疾扵朝天宫謂仲􅁱及丹霞鋉師周玄真曰盍趣宫主宋玄真相見乎既至正襟危坐􅀙容言曰自非我有性本虚空生浮死休處世一夢吾􅀅觀化扵㝠㝠之中矣遂操觚賦詩一章翛然而逝是月十又七日也顔貌鮮澤肌體柔弱仙經􅀁載尸觧者可信弗誣仲􅁱力營其後事徃白儀曹因以其事聞上爲之惻然後三日奉遺蛻焚扵石子岡執紼􅀙者至数千人火旣熾有五色祥煙盤旋扵其上云公自呼鐡鑛子有文集若干卷亦以鐡鑛名世夀六十又七􅀁度弟子即自賔自賔純􅅚好􅁱與翰林羣公㳺交譽其賢今﨑嶇道􅂗凾靈骨以歸􅀅與其子若孫吳保和張敬安謀以某年月日塟于龍虎山之天􅄘件繫羣行来徴濂爲之銘濂聞老子之㫖可以治國可以􅁱身可以錬真其大者與孔氏或不異也公以超頴之資屢求賢師思兼孔李之學而通之其視死生若旦暮泊然無􅀁繫累者固冝也豈古􅀁聞有道之士非邪濂也不敏何􅁕以銘冠劒之蔵勉㣘自賔之請而述之山中有方壼真人高風莫攀君子擬其爲陶隠君之倫當䏻爲濂刪而正之銘曰大道之文洞玄玄􅀆八角垂芒太極先􅀆天真皇人授而傳􅀆龍虎之君環以千􅀆􅊥其靈秘道乃全􅀆上清道士古列仙􅀆洞逹懸觧恊玄筌􅀆内天外人藴坤乾􅀆出入孔墨孰後孰前􅀆玉室金簡列戔戔􅀆彩霞丹景交相鮮􅀆溢爲篇翰五色宣􅀆有聲鍧然聞九天􅀆龍光下逮􅀔廽旋􅀆一旦觧化同蛻蟬􅀆騰淩滅没行翩翩􅀆白蜺青鳯扶羽軿􅀆無􅁚有物形神遷􅀆逹人何累止若淵􅀆冲漠無爲合自然􅀆其迹雖泯名則緜􅀆冠劒之墟勒蒼堅􅀆山靈撝訶久逾䖍􅀆句容奉聖禪寺興造碑銘有序句容縣之東四十五里有地曰白土埭邍陸􅄛迤林樾蒼潤欝岡虎耳良常諸山屹立乎東西聮輝分彩神秀之􅀁融會而奉聖禪寺宅焉按金􅁜塔寺記􅀄名永㝎梁武帝時有大桑門寳亮主之帝方尊崇釋乗聞亮精通義學命撰􅄺槃經䟽參訂辨􅀶􅁢契先佛甚􅀷微妙之㫖寺因籍之増重與諸大刹争雄唐李兵燹縦横寺日􅈥廢僞吳楊氏據有金􅁜其檢校僕射許褒遵厥父司空雍之命新作之割􅃾田在句容丹徒者若于畒以飯浮屠夫人景氏猶以爲未􅁕復施句容田若干埤益之宣城二比丘曰義爽曰廷規行業峻潔僕射具䟽延居寺中蓋大和年間也至宋大中祥符􅀄始賜今額公于宋季又復摧敝弗支羣僧皆風雨散去丹徒之田亦爲閭右民施茂等􅀁奪元至元中住持平山坦公不憚四千里之逺北訴于中書移文江南捴攝且命下其符扵鎮江凡厯七載之久殫三徃返之勤侵􅆠乃歸平山既遷化滅庵受公􅁇之後雖數易其主而未遑設施至正三年癸未咲岩禪師徃􅀘其處當屢廢之餘室如懸罄積逋之未庚者踰五千緡咲岩晝夜不自寕議鬻不毛之山以償殺衣縮食孜孜以興建爲務不四三春秋粟􅄹于倉泉溢于嚢乃剪嵗荒乃闢靈塲乃樹棟梁九年巳丑釋迦寳殿成明年庚寅􅅮土塐佛菩薩暨大弟子護法神王諸像環以大阿羅漢慈容穆如九座香華嚴奉如式曽未幾何三觧脫門又成右設􅄺槃之居以處有疾僧伽左建僕射父子祠而他施者附之又明年辛夘演法之堂又成名之曰正法眼閱三月棲禪之室又成名之曰清淨覺海且拓其術徑别築小山門以爲喉衿通名曰㝎林山西廡及衆寮次第而就又四年乙未像四天王神扵三門繚以周垣延袤三百餘堵委蛇縵廽如雲横阜截防限遂嚴又明年丙申禪師遷住保寕而懐楚津公南宗定公先後而至皆刻厲有爲益其􅁟田當是時大明建都江左而浙右猶未盡平寺當毗􅁜京口之衝􅀐歩之兵㸑息者旁午覩其宏敞嚴飭㦸手相戒不敢犯洪武三年庚戌仲綸彌公來司寺事病東廡之未稱也撤其故腐易以新堅而規制扵是乎大備殿以間計者凡三室與門如殿之数堂如門之数而溢其二两廡如堂之数而加以七倍其懸鍾之樓則仍其舊焉仲綸潜心内行爲四衆之􅀁趨仰且念咲岩錙銖之積以克潰于成視衒竒鈎貨以病民者相去萬萬苟不圖之顯刻金石則後来者何自而知之力請濂爲之記夫自辛卯兵變以来江淮南北􅀁謂名藍望刹多化爲煨燼之區而狐兎之迹交道過其下者無不爲之太息奉聖禪居有如魯靈光巋然獨存非惟金浮碧明照映扵山色水光之際而鐘魚之互荅􅀄不異扵承平時豈亦有数存扵其間乎雖然人事之盡誠之以勝天自非主之者疊矩重規求其持久而不墜若此或未之見也讀予文者尚念昔人搆締之艱而􅁇承扵無窮㢤咲岩名善愈族某氏明之昌國人說法嗣仲芳倫公耆舊僧宗鉉咲岩同邑人是寺之役其功爲最多繫之以銘曰皇矣􅁚教自西徂東丕建塔廟牖于民􅂨青天震雷以􅋍群聾蹶然以興豁爾而聡句容之墟白土之里川媚山輝靈龢萃止彼阿練若䧺焉中峙由梁洎元成壞凡幾有偉一師飛錫而嘆不創寳􅀁妄邪孰閑白業􅀁感在彈指間靡仆不起何闕弗完湧殿峩峩飛樓㵝㵝像變嚴嚴􅆊夾晣晣觚稄騰翔丹艧絢麗兠率天宫下移人世粤自興戎刼火颺埃荘嚴勝域鞠爲草萊此獨巋然鸞鶱鳯廽都人聚觀一何壮㢤賦形两間固囿乎数人㝎勝天如鳥建羽千里􅁬飛􅀎令顛墜式纉式承胡寕弗顧寳華楼閣不渉有無光明發舒號爲毗盧徧覆大千了無欠餘凡爾方􅂁攝心澹泊来居来㳺無證無作大史勒文因病注藥尚祛昏迷同歸妙覺寂照圓明大禪師壁􅄘金公設利塔碑禪師諱寳金族姓石氏其號爲壁􅄘生扵乾州永夀縣之名胄父通甫宅心􅀙厚人號爲長者母張氏亦嗜善弗倦有桒門持鉢乞食以􅀚音像授張且屬曰汝謹事之當生智慧之男未幾果生禪師白光煜煜然照室㓜恒多疾􅆞綿衾枕間父母疑之曰此児感祥徴而生其冝歸之釋氏乎年六嵗依雲寂温法師爲弟子既薙落受具戒徧詣講肆窮性相之學對衆演􅀃纍纍如貫珠聞者觧頥巳而撫髀嘆曰三蔵之文皆標月之指爾昔者祖師􅀃法天華􅌭紛金蓮湧現尚未􅀎出離死生况區區者邪即更衣入禪林時如海真公􅀣正法幢扵西蜀􅀳雲山中亟徃見之公示以道要禪師天起疑情三二年間􅆍食爲廢偶携筐随公擷􅂼扵園忽疑坐不動厯三時方窹公曰爾入㝎耶禪師曰然曰汝何􅀁見禪師曰有􅀁悟爾曰汝苐言之禪師舉筐示公公非之禪師寘筐于地拱手而立公又非之禪師厲聲一喝公􅁬前揕其􅎍使速言禪師築公􅎍仆之公猶未之許咲曰塵勞暫息㝎力未􅀎􅀷也必使心路絶祖􅆣透然後大法可明耳禪師聞之愈精進不􅈈遂出參諸方憇峨眉山誓不復粒食日採松柏啖之脇不沾席者又三年一念不生前後際㫁照體獨立物我皆如自是入㝎或累日不起甞趺坐大􅀣下溪水横逸人意禪師已溺死越七日水退競徃視之禪師燕坐如平時唯衣濕耳一日聽伐木聲通身汗下如雨嘆曰妙喜大悟十有八小悟無筭豈欺我㢤未生前之事吾今日方知其真耳急徃求證扵公反覆相辨詰甚力至扵曵傾禪榻而出公曰是則是矣翼日重勘之至期公扵地上畫一圓相禪師以䄂拂去之公復畫一圓相禪師扵中増一畫又拂去之公再畫如前禪師又増一畫成十字又拂去之公視之不語復畫如前禪師扵十字加四隅成卍文又拂去之公乃總畫三十圓相禪師一一具答公曰汝今方知佛法宏勝如此也百餘年間參學有悟者世豈無之􅀎明大機用者寕復幾人無用和上有云坐下當出三虎一彪一彪者豈非爾邪爾冝徃朔方其道當大行也無用蓋公之師云先是禪師在㝎中見一山甚秀麗重楼傑閣金碧絢爛諸佛五十二菩薩行道其中有招禪師謂曰此五䑓山秘魔岩也爾前身􅁱道其中靈骨猶在何乃忘之旣寤遂逰五臺山道逢蓬首女子身􅀍五綵弊衣赤􅁕徐行一黒獒随其後禪師問曰子何之曰入山中爾曰􅀅何爲曰一切不爲良久乃没叩之同行者皆弗之見或謂爲文殊化身云禪師乃就山建靈鷲庵四方聞之不逺千里􅀒餱糧来獻者日􅌭紛也禪師悉儲之以食㳺學之僧多至千餘人雖丁􅀊大儉亦不拒也至正戊子冬順帝遣使者石至燕都慰勞甚至天竺僧指空久㽞燕相􅀓􅀎前知號為三百􅀊人敬之如神禪師徃與叩擊空瞪眎不答及出空嘆曰此真有道者也冬夕大雪有紅光自禪師室中起上接霄漢帝驚嘆賜以金紋伽􅀺衣遣歸明年已丑復召見延春閣命建壇禱雨􅂺應賜以金繒若干禪師受之即以振飢乏民又明年庚寅特賜寂照圓明大禪師之號詔主海印禪寺禪師力辤名香法衣之賜殆無虚日自丞相而下以至武夫悍􅀅無不以為依皈已而懇求還山洪武戊申大明皇帝即位于建鄴明年巳酉燕都平又明年庚戍詔禪師至南京夏五月見上扵奉天殿且曰朕聞師名久以中州苦寒特延師居南方爾遂㽞扵大天界寺時召入問佛法及􅀑神情状奏對稱㫖又二年辛亥冬十月朔上􅀅設普濟佛㑹于鍾山命髙行僧十人涖其事而禪師與焉賜伊蒲譔扵崇禧寺大駕幸臨移時方還明年壬子春正月既望諸沙門方畢集上服皮弁服親行獻佛之禮夜􅀅半􅃙禪師扵圜悟関施摩陀伽斛法食竣事寵賚優渥夏五月悉粥衣盂之資作佛事七日乃示微疾上知之親御翰墨賜詩十二韻有玄関書倍已成正􅁴之言天光昭囬人皆以為榮時疾已革不􅀎詣闕謝至六月四日沐浴更衣與四衆言別正􅁭危坐日􅀅瞑弟子祖全智信請曰和上逝則逝矣不㽞一言何以􅁀白扵後世邪禪師曰三藏法寳尚為故􅁓吾言欲何為夷然而逝世夀六十五僧臘五十又九後三日奉龕茶毗扵聚寳山傾城岀送香幣積如丘􅁜或恐不得與執紼之列露宿以俟之及至火滅􅀗五色舎利齒舌數珠皆不壊紛然争取􅁅土為盡禪師體貌豐偉端重寡言咲福慧双􅁕􅀁至化之故其在山也捧􅁕頂禮者項背相望其應供而出也持香華擊􅆊樂而迎者在在而是不啻生佛岀現其行事多可書弟子散之顱水赴雲趨無間儉豐香積之充且妥其躬其名上聞便蕃宸恩来自帝閽扵赫皇明遣使奉迎舘于神京龍文成章日晶月光欝其寵榮叶四衆􅀁依胡不寕兹而亟其歸㤗山崔崔一旦其頽靡人不哀有崇者岡白虹吐芒設刹之蔵故同安沈府君墓碣有序考功主事沈彰服衰經踵門拜且泣曰彰幸生盛際忝􅀍官使􅀻􅀼自念先府君之年僅五十又二爾忠孝之道不可以兼致驅馳王事二三春秋方敢納禄而歸以竭烏烏之􅀻情孰意上天不佑而府君以洪武五年十二月二十日棄我諸􅀌閱三月訃至擗踊攀號無􅀁逮及即上其事中書授法比持服􅀅不逺四千里南還卜某月日奉柩車窆于同安西山之阡在蓮花鞠花两􅄘之間又復自念府君死矣而先徳不可死者亘百世猶一日也苟不圖文顯刻以昭示後人不孝愈大焉敢持奉常賛禮黄仁狀前事以請唯先生􅂌矜之濂不敢辤謹按状府君諱祥字遂初姓沈氏其先光之固始人唐末之􅅍有諱某者始遷扵莆陽圖譜厄扵兵燹莫紀其世次曽大父某祖澤民父善夫娶張氏旣生府君而来主泉之永春簿遂再徙于泉城及府君之長又三遷扵同安上官才之薦爲縣之際㽞倉使非其􅀁好也府君事父母盡孝視扵無形聽扵無聲唯􅂲有毫髪咈其意至正甲午大盗起安溪鄉民皆風雨散去府君􅀒毋夫人避海中嘉禾島盗躡其後府君爲盗􅀁掠幸以計脫而夫人不知􅀁􅃴府君蒼黄冐賊鋒求之晝夜呼號不飲食者三日始􅀗見巖冗中母子相抱持悲喜交集時夫人春秋髙且有疾府君欲渡海囬翔風鄉以居装槖既于盗手其計無􅀙出乃質其子彰扵鄭氏􅀗錢千緍爲買舟之資暨還一月餘始徃贖彰以歸府君伯仲者亡季夭府君事兄起宗如其父泉布羞服之屬凡有􅀁需輙上之風檐月牖時相與歗歌杯觴淋漓几杖暱比数日不聚首中心欿然不怡先是主簿君殁塟泉之南門外後九年夫人亦卒􅇏火連綿權厝主簿君墓側及是兄復殁府君匍匐徃泉城畢棺歛之禮乃歸同安檡地扵海山之陽欲迎夫人之柩藏焉巳而􅏰然出涕曰吾父母生則同室死則異冗乎吾兄父母之􅀁遺魂魄或有知其䏻獨處異郷乎扵是甓三竁而共薶之當主簿君居莆陽貲産頗豐府君悉譲與群従兄弟錙銖無􅀁覬而别􅀣家扵同安其遇甥福全􅀹盡恩意南安􅃾田以畮計者七十有五悉以􅂌之無靳色莆陽宗黨有来謁者必倒屣迎舘翕翕煦煦唯恐弗之㽞暨别去復餽焉閭井知府君之行交口稱之曰良士良士云府君當元之季知世􅀅亂具􅀮者之服􅀷蟄不出自號之曰㕓􅀮髙人韻士或来即之相與賦詩以爲樂視世之聲􅆋熏灼者若􅀅凂焉娶􅀓氏生三男子長即彰通詩訓故學較藝福建鄕闈取第十一名文解有司貢至京師㑹朝廷需賢之急不俟會試南宫選入吏部爲考功主事階承事郎次曰寛次曰英嗚呼􅀓有之孝悌者天下之大順也人之行義有重扵斯二者乎推而爲忠爲信爲有别其有不自兹者乎君子之學􅀎植乎其大者豈不爲厚倫重本之勸乎然則府君之行其可銘以銘曰猗若人行之臧撫上下恊圓方丁時艱㓂搶攘念我毋情盡傷日號呼走遑遑盻白雲涕霑裳旣覯止色斯康奉厥兄䔍天常儐􅇼豆釃酒􅄴和孺樂日洋洋惟孝弟善之綱朂後昆矢不忘故松陽周府君阡表括之松陽有行義之士曰周君休休而有容循循而雅飭自其髫稚嚴父棄􅂢君輙􅀎自勵于學擩嚌乎經畬優柔乎藝苑伯仲之間交相摩切積功既久繕性禔身之間以荘以敬弗敢自釋上下化之春風盈扵户庭棠棣歌扵州里薦紳之家罔不歆􅃩焉君不以爲功而澤物自見當嵗儉甿􅀠無以食尫􅇤􅀅踣君曰是不可不振也度力而給其粟旱勞頻仍及厲􅀑爲菑害沴氣紏蟠十室而九君曰是不可不禜也亟斬牲以禱于神俗尚氣而善闘錐刀之末􅁬襼而疾詬流連縣庭每爲吏􅀁魚􅁏君曰是不可不正也有赴愬者方爲辨曲􅈂訟爲衰止屬元季兵亂郡國繹騷石抺􅀅軍帥師来鎮栝凡武勇文學之士悉以禮聘而詢其謀猷聞君賢延而與語恱之辟爲千夫長􅀅軍廓清群憝君與有功焉未幾乃引退都布寛衣放情丘􅊤間當風䟽日鮮與一二逄掖􅀙容觴咏日莫忘返年甫五十又八不幸以洪武庚戍九月某日卒家明年辛亥二月某日塟麗水縣㦤徳鄕徐北里之原禮也君諱紹祖字光遠其先家㫪􅁜髙祖􅁢文始来遷曽祖梓宋郷貢進士祖留道􅀙元兵討臨漳叛㓂有功擢管軍千戸父鑑毋某氏君配室則王氏也前五年終翰林侍講學士危公銘其墓生丈夫子二曰華曰蓮孫男五曰文韋曰文煥曰文炫曰文煇君殁後四年二子奉縣文學洪文震狀来請墓上之文以期不死扵親余聞墓之以有文古也殷比干之銅槃漢梓潼之甎誌皆是也後世易之以石且植表扵隧矣人子不死其親者􅀅如是乎在余惡􅀎辤有若君之行義脩扵身儀扵家庭惠澤􅀍扵州里􅀁以􅋍善導民者誠有禆扵王化君子不謂其進可乎嗚呼麟之振振既淑且仁卒以羙夫身綏綏者罷日肆其威監人之髓而剥人之頥其相去亦不遠而嗚呼有崔者岡林樾欝蒼惟君之􅀁蔵千載之下幸毋壞傷是爲表題趙模千文後左右内率府録事參軍趙模集右軍行書爲千文模在唐有􅀎書名甞與韓政諸􅁑貞馮承素等奉􅃙臨摹蘭亭逮今猶有存者予扵秘府頗見之最喜其善用筆而正􅄡恒在畫中􅀁以度越諸人也歟此本係鮮于奉常家蔵者神采􅀹沈著不露可寳也故黄府君墓碣銘予従烏傷黄文獻公㳺識公従子仲華甫進承公話言退與仲華磐桓華川上温潤如瓊瑶使人不忍厭去公薨世大變甲兵滿天地東西各不相聞及真人起臨濠廓清六合予入侍講禁林㑹浙江行中書新貢士至有黄昶者来叙世契問之實仲華諸孫復叩仲華何如則作土中人五年矣爲太息者久之昶彜従予入史局幾一載間自撰仲華行状涕泣請銘仲華名橒仲華字也自㓜嶷然有立出與群童敖歩武有度不失尺寸郷先逹韙之暨長撫世酬物悉中􅁠度州里譁然稱之曰􅀎父兄素儒懦疆畎爲豪右兼并仲華􅁬厲致家之肥悉納金贖還自是益敦仁厚行貧而貸泉者不責其息稍弗􅀎庚焚劵示之或有忿闘者赴愬于門仲華聽已指曰爾言曲爾言直皆心服去且曰得黄公片言賢扵縣令長十人避兵石門山一婦疲卧荒榛時㳺􅀐已迫仲華命媵女扶以奔與諸婦同寝食㓂退詢其家歸之然終不識其靣性至孝親疾進藥劑無時夜不遑甘寝及没衣禭棺竁之費咸出扵􅀻不忍煩諸兄文獻公剛介子弟鮮得懽心仲華曲承其意酣觴􅀏談煦煦如陽春親屬有使酒難近者且復誎仲華􅀙容白其利害卒至改行仲華行事多􅀋此他不􅀎悉書仲華卒扵吳元年三月十一日其月某日葬扵崇徳郷平洋原先墓之次夀六十七世系遷移之詳文獻公已見諸圖記曽大父堮宋承節􅀰元贈嘉議大夫禮部尚書上輕車都尉追封江夏郡矦妣徐氏追封江夏郡夫人大父鑄贈中奉大夫江浙等處行中書省參知政事輕車都尉追封江夏郡尉追封公妣童氏追封江夏郡夫人父􅄎妣喻氏仲華配室􅀓氏生子三璨琥瓉女一􅃴劉如珪孫男四永昶庚敏予帷閥閱之家鮮克由禮有若仲華閑雅整飾抱齊魯諸儒至行孰謂非賢邪予故特銘之以爲􅋍善之􅂇使人人取則仲華其不爲三代之民矣乎銘曰中恬而熈外㢘而隅惟義之是随大振厥家尚質去華肫肫乎無涯有巋者山有冽斯泉靈氣之欝芊體魄斯安継以永年崆峒雪樵賦有序劉君宗弼家于贑之空同山陽學贈而文雄甞擢進士第入教成均出任浙江部使者之􅀉聲光已赫然矣君乃退然弗居方以空同雪樵自號其殆顯幽一致者歟非賢而有徳者盖弗䏻也君間請濂賦其事雕䖝篆刻之學老且亡去黽俛操觚雖用賦體而比物成義爲多君之西還或歌扵清泉白石問山靈聞之未必不辴然一􅀏也其辞曰伊空同之㧞起􅀆鎮嶠南之靈區翠旓􅌭其蕩空􅀆播顥氣之􅅋綏章貢挾以北流􅀆盎􅁟脉之滋􅃾穴遥通扵龍翕􅀆􅀔蟠亘扵欝􅀌信地維之奥宅􅀆爲靈真之􅀁都則有白鵞羽人黄唐丹士闢玉爲房鑄金成􅁰仰帝青以布帷撥赤霞而啓笥悼下土之坌獨凌剛風以逕度惟彭城之仙子􅀆式爛柯之遺􅁤謂靈奕之可􅀚􅀆意翩翩而遐舉裘剪鹿肥之花屨約芝田之蘂巾割湘雲之枝鞶􅀧彩鷮之尾傷胡麻之未飯愛白石之堪煑踰洞真之石扉借脩月之寳斧期緱笙之下臨􅀆庻緑文之可㖟于時玄冬届朔氣交水腹堅金莖髙二鶴夜語獨鳥晝韜莽六花之聚白合溟涬扵空寥幻九清之秘景闢太素之神苞奪人目睛􅀆若流汞翻空而不㝎一白無地􅀆如爛銀炫燿扵霜皐瓊林玉􅀣疊頴聮柯條頓亡扵春緑蘤巧綴扵晴梢乃陟瑶磴乃依氷樾膚中寒而生鱗指屡僵而弗屈丁丁許許不遺餘力巳枯成采方長不折玉屑随聲而輕堕霜莖􅀝雲而􅀄積束以九真之赤藤附以千年之苓魄既消揺而咏歸忘蕉鹿扵今昔歌曰我采我樵􅀆太濛之野萬􅀣瓏􅌑􅀆玉光照夜孰􅀎相􅀙􅀆與霓旌而俱下扵是築石竈繙金經飬神火煉黄寕汞生水虎之窟鉛出火龍之扃液承太乙之珠機運元華之精憑􅄈抽之卦劵植鄞鄂之丹城逮伐毛而洗髓致隂爍而陽凝種芝扵瓊玉之山折桂扵廣寒之庭領衿佩扵橋門集鵷鷺扵王庭白簡霜飛繡衣春明近一出而持斧使九夏之生氷㝎棄風而来歸􅀆􅀅瀛洲之先登隔人間之風雨􅀆􅃍真凡之異程至若西隣之子沈酣羶葷屏亀香􅍼笙火花春葆階舞楚銀舘歌秦黄塵迷南華之夢弊屣嗤東郭之貧樂鍾鼎之遺􅃩厭􅃄霞之近醇尚父釣渭阿衡耕莘或封齊扵東海或致君扵華勛齊出處扵一􅂗肎變志扵屈伸世􅌭紛􅀆麗以新蠟代薪􅀆傷芳辰翻海水以爲霖􅀆曽莫濯夫㳺塵孰不化爲胡燕􅀆依華榱之飛文丹禽鳴夫空谷􅀆亦寥寥之一聞彈樵歌之逸響􅀆􅀉緑綺扵秋旻歌曰若有人􅀆在蘭厓止白虎爲使陟崇􅇖止皓毳逥飊敷天葩止虚白内朗絶纎瑕止仁斧義􅆷龍锵鳴止鵜膏匪施痂弗形止剪彼薪樗扶松栢止飬賢大鼎熟以烹止天下爲公大道行止遡風屹立思盈盈止宋學士文集卷第十五宋文集卷五
