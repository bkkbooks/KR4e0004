body:
  text: 元􅀮君子東陽陳公先生鹿皮子墓志銘婺之東陽有􅀮君子戴華陽巾裁鹿皮為衣種藥銀谷澗中當春陽正毁翫落紅扵飛花亭上亭下有流泉花飛隊泉中與其相廽旋良久而去君子樂之日往觀弗厭既而入太霞洞著書其書縦横辯􅀶孟軻氏而下皆未免扵論議元統間濂甞候君子洞中君子歩屧出速坐之海紅花底戒侍史治酒漿􅉁醢親執斚獻酬歌古詞以為驩酒巳君子慨然曰秦漢而下說􅀴而善者不傳傳者多不得其宗淳熈以来羣儒之說􅀹與洙泗伊洛不􅀋余悉屏去傳注獨取遺經精思至四十春秋一旦神㑹心融灼見聖賢之大指譬猶明月之珠失之二千年上自王公下至甿􅀠無不倀倀日索之終不可􅆀牧豎乃􅀗扵大澤之濵豈可以人賤而并珠弗貴乎吾今持此以解六經决然自謂當㫁来􅀃扵吾後云濂乃避席而問曰其意云何君子曰吾以九疇爲六府三事而圖書爲易象者不可誣以片言統萬論而天下古今無疑義以庸言􅇚經于而野人君子無異辭謂神􅀁知之謂智知天下殊分之謂禮知分之宜之謂義知天地萬物一體之謂仁禮復則和之謂樂謂天地萬物一體經子之會要一視萬物則萬殊之分正家齊國治而天下平矣濂未達請復問其詳君子曰國家天下一枳也枳一爾而穰十焉枳有穰而一視之其扵人則仁也發而視之穰有十則等有十其扵人則君臣父子長幼之等夷刑賞予奪之殊分􅀁謂禮也視十爲十者禮之異視十爲一者仁之同分愈異則志愈同禮愈嚴則仁愈篤者先王之道也分愈異者志愈同故合枳之穰反求其故地枚舉而銓次焉者差之􅁰銖則人已無别犬牙錯而不齊歛之不合而一不可見禮愈嚴者仁愈篤故治國家天下者不以禮則彜倫斁禮樂廢而仁亡是故洙泗伊洛朝夕之􅀁陳者天下萬殊之分視聽言行之冝􅀁操者禮之柄耳故學聖人者必始扵禮焉故一體萬殊者孔子之一貫扵洙泗伊洛之言無不統者也理一分殊之義廢則操其杖葉而舎其本根洙泗伊洛之㑹要不可見章句析而附會興遺經不可識矣濂受其說以歸間嘗質之明經者或者曰近時學經者如三尺之重觀優扵臺下但聞臺上語􅀏聲而弗􅀗見其形􅀁以不知妍媸唯人言是信君子之論偉矣或者曰伊洛之學大明扵淳熈未易􅃍取舎之也自時厥後為貧㳺仕奔赱扵四方不及再候君子以畢其說聞君子益以斯道為已任汲汲焉惟􅂲不傳靡晝靡夜操觚著􅀁見扵書書成卽刻梓示人復貽書扵濂白予瀕死吾道若無􅀁授子聰明絶倫何不一来片言可盡也憂患相仍亦未及往而天下日趋扵亂君子之室廬亦燬扵兵寓子婿王為家㽞六年之久遘微疾黙坐扵一室不食飲者踰月縣令遣醫来視疾君子麾云曰吾年八十又八其死宜矣何藥之為未㡬翛然而逝實至止乙已十月戊申也君子姓陳氏諱樵其字為君采人因其衣鹿皮故又􅃅為鹿皮子表􅀮􅃐也其先居睦之冨春宋之中葉来従東陽太平里世為衣冠巨族曽祖居仁祖嚞登仕郞父取青國學進士􅀙郷先生石公一鼇與聞考亭之學有志節嘗􅎨章詆權臣賈似道誤國及宋亡元丞相伯顔見其章􅁒用之辭君子㓜學扵家庭繼受易書詩春秋大義扵李公直方其扵天下之書無不讀讀無不解學成而􅀮􅊬然不與世接唯寤寐群經思一洗支離穿鑿之陋形扵談辨見扵文辭恒懇懇為人道之文辭扵状物寫情􅀹精然亦自出機軸不蹈襲古今遺轍讀之者以其新逸超麗喻為挺立􅀌松群葩俯仰下風而莫之敢抗或就之學則斥曰後世之辭章乃士之脂澤時之清玩耳舎六經弗講而事浮辭綺語何㢤少作古賦十餘篇傳至成均生徒競相謄寫謂絶似魏􅇔人􅀁㯢君子則諱之不復肯為也君子􅁕跡未嘗出里門而名聞逺達朝著知名之士若虞文靖公集黄文獻公溍歐陽文公玄皆慕之以為不可及移書諮訪如恐失之性復至孝父患風攣君子扶之以行􅀊久益勤後為風痰􅀁侵氣弱不􅀎吐君子截竹為筩時吸而出之母郭夫人殁君子不見見其遺衣輒奉之嗚嗚而泣生平未甞言利苟非其義千駟萬鍾弗為動家雖素饒扵貲痛懲膏梁之習惡衣菲食以終其身遇􅀊儉輒竭粟賑里閭自取来牟以續其食嘗發􅀁蔵錫為噐工人持歸乃白金也悉易之或以告君子君子一咲而巳嗚呼君子已矣世豈復有斯人㢤君子􅀁著書曰易象數新􅀃曰洪範傳曰經觧經曰四書本㫖曰孝經新􅀃曰太極圖解曰通書解曰聖賢大意曰性理大明曰荅客問曰石室新語曰淳熈紏繆曰鹿皮子曰飛飛觀小藁合􅁆百卷君子正配朱氏先若干年卒生延年大年􅂄年喬年昌年大年至正庚寅中鄊闈乙榜苐一署徽州路歙縣教諭側室某氏生逢年君子沒時諸子唯喬年在餘皆先卒女三人其壻即王為次則俞某張紹先孫男九人庭玉庭珪庭筠庭鸞庭鳳庭堅庭誨庭其庭某女四人適徐信俞本虞某某曾孫男五人紹宗超宗林宗某宗某宗女三人在㓜喬年庭堅等洎王為以是年十二月某甲子奉柩􅁙扵縣西南四十里懐徳鄊斗潭山之原縣長貳及學士大夫門弟子咸㑹莫不洒泣塟後五年其髙第弟子楊君芾乃為撰列行状一通而喬年同王為持示金華宋濂再拜請為銘嗚呼君子以超絶之資矌視千古若一旦暮期以孔子為師而折􅂨羣言之是非不徇偏曲不尚詭隨必欲暢其巳􅀃而後已可謂特立獨行而無畏懾者也非人豪其􅀎之乎雖然淳熈二三大儒其志􅀅以明道也初亦何心扵固必使君子生扵其時與之上下其論未必無起予之歎而君子之衆􅀃亦或藉其損益以就厥中則􅀁造詣者愈光輝混融而卓冠扵後先矣天之生材相違而不相值毎如此竟何如㢤然君子措慮之􅀷望道之切其􅀁傳者確然自成一家言殆無疑者世之人弗察伐異黨同常指君子為過髙是豈窺見其衡氣機者㢤濂也不敏􅀼有慕洙泗伊洛之學有志弗強日就卑近不􅁕以測君子􅀁至之淺深而君子則欲進而教之今因請銘故備著昔日問荅之辭扵其首後之傳儒林者尚有􅀁稽焉其稱為君子者君子盖有徳之通稱尊之可謂至矣銘曰洙泗傳聖髄􅀆伊洛發遺精天人既混合􅀆陽隂悉苞并無聞不開闡􅀆金石奏和平自兹益演繹􅀆白日中天行如彼藝􅁰稷􅀆薅去莠與稂舂實成白粲􅀆詔使来者嘗有夫起東海􅀆吐言一如鏞噌吰違幽􅀮􅀆務使聲逺􅀭豈欲異塗轍􅀆理􅃱無終窮著書動盈車􅀆片言􅀋括囊中有萬寳玉􅀆包絡無遺亡觧之溢衆目􅀆􅉞異吁可驚似茲海外珍􅀆神光燁如虹茍施琢刻工􅀆㝎可獻明廷下可奉公侯􅀆上可奠方明胡為堕空山􅀆枯槁埋光晶鹿皮剪為裘􅀆峩冠䞉垂纓臨流翫飛花􅀆心與烟霞􅁳清風與逸氣􅀆横絶字宙中食道身自􅃾􅀆疇計禄位豊婆娑太霞洞􅀆卒以上夀終斗潭向東流􅀆内有八尺塋􅀑神必訶衛􅀆靈氣結華英永為文字祥􅀆千祀垂休聲元故承務郎道州路總􅃹府推官李府君墓銘東陽李思文􅀙州縣辟舉試校官吏部吏部移禁林儀曹同命題試之既中選􅀅歸涖教事謁濂成均再拜而起涕下如綆縻良乆乃曰先府君之殁三十四年矣憂患之相仍金革之紛擾餬口四方曾無寜􅀊今天地清寜六合一家􅄑重卜宅兆改葬先府君于髙原之上而縣繂之碑未有刻文敢奉行状以請子知先人者冝為銘濂諾之乆未及為思文復貽書見速情辭愿欵讀之令人感動王事有嚴雞􅃅即乗馬出逮還且已若懸鼓矣深慙有􅀌孝子之意扵是􅅡燈牗下按状而序之曰府君諱􅁉字公饒姓李氏其先自洛陽遷桐江九世祖著復自桐江遷婺之東陽著之孫悅字公瑜當宋宣和庚子方臘叛其黨来㓂縣悅與兄匿灌莽中兄爲盗􅀁執􅁒兵之恱亟趋出願以身代昆弟争相就死㓂義恱之爲荷戈而去及㓂平越帥劉忠顯公統軍至欲悉誅􅀙亂民恱時與莫府議諫止之活人􅁆千恱生皓皓有六子十三孫皆惇尚詩書而簮纓蟬聮􅀙此始其事詳載家乗此不書諸孫有諱大同者􅀙朱文公吕成公㳺登嘉㝎癸未進士苐仕至寳謨閣直學士通議大夫工部尚書君之髙祖也曾祖諱自立淳祐􅉝丑進士通直郞通判慶元軍府事祖諱箎登仕郞監寜國府城下酒麪務父光逺值宋亡爲元不屑仕後以府君貴贈承事郎同知汴梁路許州事妣某氏贈宜人府君㓜失父母鞠扵㛐氏事諸兄有若嚴君既就外􅀓即知家學相仍之盛確然思以踵其後􅀤扵聲詩皆中繩尺甫冠聞許文懿公講道扵八華山中躡􅄚􅀙之推明濂洛關閩之學乆之因喟然嘆曰學之􅀁貴者明體適用苟不見諸用猶玉巵而無當未見其可也乃徑别親友杖䇿逰京師撰至治聖徳頌一篇詣丞相府上之丞相以聞英宗召見玉徳殿令􅀫衛禁中居無何翰林羣公以府君才藻清麗不當在持㦸之列遂奏爲國子生㑹虞文靖公来爲􅀕酒極噐府君每有撰􅄒輙瞑目倡言可書云云府君執筆次第書云云及文成朗誦扵公前公遂指授以制作之故􅀁謂篇章字句四法逐一縯繹之府君之學扵是大進薦紳之家争欲府君出其門下天暦巳已國子分監扈􅀙上京􅀊適當賔有㫖命就試府君領開平府薦送至順庚午擢進士上第授承事郎同知汴梁路陳州事有朱衣象笏之賜􅀄大河南决州民扶挈旄倪赱旁郡凍餒道路倀倀無􅀁歸及河復故道府君適至與民約曰爾亟返安尓妻孥治尓田廬科繇之事吾為尓緩諸民曰衆未敢還者正坐此耳相率而歸至􅁆千人蔡河亘城北舊建橋以利􅍱者河水􅁀悍齧橋橋善圯府君重作之檄属邑五長吏分程集事不日而功成倡優為戯劇以射民利晝夜聚觀皆廢􅀁執業府君患之捕寘于法有挾權貴人勢􅁒脫去者府君持之愈急一城震悚俗尚􅀑當􅀊時之􅂩往往斬羊豕為牲使巫覡歌舞以樂􅀑比屋相倣以為不若是則厲氣􅀅作府君召閭師里胥語以􅀑神情状亹亹數百言逓相奔告其俗遂變市設駔儈本以求民平黠者反舞智病民畏其近官茹抑􅃘苦莫敢赱白者府君擿發􅀮伏橽諸市而易之州有學乆廢弗治府君往舎菜巳周視後先皆傍穿上漏不􅁕以障雨風慨然曰此教基也使其若是可乎即命更朽腐為堅良治丹堊而􅅚之復聘賢師儒使坐堂上申􅅚五倫之教民大恱部使者行郡嘉之舉府君可任臺察之職章上不報府君既滿秩遂謁選京師巳而其子彪死干家君傷之欝欝成疾荏苒踰二年竟卒扵旅邸時重紀至元戊寅正月癸丑也享年四十有五卒後一月中書始改承務郞道州路總􅃹府推官命雖下不見拜矣府君配蔣氏􅀅仕佐郎典用監知事吉相之女封宜人後一年卒子男五人長可道以府君䕃任蘄州路黄梅縣稅務大使次貫道至正甲午進士将仕郞饒州路鄱陽縣丞未上辟􅉟事院􅁺史後十九年卒次即彪次順道次思文入國朝為東陽縣儒學教諭即来請銘者女二人適趙古臣盧璡孫男七人思志思孝思恭思悌思禮思祖思儉府君既沒貫道不逺五千里奉柩南還家徒四壁乆不克襄事後十年為至正丁亥十二月某甲子始與􅃽氏合塟西部鄊之錢塢堪輿家曰不利又二十年乃改塟懐徳郷黄山之原去尚書公墓二里而近􅀁謂重卜宅兆者其時則吴元年丁未十一月之癸巳也濂生也後少府君十有六􅀊􅀄識府君扵婺城之南容儀秀潔如玉􅀣臨風皦然美丈夫也及讀府君之詩曰中行齋藁者姿態閑婉復􅀋其為人心慕􅃩之􅂅締忘年之交而九京不可作矣􅄑􅀗與府君之子貫道㳺同試藝扵鄊闈貫道既先登濂􅀼以謂府君之家科目相繼起貫道是舉􅁕以慰府君扵泉下曾未㡬何而貫道亦死矣嗚呼三十餘年之間而􅂘府君父子焉予􅄠􅁒不頒白其尚可得邪銘曰嗚呼府君可止扵斯椘椘其容儀衮衮其􅁱辭其才又􅁕以見諸設施使魯無君子者斯焉取斯嗚呼府君竟止扵斯雖五尺之童麄有􅀁知期必躋扵膴仕亦不虞其若斯豈天道之不齊抑人事之有參差自古以来何莫不由扵斯嗚呼府君其死孔悲年不踰扵五十學僅克扵一施則夫突梯而滑稽如脂而如韋壽享扵􅂄頥好爵之是縻者彼何人斯彼何人斯元故韶州路儒學教授曾府君石表辭府君諱順字至順姓曾氏郕國公四十九代孫郕國家扵魯十四傳至都鄊侯據始避新室之亂徙豫章子孫日盛大江之南言曾氏者皆宗焉又六傳至略遷扵臨川又十二傳至唐沂州刺史可徒生司空洪立司空生散􅀐常侍延鐸常侍又遷于南豐生四子長曰仁暠生志及文照南唐時又同遷臨江新塗縣之吉陽里文照舉童子科生乾度宋淳化三年進士仕至太常少卿贈刑部尚書志生易用易用生侃侃生髙安丞斧擢元祐六年進士第又遷縣之髙元里屏山之下生用先用先生嶽嶽生愿正愿正生翊翊生汝舟汝舟生兼善􅀎傳黄文肅公榦之學為時名儒生軍噐監簿天麒天麒倜儻有大志常居文信公天祥幕府又􅀙賈丞相餘慶等奉使扵元竟全節而歸則府君之父也府君性警敏自㓜輒有聞時信公之弟文惠公璧来為郡招府君與其子文荘侯陞共學陞既秀頴府君􅀎與之競爽其師胡君端一亟目之爲二俊當宋􅀄改物遺􅀺故老猶有存者監簿君日開尊共飲劇談先代文獻府君􅀙旁聽之有疑則問唯􅂲其不傾盡諸老爲之嘖嘖愛賞元至正中程文憲公鉅夫奉詔求賢江南􅁒薦府君才可用監簿君止之曾未㡬何部使者趙君孟迎以茂才舉署饒州路儒學録改􅀽州陞南雄州儒學正士皆服其化而爲率徳勵行之歸㑹科目詔行府君欣然應書不利退而歎曰吾􅀎損􅀁學以徇時好㢤因不復踐塲屋鄊友范文白公梈清脩之士也極慎許與憫府君官不充其才會御史銓選廣中力薦之扵是板授韶州路儒學教授未及上吏部巳别選遂止賢公卿多稔府君行􅁒强起之府君辭巳而長子受辟爲校官季子以春秋舉于鄊取苐五名文解府君喜曰吾何以仕爲乃陶然自放清泉白石間與髙人逸士相㳺樂府君被服儼雅揮麈談咲皦然如霞外人世間塵土不可得而侵也善鍳㝎古噐物暨法書名畫毎傳玩以為適或取琴鼓一再行焚香黙坐超然與造物者㳺一旦遘疾預告終期召婚友入榻前與之言别意甚懇懇介婦方歸寜命趣之還既至正衣冠起坐撫㓜孫頂曰吾遅汝久矣復東首而卧翛然而逝實至正七年春三月某甲子也夀七十有五歛之日風雨晦㝠室廬之後大木俱㧞君子異之九年春正月壬寅奉柩葬于屏山麓堪輿家謂不利以某年月日改葬同里夏方之原府君孝友天至監簿君得痞疾甚劇府君泣禱上下神祗夜夢三士告之曰服二附湯當瘳巳而果然歷十餘年方沒監簿君沒大母陳夫人年垂九十府君愳夫人之哀夙夜祗奉唯􅂲少咈其意夫人安之曰吾子雖亡不沒矣季弟甫齓出為伯氏後仲姊生四子而夫亡子絶㓜茫不知􅀁為計􅀙父兄􅀌子凡三倀倀無􅀁依府君皆鞠飬教訓之使至成立且歸其産􅀁入毫毛不以􅀻其與人交一裁之以義郡守李章肅公倜聞府君為佳士禮下之李公後以誣免官其門可羅雀府君事之益勤别駕髙翔其知府君不下扵李公及改守浮梁􅁒一見府君赱書速之府君即日命駕既見相勞苦甚勤未㡬徑上馬出城去翔聞之大驚追餞十數里且曰公􅀎逺来何􅃍往如是邪府君曰既見君子不還将焉求翔歎息而去性􅀹仁慈振貧䘏匱每不遺餘力臨川姜肅長沙譚志仁旴江王旭皆顛沛流離數瀕扵危亡府君􅀎振之是三人者徳之謂殺身亦不􅀎報云府君容貌魁梧須髯如㦸為文辭不務鈎章􅁄句而壹以理勝當是時若吳文正公澄虞文靖公集皆海内師表每稱府君之賢不少置則府君信賢矣􅀄監簿君著史學統紀一卷未及成而􅃿府君􅀘完之府君􅀁著詩文若干卷因自􅃅唯庭遂以名藁吳公為序作者之意今蔵扵家府君娶義門劉氏克盡婦道前三十一年卒子男子三人長曰紹唯平陽州儒學教授次曰斯季曰魯承事郞祠部主事􅀓極羣書而文辭龎蔚學者師之子女子一人分冝縣儒學教諭聶景堂其壻也孫男七人曰垕曰基曰壡曰均曰埴曰塾曰圭女六人長歸某餘未行曾孫男六人曰某曰某曰某曰某曰某曰某女四人在㓜嗚呼聖賢之裔自北而南者若孔氏之扵衢顔氏之扵蘇扵閩曾氏之扵豫章皆多子孫而曾氏為􅀹盛紆朱拖􅂵以顯融于時在在而是常侍五傳至文㝎公鞏兄弟者出遂以辭章名天下何曾氏之多賢邪府君之先盖與文㝎公同出扵常侍奕世以詩書亢其宗府君雖不􅀗大用屢司教鐸蔚為經師達賢太官亟稱交薦可謂無負扵家學者矣府君之葬翰林待制杜公本國子司業曾君堅既為前後撰銘刻諸幽室而魯嘗與濂同脩元史寅縁交誼復来求隧上之文濂間較徳焯勤在古者不厭其詳故為表其行而益之以銘銘曰郕國傳道自孔門遺澤滂􅐮苗裔蕃有如大江􅀙西奔支流雖千㑹一原重珪疊組光燉燉著勲昭徳􅁉後昆夫君􅁇之如玉溫嶄然頭角譽弥敦目為二俊起􅌭繙三為人師教道尊書詩爼豆習禮文鄒魯其俗澆為淳自内而外本則存大木斯㧞風霆掀人琴俱亡海氣昏學子􅄃涕為招魂刻文墓石􅀭清芬故鄱陽劉府君墓志銘君諱謙字友諒姓劉氏其先出自彭城唐未有名汾者仕至鎮南軍節度使生十四子一子曰漢吞始徙鄱陽圖譜䘮至君不知其㡬世君善積居之術以貲雄扵郷父母殁廬墓終喪事三兄謹慎三兄􅂉酗酒破産君屢贖歸之因自懲以全其家他族昆弟析財致訟乆不解君召而􅀹之皆頓首免冠謝相讓為善行巳而割田来上同微公我等㡬為吏􅀁魚肉且失同乳心敢奉此為公夀君􅀏而麾之自是鄊鄰有闘者赴愬君得片言則拜舞去甚者􅀎自愧摇手相戒勿使劉君知至正末兵亂且大饑惡少年烏合為盗椎埋剽掠無不為夜有執火簿君廬者君倉􅋉率妻孥遁泉布悉為􅀁攈豪傑徳君者部勒壮士捕少年屍之懸首干門君歸見之擲于郊縦其家􅀵􅄟盗聞寘􅀁攘户外而去他日盗益熾巨室盡燬獨君家屹然風日中君時避地萬斛山為盗􅀁執将搒以求金忽一人躍出曰此翁甞恩我不可害不可害君頼以免性喜讀書積至􅁆千卷為文辭貴理勝不尚浮縟人稱之髙祖某宋某官曾祖某某官祖某某官父某妣程氏配室李氏前君一年卒子男子一徳􅁉子女子二蒙古學教授陸士竒及胡璉其壻也孫男三人曰仔肩曰鼎和曰吉仔肩以文行名君生扵至元乙酉十二月二十九日殁扵至正癸巳十一月二十五日夀六十有九卜以是年十二月某日塟干堂鄥山原距君􅀁居僅二里君既塟仔肩持張祠部丁􅀁次状求埋銘金華山中余以病弗及為去年春蒙恩召入禁林與仔肩㑹京師仔肩復申前請為􅀹切禮宜銘銘曰行孚扵家而施及扵鄊如彼泉流肇扵濫觴其始則㣲其終則彰此為有徳之士之蔵雖亡弗亡故髙府君壙銘髙府君殁扵建業時建業新附人情未安殁之明日其家僮即具官歛權􅄟西門之外郊􅄟巳間􅀜往報府君季子暉暉方􅀙軍丹陽􅀅達僮卒于道暉因弗及聞一旦有告暉者曰爾父殁巳久矣暉白即軍帥往求之則當時執後之人皆征戍逺方無一人在者暉彷徨西郊外但見白烟凉草叢塚纍纍不知孰為其親體魄之蔵􅃅慟㡬絶者􅁆四自念無以慰罔極之恩乃命畫師識府君者追貌其象裝潢為㡠軸事之如生雖若可以自解然終未􅁕以盡其誠扵是請國子録張君丁件繫府君之行以成書謁子豫為之銘他日招魂旋其郷欲具衣冠塟之且勒銘貞石以示子孫扵無窮焉余不敢不􅀎用府君也府君寡言咲與人交不為翕翕􅀬久而益親人自不􅃘厭去嘗築室曰進齋監察御史孟公昉為之記人因以進齋􅃅府君云府君嘗教其子曰我家近扵海濵以􅃓馬植門戸田桑供衣食雖不多讀書家法素謹至今弗敢墜尓曹益務力善毋為祖考羞使他人稱汝為善士我死目亦􅉂不然雖日􅌠百羊馬饗吾吾􅀅不食而吐之矣世以為名言府君娶懐孟馬氏生三子長某次桂榮殁于兵次即睴國子助教府君享年六十卒扵某年月日塟扵某年月日墓在某縣某鄊某山之原嗚呼戎馬擾攘之際人得令終者鮮矣縦得令終即具棺歛而蔵之者􅀹鮮矣縦得歛且蔵得有賢子孫追慕而不忘者鮮之又鮮矣縦有子孫日追慕之其有状其善行求文以刻諸墓門者則又絶無而僅有者也府君之死固為不􅄑今有令子若暉者汲汲圖文以托府君扵不朽府君似可以無憾矣銘曰其名則武其行則儒其内則嚴其外則舒其超然㧞萃者歟其確然有守者歟元故静江路大墟務稅使王府君墓志銘王府君諱善字復善其先由鐘􅁜徙金溪自曾大父重大父榮彰父寔雖無仕者皆以徽行聞扵人人府君成童時人試以属句脫口成對比物别􅀋為精巳而學為詩輙取􅀎聲年十三父䘮去御家事尋操竒贏之術㳺七閩家乃大穣自歎蚤廢學力迪其子以經術築精舎一區聘碩士居之朝夕䇿厲若斯湏不􅁯去者俄俾􅀙師二千里外膏梁之饋絡繹道塗曽不以為煩及見長子經用禮經連領鄊薦喜曰有子􅀎通經吾雖廢學政復何憾至正中天下兵動江右化為盗藪府君室廬盡燬崎嶇携家走山澤􅀎以智馭下帖帖然寜且資用亦無乏絶智者心服之先是有授府君南豐醫正者府君以醫為一藝弗上方嶽大臣又薦為静江大墟稅使亦不就至是翛然自放山水間舉觴属客撫髀髙歌遺落世事或飲至一石不亂未㡬以疾終夀六十三實洪武戊申五月十五日也卒後三年當􅉝亥某月日塟柘歩山中禮也府君娶曾氏子男三曰經承直郎刑部司門貟外郞曰綸金溪醫學教諭曰慶郞蚤卒女一胥豫其壻也一夭孫男五曰翼曰興曰憲曰徳昌曰有慶予嘗聞經言府君之善行不止是其事親􅀹孝視聽恒在形聲之先奉􅁇母亦如之遇羣季多友愛人取以為法嗚呼若府君者其􅀁謂一鄊之善士非邪銘曰孝聞于鄊道則􅁢臧閟不自耀唯子之教彼遺金籝我以一經賢愚殊􅁤曰圖其始學之爾惇􅁕昭手文吁其死矣不復還矣孰廓其潜太氏史濂故東吳先生吳公墓碣銘惟吳氏􅀄自延􅁜而分圖譜之􅈰廢不􅀎詳其爵里世次五季末有諱嗣者自廣信􅁶撫之金溪其諸孫宋含光尉􅀖基皆稽首聽命他鄊爲亂者皆罹草薙禽獮之慘或無孑遺獨先生之鄊􅀗免及入國朝撫州守侯君元善聞先生名􅁒聘起之先生以病力辭洪武庚戍江西郷闈試多士府判官王黻夢州城中迎状元既而先生之子伯宗實在首選明年􅉝亥對䇿大廷復以第一人賜進士及第召見奉天殿授承直郞禮部貟外郞或者以夢之前徴爲先生世科之符而先生巳殁不及見矣先生之殁在􅉝亥二月二十八日上距􅀁生大徳丁未之􅀊得年六十有五配何氏生丈夫子三人長即伯宗􅀄名祏今以字行次禴次祁皆以經術敎授州里女三人曾雅周禮黄顯其壻也孫男一人某女三人尚㓜初伯宗㑹試南宫予嘗奉􅃙與考試事伯宗因来謁以先生文集序爲請予未暇爲而先生訃音至矣伯宗乃泣拜求撰墓文􅀅還以其年某月日塟里之毬塲山且勒文懸繂之碑予聞世之右族重珪疊組者有之矣索其家學相仍􅁆世而弗墜十百之中或一二見焉况夫科名尤造物者之􅀁靳㢤今先生之門何其奕葉聮輝至扵如是也此無它山厚則木繁海深則川聚其亦理勢之必然耶自時厥後繼繼繩繩予知未有艾也雖然先生之學則又在乎科目之外經不可不窮也徳不可不脩也業不可不廣也欲法先生者法此􅁕矣是冝銘銘曰吳氏之裔何蝉聮􅀆科名接武代多賢􅀆先生承之志益騫􅀆嚅嚌道􅃾渉幽玄􅀆衮斧法嚴聖有經􅀆􅀓者角立分户庭􅀆我􅄨至􅀮發精明􅀆剔抉浮翳朗日星􅀆窮經致用時則屯􅀆薜衣椒冠甘􅀮淪􅀆振􅀭敎鐸鬯乃文􅀆牗其天􅂨徳潤身􅀆世降俗偷病逾深􅀆方􅀝俞盧起痼沉􅀆秘其正陽平羣隂􅀆儒行之卓罔弗欽􅀆一鑑之亡我心傷􅀆其人雖逝名則良􅀆有寜一宫氣欝蔵􅀆焯徳著羙薦以石章􅀆故熊府君墓志銘熊以王父字為氏盖本扵椘鬻熊之後至曾孫繹成王封扵丹陽丹陽今之江陵枝江也其後徙扵南昌若太常卿逺臨江尉曜戸部郎中執易皆南昌人執易為右補闕與陽城同上䟽極論裴延齡之姦君子多之其裔孫某復徙居扵臨川某生繹好施與貧病無告者頼焉性􅄝浮屠氏􅀃嘗􅂢田七千三百畮􅂌其徒其徒以居士􅃅之三傳至宋迪功郎公􅄾迪功生待問亦迪功郞待問生鄊貢進士紹祖進士實生府君諱本字萬卿一字萬􅀄㓜頴悟經史一覽輙成誦父子自為師友時家巳窶無蔵書可觀毎假扵薦紳家懸燈夜讀至夜分弗自休年十五入鄊校習科目之文􅀻試􅁆占前列十八即下帷講授郡之俊乂多􅀙之一時名士如􅌿軒孫公轍天傭熊公朋来麟洲龍公仁夫文安掲公傒斯皆交相推譽或折軰行為忘年交翰林學士承㫖張公翥方為郡學録尤與府君意氣相傾會輙流連竟日唯􅂲其别去巳而以尚書貢千鄊再不利乃歎曰塲屋失得是有命焉我不敢必也茍窮經以􅅚諸躬其有不在我者乎吳文正公澄倡道扵崇仁山中南北學者翕然景附府君遂賃笈徒歩往􅀙摘經中􅀁疑七十二條反覆詰難吳公一一荅之中其肯綮府君為之喜而不寐間論古文尚書亹亹􅁆千言援據精切辭意超卓吳公噐之謂非時軰􅀁􅀎及宋季時須溪劉先生辰翁以文辭名一代人爭慕效瀾倒波隨府君獨疑其怪僻非文章大家因䆒極原委著之簡編質于虞文靖公集虞公以與巳意􅶁合亦噐之如吳公且以􅆂飬問辨為學文之源是朂府君自此以講學摛文為務視世之榮利如烟霞變㓕絶不􅁕以溷之向之俊乂来學者至是益衆府君舉聖賢之大指諄諄誨誘咸卓然有􅀁立雖其後更名他師而篤實有質行者則府君之􅀁啓也其遇子弟嚴威儼恪終月不見其有􅀏容夜則危坐今其誦書雞初􅃅則趣之起風雨不少廢府君之伯仲凡三析財别㸑巳久及父母殁喪􅀕之費頗鉅府君悉力自任不以煩之女弟一人未有􅀁歸亦擇名族而資遣之然天性仁厚或以虗偽相加壹接之以誠而人自不􅃘欺至扵䖏義利之間絲毛不苟也生平不屑理家政優㳺肥遯不知戸外有山川之險舟車之勞毎夕命觴徐酌哦古詩數章陶然自適如鴻飛冥􅁳了無繫累㑹四方兵亂長子鼎爲校官廬陵音問不通府君憂之往往形諸咏歌一日徧過故人門薄莫言還復張燈而飲飲微醺以鼎不在左右悵然就寢是夜大雷電以風鼓撼樓牗作伊軋聲府君披衣而起命蒼頭奴負階親升而闔之既降忽呼曰予􅁕輭矣奴以肩翼之至地府君右手倚肩左㩀階之齒而終時至正癸已􅀊二月四日也享年六十有六娶􅀺氏鄊貢進士天桂之孫女􅀎齊家內外整􅅚府君得􅁱業而無費者􅀺氏力也後十有一年卒生三男子長即鼎入國朝累官山東道提刑按察副使今遷中奉大夫晋王相府王傅次曰渙將仕佐郞開封府長津縣主簿季曰晋女二人適趙澂一適龐舉早卒孫男四曰綿曰赳曰繩曰昻孫女一未行府君殁後三年丙申之􅀊七月六日始卜塟扵金溪縣苦竹鄊之富塘原其􅀁著書有讀書記二十五卷經問四十卷讀史􅄛義若干卷舊雨集五十卷虞公為之序謂其雜著本理而敷暢典雅而不阿人以為實録外有朝野詩集五百餘卷吳山録三十卷仁夀録一百卷吳山即記吳門問辨之􅀁得者仁夀則手録虞公之文也今年春予與鼎會京師乃奉祠部主事張君孟兼􅀁造事狀徵予銘夫自吳公纉承伊洛之緒扵􅀅墜之餘完經翼傳抉秘闡幽􅀁以化導其徒者多成德達財出而用世固顯融于時其有􅀮于州里横經陳義使人厲士君子之行者亦往往有焉若府君者是巳嗚呼師道立則善人多濂扵吳公徵之銘曰咸口之里􅂵氣蜿蜒篤主偉人大道日降一綫之傳凛乎将堙勇撤其蔽􅀁覿者全行知尊聞罔間南北疊跡重肩􅀙者如雲君鼓其篋摳衣而前無疑弗馴雅奥難測孰鈎其玄百篇之文矧扵羣經孔䟽鄭箋􅂚其􅌭紛蒙蔀斯揭曰星乃懸有光燉燉屏斥詭誕以絶􅟵延以表􅀌存化行里州太和芊綿郁其成紋其養也㝎乗化而旋奚啻詘信有子而令珪組蝉聮遺澤之新仰睇飛雲俯臨逝川誰不顰呻惟行之粹惟石之堅勒文墓門故三槐隱士王府君墓志銘予以總脩元史被召来京與浙江部使者劉君承直㑹劉君曰承直嘗受經扵太和王先生先生之殁今七年矣而埋銘未有􅀁刻其子佑將奉狀以請􅄑為文之既而佑復申劉君之言涕泗而再拜予既荅拜與之成禮遂按狀而評隲成章其辭曰君諱以道字則臣姓王氏系出周司徒敬宗傳扵奉武成侯離生二子元威元遷琅琊威徙太原二族甚盛晋丞相導出琅琊之裔南渡時家于江左至趙宋時有諱崇文者来知吉州其従子殿中侍御史贄實􅀙之復遷居吉之太和太和之有王氏自贄始殿中君之後名圭開禧三年鄊貢進士君之髙祖也進士君生叔可肄業成均以辭章稱叔可生本初本初生性夫皆為名儒則君之曾祖祖父也妣劉氏宋知潭州事天㝎之孫女君資禀絶異自㓜學詞賦組織華縟見者翕然譽之巳而棄去曰此非􅀁以為學也􅁒求聖賢之道其在遺經乎扵是潜心窮研晝夜弗之倦時􅀙祖父遂初自國學上舎生還第􅀁交多宋季名士日集其門相與談前朝文獻纚纚如貫珠君􅀙傍聽之心領神㑹至忘􅃦食其學遂大進大徳末君出㳺中州主張伯剛家仁宗出居扵懐李秦公孟侍馬伯剛往言扵秦公以君為薦君獻詩一章仁宗覽之大恱君遂極論天下事曾未㡬何武宗即位立仁宗為皇太子伯剛邀君同至燕都君毅然辭之伯剛寵􅄑盛于一時及仁宗踐祚遂累官至汴梁路總􅃹復趣君曰上頗憶君君若往爵禄可致也君辭之如前君􅄝佳山水間一出㳺輒㽞連不􅃘去一日至洞庭之君山遇異人長鬛碧瞳如古仙人授以龍乕金碧丹經君受而行之氣志益冲鬯自􅃅為三槐隱士乃扵􅀁居種竹鑿池池上横以石牀角巾鶴􅌁日息其上子姓環侍之談􅄍餘音出扵水光篁影中其􅀮趣盖翛翛然時或賦詩以為樂韻度間曠一如其人云君性至孝父母皆高年君率羣􅀙奉觴稱夀唯􅂲稍違其驩暨殁哀􅃅戀慕㡬欲無生且惇扵友義族兄弟姊妹未婚姻者畢之伯叔之未塟者蔵之君子多稱焉至正末天下大亂太和禍尤慘殺戮到鷄犬羣㓂聞府君名指君廬相戒曰此王􅀮君家也慎勿毁之至今􅀗存君􅀁著書有詩集若干卷丹經新注若干卷其生以至元庚寅十月一日卒以至正甲辰六月二十二日有之是以似之故晦巖居士王君墓志銘王之受氏凡四曰􅁎曰媯曰子曰虜而􅁎姓之分復有二一出畢萬一出周司徒宗恭宗恭之族琅琊太原也萬之族則京兆河間也别有王叔氏王子氏王孫氏雖皆本扵姬又􅀁以别扵二族也其在琅琊者散居江南今浙河東西多宗焉睦之桐廬有王氏諱璵字君玉曾祖宗善祖叔祥俱􅀮遯弗顯父希曾為文儒君性至孝母􅀽氏疽發扵頸君憂形于色日烹藥以進殫諸方弗之驗君則泣禱于庭辭甚凄苦巳而疽决膿若絮鈎連不可㧞君吮出之毋輒瘳同姓有尚俠者藉權貴人為意氣效五陵少年所為勢烻烻動人人􅃩之反讓君為迂君曰吾性戇不􅀎随俗浮沉君尤我固宜俄庚午􅀊儉道殣相望孰不遏糴以獥善價君􅀎出粟賑之􅀊丙子視庚午儉尤甚君復賑粟如􅀄或曰王君非迂也其樂善人㢤或曰王君之知非小夫􅀁可測也君皆􅀏不荅􅀁居直香爐峯濯濯生翠若屏然君築重構其下時列爼豆集名勝士玩之嵐光浮動尊爼間􅀙容嘯咏恍不知九衢有㳺塵也君積而䏻散州里有貸泉布者久不庚多取質劑焚去然質直無偽民有競者直扵君君察其情辭曰爾過矣曰非爾之罪也各心服而還不翅訟于賢有司或强君出仕君謝曰􅄑有舊田廬食與衣亦僅給禄非所千也遂以晦巖居士自􅃅云年六十六以至正丙戍二月巳巳卒于家以庚寅十二月丁酉塟縣之金魚岡配􅀽氏子男子五人和義禮儁舉皆克􅁇先志舉尤知􅄝學當元之季復䏻合義旅以捍郷井人徳之子女子一人適􅀽采孫男五人圭纉權衡宣曾孫男若干人君卒後舉奉尚寳丞魏君潛狀来求銘魏君謂漢末王彦方少有行義郷里有爭訟者將質之或至塗而返或望廬而還君之行頗近之魏君同里人其言當可信况君孝扵親仁扵敗其衆擒􅓍者過半陞統兵元帥􅁇搗八陣指揮營扵瑞昌敗之進伐南昌遷天䇿衞指揮使僞吳圍安豐侯復赴援立功轉飛熊衛指揮使時安陸襄陽通泰皆未降大帥攻㧞之侯亦有力焉遂鎮徐州紀律嚴肅敵兵莫敢犯擢驃騎大將軍副大都督府事未㡬受詔戍北平往討沙漠與元兵酣戰遂死之洪武三年某月日也享年三十有三事聞􅃙贈推忠宣力效節功臣龍虎上將軍北平等䖏行中書省左丞上護軍追封燕山侯謚曰忠愍配享開平忠武王廟復􅃙翰林學士臣濂誌其墳惟侯志氣倜儻以身許國身經百􅀾為世忠臣可謂豪傑不羣之士一旦殁于王事其􅀌不得迎尸以葬卜以是年某月日蔵衣冠扵州之鍾離縣扵皇鄊某山之原起墳以表其䖏古者墳必有記􅀁以著其里居官爵卒葬􅀊月以示扵後者也今不敢廢因掇其㮣勒石以納諸竁云故王府參軍胡君妻項夫人墓志銘余授經青坊時龍泉胡楨嘗以伴讀侍皇太子研席禎因得􅀙予㳺今年春予以總脩元史被召来京尋入禁林為學士時楨巳擢宣武將軍僉䖏州衞􅃌揮使司事間以其先府君王府參軍深墓上之銘来属予既巳為之楨復泣曰先子之行􅄑托見扵文字間而先母未之有述􅄑先生憐之敢奉姻家兄章存厚之狀以請予義不敢辭按狀夫人諱某字某姓項氏䖏之龍泉人父某母某氏生十有七􅀊而歸于參軍參軍同邑人其父珏為征東行省左右司員外郎夫人既歸之明年參軍即往省覲遂補其省􅁺史越九年始歸初員外府君娶趙氏生參軍及二弟潭海趙氏既亡繼室李氏生某􅂲夫人與家政也使居扵外夫人無以自給與媵人日事機杼風雨瀟瀟青燈明㓕扵一室間人不􅀎堪夫人則怡然䖏之父母憐其勞勩將奪其志夫人􅃌庭前水曰俟此水西流吾志却當改耳不聽娣姒之間或譏誚之或轥轢之夫人皆不荅貟外君殁參軍自海外護喪歸塟夫人􅃝跣出迎􅂘參軍持夫人泣曰吾為親故不􅀗與夫人居夫人備歷諸艱而䏻完節以待予其與古之義烈何殊也夫人曰此婦人常事耳何􅁕上勤君子之念慮其後終不自言至正壬辰中原兵起浙水東州郡漸至繹騷參軍􅀙肖將軍剪除鄊郡羣盗間歲一来歸夫人携子女間關寨栅中亦䏻自安如獨居時已亥冬䖏州內附參軍朝亰師上竒其才命為右司貟外郎扵是參軍迎夫人以来時夫人已有疾挾醫以􅀙行暨至念及鄊里欝欝不自􅂓疾愈篤遂卒扵清溪之寓舎實􅉝丑七月某日也享年四十有二壬寅返柩扵䖏州擇麗水某鄊某山為􅃁以十一月某日塟焉夫人性㳤而行勤參軍有志事功視生産作業之事蔑如也其􅀘綴缺漏締搆生理唯夫人是頼及夫人死參軍衘命在䖏州又不䏻視其襲歛每對子言涕泗為之潸然夫人生二子長即楨次曰樞一女曰章其壻即存厚御史中丞溢之季子也夫自隂敎不行婦人女子䏻不易節改操者何其罕也間有以禮自持􅁒起古人而效之者人方羣訕而衆侮之又何習俗之不羙也有如夫人之行可不彰著以為世勸乎是宜銘銘曰猗歟夫人始終一節也羣言弗騰卒莫之奪也相厥夫子有偉其烈也乗化而盡又何怛也千載之下尚視兹貞碣也故陳夫人趙氏石表辭江西行省左右司郎中陳君敏之妻曰趙夫人以洪武二年二月二十三日卒扵京師之官舎越一月某日權厝城南聚寳山將以某月日返塟扵宣城某山之原會濂召入禁林陳君乃自狀夫人之行来謁墓上之文其辭􅆞綿而悲愴讀者哀之陳君之狀曰予妻趙氏某字某與予同為宣城人其父諱熊字子祥明詩傳訓詁學仕為某縣典史母孫氏典史君無嗣獨生子女四人而趙氏居其次特鍾愛之以予簮纓家子欲選為贅壻予時頗􅄝學手不離方䇿先君子憐予過厚不使逺去膝下典史君亦不􅃘釋之而他婚也竟以趙氏歸予趙氏旣歸奉尊章盡禮凡羞服唯其時猶惴惴􅂲有􅀁不及其姒郭氏亡奉予伯兄如奉舅焉人以為孝且恭其事予也視扵無形聽扵無聲予或牽扵事意有不恱毎甘言慰之嘗患痎瘧荏苒踰三千日趙氏視藥餌調食飲不知有晝夜在他人雖至勤慤者久亦生厭趙氏滋益謹及予登仕版出為湖廣憲府幕官遷江西召還為大理評事轉刑部員外郞官書有程戴星而出戴星而入家事若不䏻相渉者趙氏一力荷任之而畧不見艱難窘澁之意人以為順且賢嗚呼奈何司化權者􅃘奪之而去邪􅀄亰城多火災予適讞獄郢中趙氏􅁆受驚因􅆀怔忡疾暨還奉詔備刑書抱衾禂出􅀫省中者㡬半載間一歸輒復出趙氏懼貽子憂不敢以疾告巳而疾䆮劇乃謂予曰妾心中殊不佳欲得平胃之劑服之予亦未暇荅居亡何竟卒嗚呼奈何司化權者􅃘奪之而去邪㸑下嫗與予言趙氏自去冬以来語及親舊之存亡每汍瀾流涕􅀹撫愛所生子見其􅀎食喜見顔面曰是児可以飬吾無慮矣以􅀋乎前知者臨殁之際相呼之聲不絶于口予􅀵泣謂之曰吾不知汝之疾􅃍至扵此也設有不諱吾無以報汝功祀汝父母至扵終身撫汝之子以望其成立爾言未既趙氏泊然而逝視其敝篋無遺珥及完衣焉嗚呼悲夫予念趙氏生男女三人皆夭晚得慶生即前􅀁謂撫愛之者日􅈱􅈱以泣縦鐡石作心膓不䏻堪趙氏歸余十五年與予同貧賤同憂患同冐渉道塗何􅀁不至今􅄑霑寸禄􅀼意相守至髪白得夀僅三十六而亡予與吾子交者甚久墓門有石願為文之非惟慰死者扵九泉亦􅁕以攄予無窮之悲也濂聞之女教不行扵天下婉淑之道消而􅁀慢之風盛孰有如趙夫人之賢者乎賢者不彰之則何以為世道之勸是宜銘銘曰猗蘭方郁奈何萎也茂草宜剪却紛披也天道玄遠信難推也勒辭貞石􅂓以宣其悲也故贈承事郞浙東道宣慰使司都元帥府都事陳府君墓誌銘丗之為人子者未嘗不欲顯其親欲顯其親唯載諸史牒可以傳扵悠久然史法有例非顯官貴臣及勛業殊異者不書焉扵是往求辭章之家採著行實掲扵墓門及其至也與史牒相為表裏庶或少慰念親者罔極之思或者以䛕墓譏之此豈人之情也㢤台之黄巖有􅀮君子曰陳府君多馴行年六十九以至正甲午二月某甲子卒于家其年三月某甲子窆于縣東龍壇山後以次子昇貴贈浙東道宣慰使司都元帥府都事階承事郎昇懼府君之行弗顯于世使其子志持應奉翰林文字同郡楊君秉哲所為狀来乞銘予雖非辭章者流其􅃘拒昇之請而咈其念親之至邪狀言陳氏本居福之􅀱官代有仕者至樞宻直學士襄其名尤著襄字述古丗稱古靈先生古靈宋慶曆中進士自浦城簿遷仙居令其子若孫因留家焉厥後自仙居徙鄞或徙黄岩黄岩則府君之系也家乗屡毁于兵不䏻言其實為㡬丗矣府君諱勝祖自徳茂其曽祖某祖某宋朝奉郎有恂恂長者行父章甫獨守遺經朝夕潜玩視聲利事恒澹如晚􅀊􅀹􅀎安貧􅍳烟或終日不起澄坐無愠色府君奮曰吾父固安貧不思具滫隨以安親者其人子也㢤扵是操廢舉之方手畫心計而經營之未㡬貲財漸􅆀􅎋􅁉撫二弟甚至為之授室嫁女弟者三扵名閥一不以經父意唯日具珍饌奉之猶􅂲失父之歡心父喜曰吾有子如此吾將含􅀏入地矣人稱府君為能孝父既殁二弟求異㸑府君不􅀎止量其所存而三分之曾不數年皆蕩析無餘子號寒而妻啼饑府君惻然曰兄弟一氣所生榮悴頓異吾有目䏻􅃘見乎乃出􅀁受産復三分之人羙府君為䏻友非特此也族属之中若冠若婚若喪若􅀕府君無不助成之郷鄰有闘者多赴愬府君府君喻以利害咸欣然悅服而去府君生平以材自􅀒遭時孔艱不得展其用當酒酣耳􅀬輙登山臨水􅀙容嘯咏以􅂥其􅀌憤焉嗚呼若府君者其可謂有志之士非邪府君娶阮氏封宜人慈柔儉勤婦儀母道皆可法先一􅀊卒子男三人長敬先寜國路涇縣主簿次即昇􅄝學而知文承直郞浙東道宣慰使司都元帥府經歷孫男三人長志即来速銘者好讀古人書而精扵科目之業孫女三人一適同邑戴韶餘未行曽孫男一人文珪予在禁林銘賢士大夫多矣其績用昭著者易扵言而潜徳秘行者難扵形容也府君有才如此使其􅀙政必粲然可觀則予之􅀁書極扵焜煌當不止今之􅀁聞列而巳惜㢤銘曰有材而無位命也可傷孝友行扵家孰謂非政之良子令而仕厥聲孔臧扵燁命書下貫幽堂龍壇之山薦此銘章過者必式尚知為陳府君之藏宋學士文集卷第四鑾坡集卷第四
