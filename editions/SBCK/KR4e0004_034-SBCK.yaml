body:
  text: 御賜􅅴露􅄴詩序洪武癸丑正月始和越四日丙午時加巳皇上御武樓之便閣召御史中丞臣寜太子賛善大夫臣濂賜坐左右上談嘉祥之􅀿􅃙中貴人取􅀁儲膏露扵宫中俄盛以翠甖跪進上前皆玉潔珠圓世􅀁未覩巳而詔􅞿㸑器至用金杓煉水二升火既匀水􅀔成濤上起自龍帳中親啓甖以投湏􅁷融化與水為一上取杓中瀉二内侍舉幕承之查滓巳净重漉以綘紗囊上飲一爵而分賜臣寜與臣濂焉且曰此天地至和􅀁凝也卿等服之去沈痾而􅄛遐齡臣寜等跪飲其味􅅴如飴而弗􅕹其氣清扵蘭而不􅃩一入口間神􅀚殊覺爽越飄飄然欲御風而行扵是各奠爵扵几頓首于地而退臣寜謂臣濂曰唐之李白召對金鑾殿玄宗調􅃵以賜方䇿尚載之以示後世矧今聖天子親挹天乳以沃近侍㣲臣共享二氣禎祥此玄黄覆持之恩不可忘也宜發爲聲詩以彰君之賜臣濂伏聞王者有徳上通于天嘉氣恊􅀿鴻羡滋播今甘露頻䧏大和坱圠民物敉寜洽于大康是皆一人有慶使臣庻永有攸頼方􅀅􅆂育靈澤衣􅀍上徳惟思日孜孜以圖報爲事皇上不自滿假􅃬􅁵羣臣霑丐天􅄴上昭靈貺此與黄帝出馬腦甕甘露頒賜百僚之意同誠非玄宗之􅀁擬也盛徳􅀁覃接肌蔵髄矌世竒逢豈容喑黙乃稽首再拜造詩一章以侈上之賜􅀙而属和者凡􅀂干人録成一卷傳示萬世子孫荷天之休至扵無􅆠云恭䟦御賜詩後臣聞自古人君有盛徳大業者其積慮深長而詒謀悠乆必日與文學法􅀙之臣論道而經􅀖當情意洽孚之時或相與賡􅁔或褒以詩章或燕之内殿君臣之間實同魚水非直以為觀羙􅀁以禮賢俊示寵恩而昭四方也有如唐之文皇宋之太宗其事書諸簡編者可以見之矣皇明紀號洪武之八年秋八月甲午皇上覧川流之不息水容澄爽油然有感于宸􅂨陋尹程秋水賦言不契道乃親更為之賦成召禁林羣臣觀之且曰卿等亦各撰賦以進臣率同列研精覃思鋪叙成章詣東皇閣次第投獻上皆親覧焉復寘品評扵其間巳而賜坐􅃙太官進天厨竒珎内臣行觴觴巳上顧臣曰卿何不盡飲臣出跪奏曰臣荷陛下聖慈賜臣以醇酎敢不如詔苐臣年衰邁恐不勝杯酌志不攝氣或愆扵禮度無以上承寵光爾上曰卿姑試之臣即席而飲􅀅徹上復顧臣曰卿更宜釂一觴臣再起固辭上曰一觴豈觧􅋨人乎卒飲之臣舉觴至口端又復瑟縮者三上􅀏曰男子何不慷慨為臣對曰天威咫尺間不敢重有􅀁瀆勉強一吸至盡上大恱臣顔面變頳頓覺精神遐漂􅀂行浮雲中上復笑曰卿宜自述一詩朕亦為卿賦醉􅁔二奉御捧黄綾案進上揮翰如飛湏􅁷成椘辭一章臣既醉下筆傾欹字不成行列甫綴五韻上􅃍召臣至命編脩官臣右重書以遺臣遂諭臣曰卿蔵之以示子孫非惟見朕寵愛卿亦可見一時君臣道合共樂太平之盛也臣行五拜禮叩首以謝上更􅃙給事中臣善等賦醉學士歌云臣既退􅀼自念曰臣本越西布衣粗籍父師明訓弗墜箕裘之業而已一早遭際聖明遣使聘起之踐歴清華地躋禁近無一朝不覲日月之光如此者凡十又七年叨冐恩榮夐絶前比􅀁幸犬馬之力未衰誓􅀅竭奔走之勞以圖報􅁛今天寵屡加雲漢之章照燭下土臣􅀼自靖度何􅁕以堪之雖然傳有之㤗山不譲土壌故䏻成其大河海不擇細流故䏻就其深王者不郤衆庶故䏻明其徳洪惟皇上尊賢下士講求唐虞治道度越扵唐宋逺甚雖以臣之至愚亦昭􅀍非常之殊渥六合之廣其有抱藝懐才者孰不思踊躍􅁬厲以􅀭扵王庭㢤臣按􅀯有嘉魚之詩有曰君子有酒嘉賔式燕以樂序者謂太平之君子至誠樂與賢者共之也皇上寵恩之便蕃抑過之矣又按天保之詩有曰罄無不宜受天百禄䧏爾遐福惟日不足序者謂臣䏻歸羙以報其上臣雖無􅀁猷為願持此以頌禱扵無窮㢤古者侈君之命勒諸􅂦􅃔蔵諸宗廟嗣世相傳以至扵永乆臣敢􅀼援此義礲玉為軸装禠成卷什襲珎蔵以顯示来裔給事中臣善等􅀿制諸詩附録其後而賢士大夫聞風慕􅃩而有作者又别見左方云是􅀊九月戊午朔具官臣金華宋濂謹記􅀘張馮加􅃣字辭有序瑞安張生馮宋金部􅀰中聲道諸孫也以文學薦扵朝擢奉常賛禮􅀰奉常􅀁典祀天神饗人􅀑祭地祗之禮其責任為甚重馮䏻周旋佐助而無越禮愆度君子稱之馮當􅃣時大賔字之曰子翼而未有造祝辭者邇来監祀廣西行中書其􅂙知政事黄君子邕嘗爲推􅀃字義而序之馮事予頗謹間復以祝辭爲請予按士􅃣禮載其三加之辭甚具辭古也而字􅀃則今也子雖不敏弗䏻􅀙大賔與聞制字之義之意難固拒也遂黽勉以􅀘其辭辭曰􅃣而有字爲敬其名􅂚爲敬之期學之凝學􅀅焉施莫重夫祭大嘏之受因神􅀁致孰有賢行慎擇爲尸豫撰􅍏几庶堪馮依豈惟佐食宿有命戒皇尸戾止益䖍弗􅈈偘偘工祝左承右趍既賛道之復扶助之馮之謂何如神斯㩀翼之謂何如鳥展翅百靈􅌭紛儼乎􅀂臨洞徹上下精白一心詩咏卷阿歸于孝徳放諸四海凖是爲則爾職賛禮陟䧏廟郊周折圓方弗諐絲毛非志之醇疇䏻及此宜勵其功慎終如始自此而推泉逹火然孝親忠君其道一原内􅆂外充壹循乎敬大本既敦末罔不正爾有長才發軔在兹何逺弗召何福弗宜探名索字孳孳不巳賢亦何人睎之則是人虎􅀃莆田壷山下有路通海販鬻者由之至正丁未春民衣虎皮煆利鐡為􅀲牙習其􅁬躍之態絶􅀋乃出伏灌莾中使偵者縁木而視有􅀒囊至者則嘯以為信虎躍出扼其吭殺之或臠其肉為噬齧状裂其嚢㧞物之尤者餘封祕如故示人弗疑人競傳壷山下有虎不食人惟吮其血且神之已而民偶出其婦守巖穴聞木上嘯聲急意必有重貨乃䝉皮而􅅮之婦人質脆柔販者得與抗婦懼逸去㣲見其蹠人也歸謀諸鄰譟逐之扺穴􅀗金帛無筭民竟逃去嗚呼世之人虎豈獨民也㢤送㑹稽景徳輝教授鄊郡序成周之時自國都以逹于家于黨于術無不置學學必立師師必以仕焉而止及道明徳充者為之然以其國之賢還教其國之人不翅父兄之臨子弟名實之素孚而不藐然無聞也情文之素稔而不渙然無属也扵是其言易入其教易行秩秩而相親欣欣以相愛恩義两盡薫為太和徳成材逹有非後世之􅀁䏻及也㑹稽古諸侯之國今為浙河東大郡㑹學官闕教授員鄊之子弟咸曰言篤而行醇惟我景先生則然其黄髪老成人又曰擩嚌經􅃾朝夕不自饜著述成書惟我景公則然既而郡僚聞之府公亦聞之相與謀曰府庠之無師二千石之責也景君之賢信如子弟老成人之語以郷人之􅀁尊而為鄊弟子之􅀁師未見其不可也盍上其事扵選曹乎選曹既􅀙其請試景君以春秋經義一通白于丞相府報下如章景君􅀅東還涖教事詞林編摩之英成均宿學之士藩府賔僚之賢咸造文􅀂詩榮之而以首簡授濂序嗟夫師道之不立也乆矣頗求其故後世拘扵選格多用異􅀖人為之師其實未易孚其情未易檢徃徃􅀂秦越之相視曰夜幸代者之至則望望然去矣今景君之獨􅀎致是者何㢤亦曰聖天子在上旰食宵衣以成周為法然後得遂其􅀁志如斯爾景君之行也當思􅀯渡羣賢之子孫咸萃是􅀖或以徳行文辭著或以道學政事聞世之相去未逺也文獻猶有足徴景君􅀎扵此盡心焉則移風易俗之效􅀅粲然可􅀚矣􅀂曰吾耄及之他尚何􅀁圖不過便禄養扵枽􅎚之􅀖而已豈惟非鄊之父兄子弟之􅀁望雖濂亦􅀅致尤扵景君濂知景君决不爾也故人有宋無逸許時用二君亦鄊先生也聞景君講道扵鄊也其􅀅有以翼助之㢤景君名昇其字為徳輝云送徐教授纂脩曰暦還任序洪武六年秋九月皇帝御謹身殿􅀙翰林學士宋濂之請妙東文學之士四三人纂脩大明日暦而詔濂與吏部尚書詹同司總裁事當是時杭州府學教授徐君大章實在選中開局扵内府日給太官之饍而令中貴人䕶閽非奉􅃙㫖不敢入其事至嚴也濂時與大章辰入而申出凡興王出治之典命􅀅行師之績采章文物之懿律暦刑法之詳咸以事繫日以日繫月以月繫年必啇􅅦而謹書之濓年加耄不􅀎有􅀁猷為唯發凡舉例而已其助我者大章之力居多越四月書成共一百卷遴日上奏豋盤龍金匱中奠扵丹陛之下縉紳之家争欲薦大章入詞林大章堅以足疾辭濂因為陳情扵上乃詔賜文綺纎繒各三装錢六千文仍俾其職為真故事教授試職三年俟育材奏功方許真授大章待未朞年乃異数云大章􅀅還涖教席濂餞之秦淮河上與之言曰教授之職雖設扵宋其任亦云重矣在紹聖􅀄詔令中制科及進士第上五人禮部奏名上三人府􅁥廣文舘第一人始令為之大章起布衣而􅂺􅈾其任豈無其故耶漢法太史公位丞相上天下計書先上太史公副上丞相由唐及宋宰相皆兼史官其重如此大章以一教授之㣲乃召入史舘與編摩之列又豈無其故耶盖大章愽覧載籍發之扵詞章霞粲波縈峻潔鮮朗威儀儼雅又足為後進師表聲名籍籍起儒林間當此聖明之朝材咸求實不于其官于其人故大章致此無難也然而黄琮之貴必豋扵方明大雅之音必奏扵清廟理􅀔則然大章以温然之姿鏘然之文乃鰓鰓下教扵一郡如惜才之論何濂誠耄矣髪種種􅀍肩矣聦明不及扵前時矣詞林清切之班非大章誰􅀁宜堪行􅀅力薦而用之脫使大章實不良扵歩趍雖卧治之亦可也大章以為何如明年春正月友生金華宋濓序送許存禮赴北平教授任序鴻儒之胄傳經為難非蔵髄以接肌盍鈎深而致逺欲承家學罔匪俊賢景伯之貫五經仲師之明三統咸號善􅁇致宣令聲有如婺郡許文懿公爲武夷之世適作寓内之人師繭絲馬鬛析理義之精㣲粉墨鉛黄發箋文之樞要完經翼傳著􅄒滿家簞食瓢飲肥遯終世其克生扵令子遂􅁢蹈扵前猷務純楙以自持歛華英而弗耀倡道丹溪衿佩坌集􅀭徽京輦薦牘交馳天池卒馳扵鯤鵬鍾阜竟辭扵猿鶴扵是上名宰府試藝銓曹典五教扵北藩列諸生扵東序朝紳恱懌矦服推尊斜川無愧扵小坡西平咸􅁛爲有子况當勝國之都嘗爲人物之薮教鐸斯振壹是韶濩之音藝圃深培竚見菁莪之盛如濂不敏比徳知慚秋髪盈簮慨年華之易邁春花夢筆覺文彩之已非粗叨􅂦鍾之榮敢忘枽􅎚之敬偶它鄊之相遇慰昔日之􅁭期把酒臨風髙情闓朗炙燈論道玄義昭融胡墨突之未黔􅃍江帆之催發雖無藻思強綴蕪辭􅁇前古之芳音首羣英之雅製云爾詩曰有菀者栁生于河糜折以送子而興我懐我懐伊何鄊之文獻人逺言㣲不絶如綫之子之生實紹前徽彬彬其文郁郁其儀蘭在逺林其香苾芬豈期人知人􅂺有聞我傳我經其謨孔􅆇以迪以􅀅以牗其􅂨叶遥遥北藩在燕之墟土俗勁悍柔以書詩不見白雲英英在山起而為澤卉木斯蕃教雨之施功亦如此苟專丘􅊤孰為􅂎􅎚學貴有用扵子實多目送征颿其如别何其如别何獻此春酒後夜相思白月在栁洪武九年正月十八日葉夷仲文集序臨海葉君夷仲宋丞相西澗先生族諸孫也夷仲生有異資其文辭之進如榮木升而春濤長日新月盛盖未巳也頃由茂才舉于郷奉使安􅀯不辱君命以功擢髙唐州判官轉知睢寕縣為學猶孳孳不􅈈其弟廣武衞知事恵仲􅀋集成編􅁵為􅀂于卷来徴予序其請至六七而不倦予齒加長志氣摧攝操觚􅀁云云皆無精魄頗􅀋䆿語者讀夷仲文方畏敬之弗睱尚奚敢序之㢤雖然不敢無一言也昔者先師黄文獻公嘗有言曰作文之法以群經為本根遷固二史為波瀾本根不蕃則無以造道之原波瀾不廣則無以盡事之變舎此二者而為文則槁木死􅁅而已予􅀼識之不敢忘扵是取一經而次第窮之有不得者終夜以思思之不通或至逹旦如此者有年始粗暁大㫖然猶不敢以為是也復聚群經扵左右循環而温繹之如此者亦有年始知聖人之不死其􅀁以代天出治範世扶俗者数千載猶一日也然猶不敢以為足也朝夕諷咏之沉潜之益見片言之間可以包羅数百言者文愈簡而其義愈無窮也由是去讀遷固之書則􅀔若破竹無留礙矣權衡既懸而百物重䡖無遁情矣然猶不敢以為易也稽本末以覈其凡嚴褒貶以求其㫁探幽􅀮以究其㣲折章句以辨其體事固粲然明白而其制作之意亦皦然不誣也由是以㝎諸子百家之異同􅀂别白黒而絶無難矣及夫物有􅀁觸心有􅀁向則沛然發之扵文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無􅀁遺也嗚呼予以五十年之功僅僅􅀂此今年日逾邁慨兹舊業反成荒落􅀅何以爲夷仲言㢤夷仲諸作温醇而有典則飄逸而有思致其辭簡古而不龎其神豊􅃾而不瘠可謂䏻言之士矣求諸軰行之中未見其敵也進進不已何古人之不可至㢤予因忘其固陋以平日􅀁自得者序諸篇首夷仲宜有取焉雖然文辭道之末也夷仲方與有民社之􅀉當務爲政以徳而昌其道㢤洪武九年正月望日具官金華宋濂序題商山四皓圖右四皓圖一卷􅀁謂四皓者昉見史記張良世家則東園公綺里季夏黄公甪里先生是也􅀄不知其姓名按陳留志園公姓庚名秉字宣明居園中因以爲􅃅夏黄公姓崔名廣字少不誣也由是以㝎諸子百家之異同􅀂别白黒而絶無難矣及夫物有􅀁觸心有􅀁向則沛然發之扵文翩翩乎其萃也衮衮乎其不餒也渢渢乎大無不包小無􅀁遺也嗚呼予以五十年之功僅僅􅀂此今年日逾邁慨兹舊業反成荒落􅀅何以爲夷仲言㢤夷仲諸作温醇而有典則飄逸而有思致其辭簡古而不龎其神豊􅃾而不瘠可謂䏻言之士矣求諸軰行之中未見其敵也進進不已何古人之不可至㢤予因忘其固陋以平日􅀁自得者序諸篇首夷仲宜有取焉雖然文辭道之末也夷仲方與有民社之􅀉當務爲政以徳而昌其道㢤洪武九年正月望日具官金華宋濂序題商山四皓圖右四皓圖一卷􅀁謂四皓者昉見史記張良世家則東園公綺里季夏黄公甪里先生是也􅀄不知其姓名按陳留志園公姓庚名秉字宣明居園中因以爲􅃅夏黄公姓崔名廣字少通齊人􅀮居夏里脩道角里姓周名術字元道河内軹人孔父祕記又作禄里此皆王劭㩀崔氏周氏世譜及陶潜賢輔録而為此􅀃綺里季則無聞焉或曰姓氏書云綺里姓季其字也予方疑其誕妄不經及讀顔師古漢書註果謂四人者匿迹逺害氏族無得而詳皆後世皇甫謚圈􅁛之徒及諸地里書􅀃􅀁傳㑹可見古人讀書精審固有以及之者矣而周公謹􅀁著齊東埜語又呫呫不置者何耶非惟此也傳記􅀁載如伯夷叔齊之􅀋一一具氏名甚悉經中既無明文不知後世何因而知之耶一􅀏而斥之斯可矣然自舊以夏黄公為一人而畢士安則謂綺里季夏為一人黄公别是一人其􅀃尤異㩀漢恵帝時􅀁刻四皓神座一曰園公二曰綺里季三曰夏黄公四曰角里先生恵帝去四皓不逺足以證士安之謬矣偶題此圖遂牽聮而書之畫之工拙尚未睱論也濟􅀯李氏先塋碑銘濟南李氏世居章丘臨濟鎮鎮東北一里有累葉之塜墓存焉傳至二府君始遷濟陽曲堤鎮娶觧氏生二子曰載曰某載娶某氏陳氏生五子曰某曰信曰某曰良曰温信秉性剛明州里有不直者必来赴愬片言之頃皆心服而去嘗為官督租賦不約而集行尤方嚴人聞謦欬音皆歛容避不敢慢娶王氏年九十二而終生三子曰貴曰直曰顯貴字國寳度量絶人喜怒不形于色威儀脩飭望之儼然不幸商于河南歿而不返娶蘇氏生一子彬字文質蘇氏感家門凋瘁攻苦食淡與文質共挽一車採桑風雨中早夜事蚕績以養姑姑歿蘇氏猶康強見孫吉䏻讀書造文出訓鄊之弟子員持束脩来上泫然流涕曰李氏一門之責悉歸是子矣年七十九以至正三年十一月二十四日而終文質天性至孝奉祖父母及母未嘗有違禮毎得一􅅴􅃾不獻弗敢先嘗一日稍有酒過􅂺深悔曰為人子者可以沉湎而遺親憂乎遂覆杯十年不飲首倡宗黨買田扵縣北二百歩作為新阡繚以周垣用昭穆序􅌾凡族屬有不䏻蔵者咸與焉囬河鎮相傳有􅀑兵至居民競􅀒囊槖来􅀉文質􅀏曰惡有是必訛言也巳而事果帖帖悉以其物歸人人有遺垂髫女者文質偶拾之浹旬其父来告文質亟出女還之其父牽羊載酒為謝文質曰汝女既歸汝矣何假此為峻却而不受性􅄝賔朋延納無倦色甚至傾貲遇之故人多愛敬踰扵骨􅁏苟有過面責其非䏻改則喜逰行里中或見女婦無論親踈􅂺引身避之然御家甚嚴訓諸子以學晝夜程督不少恕嘗􅃌豋科記示之曰吾兒得掛名其間志願足矣復戒曰讀書不患不豋科豋科即為官矣為官而貪墨譬如明珠弹雀􅀁得者少而􅀁失者多人以為名言年七十以至正十年十月十日而終娶周氏生一子曰忠􅁇劉氏生三子曰賢曰吉曰仁劉氏事姑以孝御下以寛遇夫以敬内外宗戚無不得其驩心撫忠不翅􅀁生子見吉豋至正甲午進士第及為河間録事迎劉氏就養僚属率騶􅀙迓之羅拜車下母喜曰汝父疇昔用心之􅀂恨不令一見之耳年六十又六以某年五月五日而終忠字思庸年五十二卒娶張氏生二子曰益歿扵兵曰某夭賢字思哲年三十八卒娶禇氏生二子曰某曰某皆歿扵兵吉娶禇氏年三十六亦歿于兵予幸與吉逰吉自状其先世行實衮衮数千言且作書来告曰吉也罪戾深重天䧏酷罰連年兵禍相仍李氏一族不絶僅如一綫惟我曾祖考妣塟于縣東某地先塋之側而祖妣暨考妣則藏于新阡其嘉言善行固不䏻䆒其詳至扵名諱及卒塟􅀊月亦或有􅀁遺失今弗圖則後嗣何䏻知之願先生為文刻寘新阡予讀其状纒綿悲愴之辭層見而疊出有以知吉思深而忠若不覺為之堕淚乃掇其大者繫之銘辭而遺之嗚呼􅀂吉者不亦孝子慈孫也㢤吉字思迪今以字行文行兼羙出仕國朝今遷徴事􅀰知􅀭州府髙郵州事云銘曰堪輿之中氣化冲融莾無端倪􅀆一禍一福相為􅀝伏􅂚得而推􅀆人衆者勝天亦䏻㝎理􅀅可期􅀆李氏之先善弘慶綿宜昌􅍏施􅀆家之分崩族之僅存適逢亂離􅀆徃過来續無徃不復大化無􅀻􅀆碩果不食其發必亟孰閼其馳􅀆孳植敷蕃自一而千起扵毫絲􅀆屈為伸根衰為盛門循環以時􅀆考古驗今斯言可徴有􅀂􅆱􅀛􅀆莫堅匪石大書深刻史官之辭􅀆題邕禪師塔銘後長沙歐陽信本書在唐評為妙品鄭漁仲金石畧􅀁載凡二十三種而行扵􅀯北者惟僧邕塔銘及醴泉銘而已二銘多􅀁翻刻􅀯本失扵痩北本失扵肥殊無精絶之本予嘗扵越見胡文恭公􅀁蔵醴泉銘肥痩適均精彩煥發識者㝎為􅀄刻今􅀚此塔銘其神氣絶與之􅀋誠可寳玩也然塔銘􅀹信本得意書姜尭章謂勝扵醴泉駸駸入扵神品其亦知言也㢤元諸大老寘品評扵其間者凡十又三人予尚何言庸掇拾緒餘而書扵左方云宜春夏都事遺像賛以忠字尚之其才孔良其氣則剛沉潜乎仁義之府擩嚌乎禮樂之塲窮春秋而寓衮斧法茮粟以為辭章使之􅌹城而居則可以攀次公之黄使之入直鑾坡則可追文成之張胡為乎低囬下列莫展一長託使車以遐覧竟仙㳺扵五羊豈詘扵人者難知而信扵天者不亡後千百年剛風欝滂當見􅀐麒麟而下大荒者耶􅅊軒銘閩有大儒曰朱公喬年自以性偏扵剛效西門氏佩􅅊以為警因號其齋曰􅅊靖江府伴讀陳伯武亦閩人也有景行先哲之志用􅅊名軒􅀁以禔其身者勤矣濂懼其矯枉而過正也爲之銘銘曰􅅊之爲義乃獸之皮可以束物枉戾而相違故其文上下爲舛而中則􅀙圍自非柔而熟之安䏻變生革而如脂古先君子佩之自随盖戒夫剛悻以自好狠愎而爲非矯其過固不宜不力􅀂馴致扵純柔純弱又必招削薄之譏嗚呼噫嘻大中之爲物也㣲􅀂神􅆱坦􅀂九逵何不􅂥􅂥于于濶歩而長趍近則入善人之室逺則爲聖賢之歸不亦暢志乎而陳氏之子問學得師木漸者必上升膏蓄者必有輝指柔人以作極纂前修之風徽予造銘而昭之竟不敢褒而規楷木杖銘客有遺予孔林楷木杖者横文如蛇腹節節可􅀚刻斯銘銘曰托根􅀆孔林有文横横􅀆如玉如金千載寂寥􅀆孰白爾扶持之心宋學士文集卷第三十四翰􅁐别集卷第四
