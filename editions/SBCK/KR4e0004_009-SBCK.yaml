body:
  text: 劉彬卿傳劉彬卿名文質彬卿其字也姓劉氏其逺祖仁贍仕南唐以忠節著子孫居􅀽者遷于豫章今為豫章人彬卿讀書不泥章句務在躬行年踰三十擔簦赱燕都燕都貴人一見争相引重薦爲太師國王府儒學正陞敎授皆不赴除承懿寺照磨曾未㡬何改繕工司照磨貢新􅔇上亰彬卿旦夕視惟謹諸司同行者以入雨紅腐絓扵吏議惟彬卿獨否帝與后妃太子皆賜之衣衣凡五襲人為彬卿榮彬卿曰吾敬君之道當爾也轉詹事院管勾府正司典簿夀福都總管府經歷中書左丞史克新戌遼陽時江南餉道絶各屯田以食軍士食且不給廷議欲徴其米五萬石人難之不敢往彬卿毅然請行初至軍有欲害之者彬卿色不變亹亹為陳利害衆咸感動卒致三千四百斛以歸孛羅帖木兒以中書平章統兵鎮西京人畏其威不敢仰視彬卿持官書至左右索視之弗與遂辭不爲通彬卿呼曰朝廷之命將委之草莾耶孛羅聞之竟出見彬卿以官書進孛羅視已謂彬卿曰可與幕府議之彬卿曰官書既達行與否在平章使臣何與焉趨而退孛羅不敢强將宴留之彬卿曰使事巳畢尚何留即日上馬去􅀙事官皆餞之出郊嘆曰此真使者世盖不多見也府公俱徼僧賕僧愬御史臺臺臣問曰何獨無劉經歷邪僧曰經歷乃儒者理苟直不俟人言不然徒言之無益也且扵我無􅀁􅀻焉敢誣之特授大司農司照磨宣政院聞之欲辟爲屬弗䏻奪而止時官牛多掠扵亂兵貧窶人無􅀁訴富有力者反指以實口没去牛羊失其租彬卿舎乘傳偽衣醫者服徒行民間㢘其實以聞徴富人租而優貧窶之家京南諸倉母慮數十不以時入糧民告病彬卿馳驛察之既至紿驛吏曰吾將使江南尓因託故遲留徧詢倉之前後民盡得其情乃往楫倉使崔甲曰吾使臣尔􅂅預坐隅以觀羙政可乎崔不荅彬卿遂坐與談倉中事崔忽拂衣起曰君知有使者事尓乃暇及此耶彬卿罵曰吾農官也吾不叩汝等誰復叩之汝即具文書来上倉中人皆吐舌相顧卒治崔如法逺近不待􅇂而事集巳而陞本司都事擢樞宻院都事俄復入都水􅁥爲丞陞少監階中順大夫彬卿性耿介不阿行事絶與流俗異初至燕客塔海平章家平章􅂆其納少室以奉巾櫛彬卿曰家有糟糠之妻相期至髪白肯中道棄之乎不聽其子時敏方㓜一少年誘其馳馬竟跌死􅂉語彬卿冝訟彬卿曰吾兒死生有㝎命可尤人耶經一晝夜忽自蘇後十二年􅀘太宗正府譯曹􅁺一旦以疾卒彬卿召􅂉者詰之曰此亦墮馬死耶國史􅁺萬生客死于燕妻子貧不􅀎歸塟彬卿予錢二千緡俾奉柩還南昌御史大夫朶尓直班有忤相臣出爲湖廣行省平章政事省署治武昌道梗未易達必經石頂關歷連雲棧過瞿唐灔澦出萬險而始至􅀙事官皆散去獨彬卿㽞大夫曰吾國家老臣一死固當彬卿尓家貧尓當􅀙此逝也彬卿曰士窮見節義正在今日大夫何為出此言邪及大夫没又護其喪還檀州彬卿為人不避事苟使銜命而往雖萬里不辭凡出使即呼官録其行槖且曰去時苟増其一即贓也尤善以形色言人吉㐫巧發竒中無毫髪差忒人有意問之輙固閉不荅彬卿貌竒古眉毫長寸許雙目深其瞳閃閃照人黟南先生程文以道人劒客目之彬卿年七十餘今猶聞其􅀐青驢出入扵豫章山中云史官曰嗚呼世道既降平日素􅃅士大夫者恒脂韋自保祕孰有如彬卿之剛介者乎與人交也勢盛則趨勢衰則狐䑕竄望其門而畏之孰有如彬卿之不變其初者乎封殖自􅀻汲汲􅂲􅂉後視人顛連傾覆縦有耳若罔聞知孰有如彬卿惠及死喪者乎自它人言之如彬卿者可謂難矣而彬卿則曰此儒者恒事耳非難也嗚呼若彬卿者不亦君子之人也㢤不亦君子之人也㢤張中傳張中字景華臨川人也少習儒以春秋應進士舉不中遂放情山水歷遊江右諸郡遇異人授以太極􅁆學談禍福多驗時天下大亂歸􅀮莫府山與人言避兵之方􅀙之者吉違則㐫􅀊壬寅春正月上帥師下豫章御史大夫鄧愈侍上左右因薦中遣使者召至賜之坐問曰予㝎豫章兵不血刃市不易肆生民自此蘇息否中對曰未也旦夕此地當流血廬舍焚燬殆盡銕柱觀亦化為􅁅燼惟一殿巋然存耳夏四月指揮使康泰反一如中言中自是寵遇有加且言國中大臣將有變上冝預防秋七月平章邵榮參政趙繼祖㐲甲北門欲為亂事覺伏誅嵗癸夘夏五月癸未上􅀕山川百神扵覆舟山下問中曰此行何如中對曰吉天馬兩重似拜似舞祀畢上欲還馬忽人立作舞狀巳而俯若拜是日中原贄名馬果符兩重之語中又言省署內當有震驚城中亦擾擾但扵上無傷耳六月丁未忠勤樓災藥砲蔵樓中遇火怒激如雷省署與樓連內外咸􅂲偽漢陳友諒圍我豫章三月不觧秋七月癸酉上舉兵伐之召問中中對曰五十日當大勝亥子之日􅀗其首領其戰必在南康上因命中􅀙行舟次􅀌山無風弗䏻進中曰臣頗習洞玄法當為祭之祭巳風大作遂達彭蠡湖巳丑戰湖中之康郎山常忠武王遇春深入虜舟數四圍之其勢甚危僉以為不可救中曰勿􅁨也亥時當自出如期果出連戰輙大勝偽吴王陳友仁及將士溺死者無筭八月壬戌復大戰流屍蔽江陳友諒中飛矢卒癸亥降其衆五萬自癸酉至癸亥僅五旬唯南康與康郎山小異尔􅀄豫章受圍上問何日圍解中對曰當在七月丙戍暨報至乃乙酉盖日官筭曆是月常差一日實在丙戍觧去其他竒中往往􅀋此中爲人狷介寡與人言嘗戴鐵冠人因􅃅曰銕冠子云賛曰濂􅁆與中㳺見其人􅀋陽狂玩世者與之語稍渉倫理輙亂以他言竟莫測其故甲辰夏五月同列二􅀶士有咈上意方杜門待罪中叩二人􅀁生年捉筆作􅀧􅀧狀如計數者良久􅀏曰不逺復期在七月五日濂書而識之至六月之晦有㫖令二人復官頗疑其術之未盡驗及􅀗見上謝則中􅀁期也中之術亦異㢤上嘗親䟽十事命濂作傳蔵金匱中後六年覩遺槀扵故篋因繕録之而并紀􅀁識之事云竹溪逸民傳竹溪逸民者㓜治經長誦百家言造文蔚茂喜馳騁聲聞燁燁起薦紳間意功名可以赤手致忽抵掌于几曰人生百嵗䏻㡬旦暮􅀁難遂者適意爾他尚何恤㢤乃戴青霞冠披白鹿裘不復與塵事接􅀁居近大溪篁竹翛翛然生當明月髙照水光㶑灔共月争清輝逸民輙腰短簫乗小舫蕩􅃞空明中簫聲挾秋氣為豪直入無際宛轉若龍鳴深泓絶可聽簫巳逸民叩舷歌曰吹玉簫􅀆㺯明月明月照􅀆頭成雪頭成雪􅀆將奈何白漚起􅀆衝素波人見之嘆曰是誠世外人也欲常見且不可得况狎而近之乎性􅄝鞠種之滿園顧視若孩嬰黄花一開獨引觴對酌日入不倦人讓其留物怒曰舉世無知我知我惟此花尔一息自怡尚可謂滯扵物耶復愛梅梅孕緑蕚微吐赤脚踏雪中若温見輙凝視移時目不瞬且大言曰知我者惟鞠鞠巳謝我去􅄑汝梅繼之汝梅脫又謝去我當上白鶴山采五芝耳白鶴山盖溪上諸峰云逸民年五十益恬泊無􅀁繫間􅀻謂其灰曰吾扵世味愈􅀌矣將漁扵山樵扵水矣其友疑其誕逸民曰樵扵水志豈在薪漁扵山志豈在魚是無􅀁利也無􅀁利樂矣子以予果滯於梅與鞠耶君子以其語近道有􅀋扵古􅀮者相與傳其事逸民所未嘗言則無􅀙知之矣逸民陳姓洄其名烏傷人史官曰昔者李白與孔巢父等六人􅀮居徂徕山世仰之以為不可狎近因􅃅為竹溪六逸􅋁􅋁七百年後而逸民亦以竹溪自名若出一轍豈聞風而興起歟縦曰其地􅂉殊人之衆獨有異髙風絶塵照映後先其安有不同者歟士之沉酣聲利而弗返者盍亦知􅀁自警歟夫自范蔚宗箸後漢書以􅀮逸登諸史傳歷代取法而莫之廢者其意又豈無􅀁激歟雖然逸民之自為則善矣閩二婦傳頼道慈閩古田縣人歸同縣張文孫生一清十五􅀊而文孫殁扵疫道慈甫年二十九黄華亂家又毁扵兵羞服且弗完􅀎確然守志弗渝人力撼之泣曰張氏自浮光遷閩其不絶如綫者唯此一子耳余柰何去之及一清成人為取婦廖氏生三子頥興埜而廖亡繼以陳道真道真亦古田右族既歸一清粥簮珥治財與道慈再植張門一清事道慈孝極㫖甘道真相之唯􅂲有不􅁕而遇廖之子不翅巳出道慈晚嬰末疾手􅁕不􅀎用道真與媵人余乙恒挾持以就虎子道慈體肥重疲力􅀙事逾十春秋弗厭人難之道真生以寜年十餘日授書十三帙帙三􅁓道真夜宿火至四鼓自起􅅡燈呼兒誦書坐其傍以俟頃刻皆􅀎暗記􅀺明命之出送至齋門乃還以寜愛書􅂉忘食道真執七餧之任其恣􅀚不輟二十七以春秋擢泰㝎丁卯進士第繇國子助敎八遷而為翰林侍講學士秩二品累贈道慈道真皆清河郡夫人一清贈福建江西等䖏行中書省參知政事文孫贈禮部尚書閩人榮焉謂道慈之節道真之孝皆卓絶不可及殆天報之也道慈卒時年八十而道真則七十云傳有之婦道盡而天倫正有若二婦其􅀁謂盡扵婦道者耶王貞婦傳貞婦名順榮字靜安姓王氏台之黄岩金沙里人性荘毅日䖏深閨人不見其面其父廣東元帥嗣竒之慎擇􅀁配年十七歸同邑楊伯瑞伯瑞以才用世累官行樞宻院斷事官階􅀙四品得封貞婦河南郡君至正間貓䝤兵侵天台伯瑞帥師往扼之弗勝遂遇害貞婦時寓四明年二十又七生子慶夀始兩月聞夫亡躑躅欲求死親屬交相慰觧遂護喪還􅌾于鄕屏鉛華弗御戴道家冠􅀍鶴氅衣翛然如塵外人未嘗輕扵􅀏語人誚之則曰我未亡人尓尚何心追逐世好耶鄕里小兒欲媚上官以貞婦羙姿容喉使聘之不􅀙將以威劫其去貞婦􅃍引刀斷􅄠痛詈不少休事遂􅃦越三年有權貴人聞其賢强委禽焉貞婦度不免拊膺長號呼曰楊樞宻何在楊樞宻何在妾將相􅀙于泉下因悶絶仆地媵人抉齒以藥灌之移時乃蘇俟間執慶夀手曰吾命婦也不敢􅃜節以辱汝父汝父亡我非不􅀎死以汝年㓜將誰育之即不育嵗時何人持巵酒以酹汝父墳乃忍死至今今汝已十䶖吾復何憂我將死扵汝父之墓言訖泣而行慶夀􅃅訴􅀙母林氏林亟往救貞婦以刀自剄不殊林奪刀挽之歸環守至旦稍觧貞婦復斷􅄠如初權貴人曰此烈婦不可強之強之不祥嗚呼女婦之質甚弱耳扣盎􅁕以駭赱之今貞婦乃不爲威武􅀁屈若是非其秉志剛見義明有不􅀎也世以丈夫自居者冠帶儼如歩趨锵如議論藹如人倘以女婦目之則頩然怒去及究其􅀁爲一遇小利害則甘心喪其􅀁守似婦人女子之不若抑又何說㢤然自兵亂以来婦人徇節而不屈者或自剄死􅂉墜崖下死􅂉赴水火而死固人之􅀁難此特出一時義烈􅀁激尓有如貞婦䖏􅀌燈敗帷間凄風蕭蕭然中人歳積月􅀷必有甚不􅀎堪者恒人之情寕不爲之少衰貞婦之操則愈堅如銕石百折不撓豈不􅀹人􅀁難者乎使一􅀸之得若人必有率徳而勵行者由是達之一邑一州無不皆然其扵移風俗羙教化之道有國家者盖有頼焉是宜爲之傳以俟觀民風者賛曰昔夏侯令女夫死不嫁遂致斷􅄠爲信􅂉蹙迫之急乃割耳與鼻誓不欲􅀋扵人至今想其遺風猶凛凛然可畏也今貞婦截􅄠絶人其厲操盖與令女同若其持刃自刎比之割耳鼻者且欲幷身而捐之其志爲益苦矣嗚呼令女不可見有若貞婦其􅀁謂異世而同符者非耶韓節婦傳節婦韓氏名惟秀開封人元四川行省左丞渙之女也年二十一歸耶律文正王四代孫飬正養正時爲劉荘場塩司令甫六閱月没于官節婦行三年䘮乃還父母家適其弟敏以疾卒貳子肅寛俱㓜節婦與敏妻賈氏約曰吾聞古之烈女不更二夫吾與汝皆簮纓家子冝則效之苟􅂉失恩慮再醮扵人縦死為鬼亦當有餘羞耳賈氏恱曰此妾之志也朝夕乎父母舅姑之側旨若甘恐􅂉不備也衣與衾恐􅂉不完也敎肅與寛又􅂲不知其方也左之右之同心弗少􅈈􅀊壬辰賈氏亡節婦哭之慟曰尓何遽去予而死乎予寜與尓俱亡乎不火食者三日巳而又曰吾苟死其奈父母何遂割情忍泣奉尊撫卑如賈氏存時見寛以才學􅀍選列官國朝再轉為侍儀使節婦今年五十九其母則八十五云史官曰易有之不節若則嗟若無咎又曰安節亨盖不改其節則必􅀎亨違節之道則哀嗟自已􅀁致無􅀁怨咎矣聖人作易當無物不該推此以喻節婦庶㡬亦有合者乎節婦自耶律君沒制行如白壁者三十有八年使令名昭晣扵無窮視佊夫骨未寒􅂺棄之他適為人唾去而弗齒者果孰為亨而孰為不亨乎况節父無子可依毅然堅其苦志扵母家此􅀹卓異可書者故備列之然賈氏􅀎與節婦同志卒以莭終亦賢婦也㢤鮑氏慈孝堂銘有序歙之鮑氏故衣􅃣家也其諱宗岩者身載明徳弗售于時人􅃅爲棠樾䖏士當至元丙子郡將李世達軍叛群宼相挺而起肆其屠劉歙民相驚皆風雨散去䖏士君與其子寳慶敎授夀孫共伏大壑中未㡬宼嘯呼而至執䖏士君反接于􅀣抽刀將剚之教授出泣曰吾父耄矣不􅁕以汚兵鋒願憐而勿殺即殺我請代之言畢引頸就刃䖏士君曰吾秪生此一兒死我猶可吾兒死則宗祀絶矣慎勿聽之相爲讓者良久㓂欲捨之或掌制扵衆欲兵之又弗忍計未知􅀁㝎忽有風渢渢起林木間􅀋銕􅀐蹴踏聲㓂相顧怖愕疑官兵將捕已亟相率東趋父子因得釋歙人士咸嘆曰孰謂無天道㢤使無天道䖏士君父子何爲乎而弗死也其慈孝之報乎當䖏士君之受􅅞子但見其親而不識有身父但見其子而不知有已死生旤福尚不暇慮􅀄不知何名爲孝何名爲慈乎脫使䖏士君曰我必如是乃爲慈其子又曰我必如是方爲孝不㡬參扵人而不純其天乎嗚呼有若䖏士君父子􅁕可爲世勸矣然子爲父死古之人多行之者固可爲勸也若父欲存其子而自殞其生其可爲勸乎曰非是之謂也䖏士君爲存宗祀也爲存宗祀孝之大者也不然則其宗爲若敖氏之餒􅀑矣用以爲勸何不可之有㢤予與鄭內翰子羙㳺子羙歙人也其談䖏士君事甚悉予每爲之太息慨然遐思其爲人今䖏士君曽孫任詣予請曰任之祖父嘗以慈孝名堂鄉先達程公已爲造記先生􅀎復銘之乎予因歷序其事而繋之以辭使任勒諸堂上子孫世守之以爲式鮑氏之世其益昌矣乎任端恪有學行盖懿然君子人也銘曰父子之道一體而分天性昭然萬古無昬氣血感通罔間毫􅄠伊誰梏之户庭胡越惟歙鮑氏世敦詩書子勉扵孝父勉扵慈宋鼎將移群㓂方熾不􅄑遭之反接于樹有子含淚長跽致辭刀劍在前目不見之無死我親我死則可親死子存千齡亦夭父謂其子我耄及之日月􅀁照寜復㡬時兾子之生得存宗祀生生無窮孰謂吾死白刃可蹈難違者天若父若子何人弗賢㓂雖匪人天嘏是錫疾飈西来裭盗之魄玄聖樹教重惟五倫五倫有愆曷名為人慶延于家繩繩孫子孝慈之報庶其在此有巋者堂掲以嘉名仰而瞻之如交神明為上􅂉頑為下或悖来㳺来觀翻然自悔雙椿堂銘三槐名堂預知顯融之兆五桞有傳式啓肥遯之趣盖縁辭以達志而其文特繁托物以明􅀋而其義最切粤自前古以逮方今指意固殊􅂗轍則一有若右司都事某君噐局凝逺識度迴卓篤愛日之誠􅂭恱親之道奉其仲父並扵嚴君建一室之靚深掲雙椿以為􅃅氣同扵祖奚須􅀋我之祝孝推乎親必盡搆堂之志稽之五倫十起之􅀻阿新思􅁇之晚昭然􅁤跡莫擬光塵由是羙聞流扵縉紳永歌傳扵緗簡不鄙狂瞽漫紹徽音其辭曰有雙者春􅄐植于庭脩莖並擢峻葉均青􅋽雰夕􅇈灝露晨零材非齊散壽比莊齡羙兹華搆托以嘉名雲聮遥戸月澹鮮櫺中有二皓古之夀朋鸐髪齊素台背交升商宣宫奏柏茂松貞厥子􅀎令省署蜚聲絳衣執板賢冠垂纓調陳五鼎飬或三牲簮裳生􅃩州里流榮雅辭振玉麗句雕瓊文犀作軸翠琰鎸銘禮敦民典孝篤天經名教􅀁繫善俗攸興凡百君子宜鍳冝徴朽室偈并序材仲禪師嘗名其室為朽而徵辭扵韓莊節公黄文憲公二公既為之發揮無餘藴矣而材仲又以濂為黄公弟子復令􅀃偈􅁇之濂也何人而敢犯是不韙㢤雖然不敢辭也為之偈曰鄞有開士屢主名刹其􅀁住䖏邃舘曲房堅緻華好開士顧之獨名為朽我問開士彼􅀁謂朽雨風􅀁侵蝼蟻􅀁蠧棟撓檐㧞今則靚飭如上􅀁云以朽為名不亦厚誣開士荅言屬世間相無有弗壞譬如春花朝上穠冶夕則零墜何有真實今之􅀁居雖􅃅堅好我目視之無不朽者楹桷壮麗視如敝漏丹雘絢耀視如䵝昧超然此身如託虗空畢竟虗空無有壊相豈惟是室觀人亦然地水火風假合而成迷者自恃等於金石四大各離身在何䖏身即是幻世即為夢而况是室終歸扵空若􅀎扵此入正思惟觀室無室觀身無身庶㡬可入真空觀想我問開士善學佛者無欣無厭如開士言是有厭心􅀁謂朽者因堅而名有堅有朽理之必然木縦已朽堅性終在我本無堅朽􅀙何生堅朽未忘心何䏻一况樂觀空是為空病空病不除反實􅀁有我􅀃是室非有非無其室永存何縁䏻如觀空者空而非空空何有礙開士聞已破顔微􅀏􅀭眉而語子言固佳但我門中一義不立立即成妄請返塵轅母戯論法章判官像賛唐福州軍事判官章公􅁱實檢校太傅仔鈞之父也其遺像至今盖四百餘年矣二十世孫御史中丞溢偶扵閩中購得之如􅀗至寳持以示其友宋濂因為作賛賛曰噐局深沉容儀嚴肅吁嗟哲人如金如玉餘慶􅀁􅀍孫子若雲重珪疊組至今􅀭芬四十二代天師張公像賛含冲葆虗執真之樞翊度宣靈契道之符龍虎衛乎左右風霆属扵指呼此古之􅀶大真人而今之列仙之儒者耶含山操二解有序含山操者為和陽王綱妻吳貞媛作貞媛遭兵亂乃能完節蹈水死其不有繋民經之大者乎辭曰含山有雲莫蔽我衣彼荷㦸者迫我以馳我馳我驅泣涕如雨仰視白日光不照下叶地不可穴天不可縁舍旃舍旃我尚何年含山有石其光差差石或可轉我節可􅃜我夫何之欲􅀙無􅀁舎彼黄泉無相見者叶誰謂淵深我視若􅁜我死得死中心之寧張孟兼字辭并序國子錄張君生扵嵗戊寅正月六日以曆推之是月九日始入春則中氣猶居丁丑年之冬其王父府君因以丁命名張君既長聞人先生字曰孟兼兼者何謂臨二嵗之中也夫丁在十毋為火戊則土也火為文明之候非不燁然有光必變而為土然後生物之功遂張君以辭章名世今將刋其華而食其實乎雖然丁離象也戊坤象也離上而坤下扵卦為晉􅂏有之明出地上順而麗乎大明柔進而上行張君又將自此而升乎方今大明御世治具畢舉張君益昭其明徳發為人文以黼黻王度物有不資其成者乎是則兼之之義已或謂殷人尚質多以十幹名其與府君之意則夐然殊也張君浦陽人有學得與濂為同門朋詞曰戊為子丁為父火得為土百物之􅀁祖􅀎兼之道為伍碧崖亭辭濓與太常卿魏觀先生㳺甚久知其為孝敬之人也先生間嘗来謂濂曰予家鄂之蒲圻蒲圻有山曰蒲首焉巉然而起如雲旓翠􅅋蕩摩空濛間對峙䨇石楹直上如笋中敞碧崖千尋嘉卉靈草雜被之紛紅駭緑儼如圖􅀞中我先人愛玩而不忘日支笻歩其下或濯纓澗底或咏詩坐盤石上或望雲出沒崖谷悠然而忘返遂因以碧崖自號時移事遷層崖絶壁雖蒼然不改扵舊而先人則追逐羣仙扵風馬雲與中弗􅀎一見之予每過其下不覺􅏰然出涕故扵䆠游􅀁至掲碧崖之名扵楣間􅀁以志之志之􅀁以思夫親也雖然名之固寓也而言之則尤寓也􅂚若親􅂂其地而求先人之遺跡乎當今聖人在上方以孝治天下他日􅄑遂歸田之請築亭山麓仍以碧崖名之當風日清羙與二三子㳺其間指而言曰彼清泉瀏瀏而斜出者此先人濯纓之䖏也磐石纍纍而可坐者此先人咏詩之地也崖谷沉沉靈氣之宣通者此先人望雲出没之􅀁也一俯一仰無非精神之參會非惟慰其遐思抑將藉是以勵夫􅀁學期克肖乎先人予雖耄矣此心不敢忘子􅄑為辭刻諸亭上何如濂曰傳有之舜食則見尭扵􅃵坐則見尭扵牆古之上聖猶若斯况下扵此者乎人子之扵親遇事觸物無有不可感勵者况親之昔日􅀁㳺歴者乎斯亭之建當與甄氏思亭並稱其視崇臺芳榭以騁㳺觀之娛者果何如也若先生者豈不為孝敬之人㢤先生字􅂎山觀其名也學問富而徳行􅁱踐􅀭中外其善政盖章章云辭曰崖之雲􅀆英英其升崖之木􅀆欣欣其榮悵仙人􅀆何之飊風薄而上征豈降精而委祉􅀆發為休徴三秀之茁􅀆膏露之凝􅄅長思扵無窮􅀆視一息扵千齡金可銷而石可泐􅀆又焉􅀎爽吾之精誠南堂禪師像賛南堂和上既入㓕其得法弟子太禪安公思慕之弗置乃繪其像来求予賛賛曰樹般若幡有舌如霆當空一震百蟄咸醒松源之宗獨造其妙手折蓮花臨風自咲宋學士文集卷第九鑾坡集卷第九
