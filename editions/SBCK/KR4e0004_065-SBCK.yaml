body:
  text: 蘭溪法海精舎記義烏伏龍山有大浮屠曰千巖禅師長公以高峯之孫中峯之子表􅀣法幢倡明教外别傳之㫖非惟中夏學徒海赴雲蒸逺而龍荒蠻甸弁韓巴􅈎之人莫不持薌膜拜咨决疑情而其上首弟子既皆於道有證各搆蘭􅀂分續化機大江南北徃徃有焉􅀂今有源師所建法海精舎亦其一也有源名􅁢清金華人淳熈丞相王魯公諸孫蚤嘗受經石門剛公元至正􅉝巳􅁇徃千巖座下得度為大僧留神禅觀脅不沾席者十年一旦入室機鋒相撑觸雹撒飈􅀭莫窮涯際千岩欣然頷之乃屬其出㳺閩浙江淮間以求印可有源所見諸師了不異千岩時退􅀮故山文彩自露㝷以郡守之聘岀世衢之子湖安國禅寺遷信之玉山興教禅寺百廢具興皆有光于前人國朝吴元年丁未飛􅃬蘭溪之龍巖樂其山縈川迴風氣襲蔵乃嘆曰吾知宫宅地形之術盖有年矣察其詳徴無有弗驗者如此靈壤可不開般􅀂之􅂣乎遂即南洲建法海精舎一區越三載乃成後聳傑閣中峙寳殿前敞髙閎兩序衆寮映翼左右有源徴予為之記予年踰七十凡索文者皆峻斥見有源素􅄠垂領道貌淵雅語言悃愊無華不􅁴心許之因為敷坐而倡言曰法界有情種種傎倒執妄為真四大假合如水上沫聚散無定强指為身六塵縁影如火中􅆋起㓕弗停堅認為心随因成果堕入諸趣出此入彼􅁼風轉輪大􅁴聖人起哀憐心廣說三乗十二分教使其照知本来真心廣大靈智無物不含元理弗攝心佛衆生三無差别本来真身圎滿空寂周徧百界不動纎塵惟寂智用合三為一人能有所悟入始能了空障執直超無上菩提然非因像生敬因敬生悟思求脱離如無舟筏欲濟大河無有是䖏古之導師方便設化廣闢精廬為之棲止嚴事像變為之瞻視潔清香華為之供飬皆使其革妄趨真了此身心而巳今有源灼見於斯取則前古鞠明究曛孜孜弗􅈈亦可謂度越人人者矣雖然此實人天小果之因耳或具大乗噐者來㳺來止當知萬法本空一塵不立大光普照渉入無礙無佛道可悟無衆生可度洪纎髙下草木走飛色色形形紛紜舛錯皆吾一實境界楼觀云乎㢤脩證云乎㢤嗚呼教外别傳之道廣矣大矣又當從此而參之精舎之建其用錢僦工動以千百計兹不詳書而獨舉身心之要為言者財輕而法重也題傅氏誥勑後傅氏為義烏名族世居雲黄山下自徐陵著善慧大士碑巳載縣之豪傑傅德宣之名其来固巳乆矣宋􅀄始自山下分為青岩蘆砦二支皆以書詩為業而蘆砦􅀄遷之祖名雄雄生忠卿忠卿生玘玘生勝元勝元生思某思聰思某生䕫䕫生芷思聰生時中大中大中生奎思聰嘗官迪功郎以時中國學得觧進士特封脩職郎􅃱仕淳熈十一年五月所下誥是也大中以奎饒州得觧進士特􅀘迪功郎􅃱仕紹定五年八月所下誥是也二公雖有長才皆因慶典所推始沾恩命唯芷能擢淳熈五年進士第僅得之台仙居尉以終芷之從曽孫藻以芷徧通六經而文詞蔚贍不能章著于世乃搜芷殘誥與其補􅂶大學生時所給麗字號綾牒聮為一通以􅁇脩􅕄迪功二誥之後示諸子且屬某識之某􅀼觀先師黄文獻公之所題識深惜傅氏之先懐才而不試謂藻妙齡秀發委祉冝有所在今藻歴官禁林講學東朝拜監察御史出守武昌則其光顯前人者多矣公之先見有􅀂蓍亀似無毫􅄠之差也因不敢辭本其世系而詳耆之卷内有孺人吴氏誥尾吴氏諸暨流子里人大中之妻也題識中所謂金昌年者字壽翁淳祐七年進士有異政其知慈溪也嘗浚慈湖溉田千頃民至今尸祝之􅀊月未乆鄉人及無有知其名字者故附見焉䟦胡方桞黄四公遺墨後右鄉先生手帖四􅁓前二帖則脩道先生胡公汲仲巖南先生方公韶卿與梅溪傅君者也後二帖則栁文肅公道傳黄文獻公晋卿與􅀄齋王君者也巖南有異才常㳺杭都盡交天下知名士􅀅作監丞方洪竒其文以族子任試國子監舉上禮部不中第㑹天下多故三以䇿告丞相陳冝中不􅃪後以特恩授容州文學未上而宗籙巳訖終身思宋一飯不能忘每語及之輙涕泗交頥世􅁛為節義之士胡公實巖南至交而桞黄二公皆其門人是三君子者其學行巳載元史人咸得聞之唯岩南不岀仕世之知者或寡故濂特加詳焉梅溪諱光龍字子才時為嘉興路教授仕至福州􅀱官主簿以終􅀄齋諱良玉懷􅒄其字衢州常山縣教諭今翰林待制禕之父也􅀄齋乃梅溪之甥金華俞恂又􅀄齋之外孫其簡牘流傳盖有所自云恂来學經於濂以濂常及洒掃栁黄二公之門裝禠成卷俾題其後義不敢辭俞先生墓碑洪武元年八月廿有二日元鎮江俞先生卒于家先生年九十矣鄉人學士猶痛其卒之早而嘆恨以爲失所師九月十九日塟于崇德鄉􅃫皇山之原執紼送者数百人咸哀戚如䘮其私親先生善人也德可師而文章有聲于世故人􅄑其生而悼其死既乆而不能忘之先生之先居温之平陽曾大父某宋紹興司戸參軍大父某爲廬江令始遷鎮江父德鄰鄉貢進士趙曾公葵開督荆襄辟爲記室參軍兼諮訪籌䇿甚禮重之宋亡爲元丞相阿术建行中書於􅀭州徴爲左右司郎中不就以先生貴贈丹陽縣尹至元十六年先生在娠丹陽夣魯公與語􅀂有所屬翼日而先生生故名曰希魯而字則用中也先生為兒童巳卓卓不凡群兒誘之遨譁不為動􅄝學強識年十五􅁇䘮二親哀而不越禮季父酉發宋太學生有學行先生師之復受學于陳公膺志超氣明融㑹濬發名士多樂與交年二十四部使者以茂才舉授䖏之獨峯書院山長終三嵗移饒之長薌書院除慶元路儒學教授教有方士人服之任滿赴吏部群公欲舉為國子􅂇教以母老願得禄江南辭擢歸安縣丞至則脩孔子廟學化民出田飬士㑹海溢鹽官令民伐石以為隄郡吏議石盈五十斤乃受細石山積棄不用石湧貴先生命民為竹畚居細石如其数納之價减三之二民悅􅁛便他邑皆效之嵗凶說巨室出粟振寠夫督輸租稅于杭俾倉吏先小民後及大家小民以不困獄訟務􅃱其情囚廪乏則與其僚為糜更餉陞江山縣尹階從事郎先生為書本其風俗申以訓戒懸示民民未乆皆從令莫有犯者部使者至恠其無訟宻詰之道尹善無異辭乃悅而去郡長吏圭田屬縣境􅀊遣家童徵租田者告病惮先生嚴明逮去不敢横丁生母憂服除改丞務郎永康縣尹葺完廟學如江山時聘名儒相講說民咸喜得尹為師里正保首繇于官者前吏苛虐之不得消息先生令其半返舎有徴發則召否不復問郡苻縣編􅃥民之叙為䇿書先生聴民相推排以貲力髙下為輕重不使吏持其柄吏噤歎莫敢出語豪民黄私洪之妻與妻謀殺洪繯頸懸屋楣詐為自經而亟焚其屍吏以無可驗弗之詰先生聞召洪叔父問之叔父畏黄不敢􅂥先生令訴于部使者請委尹鞫即可明部使者果屬先生先生捕其二女奴訊之各引伏妻與黄皆論死先生學行尊雖仕下位公卿貴人皆敬禮之行省每大比輙延先生進退士主其事者三同考者四其門生學徒多貴顯于世而先生年六十有六猶為縣令至正十六年乃上章請謝事明年詔下以儒林郎松江府判官􅃱仕皇上定都金陵聞先生老儒賜以粟聘至問政教之要巳而􅁛聵辭歸上官其孫桓俾以禄飬恩禮甚至先生扵學靡不通爲文宏厚凝檏豐衍不窘人多傳而貴之而退然未嘗有驕忲之色遇兄弟婣戚皆盡禮女弟贅壻求異居中柝其財以􅂌之既柝以侈廢復飬之于家無厭色寛恕樂易與人交不求其備而有善必􅁛譽使聞于人人望之者敬知之者服乆與䖏者自以爲莫及也先生􅀅卒以所著聴雨軒集二十卷授子文圭校遺脱是夕疾作舉手曰吾三日人爾如期問家人以日早晏皆對曰五夜矣强起􅀝桓背執文圭手而逝先生母王氏􅁇母張氏生母則周氏俱封冝人娶營田副使陳鈞女封如其姑先三􅀊卒一子文圭二女適朱昺張伯祥孫男三人長楨夭次桓也同知太原府石州事次彬孫女二適鄭埜􅁑鏞曾孫男三人女二人􅀄先生嘗以銘墓屬其友之子王有壬先生既卒有壬曰先生文䆳德髙得名世人銘斯可􅁛吾其敢為乃状群行而使桓來請余曰元之混一天下四年而生先生閱九十齡而見其亡始終㢤先生之於國也乃為銘曰宋遷而南土裂不完百五十年始歸于元先生之生海宇甫一風氣混融異才乃出少觀其􅀄壮逢其康九十年間見其興亡事功失得可悲可喜誰實使然􅁏食多鄙豈不得位位與才違微出緒餘為世吏師嘉績如雲道則在此奥論宏言著于千祀人壽之長不與國同或佐其始或成其終孰如先生與國均壽壽則甚多國則巳陋視國可悼匪悼其身後人来觀元之壽臣礲硿子碣礲硿子鄭氏諱斗字德方台仙居人仙居有山髙特者曰石礲硿而礲硿子適家其下人以其德峻㧞與山􅁼因號之曰礲硿子云礲硿子少有偉氣學書未成舎去攻醫以藥人病者至視其貧即􅂌以藥不問直有無大疫起比舎駢首臥婣戚畏懦莫敢頋礲硿子䄂藥出入疫家躬和煮治療不少有惓色人德之既而礲硿子益壮乃更悔悟謂吾先人本以儒顯聞吾可易他術􅈥先人名即以藥肆授族人之貧者而刻志於學凡聖賢經訓及古今成敗之籍皆探䆒奥宻抉擿端緒身由而志存之形諸言動文辭蔚然有古風正家睦族具有典法推其餘以周䘏人汲汲不厭元至正癸己大旱民或鬻子以食礲硿子戚之擇􅃾田易粟富人以賑饑者数百家頼不莩死後二年海氓作亂礲硿子率鄉人避其難偕行者或攘人鷄礲硿子不忍責私以貲償之後咸悔戢不敢肆盗發括蒼􅀅犯礲硿子鄉邑礲硿子戴鐡㡌杖鐡杖練習里中子弟為隊伍以備之盗聞觧去守􅀅知礲硿子才可用遣使者持幣蹐廬起礲硿子謀其草事礲硿子知亂不可救拒弗納巳而元亡礲硿子亦且老矣遂􅀮不復仕惟日推所聞知授其徒同姓来學者飲食之礲硿子方嚴好義有非義者以禮開說使入于善故存而鄉人以為師既卒咸悼惜以為失所依礲硿子年六十國朝洪武十一年二月廿有七日卒於家明年正月四日塟于七里之原礲硿子裔出漢安逺矦吉宋建􅂭􅀄有名脩者自永嘉徙仙居歴十一世至户部侍郞雄飛以文學發聞于時台學祠六君子户部其一也從子憲為國子愽士遭亂死于孝博士之兄慰實為礲硿子之曽祖大父合父樞妣張氏宋司諌次賢之孫元慶元路教授國真之女夫蚤死以貞節􅁛礲硿子娶妣兄之女先八年卒三男子曰光明曰顯則曰光韜顯則黄氏出推擇為縣弟子貟貢太學選髙等以鄉先生張君熈状請銘余與台士㳺固知其多竒才晚乃得礲硿子焉於是知余於台士未足以盡交之也銘曰少而竒壮勇於為愈老不衰誰執其機弗大其施有積無􅃜惟後之垂恭題賜和文學􅀓藻紀行詩後新知武昌府事臣􅀓藻以其為􅁥察御史時所受賜和紀行詩四首視臣濂臣拱而言曰天之道不可窺也觀乎日月星辰之晦明則知之地之道不可測也觀乎草木蟲魚之生息則知之聖人天地也其静也與道謀其動也與神俱苟非發於言語文章何由而見天地之心乎臣􅀗事皇上二十年睿謨英断雖非淺陋識所能知至於求賢􅀂不及愛民如赤子此臣之所熟聞者也由此四詩觀之望藻可謂甚切而於民事􅀹詳及之庸非然㢤臣與藻同師且同郡識其為人嘗求其受知之故盖藻存心恕持法平其以御史使江淮間紀行之詩多寓諷諫之意故上喜而和之益可見上之待藻與藻之事上交盡其道也視夫導君以䛕說及與臣下争名者相去不亦逺㢤臣老矣退伏田里乆欲無言矣以曾執筆􅁇史官後敷賛聖治職有冝然者故為藻書之藻自御史轉太子文學後復為御史遂出知武昌云洪武十二年秋七月宋濂題題楼時和勑牒後宋之制群臣有官勲者其所受恩澤可以及其子孫又可推之於婣戚其善善之長抑盛矣㢤此乃義烏楼時和以果州防禦使劉滌死事功得􅀘充􅀅仕郎之牒非特見當時制度而先生之遺仁餘澤猶可㮣見後之觀者寜能無所感乎趙使君像賛宋之王孫元之循吏才優識明政通民治未老而歸臨難不貳懦夫觀之可以作氣書劉生鐃歌後伯夷桞下惠飭身制行皆高於當世然揆諸大中之道或不能無過故其流至於隘與不恭甚㢤為師之難也近代以文章名天下者蜀郡虞文靖公豫章掲文安公先師黄文獻公及廬陵歐陽文公為最著然四公之中或才髙而過於肆或辭醇而過於窘或氣昌而過於繁故效之者皆不能無弊惟先師之文和平淵潔不大聲色而從容於法度是以宗而師之者雖有髙下淺深之殊然皆守矩蹈規不敢流於詭僻迂怪者先師之教使然也烏傷劉生剛從余學經為文頗乆近製國朝饒歌十二曲傳於逺邇士君子􅁛之頋子豈能使生至是㢤實先師之遺教􅀍人深且逺故耳余少於斯文盖有志焉及今􅀹真知之然後嘆先師之不可及也後之有志於學者非果有得於古人之法烏知余言為然㢤䟦鄭仲德詩後浦陽鄭君仲德生之􅀊與余同其名與余同少而從學於吴貞文公又與余同長而多髯又與余同不善飲酒又同余中嵗自金華徙居青蘿山中又與之同里故余二人交最洽也去年冬余朝京師仲德欣然與余同舟㳺三吴山水間起居飲食無有不同者仲德既至喜斯㳺之羙發爲歌詩以寫所遇而余則入侍兩宫晨趨而夕還留数月無一日之暇卒不能􅁇仲德之作心􅀼自嘆兹㳺也幸與仲德同而景物之佳者皆爲仲德所􅄃結余不􅀗效焉何其異耶及乎東歸仲德累以爲言余耄昏好睡竟不能成詩以與仲德相馳驟既而咲曰物之同者一則同二則異矣余與仲德方相與如一人仲德之言猶余之言也何必出余之口而後爲同耶仲德之詩羙矣而余效而似焉尚未免爲異苟不之似非自取異耶多言以求異􅂚若忘言而歸於大同之域也耶仲徳知道者也必以余言為然永康徐府君墓銘君姓徐氏䕫友龍名與字也金華之永康所居邑也諱興諱盛及正孫者曾祖祖考也翁氏妣也祗祗翼翼人不見其怠容兵亂家貲傾瘁心勩力營度綜覈卒完以充歉􅀊發餘粟振里閭温而恭好禮而文遇士友有恩其徳也七十有九夀也元至正壬辰十二月二十四日卒之時也明年十一月十六日塟之期也元綂癸酉九月二十七日卒者其配盧氏也六十者盧氏夀也甲戌十二月二十日盧氏塟也義郷岡谷之原墓所也道弘道惠道杜子也張某吕某壻也儔俊供倧福寜偉孫也椿桔棠根棋音本儀禧敬曽孫也今為國子生授保定税課司副使者棠也去君之卒一世矣棠不敢忘而圖銘以傳其志事悲也余與君同郡雖欲辭不得而辭也銘曰善蓄躬豈必名耶全壽終奚以榮耶德其豐厥胤􅂭􅂭殆􅀅興耶塤箎軒記泛浙河而南舎舟登陸有地曰漁浦土沃以亢池園􅀣林碩羙蕃茂魚稻充羡百貨之所趨行旅之所集聚似市而不澆近野而不俚故其人多優㳺而好文其􅀹以禮譲為人望者􅁛華氏余自京師還華氏之秀者曰拱辰侍其父􅀱于河滸逆子至其家舘於賔次率其兄弟庭揖畢俯身自東階趨退足武相蹈不越尺寸徐與之言長少相頋擇辭而發懇然不煩秩然不畔于理皆良士也視其室名則曰塤箎而予昔之所書者拱辰謂盍有以記之天下之物取諸人者有盡而本於天者無窮能充天之所與則得於人者可棄而勿論矣世恒知在外者之可樂而力取於人其受於天者則怠而不頋卒之兩無所得而戚戚以終身豈非惑㦲今華氏兄弟以言乎爵則未嘗仕以言乎財則非甚富以言乎車馬衣服則雅素儉質與凡民等然入其門則父子有禮兄弟有恩忿疾之聲不聞于室和煦之色不絶于面食力而趨事安生以自適雍容怡愉不教而勸而未嘗有資於外物何必取諸人而後可樂㢤其善充於天也固羙矣天之所與者至重也苟善充之雖困貧甚天猶以爲貴也不能充之能位極乎崇高天猶以爲賤也􅀂華氏之爲天之所貴者也余安敢遺之而不錄乎題黄文獻公所書先府君行實後右黄文獻公乞銘於桞文肅公之状文獻公以學問文章名天下此雖造次所書而考㩀精詳倫序不紊事信而辭實言遜而禮恭皆可以爲法不特字畫之羙也濂常執業二公之門於是二公之卒巳乆矣永念今昔撫卷慨然題李烈婦墓表墓銘後李烈婦墓文二通余友掲君伯防王君子充之辭也烈婦死十餘年二君文其墓今又十年而二君無在者矣人生不足恃惟令名可以無窮覧斯文者可不深長思乎象山王君墓銘國朝平四明蘭山民為亂㓂象山虜縣令丞㩀縣及縣大姓王君剛甫散家貲率敢勇士襲其營破之執縛魁酋数十人跪于庭罵曰汝冦郡縣囚命吏刼平民為害罪當死遂斬之散其餘黨迎令丞以歸郡以其状聞詔賜白金二十兩縣圖其破賊状于鳯躍山佛寺之壁是時朝廷聞亂發近兵誅之兵及境欲屠從賊者㑹君巳誅盗兵乃觧象山民数百環君拜曰微君吾邑幾以不義死由是君名聞浙水東君諱某剛甫字也其先祖某自昇遷閩復自閩徙象山曾祖諱子俊祖諱文盛父諱芝季父􅉮無子君以父命後之君祖父皆善士世以貲聞至君􅀹敦厚有氣量爲學務逹大意能操縱歛散貲愈多然好周施喜士人􅁛其義元季嘗以通蒙古書薦爲慶元路蒙古字學錄盗起黄岩江浙行中書省檄君攝東門巡檢司事攝六年盗畏不敢一人登陸及君去官東門􅀍兵民追思君歌慕之年六十有八以洪武十二年正月某日客死於京師識君者咸悲傷之君娶葉氏宋丞相夣䁀曾孫女􅁇董氏許氏子男二人用䁀好學通詩用釜君卒後乃生女四人其二適林文孟林起宗二在室孫男一曰岵銘曰古重巨室齊于世臣望大聲􅂭可以鎮民民或思亂伺􅂩以動呵而止之俯伏震忠豈􅀂細人勞而少功􅀔卑言輕其誰肻從海島之間萬室蟄蟄煮海樵山易化難縶世當治平不敢蹻騰或逆其情㩀扼阻兵乗亂未弭嘯呼以起火矢風艘入冦東鄙君曰島鼃自􅄬釡中沸湯方然汝計巳窮怒叱壮士盗不可長縛斬軍門以取峻賞大兵東來欲剗􅁾腥聞難既夷飛書大庭凾金走驛一日千里旌爾義勇以勸来者父老相携環拜于􅂗非君有為幾受盗汚鳯躍之山圗畫君像此則其藏過者稽顙李信甫墓銘建業有䔍行士曰李君諱汝成字信甫居家能惠其鄉信其朋友㳺京師卿大夫皆重之勸之仕不􅃪竟歸賈六合市上物價减恒市人之半客遺錢五十緡而去遣人追之不及抵其家授之人以田宅來粥予直視物倍問故則曰欲子孫乆守之也年七十以元至正戊子八月日卒于家君娶郗氏􅂯娶吴氏年五十無子或謂施金飾浮屠像當得子既而夣神人授二栗後十年連得二子長曰譲次曰疑郗生一女適句容王某孫男四人曰某某某某君之先太原人曾大父某徙􅃳大父大振遷建業縣曰上元里曰李岡大振曰此符吾姓冝居遂居之通術数父義亦善士子疑好學行義儒生􅁛之以某年月日塟君于某所來請銘疑言不妄古所謂視其子知其父者疑與君之謂耶銘曰不汲汲於名終以善􅁛不断断於得終以貲贏人維其然故有合乎天噫彼力争而智取者曷不視乎斯阡栖雲室記中峯本禅師結廬姑蘇城西以為禪定之室翰林學士趙文敏公書其扁曰栖雲迨今数十年中峯卒而廬亦頽壞中峯之孫用庵照師作新室於故址復取故名掲之而屬予以記余咲曰師其欺予乎㢤今之廬非昔時之所築也今之人又非中峯也而猶曰栖雲何㢤室廬之壽以百年計人之壽以数十嵗計禦燥濕閱寒暑屹乎有不傾之􅀔毅然有不亡之意今欲求而見之且不可得矣彼雲者起㓕萬状不可斯湏審視奚為而乆棲此室㢤文敏公取以為名固異矣師取而重掲之又異也余復以言文之不亦甚異乎雖然自其易化者觀之則天地曽無殊於水中之漚自其可乆者觀之流電之光可使比於嵗月自其有形者觀之泰山可以齊於毫芒自其無形者觀之一􅄠可以儗於嵩華乆速巨細者跡也有跡者固不足恃以不壞不可以巨細乆速論者道也斯道也何間於古今新故之分㢤然則安知今之廬異於昔時之所築今之人異於昔之人㢤而雲也安徃而不在乎嘗試與師登姑蘇之䑓而覽古今之變三吴之間崇臺廣榭凉亭燠舘敷金碧而炫丹瑶極人力而窮物状者何可勝数盖有歌舞未畢而號泣繼之車馬陳于庭而狐兎巳㳺于􅆍者矣彼之富麗竒瑰苟與拪雲之室絜量大小何啻岡阜之於沙塵今彼皆不復得守而此猶能新其棟宇而不廢何耶盖無道以保身者雖富麗不能乆存而有道之士身亡而名立固不随世以為變遷也吾坐乎斯瞑目而思之充乎室皆雲也皆中峯也大吾耳而接吾目者皆道也中峯之徒苟有志於道孰不可爲中峯㢤尚何取於區區之故名也乎師近道者盍以吾言求之
