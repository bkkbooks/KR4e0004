body:
  text: 吕氏采史目録序皇帝既正宸極龕㝎幽燕薄海內外罔不臣妾慨然憫勝國之亡其史􅀅遂湮微乃洪武元年冬十有一月命啓十三朝實録建局刪脩而詔宋濂王椲總裁其事起山林遺逸之土恊㳟共成之以其不仕扵元而得筆削之公也明年秋七月史成自太祖迄于寧宗總一百五十九卷左丞相宣國公李善長率諸史臣上進順帝三十六年之事舊乏實録史臣無􅀁扵考闕畧不備扵是禮部尚書崔亮主事黄肅與濂等發凡舉例奏遣使者十又一人徧行天下凡渉史事者悉上送官今之北平乃元氏故都山東亦號重鎮一代典章文獻當有存者特擇有職于官者行示不敢輕也章貢吕仲善時司饍成均乃􅀍是選是月癸夘即乗驛北去八月丁夘抵北平凡詔令章䟽拜罷奏請布在方冊者悉輯為一有渉於畨書則令譯而成文其不繫公牘若乗輿巡幸宫中隠諱時政善悪民俗歌謡以至忠孝亂賊災祥之属或見之野史或登之碑碣或載群儒家集莫不悉心諮訪且遣儒生危於等分行乎灤燕南諸郡示以期日有慢今者罪及之爰自丁丑開局扵故國子監至冬十又一月壬辰朔始完以帙計者八十擇髙麗翠紙爲之衣舁至行中書借官印識之進扵南京乙未赴山東河水方凍大雪􅀷二三尺仲善駕牛車遵陸而行一吸一呼氷生髯間巳未至濟南其􅖴詢大畧如北平時又明年春正月甲寅竣事成書又四十帙􅀁搨碑文北平四百通山東一百通不在数中仍印識如前三月壬寅輦還京師巳而諸使者咸集濓扵是有􅀁依據􅁱成續史四十八卷夏六月復詣闕上進仲善以功陞太常典簿㝷爲丞且以史事之重不可易視也集爲目録四鉅編上之而蔵其副扵家徴濂序其首昔者司馬光既著資治通鑑又畧舉事目年經而囯緯之名曰目錄示學者以樞要也仲善今備述采史綱領明其事之良艱示後人以􅁤則也書之意雖不同而心之厚扵仁則一而已嗚呼史有􅆣遺久矣如近代衛紹王之朝記注亡失南遷後遂不䏻紀載當時史臣􅀁属若得如仲善者豈不有勝竇祥揚雲翼之􅀁録㢤順帝乙紀卒得爲完書皆仲善之㓛無疑人有功而不知不智也知而不言不仁也濂待罪國史故不辭而爲之序使􅀚者有􅀁徴焉進史後三月日故胡毋歐陽夫人墓誌銘有序夫人諱汝圓字某姓歐陽氏世爲太和人父宗周毋江氏夫人年十七歸同里胡濟川濟川素爲閭右族其逺祖有諱箋者在宋時以明經及第爲南城丞逢國大慶􅀗封其父諮迪功􅀰毋歐陽氏孺人賛書中有福榮之言遂取以名其堂􅀭文節公實爲作記夫人佐濟川治家政内外咸舉至扵科繇之事􅀹加之意􅃴至正壬辰兵亂江西行中書檄濟川充里之早禾市巡檢爲禦㓂之計早禾當龍泉永新安福之衝兇竪出沒靡常一障之責誠有難勝任者夫人佐之輪楮幣数萬扵公家募驍勇植砦柵相率固守如此者十有餘年卒􅀎全其宗族詩禮􅁝麻如承平時夫人之力居多視彼強家大姓殱扵群㓂者相去不翅萬萬夫人事姑樂氏甚孝敬及嬰疾而亡濟川與仲子子璘方受事于贑夫人含泣視事凡棺衾􅊞歛暨賔􅀕百須之物無不具俟濟川還始殯焉􅀄樂事姑陳氏盡禮今夫人之事樂亦如之議者謂如崔山南家云夫人自􅀊癸卯辟地武山陽至于乙已江西州郡悉平夫人隨濟川還故里室廬已燬扵是相與經營構祠堂以奉胡氏四世神主割􅃾田以充􅀕􅂎而曽祖姑蕭氏墓在􅆊安寺傍者亦􅂢産俾浮屠主之爲薌燈之湏其奉承先志而知􅀁急􅀋如此其戒􅅚子孫必令取則扵先世且曰昔文莭公記爾家之堂有迪教勵業樹家亢宗之言爾曹不可不朂吾亦歐陽氏也爾􅀎朂之則福榮之名未必専羙扵前矣夫人素有痰疾至是加􅇵以洪武庚戍四月壬申卒年五十有五子男三人子瑛子璘子瑀皆克盡子道子瑛先夫人而卒孫男五人相授祖授宗授孔授仙授女三人􅃴某某某子璘卜以某年月日塟于某山之原前塟以鄕先生王君沂􅀁爲状来徴銘先生以文學知名當世状之􅀁述其言冝可信爲之銘曰孝足以奉其姑智足以相其夫力足以植其閭有若夫人其殆繕婦性者歟其殆䔍婦道者歟題朝夕箴後右朝夕箴一名夙興夜􅄰箴凡二百八字南塘先生陳公之􅀁譔也先生諱柏字茂卿台之仙居人與同邑謙齋吳梅卿清之直軒吳諒直翁父子㳺而􅀷扵道徳性命之學盖自謙齋􅀙考亭門人􅀓其遺緒而微辭奥旨先生得之爲多當時有慥堂鄭雄飛景温軰行雖稍後而事先生爲甚謹人以其學行之同通以四君子稱之今􅀚先生之著此箴本末明備體用兼該非真切用功者當不􅀎爲是言鄕先正魯齋王柏會之讀而善焉以教上蔡書院諸生使人錄一本寘扵坐右則其􅀁以尊尚者爲何如㢤嗚呼前􅁱日逺後生小子不知正學之趍唯文辭是攻是溺志亦陋矣濂故表而出之并繫先生師友之盛扵其後以勵同志者云諭頑陶尚書中立爲子言臨海林甲一門皆疫死甲獨治䘮暨甲殁無人藏其屍家犬奔號里巷若狂已而群犬翕集衘甲衣曵至西郊跑􅁟成坎薶焉坎淺不䏻容又復曵出如是者四三始壅土覆之而去新昌黄琛甫有牝犬爲邏卒􅀁食棄骨屏䖏其子衘之􅄟諸野予聞撫髀太息每舉諭諸人人輙􅀏予誕且謂古無是事昔譙縣崔仲文畜犬會石和以丁奴易之不􅀙和殺仲文奪其犬犬齧和守仲文屍􅀲浮􅁟掩之㝷牽和衣訴官和伏誅此晉義熈中事也冀州石玄度犬母育一子愛之甚玄度烹子啖之母候骨投地歛置一窟移塟扵桒間日夕向桒嘷逾月乃止此宋元徽中事也謂古無是事者過矣夫犬􅀎禦盗齚姦解難報㤙傳記􅀁載者紛然也又寕止此二事乎人苦不自重物理有可徴者亦弗之信反指予爲誕予故書此示之人心尚存其亦有􅀁感夫魏府君墓誌銘惟魏氏逺有世序相傳出鄭國文貞公徴􅀄居鉅鹿宋靖康之亂其諸孫某隨高宗南渡来知􅀽州遂家􅀽之萍郷歷若干傳至諱某者生南金南夀父子同試荆湖漕司皆入高選南壽遷鄂之蒲圻遂爲蒲圻人南夀生太學上舎天福天福生府君諱雲瑞字祥卿頴逹善記問􅀙鄕先生盧應奎講說經㫖毫分􅈁析弗之厭㑹延祐科試法行府君竭力従事下噬人矣不久必自覆爾姑待之豪右鄭仲淳挾官中氣勢每魚肉民民不敢誰何間誘府君族子爲劵欲侵其􅁟疆㑹省憲两府交薦府君典教郡庠懼而不敢發其壻郭昇之曰吾何畏扵彼㢤竟踵鄭之爲府君詣郭自言期以誠動之郭見府君容貌魁梧論議英發心甚服之巳而請府君作大書府君揮灑如飛郭曰先生竒士也吾幾失之矣請以田劵還而不􅂅受直也府君操心仁厚而􅀎讋伏暴強􅁼如此府君善學米南宫書得之者不翅拱璧􅀹喜著述有筆記若干卷蔵扵家他如先丗决科諸文皆蠅頭細書装潢成帙以示子孫其皦皦之志猶前日云延祐已未十月十二日卒扵齊安郡上距􅀁生至元戊寅十二月廿日得年四十又一至治壬戊十月某日􅁠厝扵某山祖塋之南後五十年爲洪武辛亥某月某日始克卜塟扵黄盖湖之原禮也府君娶宋氏子男三人長法孫蚤卒次已孫今名􅀚嘉議大夫國子􅀕酒次虎孫亦蚤卒孫男五人子仁子同子栗子子樂子仁子同皆蚤卒孫女三人王克用熊彰毛藝才其壻也曽孫男三人思植思荗思誠曽孫女一人尚㓜濂也不敏官翰林成均時幸與觀爲僚友􅀚乃以祠部主事張孟兼􅀁爲状来謁墓門之銘濂聞府君言行多可書要不止狀之􅀁云而已府君一日方出見家人市物競其價之低昻府君叱曰彼非嗜錙銖之利肯樂扵奔走耶何屑與之較也如其欲酬之大司徒歐陽公文玄名世鉅儒而每稱府君爲賢其徃復尺牘蔵諸篋笥者墨尚濕也嗚呼俗偷民僞久矣有若府君之行之懿其不爲􅋍善扶世之一助矣乎銘曰人僞方滋動隨欲萌錐刀之末􅁬襼而争温温吉人與物無營事機之来一接以誠豚魚可孚况乎冠纓懌然心服匪貌與形慶流後嗣學傳一經施扵有政物無不平黄盖之原峯逥川縈以􅅣其珉以掇其英以昭其聲以告諸冥善財南詢華蔵海因縁序沙門那道輝以其師净慈禪師􅀁著善財南詢華藏海因縁一卷示予先集經以備其事次作偈以􅇚其義不待詳分科叚徧閱䟽鈔而經㫖瞭然自明嗚呼可謂善談雜華者已夫雜華之宗以言乎性則太虚洞然而無物以言乎相則萬􅁚森然而駢列􅀁謂森然者即行布也一而萬者也􅀁謂洞然者即圓融也萬而一者也圓融不礙行布故一爲萬而不見其少行布不礙圓融故萬爲一而不見其多此其大較也然而善財之見文殊根本之智已得畢乎一者也而差別之知未圓欲見乎萬者也今姑舉其畧而陳之則􅀁不舉者可推而見矣凡其􅀁叅五十又三或順或逆或小或大或淺或􅀷皆各有􅀁證其登妙高􅄘不見徳雲而扵別峯相見示法普見也見善住空中變化随念而至明法無礙也見海幢放種種光光中皆有種種竒勝示法無盡也見勝􅀬婆羅門登山投火得寂静樂明法無怖也見自在主􅁱學書数筭印療病建宅鍊藥及農賈等業示法工巧也見無厭􅁕王决囚可駭及􅀚宫殿皆是衆寳之􅀁合成明法如幻也見徧行外道調伏九十六衆離諸異見示法普􅀚也見婆湏􅁡女身出光明照諸衆生今離貪欲明法無染也見徳生童子有徳童女證入大悲大智示法幻住也見大荘嚴園毗盧楼閣慈氏領諸菩薩􅀙他方来彈指一聲楼閣門開善財即入見一楼閣中有一切諸妙楼閣一一楼閣中皆有慈氏一一慈氏前皆有善財一一善財皆悉合掌囬顧一善財之身徧入一切善財身内一切善財身皆攝歸一善財身内互徧互融互攝互入如燈鏡交光重重無盡善財既證此一切境界荘嚴蔵觧脫門文殊遂舒金臂過一百一十餘城按善財頂告以法觧雖巳周而行未圓之故扵是徃見普賢在如来前一一毛孔出種種佛刹諸微妙事善財見身在普賢身中交光互現一切投火得寂静樂明法無怖也見自在主􅁱學書数筭印療病建宅鍊藥及農賈等業示法工巧也見無厭􅁕王决囚可駭及􅀚宫殿皆是衆寳之􅀁合成明法如幻也見徧行外道調伏九十六衆離諸異見示法普􅀚也見婆湏􅁡女身出光明照諸衆生今離貪欲明法無染也見徳生童子有徳童女證入大悲大智示法幻住也見大荘嚴園毗盧楼閣慈氏領諸菩薩􅀙他方来彈指一聲楼閣門開善財即入見一楼閣中有一切諸妙楼閣一一楼閣中皆有慈氏一一慈氏前皆有善財一一善財皆悉合掌囬顧一善財之身徧入一切善財身内一切善財身皆攝歸一善財身内互徧互融互攝互入如燈鏡交光重重無盡善財既證此一切境界荘嚴蔵觧脫門文殊遂舒金臂過一百一十餘城按善財頂告以法觧雖巳周而行未圓之故扵是徃見普賢在如来前一一毛孔出種種佛刹諸微妙事善財見身在普賢身中交光互現一切不思議事悉皆成就嗚呼善財前之􅀁歴者行布也後之􅀁證者圓融也非圓融不􅁕以見體綂之全非行布不􅁕以昭發用之盛圓融體用􅀟泯者也行布則因用而各顯其體者也其後之􅀁證莫知爲之先前之􅀁得莫知爲之後二之則非也是知盡十方刹􅁟皆是善財盡十方刹􅁟皆是文殊盡十方刹土皆是一大香水海孰爲行布孰爲圓融㢤苟謂其無􅀁證入乎則扵渉歴無微不􅊥也苟謂其有􅀁證入乎則性本圓明􅀄無一法之可得也至矣妙矣蔑以加矣雖然經㫖宏􅀷非有識者爲之􅄏明􅀄機之士何自而知佛國師而下頌而白此者凡十人禪師盖後出而益竒者也或曰以偈釋經可乎曰如来說經長行之後必以偈重宣之善慧大士用偈釋金剛經而後世箋經家多效之何爲而不可也禪師名智順字逆川温之瑞安人鐡関樞公入室弟子也出世温之雅山継主福之東禪雪􅈐今住持前刹云送和賛善北歸養毋詩序太原和君希文吕忠肅公之高第弟子也在勝國時肄業成均通詩之傳䟽積試八分􅀅與有禄食俄丁外艱而去養母太行山中飲水著書以爲樂以翰林待制徴不起已而中原板蕩大臣名􅀅争辟以爲屬亦不起㑹兵荒相仍暴軍掠人以充糧􅀁向殆盡唯希文堡障􅀗完希文昆弟之􅀌女十有六人當艱難險阻之中希文又􅀎保全携持而卒歸扵士族故人見希文者咸稱之爲卓行云入我國朝大􅀅軍徐魏公聞其名薦而起之希文即束装就道見上扵治朝與語甚恱擢爲刑部􅀰中未幾遷太子賛善大夫日侍書東朝間甞陳其情素云小臣有母春秋之高至八十有四無他兄弟以爲養臣行年亦且六十雖有子僅四嵗耳烏鳥􅀻情其􅀎自巳乎言訖􅏰然出涕東朝以其言聞上惻然憫之即日遣北還夫君子之爲學劬簡編憊精神窮年矻矻猶以爲未􅁕豈務爲譁世取寵之具㢤亦曰學爲忠興孝耳然其道無二致􅀎忠扵君必􅀎孝其親希文以胄監之俊英雖出而仕而念毋之切惓惓不少忘􅀁以終遂歸養之志希文亦知􅀁以致此者乎盖生逢有道之朝皇上執孝道以御天下故希文朝有請而夕戒􅂗也希文之還服五綵斕斑之衣戯舞親側升堂爲夀冝曰此非児􅀁􅀎天子之恩也􅂄夀之朋簮纓之儔聞希文之歸必行斚授餼委曲相問劳又冝曰此天子之恩非某􅀁􅀎也州里􅀙㳺之彦甞受經希文者必羅拜後先問朝廷􅀁以遣還之故又冝曰此非予􅀁􅀎天子之恩也希文果䏻之則誠知歸羙報上之義而無愧扵學詩者矣雖然希文固卓行之士其􅀎全家以智活鄕黨以仁裁出處以義固人之􅀁難􅀎然希文不可以是而自􅁕􅀹當増益其􅀁學他時杖䇿重来推内聖外王之道以輔我國家上躋唐虞三代之盛使事功勒之鼎彜名氏升扵史冊方無􅀒忠肅公之教不可徇一夫之􅀻行而􅃍巳也傳曰求忠臣者必扵孝子之門予盖扵希文望之故太和蕭府君墓表大江之西蕭爲著姓而居大和之後街者爲􅀹盛唐開元間有従浙水東来爲縣遂家焉譜圖闕逸不知其名而相傳且二十九世矣自時厥後擢進士第扵奉常者後先相望宋氏南渡有爲國子􅀕酒諱某者實生秘書監清伯秘書生南甫某年進士進士生四子長宗聖次宗陽皆以儒學入仕宗聖則臨江府教授宗陽則太和縣校官也次宗孟漕貢進士次則宗元府君然自秘書而下名皆忘今以其字書府君諱夢得元齋其自號也生四􅀊而􅀌鞠扵毋夫人倪氏年七嵗夫人使之􅀙師即知樂學九嵗善屬文同肄業者皆畏而愛之巳而與翰林待制楊君景行師事鄕先生逹􅀚楊氏扵是益潜心諸經而扵易學􅀹精至元庚寅詔㝎江南版籍􅃴部使者李公行縣李集多士扵庭試以經義中者始得預士籍蠲其科繇府君遂升首選時倪夫人已老府君不復有出仕意科目法行雖舊日同門之友多躋膴仕府君澹然若無營或問之則曰吾毋日薄西山吾尚欲逺㳺乎郡二千石及縣大夫數欲剡薦之皆不聽㝷與漕貢君扵縣西二十里創甘竹别業奉夫人居焉夫人性好施遇内外族婣之急者必思周之府君家雖貧能一如夫人之志女弟及甥女未有􅀁歸府君備貲装配于名族夫人恱而安之及夫人病府君不觧衣者数月死則廬墓左三年然後返逺近學者慕府君文行咸􅂅執經爲弟子學成而去若同里楊升雲若永新吳􅀙彦若吉水周通若嘉禾俞鎮皆爲名進士其􅆋􅆋扵北方者尤多不䏻悉舉也府君雖不及仕其仁民愛物之心旦旦不忘縣之賦役無藝強有力者脫籍而使窭夫弱子承焉府君毅然曰是奚可㢤乃走白上官稽其物産而甲乙之編為義役三年人以為􅁢川梁有敝壊者勉有力葺治之鄉鄰有訟者及相闘者是非方紏紛􅀎以片言决之不幸以至正甲午八月十一日卒于家夀七十又七以乙未十二月某日塟扵家東某山之原娶丘氏子男一人飛女一人歸廬􅁜易子韶孫男三人曰執曰安曰鳯執鄉貢進士今選為國子録孫女一人同里吳􅀁與其壻也曽孫男四人曰珠曰韶曰規曰忠府君􅀁著書有易學旁通若干卷燬于兵無復存者府君之􅌾周通集群行為状進士顔成子據之撰銘納玄堂中禮畧備矣執復来請曰􅂅有以表諸墓道嗚呼爵位可致也貨泉可有也聲問可長也唯世惇書詩不可必也簫氏自􅀕酒士傳經于家至扵府君􅀹􅀎継其志而不墜其静也于千其動也徐徐不衒鬻而進趍每􅀷蔵而自􅃾殘膏䞉馥霑丐扵人者亦􅁕以􅀗多士之譽斯不亦君子之儒也欤是為表題墨本黄庭經後余甞見黄素黄庭上下織成玄闌中用丹砂作界道其緭精甚細視之不見􅁝􅈁相傳爲王羲之書盖明州刺史李振景福中遺朱友文者友文梁太祖之子後封􅀶王􅀶王薨竟属陶榖家㝷爲大師李諱􅀁􅀗復入宣和内府宋籙既訖流落人間鮮于伯機以重貲購得用楼閣錦装潢成軸題其籖曰琹心玉文趙子昻爲之賦詩㝎爲上清真人楊許􅀁書且稱其飄飄然有神仙之氣而伯機亦自謂生平書法得之扵此爲多不知何時又歸喬簣成湯垕二氏喬字仲山湯字君載最號蔵書之家今則又入中秘矣子屡閱之其字體絶與墨本不同竟不􅀎别其何者爲真也豈揚與許之跡其實有異扵羲之耶楊櫄氏出示此卷因備志扵其後庻幾同志之士有以訂正之故姜府君墓碣銘有序君諱澤字􅃳甫姓姜氏其先居蘭溪之髦賢祖某父思齊以貲雄于郷環其居五里􅀁凡山若田皆克有之及君之生其父已五十餘越三年父卒又三年毋時氏亦卒貪夫欺君之􅀌弱挾􅃛􅀠爲姦利内蠱而外蝕之并呑幾盡君之女兄道真時已歸金華楊某矣間一歸視君撫君頂泣曰姜氏之世不絶者僅有此息爾苟或􅇯竪欲去之以滅口則宗祀必􅅸爲若敖氏之餒􅀑矣夫豈可㢤區區貲産有不足計也急挾之以歸楊氏鞠育之如已子稍長俾􅀙鄕先生楊夢牛王月溪趙松坡董覺齋㳺志慮淵冲而識見逈㧞遂白扵縣大夫復其先塋若干􅀁田若千畒雖僅存十一扵千百鄕之人士無不謂君爲􅀎者已而女兄命贅扵同里之王氏君不忍􅇚之而去遂舎扵女兄西徧挾王同居事之如毋與姑每得嘉味必先進不進不敢先食及生子若孫􅀊時相率坐女兄中堂羅拜扵庭不知者以爲真其毋姑也君既受女兄􅆑翼之恩􅀁以思報之者無不備悉志慮及女兄䘮夫而無子為立􅀙子恢道為後而躬扶持之其門頼以不墜雖楊氏之婣黨無不以孝弟忠信淑導之有悖戾者懼之以法令亦翕然聽􅀙君再􅀙姪弘道􅀍偽造鈔者􅀁誣弘道􅀄不識其人千夫長帥州官逮繫之􅀙者百餘人君聞之大恐赱州中愬其故官寘弘道稠人中命造鈔者執之乃妄曵他男子以前事遂釋丁未􅀊侵人相食君徃糴七閩時流民􅀁在成羣動以数百計乘間鈔道莫敢何問君獨以計脫卒致白粲来歸六親頼之以濟君頗通刑名家書扵新令􅀹􅀁練習或有致訟者質之君為言其利害訟為衰止君晩命仲子遷婺城中徃来嬉逰以書史自娛因以盤隠自號一旦有疾度不􅀎以生因泣謂二子曰吾非女兄不克至扵是誓􅀅奉窀穸之事庻幾少盡心焉柰何今且先之爾等他日當有以慊吾志遂㝠時至正壬午十月三日也夀六十又是年十一月十二日塟于西山先塋之側配王氏後二十三年卒遂合􅌾焉二子曰明道曰懋孫五人曰焴曰䕃曰溥曰􅁇曰善焴􅀎積學為名儒以薦者為婺州路儒學錄尋舉進士擢永平延安丞孫女二人長􅃴黙成先生七世孫潘思明次􅃴陳仁曽孫三人曰麟曰堪曰増嗚呼金華為文獻之􅀖氣習之􅀁移風聲之􅀁􅀍徃徃人多士君子之行有如君者不幸遭門衰祚薄之餘乃䏻聳然自異不踣其家復樂導人以為善而攄急報恩之志􅀹窹􅄰不忘夫豈無其故㢤傳曰大河東流九里餘􅃳此盖􅀙古而然也濂不敏幸與焴同出扵聞人先生之門墓文之屬有弗得辭其責第􅀷愧者文彩衰弱不􅁕以昭幽廓潜然亦自謂據事直書而無􅀁憾也銘曰孰􅂌之􅂭而閼扵逢其非天邪一髪之存卒續厥門其非天邪無徳弗酬得與善為逑其非天邪發迹詩書有孫為儒其非天邪生遂死安松阡欝蟠其非天邪卓㢤善人延􅁉扵後昆其非天邪䟦金剛經􅂐書後是經功徳如妙高山縦横上下難以數量山雖難量終有盡時喻如虚空庻幾無盡濂以古􅂐寫成卷軸隨寫隨空不見有跡光明熾然徧覆大干是用持􅀉穆菴禪師禪師􅀁具禪師􅀁言禪師􅀁􅂂與此般若非同非别同别两􅄀現前見弗寳積三昧集序録釋氏之書有三法藏焉曰經曰律曰論經則佛與菩薩等所說論則諸賢聖僧􅀁著唯律必佛口親宣而非諸大弟子之得與聞也然而三藏之間綂爲十二部分爲大小中三乗廣大殊勝無􅀁不攝其文乆流中國至秦而絶漢遣􅀰中蔡愔及秦景徃使天竺受其書以歸自是譯師疊至代有􅀁増以卷計者梁則五千四百隋則六千一百九十八唐承隋亂之後稍有廢逸開元之目則五千四十八至貞元中則又増二百七十五宋太平興國以来或翻譯或編纂或􅀵貞元未附藏者又増七百七十五逮元有國又増二百八十六其中頗不􅀎盡知今以千文紀之自天至遵爲號者五百八十六通爲六千二百二十九卷噫嘻其廣矣㢤學其書者茫若望洋至扵皓首而不􅀎周覧唐僧智昇甞編入中國嵗月及譯人姓氏名曰開元釋教録羙矣而不采其文也宋户部尚書王古隨其次苐而􅇚其因縁至扵佛㑹後先華譯同異咸志之名曰法寳標目佳矣而弗表其義也優婆塞陳實分門别科頗括祕詮名之曰大蔵一覧近矣惜糅之自造諸偈而又擇焉不䏻精也東山立庵大師崇志頗病焉廼扵延祐之􅀄掇拾三蔵英華上自三寳流通中至天仙天標坤維人倫之几時刧根塵世諦塔寺道具衆噐之属下及珎寳飲食花木禽獸地獄之品析二十門􅁵爲四卷文貫始終事有源委部居整比秩焉不紊遂􅂑法界體性經中語名曰寳積三昧集鍥梓扵夀聖禪林立庵既示寂板廢不存白庵禪師萬金以精進力􅀷入禪教三昧旁事孔籍亦臻其閫奥悼立庵利物之心勤而傳世之不逺也復爲銓次義例分卷爲五重刻而布之以濂閱大藏者凡三稍涉戸庭請序其首簡濂取覧之儼然如􅊥故物雖未􅀗窺其全而金銀琉璃車渠瑪瑙􅃢瑚琥珀衆寳之積爛然溢目矣扵是互跪作禮而說賛曰巍巍法王寳號爲修多羅毗尼阿毗曇二千大千界以及無筭数無物不含欇無土不現身護法金剛王手持蓮花杵或執七寳劒各逞神通力晝夜不暫離魔軍及末伽無有䏻壞者善慧施方便爲轉大法輪一轉千佛轉佛佛具千佛千佛亦復然輾轉至無邉此最勝功徳如雲雨太空草木花藥䓁根莖皆沾溉如来真正幢無鉅亦無細汪洋四大海了不見涯涘苟取一滳水濕性靡不具炎炎大火聚力可鎔天地餘燼存一粟炎體終弗滅日輪行中天其廣千由旬光入寸􅂩中圓明具日相若􅂄闍崛山山石立萬仞一沙細扵塵孰敢謂非石􅀁以二尊者各出本来智一取六千卷束之四卷間如􅀅須弥盧納之扵箴孔一嘘寒􅁅􅆋死後使復然光照閻浮提利彼有情衆智者􅀎移物勿爲物􅀁移佛言雖至寳執著亦爲障我有大寳藏不落文字中六處放光明七佛時行道時時宣妙法法法悉皆忘㝎見自性佛共成無上道題顧拙軒告命後右拙軒先生顧公告命一通公諱周卿字成子仙居人嘉定癸未賜進士及第任慶元府奉化縣主簿階􅁱職􅀰故事􅁱職卽滿三考関陞令録先以合入階官給告公遂入􅀙政􅀰久之始注授監嘉興府鮑􅀰塩塲差遣然舊制無􅀙政􅀰崇寕􅀄以通仕􅀰易録事參軍縣令至政和中復改以今名乃選人七階之一也比告之首當有十幹暨千文紀號若曰甲天等字第幾之􅀋其尾復欠紹㝎五年七月十三日下十字其背􅁓又當書行在官告院凖鈔出給及寫告棤書當行手分令史主事等名氏而守當官批上本官告命照㑹亦􅁇其後歴年之多皆未免殘闕爾吏部主事碩公之六世􅀙孫􅅣玉爲軸重加装褫持以相示故爲詳䟽之以備當時與故云扵戯世家舊室何處無之未一再傳不知祖諱者有之矣如碩者豈非賢㢤豈非賢㢤䟦􅃽山法㑹記後予旣􅀙祠部羣賢之請爲撰法㑹記一通自謂頗盡纎微近者蒲庵禪師􅀉至鍾山藁一編其載祥異事􅀹悉盖壬子􅀊正月十三日􅀺明禮官奉御撰䟽文至鍾山俄法駕臨幸雲中雨五色子如豆或謂娑羅子或謂天華墜地之􅀁變十四日大風晝晦雨雪交作至午忽然􅄏霽上恱􅃙近臣扵秦淮河然水燈萬枝十五日􅀅晏蕆事如記言及事畢夜巳過半上還宫隨有佛光五道􅀙東北起貫月燭天良久乃沒巳上三事皆予文􅀁未及蒲庵以高僧􅀍召與聞其故目撃者冝詳而予耳聞者冝略理當然也屢欲濡毫􅀘入之㑹文之體製巳㝎不復重有變更保寧敏機師請同􅂁以隷古書成兹卷来徴余題故爲䟽其後使覧者互見而備文云飛泉操浦陽玄麓山有飛泉濂與鄭源先生數觀之造飛泉操皷之琴書諸崖石其辭曰飛泉􅀆瀏瀏洗耳固非􅀆謢飲我牛覆謂我汙􅀆移彼上流具人之形􅀆柰何忘人之憂月堀記余退直詞林戴華陽之巾􅀍鹿皮之裘焚香黙坐存神規中太和薫蒸百體欣順龍降虎升水温火寒周流宻綿莫䆒端倪冲陽子自空明洞天翩翩而来碧瞳方頥氣貌充甚謁入􅀭􅃑言曰月堀之義子知之乎􅀭雄云西壓月堀指月􅀁生之地也吾意則不然太隂之精朔後魄生至望而盈盈極而衰随日漸虧晦而復蘇上下二弦虧盈得平氣和弗偏吾煉九還七返靈丹抽􅄈進退之候每扵月而取則焉因名其室以月堀􅀁以志之予曰陽隂不可偏勝也獨陽不生獨隂不成乾坤搆精六子乃凝水坎火離中蔵偶竒用竒變偶乾道始茂重隂盡消純陽則昭乆而行之與道消摇是謂三一之真也復命之區也若取則乎月無乃專溺扵隂乎冲陽子曰二氣之精互爲其根房日之兎畢月之烏取象表徴指意甚㣲陽既含隂隂亦含陽苟舉其偏道則全張子何見之拘邪予曰言則羙矣其理尚有􅀁遺也人身之中有玄牝焉繋乎天根呼吸􅀁関絲絡聮緜枝葉扶踈静以養之一氣孔神超扵象先不見其朕玉色連姢天光内朗盖以無爲而得無為而成孰火􅀎爲其候孰鼎䏻為其鑪孰藥􅀎為其材我皆不得而知也假形托物著于丹書顛倒錯乱自漢以来巳如斯矣吾􅀅與子握手空明洞天之上當素月流輝銀鋪水翻瑶露􅀄滳寂然無聲委羽仙人必􅀐黄鶴而一下之與子稍一叩焉則予之􅀃爲當矣冲陽子喟然而嘆曰道有精粗象分内外非粗不􅁕以别精非外不􅁕以形内􅀄機之徒未忘乎物苟不以此示之必大􅀏而赱何可與上士玄功之成者並論㢤子之􅀃固當而吾之􅀁取喻又豈可少㢤扵是相視一􅀏冲陽子揖而退予送至庭外冲陽子復請曰一隂之生其卦為姤是月堀也一陽之生其卦爲復是天根也邵子甞徃来其間而􅀁謂三十六宫都是春者其與吾月堀之義頗有合手予曰此大易精㣲􅀁繫雖更僕不䏻盡也予􅁖䏻知之予􅁖􅀎知之君當間諸庖犧冲陽子曰唯冲陽子張姓輔其名以廷翼爲字台之黄岩人盖有道之士也洪武四年正月日玄真遯叟金華宋濂記蟠松說昔人之言喬木必繫扵故家者何㢤盖故家者非一世之謂其封培也有其素保衞也有其道􅀁以䏻上干九霄下蔽萬牛撼雷風而弗驚沐雨露而常新者也嗚呼此亦自承平之時言云爾若夫當戎馬􅌭紛之際無澤不竭無山不童人之屋廬且不䏻自保其有欝欝芊芊巋然而獨存者乎盖必無也理之􅀁必無而今則或見之者是豈人之􅀁䏻㢤非人之􅀁􅀎則天而巳矣中書左司卽中劉君明善居武昌之咸寕其先塋之在崇陽者有松暢茂成林其一最巨者枝柯縈盤􅀔若長蛟角鬛備具而􅀲距􅁬張尤爲可􅀚者焉當汝頴變作蔓延至武昌愚氓之而應之相與建營結柟山之有木者剪刈無餘而崇陽之蟠松巋然獨存人過之者皆彷徨嘆息指而言曰是蟠松者出扵平麓非有絶壑懸厓人跡之􅀁不到也何爲䏻免斧斤之厄乎且其形質與恒松等爾非鑄銅鉄以爲枝柯也又何爲􅀎自全而不損毫髮乎嗚呼我知之矣持之以智力者不􅁕以禦人事之變感之以慶祥者誠可以俟天命之㝎劉君武昌故家累世積善之􅀷故天之報施俾其喬木在墟墓間者不異承平時其意若曰善人者天􅀁厚也苟謂天不厚善人盍扵蟠松徴之亦如是而已矣雖然天􅀅雨而礎􅃳潮􅀅生而飇興家􅀅蕃而林木有輝理之常也今蟠松岀扵百剪刈之餘蒼然而弗渝充然而含滋得不爲劉君之家盛大之兆乎矧劉君以濟世之學歷仕熈朝出持憲節入位卽官聲譽翕然動扵中外其融顯方日進而未已也蟠松之祥又當扵􅁕乎徴之昔人又有言曰􅀣徳如􅀣木木之成材可資扵一時徳之榮身可􅀍扵後裔劉君當益務乎徳㢤某幸與劉君交扵是推原其故作蟠松說宋學士文集卷第十四鑾坡集卷第四
