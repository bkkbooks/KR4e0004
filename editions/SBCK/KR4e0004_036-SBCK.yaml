  text: 宋學士文集卷第三十六翰苑别集卷苐六
  hash: sha256:5b0b6f39909f06cbc597a385bb7607ef956a5e3adb85b7e412e11cc4bf5c3c19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_036-1a}
body:
  text: 吕府君墓誌銘府君姓吕氏諱文福字夀􅀸其先光州人宋季光為極邉戎馬蹂踐無寧嵗遂避去金剛臺上㝷遷黄之黄岡為黄岡人曽大父某大父某父某妣某氏府君㓜喪父鞠扵大母谷氏大毋性嚴厲夙夜飭導必期底扵有成府君年十四􅀙事法家之學稍長唐律義䟽皆精原其意比􅁼相􅀙支分脉貫必􅁢契乎人情遂以抑剛茹柔洗􅁈澤物爲已任時承平日乆未易得禄食乃俯首試吏巡檢之司㑹部使者申公蕳夫持節淮西聞府君名召與計事衆咸愕曰夀􅀸之名何以逹上官之聽乎府君􅀏不荅黃州守脫因不花及萬夫長脱脱皆怙勢受賕貪墨之聲載道府君白曰不去此稂莠禾稼安得而茂乎申公然之皆捕寘于獄正之以罪申公名震淮西者府君之力也陞麻城縣吏邑民􅀍强盗􅀁掠訴之乆未克􅀗元律􅀗强盗至五者􅀘一官里豪陳兾徼其利􅅞駱和尚等賂麻城尉煆煉成獄文上縣縣懼尉與守有連不敢問府君知其􅁈竟平反之縣令長揺手相戒曰毋生事腕可㫁此牘也不敢署也府君􅀙容抱案歴階而升請曰明公即冝署人命至重豈玩戯具耶令長相頋遲回不决府君曰不署則已當申郡司獄直逹憲府矣扵是不得已従之活者五人已而厭煩囂杜門不出忽野峻台出綰郡章野峻台名臣趙魯公子也􅀹愛敬之力辟爲其府吏伶優趙良􅀸以利誘民家女子教之􅁔舞用媒衒上官執權行賕無􅀁不至府君又曰不去禍本其能清政源乎白府公悉􅀓扵法􅀙良者數十人董􅇮歌以争田誤傷人至死議者欲當之重辟董辭輒不伏訴于慮囚使者使者漫不經意疑不决者㡬十載府君知其􅁈竟爲白之俄遷蘄州未㡬即辭歸謝絶人事築存􅀄堂圃中延明師􅚨教子爲舉子業一飲一食必與師俱時大母猶在程􅂆􅀹䔍甞刻日晷扵磗戒家奴授食惟恐後師亦感其禮遇有知無不告之四方􅃅士大夫以術業逰者乆舘之弗厭頻行必有贈遺人􅁛爲黄之名塾云至正壬辰黃䧟于盗府君携家走南昌㝷為僞漢􅀁㩀僞漢之謀士多府君之弟子欲邀致之府君㦸手嫚罵衆知其不可而止入我國朝其子熈出仕爲縣淅水西府君防閉訓迪􅀹䔍蚤出則使扄鐍其戸莫歸必歴叩其􅀁行事且曰某事當如斯不當如斯諄諄千百言弗止熈受教爲清白吏府君事毋孝遇人也以惠婣友不能婚嫁者􅂇之死無塟者爲給槥櫝雖屢求弗厭性剛直或有過眚必靣折不少恕然逺近皆惟爲吏師􅀙學者森森立左右獄辭鈎連有不可决君片言之間如庖丁刺牛皆迎刃而觧與之逰者皆敬而憚焉不幸以洪武庚戌三月二日卒扵鎮江丹徒縣寓舎壽七十二以是年五月九日塟縣東大􅄌鄉馬鞍山之原禮也元配葉氏先十三年卒􅁇配姚氏子男一人即熈嘉義大夫吏部尚書孫男三人謙讓安山女一人李希顔其婿也予聞之魏文矦時有李悝者撰次諸國之法爲法經六篇漢蕭何增之爲九自時厥後世益代增直至三百有餘爲之章句者十有餘家家數十萬言凡㫁罪􅀁當由用者合二萬六千二百七十二條七百七十三萬二千二百餘言嗚呼律豈易言㢤自非府君才識之明㫁决之審孰能中其肻綮者㢤是冝銘銘曰法乃司命懸扵重輕脫不􅀗扵簡孚􅀅枉物而傷生故􅃤覈者􅁼貽扵隂旤而哀矜者必兆扵尊榮嗚呼如府君者其殆善用而得其平者歟漢天師世家叙嗣漢四十二代天師張真人以世家一卷命上清道士􅀓同虚徴濂序其首蕳濂聞古者名世諸臣史官必爲序其世系表以􅀓􅀁以敦本始昭㓛伐也况扵神明之胄理有不可得而􅆣者今􅀁輯世家但始扵㽞文成侯而其上則無聞焉濂因㩀氏族羣書􅀘之復用史法畧載其相承之緒使一閱輒知大都而其詳别見扵左方云序曰張出自􅁎姓軒轅子青陽氏苐五子揮爲􅃓正始造􅃓矢張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有􅀸士張仲其後裔事􅀳爲大夫張矦生老老生君巫君巫生趯趯生骼其孫曰抑朔至三卿分􅀳張氏事韓韓相開地相韓昭侯宣惠王㐮哀王開地生平相􅁵王悼惠王平生良字子房漢太􅀓㽞文成矦居沛之豊邑生二子侍中辟彊及不疑不疑嗣侯生二子典髙典生黙黙生大司馬金金生陽陵公乘千秋千秋字萬年生嵩嵩生五子壮讃彭睦述其後多以功烈著􅀓至於唐列爲安定范陽太原南陽燉煌􅁱武上谷沛國梁國榮陽平原京兆等四十三望族中出宰相凡十七人髙生通通生無妄無妄生里仁里仁生覺覺生起起生桐柏真人大順大順生漢天師道陵是爲玄教之宗其􅀓緒悠長倍前望族之盛論者弗察見㽞矦􅂯世國除即意其絶嗣殊不知流裔南北如斯之繁也道陵字輔漢建武十年生扵呉之天目山暨長􅀶習群書􅀙學者千餘人㝷中直言極諌科拜巴郡江州令棄官􅀮洛陽北邙山􅁱煉形之術章帝以􅀶士徴不赴和帝即位召爲太􅀓封冀矦亦不就乃杖䇿逰淮入鄱陽上龍虎山合九天神丹訪西仙源􅀗制命五嶽攝召萬靈及神虎秘文扵璧魯洞俄徃嵩山石室得黃帝九䁀丹書及道既成聞巴蜀沴氣爲人菑銳意入蜀􅀄居陽平山遷鶴鳴山感玄元老君屢授以經籙之法扵是分形示化復立二十四治増以四治以􅀿二十八宿妖厲爲之衰熄如􅀤醎泉破􅀑城之事甚多不能􅇱載永夀二年復遷渠亭山出三五斬邪雌雄劒二陽平治都功印一授嗣天師衡使世世相􅀓乃乘雲上升夀盖一百二十又三云衡字靈真有長材詔徴黄門侍郎辟􅀮居陽平山誓以忠孝導民君子謂其有􅁇宗開緒納俗安善之功衡生京師魯字公祺益纉前人之烈以􅀑道教人自􅃅師君其来學道者􅀄皆名􅀑卒受本道已信虎􅀕酒各領部衆多者爲治頭大􅀕酒皆教以誠信不欺詐有病者自首其過復設義倉置義米肉其中任人量腹取飽過取則有禍人歸者日益衆遂雄㩀漢中詔授鎮民中郎􅀅領漢寜太守其後歸魏太祖拜鎮南􅀅軍封閬中侯五子皆爲烈侯女歸太祖子彭祖魯死謚原侯生盛字元宗魏大祖封都亭侯弗受始自漢中還龍虎山創三元日升壇授籙盛生昭成字道融端坐石室虎豹逢之皆伏暨化去或見􅀐鶴逰空中􅢳冡驗之唯冠􅂂㽞耳昭成生椒晋安帝召之不至椒生囬囬生逈逈生苻苻生祥祥字麟伯隨洛陽尉能吐丹寘掌中光芒穿屋復吞之祥生通玄嵗大疫以標植水中汲飲者咸愈通玄生恒唐髙宗問治國恒對曰能無爲則天下治矣上嘉之恒生光光生􅄌正􅄌正生士龍士龍忘玉印長安酒家一少年盡力舉之不動明日士龍􅀏而携去士龍生􅀿韶􅀿韶生頥頥生士元字仲良瘠而多髯居應天山四十年山多虎人莫敢謁焉毎大風雨遥見乘黒龍徃来諸峰間士元生翛翛生諶諶生秉一字温甫目光如電夜能視物甞􅀒劒行山澤間叱一老樹雷即震裂之撃死二巨蟒及小蛇餘百秉一生善善生季文五代之季受其籙文者頗衆乃鑄鐡環劵數萬􅁇之季文生正隨宋大中祥苻八年召至闕賜􅃅曰真静先生後凡稱先生者皆賜􅃅也吏部尚書王欽若爲奏立授籙院正隨生澄素先生乾曜乾曜生虚白先生嗣宗嗣宗生􅁚中字拱辰生三月能行五月能言七嵗朝京師錫以􅂵衣象中生葆光先生敦復無子􅀙子葆真先生景端嗣景端亦無子􅀙弟虚靖先生􅁇先嗣􅁇先字嘉聞五嵗不觧言聞鷄鳴忽失􅀏賦詩人異之崇寕􅀄觧池塩水溢遣使者召見書鐡苻投之怒霆磔蛟死扵水裔一日隨上入􅆍殿宫嬪競以扇求書􅁇光以經語書之皆宻契其意中舉一握稽手書曰保鎮國祚與天長存乃上􅀁御者也上竒之命禱雨三日乃止授大虗大夫不拜詔江東漕臣即山中度地遷建上清觀改爲上清正一宫􅀙其學道者恒數十百人靖康􅀄上復召時金人犯汴行至泗州天慶觀索筆冩詩􅀮几而化塟于􅀛山之麓後十六年西河薩守堅逰青城山相遇扵峡口􅁇先以書一封赤舄一􅃗令逹嗣天師家嗣天師大驚使人􅢳􅀛山之窆唯一舄存􅁇先無嗣以􅁚中之孫時脩嗣時脩曰􅁇先􅀙子也吾烏得後之衆曰法統􅀁在孰得而奸乃􅀙時脩生正應先生守真守真在母胎歴十九月始産毗陵有妖憑樹詔劾之一夜風雷㧞去後㝎濤江衝决高宗賜以􅁚蕳寳劒清静隂苻二經守真生景淵景淵生慶仙張公洞有井甚深慶仙戯折木葉擲之俄波濤騰湧有一老翁􅀙中出慶仙呵戒之而去慶仙無子􅀙子觀妙先生可大嗣可大守真之曾孫其祖伯瑀父天麟皆常攝教事鄱陽水漲壊民廬無數􅀽提刑甫請可大治之殛死大白蛇水遂平㝷又遇旱蝗可大禜之雨作而蝗殪􅃙受提舉三山苻籙兼御前諸宫觀教門公事主領龍翔宫時當宋季元世祖聞其神異宻遣間使訊之可大授以靈詮且謂使者曰善事爾主後二十年當混一天下逮至元十三年果驗可大生宗演字世􅀓世祖平宋憶其父言有徴􅀿遣兵部郎中王世英刑部郎中蕭郁賫詔召之賜玉冠玉圭冠以靈應冲和真人之􅃅仍給三品銀印令主江南道教事得自出牒度人爲道士宗演生與棣字國華世祖時宣授體玄弘道廣教真人賞賚優渥竟卒于京師與棣子弟與材嗣與材字國梁元貞􅀄入見大明殿制授大素凝神廣道大真人大徳二年海塩塩官两州潮水大作沙岸百里蝕齧殆盡延及州城下與材投鉄苻扵水苻踊躍出者三雷電晦􅄀殱恠物魚首􅀛身其長丈餘隄復故常五年冬無雪上曰冬無雪民間得毋有灾害乎與材爲建壇禱之是夜雪下盈尺上大喜命近臣賜酒曰􅀸能感神明一至此耶八年録平潮㓛加授正一教主兼主領三山苻籙給以銀印視二品九年崇明州海隄崩俾弟子持苻徃劾之民夣有神填海者遂安至大􅀄加賜寳冠金服制授金紫光禄大夫封㽞國公給以銀印視一品與材生太玄子嗣成嗣成卒弟嗣徳嗣嗣徳卒其子正言嗣正言卒太玄之子正常嗣正常字仲紀即今天師國朝六覲京師洪武􅀄制授正一護國闡祖通誠崇道弘徳大真人領道教事給以銀印視二品上復賜以褒文稱其瞳樞電轉法貌昻然人以爲榮盖歴代相􅀓以眼圓而鉅者爲玄􅀿故上因及之云濂聞文成侯年少時學禮淮陽東謁蒼海君蒼海君先儒學士以爲海神是也後又見異人黃石公下邳圯上則其未逹之際固已能交通扵神明至其晚年名遂功成乃欲辟榖􅀙赤松子㳺實其􅀄志非曰托之以自逃也故其九􅀓至漢天師感慕興起學輕舉延年之術祓除隂慝一以善道化民而嗣師系師􅁇之脩其業而弗墜唯恐有人横遭夭閼者當漢之季天下雲櫌唯巴漢之間民生晏然行者不褁粮居者不捍􅀜官府頼以成治如此者垂二十年其㓛之及物可謂侈矣冝其世有令人出俾至化奚翅古諸矦之國天之報施不亦彰明者㢤或者􅌹歸扵名山神氣之結故能演迤盛大如斯其論亦淺矣嗚呼文成侯子孫南北在在有之其以㓛烈􅂋著者小則充法􅀙大則至宰輔非不光明俊偉也曾未幾何䧏爲皁隷者有不免焉其視玄裔相仍歴千二百有餘嵗而未巳者爲何如盖必有其道矣嗣是而興者尚知朂㢤尚知朂㢤䟦樗散生􅀓後樗似椿人呼爲山椿或呼爲虎目桐以其葉脫䖏有㾗如之故名材極易大而不中器用故又以散材􅁛之同郡許君存禮有長材而不輕扵世用托樗散生自􅃅雖其執徳之謙要亦有激云爾然而白玉在􅒄而中夜吐光若虹雖欲自閟終不可得存禮今用薦者教授于燕􅀅自此而升爲徂徕之松新甫之柏建明堂搆清廟爲棟爲梁無􅀁不冝樗􅄆云乎㢤樗散云乎㢤題永新縣令烏􅁇善文集後世之學者必有師雖百工伎藝之微亦必有以相授然後能造其閫粤况爲文者􅀤造化之秘貫今古之統茍無以管攝而闔闢之則何以盡其變化不惻之妙其不􅀓之扵師奚可㢤吾鄉修道先生胡公以光明正大之學􅀤扵精深嚴蕳之文訓迪學子篇章句字皆有法徃徃􅀙之者多得文之㫖趣其􅀁造固有淺深髙下之殊而體裁終不失扵古四明夣堂噩師雖居浮屠中能乆與先生㳺先生爲文之法實與聞之烏君􅁇善自㓜學文扵夣堂凡先生􅀁指授者悉以語烏君故烏君之爲文峻潔如明月珠起伏如春江濤因語二三子曰必如烏君然後可以言文也􅀂無師授其可易致是㢤予常譬之有美錦焉使朝市縫人製之則能中度而􅃴體委扵巖穴之粗工則左低而右昻上侈而下歛錦固錦矣其如不合何文之無師授者亦若斯而巳予老且多病文字一切謝去不作縦有一二多仰手扵人獨喜烏君之文親題後而歸之嗚呼子生也雖居先生之鄉而不能􅀓先生之學其扵烏君又豈能無慊扵中㢤烏君名斯道􅁇善字也明之􅄌溪人甞知化之石龍縣令調吉之新水其爲人温然如玉盖與相􅁛云瑯琊山㳺記洪武八年十有一月壬子皇上以皇太子暨諸王乆處宫掖無以發舒精神命西幸中都㳂道校獵以講武事濂實奉詔扈㴀十有二月戊午次滁州驛濂進􅢳曰臣聞瑯瑘山在州西南十里晋元帝潜龍之地帝常封瑯琊王山因以名頗聞秀䴡偉㧞爲淮東竒􅀚願一逰焉而未能也敢請皇太子驩然可之即約四長史同行秦王府則林伯恭晋王府則朱伯賢楚王府則朱伯清靖江王府則趙伯友遂自驛西南出過平臯約三里􅀁望豊山盤亘雄偉出瑯琊諸峰上唐梁載言十道志又云豊亭山山上有漢髙皇祠又有飲馬池世俗妄􅀓髙祖曾飲馬于此國朝以山麓爲畜牧之塲别鑿池飲馬仍掲以舊名居人指云山下有幽谷地形低窪四靣皆山其中有􅂵㣲泉宋歐陽公􅁱􅀁發泉上十餘歩即豊樂亭直豊樂之東數百歩至山椒即醒心亭由亭曲轉而西入天寧寺今皆廢唯凉烟白草而巳濂聞其語爲悵然者乆之山東南有柏子潭潭在深谷底延袤畆餘色正深黒即歐陽公賽龍䖏上有五龍君祠皇上􅀄龍飛屯兵于滁會旱暵親挾雕􅃓注矢扵潭者三約三日雨如期果大雨及御寳暦爲作欄楯護潭且新其廟廟側有時若亭濂坐亭上問潭側􅀟燕洞及其南白鴿洞以肆窮覽人無知者乃止復西行約三里􅀁有泉㵼出扵兩山之間分流而下曰醸泉潺湲清激可鍳毛髪􅅖岸有亭曰漸入佳境今亦廢唯四大字勒崖石間淳熈中郡守張啇卿等題名尚存㳂溪而上過薛老槗入醉翁亭亭乆廢名人石刻頗夥兵後焚煉爲堊殆盡亭後四賢堂亦廢亭側有玻瓈泉又名六一泉石闌覆之䦨下壓以巨石中䟽一竅通泉徑可五六寸手掬飲之温是日天隂雪花翩翩飄伯清亟倡曰雪作矣不還􅀅何爲濂逰興方濃掉頭去弗顧其歩若飛歴石徑一里􅀁至回馬嶺伯友追而至伯清􅁇之伯友曰二客足力弱不能􅀙矣二客伯賢伯恭也其謂回馬者建炎㓂盗充斥郡守向子及因山爲寨植東西二門西曰太平東乃回馬也嶺之東有醴泉又其東南有栲栳山山之南有桃花洞又南有丫頭山山之下有熈陽洞皆未暇徃蛇行罄折黃茅白葦間莽不知􅀁之宋熈寧􅀄僧崇㝎􅀗佛舎利六百壘石爲四十九塔扵道隅纍纍如貫珠塔雖廢幸有遺址可憑徑行無疑其路若窮又復軒豁盖峯回路轉九鎻而至開化禪院院在瑯琊山最深處惜乎山皆童而無蔚然深秀之趣唐大暦中刺史李㓜􅀸與僧法深同建此院即張文㝎公方平冩二生經處三門外有􅀚音泉入院皆瓦礫之區唯新構屋三楹間中施佛像僧紹寧出速坐方㝎龍興院僧徳學同太子賛善孟益秦王伴讀趙鐄呉王伴讀王􅂹椘王伴讀陳子晟聞濂入山咸来會晟云太子正字桂彦良憇六一泉上亦􅁕弱不能進恐隨二客歸矣寧具飯飯客飯巳學引觀庻子泉泉出山罅中乃㓜􅀸􅀁發李陽氷􅀁篆銘巳亡張億書三字碑亦㫁裂卧泉下石崖上多諸儒題名䧟石爲一方鎸勒其中自皇祐淳熈乾道以来皆有之字或􅂐或􅀠或楷或可辨或不可辨山之東西在在皆然不特此泉也泉之南有白龍泉禱雨多驗童行堂下有明月溪稍南有呉道子畫􅀚音及湏菩提像刻石壁上傍鎸淮東部使者八八舜臣瑯琊山記頗不合文體爲之破顔一􅀏又稍南有華嚴池由明月而上入歸雲洞訪千佛塔遺址過石屏路俯窺大暦井井亦㓜􅀸􅀁鑿㳂山腰陟磨拖嶺逺望大江如練鍾阜若小青螺在㳺氣􅁳茫中聞嶺下有瑯瑘洞洞廣两室中有一穴深不可測名人題識無異庻子泉懼日夕復不暇徃然自㓜􅀸􅀶求勝迹鑿石引泉以爲溪左右建上下坊作禪室琴䑓後人頗􅁇其風山中之亭㡬二十􅀁而日􅀚望月爲􅀹勝今荊榛彌望雖遺迹亦無􅀙求之可嘆㢤夫亭䑓癈興乃物理之常奚􅁕深嘅􅀁可嘅者世間竒山川如瑯瑘者何限苐處扵偏州下邑無名勝士若㓜􅀸者黼黻之故潜伏而無聞焉爾且㓜􅀸固能使瑯琊聞于一方自非歐陽公之文安足以逹扵天下或謂文辭無􅀜扵世果㝎論邪然公以道徳師表一世故人樂誦其文不然文雖工未必能乆􅀓也􅀓不傳亦不足深論獨念當元季繹騷竄伏荒土朝不能謀夕今得以厠迹朝班出陪帝子巡幸而瑯琊之勝遂􅀗窮探豈非聖徳廣􅀍廓清海宇之􅀁致邪非惟濂等􅀗沾化育生成之恩而山中一泉一石亦免震驚之患是冝播之聲􅁔以侈上賜㳺􅀚云乎㢤因取醉翁亭記中語風霜髙㓗水落石出字爲韵各賦一詩授主僧紹廣刻諸山石云故龍泉縣學教諭湯府君墓志銘有序䖏之龍泉有簮纓族曰湯氏自宋婺國公載八􅀓至望望生鏞鏞生濵濵生龍泉縣學教諭府君諱楷字文則三世皆以尚義著􅁛元至正間甞下令旌爲義門至府君益厲志惇行石末忠愍公宜孫御史中丞誠意伯劉公基御史中丞章公溢王府叅軍胡公深皆愛敬之而忠愍公相知尤深力薦起爲教官免强就職未㡬輒辭年五十三以至正乙巳四月十一日卒家其年八月二十日塟于䴡水縣雲和鄊徳廣里梓坊原有詩文若干卷思誠録一卷蔵于家府君配呉氏無子季弟梅次子燧来爲後燧生二于綰績女一􅆘王徳厚孫女一未行燧甞以濂銘其諸祖之墓復奉同郡季宗起状不逺千里来徴銘嗚呼府君位卑不得上其行史官苟墓門之文抑而不與尚何以爲扶世導民計㢤銘曰惟湯受姓其出自商以謚爲姓源鴻流長譜逸宗堙莫䆒厥詳徙于括者至宋􅆍昌簮纓蟬聮義聞赤奕府君承之祖武是式粤自弱齡嗜學尤􅁄褁糧􅀙師不憚逺􅃥下而百子上而群經心􅆂口詠必啄其精寒燈在壁夜分猶青無末不詠無本不凝􅀤爲詞章奔放莫禦五色交絢不可正視亦持貢凾應書而起議茍不合退􅁱扵己吾有天爵不假外求秉心制行期􅂂大猷自我先人唯義之逑闢塾建荘群族之繇養或有愆益田以百居或䵝昧加以􅂗飾明掲教條皦如星日以䆒以繹以衍其澤徃聘碩師用緝教功曰優曰柔式昭式融春秋舎菜執禮愈恭疇意漓俗􅀗還淳風豈䘏吾宗不逹州里仍嵗大侵我心如燬我糶我粟爾哺爾匕􅁇以􅁵牟惠及終始元季兵興海内繹騷青田群兇是讙是呶彼􅤒悍者虎擲䑕跳欲起應之屠劉恣驕君登于庭暁以順逆不見禍首身膏矛㦸妻孥蒙戮􅀑不血食爾盍自固以禦㓂賊衆皆羅拜願如君言我刀我淬我柵我完我謀既叶孰敢來干威聲大振㓂膽遂寒唯忠愍公統馭三郡麗陽遺孽􅀒逆奸命公欲刈之以􅀭大政怒如雷霆疇敢與競君跽轅門慷慨陳辭䝱従罔治渠魁當誅􅃖􅃖小氓惡得盡夷公因聞納降者釋之里之三農越河種藝載耜與牛資舟以渡官有海禁吏因覊􅎗歩如千望絶莫赴君聞衋然是何􅃘爲即日戒行囊有長書徑詣大官歴斥其非卒復其舊民憂以攄君性至純兼以沈毅惡欲如讐嗜義如利服不及華食無重味􅂂氷臨淵惟恐失墜事親􅀙兄􅁢爲世模柔容愉顔張拱而趍行孚于家徳則有餘大衣長􅅂見者翼如嵗時烝嘗􅀹極慎慤出就齋室心存冲漠洋洋如臨式是昭格鄉鄰化之孝思油若撫事接物盎然春熈楊淑􅀮慝欲道之歸里有􅐁争爰質爰稽茍聞話言如聽父師其形之端由表之正况能周急以􅂫羸病友有􅀉金沒于兵穽家惟一牛償之弗靳君徳之施漸漬益真人爲弗滋智熄紏紛及聞其死孰不沾巾僉謂斯世不復斯人嗚呼哀㢤成周之世畫區而畊量夫授地孰富孰貧孰有餘利盎然太和何有窮匱阡陌既開单公爲􅀻大􅀅連圻㣲無卓雖民散無繫民冝是綏仁鄙壽夭乃政之基奈何棄諸藐若蛙􅀛不有君子誰復斯憫聳善扶義其利維永成慤之心實重耿耿菉葹縱横申椒之馨鴟鴞晝呼長離曶鳴誰不改容誰不鬯情殁而不旌爲善者懲彼有穹爵吾棄弗頋此惟布􅅊􅀤吾艶慕大書塋間表厥中素此吾直茟􅀄非䛕墓思逺樓記盱江有湕湖周圍凡若干歩􅆂日星而盪風烟四時之景無不冝者大姓胡氏世居湖濵以詩禮爲學至吾永年人益稱其賢以薦者起家爲吉水幕軄遷海北塩課司白石倉副使未及大用而終其弟永實其子原鳯原鵬原駒皆􅃅善􅁇大夫士恒集其門永年欲建樓以蔵先世遺書不幸責志以殁原鳯兄弟請于永實因竭力成之名之曰思逺示不忘乎親也介前進士曾君仰来徴予記予問之曰思逺之義何居原鳯對曰不幸先人即世一念及茲精神遐漂無􅀁戾止有時樞衣升高極目四顧見雲烟之卷舒星河之出􅃿泫然流涕曰吾先人果何􅀁之精爽或有靈庻㡬乘雲龍而一下焉斯思逺之􅀁以名樓也予曰是固然矣而其義未盡也原鳯又曰今人邇矣而逺者莫若古之人古之人隕魄黄壚泯然不可見其跡其精神心術之近存者頼遺言見扵書爾大則聖次則哲次則忠與孝徃徃形諸載籍一展卷間神交㝠漠有不知千載之爲長一日之爲短者孶孶焉悃悃焉日致力扵斯庻㡬契先人之􅀁志爾是或思逺之義乎予曰逺固逺矣而未切扵身也盍更言之原鳯扵是研精覃思大周六合小入一髪黙然良乆忽楊眉吐氣而頋予曰我知之矣先生􅀁謂逺者不在今人亦不在古人在吾之一身爾吾身非突然而中有也前之千萬年自地闢天開䋲䋲相承以迄扵吾身後之千萬年又自吾身亹亹相續以至扵無終不可以數計不可以智推庸非至逺者乎吾身一有失焉則前焉而弗能􅁇後焉而弗能延其責果安歸乎是以君予懼其學之有爽也􅅥􅅥然如􅂂淵冰恐其行之弗􅁤也惴惴焉如馭六轡此無它逺之不可不慎也若是何如予乃喟然歎曰子言今得之矣頗苻先子之􅀁望矣嗚呼逺固逺矣而甚邇也古之人有三太上立徳其次立功其次立言若而人逺者數千年邇者亦一二百年其人固不得而覩矣玩其遺文想其徳業儼然若與之周旋堂序之上未甞知其死也􅀁謂人雖死而有不死者存此之謂歟原鳯誠知此則又能以逺爲邇無難矣永嘉之勝亦有樓名思逺者彼盖慕浮屠之學此則䔍扵􅃔倫而有􅀜扵名教世必有能辨之者予與原鳯言不過如此而止若夫湕湖之風物與斯樓之雄䴡賢士大夫當有爲原鳯賦咏者予則可畧也金溪縣義渡記撫州金溪縣南若干里旴水與清江合流入于汝名曰東溪其地為四逹之衢人之􅀁􅀒物之􅀁載咸出焉溪廣不可梁必籍舟亂流以濟當氣升水起篙師艤櫂以徼金錢踰時不能􅃍􅍱或水落氣縮氷霜寒沍􅁼掲跣以進若履刀㦸然人病之溪濵質行士曰何有華惻然以為已憂伐堅木造舟寘諸衝徃者聚數十人輙渡之来者亦然割田食舟子自朝抵夕不敢斯湏逺去舟敗更新之周語曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁此有司濟人常事爾􅀄不責民也有華以編泯能佐官政之不及可不謂賢㢤有華字祥瑞周窮扶難甓􅂗架橋其事盖不一而􅁕云建寜黃母夫人陳氏墓版文子門弟子黃仁詣前泣曰仁也生九嵗而失毋晝夜􅈱􅈱以啼惟我大母夫人是頼鞠我迪我式克至扵今日忝􅀍官使竊禄于朝未知􅀁以圗報而大母棄捐舘舎叩地􅃅天無􅀁逮及幸稱道淑徳勒石墓門猶或可為之已請􅀳府左相陶公凱評隲群行列為事状一通願先生賜之銘死且不朽矣按状夫人諱善足姓陳氏建寧西甌人㓜喪母馮氏嶷然能自植立不與同􅁼㳺敖父某心竒之有問名者多弗荅同縣黃氏世衡知其賢聘爲其子義夫妻未及笄輙来歸上承尊章下恤媪御靡不逹其情曲三族咸驩稱曰黄氏有婦矣生四男子二女子義夫以疾終夫人哀慟欲􅀙死不可得諸􅀌恒㷀㷀無依盖蔵漸盡朝虀暮塩至不能時給夫人深憂之雞􅀄鳴秉燭起御紡磚伊軋之聲逹旦不絶如是者餘五齡誓以氷雪自守至扵終身外伯父馮翁恐其中僨無筞生群雛力諭之曰爾勞勩逾節尚不濟旦暮急苟縁是致疾辟猶鵲巢霣地母子無完理奈何使黄公爲餒􅀑乎夫人泣不對翁重言之聲色俱厲夫人不􅀗巳􅂯適義夫同姓寒潭君君無子頗饒扵貲乃聘經師以教夫人之子夫人亦時警斥之曰汝衣冠胄也汝父望振其門惟􅄰忘之今不力異日何面目相見九泉乎凡一動静一云爲皆痛約之以禮稍有違忤靣􅀤赤如赭諸子惴惴不敢前或遇節序相率詣先祠奠謁畢出坐中堂子孫以次奉觴爲夀雖不觧飲亦必使沾醉盡􅂬而止夫人長身而羸靣恒作頳玉色春秋雖髙康􅆠無疾見子普保以易經試藝銓曹中選擢合州石照丞石照以民稀并入州改忠之鄷都丞階􅀅仕郎孫仁亦通周易領福建行省第四名文觧上南宫未試除太常賛禮郎階􅀅仕佐郎今陞靖江王府奉祠正夫人時移書戒厲曰爾等既食君禄當夙夜靡􅈈以效精忠慎勿以貪墨敗非惟喪身實貽先人羞夫人年八十四不幸以洪武九年正月六日卒其年某月日塟于金籠山之原禮也􅀁謂四男子曰同壽曰衆嘉皆夭曰如滿曰普保二女子一􅆘范員一夭四孫男曰仁曰義曰貴曰炯二孫女未行予聞女婦爲隂􅁼徃徃多柔順少剛明事或因循姑息苟有人焉能嚴以馭衆如竒丈夫則其家蕃盛無疑如夫人者是已予祖母金夫人最號有家法先侍郎朝夕侍左右不敢失聲􅅉咳唯恐弗其意且督子兄弟之學􅀹急毎夜懸燈呼次第来前取倣書以驗惰勤事頗與夫人􅁼宰木巳拱而懸繂之碑未有刻文而仁扵新喪之際乃能汲汲以圖不朽得非賢耶仁為賢則予有愧多矣銘曰家之盛衰繫扵婦柔暗剛明隨􅀁取彼羙夫人資獨阜巳以委禽奉箕箒竭力秉誠事姑舅中外稱賢出一口威髙鳯翔日􅀅乆獨遺􅀌凰在林藪衆雖嗷嗷弱如桞鞠之育之比瓊􅅼遺胤不絶吾敢􅀒凛若嚴師加善誘業就材成獻明后繡襮朱衣佩懸綬龍光貤贈恩當厚丘隧尊榮名弗朽予言若誣有如酒
