body:
  text: 㳟題御制賜給事中林廷綱等勑符後洪武十二年正月二十一日上御奉天門􅁠給事中林廷綱等陸人以歸省其親爲請上欣然可之明日陛辭上親制勑符諭之且命人各書其副以歸廷綱等咸叩頭拜受而退既而廷綱嚴裝成卷以示臣濂請識其左方臣聞古聖君之待重臣當授職之際必告之以言如尭之命九官周康王之誥君陳者有之矣今廷綱以􅀄試職之小臣而有此賜誠古􅀁鮮有也小臣􅈾此賜或有之然昔時訓命之辭多作於代言之官如廷綱之賜出於上所親製者無有也親製者或有之求其誨諭諄切其望深厚猶父命子如廷綱所􅀍者無有也嗚呼上之待廷綱可謂至矣廷綱宜何如報㢤廷綱其去而思乎昔者處乎閭巷而齒乎恒民今一旦至此果誰之賜歟烏可不盡心也上之望廷綱者以忠為先而忠非效一職奉一令之所能盡必也至公而忘􅀻狥義而忘身斯可矣苟徒恃上之􅃂榮以夸其鄊邦是恒人之智爾於廷綱何取㢤是月二十五日前某官臣濂拜手謹題題王氏桃源圖後在宋盛時四明桃源王說先生以學行名東南今相去三百餘年矣其諸孫敬止繪所居之地為圖求大夫士歌咏之復徴子言之古者賢子孫之於其先思其􅀁􅄝所樂及其居處今敬止思之不可見而寓諸圖畫猶可也而奚以人之咏歌語言為㢤先生道德著當時名􅁛聞於後世固不待人之言從言者足以不朽於先生亦無所益而况不若先生者乎敬止苟欲􅂋先生之名則先生不待人之言而巳傳矣茍欲明其先之有人而爲身榮余􅀅有說焉豪傑之士不繫其先也尚矣在乎自力而爲善耳古之爲賢相者莫過於伊尹傅說而二子者卒然起於畎畝之間未聞其先有若其身者也爲賢人者莫過於顔閔孟三子而其父祖若顔路之流􅀄未嘗如三子之賢三子豈䟝乎先人之末耀以成其名㢤自致之耳苟待先人之名以成名則士之無聞者衆矣今敬止而欲􅁇乎先生學先生之學行先生之行斯可矣奚以人之言爲㢤而言者復呫呫然辨桃源武陵之得失不亦勞矣乎敬止賢者也於予言必有取焉元故慶元路經歴劉君墓銘予侍講禁林有少年生持銅刻名印來謁曰禮劉氏子也間承檄行江西過故人家得范金圖記一六面皆有視之則先生名與字具焉問􅀁由來欲以奉先生者死巳久矣礼􅀼恐棄置謹貿以獻予辭謝不欲煩人生拜不肯起予既勉受之生又拜且泣曰禮願有請也􅄑先生無拒禮贑人也生十年而先子亡先子之亡今二十有一年禮􅀌也早先子之徽行不能悉知矣􅀁僅知者倘又不属立言君子以傳則礼何以爲子禮之先子少有志事功特以遘時艱難屈於小官竟不克施以卒既不克施矣而復不得垂姓名扵乆逺是生死不遇也禮􅀼懼焉願先生惠賜之銘言巳又泣且拜予起立荅領其羣行之辭會考禮事嚴久未睱述生請如是者四三益勤不怠今年生除龍江宣課司副又來速曰非先生銘禮不能一日忘而去也遂序而銘之君諱明德字作霖㓜有氣尚若欲有為者不肯躡庸人後為舉子業專攻春秋經晝夜磨督不暫輟傳注数十萬言歴歴記憶倒舉可成誦期以致此切名嘗曰使我為某職如此為某􅕄當如彼􅀂素為之者至正庚寅㑹江西大比君曰此非吾時邪即東書往赴之時有司以程式去取君言時務落落動人見者咸縮手出舌然卒以此不中君感憤埽閑户讀書益􅁬勵不衰攻諸體詩精敏數出新語又善字畫飄逸有風韻由是聞縉紳間廣東宣慰使興都刺􅃩君名薦爲雷州路儒學教授君爲教官立䂓條戒訓率先諸生講說自身及家之道殷勤懇飭􅃪者忘倦海南之言有師聽者必曰劉先生劉先生云君既善爲職聲問日著由雷州超授慶元路緫管府經歴綜挈名實事集無滯上下信服之未幾東境盗起􅀔揺郡邑君即觧印歸卧於家􅁱竹􅀣田園爲終老計至正乙未五月以疾卒上距生年延祐丁巳夀三十九君之先真定槀城人祖浦􅀮不仕父巨瑞州路緫管府推官遂居贑之贑縣君娶廖氏生子男子一人礼女二人礼即請銘者能自􅁬􅁇其家聲既塟君於貢江之水東原今以才俊仕君子謂其能子銘曰志之隆禄則不豐才之良夀或不長果孰爲之嗣人其昌元故處州路青田縣儒學教諭黄府君墓誌銘府君諱植字國輔其先虞姓居越之上虞宋建炎間逺祖從福迁台臨海之靖安鄉至汝揖者避難而以黄易虞今遂爲黄氏曾祖玠宋宗學諭積而能散人稱曰佛子祖居正朝奉郎父澋母陶氏府君十􅀊而􅀌母夫人授以書詩輙能省解大意嚴自􅁱􅅚不與羣兒出遨家人皆異之其兄曰椲曰彬以文學名皆爲郡教授元屬愛甚日夕相摩切浸􅈅稍長遂刻意爲學名聞叁出二兄間甫十乚薦紳羙其才􅀘上蔡書院直學既而郡守趙君鳳儀欲辟爲􅁺力辭之後調青田縣儒學教諭迄不就年五十有二無疾而卒府君爲學以六經爲本以躬行爲務以文藝爲末始以此自爲亦以此淑諸人問之無不知考其終身無所愧於其言其居家延師闢齋廬教族人子弟之貧者􅀊饑則爲麋道傍以食餓夫郷人争曲直不能决相率叩門以質府君曰甲理是乙非各恱而退用是學者稱之爲郷先生細民􅁛之爲善人娶杜氏於夫於子皆盡道年七十有二而卒而六子勲烈黙杰熈熄皆士行六女適陳又琥葉起子陳學詩戴夢祥周應􅂋鮑可殷又皆不愧於士族於是知府君之善教也及府君殁三十餘年而孫男之多至九人曰垣陸童厓墅甡圤圤孫女五人其二亦適胡宗銓吳貫而曾孫男又五人曰鐃鑣鏐鐻鑱矣於此又知府君之徳厚而後人之盛未己也嗚呼爲善者固不慕乎名則人何所􅂆乎故徇勲之請叙而銘之府君卒在元至正甲申五月丙申􅌾在庚寅十二月甲申杜氏之卒在丙午九月丁亥其合塟以國朝洪武戊申三月某甲子墓在閻岸之青䁀山云銘曰學弗於文維本之敦行弗随于人維天之循維其循乎天下有熾子孫人勿求乎君盍求諸身安道堂記自昔真主之興天必生異常之才以備其一代之用外之則有􅆛虎之士奉命秉畧為之鞭驅僣叛汛掃六合内之則有䕫龍之倫立法定制爲之謀謨廟堂恊和􅀺庶近而至於䞇御之屬執事之臣亦莫不忠厚謹飭小心而盡職雖曰善以􅁼􅀿非天命孰能使然㢤皇上肅􅀅明威致䖍天討於四方江淮之間豪桀魁壘之士翕然附從指顧叱咄戰勝攻耴無不得意及㓛成業定上公徹侯甲第相望輔相侍從皆當時之賢而於近侍之中又得供奉司令杜君安道而益知其他之皆然也安道自上之興持刀鑷侍左右未甞暫違凡上征吴越略淮楚攻齊魯汴蔡舟車􅀁臨四五千里虜偽王斬驍􅀅以百十計帷下之謀籌䇿之筭安道皆得身從而目見之安道性慎宻不泄動􅁛法度為上所信任者二十二年由尚冠郎改御用監令至今官入内廷行歩可數言語敬恭唯恐有絲毫過謬岀殿門外要官􅀔人之前如不相識一揖之餘不啓口而退故上每稱侍臣之忠謹者必以安道為言今夫天下之官受禄於朝者孰非仕㢤盖有終其身沉於下位欲覲淸光而不可得者縱得近輦轂下有願承一顧之恩而不可得者安道乃得侍上而見稱許雖曰慎宻之􅀁致又豈非天㢤安道其益勉之可也余官在太史事上者亦二十年餘安道既以其字名堂復願得予文以識遭逢之盛夫􅁛天命以紀載國家人材之羙予之職也乃爲之言吕氏孝感詩序天人之際難矣荀有以感之非難也天穹然而在上人藐然而在下􅀔絶而分殊豈易感㢤然人之身天之氣也人之性天之理也理與氣合以成形吾之身與天何異乎人或不察乎此而謬迷其天性始與天為二矣能以誠感則天寧有不應之者乎是理也予觀於吕君爲尤信君諱某字信夫夀春人事親至孝而好黄老家飬神之說及親殁三年之服終猶哀慕如􅀄䘮因􅁍酒肉弗御毎旦滌豆籩具果䟽􅅡香􅈼天徼􅄀福於其親如是者數十年嘗汲井以行滌事時盛冬氷沍有金色魚者三入汲器中信夫異之持歸盛以陶􅇲寘香几上閭里人聞之相携來觀者充其庭皆揖信夫而􅀭言曰今兹大寒魚替不見操罔􅅈者欲得一鱗不可致而信夫不求得之豈非天以旌信夫之孝乎且夫金魚昔文臣貴者章服嘗用之信夫子孫其有興者乎於是又皆揖而賀信夫􅁍立而拱曰吾子道之未盡安敢言孝茍以爲天之賜滋不敢承乃致􅀕而投諸井中愈䖍事天之禮又七年而後卒既卒其郷人吕山見之於上真觀衣冠偉然􅀂神仙中人已而過問信夫則信夫死矣厥後其子浙江鹽運使􅁇道以才德顯累官太常卿吏部尚書轉僉北平按察司事以至于今階入三品黄金横􅅁爲時能臣由是其事傳于四方士大夫咸咏歌之而嘆異之嗟夫信夫以孝事親誠格于天而天以魚旌之能飬神而神全不散死而人或見之斯二者乃常理爾又奚異乎仐􅁇道之􅂋融固宜也以魚數占之􅂋者殆三人乎􅁇道其一矣在其子與其孫盖未已也昔者卜序白華之詩不特曰羙孝子而必稱羙其潔白今其詩雖亡而頼有序存故不見其詩而知孝子之行余􅀼耴是義而具論其事以序吕君孝感之詩使觀者未見篇什而可知其人則亦卜氏之意然天人之際三百篇言之備矣在作者之自取焉贈陸菊泉道士序吴下道士陸永齡好飬生之說别號曰菊泉徴言於予曰永齡聞菊之爲華得陽氣最盛者古人謂之日精屈子好神仙賦逺逰嘗餐其落英後世有飲南陽潭水而得上夀者則菊誠可以延年也久矣永齡誠樂而慕之故以菊泉爲别名先生以爲何如余曰菊固可以延年也雖然吾觀昔之神人若廣成子安期生之流至今數千載猶時時徃來東海諸山間凌日月而簿隂陽視天地如一粟以千載爲俄項其壽可謂長矣其人初􅂚嘗餐菊飲水而致然㢤亦善於自飬而已夫人備五行之氣以成形形成而精全精全則神固誠能體乎自然而勿汨其中勿耗其神勿離其精以葆其形大可以運化機微足以閱世而不死豈特致上夀而已乎雖然此道家之說也吾亦有􅀁謂不死者書契以來可謂乆矣凡聖賢豪傑之士至今儼然具乎方冊間其事業可爲世法言語可爲世教國用之則興家用之則和人身用之則修或反其道敗亡可立見自今而徃天地無有竆也其夀亦無有竆也豈廣成安期之儔􅀁能及㢤又何以菊泉爲㢤永齡年少好學苟未至於此亦當以廣成安期自勉無以菊泉爲􅁕恃也吾之身善治之可以亘終古而長存與三光俱不泯􅃿不能飬之特蚊蚋起㓕甕盎中耳豈不惑㢤於是永齡謝曰先生教我矣請書之而願學焉鄭氏喜友堂讌集詩序余自禁林致政而歸久不與諸友胥會悵然而興遐思洪武巳未秋八月壬辰胡教授仲申朱長史伯淸蘇編􅁱平仲及金徴君元􅂦咸集於麟溪鄭氏余同劉􅁇至鄭氏之賢太常愽士仲舒置酒讌客於喜友堂籩豆孔秩冠裳有儀揖譲興俯翼翼如也盖余與胡鄭朱三君自弱冠爲同門友今皆頽然老矣蘇君生雖稍後亦甞爲同朝追計昔時各縻禄仕不􅀗巵酒爲驩凢二十餘年今者􅄑遂家食或居異邑或相逺二百里皆得與之周旋於尊爼間則夫斯會之同豈易致㢤於是獻酬樂甚酒酣鄭君爲詩十四韻以慶㑹合之情出示坐客坐客先後􅀝韻而和之遂聮爲卷俾能詩者續焉嗟乎余數人老者年逾七十次者六十有竒又其次者亦越五十春秋矣獨二生爲最少耳又越二十餘年少者當愈長老者當愈衰未知復何如也然則今日之樂其可數遇乎是卷也豈特可識一時之樂後乎斯者誦而歌之必􅀅慨然有不及與之歎矣洪武十二年秋九月甲午前翰林學士承㫖宋某謹序和鄭奉常先生讌集詩韻我生空􅀒月臨奎余生辰月直奎宿占者爲文斈之神文學何曾遂昔期桞子未成非國語匡衡徒患作人師探珠赤水欣同調結屋靑蘿得􅀁依泉石要為中世托姓名豈料九重知東西御饌嘗分賜出入天門更不疑乕籞秋嚴威閃閃龍樓日轉影祁祁年華自􅁴随流水造化誰言類小兒别夢屢形分講席歸田一似舊㳺時常随采藥衣霑霧㡬度㝷花􅋰􅅁泥投老􅄑知同臭味此生端不慕輕肥芳莚夜秩桮行數絳燭春融客醉遅一代􅂄英都在坐百年文獻欲還誰獨憐鄴下支離叜莫闘長安絶妙辭頼有西風吹酒醒搔頭向月􅓽賡詩宋學士文集卷第六十七芝園續集卷第七
