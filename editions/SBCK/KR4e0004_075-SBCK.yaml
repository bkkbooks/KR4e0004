body:
  text: 長洲練氏義塾記皇上建大號之八年以為天下旣巳安輯而化民善俗之道猶有未備乃下詔郡縣凡閭里皆啓塾立師守令以時程督之扵是雖窮鄕陋壊莫不有學吳郡長洲縣之尹山民居繁庶習俗􅄝利久不知教有司偶遺不舉大姓練壎自謂其父文逹由睦耒居甞有志而未果今明詔如此而塾不時立恐非朝廷淑斯民意乃與弟箎謀夷土治材作堂三㨕閫以為講習之􅀁㫄為四室以供􅃦處庖湢延儒士髙平范煥為師俾里中子弟就學焉割田三十畝以食之始扵洪武十一年正月越七月而後成具以其状白于縣若郡郡許以為冝壎乃遣書来請文紀成績古之為治者其法雖詳然不越乎養與教而巳養失其道則民貧教失其道則民暴貧則流而為盜暴則去而為邪二者皆亂之始也是以先王重之二十五家之閭必有左右塾塾必有師師必以仕而老于家者為之故是時無不學之民無無塾之地無邪僻􅁋靡之俗刑罰置而不用亂亡無􅀁自而起其後强大諸矦欲圖得志相與毀詩書六藝之籍使其教壊而不行然尚踰数百年而後絶一民不忍叛其上教之􅁕以感人若是自秦以降無教者亡有教者存得其道者盛以延失其道者衰以促千載一􅁤也皇上􅁬然閔前代之失大設學舍以教之􅁒使海內之民皆沾沭禮義此與先王之心何異壎非有化民之貴乃􅀎以淑其閭里是圖豈非君子㢤君子之􅀁為貴乎可法扵世他日三吳巨族人人能竭奉上設教之意以化其閭巷之民閭巷之民皆知尚禮義耻犯法如成周之時盖將始扵兹乎姑刻其事以俟林氏詩序君子之言貴乎有本非特詩之謂也本乎仁義者期􅁕貴也周之盛時凡遠國遐壤窮閭陋巷之民皆􅀎為詩其詩皆由祖仁義可以為世法豈若後世學者資扵口授指畫之淺㢤先王道德之澤礼樂之教漸扵心志而見扵四體彂扵言語而形扵文章不自知其臻扵盛羙耳王澤旣衰天下覩古昔作者之盛始意其文皆由學而後成扵是窮日夜之力而􅀼儗之言愈工而理愈失力愈勞而意愈違體調雜出而古詩亡矣非才之不若古人也化之者不若而無其本也惟夫篤志之士不係扵世之汙􅂭俗之衰盛獨􅀎學古之道使仁義禮樂備扵躬形諸文辭􅀎近扵古則君子多之然亦鮮矣至于今又鮮也求之嶺海之陬又鮮也而有林君汝文焉豈不尤可尚乎林君居潮之揭陽學詩三百篇以求先王政教之善治功之􅂭賢人君子性情之正道德之羙以治其身其身醇如也以淑諸徒其徒蔚如也以形乎詩其詞粹如也林君居乎潮非有人諄諄然告之而􅀎致力扵此其􅀁得不旣􅀷乎潮去京師六千里林君身不出州里而余知其名其􅀁為不旣至乎夫不資扵口耳之淺而成文者文之善者也不資扵爵位之顯而成名者名之髙者也余是以序而論之君名仕猷恭題御裂論語觧二章後右觧論語二章乃皇上􅀁親製以賜翰林􅁱撰臣孔克表者也􅀄上㽞心經籍以為經之不明傳註害之傳註之害在乎辭繁而旨􅀷洪武六年乃詔克表及御史中丞臣劉基秦府紀善臣林温取諸經要言析為若干􅀋以恒言之使人皆得通其說而盡聖賢之旨意又慮一二儒臣末達注釋之凡乃手釋二章以賜克表俾取則而為之克表等承詔釋四書五經以上詔賜名曰羣經􅀋要復装裭􅀁賜為卷以臣漁甞與聞斯事請識其左方臣聞聖人之治天下養之以政而教之以道民非養不生非教不明三代以降未有兼之者也欽惟皇上以聖智之資治民之政壹法乎古復慮經旨晦而人不知道乃釋諸經以教之其為後世慮者可謂詳且備矣克表適際盛時而預執筆承明詔豈非􅄑㢤昔唐之盛時太宗有志扵教化而孔氏曰潁達者實率諸儒為五經䟽天下至今傳而誦之不廢今上開物牗民之心過扵太宗而克表復為諸儒首孔氏可謂世不乏人矣他日是書之傳􅀅與潁達之䟽無異則夫聖謨之詳烏可不知􅀁自㢤臣故表而出之使後世知􅀋要之書實本諸此也恭題御製勑符後皇上以上智之聖延􅄃英傑置之庶位知人善任誠近世􅀁未有洪武十一年詔以大子正字臣桂彦良為晋王右傳且親御翰墨為文勑之識以謹身殿寳其子中書舍人愼裝潢成卷請臣題其後臣惟古明王之待重臣􅃂之以爵吿之以言者有之矣然其時之文多述扵代言之人求其出扵親製者不可得也親製者如漢武之扵吾丘壽王荘􅂇者有之求其褒許􅂭至教告􅀷切如此者不可得也臣與彦良同朝且同官東宫甚久彦良之為人淳篤和易有長者風當今廷臣鮮見其比上甞以儗臣濂雖臣亦自以為不及也今勑文以善學孔孟稱之望以王佐之業傳􅀁謂知臣莫若君其此之謂歟雖然今之軄為相傅者凡數十人上未甞以言為賜或賜以言未甞以稱彦良者許之也彦良獨蒙聖知若是之至安可不思報乎具簿書綜獄訟他人􅀎之者上不以責彦良亦非彦良之􅀁以報上也必也輔王以德義迪王以忠孝使晋國有泰山之安賢王有明哲之譽而彦良之名亦相與流扵千萬載此豈非上之望扵彦良者歟彦良其可不勉矣正心堂銘有序元臨川監郡芒矦甞名其燕息之堂曰正心矦旣以此自治其身而化其民又推以教其子入國朝長子文縝司教成均思嗣矦德不墜復以堂銘為請三代盛時凡有國有家者皆不敢不學其學未甞不本扵心譬之操權衡以制輕重持規矩以裁方圓凡有形者皆不􅀎違是以事功成而習俗羙先王之道旣息居乎位者不知學學者不知􅀁本􅀼􅀼焉欲以私智小數勝之而民卒不可得而治前代之事如此者多矣而元為甚芒矦生乎其時獨􅀎取聖賢為學之道治其身其天性之過人遠矣文縝又􅀎推之以淑諸人非善􅁇志者㢤銘曰昭㢤聖則厥要甚寡正其一心以對天下一心之量天容地􅀷炯若日月孰不照臨其不正時日月方晦昏亂迷惑靡有攸留誠其始萌乃正之功知不周物思誠曷􅀙維知克誠維誠克正正以持身冈敢違令內以爲家外以臨民明盡禮樂幽通􅀑神世䧏道離人鮮由學徇其私心狙伺狼攫偉兹芒矦監于大􅀖揭聖明訓寘諸崇堂崇堂嚴嚴筵几具有􅀖人君子陳說古道孰詭孰端曷􅀙􅂚違折以片言灼如蓍􅀛豈徒其名又􅀎􅁢蹈旣政以施亦身以教侃侃嗣子先人是程緝其休聲亶爲難􅀎勿謂巳遠千載一心聖炳然奚古奚今周節婦傳節婦姓趙氏名淑宋燕㦤王之裔安㝎郡王令詪九世孫也令詪􅀙髙宗渡江南居越諸暨遂爲諸暨人父孟德有文學生二女節婦長且賢􅀹愛之授論語孝經列女傳皆􅀎通其義年十八求冝壻者得祠邑周本恭歸焉始歸而姑卒旣而舅及兄公姒氏亦相􅁇死兄公子顯宗尚㓜節婦相夫筋䘮治􅁙咸盡禮育顯宗如子歸十一年生三男宗善宗祚宗政宗政始生時天下亂夫嬰疾甚恐不起顧節婦曰今兵革四興嗣子單弱如此我死尓􅀎自保乎節婦嚙指流血泣曰天在斯吾有不􅀎保􅀌兒者天實誅之夫卒節婦年二十九髽跣號泣泣間含食哺諸兒不暫出户限明年國朝克諸暨與偽吴分邑拒戰两兵交焚掠家貲無纎毫存節婦抱兒及􅢃宗􅀙一媵岀走匿惟持田籍以行􅀷山窮谷間飢餓顛踣削木膚采藜藿以食或問其艱勩􅂆之曰呱􅈱者何􅁕恃奚為自苦耶節婦怒不與言剪髩髪示之益自裁戢厲色峻辭使人莫敢近兵㝎而歸冨民侵至其田殆盡節婦持田籍與辦卒頼以完知州田若賦髙其行欲上其事于朝節婦曰冝然耳何􅁕上聞力辭不願乃復其家節婦感泣日治麻􅈁為布帛以􅁇乏絶市詩書教諸子夜焚松脂于室坐諸子两㫄而口援之或怠睡首俯􅂺笞咄不少恕諸子皆凛然畏憚如嚴君覩其色變卽惴􅂲莫敢舉目視及長遣􅀙名師逰􅀁友善士相過則喜為之置酒否則憤歎竟日節婦以兄公早没惟顯宗存為之昏娶先扵巳子羞服與諸子同人不知辨諸子遜弟皆有士行宗祚入為太學生以文行稱人咸謂節婦教􅀁致云史官曰世之傳節婦者多貴殺身為難􅀎至扵守義不二者則略而遺之余甚惑焉鋒刄之威迫于後湯火在前有􅀁不顧此人情􅀁􅀎勉至扵困窮災變切身凍餒顛踣而不渝其志存人之􅀌非篤扵禮義者其孰􅀎之若周節婦是矣嗚呼此豈特賢扵女婦而巳㢤竹塢幽居詩序天台裴君日英其先故䆠族好學多材􅀎甞挾其􅀁長㳺浙水東西士大夫爭慕與交性好竹􅀁居種竹數百至它􅀁必擇有竹家以舍扁其室曰竹䲧幽居留杭者甚久杭守聞其名薦于京師京師爲天下大都會􅒡居櫛比求尺寸曠圡不可得􅊇旅家僅可俯仰無􅀙得竹然裴君揭其故名不廢且求􅀎言者咏歌之或疑裴君以爲實與名常不相違今在京師非有園林之勝安在其有竹乎裴君曰不然有竹之竹不若無竹之竹之羙也有竹之竹適在耳目無竹之竹適在乎心心之􅀁得非若耳目之淺而易忘也吾方有竹時笙乎竹簫乎竹竽乎竹簟乎竹􅀁見􅀁聞日陳吾前者皆竹也然吾未甞知行之爲羙也今棄之而居乎此雖不接乎耳目而心恒存焉思竹之聲以爲有虞韶之遺音思竹之挺㧞特立以爲有壮夫偉士之節思竹之歴寒暑而不變以爲􅀋乎有道者其虚中不窒似仁其􅀡遂似義其周扵用似才其髙自鶱舉不屈儕􅀋下似智取而比德焉無不羙者然後知竹之不可得也吾心日存乎竹雖謂之有竹何過乎且古之聖賢後世慕之如神龍威鳳者以其不可見耳聖賢道德雖高使人得接而狎之其不見慢扵恒人者鮮矣其與吾好竹之說何異乎余謂裴君盖善扵用物者非世俗玩物者比也記其言于詠歌之首使覧者知其人焉静學齋記三代以下人物之傑然者諸葛孔明數人而已孔明事功著後世或儕之扵伊呂固為少褒或又以孔明與管仲並稱則卑孔明矣以其事言之管仲輔桓公僅以齊覇孔明奉昭烈扵艱難之中尺地一民皆奪之扵群盜之手徒以大義震撼天下裂天下而三分之使孔明後死後主􅁕輔復漢之奮􅆠致刑措之治扵孔明何有㢤在管仲未必􅀎尓也以其本心論之管仲􅀁陳扵桓公而見扵行事者皆微􅁠小智雖假尊周為名其意則冨強其國而巳固君子􅀁羞道也孔明當于戈鞍馬間􅀁與其主論者必以德義爲先其忠漢之心至扵瞑目而後巳至今誦其言想其人真伊呂之亞乎史氏不知其本心謂孔明慕管仲樂毅之為人嗟乎孔明豈二子比㢤孔明扵聖賢之學盖有聞矣其􅀁謂學湏静也之言信古今之名言也止水之明風撓之則山嶽莫辨渾天之察人撓之則晝夜乖錯況方寸之心乎古聖賢之成勲業著道德扵不朽者未有不由扵静者也盖静則敬敬則誠誠則明明則可以周庶物而窮萬事矣茍雜然汨其中偶然應乎事卒然措之扵謀為其不至扵謬亂者鮮㢤孔明之學惟本乎此故其􅀁為當世無及焉至今無有非焉者而又􅀙效慕之區區覇術之徒固不􅀎然也然世之慕古人者吾惑焉古人􅀁以為聖賢者其道德著乎其言其才智形乎功業而存乎􅁽書非徒以其名稱之羙而已也苟欲效乎孔明扵孔明之􅀁學必無不學也扵孔明之􅀁􅀎必無不􅀎也而後可孔明之􅀁學而有未至也孔明之􅀁􅀎而有未􅀎也而曰學孔明何可㢤扵孔明且尔況乎學孔孟之學者而可徒誦其言乎㢤近代之􅀁學者浮扵言而劣扵行孔孟之言非特言而巳也雖措之行事亦然也學者不之察率視之爲空言扵是孔孟之道不如覇術之盛者久矣欲如孔明者安可得乎錢唐羅宗禮名其􅁌誦之室曰静學庶幾慕孔明者余􅁒勉其成也辯孔明之爲學與學孔明之道以告之送􅁢師省母序人之生天賦之以性父母遺之以軆德莫大焉故雖尊有天下不敢不事天德爲聖賢不敢不事親以是身非我有實天與親􅂌之也夫吾之身旣有􅀁本則凡吾􅀁爲者豈我之􅀎爲㢤實天與親之􅀁命而我行之耳安可忘􅀁自而不察乎古之少㤙者雖如申韓商鄧著書排擊尭舜孔子之道且不敢遺其親况扵佛氏以慈仁爲教者乎故弃其親者非佛氏之意愚者失之耳是以佛氏有報恩之經稱父母㤙甚至而昔之賢者若陳尊宿之流多􅀎盡扵子道近世之稱名浮屠者亦未有不孝其親者也今上􅀄立極猶恐愚者未察詔浮屠各拜其親定著爲律扵是習俗爲之復羙天台迪中允師浮屠之秀者違親而􅀙師于外十餘年矣今歳至京師戚然念親不置􅀅别其徒而歸省謁余求序以道其􅀁􅁒行之意迪中通內典攻書而􅀎詩其扵事親固無庸告之然四方之學佛氏亦有久違其親者乎聞迪中之風而慕效者必名浮屠也徐夫人墓銘婦德以柔順爲羙然以之䖏常可也苟無堅凝之質事變臨之其􅀎自立者鮮矣故持之以堅貞行之以柔順斯􅁕以爲賢婦偏一則有虐忘縦佚之失焉若徐夫人者其備婦德者乎夫人姓余氏衢之開化人年二十適邑士徐君安越十三年生四子徐君死舅姑皆老家莫爲主貲産頗傾蝕夫人日奉羞膳升堂問軆安否退則率媵妾治􅁝􅈁麻枲􅀊時機杼之聲聞于鄰里衣服諸子務臻華好青褏綵衿少長嶷嶷然人不知其為􅀌年七八歳委之扵學慈嚴两至責其成績由是諸子咸為善士而家迄以成舅姑相􅁇壽終治䘮􅁙以禮鄕人暴强者皆畏其􅀎莫敢凌犯教女語婦必以夫人為則年七十有八以洪武九年九月七日卒于家二十三日􅁙于淸源里西村之原三男曰禄可詵一女適某孫男五人玄生林璣桂生以國子生擢給事中來請銘銘曰柔順為德斯婦常濟之堅貞家乃昌執偏或堕弱與强二者維全保無爽猗徐夫人婦之良䘮夫秉志事尊章內外屹然禮義防躬親織紝靡怠荒家政浸􅁱貲大穰男治書詩女衣裳壽弥德備名譽彰孝孫刻銘闡幽光卓㢤婦則垂無􅆠莆田黄府君墓銘莆田黄處士有良婿曰陳熈哀處士之早亡自􅃺其行千餘言赱三千里來京師請銘且曰處士事繼母孝庶弟出後􅀙父􅀙父愛其女盡以􅃾田嫁之處士患弟貧割以私田之半族人以田來鬻䖏士不忍取乞以􅀡而歸之不􅀎為生者加衣食焉以貲多為閭里之正里中民買塩于官及科繇不􅀎庚者出私財代輸有受誣者諍之扵縣庭得觧乃已毎􅀊首縣次民貲力多寡㝎征歛之籍衆不􅀎决處士彂一言皆稱平争訟者來質是非告以理法舉酒飮之各謝而退藝田家歸粟入以小量遇凶􅀊則减賈以大量糶之􅀄郡南有僻壌盜常狙伺以剽行旅䖏士構廬棲僧夜則然燈逹曙盗散去復施貧死者棺三年至二百餘野無􅁀骨元末兵亂縣命處士帥兵扼險畫捕賊䇿陳于上民藉以安處士讀書有識待物恕以和其生也鄕人教其子俾取為法及其沒識之者無不弔弔者􅂘必哀至今言善人者稱焉熈又日䖏士之善盖多其粗如此其使人感且化者不得而知亦不得而言也然其大者旣不可言倘可言者又不得托文以傳焉則何以使為善者慕敢請余曰䖏士之行誠可傳矣余言之不文烏􅁕以傳耶雖然不可辭也處士諱巳字景陽自唐屯田員外郞潜之子朂不仕王審知始自光徙莆在宋稱書詩之族髙祖審再以進士舉于鄕與􅀙兄某州通判君亮皆有名曾祖文子以五經為州學諭祖來鄕貢進士父元壮母陳氏繼母鄭氏俱名族處士娶林氏無子先二十年卒再娶李氏生子男四人興祖振祖光祖麒祖女三人長壻卽熈其二適吳某王某孫男五人隆庸洪某某處士􅀄為長女求壻富人争􅁒問名不聽聞熈儒士許妻之或謂熈貧非偶處士曰我志决矣卒妻熈熈今為連江儒學教諭有文名君子又多處士善處其女也處士年四十二卒元至正十八年八月廿九日後五年殯鳩山下廿七年十月十二日權􅉎山之西今洪武十一年十二月廿八日始克􅁙于白砂之原銘曰人不患財之弗贏而患善無可稱善集于身雖賤為恒垊歴千載而有聲身為鄙夫雖位居九卿溘旣死而誰名維處士君􅁕不出州里而化者衆身服乎韋布而德可程斯之謂死而如生上海夏君新壙銘國朝有天下忠吏之病細民公卿廷議以為吏它郡人與民情不孚又多蔽扵黠胥宿豪民受其病固無恠莫若立巨室之見信扵民者為長使主細民土田之税而轉輸于官扵是以巨室為糧長大者督糧萬石小者数千石制㝎而弊復生以法繩之卒莫􅀎禁是時惟蘇之沈氏以奉法稱天子親召與語賜之酒食時减免其田賦名聞四方而上海有夏君者尤畏謹好禮繇賦皆先時而集不煩徵索愛恤細民銖两無􅀁妄取民咸恱而德之聮事者皆以為則其􅀁為盖無愧沈氏而名未若沈氏之顯者聞于上則勢隆而易彰欎扵下則雖善而莫著此余囙夏氏之請而欲揚之者也君諱宗顯字叔明自其曽祖叅祖駟父祥皆居華亭君年十五六䘮母以達禮聞服終請于父出從傳朱學數年學有名逰上海樂其土俗遂之長人鄕置田宅徙家以居旣而家日殷富益敦行義兄及孀姊老而窭歳時奉粟帛養之􅁙其䘮而䘏其子撫異母弟有恩事外舅姑盡子壻禮聘名士為師故人子就學者飮食之旦則冠帶坐堂上子孫盛服入揖立两序俯首聽教命君各授以事會食遣去至夕取古今事可為法戒者辨析講說勉以為善子孫恭謹愿慤不敢嬉遨縦凶􅀊鄰里皆􅀙君乞粟帛藥餌嫁娶䘮災者取資焉故巨室之以長厚稱者必曰夏氏見君者慕其善與君逰者服其才聞君卒者莫不痛惜之也􅀄君年未四十卽穿壙為冢於舍西北若干歩及年六十有六而卒遂􅁙焉君之卒以洪武十二年正月二十一日􅁙以二月九日娶王氏二男曰應炎應霖三女長適趙志學次適趙以仁一在室孫男三人翟彪麟女三人曽孫男一曰緜緜銘曰周法旣壊經界隳群氓相啖䑕與狸吏庸俗澆􅊬不知赤子顚踣吁可悲聖神造謨立治規俾大育小勢相維孰嚚戾法肆攘欺利猶在吻身巳離惟吳夏君懲衆非畏愼奉上仁以綏凶歳彂􅅒賙困飢帛寒藥疾棺載尸居家孝友此其推子姓愿謹習禮儀鄕閭愛戴莫敢違爲冨好仁曷􅀎追天錫尓㣧當蕃滋嗟㢤巨室宜相師􅁒考令德徵銘詩東陽貞節處士蔣府君墓銘府君諱玄字子晦别字若晦姓蔣氏􅀄周公庶子伯齡受封于蔣子孫氏其國在漢居杜陵者最著兖州刺史詡􅀹有名詡四世孫山亭鄕矦澄徙居義興之陽羡澄七世孫樞仕晉爲吳郡太守復南徙台之仙居唐末五季之亂樞裔孫勛避地婺之東陽仕吳越錢氏爲金紫光禄大夫檢校司空兼御史大夫遂家焉府君盖其後也曽祖諱天廙宋紹㝎中入粟佐邉授迪功郎祖諱沐元南康路建昌縣主簿父諱吉相少俶儻負氣甞事仁宗于東宫擢典用監知事出為㐮陽路榖城縣尉以卒府君生于燕都兒時嶷嶷嶄聳不妄狎咲八齡就師讀書終日據案端坐未甞㫄顧其師竒之使察諸生怠肆者諸生畏憚歛戢莫敢譁年十六侍榖城之官杜門絶賔客不交晝夜攻學母夫人閔其勞節膏油不多與俟母􅃦以衣衾蔽牅而誦夜叅半乃巳穀城涖官剛嚴府君囙事進諫多􅀁匡􅀘出遇其吏民恂恂退抑人不知其為尉子也旣冠而歸時許文懿公謙以道德為學者師府君􅀙而受其說識悟過人辨析精確內􅆂外􅅚日超月異先軰皆自謂不及然府君務見躬行以禮齊其家奉先祠謁拜祀奠取朱子􅀁􅁱儀文行之歳時率族人祭始遷祖墓祭畢序長㓜列坐告之親睦之道属之近者朔望必㑹貧者歳周以两月之粟􅁱建昌􅀁創義塾延師儒教其子姓至於鄕人毎歳冬至殺牲置酒㑹長老俊人行鄕飮禮府君為之講􅀃嘉謨偉行使􅃪之曰為父兄子弟當如是鄕民莫不化服細民寠者貸以粟不取其贏待以炊者常數十家東陽多宋貴臣挨民藝其田者旣入粟半復畝徵其絲民頗苦之府君倡其鄕人曰君子以養野人奈何厲之遂罷不徽人用是德府君稱其善不虚口遇事無大小皆立决不形扵謀議􅀁為輙出人意表􅀄延祐中惡少結邏卒誣平民為偽鈔破其家意府君儒生可侮以語撼之兾得賂乃止府君怒赱白大府逮惡少窴于法害遂絶由是宿豪文吏揺手相戒不敢過其門府君益刻苦為條法使後嗣可守室廬械噐皆預為數世計各極其精善人服其才而惜其不獲施于世也府君饒扵貲産脫去華靡習聚書萬卷致力其中著四書箋惑大學章句纂要田書述義通若干卷治平首䇿二卷學則二十卷韻原六十卷府君懲士習淪於夷俗獨製古冠衣服之揖譲歩趋必以禮法人望之神情夷朗如逸民髙士及即之則雍然和與之語出仁入義愈久而愈無窮年四十有七以至正四年六月辛酉終于家學者私謚貞節先生十二月壬申葬縣􅀯乗騘鄕御史里焉䲧之原娶葛氏宋􅂙知政事端獻公洪之玄孫子男四人大同興宗嘉亨􅁢升女四人適葛實李􅀚及東陽儒學教諭李思文其一蚤卒孫男十人昭暉旭曄昇昱昺昻景旲孫女二人適許益亨鄭格曽孫男五人鈞鑾鎕鎭某女三人􅁢升甞􅀙黄文獻公溍逰有文用薦者授慶元路儒學正早死而二次子亦繼卒獨大同存善承其家學以故國子􅀕酒許元狀來請銘余未壯時甞拜府君于家多其言語儀貌儼然成德人也盖今四十年而余亦老矣銘烏敢辭銘曰柏之丸丸或朽于山堂之巖巖或病于顛天産其良不需其完人愠以咨我恬以安􅊥聖之源禓道之瀾不諧一時千載之傳叢桂樓記叢桂樓在杭天龍寺之左偏主僧大道禪師作之大道諱善平越漁浦人初受業寺之慶菴吉公㝷升天目山問道扵普應國師巳而来歸閔天龍之廢且久也􅁣然有興復之志時瓦礫荊􅁄散漫左右幾無􅀁容􅁕而大道槖無錙銖獨操一鉢日赱市中得食舁歸以食衆上得錢以易材木金石百用之具不四三年而佛殿三門兩廡皆成四方學徒之来者皆仰以食扵是復以其餘作斯樓左丞周君伯􅄾以叢桂扁之旣而大道以至正辛邜七月十一日示寂其徒奉全身􅄟諸樓右而建塔其上且請同菴禪師述其故屬余以記斯樓樓乃大道憇息之􅀁􅀅以致其思焉而余獨感大道之立志堅而成功速也今夫有威力以使人者莫過乎有司有貨財以使人者莫過乎富室然其有􅀁興作皆集衆謀役羣力而為之猶且磨以歳月多者数十年少者十餘年而後成今大纍然一僧非有貨財威力之可使人獨用口舌化導市井之民取其財與力以為巳用成宏偉勝大之功若易易焉者雖曰佛氏之教􅁕以動人之信聽然非大道之有志不􅀎也盖人惟患無志有志矣患守之不堅有志而􅀎堅事無不可為者況一寺乎余甞病有志者之寡而扵大道􅀷有感焉嗚呼後之居斯樓者孰非大道之倫㢤讀余言而思大道之為人則斯樓與斯寺不廢矣請記者曰圓浄圓如皆彬彬雅飭有志扵禪觀者今居斯樓云王指揮像賛眞人龍興山川降精杖劔來􅀙莫非豪英維時王公實將家子乕吼鷹揚萬夫披靡成功錫爵遂鎭一方㢮其武威佩玉冠裳何以􅀚之有燁其像益懋厥勛配古良將蘇都事伯䕫像賛子由後平仲父才􅁕以行志智􅁕以成事也苟盡施扵時必有大過扵人而得位以行者僅出其一二也年齒之高林泉之􅃐皆公之􅀁宜有固天報善人之􅀁致也惟有子之甚賢以文鳴于治世􅁕以繼絶學于前人楊休聞于不墜也此吾甞私為之善誦長公之言擬公扵晁氏之君成而知其無愧也景㝎諫䟽序吾婺􅁬稱禮義之郡士生其間皆存氣節仗忠義而東陽為􅀹盛自宋中世以來以􅀡道著稱朝列于國史者甚衆雖布衣下位之士不在諫諍之軄而上封事者亦往往有之豈其人皆善為言論㢤德澤之􅀁漸濡師友之􅀁講說風俗成扵下而至扵斯盛也余自少時好觀宋史凡吾郡聞人事有可稱者輙識之旣而復歎士之幸獲見扵史者如此不幸而遺軼不傳者盖多有矣往年在翰林始得見東陽賈廷佐上高宗䟽廷佐為桐廬主簿憤秦檜主和議紹興戊年上䟽論之其辭甚切􅀡而史不載至七世孫權出以示人世之士大夫爲文以稱其忠廷佐之名始顯于天下廷佐之鄕人杜士賢在理宗時爲武學生景㝎甲子秋囙星變求言士賢上䟽力攻賈似道誤國今年秋其曾孫實亦以示余其事與廷佐相􅀋然士賢􅀄無一命之爵其言請黜退似道歴數其罪切􅀡頗同扵廷佐而實又􅀎趋京師遍求賢薦紳文辭以白之且將刻梓以傳或非廷佐後人􅀁􅀎及余扵是又歎忠義之士天雖抑之扵當時天毎扶植其子孫使昭其聲光于不朽是豈智力􅀁及㢤當似道擅權時威􅆋􅁕以生死人士賢彂憤言之不至於殺身者毫􅄠間耳今似道之後不聞有爲士者而人亦羞稱之士賢之子孫方守其遺業不墜而聞士賢之風者雖野人稚子皆嗟慕以爲賢善惡之公昭明也如是則夫有志扵忠義者尚何􅀁憚而不爲㢤然則是䟽之傳非特可􅀘史氏之闕爲人臣者皆可以鑒矣士賢字希聖後中武科授武岡軍新寧縣簿尉遂攝其令轉綏寧旰􅇇两縣令以終贈浩然子叙引交神明有道乎曰有无妄而巳矣然則􅀁謂无妄者何也曰其中有物非思慮􅑟葛之可摇奪也非聲利沉酣之可變易也至虚而神與道合眞放之無垠收之則存歷代以來恒有其人也今之近扵此者其唯吾浩然子乎浩然子與余同姓其名爲宗眞遂以其稱浩然者爲之字學道扵京城報恩光孝觀得靈寳法而􅀎知􅀑神之情状嗣天師知其賢號為軆玄妙道純素法師提􅀧􅀚事㑹朝天宫虚席中書以為言上召見奉天殿命太官賜饌俾之住持時洪武五年秋七月也又明年正月七日儀曹奉常同傳旨諭之曰凡有事郊社及山川百神當令宗眞帥其徒十人前期􅌊芳香潔豆籩以俟臨事之日仍令宗眞􅀍法服與􅀕浩然子拜命惟謹盖以其精潔而扵敬恭明神為冝浩然子由是簡在上心屢䝉召對且賜白玉眞仙像二十餘軀以鎭山中龍光赫奕光動林谷采眞之士無不歆􅃩之余甞見浩然子扵冶城山風度凝簡執謙而有容澹然無􅀁累其心􅀁謂其中有物不為思慮聲利之􅀁惑者誠近之此􅀁以遭逢盛際而眷遇有加焉然而忠君尊上臣子之職也浩然子益冝振祓精明傾竭誠慤以頌禱國祚扵無疆非特敬恭明神而巳誠如是雖身居方外而乃心王室􅀍法服以與朝紳之列非僥偉也實宜也浩然子其尚朂之洪武六年冬十有一月金華宋某序桑仁卿傳桑惠字仁卿婺之武義人其先居麗水桑溪南渡後有景昭者始遷婺歴四世皆不墜書詩仁卿㓜䘮父獨奉母居不􅀎與人浮沉介然自守遇人則翼然恭未甞往叩富児門唯日夕訓諸子弟雞􅀄號輒呼起懸燈誦書食時使􅀙師或值雨淖親持盖􅇋之還人咲其愚勸曰子貧若是甑􅀅生塵矣何不學他技藝朝出門暮可即得錢讀書固佳其効乃如􅀘風耳仁卿咲曰信如子言吾家學􅀅絶於吾乎矣寧餓而死不􅀎􅀙也乃召其子以時謂曰此妄人耳其愼母聽吾之貧由天扵讀書何預㢤策勵比前為􅀹急及見以時明經􅀎文辭鄕校迎為學者師仁卿撫几自慶曰吾􅀅有以見祖宗地下矣仁卿無􅀁扵食質田扵里翁已而失其劵乃以計紿仁卿至家使重書之或􅂂其跗曰愼勿言翁劵失矣仁卿歎曰吾實得錢言猶在耳而因失劵􅀒之為計固得如内媿何一里譁然稱曰桑仁卿其誠慤人㢤未幾卒貧不􅀎歛手􅁕鄕人惜其賢裒錢以塟仁卿娶同縣人項寄瑗其賢絶仁卿固安貧終日樵蘇不㸑項無纎介見扵容色澹然􅀎相歡凍餒日不自免聞有佳書必掇􅀁織布帛貿之使讀自時厥後以時以賢良徵主􅀽分宜之簿州里槜酒􅀅來賀曰仁卿夫婦不􅀒教子今得官歸矣項曰得官不􅁕榮􅀎不􅀒官斯為榮耳以時在分宜數督運萬里外兢兢自持無􅀁遺失􅂯轉為温州判官遣􅇋人迎養􅀅及門而卒今以三轉為䕫州府通判陛至某郎益用政事聞于時論者謂父母之善教云賛曰子弟不患無俊良非父母竭力教之終不􅀎有成也有如仁卿忍貧教子至樵蘇不㸑一不變其志澹如也卒􅀎奮彂有耀于前人則吾􅀁謂父母不力教子子未必有成誰不謂然因作小傳以為世􅂆焉送王明府之官序我國家重扵民社之寄雖遐州僻壌必慎選守令以撫摩其人民蘇息其彫瘵而擢用人才之道必以常􅀙事扵朝廷省部者為先以其歷練之精而􅀷達扵民情政體也會稽王君元凱受命出宰䕫之開縣告行扵余徴言為贈两川入㢤版圖未久其民新脫扵鋒鏑之餘自非善扵承流宣化者未易以􅉼煦生息之也廟堂之議以為元凱久以文墨議論賛佐春官儀文禮法諳集有素其為人持身砥行又端謹清􅁱克稱兹選故有是命余聞昔子㳺氏之為武城也以禮樂為教而聖人喜之此千載牧民之良法而近世以來為縣者率以法度束縛而操切之故禮教之澤不下流扵民而醇風羙俗罕或見之今元凱之往不惟使其百里之內政平訟理而安於田里其􅀁以化導全安之者要必有其道矣他日􅀚風之使有言扵朝者曰西蜀之地有萬家之邑其令之治先政教而後刑罰其民之俗好辞讓而恥闘争以故絃歌比屋而囹圄空虚雖在數千里之外而藹然不異乎􅀖畿之中是冝旌褒其縣大夫之􅀎以為在職者􅂆若然必元凱之􅀁治也余在禮部常知元凱之為人今守職詞林秉筆史舘晨入夜歸無敢暇逸故扵元凱之請不及綴緝文辭為贈而姑道其􅀁期望者如此朂之元凱其勿以余言為簡也是為序洪武六年九月旣望金華宋某序
