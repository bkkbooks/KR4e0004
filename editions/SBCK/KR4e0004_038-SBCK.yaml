body:
  text: 㳟題御書賜蘄春侯卷後洪武六年夏六月十又三日皇上幸大本堂堂乃儲君講道之􅀁而諸親王肄業扵左右當是時勛舊之子亦聴執經入侍上既至召開平忠武王之子鄭國公常茂蘄國武義公之子蘄春侯康鐸列于堦下慰勉再三復􅃙奉御具觚翰親書二帖一賜茂一賜鐸帖皆八字其賜鐸者云謹承祖業愛爾勤功鐸稽首再拜而受乃命良工用黄綾玉軸装潢成卷玪襲以示子孫鐸甞受經扵臣濂来請識之臣伏覩國家之遇勲舊義雖君臣情踰父子上下相孚脗合無間蘄國公値四海雄争之􅀄多􅀣竒功不幸蚤世不得見今混之盛宸􅂨憫悼朝夕弗忘既􅃙近臣經紀家事復令其子習學禁中且以承祖業爲朂其恩數至優渥也夫祖業未易承必勤功之人乃克能之聖謨􅀁及正合書中業廣惟勤之義鐸冝拳拳服膺而弗失庻㡬上不􅀒君師之訓下可以保前人之功業矣鐸尚朂之㢤鐸尚朂之㢤帖􅅖書康二子者以别與茂也二子鐸與其兄鑑鑑今僉廣西護衛指揮使司事云九年秋七月二十二日翰林學士承㫖嘉議大夫知制誥兼修國史兼太子賛善大夫臣金華宋謹識題梁楷羲之觀鵝圗梁楷東平相義之後善畫人物􅀑神學扵賈師古宋寕宗時爲畫院待詔賜以金帶不受掛扵院中而去君子許有髙人之風或者但知筆􅀔遒勁爲良畫師且又謂其師法李公麟皆誤矣贈朱啓文還鄊省親序工部奏差朱旼啓文既書滿􅀅省親虎林山中薦紳家多􅀤爲聲詩呉府伴讀王􅂹與啓文有連遂以首簡請予序浙河名區虎林甲郡文彩朗耀光衝扵牛斗才猷振㧞軫接扵荆楊故三沈有翹雋之聲二徐爲俊髦之冠多歴年􅀁匪惟今斯粤自唐季以来海田屢化獨繁華之如故慶光景之常新富庻亞扵咸陽侈麗比扵京索停鸞峙鵠山川之靈氣欝蟠綺陌香衢笙管之春聲宛潬嗟士習之易染憫風俗之頻移儻有㧞萃其間實􅁛良彦行必􅀓扵緗素譽徧播扵􅀸公惟朱氏之名家愜輿清之􅀁屬塤箎交奏四經之義髓昭明黼黻相宣一姓之文鋒犀利棣蕚既形扵周雅芝蘭􅃍産扵謝庭華穎高鶱􅁢符二妙之選藻思遄􅀤何慙八斗之才珠彩雖沉玉光難掩遂因文藝上貢銓曹雖王勃之少年豈朱雲之可吏厠行人扵起部期試事扵􅅔垣三載積勞行􅀅授政一朝予告得遂榮親服綵上堂毎賦髙年之引奉觴爲夀尚瞻㳺子之衣春暉澹蕩以娯人秋月連娟而在戸争誇具慶奚翅前蹤平浦西風催秦淮之急槳遥天去鴈起名勝之長吟不鄙衰孱来徴序引無山東之雅製續洛下之群賢愧陳瓦罍式聮寳卣云爾係之以詩曰松帷落秋隂月魄淡凉夕朝鼓官河棹暮宿青山驛憶昔爲行人風雨尚征􅃥王事有程期吾敢思燕息今焉返吾廬揺曳武林陌上堂獻夀觴踉蹡喜増􅇵衣帶来時香酒仍去年白門前青桂枝寒花破寥閴不見近三年爲我動顔色子歸趣誠佳子樂復何極可憐城頭烏肯倦西風翼新刻廣韻後題右廣韻一部雕刻己完可模印然自梁沈約制爲聲韻以来隋仁夀􅀄陸法言等繤次成編唐儀鳯末郭知玄復帥其屬而附益之時􅃅切韵天寳中陳州司法孫愐以切韻爲繆畧復増字四萬二千三百八十三雅俗兼收務矜該􅀶且取周禮之義又更名曰唐韻宋祥符􅀄陳彭年丘雍復重脩之又易名曰廣韻至扵宋祁景祐集韻之出復增二萬七千三百三十一字而廣韻㣲矣近代書肆喜簡而惡繁集韻罕􅀓而廣韻獨盛行濂等奉勑校定一遵洪武正韻分合之例布列如左註則並仍其舊舊韻凡二百又六今省爲七十六云洪武九年九月壬子朔翰林學士承㫖金華宋記韻府群玉後題右韻府群玉一書元延祐間新呉二隂兄弟之􅀁集也二隂一名時夫字勁弦一名中夫字復春􅀶學而多聞乃因宋儒王百禄􅀁増書林事􅁼韻㑹錢諷史韻等書㑹稡而附益之誠有便扵檢閱板行于世盖已乆矣入我聖朝近臣奉􅃙編洪武正韻舊韻音聲有失者改之分合不當者更之定爲七十六韻今重刻是書一依新定次序而字下􅀁繫諸事並􅀙隂氏之舊因書其故以告来學者洪武八年夏五月既望翰林侍講學士金華宋記贈今儀蔵主序予聞佛書一湏彌山攝一四天下一四天下共一日月湏彌有百億則日月有百億焉如是乃至恒河沙不可筭數之天下佛法未甞不流布其間况震旦一國邪日本在東海同爲震旦之國又可分􅆠界之内外邪此􅀁以同慕貞乘而至人攝化者亦未甞遺之也逹摩氏自身毒西来既至中夏復示幻化持􅃗履西歸後八十六年當推古女主之世逹摩復示化至其國世子豊聦過和之片岡逹摩身爲餒者困卧道左世子察其異觧衣衣之已而入􅄫遂蔵焉及啓棺無􅀁有唯賜衣存事與隻􅂂西歸絶􅁼􅀁異者當時無人嗣其禪宗爾自時厥後橘妃遣慧蕚致金繒泛海来請齊安國師卒今義空比丘入東其首􅀓禪宗之碑信不誣矣至覺何之嗣佛海逺道元之承天童净逹摩之宗駸駸向盛原大法之蘖芽實肇見扵世子之時歟嗚呼亦可謂逺也巳矣範堂儀公日本之人也俗姓藤氏脩習禪􅀚夙夜匪􅈈至正壬寅秋航海自閩抵淛叄叩尊宿咨决法要洪武癸丑冬復来􅃽山爲侍者㝷遷掌蔵史叢林中以法筵龍􅁚期之範堂以予頗䆒内典圓頂方􅂁之士無不􅀗文句而去謁予以徴贈言予謂三蔵靈文琅亟玉軸世􅀁嚴奉者凡五千四十八卷六百億三萬一千八百八十八言其刋定因果窮䆒性相則謂之經垂範四儀嚴制三業則謂之律研真顯正覈僞摧邪則謂之論三者莫不具焉範堂既司之矣司之寧有不受持讀誦之乎脫若以言演􅀃之多無踰扵此也如曰􅀡指人心片言己爲餘䞉何在扵􅀶求耶雖然萬錢陳扵前非緡無以貫之萬法􅄆扵事非心無以攝之假言以明心挈其綱而舉甚要亦古人之甚拳拳者也大氐人有内外佛性無内外人有東西佛性無東西一真無妄充滿太虗大周沙界細入藐㣲光輝洞逹皆含攝而無􅀁遺範堂扵此而證入焉一念萬年何今何古􅄫然不動誰佛誰生當此之時殆非世諦文字之可形容也逹摩氏之􅀁􅀓其大㫖不過如是而已範堂徧叄諸方諸方尊宿以範堂精進多􅀁印可不知曾有不自寳秘而昌言若斯者乎予見範堂向道之切故舉百億湏彌皆有佛法佛法肇興扵日本者稍著見焉而末復申之以此者衞法之事嚴而利物之心急也䟦黄文獻公送鄭檢討序後自古師弟子間不翅親父子然􅀓􅀁謂父生之師教之其義誠一也故孔子之稱顔子則曰視吾猶父是顔子以父事孔子矣父子之道天性也父沒而手澤存焉子或見之則泣下霑襟父師一也孰謂爲弟子者有不然者乎予友太常􅀶士鄭君仲舒黄文獻公之髙苐也公懸車家食之時仲舒以外艱服除復入經筵爲檢討官瀕行公造序槀一通親加􅇡改持至浦陽江上與仲舒言别且致餼焉仲舒既屬繕書者入卷乃􅀵序槀秘蔵惟謹及公薨装裭成軸毎出展玩曰公吾父師也公不可見矣見公之手澤如見公焉言訖輙悵然遐思嗚呼仲舒之不忘公其盡師弟子之義者㢤仲舒義門八世孫家教薫洽在家爲佳子弟出仕爲名師儒與仲舒㳺者見其温㳟可近輙自詫春風和氣之襲人臨川太樸危公􅁛南冠而北仕者以徳行言之當推仲舒爲苐一流觀仲舒不忘其師如是餘則􅀙可知矣太樸之言其真足徴㢤予亦灑掃公門與仲舒爲同志因相與一言之混成道院記道家者流秉要執本清虗以自守卑弱以自持實有合扵書之克讓易之謙謙可以脩已可以治人是故老子伊尹太公辛甲鬻子管子蜎子與夫兵謀之書咸屬焉自其學一變而神仙方技之􅀃興欲保性命之真而㳺求扵外盪意平心同死生之域而無怵􅅥扵胸中則其玄指復大異扵前矣􅀁以劉歆之著七畧既書道家入扵九流而復别出方技其意豈無見㢤嗚呼其􅀓襲盖亦乆矣婺之浦陽有山㧞起曰仙華相􅀓昔有仙嬪扵此乘龍上昇山形如翠蓮花猗儺妍麗當晴霞朝絢儼如蓬莱樓閣突兀五雲中疑有古仙人徃来其間山南六七里則縣治在焉縣治之東曰東嶺地􅀔廽旋而靈冲之氣不􅂥當元之時于錬師某常建道院一區以棲肥遯之士錬師之弟子葛道慶今扵東嶺之源復建混成道院凡殿堂門廡暨庖湢之屬具完經始扵洪武三年之庚戌落成扵六年之癸丑脩真之士来鈆汞而錬黄庭者于于而来矣道慶請予記之予聞神仙家之說葆精嗇神㝠合太虗翛然玄覽􅁍立垢氛之外下上星辰呼吸隂陽超無有而獨存心頗􅃩之邇年以来刋落世嬰外物之爲覊馽者皆釋然謝去思欲排空御氣神㳺八極之表俯瞰仙華而時一下之道慶儻相見焉當趨前長揖曰子甞記我道院矣豈真􅀁謂列仙之儒非邪幸授我以長生秘訣必相與辴然一咲也道慶字䖏善爲人恂恂有禮入道之志盖堅如鐡石云天台廣濟橋記天台縣西二十里有山曰鷓鴣二水􅀤源其間合流至長洋復折而西與大溪匯然後滔滔東逝當夏潦秋霖水驟進氣􅀔奔突只尺如隔胡越里人壘石爲小橋不能殺水怒竟蝕而去邑大姓洪紹生憂之乃集子姓與謀累址于淵鑿石于山犬牙相凾魚鱗宻比架爲高梁崇以尺計者二十有五修倍之翼以石欄與橋相齊甓東西兩隄各二百尺有畸傍築庵廬三楹間招浮屠惠澄者守之始事至正己亥之三月訖功扵庚子之十一月費錢一萬緡夫工一萬一百橋成􅀮然如虹霓跨空而収截險利渉之效下視飛濤如履袵席遂名之曰廣濟云予聞穚之名始扵殷至秦漢多異􅁛以其有小大之殊而濟人之功則一也世道陵夷使㧞一毛以利物則頩然怒其視紹生一門見人病猶己病者㡬何人㢤嗚呼若紹生者亦可謂惠人也巳昔蔡襄記萬安渡石橋不過一百二十二字又葉正則作利渉橋記乃六倍之予斟酌其繁簡而爲斯記俾刻焉紹生字􅀓可其先有諱漢者唐末自浦江海唐来遷世多儒至紹生益力本尚義其子曰居安居易居息姪曰夣熊濟浩福翁禄翁居易即来請記者今爲國子生云贈呉府伴讀陳生孟􅊙序君子爲學能知内而不外斯善矣内則自任之重而不失天分之正茍區區務外則奔趍竭蹷何􅀁不至㢤于自官京師南北之學徒頗有来受經者既而多攝御史巡行郡國而陳孟暘亦在其列孟􅊙􅀁涖光頴徐邳宿五州官書浩穣至萬餘卷孟暘逐一爬梳使枉者􅀡􅁀者馴且察夫民病請免夏賦之絲頻􅃥之軍與夫輓運芻茭之艱分給滯塩之便如是者數條右御史大夫陳公即以上聞多有舉行者已而同列之士或擢左右􅂙政或典大郡或僉各郡案察司事人皆曰孟暘之材若是其􅀅自此升㢤孟􅊙􅃴以疾在告人爲孟暘惜之孟暘則曰爵禄之来天也吾敢有徼覬之心㢤且方岳之任至重􅗀􅁝泉粟之殷甲胄獄訟之繁徴科營繕之勞無􅀁不當與倘毛髮不至是􅀒國也吾自度其才可與同列班乎不可也幸仕優而學拾級而升庻㡬無曠官僨事之失也况吾母氏年近五十餘日薄西山素髪蕭蕭然垂領僑寓扵婺城之間吾心懸懸如飢近已得請于上躡履而迎之以来庻㡬吾心安焉不然鍾嗚􅂦食以爲榮結駟連茵以爲侈􅃴足以增夫愧耳子聞孟晹言知有志君子者也内而不外者也拾級而升而無躐進之望者也思孝乎親者也此贈别之言􅀁以不可不作也書史會要序天台陶九成新著書史會要成翰墨之家競欲􅀚之以謄鈔之不易也共鍥諸梓而以首簡授予序序曰史以􅀙又持中爲義盖記事者也黄帝時始立史官而蒼頡沮誦實居其職蒼頡制字之人也自時厥後史氏遂掌官書以賛治至周宣王太史籀復造字五十五萹以教童㓜􅀁謂史者豈非字學之本源乎然則紀歴代之善書者名曰書史非僣也冝也九成本衣冠子自青年即精䆒六書之法􅇱知字文相生之意乃辨析古文􅂐籀分隷行草諸家異同并載其人而附見焉先之以帝王次之以名臣又次之以材士大夫起自三皇迄于國朝凡名一善者悉具録之其事核其論確而有徴皆遍采史􅀓及前脩􅀁著書不復以異議叄乎其間書成釐爲七卷予甞取而觀之不􅁴喟然嘆曰夏殷而上左史記言右史記事周則大史小史内史外史御史分掌其事其任至重也大則國家禮樂刑政治忽善惡固無􅀁不當紀小則一事一物該古今而資問學者亦不可不明辨如此而名之曰史庻㡬可也穠葩􅃩卉随春開落何􅀘扵事功陸佃集之號爲花史硯雖適用不過一石何􅀜扵治教米芾編之目爲硯史是則奚可㢤必也如吾九成精䆒六書􅀡探皇頡史籕之本源歴代字體變化如浮雲者皆可攷見致知格物之學似不爲無􅂇茍􅁛書史孰謂非冝㢤抑予聞六書居六藝之一周官保氏掌飬國子則教之盖自聖人以書契代結䋲之治實取諸夬夬揚于王庭其用最大冝其天下無不學學之當無不至也予又獨嘅近世以来徇末而忘本濡毫行墨春蛇秋蚓之連翩輙揚眉以驕人曰此斯氷也此右軍大令也有識者觀之曽不滿夫一哂讀九成之書者不知能一自警否乎九成名宗儀積學能文辭甞覽雜􅀓記一千餘家多士林􅀁未見者因倣曽慥􅁼􅀃作􅀃郛若干卷曽􅀁編者則畧去之君子謂其􅀹精􅀶云括蒼呉氏世系碑銘有序惟呉氏出自􅁎姓自泰伯仲雍避其弟季歴去之勾呉周武王封其裔孫呉周章爲呉子至夫差爲越􅀁㓕子孫以國爲氏分䖏北南厥後有居延陵者莫知㡬世又自延陵遷湖之徳清至宋大理評事景生子曰庠庠官䖏州始􅀙徳清来占籍焉庠生三子曰感曰乙曰榮感生二子曰安常曰安國安常絶無􅀓安國字鎮郷宣和􅀄以大學上舎釋􅄄進士累官太常少卿使金不辱命還知􅀽州夀五十六而終娶周氏生一子曰􅀖老歴官知呉縣復居徳清乙生一子曰安上安上生七子而名聞者三曰企曰顯曰􅀖而生俱由舎選出身企累知定海縣顯􅄪轉國學正曰􅀖煥省試第一人􅀖煥之子曰友龍漕試亦苐一人其後皆爲賢師儒亦絶不􅀓榮生二子曰安禮曰端朝絶不􅀓安禮生三子曰􅀖明曰􅀖本曰􅀖彦􅀖明􅀖彦皆絶不傳􅀖本一名挺字挺才因父有疾遂精扵醫以淮南東路安撫使司凖備􅀅領同司農少卿湯碩使金亦不屈節夀六十二而終娶潘氏毛氏生一子曰嗣英字華􅅩􅀘迪功郎能􅁇父學不要利如唐宋清之爲内外婣寠者傾貲給之殁不能塟亦仰其襄事距城二里􅀁有山曰三巖樂其幽邃預爲蔵穴扵中岡之麓時醉卧其中且扵穴前百歩築歸愚庵謂其友何宗姚曰君冝爲我作墓碣幸生得見之後七年八月癸酉吾當歸窆扵此耳至期果然實寳祐三年秋也夀八十五而終娶閭丘氏清簡公昕之孫生三子曰有􅄏曰有光曰有益有􅄏絶不傳有光字行謙能文辭任逹如其父亦精通扵醫馬荘敏公来爲郡極禮異之尺牘徃来㡬無虚日壽七十三而終其塟在華叔府君墓東一百歩娶薛氏生四子曰嵩之曰泰之曰良之曰衡之嵩之泰之衡之皆絶不􅀓艮之字止軒性善柔言呐不出口遭宋改物而吏勢益横競魚肉之甘受而不怨晚以子克家逸豫康寕至七十九而終其塟在華叔府君墓南五歩娶趙氏生五子曰祖臯曰祖􅁇曰祖䁀曰祖謙曰祖成祖臯祖䁀祖成皆絶不傳祖􅁇一諱元亨字嘉甫通經史百氏書星暦法律亦無不研究詩若文一以理勝事親孝及殁􅀒􅁟成墳結室墳左􅆍苫枕塊其中服􅆣始還居室屢燬締搆者凡三必先完諸弟者諸弟有􅀌女二人未行竭貲嫁之性耿介奨善疾惡之行皦皦自信不肻詭隨人来赴愬者得片言各悅服去君子謂其嘉惠里俗靖綏􅀖人有漢陳寔之風􅀻謚曰嘉靖䖏士云壽七十四而終其塟在止軒府君墓東五歩娶趙氏生二子曰世昌曰世徳世昌字伯京鄉貢進士今授䖏州府儒學教授世徳字仲懷鄉貢進士衢之羙化書院山長世昌娶丘氏生二子曰公願曰公顯公願字􅀙善􅀶學善屬文承事郎工部主事兼呉相府録事娶潘氏生一子曰維公顯娶趙氏生一子曰綸世徳娶劉氏生四子曰公進曰公逹曰公述曰公遜公逹賜進士及苐朝列大夫知廣平府事以事免祖謙字某殁塟止軒府君之西三十歩娶氏生二子曰徳明曰徳茂曰徳盛徳明徳勝皆絶不􅀓徳茂娶翁氏生一子曰道臻有益字十朋以儒術稱娶華氏生二子曰夀翁曰岳老岳老殁塟毛山去華叔府君之墓五里而近娶氏生二子曰祖稷曰祖華皆絶不􅀓壽翁字如山宋秘書省檢閱文字元署遂昌尹其塟在華叔府君墓東一百有餘歩與行謙府君墓連娶王氏生一子曰祖堅殁塟歸愚庵􅅖娶陳氏别窆東岡生二子曰世慶曰世善世慶娶王氏生三子曰廣生曰㢘生曰庭生廣生更名浩今授承事郎通判饒州府娶王氏生一子曰璿世善娶某氏生三子曰庸生曰唐生曰應生濂在禁林時公願爲編修官相從授經者頗乆一旦奉其父進士君之命拜而請曰呉氏自呉興徙括今十有一世矣詩書之澤相仍弗墜子孫亦與有禄食大墓在三岩者十亦皆松楸蔚然而樵采有禁豈一朝夕之故㢤然宗系漸繁易致扵淆亂失今弗圖無以貽示永乆爰建祠堂三楹間扵中岡之南以奉祀事復掇世系之可徴者件繫成書願先生詳書之使鑱諸石以列於祠中濂聞呉氏之􅀁自出徃徃指爲延陵季子之裔季子之逺孫分爲延陵州来二氏矣非呉氏也呉氏自扵越㓕國之後始建氏扵呉其後有出渤海者有出濮陽者有出陳㽞者各随其顯望爲宗雖紛紜不齊要皆夫差之後非季子也今括之呉徙扵延陵􅂲或者謂出季子之裔故爲一辨之而其系次治行夀年卒塟書中可徴者靡不備載不可徴者不敢强也嗚呼氏族之學古人甚重􅀁以昭本支别親踈謹異同世䧏俗㣲能存心扵此者㡬何人㢤有如公願父子誠可謂賢矣乎系之以詩曰句呉之裔實出扵􅁎碩大且衍自本逹支浙河東􅆠有州維括孰其来遷爰震爰􅀤習我爼豆恱我書詩藉􅃂流榮􅁼體受衣􅀭名王廷聲讋敵國爾雖渝盟我持我節自時厥後世澤敷滋履義蹈仁唯徳是歸癢痾疾痛使我心惻慨彼越秦罔視肥瘠􅀖侯牧伯識之争先分庭抗禮如賔大賢有濟厥羙孝思罔極􅀒􅁟懐親倀倀如失眼有青白是非攸分不尚詭隨剛膓獨存至今遺胤蒙其休祉文光燁然紆朱拖紫維彼三巖㧞起㠝岏岡廽澗縈風氣欝蟠靈和􅀁鍾生祥下瑞蟄蟄子孫今聞長世譜系昭朗自流徂源惇孝廣敬澆俗其敦我撰碑銘􅀣于祠下善纉善承朂爾来者䟦子昻真蹟後右蘇子瞻􅀉呉徳仁兼簡陳季常詩一首趙魏公子昻􅀁書公時年六十又四其􅀙集賢學士進拜翰林學士承㫖亦僅十有四月耳公自是更不遷官又五年而公薨矣公書之􅀓世者真贗相半非有識未易辨盖真者猝難入目筆意流動而神蔵不露愈玩愈覺其研贗則其氣索然不待終覽而厭之矣此帖實公晚年妙筆老氣翩翩逼人黃口小兒日百臨摹雖近終不近也公自題爲月江學士書月江乃昭文舘大學士張克明云菊軒銘金華韓先生進之以􅂄年碩徳爲州里後進􅀁矜式文章問學既不􅀗用扵世乃􅀉情扵鞠華東籬之下環植之亡慮數十本盖以鞠有正色與先生􅀁禀正性相符故當風露高㓗之時獨致其研而非凡花􅃩卉之可同也濂四十餘年之老友也雖不能文爲著鞠軒銘一首先生當與我刪之銘曰鞠有正色具中之徳君子法之以無頗爲僻鞠有落英斯鞠其馨君子餐之期不爽厥真菊􅀆君子􅀆合爲一􅀆終無􅑯􅀆永爲民則􅀆宋學士文集卷第三十八翰􅁐别集卷第八
