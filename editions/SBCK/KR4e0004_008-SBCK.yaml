body:
  text: 白雲槀序劉勰論文有云論說辭序則易統其首詔䇿章奏則書彂其源賦頌歌讃則詩立其本銘誄箴祝則禮総其端紀傳文􅊾則春秋為之根嗚呼為此􅀃者固知文夲乎經而濂猶謂其有未盡焉何也易之􅂏象有韻者即詩之屬周頌敷陳而不恊音者非近扵書歟書之禹貢顧命即序紀之宗禮之檀􅃓樂記非論說之極精者歟况春秋謹嚴諸經之體又無􅀁不兼之歟錯綜而推則五經各備文之衆法非可以一事而指名也盖蒼然在上者天也天不䏻言而聖人代之經乃聖人􅀁㝎實猶天然日月星辰之昭布山川草木之森列莫不繫焉覆焉皆一氣周流而融通之苟欲强索而分配非愚則惑矣夫經之􅀁包廣大如斯世之學文者其可不尊之以為法乎吾友朱先生伯賢以純篤之資而㽞意扵辭章先秦兩漢以至近代諸文無不周覽用功之乆灼見其是非之真復取近正無疪者聚而為書蠅頭細字動至數十大册時出而諷詠之巳而嘆曰學文不本諸經其猶玩培塿之卑而忽嵩華之髙乎乃復致力扵經功益倍扵前時越數蔵胸中浩然若有􅀁得操觚書之凡隂陽盈虗之運民物倫品之理萬彚屈伸之變皆隨事而著源源乎􅤾知其􅀁窮且其為體多而不冗蕳而有度神氣流動而精魄蒼勁誠可謂粲然藻火之章矣濂之有志為文不下扵伯賢古今諸文章大家亦多究心及㳺黄文獻公門公誨之曰學文以六經為根本遷固二史為波瀾二史姑遲遲盍先􅀙事扵經乎濂取而温繹之不知有寒署晝夜今巳四十春秋矣用心之苦雖與伯賢同而伯賢之􅀁造詣濂固不􅀎窺見其髣髴也然而太上立徳其次即立言立言甚非易也自孟子以来致力扵是者非不多求其可與經並傳者舂􅁜周元公一人而巳元公之言曰文􅀁以載道也輪轅飾而人弗庸徒飾也况虗車乎是則文者非道不立非道不充非道不行由其心與道一道與天一故出言無非經也元公豈嘗拘拘學為文㢤濂與伯賢又當共勗之可也伯賢以白雲槀若干卷請余序濂故具論之使知伯賢之文壹以經為夲而蹈襲近代以為羙者其尚有􅀁彂也㢤伯賢名右天台人著書甚多􅀁謂春秋􅀋編三史鉤玄秦漢文衡深衣考邾子世家傳皆別行贈醫師周漢卿序余聞松陽周君漢卿以醫名者乆矣一日余婿鄭叔韡復来青蘿山中述其詳曰周君之醫精甚他固不􅀎知姑即士君子􅀁常道者言之括蒼蔣仲良左目為馬􅀁蹄其睛突出懸如桃羣工相顧曰是系絡既損法當眢周君咲不荅以神膏封之越三日目如初華川陳明逺患瞽者十齡百藥屡嘗而不見效自分為殘人周君視之曰是翳雖在內尚可治用鍼従㫮入睛背掩其翳下之目歘然辯五色陳以為神武成男子病胃痛當痛不可􅃘嚼齒刺刺作聲或奮擲乞死弗之得他毉用大攻湯汙皆不損周君以藥納鼻竅中俄大吐吐出赤蟲尺餘口眼咸具痛即止東白馬氏婦有姙歷十四月不産形􅇤尫且黒周君脉之曰非孕也乃為妖氣之􅀁乗耳以藥下之一物如金魚疾旋巳永康應童嬰腹疾恒痀僂行久不伸周君觧裳視之氣衝起腹間者二其大如臂周君刺其一魄然鳴又刺其一亦如之稍按摩之氣盡解手趋無㽞行長山徐嫗遘驚疾初發手􅁕顫掉禠去裳衣羸而奔或歌或哭􅂉牽曵如舞木偶粗工見之吐舌走以為􅀑鬽􅀁惑周君獨刺其十指端出血巳而安虎林黄氏女生瘰􅊓環頚及腋凡十九竅竅破白瀋出右手拘攣不可動體火􅀬家人咸憂趣匠製棺衾周君為剔竅毋長二寸其餘以火次第烙數日成痂痂脫如恒人扵越楊翁項有疣其鉅􅀋􅀲因醉仆階下疣潰血源源流凡疣破血出弗休必殺人他醫辭不進周君用劑糝其穴血即止烏傷陳氏子腹有由􅀮起捫之如􅎆􅂉以為奔豚􅂉以為癥瘕周君曰脉洪且芤癰彂扵腸也即用燔針如筴者刺入三寸餘膿隨針射出其流有聲愈櫧槩黄生背善曲杖而行人以風治之周君曰非風也血澁不通也為刺兩􅁕崑崙穴頃之投杖而去其醫之甚精如此薦紳先生宜有以褒之􅀭之敢以序文為請余惟古之神毉一橃見病之應因五臓之輸乃割皮解肌决脉結筋搦髄揲荒爪幕以為治􅀁謂鍊精易形者也今則人誰知之其次則湯液體釃鑱石橋引案抏毒熨之法耳是法亦絶不傳其僅存扵世者往往不􅀎用用􅂉乖戾以致夭閼而傷生者多矣夫醫者民命􅀁繫一投丸之間一授箴之際則安危由此而分何可不致謹扵斯邪昔司馬遷立倉公列傳其􅀁治自齊侍御史而下凡十有餘人皆歴䟽其病状辭雖繁而不殺者其意盖有見扵此也余敢竊取斯義備以叔韡􅀁述序次成文以遺周君又安知他日脩史傳者無采扵余之言㢤余耄矣且有脾􅍔吐涎日二三升蔓延將四稔叔韡尚邀周君以起余之疾者乎田氏哀慕詩集引孔子刪詩南陔白華皆存之而弗削者以其􅀎孝也南陔之詩序言孝子相戒以飬意者孝子之􅀁自作交相勸勉而盡其事親之誠至白華之詩乃謂詩子之潔白潔白則其行之純可知豈非人羙之而賦是詩者邪雖有在人在巳之殊􅀁以咏歌其志而鼓舞以為文勸者其益不既大㢤惜乎有其義而亡其辭也同郡田君奐篤羙有馴行其母徐氏卒哀􅃅慟􅂘將欲無生既塟遑遑焉如有求而弗􅀗人勸其還舎奐􅃅曰吾母在此吾奈何􅄐母而去也因結廬墓側而依焉人復勸之曰廬墓非古也奐􅃅曰吾恨不死􅀙吾母扵地下古與非古吾弗暇計也扵是復作為詩歌以自勉􅃦苫枕塊䟽食水飲終三年而後歸鄕之士大夫與鉅公碩士聞之咸為太息亦作為篇翰以羙之嵗積月増遂成卷帙其婦公陳君本心曰是不可以無傳也將刻諸文梓不逺三百里来青蘿山中而以首簡授余序作者之意余疾病􅆞綿之餘凡以文為屬者必固閉而力拒之而其請至扵三五而不倦因嘆曰夫孝如奐者是亦􅁕稱也卷中諸詩豐縟而紆徐粹雅而冲和固皆一時之傑作苟謂其有合扵南陔白華之㫖我則不敢知設當孔子之時其刪去與否我亦不敢知此無他二詩之辭既亡縦欲徴之而不可得也雖然孝者天之經地之義無古無今無長無㓜無貴無賤有不可得而變易者人􅀎咏歌之而鼓舞之雖孔子復生吾知其􅂉將存之矣是時之傳他日􅀍之管絃諧諸金石使聞之者津津以喜會之者欣欣以勸則為移風易俗之益又豈小㢤其視絺辭繪句道滛而宣驕者何如也古鼎和上四會語錄序賛古鼎禪宗銘公以臨濟十七世孫四坐道塲為黑白之􅀁宗仰一旦祝釐江淛省垣現白光三道丞相康里公見之極加敬禮未㡬將示􅄫語其徒曰觀世音蓮臺至矣安坐而逝及火化舌根齒牙􅁆珠俱不壞五色舍利燦爛無􅁆國史危先生巳摭其行業為文勒碑而四㑹語未有序之者師之得法上首今天界禪師西白金公屬濂作之濂覽巳合爪言曰是真正語是不著有無語是電轟電掃語學者隨􅀁悟入如慈雲徧覆法雨普沾小大根莖皆􅀗生成非入正知免具大力量者孰􅀎與扵此嗚呼世安復有斯人乎㢤非謂果無之也求其真淳無偽若師者鮮也濂既為叙其事復歆􅃩之歆􅃩之不􅁕復作伽陀一章賛之其辭曰我觀我師四會語一言一句皆真實河沙妙義總含藏其中無餘亦無欠及至􅀎􅀁齊泯時欲覔片言不可得有如十萬虚空界種種色相皆現前􅂉飛或潜􅂉動植以至洪纎髙下等枯榮生死及崩竭了然不染虚空相而亦不出扵虗空真相如如不動故師昔嘗登􅄫照塲耳邊一喝三日聾惟聾故使功用絶絶後通身皆是耳自兹出世入翁洲翁洲海水亦生耳但聞魚龍哮吼聲即使波濤增洶湧繼升補陀洛迦山合掌問訊觀世音目􅀎觀色耳聞聲音聲何獨以目觀不知本来無耳目見􅀁不見聞不聞盡大千界無礙者中天笁國凌霄峯􅀁談妙法皆如是只因妙法法難思結集巳落第二義眉間放出白毫光七寳蓮臺向空至此皆逰戯神通事扵師之道不相攝師之道大不思議千古賛嘆莫􅀎盡姑以第二門中觀可以洗空扵結習可以觸動扵悟機可以速證扵菩提是宜流通扵世間視如照耀光明幢我言􅂉誣有如水用明禪師文集序昔者蘇文忠公與道潜師㳺日稱譽之故一時及門之士若秦太虗晁􅀘之黄魯直張文潜軰亦皆􅂅交扵潜師相與唱酬扵風月􅄫寥之郷宛如同聲之相應同氣之相求者有識之士疑之則以謂潜師㳺方之外者也其措心積慮皆與吾道殊􅀄不可以强而同文忠公百世士及其門者亦英偉非常之流其扵方內之學者尚不輕與之進何獨扵潜師皆推許之而不置邪殊不知潜師􅀎文辭彂扵秀句如芙蓉出水亭亭􅀝風不霑塵土而其為人脫略世機不為浮累􅀁􅅞有如其詩此其􅀁以見稱扵君子而其遺芳直至扵今而不銷歇也歟四明永樂用明詗公蚤􅀙月江印公究達摩氏單傳之旨踰十餘年不􅈈自􅁴有􅀁悟入一旦忽慨然曰世諦文字無非第一義吾可以不求之手扵是形之扵詩皆古雅俊逸可玩巳而著為文辭章句整而不亂言辭暢而不澁論議正而不阿聲名藉藉起羣公間會先師黄文獻公㳺浙水西用明槖其􅀁作来見復成詩八十韻以為䞇黄公讀巳大加稱賞遂日與黄公㳺及其東還烏傷用明又賦詩餞之黄公因造序文一篇以遺用明其聲氣之同盖翕如也今年春余奉詔来京師總􅁱元史適與用明會扵龍河佛舎用明出詩文各一鉅册示余曰子黄公之髙苐弟子也盍為我序其首嗟夫黄公以道德文辭髙出一世固當代之文忠公而吾用明之作亦何愧扵潜師頋余視黄秦􅄯張諸君曾不􅁕以供洒掃之役何敢為用明序乎獨念及黄公之門三十餘年知用明受知為􅀷􅄑與用明交亦似無間諸君之扵潜師者序盖不得不作也雖然大圓鏡中無一物不攝初無一物可攝實有非世諦文字之􅀁􅀎解此盖用明與月江講之熟矣奚俟余言㢤如攄其鄙見以為叙使後之讀者知古今人未嘗不同不特文忠公之與潜師而巳也水雲亭小槀序余在金華山中觀蛻岩張先生集有䟦夢堂噩公用堂楩公吳中唱和卷後其言曰詩家寥􅋁叢林有人殆與唐皎宋潜方駕余􅀼以謂夢堂之詩􅄑巳見其一二矣而不知用堂􅀁賦為何如意其必髙爽而絶塺者乎不然先生何為以如晦􅋁擬之也及来南京􅀗與用堂會扵護龍河上間出詩文一帙􅀁謂水雲亭小槀者俾余序之非惟其詩可稱道如先生􅀁云其文亦深穩平實而多言外之趣因竊自嘆方外之人其用志不分乃􅀎如斯之工也􅂉謂余曰達摩氏西来其􅀁傳者心法而巳矣何以詩文為㢤子􅀁取扵用堂者淺矣嗚呼是何言歟是何言歟昔我三界大師金口􅀁宣諸經􅀁謂長行即序事之􅀋􅀁謂偈頌即比賦之属汪洋盛大反覆開演天地日月山川草木城邑人物飛仙􅀑趣羽毛鱗甲莫不攝入故後世尊之􅃅曰文佛如此而􅀎文吾惟恐其不􅀎文也大師姑置之不敢妄論次而毗尼諸聖賢暨天親無著奉化之清泰凡禪林若古鼎銘公咲􅀮訢公斷江恩公儒林若􅀽文清公掲文安公黄文獻公皆嘗叅叩及交㳺云送天淵禪師濬公還四明序文辭之羙者見之扵世何其鮮㢤非文辭之鮮也作之者雖精而知之者未必真知之者固審而揚之者未必至此其每相值而不相成唐有桞儀曹而浩􅀄之文始著宋無歐陽少師而祕演之名未必􅀎傳至于今盖理􅀔之必然􅀄不待燭照􅀛卜而後知之也嗟夫浩􅀄祕演何代無之其不白扵當時卒隨煙霞變滅而無餘者豈有它㢤由其不遇夫二公故然爾此余讀天淵師之􅀁作其布感扵中矣乎天淵名清濬台之黄岩人古鼎銘公之入室弟子嘗司内記雙徑􅀃法扵四明之萬夀近歸􅀮扵清雷峯中盖法筵之龍象也余􅀄未能識天淵見其􅀁裁輿地圖縦横僅尺有咫而山川州郡彪然在列余固已竒其為人而未知其􅀎詩也巳而有傳之者味冲澹而氣豐􅃾得昔人句外之趣余固巳知其􅀎詩而猶未知其䏻文也今年春偶與天淵會于建業因相與論文其辯􅀶而明捷寳蔵啓而琛貝焜煌也雲漢成章而日星昭煥也長江萬里風利水駛龍驤之舟藉之以馳也因徴其近製􅁆篇讀之皆珠圓玉潔而法度謹嚴余愈竒其為人傳之禁林禁林諸公多嘆賞之余􅀼以謂天淵之才未必下扵祕演浩􅀄其􅀮伏東海之濵而未􅀎大顯者以世無儀曹與少師也人恒言文辭之美者盖鮮嗚呼其果鮮乎㢤方今四海會同文治聿興將有如二公者出荷斯文之任倘見天淵􅀁作必亟稱之浩􅀄祕演當不専羙扵前矣􅂉者則曰天淵浮屠氏也浮屠之法以天地萬物為幻化况􅀁謂詩若文乎是固然矣一性之中無一物不該無一事不統其大無外其小無內誠不可􅄐而為二苟如􅀁言則性外有餘物矣人以天淵為象為龍此非􅀁以言之也天淵將東還賢士大夫多留之㽞之不得咏歌以别之以余與天淵相知尤深也請序而送之送覺􅀄禪師還江心序往時有大比丘孚中信公以松源五傳之學提唱護龍河上覺􅀄㤙公實與之分坐說法鞴宏施烹凡煆聖機鋒􅀁觸抉飊奔霆四衆歸依如水赴海曽未㡬何孚中示寂􅁴􅀄乃出世扵建業之聖泉遷永嘉之雅山法道亦既大行扵時巳而江心虗席若牧守若戌將若賢士大夫僉以謂江心古叢林思􅁜昔日駐蹕之地其名列在江南十刹非有名徳如覺􅀄不􅁕以厭服人心各具書䟽以延致覺􅀄覺􅀄以慈憫故亦起而赴之及我皇上正位宸極􅂭興佛乗開善世院扵大天界寺置統領副統賛教紀化等員海內諸名山悉􅀠之掄選有禪行渉資級者俾為之主其非才而冒充者斥之扵是循例為江心擇賢然終無踰扵覺􅀄者統領遂合群議仍請覺初居其職會余奉詔總􅁱元史来南京覺初亦振錫自江心而至握手共語情盖懽如也覺􅀄一旦忽来别曰吾將還江心子可無一言以贈乎嗚呼大雄氏之道頓與漸之謂也以漸言之􅀄臨十信伏三界見思煩惱外凡之位也次至十住位㫁見思惑兼㫁界內塵沙及伏界外塵沙用􅀙假入空觀次至十行位㫁界外塵沙用􅀙空入假觀次至十囬向位則伏無明而習中􅀚已上之種三十通為三賢內凡之位也次至十地位各㫁一品無明證一分中道入等覺位又破一品無明入妙􅁴位至扵妙覺始名為佛以􅁼言之則不階等第直造心源圓妙如如超出三界無煩惱可㫁無真乗可證無法門可學無衆生可度此心即佛彼佛即心不去不来忘內忘外不可以形相求不可以方􅀁拘也大抵敎中􅀁攝頓漸兼收敎外單傳頓為禪旨如来五時􅀁說及拈花微咲無非共一妙用第以根有利鈍之殊故其機有遲速之異耳奈何末流之弊二家角立互相詆訶夫豈佛意也㢤頗聞孚中雖叅向上一乗日誦法華七卷致感異香滿室不散覺􅀄扵禪􅄫之餘亦留心扵教相為人演說弗置是皆不徇一偏而將歸扵大同者也敢以此為說以贈覺􅀄覺􅀄其以為然乎否乎雖然大雄氏之道不絶如綫扶持而振起之非吾􅁴􅀄是屬將誰屬邪覺􅀄之還也布大法雲震大法雷澍大法雨使小大根莖無不霑潤豈不弘且偉歟覺􅀄宜憂法道之衰而思日勉焉可也他日余􅄑杖策束歸訪覺􅀄扵海濵升􅀌之亭歩海月之堂見月色與海光同一清净余與覺􅀄又當相視一咲嗒然而相忘也是為序雪窓禪師語録序􅂉問扵余曰菩提達摩西来以不立文字為宗盖欲掃空諸相直究本心而趋真實覺地者也名山宿徳何莫非建摩之子孫為之徒者因其說法往往編以成書􅃅曰語錄無乃與不立文字之㫖相戾乎曰非是之謂也扶衰救􅁦各隨其時節因縁有不可執一而論者矣昔我三界大師演說大小乗諸經其弟子結集為􅁱多羅蔵至繁且多也復慮後之人溺扵見解而反為心累故以正法眼蔵付扵摩訶迦葉拈華微咲之間無上甚深妙法含攝無餘此亦化導之一法門耳非真謂鹿野􅁐至䟦提河􅀁言皆當棄之也不然如来自兠率下生何不即以单傳直指示人顧乃諄􅃨勸誘而弗置之邪去佛既遠學者􅆞繞名義不䏻出離誠有如如来之􅀁慮者達摩出而救之故取迦葉微咲之㫖專以示人盖亦有􅀁甚不得巳焉尓育王禪師以三昧力入智慧海初說法扵白馬寺繼遷開元巳而住阿育王山兼領大童寺事四會之間緇素翕集􅀁以啓人天龍􅀑之聽屹立不遷如真正幢渉險度危􅀋大法􅊑若見若聞皆􅀗利濟至若垂三語以驗来學又如臨萬仞懸崖撒手而立非上根大噐豈易入其閫奥者㢤虞文靖公賛師之語謂為佛果一枝鳯毛麟角者其言良可信不誣也師入滅之十四年其上首弟子􅁚先輿公月徑滿公以􅀁錄語徵余為之序余故舉扶衰救弊各隨其時節因縁者言之扵以見達摩之宗非有違扵先佛諸師之録非有違扵達摩其事雖殊理則同也有若禪師此録之行後有因語言而入者雖不得見師而師之惠利􅀁及益逺矣雖然靈妙一真直超三界其大無外其小無內雖無物之不攝欲求一物了不可得于斯時也無煩惱可除無法門可學無衆生可度無佛道可成尚何有言語文字之􅁕論㢤觀斯錄者又當扵是而求之人􅀎扵是求之始扵禪師之道與有聞矣禪師名悟光字公實姓楊氏別􅃅曰雪窓成都之新都人南堂禪師語録序予壮齡時與千巖長公為方外交千巖以南堂禪師偈賛示余余讀之驚曰是有􅀁證悟者之言也絶枝蔓去町畦而不墮扵情識之境不意大法凋零而􅀎見斯人㢤千岩以余言為然當時之􅀁見僅一二章耳自時厥後或吳􅂉椘或梁宋􅂉魯衛名僧開示多有謁余浦陽江之上者余既見輙問見南堂否曰見之曰有何言遂各解囊相示見漸多則其心慕之為愈至及来京師其弟子祖􅏦海夀復持三會語􅂌余而求為之序讀之連日因􅀗盡其大觀馬嗚呼㩀獅子坐演如来法其任甚不輕也在他人為之東剽西剠拈綴成篇而椎鑿之㾗故在師則混融無迹不異雲流而天空者矣在他人為之拘滯一隅動輒有礙或得乎此竟遺扵彼師扵殺活之機縦横皆自如矣在他人為之氣索神沮不自振㧞而無以應来學之求師乃圓滿充􅁕覃及扵諸方矣有若師者其􅀁造詣誠非凡情之可度量㢤夫以少林西来惟究心源言辭直截初無􅀮晦傳至大鑒􅂲為世諦流布不得不祕護而宻持之歷代碩師隨時升降慈憫峻厲各立戸庭其接引雖若有不同􅀁以祛逐妄縁而挽入正塗者則一而巳矣迨及宋季尚竒騁異背其師授而流扵頗僻者漸多有之君子言之未嘗不為之太息師􅀎循蹈矩彠惟祖武是繩提唱真乗使人復見大鍳遺意其扶樹正宗之功大豈小㢤余之慕師非一日鉅細之辭皆􅀗觀焉故知師為獨深而謂非他人之􅀁􅀎及然可惜者師之名位不滿扵徳使其說法五山布靉靆之慈雲澍滂沱之教雨則其功逺􅀍又不止今之􅀁見而巳雖然名外也非內也徳內也非外也師內重而外輕者也苟以在外者之崇庳以為在内者之低昻是不知師者也師之行業余既詳書成記勒之堅珉復為讀斯録者著其說如此千岩在㝎光中乂未必不以余言為然也師諱清欲字了庵南堂其􅃅也族姓朱氏台之臨海人嘗住開福本覺靈岩三禪刹云送季芳聮上人東還四明序吾佛之學明心而巳矣然心未易明也結習之􅀁膠滯根塵之􅀁盖􅆞沉㝠扵欲塗顛倒扵暗室而不􅀎自知必䖏乎重山宻林之中木茹澗飲絶去外縁而直趨一真之境水漂麦而不顧雷破柱而弗驚乆之馴熟忽然頓悟大地山河咸作碧流􅄐色􅀎如是不可謂無􅀁證入矣然􅂲墮扵空寂未敢自倍又必擔䔲褁糧不逺􅁆百千里求明師而證之機鋒交觸如短兵相接失眼之頃輙至䘮身失命及其印可巳㝎退蔵扵宻如護明珠湏􅁷不敢忘去然而􅁱多羅蔵其多至於五千四十八卷大無不包細無不統其可委之為賸語耶又必出司蔵鑰晝夜研窮之而畢知其說證之扵言驗之於心既無分毫之不同矣於是不得巳出世度人續佛慧命其階級之不紊功用之甚嚴乃如此奈之何今之執法柄者􅂉不􅀎皆然也余方為之浩歎不止有若季芳上人其盖有以起余者㢤季芳名道聮鄞人也㓜讀傳書窮理命之學長依薦嚴羲公􅁱沙門行尋掌內記於大天界寺遂嗣法扵淨􅁴禪師矩度雍容進退咸有恒則盖温然如玉者也叢林之中成噐重之􅂉挽其為住持事則謙然不敢當且曰我心學未􅀎盡明也三乗十二分之說亦未􅀎盡通也我歸四明山中求諸巳而巳矣嗚呼若吾季芳之才之羙如此苟使之主一刹而領四衆焉何不可者而乃還然不居則夫不及季芳而奔競欲得者為難言矣季芳行㢤臨濟之子孫多有􅀮于鄮山鄞水之間季芳尚即而求之探古佛之真如繙諸經之妙義證入無量薩婆若海江南十刹諸名山當有遲吾季芳来說法者季芳雖欲自謙退不可得矣季芳行㢤送用明上人還四明序佛之書其蔵有三曰􅁱多羅蔵曰毗尼蔵曰阿毗曇蔵此則華言􅀁謂經律論者也經則諸佛及菩薩天仙皆可演說論則諸賢聖僧皆可著撰惟律非如来金口􅀁宣則有􅀁不可者故自文殊以降不敢賛一辭逮扵雙林入滅結集成蔵而優波離尊者復口誦聖言十過衆證無差然後宣布其慎重而不輕也盖如此然而中夏􅀄未之聞也自曇柯羅持僧柢戒本来洛陽始知有律文又至唐之澄照師作戒䟽羯磨䟽諸書而律學大傳扵天下謂之行事防非止惡之宗真悟師起於宋慶曆間復著會正記十二本以弘澄照之㫖嗣真悟而興起者則有大智師焉復以法華開顯圎意造資持記雖與會正稍殊亦無非推明澄照之􅀃而求合乎先佛之制嗚呼律學之難明也乆矣自非三師者出而恢弘之其有不失靈山之遺敎乎有其人則有其政又豈無望後来之法嗣乎用明上人本諸暨楊氏子素稱儒䆠之族自㓜􅀙叔父白石琪公逰四明遂令捨家扵慈溪崇福寺别江舟公毓以為法孫别江䏻窮法華三觀十乗之㫖嵗為長期率同􅂁三十人而暗誦之得上人以為􅀎繼其志極愛之而弗忘復命出湖心廣福寺􅀙師而受律文大義􅀁謂四波羅夷十三僧伽婆尸沙二不㝎三十尼薩􅂄九十波逸提四波羅提提舎尼一百衆學七滅諍大乗􅆊䋄經十重四十八輕等文皆欲習而通之及典事之久遷靈芝懴司之職今年之春與予胥會南京其威儀之雅問學之佳既􅁕以動人視聽而遊戯篇翰亦皆清逸有可玩者淨覺大師以碩望宿徳為釋子􅀁宗亦以上人為法噐俾出世扵菩提律寺上人將還四明徴予言以為贈予謂律文大義有三師之􅄒作在焉母事乎多言顧力行何如耳然而律主扵戒􅀎戒然後􅀎㝎􅀎㝎然後􅀎慧是則戒者作佛之階梯濟人之舟航也可不務乎律之義雖明而􅀁謂持犯開遮之說誰復講而行之為其徒者亦可以永嘆矣上人年甚茂志甚大其進未易量也􅄑勿安扵卑近惑扵旁岐恪然以三師之道自期則異日律學之再興者又安知不在扵上人乎亦在上人自勉之而巳予老且多病率尔成文殊無􅀁彂越頗聞白石師內外之學兼備蔚為時之名僧上人􅄑即而問焉其不斥予言為誕為繆則􅄑矣贈㝎巖上人入東序大雄氏之道洪纎悉備上覆下載如彼霄壤無含生之弗攝也東升西降如彼日月無昏衢之不照也弘敷固假扵敎儀妙悟湏資扵禪㝎􅀁以銷融其麤濁振㧞其精明降伏其塵勞躋登其實際非知力之􅀁强必頓覺而後成盖亦戞戞乎其難矣為其學者當究厥誠一法不立而日用熾然六入本空而真機獨露雖有􅀁證未􅀎自信扵是逺訪師資以求印可利鋒相觸雨雹為之交馳疑網既袪星月為之朗耀非具大慧充大量要不􅁕以與扵斯也㝎巖戒師吳興士族積菩提之因勵精進之學羙譽流扵四方純行信扵四衆且以見聞未􅄎踐􅂂或礙泛東大洋海而覩古佛顯化之跡登天台靈岩而詢應真示現之方波濤㫪撞皆談苦空林木葱蒨各彰實相此其立志甚不小也嗟夫世道既降正法不傳辭章之錦繡􅁕以移易其性情勢位之微甘􅁕以斵喪其智慧雖方􅂁而圎頂􅂉塵容而俗状滔滔不返可勝嘆㢤有如㝎岩竱心為道如􅀌雲野鶴弗為世氛之􅀁染如崇蘭幽芷弗為無人而不芳寜不為君子之􅀁取乎􅀁謂充大量具大慧者異日當扵之岩徵之也㝎岩之還也且過南潯省親身居桑門心存孝道大雄氏􅀁說大報㤙七篇皆言由孝而極其業㝎岩又􅀎行之矣則其􅀁可取豈直前􅀁云云㢤會余詞林請書首簡頋文逋之叢沓兼覉思之􅌭紛筆無停思語多未醇同志之士刪而正之可也椘石禪師六會語序大慧提唱圓悟之道扵徑山神機妙用廣大無礙入其門者凡情盡喪得法弟子不翅千餘人各闡化原而佛照扵其中稱為善繼佛照之後而妙峯紹之妙峯之後而蔵叟承之如持左劵相授噐度脗合無差爽者寂照在四􅀓之餘復􅀎克肖前人誠􅀁謂世濟其羙者然而諸師證入雖有不同其上接西来宗㫖使人離垢氛而發精明者則一而也矣寂照之弟子椘石禪師蚤以潁悟之姿銳意扵道一時名徳若晦機若虚谷若雲外争欲令出坐下師皆謝之惟詣寂照之室反覆叄叩一聞鼓鳴羣疑氷消世間萬物總總林林皆􅀎助發真常之機自是六座道塲􅀃法度人嬉􅀏怒罵無非佛事至扵現寳樓間及種種莊嚴導彼未法因相生悟其與一實境界未嘗違背聲聞之起水涌山出迨世縁將盡顔色不異常時翛然坐脫如返故廬則其俊偉光明較扵恃口給而昧心學者其果何如也㢤嗚呼大慧之道至矣自它宗言之執持正法作獅王哮吼者固往往有其人苐近年以来傳者失真瀾倒波隨􅀁趣日下司法柄之上復輕加印可􅆀使魚目渾珎􅀭眉瞬目之頃輙曰彼巳悟矣何其易悟㢤人遂請之為􅉚子之印非特此也五家宗要歴抄而熟記之曰此為臨濟此為曹洞法眼此為溈仰雲門不問傳之絶績設為活機如此問者即如此荅多至十餘轉語以取辦於口名之曰傳公案若是者皆見棄扵師者也今觀師之六㑹語小入無內大入無外機用真切無愧先徳唯具金剛眼者有以知余言之有在也余耄矣厄扵索文者繁多力固拒之此獨樂序之而弗寘者憫魔說之害敎表正傳以勵世也師諱􅆊琦其字椘石行業之詳則備見塔銘中其来徴序者得法上首􅉷中瓛公也宋學士文集卷第八鑾坡集卷第八
