  text: 宋學士文集卷第二十六翰􅁐續集卷之六
  hash: sha256:fd841978b4870ac08a7df324e62b866b67c48e0227edc81f1384c8e76b83eb6f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_026-1a}
body:
  text: 阿育王山廣利禪寺大千禪師照公石墳碑文西方聖人示現世間百億三昧無非度門而禪定之實爲之錧鎋蓋覺性圓朗本来充滿包三界而不礙窮萬刼而不昏非渉善惡了無顯晦巖栖澗飲之士能泯諸塵刹那之頃證入一實境界光明殊勝與虚空同體不起不滅所以其教熾然常盛而不衰有能知之而又能遵行之者其我大千師乎師諱慧照大千其字也永嘉麻氏子麻號積慶之家冝生上士父均母黄氏旣誕育師寳之勝摩尼珠師自童年亦駿利倍常堅欲入道聞人誦習契􅀴合􅀲諦􅃪年十五徃依沙門了定于縣之瑞光院了定師􅀙兄也長老良公知為法噐即鬀落為弟子明年禀持犯於處之天寕蟬蛻萬縁誓究大不思議事首謁晦機熈公於杭之凈慈未契圓證一日閱眞净語至頭陀石擲筆峯處黙識懸觧流汗浹背時東嶼海公以石林鞏公世嫡提唱扵蘇之薦嚴師杖􅃬徃謁東嶼問曰東奔西走將欲何爲師曰特来參禮爾東嶼曰天無四壁地絶八荒汝於何地措足耶師抵掌於几而退東嶼知其夙有所悟尋復召至反覆勘辦師如冝僚擲丸飛舞空中東嶼甚嘉之遂留執侍左右師以爲心法旣通不閱脩多羅蔵無以闡􅀭正教聳人天之聽乃主蔵室於郡之萬壽及東嶼遷净􅄌邀師分座以表儀四衆巳而無言宣公主温之江心􅃩師髙行招復師至䖏之如凈􅄌天暦戊辰出世樂清之明慶㩀師子坐集諸僧伽而誨之曰佛法欲得現前莫存知觧􅅞禪㸔教未免皆爲障礙何如一物不立而起居自在乎所以德山之棒臨濟之喝亦有甚不得巳爾聞者􅀃繹而去至正乙未遷四明之寳陀先是寺以搆訟而廢師以訟興在乎辯難太迫一處之以寛􅄌絶弗與較且曰我佛得無諍三昧所以超出羣品我爲佛子可不遵其教耶衆服其化寳陀僧夢一神人衣冠甚偉飛空而來僧作禮問之神人曰我􅀙阿育玉山來欲請大千師赴供耳未㡬行宣政院署師住是山識者以為玄應師旣至羣疑景附逺衆響臻師亦憫大法陵夷孳孳誘掖不遺餘力甞埀三關語以驗參學其一曰山中猛虎以肉為命何故不食其子其二曰虚空無向背何縁有南北東西其三曰飲乳等四大海水積骨如毗富羅山何者是汝㝡􅀄父母此苐三關㝡為峻切惜未有契其機者居九年退於妙喜泉上築室曰夢庵因自號為夢世叟掩􅀜獨䖏凝塵滿席不顧也洪武癸丑十月朔召門弟子曰吾將西歸汝軰有在外者宜趣其還越七日属後事於住持約之􅁉公沐浴更衣索􅁓書記書已恬然化㓕在菩提位中歴七十夏示人間壽相八十五年􅀴三日用茶毗法焚之牙齒眼睛及數珠不壊餘成設利羅五色爛然約之因造四偈賛之且竭力為治䘮事云師三坐道塲有語録若干卷行世凡一燈所傳一雨所􅃳雖淺深有殊各得分願弟子某等􅀂干人得法上首某某等􅀂干人是年十二月九日塟靈骨於夢庵之後者至大也師智度冲深機神坦邁晝則凝坐夜則兼修凈業真積力乆至於三際不住􅁴􅀚湛然非言辭之可擬議且服用儉約不如恒僧雖不與時俗低昻賢士大夫知其誠實不事矯飾多傾心為外護其遇學徒亦以真率或以事忤之而聲色不變動出語質朴不尚葩藻而指意超於言外名聞燕都帝師􅀍以佛德圓明廣濟之號師畧不少動于中􅀄横川珙公入滅之年師始生及其受業又同在瑞光至於歿也又同住阿育王山君子或異之嗟夫禪定之宗至宋李而敝膠滯局促無以振㧞精明使直趍於􅁴路横川當斯時宻受天目法印持降魔杵樹眞正幢升堂入室者不翅受靈山之所付囑佛法號為中興横川之同門有石林者奮興實角立東西其幹化機西來之道扵斯為盛師盖石林之諸孫也故其死生之際光明盛大有如此者豈無自而然哉某雖不敏毎以文辭為佛事今因文妥之請故歴序師之行業勒諸琬琰而復繫之以銘用勸方來􅁇師而興起焉者世當有其人乎銘曰萬縁紛紜逐物而競􅂚以攝之實惟禪定禪定斯何言辭罔宣浮翳盡歛月輪在天􅀄分一燈千􅆋交映如百錬餘金色逾勝師之挺生銳思絶塵萬里只尺欲趍頓門片簡雖微中具全体瞥爾觸之凡情盡死􅀙抵碩師勇决其􅀻振迅奮擲􅀋獅子兒出世為人澍大􅅴雨法雷轟轟震驚百里海岸􅀌絶潮音吐吞與此大法殊流同源神人飛空持䟽來謁孰知玄微􅀂合符節彼舎利羅寳塔晝扃􅂇我發機靈光晶熒翩然西歸趺坐而㓕示不壊相火中珠結生死之􅀜鮮執其樞坦然弗惑如人歸廬前脩漸遐後武思厲不有昭之遺則淪墜太史著銘勒石山樊虚空有盡師道永存風樹亭詩有序風樹亭者嘉禾潘孝子之所建也孝子之親殁毎對人言輙嗚咽流涕然無以寓其罔極之思取韓詩外傳樹欲静而風不止之言表其墓亭嗚呼孝子之意至是為可悲矣夫人孰不欲飬其親􅎅則不子待也所以昔者臯魚立泣而死者孔子蓋傷之也憫之也以其志為可悲而無所用其力也嗚呼若孝子者念􅎅不忘乎茲其亦知沒齒慕親之道哉為之詩曰山有嘉樹油然發榮豈不欲静風撓之鳴我思我親顔貌日改子欲飬之親不子待嗚呼噫􅐵我懐孔悲山髙海深孰堪喻之内而九蔵外而四体皆親之枝同一根柢根既撥矣而枝獨存夙夜哀號莫逹九原白楊瀟􅎅泉扃夜閟我親我思得無蕉萃親不可見音容是求求之不得血淚交流作亭墓隅是曰風樹仰之瞻之心焉孔瘁右詩八章章四句書虞宗齊常熟虞宗齊字思訓世居芝溪在勝國時祖安澤任德清尹故號宦家暨入國朝以郷師統諸閭長坐法當死縣録其父德良與兄某下獄宗齊􅀻自念此渉科繇事誰當正坐之父春秋髙萬萬無就逮之理兄為冢嗣宗祀攸繫且無子吾幸有子儻得代父兄含咲入九泉矣即詣吏自白曰宗齊精力彊凡官中事身專任之不自意䧟于刑辟父若兄誠不知也吏不疑按章訊之一一引伏嶽案具斬之東市容貌不少變時洪武辛亥夏六月也宗齊之年甫二十又二云史官曰子者親体之分也形雖殊其氣則通痒痾疾痛其有不切者哉辟諸木焉本實旣撥枝葉未有不害者故宗齊之代父死非異也理之當然也嗚呼然則然矣世之臨患難固有舎父而逃者其視宗齊果為何如哉􅀂宗齊者知有親不知有身􅀙容就義絶無㡬㣲不足之色可謂特立而弗愧者矣嗚呼四海之内孰非人子哉題危雲林訓子詩後古之人教子多發為聲詩何哉蓋詩縁性情優柔諷詠而入人也㝡深韓昌􅀺之子符讀書城南甞作詩送之曲盡其意至今讀者猶蹶然興起豈曰小􅀘之哉雲林先生危公􅃁子字於􅎻自檢討奉常遷佐薊州先生時辭嶺北行省左丞獨居房山聞於􅎻􅀅之官賦四言詩一章勉之嗚呼先生之詩固無愧於昌􅀺而符能讀父書䇿名南宮今於􅎻以明經擢進士苐君子亦􅀼謂似之或言古今人不相及者其果可信歟雖然先生所作於脩已治人之道反覆備至是有􅀜名教甚大不特可施於訓子而巳其視誘之利禄而以惜居諸為念者又為何如哉知言之士必能辨之送趙彦亨之官和陽詩并序呉興趙彦君亨魏國文敏公􅀙孫也通周易至正乙已試藝江浙郷闈􅀗與薦送值元改物遂退隠林壑國朝文治大興濠梁侯公彦良以中書參知政事出守呉興力舉教授郡庠彦亨以飬親辭侯公移鎭山東已而入覲以爲彦亨之材誠不能多致復言於銓曹選爲楚府紀善乆之調同知和州事將行予酌酒謂之曰彦亨以故家文獻自藩府出佐方州有民人社稷之重蚤夜冝孳孳自厲有不待予言其欲言者自識彦亨已数月矣因纂脩囯史之冗凡四聖􅀓心之秘諸家異同之辯欲求彦亨發之卒未能得而彦亨以别告嗚呼古語有云爲政易而講學難予於彦亨又烏可已於辭乎序而詩之情在其中矣詩曰倬彼魏公文獻之家􅀴畬秋實藝􅁐春華旣質以熈復􅃩而葩遺澤所􅀍英名載加弓治有傳詩禮與聞匪資竹素盍䇿文勛如提健槊去衝中軍勇盖萬夫氣摩青雲賢書得貢淡墨新題材評龍虎星應璧奎理將奮迅事或不齊海桑變幻岩穴幽棲大明麗天萬国咸臣蒐羅智哲逮及􅀮淪上名楚邸接跡朝紳無善不紀有道必陳睠茲和陽瀕于大江帝􅃏􅀄涖天威孔􅀭旣混寰區視此沛豐叶建侯擇佐維俊及良竭子素藴攄子逺猷照嫗民隠靈承天休薄言我􅀻起與子謀十翼多奥九師焉求子今有行孰析其精别􅅂徒牽離觴重傾泱泱中流揺揺去旌瞻望弗及實勞我情清齋偈并序義中勝禪師結室於中天竺取契􅀴語名之曰清齋詞林宗工各出新意侈張而斧藻之意亦至矣全室翁同雲巢丈人以義中證脩近道必欲得予言予學日墜何􅁕以與此然而清齋者香嚴妙悟之所義中旣􅃩其名則法其道亦宜也不然何取於清哉無相居士爲􅀃偈曰中竺有虚室八牎皆洞然觸目無礙者有境皆攝入煙霞草木石鳥獸昆蟲等以至世間事何物不可狀此以何因縁獨名為清齋纎塵了不生正以清浄故昔有一童子甞居清淨室㝠寂於至道見焚沉水香由是作思惟香雖根於水非火則不發火縦能燎原熾然不可遏苟非遘香木香氣從何起因知木為自煙火乃為他自他共和合無因能行空觀兹四相義幻有即空相四大所合成其法亦復然又况木火聚烟氣未曽升鼻􅀚已先通縁我有鼻故香乃􅀙鼻入我若無鼻時墻壁瓦礫等瓦礫與墻壁未聞知有香皆由自性起不假外物故又况二物者斯須即變㓕唯存􅁅燼餘欲求是香者去來杳無跡畢竟性空故吾性本來空雖空無不攝不落有無間妙香無去來因兹悟宻圓發明無漏果得證香嚴號二十五玄聖各􅀃最􅀄事成道由圓通七大十八界各各有所入乆近雖兩異偏圓或二殊其教已開􅂋偏行即圓融悟理旣一同誰復分逺近聖性無不通順􅊇皆方便主伴實相濟後先了不别敷演真實義普度有情衆聞者當悟省勝師取契經掲名其齋居當行無上道真證圓通智􅀂外而不内如􅀛毛兔角欲見不可得居士􅀃偈巳忽見清齋東爛然大月輪躍出瀛海中光明悉照燭清澈無纎翳持為作證明表此清浄法日本硯銘夷而華四海一家此非文明之化邪送部使者張君之官山西憲府序天地正氣絪緼輪囷不折不回行乎太虚在物受之則為觧廌為屈軼在人受之則為剛烈之士剛烈之士貴􅀔莫能加威力不能變參乎氣化􅀜乎治體其重於物又不翅千百焉嗚呼正邪不兩立正氣伸則邪沴廓清矣我國家始建囯江左輙􅀙秦元之請立按察司設官分職彈劾百僚所以伸正氣也迄今埀二十年憲度益嚴遴官益精有􅀂山西憲僉張君孟兼􅀹號稱職者也孟兼性鯁亮不善為依阿人有曲必靣白之雖慚沮羞縮不暇顧然亦無它腸當良朋盍簮酒酣耳􅀬抵掌􅀏談􅅐中森然芒角必盡􅄍出乃已其氣衮衮不衰名上中朝選教胃子乆之迁南宫奉常奉常南宫掌禮儀郊祀之事無以攄其耿耿及今出持使節知孟兼者讙曰孟兼行㢤民生休戚無不得言吾見軺車夕至而封章朝上也貪賕舞法吏吾見望風畏讋觧印綬而避去也民􅁈之不伸戾氣欝結吾見渙然而氷釋也孟兼行㢤雖然鷙鳥之􅀭􅀭不如威鳯之􅗳􅗳狄猊之􅆠􅆠不如祥麟之容容刑法之堂堂不如徳化之雍雍人不務徳則巳茍有徳焉又何檢壬之不革行㢤檢壬革行正氣之復正道之行也孟兼盍於此而留意㢤吾鄕先逹自宋以來繡衣持斧赫赫見稱于時者凡六七人嗣芳猷而􅁇遐􅁤􅀼於孟兼望之孟兼行矣孟兼精於古文辭前御史中丞劉公極稱道之􅀹深名理之學其與李證應奉徃復論性書上徹九重之聽蒙召對左掖門士林以為光榮云勑賜開國輔運推誠宣力武臣榮禄大夫柱國淮安侯華君神道碑銘自古以來人臣事君始終一心以上承明徳所以保勲烈於不刋熈令譽於無窮此丹書所謂敬勝怠者吉是也其或遭時擾攘攀龍鱗而附鳳翼自赴於功名之㑹一旦封重爵享厚禄志盈氣驕唯欲之是從遂致壊法亂政盖有其􅀄而鮮克有終此丹書所謂怠勝敬者㓕是也嗚呼敬怠之間善惡之所由分禍福之所由繫臣某於淮安侯之事不能無深感焉侯諱雲龍字某姓華氏安豊人世為農家圖譜䘮不知其先世遷移之詳三代皆以侯貴累膺贈典曽大父六二府君中奉大夫北平等䖏行中書省參知政事妣王氏夫人大父凡三友諒受矢斃于舟中龍江彭蠡二役侯在行中復以功陞豹韜衛指揮使􅁇從伐荆州又同征江北郡縣而㤗州髙郵淮安次苐平轉淮安衛指揮使就留鎭之呉元年丁未大􅀅軍徐逹奉詔征中原侯復在行中齊魯旣定河南之民簞食壼􅄴以迎王師暨入燕元君棄都而逃立北平等䖏行中書省授侯鎮國上􅀅軍僉大都督府事分府北平拜資善大夫燕王府左相兼北平行省參知政事及天下大定論功行賞加開國輔運推誠宣力武臣之號官榮禄大夫勲柱國爵封淮安侯食禄一千五百石前職如故尋兼燕山衛都揮使時北平新入職方非勲舊大臣不足以厭服之上以侯為鄰郡子且恩遇之深不趐骨肉至親必能為囯宣力故特託以方面重任豈期侯昧於理動違􅀖憲㩀元丞相脫脫大第居之凢元宫龍榻鳯䄄及金玉寳噐非人臣可僣者皆用之弗疑巳而以其第髙曠菑害屡生復役戰疲之士創殘之民唯新室是圖奢麗過制特甚此猶可也先是元故都破其逹官之女多與我師為婚媾㓜主尚竄沙漠諜者因􅀝之傎我事情上明照數千里外屢勑中書移文北平凢舊仕於元者悉遣發江南毋使為民患害侯皆廢格不行及至征虜副􅀅軍李文忠北征􅀗間諜數人始知故䆠之家有官兵馬司者相率構姦偽作文榜􅁒為變托姦人以為巡邏之職􅀅焉禦冦此非侯之過歟上猶念其功不􅃘寘于法趣中書令其盡遣侯仍弗之聴上怒詔内官徃歴指其主名諭之侯始不得已奉詔侯自是益怠於政日􅀙事歌舞燕飲遂得嬴疾疾寖􅇵上召還南京以洪武七年六月二十八日卒享年四十又三娶繆氏累封淮安夫人子二人長曰忠次曰􅀜住女一人以七月十日塟京城之西石􅁅山之陽上親御翰墨製文一通遣中官致奠焉惟侯奮起戎行出遇真人乘六龍御天􅀙征四方粗著勞效􅀄無獨建竒功駿烈照耀人之耳目然而封以大郡􅃬之侯爵寵恩之加不為不重矣柰何靡恩􅀘報狥欲敗度絶無憂國恤民之心乃知徃古韓彭之流佑功自專卒至夷㓕皆其自取焉爾所頼聖天子推天覆地載之量保全功臣唯恐有毫髮不至故侯得令終于家享榮名歿世豈非幸歟故事生封侯者沒必加之以公於是勑塟以侯禮􅂓示簿罰可謂仁之至義之盡者也臣濂奉勑撰神道之碑稽諸天理之正察乎人心之公不敢用昔人誌墓常法特取春秋直筆褒貶之義勒文穹碑以為千萬世人臣之勸戒云銘曰人臣事君􅀆猶如事天寅畏是􅀅􅀆終日乾乾慎終如始􅀆􅂚敢弗䖍一或怠逸􅀆明命在前侯起戎行􅀆有力如虎逢時繹騷􅀆擇歸真主四征弗庭􅀆無役弗與斬􅀅搴旗􅀆所向披靡帝用嘉􅃬􅀆龍光日殷䟽以侯爵􅀆作鎮北藩兵民二柄􅀆付之旬宣鞠躬盡瘁􅀆冝報國恩胡酲爾心􅀆動違國憲僣侈是崇􅀆群生胥怨峻宇雕墻􅀆朝夕沉湎是非倒置􅀆大分莫辨皇仁如天􅀆覆之幬之録其勛庸􅀆崇之君恩固弘􅀆臣行或􅃜生弗為善􅀆死其忸怩春秋直茟􅀆善惡莫掩萬世取法􅀆納人于檢墓門有石􅀆可比琬琰史臣勒文􅀆以示褒貶恭䟦御製勑文下方皇帝臨御之七載益弘敷教治優老禮賢孳孳如弗及時則有􅀂翰林學士承􅈲臣同春秋七十猶以文學在侍􅀙論思之列其意以為幸逢有道之君何􅃘去之休致之請乆而不敢發上見同皓首蒼顔與白面少年旅進旅退於班行中惻然憐之八月甲辰特降致仕之命續杜期年且官其一子魯召同入賜坐􅀙容慰勞之夜漏下十刻始􅃙内官扶掖而還乙已上親製文一篇以賜同仰瞻天藻之華無任欣躍既奉表詣殿庭稱謝又以副墨勒諸眞珉昭示悠乆臣濂聞之君臣遇合自古為難非道之符契情之感孚鮮有善始而善終者今同年雖耄拳拳恋闕之心皦如出日忠欵自􅀅不替徃􅀄上憫其衰暮不欲煩之以事令優㳺田里以終天年恩數便蕃視昔有加上下之間可謂兩盡其道猗歟盛㢤昔宋孫宣公奭自翰林侍講學士乞致其事仁宗甞賜詩一首詞臣尚載之簡􅁽至今以為羙談矧我皇上睿思天成神文炳煥其功侔造化􅀴緯圖書足以昭明政體用風厲四方詩云乎哉是􅀅傳之億萬斯年永永無斁而同之名氏在奎壁光芒之中亦因是不朽誠千載之一逢也傳曰王言如􅁝其出如綸天下之士聞之有不皷舞而淬礪者乎臣職在囯史謹巳備載日暦復因同之請恭書于下方云是月癸丑翰林侍講學士知制誥同􅁱囯史兼太子賛善大夫臣金華宋濂恭䟦神仙宅碑䖏士之州並城三里􅀁有山曰少微山之下有􅀚曰􅂵虚􅀚之南一􅈐巉然挺出曰眉巖西南諸山拱挹周衛而二水蜿蜒起伏來匯其下登髙望之萬象呈露儼􅀂天開圖􅀞不知者以為真􅅫壼員嶠之絶景也宋南度後仙翁章思㢘自遂昌􅂵極夀光宫來隠􅀚中􅅫首垢面日􅀄升輙東向吐納凝然澄坐乆之絶粒唯日飲水一盂形神分合人莫測其變幻乾道丙戌冬沭浴坐蜕肌膚柔􅃳如生弟子瘞諸眉岩下後有見於濤江之濵手携一舄飄飄然遡風而行衆異其事啓棺視之唯􅃗履存焉先是主􅀚事者甞作亭墓前壊於風雨道士王有大日徘􅆦其間悵然有上清笙鶴之思歸與其師梁惟適謀自墓左開曲徑一千餘尺􅀡至巖顛誅榛剪荆造祠宇七楹間名之曰神仙宅中祠䖏士星及仙翁諸像東室曰芸香蔵書其中西室曰橘樂為娯賔奕棊之所宅之前二石岩㧞起其蟠􅀂龍其踞􅀂虎各搆亭其上左曰來鶴右曰留舄而山之景愈勝矣􅀴始於至正丙午春正月某甲子落成於其年夏六月甲寅賛其功者楊一寜王性存也惟適復􅂢􅃾田􅀂干畝􅀊􅀵其入度子弟世守之介同郡呉府録事呉從善微予為之記予聞括之名山上直少微天文家􅀁謂䖏士之星也靈輝下燭凝粹敷和脩錬者居之去滓􅁾而来清虚雖曰内功之加要亦山川淑靈􅀁助為多也今以􅂵虚言之徧㳺海内名山招白鶴而翩然化去豈無盧仲璠者乎道遇至人授以㳺戯翰墨之法卒吹鐡笛與之同徃豈無徐虗寂者乎不止仙翁一人而巳且琳宫秘舘無䖏無之何少微􅀁照而超然霞舉之士至三人焉當有不言而喻者矣仙翁靈迹固不可不表見于世自非惟適父子篤志玄學孰肯一顧於寒煙衰草之墟㢤化荒曠而為居䖏功亦大矣􅁱真之士當世􅁇之俾勿壊可也嗚呼塵坌膠􅁑予不知秋􅄠之􅀍肩安得攀仙翁之逸駕共吸沆瀣於寥陽之上耶惟適䴡水人宋户部尚書汝嘉諸孫有大青田人亦簮纓家能文辭及􅀠書皆髙士云系之以詩曰少微之星燁燁埀芒降魄名山充欝沛􅗈結為靈和其中含黄覔之無形發休吐祥孰其尸之有道之士来􅆂清寜度世不死皦出東方其大如簁我啄其精以洗吾髓錬虚凝真惚恍􅀂神冠劍既藏神㳺江濱豈伊幻化身外有身出入河嶽下上星辰靈蹤猶存木老亭仆芳草離離誰復來顧有巋者士父子同慕皓鶴不来馳情雲輅乃陟崇椒乃建瓊宫羽蓋飈輪庶或一逢靈風泠然白月正中􅈚涬無際遐思何窮况乎遥瞩境與心㑹羣峰攅藍二水縈􅅁萬象粲然如列珠具一歗間夐超物外巖巖者山匪仙不名不有玄搆􅂚棲其靈水火有鼎龍虎有􅀴疇非采真浮㳺黄庭神君捧劍􅀑伯持㦸呵衛弗祥固此仙宅法古為碑麟廽鳯翼太史勒辭式昭罔極宋學士文集卷第二十六翰􅁐續集卷之六
