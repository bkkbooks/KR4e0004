body:
  text: 平江漢頌天命皇帝為億兆生民主旌麾􅀁向悉臣悉庭􅀄以一旅之師興濠泗間遂撫淮南平江東攻浙東西下之版圖所入方數千里㝎都江左發政施仁戴白之叟垂髫之童涵泳至化皡皥熈熈如承平時于時陳友諒據有江漢之地僣居大號賊殺其主飭脩􅀩衝虐駈烝􅀺如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不觧皇赫斯怒乃召群臣于庭而告之曰陳虜不道敢屡予侮昔者蕩揺我􅁁方侵軼我姑熟偵伺我金􅁜頼尓一二隣臣之力攻而敗之予亦親覆其穴巢中宵竄赱假息武昌子不􅃘追殱之兾其悔禍以自逭扵天刑癸卯之夏乃復圍我豫章是其凶徳無厭自取殄㓕此天亡之時天之明威予不敢不順唯尔熊羆之臣不二心之士尚弼予以成厥功群臣曰都扵是右丞臣達參知政事臣遇春帳前親兵都指揮使臣國勝同知樞宻院事臣永忠同知樞宻院事臣通海備厥戎噐簡厥師徒以俟七月癸酉上躬擐甲胄禡纛龍江帥樓船數百蔽江而上陳虜大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子上分舟師為十二屯命達遇春永忠突入虜陣呼聲動天地矢鋒雨集砲聲雷鍧波濤起立飛火照耀百里之內水色盡赤焚溺死者動一二萬流屍如蟻滿望無際已丑焚偽平章舟刈戮餘二千辛卯復酣戰虜將張㝎􅁁素􅃅梟猛上親禦之將士皆死戰歴一二時遇春等左右夾撃殺士卒無筭張中矢百餘而退潜保鞋山不敢吐氣我師亦移據湖口扼彼喉衿列柵南北江岸置火筏中流水陸嚴戒以􅀱其發八月虜食盡遣舟五百艘掠粮都昌又為我大將所􅀗壬戌虜計窮冒死突出將上趨九江上命諸將一時俱合其大戰如戊子自辰逹酉督戰益急友諒中飛矢斃于舟中癸亥降其衆五萬上命釋之不戮一人凱􅁔而旋舳艫相銜旌旗飛翩不疾不徐委蛇而来萬姓驩迎俯伏道左山川草木皆有喜氣告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬来攻孫權而周瑜黄盖敗之扵赤壁符堅發長安戎卒六十餘萬􅀐二十七萬以侵􅀳而謝玄謝石敗之扵淝水然赤壁不過一焚而赱淝水亦不過軍亂而奔􅀄未甞大戰也史臣且書之以為千古羙談矧今湖口之捷血戰累日天地為之晦㝠日月為之無光山河為之震盪其神功駿烈炳耀鏗鍧與天無極較之二國未􅁕多讓而歌咏不作非甚闕典歟臣謹備著其事撰為頌詞一通以流鴻績扵無窮以俟太史氏之采録云其詞曰天眷有德實惟哲皇肆其神畧以靖冦攘義旄東指罔敢弗恭風烈虎嘯雲㳺龍􅋮長淮既歸江左攸属浙之東西樹矦置牧乃建國家以奠南服以懐中原以控西蜀蠢尔小醜敢讐大􅀖集其􅇯頑鋒蝟斧螗輕渉我疆以跳以踉亦既剪劉僵骸覆江㳺齊六軍直傾其穴釋而勿誅俾自懲刷闔胡不然復豕而咥翹其蟲臂當吾車轍皇用震怒歴告在廷是决不悛命將徃征爾選舟師爾整甲兵漕爾糗粮各罄爾誠摇光在申夷則之月禡牙江賔皇秉巨鉞以誓以戒以速其發紀律精明飊火奮激旟旐􅀭􅀭艂艭將將予戈洸洸鎧胄明明載怒載厲載飛載颺雄威所吞巳無荆湘既與虜逢大呼衝撃藥騰藜礟星流火㦸虐􅆋雷奔巨轟雷劈殺氣􅄀􅀩不辨咫尺矢鋒所貫什伍聮聮縱横交紐命隕弗顛攅桅湊颿筍束蝟編流尸塞川舟行弗前虜魄既禠扶創而逸聚于湖奥僅存喘息我方植柵江之南北火筏在流掩蔽如翼越歷四旬飛赱途窮將冒萬死以絶其衝我師見之千艣如龍似兎之赱而鷹之促酣戰六時由辰達酉僕姑一􅀤殪此酋首貫睛及顱仆若枯栁大憝旣除餘不䏻醜逓相告言我誠不振我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首来降来臣皇曰俞㢤汝俘予受宥汝弗劉予汝父母汝凍予衣汝饑予哺昔何昏迷今始撤蔀奏凱而旋􅀐吹欝揺形扵樂歌節以鐲鐃飲至于廟頒賞于朝帛堆其家肉登其庖都人聚觀舉手加額或歎或謡有聲嘖嘖干戈相尋匪一朝夕自今升平可坐而莢惟皇神武動則克之群䇿盡屈四方式之惟皇寛慈降則釋之義聲動盪疇䏻敵之惟皇明斷遇事即决洞見千里不隔一髪所以西征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以􅄑集尚􅀓䇿書况兹之功俊偉赫熹揆古無讓可無咏詩臣雖微賤文字是職對􅀭皇休并献臣臆三代以還用仁興國皇宜遵行永作民極天降甘露頌洪武二年冬十月十有三日甲戌膏露降于乾清宮後苑蒼松之上皇帝特􅃙中官折示禁林諸臣光潤如酒凝結如珠肪白飴甘彌布松柯馨烈之氣鬯逹左右勃欝淋漓薰􅉼太龢天休震動中外嘆嗟又明日丙子上御外朝左丞相宣國公臣善長帥羣臣稱賀上若曰甘露之降載在徃牒然休咎之徴當以􅀋應朕惡􅁕以致斯卿等尚明為朕言之參知政事臣稼對曰聖人之德上及太清下及太寕中及萬靈則膏露呈瑞陛下恭敬天地輯和民人故天不愛道而嘉祥徽顯也起居注臣觀對曰帝王恩及扵物順扵人而甘露降陛下誕寛民賦衆庶驩豫底于敉寜神應之臻􅕄此故也翰林侍講學士臣素對曰王者敬飬􅂄老則甘露降而松栢受之尊賢容衆則竹葦受之今露降于松則陛下飬老之所致也宜以制幣䇿吿宗廟頒扵史舘以永億萬年無疆之聞上情存損挹皆推而不居言既巳丞相帥其班以退翰林學士臣濂􅀼伏自念氐北有星名為天乳若明而潤則膏露下焉王者徳格扵上恩覃扵下靈氛充牣秘貺斯甄此天人感應之恒理也欽惟皇上興自臨濠匹馬渡江十五年間遂成帝業天瑞育滋不一而􅁕彩霞成鳯卿雲聚繡赤烏飛翔白兎俯伏瑞蓮並萼嘉禾孕文實皆天之所命非人力所致而自致者今又覩兹聖徴則其徳洞淪􅄀功成不宰三瑞沓至千休滋彰有不期然而然者矣雖然􅀓有之受命不于天于其人休符不于祥于其仁所以孔子之作春秋祥瑞不書而有年則書豈不以天道玄遠難知而人事之為可徵者乎皇上以天縦之聖留神至治以得仁賢為瑞以五風十雨為祥視彼前代植金莖以承液夸嘉瑞以紀年者未甞不指以為戒則其英明之識超絶之智卓冠百王為法萬世是宜羙盛德之形容播諸樂歌被之管絃以示聖子神孫扵無窮云其辭曰上天降康甘露之瀼扵粲其英純乾發自陽以布扵下方凝扵休祥其祥伊何靈氣孔多有甘者液載仁惟澤潜靈是錫誕啓皇之德天地相合鴻休翕集厭厭浥匕紛紛宻宻匪随日以食兆厥聖徴如卿之雲如景之星如日之重輪冲和氤氲以文我太平惟皇之聖貞符自應不卑而泳不髙而迎茀禄之攸盛惟皇之明貞符爾承不欹而傾不汰而盈茀禄之攸寕休慶之即四國之式有濯厥聲耀于千齡龍馬賛西南夷自昔出良馬而産扵羅􅀑國者􅀹良或云羅鬼疑即古之􅀑方其地有飬龍阬在兩山之中泓渟􅔿深開闔􅂕氣而蛟龍實蔵其下當春日始和物情酣鬯夷人立栁阬畔擇牝馬之貞者繫之巳而雲霧晦㝠咫尺不􅀎辨色􅀋有物蜿蜒上與馬接盖龍云逮天色開霽視馬傍之沙有龍跡者則與龍遇謹其芻菣而節宣之暨産必􅀗龍駒焉粤若洪武四年六月壬寅夏國主明昇以全蜀降獻良馬凡十而其一色正白乃得之扵阬者身長十有一尺首髙九尺􅁕之髙比首而殺其二尺有肉􅀮起項下約厚五分廣三寸餘貫膺絡腹至尾閭而止精彩明晃振鬛一鳴萬馬爲之辟易韀勒不可近近輙作人立而孔上謂天旣生此英物必有神以司之親撰祝䇿詔有司以牲牢祀于馬祖然後􅃙牧副使臣髙敬囊沙四百斤壓之人跨囊上使其㳺行􅁐中乆之性漸柔馴適八月癸已上將行夕月之禮扵清涼山壇上扵是乗之而出如躡雲而馳一塵弗驚皇情恱豫賜其名爲飛越峯復命御用監直長臣馬晋臣繪其真形蔵焉臣濂稽諸載籍漢之元鼎中有神馬出渥洼水中馬之生扵水者尚矣飬龍之􅀃雖相傳扵夷人要當可徴不誣也肆惟皇上以大徳而位大寳日之􅀁出日之􅀁没無不梯山航海献贄奉琛邇者獨角之犀来自九真食火之雞貢扵三佛齊之境其他佹形僪状藉藉紛紛且不一而􅁕而况兹水産之龍馬乎周書有云不寳遠物則遠人格所寳惟賢則邇人安皇上宵衣旰食日懷保扵小民岩穴之士蒐羅殆盡將圖治安如黃虞時其遐荒殊裔珎毓竒産未嘗有心求之所以榮光休氣洋溢中國仁聲義聞充洽八表而龍媒之異自致扵天閑十二之中揆之扵書前聖後聖盖同一執轍也其視貳師之遣黷武窮兵以索諸大宛者果為何如㢤臣濂以文字爲職業際兹盛羙不敢黙而無言謹述賛辭以貽諸後世賛曰天駟熒蛟龍升靈泓澄神馬生祥飈瑞靄晝杳􅁳天一翕聚通精靈龍胡盈鳬臆輕竹披耳鏡懸晴花雪捲毛光照夜汗溝有血霞流頳振鬛鳴萬馬驚閃流電逐飛星九霄彷彿􅀙龍行但聞瀟瀟風雨聲三川平八極寕真龍媒獻龍廷出入天門駕龍軿太霞五彩滿瑶京皇風清皇道貞皇威明茫荘堪輿内孰敢不来庭陋彼漢將軍空圍貳師城乃知天子在樹徳不必連年徒用兵代祀髙麗國山川記皇帝受天明命丕承正統薄海內外罔不臣妾徳流惠敷浹于神人粤洪武三年春正月二日癸巳上御奉天殿受群臣朝乃言曰朕以菲徳惟天惟祖宗是頼位于諸侯王兆民之上郊廟祠享之禮朕不敢不恭然而名山大川􅀎出雨雲以澤􅀍生民者朕扵報祈亦罔或弗欽邇者髙麗國奉表稱臣已封其君為王爵􅃬以金印而其境内山川未遑致􅀕非一視同仁之意儀曹其議行之扵是禮部尚書臣崔亮郎中臣趙時泰員外郎臣蘭以權主事臣黃肅相與具牢醴旛幣選志慮疑一可通神明之士充使者以行有司遂以臣徐師昊名上旣復命上出宿齋宫七日始御翰墨撰祝冊至十日庚子昩爽右丞相信國公臣徐達率文武百司序立龍墀之左右上服通天冠絳紗􅂁復臨前殿黙思乆之方持香以授臣師昊置綵輿中導以音樂出奉天門上親迂玉趾送之臣師昊受命惟謹以夏五月某日甲子至其國某日甲子為壇三成扵南門外攝行祀事其國王王顓暨諸陪臣先後駿奔以竭顯相之義當祀之晨天氣宴清海波不驚祥雲瑞飈廻旋上下宛若神靈来歆来格僉以謂天子不鄙夷逺民龍光下被人神具欣雖鳥獸魚鼈之属亦得翔泳扵至化之中其扵慶􅄑古􅀁未覩争欲勒文扵石以垂示扵無窮臣師昊聞之自古帝王以天下為一家雖海外要荒之地視如咫尺則公羊髙􅀁謂方望之事無所不通者固其宜也肆惟皇上撫有萬􅀖壹遵先王成憲其有事逺徼山川如此之嚴者豈有它㢤實為東民徼福使風雨以時年榖順成物無疵癘而巳書曰至治馨香感于神明黍稷非馨明徳惟馨神既歆厥明徳洞達無間昭報響荅當有洋洋臨乎其上者矣臣師昊不佞請書是以為記以昭宣上徳軫念遐方之氓不翅中國者當與東海相為無極云是􅀊某月日記王國祀仁祖廟樂章迎神奏淳和之曲皇圖聿崇茅社受封禮分雖異孝思則同緬懐世徳源深流鴻報本有祀式昭神功奉牲奏慶和之曲王國之東清廟翼翼奉我皇祖享祀弗忒薦以牲牷敢曰充腯神其迪甞純嘏是錫􅀄獻奏保和之曲之舞皇祖載徳既淳且仁弗耀其身委祉後人睠兹藩服與祀維寅清醴方薦歆其苾芬亞獻奏清和之曲之舞穆穆靈宫庭燎有煒貳觴載升神其樂止其樂伊何錫我繁祉磐石之宗本支百世終獻奏成和之曲之舞神􅀆下臨陟降在庭不見其形如聞其聲冷風肅然達扵兩楹禮成三終神保攸寕飲福奏咸和之曲神具醉止威儀孔肅曰爾孝孫来飲爾福介爾眉夀膺爾百禄子孫保之以引以續徹豆奏嘉和之曲禮備樂舉祀事攸冝孰其尸之廢徹不遲皇㢤神惠覃及我私靈氛將逝如何勿思送神奏徳和之曲杳􅀆忽􅀆神運無迹鸞馭上征星流飈疾其靈在天其主在室億萬斯年孝思無斁諭安南國詔春秋大義亂臣賊子在王法之所必誅不以夷夏而有間也向者安南國王陳日煃薨我國家賜以璽書而立日㷂為王今􅀚􅀁上表章乃名叔明詢諸使者日㷂為盗􅀁逼悉自剪屠其羽翼身亦就斃此皆尓叔明造計傾之而成簒奪之禍也揆扵大義必討無赦如或更弦改轍擇日㷂親賢命而立之庶㡬可贖前罪不然十萬大軍水陸俱進正名致討以昭示四夷尓其母悔􅀕古帝王􅁜墓文昔者聖帝明王豊功盛徳􅀍于生民四海咸賴渉世既逺􅁜墓所在徃徃鞠爲椔翳􅀕祀之禮遂致廢而弗講朕既統一天下主百神之祀心甚憫焉因遣使者訪問其處命有司製袞冕之服具牲牢醴齊致􅀕􅁜下而焚之然帝王之精神上與天通陟降帝􅀁必􅀎来格扵㝠㝠之中也尚享擬誥命起結文吏部尚書程􅀎而議功㝎勲而頒爵此皆選部主之所以古者寘扵五曹之右重其任也盖國家之治在扵得人得人之盛繫乎銓衡者甄别其􅀎否然則天官之選可不慎歟具官云云尓尚􅁢釐百工以熈庶績名噐之崇􅋻尔當慎其注授之方流品之清濁尓當展其激􅀭之志時惟稱職汝徃欽㢤吏部侍郎吏部之設侍郞實古小宰之職凡行選舉封爵勲庸功課之事悉得與聞盖尚書統之侍郞佐之則其任之不輕也較然矣云云爾其正名而責實簡材而授􅀎使野無遺賢萬􅀖咸寕則銓覈之任得矣朕將􅀚尓之􅀎尓其母􅈈于位可吏部郞中吏部為銓綜之司而郞曹之選所以佐理天官簡㧞賢俊者也苟不以學行材諝之士為之則何以責其勞效㢤云云尔尚審覈賢愚公扵黜陟使國家有得人之盛而天下蒙至治之澤不其韙與尓其懋㢤以稱朕意可司封郎中司封之官參掌官封褒贈之典所以崇有徳而報有功也居是選者不宜輕授云云尓尚夙夜勤勞思以大義正厥官勿以􅀻􅋢爽厥序使内而親親外而尊賢皆􅁕以沾朕之恩庶免致曠官之刺矣佇聞嘉猷以對休命可司勲郞中周官有司勲上士二人凡有功者司勲得以告之則其職之設也乆矣後世㝎十二級之勳以為賞格故爲是官者審察功狀與司封通决扵尚書非公明而練習者不􅁕以與兹選云云尓尚計其勲庸之轉遷以㝎資品之髙下庶㡬賢者勸而不肖者懲矣尚思自勉以服訓辭可考功郎中考功之職掌文武遷叙資任考課之政令而奉常所㝎謚議亦必覆而上之選部諸司其扵關政治之得失者莫此為最郞官之選必得其人云云尓尚平心以馭物使殿最惟􅁢而功用昭彰則責實之効扵是乎在尔徃欽乃職以稱朕任賢之意可中書左丞朕惟中書政本丞轄之設􅀁以尊朝廷而正紀綱佐冢宰而出治化必有經濟之才任重之噐乃稱其選求諸在位兹得其人云云尓尚思朕任属之意益推材力務展猷為經綸之間必審扵治忽㢮張之際必酌乎古今佇觀厥成豈煩多訓可中書參知政事中書出納王命之地朝謀謨扵廟堂夕風動扵海內然則參預大政者可不慎其選與云是用擢位政府佐理朝綱興禮樂以昭人文審刑賞以順天典賢才之遺佚汝思有以舉之生民之憂戚汝思有以綏之則朕可以不煩而治矣徃盡乃職以副朕􅀝任之意可中書左司郎中左司爲中書紀綱之地賛襄治化申明憲度皆其責也郎位之選必擇賢才非㢘勤而有爲開敏而知務不􅁕以稱其選也云云尓尚母忘恭恪以慎乃職惟至公可以正百司惟至勤可以集庶務尔其念㢤母忘朕命中書斷事官中書總天下之務而必設斷事之官所以脩明其法禁以防人爲非實寓刑期扵無刑之意也云云尔尚慎扵出入之際母舞扵文法而失慘舒之實母流扵苛刻而昧寛恕之方則予一人汝嘉徃服訓辭其思實效皇太子與髙麗王書王䖏海東稱藩奉貢扵朝廷者五年于兹矣皇帝嘉王来庭待遇之意甚渥聞王生辰在夏五月特出内府之幣以賜予亦上體宸􅂨復以紗若羅各十四端遺王至可領也王尚益勤庶政懐保小民永為我國東藩顧不羙歟春和王平安否宜加愛自重進元史表伏以紀一代以爲書史法相沿扵遷固考前王之成憲周家有監扵夏隂盖因巳徃之廢興堪作􅀅耒之法戒惟元氏之有國本􅃋漢以造家用兵戈以争強并部落者十世逐水草而爲食擅雄長扵一隅逮至成吉思之時大會斡難河之上始尊位號漸㝎教條既近取扵乃蠻復逺攻扵囬紇渡黃河以蹴西夏踰居庸以瞰中原太宗􅁇之而金源爲􅇕世祖承之而宋籙遂訖立經陳紀用夏變夷肆宏逺之規模成混一之基業爰及成仁之主見稱願治之君唯祖訓之式遵思孫謀之是遺自兹巳降聿號隆平豊亨豫大之言鼓倡扵天暦之世離析渙奔之禍馴致于至正之朝嬖偉蠱惑扵中權姦􅀩蔽扵外漢網秪因扵䟽闊周綱􅃍見扵􅁜遲風憲皆無不捕之猫將士盡成反噬之犬由是羣雄角逐九域􅀲分風波徒沸扵重􅈚海岳竟歸扵真主中謝欽惟皇帝陛下奉天承運濟世安民建萬世之丕圖紹百王之正統大明出而爝火息率土生輝迅雷鳴而衆響微鴻音斯播載念盛衰之故即推忠厚之仁僉言實既亡而名亦隨亡獨謂國可㓕而史不當㓕特詔遺逸之士欲求論議之公文詞勿至扵艱深事迹務令扵明白苟善惡瞭然在目庶勸懲有益扵人此皆天語之丁寜愈見聖心之廣大扵是命翰林學士臣宋濂待制臣王偉恊恭刋裁儒士臣汪克寛臣胡翰臣宋禧臣陶凱臣陳基臣趙壎臣曽魯臣趙汸臣張文海臣徐尊生臣黃箎臣􅀓恕臣王錡臣􅀓著臣謝徽臣髙啓分科修纂故上自太祖下迄寧宗靡不網羅嚴加搜采恐玩時而愒日毎􅁇咎以焚膏故扵五六月之間成此十一朝之史况徃牒舛訛之巳甚而它書參考之無憑雖竭忠勤難逃踈漏若自元統以後則其載籍無存巳遣使以旁求俟續編而上進愧其才識之有限弗稱三長兼以紀述之未周殊無寸􅀘臣某忝司鈞軸􅄑覩成書信傳信而疑傳疑僅克編摩扵􅀊月筆則筆而削則削敢言褒貶扵春秋仰塵乙夜之覧期作千秋之鑑所撰元史本紀三十八卷志五十三卷表六卷傳六十二卷目録二卷通計一百三十萬六千五百餘字謹繕寫成一百二十䇿隨表上進以聞臣某下情無任激切屏營之至臣某中謝謹言元史目録後記洪武元年秋八月上旣平㝎朔方九州攸同而金匱之書悉輸扵秘府冬十有二月乃詔儒臣發其所蔵纂修元史以成一代之典而臣濂臣禕實為之總裁明年春二月丙寅開局至秋八月癸酉書成紀凡三十有七卷志五十有三卷表六卷傳六十有三卷丞相宣國公臣善長率同列表上巳經御覽至若順帝之時史官職廢皆無實録可徴因未得爲完書上復詔儀曹遣使行天下其渉扵史事者令郡國上之又明年春二月乙丑開局至秋七月丁亥書成又復上進以卷計者紀十表二傳三十又六凡前書有所未備頗􅀘完之其時與編摩者則臣趙壎臣朱右臣貝瓊臣朱世廉臣王㢘臣王彛臣張孟兼臣髙遜志臣李懋臣張宣臣李汶臣張簡臣杜寅臣俞寅臣􅎋弼而總其事者仍臣濂與臣禕焉合前後二書復釐分而附麗之共成二百一十卷舊所纂錄之士其名見扵表中者或仕或􅀮皆散之四方獨壎而有斯疾乎越一日又問曰病勢稍損否黼對如􅀄越二日又問黼復對如􅀄上惻然曰尓徃傳命俾歸飬金華山中父子祖孫驩然同聚疾必易愈愈且速造朝國家文翰庶有頼㢤二十四日黼至導宣上㫖臣力疾起拜命越翼日陛辭上􅃙黃門內使出大府金藉以束帛賜之自後候問之使相属于道時方嚴肩輿之禁自相國以下至百執事皆弗之許特命中書造安車給徤丁六人以載此􅀹異數也二十八日皇太子以舊學之故復遣內臣存問賚以繒幣白金之属恩意有加焉三十日上道夏四月十七日方抵金華故居十八日具謝表一通進上并致書太子以寓箴規之意上覽之再三喜甚謂太子曰此書汝當日誦一過復親御翰墨賜書褒荅其文則上所自製宇乃侍臣代書其外封九字內年月六字及花書則上之親筆也復出官局文綺白繒各一命太子署名緘封遣使者卽臣家以賜焉時六月七日也惟上深仁如天厚澤如地凡囿扵兩間者莫不同浴神化鼓舞至徳以臣之微亦􅀗霑􅀍寵榮如此之至􅀼伏自念臣本一介書生應聘而起即典儒臺未㡬召入禁中授太子經由是峻登記言之職賜服金紫先後所承恩數不一而􅁕今以微疴之故又勤宸念眷注優異錫予便蕃此固上天雨露之滋一草一木無不使遂其生成之性而臣區區犬馬之誠所以思報效之者何日而敢忘㢤天保之詩曰天保㝎尓亦孔之固俾尓單厚何福不除臣敢誦此詩以荅上賜復追䟽遭逢之盛扵賜書後示諸子孫俾世世母忘上恩云同知臨洮府事班景道除陜西行省參知政事誥陜西在古爲雍州之域三秦之地延袤一千餘里土廣物􅎋號稱難治朕嘗建行中書設參知政事以綜覈衆務以鎮安萬民然必得同寅恊恭之臣共釐治之則事集而功成不難矣具官班某􅀒倜儻之才抱經濟之畧朕甞歷試其爲人設施次第綽有可觀故自臨洮别駕特授以參預之職夫别駕四品之秩也較之參預之資實超十階豈不以尓韞此竒才故不次而用之乎尔尚夙夜惟勤思稱朕懐官政之有弊者尔當振而新之民瘼之未瘳者尔當撫而摩之則予一人汝嘉尔其欽承朕言不再遥授李思齊江西行省左丞誥朕起布衣除􅁀亂救民扵水火之中其有􅀎知天命所在帥衆来歸者朕毎嘉焉尔李某當元運之衰􅁬自汝南擁兵而守秦隴積年屯戌志在保民及我師入關乃西往臨洮巳而率其士馬之衆納欵轅門去危而就安轉禍而為福視彼暗扵事㡬殘民以逞者相去逺甚可謂通時達變之豪傑矣兹授左轄扵外省列之朝班仍給其禄尓尚夙夜恪慎思保令名以稱朕優禮之意尓其懋㢤給事中安統除兵部尚書誥兵部司馬之職尚書法從之官古不輕授今難其人盖戎務之出入馬政之弛張莫不繋焉非有􅁬厲之才練達之知不􅁕以奉􅀭威武毘賛機宻者矣具官安某粤自蚤􅀊有志事功自北而南在朕左右及其給事内廷論思獻納之益亦時有焉夏官之選惟尔之􅀎然以八座之貴朕非輕以􅂌人者也尔尚一乃心力以報朕所以見知之意嗚呼惟秉義守正則可以謹科條惟趍事赴功則可以行􅀖政尚思自勉服我訓辭侍御史王居仁除山西行省參知政事誥國家之建行中書所以控制方面而布宣政令者也况河東山西之地古爲雄藩所轄州郡不翅六十有餘版籍之廣民庶之䌓其事亦云夥矣迩者鑄印開省未設丞弼先命近臣爲參知政事奏辟官属以行則是大小之務皆得專達非止參預而巳也與斯選者非得勛舊之臣曷􅁕以重其任㢤具官王某才􅁕以匡時謀􅁕以經逺自渡江以来委身事朕凡十五年踐􅀭中外多著勞烈執法中臺聲聞益著扵是簡在朕心俾躋政府嗚呼陳紀立經尓尚膺藩宣之􅀉安􅁁靖國尓其盡撫綏之方徃惟汝諧毋替朕命恭題御筆後洪武元年夏四月上􅄑北京五月四日道經下邳駐蹕于東門外設壇具牢醴祭扵山川百神􅀕畢遂升御舟召守土臣四明李侯相親出御筆一道且諭之曰山東故官聴其􅀙宜居處以俟選用相既稽首拜受因復奏曰其有願往南京及旋故鄕者何以遇之上曰卿稽其人數去南京者日予米二升還故鄕者皆給一斛相退奉詔行之嗚呼非聖德如天一視而同仁者其奚暇念及扵此㢤越三月燕都遂平懷柔綏徠之效盖有不疾而速不行而至者矣相既侈兹竒遇裝潢成軸持以示濂濂方待罪國史謹巳備録蔵諸金匱復爲記其事扵左方云宋學士文集卷第一鑾坡集卷第一
