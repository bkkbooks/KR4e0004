body:
  text: 傅守剛墓碣自焚屍沉骨之俗成雖纓弁之家亦靡然從之魚爛河决不可救藥君子每為之太息有若傅守剛之事其可不表之以厲人人乎守剛之父殁其諸兄具棺歛巳舁出中野縦火而􅅡之守剛勢不能止哭踊􅀅絕􅅡巳編荆成筐實以􅁚泉拾遺骸以歸守剛欲夜半恃去㑹守者嚴不果明日諸兄捧筐至大澤而投清冷之淵守剛尤痛憤之深俟諸兄還舎解衣入淵中且泣且拾堆寘沙上脫所服緼􅂁褁之奔告子先子尚書府君府君命㽞間房中設几筵使其父之友買明善徵木造小櫝蔵之適堪輿家趙翁自城南来憫守剛之志為擇地一􅀁守剛傭書而買之􅀒􅁟成墳手藝松栢於四周其兄怒以其辱先也欲發而出之予仲父文友君􅀅挈守剛訴縣乃懼而止至今松栢盖欎然成林云守剛諱致柔守剛其字余之所命也傅氏金華好善里人曾大父某大父某父肖說皆農家守剛年十二始入小學時牧牛山澤間輙挾書誦不輟洎長登貞文先生吴公立夫之門當是時来受業者多貴人家子車馬焜煌冠服鮮麗燁然如神人守剛麻衣菲屦厠其間怡然無難色日受公教學識益凝定出言必思力踐盖粹然儒者也間出為詩若文亦光潤可觀父病守剛徃致醫溪漲不可渡守剛立水濵終日望天而泣或憐之以大綆貫腰挾之以渡醫見其情辤悃欵惻然與之還脉巳曰此天相孝子也稍緩一夕疾不可為巳藥之瘳守剛諸兄不知書競割户自私先業恣其取不與較守剛貧無所於歸出為閭挨童子師乆漸能自存遂娶天台王教授某之女為配年過四十生男鵬鵬絕愛之頃刻不見鵬鵬意輙不懌時撫鵬鵬頂曰吾之命其繫於此乎吾即死不為餒􅄦矣余家潜谿抵守剛􅀁居不三里每遇正月一日必来謁数年之間風雪不易也家人每具饌以俟且曰傅守剛其􅀅來乎言未既守剛坐􅆹事作謦欬聲矣為之失咲守剛忽謂余曰致柔老且死鵬鵬眉姢好似能讀父書果如是目􅉂九泉下矣予自後移家浦陽青蘿山出仕于朝入翰林為學士乆不知守剛死生洪武十二年冬余還金華省先墓忽有白面少年拜于庭問其姓名曰我鵬鵬也曰爾何為服衰麻乎曰先人不幸以今年春二月朔死矣問壽幾何曰六十又七矣曰塟乎未也曰死後一月權厝家西東阜之原曰爾今同䖏者何人曰先母卒二十年女弟鸞亦歸童某今獨侍􅁇母童氏以居且曰汝頗知學乎乃䄂出詩文一鉅軸及用經史事􅆳李瀚蒙求三帙以進予讀之見其遣辭豊縟而考事綜愽嘆曰守剛有子矣余既歸蘿山鵬鵬持其父門人童徽所為状来請曰先人制行一出於誠慤聞人善不翅􅀂巳出見人為惡輙攅眉而避并日一炊啜白水以代􅃵若享太牢鄉人咸以為賢部使者潘公黼聞而薦之先人以疾辭卒落魄不偶以死臨死執鵬鵬手泣曰吾生無功於時死當擇不食之地埋我宋先生最相知得一銘勒諸􅃁上不翅足矣言乞而終唯先生怜而遺之嗟夫若守剛者安可不表之以厲人人乎為之銘曰守也篤特立乎獨不受變於俗是謂踵君子之躅金剛經靈異賛杭州周縉頗知書聚二三童子講習市中日誦金剛經甚謹童子閔生觸翻佛前燈油染扵經杭之民俗凢經像弊汙輙投濤江縉因束以紅縚倣其俗行之時元之大德庚子也越三年癸邜經䀜還於舊􅀁半為潮沙所褁而紅縚如故縉驚喜與吴門僧險拂去沙塵其粘綴者逐畨分析之徧請叢林開士題識左方後八十一年當國朝洪武庚申經入沙門宥悌之手復重加裝裭即南屏山中請濂說賛賛曰至誠動物靡間毛髪此感彼應如磁引箴况乎契經世雄所說至心受持昭荅如響昔周氏子朝夕嚴事經有染汙投諸江潮閱三春秋曶返元所經實帋成難同鐡石非金剛力焉能不壞經無羽足不能飛行非金剛力誰挾而至由此而觀佛語􅀁在百神訶衛無能捐者然而此經􅒀翰所假雖載佛言靈從何起世之法蔵所模經文充棟汗牛未聞皆驗􅀿知萬法實本一心由心誠故而經應之心靈經靈理無疑者是知此心其大無外其小無内神通妙用一一具足不假外求有能精進入在上乗證妙􅁴位亦無㽞難今因賛經推而達之欲作佛者此心即是善思念之慎母退轉髙峯妙禅師象賛目光凝定爍破大千戒躰圓明直探性原青山萬仞不出死關名高天下法㽞世間魚藍觀音靈照女二賛惟觀世音誓救群迷現不實相變㓕斯湏破凡夫執返乎物􅀄一真所攝萬境自如惟靈昭女入不思議以般若種得方便智聚首而談無非實際至今靈光照乎天地題恩断江端元􅅱手跡後予􅏊從桞文肅公逰輙聞以仁恩禅師經賈似道墓詩有權握三朝位三事祇􅀿知巳是僧彬之句最得詩人優逰不迫之意盖似道歴三朝􅈗輔傲然以周公自期一旦敗亡在朝公卿弗恤之在野士君子弗恤之海内􅃖􅃖之民亦不䘏之其䘏之者唯承天主僧彬木禅火焚遺骸授其仲子歸塟㑹稽之附子崗耳似道誤國之罪可謂上通於天使其地下聞此詩􅀅有餘愧矣此實十四字史評有關扵名教甚大今因濟蔵主以禅師手跡與元􅅱端公山居謡聮為一卷詣余求題故為䟽詩之義若此山居謡寄興髙逺綽有寒山子之風學道之人􅁼能傳誦之兹不復深論云故嘉興知府吕府君墓碑元至正之季民反䖏州為盗轉掠而東䧟永康婺諸縣繹騒弗寜永康太平里大族吕君文燧􅄆家資数千萬與弟文燁合謀募里壮強子弟得三千人􅀅之與盗屡􅀾盗敗走復其邑斬獲甚衆吕氏之聲聞東南朝􅋝三授以官皆辭不受用事者聽䜛殺其弟卒不敢怒而為之盡力大臣義之承制表其閭而復其家婺之巨室細民􅄑不遇盗者悉歸功吕氏是時永康有吕氏􅀮􅀂巨鎮焉今上皇帝既克婺君族人藉兵甲以君名詣轅門降上大喜特立永康翼以君為左副元帥兼知縣事時君以事㽞杭未返命其弟文烜攝之君還復召為庸田司經歴改中書省管勾江西行省都事權知廬州府至官三月浙西平更授嘉興知府累階某大夫松江民作亂襲嘉興君覘知之走使者告李曹公文忠賊始㩀城曹公兵即至遂就擒諸􅀅欲屠城君争曰㩀城者賊也城中民何罪􅇚不屠民徳之滿三載入朝奉詔持節諭闍婆國洪武三年十一月次興化有疾十六日卒于驛舎四年十二月某日歸塟東陽縣興賢西丘之原年五十四君有德於鄉郷人聞其卒皆哭泣相吊䘮歸耄倪迎拜於道数十里不絶卒之明年嘉興佐貳以下坐塩法死者数千人有司以君嘗署名公櫝例藉其家上特詔歸之曰吾知吕文燧誠信人必不圖姦利且殁於使事可念也時吕氏家逮繫縣獄鄉人哀之如親戚及詔歸其家乃皆舉手相賀君予由是知君之徳及人者深也君字用明文燧其名也其先有諱玫者自河南来遷玖玄孫浩上書宋孝宗朝脱父兄于詔獄孝宗崩行䘮三年浩弟源以行義旌門皆有惠於閭里源玄孫鑰仕元為永康尹君曾大父也太父汲父機母某氏􅀄君之大父嘗脩上世所立義田以食族人置學以教子姪至君踵其志卒成之君爲人如懦夫至其奮發於義不顧利害必逹乃止盖其所從来逺矣君娶戚氏三子曰堂塽垍垍後季父文烱六女其三人適同邑胡海金華戚誠道東陽俞文璉餘未行孫男二人堂既􅌾君乃謀於弟曰先子之友固多其同朝仕而知先子者唯太史宋公太史嘗銘天下賢公卿大夫其言可傳信苟以墓上銘爲請必不忍辭乃以君族弟熒状来請君之政盖多可􅁛余不能知然其最大者活永康嘉興之民書其大使人可推知其餘也銘曰天之所争智名勇功或易於始而艱其終吕君之興秉義孔偉散金聚兵以獮狐䑕既克有成不居其名錫命者三辭而弗承匪徒辭之以俟神聖黄􅃏臨城觧甲請命左綰􅀅符右珮縣章季也攝之於君有􅊍起司庸田亦佐方嶽章服有儀蔚爲􅀖伯自廬而吴千里是綏相其良姦以撫以誅憸氓跳踉弄兵䧟郡隂檄王師禽斬以徇􅀅怒謂君亂民可屠君争不從萬家􅀗甦不躋于崇而淪於遐吏操深文幾隕厥家家之􅂯完由天子明天子不遺由君之誠君徳甚多鄉人是思載徳登碑于以悼之吴徳基傳吴徳基者名履婺之蘭溪人也其父景奎故為儒鄉人師尊之酷好為詩㳺山澤間方苦吟而雨至雨濡其衣弗知也德基少受學聞人先生夢􅁻學春秋俊邁有竒材長通諸史為文辭􅂅學司馬遷班固最好書􅀹工行草得之者蔵弆為榮元季教授鄉里名動一時國朝取婺李曹公文忠為浙東省左承聘徳基為郡儒學正李公数與語知其才辟為椽􅁛疾而辭有司舉于朝為南康丞南康俗悍其民以為丞儒者也易之德基自如数月皆周知其情偽有所發擿一縣驚伏德基乃更以寛化之視民如子民有訴召使前與語弗加咄叱民或援丞􅅂相爾汝弗責也有徴調召其大姓坐之廡下好言誘之􅃪人人自說便否由是民愛丞如父而吏卒不能為姦民王瓊輝仇里豪羅玉成執其家人挾法笞辱之玉成兄子玉汝怒集少年千餘人圍王氏家刼奪家人歸且縛瓊輝連道箠之至家觧衣箠殆死乃􅇚去瓊輝兄弟五人庭訴齚指出血誓與羅氏俱死徳基念成獄當連千餘人􅀔不便乃召瓊輝語之曰獨羅氏圍爾家邪對曰千餘人曰千餘人皆辱爾邪曰数人爾曰汝憾数人而累千餘人可乎且衆怒不可犯倘不顧死盡殺爾家而就逮雖有司有法汝悔何及邪瓊輝良乆曰吾恨羅氏欲快吾憤爾惟明公所命德基乃捕操箠者四人於瓊輝前杖数十血流至踵命羅氏對瓊輝引罪拜之事遂止兩家皆叩頭曰公弭我事德甚弘咸願有所所献德基却去縣令周以中􅀄至召民轉輸至郡不得躬至鄉召之一民逸去命卒笞之不肯伏走入山罵令曰官當在縣何以至此為令怒吏卒因以語動令欲誣一鄉民圗賄利􅀗六七人下獄扄鐍甚嚴卒方徃捕未返鄉民大駴德基計民無罪自出巡獄叱卒􅇚之卒以它辭觧德基槌碎獄門遣之曰若無罪還告父兄無恐乃徃告令令怒曰民無道衆辱我君乃􅇚之何輕我至是耶德基曰犯使君者一匹夫爾其鄉人何罪且法乃天子法豈使君觧怒具乎令意慙乃巳其俗好􅁋祀有蛇岀户限民恠之以為神至奔走祠之德基罪神巫十人􅄬其主江中為丞六年去知長沙之安化去三月他吏用法急南康民作亂命師討平之死者過半南康民泣曰我吴君在寜有此禍乎安化鄰古三苗其􅁟豪多紏民為兵既盡降萬夫長易俊原獨恃驍勇與麾下数十人遁入山谷保險自固郡邑患苦之江隂侯吴良承詔求餘冦巳移檄旁縣兵且集召徳基計事徳基曰易氏未有反状奈何激之使生變乎不若先以計致之果反用兵未晩也否則出兵無名民先受其害矣願君侯熟慮之侯曰令之言然吾為令徐之徳基乃屏吏卒歩至山谷中抵俊原家家空一老人出對客徳基謂曰易俊原出見江隂侯則無事矣今不出大兵且至一縣民皆為虀粉然殺一縣父兄子弟者易俊原非縣令也老人曰俊原必出惟明府哀憐之徳基謬曰俊原或未肯来得其子及麾下三四人先徃可免矣明日其子及麾下至如徳基言兵止不發既而盡致其麾下惟俊原一人度其􅀔􅀌乃招之曰君侯􅂅與俊原相見俊原喜詣軍門請見遂縛送京師事平民按堵無擾江隂侯檄取故兵之為農者民咸自疑驚奔相告􅀔甚危德基屬􅂄老諭民曰侯所取者兵民無與也籍其􅂅為兵者数人而止長沙郡令造戎衣徳基力争曰吾邑民貧而俗暴恩之且恐其叛去安可責以事功如他縣乎令格不奉命其罪小奉命而致亂其禍大决不敢辭小罪而蹈大禍也郡從之凡有徴徭皆不使之與越三􅀊入朝擢知莱之濰州事民畜官驢四十匹莱守核其孳息状與籍不合曰驢當􅀊産駒今幾􅀊冝得㡬駒乃何少也欲責欺罔罪而徵其償諸縣皆巳勒民買驢德基獨戒民勿償守怒問德基濰不償驢何辭也德基曰民實不欺妄烏可責其償國家富極海内為吏者冝宣布德澤為民除疾苦寜少数匹驢耶守語塞德基因畫不便者数事守不敢復言并諸縣巳償者皆罷之山東民􅂅以羊牛代秋稅者官從其言德基與民計羊牛後有死瘠患不如納粟便獨收民粟他縣牛羊送陜西民驅走二千里皆破家郡以濰獨完令􅃥千人部送鄰縣牛德基列其不可曰有牛家送牛雖勞不敢怨使人代之脫道中牛死誰當代償耶力争不奉命德基為吏不求威名以愛民為先􅀹重獄事凡有訟召受訟者面直之􅇚其怒乃巳不忍置民於獄獄屬空當有追需於民不務速辨稍緩其期約故物價不湧民視他所費恒减十二三所至民樂其簡易而感之以為愛巳居濰二年㑹改濰為縣召還濰民􅃒門抱其足泣拜曰自得吾父濰民膚無笞瘢今舎我去􅂅得隻履事之以慰我思其得民心如此德基至京師遂謝事歸􅀅行辤其友翰林學士宋濂濂為德基交甚狎時亦致仕􅀅歸呼徳基謂曰若􅂅受長者教乎德基曰唯何以命之濂曰天子官汝五品秩乞骸骨歸恩甚大汝知保之之道乎德基謝曰􅂅卒教之濂曰慎毋出户絶世吏勿與交吾之教子無以加于此矣德基至家如濂戒君子多其能受善言云太史公曰世俗恒謂儒者少功顧非儒者爾湯之興以伊尹周之興以周公此獨非儒者耶何其功之大也彼世之儒者其號則同其誦說則同其所操守者異於伊尹周公者多矣豈特少功㦲謂之不足用可也然其間有足用者不可誣也俗吏以嚴急督責為足用謂儒者為懦緩憤事而不知得民者非儒不能也以予觀於吴德基恂恂不大聲色而衆庻安其政既去而思之視世吏之督責者果孰多耶德基之政固世俗之所咲者而其心誠爱民有足取焉古􅀁􅁛平易近民豈弟君子非德基之謂耶所謂難與俗人言其此􅁼耶新注楞伽經後序皇帝既御寳暦丕弘儒典參用佛乗以化成天下且以般君心經及金剛楞伽二經發明心學寔為迷途之日月苦海之舟航乃洪武十年冬十月詔天界禅師臣宗泐演福法師臣如玘重加箋􅇚明年春三月心經金剛經新注成巳徹睿覽秋七月楞伽注又成上御西華楼宗泐如玘同侍從之臣投進上覽巳悅曰此經之注誠為精確可流布海内使學者講習焉宗泐即奉詔鍥􅎚於京師天界禅林如玘還杭之演福私念與宗泐同􅀍上㫖豈冝以天界為拘乃刻二經於演福獨楞伽卷帙浩繁未遂厥志蚤夜以為憂浄慈禅師臣夷簡乃為撰䟽勸諸同􅂁暨樂善者助成之起手於又明年夏五月至冬十一月訖功費錢三千緡云為楞伽一經具蔵通别圓四教大㫖所以斥小乘之偏破邪見之感無非欲顯圎宗自覺正智而巳苐其文辭古奥讀者殊未易暁東都沙門寳巨嘗為之訓詁援㩀雖若該愽而於經意多邈然不相入胥䑓雷庵受公徒龍寳臣之緒論自不能伸一喙二者咸無取焉唯柏庭法師善月依天台教㫖著為通義夐然絶出常倫苟以經文顯白者正之亦未免有遺憾他尚何望㦲如玘以辨愽無礙之智㳺戯毗盧蔵海台衝之書無不融攝故其論著雖有徵於柏庭反覆叅驗務不失如来説經本意宗泐又能裁度㫖趣約繁辭而歸精當遂使数百載疑文奥義焕然明暢誠亦可謂靈承皇上嘉惠蒸民之意弘昭大覺立教度人之方者矣嗚呼佛之大法惟帝王能興之宗師能傳之今一旦遭逢如此之盛讀是經者小則當思逺惡而遷善大則當思明心而見性庻不􅀒聖天子之大德㦲是年冬十二月四日前某官某􅄪拜謹題題王魯公授少保致仕誥右宋王魯公特受少保致仕誥一通係紹熈元年五月一十二日所降者盖孝宗淳熈八年􅉝丑八月魯公由樞宻使拜相十五年戊申五月以觀文殿大學士出判衢州㝷即奉祠十六年已酉二月光宗受禅八月魯公以母䘮致疾而薨是年仍􅁛淳熈十六年至十二月始詔改明年為紹熈元年是為庚戌之􅀊誥之出給合於魯公未薨之前乃在既薨十閲月後何耶宋自宣和以前未有既死而乞致仕者南渡之後禮文凋䘮雖􅈗相輔臣考終於位其家已廢哀即服降㫖給賻方上謝事之章而朝􅋝復為之告􅋝出命如其未死時此最有乖政理其後吏部郎甞以為言終不能行而止此誥未免循習當時故事而未之或改也者不然誥中所謂尚克全於徳􅂂及益髙冲致永介夀祺之語皆生前事何故追而書之其為後来􅀘授制􅃙當無疑也惟魯公忠君孝親大節偉然故其相孝宗獨至八年之乆同時秉鈞軸者唯梁文靖公前後七年可以配之餘人皆所不及謂非得君之深者可乎盖必有其道矣魯公五世孫葯雅飭君子也持卷索題甚切㑹病痁新起精神昏昧謾掛漏而書之洪武十三年八月巳未朔前翰林學士同郡後學宋某謹識胡仲子文集序数十萬言在諸生中巳驚動其鄉􅀖老儒咸畏而敬之及其既長而壮竒邁卓越務師古人出言簡奥不煩而動中䋲墨如夏圭啇敦望而知其非今世物也同郡大儒􅀂吴貞文公立夫先生甞師事之吴公亟􅁛歎其才不置黄文獻公晋卿以文學名天下見先生輙延􅃱共語所以期待者甚隆而先生亦不為之屈也諸公既亡先生之學益成行益脩徳愈邵而文愈雄大江之南􅁛賢者必曰先生而先生不自以為至也今天子有國之􅀄大臣交薦先生才行上憫其老不欲重煩以政命為衢州教授㑹脩元史復薦入史舘史成賜金帛遣歸或謂先生未展其所學而先生澹如也先生甞慕邵子程子之為人所飬甚深極乎愽而守則約務乎大而不遺乎細於人鮮所推譲而所許者衆必以為賢於言不輕發而所言者人必以為當其所著衡運井牧皇􅀄諸文有習之之辭而所得者非習之所及也先生年未老而文巳傳於時􅀗讀之者莫不知其為可貴然其可貴者豈特文乎㦲是則先生之自得者世之人未必能知雖濂亦不能盡其詳也濂與先生同師於吴公相友五十餘年􅄠秃齒豁矣見世之士多矣心之所仰而服者惟在先生則先生之文豈獨今之所難遇乎學子劉剛撰次成集而王君士覺為圖其傳来請序之濂不譲而書其首篇所以歎先生之善學古人而􅄑天下之見其文也先生名翰字仲申金華人仲子其别號云洪武十三年秋八月癸酉前翰林學士云云同郡宋某謹序宋學士文集卷第六十二芝園續集卷第二
