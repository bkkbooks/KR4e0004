  text: 宋學士文集卷第四十九芝園集卷第九
  hash: sha256:5892a96680a614e550a3904a44a0fa531bab0cfe7f68724e0a87101b80768dea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_049-1a}
body:
  text: 故詩人徐方舟墓銘庚子之夏皇帝遣使者奉書幣起濂扵金華山中時則有若青田劉君基麗水葉君琛龍泉章君溢同赴召遂出雙溪買舟沂桐江而西忽有羙丈夫戴黃冠服白鹿皮䘮腰綰青絲繩立扵江濵揖劉君而􅀏且以語侵之劉君亟延入舟中葉章二君兢来讙謔各耴冠服服之竟欲載上黟川丈夫覺之乃止濂疑之問扵劉君曰此何人斯諸公乃愛之深耶劉君曰此睦之桐廬徐舫方舟也濂故聞方舟名亦起而皷噪爲驩共酌酒而别聲迹不相聞者乆矣自時厥後葉君出守南昌殁于王事後五年章君爲御史中丞以卒又後十年劉君亦官至御史中丞受封伯爵投老于家復以一疾不起又二年濂亦乞骸骨還山白髪垂領頽然成老翁矣今年冬来朝京師忽方舟之子膺持中書舎人史靖可之状來謁隧道之銘則知方舟之死已歴一十二年嗟夫人生如􅀉石火電光真不堪把玩如此良可悲㢤濂因語膺以舊事爲之悽惻者乆之乃序述其事曰方舟故簮纓家自㓜有俠氣好馳馬試劍兼善攻毬踘之戯視拘拘法度士如無物稍長幡然悔曰此豈君子道㦲即從師受章句爲進士業操觚爲文輒爛然成章巳而又悔曰是如蠧書蟬出入于故􅁓中何有終期㢤人生貴適意􅂚習古歌詩以吟咏性情庻㡬少遂其願耳先是睦多詩人唐有皇甫湜方干徐疑李頻施肩吾宋有髙師魯滕元秀世􅃅爲睦州詩派方舟悉取而諷咏之鈢肝劌賢期超邁之乃巳積之旣乆圓熟璀璨明珠走盤而玉色交映也方舟猶以爲未足出逰江漢淮浙間與明士相摩切而詩道益昌江浙行省參知政事蘇君天爵聞其賢力尉薦之方舟曰吾詩人爾其可縻以章􅌧耶竟避築室江皐曰苦吟於雲烟出殁間翛然若與世隔因自􅃅曰滄江散人天大雪獨泛舟釣江中終日戀戀若不忍舎去見者疑其非世間人元季兵亂益韜閉不出易爲􅀮者服人莫知其蹤跡所在有瑶林滄江二集各若干卷唐詩通考若干卷蔵扵家云方舟平居喜怒不形于色無急歩無疾呼罔測涯際性尚風義宛陵羅氏率五百􅃌来避兵方舟衣且食之病者注藥死無所歸則擇地蔵之乆而弗􅈈事平具巨舟載其還家至正丙午正月九日方舟以疾卒夀六十八其年某月日塟于某縣霞川之原君子稽其自號題曰詩人滄江徐方舟墓表其志也方舟髙祖某宋四川制置使曽祖某某路提舉常平公事祖某始自淳安遷桐廬今爲桐廬人父子竒元中順大夫平江路緫管府治中致仕妣皇甫氏妻張氏有婦道前二十九年卒子三人長曰行蚤世次曰􅂦次即膺以文學受薦授淮安桃源丞女二人適某某孫男九人曰某曰某云云孫女二人未行濂謂君子出䖏固立志之不同然亦有命焉當劉君之出也衘方舟以􅀮自髙数欲挩起之會有故而止方舟􅀗終老扵山林亦起偶然之故㢤予思方舟其人而不可得俯念疇昔衋然傷情乃歴序其故而銘之曰有才不施一發乎詩日星月露草木走飛人事變遷可􅕎可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化䰟無不之非湧醴泉定生靈芝昭徳之符千載弗戯洪武丁巳冬十一月具官宋濂造故叚母夫人劉氏石表辭濂朝京師有儒其衣冠者介翰林典籍羅奎上謁容止儼雅言辭有倫粲然經緯交錯無龎雜乖牾意心竊竒之叩其姓則廬陵叚氏其名則徳輔也扵是延之上座以傾其所􅁒言徳輔避席而請曰徳輔先子之殁也歐陽文公實銘其墓先夫人􅁇䘮巳十九年而懸繂之碑未有刻文惟執事者期焉予旣竒徳輔意其母有賢行使然及覽周靖所述状果與見符廼為之序曰夫人劉氏諱妙福字某其先居臨江祖大􅅩始遷長沙父仕隆存心澤物施槥櫝以千計母吴氏夫人㓜敏彗剪製紉結之事不學而能終日不出閨門即出足跡有恒度可坐而數也執父䘮哀戚甚不御酒肉至于服終州里慕其人争致行媒欲聘以為婦父皆辭去叚氏初家廬陵龍溪與臨江鄰郡迨子開者亦徙長沙聞其子士龍又賢乃歸之夫人奉尊章䖏先後咸中禮節媪御率其化無有􅍊戾之行内外斬斬九族同辭譽之曰懿㢤若婦叚氏其彌昌乎尊章亦安之家政小大悉屬之夫人絲髪不以縈懐夫樂與才士大夫㳺夫人喜見顔色戒媵侍具酒􅄴脯醢以燕饗之唯恐其亟去父家諸子析㸑分以上田夫人謝不受及其衰也百物多取給無厭辭毋䘮塟薶祭祠諸費皆自夫人出夫既先卒夫人恐或廢斁以為前人羞益加整比而家遂大穰夫人生徳輔其弟徳文則李氏所産夫人撫育如一體人見綵衣翩翩雙舞夫人之側盎然入春風中不識其爲異母也二子長亦克自負荷撫世酬物本扵一誠子弟無公庭之跡諸事不欲上煩夫人夫人至是春秋亦髙􅀊時坐中堂子若孫鴈行立堂下前後進觴爲壽驩如也至正壬辰兵大變夫人同徳輔避還廬陵徳文留長沙守先世兆域越六年而亂愈熾夫人復徃南昌以徳文在長沙也日夕出涕遙望曰吾兒徳文何時而来歸乎徳文亦泣禱上下神祗謺不見母不肉食戊戌春二月徳文忽從間道而至母子相見喜極翻成悲慘八月移吉水潼江庚子六月移梅林渡夫人病暑而卒其月之某日也年七十一辛丑正月十八日祔塟龍溪之先塋夫人二子即徳輔徳文奉夫人盡孝屡扵刀㦸叢中傾貲以救母群㓂義之嘆息而去人稱爲二孝子女一人胡氏出也適聶孟宣廣東宣慰副使以道之子也孫男六人毅礪徵鳯溥盛孫女一人適某曾孫男一人辛祐曾孫女五人皆在室予聞婦人無非無儀故其賢行不出扵閨門必得令子而後著如夫人者是巳予年耆而神昏言且不能成章凡有求文者􅂺俯首控辭今扵徳輔獨不然者以有􅀜􅃔倫之重也銘曰夫人之行貞且則左蹈矩彠右繩尺何以致斯在慎敕秉心如絃絶偏蝕内外肅穆儼若一陽明煦嫗銷隂慝九族􅀚感亦歸徳仁賢上聞天為惻豺虎交横不敢迫况有令子文五色温温出言有倫脊幽光丕昭勒貞石黄金可銷􅀆銘不泐題危太朴隷書歌後學必慱而後所見精非惟諸經奥旨皆當研摩至扵􅀠書之學漢魏以来其運筆結繩多不同苟不歴考其變何以充其知識而祛流俗之陋㢤吾友危先生太朴作􅀠書歌一篇贈四明汪君大雅備括諸碑之所自且歴䟽之亹亹千餘言不休嗚呼世以空虚之學浮談強辨如蠭起泉湧者視此􅂚知愧㢤大雅方以􅀠學知名扵時復能惓惓扵先生之詩裝潢􅊞蔵惟謹則其尚徳之心為不可及巳䟦徐氏譜圖後余在㓜時聞金華有􅅊齋徐公諱澄字清伯宋淳熈丁未進士起家教授邵州官至中大夫福建路提點刑獄公事風節行義與義烏徐文清公僑並稱世􅃅二徐􅅊齋生知南陵縣事静孫南陵生嚴州司戸參軍木潤咸淳辛未進士􅃅能継父學者與弟咸淳戊辰進士文潤夀皆百􅀊司戸生應虎應虎人稱為文蔚先生通諸經􅀹長扵詩且善書立碑碣者多求焉鮮于奉常樞極噐重之累應進士舉不利遂授徒以終其身先生生季泰亦善讀父書以文學稱季泰生敏文采英發縣自諸生貢入成均為弟子員敏間来謁問之乃知先生之介孫予常拜先生扵菱湖上先生所期望者甚大今見敏如見先生焉予竊恠其書詩之澤何能數世不替如此及敏以譜系圖相示則知􅅊齋之父贈大中大夫瓊大中之父太府尹綸太府之父九府君衡皆積徳樹善有以致之其所由来非一日矣嗚呼賢㢤敏悼譜牒厄扵兵燹無以知其詳悉心搜訪得数􅁓扵蠧蝕之餘欲重為編輯奉父之命求予為之題識故書其所聞者系扵末簡徐氏􅀄居汴梁其遷金華自九府君始云葉氏先祠記昭武葉存恕詣予􅂯拜求記其先祠予不得辭記曰惟葉氏世為著姓自宋􅀄則然南渡後有諱武子字誠之者是為息庵先生受業扵新安子朱子之門淳熈中擢進士第歷官至秘閣修撰出知䖏州以終在郡有異政感召至和一年嘉禾生二年麥秀兩岐三年瑞芝産于庭郡人士􅅣石紀徳麗陽祠中䖏士生主管機宜文字伯忧機冝生修職郎宏銑修職生􅀅仕郎安􅀅仕生光祖興祖有文行用薦者署建寕縣學教諭数世以来祭祀之節並依朱子家禮從事興祖慨念先祠舊在所居之東偏規制淺陋無以展其孝思乃即中堂分為龕室者四以奉息庵而下神主傍親之無後者以其斑祔祭以四仲月正至朔望則三謁焉郡士黄鎮成實為之記元季毁于兵興祖哀慕不能自已復捐􅀻田百畆入樵谿書院以祔祀息庵逮至國朝凡學校之田悉籍于官而祠又廢興祖之志猶不怠卜地扵城東三十里曰虗壇築先祠一區奉之如禮經始扵洪武四年六月落成扵明年正月屋以間計者五錢以貫計二十千且歸田四十畆􅀵其入以給牲醪之用功適成而興祖卒光祖之子存恕興祖之子夀孫思先徳之當報念諸父之艱勤宗微㣧薄或不足以􅀒荷恐渉不孝復入田以畆計者六十通前為百畆擇宗人之良者掌之春秋之祭因得不廢其承先志以􅁉後昆者蓋甚切也嗚呼三代盛時大夫士有位于朝者始有田禄以享其親後世之俗不皆三代若也葉氏之家乃能以義起禮因地之利建祠以祀其先不亦孝子仁人之用心也㢤予因為之記使刻扵真石為其子孫者尚思引而勿替以延祐扵無窮也桂氏家乘序桂本􅁎姓魯公族季孫後也相傳周末有季楨者與其弟桂挾䇿以干諸侯楨為秦愽士􅀍害桂懼禍且及遂謀詭姓遁身因即其名取字異而音畫不同者各命四子為姓示不忘厥􅀄也伯子曰桂奕居幽州守墳墓仲子曰昋突遷冀南朱虚叔子曰炅奨徙齊之歴山季子曰炔装移河南城陽自後四族流布多見諸紀載或謂睦與桂同音而出睢弘者固非或謂東漢末衞尉昋横分其四子各係以姓者亦失之也奕之子孫仍居幽燕五代之亂劉仁㳟㩀幽州兵連禍結乃扶携南渡散居廣信上饒九江興􅀦池陽䂊章成都諸郡而居信之貴溪者曰仔郷任南唐為静邉總轄使至宋加檢校國子祭酒兼殿中侍御史有功于世鄉人廟而祝之其後人擢科第躋􅂋仕者凡數十人而興􅀦之永興明之慈溪皆自貴溪分而慈溪一族則出扵祭酒之孫可昇亦多由進士入官至今支系􅀹盛逮我國朝徳稱以明經為太子正字陞晋王傳受知两宫令望隆蔚徳稱從弟仲􅁠擢忠之鄷都令孟誠知惠州河源縣復皆以政學聞仲權家食時乃合諸族譜圖及行状碑志遺文釐為九卷曰桂氏家乘命徳稱之子中書舍人慎徵予序之慎嘗從予學因為撮其樞要冠于篇端嗟夫氏族之學古昔所甚重浹漈鄭漁仲著為通志其中二十畧唯氏族最備然而墨台氏逃難而改為墨牛金之子亦因避害而易為牢漁仲謹識之而不敢忽重變古也予故特書桂之所出為魯公族者其意亦猶是爾桂氏之嗣人尚思有以謹其傳焉予旣作此序巳客有以秦之􅂐􅀠與後世正稭異未必其畫之同疑出好事者之傳會殊不知􅀠書出扵秦之先而與今之楷書正􅁼要不可以此而􅃍少之也因并及之故朱府君文昌墓銘予居浙水東時得朱君好謙之文嘆其善扵修辭惜未及與其交而好謙殁于兵及来京師又得好謙從弟文昌詩閱之冲澹􅁼漢魏雄健如盛唐復嘆曰何朱氏一門之多賢㢤未幾國子助教曽君旦􅀄同文昌冡子堅持知嘉定州事張􅰱状来謁墓道之銘蓋文昌之死巳四年矣予重違曽君之請不敢辭文昌諱嗣榮文昌字也姓朱氏出唐散􅀐常侍滿之後滿本歙人来徙金溪明暘里世為衣冠甲族宋道州營道丞登生太學上舎生恢之恢之生銓銓生貴清貴清生仲梓文昌父也元初避地桃峯復遷家焉文昌治舉子業甚精通毛氏詩訓故折􅇆扵朱子之􅀃毫分縷析唯恐不合情性之真下筆千餘言不休走試江西鄉闈立論與有司不合即棄去一假古律詩以自見歴代諸大家皆探微索隠必􅁒得其㫖趣而後已用工之深出語輙驚人然不特精扵詩甚輕財仗義尤人不易及少時嘗以錢粟貸扵人一旦自責曰蠅頭之利其能汨没男子之志邪悉集受貸者扵庭取其所留質劑面焚之其後家单無旦夕之儲恬不為恠人有憫其貧畀良田百畆者文昌疑其不義辭弗受鄕友罹患難屬文昌為之觧紛餽白金一鎰為文昌壽文昌􅀏曰吾雖貧亦惡用是㢤卒直其事而還其金至正壬辰江淮兵動里之無頼少年相挺為變其首禍者頗與文昌㳺乃来􅀃曰公蔵噐于身不以此時取富貴尚何俟􅁘文昌叱之去遂與絶交未幾竟敗沒文昌宗黨知事變不測椎牛釃酒起兵為堡障屹然孤立數年而群㓂不敢犯文昌之謀為多偽漢陳友諒犯南昌諸郡相􅁇䧟文昌曰此非吾軰之力可攴盍各逃死乎乃挈一族入閩中雖備嘗險阻畧無怨悔意後五年國兵取江西州縣皆入職方文昌始還鄉里卜居澄源上遺落世故絶無毛髪縈心所不忘者唯詩耳因扁其室曰嘯雲軒云東平穆敬来爲縣欲起文昌爲縣學師文昌曰吾老矣唯消摇林壑爲冝耳横經講道豈所堪㦲因固辭而去性愛佳山水自謂得堪輿家不傳之秘稍暇輙布韈青鞋登陟不少倦不幸以洪武七年二月十四日卒夀五十六􅀁著書有政鑒若干卷燬于兵尚存詩詞三百餘首題之曰燹餘集娶王姜二氏王先十九年卒子二曰堅曰重堅即請銘者孫二曰振振曰繩繩孫女一某年月日卜塟明暘里長岡山文昌􅀁自擇也夫詩之爲教務欲得其性情之正善學之者危不易節貧不改行用捨以時夷險一􅆀始可以無愧扵兹如君者蓋近之矣世之人不循其本而競其末徃徃拈花摘􅃩以爲工而謂詩之道在是惜㢤銘曰詩之爲教著于禮經温柔敦厚本諸性情君子讀之豈惟多識玩其指歸感善懲逸我甑生塵我衣懸鶉非義之物肯受諸人如斯學經庻可無愧􅅏連光景敢曰吾事彼蒼者山秀色可餐洗心滌慮是躋是攀髪猶未皤嗒然􅀚化何有短長無晝不夜長岡之原桂老水寒䰟魄未歸兹焉是安惇史造銘詒爾孫子慶源方深其流瀰瀰故贈奉議大夫磨勘司鄭公墓志銘温之平陽有剛毅之士曰曲全公諱采字季亮姓鄭氏賦性分特唯道之從不屑屈人下年二十而其先人捐舘州里群少年怙其氣􅀔因公少孤欲肆其狎侮公奮然自勵曰大丈夫有髯如㦸肯受狗䑕軰侵凌乎束書出門㳺浙河之東西道經金華金華為部使者治􅀁使者聞公至請見之既見竒其才􅀅辟為府史公以為辱巳力辭而出時仲兄講授崑山公趨就之年巳二十有四矣仲兄勉公以學公始肆力扵六經群史間冬大雪輙擁重衾厚懞而坐夏􅀬蚊蚋且􅏐人則習之陋志卑而氣歉撫世酬物一以詭随為務公之剛毅凛凛不逐物變移其君子之人歟雖然申棖親㳺孔子之門尚不以剛許之剛在古人亦甚以為難有如公者其君子之人歟縱不得享人爵以行其志而天爵之在躬固皦然無愧也是冝銘銘曰哲人立志以剛為質遵道而行不詘扵物不屈者誰東歐之賢其賦自天其直如弦狗䑕肆欺翩然東去歴覽山川􅀤舒壮氣綉衣使者一見稱竒争言可吏謝而去之乃潜厥心乃㳺六藝乃騁辭章􅂓以俯侚繩尺徃試有司意我矯亢黜去不疑大􅀏而歸肥遯不出英英白雲生我几席滛林化水殺我黍苗生民嗷嗷孰地可逃走白上官雙淚如注中誠感通卒蠲乃賦化此呻吟而為謳歌仁人之言計功實多室如懸罄心則好施視彼顛連如巳顛躓觧衣恤寒縮食濟饑貪夫聞之寕不愧而俗衰民散師道不立冝􅅏一鑑為世楷則胡為長逝魂入九泉獨留遺文虹光燭天餘慶􅀁鍾有子䏻令出鎮方嶽敷政柄隧道之章載􅀭清芬佞人讀之當為裭魂故贈承事郎大府㫁事官尹府君墓誌銘國朝之制凡入官者自七品而至扵第一咸得推恩及其先人官有崇卑故其恩有隆殺焉今刑部尚書尹性其為大都督府㫁事官時嘗請于朝得贈其父府君如某官階承事郎母章氏封宜人性既䖍奉命書櫝置惟謹復用黄綾謄為副墨具冠服佩綬如法焚燎扵府君墓下性竊自念皇靈如天覆燾九圍惠澤沛滂兼􅀍存殁苟不圖文勒諸琬琰何以上昭帝力下示後昆乃屬其友鄭君思先采掇群行成状而徴濂為之銘濂按状府君諱元良字子貞㑹稽人也世為簮纓巨族曾祖某祖嗣宗父恂元温州路平盈庫副使妣李氏府君温而克毅卓識異扵人事二親鞠躬盡瘁惟恐逆其志副使君殁于温府君不惮二千里之逺渉濤江而往艱難險阻莫不備嘗雙足為之皴裂扶櫬而歸卜宅兆蔵焉當是時二弟某某尚㓜府君聘致名講師訓之以經朝夕督䇿之恩意備至及長各為授室巳而乞析㸑甚力府君止之曰兄弟同一氣而生猶手足之為四體其可分之乎弗聴府君指田之磽􅇤者曰此予之􅀁愛也指器之苦窳者曰此予之􅀁嘗用也盍歸我􅃾土嘉具悉譲與之閭井以為難􅀎先是府君之􅀙父兄既耄且貧仰食扵府君家二妹亦未有􅀁適至是各異居咸倀倀無􅀁之㡬欲堕淚性甫七􅀊告府君以其故且曰非吾父是依􅀅疇􅀙邪府君喜曰爾真吾児也正符吾志遂獨養耄者終身􅅚奩貲以嫁其妹性後入官􅀹以㢘勤戒之其言踰千百云府君雖老􅂄學不厭六經群史㒺不研究之毎晨興挾􅁽映簷光而讀稍倦輒拄頰㸔雲出入巖岫間夏然如在塵外有嘉賔至令庖丁治酒殽相與劇飲酣觴淋漓燭不見䟦不止也故為之婣連者則曰尹公其吉人㢤為鄉鄰者則曰尹公信端士也大氐皆得其驩心云府君壽七十又一以洪武己酉正月甲寅卒于家其年九月丙申塟會稽縣廣陵鄉黄龍山之原禮也配即宜人男三人長即性近擢今官階通議大夫次􅁠次􅀄女二人適同郡司馬升金傑孫男四人經質敏學經早卒女一人予早聞性名知其制行之卓其居官也如氷清玉潔誘以黄金滿槖弗顧也今幸與之同朝又知其精扵法家之學操心平恕不使有􅁈民非府君家教之篤其􅀎致然耶若府君者其可銘巳性今位居六卿之中扵法得加贈他日榮光下燭泉壌重榮又當濡毫為性紀之銘曰越有君子篤行于家涖事必誠質而不華事親如天跬歩不􅁯洞洞屬屬唯敬是􅀅親殁于温蒲伏徃迎扶襯夜哭水為失聲鞠育諸季竭其恩勤扶翼覆護如親之存耄者養之弱者嫁之營之經之以遂我私春秋既髙謝絶塵氛拄頰凝視山川出雲賔至如歸劇飲而讙夜深月落聲出戸間積善之餘無欝不舒有子升朝朱衣金魚皇明如天䘏典攸崇澤漏九泉于以􅂆忠廣陵之鄉嘉􅀣欝蒼太史勒銘永世其蔵元故湖州路徳清縣尹陳府君墓銘吏部主事陳咨詣予言曰咨試藝京畿時先生實爲主司屡欲求銘先府君墓已而授河南行中書檢校官書有程竟弗􅀗遂前志及仕銓曹而先生謝事東歸晝夜恒懸懸入思今逢先生朝京師敢奉同郡宇文材􅀁摭事状以請惟先生􅂌矜之予按状府君諱嗣字仲貞姓陳氏世居湖之長興其先出自漢太丘長寔寔傳若干世曰某宋臨安丞臨安生某遷居郡城之南以貲雄于鄉年九十乃終生某積學勵行有聞于時自號爲庸齋庸齋娶施氏無子擇􅀙子爲之􅁇惟府君風指孤鶱足以當其意因後之府君性軒豁開口吐肝膽好傾貲結賔客或有急難輒􅂢金以濟之既而曰人不可以無教不教惡足以明􅃔倫乃建義塾聘致名師州里子弟願􅀙者悉聴其入材多有成元季汝頴兵發蔓延浙水西髠鉗盗販者相挻為變府君推牛釃酒聚年少徤兒授以控扼之䇿盗不敢侵其境㑹朝廷遣使者詔民入粟拜爵府君慨然曰國家有急豈臣子顧私時邪首往應詔輸粟二千斛使者大恱即以上聞著府君徳清縣主簿徳清湖之属邑府君素知其土俗視事始閱􅀊吏懾人懐曽未㡬何張士誠據姑蘇兵䧟湖州城守臣退居徳清府君曰杭為東南方面之􅀉徳清實杭之北門徳清破則杭無寘足之地矣冝急保之遂與上下謀竭力死守軍食或不􅁇以身仕之江浙行省平章政事買术丁方總兵事上其功状陞為尹逹識帖木爾時以行省右丞相承制行事欲招士誠降命府君持檄諭湖州偽師以離其黨與府君慷慨請行既至偽帥延之上坐府君為敷陳大義何者為順何者為逆逆則罹禍順得受福繩繩千餘言偽帥不覺屈􅂰城遂来歸丞相大恱而府君不幸以母憂去自時厥後府君度時事不可為累辟不起以至正某年某月日卒于歸安縣之寓舍享年四十又五以某年月日􅁙于烏程縣三碑鄉賢子塢先塋之次娶吳氏有賢行頗渉獵書史至扵隂陽醫卜種􅀣之書皆通其義後府君若干年卒遂合􅁙焉子男子四長即咨次某次某次某孫男二某某嗚呼府君以卓犖之才少見諸用巳焜燿鏗鍧若此况使盡其􅀁藴者乎然而炳扵㡬先長往山林而不之返非賢而􅀎爾乎今逢六合載清禮樂文物之盛比隆唐虞而府君巳逝不及見君子寜不為之太息乎雖然府君有子以科目入官政跡昭著府君雖死其不死矣乎銘曰天之生材或塞或通秪繫扵時􅀁以不同有倬陳君氣岸弘整表裏一如錙銖無􅀮里有急難􅂢金如泥蹈彼水火必思救之欲明􅉓倫我建我塾載􅀭師訓開其耳目元季政龎亂如沸􅅅浙河之疆烽火煌煌奮襼大呼聚厥勇士持爾干戈捍我鄉里出粟􅀘官勾稽簿書􅀮然堅城㓂不可踰封豕長蛇據我大府奉檄往諭氣可攝虎義嚴辭勁直中其機不覺屈膝請䧏恐遟相臣嘉之謂爲俊傑軍威大振孰得而遏君則曰噫此胡可爲大厦􅀅傾一木莫支尋以憂去遂臥不起朝飡烟霞暮采蘭芷令終于家州里咸嗟有材莫展時乎命耶靈風肅然吹彼􅀣魂􅀆来歸妥此幽隧脩慎齋記修慎齋者中書􅁺葉杞孟堅之􅀁自名也孟堅之言曰􅂎居括州麗水之陽父母俱存兄弟無故足跡皆不出里門一家之和其祥氣殆可掬而有也頃因鄉里推擇習刑法之學扵大府遂充貢来􅀯京季弟孟年實與之偕行朝夕奉承甚謹既而中書􅃟爲刑曹史閱一載陞爲令史父在家聞之有書来曰刑曹决天下之獄獄情萬變爾勿使有寃民朝夕洗心滌慮以承上官不可循一髪私羞服之用當扵我乎給之苟違我言必􅀅辱扵吾矣自時厥後有􅀙括来者輒致書一年之中不下五十畨書中之言無異扵前時􅀁云父猶恐書不􅀎盡逹也復使仲弟孟才来致備用諸物且申言之留連再月依依不忍别既别歸吾父問其状甚悉喜曰爾徃終勝簡牘之徃還然又不若吾親見爾兄為稍慰耳時赤日如火即詣縣給過􅀁直抵􅀯京一相見頃悲喜交集晝夜訓􅅚之比前為尤詳且曰今朝廷清明㢘吏無不登乎樞要尓當氷雪其操他日衣繡還鄉以慰慈母􅀝門之望豈不華㢤亦留連再月而歸杞亦念父不置越数月適年勞及考急謁告東歸諸弟聞之驩迎三十里外杞升堂展拜問起居父子相抱持喜極不􅀎成語曽未㡬何部檄下州中趣􅂎上道父不忍子行潜然出涕乃陽謂􅂎曰幸因爾行得為錢唐一㳺庻攬湖山之勝􅂎知其故力止之不􅀙既至杞又止之還父復曰姑蘇抵此三百六十里耳其風物比錢唐尤勝吾何可還必至彼乃與爾别既至􅂎又止之還父復曰姑蘇至南京不逺矣我之情事尚未與爾畢之可遽先還耶杞遂不敢言扵是同至又再踰月而别嗚呼世之為父者孰不知愛其子如吾父之深切十百之中不知寜㡬見耶􅂎夙夜佩服戒言惟恐辱其先因耴經中脩身慎行之語名其寓居之齋曰脩慎願為􅂎記之予聞仁人孝子之思其親何時而􅀎巳耶山不足為之髙海不足為之深此無他昊天㒺極之恩終不可得而喻也􅂎䏻不忘此時之思朝夕以之一動也脩慎一静也脩慎則無􅀒尓父之望矣杞尚朂之㢤故􅌼府君墓碣銘吳郡有名世之醫曰倪府君諱維徳字仲賢其先家于汴梁曽大父某宋某州防禦使生秀文值宋籙既訖乃挾醫術㳺大江之􅀯遂擇郡之吳縣居焉秀文生􅂦亨䏻紹家學有聞彦脩之殁予已銘其墓今府君之子亦復惓惓為予安得固辭耶因歷其行事而銘之銘曰醫者之學素問為宗猶儒治經専門是攻寒暑温涼升降浮沉或􅊇或順制治最深随時立方始與疾同正氣旣攄邪沴乃融粗工􅃖􅃖守一不移執中無􅁠罔契其機羣昏方酣苟不力扶􅁳􅁳夜行摘植索塗三家者興上窺本原如掲日月照耀天門伊誰承之作世范模東則有朱西則有倪宋學士文集卷第四十九芝園集卷第九
