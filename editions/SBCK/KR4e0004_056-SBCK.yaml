body:
  text: 危孝子傳臨海孝子危貞昉字孟陽事親以孝聞其父孝先洪武辛亥進士擢官麟㳺丞再遷陵川坐法謫役江浦縣貞昉時為郡諸生聞之奔訴扵郡守欲走代之守以其名􅀠學籍難其行貞昉號泣于庭曰人孰無父㢤柰何獨沮扵我也左右為之言獲如其請即日上道詣京師伏闕上䟽曰臣父陵川丞孝先不幸絓吏議輸作大江之濵筋力向衰不䏻執事而大毋范氏春秋復踰九十旦旦念之恐染霜露之疾無以遂其菽水之忱終天之憾或及其身臣犬馬之齒方殷􅂅代父作勞使其歸養雖即死無恨聖天子以孝治天下惟哀矜焉䟽奏上惻然􅀙之貞昉乃觧儒衣易短製欣然就役施施無難色然質體尫弱不勝􅀒任之苦越七月病卒貞昉通周易兼䏻學唐人歌詩性剛直讀古忠孝事歛袵乆之且曰使貞昉生其時亦當若是爾遇交友患難蹈湯火赴援不爲利害惑卒時年二十八聞者皆悲之爲說者曰父子體殊而氣同者也故古之孝子不以身自私非過激也宜也有如貞昉者詣闕上䟽欲代父受役毅然以死自誓唯知有父而不知有身其殆近扵古之孝子者非邪嗚呼死生扵人大矣貞昉之死扵孝是有益扵天􅂨民􅉓之重無愧扵俯仰無慊扵神明奚翅足矣他尚何􅀃㢤彼悖徳犯上者亦曷嘗不死其死也如敗豚腐䑕人孰稱道之觀吾貞昉則若威鳳之翔千仭可望而不可即得與失又爲何如㢤貞昉之名宜登國史以風厲四方予舊史官也特爲立傳使秉直筆者他日有采焉靈􅀮大師復公文集叙才體也文其用也天下萬物有體斯有用也若稽厥􅀄玄化流形品物昭著或洪或纎或崇或卑莫不因才之所受而自文焉非可勉強而致也姑就植者言之黄者白者青者紅者黒而澤者紫􅃩而􅃾者翠白而緗縁者五色交糅變幻而不恒者一囿扵氣而弗可移也至扵洛陽有花則絶􅀋絶倫其植物中之至文者歟尺以動者言之雙角而火鬛者兩羽而飛者炳朗而斕斑者介而紫暈者鱗而含金者衆彩錯布焜煌而難名者亦局乎氣而不􅀎更也至扵岐陽有鳯則超群㧞萃其動物中之至文者歟非惟物也而人亦然有一人之人有十人之人有百人之人有千萬人之人有億兆人之人其賦受有不齊故其著見亦不一而足所謂億兆人之人聖人是也千萬人之人賢人是也百十人之人衆人是也衆人之文不足論賢人之文則措之一鄉而凖措之一國而凖措之四海而凖聖人之文則斡天地之心宰陽隂之權掇五行之精無鉅弗􅆂無微弗攝雷霆有時而蔵而其文弗息也風雲有時而􅀵而其文弗停也日月有時而蝕而其文弗晦也山崖有時而崩而其文弗變也其愽大偉碩有如此者而其運量則不越乎倫品之間盖其所禀者盛故發之必弘所予者周故該之必備嗚呼此豈非體大而用宏者歟或曰上帝降􅂨不以知愚而有偏若子之言不㡬局囿乎氣而不遷者乎曰非是之謂也其性同其才或不同雖以七十子之􅀙聖人其學各得其才之所近况下此萬萬者乎由是而􅀚因才所受而自文者人與動靜之物槩可見矣濂之學文五十餘年群書無不􅀚萬理無不窮碩師鉅儒無不親自意可以造作者之域譬諸登山攀躋峻絶不為不力而崇顛咫尺不􅀎到也此無他受才之有限也世固有巵匜者焉有甕盎者焉有沼池者焉有溪澗者焉有湖江者焉有􅈚渤者焉水充其量則止小固不能為大大亦不䏻為小也濂昔官禁林四方以文来見者甚衆晚閱見心復公之作穠麗而演迤整暇而森嚴劍出襓而珠走盤也發為聲歌其清朗横逸絶無流俗塵土之思寘諸古人篇章中㡬不可辨遐邇求者日接踵扵門既得之不翅木難􅃢瑚之為貴公卿大夫交譽其賢名聞九天皇上詔侍臣取而覧之特褒羙弗置濂因謂當今方􅂁之士與逢掖之流鮮有過之者焉今来朝京師其徒曇鍠編􅀋成書􅁵為十卷来徴濂為之序嗚呼文者造化之英華古今之綸貫㫁不可闕也有若公者㧞扵十百之中超然騫舉而慕賢者之閫奥其可傳逺無疑濂烏得不倡體用之􅀃以諗同志㢤有訕濂䧟扵一偏而不可為訓者非知言者也不加功扵文者也是膠柱調瑟而弗知變通者也重刻金剛般若尊經序賛三界大師所􅀃般若盖非一種而金剛般若尤為明心之要金剛般若多至五千餘言而阿耨多羅三􅸲三菩提九言又為一經之要九言之中而菩提二字復盡攝其義盖菩提者􅁴也佛則䏻􅁴衆生則迷也此經拳拳􅂆誘欲衆生去迷而就覺爾比丘弘暢孳孳向道其心堅如鐡石近􅀗呉興趙魏公孟頫所書是經刻本以閩中未之見也特歸重刻之乃来求賛以廣流通賛曰金剛大􅂅海普覺扵一切衆生正昏迷夜行大澤中􅁳􅁳無所覩了不辨南北坑穽在左右虵虺復横縦軀命不自保䘮壊在俄頃忽遇紅日輪赫然出東方萬􅁚都照了細可分毫毛四維及上下無徃不洞逹是經之化導功徳亦如是比丘最善巧􅄝道如􅄝利鍥刻行閩粤見者起信心經如大火聚威欿照天赤衆生妄想心見之作􅁅燼經如四大海中具萬舟楫衆生沉溺者濟之升彼岸經如香積厨珎膳咸充足衆生饑虚者聞香悉飽滿推􅀋而言之更㒒莫䏻盡佛法難度量賛歎輙成妄返􅀚自性中各有金剛王與佛本一同慎無輕棄者唐鑄旃檀神王銅像銘狻猊作冠􅀍于背副以黄金神武鎧匡衛正法億萬載故寜海郭君妻黄氏墓銘天地之間為人倫之綱者有三曰君也父也夫也君統臣父統子為綱固宜妻與夫齊亦以繫之者何盖夫者婦之天婦􅀎尊夫夫䏻統妻則倫紀脩明而家政嚴􅅚不然則反目之禍作而斁諸之事起矣其有生䏻敬夫如賔殁而服䘮若父者孰不謂之賢㦲予扵寜海黄夫人之事不䏻無所感也夫人諱珍生有淑質父某與其母王氏絶愛之年十八歸同里郭君仁壽夫人尊之甚異動静必遵禀而行毫末不敢欺内外諸政率皆親涖雖甚勞勩弗惮君好賔客朝夕酣觴淋漓談辨以為適家單不䏻備物夫人極意營集不使知窘澁之狀君一日入台城殁扵旅邸夫人聞之慟絶者数四及靈車至庭撫棺號遂暈眩仆地㡬欲無生以湯藥􅈅之移刻乃蘇治䘮一循古禮布苫柩側取石爲杭不觧衣而臥者三月石有稜當枕䖏肌􅁏成創創液浸􅁋其子泣爭欲以木易之不許二年弗御酒􅁏柴毁骨立與人言則曰未亡人未亡人未嘗有愉色或曰孝子之䘮父其有過扵夫人者乎或曰夫人之事夫固至矣其扵君舅君姑殆有過無弗及焉事舅姑固孝矣其在家也善奉父母亦有過無弗及焉其後父母無子而終相夫卜宅兆瘞之哀慕至老不衰􅀂夫人者豈古之所謂無愧人道者非邪嗚呼位極三旌有不足榮也禄盈萬鍾有不足貴也名傳四裔有不足多也此􅁠勢者可僥倖而致也惟夫制行可以厚人倫可以移風俗古今人莫不多之貴之榮之亘天地始終而不可泯也其不可泯者非有増三綱九法之重者乎夫人之事烏可使之不傳乎夫人夀五十六卒扵洪武己未正月二十三日以其年某月日􅁙扵某山生子四彌逺濬俊女一適傅士常孫三女二予在京師濬爲太學生嘗􅀙予㳺以文學知名于時濬来請銘銘曰振其綱萬目乃張卑尊而有常庻各循乎降􅂨叶苟反于斯維家之殃懿㢤夫人厥徳􅁢臧可以重􅉓倫而􅀣世防彤筆煒煌特以昭其蔵明辯正宗廣慧禪師徑山和上及公塔銘姑蘇之區山川清妍其所毓人物性多敏慧學禪那者以攻辭翰辨噐物為尚雖㩀位稱太師亦莫不皆然自宋季以迄于今提唱逹摩正傳追配先哲者唯明辯王宗廣慧禅師一人而已師諱智及字以中蘇之呉縣顧氏子父茂卿母周氏師之始生靈夢發祥及入海雲院為童子智光日顯釋書興儒典並進其師嘉之同見閩國王清獻公都中公大賞異􅅏居外舘撫之如己子使其祝髮受具足戒師聞賢首家講法界􅀚徃聴之未及終章莞爾而咲曰一真法界圓同太虚但渉言辭即成賸法縦􅀗天雨寳華扵我奚益㢤遂走建業見廣智訴公扵大龍翔集慶寺廣智以文章道徳傾動一世如張文穆公起巖張潞公翥危左丞素皆與之㳺以聲詩倡酬為樂師微露文彩珠㓗璧光廣智及群公見之大驚交相延譽唯恐後師之同􅂁聚上人訶曰子才俊爽若此不思􅀒荷正法甘作詩騷奴僕乎無盡燈偈所謂黄葉飄飄者不知作何見觧師舌噤不􅀎荅即歸海雲􅇩中如礙巨石目不交睫者踰月忽見秋葉吹墜于庭豁然有省機用彰明觸目無障師雖自慶幸然不取正有道恐渉偏執扵是杖䇿㳺虎林升變徑山謁寂照端公自列其所證甚悉􅀄寂照嘗以法噐期師聞其言喜甚因勘辨之師随機而荅隼落秋空而􅇠走􅂽原也精神參㑹不間一髮未㡬命執侍左右以便咨叩俄遷主蔵室師取三乗十二分教益温繹之宗通說貫衮衮如懸江河聲光煒燁頓超諸老上至正壬午江南行宣政院舉師出世昌國之隆教海濵之民暨清凈四衆手持香華百里驩迎如見諸佛師為升座􅀃法不翅大􅀅􅀣建旗皷申令發號聞者靡不畏服乙酉轉鄰刹普慈其激􅀭誘掖如隆教時戊戌江浙行省左丞相逹識帖穆􅈛兼領院事延師主杭之凈慈兵燹之餘艱窘危厲人􅀁不䏻堪師運量有方􅁤範峻整綽有承平遺風較之普慈君子恒謂過之丞相猶謂未盡尊師之道辛丑之秋復請住持徑山􅀘寂照故䖏師亦不辭而往風動四方考徳者愈衆亡頼男子瞿範日饕盤飱主庖者厭之瞿銜而去赴部使者訴院之僚属受賕誣師爲通􅇆私使者攝師問状師了無懼色癸卯省憲二府白其􅁈強師復還徑山緇素駿奔如戴父母至有樂極而悲泣者呈明龍興洪武癸丑詔有道浮屠十人集京師大天界寺而師實居其首以病不及召對乙卯賜還窮隆山山即海雲􅀁在也戊午八月忽示微疾至九月四日索筆書偈而逝九日行茶毗法火􅆋化成五色有氣襲人如沉水香齒牙数珠不壊遺骨紺澤􅀋青流離色室利羅交綴扵上是日其徒大均士龍等蔵扵􅀁居山之隂寳盈分􅀲髮歸徑山卜扵無等才公塔右瘞焉世夀六十八年為僧五十一夏度弟子若干人嗣其法者若干人師長身山立昻然如􅀌松在壑威令嚴肅其下無敢方命故􅀁至百廢具興然䖏事逹變接引後進又如春風時雨之及物使人不自知元帝師以為賢為錫今號云師在天界時濂頗􅀗聞其緒論扵其殁也上首弟子普慶住持道􅄛藉是之故自状其行来請銘夫圎眀妙性實具三千四聖六凡悉􅀙中現諸佛不得已而說經雷動蟄驚風行草偃者為明此性也諸祖不得已而忘經絶其枝末直探其本根者亦明此性也性在是則道在是矣奈何道䘮性乖非惟學徒為然至扵師表當世者一􅀙事扵末學曲藝之間以資清玩其去佛祖之道盖亦逺矣有如師者可不表之以為東南􅀛鏡㢤師出世時窮隆山石夜走及涖普慈神降扵人述師清嚴之状天之生師殆不偶然四㑹語有録其機縁巳備載之兹不敢勦入也銘曰華􅆊諸祖􅀁了唯心凾乾盖坤開陽闔隂萬彚芸芸靡不苞括肯􅂢全軀而局一髪奕葉相仍軌轍弗殊融通小大無礙無拘猗歟禪師神觀􅀌聳文彩漸彰雲流山涌一旦易慮靣壁自治攝念入定如斬棼絲秋葉之零飄堕庭戺仰視青天一碧萬里我性之覺澄諸碩師機鋒交觸劔㦸差差出世海濵人天拱手發祥含徴白石夜走全提正印法皷頻撾以眼聞者㫁除空華由其見凝轉識為智珠璣落􅁓亦苐一義方嶽大臣遣使􅀱迎陟于南屏惟徳之馨名山列五首曰雙徑匪私扵師南東􅀛鏡輕儇小夫僣不自懲皦皦白璧何憂蒼蠅風騰波掀萬辭嗟惜是非既昭重涖舊席昔師之去泉流哭聲師今之旋卉木含榮世縁已終微􅀏而㓕設利如珠綴扵紺骨末學兢奔曲藝宏施胡不反觀本賔在斯遺光􅀁􅀍千載猶淺瞻之仰之誰敢不勉蘇州萬夀禪寺重搆佛殿碑蘇之長洲東北二里萬夀報恩光孝禪寺在焉􅀄晋義熈中有沙門曰法愔自西域至中夏與慧逺法師結社廬山已而来蘇以念佛三昧化導有情蘇人翕然歸之為建凈夀院梁時更名安國唐長夀二年又更名長夀㝷毁于兵吳越錢氏有國中吳軍節度使錢文奉重作之又更名安國長呉夀禪院始易禪僧明彦主之宋大中祥符二年丁晋公為奏改為萬夀崇寜二年詔加崇寜扵萬壽之上政和􅀄又更名天寜紹興七年復詔更今額為徽宗薦嚴之􅀁元至正末天下大亂寺為兵所焚羣僧散走鞠為椔翳之􅂣國朝洪武癸丑蒲圻魏君􅀚来為郡周視廢基蹙額而言曰是刹之廢不得名浮屠不足以起之行中禪師仁公乃寂照和上世適今住虎丘徳􅆂道融堪為人天師且兼通儒家經發為辭章嚴簡而有法内外之學雙至中興之責庻其在是乎遣使者致書幣凡三徃而後􅀿之視其􅆍室則床第篾如也稽其穀粟則盎無斗儲也訊其執役則童􅀠無有也師泊然獨居􅀂享萬鍾之禄者曾未㡬何僧之散者復還逺近清修士魚貫而來有饋食者有供三衣者有施黄白金者禪師曰可矣戒左右重搆大雄殿五楹間鑿石于山市材于江陶瓦于郊工者奏技壮者獻力鞠明究曛不督而集四阿有嚴若翬斯飛丹雘絢爛眩人心目僝工扵甲寅春二月至乙卯冬十月厥事告成禪師太息曰寺之凢役殿為鉅殿既成門廡堂室當易為爾吾耄矣宜選春秋强盛者􅁇之禪師乃退居松林蘭􅀂勤舊合輿議延瑩中瓛公嗣其席瓛公嘗請業禪師不復固辭乃走吴江水月廢刹輦致三世如来像妥奉殿中􅀚者起敬瓛公晝夜孳孳􅀅次第成禪師之志復来請文以示後之人誠可謂賢也巳嗚呼大千界中不離一念建治銷毁随感而形昔也兹刹付之虐􅆋化樓􅀚而為􅁅燼果誰使之㢤此一念也今也剪翳剔􅂽變瓦礫而成􅆊官又孰為之㦲亦一念也善惡之􅀁繫其懸隔有如此者可不慎歟禪師起廢之功無讓扵開基瓛公善􅁇之力必漸復扵舊􅀚皆肇扵一念之善者也法社緇衣之士来居扵兹来㳺扵兹尚當擴而充之為聲聞為縁覺為菩提蕯埵雖等妙二覺亦可拾級而升無有出扵此念之外者母徒委為有漏因果而忽之㢤寺有唐僧貫休􅀁畫十六羅漢像頗著靈異吴越時邵思寳䓁共建尊勝二石幢今猶存詩曰牽牛南斗姑胥墟義熈神僧建􅆊居相傳正受啓凢夫以法籠絡為周阹洿泥欲現金芙蕖盛衰相㝷雲卷舒􅀊㡬及千道如􅀄飛樓湧殿薄太虚欝攸毒燄翻赤烏化為􅁅燼無復餘上􅃒叢􅁄下夫須白烟斜日寒隼呼虎丘尊者名浮屠見性烱若摩尼珠􅇩中蔵書比石渠􅀿聘而起三嘆吁食無糗粮衣無􅃭赤立何以興吾廬瀟然一榻結雙趺風聲颯颯撼州閭四方聞者魚貫趨布泉盈槖果滿車稇載有若神􅀑輸成此寳搆只湏􅁷龍礎承楹列碔砆榱題攅星􅂗以朱日月回薄氣扶輿攝慳破執道力驅空中楼閣齊毗盧法筵誰嗣乃其徒利如干􅀅温六瑚吴江有刹委平蕪尚留像變金作膚妙荘嚴像􅉖且都輦致中座青蓮敷直掲紅日升天衢大綱既挈萬目攄三門夾序暨堂􅂗􅀔可馴致當不􅀌秪今勝槩瓊然殊黒白駢首施拜膜鏜鞳始􅀗聞皷魚有情弱質同巴且暮枯寜復論朝􅃾一念摇曵風中旟大雄慈憫猶已痛乃假塔廟作世模由外脩内垢凈除事為不落有與無空空色色皆真如作銘者誰列仙儒鐫之青瑶字縈紆後千百載期不渝八支了義凈戒序賛善世禪師蕯訶拶釋理自天竺来東土敷宣正法化導諸有情衆近依契經􅄏演八支了義凈戒分别事理二犯事犯易􅃒理犯難制扵是推致其極使人咸知法性本空􅀄無證脩㫁常不立真妄雙泯佛之大戒盖無踰扵此矣禪師既巳著爲儀文命其弟子智光譯爲華言以廣流通而請金華宋濂爲之序濂遂合爪作禮而􅀃賛曰我聞波羅提木义二百五十爲防止扵中各具四威儀合爲一千無剰欠過去見在及未来循環終始至三千若以三千攝衆義分配身口七支間漸成二萬一千数對治三毒諸惡業大無不統小無遺輾轉八萬四千門法門髙深固難測終不䏻違事理外事戒爲縁通萬境乃扵别别無因果㩀行凌犯即制伏是則名爲别觧脫理戒由其㫁惑故道性虚通随􅀋遣不随縁别起纒縛是則名爲正觧脫西天佛子最善巧開演八戒度衆生重􅁿利鈍盡包羅内外無爲亦如是法門雖多趨則一此謂持簡以御煩有䏻􅀍此護命鎧魔軍雖强不敢侵三學殊􅂗戒爲首由戒生定以至慧願入毗盧大道􅂣一念不生成正覺題禊帖唐太宗詔供奉官四人臨摹褉帖趙模諸葛貞得其筆意湯普徹得其形似而馮承素扵形意二者兼有之此卷精神飛動下扵右軍真跡一等其或出扵承素者歟題唐摹東方朔􅀞像賛右唐人􅀁摹東方朔􅀞像賛圭角混融而光精燁然非深知晋人筆法者不􅀎予在中秘􅀗觀禇登善鈎搨黄庭􅀴與此正同雖􅁓墨亦不殊信可寳也題禇書千文禇遂良書見扵石刻者世亦甚鮮况其真蹟乎今􅀚􅀁書千文柔勁險媚真如鐡綫縈結而成或者評為栁誠懸􅀁臨禇書似則似矣其入神䖏恐非誠懸􅀁至也宋學士文集卷第五十六芝園後集卷第六
