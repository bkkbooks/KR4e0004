body:
  text: 故賢母熊夫人碣嗚呼是惟賢母熊夫人之墓夫人諱慧清姓􅀺氏其先贑之寜都人髙祖某宋金􅂵光禄大夫出知撫州因家焉祖天桂以能文五領郷薦父槱母崇仁李氏夫人生七年母卒㷀然無依飬于外家外家婦孫氏􅌿軒先生轍􅀙女能椎􅌿軒詩禮之教故夫人通考􅀴論語及渉獵史傳趣向絶出流俗萬萬時同郡熊本萬􅀄以英才自振㧞澹軒謂宜配其父乃許妻之待年於家内外事皆攝治豊約中度能者亦以為難李母沒属遺槖以備嫁資後母移置它産夫人􅀂不聞知益考謹弗􅈈年十九歸萬􅀄奉舅某姑王氏執婦道甚先是其姒氏性􅄶且嗇謂夫出於前姑與王如不相能百事怠弗治夫人一反其政以所聞詩禮易之躬行實踐恒􅀂惴惴然日執饋食之禮唯恐不及凡事必􅀜决姒氏禮度雍容辭氣愿欵有足節日夫人出坐髙堂群子姓鴈行立次苐舉觴上夀􅀖人榮之㑹偽漢起兵􅃆陽延蔓至郡夫人時遘末疾匿西鄰空室時於壊壁見屠戮之􅃤而終無入室者事定之後他時兵再入急出竄冢舎暴兵奄至鼎侍夫人誓與同死生俄而兵又退遷主安寕郷萬氏家郷民大亂􅀅掠寓鼎嘆曰今殆不可免夫怱賊衆相謂曰聞熊毋賢且病吾寕他適弗忍恐之也卒免於難偽漢僣號遣使者徴鼎凡再夫人曰是虜狂悖不知有仁義其敗可立而待也未㡬元閩省守臣章完者帥師出杉􅀜以書招鼎夫人曰此固名正言順元運已去不可救藥矣鼎於是皆辭及我皇上定都建業遣衛國公鄧愈取江西聘鼎從事軍中夫人喜曰聞江表有真主興此誠可依也鼎自是顯融于時其明炳㡬先􅀋如此不幸以至正癸卯五月二十八日卒夀六十七省臣戍􅀅咸致􅉠奠遂以某月日􅁠厝先塋之次後重刻護法論題辭衢州天寜住持端文禪師不逺千里而来請曰吾宗有護法論凡一萬二千三百四十五言相傳宋觀文殿大學士太保張天覺之􅀁撰其弘宗扶教之意至矣盡矣昔者閩僧慧欽甞刻諸􅎚翰林侍講學士虞集實為之序兵燹之餘其版乆不存端文以此書不可不傳也復令印生刻之今功巳告完願為序其首簡序曰嗚呼妙明真性有􅀂太空不拘方􅀁􅀄無形叚冲澹而静寥漠而清出焉而不知其所終入焉而不知其所窮與物無際圓妙而通當是時無生佛之名無自他之相種種含攝種種無礙尚何一法之可言㢤柰何太樸既散誕勝真漓營營逐物唯塵縁業識之趨正如迷人身䧟大澤煙霧晦㝠蛇虎縦横競来追人欲加毒害􅀍髮狂奔不辨四維西方大聖人以慈憫故三乘十二分教不得不􅀃此法之所由建立也衆生聞此法者遵而行之又如得見日光逢善勝是自壊法也傳曰家必自毁而後人毁之尚誰􅀹㢤今因禪師之請乃懇切為緇素通言之知我罪我予皆不能辭矣禪師豫章人知寳大法如護眼目然身服􅁓衣躬行苦行遇川病渉者梁之􅂗齟齬者甓之枯􅟆􅁀露者掩之今又刻此論以傳誠無愧於有行沙門者矣故廬􅁜張府君光逺甫墓碣銘皇上即位之五年朝廷清明百揆時叙乃開文華堂禁中妙柬英材詔詞林羣公分教之車駕幸臨閱其所業文親定優劣上德至渥也時江西張唯流寓河南以尚書領首薦㑹試南宫未試除囯史編修仍俾肄業于堂予見唯有雋才特請于上録為弟子員唯執􅀴日乆忽􅒣欷流涕言曰唯父抱竒節不幸歿於盗手今体魄入􅁟而墓石無文一念及兹􅀅欲無生惟先生矜而􅂌之予按亡友吏部員外􅀰周子諒状君諱逺字光逺姓張氏吉安永豐人氣岸豁逹不狥於小物當元之季大盗起􅃆陽蔓延江右䧟吉安旣而州兵搗走之盗所過井落民皆相挻為變殺掠巨室慘酷不忍聞君怒髮上指日夜建竒䇿剪㓂其友有羅惟逺者尚氣節遣人夜致之列酒炙于庭脫冠酣飲夜􅀅半屏左右跽而告曰吾州素號文物之􅀖一旦盗蹂踐􅀅無遺義不與賊俱生然非公不足濟吾事今郡守梁使君出督兵境上公宜往請師吾隂立部署以俟斫賊無難者羅抵掌于几曰子誠竒男子吾縦無他能敢不􅀙命議旣定君􅃁子庸猶未知君乃叩􅃦門令出拜復語之故庸曰羅先生􅀂迎官兵至庸持大斧盡殺狐䑕軰不留一人羅舉觴賀君曰大兄有如此豪傑兒事不患不成也未發冦諜知之師衆執羅去祼而鞭之且問曰誰與汝造謀羅罵曰死狗奴吾憤汝不道自欲殺汝何暇與人謀㢤賊怒愈鞭之仍授筆􅁓使寫首謀者名羅瞋目視之大書一死字賊反椄羅于樹剖其腹作小竅日増加之羅嚼齒大詈三日而後氣絶􅀅絶詈聲猶含糊在口君幸得脫走吉水及㓂􅀔少戢君還故里㓂有知君遣羅事者縶之至營賊競来指曰是甞欲殺吾属者君顔色自􅀂從容語賊曰我纓緌之家决不畏死䘮節殺即殺毋以多言為遂遇害賊黨忿猶未平并欲屠君介子賢渠魁執不可􅁣然嘆曰彼固忠義人也寕可使其不血食邪為具棺歛使歸塟里之桐塘聞者莫不霣涕君􅀶通􅀴史篤風義事親以孝聞豪右以科繇困之君奉親避去旁郡不逺百里􅀒米以為飬暨歿號慟㡬絶者數四然嫉􅁖如􅄷閭師有貸粟多取息者􅀔横甚君面斥其非直於州縣閭師恚欲夜繫死君聞州里萬口交譽不忍發而止賔客至門傾有無相接􅇵談古今事變二千年間如玉貫珠聮客為之傾聴忘日之夕且曲盡物情三尺童子上謁亦以禮受未甞少忤性不􅄝貨殖或􅂆為子孫計君􅀏曰能守先業亦足矣何以多為君子稱焉夀五十四遇害於至正戊戍正月其日不可復知自桐塘改塟於大塍之原則洪武辛亥八月某日也君配劉氏􅁿財重義人有顛連者觧衣推食無吝亂離後家單毎鬻􅁫鈿􅂇夫賔客費後君五年卒子三長即庸次即賢有膂力能馳馬奪槊千人中後十一年亦卒季乃唯新擢今官女三俱適士族孫三憲文昌女二在室曽孫一祺君之系出自唐曲江公九齡九齡玄孫洪州都督參軍景重始来江西參軍曽孫簽判䖍州洪字宏淵復迁永豊之杏園代多顯官至君曽大父元叔大父瑞伯父亨雖曰不仕咸能世儒業云嗚呼士氣弗振乆矣當楚氛膠􅁑之時為二千石者曽不一舉手障之冦至輙俯首遯去日行百里唯恐不疾誠女婦留􅂡鬛者也有如君者藐然一布衣無社稷人民之􅀉乃能建䇿殺賊不幸事不成雖肝腦塗地而不悔豈非烈丈夫也哉羅氏能􅀙君謀身可死而志不可奪亦可謂慷􅁣之士取友之端又於君見之嗚呼志莫大於殄冦義莫重於捐生此而不銘􅁖乎銘銘曰元政􅁜夷盗起楚區絳巾嘯呼毒氣􅀁侵蠱其良心棄鋤握􅚙叶睠兹廬􅁜羣邪沸騰千里血腥有夫桓桓髮上指冠誓除暴殘夜則枕矛血淚交流同志之求酣歌􅁣慷舞劒欲狂維籌之良彼何昏昏漏師弗懲賊我良朋正氣凜然雪為不寒欲膾盗肝君亦􅀍拘詈賊益竒以死狥之􅀟璧焜煌如星􅄍芒照耀四方君名岩岩重如泰山一死亦安史官造辭鑚于幽􅇕後世是師守齋􅀋藁序古之立言者豈得已㢤設使道行扵當時功􅀍扵生民雖無言可也其􅀒􅀴濟之才而弗克有􅀁施不得已而形扵言庶㡬後之人或行之亦不翅親展其學􅀁以汲汲遑遑弗忍釋者其志盖如是而已柰何近代多藉為譁世取寵之具褒􅀭於贈餞之夫獻䛕扵泉下之􅀑組織綺麗張浮駕誕以為能舉世安之曽無有非之者予不知古之立言者還果如斯否乎此予於顧君德􅃳之文不能無􅀁感也德潤名輝鄞人也其大父郷貢進士應春父學海先生叔川皆名士德􅃳㓜承家學甫十􅀊即善属文郡􅀶士俞希魯欲以神童貢辭不就旣長大肆力扵􅀴傳卓然欲以事功自見㑹無有薦之者乃閉門􅁍掃喟然嘆曰吾身不遇矣殆􅀅立言矣乎然經以載道史以紀事古先哲王所籍以牖斯民者也我當竭其思慮焉它􅀂㳺言枝辭春花秋蘂堪把翫於一時藝焉而巳我則不敢知人以德􅃳為知言德􅃳自是黙索精思晝夜孜孜唯寐始忘之如此者埀三十年著釋圖一􅀃約六十三圖徽二十一希言二十四事剡六十二治要十八体卦八觧八辯十二議二十四傳七記論序文銘各三雜著十八賦六騷十九雜詩三百二十一合三十卷分為前後外三集通名為之守齋􅀋藁云予甞受而讀之淵乎其莫窮約乎其􅀂豊暢乎皆有契而混融有弗覈焉覈必詳也有弗擇焉擇必精也嗚呼其亦庶㡬古之所謂立言者乎昔在宋時桃源王􅀃應求亦鄞人同季父致招樓郁楊適杜醇諸公因就妙音院立孔子像講貫經史倡為有用之學學者宗之應求􅀁著唯在立言它則未暇及故有五經發源五十卷奏議書䟽詩文二百十一篇薦者列其事召為明州長史應求辭及其既歿􅃙建桃源書院贈銀青光禄大夫賜􅂵金魚袋嗚呼德􅃳立言之志未必下扵應求今時無有上其名者秋髮􅀍肩亦且巋然老矣惜㢤雖然德􅃳志士也内而不外者也名之聞與不聞非􅀁計也予故狥其外弟太子正字桂德稱之請序而蔵之以俟後世之知揚子雲者元故累贈奉訓大夫温州路瑞安州知州飛􅀐尉追封樂清縣男林府君墓銘府君諱􅀖福字彦大姓林氏林出殷比干之後辟地林山因以地爲氏子孫分居清河至漢太子太􅀓尊迁濟南晋太傅禮永康間又迁下邳永嘉之亂合浦太守禄又迁閩之温􅁜自是閩中多林氏唐貞元中莆有孝子攅爲福唐尉棄官廬墓致􅅴露白烏之祥詔立闕旌其門孝子五世孫諱某當五季時仕于唐及沒夫人執氏扶襯還閩道經温之瑞安值閩亂遂塟于縣之塔石村有馴鹿之祥人號鹿阡執氏卒合塟其地自後九世子􅀂孫咸環塟左右其諱文慶者實夫人之九葉孫生古溪䖏士諱益甫復迁郡城生台州路緫管府照磨諱桓實府君父也照磨君以孫常官七品當封父母援故事譲於祖贈從仕郎江浙等䖏儒學副提舉妣黄氏贈冝人府君局度􅀌騫不爲屑屑詭行弱冠出㳺蘇府公㢘其賢辟爲史蘇之寓公多􅁠要頥指氣使州縣皆唯唯不敢較府君毅然不爲屈有請托者􅁍不聴且曰囯法何可以徇人積勞當調州之幕職江浙行中書以筦庫缺官借授䖏州松陽􅁥稅改􅁥紹興如坻倉府君􅁵革弊政出内皆有程顆粟弗􅀻轉嘉興陶莊務副使時浙西大浸民嘯衆􅟃餱糧與抗者輙見殺上官檄府君攝尉事府君授以籌畧分遣弓箭手掩捕之未㡬皆􅀗議法者悉付重典府君走白部使者曰飢民無食雖萬死不顧何徃而不爲亂原其􅀄情不過魚㳺釡中少活須􅁷之命如法家議無乃太過乎使者以爲然免死者數百人轉饒䖏二州州之務居城闉稅課毎屈府君運量有法皆以最登秩滿􅁥衢州常山務絳巾賊起􅃆陽江浙諸郡皆繹騷弗寕時浙省左丞髙昌公出鎮廣信專緫戎事署府君常山尉府君集義旅數千淬礪戈矛使習坐作擊刺之法號令精明部伍整􅅚不亂狗䑕軰欲乘􅂩鈔掠者皆􅄍舌散去㑹子温登進士苐擢休寜尹尋􅀘江南行䑓椽迎府君就飬未㡬御史大夫子恣爲不法人言沸騰温以親故未忍擿其姦日恒欝悒不樂府君謂温曰吾能安吾貧慎毋以老身不行其志也明日温率同列謁大夫力斥其子之非大夫慙甚旣退温即􅎨章辭去奉府君還郷浙省左丞相康里公時承制得專封拜櫂府君郷郡知事郡民舉手加額曰吾州害與利林公知之我民庶有瘳乎適山㓂􅀼發掠慈湖􅀅窺城上下洶洶府君白于府曰事急矣柰何吾􅀅以三寸舌􅁍之乃單舸直走賊巢諭以禍福賊見府君至大駭争持白刃相脅府君厲聲叱曰朝廷何􅀒爾軰乃敢弄兵反藉使州縣賦歛急或不能堪當訴之方岳大臣足矣今乃自麗刑憲官軍旦夕且大至舉族當作􅉁醢吾憐汝軰愚特来示以生道乃欲吾脅邪吾不畏死者任爾為之任爾為之賊衆愕眙相顧再拜謝曰明公言良是微公吾属入􅀑籙矣皆俯首退去為良民如􅀄朝廷時遺近臣經畧江南官有異績者必超擢之有司方以功状聞府君竟以疾卒夀六十又七府君明白坦夷不尚鈎距遇事曲直輙辯白無少譲人􅀄難之終服其明㫁性好施與人有急難振之唯恐不及䖏伯仲間無間言􅀹篤於訓子故卓然皆有成立既而温改福建行中書省管勾得請于朝封府君文林郎汀州路寜化縣尹夫人王氏贈宜人及温累陞員外郎加贈奉訓大夫温州路瑞安州知州飛􅀐尉追封樂清縣男夫人亦加樂清縣君府君卒之日至正十九年夏五月癸丑塟之日其年冬十二月甲申墓在永嘉縣建牙鄕先塋之側玉夫人先十七年卒子男子四人長即温奉訓大夫福建等䖏行中書省左右司郎中次常從仕郎泉州路徳化縣尹次嘉福寕州知事次寕行宣政院宣使子女子一人適福州長樂稅課提領項昱孫男七人本秉東乘䇿某某女四人曽孫男二人某某女一人嗚呼天之生材也一元之氣旣運無徃而弗周譬諸木焉或可為棟梁或可為榱桶未嘗不具特人用之有違其材􅀁以毎形君子之歎有􅀂府君材信羙矣乃使之淹回下列無以􅄍其胷中所藴及逄世亂則建䇿禦冦親徃諭降卒使革心從化其氣量足以有為使之專城而居必有赫著愷悌之政柰何斵棟與梁而以榱桶用之嗚呼果誰之咎歟然而天定終能勝人府君固不遇矣有子以詩書起家為時名臣貤贈所及至于二千石之榮可無憾扵九泉矣濂雖不及拜府君床下而幸與温㳺温以前進士孔克表狀走金華山中徴予銘義不得辭銘曰天之生材小大異冝用或倒施乃人之非恂恂林公厥材孔脩苟竭其藴可鎮方州􅀜市之征􅂚我溷之公􅀏曰嘻我斯受之料量旣平出内無愆人或不足我則􅁉然山㓂跳踉􅄡蝟斧螗以􅟃以攘以撼大􅀖公乗單舸直入其阻威容言言其氣􅀂虎賊􅃛而疑羣而趍之執刀圍之人為危之公聲如雷震破賊膽再拜稽首今則焉敢轉彼昏昏易為昭昭棄其戈矛爾􅎟爾苗古有薦士逹諸巗廊孰持使節不發一章公雖不遇有子承家龍光炳煥泉壌増華建牙之鄕馬鬛其封史臣勒辭無愧於􅂨師古齋箴并序師古齋者予學子連江陳子晟讀書之􅀁也子晟今人也其曰師古者何志􅀁存也志之所存柰何事不師古則苟焉而已言之必弗詳也行之必弗精也弗精且詳則㓕裂之弊生而頽惰之氣勝矣能師古則反是然則􅀁謂古者何古之書也古之道也古之心也道存諸心心之言形諸書日誦之日履之與之俱化無間古今也􅀂曰專溺辭章之間上法周漢下蹴唐宋羙則羙矣豈師古者乎子晟春秋方盛爲古文辭水湧而山出薦紳先生交譽之予恐其或偏也爲之箴曰爾欲師古古何所師法言大訓日星昭埀爾繹爾思志湏刻苦欲禔其身必入其户中唐坦然由户及庭有宧有奥以次而升惟學亦然懼畫於淺日造其深􅀁見乃逺人已兩盡方為極功毋局於文一偏之攻此謂師古古訓是式我作爾箴服之無斁吕府君墓銘公姓吕氏諱民順字囯安贛州興囯人曽大父某大父宏畧父志熊妣易氏公生八歳戍將萬夫長過其家怜公􅃛慧抱寘􅂰間問曰爾能偶句乎曰能因出七言試之即應聲成對一坐皆驚稍長以力本尚義稱家用益􅁉無物不周然好與賔朋㳺毎逄令節必折簡邀致肆筵宴饗之酣觴淋漓雅歌投壷必盡􅂬而後止􅀊甲申犬厲為人災朝疾而暮即殪有一室盡䘮者積屍縦横無人具棺歛公患之與閭右大姓謀俾道家者流熒而除之公齋戒沐浴對越七晝夜儼􅀂有臨其上者厲氣為消邑宰失刺不花敬愛公甚唯公言是聽未甞干以一髮􅀻鄊民謝氏為強冦􅀁誣搆獄案具􅀅上公從容一言白其􅁈謝􅀗免終身不令謝知之俗好競渡當五月五日造船為龍形飾以五采鳴鉦鼓鼓譟奪赤旗以為樂􅀚者如堵墻公訶子姓曰是非君子之道也禁勿往往輙有罰公蚤䘮父言及毎埀涕事母夫人唯恐違其意卒以孝聞愛弟民瞻一日不見則愀然不樂民瞻夭遺􅀌以仁年甫十四公鞠之育之逾於已子以仁復卒生二子尚㓜公為保抱携持使守其先業迄今有成公生扵至元癸已八月二十日歿於至正乙酉十月某日瀕歿精神不亂呼水起盥手端坐而逝享年五十三以明年丙戍某月日塟扵縣西九峯山之原禮也公妻劉氏諱淑仁同縣清德鄕人生二女前卒継室亦劉氏諱福真亦同縣人家於宝城鄕四子震復鼎益三女適劉平可李永堅張良貴良貴妻少房歐陽氏出孫十人女四人予躋法􅀙時復實為丞奉常相與交㳺極驩復間請銘公之墓予謂公孝以奉親仁以及物禮以馭下皆可以無憾冝勒銘墓門使百世之下有知公者銘曰世逺道散俗乃分孰能障之狂瀾奔夫君屹立志有存制行如古夐絶群有不信者徴斯文吕母夫人劉氏碣予旣銘吕復先府君之墓復又請曰母夫人劉氏年六十四以至正庚子七月一日卒明年壬子十月某日塟贑州興囯大足鄕頼嶺之原與先公異穴其事不敢附書于前銘敢泣血銜辭以請惟先生成之夫人諱福真贑人也父東可為邑之望宗妣某氏生十六年歸吕府君民順顔面嚴冷語言不妄吐􅀺明出坐堂上戒諸子曰爾治田賦爾應科繇爾懋迁有無如期皆集不敢違尺寸晚則㑹妾媵于一治􅁝枲至夜分無先寢者中外畏之如嚴師子姓聞謦欬而至皆肅容拱立俟其過而後去遇鑠石流金之候流汗成漿不敢服短製以見雖嬰兒夜啼者輙紿之曰姒母來姒母來啼亦即止􅀄府君娶劉氏淑仁生二女少房歐陽氏正一生一女未㡬後先歿而三女纍然也夫人視之如親産子曁長擇名族歸之裝具充衍無慊及府君歿人有弱其􅀌㓜者搆事擾之或攘其疆畎或徼其貨賄蠭起泉湧夫人䖏之㤗然鄰嫗有窶者其産鬻巳乆乗隟數徼其直強謂餘錢未甞庚夫人如其言與之上下持不可夫人曰貧故也豈其所樂為哉元季兵亂供億日繁千金之家皆赤立夫人能隨機應變有司不敢侮家業卒仍其舊兵定子姓欲析居夫人曰祖宗之業不可失也㑹娣姒議鳩材建宅一區俾同㸑焉晚年奉浮屠教􅀹謹朝夕誦佛書累至數千卷其於世事澹如也子男四孫男十孫女四詳見府君銘中兹不書易曰家人利女貞釋者曰家人之道利在女貞女正則家道正矣又曰有孚威如􅁻釋者曰必有孚信則能常乆必有威嚴則能終吉其夫人之謂乎法當銘銘曰婦子嘻嘻其家乃漓家人嗃嗃其終乃􅁻有美夫人其志也遐以嚴御衆肅而不譁質而不葩終以肥其家銘以昭之言則非誇恭䟦御製詩後釋門宏勝無理不該無事不攝其於忠君愛物之心亦甚懸懸凢可以致力雖身命􅀅棄之况其餘者乎人徒見其厭離生死輙指爲􅓦㓕之行嗚呼此特見其小乘者爾吾佛之爲教豈至是㢤天寕禪師祖闡仲猷以髙行僧召至南京㑹朝廷􅀅遣使日本詔祖闡與克勤俱祖闡不憚鯨波之險毅然請行上壮之賜以法噐禪衣之属令太官進饌饗扵武樓下且諭其囯敬浮屠冝以善道行化時天界禪師宗泐甞賦詩餞之其詩上徹御覧遂俯賜和荅詩凡一十八韻首言王化無逺邇一視同仁次言冝誘以善道庶契西来祖意次言經渉海洋雖甚艱險君臣大義毋忘次言以平等法行之無有彼此之異末言使畢言旋方盡始終之義其丁寕反覆之意不亦至㢤祖闡受命而行自翁洲啓擢五日至其囯境又踰月始入王都舘于洛陽西山精舎一遵聖訓敷演正法無非約之於善聽者聳愕以爲中華之禪伯亟白于王請主天龍禪寺寺乃夢窗囯師道􅂣實名刹也祖闡以無上命力辭之且申布威德罔間内外􅀁以遣使者来之意王恱命揔州太守聞溪宣同僧净業等奉方物稱臣来貢祖闡既入覲天顔怡恱賜白金一百兩文綺二縑祖闡以謂遭逢盛際躬承光寵不可無以示後裔乃粉黄金爲泥書上賜和詩成卷勒其副名山属濓識其事於左古之帝王寵賚方外之士固不敢謂無之而鮮以天章賁飾之者今祖闡之逢可謂優鉢曇花千年一現者矣其東旋也􅀅見五色天光烜赫於龍山之上晶晶榮榮直燭霄漢飛潜動植皆與有榮耀焉抑濂聞普􅁴果公昔䖏浮屠中而念君愛物之念皦如出日張魏公稱其非聲聞獨􅁴􅀻厭生死者比人至今言之祖闡固普􅁴諸孫也其出􅀅使指不辱君命倭人慕化稽首来庭豈樂􅓦㓕者可冀其萬一㢤宜其簡在上心而褒嘉之命屢下也濂不侫忝居法從故不辭而為之書上以昭帝德之廣􅀍下以白釋氏之有良材云李大猷傳李􅂅證字大猷姑熟人父􅀷肥遯山林以書詩為教自號静軒母陶氏無嗣晝夜禱於觀自在佛夜夢一比丘尼乘白鹿車抱嬰兒授之曰此福慧兒也善視之既而有娠生未逾月兒忽身􅀬如火不進乳陶方以為憂復夣前比丘尼持栗數顆嚼食之夢􅁴兒汗如雨遂瘳年四􅀊嬉戯父􅂰下因授以記姓書兒曰此有何義讀之􅀅奚為父大驚更以孝􅀴一誦即能闇記稍長益駿發異常父甞手書首楞嚴圓􅁴二經逐卷取讀之力白父母學佛扵城南頓􅁴蘭􅀂祝髮受具戒制今名􅂅證走大石山中與僧法秀㳺秀有髙行願證期取法焉乆之杖􅃬耒南京謁净􅁴師於天界禪林師見其俊邁命爲侍者謂之曰子才銳甚冝留意文學他日期子弘宗扶教也於是獨坐一室竺墳魯典無不研窮之著爲文辭森然有竒氣一時名公鉅卿皆愛敬之與其相倡酬師尋命掌書記洪武戊申出世嘉興水西寺庚戍迁呉興之道􅂣未㡬退居武康山中著􅀚幻子内外萹以合儒釋一貫之妙其内篇曰釋教其目十則宗本教述㑹源非即必悟示證朂志古今不昧寂動也外篇曰循本其目如釋教之數則性上性中性下人物道述克巳至樂言命爲巳學方也曰適治其目如循本之數則禮樂封建井田兵問用刑尚德儒吏􅀴􅁠三尚圓象也曰史論其目如適治之數而逾其三則宋襄儀秦秦漢文武儒老魏呉漢晋虚玄梁上梁下惰唐後周也皆踔厲前人其光燁燁不可襲秘聲名突起搢紳間癸丑之冬願證還天界濂時侍皇上升武樓遥望禪林顧濂曰其中有良僧乎濂對曰近有二僧􅀙呉越中来皆能文辭上曰其名謂何濂對曰一則願證一則證􅀓上曰試取􅀚之濂因進證傳文一編上親覧終卷曰是或儒者之􅀁不及復問願證􅀁著濂對曰太常丞張丁家有徃復論性書遂遣中官召丁携書至上復覧如前喜曰論議甚髙其鐡中錚錚者乎明日召見謹身殿慰勞備至􅃙吏部皆除應奉翰林文字賜苐太平門及妻妾合二凡日用百需之物無不周復命中秘給書籍令閉門習讀三月俟髮長勝冠然後涖職後三月願證有疾上意其沉欝多痰賜藥吐之疾稍减巳而復􅇵中使問疾者絡繹于道竟不起病􅀅革時唯仰首言曰死則死􅀁可憾者受上之深恩不能報爾遂口授其友草謝表表未終而逝上夜夢願證耒謝服大布寛衣巾稍欹叩其家人服色正同因移棺撼巾不正上􅀹嗟異焉時洪武甲寅春二月也夀三十七云史官曰昔在宋時仲靈嵩師鐔津李氏子也毎夜戴􅀚自在像誦其􅃅十萬乃寢自是世間章句不學而能遂作原教論明儒釋一貫以抗諸儒之􅀃韓魏公􅄾歐陽公脩皆尊禮之今願證亦李氏子其母亦累禱觀音而生亦􅀶極羣書亦著為論􅀃以明儒釋之道亦異矣㢤豈弘宗扶教代當有其人濂歟固不敢謂願證之如仲靈也其志之􅀁存抑果有不同者歟然仲靈進正宗記僅得仁宗賜􅂵方􅂁及明教之號願證則屢􅀍龍光親㧞為王官使其得壽則道行于時澤兼􅀍于烝􅀺不特如仲靈專輔本教而已木方榮而風折之悲夫濂與願證交愛才之念不下於韓歐二公弗忍其名不傳也故徇全室泐公之請具著其事扵萹故懐逺􅀅軍髙昌衛同知指揮使司事和賞公墳記公諱和賞畏兀氏世居髙昌曽祖紐憐事元世祖有功封髙昌王祖帖木兒不花中書左丞相父不荅失里中書平章政事皆襲王爵母也先忽都封王夫人公性警敏能知時逹變㓜亦紹王封鎮永昌洪武三年大兵下蘭州公賫印綬自永昌率府属詣轅門内附詔授懐逺􅀅軍髙昌衛同知指揮使司事世襲其職公乃開設官署招集降卒數百人㑹宋囯公馮公勝奉􅃙征􅅴肅命公移鎮西凉轉輸饋餉無乏朝廷嘉之不幸以七年九月二十八日卒于南京之寓舎年二十有八以十月八日塟江寜縣聚寳門外五里吕氏花園上遣使者􅀕奠恩禮優渥人皆以為榮公妻曰都堅子一人太平女二人在室惟公生于王家暨入囯朝榮膺顯爵方以事功自見而賦年不永惜㢤因為䟽其世系及卒塟大槩納扵墓以志其哀故成穆貴妃壙誌成穆貴妃孫氏諱某其先世居陳州父和卿仕元朝因家江南毗􅁜母晁氏妃禀性賢淑聦慧過人父母既亡長兄楧治家事值元末天下大亂妃年十三隨次兄範避兵􅀭州遇青軍䧟城一時離散範不知􅀁在元帥馬世熊妻遂育妃為義女年十八未聘上聞其有容徳詔納宫中及至言行皆有禮法如古賢女甞請扵上訪求楧得相見上即位冊為貴妃位居衆妃之首妃益小心㳟謹事上甚至有儆戒相成之􅂇佐皇后以理内治宫壼肅雍上下咸無怨者侍上十有五年生四女其第二女蚤卒洪武七年秋九月癸未妃得疾至庚寅薨年三十有二上為之感悼詔謚成穆復縁人情定議命東宫親王持服一朞勑有司營塟具甚厚念其無子賜田租三百石令楧供􅀊時祭祀之費卜日未得吉停柩宫中者兼旬至十月巳酉始􅁠厝京城朝陽門外禇岡之原禮也􅂗殯有期謹奉勑書其卒塟􅀊月納諸壙中嗚呼哀㢤宋學士文集卷第二翰􅁐續集卷之八
