  text: 宋學士文集卷第五十芝園集卷第十
  hash: sha256:8848447a8affc3361a68b8343a8a3889b8befe3e4451f94e230bea15023e1f3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_050-1a}
body:
  text: 北麓䖏士李府君墓碣䖏士姓李諱士華字庭實北麓其自􅃅也其先家廬􅁜唐開元中逺祖徳靈仕為撫州長史因居屬縣之崇仁髙祖昻宋太學上舎生曽祖緘以春秋舉進士至某官祖适父元徳母盧氏䖏士賦才瓌異音聲如鍾㓜䘮父母二兄亦蚤世時當宋季亡頼男子學㺯兵扵村疃暮夜擊人門鈔掠其訾財以去稍與抗􅀡剚以刃䖏士􅀎自衛卒免其患㑹宋亡為元更易方笠窄䄂衫䖏士獨深衣幅巾翺翔自如人競以為迂䖏士􅀏曰我故國之人也義當然爾府君善治生未㡬家大穰遂以訾雄鄊里積粟􅀊至數千廪遇饑則平價出之飢餓不􅀎出户者計口而周之活者恒百餘人宗婣無業班財以為饋死則給棺槨衣衾塟之善地且䘏其遺孤唯恐不及􅀒逋不􅀎庚者苟有􅀁乞􅂺再與未甞有靳色或以田廬為償䖏士正色責之曰先人之業何可廢壊逋尚可紓也慰而遣之伻有盗廪粟者矜其貧益之使去識與不識咸目之為仁厚長者云㑹朝廷有鬻爵之命富家兒多競奔䖏士恬不以為意客以空名告身来售䖏士曰吾愧不􅀎以文學干禄位而渉銅􅆨之譏雖貴奚益㢤府君性純孝􅀎事繼母如親母雖其性剛嚴不可近必下氣婉容得其驩心而後止常以不及終養二親語或臨之輙嗚咽流涕晨昏必展謁先祠遇􅀄度之日􅃅慟抵暮家人不􅃘見因諱言之訓諸子以學親自督視不至夜分不休也為人豁逹大度不少貶以狥流俗見假巫􅀑惑人者力斥去鄊人闘争㫁㫁然正讙折以片言則免􅃣頓首謝嘉賔欵門倒屣出迎驩然無倦容雖不觧飲必使盡醉而去元至正十一年辛未正月五日以無疾終夀八十六後二十二年當國朝洪武五年壬子塟于縣之大龍山之原娶郝陳二氏子四人彬鎬鏞蕃鎬以文行舉于朝擢國子正女三人丁師周晋戴尚徳其壻也孫三人雝家奴寳㝎孫女三人尚㓜曽孫二人宜夀普蘭曽孫女二人在室自夫仁厚之俗衰學者慨想三代之盛猶神龍㳺于玄間欲一見之而不可得嗚呼豈其然㢤人有古今心無古今有如䖏士之行如前􅀁載苟謂之三代之民孰不謂然䖏士不可作矣予故特表出之以勵夫人人然而仕之與否是有命也不必爲䖏士惜也銘曰祥麟威鳯􅀮而弗彰苟一出焉是爲希世之祥謂之有邪則固不􅀎以凾見謂之無邪則簡䇿􅀁紀何爲其周且詳吾謂䖏士爲三代之民亦是􅀋耳世之人無徒委之扵渺茫緬懐徳人中心孔傷今其巳矣何日而忘貞婦郭丑小傳郭氏丑字道安六合人也羙姿容其父彬授之書詩輙通大㫖母劉氏得末疾諸弟妹尚㓜羞服無􅀁􅀝頼道安上扶掖母氏起居下撫孩穉潄澣紉綴之事皆親之冬盛寒燈火蕭然持箴恒至夜丰不休且不樂靡麗身衣紈素同綺繡女偕坐畧不動容目亦不注視至扵纂組烹飪不經師授而悉精其􅀎彬絶愛之不肯歸凢子同里鄭玄来求昏彬激曰而􅀎従師攻文辭即可爾玄乃力學道安年十九竟妻玄婦道甚修譽起一鄊間玄以古列女傳難之道安曰某女事如此某女事如彼一一舉之無漏文玄不􅀎屈因加進學功其父讓不恱痛䋲之玄悒悒不樂道安曰子但盡誠盡孝他非􅀁知也瞽􅅱底豫之言豈猶不聞之耶玄釋然道安秉性堅貞彊暴欲侵􅇒道安厲色叱之去其人恃為尊属屡見白道安彈指出血曰父誤我矣父誤我矣不幸遇此唯有一死爾媵人勸曰何不告夫君知之道安曰吾苟白其故父子何靣目相見耶曰此人倫之變宜走訴父母使其知􅀁忌不敢肆道安曰秪楊􅁖聲耳無益也不若就死之為安日向中道安潜出沉于河時洪武十年七月十七日也彬聞之悲􅁒無生瘞扵楊子西沙清水潭上一夕玄夢其来車馬儀衛甚都且曰妾今在長蘆水府掌鉤考人間善􅁖念子索居故一来耳不可乆留也言畢颯然如雨風而去次夕其姑夢亦如之長蘆在六合城南二十五里云史濂曰郭氏素稱詩禮之家婦人女子亦有異扵人彬之姊真適許士瞻生一女而士瞻死年始二十三耳今垂五十而節操􅏮然而道安又貞烈如此誠可謂而仰㢤傳言忠節之人殁必為神明長蘆之事雖近誣亦不敢謂决無是理也嗚呼新㙜之什孔子刪詩而不刪去者其垂訓也逺矣㢤宋學士文集卷第五十芝園集卷第十
