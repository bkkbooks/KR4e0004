body:
  text: 大明故王府參軍追封縉雲郡伯胡公神道碑銘上天既革元命皇帝㝎鼎金􅁜遣大􅀅下浙河東諸郡而婺衢䖏三州相􅁇平時當草昧之初上思得智勇之才用之扵是䖏之胡公仲淵躍然而起以自赴功名之會入陪廟筭出鎮郷􅀖言聽計􅀙寵遇無比浙東之俊彦攀龍鱗而附鳯翼者皆自公始若公者可謂犖卓不羣之士矣公諱深仲淵其字也系出漢安㝎宋初有諱棟者自潤之丹陽遷䖏之龍泉因家焉棟生璠璠生文虎文虎生竦竦生晟晟生滂滂生衢州録事參軍松年松年生郷貢進士應辰應辰生温州樂清令㻑㻑生江南西路兵馬都監見大則公之曾大父也大父諱堂父諱鈺仕元為征東行中書省左右司員外郎母趙氏生三子公其長也次曰潭曰海継母季氏生一子曰溥員外府君蚤􅀊䆠逰京師公始十齡而大毋季夫人與母夫人相繼亡公侍大父奉􅁇母撫幼弟艱難刻厲以自植立未弱冠走京師侍府君適府君使髙麗復徃候焉居乆之府君棄􅂢舘舎公﨑嶇萬里奉柩南還舟行一日泊大崖下夜夢人語之曰此崖且崩宜急避驚覺趣移舟俄傾大風雨至崖果崩聲如萬雷既歸塟扵縣北之圍源遂廬扵墓左悉取諸子百氏天官地志兵謀術數醫藥卜筮老釋之書而研究之發為文辭操筆可立就當元之季江淮俶擾􅕃延閩浙間盗由建之浦城松溪入龍泉公嘆曰淛水東地氣白矣􅍔􅀅及乃集郷兵結寨于湖山巳而處州之民相挻為盗江浙行中書省調萬户石抹公冝孫戍䖏州辟公參謀軍事檄􅀁隷諸縣募壮士為軍浹日間得數千公引之屯竹口下令賊中曰爾皆良民也因驅迫故為亂棄仗即仍良民矣賊以公長者其言不欺盡毁旗械肉􅃝請降温州戍卒韓虎陳安國殺主帥㩀城叛行省命宣慰使恩寜普公討之道由䖏州與公語意合帥府軍事復辟公參謀之公曰温城叛者唯一二人耳若破其城玉石必俱焚如平民何遣辨士入城􅀃其黨曰韓虎悖􅊇亂常今王師四集旦夕且攻城雖金湯無不破者若軰胡為與賊守自取作虀粉耶􅀅軍未􅃘即加兵苟䏻去逆效順悉􅀙原宥或稔惡不悛城一破悔無及巳其黨相向泣曰吾属自度旦暮􅀑耳儻􅀗復生敢不唯命乃殺韓虎等以城降温城頻海民以漁為業時城閉者三月民病甚公請發粟賑之驩呼之聲載于道路宣慰欲列公功聞于朝公辭既而宣慰以行省參政總兵征鄱陽復邀公俱行戎務無鉅細悉屬之青田潘惟賢聚衆為叛龍泉長吏聞風遁去賊遂焚縣治公之師曰王毅先生與門弟子集義兵搗退之里中惡少年疾其功因害先生公在鄱陽馳而歸執害先生者盡殱之縉雲之黄邨松陽之白巖遂昌之大社麗水之浮雲泉溪無頼之氓咸爲盗根􅀔蟠結不可禦行省丞相康里公承制以石抹公為行樞宻院判官分院鎮䖏州既至假公分院行軍都事統兵討麗水攻泉溪賊寨㧞之未幾又平浮雲白巖賊懼遂来降縉雲盗亦就平乃移師攻遂昌賊酋周天覺方友元傾其精銳出迎敵公望見咲曰賊若堅守不出未易即殄㓕今兹之来豈非天授我乎分部諸校以正陣接戰以竒兵夾擊之别遣㳺軍入山搜其伏匿比戰賊三面受擊輒大敗斬首數千級生擒八百人􅀗方友元梟之乗勝直攻大社周天覺降復移兵討青田賊黨金徳安殺潘惟賢兄弟以降先是國兵取浙東婺衢既下獨䖏州為石抹公􅀁守不降􅀊巳亥今上皇帝遣僉樞宻院事胡公大海由間道取䖏州石抹公出戰敗北大軍入城而分兵取屬邑未附者公時以假元帥統龍泉慶元松陽遂昌四縣兵欲閉關為拒守計四縣士民咸請于公􅂅內附以全民命且曰君治兵殆十年勤勞亦至矣而朝廷無一命之錫國家負君君何􅀒扵國㢤公知時事巳去乃觧甲出見胡公四縣因不受兵上素聞公名召至南京待以殊禮居亡何擢中書左司員外郎上日與公論天下事公有言未嘗不稱善也遂詔公還䖏州招集舊􅀁部􅀅校兵卒以􅀙征西上既平江西命公以親軍指揮守吉安會浙東苗軍為變婺守􅀅既􅀍害而䖏城亦為􅀁據上遣公復䖏州比至城已復除公浙東行省左右司郎中總制䖏州軍民事郛郭甫􅀍兵民物凋瘵而山㓂乗間竊發人情未固公随方招捕凡首惡即誅之然猶慮戍兵之寡日募之􅀗勝卒萬餘人諗于衆曰兵少不􅁕禦敵師衆又無以食之柰何衆皆曰飬兵􅀁以衞民苟不為禦備計子女玉帛且不保况扵食乎公乃因民之産以權宜増帛賦之㳂海軍素驕横及是以復城有功横益甚公擇其尤無良者斬之衆乃讋服江西食東浙塩而有司十分稅一販者鮮至公請以二十分􅀵一商賈遂通城南枕大溪浮橋之癈巳乆橋隄當水之衝亦爲􅀁齧蝕幾盡公即上流比舟爲梁以濟行者州學敝壊講舎僅存用以貯官䅇公撤而新之薦新進士吳世昌爲郡文學以司教事城中民廬多爲戎士􅀁據混淆而䖏公度閑曠之地建營屋􅁆十區使别居之縉雲官田其稅額甚重執里役者恒以􅀻粟代償公以新沒入之田實其數其害乃除諸暨守􅀅謝再興兵犯東陽平章李公文忠擊走之公引兵爲援建議以謂諸暨浙東藩障若諸暨不守則衢䖏不支矣乃度地去諸暨六十里並五指岩新築一城不旬日而成樓櫓濠柵靡不畢備上聞諸暨叛遣使来議别爲城守計暨至城巳完上嘆賞不已其後浙西􅀅李伯貞大舉入㓂兵􅃅二十萬頓城下城堅不可攻敗績而去上念公立城功以名馬賜之青田之蘆茨地接閩徼人素獷得葉仲賢恃其險屢服屢叛乗我師在外復来㓂公怒還軍深入禽其渠魁少壮者皆籍為兵二十年逋誅之盗一旦就平温州方明善攻我平陽公出偏師復之并復瑞安􅀁侵地而親統正軍攻温州明善勢蹙與其仲父國珎議納􅀊幣詔公還師明善継以塩若干来貢上命䖏州易銀以入内蕆上怒銀色惡責守令使償公曰此吾過也守令禄薄何䏻償乃售龍泉田以銀九百兩代輸公尋入覲上欲㽞公且柄用之以􅁁事未輯􅂅還守外上時巳即王位乃擢王府叅軍仍總制䖏州等翼陛辭上喻之曰俟閩浙盡平當還汝中書矣福建陳有㝎擾􅁁公奉命征之遂取建之浦城而崇安建陽二縣亦下上賜以􅀁乗駿馬建之守将阮徳柔兵四萬屯錦江實出我師後公還兵擊之破其二柵有㝎大愳帥銳卒亟圍我營公突陣與决􅀾馬蹶因􅀍執有㝎既得公頗禮遇之公具道天子仁聖四海歸心羣雄樂為之用且援竇融歸漢故事撼之有定􅀄無殺公意㑹元使至督迫之遂遇害于福州實􅀊乙巳之春也享年五十有二上痛悼不巳命使者即其家祭之復詔中書議加䘏典追封縉雲郡伯有爵而無階官職勲者有司之制未備也公天資頴㧞智識絶倫藝術弗學則巳學之無不精性倜儻好施予賢士有貧乏傾槖以周之弗吝也其守郷郡凡五載馭衆一以寛厚用兵十餘年未甞妄戮一人恩惠在人甚多故其殁也聞者莫不流涕郷人為立祠宇祀之公元配同里項氏先五年卒生二子長曰楨宣武􅀅軍僉䖏州衛指揮使司事次曰樞女一人適章存原継室滁陽楊氏前中書左司郎中元杲女弟也公既沒之二年楨等乃刻木為象具衣冠以塟實附于圍源之左􅌾巳来徴濂為之文昔濂侍上扵白虎殿忽顧問曰胡深何如人濂對曰文武才也上曰誠如卿言浙東一障朕方頼之則上􅀁以􅀝公者至矣然公亦知宸眷之􅀷而無以圖報甞謂人曰區區承詔鎮處城皇靈覆冒􅄑巳寜謐誓將挈全閩之地以入版圖庶展犬馬之微􅂨也柰何功業未就而死及之其非命也夫濂辱公交者五六春秋見公酒酣耳􅀬指揮三軍而䧺姿􅁬􅀭不可遏及與薦紳之流論文評詩則欿然布衣書生也濂未甞不服其勇而愛其謙今公不可作矣敢用備著公之事掲諸墓門以告世之知公者銘曰洸洸胡公萬人之英一劍横空莫之敢攖浙河之東地氣盡白此為兵徴見扵􅀛筴尓衆荷戈来入我堡寘而枕席㧞而水火公師如風䑕冦如雲一鼓之餘散為埃塵莭􅃏出鎮􅍱歷五年桴鼓不驚鷄犬晏然誰登叛人䧟我諸暨公遷其城㓂至輒敗皇用嘉錫使車絡繹天閩龍馬扵公弗惜公感主知酣歌慨慷誓提八閩以歸職方旄纛􅀁屇勢如破竹天未厭亂三軍夜􅂘公材孔多公志弗阿月出如赭公命柰何丈夫之澤流于異方孰􅀎行之父母之􅀖匪公之臨千里枯骴公雖止斯庶亦無愧廟堂有嚴肖象其中精靈翕然上與天通栝蒼之山其翠􅁒滴公名配之有永無斁大明􅃙賜開國輔運推誠宣力武臣榮禄大夫柱國廣徳侯加贈特進榮禄大夫右柱國進封巢國公謚武荘華公神道碑銘自古興王之際天既生真人拯民塗炭之中必有如虎之􅀅弘展其丕猷弼成其大業此如燭照而􅀛卜盖無疑者以漢唐言之則雲臺二十八􅀅􅇒烟閣二十四人是巳洪惟皇帝當四海逐鹿之秋龍飛淮甸嘘陽吸隂反掌之間廓清八極夷荒蠻徼罔不臣妾當是時謀臣猛士效忠宣力其衆如雲若和陽華公亦其一人也歟公諱髙姓華氏字則未聞􅀁謂和陽則其􅀁居之郡也曾大父汝徳贈中奉大夫湖廣等䖏行中書省參知政事護軍追封武􅁜郡公曾祖妣張氏追封武􅁜郡夫人大父某贈資善大夫湖廣等處行中書省夫湖廣等處行中書省平章政事迨夫大統既集帝念将帥百戰之勞㝎功行賞上則公爵次則侯封各錫以鐡劵金書傳示子孫俾世其禄扵是授公開國輸運推誠宣力武臣榮禄大夫柱國封廣徳侯食禄六百石公未及受劵請命徃廣海廵視城陴整􅅚軍隊行次崖州以疾薨于官舎年五十又九實洪武四年三月二十七日也訃聞帝懐悼不巳詔有司迎公之柩以是􅀊六月某日還塟扵黄墩先墓之次蔵劵墓中以慰公扵九泉且進封巢國公謚曰武荘階加特進勲加右柱國褒崇之意無不備至公一子景春蚤世竟無嗣續其配澧國夫人􅃽氏先薨至是與公合􅌾焉既塟禮部以聞帝若曰其令國子司業宋濂製為碑銘樹諸神道尚書臣陶凱即日傳命授臣臣不敢辤臣聞傳記􅀁稱用世之士非才勇為難而炳扵㡬先者為難公當羣䧺疊奮之時亦欲以一障自效見帝之頃即知天位之有在人情之􅀁属統其部曲驩然来歸非有先㡬之識者􅀎之乎其建樹功烈安享尊榮爵封上公位躋極品亦宜也雲臺凌烟之衆又豈得專羙于前乎臣既歷序公之戰功次苐扵右復繫之銘辭曰士之􅀁貴炳干幾先誠􅀗􅀁依身名兩全當元之季王綱觧紐羣雄虎争鹿知誰手維武荘公家于和陽依水建砦以遏㓂攘皇帝龍興知為真主仗劒相􅀙率先多士帝曰俞㢤爾兵我􅀙即麾義旗同渡大江牛渚既殱于湖亦捷溧水洋洋視如一髪天兵載楊翔颷震霆秣􅁜南徐次苐而平况此江隂勢如破竹兵鋒􅀁向無彊不衂鄰有勍豎據浙連淮来撼大樹何㢤蚍蜉叶皇赫斯怒命􅀅行伐鏟破連營洊除窟穴復􅃙雄師㝎淮之東載綏載寜載約其同凡斯諸役公無不與展力攄誠亦云備至天清地寜六合一家大統既㝎論賞有差黄金鏤書鑄鐡為劵作誓剖符千齡弗變皇恩下􅀍􅀅􅈾寵榮訃来海南聞者涕零宸􅂨憫惻為詔郡縣旋其柩車就郷而窆崇階峻爵極于上公龍光有赫賁及幽宫儒臣作銘播􅀭嘉績百世之下視此貞刻元故嘉義大夫禮部尚書致仕贈資善大夫江淛等䖏行中書左丞上護軍追封譙國郡公謚文節汪先生神道碑銘濂奉􅃙總脩元史凡忠義循吏之事天下郡縣悉上送官而宛􅁜汪先生獨闕既而先生族子克寛来與纂脩始以其門人汪文炳􅀁摭事状相示濂既命史官删削立傳克寛以為史乃一代成書其法當略墓文乃􅀻家􅀁譔其紀宜詳復致其孫徳垕之言請濂掲銘于隧上嗚呼先生之徳之盛海内孰不知而􅀁讞錢珎之獄泰㝎實録中嘗書之其可不備載以昭示方来乎先生澤民字叔志姓汪氏其先新安歙縣人自唐以来為官族五季之􅀄兵馬使都虞􅀱道安始自歙遷婺源之還珠里又歴八世至宋天禧巳未進士祕書丞贈光禄少卿震生慶暦癸未進士都官員外郎贈中大夫宗顔都官生皇祐壬辰進士左奉議郞知漢陽縣贈少傅榖又自婺源遷饒州徳興之龍溪少􅀓生贈通奉大夫槃崇寜癸未進士正議大夫端明殿學士藻藻以文學政事為時名臣通奉生紹聖丁丑進士朝散大夫江西轉運使愷知合肥縣贈中散大夫慥又自徳興遷宣州之宣城子孫遂為宣城人中散生紹興庚辰進士通判隆興府鴻舉鴻舉之弟脩舉則先生髙祖也曽祖諱宰臣贈朝奉郎祖諱夢雷淳祐􅉝丑進士累官知靖州元贈翰林直學士亞中大夫輕車都尉追封新安郡侯父諱鼎新用父􅄻􅀘􅀅仕郞元贈嘉議大夫工部尚書上輕車都尉追封新安郡侯工部之兄鼎亨景㝎壬戍進士官池州大軍酒庫然自少卿至先生奕世科名蟬聮不絶先生自㓜融通經史亦銳然思継承之㑹科目之法行遂領延祐甲寅江浙郷薦上南宫不利有司用恩例署寜國路儒學正暨再舉遂擢戊午進士苐授岳州路同知平江州事階承事郎時先生之母譙國郡夫人王氏春秋巳髙先生以平江道逺不可迎飬上書丞相府乞降一二階就銓鄰州不報竟奉太夫人之官州有徤民曰張以利餌長吏持其隂􅀻使不敢問遂視閭井民若蟣虱頥指氣使輒奔走不暇稍迕其意即繫送于官人懼呼爲張雷公先生曰弗治我民􅀅無生即發其姦屏諸蠻夷不使與良民齒李氏有兄弟者三素豐扵貲季弟未有子而没其婦傷季之夭也誓終身不再適孟仲利其財數設計撼之婦堅不動乃嗾亡頼男子誣以姦􅀻婦不禁搒掠自引伏先生見其色有􅁈間行㢘察之悉得其情白而出焉轉承務郞南安路總管府推官戍將朶児赤䟦扈自用搤有司之掔俾不得詘信其婣家王某爲郡府史藉其威尤鴟張無忌擅箠大􅁃縣令縣令訴諸府同官懼戍将之威相視以目無人發一辤先生毅然捕王下獄會監察御史行郡戍􅀅結以厚賂御史召先生扵庭詰其獄状聲色俱厲先生徐曰王之姦賂人􅀁知也御史􅁒屈法邪御史慙夜半馳馬去王卒伏罪居亡何戍􅀅以􅂍敗部使者知其故檄先生推讞杖罪之廣州􅀊侵民大饑疫癘洊臻死亡相枕藉其毒氣􅀁薫蒸鮮有􅀎生者江西行中書屬先生行振荒之政先生絶無􅀁畏懾命大姓發􅅒以哺尫羸其病癘方熾者召醫注善藥親走其廬給之活者􅁆萬先生暨􅀙者亦無他虞􅀅還送者讙曰我父母也柰何去之馬擁不䏻前潮州府判官錢珎挑推官梁楫妻劉氏不􅀙誣楫冒糴官中米殺之獄中事連海北㢘訪副使劉安仁逮繫者二百人中書移問者凡六各懐顧忌事終不白先生讞之獄立具時珎巳飲藥死詔戮其屍安仁坐受珎賂除名時朝廷遣奉使宣撫江西聞先生名命巡南安章貢二郡事得專决聲績尤著擢承直郎信州路総管府推官丁內艱不赴服除遷平江路総管府推官階承徳郞􅀄浮屠甲與隣僧乙有􅂩乆不相周旋衆約其輸平乙因邀甲飲酒至醉遂寝其室甲弟子沈安素苦甲鞭笞且期速紹其業􅄑甲宿于讎夜持刀徃殺之明日訴諸縣乙虐扵考訊輒誣服獄上先生閱其刀有鐡工氏名召公驗焉曰此沈安刀也逮安一訊即承脫乙械械之嘉定地瀕海朱管二姓為姦利扵海中致貲鉅萬及以他事敗上下受其賂莫敢捕獄乆不决先生與總管道童公適至徑􅅞以来竟籍其家及徴其倀曆備列省憲郡邑受賂之數唯先生及総管名下䟽曰不受陞奉議大夫知濟寕路之兖州兼管本州諸軍奥魯勸農事磁陽負郭之縣也孔子廟學乆不建先生以為風教􅀁繫買地作之殿堂門廡及齋序之属無不具飭襲封兖聖公職止三品先生以宣尼之胄不可以弗崇上跣請增其秩廷議韙之奏陞品為苐二錫以銀章居一年政化大行絃誦之聲周達乎西東圜扉之間可設爵羅嘉禾生扵縣郊瑞麥孕扵洸水君子謂有漢循吏之風焉㢘訪使者行部􅀅壓境還曰汪兖州在吾可無往矣至正癸未詔脩遼金宋三史拜先生朝列大夫國子司業俾分修兵志及宋理宗本紀史成有上尊束帛之賜巳而除集賢直學士太中大夫未數月亟上納禄之請以嘉議大夫禮部尚書致其事先生既歸僦屋以居門生弟子援洛中諸賢故事爲築室宛水之濵先生日督諸孫讀書以自娯不知其貧􅀊壬辰蘄黄紅巾彭黨祖搆亂其餘孽自徽冦宣州江東部使者道童問䇿扵先生先生語以􅀵人心振士氣築城浚濠儲粮簡卒凡數十事冦再至再擊退之乙未夏六月長鎗叛帥􅃈南班程述等挾兵渡江欲犯宣城城中兵不滿數百或勸先生去之民曰先生忠孝人也天必相之當相與守城若果去之吾属亦随之尔部使者不八沙周伯琦二公復申民言以爲請先生曰昔江萬里寓鄱陽大軍逼城衆皆赱散猶坐守以為民望况宣民離合視吾去㽞吾何􅃘弃父母之􅀖乎時軍費不給加以嚴刑弗之集先生􅀙容一言􅀗鈔一萬錠米三千斛民心翕然􅁒為固守計屢戰輒屢勝八月丁丑江浙行省參政吉尼哥児遣兵來援城內恃援至戍守頗懈是夜三鼓長鎗軍攀堞而上城遂陷戊寅偽萬户丁堅使前鋒葛義執先生逼降不屈遂遇害􅀅死罵猶不絶口􅃈南班雅敬先生名為具冠衾􅌾于某山之原得夀八十又三事上于朝贈資善大夫江浙等䖏行中書省左丞上護軍追封譙國郡公下太常定謚曰文節云先生娶戴氏累封譙國郡夫人先八年卒子男二人用敬以子貴封敦武校尉常州路冝興州判官用和國子生辟􅂶侍儀司舎人不赴兄弟痛憤不食相􅁇卒女一人適劉士禮孫男五人徳宣以門資􅀘官敦武校尉善盈庠副使徳垕國子生曲阜宣聖林廟司樂徳崇癸已郷貢進士湖州路徳清縣學教諭徳正徳進孫女一人適吳愈曾孫男五人禧源􅀓源鳳源書源清源先生軀幹脩􅋍髙凖踈髯風裁峻如也其為學本諸六經真知實踐無一不本扵道義其奉親也丁工部公之憂則三年獨䖏扵外弗御酒肉毎遇諱日悲慟不自勝至老不變事母夫人則板與方舟迎侍之官熈熈承顔唯􅂲少違其意婺源三大墓為强家􅀁侵辨理于有司經四十年必復之乃巳其事君也一飯不敢忘懐保小民甚如赤子革弊除姦有知殆無不為然扵律巳則玉㓗氷清毫髪之􅀻又無自而入故其至也民戀愛之其去也民慕思之至有為生立祠者甞重構羙章亭扵兖賊至不􅃘焚之且曰此汪公遺澤也嗚呼不知先生何以􅀎致扵斯㢤由其立心之正不為勢利􅀁誘擇術之精不為不義􅀁屈忠孝大莭􅀁以􅁀白扵天下揆古無譲扵今無媿可謂不負扵科目者矣先生為文不事絺章繪句而義理自􅁕詩亦清婉有魏晋風尤以善書名家單削片牘人咸蔵為榮􅀁著書有巢深燕山宛􅁜三藁􅀓之扵學者當賔興之􅀊江南三行省屢聘先生司其文衡士論尤服其精􅁢至今人道之不忘也夫自壬辰之亂四方瓦觧其􅀎執節不囬者往往扵學士大夫見之如余􅊴之死扵舒李黼之死扵江泰不花之死扵台尤􅃅傑然者也有如先生無城郭封疆之守􅂉保身扵山澤君子亦未必深議之先生不以仕止為間孜孜汲汲思衛斯民扵危亡之際遂及扵難非事君無二心者􅀎之乎使人人皆先生若國家其有敗亡之􅍔乎悲夫系之以銘曰仁皇建科璽書四布濟濟多士雲集川赴猗歟汪公㳺舉于鄊對􅀭大庭乃苐奉常筮仕遐􅀖不遑􅀅毋上䟽廟堂􅂅􅀙近授孝聲載昭如水東馳公聞曰噫吾分之宜鋤强擊貪鷹隼横騖去之弗亟我民之蠹疊為理官為獄立平起彼朽骨化而為生魯有名􅀖待公為政瑞麦嘉禾發為祥應䇿書載登金匱啓封衮斧之􅀉有詔􅀝公尋教成均六舘咸恱復直集賢進班迩列公曰止㢤吾懸我車秩宗之加以華其歸拄笏看山宛水之涘遘時艱屯四郊多壘氓之􅃖􅃖非公疇依公苟我㽞執㦸以随一鼓作氣争相奮躍刈冦如麻血汚秋鍔孰援我兵夜柝不鳴彼乗吾􅈈遂無堅城毒霧四塞殺戮以逞執公使降白刃磨頸嚼齒大罵我實王官咄㢤賊奴敢正之干公雖遇害之死弗屈􅀌忠凛然皦如出日事聞中朝當宁嘆嗟莭惠易名恩寵有加􅀁貴君子行為民望薄俗瀾奔障之東向非孝無親非忠無君凡百在位視公為人故懐逺大􅀅軍同知鷹􅀭衛親軍指揮使司事于君墓誌銘惟于氏逺有世序多以文學為業族居南康之都昌至君益顯融扵時大父徳仲贈明威􅀅軍某衛親軍􅃌揮使司副使上􅀐都尉􅇷封河􅀯郡伯大母王氏􅇷封河南郡君父祥英贈懐逺大􅀅軍同知鷹􅀭衛親軍􅃌揮使司事􅁿車都尉􅇷封河􅀯郡侯母余妙真封河􅀯郡太夫人君㓜知讀書通大義縉紳先生稱之既長磊落有大志不屑為變情徇勢之行㑹元政大亂天下兵動江東西化為盗區分寜徐夀輝建偽􅃅曰宋都九江使其􅀅張福夏彰據湖口元􅀅三旦八駐師鄱陽都昌適當其衝要交互殺掠民倀倀不知􅀁􅀙君召父老子弟謂曰吾等皆良民順冦兵官軍以為叛􅀙官軍則㓂兵又􅀅屠我行見無噍􅀋矣其計安出父老子弟咸叩頭曰㣲君不䏻生我君乃集諸少年趫徤者列為隊伍朝暮教以擊刺之法旬月間整整可用乃握劒坐庭中下令曰賊兵有入吾境共擊之不用命者斬衆皆股栗賊聞不敢犯同列有忌君􅀎者數潜通搆害君皆先機而梟其首人以為神􅀊乙未徐兵破鄱陽君之勢遂孤都昌継陷徐聞君名急搜訪􅀗之命為江東宣尉元帥鎮鄱陽􅀊庚子徐之柄臣陳友諒殺徐而自立更偽號曰漢君乃泣曰我與陳皆徐君之臣陳不道乃尓我可北面而事之邪當是時皇上龍飛臨濠定鼎建業豪傑之士爭相奔走君遣使者奉幣以浮梁降上恱而受之君輕􅀐謁上扵龍江詔宰臣燕饗之禮意優渥賜以金鵰頂帽暨錦袍一襲授通議大夫行樞宻院判官戍徽州永平翼遣之鎮行十里􅀁復趣還觧金連環幷縧授之且曰予賜卿冠衣不可少此故又召卿来爾君感知遇之深誓殫報効上䟽曰于光之心鞠躬盡力報國一忠死而後巳上命左右蔵曰此于光誓書也君察偽漢國政不一兵出扵外潜獻搗虚之䇿上親征九江君與郡􅀅皆􅀙飈行電疾友諒以為自天而下棄城宵遁君􅀅兵下黄梅瑞昌諸居亡何助攻建昌㧞之出戍鄱陽友諒攻洪都上親往救大戰彭蠡湖友諒斃扵流矢其子理假息武昌詔常忠武王追攻之理遂輿櫬衝璧出降君皆在行中與有功焉轉同知振武衛親軍指揮使司事遷鷹􅀭衛進階懐逺大將軍時偽吴張士誠㩀浙西淮東􅁆州之地君􅀙大􅀅軍徐魏公往討泰興髙郵淮安安豐皆下張之勁卒皆聚湖之􅃇舘魏公督諸􅀅及君破之遂平湖州下姑蘇士誠就擒及魏公征中原君統銳兵以􅀙益都沂棣登莱諸州次苐平乃入汴梁克洛陜攻下潼關君與郭􅀅軍守之元􅀅王左丞自河中帥衆來奪關兩兵方挾戰君舞㦸横貫其中大呼殺入元兵奔潰追斬之積屍盈野越六月進擊河中抜其城魏公命戍鞏昌元􅀅擴廓帖木児屢引兵来戰君輒搗赱之敵兵不敢東向遂合諸部兵圍安㝎州君急分兵往救兵少不䏻戰退屯三十里復與元别軍會君腹背皆受攻遂􅀍執百計誘其降不屈韓􅀅軍戍蘭州元兵来圍城擁君行城下使誘􅀅君降君呼曰我不􅄑被􅅞誓死不辱國爾軰受大明皇帝厚恩當堅守以伺大軍之至勿信其甘言􅀁誘也元兵大怒批其頰擁之使去尋聞被害上悼之錫以布帛令其家成服行䘮遣祠部官􅀕以少牢奉其神主配享鷄籠山功臣廟中君諱光字大用于其姓也自二十五􅀊起兵至四十三而殁氣貌􅁱整善鼓琴䏻吟古今體詩多古雅不凡兼通醫學針灸科人望之翩然貴介公子也及持㦸上馬輒鷹􅀭虎視􅀁向不敢當逢者莫不改容太夫人性剛嚴君事之孜孜盡禮唯􅂲稍違其意遇氣有未平君長跽扵前移時不敢起君子尤稱焉娶鄱陽劉淑􅁎通書史封河南郡夫人子男二人蕃與宣也君生扵天暦戊辰九月十四日殁扵洪武庚戍其月日則不可復知矣􅉝亥某月日蕃用招魂禮塟君衣冠扵某山之原前􅁙一月其外舅建徳令劉君爆状君之行引蕃来拜于庭請為銘掲諸墓門嗟夫君以一書生嬰亂世乃􅀎倡義旅以捍鄉􅀖􅁇而率衆歸有道之朝四方征伐為前鋒幕府上其功殆無虚􅀊惜乎安㝎之役􅀌軍􅀷入不􅀎制勝遂致陷扵虎口天乎命耶有識者盖悲之也然君􅀎執莭不囬視死猶生卒不負誓書死而後巳之言亦可謂夷險一節者矣銘曰麟之師師鳳之儀儀治世之竒有力如虎長㦸勁弩才堪用武惟君之生丁時搶攘六合虎爭投筆而起集厥師旅以障州里真龍天飛大明赫喜杖劒来依帝曰嗟汝爾鎮歙土以安􅀺庶大軍長驅何􅀾不随翦漢􅅞吴借籌决勝山東受令洛汴亦㝎潼關置屯鑄鐡為閽敵不敢捫靈旗西伐如火烈烈􅀁向皆捷多寡􅀔殊視敵如無卒􅂢厥軀赤心如日以身徇國死又何恤皇寵有煇少牢祭之餟食崇祠寰字一統不為麟鳳使人増慟冠衣具存大招爾魂蔵之山樊山氣欝欝護此玄室魂􅀆来宅故江􅀯等䖏行中書省左司郎中贈奉直大夫浙東等䖏行中書省左右司郎中飛􅀐尉追封當塗縣子王公墓誌銘洪武戊申春正月皇帝正位宸極布告中外念及舊勲例頒恤典扵是故江南等䖏行中書省左司郎中王公之殁巳七年矣􅀄公之既殁上詔有司議贈公奉直大夫浙東等䖏行中書省左右司郎中飛􅀐尉追封當塗縣男且俾與享鷄籠山功臣廟中上猶未慊其情至是復仍其舊縣進爵爲子以寵之公之子文感皇靈之洊被也䖍奉命書副墨焚告扵墓下明年巳酉冬十一月持翰林待制王君褘􅀁具事行求濂爲銘以侈上之賜濂辱與公㳺不敢譲知遂按状而序列之公諱愷字用和姓王氏太平當􅂗人㓜有大志沉酣六經諸史間必欲見之扵用起􅀿府公之辟爲府史䟽讞獄訟人服其平􅀊乙未上取江南兵臨當􅂗即召公至幕府上方爲元帥命爲􅁺以參决戎事丙申春􅀙王師下建業又下京口京口民新附杌隉不安公慰撫之始㝎上為中書平章政事建江南行中書省扵建業陞公左右司都事公遇事善扵彌綸日以薦賢為先元戎􅀫􅀅咸噐􅀝之唯公言是信戊戍秋猫獠兵數萬自杭来降待命嚴􅁜境上上遣公馳入其軍喻以禍福偕其渠帥来朝是年冬上将征浙東時婺之蘭溪巳下僉樞宻院事胡公大海戍之上命公與胡公㝎議取婺親帥師圍其城守将出降公審察民情而奠綏之歷言上前無有不聽者已亥春王師攻越久不下夏六月師還上㽞胡公鎮婺而民賦軍噐之務咸以属公冬王師克三衢擢公左司郎中緫制衢州軍民事公増城浚濠置㳺擊軍募保甲翼餘丁及舊民兵得六百人以益戍守兵食不􅁕則斥並城廢田五萬七千畒使之耕以自給民有田力弗䏻藝者聽軍士貸耕而為輸糧縣官籍江山常山龍㳺西安四縣丁壮凡六丁之中簡一以為兵置甲首部長統之丁壮八萬有竒得兵一萬一千八百無事則爲農脫有警則兵者出攻戰而五丁者資其食開平忠武王屯兵金華其部将或来侵民公偵知之械而撻諸市王使人譲公公對曰民者國之本将軍天子股肱肯令傷其本乎撻一部将而萬民安計将軍􅀁樂聞也王嘆羙之開化馬宣差挾舊邑印章誘編氓爲變江山楊明恃砦柵之險叛服靡常公皆㝎計擒之梟首以徇衆部内帖帖無譁民饑疫相仍死者枕籍道路公出倉粟使作糜哺餓夫脩惠濟局居藥以注病者􅀁活不可勝􅁆學校廢扵兵公爲浚泮池築杏壇建極髙明亭設􅀶士弟子貟孔子家廟之在衢者公亦爲新之退食之暇輙集薦紳之徒摩切道藝人士翕然恱服諸暨戍將謝再興與部帥王甲有違言㡬致􅅍上今公調觧之公善扵􅀃辭二人之驩如初邉鄙以寜同僉樞宻院事李公文忠以國之懿親握重兵鎮嚴􅁜上命公往来佐其軍庚子夏六月偽漢冦龍江上召嚴􅁜帥葛俊擣廣信以牽其師道過衢公謂俊曰廣信偽漢門戸彼既傾國入冦寜不以重兵為守非大将統全軍以往不可若出偏師撓之未見其利設有挫衂吾衢先繹騷矣乃止俊而請胡公行胡公至而廣信潰一如公言辛丑夏拜胡公江南行中書省參知政事分省于婺以控制東浙公仍以左司郎中分治省事金華婺劇邑􅃥民無藝公令民自實田請都以粮多者為正里長寡者為副正則以一家或二家充副則合四三至七八而止通驗其粮而均賦之有一斗者役一日賤與貴皆無茍免者金華周泰義烏栁昌恃俠以蠧民公逮至扵獄皆痛懲之自是畏避不敢吐氣猾胥潘立道操金華一邑田賦之柄飛􅀉詭遁並縁為奸利公㢘其罪状以聞寘扵法胡公日治軍旅以略􅌘縣禦諸暨為巳任分省之政皆公統之公挈綱布紀風采凛然偽吳将吕珎侵諸暨􅁒堰水以灌我城胡公奪其堰反决水灌珎珎勢蹙乃馬上折矢與胡公誓請各觧兵公聞之移書謂胡公曰彼狡謀尓慎毋聽今珎在重圍是天授首之日也胡公不􅃘食言竟􅀙之珎果敗盟而去先是猫獠軍来降胡公分其衆萬餘戍婺其帥劉震等相挻為􅅍胡公被害公亦及扵難當難作時猫帥多公恩欲擁之而西公正色叱曰吾天子大吏設不􅄑義當死寜能􅀙賊反耶賊初縮首不敢犯拘縶一日而罵賊聲愈厲命左右取酒引滿竟日達夜旁若無人賊知不可屈遂刄之壬寅春二月七日也享年四十有六上駐蹕江西聞公之死為之嗟悼良久親為文􅀕之及返柩金􅁜上復率羣臣往城南致奠乃以其年四月十一日塟江寜縣鳳䑓西郷聚寳山之原公状貌龎偉氣局堅凝善謀而􅀎㫁嘗以事入諌上弗聽公却立戸外既暮猶不去上出怪問其故公従容諫如初上慨然􅀙之公扵吏事尤長據律按比而飾之以儒術案牘􅀴其裁削辭簡而意周喜為詩歌與賔朋談咲樽爼間更倡迭和情意豁如也故扵其殁也人莫不傷之公父諱榮母孫氏配張氏子男子三人長即文有學行今為侍儀使階承直郞次行賊害公之際行方侍側或勸其去行曰棄親而求生吾不為也卒隨公以卒次升童孫女一人濂為左史時侍上左右嘗與濂論佐運之臣以字稱公曰王用和經濟之材也吾将大任之惜平早殁于難則上􅀁以簡注公者為何如使公之存至扵今必躋政府歴憲臺澤及扵民者将益廣不特前􅀁書而巳人之患也有才而無其時今公雖有其時未􅀎大顯而命止于斯不亦悲夫雖然公之賛治外垣為賢賔佐及臨患難詈賊而死為忠臣天恩􅀁加便蕃優渥名亦􅁕以不杇矣在公可無憾銘曰真人之興肇自濠梁白旄黄鉞指四方桓桓豪英雲合響應維時王公杖䇿出迎龍旗􅀁屇靡役弗前借箸以謀燭扵㡬先莫徭嚮風帥徒内附公往撫之謂公来莫淛河之東婺爲名􅀖六師一臨完城以降奏凱而旋㽞將戍守公持文墨參其臧否姑蔑遺墟既入版圖兵民二柄孰斡其樞帝詢在廷非公疇可公拜稽首即日上道城増而髙復浚其濠㳺擊置戌金柝夜􅅝孰爲頑民嘯呼搆亂誘而縶之邉烽晏晏出粟哺荒注藥起尫民豫且康弗教則狂乃新泮宫乃置􅀶士乃設爼豆乃􅀴乃史金華建蕃控于海東還公来治若疚在躬科繇匪度均之平之閭右奪政辟之刑之民樂其生親若父兄敵畏其威望如長城豈期妖豎相挻爲變大詈不屈遂罹扵難人孰無死公死則忠正氣不沒凌厲秋虹皇情衋傷親御翰墨摛文祭之龍光赫赩受才孔多竟不盡施清風宰木凄其餘悲不杇維文大書深刻後百千齡過者必式元故翰林待制朝散大夫􅆀仕雷府君墓誌銘府君諱機字子樞姓雷氏其先出萬春之後傳至五代時有諱鸞者由光州固始遷建寜之建安曾大父時宋太學內舎生大父龍濟郷貢進士當宋之亡帥義師􅎨元兵遂殁于難父徳潤入元爲福州路儒學教授積學􅁃之餘買田三百餘畮以給貧士昏䘮老疾者􅃅義士荘人爲建祠學宫改将仕郞福州路長樂縣主簿未上卒後以子貴贈朝散大夫祕書少􅁥母㳺夫人贈建安郡君夫人善書而有文無子黙禱于神夢黑熊行天遂有娠及生府君頴悟異恒兒九􅀊䏻詩賦十􅀊九經皆成誦十二著明經觧題十七試論郡庠選爲第一二十受大官薦爲邵武縣學教諭二十五登延祐戊午進士苐授福州路古田縣丞自詔行科目閩人擢第者􅀙府君始未㡬丁朝散公憂服除遷延平路總管府知事沙縣陳氏豐扵財身􅃿而子幼族有强􅁀者欲㩀其業賄于上下訟乆弗􅀎㝎府君下他㢘吏鞠之竟白其事時經歷司獄二司暨照磨􅀁皆􅊴官府君攝其印印置西樓几上夜有靈􅀛尾如䑕潜伏几下不動若護之者浹旬始不見或以爲瑞應改邵武路總管府經歴郡長官乃西域人恃與憲部有連其猛若虎與守議稍不合遽引杖擊之守俯首遁去府君獨不為屈毎曰苟如此天子法将何在獄有不平抱案與之庭辯辭順理直雖怒形于色不敢沮調興化路興化縣尹有豪大姓數家隂持公府短長挾勢以戕民府君曰此猶苗之有螣不去苗􅀅槁矣悉置扵法燭見毫􅄠無遁情皆以雷神稱之闤闠之衢甃以如夘小石犖确不可行府君令諸浮屠鑿石為版易之人呼為雷公路先是賦役屡不均府君察知之率吏民焚香祝天曰為民㝎賦當以公有徇􅀻撓法者神降酷罰無恕言巳令民自實田随其高下為㝎日選一吏主其官書毎一鄊畢具其姓氏揭之民大恱仙㳺莆田二縣民訴扵郡曰民苦賦不平者久􅂅乞我雷侯録事司之民又訴扵郡曰非雷侯不􅁕以平吾民之􅃥盍假之郡檄府君行凡三辭乃往民皆大恱舉手加額曰雷侯其豈苐君子矣乎㳺夫人嬰微疾府君聞之愀然不寜曰先君殁不得在左右􅆀抱終天之恨毋年耄矣􅃘縻好爵而不歸飬乎即日􅎨章辭職民涕泣㽞之不從羅拜馬前而去歸僅五月丁㳺夫人憂服闋轉湖廣等䖏儒學副提舉府君招徕弟子員羅知名之士相與迪導之月書季考具有成法文風為之一振擢延平路總管府推官順昌舟師因利覆舟取人財獄成父子皆坐死府君以子􅀙父令白部使者杖遣之尤溪有死獄株連者二十五人累􅀊不得釋府君推罪之輕重亦杖遣之囚至感泣相聚僧坊誦佛書以為報沙縣織工子與張甲闘闘散子失􅁕墮壍死吏入甲故殺罪府君出之􅀯平浮屠殺其主寺僧浮屠之徒方九齡官以知情論死㑹朝廷遣使者宣撫八閩府君力言其非辜竟得釋府君患民不知教建義學鐔津延郷貢進士陳竑􅂅開之以五倫之學乆之士有與鄊薦者羅天凌反汀州汀境與属邑尤溪接府君立堡柵􅁆區以扼其險要招集强丁為禦守刁斗之聲達旦不絶盗聞不敢犯陞泉州路惠安縣尹惠安之民􅄝勢利而少禮譲府君究心學校􅁒以變其俗兼立社學十􅀁俾分教之縣西登科岩先賢盧瞻故宅也舊因宅為祠巳廢府君為新之使民知􅀁勸先是公田之入每斛􅀵錢百緡民大病府君既至减其直之半居三􅀊政通人和遂為諸邑之最部使者及良二千石争賔禮之或剡薦于朝及代還民倀倀若有􅀁失赱大府遮㽞者日以千􅁆不可乃為生立祠樹碑以紀遺愛碑㡬徧鄊井焉除汀州路總管府推官汀民强悍易為變府君與上官議築城開濠以為堡障且請躬董其役上官韙之府君為量功授期使民争趍民不擾而事成申屠公駉時為閩部僉事行郡至汀稔知府君之賢凡郡縣有赴愬者悉下之府君即為决治如律無不慊乎人心者巳而不俟引年􅃍上休􅆀之請朝廷以其廉退陞翰林待制階自􅀅仕郎九轉至朝㪚大夫未㡬卒于官實至正辛卯冬十月二十三日也享年五十有八府君軀榦魁梧方面羙髯見者􅋍然起敬事親生􅀎盡孝既死其塟􅀕之凡悉依朱子家禮􅀙事居官􅀹盡心扵獄事夜參半􅀌燈熒熒猶繙閱成案不休且曰人命至重吾可不盡心乎江西鄊闈試多士省府致書幣請持文衡府君之􅀁甄㧞皆通經藝者爲人嚴而不苛和而不流稍暇集良朋嘯傲林泉間命壼觴以徑醉其視生産作業之事蔑如也􅀁著文辭森嚴而演迤有龍津龍山鄞川環中黄鶴磯梅易齋碧玉環七藁共若干卷藏扵家娶樵溪危氏諱淑馨字蘭玉宋禮侍郞春山先生某之曽孫女元江西儒學提舉徹之孫女也贈建安郡君通書記作字有楷法善治家事不以煩府君人謂婦道母儀皆可無媿先十年卒男二人燧至正癸卯進士􅀙仕郎大都路香河縣尹燦郷貢進士㑹閩中亂起兵以助王師死之贈汀州路上杭縣主簿孫男五人燧之子伯埏至正丙午進士􅀙仕郎福州都轉運塩使司知事次仲垙仲堦燦之子仲墉仲堪府君之墓在縣之元祐鄊黄孫里龍山之原以至正壬辰四月某日塟危夫人祔禮也既塟十餘年燧自状其行實謁濂為之銘濂在弱齡頗有事科目之學輒聞閩中雷氏兄弟以易經相傳授􅀁為經之大義流布四方多取之以為法盖府君與仲弟杭皆苐奉常而聲譽燁然乆矣雖歆􅃩之有志弗强不及摳衣􅀙府君㳺以折􅂨諸傳之是非迨今四十春秋顛毛種種尚􅃘執筆以銘府君之墓乎雖然聲光之盛僅著扵當時文辭之載可勸扵来裔有如府君道徳積扵厥躬政教􅀍扵民人􅀁至是愛􅀁去見思揆之扵前古儒宗吏師似無􅀁讓理冝大書深刻表諸墓門使為士者知􅀁勸涖官者知􅀁法不可以濂之蕪陋而遂廢也謹序而銘之曰閩有碩士雷作氏自㓜學易􅊥聖髓亦既决科拾青紫政行州邑平如砥鋤擊􅁀民仁懦起姦吏聞風潜若􅀑獄命至重心盡爾一夫銜􅁈䫙有泚漢之循吏當可擬玄􅀛護印曳其尾穹石序功文燁煒魂升魄降吁死矣四民會哭動成市遺文􅌭紛滿千􅁓虹光夜發玄笥裏孫子繩繩襲休羙不信予言有如水故宋迪功郎慶元府學教授魏府君墓誌銘洪武三年秋八月亰畿多士較藝扵鄊闈予時􅀍㫖與魏君潜與聞考試事既入院復同舘舎每閱卷相與共論㝎􅀁見頗脗合􅀅還潜跽而請曰曾大父之殁七十又八年矣下棺之石有竅而無辭今􅄑得陪末議者踰旬敢藉寵靈以發其幽光死且不朽矣予不􅀎辭府君諱新之字徳夫姓魏氏世居睦之桐廬曾大父子才大父演父國賢皆􅀮約田里以善人稱至府君始以力學自奮與兄升龍􅀙子雲潭受書易扵郷先生王公某巳而三人皆薦于鄊而府君􅁇擢宋咸淳􅉝未進士苐􅀄授慶元府學教授階迪功郎未上轉運司檄府君考試永嘉竣事同列即治裝行府君問故皆曰士之􅀍黜者􅀅生譁不如避之府君咲曰有是㢤毅然獨㽞果有一士頎然而長鬛掲簾問去取之意辭色甚厲府君曰爾文固佳如犯不考何士猶撐拄弗服府君曰某行某字正係廟諱吾以墨圈之今猶在命左右取示之士慙沮衆皆引退及至官以濂洛關閩正學為已任推明中庸性道教奥旨反覆殆無餘藴􅀄鄞士多宗金溪二陸氏之學聞府君之學翕然信服之學録劉光􅀹􅀁畏敬光嘗集觧孝經自謂無􅀁憾府君為刋正十有一條皆有關物則民彛之大者光不覺下拜曰先生之言其扵聖經深有合㢤鄞人有粥新書者府君閱之不忍􅇚手粥者曰君欲黙記乎府君曰然曰􅀁閱㡬何曰􅀅盡卷矣曰􅀎記憶乎曰然遂琅然成誦不遺一字人驚以為神以書遺焉浙東提舉黄公震一見府君噐之遂以文學孝廉薦于朝會國事日非不果召徳祐丙子元兵入臨安㳺軍至鄞鄞學時設兩學教授號東西㕔西㕔教授王櫸懼甚奔告府君曰吾儕死生决扵今日矣府君􅀙容荅曰非止今日有生之􅀄巳㝎不若聽之顔色不少變及事平間關㱕故鄊家素單乏虀塩或不􅁇府君負薪而炊扣角而歌驩如也􅀁居有垂雲洞因倡􅄝義之士建垂雲書院開迪新學孜孜如不及講經之暇與蛟峯方公逢辰潜齋何公夢桂盤峯孫公潼發為泉石之㳺間賦詩以見其志學者尊之􅃅為石川先生元至元間詔王御史某求賢大江之􅀯縣大夫楊得藻舉府君應命力辭而不就其風節凛然人至今仰之年五十有二殁扵元貞癸巳某月日以某年月日塟于柯阜之原其徒誄之謂府君精思而陋詭隨之習知至而黜偏駁之非自窮而達不改其操運去物改弗􅄺以緇盖實録云府君娶王氏子男子三人良恭儉子女子三人姚秦俞某張某其壻也孫聖作訓五典行開蒙蔀著光晶盍稽之為法程性由繕􅁒莫攖睦有士尊遺經宋物改遯巖扄霞作幌雲為屏皦弗緇莭逾貞非窮研行何成丗􅌭紛競華聲文㓕質實慚名苟視此面發頳柯阜山八尺塋序令徳鎸新銘故承直郎刑部司門貟外王君墓志銘予聞王君孟逺名者頗乆恨弗之識洪武庚戌秋待罪詞林聞有命徴孟逺至京師召對謹身殿授刑部司門員外郎予悅甚􅀅修刺通謁適修史事嚴未遑也孟逺尋􅀍上㫖與監察御史慮囚淮浙之間及其既還始胥㑹成均孟逺曰未見君子悠悠我思今既見矣喜􅀅何如予曰僕之心即孟逺之心也孟逺大􅀏巳而别去暨再見又属予曰先人殁四年墓上之銘未樹已歴繫善行成状矣旦夕重有請􅂅吾子􅂌之也自是厥後旅進旅退扵班行中毎遥見孟逺各注目相視彼此雖無言而情好躍躍然也當是時孟逺貌羸甚身弱如不䏻勝衣予頗疑其不乆樂人世者復自觧曰昔張谷官河􅀯與尹師魯謝希深二公㳺二公方康强谷獨唾血垂斃孰知二公既殁而谷猶未死邪此殆難以常情測也􅄑亥夏孟逺出為鞏昌隴西縣令復来與予别惓惓以銘文為請予熟視孟逺心益疑雖自觧如前終不􅀎􅇚去因勉之曰孟逺宜自愛此別未知何時重見也余方戴星出入不䏻執一觴餞至都門外毎一念孟逺為之戚然弗寜越三月忽孟逺之子興来吿曰先君得腸澼疾至泗州加劇以五月二十六日死矣予病􅅑在告聞興言淚落枕上嗚呼孟逺固羸弱豈應􅃍止扵是乎相聞餘十齡而晤言不數四豈意真無重見之期乎賢者夭而不賢者或夀天之夢夢抑自古而然乎嗚呼孟逺諱經孟逺其字也姓王氏其先家鐘􅁜宋􅀄有諱忠者来撫州為金溪塲官遂為金溪人曽祖榮彰祖寔父善毋曽氏孟逺習科目之業甚勤夜坐恒至四鼓目睫未及交而鷄巳再號矣亟曰天其昧爽乎復披衣而起挾冊暎􅉉光而讀之尋患家居叢紛遷扵梧山又遷扵雲林皆有别墅在焉崖光澗影飛落戸庭間孟逺得以清其神思益自放扵文沛然有不可遏之勢松滋陳氏建議塾曰墨濤聘余太史貞為五􅀴師松滋去金溪􅀅二千里孟逺徒歩往􅀙之悉傳其二戴禮之學他諸生􅀁造經之大義太史命孟逺竄㝎且曰是不異吾􅀁為者人讀之亦以太史言為誠然非溢羙也至正癸已丙申科孟逺兩以是經取江右鄊貢文解值天下亂不得上南宫退􅀮􅃮溪芟禮記䟽為纂要若干卷其扵名物制度多有折􅂨入國朝以来侯君元善以重臣出膺重􅀉屢􅁒辟孟逺弗之就巳而歎曰聖天子在上我可終老山林邪適徵命至即憣然而起擢為今官詳刑鞫獄人自不以為􅁈朝廷鋤剗吏弊悉用儒術士更張之乃選孟逺為令方期孟逺有澤物功柰何死之柰何死之同知泗州事樂宋學士文集卷第三鑾坡集卷第三
