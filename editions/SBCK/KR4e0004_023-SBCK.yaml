  text: 宋學士文集卷第二十三翰苑續集卷之三
  hash: sha256:e3447bcf4f4c36284642f834801f211b8670c32ce9e63a27acbf80091fd96e6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_023-1a}
body:
  text: 饒氏杏庭記臨川曾先生旦􅀄􅂇教成均甞以其郷友饒君孟持杏庭記為請予年踰六望七精神衰耗四方求文者接踵于門心極厭之則作而固辭先生之請至六七而不倦予以先生有學之士其言之勤如此意必有所属因詢其詳先生曰孟持故詩書家其先祖手植文杏一章扵所居之西兵燹之餘風枝露幹屹然蒼烟中疑有百靈訶衞之者孟持因􅀣亭其側名曰杏庭然孟持之意非以為􅀚羙也唯汲汲乎先祖是思當春陽和煦生氣鬯逹自本而末咸周流而無間則思其與道為體精神發舒無徃而不在也秋髙氣清葉脱而色不澤所謂歸根復命返扵冲漢則思其順時歛蔵不誇能不矜寵也朝露其沐浥乎其容則思其盥漱而興正衣冠而屹立也夕颸作凉冷然其音則思其出坐中堂若誨語之􅀄聆也一動静一云爲之間見杏則如見其先祖焉所以􅋍動其心志警戒其昏惰者大有資扵學功視彼拈葩摘􅃩以爲耳目娱者其語㢤此誠有􅀜扵􅃔倫之重不避􅂯三之瀆職此故聞之嘆曰孟持亦可謂孝子矣乎昔者召伯循行南國以布文王之政或舎甘棠之下其後人思其徳尚愛其􅀣而不􅃘傷矧先祖手所親植者乎宜乎孟持之不能忘也孟持不忘扵杏且如斯則夫手澤之在書口澤之在桮捲其所感又當何如㢤孟持可謂孝子者矣雖然逺取扵物不若近取諸身孟持之身内而心膂外而髮膚非先祖一氣之所分者乎一氣之所分則是身乃先祖之有也葆嗇失宜非孝矣登高臨深非孝矣言行弗擇非孝矣忠節有爽非孝矣涖事不勤非孝矣孟持可不慎乎雖然杏一物耳孟持以先祖手植如或見之則其扵身殆有不言而諭者矣予之云云不置無乃過扵思慮矣乎先生曰子之言善不專爲孟持頌且有規焉苟以此意爲記不徒作矣予遂不辭次弟其語而歸之孟持名盈清􅁱雅操讀書而􅄝文薦紳之間翕然称之爲君子儒云䟦東坡􅀉章質夫詩後􅂫文忠公子瞻爲翰林學士日章荘簡公質夫以直龍圖閣出知慶州二公素友善質夫以崔徽真爲􅀉者頗寓相謔之意盖徽乃河中倡婦冩真􅀉裴敬中而元㣲之所爲作􅁔者也故子瞻賦詩有知君􅀍惱更愁絶及未害廣平心似鐡之句實觧嘲云然二公相謔初不止此質夫作廣帥時送酒六壺書至而酒不逹子瞻作詩戯之且謂青州􅀙事化爲烏有先生盖亦猶前意也質夫乃髙州刺史檢校太傳西北靣行營制置使仔鈞諸孫非惟立功邉徼爲國家保障至扵辭章亦非人所易及甞咏栁花撰水龍吟􅀉子瞻瞻嘆其妙絶来者無以措辭則其尊尚爲何如所以善謔者特出扵相愛之至情耳非若後人流連狎䙝而不知止者也論二公者當以濂言為不誣子瞻之書此詩年已五十又二實元祐二年丁邜故其老氣􅀹森然云方外老友全室翁出示徵題因走筆識之題馬華甫手帖後右宋參知政事馬荘敏公手書與䖏州吴府君諱某者也公以寳慶二年王㑹龍榜下擢第進士六轉而差知䖏州又四轉自右曹􅀰官􅂯出知䖏州政成加直秘閣浙東提舉常平公頻行及遺此書盖府君以醫名公家有病府君時以藥劑調之故書中有一家老穉恃君以為安之語公之母夫人梁氏春秋已髙先是公甞奉雲䑓祠至是復有陳乞之意不圖改持􅁃節故書中有親老且病歸心甚切之語當是時措置銅錢且用塩􅀵楮幣已而又秤提㑹子以五析二十七界㑹子五道凖十八界二道故書中有塩楮更令民聴未孚之語惟公岀忠入孝乃其素誠爲政寛猛適宜務存大體此固不待後學之所言至扵不忘故舊移書致謝詞氣謙抑風義藹然又豈淺丈夫之可企及㢤捧玩遺墨徒慨仰者乆之府君諸孫􅀙善爲工部主事與濂同朝装潢此卷求題其後因不辭而書之公諱光祖字華父金華人吴濰州文集序唐子西云六經之後便有司馬遷班固六經不可學學文者舎遷固􅀅奚取法嗚呼斯言至矣濂甞諷二家書遷之文如神龍行天電雷惚恍而風雨驟至萬物承其􅐮澤各致餘妍固之文􅁼法駕整隊黄麾後前萬馬夾仗六引分旌而循規蹈矩不敢越尺寸嗚呼法之固堪法其能以易致㢤然而淵冲之容可以􅄃結雄毅之氣可以掇拾古語有云取法者冝上固當有潜心而願學者矣濂猶恨未見其人豈逸駕奔馳實不可攀歟抑去古逾逺聲光不可得而襲歟吾友吴復德基同郡人也自㓜抱逸才一下筆間飄飄有竒崛氣逮長日取二家書玩繹弗倦超然若有得􅀭􅀭出謂人曰我知學司馬遷爾我知學班固爾諸子盖不足多也濂頗畏之疑之自後德基去丞南康令安化今將出守濰州與濂胥㑹南京持所製文一編且讀且譁曰我此文近遷固否濂見其勁硬如屈鐡竒悄如削懸崖澤媚山暉如藴珠􅉼璧始而大驚中而釋所疑終則益畏之而􅀤不可企及之嘆嗚呼善學遷固者世乆罕聞今乃見其人㢤雖然立言如六經此濂夙夜所不忘者徳基尚朂之毋徒泥子西之言而自沮也書前定三事永嘉林君伯恭爲濂言温生延祐丁巳八月八日至三􅀊父命名榮祖又十二嵗更今名又十嵗當至正辛巳以春秋經試江浙鄊闈温名第一董􅃔第四董朝宗第五朱公遷第二十八實殿榜後榜中孔暘王孔文髙禄郷潘如珪四人皆􅂯薦温上南宫不利以恩例置奉化州學正丁亥始之官㑹董􅃔亦為學正慶元交談之頃􅃔慨然曰吾父諱伯大甞出􅀿書大父得竒夣記諸籍云丁巳年九月七日夜夣林温作魁宋姓人鎻榜第四第五人連姓董内四名用朱筆􅀧云是舊請舉者稽之扵今無有不合其最異者温之生甫一月爾奉新王君文􅀶復與濂言載夣與劉鑄到南昌經江西省署見放鄊貢進士榜諦視之髙懸朱牌十枚上書金字日光炫燿不可讀忽一隷卒前白曰第一名南昌熊􅁩汝居第六遥呼鑄曰爾名亦在後湏􅁷有紅英佩刀者十餘人自省中讙而出似相迫逐載驚窹明發與人言皆大􅀏當是時大都督朱公鎮南昌干戈方殷謂安有貢舉之事後八年為洪武庚戌始設科江西四十名額南昌占其十十名中熊􅁩冠首正符朱牌之數載􅁍在通榜第六鑄居十九及試大廷載又中第二甲第六名一一皆驗濂聞此二事頗異之且言扵金溪吴君伯宗伯宗曰豈惟是㢤庚戌之夏五月二十二日臨川通判王黻夣城中作樂迎状元黻甚訝之二十五日忽聞使者来頒科舉之詔其年秋伯宗濫充江西鄊試第一衆已為與夣叶至􅋝對之日復擢寘榜首鄊里至今以為羙談濂􅀚傳記所載前定事如此􅁼者甚衆未敢信也今親聞三君子之言其有不可信者乎姑書之以見人囿氣化中誠有一定之數不可以智求不可以計免也自􅁱之外一聴扵天而巳送黄賛禮涖祀閩省詩序帷洪武七年十有一月庚辰皇帝御奉天殿視群臣早朝太常卿唐鐸奏曰臣昔受明詔天下行中書其祠山川百神或未致恪䖍冝令朝士涖之臣扵浙鄂齊汴暨于豫章已甞奉命􅀙事若晋若燕陜若閩蜀若廣東嶺南逺者七千里近亦不下四三千冝預遣使者期以明年春二月集事臣眛死以上制曰可於是遴選奉常官属及儀曹主事凡七人時賛禮郎建安黄淵静實與其列越三日癸未陛辭上諭之曰敬㳟明神古今恒道也况瀕􅀕之時乎祭在他人亦所當慎况職在奉常乎已盡其職猶難况欲涖人而使其荘敬乎皆不可不察也爾等聞命之後雖䟦渉乎險阻一言一動有赫其臨參前􅀝衡無乎不在勿使一髪非僻之干庻㡬不廢朕命不然人非􅀑責将不可逭矣衆皆稽首至地而退既退復􅃙儀曹各賜衣一襲又明日甲申啓行前御史中丞劉公伯温參知政事陶公中立吏部尚書詹公同文今禮部尚書牛公上良咸以為淵静遭際昌期􅀗将使指以臨蒞祠事可謂寵榮也已各賦詩以為贈而文學法􅀙之臣藩府成均之賢與夫方外岩穴之士亦見諸聲􅁔以華其行淵静請予序其作者之意肆惟皇上宅中圖治其對越昊天毖祀干上下齋袚一心凝神扵惚怳之中如􅀅見之群臣之助􅀕者丁逮胞翟之賤亦皆有孚顒若以致鴻休荐臻甘露霄降三秀呈瑞彩霞結鳯白烏翔飛和氣充牣化為豊年此盖精明之徳放諸四海而凖無不駿奔走執豆籩以薦徳馨然猶慮藩垣之臣未盡體内廷之意遣使四出以監視之方扵古昔帝舜之望山川徧群神􅁎周之咸秩無文下是過也有君如此其忍􅀒之今淵静之徃也冝精白志慮靈承上訓壇廟有缺圯者葺之服器有􅁦汙者易之牲牷有不肥腯者罰及之将􅀕之夕端笏垂紳正立壇之左右申以聖天子成命使百司及執事之人祗奉明畏有若天威咫尺升降俯伏穆然無聲牲爼苾芬庭燎有煇神靈洋洋昭格于上則夫藩􅁵之錫淵静亦當與有之矣淵静行㢤雖然神人相依者也南閩當兵燹之餘黎民創殘其或有未起者乎縦曰起之其興利去􅁦之政或未能盡行乎淵静冝㢘知之歸告于上此扵人神之道所謂兩盡者也淵静行㢤重建繩金寳塔院碑南昌之城南有佛刹曰千福相傳唐天祐中異僧惟一之所建也當經營之初􅀤地得鐡凾四周金繩界道中有古劒一設利三百餘顆青紅間錯其光燁然扵是建寳塔取設利蔵焉改千福為繩金塔院落成之日􅅡梅檀香香氣欝結空濛中僧伽大士顕形扵其上正與塔輪相直萬目咸覩君子疑異僧盖大士之幻化云􅀄郡多火災堪輿家謂塔足以厭勝之巳而果驗宋治平乙巳知軍州事程公某以其有關扵民最為吉徴鳩錢二十五萬􅁱之紹興庚午尚書張公某来佩郡符復倡衆洊葺之一旦塔影倒現扵冶工㳺氏家上廣下銳層級明朗寳輪重盖一一具足元至正壬寅戎馬紛紜院宇鞠為椔翳雖兹塔巋然獨存瓴甓亦且摧剥殆盡乙巳夏六月院僧自貴與弟子匡弘同􅂁善慧各抽衣盂之資剏庫堂扵東偏日夕以興復為已任國朝洪武戊申夏四月清泉蘭若僧道􅈚與前三比丘披伽黎衣手執熏爐向塔前􅀤大弘願曰惟塔廟之建起信心而入菩提今廢壞若是不可以不圖溟等誓盡今生為之惟威力加護焉誓畢持暦走民間施者多應其月癸丑衆工皆興趨附如蟻忽有鉅甓自顛墜稠人中咸無所損傷又明日乙邜五色光起塔間豳豳熒熒圍繞良乆而殁冬十一月某甲子塔完塔凡七成成各六稜環以峻宇前敞小殿以奉僧伽大士欄檻堅緻洞户玲瓏簷牙翬飛寳鐸如語􅀚者以為帝釋天宫所造化現人間己酉春正月道溟示寂匡弘等嘆曰院役其可不終事乎益聚施者之財扵冬十有二月造釋迦寳殿一所摶土以肖三世諸佛殿後復􅌟屋三楹間直逹僧伽之殿中塐曼殊師利普賢􅀚自在三尊像荘嚴岩岫􅀙璧湧出挾以兩廡前至于三門門内甃以方池紺緑可鑑一如大伽藍之制訖功之日則甲寅冬十一月某甲子也惟我如来弘􅄏度門樹塔立廟所以使其見像起信信為一切功徳毋萬善皆自此生非徒􅋍􅀚瞻而巳也矧能助地形之勝消弭災害隂隲生民廢而不興是豈人情也㢤道溟之與三比丘精進弗􅈈終能遂所志而後止非其才有過人者不致是也匡弘等不逺千餘里来請予記因為歴序其事而􅁝之以賛曰稽首大慈父利益扵群生塔婆之所建種種諸方便聳起霄漢間有如蒼龍角人有遥􅀚者至誠皈命禮不待登伽藍已足攝憍慢所以四大海無䖏不建立異僧何國人杖錫来洪都指地􅀤鐡凾中有設利羅光耀奪人目其數過三百封緘重瘞之樹塔鎮其上四衆方作禮香霧空濛中乃見僧伽像作彼慈憫相身􅀍欝多羅手執青楊枝欲􅀜甘露門以觧􅀬惱故成壞雖相尋神幻終不㓕影倒冶工家下銳而上弘化導扵众生示以順􅊇故忽遭戎馬興鞠為椔翳􅂣巋然撼風雨中有不壞者溟等􅀤弘願誓加荘嚴力熒熒五色光出現于塔表萬目皆瞻仰以為未曾有施者如川至不日告成功欄楯互周匝洞户各軒敞帝網日交參寳珠仍絢爛繪􅀞諸菩薩以及天龍衆擁護扵後先生獰若飛動自茲彈指間湧殿及崇閎一一皆現前鎮茲清凈域福徧一切䖏畢方不敢見永無欝攸孽人見有為迹不知皆無為㑹事歸一心無非無上道我今作賛辭筆下起樓閣内有無縫塔光覆大千界一渉思惟間即墮外邪見黄仁淵静字辭有序建安才俊士曰黄生名汶仁􅀒超群之資朝出受易扵部使者陳孟龍至暮抵舎復質所疑於仲父居徳亦竒男子年十六時中􅀻試髙等諸老生不中譁于庭居徳因請靣試上官前譁者執筆不能下面頸􅀤赤以出以故生内外皆得師學之日進如水湧雲集洪武辛亥秋有司賢之以生名上福建行中書試藝􅁄闈八府之士充貢者二百而司文衡者又前進士林以順呉尚志郭麟江惟志也取舎甚嚴或懼不􅀗在茲選及榜出三十人中而生名居其四遂為易經諸義之冠生之年始若齡耳明年㑹試南宫銓曹急扵用才不俟再試擢奉常賛禮郎階入八品有識之士無不為生榮雖余亦愛生甚時以問學朂之生因執經􅀙余學間拱手而言曰仁􅀄名文仁有司援例以文犯周西伯之謚加水扵其左及觧名上中書吏以白右丞相汪公公曰仁之義甚弘無所不包其可冠以汶字乎冝去之先逹因取魯論仁者静之言字以淵静願先生詳􅀤其義嗚呼考亭朱子釋此至矣余向以言為雖然不可無以荅生之意生之賦資固超羣而求仁之方不可不力也為序其事而申之以辭曰仁體凝重屹弗遷振古雄峙如山然生意周流踵至顛一息有􅃜用則愆爾生心澄静若淵萬􅁚森列具不偏返􅀚冲漠無後先其機或動矢􅀤絃雲行雨施出自天神功不宰超虚玄全體大用昭以宣上師周孔下淵騫縦不及聖肯下賢流光不駐若電煽生其夙夜加勉旃宋學士文集卷第二十三翰􅁐續集卷之三
