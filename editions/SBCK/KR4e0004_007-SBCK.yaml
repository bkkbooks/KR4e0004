body:
  text: 應制冬日詩序洪武二年冬十一月二十有二日上御外朝遣中貴人召翰林學士臣濂侍講學士臣素侍讀學士臣同直學士臣經待制臣椲起居注臣觀臣琳列坐左右既而命太官進饌賜黄封酒飲之上屢命盡觴內官承上㫖監勸甚力臣濂數以弗勝桮杓固辤上􅀏曰卿但飲雖醉無傷也酒終上親御翰墨賦詩一章復繫小序于首命各以詩進臣濂最先臣禕次之臣觀臣琳臣經臣同又次之上覽之大恱臣素最後詩以民瘼為言上曰素終老成其有軫憂蒼生之意乎扵是各霑醉而退明日臣素以遭逢盛際光膺聖眷如此不可無以示後来乃集其詩為卷而以題辭為屬臣濂聞之在唐中世當夏日炎蒸君臣相與賦詩不過以日長為可愛凉生殿閣為􅁕矜後代多譏之惟我皇上勵精圖治其扵冬日沍寒之際形諸篇翰固不忘扵聽政羣臣廣歌復以逸豫爲戒憂勤爲勸而弗敢後者其故何㢤盖唐虞在上無小無大孰不精白一心以承明徳况扵文學法􅀙之臣職在獻替者乎揆之于唐􅀄不可以同日而語也臣濂不佞庸敢以是序諸篇端上􅀁賦詩别以金龍牋繕謄其副尊閣扵家示不可䙝也送吕仲善使北平采史序皇帝即位之明年四方次苐平乃詔文學之上萃扵南京命官開局纂􅁱元史爰自太祖開國至于寜宗凡一百二十六年巳㩀􅃇史櫽括成書而元統迄扵終祚又三十六年遺文散落皆無􅀁扵考丞相具以上聞帝若曰史不可以不就也宜遣使天下訪求之扵是儀曹會諸史臣發凡舉例具扵文牘遴選黄盅等十有二人分行各省僉以爲北平乃元主故都其文獻必有足徴者非精練􅀶敏之士未易以集其事予友仲善方司膳成均實應其選戒行李且有日與仲善㳺者成為賦詩以予嘗與刋􅁱之末俾題其篇端嗚呼傳有之國可㓕史不可㓕然既亡其國矣而獨謂史為不可廢者其故何㦲蓋前王治怱之微興衰之由得失之效皆可為後王之法戒史其可㓕乎然自漢以迄于近世􅀋多羣臣奏請始克緝成典籍惟我皇帝既承大統即蔽自淵􅂨孜孜以纂脩元史為意則其神謀睿斷卓冠百王偉量深仁與天同大巍巍乎不可尚巳仲善行㢤採石室之遺餘詢名賢之紀䤽俾信史免扵闕文傳諸来世其不有望扵仲善矣乎仲善行㢤弔齊魯之故墟撫幽燕之陳迹呼酒長歌㧞劍起舞將又不在扵仲善矣乎然則仲善兹行亦壮矣若予者年踰六十􅄠白神耗不􅀎逐車塵馬􅁕之間以攄寫其中情仰睇飛雲唯有慨然遐思而巳然而鋪張上徳以昭布四方垂諸無窮者史臣之事也庸敢備書之以為序而區區離别之懷有不暇計也仲善姓呂氏章貢人有學有文其聞譽蓋翕然云送劉永泰還江西序聖天子以六合既寧益窹􅄰求賢而致時雍之治扵是朝臣以永豐劉于先生開初先生嘗以賢良徴因病謝歸及是使者至即束行李東上洪武辛亥閏三月實来京師丙子吏部待郎顧君剛中等入奏上召見扵外朝俾講說經書親與之論辨先生敷繹詳明上恱越翌日丁丑上御金水橋復召先生慰問良久􅃙儀曹賜冠衣又明日戊寅復召至便殿諭先生曰君子為學當見扵世用尓自度其材可為郡縣何職宜竭誠以對朕將官之先生曰臣于在前朝嘗舉進士試南宫不利終老弗沾一命今幸遭逄有道之朝登崇俊良凡有血氣者莫不􅆂泳鼓舞扵神化之中况區區草澤賤儒三瞻天日之表聖語丁寜又如此之至苟稍知君臣之義孰不感動以思報效第臣犬馬之齒巳衰筋力弗强聽恍恍而視茫茫若冐昧上承昭㫖異日戃有曠官之刺則􅀒天恩深矣敢固辤上以其言誠懇而質直不奪其志親御翰墨賦詩一首且命先生亦賦三詩以進上覽之喜令內侍酌酒賜之俾其還山肆惟皇上以天縦之聖黄鉞四征大統以㝎而尤親近儒臣共圖治安年髙而不􅁒仕者復以禮而敦遣之此如上天雨露之澤滂沛周浹萬物咸頼聖德神功巍巍惶惶固非前代帝王􅀁可及然而􅁒治之主不世出當此明良相逄千載一時先生平日􅀁學致君尓澤民尓一旦翩然西還傍岩以為廬結雲以為衣茱有葅食有稻與魚左圖而右書于于而行沉沉以居先生之計則得矣其如蒼生何雖然先生之志則有在也其意必曰我扵催科聽訟則年誠耄矣奔赱承事則力誠不􅀎矣若敷明孔子之道以㳤後進使􅀙之者知孝弟忠信變澆風而為厚俗是亦報上恩之萬一也是則可為也嗚呼先生之志果若此其扵出䖏之義庶㡬兩無愧乎先生將還士大夫多慕咏之相率作詩餞之而遣金華宋濂序之送錢允一還天台詩序皇帝即位之二年秋八月大將軍帥師取燕都西北州郡次苐皆平而天下歸于一統􅚼明年之冬上將親御袞冕郊祀天地大告武成復念開國諸臣勞烈之多錫以鐵劵以申河山帶礪之誓前一月下禮官議其制度近臣奏言唐和􅁜時嘗有賜扵錢武肅王其十五世孫尚徳實寳蔵之上遣使者即其家訪焉尚徳既奉櫝劵及五王遺像上之上御外朝與丞相宣國公臣善長禮部尚書臣亮主事臣肅觀之皇惰恱豫􅃙省臣燕尚徳扵儀漕恩意有加焉巳而尚徳思東歸陛辭之曰命還其劵與像以禮敦遣之予時待罪禁林尚徳以于知其事頗詳請序其故而繋之以詩夫錢氏寳有此劵巳五百載宋淳化中杭之守臣嘗連玉冊進之元豐五年又進之宋季兵亂劵沉官渭水中者五十六年元至順三年漁人􅀗之而售扵尚徳之父世珪迄今有道之朝而尚徳又進之是嘗三登天子之庭其間或顯或晦雖若􅀋靈物訶護之亦其孫子之多賢始􅀎保守而弗墜也歟抑予聞武肅之有國吳越同時據有一隅以專威福者若前後之蜀南東之漢以至吳椘閩唐南平􅃅為十國計其士馬之精􅆠城邑之壮麗府蔵之充牣意盛氣得亦可謂一時之雄曾未旋踵夕陽芳草凄然有餘悲矣况望其子孫保有故物扵十餘世之後乎由是觀之錢氏之樹徳也深矣皇明肇造區夏比􅂭唐虞凡前代文獻之可考者英不訪求之尚徳之家世載明徳且將出躋膴仕以佐明時斯劵之徴盖特為之兆爾予因不辭序而詩之扵以見尚徳遭逢之盛未止扵此而他日相遇必當以序為知言云尚徳字允一天台人詩曰大明天子開􅟾基雄兵百萬皆虎􅆛東征西討十餘載變化不異雲雷隨功成治㝎四海一剖劵分符恩澤施前王遺制久巳泯錢氏世寳猶無􅃜天使持書往徴取有翁橐􅀒来丹墀鞠躬俯伏再拜起旋解韜藉重重披精銕煆成大逾瓦中突傍􅅯形如箕又如圓甗䚯其半一片玄玉誰瑕疪鑿填金文絢爛筆畫方整蟠蛟螭誓辭三百有餘字河山帶礪無嫌疑􅁇陳五王有真像彷彿猶是唐冠衣腰圍白玉金作銙吻角左右分三髭重瞳囬光屢下照􅀏語愈覺天顔怡便􅃙太官給珍饌上尊法酒澆瓊卮憶􅀄唐綱既解紐恣舞鰌鱓􅃅狐狸斗牛王氣果凌厲豫章占術元非欺八都徤卒猛如虎指使不異駈嬰兒羅平鳥圖騁怪幻內黄外白跳狂癡龍劍一楎赴水死大勛星日同昭垂因兹錫劵代牲㰱彭城開府如三司衣錦城空嘉樹死共守尚有三樓危淳化元豐兩進入龍光曾受天王知炎精訖録九鼎沸一旦失去官河糜豈伊神物􅁒變化相逐雷劍爲龍飛孰知余且一舉網􅀁獲非鼈還非􅀛終然􅀑物􅀁訶護不使光彩埋荒陂泥土沙礫􅄑免累寳玉大􅃓欣有歸我知天意實有在武肅弘烈何堪微八州生靈数百萬㧞出水火行中逵子孫食報豈終極政如稼穡隨年肥髙牙大纛入黄閣金章盭綬趍彤闈不知堆牀㝎㡬笏但見肘印懸纍纍七世珥貂未􅁕擬一門三㦸終前衰况翁文采爛五色􅄝古不管頭垂絲秦淮呼酒話離別逺盻官舸如星馳千時同雲􅇈四野勢􅁒釀雪増寒威行行若過表忠觀好剔蒼蘚觀殘碑汪右丞詩集序昔人之論文者曰有山林之文有臺閣之文山林之文其氣枯以槁臺閣之文其氣麗以雄豈惟天之降才爾殊也亦以􅀁居之地不同故其發扵言辭之或異耳濂嘗以此而求諸家之詩其見扵山林者無非風雲月露之形花木蟲魚之玩山川原隰之勝而巳然其情也曲以暢故其音也􅆌以幽若夫䖏臺閣則不然覽乎城觀宫闕之壮典章文物之懿甲兵卒乗之雄華夷㑹同之盛􅀁以恢廓其心胸踔厲其志氣者無不厚也無不碩也故不發則巳發則其音淳龎而雍容鏗鍧而鏜鞳甚矣㢤􅀁居之移人乎今觀中書右丞汪公之詩益信其說爲必然者矣公以絶人之資􅀶極群書素善屬文而尤喜攻詩當皇上龍飛之時杖劍相􅀙東征西伐多以戎行故其詩震盪超越如鐡􅀐馳突而旗纛翩翩與之後先及其治㝎功成海宇敉寜公則出持節越鎮安藩方入坐廟堂弼宣政化故其詩典雅尊嚴􅀋喬嶽雄峙而群峯左右如揖如趍此無他氣與時值化隨心移亦其勢之􅀁宜也然而興王之運至音斯完有如公者受丞弼之􅀉竭彌綸之道賛化育之任吟咏􅀁及無非可以羙敎化而移風俗此有􅀜物則民彜甚大非止昔人􅀁謂臺閣雄麗之作而山林之下誦公詩者且將􅀍其霑漑之澤化枯槁而為豐􅃾矣雖然詩之體有三曰風曰雅曰頌而巳風則里巷歌謡之辭多出扵氓隷女婦之手髣髴有􅀋乎山林雅頌之製則施之扵朝會施之扵燕饗非公卿大夫或不􅁕以為其亦近扵臺閣矣乎輶軒之使弗設而托之扵國風者若無􅀁用之皇上方垂意禮樂之事豈不有撰為雅頌以為一代之盛典乎濂盖有望扵公他日與鹿鳴清廟諸什並傳者非公之詩而誰㢤濂也不敏受公之知十有一年故􅀼序其作者之意扵篇首蕪􅀋之詞要不􅁕為公詩之重輕也公名廣洋乃皇上之􅀁賜其字則朝宗也淮南人洪武三年四月二十一日金華宋濂序詹學士文集序往時湖湘間材士大夫多以詞賦稱若江夏詹先生同文其一也盖同文􅁭韻瀟灑濟以雄􅀶之學故體物瀏湸鏗鏗作金石聲及歸我熈朝遂以文鳴一時當勝友如雲酒酣耳􅀬有執卷来求者同文振衣而起捉筆四顧文氣絪緼􅀙口鼻間流出頃刻盈􅁓爛爛皆成五采觀者􅀙傍鼓譟且謂萬言􅀝馬可待者將無大相逺自是有問竒俊士僉曰同文同文云予與同文交且久而同官翰林􅀄見之甚驚後屢見之竊自嘆賦才暗劣䂓䂓方圓中日蹈古人􅁤轍不敢奮迅吐一竒崛語雖見諸簡牘者近一二千篇奄奄如無氣人作文固當如是邪去年之秋京畿試鄊貢士今年南宫試天下士同文皆持文衡區區亦與聞末議見同文考五經卷朗讀數行輙操觚書云云書已復讀又書云云予視之析理精緻如漢廷老吏議法是非重輕不可掩人以文辭稱同文固未見其衡氣機如同文者其何可及邪其何可及邪韓退之推李杜文章光熖萬丈少陵之作頓剉沉欝髙不可攀深不可探謫仙之辭飄飄然㳺戯璇霄丹臺吹鸞笙而食􅂵霞􅅸去人間塵土思此無他精華發為光耀縦横交貫不自知其􅀁止退之言當不誣同文之􅀎致是者豈無其故㢤然子聞太史公周覽名山川故作史記燁燁有竒氣同文他日西還予將相隨泛洞庭浮沅湘登大别九疑之山吸風吐雲一冼胸中􅁾濁使虗極生明明極光發然後揮毫以尾同文之後萃靈鳯之彩毛擷天葩之竒馨或者當有可觀同文果以為何如邪同文以天集授予序神思摇蕩急展牘書之懼其凌空飛去是為序送許時用還越中序婺與越為隣壤越屬縣曰􅌘有許氏居之世以詩禮相傳為名門而時用則又其最秀者也濂家婺之金華距􅌘為不逺在弱齡時即與時用相聞方以文墨自漸摩無雨風無晝夜危坐一室不暇見暨同試藝浙闈旅進旅退扵千百人中無有為之先容者又不􅀎見自時厥後時用以禮經擢上苐為諸暨州判官金華抵諸暨比􅌘為尤邇將􅀐驢赱鈴下而謁焉時用又入行御史臺治百司其地清嚴雖時用亦不宜與人接又不敢見曾未㡬何金華陷扵兵士大夫螻蟻赱唯流子里為樂土亟挈妻孥避焉流子里􅀠諸暨地在􅌘之東南僅􅁆舎即至濂時苦心多畏而土著民往往凌虐流寓者白日未盡墜輙翳行林㘭鈔其嚢槖物甚者或至殺人又不可見及至兵戈稍息子還金華曰采藥以自娛間念及時用即􅁒約二三子往候之以觧夙昔之思去年冬聞時用有弓旌之招使者趣迫上道急扵星火又不及見濂竊自念時用英俊士此行何􅀁不至鸞臺鳯閣將以次而升何日能賦歸縦時用欲歸上之人未必聽也濂雖少時用一嵗則巳皤然成翁度何由至南京既不􅀎至又安􅀎與時用一抵掌􅀏談邪慨然遐思者久之㑹朝廷纂􅁱元史宰臣奉特􅈲起濂為緫裁官使者亦見廹如前逮濂將戒行李時用至武林始旬日耳濂又自念史事甚重當有鴻􅀶之士任其責者濂豈敢與聞藉是以往或得一見時用亦豈非至􅄑歟濂来南京寓扵護龍河上方求時用舘舎之􅀁在忽有偉丈夫来見者問其姓名亟曰我許時用也子豈非景濂乎濂驚喜不及荅亟延入坐備陳五欲見而弗䏻之故時用知濂嚮往之乆亦相與傾倒不風晨月夕無不相往来一旦忽悽然墮淚曰余先朝進士也春秋又髙矣不􅁕以辱明時使者不我知委幣而迫之来我不敢違今巳陳情扵丞相府矣丞相儻言之上得遂歸田焉不趐􅁕矣它日又来言曰聖天子寛仁今用丞相言如􅀁請矣巳具舟大江之濵吾子遇我厚􅄑一言以爲別嗚呼婺與越其壤相接邇其見甚易也乃積四十年而莫之遂厥後始見扵千里之外既見矣逺或四三春秋近或及期相與論學以盡夫情可也未及兩月而即去既去矣或買一小艇相隨五六百里間采江花之幽靚􅇻勤道别亦云可也􅁱史事殷􅁕不敢踰都門愴然而別既别矣一二年間或再得聚首如今日焉猶可也然向者巳如此自今而後其可以必期而必取之耶人事之參差不齊何可復道尚奚言為時用之別耶雖然時用之歸也其有繫扵名節甚大時用采蕺山之蕺食鑑湖之水日與學子談經以為樂者果誰之賜歟誠由遭逢有道之朝故得以上霑滂沛之恩而適夫出䖏之宜也夫道宣上徳以昭布扵四方者史臣之事因不辭而為之書區區聚散之故一已之􅀻爾則又當在􅀁不計也華川文派録序義烏婺上縣自隋至唐名士軰出若婁㓜瑜若駱賔王則其􅀹者也㓜瑜之文以卷計者凡六十有六賔王之文其􅁆亦盈十焉然皆散逸無存其僅見扵世者往往出扵編􅀋家之􅀁采此無他聚之廣則行之乆也宋南渡後宗忠簡公澤其文多至五十卷細髙居士黄公中輔亦十卷香山喻公良􅀎則三十四卷香山之弟杉堂公良弼頗如居士之􅁆南湖河公恪岩堂陳公炳各二十卷惟是四三君子事業雖不同其以文辭有助扵名敎則一而巳計其當時鸞蹌鳳翥於士林行嗈嗈和鳴而􅀛麟為之後先學者歆􅃩之未必不家傳而人誦逺者僅二百年近者始百餘載求其家集則子孫或不䏻以咸有况它學者乎一邑之間且若此而况扵四方乎嗚呼立言之士其心勤矣其慮精矣又惡知一旦變㓕若烟霞者乎然則編􅀋者之功要不可少之也居士之族孫鐡岩公應龢嘗有見婁駱之事乃自忠簡至扵岩堂各編其粹精者十餘篇聚扵一書􅁵為六卷名曰華川文派録華川縣之繡湖别名唐嘗因之置縣故取以􅃅其録云後五十年豫章張侯来為縣讀而善之復謂羣公之文􅄑僅見扵斯然未有謄其副者苟或亡之非唯重有識者之嘆且將何以風厲扵吾民亟請邑士傳君藻精加校讎􅂢俸而刻寘縣庠来徴濂為之序昔者郷先達吳公師道憫前􅁱之日逺而遺文之就泯乃集婺七邑名人􅀁著為敬鄊前後錄二十三卷其視鐡岩志益廣矣惜乎官其􅀖者不使永其傳兵燹之餘手藁弗復􅀎存今侯則惓惓是書夙夜不少置以此較彼賢不肖之後去抑何逺㢤雖然侯之風厲扵縣人士者不止文辭而巳也當如岩堂之介南湖之孝香山之質實無偽杉堂之寛厚有容居士之氣節不羣忠簡之竭誠報國至死而不變庶㡬無􅀒扵侯不然則操觚濡墨仰而􅃅諸人曰我能文我䏻文豈不見􅀏扵大方之家㢤侯名􅁢誠以儒術縁飾吏事忠信㢘明如古循吏縣務雖至􅇵雍雍䖏之輕重皆不失其度吏胥受約束拱手案側不敢出一語相可否諸弊頓革故治效彰著為諸邑之最是為序送國子正蘇君還金華山中序同郡蘇君平仲成均敎胄子者五年近臣有薦其才扵上者即日召見親擢為國史編摩之職平仲詣丞相府辭曰禁林地望清切日侍天子左右備故問區區㓜有聵疾雖麄通文史誠不􅁕以堪之敢辤丞相以聞上亦弗之彊巳而銓曹將别奏官之平仲念去親日久望天末飛雲慨然有威于中復赱白丞相許之戒行李且有日與平仲㳺者重惜其去咸發為聲詩而以首簡授予序平仲予素敬畏者也將何言㢤以論乎家世則三蘇之名聞天下其􅂭徳重望至今與岷峨爭雄遺書流落四海日星赫而風霆噴璇玉綴而瑶珠懸韶鈞鳴而律呂諧師表百世人無異辭奚藉予之言㢤以論乎學術則嚅嚌鄊學之懿遡淵源扵伊洛蹈􅁤轍扵關閩義理精微析如蠶絲訓攷是非判若白黑亦既心凝而身􅂂之矣又奚藉扵予之言㢤以論乎辭章則體裁嚴比姿態横逸如春陽被物或根或荄或卉或條或小或大或圓或偏各隋其物而暢之無有同者其視膠滯一體守常而不變者何如也是故大夫士卿公􅁒文詞者必曰我徵之蘇君也􅀮逸及方外之人􅁒求文者必曰我徴之蘇君也平仲之令聞勃然興燁然不可遇又奚藉予之言㢤無巳則有一焉古者國有國史下至閭卷之間亦有聞史皆據官守勿失紀善惡以示勸戒其國史之法見乎書備乎春秋以事繫日以日繫月以月繫時以時繫年殆猶山嶽之有㝎形不可易者太史遷別出新意輕變編年之舊創為十二紀以序帝王十表以貫嵗月八書以述政事三十世家以錄公侯七十列傳以志士庶歴代史官遵之而春秋之義􅀋􅀮矣荀恱蕭潁士頗譏之而未􅀎大有匡逮至司馬温國公光始取法扵春秋采繫國家盛衰生民休戚之事起周威烈王訖于五代成一家言􅃅曰資治通鑑劉恕直謂非遷之􅀁可擬盖公論云然五代之後而宋承之宋之後而元承之宋有李燾雖嘗著為編年異同朽之盛事鑑世之元􅀛也平仲􅄑聽之願舉此觴為壽平仲曰敢不唯吾子之命一飲輒盡扵是抗手而别清嘯後藁序詩之為學自古難言必有忠信近道之質藴優柔不迫之思形主文譎諫之言將以洗濯其􅁭靈發揮其文藻􅀭厲其體裁低昻其音節使讀者鼓舞而有得聞者感發而知勸此豈細故也㢤奈何習之者多如牛毛而專之者少如麟角也廬􅁜胡君山立生文獻之􅀖抱英銳之志􅆒歴仕塗綽著聲譽粤自戎幙至躋法􅀙雖著勤勞之績不忘賦咏之事風雲月露有以感夫中花草蟲魚有以寓乎目與夫人事酬酢時物遷移皆見之篇翰焉日積月盈分為清嘯前後二藁前藁則國史危公既序之矣予来京師復得窺其後藁而胡君遂微為之序予披繹再四因作而曰正音􅄫寥久矣誕者流扵荒忽而無據弱者過扵纎靡而不振俗者溺扵陳腐而不新麄者流扵觕犖而不潤其音節體裁之乖方文藻􅁭靈之弗暢具有之矣詩之為道其果如是乎㢤有如胡君之作命意深而措辭雅陳義髙而比物廣其殆庶㡬有忠信近道之質者歟藴優柔不迫之思者歟形主文譎諫之言者歟此予不䏻不撫卷而嘆賞之也予也不敏以荒唐之資操􅄶迫之行雖自漢魏至干近代凡􅁆百家之詩無不研窮其㫖趣揣摩其聲律秋􅄠被肩卒不䏻闖其閫奥而􅀘扵政治其視胡君之作得不甚愧矣乎然而穹亭邃舘必壓以呀然之獸鉅人元夫必冠以峩然之弁雄章俊句必首以傑然之文嗟予何人尚敢為胡君之詩之序乎牢讓再三竟不􅀗命斐然有作情見乎辭丹崖集序為文非難而知文為難文之羙惡易見也而謂之難者何㢤問學有淺深識見有精麄故知之者未必真則隨其􅀁好以為是非照乗之珠或疑之扵魚目淫哇之音或嫓之以黄鐘雖十百其喙莫􅀎與之辨矣然則斯世之人果無有知文者乎曰非是之謂也荆山之璞卞和氏固知其為寳渥洼之馬九方歅固知其為良使果燕石也駑駘也其􅀎並陳而方駕㢤雖然弊也久矣孰扵民散師廢之後而必望見知扵人乎苟有之曠百世而相感者不須悵然而遐思矣予與唐君䖏敬共居浙水東雖未之識有持其文一二篇来者頗􅀗讀之顧謂二三子曰屏斥蕪纇何其玉之潔而珠之明也脉絡聮貫委蛇不斷又何韶鈞九奏音律相宣而始終粲如也其殆􅀎言之士乎去年之春予􅀍詔總裁元史而䖏敬亦以議禮􅀍徵會于南京亟欲挽入史局儀曹愛其才弗允及予入詞垣為學士䖏敬亦来為應奉文字朝夕同論文甚懽遂索其全集觀之復顧謂二三子曰沉􅉼扵經而為之本原饜飫扵史而助其波瀾岀入諸子百家以􅀶其支流此作有之又頗愧向之知䖏敬者未深也嗚呼近代之文予見之夥矣大風􅀭沙而五色為之昏昧繁音嘈雜而五聲為之失倫求其如䖏敬者抑何其鮮㢤非曰如之知之者亦寡矣此無他無真實之功求鹵莾之效西抹東塗莫尋統緒左剽右竊僅成簡編輒􅃅諸人曰我知文我知文人以艱􅀷文淺近者示之則曰是誠古文㢤何其雅奥而不羣也或以其言之易又以塵腐罷軟者戯之則又曰此亦古文耳何其暢達而無礙也是皆無真見以人舌為之目故靦然而無愧怍有若䖏敬之文其尚䏻知之㢤予雖不敏愛玩䖏敬之文日不􅇚手以為可垂逺而􅀓後因為序諸卷首嗚呼䖏敬之文荆山之玉也渥洼之馬也又豈患無卞和氏與九方歅者乎予之􅀁論隘矣䖏敬名肅會稽人丹崖其自􅃅也故以名其集云贈會稽韓伯時序越韓君伯時􅀙府君辟為山隂校官名上尚書吏部吏部同余竊自念為韓公之學者布滿逺近尚􅄑見之如􅀻㳤許公之徒者乆未䏻逢其人今年夏乃扵京師􅀗與伯時遊伯時韓公諸孫而又得卒業扵其門其人温如其文燁如其言論鏗如是誠無愧扵家學者庶㡬有以畢余之志􅃴総裁史事未及與伯時相叩撃而伯時將去反欲徴余序以識别余將何言㦲雖然山隂雖小邑亦古者子男國也伯時之行以人師自䖏邑之子弟皆北面而受業使乃祖韓公之道益眀斯盖不辱扵傳經之家矣後之君子稽其源委寫以成圖如田何夏侯勝諸人故事夫豈不可㢤顧余不敏操無用之學徒以空文出應時湏畫蚓􅂗鴉日不暇給思欲如許公家居講授而弗之遂其扵伯時之去寜不歆􅃩扵中乎異日投簮而歸當謁伯時扵越相與泛賀湖之晚波挹禹山之秋翠以盡􅀻㳤扵伯時者亦豈為晚㢤伯時以為何如是為叙宋學士文集卷第七鑾坡集卷第七
