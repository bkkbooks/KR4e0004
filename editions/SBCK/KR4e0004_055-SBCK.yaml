body:
  text: 勃尼國入貢記濂承㫖禁林日福建行省都事沈秩来謁曰洪武三年秋八月秩與􅁥察御史張敬之等奉詔徃諭勃尼國冬十月由泉南入海四年春三月乙酉朔逹闍婆又踰月始至其國國王馬合謨沙僻㩀海中倨傲無人臣禮秩令譯人通言曰皇帝撫有四海日月所照霜露所隊無不奉表稱臣勃尼以彈丸之地乃欲抗天威邪王大悟舉手加額曰皇帝為天下主即吾之君父安敢云抗秩即折之曰王既知君父之尊為臣子者奈何不敬亟撤王座而更設香几寘詔書其上命王帥官屬列拜于庭秩奉詔立宣之王俯伏以聴成禮而退明日王辭曰近者蘇禄起兵来侵子女玉帛盡為所掠必俟三年後國事稍紓造舟以入貢爾秩曰皇帝登大寳巳有年矣四夷之國東則日本髙麗南則交趾占城闍婆西則吐蕃北則䝉古諸部落使者接踵于道王即行巳晚何謂三年王曰地􅇤民貧愧無竒珍以獻故􅀅遅遲爾非有他也秩曰皇帝富有四海豈有所求扵王但欲王之稱藩一示無外爾王曰容與相臣圗之又明日其相王宗恕来曰使者之言良是請以五月五日成行闍婆有人間王日蘇禄来攻王我實帥師却之今聞歸誠中國無我闍婆矣王惑之秩復走見王王辭以疾秩大言謂宗恕曰爾謂闍婆非中國臣邪闍婆尚稱臣扵爾國乎何有使者朝還大兵且夕至雖欲噬臍悔可及乎宗恕悚然曰敬聞命矣乃入白王王大㑹其属共議遣亦思麻逸等四人入朝臨發王以金佩刀吉其布為贈秩毅然辭之王顧近侍曰中國使者㢘㓗乃如是邪闍婆来人誅索每無厭况強之而不受邪尓曹宜效之秩以渉海萬里不可以無紀乃與敬之各賦一詩王大悅請書于版中懸之既與王别舟行至海口王又惑左右言令人謂亦思麻逸曰使者不受刀布尔等必不還矣秩恐王不安復走王所反覆譬暁之王曰使者之言如此予中心釋然矣王舉酒為别酹地祝曰願使者蚤還中國願亦思麻逸早歸蔽邦秋八月十五日還京師十六日以亦思麻逸等入見錫燕扵㑹同舘巳而遣歸寵賚其王甚厚云其所貢物鶴頂生玳瑁大片龍腦米龍腦黄蠟降真諸香其表用金刻畨書彷彿如囬鶻書其文鄙陋不足􅀚皇太子牋用銀牋文與表相􅀋其地炎􅀬多風雨無城郭􅀣木柵為固王之所居若楼覆以貝多葉王綰䯻祼跣腰纒花布無輿馬出入徒行城中人不滿三千家多業漁剪髪齊額婦人衣短衫僅蔽􅇩背腰繋花布散髪跣足其物産則吉貝黄蠟降真􅀛筒玳􅈘梹榔煮海為塩􅄋椰􅄴為酒無稻麥捕生魚鰕蟹食之兼食沙糊沙糊者取􅀣實為􅄴澄漉細膩如粉食之能不饑食無噐皿以竹編貝多葉為之食畢則棄之畨書無筆札以刀刻貝多葉行之事佛甚嚴以五月十三日為節國人亦扵是日作佛事若有燕饗則刲羊豕鷄鵝鳴皷擊鈸以為樂此其大凢也先生職在太史願為詳紀之以昭聖化所􅀍之盛濂聞勃尼在西南大海中所統一十四州去闍婆四十五日程去占城與摩逸各三十日程去三佛齊四十日程歷代未嘗朝貢故史籍不載至宋太平興國二年其王向打始因啇人蒲盧歇遣施弩使副蒲亞利判官哥心等賫表来貢元豊五年二月其王錫理麻喏復遣使如前自後輙不聞元有國百餘年亦不復至方今聖人在上威徳之所􅀍無逺不屇璽書一頒輙稽首臣順稽之徃古􅁢謂過之至若秩等奉宣徳音辭令所加足以讋服其心亦可謂不辱君命者矣其事宜書以俟他時修正史者采焉秩字仲庸湖之烏程人敬之字某州人二人恊心謀慮無役不偕行故卒能成功云表文云勃尼囯王臣馬合某沙為這㡬年天下不寕靜的上頭俺在番􅀖裏住地呵没至的一般今有皇帝的使臣来開讀了皇帝的詔書如道皇帝登了寶位與天下做主俺心裏好生喜􅂬本國地面是闍婆管下的小去䖏乍消得皇帝記心這幾日前􅀍蘇禄家沒道理使􅀅歹人来把房子燒了百姓毎都喫害了記着皇帝詔書来的福􅄻喜得一家兒人没事如今本囯别無好的東西有些不中的土物使將頭目毎替着我的身子根隨着皇帝跟的来的使臣去見皇帝願皇帝萬萬嵗皇太子千千嵗可怜見休恠洪武四年五月勃尼囯王臣馬合某表書劉真人事劉真人徳仁滄州樂陵人始生有光照其室及長讀書稍通大義㑹宋靖康之亂徙居塩山大平鄉一日晨起有老叟乗犢車相過摭道徳經要言授之曰善識之可以脩身可以化人仍投筆一枝而去自是玄學頓進􅀙之㳺者衆真人乃取所授書敷繹其義以示人一曰視物猶已勿萌􅆷害兇嗔之心二曰忠扵君孝扵親誠扵人辭無綺語口無惡聲三曰除邪􅁋守清靜四曰逺􅀔利安賤貧力耕而食量入為用五曰毋事愽奕母習盗􅀼六曰母飲酒茹葷衣食取足毋為驕盈七曰虚心而弱志和光而同塵八曰母恃強梁謙尊而光九曰知足不辱知止不殆學者宜世守之金大定􅀄詔居京城天長􅀚賜號東岳真人傳其道者㡬徧國中且善扵劾召之術趙氏爲狐所祟真人劾之里中塋兆自焚狐数百鳴嘯赴火死人尤神之然其養母如禮及亡䘮􅀕一遵世教無愆度者後􅀂干年追封無憂普濟􅄏明洞微真人徳仁卒陳師正嗣師正㓜漁于河徳仁挈以入道䏻預知吉凶事師正卒張信真嗣有詩文数百篇號玄真集傳于世信真卒毛希琮嗣當金之亡兵戈俶􅅰希琮䏻以柔而存希琮卒酈希誠嗣元憲宗甚尊禮之賜真人號曰太玄名其教曰真大道仍給壐書䕶之希誠卒孫徳福嗣徳福卒李徳和嗣徳和卒岳徳文嗣徳文卒張清志嗣自徳仁至此世稱之爲九祖云史官曰道䘮千載諸子之言人人殊徳仁在宋金之間􅺾髴老子遺意以化人人亦多􅀙之者盖其清修寡欲謙卑自守力作而食無求扵人實與天理合也天理人心所同固足以感召歟彼得之而此失之其亦有以也夫文原余諱人以文生相命丈夫七尺之軀其所學者獨文乎㦲雖然余之所謂文者乃尭舜文王孔子之文非流俗之文也學之固宜浦江鄭楷義烏劉剛楷之弟柏嘗􅀙予學巳知以道為文因作文原二篇以貽之其上篇曰人文之顯始扵何時實肇扵庖犠之世庖犠仰􅀚俯察畫竒偶以􅁚陽隂變而通之生生不窮遂成天地自然之文非惟至道含括無遺而其制噐尚象亦非文不䏻成如垂衣裳而治取諸乾坤上棟下宇而取諸大壮書契之造而取諸夬舟楫牛馬之利而取諸渙随杵臼棺槨之制而取諸小過大過重門擊柝而取諸豫弧矢之用而取諸暌何莫非粲然之文自是推而存之天􅂨民彛之叙禮樂刑政之施師旅征伐之法井牧州里之辨華夷内外之别復皆則而􅁚之故凢有關民用及一切彌綸範圍之具悉囿乎文非文之外别有其他也然而事為既著無以紀載之則不䏻以行逺始托諸辭翰以昭其文畧舉一二言之禹敷土随山刋木奠髙山大川既成功矣然後筆之為禹貢之文周制聘覲燕享饋食昏䘮諸禮其升降揖譲之節既行之矣然後筆之為儀禮之大孔子居鄉黨容色言動之間􅀙容中道門人弟子既習見之矣然後筆之為鄉黨之文其他格言大訓亦莫不然必有其實而後文随之􅀄未嘗以徒言為也譬猶聆衆樂扵洞庭之野而後知其音聲之抑􅀭綴兆之舒疾也習大射扵矍相之圃而後見􅀚者如堵墻序􅀧之􅀭觶也苟隃度而臆决之終不近也昔者㳺夏以文學名謂􅀚其㑹通而酌其損益之宜而巳非專指乎辭翰之文也嗚呼吾之所謂文者天生之地載之聖人宣之本建則其末治體著則其用章斯所謂乗隂陽之大化正三綱而齊六紀者也亘宇宙之始終􅀋萬物而周八極者也嗚呼非知經天緯地之文者惡足以語此其下篇曰為文必在養氣氣與天地同苟􅀎充之則可配序三靈管攝萬彚不然則一介之小夫爾君子所以攻内不攻外圗大不圗小也力可以舉􅂦人之所難也而烏獲䏻之君子不貴之者以其局乎小也智可以􅅮虎人之所難也而馮婦䏻之君子不貴之者以其騖乎外也氣得其養無所不周無所不極也􅄃而為文無所不參無所不包也九天之屬其髙不可窺八柱之列其厚不可測吾文之量得之規燬魄淵運行不息棊地萬熒􅄤次弗紊吾文之􅆋得之昆侖縣圃之崇清層城九重之嚴䆳吾文之峻得之南桂北瀚東瀛西􅈚杳眇而無際􅆂􅀒而不竭魚龍生焉波濤興焉吾文之深得之雷霆鼓舞之風雲翕張之雨露潤澤之􅀑神恍惚曾莫窮其端倪吾文之變化得之上下之間自色自形羽而飛足而奔潜而泳植而茂􅀂洪􅀂纎􅀂髙􅀂卑不可以数計吾文之随物賦形得之嗚呼斯文也聖人得之則傳之萬世為經賢者得之則放諸四海而凖輔相天地而不過昭明日月而不忒調爕四時而無愆此豈非文之至者乎大道堙微文氣日削騖乎外而不攻其内局手小而不圗其大此無他四瑕八􅁳九蠧有以累之也何謂四瑕雅鄭不分之謂荒本末不比之謂㫁筋骸不束之謂緩㫖􅃐不超之謂凢是四者賊文之形也何謂八􅄀訐者􅀅以疾夫誠撱者􅀅以蝕夫圜庸者􅀅以混夫竒􅇤者􅀅以勝夫􅃾觕者􅀅以亂夫精碎者􅀅以害夫完陋者􅀅以革夫愽眯者􅀅以損夫明是八者傷文之膏髄也何謂九蠹滑其真散其神揉其氛徇其私㓕其知麗其蔽違其天昧其㡬爽其貞是九者死文之心也有一扵此則心受死而文䘮矣春葩秋卉之爭麗也􅆐號林而蛩吟砌也水湧蹄涔而火炫螢尾也衣􅀍土偶而不䏻視聴也蠛蠓死生扵甕盎不知四海之大六合之廣也斯皆不知養氣之故也嗚呼人䏻飬氣則情深而文明氣盛而化神當與天地同功也與天地同功而其智卒歸之一介小夫不亦可悲也㢤予既作文原上下篇言雖大而非誇唯智者然後􅀎擇焉去古遠矣世之論文者有二曰載道曰紀事紀事之文當本之司馬遷班固而載道之文舍六籍吾􅀅焉􅀙雖然六籍者本與根也遷固者枝與葉也此固近代唐子西之論而予之所見則有異扵是也六籍之外當以孟子為宗韓子次之歐陽子又次之此則國之通衢無榛荆之塞無蛇虎之禍可以直趨聖賢之大道去此則曲狹僻徑耳犖确邪蹊耳胡可行㦲予􅀼恠世之為文者不為不多騁新竒者鉤摘􅀮伏變更庸常甚至不可句讀且曰不詰曲聱牙非古文也樂陳腐者一假􅂣屋委靡之文紛揉龎雜略不見端緒且曰不淺易輕順非古文也予皆不知其何說大抵為文者欲其辭逹而道明耳吾道既明何問其餘㢤雖然道未易明也必􅀎知言養氣始為得之予復悲世之為文者不知其故頗䏻操觚遣辭毅然以文章家自居所以益摧落而不自振也今以二三子所學日進扵道聊一言之四十二代天師正一嗣敎護國闡祖通誠崇道弘徳大真人張公神道碑銘有序洪武丁巳冬十有二月五日四十二代天師張公薨扵龍虎山之私第年甫四十又三禮部尚書張籌即為奏聞皇上嗟悼者良乆且曰朕欲命其徧祠五嶽今方一至嵩山何期大数止扵斯耶逐親製文一通遣前浙江行省􅂙知政事安慶為弔祭使仍令其冡子宇􅀄􅊞掌教事戊午春二月十六日宇􅀄奉公冠劔􅁠厝南山先墓之次各十有二月某日卜宅兆扵某而􅄟之宇􅀄恐遺徳未䏻太白于世與群弟子輯為成書使張致和即金華山中請銘神道之碑濂幸辱與公㳺義不可辭公諱正常字仲紀姓張氏信之貴溪人漢􅅏文成侯四十六代孫也重紀至元乙亥夏六月十三日其父太玄真人坐而假􅄰忽見神人飛空而至曰余自華盖山来㳺君家願見容也及覺而公生紫雲覆庭紅光照室人以為祥徴年七􅀊雙目爛爛如巖下電容止異群童後三􅀊太玄出㳺五岳名山指相傳雌雄劔及玉刻陽平治都功印曰龍星再集于亥吾兒當持此大振玄風太玄渡淮化去而公之仲父嗣徳継主其教仲父薨衆論咸屬于公公力譲仲父之子正言正言薨公始嗣其職實至正巳亥之􅀊太玄之懸記至是始驗公陞廣筵開演道家玄㫖四海學徒聞者聳然領觧時天下大亂經籙秘而不傳者十年公乃啓黄書赤界紫素丹刻之文授其徒胡合真整比以行奉贄来受者川赴雲蒸劒失其一流落鄱陽李氏家夜生光恠公訪而合之辛丑上統大􅀅親取江西公知天運有歸㳺遣使者上牋述臣順之意乙已公朝京師上一見恱曰瞳樞電轉法貌昻然真漢天師苗裔也下詔褒羙之錫燕者再兼有金繒之賜丙午復入覲京城士庻人求靈符者日以千百計侍史不􅀎給閉関拒之乃相率毀關而入公叩齒集神濡毫􅂐鉅符投朝天宫井中人爭汲之須􅁷水皆竭見土弗止飲者疾瘳上嘉之令作亭井上號曰太乙泉及還山復詔中貴人賜以織文金衣仍下中書給驛劵􅂌之以便朝覲洪武戊申上登大寳位建號改元公入賀錫燕于便殿内降制書授以正一教主嗣漢四十二代天師護國闡祖通誠崇道弘徳大真人之號仍俾領道教事給以銀印視二品設其僚佐曰賛教曰掌書乆之陛辤而歸上御謹身殿􅀙容謂曰卿乃祖天師有功扵國所以家世與孔子並傳以迄于今卿宜體之以清靜無為輔予至治則予汝嘉賜白金十二鎰新其宅第巳酉春上召公入朝踰月承顧問者四錫燕者一三月十三日上将通誠扵天帝致齋三日御衮冕服親署御名于章勑太常設樂手授于公俾祝而焚之禮成燕公于文楼群弟子饗扵别舘復有金繒之賜庚戌夏上録公之功特勅吏部改贈公父三十九代天師太玄輔化體仁􅀿道大真人嗣成為正一教主太玄弘化明成崇道大真人改封公母明慧慈順仙姑胡氏恭順慈惠淑靜玄君玄君時年八十朝野以為榮是年秋上復召見問以􅀑神情状更給銀印壬子秋復頒制誥以寵之冬十又二月復召入覲癸丑春􅀅還上命􅅏弟子以司祕祝之事丙辰秋上遣使召公公忽先期而至上喜曰卿之来何與朕意相符邪明年之秋朕将遣使祠海嶽諸神卿當妙柬清修之士與其偕来丁巳夏公率群弟子汪弘仁等入覲錫燕午門之城楼上舉爵謂公曰卿宜罄此一觴勑内侍出御製歷代天師賛示公曰他日當書以賜卿翼日詔公􅀙太師李韓公善長祠嵩山分遣重臣與公弟子代祠群望自公而下賜衣各二􅊞楮幣有差既還錫燕如􅀄公自返故里志􅃐頗異常一日置酒與昆弟酣飲慨然嘆曰五嶽名山先子欲逰而不可得嵩山中峯乃吾祖得太清丹經之所今藉天子威靈幸一至焉嚥曦景扵層霄邈浮埃扵浩刼吾志􅀅有在矣君子疑其言未㡬示以微疾端坐榻上屬弟子方􅀙義曰吾無以報國家寵恩爾等宜左右我子孫以賛寜謐之化命取劔印授其子曰我家千五百年之傳在是汝其勉之死生数也吾之不死者其光赫熹四爥寰瀛先天地不知其始後天地不知其終也舉手作一圓象嘿然而化是夕大崖石崩聲聞数十里云公㓜警敏靈籙文秘之屬皆不習而通􅀊屡旱禹歩召風雷精神逹扵􅄀漻甘霖即降或有為魑魅所慿者授以片符輙潜景不見公憫兵戈疫厲之餘沴氣不消舉行玄壇舊典修壇墠建隂陽􅂦而鍊度之其徴驗尤夥然其天性夷曠㓗而不緇如超萬物之外故以冲虚子自號最愛佳山水仙踪靈跡所在必窮幽極深動至累日忘返當適意時欲乗白鶴與群仙翶翔紫清之上其扵人間事未嘗因此少輟其奉玄君備極孝養暨殁􅌾祭咸盡禮度兵禍相仍傾貲募人為兵以捍禦郷井人頼以安公之玄裔備見世家兹不載其曾大父諱宗演三十六代天師演道靈應冲和玄靜真君妣周氏某玄君其大父諱與材三十八代天師太素凝神廣道明徳大真人金紫光禄大夫􅇷封留國公妣易氏妙明慧應常靜玄君其考妣則太玄真人與胡氏也公字􅀚宇娶盱江包氏宋宏齋先生恢之五世孫子男子四人長宇􅀄即今天師頴悟有文學人稱為列仙之儒近者入朝上召見奉天殿反覆諦視之􅀏曰絶􅀋乃父寵賚有加焉次宇清次海鵬次勝佑子女子二人一歸鄱陽王岳一在室惟公生乎神眀之胄簡素端凝用道為體而膠轕㳺氛無自入扵念慮澄靜之乆天光自發所以受知聖君八朝京師天寵使蕃聲聞四逹至扵死生之際又䏻不動聲色超然坐脱如行者之返故廬非真有道者豈易致㢤是宜銘銘曰天開日明真人上升周流九霄駕輗作軿卿雲英英剛飈冷冷絳節翠旙恍其来迎載稽玄裔􅀊踰千齡五綵交絢主笈金涇矧有劔印奔星走霆非人莫授恐干􅀑刑華盖神君扵焉降精圓目靑朣閃如電熒入朝帝京照耀殿庭進退有儀金衣霞頳帝曰俞㦲爾方外臣輔朕鴻化凝真集神巍巍嵩山嶽之中尊爾徃代祠執禮如存庶集靈和以綏兆民皇用褒錫璽書金繒君臣遇合玄徳之徴胡為弗􅅏飛神窈􅄀崩崖墜雷百里震驚圎光有赫四爥寰瀛在天為清在地為寜在人為貞是謂三靈此乃道樞中黄之扃公䏻守一精聚氣凝不死維神所蛇維形白鶴来歸遼東露零洞視萬古後天弗傾佛智弘辨禪師傑峯愚公石塔碑銘有序禪師諱世愚號傑峯衢之西安人其父姓余諱某以書詩傳家母毛氏嘗有姙夢􅀚世音送青衣童子覺而生師自㓜好禮佛塔迨長遂入蘭溪顯教禪寺􅀙􅀌嶽嵩公供灑掃之役巳而薙除須髪為大僧受具足戒晝夜奉薌燈惟謹用箴出指端血書金剛般􅀂尊經忽抵几嘆曰縦䏻盡書一大蔵教亦屬有為絶如夢幻不可控摶盍學無為以明心宗乎出謁古崖純公石門剛公涕淚悲泣祈以求端用力之要二公欣然語之師佩受其言不分眀暗兀坐如枯株時年二十五矣師復嘆曰年日以增而學日以退豈非聞見未充無以啓發知觧乎踏濤江而西見諸善知識時布衲雍公断崖義公中峯本公大弘雪岩髙峯之道師一一咨叩下語不契中心㤵亂遂止南屏山中三年不踰戸限聞止巖成公倡道大慈山定慧禪寺門庭雖髙峻而􅀗證悟者甚衆亟徃謁焉止巖曰南泉有云不是仙不是佛不是物是何物師聞而愈疑仍還南屏諸縁盡捨類氣絶之人行坐􅆍食不旬覺知唯一念歷然在太虚中如此者乆之一夕坐至夜分聞鄰席僧唱證道歌至不除妄想不求真䖏豁然如釋重􅀒舉目洞照不見一物􅅏礙喜躍不自勝且曰拂法元在目前秪為太近故人自逺之耳即觚成偈有夜半忽然忘月指虚空迸出日輪紅之句乃走見止巖㑹止巖㳺姑蘇走天池求證扵元翁信公元翁止巖之師也元翁問曰上士􅀙何来師曰大慈元翁曰大慈鼻孔其深多少師卓錫杖一下元翁曰拗折錫杖爾􅀅何卓師因作禮元翁曰爾可歸見止巖師既見備陳悟由止巖喝曰何䖏見神見􅀑師曰今日捉了賊也止巖曰􅂍在何䖏師便喝止巖曰􅄏口合口都不是向上舉􅀅一句来師曰徧界明明不覆蔵止巖竪起竹箆請師指名師便掀倒禪床止巖曰爾欲来􅀅虎􅂡邪師復作禮止巖連打三下囑曰善自護持他日說法度人續佛慧命次日命為侍者服勤三年又還南屏住山樵􅀮逸公請司蔵鑰㝷入大慈為上座元至順二年師歸西安西安烏石山有福慧古刹乆廢為瓦礫之區師獨結茅廬以居蛇虎縦横了無恐怖意郷民以為有道者􅀒糇粮塩醯以遺之師澄居攝念影不出山者一十六載聲光日振緇素之士坌集座下恒至二三千指其地或無所容縣大姓陳君嗣宗為造殿堂門廡及經蔵鐘楼之属其制如大伽藍且置山􅀂田取其入以給衆帝師大寳法王聞之賜師佛智弘辨禪師之號至正六年冬江南行宣政院亦録師之行業請主廣徳石溪興龍禪寺師祝香報恩歸之扵止巖表其自證也嚮化之盛不下烏石時連留三夏烏石之衆念師去鄉里者乆如子失母力迎其還適郡境新建佛刹者四曰古望曰龍眠曰寳盖曰普潤皆延師􅄏山為第一祖師超􅀿之無不感慕而奮迅國朝洪武三年冬十二月郡守黄君鎮戌􅀅徐君與啓普度水陸大齋五晝夜僉謂非師不足拯㧞沉淪師勉強成行竣事而返畧示微疾召門弟子勉以精進入道索筆書偈云生本不生㓕本不㓕撒手不行一天明月擲筆而逝是月之十日也越七日奉師全身蔵扵烏石慈雲塔院師䖏菩提􅂣中歷五十夏住人間世閲七十春秋四方叅學莫知其数䏻其法者則慧􅀚慧進徳随等一十五人也所度弟子尤多其存者則慧實道逹等二十又三人也二㑹語四卷巳刋行叢林中云師道價傾四方非惟禪流奔湊而公卿大夫若太尉髙公納麟若中書兵部尚書黄公徳昭若浙江行省左丞老老若江東㢘訪副使伯顔不花或凾香致敬或馳書問道或上謁親問玄要得其之言隻字寳之不翅南金師之法施及人可謂愽矣使其正席則惠利所􅀍宜益廣今乃僅止扵斯有識者恒傷之紀載遺行以昭示来裔要不得而􅃍畧也徳随既出世西安之崇壽佩師之徳不忘與道逹共圗爲不朽計結集成状徴予為之銘予聞圓悟之道實發臨濟心髄之秘其五傳至荆叟功用益弘際遇穆陵寵遇甚至荆叟再傳而至天池以慈憫之故誘引􅀄機恒俯而就之不為髙絶難攀之行使人望門而還所以其弟子布滿東南者甚夥􅀂師者則天池之嫡孫也師求道深切如救頭然本心既明出語皆法弹指之頃起大道􅂣扵乆廢之餘非其福慧具足為人天師疇克􅀂是邪造銘以勒諸塔一以著師之善継一以厲来者之進修當有􅅥然自省者矣銘曰先佛振靈青童應徴拓化原􅀆生而質羙逢佛輙禮性之存􅀆歷抵諸師荅問難疑入無門􅀆大慈雲矗􅃒山絡谷法雨均􅀆􅁬襼直前一死敢􅂢心逾痻􅀆如欒瞑眩有眼不見耳無聞􅀆其指頓忘夜半月明叶如日輪􅀆周徧法界無内無外顯一真􅀆百千妙玄開目洞然照無垠􅀆為法出世附者川至度迷群􅀆瓦礫之業化為寳宫金碧文􅀆公侯之貴馳書奉贄祈普熏􅀆生㓕兩非去住一機漫云云􅀆太虚凝碧萬里無跡絶纎塵􅀆烏石聿崇清泉不窮示法身􅀆遺行有煒表者太史勒堅珉􅀆寫經為像及血書心經賛無授上士請􅀎細書者寫經成􅀚音大士像復出指端血書行經扵像後来請余賛賛曰法門之相有總有别真身為佛佛􅀃為經經属扵法佛乃属人人法二相了不相即今因寫經以成佛身縦横曲折無非經者小如沙塵中含法界可喻總相復刺鮮丹重書契經􅂅力所致如黄金色大雖徑寸視等針鋒可喻别相總别雖異其理則一由是􅀚之佛法廣大無所不攝即别即總非别非總上士扵此忽然證得展卷之間不見有經經且不有而况扵佛乃知妙用在吾一心與經與佛三無差别善思念之我􅀃非妄宋學士文集卷第五十五芝園後集卷第五
