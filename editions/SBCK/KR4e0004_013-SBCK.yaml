body:
  text: 故茶􅁜貞母陳夫人譚氏墓誌銘共姜守義賦詩以自誓孟母訓子㫁機而示警貞節昭乎閫範誨言翼乎隂教傳芳徃古垂則方今况乎百世之下聞風而起勵志扵蚤齡􅀵榮扵暮景其操若金石而弗渝其訓􅀋氷蘖而加􅅚朂厥令子爲時名臣有若貞母陳夫人者其亦卓乎不可及巳惟夫人諱某字某姓譚氏譚爲茶􅁜鉅族真隐遺曹雲陽之山如翠旗之開張紫微之􅈐若銕馬之馳突􅀔緜延而蟠結氣絪緼而鬯逹清淑􅀁鍾嘉徴攸頼故夫人之生也髫稚之年婉慧絶品剪綴之工不學自䏻􅁝枲之習共事惟謹特鍾愛於親閭蚤擇配扵君子時則有如陳府君諱某世載徽羙生同里開雅稱詩書之府􅁢爲簮纓之裔盟言既訂童㓜来歸祥禎之應日臻温煦之福自至逮及笄齡益增遐識祗事舅姑備敬養之道敦睦夫黨致雍肅之義主中饋知修潔之方佐烝甞盡􅇶惕之敬見稱耉長表厲宗門不幸年甫三十􅃍隕􅀁天澧水秋竭嘆蘭蕙其可馨嶺松冬槁悵女蘿其焉托未亡之稱弗絶于口一醮之義不改其節有子曰某賦資頴㧞禀識剛明寤寐群經欲明體以􅃴用三錯諸務思致君以澤民元之季世四海興戎乃﨑嶇扵兵間㝷盤旋扵江表􅃴值聖主龍飛群雄川赴慶風雲之嘉㑹喜魚水之相逢試以檄文辭意雄偉聽其談辨籌䇿􅀷弘遂署爲東曹􅁺當大􅀅四征之日正羽書交馳之時酬荅整睱事無凝滯㑹淮安納􅅃奉命徴兵甫髙郵之斯屇俄僞吳之見縶杭論弗屈陳義益髙因讋服其強悍􅀗遣還扵朝署由是入賛省垣出掌􅀖憲恊㳟而庻政惟和震盪而百壬自避其典守􅇵府也剗累政之極弊登難集之積賦政令􅀁及精采一新其參預機務也立經陳紀期厎隆平之治獻可替否益盡匡弼之忠泊乎執法中䑓澄清諸道白簡紏刻而物無遁情赤墀敷奏而廷無留議盖持巳清白潔如氷雪遇事果决捷如風雨􅀁以姓名逹于寰宇政事書于竹帛信無愧古之名臣者矣先是兵燹方張毋子睽隔皇上録賢念功俾從間道迎養賜之以金繒居之以室廬恩寵便蕃焜煌無比動薦紳之慕􅃩形騷人之歌咏僉謂夫人徳積于躬禄􅀍嗣續身具􅈾扵五福養不减扵三牲安受尊榮以及考終衣食賻禭之厚棺槨宅兆之隹亦云備矣夫人曽祖某祖某父某妣某氏􅀁生三子長即某中奉大夫御史中丞次曰克寛壮年而夭次曰復克荷家政一女曰慕貞未嫁而亡夫人以洪武辛亥十有一月戊午殁扵京師之寓舎壽六十九中書省臣以其事聞特降勑㫖俾歸塟扵故鄕發引就道􅀕以牲牢哀榮之禮􅁢謂兼至明年壬子某月日柩還用堪輿家言卜地扵某山以某月日􅉎焉禮也予􅀼聞之人材固因山川而生山川必籍人材而顯睠此茶􅁜舊稱良郡得名肇自扵漢侯高隠但聞扵唐哲年祀雖遐簡冊靡載終無宏偉之才符比高􅀷之氣惟中丞公生逢景運展謀猷才略以佐興王之業用忠貞鯁亮上結萬秉之知勲伐炳朗聲華赫奕理應有待名始不誣庸因造銘并紀嘉績使知枝葉敷􅃾必有資扵本支流暢逹必逺藉乎源云爾銘曰雲陽之山聚靈孕􅁵䔍生賢毋蔚爲女師其一侃侃徳容温温令則尊章是共先後惟式其二中道遘屯良人棄􅂢􅂘聲摩雲血淚迸泉其三爰從青年以迄白首抱蓈自誓終天獨守其四寒燈夜織秋稗晨炊棲志益勵茹苦若飴其五欲亢其宗唯迪厥子熊膽成丸鷄聲趣起其六積學既冨受材復雄竟乗青雲去􅀙真龍其七臬司騰英藩府效績如鳯斯鳴如鷹斯擊其八三預政路司憲䑓端正氣一暢姦膽自寒其九綵衣趍庭牲鼎就養天寵日加人榮莫讓其十慶綏福履年覬期頥風木不停薤露增悲其十一非有毋儀曷成令㣧勒銘岩阿以表貞正其十二劉兵部詩集序詩縁情而托物者也其亦易易乎然非易也非天賦超逸之才不䏻有以稱其噐才稱矣非加稽古之功審諸家之音節體製不䏻有以究其施功加矣非良師友示之以􅁤度約之以範圍不能有以擇其精師友良矣非雕肝􅅣膂宵咏朝吟不􅀎有以驗其􅀁至之淺􅀷吟咏侈矣非得夫江山之􅂇則塵􅁟之思膠擾蔽固不䏻有以發揮其性靈五羙云備然後可以言詩矣盖不得助扵清睴者其情沉而欝業之不專者其辭蕪以厖無􅀁授受者其制澁而乖師心自高者其識卑以陋受質蹇鈍者其發滯而拘古之人􅀁以擅一世之名雖其格律有不同聲調有弗齊未甞有岀扵五者之外也濂扵職方􅀰中劉君之詩其殆無􅀁愧矣夫劉君名崧字子高故爲西昌大族前代以科第發身者三十七人劉君亦以明經舉進士而其志之􅀁嗜􅀹在扵詩况劉君天分甚高自爲童子時􅂺有驚人之句比長益淬礪弗􅈈上自詩騷下從魏晉以來迄于唐宋凡数十百家皆鑚研考覈窮其􅀁以言用功既􅀷精神參㑹絶無古今之間巳而曰此固可矣然猶未也乃束書走豫章與辛敬萬石周湞楊士弘鄭大同㳺而此五人者􅀒䏻詩名見劉君皆驚異之相與楊􅃀風雅夙夜孜孜或忘寢食反徴之扵古瞭然白黒分矣已而又曰此固善矣然猶未也復痛自䇿督日賦一篇雖沍寒之折膠熾暑之流金劉君擁鼻鼓膝時作嗚嗚聲不成章不止也数年之間卷軸盈几巳而又曰此固若有得矣然猶未也復具布襪行􅆞臨釣䑓上三顧山陟虎鼻峰眺龍門或竟日􅁳捜或終月忘返然以州里之近未􅁕以窮耳目之遐觀環江右之境有竒山川不論道途之逺必一至焉􅁭宇向廣終若未䏻舒暢厥志復度廋嶺勺曲江翫韶石過清逺峽登越王之臺􅆽蒲間泉㳺石室歴觀海北名山再渉鯨波覽瓊䑓雙泉之勝而還劉君之詩扵是乎大昌矣濂幸􅀗讀之凌厲頓迅鼓行無前􅀁謂緩急豐約隐顯出没皆中乎繩尺至其􅀁自得則䏻隨物賦形高下洪纎變化有不可測寘之古人篇章中幾無可辨者嗚呼前千年而徃者吾已知其人矣後千年而興者孰敢謂無其人乎苟謂有其人非劉君之作􅀅􅀎行之扵逺乎世無劉君五羙之具而徒諉詩爲易易者其果可信乎濂也以繆悠之資玩時掲日不􅀎成一章性雅好登臨又無濟勝之具雖扵諸家詩無􅀁不讀終不及窺其藩籬有􅀒師友多矣其視劉君不亦重可愧乎雖然濂雖不善詩其知詩决不在諸賢後故因作序而相與一言之使郊愈復生當不易吾言矣劉君之詩十九嵗以前皆焚去二十至四十九之􅀁存亦十之七八耳今其門人簫翀􅀁編者凡若干卷翀字鵬舉亦􅄝扵詩盖得劉君之􅀓者也弔忠文弔忠文者爲豫章新吳黄君翊作也夫人臣盡忠事君之常經也忠其可弔乎使忠可弔則世之不忠者有可憾焉矣黄君字孟翔翊其名也通春秋工扵属文每以奕葉爲儒錚錚思自見㑹進士科罷去作江西部使者屬亡何又棄去司計廬􅁜學宫滿一考冀可循例補校官廷議改法以錢粟吏不可爲人師更辟大府椽君不得已受事廬􅁜郡君性剛勁不可囬撓事礙扵法輙抱案歴階而升摘其語與上官議反覆相鈎連上官怒斥之䇄立不少動已而卒如君言安成土豪暴甚州縣畏之如鬼一旦殺人上下相目莫敢逮同列嫌君木強嗾君行豪樹柵自固君命㧞去抵其門􅁖少年数十執刃譁而出君叱曰爾欲反耶少年曰反則不反汝足稍前即刳汝腸矣君曰爾主自殺人何與爾事顧乃同族滅耶少年色動君挺身呼而入曰爾即殺我爾即殺我少生皆投刃走君趍坐堂上索豪豪知事急出見君求觧且誘以重賂君陽諾之與其俱来寘諸法人見君咸㦸手指曰此健吏不可犯也至正壬辰大盗起蘄黄􅀅及郡郡二千石與官属皆雲烏逝君獨止孔子廟堂盗􅀗之知其爲府􅁺強之仕使行官書君罵曰死狗奴我死即死其􅀎官扵賊邪盗怒反接于樹歴一日意其自悔抽刀礪頸曰從則禄汝不從則血涴吾刀矣君大罵愈扵􅀄賊斫首而去嗚呼事君竭忠固以死継之然亦視其位之何如耳當是時綂制閫外者宜死之專城而居者冝死之荷戈禦侮者冝死之然皆未甞死君以一府􅁺之微可以不死也即不死物議當不及乃􅀎瞋目詈賊視死如歸使其當前三者之任其激揚􅁬厲足以有爲可知矣此不爲而彼爲之悲夫君之子載以文學擢第奉常間拜予泣道君事請爲文然君之死孰不以爲忠至其從容就義則鮮有察其詳者予因造文一首托之椘聲􅆞綿悲愴以白君之情君雖在九泉必當以予爲知巳使世之不忠者讀焉其亦有􅀁愧夫君之友廬􅁜蕭彜翁鄕貢進士也參謀軍事扵省府僞漢䧟廬􅁜赴井死婦弟同縣鄧摏爲臨江府吏臨江䧟椿集廬􅁜義軍千百濟以舟偕萬夫長楊瓛等與賊大戰城下三日兵潰投江死其志與君同俱人傑也法冝牽聮得書文曰緊委質以事君􅀆秉忠貞而不􅈥斯天經與地義􅀆位無間扵尊卑當海嶽之塵昏􅀆皷腥風扵干戈譬巨瀦之失防􅀆泛摇摇之大波悲何山之不懐􅀆復何􅁜之不㐮舞魚龍而跳罔象􅀆孰舉手以閼其狂􅀝長劍扵天外􅀆豈予力有不任瞻九􅀜之莫通􅀆誰属予以三軍矧祕計之屡出􅀆復掩耳而不予聽婦人難與圖謀􅀆徒有淚以沾膺慟􅂘而叩蒼旻􅀆予倀倀而安之或危蹙而無􅀁聘􅀆􅀅誓死以爲期胡妖氛之日熾􅀆綘帕首而狂呼冠切雲而佩葱珩􅀆棄堅城而長逋予雖賤為府史􅀆頗甞與扵禄食縦一粟其亦君恩􅀆敢曰職卑而莫恤毁車殺馬而遐逝􅀆人孰得而非予君有急而臣背去􅀆其自揆為焉如彼王蠋本齊民􅀆雖君禄有不享尚一死以報君􅀆植後世之大防况予結髪而好脩􅀆聞聖謨扵父師臨難而求苟免􅀆非禽獸而􅂡眉予豈異夫人人􅀆甘惡生而樂死唯殺身以成仁􅀆免君子之􅀁鄙望巍煌之宫墻􅀆實宣尼之祕祠亟攝衣以從之􅀆依嘉樹之㠁嵯中心皎如白日􅀆即萬死其奚惜與淵騫㳺扵地下􅀆亦予情之􅀷懌瞋目而詈賊􅀆經百折而弗變卒從容以就義􅀆誠遺言之堪踐爾死固若傷夭􅀆凛萬世而猶生較䘮節而久存􅀆歴百齡其何榮吾知爾精魄之攸化􅀆下醴泉而上卿雲之一物固為休禎􅀆豈爾心之􅀁訴必震盪為風霆􅀆叱列缺以施鞭殛不忠而為虀粉􅀆使天威之昭宣嗟鄧蕭之二生􅀆眼見義而不見水冝與爾為三忠􅀆享百世之明祀悼余生之蹇􅿟􅀆力不􅁕以振之悲風瀟瀟而四来􅀆􅓽含哀而􅞽辭周尊師小傳周尊師名玄真字玄􅀄世居嘉禾後遷扵姑蘇其父月心通隂陽家言用逹官薦為其學教授毋林氏玄􅀄生八􅀊教授君殁獨隨毋以居踰四年忽有龎眉翁􅀋道人劍客者過之愛玄􅀄精神謚目不􅀋塵中人製道家冠服􅀍之玄􅀄果喜又二年㑹上真道院施如意囊嚢貯諸物集四方人使採鈎取之玄􅀄欣然仰天祝曰我誠􅊥得第一即離俗無疑已而果然乃走嘉禾紫虗􅀚從李拱瑞為道士拱瑞南谷杜真人高第以道行聞既得玄􅀄授劾召􅀑神之術開元寺沙彌為狐􅀁媚羸瘁垂死玄􅀄嘘氣禁呪之狐即躍出衆殺狐其疾輙愈范庭芳之子曰孟奎庭方鍾愛如重璧蛇鬼侵之沈痼不􅀎脫玄􅀄飛符徃劾蛇鬼遂絶玄􅀄不以爲巳足㝷受靈寳大法扵曹桂孫㑹吳越􅀍兵㳺魂出爲厲玄􅀄建壇陳醮祠白鸐五十囬翔壇上久而後去及浮河􅅡燈二燈飛起髙懸栁枝人驚以爲神功萬夫長沈實母殁痛念之弗置聘玄􅀄􅁱祠事實因問曰聞君􅀎召鸐有諸玄􅀄曰然遂趣神要之素羽翩翤自空而来凡四十又二若果属其指呼者實喜復問曰君􅀎致吾毋魂魄乎曰可即剪紙爲旌令童子執之玄􅀄左右顧眎作叱嘯聲旌重􅀅壓地毋降于童音聲威儀如平生實與家人環之以泣􅀄霅川有神師曰莫洞乙呼雲役雷狎䙝如兒戯晚授其徒王継華継華授張善淵善淵授歩宗浩宗浩欲授人無契意者見玄􅀄因以其祕示之自時厥後雨􅊙有弗若郡二千石縣大夫俱致書稱弟子請玄􅀄禜之屡有竒應其尤異者洪武戊申京師旱夏五月至于秋七月不雨太師李韓公方秉鈞軸亟命左司􅀰中劉􅁢中迎玄􅀄致雨是月庚寅設雷壇扵冶城山研朱書鐡符投揚子江中波濤􅃍興玄􅀄夜坐斗下存神窈􅁳電光燁燁遶身逹旦􅉝卯玄􅀄握劍上壇召風師霆伯誓之俄隂雲蔽空大風㧞木雨降如翻盆韓公曰此法師雨也四民觀者僉曰此法師雨也玄􅀄曰未也明日辰時再降雨乃足爾至期復果然有黒龍蜿蜒見西方迨午始霽韓公以幣贈玄􅀄玄􅀄不受竟拂䄂東歸朝紳嘉之以文辭道其功者不可悉数明年庚戍上欲問􅀑神情状扵道家者流嗣天師張眞人與玄􅀄皆􅀍召錫燕扵光禄寺禮遣其還又明年􅉝亥秋九月巳卯上召玄􅀄至亰見扵武楼從容賜坐訪雷霆􅀁以神之故玄􅀄對曰天地之間無踰隂陽者因其運轉故有神神與人合者也雷非人無以知雷之天人非雷無以知人之天天人相孚本同一理爾上悅今年壬子春三月不雨中書右丞相汪公命玄􅀄致禱仍扵冶城山建壇其應如􅀄玄􅀄爲人多内功兼好澤物葑門石橋廢費􅀅巨萬計玄􅀄談􅀏成之􅀄主丹霞道院甞一新其祠廟継住持常熟致道觀觀有丹井蕪没且久玄􅀄求得之重甃以甓作亭覆其上玄􅀄嘗搆来鶴軒扵丹霞宻林間披鶴􅌁衣執黄庭經一卷焚香黙坐人競稱之爲鶴林高士云太史公曰予㳺江南見玄􅀄鳯皇䑓上方瞳燁然長眉􅋍然傲聣扵萬物之表􅀼意緱山仙人乗鶴吹笙而徕下也亟徃叩長生久視之要玄􅀄乃言曰混沌之時一氣孔神無形與聲入之無門子盍索扵呼吸之根乎其體中虚玄象之􅀄不依物以居枝扶而葉踈􅀎黜其知守其愚則群隂盡銷而純陽獨舒矣子盍慎諸予敬受之以還而未之􅀎行也然而玄􅀄之役使􅀑神者其􅀎斡天道之樞歟抑玄􅀄孝扵親一日不見輙懸懸如􅏇欿欿然若有􅀁疑經曰孝悌之至通扵神明玄􅀄􅀁以􅀎變化者其或有繋扵是歟非歟人多内功兼好澤物葑門石橋廢費􅀅巨萬計玄􅀄談􅀏成之􅀄主丹霞道院甞一新其祠廟継住持常熟致道觀觀有丹井蕪没且久玄􅀄求得之重甃以甓作亭覆其上玄􅀄嘗搆来鶴軒扵丹霞宻林間披鶴􅌁衣執黄庭經一卷焚香黙坐人競稱之爲鶴林高士云太史公曰予㳺江南見玄􅀄鳯皇䑓上方瞳燁然長眉􅋍然傲聣扵萬物之表􅀼意緱山仙人乗鶴吹笙而徕下也亟徃叩長生久視之要玄􅀄乃言曰混沌之時一氣孔神無形與聲入之無門子盍索扵呼吸之根乎其體中虚玄象之􅀄不依物以居枝扶而葉踈􅀎黜其知守其愚則群隂盡銷而純陽獨舒矣子盍慎諸予敬受之以還而未之􅀎行也然而玄􅀄之役使􅀑神者其􅀎斡天道之樞歟抑玄􅀄孝扵親一日不見輙懸懸如􅏇欿欿然若有􅀁疑經曰孝悌之至通扵神明玄􅀄􅀁以􅀎變化者其或有繋扵是歟非歟冲黙齋記保寕禪師以冲黙號其齋居来徴予記予按字書冲者虚也黙者静也即佛氏空寂之義也惟其冲也故黙則冲爲體而黙爲用惟其黙也故冲則黙爲本而冲爲末二者之理恒若相因未有黙而不冲冲而不原扵黙者也夫太虚寥廓從横自如陽運隂行真宰不動此两間之冲黙也自無生有從有入無外雖紛紜中實有定此萬象之冲黙也靈光洞然出入無礙諸縁自忘大用常寂此一心之冲黙也我念不生法從何起生㓕本空而况扵法此諸法之冲黙也冲黙之義大矣㢤嗚呼有情之􅀋亦云夥矣柰何營營逐妄擾擾迷真竭晝夜而實其􅀁無反覆膠滯不求脫離是不知有冲者也風性􅀁激運轉不停歘焉凝氷倐焉焦火十二時中無一息少寕是不知有黙者也非大􅁴真人出而救之􅀅何􅀁底止乎然而妙明真性不渉三際元自冲虚本由黙静無􅀁不容無􅀁不具因無􅀁不容故萬有歴然而未甞有窒扵虚因無􅀁不具故群動森然而未甞有離扵静静固非動動亦静也虚固非實實亦虚也冲乎黙乎其造道之樞要乎彼李伯陽􅀁謂致虚極守静篤者若近乎冲黙而渉乎有爲也韋應物􅀁謂隱拙在冲黙者欲藉是處世以保和爲冲寡言爲黙者也而非其至者也然則何以爲至乎必也入不二之門而後真知黙也真知黙者則無􅀁事乎冲也禪師汲汲求法者也甞掲冲黙以自勵故爲畧䟽體用本末而言之然亦未甞有􅀁言也禪師名􅁴慧字敏機吳興人出世嘉興之祥符近從四軰之請分座說法扵大天界寺㝷主寳寕禪刹盖有志之士也送張禮部兼晉相府録事序皇明御天區宇敉寧文化洽熈罔間内外聖天子猶旰食宵衣欲圖治安如黄虞時在野之賢無不遣使羅致于庭當是時錫山張籌惟中用監察御史薦上名銓曹四方来者雲擁而林布銓曹各因其才命題試之而惟中前進士乃以經學對􅀄覆考僉謂良才遂列爲首選又明日丞相引見扵奉天門上親御翰墨䟽其名下曰翰林􅀿奉其次而下悉用奉天選授官則惟中特􅀍簡注可知矣已而惟中視草北門文辤雅馴而􅀎弗悖上意扵是日侍左右或講􅀃經史或應制賦古今詩未甞不再三稱善甫一載特授禮部主事未数日㑹晉相府録曹闕官復命蕪之命既下六曹之士咸曰學者當明體而􅃴用苟學矣而不施之扵政是玉巵之無當也奚􅀘焉上之摩厲惟中者厚矣詩人頌文王作人之盛有曰肆成人有徳小子有造其今日之謂乎三舘之士又曰詞林之設官自學士而下曰侍講曰侍讀曰直學士凡若干人而待制􅁱撰編􅁱之属不論焉夫以賢才如此之多其事始集惟中以一人獨當其任亦未甞見其有缺敗非其才之果良乎苟使議禮扵儀曹賛畫扵宗藩其有不稱職者乎􅀓有之君子學之在躬當無施而不冝惟中其有焉金華宋濂則曰二者之論固當矣濂則以爲天下才良者衆矣䏻致萬乗之知者幾何人㢤縦知矣論說或不合沈没扵下僚十年不調者有矣縦調矣或處閑曹冷局首尾拘畏不䏻展其志者有矣今惟中以一布衣之微上􅈾宸選未乆而三遷官官皆清要之重􅀉不知惟中何以報上之賜乎奔走承順以爲㳟非報也岀入謹􅅚而自防非報也唯精白一心以承休徳常如天日之照臨有知無不爲爲之無不竭盡其智慮庻幾稍無愧耳他日名存竹帛功在國家不扵惟中之望而誰望乎㑹上錫晉王土田扵吳惟中􅀅􅂂畒而實之過家上冡以爲鄕􅀖榮濂惟中老友也故扵其行不敢倿而以規杭州靈隠寺故輔良大師石塔碑銘有序洪武四年正月十六日靈隱釋氏大師㓕度報年五十又五僧夏四十龕㽞五日頂有䁔氣體貌如生又二日用闍維法從事齒牙堅潔舌根紅潤皆無壊者及火既滅諸設利羅珠圓玉皦􅀅至盈升四衆争取􅁅燼爲盡其弟子某等涕淚悲泣攀號無從扵是俯􅀙世禮以是年某月日􅄟骨扵歸雲塔中實在寺東偏若干歩􅀄大師未告寂之先以書属後事扵其同門今天界善世禪師泐公曰吾大期已至子冝速還若稍遅遅不復相見矣時公留姑蘇謂大師精神尚彊豈􅑈如其􅀁言及治任来歸大師火化已数日矣公扵塔前自誓必期有以白大師之行傳芳不朽垂範􅀅来乃加評隲輯成簡編持示其友金華宋濂曰是大師也始終俊偉不愧龍象子通吾宗其言當見信扵世盍爲文掲之塔上然公以叢林碩徳位冠五山護持正法不翅堅城乃不属之他人而惟區區是托非相知之至􅀷邪其又何辤大師諱輔良字用貞其號曰介庵蘇州吳縣人姓范氏文正公之十葉孫也父諱伯和母鄭氏大師誕鍾粹氣聦悟夙發見浮圖氏書􅂺躍然朗誦若􅀁素習有挾相形術者謂其父毋曰是兒骨骼清􅋍緊峭恐非世間法可縳若使之學佛必䏻弘大宗乗矣父毋方鍾愛不信其言大師之里多阿蘭若大師日與群童遨逰其間徘􅆦愛慕終日不忍去父察其志與相者言合乃謂之曰在昔范蜀公好與名僧交甞勉圓悟勤公參叩道要卒爲天下禪宗吾䏻惜爾而不使遂其志乎年十五俾􅀙同里迎福院僧夀彌薙落及受其戒即慨然曰學佛􅀅以明心心非師無以示肯綮終日墻面可乎去從北禪澤法師習天台教􅀚􅀁謂三乗十二分研其精華攝其宻微充然若有􅀁契士瞻杓公時住天平山白雲寺寺盖范氏􅀁建以奉先者大師数至其間士瞻誨之曰教乗固當學若沈溺不返如入海筭沙徒自困耳何不更衣以事禪寂乎大師曰吾􅀅焉􅀙曰􅀏隐訢公見主龍翔集慶寺其道大􅀍東南緇白信􅀙如子歸毋朝廷嘉之賜以廣智全悟大禪師之號汝􅂚不徃依焉扵是大師徃見廣智即以全噐法寳期之問荅之際棒喝兼施弦發而箭馳雷㫪而電掃刹那之頃凡情頓䘮雖未至清浄覺地而􅀁入正􅂗超然出扵物表他日廣智再有􅀁問大師發言愈厲廣智咲曰得則得矣終居弟二義也大師弗􅈈益䖍久之遂契其心法雲空川流了無㽞礙㝷掌蔵鑰扵四明阿育王山與住持石室瑛公縦横相叩擊石室極推譽之至正壬午行宣政院檄大師岀世嘉興資聖寺陞座􅀃法終歸㤙扵廣智云時大師年始二十又六衆頗易之大師殺衣黜食為􅁱建之計崇基廣構文甓雕甍金碧燁然前後相照徃来􅀚者始皆信服居十三年遷越之天章僅閱四春秋移杭之中天竺其傾嚮者益多有踰資聖天章時會海内大亂兵燹相仍南北两山諸刹皆化扵烈熖靈隐古稱絶勝覺􅂣凉烟白草凄迷扵夕照之間過者為之慨嘆康里公爲江浙行省丞相妙東名僧􅀎任起廢者莫大師為冝遣使者命居之既至剪剔荆叢葺茅為廬以棲四方學者雖當凋零之秋開示徒衆語􅀹激切其言有曰逹摩一宗􅁜夷殆盡汝等用力如救頭然可也然百千法門無量妙義扵一毫端可以周知如知之變大地為黄金受之當無􅀁譲否則貽素餐之愧矣嵗月流電向上之事汝等急自進􅁱參學之士多有因其語而入者化縁既周手䟽衣貲入公帑散交㳺及治䘮歛之事顧謂左右曰翼日已時吾􅀅逝矣及期澡浴端坐書偈而殁大師四坐道􅂣觧結發覆如利刃之破􅇢索甘露之灑稠林無不断絶無不霑潤故􅀁度弟子心杲等若干人說法住山明宗等若干人頗號継跡重輝者也大師性簡直雖靣拆人過而􅅐中無㽞物與人交無少長一以誠相遇􅀁造偈辭􅀄不經意而語出渾成有若宿搆舉揚大法不務縁飾而西来之㫖自明復以净土觀門苦海舟航時兼􅁱之未甞少怠其􅀁見盖卓然云嗚呼道行無跡妙極無象求而即之脗契本真未㝎之先則萬縁鼎沸發慧之後則一性洞虗􅀁謂不用其力而無􅀁不力則神噐化扵玄冥而忠信發乎天光矣有如大師和粹外形淵懿内朗造請之間因言懸觧證不染不遷之域泯差别次弟之門非上智宿植􅁖乎至此㢤濂也不敏蚤􅀙諸老㳺欲假般若爲宅心之地夙障巳􅀷竟爲世諦文字之􅀁􅆞縳鷄鳴而起唯倀倀逐物而已操觚而銘大師之塔豈不惕然以自憐悵然而遐思者乎銘曰真體如如絶待離紛妄識􅀁膠攪爲法塵譬猶飈風皷埃􅀭氛化畫作夜觸目重昏佛啓覺􅂗髙懸慧曰白光爛然下銷群慝破相玄門最爲勝特􅀎㝎諸縁即超秘宻昭昭大師上承禪宗一真歸源萬幻咸空染浄两寞本跡俱融廣智之傳其學遂東昭昭大師爲法出世嬉􅀏怒罵皆真實諦湧殿崇峩飛楼弘麗假相以昭非與道戾昭昭大師變通弗拘縁盡即滅視世爲虗死生者誰出没在吾化爲舎利如摩尼珠来也非留去焉非逝白雲在天周流無滯法象既亡勒石爲偈式播徽音用垂南裔題天台三節婦傳後余􅁱元史時天台以三節婦之状来上命他史官具藁親加刪定入􅀋列女傳中奉詔刻梓行世先是㑹稽楊廉夫爲之作傳其事頗多扵史官盖國史當畧􅀻傳冝詳其法則然也近與台士㳺甞詢之則㢘夫􅀁載猶有闕遺者因摭其言􅀘之杜思絅娶沈沈生三女及子勤而死継室宗媛祕書丞陶􅁩女兄也生一女思絅亦亡宗媛棄膏沭而御上奉七十之姑􅀗其驩心下視沈之子不翅親育十八年間悉畢其婚姻􅀊丁未九月壬寅台城䧟火􅆋燭天宗媛護姑柩不忍他􅃴爲兵􅀁􅈏驅之行宗媛不􅀙兵怒剚刃于頸􅀷入二寸餘不見血而没瀕死無他言唯念勤不置曰勤苟不存吾尚何望㢤宗媛妹宗婉歸周本亦同日死扵水􅁩婦王淑見事急抱其子名長巳者属傳姆曰持以歸其父長已存吾不死矣乃􅀍髪亂走明日事㝎求之不得淑見夢媵人曰吾義不辱身赴南隣杜氏井死矣􅀁懐簮珥亦投其中可聞漢生知之漢生其夫字也媵人以告黎明覔之皆在焉實十月乙巳也然人之受刃無無血者宗媛則以之淑雖死其精靈猶䏻動物不亂是知貞節之人其超絶誠與常人殊薦紳家相訾嗸者輙斥曰女子婦人女子婦人猶有是嗚呼孝經集善序孝經一也而有古今文之異者盖遭秦火之後岀扵漢􅀄顔芝之子貞者爲今文凡十八章而鄭玄爲之註至武帝時得扵魯恭王􅀁壊孔子屋壁者爲古文凡二十二章而孔安國爲之註後世諸儒各騁意見尊古文者則謂孔傳既出孔壁語其詳正無俟商確揆扵鄭注雲泥致隔必行孔廢鄭扵義爲􅁢况鄭玄未甞有註而依倣托之者乎尊今文者則謂劉向以顔芝本參校古文省除繁惑而定爲今文無有不善爲之傳者縦曰非玄􅀁作而義㫖實敷暢若夫古文幷安囯之註其亡已久世儒欲崇古學妄撰孔傳又僞爲閨門一章文句凡鄙不合經典􅀅何􅀁取徴㢤二者之論雖莫之有定然皆並存扵時各相傳授自唐玄宗注用今文扵是今文盛行而古文幾至廢絶宋司馬温公始專主古文撰爲指觧上之且憫流俗信僞疑真諄諄見扵言辭之間以予􅀚之古今文之􅀁異者特辭語微有不同稽其文義􅀄無絶相逺者其􅀁甚異唯閨門一章耳諸儒扵經之大㫖未見有􅀁發揮而獨断断然致其紛紜若此抑亦末矣自伊洛之學興子朱子實起而継之扵是因衡山胡氏玉山汪氏之疑而就古文考㝎分爲經􅀓去其􅄛文及不合經㫖者千載是非遂㝎于一元室之􅀄吳文正公出于臨川又以今文爲正頗遵刋誤章目重加訂㝎而爲之訓觧其㫖益明而無遺憾矣東廣孫君蕡讀而恱之因増以諸家􅀁注名曰孝經集善而其大義則以朱子及吳公爲之宗蕡通經而能文辤采擇既精而又發以巳意其書當可傳誦故余爲䟽歴代􅀁尚之異同序扵篇端蕡字仲􅄛洪武壬寅鄉貢進士今爲織染局使云丹井銘海虞有虞山梁天監􅀄漢天師十二代孫張道􅁉来隠其下建招真之治鑿丹井焉宋淳熈中道士李正則浚井得蔵丹石䃭啓之化爲􅀟紅鴿飛入上湖至今湖中丹光煜煜然邇年井且廢莫知其􅀁周尊師玄真窮日力㝷􅀗之重加以甓構亭覆其上時皇明洪武元年也然僊家煉丹必以井故名山多有之其在今海虞者舊廢而新治豈玄學復興之徴與銘曰太隂委精自天一融而爲液養萬物神丹浴之赤如日有夫玄巾發我室􅀟禽衝霞飛翐翐靈泉重噴甘逾􅁡飲焉夀與天地畢故義士胡府君壙銘府君諱嘉祐字玄祚姓胡氏其先出扵文定公安國之裔有諱志寕者宋宣和􅀄来知㜈之永康縣遂家焉今為永康人曽祖某宋通直􅀰祖時孫父文字質甫皆􅀮徳弗耀妣張氏府君㓜失怙恃嶷然思自􅀣立蚤夜孜孜無毫髮自􅈈意卒使貲産逾扵前人然積而䏻散遇貧窭不􅀎自存者多與之泉布無靳色人有急難百計救之至􅀔不可為乃已以信接物如金石弗變里黨有期約咸属府君一聞府君言則曰胡玄祚㫁不可欺矣􅀊丁酉括蒼盗起殺官吏焚府庫蔓延至永康浙水之東騷動縣逹魯花赤曰也速逹而聞府君有竒才即薦上海右憲府㢘訪使劉公禎亟召府君與語大恱命府君集郷里徤児給以鎧甲俾領之以殄㓂府君勒成部隊教以攻􅀾之法頗可用一旦㓂大至府君列陣于占田衆寡不敵遂死之是嵗二月二十三日也江南行御史䑓聞其事遣使致奠材士大夫亦嘉府君之義而悼其不幸多為詩文以傳府君得壽四十有八元配章氏無嗣継室趙氏宋格庵先生順孫五世孫女也子男四人􅁉禊祐禔女二人長􅀄適鄭某次禎未行孫男二人榮祖正祖孫女三人忠昭清皆㓜􅁉等既以丙午之嵗九月壬午􅌾府君扵鯉溪山之原復具府君羣行徴予銘而納諸玄堂之南􅀄予受經扵凝熈先生聞人夣􅁻始識府君盖府君之女兄實歸先生而先生之女又􅃴府君之子􅁉府君之事行故先生数道之以厲人人予頗得與聞之惜乎府君百不一試而竟賫志以殁然而君子有取之者其捍衛郷井之心皦皦然不可誣也人孰不死君死扵義可以無恨矣銘曰人孰不死得死則難此惟義士胡君之基千載之下過者式焉重建龍興奥源寺記龍興奥源寺在撫之金溪縣北一里後枕鷓鴣之岡前有一􅄘鋭如卓筆上挿霄漢而幕阜雲􅀜两山對峙乎西東若駐若馳若起若伏其秀㧞逮難名状灵宫秘宇之􅀁托也固宜唐元和中有大比丘某飛錫而来徘􅆦顧瞻􅅞茅栖止扵其中厥後漸成巨刹楼閣峥嶸鍾魚互荅扵山光水色間一時龍象固甞盛矣宋崇寕􅀄蕪壊弗治已而復興元至正中江右兵起官署民廬盡罹焚毀寺亦不䏻以獨存金碧之區倐幻爲瓦礫之塲荒烟野燐更互明滅使人有悽然之思束暁大師自㓜受經斯地喟然嘆曰在我法中有為無為皆第一義諦起廢之任吾可不究心乎其徒十有一人驩然相之閭右之族亦間有施貲者扵是伐木扵林攻石扵山徴瓦扵陶衆工雲興罔敢後時大師躬程督幾忘食􅆍遂卜厥日以成功告寳殿中峙􅃉堂後居旁挾二廡前敞三門以至庫􅁃庖逼之属罔不就緒復􅅮土肖佛菩薩暨護法金剛神諸像􅆊相嚴穆見者生敬經始扵某年月日訖功扵某年月日􅀄刑部司門員外􅀰王君經二世與大師㳺凡大師有􅀁營為皆􅂢財倡之大師知刑部君與予友善因請具其事状求予為之記予聞大雄氏說法􅂄闍崛山有重閣講堂之壯麗􅀁以奠安其形軀庇覆其徒衆􅀄未聞其露坐扵日星風雨之中也世之昧者弗之察悉諉諸興造為人天有漏之因倀倀然曰吾志諸内不騖諸外彼役志扵事功者果何為也㢤殊不知般若塲中理事無碍内外混融徧覆一切不即世間不􅄐世間苟徒拘泥而堕㫁滅之見則違道逺矣今大師耽恱禅味有􅀁證入熾然建立無非佛事其智識過人殊甚備著其事勒諸堅珉庻可為馳騁空言者之􅀷戒歟大師名嗣暹字某族王氏東暁其號也有長材􅀁涖之處廢無不起既創安樂院扵盖竹原復重造金禪師塔庵恢其土田已而庵􅋹于火又搆成之及今奥源之役其功爲􅀹偉􅀁謂十有一人則行真希儆希晏希住希誠法旭法吾法昶法摏法睿慧澄其學行皆有可稱云宋學士文集卷第十三鑾坡集卷第三
