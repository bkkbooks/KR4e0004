body:
  text: 故永豊劉府君墓誌銘府君諱庚金字竒相姓劉氏世家廬陵之永豊劉為江右簮纓之胄自唐迄宋擢進士第者後先相望入則豋㙜省出則蒞郡邑人稱為名門曽大父某大父某雖不與仕版而皆䏻􅁇書詩之業父某宋季嘗舉于鄊試􅀯宫􅂺不利用持恩授新淦丞母周氏府君八􅀊善屬文未加􅃣巾五經誦之甚習年既長執經来􅀙者户外之􅋰常滿多有去為名進士唯府君累踐􅂣屋卒就擯斥時學校多􅀻試府君漫起應之即在前列元至治癸亥又臨試期府君試以上古之書既而􅀗在選升名春官陳論過髙知貢舉者疑不敢取􅁇以龍飛恩例中書署為吉州路儒學正丁内艱而歸泣血三年未嘗見齒雖祥琴斯御諱日之至必反􅃑拭淚不已府君性忠厚遇異母兄竒可尤盡和孺之樂每聞􅀅授衣問周夫人曰兄之衣何如夫人曰已先授之矣及夫人歿塟祭之禮獨盡瘁為之不􅃘毫髪煩其兄銓曹稽其年勞轉臨江路儒學教授命既下而府君病且革矣遼陽等䖏儒學提舉劉君岳申名重當世與府君交二十年如一日其稱府君有曰温柔而慎宻明辨而近恕優優乎有士君子之風識者未為實録府君為文無宿搆下筆㴞㴞頃刻龍蛇滿􅁓間似欲飛動郡縣大夫士慕其聲光踵門求見者無虚日平生􅄝酒飲至数斗不亂拱手端坐而為禮益恭此皆人􅀁難者生扵乙酉二月十三日歿扵元統甲戌九月十五日享年五十以至正丙戌十二月二十二日塟于折桂鄊烏江金牛㙜之左禮也府君配某氏子男子四宜立宜明俱早世宜謹元江西行中書省左右司都事宜正入仕國朝為起居注轉僉淛江提刑按察司事子女子二柔嘉􅃴􅀓􅀂曽柔恭歸彭宗徐孫男五服孫思紹見珠海珠繹珠孫女三徐元􅀽同其婿也一㓜未行宜正字貴遒今以字行其爲左史也余方司業成均相與論文甚驩迨出使淛部詣余拜且泣曰昔者先大父嘗自念言自十三世祖司空府君以来多决筞發身而獨愧以特恩入官􅀁以戒飭先君子者尤力先君子丕承前訓唯􅄰少忘之卒以儒而成名及其終也而呼宜正兄弟戒之曰吾才非不如今人而至扵此命也爾曹當自勗以文學亢􅍏宗即亢􅍏宗吾死目亦瞑貧賤不足論也宜正時始十齡巳深知其言之悲幸夙夜戰兢不致顛隮􅀗􅀙士君子之後忝􅀍官使至今二十九年而墓木且拱懸繂之碑未有􅀁刻豈非至闕歟願先生文之予憐其志而不敢辭銘曰家有世科子才又多胡􅀒志而媕娿命也柰何命也柰何耘庵銘良鄊丞陳謙益仲東甌人也􅄝學弗倦慨然有志扵事功陳翰林元逹以飛白書其憇止之室曰耘菴夫耘之為義媷治蕪􅁾之謂也種而䏻耘􅁰苗芄芄然興矣益仲其知自治者㢤作耘庵銘銘曰伊人之情譬彼良田嘉種誕布􅁰苗芊綿耘耔不加載蕪載􅁾既茁而軋長莫之遂我田我耘我苗日豊有實其同迄于穫功記禮之家人以為奥得奥斯理失則罔効和其柔剛脩禮以耕陳義而種善道乃亨耨在講學去非存是合其􅀁盛本仁以聚感之使堅播樂以安五者既至學功始完惟益仲氏孜孜好禮以耘名室義或取此古訓洋洋觸􅀋而通母拘一曲􅆡而不融太史作銘勒扵坐側上慎􅏧㢤服之無􅑯古愚齋銘延陵􅅊侯彦芳吴中書僕射侍中弘嗣之四十七世孫夙以文學著聞亦既受薦扵臨江别乗㑹二千石闕侯實行守事情孚化洽民宜之然猶不忘進脩以古愚銘其齋居侯殆有志古者乎志扵古羙矣古學之可決者頗衆柰何獨有取扵愚乎有取扵愚斯其􅀁以為不愚也歟是宜銘銘曰惟古之愚如彀斯弩直矢一發􅁬徃弗顧惟今之愚如􅂂多岐詭秘變化曽不測其􅀁之古故為疾今復非古致宣尼之􅀁傷柰人偽􅀆旁午我情欝紆􅂚日而攄豈惟賢不逮昔愚亦不如遡埃風而屹立懐􅍇人扵千載不有君子善則誰采彼焉多詐睢睢盱盱心自以為智人􅀚則愚我愚我守直情徑行孰不愚我我智斯亨以愚而名豈無栁氏為激而過中同扵自謚我􅀅何􅀙聖謨孔邇終日不違晞顔則是王生致逺􅃣字祝辭虎林王生其㓜也父命之名曰􅂹及年寖長加元服于首大賔字之曰致逺盖取梁徐勉􅀁謂人中騏􅂹必致千里之言也按􅀃文􅂹千里馬也孫陽􅀁相者其字􅀙馬冀則諧聲夫千里馬不常有以謂世之竒才亦未嘗數見也以生名􅀂字􅀚之則父師􅀁期望者不亦深且長㢤予雖不及與聞三加酌醴敢抽蕪思而弘敷其義生宜聴之母忽其辭曰古者體物取義孔殷麟紀其瑞鳯􅀭其文表􅍏茂實載敷清芬其一惟馬之族本非一􅀋八尺為龍千里曰􅂹因生有别挺材見異其二伊􅂹斯何堕地不毛虎文彪炳龍骨陂陀天機趫騰絶山飲河其三當其􅁬飛神行電逝􅀂㓕􅀂沒一日千里晨燕晡越視同㳺戯其四誰其似之渥洼之姿肉角飛黄逸氣纎離天閑翶翔玉㙜裴囬其五奚官善馴是澡是拂秣以羙薦飫以香粒筐惡蜃溲慮無弗及其六物尚有兹人胡不如天賦權竒孰不自攄口噴紅光長鳴九衢其七豈無王良俾其振迅未必塩車䏻厄神駿三羸五駑過者誰問其八生㳺藝府逸思超群剪水為神製霞作文亦既應書名逹帝宸其九侍經藩王出入禁籞宫􅂁時頒太官致餼寵賚之􅂭揆古無愧其十以利天下易經有辭取譬奔踶漢詔以之任重道逺生寜勿思其十一􅂚以思之朝夕兢􅅥匪力足矜􅀁稱惟徳予言非誣勗之無斁其十二􅀉和右丞温迪罕詩卷序有志之士豈無鄊土之思㢤昔者楚人鍾儀為晋􅀁留晋侯與之琴遂操楚音越人荘舄仕扵楚雖富貴矣乃甞為越吟此無它不忘本也夫晋椘與越皆同中國也語言相通也􅄝好弗殊也尚為之抑欝發扵音聲如此况在絶域去中國数千里者㢤宜其見諸咏歌而不􅀎自已也右轄温迪罕公居于汴梁資禀素羙嘗􅀙恕齋班先生學為詞章乆㳺淮海元季亦躋膴仕随冡宰逺行遂留西域今見天朝使者至不勝鄊土之思􅃇甞賦絶句以􅀉治書􅃈納兒加􅁇作唐律一章獻丞相胡公其憂深思逺若不䏻勝情者想其親属睽離莾無一人四顧蕭條與影為侣極目之頃但見獵獵胡沙茫茫塞草而巳右轄必慨然曰吾昔居江淮錦親朋胥㑹以叙離合之情庶㡬重覩天日以享承平之福當此時發扵性情無非雅頌正音以欹咏朝廷之盛徳其視向日憂深思逺之作霄壤不侔矣右轄勉乎㢤右轄勉乎㢤洪武八年十月壬辰具官宋濂序題李節婦傳後婦人以節􅁛乃其至不幸也與其執之死靡他之誓􅂚􅀂咏君子偕老之辭㢤然而一與之醮終弗改其操身雖不幸而其苦節則有可尚者已􅀂朱氏婦璹豈非其人㢤嗚呼婦以節旌者固多而其事則殊有慕夫家貴富而不􅃘去者有年壮多子而不易割恩者有不䏻氷雪其行姑盗名以欺世者璹之父母納季實爲贅壻合􅈟甫十日實賈遼東遂溺死扵海璹誓不更適飬父母終身且依弟珍以居信誓堅􅃀其皦如出日者歟揆前三者其無一之可疑者歟斯􅀁謂真節婦矣張侍講以寜傳以顯之孰謂非宜或者猶以未得旌褒爲恨然旌表朝廷事也題新脩李鄴侯傳後余讀歐陽子等􅀁脩新唐書事多舛繆如紀中載膠東郡公䧏封縣公而傳中乃􅁛郡公傳中叙天平節度四人而紀中則云七人此猶可也宰相載扵世系表而于惟謙相中宗鄭綮相昭宗武什万相武后乃皆棄而不録此猶可也觀其述作繁者失扵支蔓略者過扵簡率以致渙而無統欝而弗章則其􅀁繁者重矣劉昫􅃇史義例無法固不足責豈意新史亦復爾邪吴縝紏繆盖不得不作也有􅀂李泌在唐建謀猷輕爵禄髣髴漢之留侯新􅃇史皆畧其事且譏其好縦横大言以􅄦道媚人主取宰相何其悖耶晋王府長史朱君讀而病焉因㩀泌之子繁􅀁録家傳十卷参考群書倣前賢刪正陶潜諸􅁑亮二傳芟繁摭華重為泌傳一通泌之事始大白扵天下後世嗚呼㣲朱君泌不衘􅁈扵九泉之下乎然而唐史之繆不止扵此而已縝之􅀁未紏者尚多朱君宜推􅀋以盡其餘㢤余總脩元史及皇明日暦朱君皆與其事余見朱君有良史之才故爲題識傳後而屬望之如此􅀂余之耄則無䏻爲矣朱君名右字伯賢天台人佛真文懿禪師無夢和上碑銘洪武六年二月甲申佛真文懿禪師年已八十有九一旦無疾忽戒浴易衣出器物分遺叢林諸友命弟子曰三界空華如風捲煙六塵幻影如湯澆雪亘古亘今唯一性獨存吾􅀅入㓕聴吾偈曰吾有一物無頭無面要得分明􅄺槃後看言訖歛目危坐而逝當是時師寓象山瑞龍之别室其嗣法住持䏻仁寺智巖與􅀁度弟子全體等共闍維之以是年某月日窆于天台國清某山體懼無以昭示来裔請恕中愠公評隲羣行成書介方外友用堂楩公虚白杲公詣余求塔上之文師諱曇噩字無夢自號爲酉庵慈溪王氏子也祖申宋某年進士真州六合縣主簿父禄元慶元路稅課大使母周氏夫人師生六年而稅課君歿夫人命􅀙鄊校師㳺氣岸髙騫有一日千里之意洎長窮覧儒籍徹其義髄人有叩者竭其始終而語之蝉聮不䏻休自以爲無書不探知觧且至遂學文扵脩道先生胡公胡公諱長孺其文爲時􅀁宗見師大加賞識乆之藻思濬發縦横順􅊇随意之􅀁欲言聲名頓出諸老生上已而心有􅀁感彈􅃌歎曰攻書脩辭此世間相爾􅂚􅀂求出世間法乎乃白夫人走奉化廣法院禮子文良公爲師聞雪庭傅公主真之長蘆乃往依焉遂薙除湏髪爲大僧師之春秋二十有三矣􅁇受具足戒扵杭之昭慶凡釋氏契經與台衡賢首慈恩諸文晝夜摩研不知有飢渇寒暑已而復歎曰教相如海苟執着不囬是覔繩自􅆞爾􅂚􅀂求明本心乎扵是篤意禪觀又乆之雪庭遷住靈􅀮師徃侍左右雪庭示寂元叟端公由中天竺来􅀘其䖏元叟風規嚴峻非宿學之士莫敢闖其門師直前咨叩了無畏懼機鋒交觸情想路絶迅電一掣怒庭随擊内外如一靡間豪忽自一轉至扵六七語愈朗烈元叟欣然頷之命掌内記延祐􅀄詔建水陸大㑹扵金山二浙名浮圖及賢士大夫皆集師佐元叟敷陳法要及與羣公辨論義趣英發莫不推敬鎮􅀯王聞之延師至廣陵尊禮偹至彌年方遣徑山虚谷陵公道價傾東南慎選書記之職絶難其人既得師緇白交慶重紀至元五年浙東帥閫合府公邑令請師出世慶元之保聖再遷􅄌溪之開夀三轉扵國清帝師大寳法王嘉師之髙行􅃬以令􅃅師之􅀁至皆以擔荷大法為已任煆煉學徒孶孶如不及多有開悟之者瑞龍院欲易甲乙住持為禪刹師為開山院因頼以増重直與名伽藍相齊海上􅄓風發驟雨如注層楼脩廊俱仆師􅀁居亦就壓人意作韲粉矣亟撤其覆索之一鉅木横搘榻上師危坐其下􅀂神物為之者師凡四坐道塲去留信縁皆畧無凝􅆡不乆引退叢林中慕其名徳之髙每闢室以居之師数戒諸徒曰吾與爾等研䆒空宗當外形骸忘寝食以消累刼宿習然後心地光明耳自是日惟一食終夜凝坐以逹于旦國朝洪武二年詔徴江􅀯有道僧而師與焉舘于天界寺既奏對上憫其年耄放令還山越四年而終師脩身廣䫙昻然如野鶴之在鷄群文思泉湧有持卷軸求詩文者積如東筍當風日清羙師􅀙容就席縦筆疾揮湏􅁷皆盡長短精觕無不合作鄊先生􅀽文清公桷􅃌師謂人曰此阿羅漢中人也觀其􅀁作驃􅀐山疊秀軒列清軒三賦駸駸逼古作者渡江以来諸賢蹈襲蘇李學以雄快直致為誇相師成風積弊㡬二百年不意山林枯槁之士乃䏻自􅁬而䏻至扵斯也翰林學士承㫖河東張公翥曰噩師儀􅀚􅊆而重戒行嚴而潔文章簡而古禪海尊宿今一人耳其為縉紳􅀁推許􅀋􅀂此日本國王雖僻在東夷亦慕師道行屡發䟽迎致之師堅不徃王與左右謀欲刼以歸浙東宣慰使完者都蔵之􅀗免自時􅍏後凡遇師手蹟必重購之而去且詫其䏻放異光云師平生製作甚富悉不存槀晚年重脩歴代髙僧􅀓鍥􅎚行世筆力遒勁識者謂有得扵太史遷嗚呼真如性海無不含攝妙用流行見諸文句其與實相不相違背苟欲岐而二之失之逺矣唯師逹理事之無礙本性既明􅀁寓皆法辭章散落扵四方者俊􅊆光明無非佛事特用表而著之以見不二門中本来一體無分别異同者猶未䏻冺本迹而忘物我也其視師為何如㢤銘曰惟釋迦文􅀃法如雲雨彼大千百物咸仁弟子結集為一蔵教言之不文􅂚資化導末流相承􅆞蔽語言􅀁以逹摩直探心源救弊扶衰吾道爾翼豈以饐故并忘其食師生名閥研䆒儒書洊攻竺典無幽不攄終入空宗􅅞習禪㝎出抵諸方以正性命如獅子児哮吼一聲凡情盡䘮何有死生刹那之頃法身呈露以何因縁為無著故曰吾有作依佛為師敷宣大法非文孰宜咳唾之間無非妙義或縦或横理事不二有文之文人􅀁易知無文而文識者其誰四坐道塲機用由此無舌而談震驚百里􅄓風􅀭威裂屋駕濤梁木其壊不損絲毛古云有道靈物呵䕶豈惟人欽神亦歆慕世相有盡起㓕空華白月在天一塵不遮我施文辭以作佛事書窣堵波庶㡬無媿跋西䑓御史蕭翼賺蘭亭圖後予㓜時聞文皇遣蕭翼賺蘭亭叙扵辨才事頗疑之以為文皇天縦人豪未必為是􅃈屑也及覧劉餗傳記云蘭亭叙因梁亂流落人間陳天嘉中為僧智永􅀁得至太建中獻之宣帝隋平陳又獻之晋王廣即􅌆帝也帝不之寳僧智果􅀙帝借榻及登極竟不􅀙果索果死弟子辨才􅀗焉文皇為秦王日見榻本驚喜乃貴價市羲之書蘭亭叙終不至及知在辨才䖏使歐陽詢求得之以武徳二年入秦王府由此而觀辨才之師乃智果非智永求蘭亭叙者乃歐陽詢非蕭翼也汝隂王銍性之采餗􅀁載謂餗父子世為史官是正文字尤精其言當不妄遂詆蕭翼之事鄙妄狹陋僅同兒戯且云秦邸不䏻遣㙜臣文皇始㝎天下威震萬國尫殘老僧亦何敢靳一􅁓書其意正相合予疑扵是頓釋或者猶云辨才􅀁居雲門寺有翼留題二詩秦晁黄三公皆信而不疑此固不足取以為㩀至􅀂閻立本㑹辨才蕭翼圖則出扵何延之等􅀓㑹謂為立本當時之􅀁親見尤非也今閱此卷遂執筆詳識如此年耄神昏未必䏻中乎理又俟􅀶雅君子定之居易齋銘衢之常山有簮纓世族曰魯氏盖出扵宋参知政事肅簡公貫之之後自亳而来遷􅃇蔵玉刻􅀓宗印可驗其逺孫濬文念祖徳深長思􅁇承之甚力種學績文惟恐有弗逮州縣察舉其才貢之中書中書奏濬文才行稚飭擢為侍儀舎人遷秦王府典儀􅀅行詣詞林請曰濬文讀書之齋名曰居易鄱陽周先生伯温為書三大􅂐掲之願以銘文為属子謂居易乃素位而行外物之来一歸之扵天君子進徳之方有出扵此者乎是宜銘銘曰君子守分如守百職出位以思乃徳之賊銀黄三組􅁃粟萬鍾我合受之不以為豊衡門棲遲藜糗是食我則安之不見其嗇此非在我皆天􅀁為天則孔邇我敢悖之或逆或順視之􅀂一心以道寜不累扵物徇而弗察非怨則驕惟外之願而中則揺觸􅀋而推何徃非正其正伊何安扵義命􅋲􅋲魯生文獻之家夙夜以思掲徳振華齋居深沉蛟螭作􅂐前陳囬谿右撑翠巘爾居爾易勿險與難上慎􅏧㢤徳􅀅不刊林伯恭詩集序詩心之聲也聲因扵氣皆随其人而著形焉是故凝重之人其詩典以則俊逸之人其詩藻而麗躁易之人其詩浮以靡苛刻之人其詩峭厲而不平嚴荘温雅之人其詩自然􅀙容而超乎事物之表如斯者盖不䏻盡数之也嗚呼風霆流形而神化運行扵上河嶽融峙而物變滋殖扵下千態萬状沉㝠發舒皆一氣貫通使然必有頴悟絶特之資而濟以該􅀶宋􅊆之學察乎古今天人之變而通其洪纎動植之情然後足以慿籍是氣之靈彼局乎一才􅆡乎一藝雖欲捷騁横騖以追于古人前之而愈却培之而愈低㡬何不墯扵鄙陋之歸此濂扵伯㳟之詩不䏻無感焉伯恭􅀶極羣經而尤長扵春秋甞應書鄊闈實􅃣多士伯恭年始二十餘一旦名動海内自時􅍏後學益加修遂擢至正甲午進士第歴佐省憲二府正色直言百壬畏懾時出竒計剪三􅊇竪如烹狐兎則其􅀁養之充是氣浩然弗撓弗屈故其發扵詩也沉欝頓挫渾厚超越大雅奏而黄鍾獨鳴也武庫􅄏而五兵森列也洪濤怒張而魚龍出沒也一展卷間呈珍獻異可欣可愕精神為之震眩濂前􅀁謂聲因扵氣皆随其人而著形者豈非然邪豈非然邪世之學詩者衆矣不知氣充言雄之㫖徃徃局扵􅆉魚草木之㣲求工扵一聮隻字間真􅀂蒼蠅之聲出扵蚯蚓之竅而已詩云乎㢤永嘉􅃇􅀓四靈詩識趣凡近而音調卑促近代或以為清新者競摹倣之濂每謂人曰誤江􅀯學子者此詩也聞者且疑而且信焉今吾伯恭之詩出一洗習俗之陋信知豪傑之士自有其人也故敢執筆直題扵首簡世有知言者必深有取焉伯恭名温姓林氏温之永嘉人䟦一雨大師塔銘後予􅀚朱長史􅀁撰一雨大師塔銘不覺為之嘆曰嗟乎精誠之至何􅀁不應㢤鄒衍慟􅂘六月降霜魯陽揮戈白日退􅃕夫以匹夫之㣲尚􅀎感天象之變况學浮屠者志念專一而外物不足以汨其真乎大師焚身而甘露降亦其理之恒爾長史乃疑大師之制行庸庸爾碌碌爾何以致是也豈亦有宿因乎予則曰是固不可知然亦有􅀃當大師􅀙容就火之時一心唯知有雨爾而無絲毛􅀻意之干是則純乎天矣純乎天天惡有不􅀿㢤在唐之時浦陽江上有僧曰祖豋榮雨三日不􅀿豋康侯山墜崖而死大􅀨即随至其事亦猶是爾租豋之歿鄊人至今尸祝之有如大師者長史寵以雄文且勒石焉是皆嘉其有功扵民也嗚呼浮屠木茹澗飲者爾亦何與世事其憂民之憂尚如此則夫有民社之􅀉而尸位素飡者可愧㢤可愧㢤題甘節卷後地天為㤗純剛純柔之卦也節自㤗来則柔来節剛剛上節柔恐其剛柔過盛而無節也故當節之然節至扵苦則不䏻常决非貞之道又必至扵􅅴節􅀙容恱䂊而無窘束之意乃爲人情之􅀁尚也易之􅀁謂􅅴節者其大意蓋如此塩城孫君子章僑居吴郡􅅴節里因以􅅴節老人自號然孫君篤厚長者居鄊多善行而每事有當節者􅂺節之自苦以至扵􅅴婆娑嬉㳺以至終身然亦未嘗過也揆扵易卦􅀁謂節者施之一身不㡬亦有合歟孫君之子化以䏻古文辭名世朝廷聞其賢徴爲侍儀使名聞之升正騰騰未巳是則􅅴節之亨又當復見扵此矣題栢庵圖後上黨馬君庭堅其㓜也父名之以栢長遂築室而居曰栢庵及主事勲曹轉閩省檢校官不至庵中者頗乆乃命盰江藍瑜􅀞爲圖時展玩之而其僚友員外郎王彦和實爲之記庭堅来京復請濂題其後􅀓有之鬯􅍫以掬􅀃者謂掬栢也掬栢性堅緻有脂而香故古人破爲􅍫用以搗鬱嗚呼栢之徳與申椒胡繩同又不特􅀊寒後凋而巳庭堅之父托此而訓名其知之深而望之至㢤庭堅不惟奉以自名且以名其室是跬歩不忘乎親矣不忘乎親者庸非孝乎昔者蘇文公命其二子曰軾轍且知軾之不外飾而車仆馬弊患不及轍其後咸如文公之言今庭堅􅀁守貞勁而芳譽逺聞有無愧扵栢者知子莫􅀂父信㢤或謂庭堅􅀣栢築庵乃為肥遁之計非至論也日本夣窓正宗普濟國師碑銘洪惟大明皇帝執金輪以御寳暦聲教􅀁授與如来化境相為逺邇乃洪武八年秋七月日本國遣使者来貢方物考功監丞華克勤奏曰日本有髙行僧夣窓禪師其入㓕已􅀂干年而白塔未有勒銘其弟子中津法孫中巽有慕中華文物之懿特因使者而求之然人臣無外交非奉􅃙㫖不敢􅃍􅀙􅀁請敢拜手稽首以聞皇上欣然可其奏特詔詞臣宋濂為之文濂按其弟子住持善福寺周信状云禪師諱智曤姓源氏􅀔州人宇多天王九世孫父某其母某氏無嗣黙禱􅀚音大士夢吞金色光而孕歴十又三月始生有祥光盈室之異九􅀊出家依平塩教院以居授之羣書一覧􅂺䏻記暨長繪死屍九變之相獨坐觀想知色身不異空華慨然有求道之志十八為大僧禮􅄌􅀚律師受具足戒尋學顯宻二教垂三年未乆然恐執􅆡名相建修期道塲以求玄應滿百日夢逰中國踈山石頭二刹一龎眉僧持逹摩像授之曰爾善事之既窹拊髀嘆曰洞明吾本心者其唯禪􅀚乎遂更名踈石字夢窓謁無􅀮範公扵建仁寺􅁇至相州巨福山山之名院曰建長錙􅃬之􅀁萃止時一山寜公主之一山見師甚相器重令為侍者朝夕便扵咨决俄出㳺奥州聞有講天台止􅀚者師徃聴之且曰斯亦河礙實相乎自是融攝諸郡昭掲一乗之㫖辨才無礙然終以心地未明悵倀然􅀂無􅀁歸洊修懴摩法期至七日感神人見空中益加振㧞時一山自建長遷主圓覺寺師復蓬累而徃備陳求法之故至扵涕泣一山曰我宗無語言亦無一法與人師曰願和上慈悲方便開示一山曰本来廓然清净雖􅄌悲方便亦無如是者三返師疑悶不自􅂓結跏澄坐視夜如晝目絶不交睫乆之徃萬夀禪師寺見佛國髙峯日公扣請如前髙峯曰一山云何師述其問荅語甚悉髙峯厲喝曰汝何不云和上漏逗不少師扵言下有省辭歸舊􅀮常牧山唯分隂是競誓不見道不止嘉元年夏五月一夕坐乆偶作􅀝壁勢身忽仆去師豁然大悟平生礙􅈾之物氷觧雪融心眼爛然如月佛祖玄機一時爍破乃作偈自慶有等閑擊碎虚空骨之句亟見髙峯求印可髙峯喜溢顔面嘱曰西来宻意汝今已得之善自䕶持出其師師光無學元公手書一通俾之以寓相􅀓付嘱之意師囬棲甲州龍山庵髙峯招住上野州之長樂寺師力辭卓庵濃州古溪都元帥平公某之母覺海夫人某氏慕師有道欲一見之師竟入五㙜山􅅞吸江庵既而遯入海嶼夫人遣使索得之俾出世雲岩寺師復辭搆泊船庵扵卧龍山退耕庵扵捴州有終身立􅊤之志正中二年師春秋五十一國主後醍醐天王命宫使起師領􅀯禪禪寺入見王賜坐師自言志在烟霞出世非􅀁願王曰吾心非有他欲朝夕問道耳師不巳􅀿命王時幸臨之相與談玄竟日乃去􅀅及朞王遜位師又引退道經􅀔州㑹新建善􅀿寺成延師􅄏山未㡬棄去抵相州樞府郡公逼主凈智寺尋歸錦屏山營瑞泉蘭􅀂元徳元年圓􅁴四衆必欲致師師為勉強一出又復棄去二年羽州守藤道藴􅀄創慧林寺迫師涖其事元弘元年逹官貴人又有以建長請師者師復辭二年瑞光寺援善􅀿故事求師為第一代三年王既復辟召師入見以介子都督親王之邸更為靈􅀛山臨川禪院命師為其長賜以國師之號建武元年秋王妃薨王留師宫中二七日罷政而講法因請師宣􅀃大戒執弟子之禮彌謹及還強師再入􅀯禪王親率羣臣至山見羣臣入禪定秩然有序次第行食静而不譁王恱師升坐提唱音聲鴻朗辭意警筞王愈喜給􅃾田􅀂干畒以飯僧先是近臣有毀斥禪宗者王舉問師師以自性三寳何必強生分别為對王巳信之至是益知禪學為貴謗言無自而入忽退䖏兠率内院而建仁樿寺又欲逼起之師􅀏不荅暦應二年攝州守某革西芳教寺為禪僉言非師無以厭衆望師振􅃬而徃舉􅀭逹摩氏之道聴者改容為建無縫閣以水晶寳塔安置舎利萬夥其中他􅀂竒勝之地多􅃣以亭榭以憇四方㳺士規制燦然可􅀚師夢王作沙門相乗寳車徃靈􅀛山已而即世征夷大􅀅軍源公某造天龍資聖禪寺以助􅄀福聘師住持遂與前夢恊阿州守源公某新立􅀘陀院師亦俯徇其意為之􅀃法即還天龍康永元年春太倉天王親徃受戒願為弟子三年建八幡菩薩靈廟扵寺側貞和元年王復帥羣臣来聴法敷宣之際有二星䧏扵庭光如白日賜以金襴􅂵衣二年春令弟子志玄􅀘其䖏退歸雲居庵冬召師入宫加以正覺之號􅀚􅀿元年春两宫國母請師扵仙洞受五戒二年春師謂左右曰天龍宫室幸皆就緒唯僧堂猶闕當力為之堂成可容七百人廷議重師名徳復強師入天龍師行百丈清規聲振朝野王遣使復加心宗普濟之􅃅且遺以手書其畧有曰道振三朝名飛四海主天龍席􅄪轉法輪秉佛祖權数摧魔壘國中以為榮師以年髙又復引退兠率内院九月朔召門弟子曰吾世夀七十又七僧臘亦六十矣旦夕􅀅西歸凡有􅀁疑可頻叩焉扵是集坐下者如雲師随機􅄏示皆充然有得而去越七日示以㣲疾两宫洊臨問起居師為陳攝心正因精神不少衰至二十九日遺誡授門人作偈别大将軍源公嘱今外護復書辭世頌一首三十日鳴皷集衆告别翛然而逝顔色不變時有白氣一道横貫師之􅆍室黒白二萬餘人皆哀慟不䏻勝以某年月日奉全身塔于内院之後分存日􅀁剪􅀲髪瘞于雲居􅄠中纍纍生舎利云其嗣法上首天龍曰志玄曰妙葩建長曰􅄌永􅀯禪曰通徹曰周澤􅀁度弟子載名于籍者一萬五千有餘師儀􅀚髙朗慧學淵深舉􅀭正殺如宻雲廣布甘雨頻㴻凡具生性者随其根器小大皆􅀗成就上自國王宰臣下逮士庶無不頂禮敬信凡􅀁涖止如見七佛出世香華供養唯恐或後故管領源公頼之嘗與人言曰我􅀙先人聴國師􅇵談佛法頗逹真乗遂䏻死生如一臨事不懾而先人竟死扵忠吾亦知委身以事君者皆國師化導之力由是而􅀚師之道非特䆒明心學實足増夫世教之重况其内外之功两得祛縛釋粘起廢􅀘壊以安輯清净海衆人患不䏻有其一師獨兼之然其抗志髙明視榮名利養澹􅀂無物唯欲棲身林泉屡典大利皆迫扵王命而起世􅁛大善知識者非師孰䏻當之嗚呼宋􅀯渡後傳逺摩氏之宗扵日本者自千光禪師榮西始厥後無學元公以佛鑑範公之子附海舶東㳺大振厥宗髙峯纂而承之師為髙峯之遺㣧益有顯扵前烈重徽疊照光于海東止惡防非有禆朝政功用丕闡人思弗忘濂因奉􅃙撰文􅂌中津等歸鑱樂石以見佛性無内外皇化無逺邇昭示千載俾勿壊銘曰逹摩之學傳至真丹一花五葉其支􅆍繁臨濟名宗昭扵佛鑑有子如龍乗桴東泛海東有國接扵榑桑民惇俗龎環水為疆膜拜奉迎􅀂佛之至四衆聞之其􅀙如雨伊誰􅁇之心境两螎日出髙峯海水皆紅金光見夢長虹不㓕篤生異人丕照先烈何文不搜何義不求孰授厥像截㫁衆流其心倀倀有淚如霰感彼神人白晝而見本来清净一法實無疾馳索首非迷即愚一喝之中真靈獨露朗月中天其色純素我歸我山與雲徃還豈意聲華落彼世間文彩彰疇不歆慕鉅刹名藍非住而住􅀃法于座緇素共聆天見祥徴二星墜庭百廢具興我敢用逸寳華樓閣重重兠率上自君公下逮黔􅀺稽首作禮如天人師屡出屡退泊然無礙終與實相不相違背吾縁垂盡預告化期爾母􅈈怠来質􅀁疑遺戒諄諄續佛慧命言巳即化􅀂入禪定覺照至圓體性本空生㓕不二唯道之􅀙􅀂見􅀂聞同䘮考妣法幢既摧大衆何􅀝孰為佛乗孰為衆生縦有言􅀃皆是強名勒此塔銘􅀛趺螭首焯徳序功以示不朽日本瑞龍山重建轉法輪蔵禪寺記我佛如来其正法之流通者有三蔵焉一曰修多羅蔵二曰阿毗曇蔵三曰毗尼蔵惟此三蔵諄諄化導使一切有情㓕妄趍真誠昏衢之日月苦海之舟航也琅凾玉軸多至五千四百四十八卷衆生根純莫䏻融貫善慧大士以方便力造為毗盧寳蔵凾經其中一運轉間則與受持讀誦等無有異攝大千扵機輪􅀁聚功徳不可思議由是薄海内外凡有伽藍者必設置蔵室焉日本沙門文珪介郷友令儀来告予曰本國平安城北􅀂干里有禪寺曰轉法輪蔵舊名寳福廢壊巳乆無碑碣可徴莫知其何時建立正應元年肻庵全公􅀙周防法眼藤道圓之請嘗就遺址而一新之而僧本覺及梅林竹春巖玪相􅁇来􅊩法席自時􅍏後風雨震凌又復摧塌弗支白草荒烟芻蕘之跡交道矣貞治三年衆以文珪或可以起廢力舉主之􅀄寺無正殿唯有蔵室一區蔵之八楹皆刻蟠龍作升降之􅀔数著靈異因祀之為䕶伽藍神至􅀿安三年文珪欲建殿扵其前忽神䧏扵一比丘曰我神泉􅁐善如龍王也伽藍神来云大蔵􅀅傾乃視之漠如而欲有事扵殿功是棄􅀁急而不知務也宜亟易為之否則我足一揺此地當為湖茍遵吾言改奉王家神御則國祚佛法皆悠長矣言訖仆地覺而詢之絶無􅀁識知事聞于王王大恱曰余憶㓜時乳母時禱八龍之神事正相符即遣中納言藤元賜今額元之行有􅀟白鷺飛翔前導至寺而止人異之未㡬王遜位號太上天皇給地􅀂干畆以廣寺基文珪殚􅍏智慮出衣盂之資簡材陶甓使其堅良崇室上覆機輪下承鉅木中貫方格層列􅀴匭櫛比繪像精嚴神君􅄦伯翼衞後先􅀁謂楹上八龍者􅂗以金泥鱗介焜燿角鬛森張隂飈肅然似欲飛動國人聚觀無不慶愜文珪復奉今王之命請贖一大蔵􅀴安置中規制整􅅚視舊有加焉􅀴始扵某年月日訖功扵某年月日縻錢􅀂干貫米􅀂干斛役人􅀂干功太上既棄群臣文珪别扵寺東􅀂干歩建盤龍院以奉神御如神之􅀁言云文珪近受王命出持使節貢方物于上國大明皇帝嘉其逺誠寵賚優渥文珪敢藉是有請扵執事願為文持歸勒諸堅珉以示無極予聞七佛尊經實貯龍宫海蔵在昔龍􅀣尊者嘗入其中覩華嚴經上中下三本因記下本以歸西土是則天龍雖以戒緩在龍種中而其向乗之急得扵華嚴㑹上圍繞廬舎那弗與聞大乗圓頓之教終非他族可及經蔵􅀁在其䏻擁䕶而顯靈異也宜㢤日本􅀄無輪蔵有之其􅀙茲寺始文珪承國君之命孜孜弗懈以起廢為巳任亦可謂流通大法者巳予既為記其事且演􅀃蔵中真實了義為偈以繫之文珪字廷用篤志禪􅀚善􅁇大林育公之學者也偈曰世尊大慈父憐憫諸有情自􅀙鹿野􅁐直至䟦提河􅀃無量妙法普度扵人天根雖有利鈍随機􅀗饒益弟子􅀁結集汗牛復充棟善慧施善巧􅀵攝在轉輪圓樞運動間地軸相囬旋法王􅀁􅀃法一一皆現前譬如日月燈䏻放大光明無非真般􅀂不見有一法似兹功徳聚盡在轉移内一轉結習空净如青琉璃二轉加精進直入智慧海三轉到彼岸安住湼槃城以至千百轉轉轉俱一同循環􅀂弗停我輪未嘗動此以何因縁動静無相故瑞龍有精藍重建毗盧蔵中凾貝葉多字如恒河沙沙沙各具佛不翅那由他還以一佛攝攝盡無復餘大包扵無外小則入無内是謂神通蔵萬刼終不磨非比有漏因成壊每相仍􅀁以天龍衆在在悉護持有時著靈異雷電儵變幻守此清净域外道不敢干我持如意輪讃此大乗法告爾諸佛子晝夜湏勤行有悟片言間全體即呈露不著前後際廓然無聖凡豈惟佛子等龍神亦當聽乗戒二俱急共成無上道
