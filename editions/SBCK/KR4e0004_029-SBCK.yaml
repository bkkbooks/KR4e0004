front:
  text: 宋學士文集卷第二十九翰􅁐續集卷之九
  hash: sha256:962ca73799de840538016b29cbf3e0b0228d8dcaf58a952aedca47d427646e2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_029-1a}
body:
  text: 贈惠民局提領仁齋張君序嗚呼醫其難言矣乎人之生也與天地之􅂔相為流通飬之得其道則百順集百邪去苟失其飬内感於七情外感於六氣而疾疢即生焉醫者診而治之必察其根本枝末其實也從而損之其虚也從而益之隂平陽秘自適厥中粗工或昧乎此實實虚虚損不足而益有餘其病之能起者鮮矣此其難一也氣血之運必有以䟽載之左右手足各備隂陽者三陽旣有太少矣而又有陽明者何取兩陽合明之義也隂旣有太少矣而又有厥隂者何取兩隂交盡之義也何􅀴受病冝用何劑治之治之固不難又當知有引經之藥能循此法則無疾弗瘳矣粗工不辯十二􅀴而一槩施之譬猶羅雀于江罾魚于林萬一或幸而得之豈理也㢤此其難二也􅀊氣有不同攻治亦異其冝曰升降曰浮沉吾則順而承之曰寒􅀬曰温凉吾則逆而反之庶㡬能全其天和而不致偵倒錯繆粗工則倀倀然當順則反逆當逆則反順如盲人適野不辯乎西東此其難三也病有寒􅀬􅀬者當投之凉寒者冝濟之以温此恒理也然寒􅀬之􅀔方􅇵而􅃍欲反之必扞格而難入􅀬因􅀬用寒因寒用其始則同其終則異庶㡬能成其功粗工則不察而混治之此其難四也藥性有隂陽而於氣味見焉然不專扵隂陽也又有􅀁謂陽中之隂焉隂中之陽焉差之毫􅁵繆以千里不可不察也粗工則不覈重􅁿而妄投之過矣此其難五也然此多内經之􅀁明言自裴宗元局為大觀二百餘方經㫖晦蝕無有探而究之者至金劉守真張􅀙正李明之等出始一以内􅀴為宗向之晦者昭如也昔之蝕者完如也嗚呼醫其難言矣乎吳士張君仁齋世為名醫從陳鼎庵受内經之學而於劉張李三家之書無不通貫故用藥多竒驗􅀅軍那木哥病危甚張君脉之曰寒凉太過所致冝温之果瘳中書平章政事李思齊遘疾上遣使者召張君療之張君脉已曰色天不澤尺脉已絶然能食飲主踰月而死後亦然先是全室禪師泐公無病偶張君視脉色張君曰師雖康強其中多滯痰後有中風之患當時咸不以為然至是疾果作手足痿痺不仁張君用辛凉劑汗之下而愈師欲以金繒遺之張君􅀏曰師何必爾也得宋翰林文一篇不翅足矣師来為予言予雖不知醫而醫之諸書頗甞讀之故為䟽五難之􅀃使􅀚者知其道為不易如此嗚呼醫誠難言矣乎􅀂學如張君察證如張君制藥如張君則不謂之難也已重刋􅄫照和尚四㑹語題辭􅄫照和尚元叟端公旣示􅄫金華黃文献公為銘其塔蜀郡虞文靖公為序其四㑹語二公以文辭名天下亦云備矣其入室弟子清㤗子楩金山惠明天寜祖闡復合辭請曰舊刋􅀁録先師語不幸燬于兵然非此無以見道之􅀁存􅀼懼不傳子楩三人者已恊力命印生重雕之矣敢重以首簡請為序雖然序猶可略也先師事蹟多渉神異状行者輙諱而不書神異之事大乘者固􅀁不樂聞茍録以示入道之士亦足以起其正信􅀄何傷乎願併識之序中予不敢辭稽子楩等言公平頂古貌眼光鑠人頷下數髯磔立凛然如雪後􅀌松坐則挺峙行不旋顧英風逼人凛如也􅀁過之䖏衆方讙譁如雷聞履聲輙曰端書記来矣噤黙如無人賔友相􅀙未甞與談人間細故舎大法不發一言秉性堅凝確乎不可㧞自為大僧至化滅無一夕脫衣而寢其􅀙南屏歸化城受􅀴夏夕啓窓而卧忽一梵僧飛􅃬而来與談般􅀂樞要亹亹不絶未㡬騰空而去虎岩師主􅀟徑時甞言道家者流有上謁帝者其還甚逹因叩之荅云為選徑山四十八代住持故天閽乆不開爾公正符其數公朝京師夢徑山潭龍君持金匙舉食食公數凡十又八公主法席實十八春秋也公將示滅􅀁剪爪髮留瘞化城幻有庵逮啓視之設利纍纍然生矣公之遺事有􅀂此者皆冝􅀘書以見於世不可畧也盖公道契佛祖名震華夏誠堪輿間氣之􅀁鍾其祥應之至亦出自然非苟渉扵神怪者比也文献􅀁謂門庭之盛規重矩疊法雷普震裂地轟天文靖􅀁謂譬諸名藩鎮以宿將隠然持重風霆不驚握機行令舒卷自由足以使方城連戍有􅀁仰放不敢踰越其言誠不誣㢤濂何敢復賛一辭頗念文靖之學粗聞而知之又執弟子之役於文獻之門者最乆於是勦其緒論重申之如此嗚呼公之四㑹語其尚假濂文以傳之㢤子楩字用堂惠明字性源祖闡字仲猷皆設化一方黒白咸皈仰云滁陽蔡氏道山阡表祠部主事蔡秉􅃔詣濂請曰􅃔之曽大父諱某姓蔡氏􅀄居趙州因官于滁遂家焉娶胡氏無子唯育一女懼蔡氏之不血食也乃命季氏子冬後冬􅀒􅂔自豪殺人亡命竟不知􅀁終遂以女歸来安之許氏許氏諱清字士㢘讀書有賢行平居寡言以儉德自將曽大父愛之曰是􅀋我者也命以爲子不聽乆之乃相􅀙實􅃔之大父也不幸爲高氏子誣搆以死罪留圜扉者二年貲産咸廢而大父無愠容大父復無子亦生一女先是句容龍潭人孔氏有諱善者字囯宝㓜失怙恃唯二兄存頗虐之依仲父以生一旦告仲父曰兄􅀂弟一􅂔􅀁鍾也苟戀區區貲業使兄􅀍不義之名人其謂我何請避之仲父爲之汍瀾出涕且曰吾在子勿憂於是竟决去無留意行至滁大父見之嘉其知􅃔倫之理與其語又􅁿財仗義有特逹丈夫志亦以女妙静妻之刲羊豕大饗婣朋焚香祝天曰吾再世無嗣蔡氏之傳􅀅遂微矣是子其克荷􅀒吾家乎乃後之實􅃔之父也不數年盡復大父􅀁䘮土田人有曲行面直之郷黨稱其賢生四子長即􅃔次玄童次壽童次慶直及一女至正甲午三月二十九日滁䧟于兵先母與女素英抱莭赴水死玄童慶真皆不知􅀁徃獨先人與􅃔間􅀜渡大江而居金􅁜先人因憂憤成疾死時八月十八日也􅃔娶王氏生一子名􅁇宗甞念三世皆以異姓為後雖扵先王之禮有􅀁未合原其情之􅀁至豈得巳㢤􅃔家素積善天必福之異子孫或衆多各俾一人承蔡許之祀而􅃔復姓孔氏則於禮為得矣然大父之年僅五十七大母復少四􅀊而終父視大母之年又少十􅀊母之年則如其父焉四䘮皆於黄道山以昭穆序塟山在州東北十五里曽大父兆域之所在也墓石皆無文願子為通書諸碑以示後人天地開闢厥􅀄生民何甞知有所謂姓氏聖人者出􅁖其無貴賤親踈少長之别也於是因生賜姓胙土命氏以至於以字以謚以官以邑而族系漸繁矣蔡本姫姓許本姜姓皆以囯氏者也孔本子姓以王父字為氏者也而三者何可同乎雖然凡有姓氏莫非神明之胄而出於炎黄之世􅀁謂二十五宗一十四姓者􅀹多流雖殊而源則一􅃍謂之不同亦未見其為可也然􅃔之為孔氏固為不刋之論彼二氏者豈可忘其􅀁付訖而為􅀂敖氏之􅀑㢤誠令子􅀂孫継之一如􅃔􅀁言亦出於禮之變耳嗚呼氏族之不傳其淆亂無别亦難明矣使􅃔不自言數世之後􅁖知有􅀁謂孔氏者㢤昔人有云人有姓氏猶衣服之有冠冕裂冠毁冕雖有帶裳幅舄不足以􅀍飾其身其任不為不重矣其任為甚重人反視以為􅁿有如􅃔者豈非有識之君子乎某與􅃔交既乆􅀂異姓昆弟然故因其請為表著先塋之碑使後世有考焉􅃔字秉􅃔為人慷􅁣䟽通其􅀙政也難集之事談笑而成之人號為長才㓜鞠同里王時中家遂婿焉巳而襲其姓時中既有後今請于朝仍氏於蔡云大天界寺住持白庵禪師行業碑銘有序大天界寺住持白庵禪師諱力金字西白吳郡姚氏子其母周氏夢一龎眉僧􅁼應真者直趍房闥麾斥弗退因驚呼而􅁴遂懐姙時至而育竒芬馥郁滿庭年臨五六方顙圓額白哲如玉琢見者無不憐愛縣大夫時抱載車上歸與妻妾環玩之欲索為子父母靳弗與逮七􅀊頴悟異常凡書一覧即能記憶或見佛像輙五体投地作禮而退一日請于母曰兒患世相起㓕不常􅀅求出世間法可乎母曰出家甚苦爾年㓜豈能堪乎曰兒心自樂之想無苦也自後請之不已父母知志不可奪俾依吴縣宝積院道原衍法師為弟子十一􅀊祝髮受具戒精研三􅀚十乗之㫖領其樞要衍公主秀之德蔵師為綱維之職􅁤範肅然忽喟然嘆曰名相之學畧諳之矣盍棄諸縁而徃躋􅁴路乎遂更衣入虎林謁古鼎銘公子􅀟徑古鼎一見輙以法噐相期示以德山見龍潭語師􅁬迅踊躍直觸其機從而有契銘公俾掌記室曽未㡬何分座後堂敷宣大法如山川出雲靈雨霑􅃳四衆信服復陞居前室聲光燁燁起叢林間至正丁酉出世住蘇之瑞光寺㑹嘉興天寕寺災郡守貳咸曰非師不足起其廢具禮幣遣使者力邀致之師至未乆􅌂如兠率天宫下現人世道路過者莫不瞻礼賛嘆帝師太宝法王聞師之賢授以圓通普濟禪師之號師自㓜䘮父唯有母存乃去城東一舎築􅀌雲庵以奉飬焉同袍或議之師呵之曰爾不見編蒲陳尊宿乎何言之易易也洪武改元皇帝御大寳暦弘闡佛乘首開善世院俾擢有道浮屠莅天下名山杭之净慈主席尚虚僉欲起師居之䟽與幣交至浙江省臣復遣使趣之師皆力辭乃退居同歸庵迎母以飬僕夫忽夢庵前有瑞花如芙容然光彩絶異或謂夢者曰此花天子當取之而去旦而述其事人以為誕巳而有㫖起師住持大天界寺命􅀅下之日乃僕夫所夢之宵也師應詔至闕見上於外朝慰勞優渥即令内官送其入院賜以天厨法饌萬機之睱時召入禁庭奏對多稱㫖盖師精通西竺典及東魯諸書其與薦紳談論霏霏如􅄍玉屑故咸樂與之㳺至扵勘辯學子務以直指心源宗􅀃兼行機用迭發􅀹使者敬仰不置四年春詔集三宗名僧十人及其徒二千建廣薦法㑹于鍾山命師捴持齋事師能靈承上㫖凡儀制規式皆堪傳永乆尋以母年耄舉徑山泐公自代復還庵居五年冬詔復建㑹如四年大駕臨幸詔師闡􅀭苐一義諦自公侯以至庶僚環而聽之靡不恱服一日忽示門弟子曰吾有夙因未了必當酬之汝等勿以世相遇我未㡬示微疾謝去醫藥飲食手書一偈委順而化實六年十二月二十四日也停龕六旬始行茶毗之法視其皃如生數珠齒牙不壊於火設利羅無等􅀚者競取之而去世壽四十有七僧臘三十又六􅀁度弟子某等二十餘人嗣法上首出住名山者保寕􅁴慧等又二十餘人三㑹語有録謀建塔扵嘉興城西環翠蘭岩以某年月日舉靈骨及不壊者蔵焉師神􅀚秀偉智辯縦横以宗教為巳任不畜􅀻財毎得財施輙舉以給貧者甞以楞伽經及法宝壇經乃釋門心要當毒暑時揮汗謄鈔鍥梓以傳師既歿􅁴慧惟恐其遺行泯泯書夜弗自寕件繫群行為書乞予為塔上之銘予惟臨濟之傳至扵寂照大師其道益光明盛大故其子􅀂孫亡慮數十人各主名山務識本源至今接武而􅁬者尚未已也如師者亦其一人焉此無它傳授之真頴悟之正而無它岐之惑也夫塔之有銘始於梁而􅀹盛於唐以為不􅀂是無以繫學者之思而景先哲之行也予不敢廢此義遂因慧􅁴之請為造銘曰一真妙心􅀆圓同太虚迷者自蝕􅀆唯塵之拘􅂚治􅂚攻􅀆在静其慮禪斯有學􅀆流于中土臨濟正宗􅀆奕葉其光􅀓至􅓦照􅀆愈亢厥宗叶子孫蟄蟄􅀆各闡化機要使青蓮􅀆出扵汗渠唯師之生􅀆孰乗願輪豈伊應真􅀆憫世度人學兼内外􅀆卓然名家轉彼名相􅀆為德之華紺目一􅕿􅀆大法畢具見者悟之􅀆無句之句宝華樓閣􅀆彈指即成示現世􅀆何經何營三莅精藍􅀆其法益崇􅂚以徴之􅀆設利青紅生死去来􅀆不礙真圓飛鴻印雪􅀆爪趾宛然塔婆新建􅀆下瘞靈骨銘以掲之􅀆来者是則夾註輔教編序天生東魯西竺二聖人化導烝民雖設教不同其使人趍於善道則一而巳為東魯之學者則曰我存心飬性也為西竺之學者則曰我明心見性也究其實雖􅀂稍殊世間之理其有出一心之外者㢤傳有之東海有聖人出焉其心同其理同也西海有聖人出焉其心同其理同也南海北海有聖人出焉其心同其理同也是則心者萬理之原大無不包小無不攝能充之則為賢知反之則愚不肖矣􅁴之則為四聖反之則六凡矣世之人但見修明禮樂刑政為制治之具持守戒定慧為入道之要一䖏世間一出世間有􅀂氷炭晝夜之相反殊不知春夏之伸而萬彚為之欣榮秋冬之屈而庶物為之蔵息皆出乎一元之氣運行氣之外􅀄不見有他物也逹人大􅀚洞然八荒無藩籬之限無户閾之封故其􅄍言持論不事形迹而一趍於大同小夫淺知肝膽自相胡越者􅁖足以與於此㢤宋有大士曰鐔津嵩禪師實洞山聦公之法嗣以二氏末流之弊或不相能也取諸書㑹而同之曰原教曰廣原教曰􅂆書曰孝論而壇經賛附焉復恐人不悉其意自注釋之名之為輔教編􅀂禪師者可謂攝萬理於一心者矣予本章逢之流四庫書頗甞習讀逮至壮齡又極潜心於内典徃徃見其􅀃廣􅀶殊勝方信桺宗元所謂與易論語合者為不妄故多著見扵文辭間不知我者或㦸手来詆訾予噤不荅但一􅀏而巳今因虚白果公重刻是編其有功學者甚大故執筆言之嗚呼孰能為我招禪師扵常􅄫光中相與論儒釋之一貫也㢤獨視霄漢悠然遐思者乆之題滑壽傅後昔者太史遷作史記創為記表書傳秉􅊮筆者咸宗之然而傳之為体雖不一不過立論序事二者而已獨為淳于意傳載其應詔􅀁對自齊侍御史成至公乘項䖏凡二十有三人書治病死生驗者具悉此其故何㢤盖毉乃人命所係不敢不慎故特變例以成文耳㐮城滑壽伯仁以毉道髙一時而吾老友朱君伯賢倣史迁法為之傳事核詞古而光􅆋燁然與伯仁㳺者鋟􅎚以行伯賢方載筆詞林其言當見信扵世它日必有采之入史牒者淳于意之事尚得專羙扵前㢤
