body:
  text: 䟦日本僧汝霖文槀後右日本沙門汝霖􅀁爲文一卷子讀之至􅂯見其出史入經旁及諸子百家固已嘉其􅀶贍至扵遣辭又能舒徐而弗迫豐􅃾而近雅益歎其賢頗詢其􅀁以致是者盖来㳺中夏者乆凡遇文章鉅公悉趍事之故得其指教深知䂓矩凖䋲而能使文字􅀙職無難也汝霖今汎鯨波東還以文鳴其國中盖無疑矣嗚呼汝霖禪家之流也蕩空諸相視五藴四大猶爲土苴况身外之文乎苟執此而不遷或􅀅與道相違矣雖然汝霖徧叅名山精扵彈􅀚其扵此義未甞不知之特以如幻三昧㳺戯扵翰墨間爾㳺戯翰墨非難而空其心爲難􅀁謂心空則一切皆空視諸世諦文字雖有粗迹而本無粗迹雖有假名而實無假名惟一惟二惟二惟一􅀄何礙扵道㢤􅀚汝霖之文者又當扵此求之汝霖名良佐逺州髙園人姓藤氏甞掌書記扵􅂫之承天寺􅁇同五山諸大老入鍾山􅀧校毗廬大蔵經其同􅂁皆畏而愛之云洪武九年春三月翰林學士宋濂䟦贈􅀓神陳徳顔序余方退朝忽起曹員外郎劉君宗文同一儒生見過指曰此吾學子松陽陳徳顔也徳顔善貌真小與大咸冝請爲先生試之余􅀁遇畫神者亡慮數十有絶不得形似者有僅得髣髴而弗能全者形雖肖矣又有不得其風神如道家􅀁繪仙靈者竟無以􅁛吾心不欲咈宗文之意姑諾之徳顔反覆睥睨之而去越明日徳顔持一小像来余不能自見掲諸壁間傔􅀠見之讙曰此吾主翁也俄門弟子至又争曰此我家先生也自時厥後僚友好我者聚而􅀚之僉曰此龍門子宋君也子亦自咲因叩之一云是舎杖而趨􅀚水潜溪時歟一云非也是破顔㣲咲肆口論文時歟一云亦非也是㝠心合道與造化㳺時歟余曰有是㢤脫如三客言非惟其形逼真抑且并性情而􅀓之矣曽未㡬何宗文又􅂯至余因與道客語宗文曰京都之間天下藝能之􅀁萃止如徳顔者十百之中僅一見焉先生旣愛之矣盍爲文以張之乎余自近嵗以来爲求文者肩摩􅃑接而至一切謝絶已乆聞宗文言欣然揮毫爲之藩府宰輔之賢詞林胄􅐭之英䑓閣清流之選以余延譽之故亦競賦詩􅂌之徳顔何以得此扵人㢤盖君子􅀁業但憂心弗純不患藝不精但患藝弗精不憂名不揚理之常也古之人以畫􅀑神爲易狗馬爲難狗馬人皆識之不􅀋則非之􅀑神不與人接竒形佹状可怖可愕任其意爲之况人爲物靈其變態千萬一毫不􅁼則他人矣不其􅀹難㢤非徳顔之藝精者不能與爲斯也余扵徳顔竊有􅀁感焉史氏之法不溢羙不􅀮惡必務求其人之似焉一毫不􅁼亦他人矣奈何世道不古楊之則升青霄抑之則入黄壚問其氏名則是矣其行事則非也嗚呼一藝且然而操直筆者乃不能然豈不有愧扵徳顔㢤余論激矣宗文以爲何如題湯䖏士墓銘後予觀老友陶先生􅀁撰湯䖏士墓銘歎其制行淳厚何其絶扵人㢤竊求其故䖏士之諸祖甞置義田以贍宗族積累深長故其孫子多賢此固天佑善人理當報施者如是抑亦家庭之間耳濡目染之􅀁致也昔者范文正公呉文肅公皆有志義田及登二府禄賜豊厚方􅀎遂其􅀁願儒先學士毎􅃩其事且謂劉暉簽判家無餘貲能扵􅀄仕亦置義田數百畆實有難扵二公者嗚呼暉亦食君之禄矣今湯氏以布衣之家􅀄無禄賜之入其扵義事乃能上與二公相抗可不謂􅀹難㢤能爲其人之􅀁難故天之􅀁報亦出扵尋常之表冝其䖏士之賢有足􅁛道也湯氏之興固􅀅未艾後世之顯豈無范呉其人㢤予􅀅望之金華山中人宋題陳生宗譜後氏族之學難言也乆矣陳本嬀姓禹封舜子商均扵虞城至周武王以元女太􅁎配胡公而封諸陳其後子孫有奔齊者遂以國爲氏􅀓裔既乆乃至混淆有本姓陳氏而更爲田氏王氏者有本姓白氏髙氏而冒爲陳氏者此固失之成安君陳餘自大梁起兵従劉項陳嬰自東陽以兵属項梁二人雖曰同時本非父子唐表􅁍以爲嬰生餘尤爲無稽之甚史家且爾千有餘嵗之後爲孝子􅄌孫者欲求譜系之真其果何如乎不若信以􅀓信疑以􅀓疑可也予學子陳生晟自著譜圖記一篇書其􅀁可知而闕其􅀁不知真有識之士㢤雖然公侯之興寧有定世生知種學續文有聞扵多士爵禄之来􅀅有不可禦者使後世子孫藉其遺耀􅁢有􅀁攸頼不亦羙乎生尚朂焉可也清風亭記清風亭者撫州金谿鄧彦誠之􅀁築也彦誠世居雲林三十六峯之陽其先世多以志節著當宋之季天下大亂甞集義兵以護鄉社助國家宋亡爲元七十又七年是爲至正壬辰天下復大亂撫州不守彦誠歎曰㓂􅀅至吾可不衞宗人使及於難乎即召鄉里少年分隊伍􅀣砦柵扵雲林山金鼓之聲晝夜不絶㓂来輙敗衂而去薦紳之流依之以免者百數十家事平會府上其功􅀅爵禄之彦誠謝曰吾之挺身禦宼不忘先世之明訓爾敢藉是以媒利耶掉頭去不頋乃扵堂之西偏藝竹數萬竿引泉爲池而築是亭其中彦誠戴華陽巾􅀍鶴氅衣日逍遥亭上㳺情物表澹然與塵慮相忘人見之者疑爲古仙人御風而行可望而不可即僉曰是功成而不居者其視富貴利逹何有㢤冝名亭曰清風以勵衰俗彦誠咲而不荅嗚呼志節之士世不多見矣昔聞有田疇者遭幽州始擾蕩析離居疇率宗人避難扵無終山百姓歸之者五千餘家且數立竒勲以自見魏太祖論功封爲亭侯邑五百戸疇謝曰疇自以始爲居難率衆遁逃志義不立反以爲利耶固辭不受至今言疇者慕其清風若神龍㳺于玄間欲一見之而不可得其視未建尺寸之功輙欲重徼名爵者其爲混濁盖亦甚矣今彦誠之行事皦皦不誣有足多者予雖未敢􅃍謂如疇察其志之􅀁存寧不髣髴似之耶然君子之論觀其志而不較其功功固有小大志豈有崇卑耶志苟同功亦同也彦誠不必不如疇者昭昭矣後之人聞彦誠之風者豈不蹶然興起耶抑予聞撫爲文獻之􅀖士出其間多以道徳忠義著聞載諸方䇿者斑斑可考彦誠以劬然一布衣又能竭力捍㓂如此豈雲林三十六峯委靈隤祉以致然耶不然何其生賢之多也予因爲著清風亭記刻寘亭上使人知􅀁自立頗謂有禆扵政化文之不工固不暇計也彦誠名諒江西提􅀧刑獄諱元􅀚之諸孫来請記者其族人知南陽縣行父也氣節亦森然可尚云環翠亭記臨川郡城之南有五峯巍然􅋍起如青芙蕖鮮靚可愛其青雲第一峯雉渫實繞乎峯上旁支曼衍虵蟠磬折㳂城直趍而西如渇􅂹欲奔泉者是爲羅家之山大姓許氏世居其下其居之後有地數畆餘承平之時有字仲孚者甞承尊公之命植竹萬竿而搆亭其中當積雨􅀄霽晨光熹微空明掩映若青琉璃然浮光閃彩晶熒連娟撲人衣􅃑皆成碧色冲融扵北南洋溢乎西東莫不紺聮緑􅆂無有􅃜欠仲孚嘯􅁔亭上儼若經翠水之陽而待笙鳯之臨也虞文靖公聞而樂之曰此足以抗清寥而㝠塵􅁭乃以環翠題其顔至正壬辰之亂􅇏火相連非惟亭且毀而萬竹亦剪伐無餘過者爲之彈指永嘅及逢真人龍飛六合載清仲孚挈妻孥自山中歸既完其闔廬復構亭以還舊貫而竹之萌孽亦叢叢然生三年而成林州之壽後與其有連者咸詣夫仲孚舉觴次第爲壽且唶曰江右多名宗右族昔時甲第相望而亭榭在在有之占幽勝而挹爽塏非不羙也兵興以来有一僨而不復者矣有困心衡慮僅脫扵震凌者矣有􅐡梳不暇遷徙無寕居者矣况􅀁謂逰􅀚之􅀁㢤是亭雖㣲可以卜許氏之有後足以克􅀒先志前承後引盖未有涯也酒且酣相與􅁔曰五山㧞起􅀆青蕤蕤六千君子􅀆何師師鳯毛䙰徙􅀆啄其􅃾秋風吹翠􅀆實纍纍邈千載􅀆動遐思􅁔已而退夀陵中有陳聞先生者謂不可無以示後人乃同仲孚来詞林請予爲之記嗚呼昔人有題名園記者言亭榭之興廢可以占時之盛衰余􅀄甚疑之今徴扵仲孚其言似不誣也向者仲孚出入扵兵車蹂踐之間朝兢暮􅅥雖軀命不能自全今得以安乎畊鑿崇乎書詩而扵暇日怡情景物之表豈無其故㢤盖帝力如天撥亂而返之正四海致太平己十有餘年矣􅀚仲孚熈熈以樂其生則江右諸郡可知江右諸郡如斯則天下之廣又􅀙可知矣是則斯亭之重搆非特爲仲孚善􅁇而喜實可以卜世道之向治三代之盛誠可期也予雖不文故樂爲天下道之非止記一亭而巳仲孚名仲麗嗜學而好􅁱士大夫翕然稱之贈簡中要師㳺江西偈序方外範堂儀公来言同􅂁有原要字簡中者日本之人也姓藤氏爲其國貴族年九嵗依能仁國濟國師給洒掃之􅃥乆之國師爲薙落受具足戒㝷徃建仁與聞在菴禪師大法要旨遂使侍香左右毎慕中夏禪宗之盛洪武甲寅夏不惮鯨波之險航海而来憇止南京大天界寺聞江右多祖師道塲欲徃禮其靈塔頗聞古有贈言之禮世恒相因先生能不癈之乎予曰此吾俗間事也簡中學絶俗之道文字且不當立况予之賸語邪範堂曰請爲一偈何如予曰杳㝠之中其光如暾不依形立常與道存雖偈亦奚以爲範堂曰此姑寘之第二門中何事不可􅀃先生自通一大蔵教乃欲遇絶􅀄機之士乎予曰本自現成誰爲􅀄機一且不有孰居第二强生分别去道滋逺也範堂曰先生辨固辨矣吾無以酬之簡中必欲徼片言之賜􅄌悲者果能拒耶子咲曰如此則或庻幾也扵是合十指爪而唱偈曰諸法本無㓕是故無􅀁生其意果云何本性不變故衆生堕虚妄常見有生㓕因縁十二支猶如玉連環鉤鎖不可㫁正滯無明根根㫁枝葉枯豈復能滋生若能㫁其生而死自然㓕不見有一法㓕􅀅従何起如来􅇰方便示此思惟修蕩相而明空功徳難思議如執金剛劍寒鋩湛秋水斬除諸煩惱智慧即現前轉移刹那間不見有真妄如種鉢特摩出自淤􅅺中華雖未敷滎其實巳全具􅀟舉復雙収不見有先後如然長明燈于彼昏暗室明生暗即亡非暗徃它􅀁明暗本無二不見有出入沙門汝當知此乃真實義回光自返照照性亦并亡前㓕既不接後起亦不引前後際皆㫁無思心正住􅀁謂諸因縁銷霣無餘者江右多古塔骨朽巳千載塔前諸􅀣林晝夜談妙法熾然雖不停無耳乃得聞沙門汝當知勿墮扵色聲有佛與無佛不可生執着行行早休歇契彼無上道題顧主簿上蕭侍御書後嗚呼君子之制行毫末不可不謹一行有玷則衆善皆􅈥雖其後痛自剋責而覆水不可反瓶矣此濂扵侍御史蕭振之事不無感焉振字徳起温之平陽人本趙忠簡公􅂦􅀁薦因秦檜引之入臺遂親檜而䟽鼎盖主和議者檜也􅂦與劉太中毅然不􅀙振劾太中以揺鼎鼎竟罷相及乎物議不可屈振頗自悔乃與檜時相異同聞楊煒上書責李光徇檜議和振因薦煒改秩意􅀅藉此以自洗滌殊不知適爲池陽之謪矣嗚呼振之治政歴歴可紀其在西蜀􅀹有聲故高宗爲􅀤前有胡世􅀅後有蕭振之歎使無劾鼎一事振能不得爲君子矣乎後世公論之定卒儕之何鑄王次翁樓炤勾龍如淵羅汝楫之間號爲檜黨立身一敗萬事瓦裂豈不信然㢤振之友同里顧岡次鳯時爲錢塘縣主簿移書扵振其辭雖甚柔婉􅀮然有主鼎不附和議之意當是時主桐廬簿賈廷佐亦䟽檜累數千言桐廬與錢唐其地宻邇豈或相爲謀邪然廷佐劇論讎恥不可忘名分不可貶和約不可信請誅王倫拘虜使决意用兵其言尤壮烈又可見一時士大夫忠義􅀁激雖小官且然不特李綱張燾曽開胡銓諸公而巳惜乎岡之書不附戊午讜議中予故備論之使讀者知戴天􅂂地爲人一刻弗忘君而不失足權姦之門庻幾仰不愧俯不怍􅀁以然者既深爲振惜亦以振爲大戒也岡五世孫元龍請白野忠介公繕冩其書成卷而歐陽文公黄文獻公余忠宣公咸爲題識元龍之第仲華復来徴濂文不巳岡亦多賢子孫也㢤篷軒銘有序新安胡君寕之作室城東隅旁中寛翼以欄楯而其制􅁼舟招弟子肄業其間楊内翰剛中曰是期以濟川者也冝名汝舟寧之之子英復搆軒扵前以篷爲字篷者舟蔽也雍虞文靖公白野忠介公宣城汪文節公咸爲賦詩壬辰兵變化爲椔翳之􅇕英亦避地城北􅄮陽山及四海底寕英擇地山陽洊造書室而軒亦􅁇完書云􅀂考作室既底法厥子乃不肻堂矧肻搆古亦有是言矣今若英者能承先志而弗墜可不謂賢乎㢤爲作篷軒銘銘曰歙多大山下瞰平陸嶺接峯聮前奔後逐如瀛海内波濤起伏有羙君子搆室山因水取象揭以汝舟功期濟川朂之進脩維舟之用視篷爲急籍以葦蒲紉以靲䈼障除雨風奠安袵席豈無桂櫂艤河之洲亦有蘭橈載泛載浮匪篷斯完厥用焉求父唱于前子和于後兵燹之餘聿親良構寕事般㳺思學之懋學功伊何夙夜無諐拯夫顛連如渉大川脫彼墊溺升諸堂筵誰無齋居乃名爲舫以燕以娭以速官謗儆戒或怠其心則放斯堂暨軒閑閑言言有瑟有琴有典有墳春誦夏絃啓迪後昆凡厥苐子泳􅆂聖髓一葦杭之母或中止大書軒楹銘者太史故宣武􅀅軍僉㽞守衛親軍指揮使司事楊公壙志公諱信姓楊氐世爲開封鄢陵人在元朝時以膽畧聞選充湖廣砲手翼百戸戍鎮江元末四海大亂天兵㝎建康江南州郡莫不震動嵗丙申公帥師旅来歸命仍領銃手軍􅀙征常宣二州有功權授親隨帳前萬戸扈􅀙取婺州奪城門懸橋復隨大􅀅取三衢􅁇又扈駕親征九江南昌等郡下之實授管軍千戸及陳友諒来南昌上怒下詔親征公帥銳手軍以隨􅀙戰彭蠡湖及陳友諒戰沒遺孽假息武昌公又􅀙破之既而克合肥援安豊㧞永新亦與有力焉張士誠據姑蘇常忠武王奉詔致討公又􅀙戰有功賜以文綺三皆有副陞僉虎賁左衞親軍指揮使司事出戍蘄州遂轉僉蘄州衛指揮使司事階宣武􅀅軍調戍武昌遷永州已而僉永州衞指揮使司事俾其子孫世襲其職洪武八年冬十一月詔還京九年春二月改僉㽞守衛親軍指揮使司事散官如故夏五月七日以疾終享年五十又七其子􅀚音保始三嵗二女尤㓜上聞之憫悼不已特遣内臣􅀕以牲醴旦勑中書大都督府御史䑓次苐致奠復命工部造塋聚寳山之原以其月十九日􅁙恩意甚優渥也曽祖考忘其名祖考柱考彬妣李氏妻四人正室王氏側室馬氏彭氏王氏􅀚音保側室王氏出也惟公幸際興王之運臨􅃴不懾故能立顯功受榮爵殁且不朽矣豈非竒男子㢤玄堂有誌今不敢廢也扵是乎書孝子丘鐸􅀓丘鐸字文振汴之祥符人故御史中丞劉基先生弟子也通儒書兼習醫家言流聲動一時至正末父誠爲湖廣等處儒學提舉鐸侍母馬夫人㽞呉越欲御車徃􅀙江右兵大起武昌䧟二浙繹騷鐸憂懼不知􅀁爲急避地四明暨江南皆歸職方復奉母至南京毎西向翹首曰武昌有来者庻㡬知吾父之􅀁在乎巳而其父果至自武昌父子相見悲喜交集鐸賣藥市中以自給親驩然忘其貧曾未幾何母弟鈞擢會稽上虞巡檢鐸與父母皆同赴官夫人疾鐸晝夜泣禱上下神祗乞以身代及殁鐸哀慟㡬絶卜塟鳴鳯山之原􅂘曰鐸生也只尺不離吾母膝下今逝矣可委體魄扵無人之􅇕乎乃結廬墓側朝夕上食如生時當寒夜月黒悲風蕭颼如臨􅄦神鐸恐母岑􅄫也輒巡墓􅃅曰鐸在斯鐸在斯其地多虎聞鐸􅂘聲輙避去故㑹稽人異之􅁛爲真孝子云先是鐸在四明從祖父母居汴者八人貧不能自存鐸咸迎飬之死皆返塟先塋人以爲難其姑􅃴河南匡氏者年十八夫亡誓不􅂯適鐸義之飬其終身凡二十年如一日然其制行峻絶它皆類此文不能盡載也爲􅀃者曰予聞鳴鳯山當白馬上妃二湖間人跡罕至白晝虎狼旁午鐸㷀然獨處心無畏懾者豈不以親之體重扵身乎然身者親之枝也可不敬乎敬其身斯孝其親矣鐸情固迫切當知以禮自節㢤當知以禮自節㢤杜詩舉隅序詩三百篇上自公􅀸大夫下至賤隷小夫婦人女子莫不有作而其托扵六義者深逺玄奥卒有未易釋者故序詩之人各述其作者之意復分章析句以盡其精㣲至扵東山一篇序之尤詳且謂一章言其完二章言其思三章言其室家之望女四章樂男女之得及時一覽之頃綱提領挈不待註釋而其大旨煥然昭明矣嗚呼此豈非後世訓詩者之楷式乎杜子羙詩實取法三百篇有􅁼國風者有􅁼雅頌者雖長篇短韵變化不齊體段之分明脉絡之聮屬誠有不可紊者註者無慮数百家奈何不爾之思務穿鑿者謂一字皆有􅀁出泛引經史巧爲􅀓㑹楦釀而叢脞騁新竒者􅁛其一飯不忘君􅀤爲言辭無非忠國愛君之意至扵率爾咏懷之作亦必遷就而爲之􅀃􅀃者雖多下出扵彼則入扵此子羙之詩不白扵世者五百年矣近代廬陵大儒頗患之通集􅀁用事實别見萹後固無繳繞猥雜之病未免輕加批抹如醉翁􅄰語終不能了了其視一者相去何逺㢤會稽俞先生季淵以卓絶之識脫畧衆􅀃獨法序詩者之意各析章句具舉衆義扵是粲然可􅀚有不假辭􅀃而自明嗚呼釋子羙詩者至是可以無遺憾矣抑予聞古之人註書徃徃托之以自見賢相逐而離騷觧權臣専而衍義作何莫不由扵斯先生開慶已未進士出典方州入司六察其冰孽之操諒直之風禀然聞扵朝著不幸宋社巳屋裴囬扵殘山剰水之間無以􅀉其罔極之思其意以爲忠君之言隨寓而發者唯子羙之詩則然扵是假之以􅂥胸中之耿耿乆而成編名之曰杜詩舉隅觀其書則其志之悲􅀙可知矣先生既殁其玄孫安塞丞欽懼其湮㓕無􅀓􅀅鍥諸梓而来求序文甚力子居金華與先生爲隣郡及􅀙黃文獻公㳺􅇱聞先生之行事可爲世法因不辭而爲之書先生名浙季淵字也晚以黙翁自􅃅􅀁著有韓文舉隅而孝經易書詩禮記春秋離騷各有審問不但箋杜詩而已也題李伯時畫孝經圖後右李公麟􅀁畫孝經圖一卷至正中著作郎永嘉李孝光進入秘府順帝詔翰林學士承㫖臨川危素逐章􅀘書經文元社既屋皇明受命圖入􅀳王邸王下教俾濂題識其左濂聞史皇作畫倉頡制字夲出扵一源聖人因字以著經而善繪事者則因經而作圖故古之人或繪詩與春秋或像論語或畫爾雅而圖孝經尤多人觀之者有若親逢其事感恱而歆慕不待辭􅀃而意趣自顯則其扵經似不爲無􅂇也公麟集顧陸張呉諸家之長爲宋畫苐一其圖是經盖取法扵顧愷之􅀔如雲行水流自然有起伏之熊誠希世之寳也然而王者之􅀁寳在孝不在畫也歴代賢王其聲光流扵無窮鮮不以能孝而致之載諸史􅁽尚可攷見經曰昔者明王事父孝故事天明事母孝故事地察長㓜順事故上下治斯言至矣願王日加之意焉題桞公權書度人經後正書之檀名者自魏鍾繇而至扵宋僅得四十四人而唐桞誠懸實錚錚乎其間則夫墨妙筆精有不待賛矣其入宋秘府凡六帖而書度人經者二此卷特其一爾是經乃􅀳宋人僞作至誠懸時相􅀓稍乆故信而書之近代紫陽方囬則謂五季蜀王建時道士王喬始造且確然弗自疑不㡬扵甚可咲歟使回見誠懸書此吾知其䫙有泚矣䟦韓忠獻王􅀁書義鶻行後右韓忠獻王􅄾􅀁書杜甫畫鶻行端嚴厚重古􅀁謂顔筋桞骨殆無以過之展卷熟視則夫垂紳正笏不動聲色而措天下扵泰山之安者其氣􅁚猶可想見其彷彿也朱文公有云韓公書蹟雖與親戚卑㓜未甞有一筆作行草􅀔以此􅀚之王之爲人由中逹外無斯湏不本扵誠故其建功立事凝㝎不揺徳在生民而名著史􅁽冝也視彼傾欹偃仆常若大忙中書者則其躁急寛易相去何如㢤黃氏恱親堂銘親可恱乎曰可悅之以道恱也非其道不恱也恱之之道奈何温與清無爽也㝎與省勿諐也可也而未至也視扵無形也聴扵無聲也日用三牲之飬也可也而未至也寳厥身也若愛瓊􅅼也慎􅀁􅂂也如在淵冰也跬歩不忘乎孝也可也而未至也然則何爲之至也身之顯也親名之彰也親名之彰也族婣之􅀁􅃩也僚友之􅀁願也州里之􅀁榮也恱也然則斯恱也外也非内也是何言也是何言也外自内出也有諸内必形諸外也不可二之也建安黄居徳飬親之堂題之曰恱親居徳以文辭致身爲鄷都長其身􅀅顯也予故援此以告之也孟氏􅀁謂恱親也人習而察也予不敢勦說也銘曰恱乎親在顯乎身􅀁以􅀭乎人人曰誰氏之子親譽因茲而有聞身者親之技斯湏不敢毀傷始爲行之醇天經地義吾敢弗之惇嗚呼揚乎人顯乎身􅀁以恱乎親􅀘臨川危安子定加冠祝辭有序冠者責成人之道其禮自天于至于諸侯􅀸大夫士各有􅂭殺之節儀文雖已失􅀓唯士冠禮獨存告廟筮期宿賔命賛弁有皮爵之等裳有黄玄之錯􅄊有尊甒伵觶之用􅂦有乾胏離肺之實三加而彌尊制字以敬名其爲禮甚嚴矣夫何故事親􅀙兄忠君敬長之行望其有􅀁成也古昔盛時以冠爲諸禮之首者其職此之由歟自冠禮乆廢風頽俗靡冥然夜行如擿埴而索􅂗君子未甞不爲之永嘅也臨川危生安清敏好􅁱爲文辭亦整緻可觀甞􅀙郡諸生肄業成均學士大夫多延譽之其師曾先生旦􅀄爲字曰子定来謁禁林求于爲之􅀃予謂字之有􅀃􅀃文觧字俻述之矣何假人言㢤然三加成禮之後既命之字必造辭以祝之是猶可爲也扵是歴序冠禮之嚴定字代名者爲甚重􅁇掇大學知止之義而申之以辭生慎聴之其􅀅躋君子之域矣乎其辭曰人之􅀄生父命其名弱齡攸届乃以字稱此非彌文實厚彛經四行之責用底于成其一爾生名安以定爲字稽諸聖經敷列其義必先知止始奠厥志射有正鵠􅀡趨而遂其二方其未定逐物而揺紛紜舛戾水湧風飄及既定只􅁼鑒孔昭事至則應順而不膠其三曷爲致斯因静之故静爲動基理罔弗具辟地􅀶厚發育萬彚區萌畢逹隨風而布其四静主乎内靈扃廓然靡􅀮靡顯隨寓而安天光昭煥人滓􅀅刋漸􅀗􅀁止斯不爲難其五惟古之學明體􅃴用出輔􅀖家瑞若麟鳯逮及後世葩藻是弄誇多闘靡有如聚訟其六昔我臨川學者􅀁宗仰視陸子其猶神龍駕風鞭霆雨于太空􅀍其澤者碩大而充其七憫彼夸毗以華喪質􅀡䆒本心皦如出日㣲言猶存可以㝷繹生居其郷敢不自力其八爾生長矣燁如秀榮濯濯而明英英而貞􅀙師受經啄其至精亦既有文五色交縈其九我後賔賛不與酌醴今􅀘祝辭庸申䂓厲行固冝䔍知亦湏至安定其中聖域可企其十贈承事郎工部主事劉府君墓版文濂家食時甞如烏傷其校官劉君浩卿来見浩􅀸諱演羙容儀晢白如冠玉有鵠峙鸞停之状聆其谹議推闡王覇欲見之開物成務建瓴注而健鶻飛也求􅀁著文閱之氣充而聲雄風雨晦冥雷電恍惚若􅀑神之出入也濂甚􅃩其人數與之㳺盖浩􅀸受經玉山鄭録事明善録事精通伊洛之學望重當世浩􅀸􅀗其􅀓爲多濂意浩􅀸非文墨可覊必騰迅以升巳而浩􅀸秩滿去濂亦潜伏大山長谷聲迹絶不聞㑹元籙告終皇明御極濂應聘而起累遷入禁林浩􅀸之子彬亦典儀􅀳王府既胥㑹亟問浩􅀸安否則宰木拱矣濂失聲哭曰浩􅀸止扵是耶不􅁴爲潸然出涕彬才猷日著轉承事郎工部主事改員外郎閒謂濂曰彬幸藉先子明訓沗任官使近得援例贈先子如彬官母葉氏亦贈孺人先子卒時年五十又四乃元至正癸已三月九日後七年已亥十月二十二日始塟麗水縣孝行郷之桐嶺原迄今洪武丙辰越十八載而懸官之石無文非不孝歟願先生􅂌矜之言訖泣下既而又曰先生之行多可書彬不能記其詳先子事父孝生能盡飬暨沒廬墓左者三年㢘訪使者遂以孝㢘舉教諭義烏移龍泉興􅀘百廢孶孶如􅄝欲陞明善書院山長以毋耄辭先子性謹飭非大寒不襲重裘雖暑鑠金正衣冠而坐挾􅁽諷詠終日與人期在百里外風雨必赴之一日行桃山中見涕淚赴溺者先子止問之曰吾母亡未塟質先廬得錢二十千今遺之欲生奚爲先子陽謂曰爾勿憂誠吾拾之爾力挽歸家償錢如其數其人知非貞拜受感泣而去先子瀕殁謂彬曰金華宋先生最知我我死當以墓文相累彬敢銜哀以請願先生􅂌矜之言訖復泣下濂曰濂實知爾父爾父有經濟才志不􅀗施以卒􅂄舊凋落冝爾不能詳濂故掇其㮣言之繫之以銘劉氏世居栝曾祖某祖桂好施與州里嵗儉亦頼之父徳澤好施如先人母葉氏子男子三長師曾南康都昌丞次師夏郎彬次師雍孫男子一煇女子四梁松朱某湯謹其婿也一未行銘曰丹穴之鳯五色離褷不高翔扵千仞乃戢翼而威蛇命也奈何振古如茲噫宋學士文集卷第三十七翰􅁐别集卷第七
