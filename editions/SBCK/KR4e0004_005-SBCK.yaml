body:
  text: 贑州聖濟廟靈跡碑聖濟廟者􅀄興于贑漸流布于四方所在郡縣多有之神蓋姓石氏名固贑人也生于秦代既殁能發祥為神漢髙六年遣潁隂灌懿侯嬰略定江南至贑贑時屬豫章郡與南粤接壌尉陀寇􅁁嬰將兵擊之神降于絶頂峯告以克捷之期已而有功舘神于崇福里人稱為石固王廟唐大中元年里民周諒􅀍酒為魅􅀁惑墜于崖下符爽行賈長汀舟㡬覆咸有􅀁禳諒卽返其廬爽見神来謢之扵是卜貢江東之雷岡相率造新廟塐石為像奉焉相傳廟􅀄建時天地為之晦㝠録事吳君暨司户蕭君令康黄二衙官先後往視皆立化二君亦􅁇亡逮今祀為配神云自時厥後神屡顯嘉應州之東北有二洲曰藍澱曰乾渡每當長夏水易涸􅀮起若岡阜舟楫不通宋嘉祐八年趙抃報政而歸適遘焉亟徼靈扵廟水清漲者八尺清漲俗謂無雨而水自盈也元祐元年夏五月不雨徧禜山川弗應郡守孔平仲迎神至欝􅀌臺燭未見䟦甘霖如瀉四年東城災風烈火熾將延扵庫􅁃林顔正佩郡章急呼神曰盍憫我蒸民俄反風㓕火六年復災耄倪遥望雷岡而拜月明如晝忽隂雲四合大雨驟至虐􅆋頓息建炎三年􅂭祐大后孟氏駐蹕于贑金人深入至造水髣髴覩神擁隂兵甚衆乃旋紹興十九年鄱陽許中為郡欲新神之宫召大姓二十人立庭下諭之衆推張銳郭文振心計開敏宜為紏率二人謝不能許乃分一番􅁓如其人之􅁆書二為正副字雜封之令自得墨者職如書各取其一開之則得書者二人也衆以神與心通不日而宫成二十七年禁兵合山冦據城逆命子女玉帛驅輦殆盡髙宗命都統制李耕殱之隂霾挾逆風為患士卒弗􅀎前耕􅀻祈焉頃之風順天朗一鼓而滅平自是王師南征無不祠以牲牢乞隂兵為助者淳熈十六年歳當大比州人士劉文粲以夢徵于神夢三十人執髙竹而立因更名筌遂入鄊選嘉㝎十年夏大霖雨江水􅁀溢城不浸者一版民懼為魚泣禱甚哀水尋退亡害紹㝎三年黥卒朱先率其徒陳達周進蔡發以叛有􅈲除荆襄監軍陳塏提刑江西仍護諸將致討夜駐廬陵夢神告曰先將竄番禺爾宜速圖塏宻命胡巖起李强疾趨至贑合三寨兵戮之淳祐七年湖南夷僚曾甲嘯衆倡亂聲揺江右部使者鄭逢辰檄王舜進攻如有神立青霄上兇徒沮駭卒就殄㓕九年安逺崔文廣為變􅀝石壁作窟穴潼川姚希得来持憲節駐兵守之乆且弗㧞㓂見雲中若旗幟飛翻其瞻遂落渠魁乃擒景㝎三年郡有􅀺氏獄胥吏受賕搒掠良民使之承左司吳革疑焉神告以生兆卒白其􅁈元至元十七年閩卒張彦真入廟舌吐􅁆寸足懸半空自述其隂􅀻頗悉􅀋有人鞫讞之盖神之顯靈其事不翅􅁆百而扵雨􅊙疫癘之禱驗者尤夥備見扵唐宋碑碣及嘉濟實録濂唯各舉其著者書之􅀁不書者可以例知也宋寳慶間莆田傅燁為贑縣東尉􅃩神之為撰為繇辭百章俾人占之其響荅吉㐫往往如神面語之者此亦隂翊治化之一端也吴楊􅄎時以神􅀎禦菑捍患有合祭法署為昭靈王宋五封至崇惠顯慶昭烈忠佑王賜廟額曰嘉濟元三易封為護國普仁崇惠靈􅀿聖烈忠佑王復更之以今額其褒􅀭光署可謂備矣至若髙宗􅀁賜赭黄􅂁􅆞絲馬腦帶及南唐李煜五龍硯至今猶藏廟中云濂稽諸經國有㐫荒則索􅀑神而􅀕之士有疾病則行禱扵五祀先王必以神為可依故建是祠祝之制也丗之號為儒者多指􅀑神扵茫昧稍與語及之弗以為誣則斥以為惑不㡬扵悖經矣乎有若神者功在國家徳􅀍生民自漢及今孰不依之雖近代名臣若劉安丗若蘇軾兄弟若洪邁若􅉝棄疾若文天祥亦勤勤致敬而弗少怠是􅁆君子者將非儒也邪何其與丗人異也濂初被召而起神示以文物之祥後果入翰林為學士心乆竒之今故特徇祝史韋法凱之請為撰靈跡碑一通使刻焉或謂髙帝未嘗伐粤第遣陸賈賫璽綬立佗為南粤王濂按傳記􅀁載嬰之略定豫章在六年庚子佗之稱臣在十一年乙已其未臣之前惡知不来侵境而嬰擊退之邪􅂲史家以其事㣲故畧之爾敢并及之系之以詩曰神雷之岡翠㠁嵯五螭夭矯含精徽崇祠四阿儼翬飛像變翕赩五采施隂爽襲人動曽颸發祥傳自炎劉初粤氛侵徼告捷期豈或天星隕魄為降靈于人賛化機以石為氏理則宜大中卜遷墨食􅀛有聲渢渢達四垂風霆􅃅令疑􅀁司斥逐厲􅀑暘雨時禾穟穟􅀊不饑民萌鼔腹酣以嬉建炎火德值中衰宫車駐蹕贑水糜完顔黥卒大歩追神兵暗􅀣雲中旗卷甲疾赱如竄貍莫猺嘯呼引䝤夷柰軍荷祋㩀城陴屠劉壮徤到嬰児威神有赫助王師一殱兇豎無孑遺貢江水落洲如坻巨舟皆膠牢弗移鞠躬再拜叩靈墀赤日火烈雲不衣洪濤清漲沒石磯隂翊王度功何疑紫泥鸞誥自天題爵為真王手執圭風馬雲與時往来赭􅂁籠黄帶􅆞絲五龍寳現角鬛竒襲藏山中夜吐輝陽隂斡運無端倪焄蒿悽愴如見之休咎有徴神􅀁持委以惚恍邈難知奚不来索庭中碑胡越公新廟碑丈夫之遇于時也生使人懐之殁使人思之且建廟食扵其土必其徳澤入人之深堅如金石而弗渝信如四時而弗爽昭如日星而弗忒然後􅁕以厭乎人心而合乎輿論也嗚呼豈易致㢤若今之胡越公者其庶㡬無愧扵此乎自􅉝卯兵興天下人亂民遭溺焚倀倀無􅀁棲止皇帝手秉黄鉞起而救之屯兵滁陽公杖䇿謁轅門一見語合遂居前鋒以佐掦天威乙未春二月王師取和州夏六月下太平丙申春三月平金􅁜攻京口丁酉春三月又抜毗􅁜公皆列戎行或搴旗斬將或操蝥􅓡以先登前後屢建竒功乃授右翼統軍元帥使宿衛悵下夏四月又􅀙破宣城上命行樞宻院判官鄧愈戍宣公副之秋七月遂同諸將攻徽州㧞之元將楊完者聚兵十萬欲復其城公自婺源兼程以進横槊而前大呼殺入衆皆披靡而遁戊戍春三月諸將克嚴州公又偕往降溪洞兵三萬以功遷行樞宻院判官公謂蘭溪去嚴為甚邇蘭溪下則㫁婺之右臂矣冬十月乃下蘭溪十有二月王師取婺州陞公僉書行樞宻院事公益思有以自效已亥春正月攻陷諸暨州十有一月又平䖏州庚子夏五月又㧞信州信方絶糧人皆勸公還師公曰此閩楚喉衿地也可棄之乎乃築城浚隍為堅守計􅉝丑夏五月上憫公之勞且以婺為海右大藩通甌引越非宿將重臣有以控制之不可乃授公江南等䖏行中書省參知政事屯戍于婺壬寅春二月溪洞兵叛而西歸公遂遇害知公之死者莫不哀慟流涕如䘮厥父母上聞之亦震悼弗置親御翰墨作文以􅀕且命有司塐公像配享卞忠貞公廟庭甲辰冬復降㫖贈光祿大夫浙東等䖏行中書省平章政事柱國追封越國公先是公殁之明年公之部曲與境內之民悵然遐思若不􅀎勝其情乃相率即城中作新廟一區十越月而廟成堂門庭廡咸具及是寵褒之命下復羣謁扵金華宋濂部曲進曰公之􅃅令素嚴人無違禁賞非無功罰非無罪使我等攻必克戰必勝而丕胃扵寵靈之内者公之賜歟我之病也孰知而起之我之凍且餒也孰察而周之其􅀎親自衆創注藥及安扵食且衣者非公之賜歟公之徳我何以將之境內之民又進曰吾婺之民凋瘵殊甚公專心撫摩之昔也奔赱西東􅀊無寜居今也長㓜一堂愉愉雍雍非公之賜歟昔也商賈不通布穀不登今也市區充溢百貨具集非公之賜歟昔也厄扵􅁀强莫敢何問今也攘一莖茅公亦使償之如承平時非公之賜歎公之徳我亦何以將之兹者龍光下被爵登上公入神洽熈雲日潤明卉木動揺如有喜色適新廟告成􅂅為我詳紀公之功徳以垂示扵無窮是用合辭以請濂竊觀古之名將出戍􅁁域者矣苟得甲士之驩心則耕田鑿井之氓必至扵弗寜使斯民稍得以遂其生則持㦸荷戈者必不免扵愁嘆孰有􅀎兩全者㢤若公者可謂尤賢乎已公嘗自誦曰我不知書然吾行軍唯有三事而巳不殺人不虜人女婦不焚人廬舎故其軍一出逺近之人皆爭趨附之盖公䖏心以仁涖事以威惟其仁也故不言而民化惟其威也故不待戒而兵自不敢犯昔者􅀕征虜制御士心不越法度􅀁在吏民不知有軍及其死也人為立祠享之較之扵公其事固無大相逺也廟而祠之其誰曰不宜􅀄公之未薨嘗夜出人見其兩目煜煜有光若燈及其既薨敵人數擾我邉陲公降祥異或見夢扵人或覩靈火滿野洶洶聞人馬聲洎出師輒大撻似實有隂兵来助者是則公之英魂烈爽下上扵星辰之間固未甞亡也因併及之使知天之生公有非偶然者公姓胡氏諱大海字通甫泗之虹縣人詩曰聖皇啓運四方攸同升龍在天飆行雲􅀙中有一人萬夫之雄其人謂誰時維越公其一凛凜越公勁氣横騖手荷銕殳其粲若璐彼趫以馬我捷以歩陷陣如飛逢者必仆其二天兵四出靡弗在行瞠目疾視前無堅城有聲恍恍敵人震驚土疆既拓大勛以凝其三皇帝曰都爾予羽翼婺維雄藩爾鎮其域爾參政府解爾宥宻尓勞尔徠以盡乃職其四公既受命分閫建牙威讋化孚莫敢或譁汝顛汝掖汝疢汝摩化汝呻吟而爲謳歌其五視彼郊原其耕釋釋視彼闤闠其通繹繹視彼室廬其居奭奭何以致斯伊公之力其六我民無禄俾公棄捐精牛首乃師之全塔反有石而無詞不㡬扵甚闕典歟居士深䆒內典為吾徒之􅀁信向海内尊􅀫多濬發其幽光豈宜扵先師獨漠然忘情乎庸敢捲例以請濂来江表聞稱師之徳者人人不􅀎殊則師誠有道之士也文辭因無益扵道後之人􅁒求其行業則將何􅀁徴之㢤因不􅁒讓而謹書之師名懐信字孚中俗姓姜氏明之奉化人父某嘗為某縣校官母劉氏夜夢大星墮室中有光如火亟取而吞之覺即有孕及誕狀貌異凡子性凝莊不妄舉動唯見沙門至其家必躍而親之稍長受三經扵宋進士戴公表元經㫖悉暢達然非其好也年十五離家􅀙法華院僧子思執童子之役巳而祝􅄠為大僧受具戒扵五臺寺聞延慶半巖全公弘三觀十乗之㫖復與之㳺乆之且歎曰敎相緐多浩如烟海苟􅁒窮之是誠筭沙徒自困耳即棄去渡浙河而西凡遇名叢林輒往叅扣下語多枘鑿弗合不勝憤悱華藏笁西坦公遷主明之天童景徳禪寺師隨質􅀁疑笁西一見知為法噐厲色待之不與交一語師羣疑愈熾一日上堂舉興化打克賔公案問師師擬曰俊㢤師子児也師自是依止不􅃘去就維那之職笁西入㓕天寜雲外岫公来􅁇其席命師司經藏管鑰文采漸致彰露不可掩遏泰定丙寅行宣政院請師出世明之觀音師䇿勵􅀙衆視分隂若尺璧唯􅂲其失之天暦巳已遷住補怛洛迦山師不以位望之崇效它浮屠飭車輿盛徒御以誇衒扵人自持一鉢丐食吳椘間鎮南王具香華迎至府中虚心問道語中肯綮且出菩提逹摩求賛師運筆無停思辭㫖淵邃王甚嘆服宣讓王亦遣使者奉􅏧檀香􅂵伽􅀺衣請示法要師隨其性資而導之二賢王雄藩之望首加崇禮諸候庶民無不望風瞻敬施資填委姑蘇産竒石師遂購善工造多寳佛塔十三成載歸海東俾信心者禮焉駙馬都尉高麗王繹而吉尼丞相撒敦以師行上聞詔賜廣慧妙悟智寳弘教禪師之􅃅及金襴法衣一襲至正壬午升住中天竺山天暦永祚寺乙酉遷天童不半載間百廢具舉佛殿之役最鉅亦撤弊而更新之丹輝碧明照耀海濵師建塔中峯之祖庭慨然有終焉之志巳丑冬十月江表大龍翔集慶寺虗席行御史臺奉䟽迎師主之龍翔文宗潜邸及至踐祚建佛刹扵其地棟宇之麗甲天下其秉住持事者若咲􅀮訢公曇芳忠公皆名徳之士舉行百丈清規為東南之楷則居亡何毀于火忠公新之唯海㑹堂未就而化僉謂􅁇忠公之躅非師無以厭衆心往反者三師始赴之暨升座提唱宗乗萬耳􅋍聽委蛇不迫而玄機自融無小無大皆驩然親戴之或謂龍翔􅀄政稍示威嚴以懲驕慢之習師􅀏而不荅師度衆誠感孚乃出衣孟之􅀻􅀘前未建之堂不日而集㑹元政大亂戎馬紛紜寺事日見艱窘師䖏之􅁉如一不以屑意一旦晨興索蘭湯沐浴更衣跌坐謂左右曰吾將歸矣汝等當以荷法自期勵精進行可也言畢而瞑侍者撼且呼曰和上去則去矣寕不㽞片言以示人乎師復瞋目叱之侍者呼不巳師握筆書曰平生爲人戾契七十八年漏􅂥今朝撒手便行萬里晴空片雪書畢復􅊕時丁酉秋八月二十四日也壽七十八臘六十九停龕七日顔面如生作禮者旁午而名薌蠟炬積如丘􅁜九月一日茶毘扵聚寳山前舎利如菽如麻五色粲爛雖烟􅀁及䖏亦纍纍然生貯以寳瓶光發瓶外其上􅁕弟子某以某月日坎牛首山東麓爲宫蔵之復建塔扵其上師賦性恬冲喜氣溢顔問生平未嘗以聲色忤人人有犯之者領首而巳然進脩極勤自壯至耄黙誦法華經一部雖暑爍金寒折膠無一日闕者屢感蓮花香滿院芬郁異常非丗間者可比當大明兵下金􅁜僧徒俱風雨散去師獨結跏宴坐目不四顧執兵者滿前無不擲仗而拜上嘗親􅄑寺中聽師􅀃法嘉師言行純慤持爲改龍翔爲大天界寺寺之逋粮在民間者遣官為徴之師之將告終前一日上統兵駐江隂沙州上當晝而􅆍夢師服􅄄色禪􅂁来見上問曰師胡為乎来也對曰將西歸故告别耳上還聞師遷化衣與夢中正同大恱詔出內府泉幣助其喪事且命堪輿家賀齊􅅩為卜金藏舉龕之夕上親致奠送出都門之外其寵榮之加近代無與同者帥有五㑹語録行于丗其傳法上首則􅀟林致凱江心慧恩大慈寳㝎某刹寳璋瑞岩文淵保福宗秩翠山志理凈土永顯妙智淨琚㝎光文摭某刹明晟天華士謙豐安至慶聖泉普彛福林道巽五峯普錫石門永泰霞嶼元良廣祜永瓌皆其人也惟昔天童坦公以一真之學士承松源四葉之傳黒白趨慕儼如毛之有麟甲之有􅀛也師亦以真承之故􅀎樹精進幡持金剛劍入般若􅊴巋然為一代人天之師此無他真則不妄不妄則近佛之道矣宜乎遭逢維新之朝上簡帝心昭􅀍殊渥至親枉乗輿而臨􅄑之龍光赫奕絢耀吐吞至今山川尚有餘輝是當掲之崇碑明示方来使學佛者有所歆􅃩而􅁸信焉系之以銘曰乾笁之道貴乎一真真則非妄日趨精明煌煌松源其道孔熾正暢旁達非真曷􅆀惟廣慧師起扵海東歴抵諸師罕契其逢太白諸峯上摩穹碧舉頭觸之堅如銕壁一喝轟霆豈直耳聾毫髮之端妙義俱融天髙日晶森羅萬象不即不离了明諸相五坐道塲大振其宗一音演法聞者心空此妙法華權賔雙舉我受我持忘其寒暑天香何来鼻觀先聞豈伊天女吐兹竒芬誰謂靈通與道乖牾我尚不有亦何心故丗縁巳竭幡然西歸夢􅄰潜通皇情為怡烈火如輪煆兹玄魄設利粲然逐烟而結在昔諸師何人不然誕勝真漓多随物遷師我藩維師我干櫓舍我而逝有生孰度寵恩聮翩来自九天師則何憾名與道傳太史造銘建于牛首此山若移斯文方朽浙東行省右丞李公武功記惟我皇帝既定浙東西地以其疆塲與虜人犬牙相入仍置浙東行省以轄五府一州之衆建牙扵嚴于時右丞李公實以上之懿親總受䉒宣之􅀉而兼命參知政事胡公徳濟分治諸暨􅀁以聮絡氣勢綏輯東土而折衝外侮者也乃乙已之春二月巳丑虜挾我叛人謝再興分兩道入寇其舟師自釣臺烏石窺我建徳公遣兵禦之其馬歩卒踰濤江而東圍諸暨之新城聲言二十萬壁壘旁午旌旗充塞虜堅􅃘持重務以為必㧞之計搆飾寢宇創建倉庫預定州長貳官屬復分精卒􅁆萬屯城北十里以遏我援師胡公堅壁力守戒將士勿輕與戰有来攻城者發矢石退之遂遣使乞師于公公即􅁒馳援初釣臺之役稍不利亡一千夫長至是羣情疑泪或献謀扵公曰嚴實吾藩垣􅀁􅀉虜若闞公往即起乗之柰何諸暨雖受圍得一銳將帥師解焉可也公曰浙水東門戸在諸暨諸暨苟不守郡縣必致繹騷故虜盛兵東向而使㳺兵泝釣臺以綴我師我不往脫有弗靖嚴其􅀎獨利乎乃屬大帥三人為居守明日癸丑遂行有自虜中来者又以衆寡不敵為辤公弗顧甲寅至浦江丁已抵烏傷之龍潭去虜營不二十里因據其險忽有白氣自東北經天三軍見之勇氣百倍日且晡軍中驚言虜將襲我公亦不為動夜四鼓城中知有援至潜縋士卒来約明旦將空壁逆戰戊午蓐食已公分諸將為左右翼公自將其中軍旣成列㑹參軍胡君深復承公檄率􅀁部將士亦自括而至軍氣益振公乃申􅃅令曰師之勝􅀒在曲直不在寡多我國何􅀒扵叛人虜乃挾之日夜以生變癸卯之秋九月壬午直犯我東陽吾不敢愛其生晝夜兼行殄之扵烏傷爾三軍之􅀁親覩皇天助順不可誣也今虜又不改行盡驅其衆以擾我􅁁疆占書云軍中見白氣者剋敵之像此殆天􅁒㓕此虜也爾等尚效死斬刺以報國家之寵靈母怯毋貪􅀗母避險阻毋左右顧視有不如約者即戮以徇語始畢虜兵整圓陣而至兵既接公乗匹馬挺身先入陷其中軍中軍虜之精銳􅀁萃見公至競来追之槍屢及公􅂰公馬上運㦸捷如雨風當其鋒者應手皆仆虜氣皆讋左右翼及諸軍一齊奮擊聲振天地軍遂大亂時溪洞兵居後列猶觀望欲集兩山之民呼曰虜敗矣虜敗矣遂皆棄甲而奔我軍乗勝逐北斬首如刹麻前後躪踐死者以萬餘計溪水爲之不流胡公亦率精甲出圍城中􅀙公合擊之殺􅀗甚重其主帥僅以身免燔其營寨若干俘其將帥六百軍士三千馬八百輜重鎧仗積如丘山三月已未凱歌而旋􅀁至父老爭進牛酒爲公壽公勞而却之􅉝酉還嚴既飲至即命莫府上其功簿于朝上嘉公敵愾之功錫以御衣名馬其餘將士第功行賞有差濂聞之軍䜟之論良將有曰以身先人故其兵爲天下雄􅀃者引薛仁貴爲將持㦸腰刀奮呼入敵衆輙爲之奔潰此􅀁以爲天下之雄也濂以公之事觀之殆似有過焉者盖仁貴挻身陷陣其驍悍若與公同然必兩軍相當方可制勝未聞其以寡却衆如公之爲也今虜兵大集塞野蔽川人孰不爲公危公以不滿萬之衆談咲而殱之斯不亦昔人之􅀁尤難㢤由公精忠貫扵內勁氣注扵外但知有國而不知有其身瞋目張膽視虜若無故其功業焜耀至扵如此也公之賢爲不可及矣濂昔待罪右史嘗書公之勞烈藏之金匱今又因􅀖人士之請爲文若詩以昭公之光庶使丗之讀者上母忘扵帝徳下無􅀒扵公之功云公名文忠字丗英敬賢下士如弗及平居恂恂禮遜及臨大敵雖賁育之勇不是過君子服焉糸之以詩曰扵赫皇王大明東升爍彼羣隂六合載清建藩分鎮以奠以寜倬彼李公實涖東浙虎符煌煌侑以龍節導宣皇靈德柔威刷吳虜逞虐登我叛臣屢啓兵釁来毒烝民亦既搗之化為埃塵龍集鶉首在如之月怙惡弗悛竟犬之突合圍諸暨不通一􅄠公聞之怒氣衝斗間咄㢤狂虜天紀之干翹其若鷇闘此勁翰迺飭將佐整厥堅胄􅂖厥琱戈礪厥金鏃我􅁒即發尔罔或沒禡纛干門載之以行叶卒旅言言旄幟翻翻蛟螭騰淵熊羆出山直簿龍潭伺敵而戰有氣經天其白如練吉徴開先何兵不剪左右列屯兩翼飛騫公將虎旅宅其中堅氣通脉聮勢如率然復戒多士虜衆我寡大刀長揮母􅀗士馬要使青原盡變為赭虜馳而至公躍而前單㦸奮先星流飊旋閃閃莫㝎觸之必顛虜實驚疑斯何為者莫匪神兵自天而下震懾相駭弓不􅀎弝三軍縦擊其亂如雲混混沌沌紛紛紜耘或㫁其膂或斮其齦蠢彼有苗猶尔偵視山氓齊呼倒戈而避我師疾逐其勢􅀹熾如雷斯掀如風斯奔如火斯燉融乾爥坤一鼓而殱凛焉雄吞譬猶鴐鵝衆若雲翳􅀌隼横擊無有不斃將唯在勍豈多爲貴人亦有言天監匪􅀻我直彼曲孰不周知以順討逆云胡不夷昔兵始交毒霧蒙絡今敵既平上下清廓神道助順理甚昭灼奏凱而旋既歌且謡歌聲委蛇間以短簫祥颸献娛嘉卉動揺􅂄耋驩迎列拜馬首非公之臨㡬陷虎口敢以牛酒以爲公夀三軍戾止燕響有容公拜稽首䟽于章封非臣之力諸將之功皇情恱豫徴公入覲珠衣龍馬錫之不吝第賞其餘匪琛伊賮自古在昔六龍御天必有良弼參佐化權遂開丕基萬世其延惟皇神聖控御區宇百僚師師選有文武親賢如公綏我東土綏我東土我民用熈無敵不靡無徕不懐成此武功實耀簡書簡書􅀁紀以勸在位賛咏鋪張遵古之義史臣作歌蹈􅀭奮厲明覺寺碑四明有伽藍曰明覺者其地在太白山隂唐天復初沙門居納始縛庵廬脩習禪觀至宋某年比丘某斥而大之殿堂門廡一如它浮屠之制郡守張某爲請于朝而􅂌以今額元泰㝎間寺僧厄扵科繇之煩悉以土田質扵民間寺事日廢至戊戍僧子􅄾籍其歩畆圍落之􅁆往告阿育王山象先輿公曰􅄾不敏不􅁕敬承先訓使塔廟一一委諸草莾人其謂我何然而非神力不可以擲象非㝎見不􅀎以移山古莫不然今豈弗􅀋惟公儉以持巳誠以格人格人易以集事持巳率以動物合是二者何廢之不興何壤之不補今敢以圖籍進公其受之言畢胡跪作禮而退當是時敗屋數楹頽然荒菅叢􅁄中饑鼪窮鼯後先嘯呼白草凉烟舉目凄㫁象先初頗難之已而曰人患志弗堅耳苟堅矣事豈有不可爲者邪扵是悉發其儲畜市材僦工剔彼薉荒土復燥剛位仍面陽自戊戍至于丙午不十年間咸如舊貫土田質扵民者既贖歸之而新置之􅁆又倍扵昔仍令寺僧甲乙丗主之噫何其􅀎也丗之營建塔廟者未必無其人茍不售竒衒巧以病夫民則藉豪氓大賈出力而任之􅀁以事不難成而功緒易見也今象先不資衆因不動聲氣成此勝域偉特莊嚴四軰之上如登􅂄闍崛山親覩如来五色相光非其力之弘見之凝不􅁕以與扵斯也此無他由􅀎信其􅀁有故􅀎成其􅀁無是則信者入佛之門建善之本也勒諸貞石以告後之人尚知以信為朂相與嗣葺之俾勿壊象先台之臨海人俗姓王氏得度扵雪窓光禪師深通內學其来請文者則用晦熈上人也系之以偈曰如来設教亦多種建立塔廟乃其一塔廟皆屬扵有為扵真實際無相渉不知何以濟羣迷􅂄闍崛山及諸䖏重閣講堂無不具儼然如来在會時衆生貪著扵五欲紛紜膠葛不暫停有如飛鳥投網中其心在在難比喻我佛重以慈憫故建兹粧嚴妙勝域􅀁以奪妄􅁒趍真大白山隂降支隴山川欝蟠護靈氣有一尊者飛錫至結茅敷坐縳禪􅄫後来􅁇者翕然聚化為寳坊矗天起金碧晃輝暎林谷鍾魚互荅朝夕間何期鞠為狐兎區逺近睨者增太息阿育王山善知識殷勤赴我桑門請彈指頓開樓閣門無有一物不現前我聞成壊丗間相畢竟中有不壊者曠大劫来至扵今無生無㓕無增减此為毗盧法性門佛與衆生同此入光明照徹大千界不分內外及中邉我因造記說伽陀以言語觀即非是無盡燈禪師行業碑銘天臺有上雲峯在州城西南十餘里重厓疊巘如雲旓翠㽔盪摩扵空濛而靈巖龍湫吐納光景􅀹號勝絶是宜有道者之􅀁棲息五季時東甌大士永安来居之䟽釋經論多至百餘卷皈依者日衆遂闢地為鉅刹錢忠懿王賜額曰證道三百年間洊罹焚毁唯存㫁礎扵斜照荒烟中無盡禪師傷之病者古徳云阿爺阿爺禪師既舉此語良乆又曰如此喚做病得否衆皆無言禪師祝曰色身無常早求證悟時至吾將去矣侍者執􅁓乞偈禪師曰終不無偈便未可死邪侍者請之益堅乃書曰生㓕與去来本是如来藏桚例五湏彌廓然無背向投筆端坐而逝時是月九日也壽七十八臘五十七火化異香襲人􅀁􅀗舎利不可勝計其弟子智宗善守道成及今住持普饒以某月日建塔于峯之左原大河衛鎮撫林君性宗嘗􅀙禪師㳺師勉以忠孝迄􅀎為國宣勞為時顯人􅂲禪師之行不白于叢林以隆恩大師道原􅀁為狀来徴文謹按狀禪師諱祖鐙無盡其字也族王氏四明人父好讌嘗寫華嚴經五色設利見于筆端禪師年方㓜嘆曰般若之驗一至扵斯邪年十四即求出家依郡之天寜僧良偉尋事其寺住持東白明公既得度復受具戒扵開元奎律師已而日溪泳公来代明公􅀃法命掌綱維司藏鑰日溪升堂禪師出問曰生死事大無常迅速乞賜指示日溪曰十二時中宻宻參䆒忽然觸着却来再問禪師抗聲曰無常迅速生死事大語未終日溪便喝禪師􅃍禮拜日溪曰見何道理便尓作禮禪師曰開口即錯日溪頷之禪師服勤􅁆載復出參名徳以驗其􅀁證時中峯本公在天目方山珤公居淨慈無見覩公住華頂斗岩芳公主景星禪師皆與之辨詰其􅀁印盖不異見日溪云禪師得道已思韜晦而護持之及遇上雲峯勝地卓錫其中遂至終身焉嗚呼若禪師者可詞􅀎守道而弗遷者矣古之僧伽多􅀉迹岩穴友烟霞而侶泉石至有蹞歩不與塵俗接者治内之功純務外之意絶也風教日偷學者始不知自立榮名利飬之念日交蝕扵心胷奔競干請無􅀁不至􅁕以来有識者之訕侮可勝嘆㢤禪師一鉢自將䇿厲學徒扵􅄫寞之濵雖施者填委振起頽廢重樓傑閣彈􅃌現前亦未嘗見其有為震黄鍾扵瓦釡雷鳴之際翔靈鳯扵衆禽紛飛之時謂為禪師矯弊之功非邪評隲成章繫之以銘庶㡬􅀎箴末法之膏育也歟銘曰台有聞僧糿輙弗群􅀎感雜華思樂正因棄白趨緇鞠明䆒曛務治心垢甚救首焚頓忘色聲夐絶見聞􅊗抵諸師如提􅀌軍背水設陣瀕亡獲存有矗者山是曰上雲髙摩翠旻低壓􅂵氛昔之開士来䟽笁墳我追􅁤轍志符􅀮淪起廢為功䇿怠以勤寳殿髙騫華官糊紋丹雘絢麗觚稜紛紜此本無作彼應自臻一榻危坐八窓凝塵影不出庭錫常挂軒迹䖏恬曠俗慙競奔逢時而逝若臂之伸凡濟覺海實探心源外動茍息內静方敦非有獨行曷炤羣昏左原演迤白塔嶙峋凡入道者来視刻文佛日普照慧辨禪師塔銘皇帝端居穆清念四海兵爭將卒民庶多殁扵非命精爽無依非佛丗尊不􅁕以度之惟漢武元年秋九月詔江南大浮屠十餘人扵蔣山禪寺作大法㑹時椘石禪師實與其列師升座􅀃法以􅋍人天龍鬼之聽竣事近臣入奏上大恱二年春三月復用元年故事召師􅀃法如初錫燕文樓下親承顧問暨還出內府白金以賜三年之秋上以􅀑神情狀幽微難測意遺經當有明文妙柬僧中通三藏之􅀃者問焉師以夢堂噩公行中仁公等􅀿召而至舘于大天界寺上命儀曹勞之既而援㩀經論成書將入朝敷奏師忽示微疾越四日趣左右具浴更衣索筆書偈曰真性圓明本無生㓕木馬夜鳴西方日出書畢謂夢堂曰師兄我將去矣夢堂曰子去何之師曰西方爾夢堂曰西方有佛東方無佛耶師厲聲一喝泊然而化時七月二十六日也天界住持西白金公法門猶子也為治後事無不盡禮時制火塟有禁禮部以聞上特命􅀙其敎茶毘之餘齒牙舌根􅁆珠咸不壊設利羅粘綴遺骨纍纍然如珠其弟子文晟奉骨及諸不壊者歸于海鹽卜以八月二十八日建塔扵天寜永祚禪寺塟焉嗣法上首景瓛復偕文晟以仁公􅀁造行狀来徴銘仁公􅀶通內外典文辭簡奥有西漢風其言當可信弗誣謹按狀師諱􅆊􅄾椘石其字也小字曇耀明州象山人姓朱氏父杲毋張氏張夢日堕懐而生師方在襁褓中有神僧摩其頂曰此佛曰也他時􅀎照燭昏衢乎人因名之為曇曜云年七歲靈性潁發讀書即了大義或問􅀁􅄝何言即應聲曰君子喻扵義至扵属句倣書皆度越餘子逺近􅃅為竒童九歳棄俗入永祚受經扵訥翁謨師尋依晋翁詢師扵湖之崇恩詢師師之􅀙族祖也趙魏公見師噐之為鬻僧牒得薙染為沙門繼往杭之昭慶受具􅁕戒年已十有六矣詢師遷住道􅂣師為侍者居亡何命司藏室閱首楞嚴經至縁見因明暗成無見䖏恍然有省歴覽羣書不假師授文句自通然膠扵名相未􅀎釋去􅆞􅅞聞元􅅱端公倡道䨇徑師往問云言發非聲色前不物其意何如元叟就以師語詰之師方擬議欲荅師叱之使出自是群疑塞胷如填鉅石會元英宗詔粉黄金為泥書大藏經有司以師喜書選上燕都一夕聞西城樓鼓動汗如雨下拊几􅀏曰徑山鼻孔今日入吾手矣因成一偈有拾得紅爐一􅀧雪却是黄河六月氷之句翩然南旋再入􅀟徑元叟見師氣貌充然謂曰西来宻意喜子得之矣􅃍䖏以第一第二座且言妙喜大法盡在扵師有来叅叩者多今師辨决之元泰㝎中行宣政院稔師之名命出丗海鹽之福臻遂升主永祚永師受經之地為創大寳閣範銅鑄賢劫千佛而毗盧遮那及文殊師利普賢千手眼􅀚音諸像並寘其中復造塔婆七級崇二百四十餘尺功垂就勢偏將壓師禱之夜乃大雨風居氓聞􅀑神相語曰天寜塔偏亟往救之遲明塔正如初遷杭之報國轉嘉興之本覺更搆萬佛閣九楹間宏偉壯麗儼如天宫下移人世帝師嘉其行業賜以佛日普照慧辨禪師之􅃅佛日頗符昔日神僧之言識者異焉㑹報恩光孝虗席僉謂報恩一郡巨刹非師莫􅀎居之師勉徇衆請而往尋退􅀮永祚築西齋爲終焉之計至正癸卯州大夫强師主其寺事時塔燬于兵師重成之景瓛爲鑄寳壷冠于顛感天花異香之祥師舉景瓛爲代復歸老干西齋云師爲人形軀短小而神觀精朗舉明正法滂沛演迤有不知其􅀁窮凡􅀁涖之䖏黒白嚮慕如水歸壑一彈指間湧殿飛樓上挿雲際未嘗見師有非君子謂師縦横自如􅀿物無迹山川出雲雷蟠電掣神功􅀵歛􅄫莫無聲由是內而燕齊秦椘外而日本高句麗咨决心要奔赱座下得師片言裝潢襲藏不翅拱璧師可謂無愧妙喜諸孫者矣師世夀七十五僧臘六十三得法者曰祖光曰景瓛受度者曰明誠曰正㝎等其􅀃法機用則見扵六㑹語其逰戯翰墨則見扵和天台三聖及永明夀陶潜林逋諸作别有淨土詩慈氏上生偈北㳺鳳山西齋三集通合若干卷並􅀓干世予慕師之道甚乆近􅀗執手護龍河上相與談玄因出賸語一編求正師覽巳歎曰不意儒者􅀁造直至扵此善自護持師之善誘推此一端亦可槩見及聞師殁與國史危公哀悼不自勝危公亦深知師者也銘曰大鑒宻㫖餘十傳妙喜起蹴龍象筵有如大將據中堅銕卒十萬佩􅐤鞬或觸之者命􅄠懸誰歟五世稱象賢佛日暁出瀛海􅕨紅􅆋閃閃行中邊流光􅀁至無幽玄憶初飛錫来北燕􅊮樓畫鼓金星纒一擊三際皆廓然火中新敷清浄蓮紺色􅆂空絶蔓牽自兹口噴百丈泉洗滌五濁离腥羶內而諸夏外朝鮮紛紛来者人駕肩示以實相非空言塔廟赫赩名山川一佛䏻變萬與千㑹萬歸一道則全不識誣為有漏縁帝􅃙中使来傳宣鍾山􅀃法超沉緜萬人瞻依曲刃拳一朝入滅同蛻蟬西方彈􅃌即現前白玉樓閣琉璃田金鈴寳樹演真詮師之往矣神弗遷􅄫光常㝎無偏圓我作銘詩翠琰鐫昭朗盛烈垂年年天笁靈山敎寺慈光圓照法師若公塔銘天台一宗自法智尊者之後分為廣智神照南屏三家三家之中而南屏為最盛再傳至扵車溪其聲問益顯震雷霆音為有情􅀃執經問難者動􅁆百人遂為吳越􅀁宗又六傳至扵湛堂貫遮性􅀟單制聽止作之學而以止觀為歸宿之域學子翕然嚮之其入室弟子為世法憧星分棊布扵江南若吾慈光圎照法師則尤號金舂而玉應者也法師諱􅁢若字季蘅族相里氏越人也代為簮纓家在唐有名造者嘗為禮部郎中時內侍監魚朝恩怙貴誕肆宰相元載亦歛容避去造與殿中侍御史李衎抗言折之世稱直臣委祉垂休至諱慶君以柔行稱慶實生法師年九歲䏻通春秋其父方以亢宗為期忽翛然有絶塵之趣嘗逰雲門􅀓忠廣孝寺寺之元上人㽞之俾給侍左右十五受具戒為大僧渡濤江而西至虎林謁大山恢師扵興福恢師授以天台四敎儀金箆十不二門指要鈔諸書法師即􅀎知其大意巳而聞佛海大師澄公主南天笁崇恩演福敎寺四方名僧多来棲止而方岩則師愛山靜師􅀹龍象中之稱雄者法師復往依焉凡法智結顯立隂觀妄别理隨縁䆒竟蛣蜣理毒性惡等文益推斥其義而沉􅆂之至扵恩清之兼業昭圓之異􅀃齊潤之黨邪仁岳之背正亦皆察其非是及􅀁以害道之故心既有得乃質之二師而復取正扵澄公聲入心通知觧日至澄公甚噐之俾司賔客之職澄公即􅀁謂湛堂者也至治􅀄澄公奉詔入燕都校正經律論三藏遂白其行業扵帝師大寳法王帝師嘉之錫以今􅃅命出世昌源淨聖院丁歲大侵法師力為經度田之莱蕪者闢之室之敝漏者葺之踰三年澄公念法師不置招之徕歸請居第一座攝衆千餘人法師持䂓峻整升堂入室具有儀範經其指示多􅀁悟入泰㝎中行宣政院請主彌陀興化敎寺當是時倡道杭之南北兩山者若天岸濟若我庵無若玉庭罕與法師皆有重望人稱為佛海㑹中四天王居亡何退居雲門視榮名利飬如白衣蒼狗變遷一不以經意翶翔千岩萬壑中時同㫁江恩師休耕逸師臨風􅀏咏不知夕陽之在樹也君子又目之為雲門三髙云然法師身載明徳聲光外流終不可掩至正間起主越之圓通寺丞相康里公復具䟽延主天笁靈山敎寺靈山錢唐巨刹有瓔珞泉其源絶巳乆法師持錫叩岩祝曰吾縁茍在是泉當為吾一来不然則廢涸猶故也言始脫口泉果涌出淵淵然漸盈戸部尚書貢君師泰比之慈雲重榮檜命名曰再来泉法師四坐道塲敎雨灌溉如甘露醍醐飲者心泰尋以年髙復退居雲門築􅀷居精舎以法華觀慧三昧為暮年净行會天下大亂干戈紛擾法師與之遇脅以白刃毅然不為屈辭色俱厲因遇害白乳溢出扵地實十九年二月二十九日也世壽八十僧臘六十有五兵既退其諸孫子蘭息㓜始具衣棺為歛闍維之夕􅀗舎利如菽者無筭遂以某年月日奉遺骨􅄟扵雲門山之麓法師風度簡逺不妄言􅀏趙魏公孟頫呼之為僧中御史善詩若文雄徤有法黄文獻公溍為序其首謂其逰戯如幻變化不測理事混融不相㽞礙一時名公卿如鄧文肅公文原􅀽文清公桷虞文靖公集韓荘節公性皆慕法師與為方外交而忠介公泰不花歆􅃩為􅀹切凾書問道殆無虗日得法弟子出住名伽藍者則集慶之衣奎演福之良謹延慶之如瑩隆徳之去讓淨聖之圓證也其進脩弗輟而未出世者則善来普慈曇􅍼維翰玄微無作及前子蘭息幻也法師􅀄􅃅浮休老人雲門之傍有溪曰若耶歴代詞人屢形賦咏世以法師名髙宜配地望故復稱之為若耶溪法師示㓕之後巳經十齡友奎持天衣禪師元静􅀁為狀請濂為之銘濂事文獻公時毎聞􅀭法師之善固巳竊識之矣及與友奎接行業純而問學弘又知其為有道之士銘其可辤或者以師素􅂂之羙而不􅀗考終命頗致疑焉殊不知㝎業􅀁感千劫弗遷雖以西域聖師深入神通三昧或為鴆毒􅀁加或罹刀劍之厄卒未􅀎免􅀄無傷乎道徳之崇髙也何獨扵師而惑之乎嗚呼台衡之宗不絶如綫嘘四明之遺􅆋􅅡外敎之邪城世當有其人惜乎吾未得而見之有如法師者亦九京不可作矣感今思古寜不衋然傷情乎故備序之掲扵玄塔之左以厲其學者必有兢兢自省者矣銘曰止觀學廢將焉徴􅀆法􅂳載寳歸東瀛􅀆淨光傳之寳雲承􅀆誰其中興曰四明􅀆車溪深􅆂萬丈清􅀆下注佛海流無聲􅀆若耶中藏毒尾鯨􅀆鼓鬛奮迅樹赤旌􅀆發為音聲震百霆􅀆龍􅀑怖愕人天聽􅀆靈鷲巖巖摩帝青􅀆紺泉旋珠若纓􅀆膏脉乆絶茂荒荆􅀆飛錫一指来盈盈􅀆莫峻匪山五雲凝􅀆絳霧為室霞作扄􅀆􅁒入觀慧權實并􅀆業何􅀁因生何憑􅀆翛然而化假以兵􅀆如劍斫風本無形􅀆白液流􅄴昭厥靈􅀆舎利叢布光晶熒􅀆盛以五色玻瓈瓶􅀆道無􅀁損名益貞􅀆㳺風鼓扇塵㝠㝠􅀆我思哲人涕泗零􅀆請勒琬琰示吾銘􅀆佛光普照大師塔銘佛光普照大師示􅄫扵天童景徳禪寺時元明良公方主寺事為師四衆持服如䘮住持禮越七日用旛幢香華導引靈龕扵太白山之陽除地為墠行西方茶毗之法火方舉忽有物飄洒晴空中似雪非雪如雨非雨視之非無摶之非有霏微􅌭紛离地即􅀮盤旋烈熖之上至火㓕乃巳盖天華云師自㓜齡常中夜跏跌習為禪觀毋惡之推其使仆輙達旦不􅉂年十六依􅀓法寺僧希顔于杭既鬀落受大戒扵昭慶惠律師巳而希顔使司米鹽細務師嘆曰离家為求道耳苟覊絏扵此何異狗苟蠅營者邪乃潜行大江之西見南澗泉公扵雲居泉公命入堂師􅁇遷掌藏鑰師晝夜繫念無湏􅁷間㫁一夕松月下照􅁸歩簷􅂩間巖泉冷冷然微有覺觸􅃍往白之泉公泉公謂曰此間尋常設施不􅁕發子大機大用古林茂禪師乃横川嫡嗣見道最真今住饒之永福子當往依之師即擔簦啓行既至古林問曰尓来欲何為師曰正為死生事大特来求出离尓古林曰予明知四大五藴是死生本根何縁入此革囊耶師擬議欲荅古林以錫杖擊之師豁然有􅀁悟入自是機辨峻絶縱横自如古林噐其為人命居苐一座未㡬古林遷建康之保寜挾師與俱仍命居前職踰一年回浙中會月江印公蒞湖之道塲法席之盛震于東南請師分座􅀃法大衆莫不恱懌至正壬午行宣政院命長明之瑞雲山清凉寺學徒奔湊機鋒相加如兎走鶻落瞬目輙失有沙門至問對未竟以手拍地而􅀏師曰滯貨何煩拈出邪沙門嘘一聲師厲聲喝之沙門有省而去其應機接物皆刋落支流直造根源故􅀁證者如目覩􅀁藏物而手探取之識者謂得古林正印師住清涼一十五年始退􅀮東堂影不出山凝塵滿席晏如也良公法中之猶子迎歸天童之此軒俾首衆舉􅀭法要未㡬謝事一旦示微疾左右具觚翰請書偈師舉手指心曰我此中廓然也何偈之為明日請兩序諸比丘與之言别即端坐憑几握右手為拳以額枕之而逝實甲辰八月二十七日也經七昏旦容貌明潤捫其頂猶温夀八十五臘七十初師就火塟􅀗舎利如珠璣者頗衆以某年月日建塔扵瑞雲山之西岡藏焉師諱茂字實菴别􅃅松隠族鄭氏丗為奉化儒家父季母胡氏􅀁度弟子曰某曰某師為人篤實無偽扵道有聞一時諸大老若平石砥公古鼎銘公了菴欲公皆推師為甚重銘公至謂師抱􅀒扵古先一􅁤導諸未悟咸廓本真達摩之道頼以不墜則師之道􅀙可識矣今其可見者有語録一編行于世良公􅂲師懿行日就泯泯乃具為事狀其法嗣清守遂持来京師請濂為之銘濂聞方䇿􅀁載靈僧示㓕多有天花之祥或者遂謂大乗境界去来無跡奚以神異為事殊不知末習澆漓人懐厭怠苟無以聳動瞻視何以表真悟而啓正信㢤示現微權固與諸法實相同一揆也有如師者其事盖吾讓扵古銘以昭之庻㡬無愧辭矣銘曰我聞如来演􅀃般若天雨寳花􅌭紛而下巖巖普照諸佛之子依佛倣佛乃亦有此豈非天龍及護法者􅁒警有情使之四洒應感之機非由外鑠風動􅄜嗚實自中作􅂚以明之法因心悟表彼空華以無著故何有四大何有五藴一空之餘諸法銷霣如大寳鏡罔不含攝隨物賦形了無餘跡宴坐雲峯學徒川赴孰不清涼如飲甘露末法瀾奔師其底柱胡為西歸空存遺􅂂有􅌥堵波中藏設利佛光煒然羣昏咸頼宋學士文集卷第五鑾坡集卷第五
