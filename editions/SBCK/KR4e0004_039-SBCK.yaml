body:
  text: 送許從善學道還閩南序閩南許從善自少好長生之術嘗建一庵以欵真逰之士覬得一逢而受其說巳而聞龍虎山止庵鄧錬師得九還神丹之傳逺邇之人皆知尊禮時錬師侍祠南京從善不逺数千里而叄叩焉三年之間至者凡􅄪錬師具以谷神不死之道開之以祕蔵約之以黄寜從善欣然如􅀗拱璧於其還也錬師為索文贈之而同虗傅外史􅀑谷方壼真人又咸為之請不知從善何以得此於方外髙士㢤然予嘗覽劉向列仙傳見其所載竒名詭姓與夫驚世駭俗之事甚悉而存錬觧化之術畧不一言之豈寳祕隂陽之機而不露耶抑亦得其人而後度耶雖然老荘文列四家之書亦徃徃及之矣要不出􅆀虗極守静䔍二句之外盖虗則洞然􅆂乎太一静則凝然萃乎太和虗非極無以􅀵純玄之効静非䔍無以臻純黙之功馴而􅃱之與道盖不逺矣自時厥後靈均發爲一氣孔神於中夜存之言魏伯陽著爲參同契復陽祕而隂洩之皆不敢畔其說也嗚呼斯非學仙者之凖䋲也耶宋金以來􅀃者滋熾南北分爲二宗南則天台張用成其學先命而後性北則咸陽王中孚其學先性而後命命爲氣之根性爲理之根䨇體䨇用䨇脩䨇證柰何岐而二之第所入之門或殊故學之者不能不異然其致守之法又不過一之與和而已吾知從善亦必䆒其􅀃乎夫一者萬之對也萬則紛紜而不定惟一能貫之和者戾之反也戾則參差而不齊惟和能全之長生乆視之道其不本於此者乎所謂安䁀者非玄􅀜一竅也安乎此者也採藥者非龍乕鉛永也采乎此者也用火者非進退抽􅄈也用乎此者也固不可有意而求亦不可􅁳然而忘去也頗聞閩南有武夷山其髙萬丈薄太清而凌飛霞多有􅀮君子棲遯巖穴間從善試以予言質之必大駭曰是儒何人其論九還神丹之道何其與吾黨異乎又當辨其離合以告從善也從善名囬號為還檏為人沉篤近道所以方外髙士極愛噐之鄒氏復姓孫氏序洪武九年六月日皇上御東皇閣翰林學士臣濂考功監令臣克勤給事中臣傑監察御史臣鈍等皆侍時已漏上三刻臣傑岀班跽奏曰臣之大父孫福謙陜人也出守嘉興郡當元季兵亂江南州郡繹騷大父逃匿無所至正已亥航海趨山東至登州􅄓風大作濤湧如雪山巨舟􅃍成虀粉一家五十人咸死于海獨臣附餘板薄沙島幸存犬馬之命蒼黄無所歸長號於野州人鄒義者聞而憐之俾傭作其家臣年已十四矣乆之飬為子且為授室遂冐其姓曰鄒氏嵗行􅀅一周大明受命四海肅清下詔興舉學官増設弟子員義家以臣肄業萊州府已而選入成均又選入武英堂俾練習政事今年夏四月復擢給事中由是日瞻天顔􅀗􅀍􅃂榮如此之至皆非小臣所敢覬望聖恩如天固未知㳙埃之報復竊私念孫氏無他族属其不絶者僅􅀉臣之一身苟冐其姓遅囬而弗之改臣之先臣幾何不為􅀂敖氏之餒􅀑㢤臣敢昧死以請上曰朕為億兆生民主凢有襲人姓氏者必令歸其宗爾之請誠是也然非鄒氏爾亦弗克底于今日慎母忘之傑於是以首叩地而退既退詣濂請書其事以示後世濂奉詔參考歴代郊禘大禮乆不能成文傑㝷擢監察御史復來申前言濂以未暇為荅居亡何傑又陞僉廣東按察司事􅃍來迫曰傑有数千里行必得先生文乃可耳幸勿辭我濂乃與之言曰孫本􅁎姓出於周之後至衛武公之子惠孫因以孫為氏鄒則子姓其裔則祖於宋自正考父食邑於鄒因氏焉二者何可亂也傑能復之亦可謂不忘其本者㦲然有一說為傑告焉昔者范文正公蚤孤随母適長山朱氏朱氏亦鞠育為子公遂力學擢上第封厥父母而後請命于朝復姓為范氏公之酬朱氏可謂厚矣傑之事與公正􅁼幸思有以報鄒之徳㢤聖皇之言即天也慎母忘之慎母忘之濂故舉此重為傑之告范公在宋位至參知政事名垂方冊至今人能道之惡知傑之他日不如公㢤亦在乎法其人而巳贈閻希曾參政山東詩并序國朝以魏晋以來立行䑓省於外盖為征討權冝之計至唐末方鎮擅地遂以中書令同平章事命之至今相沿而不革非所以示悠乆乃改為承宣布政使司設使一人左右參政各一人以恊和庻政統馭人民河南閻希曽由鄉貢進士擢為起居注皇上愛其才俊俾肄業文華堂堂在禁中車駕時幸臨訓飭之㝷除監察御史轉司文監令乃授山東承宣布政司左參政希曾名鈍仕學兩優者也因其嘗受經於予故其行也詩以贈之其詞曰山東鉅藩統府惟六民物阜蕃􅁟地饒沃宸裏軫之百司棊布誰挈其綱政乃無斁乃詔近臣爾鈍爾徃宣朕至懷參佐其長臣鈍曰吁臣恐弗勝方嶽重鎮厥任匪輕帝曰俞㢤爾母固辭精白一心力行無疑鈍拜稽首即日啓行君臣一心共底䧏平我知閻子有學有文五色燁然出􅁼超群子之徃矣期建功勲貯見政績邁于古人古人有云盡瘁國事子尚勉旃服之母忒宗惟善字辭宋氏自京兆遷汳又自汴分遷吴興虎林虎林有名善字惟善者實承其後吴興則􅄪遷金華而予之逺裔也予與惟善為同宗予侍講禁林日惟善以學行貢諸朝皇上親擢為給事中朝夕在帝左右時􅀍顧問恩寵有加焉巳而兼靖江王府録事擢監察御史改知濟寜府未上陞參山東承宣布政司政事予與惟善為同朝瀕行惟善來言曰善以字辭為請巳二年矣叔公文墨之冗日弗暇治因未敢累執事今􅀅有逺行叔父寜終靳一辭乎予咲曰惟善通書工辭章經緯參伍燦然成文持節行州縣彰善癉惡又愜乎物情是文學政事舉勝於人縱予有言􅀅何有俾於惟善乎惟善請之益力予不能牢讓因稽其命名制字之義綴之以辭辭曰隂陽迭運道寓其中􅁇之者善性成乎躬其善伊何化育之妙陽行隂具萬理樞要是曰天道體用弗遺式昭化源用􅀣學基有倬君子夙著徽羙内功既加外聞益侈積乆發弘上簡帝􅂨峻爵穹官日􅃱顯融君恩如天無不覆燾昧昧思之非忠莫報徃佐方嶽審其政機大見設施春煦秋威孰滯盍䟽孰蠧盍剪孰才盍登自邇及逺此非外鑠實善之推成己成人庻其在兹我著我辭徴厥名字掲諸座隅以示籖史鳳陽單氏先塋碑銘前兵部尚書單公安仁來謂濂曰安仁之姓相傳岀于周單伯之後子孫世居臨濠臨濠今改為鳳陽自五世祖譜牒失記不知何時來遷自髙祖二府君妣劉氏曾祖四府君妣李查二氏而下始見載述然而曾祖至于祖父皆合塟鳳陽縣之延􅁜村三塋同域繚以周垣植以松栢外立髙楔表署名號嵗時􅀕祀惟謹惟我單氏世以耒耜書詩為業敦崇本基惟務檏質不識末俗侈靡事恂恂欵欵不能以辭氣加人人或見侮輙遜避而巳故於州閭之間並無所争訟衣食有贏餘内以仁三族外以周婣友不復為自蔵計家法素謹男畊女織外皆不知有其它鄉人觀感多薰為善良焉先徳之忠厚者甚衆安仁不及聞其詳今也幸逢維新之朝沗􅀍官使皇上念及舊勲􅃙贈大父青亞中大夫濟南府知府輕車都尉追封南安郡矦大母鄭氏追封南安郡夫人父榮嘉議大夫禮部尚書輕車都尉追封南安郡矦母王氏追封南安郡夫人天恩深厚賁及泉䑓而塋閒􅉎棺之石未有刻文茲非闕典歟敢具書以為吾子請濂受書讀之不􅁴歎曰嗚呼天之於善人其報施也如吹之必寒􅌵之必温此古今之恒理幽顯之通符也今以單公之事而􅀚益可徴驗不誣濂與公交㳺十有七年知公之勲業為最詳苟不附書先徳之後何以白前人積累之深而垂􅁉於後昆㢤雖昧於造文之體不暇䘏也公少有志事功雖為府史晝夜以洗􅁈澤物為事當至正􅉝邜江淮兵起剽􅐁相屠劉氏遑遑無所寜居公奮然曰丈夫當岀竒剪㓂可坐視父母之􅀖淪覆耶遂椎牛釃酒率健少年與飲整部伍嚴噐械教以坐作擊刺之法不一月間從之者数萬人新建壁壘横亘三十里㓂至􅂺曵旗鳴皷大呼追殺俾無留行乃止退則閉柵自守老弱襁􅀒依為保障者累十千家當是時豪傑角立割土疆擅號令者比比而是乙未秋公遂移兵廣􅁜以􅀚變且曰此軰皆為人作驅除爾真人之興氣􅀔自與恒人殊丙申冬公見皇上威徳日盛綂六師而下金􅁜公曰向所謂真人者此真是巳乃率部曲而歸之上大恱明年命戍鎮江公嚴飭軍伍益自振厲敵兵不敢侵境居􅀊餘㑹朝廷始立提刑按察司以㢘紏不䖍上選公為副使巡行浙水東悍􅀅獰卒横賦民糧曰寨糧務朘剥以蠧民公一寘於法金華民有訟其邑丞受白金者公詰之曰頗聞爾丞賢爾細氓也奈何犯分而訐之即圗白金短長圎方形來上圗上蔵弆復命諸左證圖之人人殊公曰是非誣耶衆環目相頋無一語遂以其罪抵訟者告訐之風為衰辛丑陞按察使東方肅清莫敢譁甲辰徴為中書左司郎中時江淮甫定軍國庻務棼如亂􅁝公佐太師李韓公參錯裁断日就綂緒事以無滯上益竒信之吴元年丁未閩浙中原漸平營建城闕宫殿脩朝享服御儀物廷議可任其責者遂奏公為􅀅作卿公精敏多智凢所制量皆中法不苟明年戊申是為洪武元年上即皇帝位陞公嘉議大夫工部尚書仍領􅀅作事二年夏改兵部公宅心中正能聲彰聞公年已六十有七自以精力衰孱請􅃱其事上閔其勞從之贈田三千畆牛七十角仍給尚書半禄飬其終身公退卜儀真珠金沙結廬以居六年夏上念公舊勲復詔中書起公為山東行省參知政事公詣闕力辭而止八年復頒致仕誥加公通議大夫盖異数云嗚呼公之事皆濂所目擊者苟或有所拘泥而失書則公之勲業不暴白於世公之勲業不暴白於世則所謂先徳者􅀮而弗昭矣其可乎㢤其可乎㢤公娶趙苪二夫人生子男子凢七鑒鎧雖蚤世鑕擢皇陵衛千户所鎮撫餘􅀂鉞釣銘銓皆亦嶄然見頭角矣􅀊時持酒以酧先塋相率而讀濂文則曰吾翁之顯融自我先世遺之也我等􅀅取法焉然非遭逢聖人在上亦何以聚精㑹神成功名之㑹㢤我等尤不敢忘是則忠君孝親之心油然而生矣它日州里之人過而讀焉其感激亦如之四方之材士大夫過而讀焉其奮發又如之則濂文為忠孝􅂆者夥矣非止為單氏一門光榮而巳也公字德夫自號爲寜山今年七十有二其氣體猶康徤也銘曰物之積也不厚則其發也弗能弘譬諸於雲起自膚寸及其積也氤氲黤黮可以沛甘霖而資西成又譬諸水起自㳙滴及其積也瀰漫浩瀚可以􅀒萬斛之舟而利渉焉甚㦲積之為功也單氏世為善良自累葉馴􅃱於兵部公其積之也厚矣所以功成於時名遂於後貤贈所覃上及二代天之報施善人之家可謂至矣是冝大書深刻於先塋之碑所以昭聖澤表賢嗣以勵於人人焉符氏世譜記惟符氏出自􅁎姓魯頃公之孫足仕秦為符壐令因以為氏至晋吴興大守雅遂望出琅琊琅琊之後分布於江淮間至􅀂符氏則本姒姓有扈氏子孫奔西戎世為巨酋乃姓蒲氏蒲洪以䜟又改為符符與符實夐然不同也今符氏有世居㐮陽者宋末通判建昌軍遂遷南豐至季祥者益以書詩為業季祥生一子伯瑞伯瑞生二子􅀽州路知事德懋南豐州醫學録德章德茂生三子國禎國才國噐徳章生二子元貞仲叔國禎生二子信善國噐生一子顯仲叔生一子玄善今名文昌其字為孟庸為人温煦慈良州縣以為可用貢于朝選為儀曹行人滿三載擢為同文局使予觀儀曹時文昌承事左右間來拜曰文昌痛念兵燹中先父棄􅂢舘舎文昌之年猶未弱齡朝夕奔走乎西東而数世兆域既日就蕪沒宗系之傳亦失於徴考文昌實懼之􅂅為記其綱於前至於諱某字某娶某氏生㡬子塟某䖏夀􅀂干咸備著於後庻㡬可示後昆非藉先生之􅃂靈未知其可也敢請自時厥後􅄪言之三言之復数言之言輙涕泗雙下予惻然憐之嗟夫古之所甚重者譜牒也三世不脩譜謂之不孝夫孝者莫先於敬身身之所從來可不知歟能知其所自出尊祖敬宗之心當油然而生矣魏晋以來圗譜有局郎令史設官所以稽其貴賤慎其昏婣辨其親踈其事為􅀹嚴又不特如前所云而巳也文昌有志於此亦可謂知其本者矣予老多病謝絶求文者有如避讎今特為文昌析符符之不同而并著其世系之略者無它惇本也蘭􅀮亭記蘭􅀮亭者餘千葉君華卿之所築也華卿性清脩不與塵坌交并皦皦然屹立物外雖身居城市中儼􅀂重山宻林青猿白鶴時給使乎左右也然物觸其前無以愜其意輙視之如粃糠自以為幽芬逺聞而􅀋貞人節士之操者惟蘭為然乃藝百本於層楼之下圓盆方甒羅列乎後先當春日始和東風烻烻動人蘭於斯時玊茁其芽而紫蘤翹然其顛清馨襲鼻雖海外名香旃檀婆律之屬不足喻其髙韻也華卿日繞百逥神凝而形忘暢然自得乃舞而歌曰采蘭􅀆采蘭白煙蒼莾􅀆生暮寒望羙人􅀆不徠撫瑶琴􅀆誰與弹既而有肥遯君子聞徃而􅆳之曰勿謂人逺河可渉只勿謂山髙磴可陟只聲氣之同為相求只歸視吾亭蘭正柔只華卿遂相與肆筵設席以為驩至夕乃休無􅀊不如之蘭雖草之屬亦似觧華卿之意一榦之間持發雙葩以獻其妍流聞禁林虞文靖公掲文安公咸見於聲詩名曰瑞蘭後十年天下兵辭華卿扶携耄倪避地臨川山中一去不返者十五春秋及夫六合廓清華卿始旋故里其楼與蘭皆化為椔翳華卿慨然如失良友􅃍即其遺址建亭植芳蘭速客嘯咏如􅀄或勸之曰不仕無義子奈何溺是而廢恒經乎華卿曰年少時亦頗有志於仕自與世味酸醎不相入遂􅄬分於蘭如金石交今素髪垂領矣尚復何云㦲州里遂號之為蘭􅀮且以名其亭云華卿之子清苑令秀實天性至孝報政􅀅歸省思有以恱親之意徴為文以記其亭予聞王度記云古者之摯天子鬯諸矦熏大夫蘭士􅊉皆取其物有香燥濕而不變者也蘭則生澤中廣而長節節中赤髙四五尺漢諸池苑及許昌宫中種之以䧏神或雜粉中蔵衣皆取其芬芳爾傳曰佩帨茞蘭亦言其華葉俱香而可充佩愇者也􅀂今所藝之蘭香則香矣華質易萎與凢葩等何以為佩㢤且鬯則欝金熏則零􅁜香􅊉則白芷三者咸可佩胡為今蘭獨不然乎近代紫陽方囬考訂極精而蘭則今名千金草及孩兒菊今蘭實古􅁛川續㫁其言累数百言而不止予亦未敢信其說也華卿􅄝蘭乆大夫士過從者衆必當有以辨之雖然逹人大觀以物付物而不泥於物苟辨之於錙銖豈所謂磊落之士乎華卿但取蘭之馨可佩與否何暇深計也予性亦愛蘭所居青蘿山不能得嘉種因懸趙孟堅所畫於壁旦岀而夕入焉芳馨之氣冉冉逹於四座此無他于心中有蘭而觸目鼻者未甞無蘭韓娥去而歌聲在耳曹公詐而梅津生舌其理亦猶是也華卿有學之士予故以此質之且記於亭壁明年謝事而歸當見華卿餘干江上以厠肥遯君子之末尚能製猗蘭之操使使善琴者弹之梅府君墓誌銘府君諱􅃱和字彦逹姓梅氏梅本子姓其先梅伯爲殷紂所廢周武王既伐紂封伯諸孫黄梅號曰忠侯遂以梅爲氏世居楚鄭間後避新空之亂散䖏閩中其因仕而占籍宣城者則府君十七世祖諱逺者也十世從祖詢仕宋至翰林侍講學士出知許州九世祖尭臣字聖俞以詩名天下氣完力餘演肆而老勁王文康公見之嘆曰三百年無此作矣􅀄從父􅄻􅀘太廟齋􅀰累遷尚書都官貟外郎以終自是子孫䆮盛咸繅藉乎詩書多有擢進士第者文物盖彬彬云曾祖某祖師哲父徳明妣汪氏大節公澤民之女弟也府君生而俊朗嶷然異群童稍長大父授以上古之書輙能講其說操􅒀屬文五采翩翩然可觀大父殁復從文節公學春秋爲舉子業巳而兼通易與詩鄉先逹張君師曽兄弟問學雄深人號爲二張毎竒府君折軰行為忘年交過從講索殆無虗日府君聞譽四流僉謂場屋之先登者必府君也数􅀾藝数不利府君歎曰吾之文非不如今人彼藉吾殘膏賸馥者取青紫如拾芥而吾乃轗軻􅀂是非命也夫非命也夫於是棄去肥遯於城南益取春秋而研精之辨其世變要其指歸著春秋􅁼編十二卷名門右族慕艶其聲光争欲聘􅃱為弟子師府君以親老謝不徃而問道考徳者日相踵于門府君悉攝其觕踈入於宻微而後巳㢘訪使者東平王公士熈燕南吴公鐸咸來諮詢治道府君以風俗盛衰人心臧否為言二公深加敬嘆毎有疑難必下禮質之元末政亂烽火相連方嶽重臣有來鎮是􅀖者屡遣使者䀻府君入幕府參賛軍事府君知其不足輔辭不赴􅀄侍講都官二墓及􅀕享之祠皆為豪有力者所侵宗人屡訴於有司賂遺旁午歴十二春秋不能决府君力白部使者復之府君家素貧事親盡禮及沒三年不御酒􅁏鷄􅀄鳴衣冠坐堂上秉燭逹旦令子弟奴隷各從其事無敢惰者故能􅂶拓其先業宗族鄉黨皆遇之有道人有不平赴愬於庭府君片言直之皆心服而退至正乙未府君避兵寜川山中明年丙申四月二十五日竟以一疾不起享年五十有七又明年戊戌某月日返塟於郡南長安鄉盤石之原從先兆也府君娶崔氏子男子三長士熈以學行入仕知大同渾源州以政事聞今陞陜西承宣布政使司正理問次煥次䁀慶皆蚤世子女子三長歸同郡劉安義餘皆先逝其著書所謂春秋􅁼編者與耕槀十卷毁于兵士熈蚤夜痛心疾首力欲􅁇先緒既於故址堂扁之曰存畊復持史官朱芾所為状拜予禁林請銘其下棺之碑予嘗過宣城郡守楊君觀出郊而迎同登疊嶂楼眺􅁜陽敬亭之勝慨然動景行先哲之思梅氏為宛􅁜望宗因訊其後裔何如楊君􅃍以府君為對欲求見之巳作􅁟中人乆矣今覽状知府君羣行鑿鑿可􅁛而又能護先􅃁於三百餘年之後君子之澤孰謂其不深長也㢤是冝銘銘曰惟宣之梅族望焞焞世多顯才有盛無衰入講禁垣出典大藩大藩言言􅁇之惟艱孰昌於詩震撼四夷位則孔卑名譽交馳澤流至今有嗣其音秉心淵沈如百錬金我冑我經我文我兵旗幟精明莫能先登命也奈何芝生巖阿既采且歌委委蛇蛇繡衣焜煌諮詢憲章告以否􅆇肻矯而亢苟非其人掩耳不聞亂如􅁝棼誰賛爾軍厥志未終遘此閔凶下有幽宫馬鬛其封穹碑勒銘炳􅀂丹青載􅀭徳馨來裔是徴恭題豳風圗後臣濂侍經於青宫者十有餘年凢所蔵圗書頗􅀗見之中有趙魏公孟頫所畫豳風圗前書七月之詩而以圗􅁇其後皇太子覽而善之謂圗乃方帙恐其開闔之繁當中折䖏丹青昜􅆀損壞命良工装裭作卷軸以傳悠乆屡下令俾臣題其末臣聞之七月一詩序者謂周公陳王業以告成王故備悉稼穡之艱難自于耜而舉趾自播榖而滌􅂣以至上入執宫功莫不纎悉備具而紅女蚕績之勤􅁇焉嗚呼國以民爲本而民之至苦莫甚於農有國家者宜思憫之安之宋之儒臣真徳秀有見於斯甞請于朝欲繪農夫紅女勞勩之状掲之宫掖布之戚里使六宫嬪御外家近屬知衣食之所自來盛矣其用心也恭惟皇太子殿下天賦懿徳仁孝温文而􅀹留意於農事毎於禁中蓻植麥禾以觀其成則其憫小民勤勞固不待周公之告而後知然而此心易發而難持自古賢君恒存敬畏至以朽索馭六馬譬之願殿下之心朝夕如覽圗時則四海乂安無一夫而不􅀍其澤盛徳大業必􅀅度越成王無疑矣臣年雖耄日切望之因推徳秀之意備書萹終以竭犬馬之誠云洪武九年冬十一月壬午具官臣宋濂謹記元贈進義副尉金溪縣尉陳府君墓銘予在禁林四方賢士大夫咸辱與交多以􅃁上之文為請予憤蘇氏矯枉過正以銘墓為嫌毎詢孝子慈孫之志輙濡毫為之江右陳聞時客授丞相府亦持國子􅂇教曽君士朂所為状來謁銘嗚呼聞遇予持厚何敢靳一辭不發其先徳於幽潜耶按状府君諱天􅃬字國􅚘姓陳氏其先出陳冝都王叔明之裔有諱伯宣者辟地泉州巳而自泉徙江州之徳安子孫同居十餘世旌號為義門九世祖珹又自徳安徙撫州臨川之安寜鄉其里曰唐正曽大父宋鄉貢進士以忠􅄪遷鄉之槎溪里祖鴻翼父從龍母李氏府君生三􅀊而􅀌依母夫人以居暨長氣貌雄偉不屑為流俗媕娿事出言特論意度豁如也元至正十二年壬辰大盗起江漢間郡縣相􅁇䧟聚落民争掲竿為旗以應㓂府君頓足曰事急矣奈何即躍馬入郡城白監郡完者帖木兒曰天􅃬先世以義聲著吴楚間今天下大亂賊以紅帕首呼嘯成群所蹴踏䖏絶無一人禦者天錫雖不才誓竭忠以報國家自度鄉里徤兒一呼之間可得千人甲胄糗糧當一一自給不以煩縣官教其坐作擊刺進退之法可用或守或攻惟明公所命監郡為之驚喜曰此竒男子此竒男子即署文牘遣府君間道白江西行中書時司徒道童為平章政事即從所請奨勵者甚力府君還朝夕聚兵訓練如前謀五月二十四日帥之以援郡城敗􅇵盗胡志學於城西白鷺渡六月四日進賢㓂大掠城東桂塘府君分兵設為四覆待之期以鉦鳴為􅀱伏盡起先令􅀐兵餌敵敵至即退二里所賊果追撃交􅀾方酣鳴鉦一聲伏兵突出賊後殱戮無餘者省憲二府益竒府君之才檄靖安尹黄紹與府君同討賊二十二日府君與紹次進賢縣直􅀮鄉鄉有韓家砦㓂之窟宅堅深未昜㧞雖攻以銳兵毎不利府君欲以乆困之紹曰鼓行氣壮􅀅㓂是剪公欲坐老我師耶􅃍揚旗挑􅀾府君止之不可仰天歎曰師出以律今􅀾不擇利雖頗牧不能建功吾不知死所矣賊見官兵新至人馬俱疲鼓譟争四出府君注矢弯弧獨當一面賊至輙殪之轉闘田間時秋禾垂熟馬饑亂走府君中流矢亟下馬㧞刀與賊歩􅀾連斫十餘人衆賊易府君之獨也急趨之府君欲退為禾穂所􅇢遂遇害年始五十七云事聞特贈金溪縣尉階進義副尉府君讀書務通大義不事辭章浮藻嘗語人曰君子當真知實踐喋喋空言何􅀘於事功當時公卿大夫咸與之逰而掲文安公徯斯􅀹號為知巳而逺近名士􅀂同郡孫君轍危君素􅁑君元哲番陽李君存祝君蕃豫章楊君鎰皆使諸子執贄徃從之㳺期學必成乃巳府君家雖豐輕財好施與州里有空乏者必周䘏之未甞有徳色聞府君之殁識與不識皆澘然出涕府君夫人進賢楊氏也諱叔真世為儒家其曾祖仲愽與子龍尾同舉進士祖天璧父居仁母支氏九􅀊失所恃即歸于陳其姑鞠育之夫人天性慈順事姑以孝聞姑年八十而終夫人亦年垂六十痛姑死㡬不能丧雖丁兵戈殘毁之餘棺槨衣衾皆極其精緻且曰老姑以女遇我其殁也敢不以丧母䘮姑之禮兼報之乎君子以為賢當府君之殁夫人痛不得屍還塟欲自盡者数矣重以姑在不忍言夫人既塟姑乃聚府君衣冠爪髪蔵諸櫝中泣謂諸􅀌曰汝父存時吾侍巾櫛一爪一髪未嘗敢棄遺爪髪之存即汝父體魄之存也待吾他日身殁當并冠衣與吾同穴塟庻幾後世不以汝父為虗壙也諸􅀌亦泣而識之今洪武三年􅉝亥七月九日夫人年七十七亦以一疾卒六年癸丑正月四日聞遵遺命合窆于烏槎原水口山祖塋之側去家不二里而近府君生三子長式次庸舉茂才為桞州路儒學正皆先卒次即聞通尚書以文詞徳行有名于時孫男九人曰崇先卒曰石曰楔曰謀曰位曰儉曰倣曰侁曰鑑孫女六人適胡琮饒鶴萬梓文彬黎應辰胡泰曽孫男九人曰括曰援曰鄧曰拂曰挺曰囬曰授曰拱曰申如曾孫女十一人適王某王某王某周某餘㓜在室嗚呼君子之澤何其演迤而深長㢤府君之先能以義聚族而居聲聞赫奕光照史冊世之相去雖逺子孫復能推義為忠期與國家殄㓂則其所志甚大非直欲保族里而巳其功之不成則天也昔人有云作文當有闗世教有如府君之行其謂之無關於世教可乎是冝銘銘曰天地大經曰義與忠丕建人極廓牗民􅂨前聖敷訓為世鉅防孰遵行之其道弥章九江有陳合族而食流澤沛滂炳焕今昔元季政龎亂生楚􅆠綘巾跳踉執戈以狂有烈丈夫秉氣飛獰嚼齒罵賊誓不俱生躍馬入城揖拜上官披陳肺肝肻避險艱赤手一呼從者及千獸盾蛇矛􅀔􅀅壓山揚旗出逐㓂駭而奔是屠是劉勇氣益振疇昧先㡬謀或乖違我以死抗我志敢􅈥人誰無死死能爲國不沗厥家身又惶䘏其氣之雄不随物遷營魄來歸有風泠然􅆶髪雖微與四體同既􅀣而封松楸欝葱巫陽下招勿之四荒幽宫是蔵有永其康書畦樂翁事畦樂翁延名姓王其字爲與齡廬􅁜人沂公七世孫也生平有逸趣當得意時物我齊􅄀不知天地之爲大日月之爲明山嶽河海之爲髙深也或登髙騁望或曵杖長歌或呼酒縱飲翛翛然自比扵􅁑天氏之民如是者有年一旦忽卜居豫章東湖上欲起徐孺子與之㳺駕雙烏犍衝雲而耕􅁟脉壅起虗攅􅀂積塵翁荷鍾經營析爲九區伍伍相比皆斸成小窪取嘉􅂼藝之新雨過緑甲浮頭如旋螺巳而怒長翠光方匀凝望皆一色翁欣然自得曰二氣絪緼徃過來續徃者不知其所徃來者不知其所來徃者固陳來者復新新陳相因如環之循今吾畦之青萌孰知為黄之所基乎基者萌之始萌者基之終逹人於此大觀終之始之始之終之非始非終惟始惟終可以一古今可以混彭殤可以同晝夜矣盖人生百齡萬中得一七中加竒千中得一或五六十固比比有之然不免於孩提􅃱夭於襁褓者亦衆矣奈之何㢤壽者自夀天者自夭吾未嘗夀之夭之也憂樂之間寜知夫夭者不為夀而夀者不為夭耶今􅀚吾畦而日渉之一盛一衰則妙理悉具焉故其樂有不可得形容者矣藝􅂼云乎㢤藝􅂼云乎㢤翁言流聞四方有識者咸以為知道競謁翁問其故翁不得巳示之曰勿小吾圃隂陽之理著焉勿小吾身心中具天地焉具天地於一心著隂陽於一圃六合雖廣孰加焉子􅀂規規求於形迹之間則醯鷄以甕中為天爾何暇與大方之外㢤子休矣子休矣為說者曰吾聞江右有徐孺子者其清風􅀮操夐出千古見諸史冊惜乎不載其言論風㫖無以探索其緒餘今聞翁之言察其行事其殆聞孺子之風而興起者歟然翁少􅀒才氣客逰諸公間以文墨議論見􅁛譽度其志亦欲施諸事功者今􅀂是其殆以時進退者歟以時進退則㡬乎道矣予故具列于萹以示知翁者恭題御製命桂彦良職王傳勑文後皇上以上智之聖延覽英傑置之庻位知人善任誠近世所未有洪武十一年詔以太子正字桂彦良為晋王傳且親御翰墨為文勑之識謹身殿寳其子中書舎人慎装潢成卷請臣題其後臣惟古明王之待重臣􅃂之以爵告之以言者有之矣然其時之文多述於代言之人求其出於親製者不可得也親製者如漢武之於吾丘夀王荘􅂇者有之求其褒許􅂭至教告深切如此者不可得也臣與彦良同朝且同官東宫甚乆彦良之爲人淳篤和易有長者風當今廷臣鮮見其比上嘗以儗臣濂雖臣亦自以爲不及也今勑文以善學孔孟􅁛之而望以王佐之業傳所謂知臣莫􅀂君其此之謂歟雖然今以職爲相􅀓者凡数十人上未嘗以言爲賜或賜以言未嘗以稱彦良者許之也彦良獨􅀩聖知􅀂此之至安可不思報乎具簿書綜獄訟他人能之者上不以責彦良亦非彦良之所以報上也必也輔王以徳義迪王以忠孝使晋國有泰山之安賢王有明哲之譽而彦良之名亦相與流於千萬載此豈非上之望於彦良者歟彦良其可不勉歟翰林學士承㫖嘉議大夫知制誥兼脩國史兼太子賛善大夫臣宋濂謹識宋學士文集卷第三十九翰􅁐别集卷第九
