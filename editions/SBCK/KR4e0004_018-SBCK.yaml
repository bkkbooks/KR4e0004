body:
  text: 贈侍儀舎人林成之序余家食時有同門友宣君彦昭爲温之平陽判官當報政而歸州之文學􅁺林成之實護送来浦陽成之以余頗知學也自浦陽謁予金華山中相與講學術異同論風俗淳漓至更闌月落蟬聮不得休臨别造四言一章以贈成之旣去西東絶不相聞予亦應中書之出仕䏂熈朝有􅀙平陽来者輙詢之咸言成之䖏烟霞泉石間詠詩讀書以爲樂予亦爲之驩然頗自念相望二千里不知何時與成之盍簮乎今年夏予在南宫忽有踵門而拜者予弗能識之叩其姓氏則成之也嗚呼相别未十年壮者日益衰朽至熟視良乆亦不記其顔兒之真人事之不堪把玩如此可勝嘆㢤扵是與之坐而慰勞之成之頗徃来扵予門問詩􅀂文之法予以舊㳺之故歴舉體製之殊音莭之異者亹亹列之未㡬成之忽来吿曰小人有毋貧窶不能存雖幸􅀼禄于朝而烏鳥私情懸懸不能忘昨巳請扵廟堂陳其中情涕與涙俱下執政大臣憐其志子告一百日俾迎飬扵南京今将行矣執事其能賜之一言乎夫成之為退思先生五葉孫先生實考亭夫子髙苐世稱十哲之一其家世之懿不俟言也成之以茂才貢上銓曹擢為侍儀舎人出入禁省日覲天顔整肅乎鵷班峙立乎螭􅉾其寵榮非他職名􅀁可比今又奉板輿迎親而来母子怡愉聚扵一堂何人不慕􅃩之亦何俟予言也無已則有一焉予與成之别後成之學問日新予則摧落不振四庫之書廢忘者十九視舊相見時􅀂兩人焉此無他習與怠相仍氣隨世􅀁移故也成之宜益自奮勵母􅀂子之􅀁為則下不夫家世之懿上無􅀒國家之恩予與成之言者止此而已若夫温之先儒卓然以學術名家或沈潜性理或有志事功或推明經制大抵與吾婺諸賢同其扵醇疵得失之間多有可議予雖欲言雖更僕亦不能盡也尚容他日爲成之發之成之名伯生䔍實好學有士行絶不同扵流俗云飬親園記天台楊君子善謁予而請曰善之少也習進士業􅀙陳用􅀳彭􅁢誠二先生㳺屢踐塲屋輙不利扵是棄去㑹海内弗靖奉二親逺􅇡山谷艱難險阻無不備甞及今真人啓運六合一家幸得還先人之敝廬竊自念少壮之時思欲沾寸禄以榮親東馳西奔靡有寕􅀊定省曠而音問踈兹􅀗婆娑扵膝下家公年巳七十又二固幸康強素髪垂領而齒牙且􅏒摇矣毋之年如家公又益其二焉尫羸如不勝衣而出入之氣僅属愛日之情恒怦怦然頗聞申􅎛爲物性􅀬而味􅉝能益氣延年明目生津吾親􅀁宜服餌而不可闕者也乃擇家南之沃壤數畝而贏九畊而十耨之使其土䟽而壤鹵封爲直疄疄各有溝踰三尺輙樹一本以數計之􅀅六伯焉周爲儲胥以護之使羊牛不得踐履夏氣方中絳實盈盈綴于枝間舉手觸之馨烈之氣鬯逹扵左右遂與子姓采而擷之以奉親有餘則售于千家之市􅀗其直以還買魚沽酒以爲親驩班衣起舞毎歌之以侑觴歌曰我藝我􅎛其寔纍纍只薄言掇之其香弗􅃜只可以延年可以生津只樂􅀆樂􅀆吾以奉吾親只歌巳二親亦欣欣爲之引滿頽然就醉今善雖出仕與有禄食遐想斯園窹􅄰不能忘子願爲善記之予聞用天道分地利孔子以爲庻人之孝􅀃者謂其順時别五土􅀁宜而播種之以飬其父毋盖古之士者朝出耕暮歸讀聖人書亦常事爾後世習俗䆮偷鷄鳴而起􅀙事於末作始有不知躬耕以爲飬者如吾子善扵瀾倒波隨之際屹立不遷不亦行古之道㢤雖然子善以茂才應辟出仕爲時亦既丞京府而賛治化當以守貴富保社稷和民人爲孝逺􅄃深􅆂淺受而其學益進扵前一旦将還東海之上與􅒄原㳺者咸惜其去相率發為聲詩命予執簡而序之因繫其辭曰世之學者夥矣溺文學者則局促經畬馳驟藝苑其流必外騖而忘返泥苦空者則措情髙逺㳺志踈曠其流必内躁而失守􅀁以皆倀倀他適不知正塗之􅀙有􅀂􅒄原其知真乘法印與儒典並用者歟䖏乎世間不着世間如環之無端不見其止如刀之剖水不見其跡其知空有相資真俗並用者歟循序而上此焉發軔他時出世為人其知􅀁自重者歟予儒家之流也四庫書冊粗甞枝閲三蔵玄文頗亦玩索負誇多闘靡之病無抽􅀜啓鑰之要近惟黙坐存誠屏斥而銷霣之扵是天光駿發靈景自融方知儀曹之云為漸門者設􅒄原春秋甚富冝逹圎頓之旨尚思得魚兔而忘筌蹄歟白雲恱公時碩德也身居岩壑名聞禁闕􅒄原甞師事而親炙之當以予言質其然否白雲又将有以為璞原告也􅉝亥京畿鄉闈紀録序進士之科始扵陏而盛扵唐唐扵進士之外又有明經明法書筭諸科然皆有學以肄其業毎􅀊之冬州縣舘監課試其成者使與計偕其不在舘學而舉者謂之郷貢既上尚書始由户部集閱而􅀜扵考功復課試其可者而苐之此其􅀄制也自時厥後其法靡常而諸科或廢或因亦無一定之論唯進士之設行之頗乆其得人之盛考諸載籍猶班班可見也皇明誕膺丕圗􅁇天出治廼法前王建進士科用康保于我烝民洪武􅉝亥秋八月洊當郷貢之期凡畿内三州十七府之士皆􅂬忻相吿褁粮而奔走儀曹具以状聞上親選兵部尚書呉琳國子司業宋濂司考文之任命即日蒞事而中書右丞相汪公左丞胡公復妙柬在廷之臣㢘慎而通文藝者為受卷謄録對讀彌封等官期各盡厥職庶有以副上側席求賢之意其不䡖也較然矣夫自歴代以来為之士者焚膏􅁇晷矻矻窮年欲徼科目以為身榮柰何有終身而不霑一命者設得之秋髮􅌭紛而有弗􅀗禄食者其間幸無二者之累拘扵􅀊月又有不􅀎改合入官者何其艱㢤今我皇上求治之切一藝一才無不庸擢上苐者固不限資序而爵之或見遺扵南宫亦俾其與有禄食寒酸之士一旦遭逢盛際紆朱拖紫秉笏垂紳光􅂋尊榮照耀耳目此皇恩之滂沛醲郁誠歴代之􅀁無有為之士者動静云為之間􅂚思􅀁以致此㢤其尸位素飡而不知報國者妄也違道干譽而不務恤民者殆也貪墨敗􅀋䘮名檢而􅈥風教者非人也郷闈小録成直書首簡用以為多士之規是􅀊八月十九日金華宋濂謹序雲中辭黄岩有竒士曰許君弼其字廷輔治周昜燁然以文名㑹天下紛擾輙􅀍鐡衣操虵矛集兵以禦㓂􅀹能挽强命中衆􅀄弗信君設正鵠一百八十歩外挟弓矢以往轟然一彂輙中之乃皆歎服由是多驅馳戎馬間及天兵取台州四方次苐平大興文治建科目以取士君慨然曰聖天子在上可以出而仕矣起應書郷闈遂取浙江苐二名君文觧去通判􅃆陽府剸煩􅇵如庖丁觧牛恢恢乎投刃而有餘地已而復慨然曰予家之東有委羽山其髙摩天委羽之下又有桃山焉羣峰相與回環日未出常有雲氣起其間縹緲􅁿盈如兠羅綿籠􅇁崖谷如翔如舞絶可愛玩有時下覆櫩宇覺此身飄然在雲之中恍欲逐黄鶴仙人吹簫而徃来也苐以君恩未報不敢决去他時􅄠種種當掛冠而歸與雲為朋姑以雲中生自號盖以表其志云夫雲之為物出乎太虗歘然而有忽然而無其變幻有不可測者當長空晴妍紆徐其興結而為祥鸞散而為綺霞其文采郁如也及其黤黮欝勃銕馬長驅雷電為之恍愡而甘霖注焉嗚呼雲㢤何其有􅀋扵君也然非雲之􅀋君實君有取扵雲也樂繁華者贈勺藥以相娱務髙㓗者貯秋菊以為糧物何甞有心而人自强同之爾予方與君談雲中之趣君忽昻然而来顧予言曰弼知誦子之文乆矣盍為賦雲中辭乎予聞君􅁭韻洒落得䘮一歸于天故其顔四時無憂色其􅃅為雲中也亦宜為之辭曰委羽之山􅀆雲薄之􅀔輪囷􅀆復㠁嵯膚寸而合􅀆既合而復離不崇朝􅀆雨渺瀰􅄅瀰􅀆雲之歸玄功泯泯􅀆􅊬難知嗟爾雲中之人􅀆胡不爾思或出􅀆或䖏􅀆恒與雲以相期題山房清思圖書萱草蘭􅈍竹石松梅為一卷趙魏公以藝文名天下及用􅂐􅘴法施扵繪事凡山水士女花竹翎毛木石馬牛之属亦入妙品􅁱道先生云廣長三萬里上下二百年唯公一人爾信然保寧慧禪師以山房清思圖相示遂書而歸之䟦佛頂托盋歌諸文後穆庵禪師康公耽樂法乘見諸履踐毎念先佛以乞食為事日中一食樹下一宿尚恐畱情永法乃一切悖之而唯嗜欲是滋是長扵是著托盋之歌古者專務精進無少􅈈怠得無上道亦無自滿之意末法乃中道迷惑扵未足中生滿足證扵是書首楞嚴經千種識隂之文在昔陀摩尸利刻苦􅁱行􅀗遇堅牢比丘相與激勵卒趋􅁴門而使彌樓犍陀佛法再興末法乃壞散弗􅀵鮮有誠心向道者扵是録堅牢石室之偈其一則咏之以巳意其二則證之以古辭大㮣勉人捨妄入真無乖扵聖教而已嗚呼禪師之慮至此其可不為慟哭而流涕矣乎然而豪傑之士何世無之君讀斯卷當有蹶然而興起者豈惟禅師望之予亦望之無相居士金華宋濂題陶府君墓志銘䟦尾右上虞典史陶府君墓志銘一通翰林學士承旨河東張翥仲舉造集賢大學士滕國公保定張􅋒公弁篆題盖府君之子江浙行樞宻院管勾漢生之􅀁請其時則至正二十三年漢生將南轅復求嶺北行省左丞臨川危素太朴書後一年太朴還中朝承㫖翰林始為作烏界道繕謹寫就㑹南北道絶附海舶至江南以歸漢生又一年漢生自江浙行省檢校官陞行樞宻院都事贈府君承事郎福建江西等䖏行樞宻院都事府君之妻趙氏亦贈宜人漢生既奉命書􅀕告扵墓下復欲請仲舉􅀘入誌中而九京不可作矣乃并仲舉舊撰宜人墳記聮為一卷傳示子孫使有􅀁徴焉府君􅀄除大理路儒學教授誌中書為文學􅁺用省文法也漢生兄宗傳時為江浙行省掾未㡬亦轉為台之臨海尹陶氏一門父兄子弟其不墜書詩之業徃徃知自奮如此䆠牒之蟬聮此盖其􅁠輿㢤前史官金華宋濂題茂承齋銘閩人鄭子尚世惇書詩為良士其父周可君􅀹能以道自娯子江浙行樞宻院管勾漢生之􅀁請其時則至正二十三年漢生將南轅復求嶺北行省左丞臨川危素太朴書後一年太朴還中朝承㫖翰林始為作烏界道繕謹寫就㑹南北道絶附海舶至江南以歸漢生又一年漢生自江浙行省檢校官陞行樞宻院都事贈府君承事郎福建江西等䖏行樞宻院都事府君之妻趙氏亦贈宜人漢生既奉命書􅀕告扵墓下復欲請仲舉􅀘入誌中而九京不可作矣乃并仲舉舊撰宜人墳記聮為一卷傳示子孫使有􅀁徴焉府君􅀄除大理路儒學教授誌中書為文學􅁺用省文法也漢生兄宗傳時為江浙行省掾未㡬亦轉為台之臨海尹陶氏一門父兄子弟其不墜書詩之業徃徃知自奮如此䆠牒之蟬聮此盖其􅁠輿㢤前史官金華宋濂題茂承齋銘閩人鄭子尚世惇書詩為良士其父周可君􅀹能以道自娯􅀁居曰至德里並舎北南環植以蒼松鼓髯奮爪儼􅀂蛟龍然甞喟然嘆曰始者拱把爾今則大􅀅十圍人之種德其亦有􅀋扵是乎御史鄭公過而嘉焉名之曰松庄云周可君既乗風御氣㳺神扵冲漠之墟而松固無恙寒光凉翠益翹然發舒子尚日徘􅆦其下仰而慕俯而疑悵然其􅀂思已而曰先子不可見矣倘能承􅁇之庶㡬其不死矣乎乃取詩􅀁謂如松栢之茂無不爾或承之語扁其齋曰茂承盖萬物榮扵春悴扵秋各繋其逢唯松也舊葉將落而新葉已生􅀁以四時而恒青子尚欲承父志無湏􅁷間㫁其􅀅常茂而益榮者㢤子尚亦善扵取譬者巳子尚以明經試天官歸教長樂郷校其􅀅行也介國子録趙伯庸来徵予銘銘曰有松丸丸􅀆于彼郊坰来者既續􅀆徃者始零衆悴黄霣􅀆其色獨青嘉名斯建􅀆象􅀋之精父經能傳􅀆扵粲其榮繼􅁇承承􅀆􅁢有餘馨毋玩葩澤􅀆忽彼堅貞太史造銘􅀆勒扵軒楹戴亭張氏譜圗記張出自􅁎姓青陽氏苐五子揮爲弓正始造弓矢寔張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有卿士張仲其後裔事晉爲大夫張侯生老老生君臣君臣生趯􅎅生骼骼孫曰抑朔至三卿分晉張氏事韓匕相開地生平凡相五君平生良字子房其孫子寔蕃分布四方有安定范陽太原南陽燉煌􅁱武上谷沛國梁國滎陽平原京兆清河等四十三望大抵皆良之裔故唐􅀄定清河爲乙門其􅀁由来者逺矣句容戴亭張氏自汴而遷則始扵大理評事要皆出扵四十三族之中屢更兵燹圗譜䘮不能言其爲㡬世評事生謙三傳至􅀖寕􅀖􅂋􅀖寕生孝仁孝榮孝仁生景逢景逢生應珍􅀿蘭應珍生郷貢進士志禮孝榮生溧陽學諭景先次元英景明景先生應開應熈元英生玉山教諭應辰金壇稅務副使應麒次應麟應時應麒生四子遂遷金壇應麟生志逺志逺生文賢文賢生允隣允逹允成景明生應和應和生志頴志頴生文原文原生伯常􅀖顯生日升日升生思恭思恭生雲霓雲霓生天麟天􅃬天福天􅃬生文昌文昱文圭文昱知青陽縣自謙逮今十有二世析為三十四支而族属之衆􅀅數百人當科目之興也以五見其棟試者各有其人冠衣濟如劒佩鏘如論道德而談唐虞􅌭紛而舒徐人或造之但見其棟宇鱗次術徑交羅朝夕循環扵詩書爼豆間竟迷其西東故鄕之稱望族者一則曰戴亭張氏二則曰戴亭張氏云先是應和甞扵譜廢之餘蒐采而圗之未盡其詳而殁其孫文原出而􅀘其闕請序扵申屠推官駉未㡬又廢扵兵文原之􅀙子􅁢逹恐愈乆而愈忘也乃以耳目之􅀁記䟽其大槩来謁扵予曰先生有職扵太史氏其言必見信扵世幸不鄙而文諸碑予因不辭按史表之法書而遺之嗚呼圗譜局之不見即令史之不設大小宗之法遂廢而弗之講􅁢逹䏻惓惓扵圗譜之􅁱亦可謂賢也巳􅁢逹有上行􅀹致謹扵先世遺文裝潢成卷而珍襲之其扵崇孝廣敬之道盖有知無不為云曽侍郎像賛身形之瘦弱也則山澤之臞精神之􅇒厲也則列仙之儒愽極諸書而守之則約智用群􅀋而䖏之􅀂愚當議禮而考文較損益扵錙銖稽百王之軼典翼一代之鴻圗豈非飬德之􅃾造道之樞而為􅀦之耆艾􅀖之􅆱􅀛者乎盧龍清隠記盧龍山在京城西北二十五里周遍十二里髙三十六丈山嶺綿延逺接石頭乃江上之􅀜塞比扵北地盧龍山因名和陽尊帥駱月溪􅀮居其中自號曰盧龍清􅀮請予友王儀曹本道徴予文以記之本道述月溪之言曰古人有云心不溷濁謂之清迹不章􅂋謂之􅀮予學老子之法者也朝暮黄梁一盂苜蓿一盤既適而且安間披鶴氅衣手執黄庭經一卷翛然而凝坐九衢十二陌之㳺塵莫我之干也寧非清邪名氏不落扵聲利之塲心迹不属乎榮辱之境其入也烟霞與之同棲其出也漁樵與之争席寕非􅀮邪然而老氏之道清凈而無為􅀮約以無名不以清為清不以名為名是則無􅀁不名可以治􅀦可以􅀚兵可以􅁱身可以延齡其小靡不該其大無不并此其為清􅀮益大矣吾甞聞之扵師而未之能行也姑就其近似者而究心焉雖然予視古仐不翅一旦暮何為復膠膠扵斯人身至中其體含虚不縦不横非東非西纎如黍珠鴻包玄區火龍因之而飛􅆋水虎以之而生􅃾庶㡬騰神紫府吹簫玄都此殆忘清􅀮之名而食其實也邪其言􅀂是先生以為何如金華宋濂聞之嘆曰月溪盖㡬扵知道者非歟其始也􅀅欲遁世其中也又知其道可以治世其未也又思長生而度世縦予有􅀁言其何以加扵三者之間㢤扵是偕本道訪月溪扵盧龍山中白月獨照萬􅀣僵立無風乃握手歌曰盧龍之山􅀆髙岏有儒一生􅀆煉九還夜半月出􅀆露浸寥壇紫霞仙人􅀆駕采鸞七星為衣􅀆夫容為冠鉄笛一聲烟漫漫擷靈芝􅀆下空山歌巳二人者相視而咲遂次苐其言而為之記送陶九成辭官歸華亭序君子其可必扵仕乎曰否可以仕可以不仕曰仕而不仕亦繫其逢乎曰否可仕而不仕不可也可不仕而强扵仕亦不可也唯其義而巳曰義之􅀁在柰何曰義者宜也當其可之謂也欲當其可非守道君子其亦戞戞乎難矣㢤嗚呼斯人吾不得而見之矣得見其次焉者斯可矣天台陶宗儀九成有學之士也僑居華亭之泗涇飲水著書多至一百餘卷㑹朝廷設六科以求賢郡守遂以九成為薦將授之以官九成慨然曰不仕古云無義當草昧之􅀄兵戈未息法制未定民氣未蘇吾不可以不仕不仕何以觧生民倒懸㢤今天清地寕六合一家論道經􅀖皆䕫龍稷契之彦趋事赴功多龔黄姚宋之儔四方人士樂􅀚治化之成贏糧而馳騖者動千餘人無事扵吾也吾可以不仕矣去而為巢父為許由為嚴子􅁜擊壌而歌以為太平之幸民不亦可乎白之銓曹銓曹􅁢之列之丞相府相君嘉之扵是九成翩然東歸薦紳之家咸唶曰九成之出䖏其亦合扵義㢤或曰非是之謂也九成有弟曰宗傳近擢代縣令曰宗儒妙柬為選曹郎官九成之意以謂一家不可以俱仕恐妨進賢之路故力辭之不特如前􅀁云而巳也曰是未知九成者也九成伯仲之才不為不羙矣其問學不為不充矣九成之志豈不欲如河東之三薛清江之三孔虎林之三沈番陽之三洪蜚英聲扵當時􅀣芳烈扵後世其􅀁以果扵辭榮而謝寵者亦度其時可以不仕也避嫌云乎㢤雖然九成之歸也結廬泗涇之上日坐臯比横經而講肄之子弟􅀙之者皆知􅀁以孝弟忠信出而事君又皆知能致其身之義九成有功扵國比扵它仕者留心簿書期㑹而不知教化者又為何如㢤苟謂之仕亦可也抑予聞國家稽古右文大興文治嚴禁林清切之選増成均弟子之員有如九成之賢其在􅀁棄乎在􅀁取乎九成行㢤席不及暖突不暇黔予知鶴書之赴隴矣九成必不􅀎扵果不仕矣九成行㢤蘇州重􅁱孔子廟學之碑蒲坼魏公守姑蘇之明年鋤暴樹良無令弗肅上下洽和百廢具興惟孔子廟學弗治棟楹傾欹丹堊䵝昧若不􅀎支旦暮者公顧瞻良乆愀然弗寕乃登僚寀縣令丞暨尚義之士咸集于庭喟然嘆曰皇帝以神武定四海即大興文治詔以明經六藝之科頒示郡邑使選弟子貟肄講明體適用之學􅀅以人文化成天下今弊陋至是非􅀁以靈承帝意予先􅂢俸為倡爾二三君子幸相與圗之穹殿􅃉廊䖍奉明禋靈星之門神道􅀁繇其役為㝡殷呉江􅁑徳潤爾其葺之論堂有嚴兩廡相嚮挾以六齋以通于前門呉江寗璇汝其􅁱之亭􅃅采芹下臨康衢来㳺来歌多士攸冝崑山張庸爾其整之公言未巳呉江令許茂進曰邑有八士曰李庚等頗有意乎書詩尊經之閣先賢諸祠㳺息三亭以至庖湢橋梁之属茂率其承之長洲丞丁師尹復進曰許令然矣師尹獨不可為乎􅀂止善堂及中廊逹于閣者當諭群儒使賦金俾里􅂄唐晟視其役焉公大悅唯周垣四千八百尺未有􅀁属僚􅀂佐遂以罰布佽􅂇而呉縣令曽輔驩然趍功役邑夫畚粘土繩繩而来事因大集始事扵洪武六年二月戊辰而訖功于十二月某甲子如翬斯飛如雲斯凝如濤斯湧深沉而潔清宏麗而靘宻一還承平舊􅀚公帥其属執豆􅇼具脯􅊽以成功告􅀚者如堵墻莫不嗟嘆自兵興以来學宫􅀁在蹂踐為􅇕而姑蘇幸僅存非公之至㡬何不與之俱廢乎教授貢頴之旣宣力扵始終復使訓導張田請記其事以垂不朽惟蘇之有學實始扵范文正公盖公景祐􅀄出守郷郡擇南園之地奏請于朝而建是學為其師者則安定胡文昭公也計當時人物固甞盛矣􅁆百載之下仰其聲光慕其風烈毎使人發不可企及之嘆自時厥後雖有賢愚而學之興廢靡常而二公過化之地流風遺俗終未泯也况今遭逢有道之朝而得良二千石為之師帥豈徒然㢤然公興學之志不下扵范公者也則夫坐臯比而談經藝者其必􅀅取法扵文昭乎明體適用之學吾知駸駸然向盛矣茍不務出此而摘英搴華為譁世取寵之具非區區􅀁敢聞請是刻諸麗牲之碑庶㡬蘇之人士知􅀁自朂㢤公名􅀚字把山通周易為人䟽逹無疑滯如八牎玲瓏見義勇為雖千萬人不可遏􅀁至輙烈烈有聲同知府事李􅁠通判徐弼推官超霖皆􅃅一時之選與公道合故成事無難者碑為􅁱學作前代興造各自有記皆不書唯當書者不敢拘扵文體而不致其詳焉系之以詩曰姑胥之墟有川滮滮折趋南園匯而東流靈氛中啓渙爛弗收自非聖師疇恊其休昔有哲人出綰郡章乃搆學宫乃建廟堂廟堂章章學官將􅀅衿佩洋洋来翺来翔盛衰相因揆理則然風摧雨蝕上漏旁穿矧丁艱虞烽火相連誰舉一臂持危扶顛大明當天九服攸同叶􅍴搶歛翳奎璧吐芒睠我魏公来涖大􅀖屢形扵言我敢迨遑既率部封復登府僚分勞授事具乃教條曽不一朞厥功孔昭化此朽腐欝為岧嶤孰敦化原孰築教基孰牗民􅃔匪學􅂚為我語蘇人公豈爾私耳目苟具必致其思思之如何法孝與忠二者無媿行􅀅天通震澤有石其堅比銅史官勤辭用昭無終泰和劉氏先德録序惟劉娃出自祁其後生子有文在手曰劉累因以為名事夏孔甲為御龍氏子孫在啇更為豕韋氏又更為唐氏至周又更為杜氏杜氏生士蒍為士師因官命氏又更為士氏至晉士㑹入秦雖復歸扵晉而子孫留秦者遂稽劉累之名别姓劉氏此得姓之􅀁由始凡六更矣自秦歴漢世有其人而劉氏蔓延于四方其在今廬陵者實出扵發之後盖發生倉倉二十餘傳始自長沙遷金陵後唐天成間復自金陵遷廬陵之泰和圗譜之家可徴也或謂􅀙彭城徙建業又徙西昌者殆與􅀁聞異辭泰和之傳况與兄雅弟戎皆通文學雅生俊戎生光而絶况生嵓崟岑耑崒耑生遜遜生生諒諒生利濟利宿利簡利槩遺胤日滋分為四巨族宋自嘉祐壬寅至寳慶乙酉一百六十四年中舉進士者二十有二自熈寕丙辰至寳慶丙戍一百五十一年中擢進士苐者八授經扵庠序蜚聲扵州縣遐邇相傳以為盛事鄊􅀖之間推故家文獻者一則曰泰和劉氏二則曰泰和劉氏云况之七葉孫安尉宗回愳世系相傳乆而或紊也始重著譜圖一編十二世孫黃陂令宣復増􅁱之十六世孫鍔復益廣其未備首譜其宗支次表其世科次輯其遺文而名公卿之為劉氏作者亦􅀋觧焉通名曰先德録鍔之三子麓崧埜復旁搜曲探倘可入編中者悉謄附焉亦可謂不忘其先者矣崧與濂為文辭交力以首簡請為序歐陽氏有言曰自受姓命氏以来歴唐虞三代􅁆千載間詩書􅀁紀各有次苐豈非譜系傳之百世而不絶歟嗚呼此濂因崧之請而重有嘅扵斯言也士大夫間孰不曰尊祖而敬宗孰不曰辯同而别異及叩其􅀁自出輙舌彊不能下甚至王父之字有不及知者其􅀁以逺扵禽獸者㡬希此無它詩書之澤弗加譜牒之修不謹不知玩愒之弊遂至扵此也有若劉氏恪守明訓集其承傳次苐垂二十代支析派殊整比可􅀚非世濟其羙而能然邪自時厥後苟引之而弗替雖至扵百世不絶可也劉氏之子孫上慎旃㢤抑濂􅀚劉氏之中利濟則輸家粟以給邉餉好先則折獄不阿人莫敢變或欲鑿􅁃嶺以通漕運復論罷之獬則憫饑泯輕䧟法網而出諸死地令猷則辭迓吏白金毅然弗之願㓜文則􅂢縣帑以紓長沙制帥之難是五君子者其事多可稱而獬及令猷寔同年進士胡中簡公銓周文忠公必大為銘其墓是宜後人之􅀁取法濂􅀁􅀷望者非持繼􅁱其譜圖而已也劉氏之子孫上慎旃㢤崧元名楚至正丙申曽用試取江西郷試苐二十一名文觧今入兵部為職方郎中階奉議大夫文章政事見重當時人謂其能世其家云徑山恱堂禪師四㑹語序根有利鈍故􅀁教有異同悟有淺深故􅀁印有小大施其善公得法􅆟蚤乃出四㑹語俾題首簡予􅀼聞之入奥室者􅀎探扵幽䆳升危岑者始瞩扵㝠茫松月大師印公禪林之獅子法海之長鯨也其稱禪師之道髙扵圓照佛照二公其言豈虗發者㢤惟賢知賢盖可徵矣仰前哲之風徽作後武之矩度究其遺轍足證新功是録之行其必有超然獨得扵語言之外者乎旃檀大愛妙色三經小引先佛􅀁說旃檀香身大愛妙色三陀羅尼經皆西天譯經三蔵朝散大夫試光禄卿明教大師法賢奉詔􅀁譯其在法蔵與瑜珈大教王經凡二十七等同車輦字凾中功徳􅀁􅀍或療悪疾或救海難或出生際諸􅀑趣資以觧脫誠心求之靡不應感盖我如来大誓願故神通力故慈憫有情故一彈指頃即􅀎成親無邉殊勝經言可信真實不虚天界沙門太􅀄肇公信之為􅀹力扵是命工鍥梓以廣流通介其同抱一林桂公徴濂引其首大佛法廣如虚空然無始無終無内無外苟欲繪畫而賛咏之非愚則惑矣始書其槩以起讀者之信心云故天台朱府君霞塢阡表孝子之扵親􅂚甞有紀極㢤唯恐其嘉謨懿行不暴白扵後世也件繋群事既有状矣􅁕以昭于人人又有玄堂之銘銘比㧋著矣又有阡上之表焉盖辭之重􅴰者事必着甚㢤孝子之心其有􅀁慎乎仙居朱府君之卒多歴年􅀁其子公立既請縣大夫前進士魏俊民爲之銘其二孫木棐猶以爲未􅁕復来徴予文表扵墓門揆扵古義合矣予乃按状而書之曰府君諱嗣夀字得仁姓朱氏世居台之臨海宋殿中侍御史希述其逺祖也殿中君六世祖友直仕爲宣撫司某官始遷仙居之東門至府君又六世矣府君之生岐嶷而􅀷沈豊厚而敏慧自爲童子時風岸孤騫昻然野鶴之在鷄群見者莫不異之及㳺鄕校擩嚌群經食芳而潄􅃾充然􅀂有􅀁得且曰古者爲學精神心術一寓之扵事爲或慮其有不正也必資體驗擴充之功􅀁以皓首窮經不敢䡖寘之若拈華􅎥􅃩鉥心劌腎扵辭章間陋之陋者也自是撫世酬物一出扵正而異端無實之說了􅀂不經意事父母輙盡其孝奉異母之兄甚扵同毋者凡事必咨禀而後行遇弟有㤙及其蚤􅂢舘舎諸􅀌貧䘮不得入土府君泣曰兄弟同氣也死而不塟吾心其安乎即命堪輿家卜地而蔵焉夫妻相敬如賔自委禽至髪白無反目之失教諸子力田孝弟不許事紛華靡麗遂名堂曰順徳且賦詩以示意待族姻廬井曲盡人情不以貴富賤貧而爲薄厚䟽数春秋􅀕其先儀文並循家禮升降跪拜如􅀅見聞其容聲人取以爲法治家甚嚴子孫朝夕冠帶承􅀱顔色拱聽訓􅅚不命之退不敢退也晚年築室東園藝鞠花数十本當秋髙氣清金錢纍纍然布柔條間府君熟玩不忍釋去或對之酣觴清詠終曰且謂人曰鞠誠吾良友吾殆托之以逃名乎逹忠介公兼善時出鎮于台聞府君有賢行􅀅剡薦于朝府君謝曰仕􅀅以得祿飬親也親亡以仕何爲㢤逹公亦不敢􅆠未幾遘疾府君度不􅀎起召子􅀂孫訓之曰吾晝夜兢兢業業以克至于今日非爲仰不媿俯不怍抑且可以見祖宗扵地下汝等守爾孝弟篤爾忠信蹈爾禮義厲爾廉恥庻幾不䧟扵有過之域吾雖死􅀅含􅀏入地矣已而遂卒時至正乙未十月二十一日也享年六十又九府君曽祖懋宋郷貢進士祖智父元豪􅀘武學生妣應氏金氏府君金出也娶同縣吕氏先十三年卒子男子二公立公成公成先四年卒子女子一􅃴楊􅀪祖孫男六木松棠棐棣楫木棐即来謁文者孫女一歸吕志尹卒後當某年月日葬于縣東一里馬裊山霞隖之原禮也嗚呼士君子之立身也其功名烜赫扵世則登名扵國史其次焉則書諸郡志又其次焉則藉薦紳之立言者以傳及其久也未甞不與史志相爲頡頏有若府君之行斥乎澆漓葆乎醇熈一本乎真誠而弗事乎詭随此􅀁謂一郷之善士非歟是宜掲之崇阡以爲聳善扶世之計而􅀁愧者予非其人也雖然予久居禁林海内名公卿及賢士大夫􅀁銘者多矣鮮有徴文扵十九年之後者而木與棐有焉則其久不忘乎親可知矣予雖欲辭之而烏乎辭之􅀂木與棐者亦可謂之孝孫矣乎是爲表題劉氏官誥後宋誥太氐沿㰍于唐唐􅀄以􅁓肅宗朝有用絹者貞元以後始易爲綾其制凡三變宋則自國􅀄至季年一皆用綾此其􅀁以異耳烏傷劉公亮以中奉大夫致仕贈其父俊太中大夫盖大夫乃秦官取掌議論之義漢署太中大夫厯代因之而不廢至宋元豊官制行則以之易諌議大夫若中奉之階始置扵大觀間而古制則無之也中奉六世孫剛久􅀙予㳺持誥耒求題予見名門右族未一再傳祖父之名諱有不知之者剛則􅀎寳此扵一百四十餘年之後剛亦賢矣㢤故畧據􅀁見以告之同郡宋濂記宋學士文集卷第十八鑾坡集卷第八
