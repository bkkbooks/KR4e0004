  text: 宋學士文集卷第十六鑾坡集卷第六
  hash: sha256:6c6e041481d158b5c4c4ee24b9f0e8637a123fa66f5ff81a180ca36baf014f40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_016-1a}
body:
  text: 禄命辨三命之􅀃古有之乎曰無有也曰世之相傳有黄帝風后三命一家而河上公實䏻言之信乎曰吾聞黄帝探五行之精占斗剛􅀁建命大撓作甲子矣􅀁以㝎􅀊月推時候以示民用也他未之前聞也曰然則假以占命果起扵何時乎曰詩云我辰安在鄭氏謂六物之吉㓙王充論衡云見骨體而知命禄覩命錄而知骨體皆是物也况小運之法本許慎􅀃文已字之訓空亡之􅀃原司馬遷史記􅀌虚之術蓋以五行甲子推人休咎其術之行已久矣非如吕才􅀁稱起扵司馬季主也㳂及後世臨孝㳟有禄命書陶弘景有三命抄畧唐人習者頗衆而張一行桑道茂李虗中咸精其書虗中之後唯徐子平􅀹造其閫奥也曰十一曜之說古有之乎曰無有也書云在璇璣玉衡以齊七政􅀁謂七政日月水火金木土也而無紫氣星孛羅睺計都也星孛数見扵春秋或見大辰或入北斗紫氣則載之史冊與氛祲同占羅睺計都者蝕神首尾也又謂之交􅀄交中之神􅀄中者交食之㑹也借此以測日月之蝕也唐貞元􅀄李弼乾始推十一星行暦鮑該曹士蒍皆業之士蒍又作羅計二􅀮矅立成暦起元和元年及至五代王朴著欽天暦且謂蝕神首尾頗行之民間小暦而巳􅀂吴伯善若甄鸞􅀂劉孝孫􅀂張胄玄之􅀁造但云七矅而不聞有十一星也曰然則假之以占命又起扵何時乎曰洪範云月之􅀙星則以風雨冷州鳩云武王伐殷􅀊在鶉火月在天駟則以星占國亦巳久矣而未必用之占命也曰以星占命柰何曰予甞聞之扵師其􅀃多本扵都利聿思經都利盖都頼也西域康居城當都頼水上則今􅀁傳聿斯經者婆羅門術也李弼乾實婆羅門伎士而羅睺計都亦胡􅆊之語其術盖岀扵西域無疑晁公武謂爲天竺􅆊學者扵此徵之􅀹信也曰術之縁起則吾旣得聞命矣然亦巧發而竒中乎曰有固有之而不可泥也何也且以甲子幹技推人􅀁生嵗月展轉相配其數極于七百二十以七百二十之年月加之七百二十之日時其數終扵五十一万八千四百夫以天下之廣兆民之衆林林而生者不可以數計日有十二時未必一時唯生一人也以此觀之同時而生者不少何其吉㐫之不相同㢤吕才有云長平坑卒未應共犯三刑南陽貴士何必俱當六合誠􅁕以破其舛戾矣三命之􅀃予不􅀎以盡信者此也天以二十八宿爲體體則爲經有㝎􅀁而不可易以五星爲用用則爲緯恒絡繹乎其間或遅或㽞或伏或逆固有常度而可以理測苟謂􅄤某宿則􅁻歴某宫則㓙猶或可言也設其星有變其行不依常經而犯乎河漢内外諸星又􅀅何以占之㢤或如前􅀁謂生同一時者其􅄤次無不同吉與㐫又何懸絶㢤夫萬物皆出扵五行安有五行之外又有四餘土木行度最遅而爲吉凶者久故有餘氣而氣爲木之餘計爲土之餘猶或可言也水之餘則孛火之餘則羅果何􅀁取義㢤水火􅁟木然矣柰何金獨無餘氣乎或謂相生故有而相剋故無亦非通論也况孛乃妖星或有或無而氣羅計三者本非星也不知何以有􅄤度之詳㢤十一曜之􅀃予不􅀎盡信者此也曰秦漢以来諸儒推十二國分野十二次度数及􅀁入州郡􅄤次毫􅁵若無差忒者旣可占國豈不䏻占人乎曰天運地維動静不同故先正云有分星而無分野占國者不可盡泥也占國者不可盡泥况占命乎曰五星之精發乎地而昭乎天其分配十日十二子名雖殊而理則同也人資天地以生山林之民毛而方謂得木氣之多也川澤之民黒而津謂得水氣之多也得火氣之多則丘􅁜之民專而長也得金氣之多則墳􅄛之民晢而􅇤也至扵豐肉而庫則得土氣之多而􅀁謂原隰之民也然則彼皆非歟曰五土有異而民生以之此固然也人之賦氣有薄厚長短而貴冨賤貧壽夭六者随之吾不䏻必也亦非日者之􅀁􅀎測也蹈道而􅁱徳服仁而惇義此吾之􅀁當爲也不待占者之言而後知之也予身􅁱矣倘貧賤如原憲短命如顔淵雖􅀳椘之冨趙孟之貴彭鏗之夀有不䏻及者矣命則付之扵天道則責成扵巳吾之􅀁知者如斯而巳矣不然委命而廢人白晝攫人之金而䧟扵桎梏則曰我之命當爾也怠窳偷生而不􅄝學至老死而無聞則曰我之命當爾也剛愎自任操刃而殺人柔暗無識􅄬繯而絶命則又曰我之命當爾也其可手㢤其可乎㢤􅀁以先王之山川異制民生異俗剛柔緩急遅速異齊五味異和噐械異制衣服異冝扵是􅁱其教不易其俗齊其政不易其冝􅀁以卒歸扵雍熈之治也昔者鄭大夫禆竈言鄭當火請以瓘􅕌玊瓉禳之子産不之與已而果然竈復云不用吾言鄭又􅀅火子産曰天道逺人道邇非􅀁及也鄭卒不復火嗚呼此不亦禄命之似乎吾知盡夫人道而巳爾曰近世大儒扵禄命家無不􅄝談而樂道之者而子一切屏絶之其亦有􅀁本乎曰有子罕言命題織圖卷後宋髙宗既即位江南乃下勸農之詔郡國翕然思有以靈承上意四明楼璹字壽玉時爲杭之扵潜令乃繪作畊織圖農事自浸種至登廩凡二十又一蚕事自浴種至剪帛凡二十有四且各繫五言八句詩于左未幾璹召見遂以圖上進云今觀此卷盖􅀁謂織圖也逐叚之下有憲聖慈烈皇后題字皇后姓吳配髙宗其書絶相􅀋豈璹進圖之後或命翰林待詔重摹而后遂題之耶卷甞蔵小谷余先生家其後有雙岩鄭子有困學鮮于伯幾􅀁䟦二公當時名流翰墨皆可寳玩􅀟岩謂題字爲顯仁􅅊后􅀁書則恐未然也嗚呼古昔盛王未甞不以農事爲急豳風之圖不見久矣有若此卷者其尚可􅀗之耶碧落碑䟦尾絳州碧落碑唐髙宗咸亨元年庚午􅀊韓王元嘉之子訓等爲其妣房氏造碧落天尊像扵龍興宫而刻其文扵背故以名碑然不知何人書據李旋之玉京宫記以爲陳惟正李漢黄公記以爲李訓之弟譔殆莫䏻㝎而翠岩龔聖予則又以爲宗室瓘豈或别有􅀁考耶吳叡張天雨讀爲喧爲曜者非當以釋文鄰字爲是俞希魯辨叨作叩亦大佳而釋文則又訛矣盖此碑雜出扵鍾鼎􅂐籕諸文其亦戞戞乎難知㢤􅀙水􅀙人說文中音乃歴翻溺則音奴弔翻釋文今借㲻爲弱亦恐非本字之義而其他可疑者甚衆考禮之冗未暇及之姑識其後俟􅀶雅君子正焉智永真草千文䟦尾梁武帝欲學書命殷鉄石扵二王帖選取千文復召周興嗣次韻一夕而成湏髪爲白此事最無可疑王著扵淳化中摹勒諸帖上石見帖中􅀁書海醎河淡等字人謂爲章草之宗遂誤指爲漢章帝􅀁作著固不􅁕責後村劉克荘乃宏博之士何爲承著之謬而謂千文實始扵漢邪克荘姑置之歐陽文忠公名世大儒其撰金石録䟦尾亦謂法帖有漢章帝􅀁書百餘字其言有海鹹河淡之􅀋盖前世學書者多爲此語不獨始扵羲之抑又何邪非米南宮黄長睿力詆之新學小生未必不爲其􅀁惑余久憤扵中因題智永􅀁書千文故特表而出之智永名法極羲之七世孫字畫之佳則有不待賛也玉兎泉聮句引洪武五年秋九月十又五日日入酉予與仲子璲過張録事孟兼扵成均秉燭對坐孟兼方命侍史汲玉兎泉瀹茗俄熊參軍鼎劉職方崧周虞部子諒皆集相與談詩至愜心處輙抵掌咲譁吕太常仲善聞之亦驩然来㑹既啜茗已孟兼出新造玉兎泉銘諷之且曰今夕何夕勝友如雲不可無以爲娱請舉泉聮詩何如衆皆曰然予年有一日之長俾題其首句餘則以次而續闘險據勝閧閧弗䏻休至二皷詩成各擁衾就榻逮雞再號風􅀨凄迷載􅂗官事有程皆不告而散予亦􅀐驢去朝天矣明日孟兼􅀅屬璲作小楷繫詩扵銘左徵予爲之引扵戯人事聚散如風中飛花其囬旋飄泊􅂚嘗有一㝎之跡今幸得與二三君子岸幘咏詩辴然而一咲豈非天㢤然此七人之中楚産者太半獨予父子與孟兼居越西相距僅半舎他時或後先投簮而㱕支九節笻訪孟兼白石山房遡咏諸賢立霄漢上欲一見不可得取此卷之閱恍如聚首成均時寕不有慰扵寂寥之鄕也邪孟兼子諒皆以字名熊君字伯頴劉君字子髙予則南宮散吏金華宋濂也詩曰成均地何靈聖澤資灌沃濂兎奔兆竒徴井渫發新斸鼎自非三窟􅀷孰湛一川緑孟兼儲精本􅀙金生色絶勝玉子諒霜毛蘸寒飲雪毳翻夜浴崧釀洌􅀘酒經沐丹驗仙籙仲善杵㫪蟾宮棄珠噴鱣堂觸璲孕月生隂精觀天漏晴旭濂氷澄毛骨竪鑑澈須眉燭鼎㕙名徒自竒檜行􅁾難贖孟兼雖􅉼東郭狡難洗上蔡辱子諒引滿瓶未羸􅊥幽綆頻續崧流罌渗銀床出竇濺瓊粟仲善醉沃目暈花凍汲指連瘃璲濡毫乃自潤照影􅀙人欲濂光沉天上魄祥啓地中躅鼎摛辭挹餘清盥薦侑嘉告子諒劍刺非二師池移豈身毒孟兼燕支愧瑶陳塩鹵鄙富蜀崧不動疑窪雪頻摇咲風纛仲善天光一眼􅄏雲影片鱗束璲􅇵嚥覺瘳􅱵蹶􅁕想彳亍濂觱沸虎􅀲跑􅆽吸􅆐臂臼鼎㓗士濯冠纓渇卒缷刀韣子諒精當卬君降液或井宿督孟兼誰知鍾宿分脉與伊洛屬崧錫名爾固嘉戰句吾何局仲善聮􅀅指鼎比疾勝擊鉢促璲驚風落燈燼斜月墜擔曲靈源詎􅀎窮短咏􅂓可錄濂元故奉訓大夫江西等處儒學提舉楊君墓誌銘有序元之中世有文章鉅公起扵浙河之間曰鐡崖君聲光殷殷摩戞霄漢吳越諸生多歸之殆猶山之宗岱河之赱海如是者四十餘年乃終瀕終召門弟子曰知我文㝡􅀷者唯金華宋景濂氏我即死非景濂不足銘我爾其識之卒後三月吏部主事張學暨朱芾等七人奉其師之治命來請濂既爲位􅂘復繫其爵里行系而造文曰君姓楊氏諱維禎㢘夫其字也裔出漢太尉震震十八傳至唐分爲四院第二院大師虞卿生堪堪生承休承休生嵓五季時錢氏有國嵓仕至丞相自譜爲浙院嵓之孫都兵馬使佯徙浙水東又分爲浙左院佯之子成􅀮居㑹稽諸暨之陽復爲諸暨人君之十世祖也髙祖文振曽祖文􅁱以善􅄝義聞人呼爲楊佛子祖敬父宏贈奉訓大夫知温州路瑞安州事飛􅀐尉􅇷封㑹稽縣男妣李氏追封㑹稽縣君宋丞相宗勉四世孫也當縣君有姙夢月中金錢墜懷翼日而君生大夫公摩其頂曰夢之祥徴其應扵爾乎稍長􅀙師授春秋說講析辨刺幾踰百十家大夫公期以重器至弱齡不爲授室俾㳺學甬東粥廐馬以益裝錢君節縮不妄費購黄氏日鈔諸書以歸大夫公驩曰此顧不多扵良馬邪躬爲装裭使之周覧泰㝎丁卯用春秋擢進士第署台之天台尹階承事卽天台多􅃛吏憑􅁜氣勢執官中短長先以餌鉤其欲然後扼吭使不得􅄍一語世號爲八鵰君廉其姦中以法民方稱快其黨頗蚓結蛇蟠不可觧君卒用是免官久之改錢清塲塩司令時塩賦病民君爲食不下咽屡白其事江浙行中書弗聽君乃頓首涕泣于庭復不聽至欲投印去訖􅀗减引額三十俄相繼丁外內艱結廬扵桐原墓族屬有酹墓者植竹笻扵前笻發孽芽枝葉欝如也自是不調銓曹者十年㑹有詔􅁱遼金宋三史君作正統辯千言大司徒歐陽文公玄讀之歎曰百年後公論㝎扵此矣􅀅薦之又有沮之者㝷用常額提舉杭之四務四務爲江南􅇵曹素號難治君曰夜爬梳不暇􅀐驢謁大府塵土滿衣􅁭間有識者多憐之而君自如也轉建徳総管府推官陞承務卽君悉心獄情必使两造具備鉤擿􅀮伏務使無􅁈民居無何陞奉訓大夫江西等處儒學提舉未上㑹四海兵􅅍君遂浪蹟浙西山水間及入國朝天下大㝎詔遺逸之士􅁱纂禮樂書頒示郡國君􅀍命至京師僅百日而肺疾作乃還雲間九山行􅌪疾且革移拄頰楼中呼左右謂曰吾欲觀化一巡如何乃自起􅄬筆撰歸全堂記頃刻而就擲筆曰九華伯潘君招我我當徃車馬俟吾且久遂泊然而逝似聞数十人􅀙凾道登楼其歩履之聲相接時大明洪武庚戍夏五月癸丑也年七十五及門之士上書扵郡守林君公慶以封塋爲属林君欣然從之擇地華亭縣􅁱竹鄕干山之原以六月癸亥舉柩藏焉君􅀄聘錢氏忽遘惡疾錢父母請罷昏君卒娶之疾㝷愈􅁇鄭氏陳氏子男一人杭鄭岀也孫男一某女一未行􅀁著書有四書一貫錄五經鈐鍵春秋透天􅀜禮經約君子議歴代史鉞􅀘正三史綱目冨春人物志麗則遺音古樂府上皇帝書勸忠辭及平鳴瓊臺洞庭雲間祈上諸集通数百卷藏于家􅀄君爲童子時属文輙有精魄諸老生咸謂咄咄逼人暨出仕與時齟齬君遂大肆其力扵文辭非先秦两漢弗之學久與俱化見諸諭撰如覩商敦周彛雲靁成文而寒芒横逸奪人目睛其扵詩􅀹號名家震盪凌厲駸駸􅀅逼盛唐驟閲之神出􅀑没不可察其端倪其亦文中之䧺乎名執政與憲司紀者􅃩君之文無不投贄願交而薦紳大夫與岩穴之士踵門求文者座無虚席以致崖鐫野刻布列東南間然其風神夷冲無一物縈懐遇天爽氣清時躡􅄚登名山肆情遐眺感古懐今直欲起豪傑與㳺而不可得或戴華陽巾􅀍羽衣泛畫舫扵龍潭鳯洲中横鐡笛吹之笛聲穿雲而上望之者疑其爲謪仙人晚年益矌逹築玄圃蓬臺扵松江之上無日無賔無賔不沉醉當酒酣耳􅀬呼侍児出歌白雪之辭君自􅀝鳯琶和之座客或蹁躚起舞顧盻生姿儼然有晉人髙風或頗加誚譲亟罵曰昔張籍見韓退之退之命二􅁎合彈筝琶以爲樂爾謂退之非端人耶蓋君数竒諧寡故特託此以依􅀮玩世耳豈其本情㢤性䟽豁與人交無疑二賤而賢禮之如師傅貴而不肖雖王公亦篾視之平生不藏人善新進小子或一文之羙一詩之工必爲批􅀧黏于屋壁指以歴示客􅀹不錄人以小過􅃛奴􅀒君金度無以償逼君書􅀵劵君咲與之家藏古名畫爲西隣􅀁竊其傔人追執之君曰吾業與之矣無頼之徒僞爲君文以冐受金繒或疑以爲問􅀅發其姦君曰此誠予􅀁作也不論逺近皆知君爲寛厚長者云激者之論恒謂名者天􅀁最忌矧以􅀎文名則又忌之􅀹者也􅀁以文人多畸􅀌坎􅇄以終其身視冨與貴猶風馬牛不相及也嗚呼豈其然㢤彼貨殖者不越朝歌暮絃之樂爾顯融者不過紆朱拖紫之華爾未百年間聲銷景沉不翅飛鳥遺音之過耳叩其名若字郷里小児已不䏻知之矣至若文人者挫之而氣彌雄激之而業愈精其嶷立􅀂嵩華其昭囬如雲漢衣􅀍四海而無慊流布百世而可徴是殆天之􅀁相以彌綸文運豈曰忌之云乎嗚呼君真是已然君不可謂不幸也使君志遂情安稍起就勲績未必專攻扵文縦攻矣未必磨礪之􅀎精籍曰既精矣亦未必嵗積月累發越如斯之夥也斯文如元氣司化權者毎左右馮翼俾其延綿而弗絶則其燾育以成君者豈不甚侈也邪一世之短百世之長如君亦􅁕以不朽矣或者乃指此為君病豈知天㢤濂投分扵君者頗久相與論文屡極玄奥聞君之死反袂拭涕久之念君之不可再得不敢有􅀌􅀁属故爲具記其事而又爲些辭一章以代勒銘庻幾招君歸来矣乎其辝曰魄淵流金降空青些結英揚靈潰于成些獨􅀐麒麟傷遺經些衮鉞是非嚴天刑些孰軋以摧􅀔相傾些濬發厥辭益崇谹些芳潤内洽光精外刑些離方遯圓班部自寕些流霆下㫪百里震驚些鸞騫鳥瀾天機呈些鐡甲琱戈百萬宵征些茗翹頴竪媚韶榮些籠絡萬􅁚槖籥三靈些彈壓物怪晝夜哀鳴些九華丈人召還紫清些白鹿夾轂五霞軿些逥風翛翛雲繩繩些天人殊􅁤誰強攖些絳府雖樂毋淪洞􅄀些盍乎歸來返故庭些元故一鄕善士張府君墓版文浦陽江之上有大姓曰張府君天􅃬字君與懿然䔍厚人也自成童時輙知孝敬日趨大父毋父母側問衣燠寒而進退之年旣長益推錫􅀋之仁九族有弗振者時䘏其匱乏復懼族逺情踈築堂南山麓爲序拜旅飲之􅀁長㓜之節粲然不紊其扵惇愛廣順之道有􅀁頼焉然不是以爲􅁕寒食十月朔汛掃先世諸塋必歴告嗣人曰此爲某府君其名行若何支系若何本末如連珠巳而泣曰吾髪種種矣苟不言爾等當不知􅁟中爲何人慎識之勿使牛羊踐履其上平居正􅁭危坐終日不妄動即動􅁕跡亦有恒度撫世酬物一以誠有犯之者任其轇轕两耳如無聞尢不喜以疾言厲色加人人愈愛慕之雖傔媵亦􅀙化俯首趨功驩欣如也及殁不問賢不肖皆歎惋悼惜有至淚下者至今語及府君猶舉手加額稱之曰長者長者云府君之裔􅀄自清河遷巳歴十有三世曽大父維大父夢龍湖之儒學正父一寕妣方氏府君生扵某年月日殁扵某年月日夀若干以某年月日塟于縣西通化鄕施禮山原配室朱氏婦道克􅁱前卒竟合塟焉子三坦泰祐女三石某朱某楼鉄其婿也孫五珤福􅂹某某曾孫五某某昔漢之萬石君家以孝謹聞于郡國雖齊魯諸儒質行咸自以為不及若府君為人實有石氏之風柰何士習不古文有餘而行不逮尚有愧扵齊魯諸儒又何敢望君之藩垣㢤是可嘆已坦等遣􅀙孫太常丞丁徵濂勒銘墓門濂聞至正􅀄宗藩賢王有竒府君才者辟為營田總管府治中府君辭不赴今故不以為稱而題之曰一鄕善士張府君墓并感其事而銘之銘曰生之温守之仁發之淳行之新以􅅚其身以伉其門以壽其子孫故泰和劉府君墳前石表辭大江之西邑曰泰和世以藝文自著則歸之珠林劉氏劉氏傳裔至名鍔字宗榮者實號快軒府君淬徳砥行張甚及其殁也其子崧旣請李祁先生勒銘玄堂復慮遺善弗暴顯于世徴濂文表諸隧府君噐局方凝㓜與黄児㳺泳挺挺如野鶴在鷄群譲弗敢與齒長隷進士業一再不勝輙罷去攻六藝學必欲驗諸躬行故自治益嚴獨居屋漏􅌂若上交神明正襟危坐􅀙明迄曛不少愆厥度撫世酬物幾若言不出吻及見義事輙􅁬迅抃躍雖鼎鑊刀鋸在左右亦弗暇䘏厥父病痺五年晝夜不離床下調火煉良劑以進久不就衾枕至蟣蝨在中禪間族属塋域為􅀔家􅀁攘俗狃堪輿家書謂地氣䏻賤貴人多發故塜以􅄟新魄府君彈指曰殁者或有知肯瞑目九泉下乎即鉤索訟復之嵗甲午厲􅀑為人痾宗姓有一門垂絶尚遺三孽􅀌家遂􅁜夷閭師利之輙誘以為奴府君抱之長慟亟走白縣大夫曰鍔之族甞列爵王朝矣今嗣人多故無闔廬以蔽雨風無羞服以􅃴口體棲棲焉遑遑焉服為人奴鍔久病焉夫威以戢暴政以􅚘俗惠以懐惸惟我二三大夫是頼矧甞聞之戢暴義也範浴禮也懐惸仁也三者具舉為􅀖之道也為民上者其忍廢諸吾儕甿􅀠苟不徼靈扵二三大夫如無羽翮欲飛青寘無乃不可乎言畢涕與淚俱縣大夫惻然動扵中逮閭師問状勒歸府君府君食飲之而爲結其昬姻宗譜􅀅墜軼踈親無辨府君重輯之先代誥命遺文之属單牘片削皆謄附其中命之曰先徳録襲藏不翅拱壁出入恒挾以自随文獻粲然有可徴者府君客授章貢鍾氏夜漏下二十刻鍾之廬舎災烈風驅火趨之若驚蛇鍾猶弗之寤府君弗念􅀻槖之焚擊門大呼而出之甫出煙熖漲天鍾泣曰活我家百口者劉先生也府君馭家有政内外肅若䘮􅀕二者悉據禮經不用浮屠法人多化之一旦嬰疾人請斬牲以享􅀑神府君咲曰吾幸無愧徳􅀑䏻加害我乎力麾使去疾㝷愈其爲人知本有識􅀋如此状􅀁不列者或可例知也然推府君世系本出自長沙遷金􅁜唐天成間復徙廬􅁜之泰和以儒與仕籍者踰三十人曽祖震精扵詞賦宋季待􅀘國子未及官而卒􅃝鍈䏻􅁇侍􅀘君業較藝州庠名占前列父文度在元􅀄以文鳴受之元文敏公薦爲興國縣學師江西提舉司爲給付身當時以爲異数毋郭氏府君娶蕭氏􅁇郭氏蕭生丈夫子三麓楚埜皆明一經楚至正丙申鄕貢進士今改名崧仕爲職方卽中孫男四鼎觧舉平原鼎與觧已卒女五某某其婿也餘在室府君得壽五十八以至正壬辰閠三月十九日卒􅀄權暦故盧園中次改楓􅀣林次藏仙槎鄕姆之雙山仚某年月日也􅀁著書有中鴶汲清二集合若干卷云濂聞之先王盛世宗法建而本支著氏族嚴而孝敬興大分宣昭上覆下承迨及後世人僞沸騰而圖譜有局卽令史有職救弊㣲權猶扵是乎可徴今不復見之矣秦越肥瘠之歎徒有形君子之哀矜有羙府君行粹學精念一氣之攸分實同岀扵天經讋彊圉以歸墓兆急赴愬以㧞􅀌惸凡家牒之蒐輯遺編之分纂奚翅寳結綠而愛青萍盖文獻之宗簮􅌧相仍故濟德流祉不待教而遄成是宜壤􅀣内列辭章外旌庶幾垂後賢之憲則昭千古之休聲也㢤故􅀅仕佐郎雜造局副使王仲和甫墓碣余司業成均時王􅁢中爲日新齋生執經侍左右􅁢中神凝而志恬頗使人愛之閱二年􅁢中服厭冠躡苞屨手執太常丞張君􅀁爲状泣拜于庭曰􅁢中不天先子夀僅五十又七以洪武三年六月三日卒于家卜以是年九月某日窆于江寕縣鳯䑓西鄕石子岡之原而懸棺之石猶未勒辭􅁢中夙夜祗􅘨若􅀅殞于􅀷淵竊見士大夫卿公莫不得先生文以爲榮今縁洒掃師門之故􅀼有􅀁請倘蒙􅂌矜之先子雖殁猶不殁也予忴其志退而閱状􅁢中之父諱友直字仲和其先甞仕于宋南度􅀄自開封徙溧水之崇賢鄕以貲雄于里中自時厥後族屬日益衆殆且百家有諱某者復遷建康城中仲和之父也仲和善治生不動聲色􅀎使其家浸豐且莫窺有爲之跡聞名薦紳至必具􅇼豆􅉁􅊽長跪獻酒􅄴執禮恭甚人疑之則曰飬子弗訓是禽犢之也吾􅀁以敬士者其􅀅使儀刑則傚之乎扵是􅁢中亦知父意鑚研經義唯恐流扵窳怠仲和且朝夕程督觀其業稍進則喜見面顔仲和善煉汞爲朱太師李韓公聞之奏除雜造局副使階􅀅仕佐卽在官二載乃終嗟夫世之人􅂚甞不念孫子㢤務廢舉以殖貨利赱權勢以媒禄秩徒以斵䘮其醇熈顛隮乎險阻有至扵老死而無悔者仲和則使􅆂濡仁義爲善人君子之事苟謂之賢乎非邪記有之遺子黄金滿籝不如教子一經仲和盖近之矣仲和娶邵氏生四子長執中次則􅁢中次用中次時中一女其婿曰某銘曰人爲聲倀倀我獨守其常人爲利穣穣我且嗇而勿傷有子而良當教之義方佩申椒􅀆充囊集夫容􅀆爲裳彼崔者岡松桂蒨蒼百世之下人知其爲仲和甫之藏王君子與文集序經曰有徳者必有言此其故何㢤盖和順積扵中英華發扵外譬若水懷珠而川媚石韞玉而山輝其理固􅀿爾也不然則其本不立其本不立潢汗行潦朝滿而夕除風枝露蘤西折而東萎欲以示悠逺扵人抑亦難㢤濂扵西昌王君子與之文不䏻無􅀁慨焉子與爲人秉剛而守毅葆醇而蹈道其律已也不以夷險而易其操其接物也不以貴賤而二其節一履乎􅂗轍之正不違乎䋲尺之素融融乎森森乎不可企巳故其發之扵文根柢扵諸經􅆂濡乎百氏體製嚴而幅尺弘音節諧而理趣逺有益乎倫理之重不爽乎物則之訓世之論者咸謂􅀋其爲人不亦信㢤士之有志扵文者夥矣抽青嫓白組織文繡柔筋脆骨􅀧綴形似徒夸􅃩乎凡目已違拂乎恒性􅀁謂蠟其言梔其貌者其視子與有德而有言殆猶魚目之扵夜光嫫毋之扵西施也歟然而駑駘恨劣逸􅂹難攀雖幸同扵遺􅁤竟莫􅁇扵後塵盖山林之日長道徳之功􅀷子與則有之矣鹵莽而畊㓕裂而報若濓之進寸退尺者豈不爲甚媿者焉子與不我鄙夷俾序其首嗚呼三代無文人六經無文法非無人也人盡䏻文非無法也何文非法􅁗漢以来班馬之雄􅀷韓栁之古健歐􅂫之峻雅何莫不得乎此也子與功􅀷力久必抽其􅀜鍵而入乎閫奥矣他日投􅆪東還尚迁轅載酒􅀙子與問之洪武六年春正月既望太子賛善大夫金華宋濂序故秦毋夫人金氏墓志銘有序監察御史秦君文綱再拜而請曰惟墓之有銘尚矣莫原其􅀁始􅀁可見者殷比干之銅槃􅂐文漢光武時梓潼扈君之墓甎大槩以久託體魄爲祝毋夫人之殁于今三十又五年矣玄室之刻既愆于前懸繂之碑幸具又不勒其淑範扵後揆諸古義有或爽焉輙自造群行一通件繫而鱗次之願吾子爲之銘濂不敢固辭謹按状夫人姓金氏諱某字妙清􅂫之嘉㝎人父某妣某氏夫人㓜而􅀌朝虀莫塩時有不給即䏻惕厲安扵紡績織絍之事雖寒之折膠暑之鑠金不敢自暇自逸日處閫内人未甞識其靣久之族婣媪御無不合辭稱其賢同里秦府君某㳺學燕都還擇配未就聞夫人之爲請具六禮焉府君遂贅女氏夫人主饋非精鑿弗御烝甞賔燕悉中條序一言一行皆思麗于矩度無違越者生丈夫子四長即文網次某某某女子二􅃴某某孫某女某合若干人重紀至元已卯四月庚戍以疾卒家壽年僅四十三夫人存時諸子絶㓜唯文網稍長力使􅀙名薦紳㳺且曰是子也良吾􅀅期其名遂而身立爾及文網以文學􅁬􅀭于時致位清顯而夫人之墓木已拱矣嗚呼婦人之行不出閨門徃徃因其子賢而名彰聞有若夫人素行固嘉人何由知之今因文綱有立大夫士咸相謂曰是良御史者何人之子也其父母之賢有以訓成之乎扵是夫人之譽洋洋乎盈耳矣文網以道事君益竭其忠告之誠爵禄當益崇髙他時鸞誥載頒賁及泉壌夫人之名愈􅁕以不朽矣夫人之墓在縣之某鄕某山之原塟以某年月日盖與府君同兆域云銘曰承天矩􅀆循純熈和惠其􅂨􅀆有偘其儀積􅄛柔嘉􅀆女中之師熊膽和丸􅀆勵其令児豸冠朱衣􅀆符我素期冝福其榮􅀆闔胡悴之墓木櫹森􅀆凉颷凄其名在弗磨􅀆墓門有碑銅雀瓦研銘臨汾徐昭家藏銅雀瓦研獲扵彰河中相傳逾百齡兵部員外卽許珪以使事過之遂購焉質貞而文黝盖真物云太史金華宋濂爲造銘曰埏埴成胎資氣毋炎火一爍貞且壽禁雨逥風著勲久何㢤舞榭塵爾蹂天假漳河滌其醜出賛觚翰列左右虹光夜半上衝斗龍圖􅀛文首交紐要使遺文傳弗朽送張編􅁱赴南陽教授序河南張生翀奉㫖自國史教授南陽行有日再拜請曰翀也區區一布衣遭逢有道之朝􅀗肄業禁庭鑾輿時幸而勑戒之恩榮􅀁加喬嶽不􅁕爲髙瀛海不􅁕爲􅀷今者岀典教一􅀖思􅀁以弘敷帝訓甚懼弗稱願聞一言以自朂者予曰古者設五經􅀶士以教授􅀁謂教授者非官名也以之名官自宋慶暦中始然有漕司􅀁辟舉或以兼官或以士人而猶未肄朝􅋝也其命扵朝􅋝又自熈寕中始夫教授之職以經術行義訓導諸生掌其課試之事而紏正不如規者其責實至重也生然予言否乎生曰然予曰末也冶師雖知精鐡必加陶鎔而後成湛盧梓人雖知良才必施斤鋸而後成宫室知之何難當思􅁢蹈之爾生之徃也取群聖人之經列弟子扵堂下啓之迪之優之柔之饜之飫之使心與理相􅆂事與心弗悖庻幾材成而噐良矣生然予言否乎生曰然予又曰未也教道􅀁施貴在變通譬之木也視小大而加斤鋸焉鐡也察銛鈍而施陶鎔焉一槩而視之過矣生之徃也各因材之清濁學之淺􅀷過者損之不及者益之毋驟語以髙逺恐其凌躐而不遜也毋使安扵卑近慮其苟且而自畫也毋過扵嚴厲上下之情不䏻相通也毋失扵寛縦長㓜之節或致玩䙝也毋示之以非聖之書防其遁而離也毋習之以無用之文禁其􅆾而有僻也此六者皆變通之事也君子之立志不􅀗髙位以行其政令幸而得掌教一州焉亦不翅􅁕矣何也政令䏻禁民爲非而施敎者乃使民自不忍爲非人倫籍之以厚風俗因之可移顧有岀扵政令之上者豈細故也㢤生能􅀙事吾言庻㡬生不􅀒天子下不􅀒􅀁學矣生其徃㢤思盡心焉可也扵是生再拜謝曰翀雖不敏敢不夙夜祗奉予以生可進扵道也次弟其語而贈之生字鳯舉沉重有識量研窮遺經而造其閫奥出應書鄕闈嘗占前列云恭題賜和托鉢歌後臣聞自昔賢聖之君多菩薩果位中人慈憫衆生故乗願輪降生人間執符御暦如華嚴經云􅂬喜地菩薩出世爲閻浮提王其言盖可證也欽惟皇上撥􅅍反正岀斯民扵􅂗炭而袵席之既臨宸御洊建無遮大㑹于鍾山度諸幽滯􅀅行事上致齋便閤臣侍坐于側因問近者高行僧爲誰臣以前住持開元文康對文康頗著托鉢歌行世見寓古􅄏善道塲明日大駕幸鍾山召見文康索其􅁔􅀚之天顔怡懌遂勑奉御持歸又明日臣復入侍至夜二鼓上命两黄門跪張于前且讀且和運筆如飛終食之間而章巳成矣臣得而伏讀焉援據經論滔匕弗竭至扵西域心宗中多及之嗚呼自非菩薩應身辨才無礙而䏻􅃍至是邪越三日文康受賜而歸装潢成卷􅀅㽞鎮山門臣謂之曰前代帝王以王道真乗並用毎下壐晝護其教盖以隂翊王度而有功扵烝民也上今俯和文康之歌􅀁以推奨禪宗而勉勵其徒者其意亦猶是也文康尚冝勒諸堅珉導宣上徳以垂之無窮㢤建㑹在洪武壬子冬十二月文康因􅀍是賜又明年甲寅春二月始拜手稽首而題其後云劉彦昺詩集序余昔與劉君彦昺㳺見其賦詩多俊逸心獨竒之彦昺既别去間扵士友餞行卷軸覧其􅁔吟徃匕皆堪傳誦復益竒之後十年重㑹秦淮上亟問近什何如彦昺觧槖中得十餘篇余讀已大驚氣韵沈鬰言岀意表何其近謝康樂歟緼藉脫落不霑塵土何其􅀋岑嘉州歟渢􅎅乎仙洊英􅎅乎霞㪯又何其善學李供奉歟盖彦昺天分旣髙而人功又􅀷凢有摹擬輙髣髴似之予今猶舉其槩而言之也嗚呼予昔學詩扵長薌公謂必厯諳諸體究其制作聲辭之真然後䏻自成一家彦昺之學正與予同自媿跛鱉之行不􅁕以追逸􅂹尚何言㢤然又􅀼怪彦昺何以䏻致扵斯也頗聞其先人友梧翁乃月湾吳公之髙第善爲詩與文靖虞公文安掲公禮部吳公極相友善遂由縣文學薦入禁林未上而夭其家庭相傳必有卓絶扵人者不然彦昺之詩何爲膾炙人口而弗厭㢤其􅀎垂世傳後當不疑予耄矣文采衰矣不能有􅀁發越矣姑摭昔竒彦昺者爲之序以自附知言之士云彦昺名炳鄱陽人金華山人宋濂宋學士文集卷第十六鑾坡集卷第六
