body:
  text: 李徴君像賛􅄝義親賢以道自娛㦤㢤若人君子之儒詹士龍小傳詹士龍字雲卿光之固始人父某宋開慶中都統勇勝軍守鄂以偏師巡渠巴諸州與元兵戰南平身嬰九創􅀍執發憤不食卒元兵破鄂降其軍士龍生三􅀊同母胡氏北遷董忠獻公文炳以其父忠也鞠為子文炳長子名士選故命其為士龍飲食衣服一視諸子外人不能辨諸兄忌之罵曰虜子見􅄑乃同我軰耶士龍不知其故泣訴文炳文炳曰爾真吾子飛語慎毋聽也士龍哀祈益切文炳頗漏言士龍晝夜流涕欲復詹為姓受文炳邜翼恩深未敢言一日獵滹沱河遂陳前志文炳戯曰爾投石水中石浮吾當爾從也左右皆咲士龍仰天祝曰天若不絶詹氏石當浮因投石水中石盤旋急流中若沉浮者數四文炳以手拍鞍曰詹都統之靈其不死乎即令士龍復詹姓文炳薨為服齊衰三年􅀊時􅀕祀必先設神主率家人奠之士龍後用文炳弟文忠薦為髙郵興化尹士龍脩築捍海堰三百里數郡利之􅀄發地􅀗范希文石記曰遇詹再修事盖前定云轉兩淮都轉運􅁥使司判官改淮安路總管府推官拜江􅀯行臺􅁥察御史時姦臣柄國虐􅆋方熾士龍上章劾之未㡬事果敗士龍退􅀮興化葺草堂德勝湖上若􅀅終身朝廷念其老成以廣西㢘訪僉事起之居二年欝欝不樂乃移疾而歸年五十八卒子澍岳州華容尹文炳妻以􅀙女實因前好云史官曰精誠之格􅀅何􅀁不至上致日星之應下召物産之祥古則有矣今觀士龍投石之事其惡可不信㢤或者致疑天人之間視之若茫然不相通過矣予総脩元史時有司不以聞失於紀載因徇其孫婿余文昇之請刪其墓志為小傳一通以􅀓復古軒記臨川饒君孟持其五世祖某府君嘗􅄝琴琴有復古玉髄二張其材孔良蛇腹㫁而金沙明試一皷之獨鶴夢囬而滿山風露也寒泉漱巖而山􅀑夜聽也可謂清且古矣府君雖殁歴世寳秘不翅孔氏之遺􅂂時出玩之思府君之不可見􅁣然髙山仰止之情元季兵燹方張白晝為人持去煙海茫茫竟不知墜於何􅀁如是者有年一旦外孫樂安夏氏怱購得焉舉以奉孟持孟持反覆拂拭不覺悲喜交集玉髄頗殘闕唯復古嶽沼暉軫咸具孟持取水精絃􅀍之方布􅀲指其􅀄則嗚嗚然已而復洋洋然亦似傷其流落而慶其復還也孟持刲羊豕列豆籩燕饗三族合芳水為櫝尊閣堂中遂以復古題其榜云春秋之義大復古其謂復古者􅀁繫甚大非一􅄊物之謂也雖然有人於此闔廬為人􅀁攘巳而還之可以謂之復乎曰復則復矣而非古也􅆠畎􅟃於強暴取而歸之可以謂之復乎曰復則復矣而非古也巵匜桮棬之属為貪者􅀁竊四力追而有之可以謂之復乎曰復則復矣而非古也然則何謂而可斯二琴者相􅀓或為雷威􅀁斵由唐渉宋歴五六百年之乆􅀁􅀗非一人􅀁閱非一家始為府君之􅀁有府君之後又奪於他姓今復歸之孟持正如宝玉大弓之再得不謂之復古也謂之何㢤不可以一􅄊物之微而遽少之也然而予又有􅀃焉古之人朝出耕夜歸讀古人書今則飽食以嬉我當復之古之人入孝出弟如用菽粟布帛斯須不可離今或有凌犯之者我當復之古之人事君如事天一動二静􅌂如有赫其臨今則鮮有致其身者我當復之夫然故復古之功大矣二琴云乎㢤孟持勉㫋可也東軒集序東軒集者天台方君明敏之􅀁作也明敏仕於元嘗參知政事於江淛行中書􅁭韻蕭灑而氣岸􅊆如發於聲詩徃徃出人意表其弟明則繕鈔成帙同子學子桂慎請予評之予曰古詩俊逸超群如王子晋鶴背吹笙随風抑􅀭聲在雲外律詩清麗婉切譬猶長安少年飲酒百華􅂣中鶯歌蝶拍春風煦然撲人終日􅀓盃而醉色不起詩人之趣至是亦可謂之不凡矣明則曰請為之序以􅀓何如余曰寳劍薶於豐城而紫氣上浮於天猗蘭生於幽谷而秋馨播于九衢詩佳矣不必藉序以傳也曰此固然矣願卒一言之曰詩之古者莫三百篇􅀂也篇首各有小序􅀁以序作者之意而非後世通為之序也漢魏以降作者鮮自白其意讀之者不能知乃􅀻自臆度此為某事而􅀤此為某時而嘆使􅀂人不死即而叩之恐其未必爾也故予嘗有言作詩必自序非他人之可與聞此言似不可忽也曰固㢤吾子之為詩也可以序可以無序序之􅀅何傷焉余無以辭因取􅀁評者書之於首簡云明敏於書無􅀁不讀最善談名理與人交煦煦有恩意君子賢之其􅀁長者不特能詩而已也貞白堂記臨川許君仲孚闢貞白堂一􅀁與環翠亭相映接盖爲讀書地也間耒徴予記余聞仲孚清脩而嗜學堂下種梅花数􅀣當霜雪􅃊沍之際衆芳摇落而是花獨翹然散而爲春研氷玉其葩一塵不緇仲孚嘆曰其􅀁謂貞白者非子也耶乃約二三勝友日吟哦其下超然神逰如升天際恍不知貞白之在巳耶抑果梅之有貞白耶客有歌之者曰㳺氣冉冉􅀆􅀅汙人曠獨處􅀆誰與鄰姑射仙人􅀆玉爲神􅆖靑鸞􅀆服素裙朢之不見􅀆隔河津青鳥不徕􅀆㑹無因仲孚􅀙而􅆳之曰天風翛翛􅀆生翠寒白月流光照松壇羙人徕􅀆佩􅃢􅃢殷勤遺我青琅玗我􅀅擣之奉晨餐􅁔巳二人相視而咲予家芙蓉山之陽懸崖萬丈蒼官青士日駢立乎其間方滴露研朱入朝眞洞點易聞仲孚之事不覺矍然而嘆曰我等其有激而然耶雖然物我之立皆成於相形而泯於相忘非貞則無有偏也非汙則無有白也予嘗觀心皦如明鏡中懸萬象自見求其貞白且不可得况假物之云㢤况乎天地中萬彚芸芸自形自色杳不知其故雖造物者随氣運行色色形形亦若不知其故是果孰為之樞紐乎問諸兩間兩間不言叩之百物百物不言質諸神扃則曰是在我矣斯貞白之義巳仲孚曰子玄言也不知者謂渉於虚無恍惚殆非也請記諸壁何如於是乎書李太白像賛元行臺治書侍御史亦憐真班􅀁藏李太白像係秘閣傳本吾友危君太樸嘗為之賛自後流落於金陵駱氏酒家洪武己酉秋郡士王宗􅄎購􅀗之尋以摹本見貺因造賛曰長庚降精下為列僊陵厲日月呼噏風􅃄錦衣玉顔揮毫帝前氣吞閹豎視若烏鳶頻挫萬􅁚随機囬旋金童耒迎絳節翠􅎶下土􅁾濁孰堪後先辴然一咲􅀐鯨上天元贈武略􅀅軍同知臨洮府事武􅀐尉追封榮陽縣男朱府君墓志銘府君諱壵字子厚姓朱氏其先出于唐同鳳閣鸞䑓平章事敬則之裔敬則居亳之永城世以孝義􅀍旌顯一門六闕相望而子孫􅀹貴富􅀖人慕艶有金頭公銀頭公之號兩族叙昭穆而塟占地百餘畝亦目曰􅈗相林則當時簮笏蝉聮朱紫赫赩可知矣世逺譜癈子孫分適他州莫能䆒其詳府君銀頭公之後也五世祖某宋建炎􅀄扈蹕南渡寓於霍丘仍以貲雄于時曾祖某通判淮安州祖某提點夀春府稅課司遂居夀春之下蔡父某咸淳末嘗舉進士未及官而宋亡入元以儒入仕授為無州學正母胡氏府君㓜不好弄嶷然如老成人及長孳孳嗜學求名講師而事之知觧旣至不欲墮於一曲凡天官地理卜筮醫藥之屬咸䆒其玄㫖晚而學易隂陽消長之理􅁻凶存亡之故観象玩辭使心與理相􅆂無少爽者終日黙坐視流俗紛紜絶不與兢人以為迂則咲曰主静乃吾學也郷鄰有闘者諭以訟終凶之義釋然而去若不能凶䘮及無食與衣者竭其力周之自奉甚儉一豆一簟猶不尽食事􅁇母張氏如親母唯恐有毫􅄠違其意令聲流聞莫不髙府君之行郡國􅀅辟起之不听部使者行縣又以茂材舉河南行中書遂署安豐路儒學正府君曰與其身有虚名孰若心無慚德辭不赴郷子弟擔簦􅀙之㳺日談道德仁義刮摩其故習亹亹數千言弗倦暇則皷琴咏詩以自娛或時出佳山水間歗􅁔忘返夀始五十以延祐戊午秋九月某日終于家以某年月日塟于縣西孤山祖瑩之左娶劉氏子男三人曰某曰某曰復女一人適某元季府君以復貴贈同知臨洮府事階武畧􅀅軍勲武􅀐尉爵滎陽縣男劉氏贈滎陽縣君入我國朝河南山東相􅁇降復例遷京師有薦其文學於上者得召見擢國子􅂇教侍經親王陞燕府參軍轉長史予時沗職禁林兼青宫賛善日與􅂧㳺復凝重醇慤有儒者氣相予甚重之會子􅀩㤙歸田復持燕相府録事楊哲之状求銘府君墓哲序事精贍且燁然有竒氣於是粗加櫽括而繫之以銘銘曰水若有源長流弗􅃜豈無潢汙朝滿夕除猗歟府君逺有世序􅀖人􅃩之緜延簮組􅄝書不厭㡬欲成癖晚而潜心我學吾易觀易玩辭孰出範圍參諸天人或驗事爲􅀤聞于時郡國交辟有儒一宫可涖其職縻身下列揖拜上官豈若肥遯白雲青山令子旣􅂋褒贈攸冝九泉􅄀􅄀燁其有輝况今遭逢六合重熈龍光下􅀍行當見之􅀌山欝蒼中有玄堂太史勒銘永固其藏題蛱蝶圖後右蝶戯長春圖乃院人馬逺子名麟者􅀁畫羙人樸頭蝶筆􅀔圎勁意非李伯時不能到二畫皆絶品也舊時曾落宫掖故其間有上兄永陽郡王及楊妹子之字妹子縱能工書作畫未必能及此題者專指祐陵以為言則恐不然也題文天祥手帖予嘗見文山公與黄伯正手帖云贑州大姓起義旅相從者如歐陽冠侯等凡二十三家史多不載其名今莫可考矣寧都陳蒲塘父子亦二十三家之一乃因􅀙子景茂請銘于公荅書僅存而其氏名因籍以弗泯不亦􅄑㢤􅀚公興言宿昔為之哽涕之言則其有感於蒲塘者深矣題大慧禅師遺墨後右大慧和上泉公為僧淸立􅀁作䟽凡一百九十四言乃公七十一􅀊時書其凌厲橫逸之氣老而不衰於此猶事見其髣髴人知仰公者唯知􅀃法如雨如雲覺悟群迷而不知其忠義耿耿注意於家國者甚篤縦有知其忠義者而又不知其戯㳺翰墨循蹈矩彠亦自可􅀓不朽嗚呼若公之應物無方事謂如神龍變化不測者矣䟽文不局於駢儷之體而特學趙州公案為言無非欲大法以昭示人人後来沈溺葩藻而於道無􅀘者其尚以公為鍳㢤淸立字無欲公嘗稱其堅厲入道蓋亦佳士云乕林處士賛虎林處士王君年踰七十而視聽如少壮時其孫監察御史􅂹􅀙予受經者久間来請賛賛曰素􅄠埀埀中心熈熈儉勤作肥家之本􅃊厲為馭衆之基好施之仁乆而彌篤嫉惡之氣老而不衰吹鳯簫於明月之夜飛羽觴於百花之時大布寛衣容與委蛇不知者謬稱虎林處士知之者以為瓊䑓之神仙乎而元故從仕􅀰興化路􅄣管府經歴李公墓志銘有序公諱約字審􅀄姓李氏唐江西観察使憲七十世孫而憲則西平忠武王之弟七子也憲為􅀽州刺史遂家属縣之宐春五世孫服遷分宐之白芒里七世至時舉宋忠訓郎復迁􅁻之廬陵縣忠訓生舟迪功郎龍南縣尉龍南生允元􅁢元生去邪去邪生則武則武生誼元􅀄廬陵鳳山書院主領即公之父也公有大志應進士舉不利即棄去飄然㳺燕都逹官貴人見其儀観秀􅊆舉為茂材異等署縉山縣學教諭未機改龍泉轉太和州學正永州路太平寨巡檢江州路學教授廣東宣慰司辟為令史以年勞上銓曹除贑州路􅄣管府知事攝司獄之職廬陵毆陽某商番禺道出于贑必假舘楊氏楊逋其泉乆弗償毆陽與絶交楊銜之毆陽自番禺還贑值灘險覆舟楊誣其詐不輸稅于官官下毆陽于獄公㢘知其實白出之楊服罪張甲有妹歸李乙為婣家兄弟甲與周丙共牛而耕丙僦乙屋以居巳而甲因他事持刃自刎死乙與丙不相能陳丙殺牛而甲不􅀙遂見害丙不禁搒掠自誣服公徴其牛牛存遂釋丙非􅇳乙抵罪冨氓頼氏兄弟兄無嗣弟産二兒曰􅀖獻曰􅀖毅弟以疾卒瀕卒請於兄曰願以􅀖獻為兄後􅀖毅弱未有知􅄑司其業劵俟長還之越数年兄亦卒􅀖獻欲軋没之􅀖獻􅀁􅁇母心為不平悉取授􅀖毅􅀖獻訟弟與母媵人私遂盗劵去吏持為竒貨乆不觧公召其兄弟于庭泣謂之曰官政成即代去兄弟埀白相與居與其殚財而健訟􅂚若分財以全骨肉乎兄弟皆叩頭請自新且致二鹿加厚弊為公夀公却之兄弟請益切乃受其一轉興化路總管府經歴階􅀙仕􅀰其為政如贑州民􅁈得直者多請浮屠誦佛書徼福于公公不頋也屬縣仙㳺令馬某虐用其民民不堪陳一壼謀變㷊其官署馬趨匿山澤中大府檄公捕一壼仙㳺民聞公至皆執刃驩呼共縛一壼寘檻車縣境帖帖部使者謂非公攝縣事不􅁕寧民強起公赴之民復驩曰父母耒矣公至未乆馬􅃍出視事公辭歸老父百十人列訴部使者願㽞公使者曰李公義士爾能固請必不忍棄汝翌日老父剪綵為旗幟銜使者命徃迎公不得已􅀙之􅋹香遥拜者前後数千里馬慚其庭中人以語侵公公正色曰仙㳺本良民汝旣激之反乃嫉人撫摩之邪明當訟汝矣馬俯首不敢言會亢旱公徒歩兩舎禜雨於龍湫或曰山髙氣寒非挟纊弗可公不􅀙旣而大雨公遘疾趣具湯浴浴正衣冠而坐呼其次子属曰今日午時吾􅀅終還家可語同氣宐以忠厚存心也言未畢公􅀁乘馬淚下如注公遂逝日簿暮民髣髴見公乘白馬揚靑旂疾行道上騶􅀙甚都冉冉入城隍祠中咸異之馬幸公死夜使人􅄬石公家為妖恠民忿之列挺為俻馬乃止一日馬同其黨五人禱城隍神五人者拜起見公㩀神座其色毅然驚怖而出未㡬皆暴卒馬亦為盗􅀁殺云公夀六十三至正癸巳五月十五日卒丁酉三月充奉柩歸郷里某年月日塟于東向山之原娶郭氏男三人長徴次即充次永女二人適冝春彭琪􅁻水楊致道孫男四人誠諒謙讓諒即来速銘者孫女五人皆未行予聞天地正氣人藉之以生者存則爲良臣殁則爲明神此無他浩然不屈運行於􅁳􅁳之中誠能福善而禍􅁋也郷先達喻公良􅀝爲台之臨海丞有仁政其卒也人兢夢爲其社神列旌旗鳴鉦皷而去自時厥後屡著灵嚮其事與公頗􅁼人心天理焉可誣也法當銘銘曰浩然之氣塞乎玄黃君子養之至大至剛生爲良臣死爲明神有光燉燉亘古弗泯猗歟李公爲政孔仁滌􅆡洗􅁈以子遇民􅊇雛無知公徃捕之民兢而趨縛致檻車孰焉夢夢激成禍㐫不以爲勲覆忌於公民之戴公不翅􅄌父翩然遐征我民心苦白馬靑旗騶􅀙師師入于神祠十目􅀁窺嫉惡剛膓死亦不渝廟食有嚴生氣凛如銘以昭之偉㢤丈夫重興太平萬夀禅寺碑銘洪武七年七月二十四日皇帝御武楼下中書右丞相胡公惟庸率百官晚朝上若曰太平府萬夀禅寺宐復還浮屠氏彼道家者流當自造玄妙觀居之先是有詔江東諸州縣各㽞寺􅀚一區以聚道釋之衆余皆罷斥寺適在􅀁斥之数玄妙観道士以觀基卑陋而寺之室宇尚虚擅假之以為棲止之地越十年皇上知之故特有是詔於是緇流咸集手持香華望闕遥拜以謝􅃂恩旣退復相與言曰寺即吳之化城當吳之時佛法雖至中國而大江以南則無有也赤烏中康居沙門僧會實来祈􅀗釋迦文佛真身舎利始創三寺其二即金陵之保寕海鹽之金粟其一即今寺也在郡治西北若干歩及宋武帝築凌歊䑓於黄山嘗幸寺中立為二十八子院度僧一千人寺益増重由唐以来􅀹多名僧其淸升者築舎利塔大戒壇淸風亭李太白同季父陽氷耒㳺為賦詩亭中有升公湖上秀燦然有辨才之句縣令李玄則新造銅鍾白又為作銘一時高風雅韵固已照映古今矣宋景德間􅃙改化城為萬夀而安撫使張安國書其門額自時厥後明悟大師萬新来為住持當世名士如楊次公郭功父皆與萬新㳺其倡酬之詩至今人能誦之元祐􅀄僧文耀進聖德頌六首朝論嘉之奏􅃬紫衣師號建炎三年寺燬於金兵紹興年郡守郭􅊆因築州城移寺於武雄营其地去郡冶之東若干歩重構之功則􅄌濟大師藴文也􅁇藴文而主寺事者乹道元年則法淸併子院為二十而去其八宝祐年則妙浄修放生池鑿石架梁於其上元大德元年則善才創外三門及重閣五楹間嚴奉一大藏教天暦二年則喜聖建大雄調御之殿重紀至正四年則宗明鎛大鴻鍾而覆以岑楼惟兹蘭若自吳至今巳歴一千二百有余􅀊名人軰出後先經營匪一朝夕矧又遭逢有道之朝尊崇象教使既廢而復興吾儕敢不竭力上承徳意寺舊以甲乙相傳子院尚存一十有八盍若合爲一更爲十分禅刹請髙行僧主之言已衆僧翕然同辭走白扵當塗縣曰百福住山海嚴智公廣􅄌圎悟大師曇芳忠公得法上首也踐􅂂無愧古人願使居之縣言之府府上之儀曹曹曹達于中書得報下如􅀁請海岩旣涖事勇於有爲旣葺調御殿重飾佛菩薩護法天王諸像又建圎悟堂九楹間改子院殿堂作水陸􅆊變修内外三門築周垣三百六十餘丈其用功􅀊月則自七年之冬以至十年之秋云海嚴以成之爲不易也命道證妙期来徴予記予以年耄辭而天界大禅師泐公及虚白杲公力爲之請乃作而言曰世䧏道微斯民益難治頑嚚狡狂日接踵而生非西方大聖人演為果報之􅀃豈易懾其非心㢤桞子厚􅀁謂隂翊王度者是已歴伐帝王敬㳟匪􅈈而聖世為􅀹隆盖以此也况萬夀為一郡之首刹海岩與其徒殚志畢慮唯恐有廢墜又援荆國王文公􅃽山故事合諸子院而為一亦可謂之賢矣雖然有成有壊世間相耳毗盧楼閣不離世間不即世間斯得萬劫而長存者善學佛者又當於此求之銘曰像法東流達于眞丹赫􅀆焞焞如日行天大江之南河獨不照神師實求敷其化導精誠上通􅈼之益堅設利忽降有聲鏗然啓大伽藍如䁀斯峙兹惟化城表法攸􅀉背孫渉劉大駕􅄑臨翠華鸞旂焜燿叢林唐宋之間名緇軰出丕建法幢為世楷則薦紳􅃩之投分惟勤光華􅀁及五色成文髙風雅韵照映今古人天􅀁瞻如到寳􅀁泰運方新室廬尚虚孰意鵲巢而鳩耒居皇明照燭洞見毫􅄠詔下九天還其故物龍象駿奔有嘆有吁自非帝力奚能致斯乃鳩乃功乃萃乃積精白一心以承休徳夷者崇之䵝者飾之缺者完之仆者植之棟宇翬飛丹彠藻麗兠率天宫来移人世有鍾鍠鍠有皷龎龎􅀃法于堂其聲孔􅀭聲孔􅀭黑白􅋍听結習皆空各正性命惟皇御暦手執金輪與佛同仁覆燾無垠太史造銘賛􅀭帝德鑱諸堅珉昭示無極題張尚書具慶堂卷世徒知父母之存為具慶至若人子能發聞于時以􅂋榮其父母父母雖殁而有不􅃿者存孰不為之慶幸斯亦可以謂之其慶君子職之而世人未必能知之也錫山張君惟中以碩學雄文致位大宗伯海外蠻夷無不知其姓名其弟􅀁安又能慎守先緒敬其兄如敬父兄䆠京師数耒省候之乆而後去猶依依不􅃘别士大夫咸指曰是兄弟也良可謂不死其親矣故入其庭升其堂者榮光休氣浮蕩於後先儼若二老人龎眉鶴􅄠據筵咲語此無他名不死則其身如不死矣為其婣連為其僚友莫不慶愜于心豈獨其家之子若孫㢤不然則父母雖存名氏不出於里閈聚散日逐於斉民縦曰不死與死相去盖無㡬雖日有三牲之養其為慶也隘矣惟中伯仲舊以具慶名堂近􅀊父母亡墓上之木巳拱猶旦旦念親如存若具慶時毎謂人曰我父母未嘗亡也嗚呼可謂能孝也巳濂與惟中交最宻不翅異姓兄弟故探其志而䟽之以附送􅀁安序後雲故巾山處士林君墓碣銘予来南京索文者接踵而至多以衰耄力辭一日有持隴上白雲槀相示者勉強一視之彬彬乎卿雲也英英乎嚴花靘妍也冷冷乎若幽人狷士飲氷而嚼雪也予亟問之斯何人之詩也持者跽而荅曰宗之先子􅀁賦也先子諱茂濬字􅂋之姓林氏世為天台望族生平酷􅄝吟上自漢魏下逮唐宋諸家無不漱其芳􅃾挹其真醇積而後發發必竭尽其興趣雖雕胃􅅣腎弗頋也嘗搆一室深廣尋丈内外以堊塗之白色晃眩若積雪􅀄霽月光穿漏雖赤日如火涼氣亦翛翛然生先子澄坐其中而吟事益暢遇嘉明至焚香啜茗談古今事上下三千年玉貫珠聮絶纚纚可聽或取雅琴皷一再行起歩白雲縹緲間逺近望之以為神仙中人晚年頗􅄝金丹之學取周易參同契與二三友講之嘆曰一氣孔神無為之根水火交搆載其营魂浮㳺規中存之又存粗􅁾既澄㳺神九門奈之何狷棄之邪乃調息致修耴心一物一道一之􅀃自呼為三一子通玄之士多竒之集賢院聞其操行清絶不樂仕進因其􅀁居巾山以巾山處士􅃅之先子弗欲也吴元年丁未九月二十八日夜漏下三刻大兵下台城先子亟出沒于河年六十又三洪武八年乙邜某月日塟于臨海縣興國鄊慶善里亀溪之原惟先子素行敦􅅚親仁善鄰具有㤙意而􅀁謂白雲槀者􅀹為時􅀁􅀓誦墓門有石不肖願圖文鐫之微􅂋闡幽在先生一揮翰間耳敢再拜以請嗚呼予為文􅀁累㡬欲燔毀筆硯若而翁者其事有可書如此又安能靳一辭耶遂序其事而繫之以銘䖏士曾祖某祖某父某母某氏先配杜氏生珤􅁇室章氏生宗即耒速銘者以學行舉于朝授南陽府同知鄧州事遷太原府通判女二杜元昭金仲德其壻云銘曰不􅃩于榮不徇于聲一以詩名弭其人麄發其天倪龍虎功齊􅀉情五絃羽衣蹁蹮望之若仙尸觧于河其幻則那夀何少多邈㢤紫虚有鶴耒歸千載之思聲外鍠師字􅀃曇鍠上士以聲外為字請予為之􅀃夫鍠鍠之聲也聲果在外乎曰外也鍾雖在内其扣擊之也其音逺􅀭或一里􅀁焉􅂉四三焉􅂉十焉鏗鍧震撼如雷霆發於太空果在外非内也然而人必有形而影始随之天必行雲而雨始􅀙之銅必成鍾而聲始應之不然則􅅮泥肖鍾叩之則紞然寂無遐聲削木為鍾撞之魄然縦有聲不踰於户閾矣如是謂之内可也非外也此猶渉於偏也由體以達其用内而外也從末以推其本外而内也此猶局於􅄊也一沙之内法界具焉内乎内而非外也虚空無尽何有限封外乎外而非内也此猶未能忘乎境也我無内孰能求吾之外我無外孰能求吾之内此非内非外也非外非内則内外混融矣雖然聲無内外也心有内外也心生而内外生心滅而内外滅即大䧺氏􅀁謂知一切法即心自性者也心實即有心虚即無慎勿為内外􅀁惑也余嘗宴坐般若􅂣中深入禅定有鉅鐘朝夕出大音聲我未嘗聞之也此無他􅀁聞既􅄫能聞亦泯能􅀁双絶非聞聞而聞聞自見矣於斯時也求声之在内者尚不可得况聲外者乎上士以聲外字爲盖欲離夫聲塵而超出其間也非謂鐘之聲有内外也然有外則有内既曰聲外而未忘乎内是逃影而行日中也予惧其泥夫迹也因辨聲之有内外者以貽之上士四明人蒲庵翁入室弟子也禅宗教典皆潜心探頥而􅀹精詩文叢林中咸敬祝之蒲庵寓居京師護龍河上上士凡三次来省士大夫髙其行義雲故􅏦峯先生府君墓志銘大江之西南昌名郡有􅏦峯先生其學以聖賢爲宗其文以理氣爲主其行以忠信爲本其接人以明體􅃴用爲教其生也人尊之師之其殁也人又哀之慕之殁後二十一年而門人弟子與其孤翰林脩撰善圖其不朽者甚悉乃集群行成書而以銘文属筆於濂濂􅀼聞先生多著書大扺研精易禮之學而及於邵子先天横渠正䝉諸書共若干万言先生之言曰先天之學心學也其圖皆􅀙中起其前無古而後無今大之為天地小之為民物顯之為礼樂幽之為􅄦神逺之為闔闢之􅀄終近之為瞬息之起止莫不具焉邵子以命世人豪乃探是圖著為皇極經世書性命物理之􅀃重明於世學者徃徃厭其难棄而弗講予於是有經世書􅀃張子正䝉書實與太極圖通書西銘並􅀓而未有為之註釋者余於是有正􅂪書􅀃礼經殘缺巳乆朱子雖定為儀礼經􅀓而其輯録多出於門人勉齋黃氏與信齋楊氏其中予奪多有未㝎余於是有礼􅀃易之為書廣大悉備伊洛大儒雖嘗論著而其義皆愈索而愈無窮予扵是有易􅀃吾道不行於時而其見於言者不過如此而巳嗚呼觀先生之言則其心之􅀁存者􅀙可知矣濂雖不文敢不大書揭於墓道以為後進之観云按状先生諱􅀮老字子方姓朱氏南昌之豊城人曽祖某祖三德父應岳母楊氏先生自㓜輒劬書須􅁷不少怠母若兄頗以為迂靳膏油不多給秋霄月朗毎挾􅁽映讀之冬則拾枯薪及􅅡松明以􅁇欣然若忘其憂時江村姚公某泳齋洪公某洌泉趙公某皆宋之遺老淹通六藝之故而桂荘涂公應雷又逺承考亭朱子遺緒先生咸執經叩請莫不交與之且曰朱生令􅄊也他日􅀁成當無譲古人􅀒笈而歸兄以先生不事生産作業力求析㸑先生不得巳悉以羙田與之自取不毛者由是家䆮貧􅂉憐之􅂆其俯就科目庻得禄為親養一踐􅂣屋不中益潜心於聖賢之秘窮索於經驗諸身心唯恐有不合者久之心與理􅆂瞭然如辨黒白遂倡嗚道學於荷山之陽四方學子悉􅀙之逰先生顔貌嚴毅若不可親近設有疑問如撞巨鐘小大随應無虚發者􅀄先生伯父曰應五曰應祥曰應焱與其父皆􅁕以師表州里龎眉白髪大布寛衣金舂玉撞塤鳴箎恊使人望之而啙窳之意消至是先生又能纉承之不墜士論多之至正壬辰春三月江淮兵動郷之􅁖少年爲變殺戮到鷄犬耄倪皆竄匿先生猶操觚正冠衣而坐􅀙容語鈔掠者曰貲財任取之書籍非尔􅀁好也及其再至四三至先生復曰吾家巳罄矣爾􅄑他之盗素聞其名咲而去無敢縦火者西東鄰数十家皆籍是􅀗完先生遭時多艰召族婣子弟戒之曰吾宗素以清白相􅀓寜寒餓而死不可爲不義而生終無敢犯教者不􅄑以至正丁酉十二月八日卒家未殁語善曰吾著書多未脱槀芟䌓􅀘闕之責尽在於汝吾以数推明年江西當大變汝當謹避以免难吾今無􅀁若精神如常時但覺氣息漸微爾已而遂亡戊戌夏四月偽漢陳友諒䧟南昌果如先生言後七年癸邜十二月􅀄一日始塟於􅏦峯之下娶涂李二氏男一人即善克紹其家學者也女二人歸縣人虞淵鄒􅁩孫二人象環逢掖􅁚環通五經大義年十九前卒孫女一人適羅夀亦里之良族曾孫一人興祖曽孫女二人尚㓜濂聞君之立必在乎逺且大者干禄以行志其澤可􅀍於當時著書以明理其功實垂於後丗孰短孰長人必有辨之者雖然人心漓矣士習陋矣翻經取題而媒仕進者有矣求髣髴如先生者尚可得耶銘以昭之亦發濂之深􅁣云爾銘曰古之聖哲何為作經牖人天明使反諸誠世衰道微耽厥口耳搴英摭華以經為戯繽紛外馳奚􅀘身心宝用瓦礫棄其南金考亭􅁬興上􅁇伊洛完經翼􅀓日星照灼豊城之墟天産碩儒􅃩其流光漱其芳􅃾堂虚露涼膏油莫續挾冊于庭借月為燭優之柔之茫然遐思饜之飫之如啖甘肥内存于心外著於目明命有赫吾敢不肅出而倡道荷山之陽有聲泱泱逹于四方執經之徒雲合川赴若飲衢尊充􅁕而去俗易風移惇我民彛天不憗遺孰不涕洟玄堂沉沉妥厥靈爽尚􅂌後人胡福是享永思堂記永之爲言長也􅀁謂永思者長思而不忘也長思而不忘者爲誰福清林榮得仁也得仁十􅀊䘮父洎長以縣諸生貢上太學選入禁庭爲承􅃙􅀰謙慎而齊􅅚聲譽出薦紳間會濂朝京師乃来請曰榮也念父不見或食焉或羮焉或􅆍且息焉恒懸懸有思思之不得則升髙逺望草木之敷􅃾山川之欝紆萬物欣欣有自得意􅂺泫然流涕曰光景日新吾父獨何之乎􅀅乘海鶴逺逰三山乎抑精神流衍於氣化中冝茫而莫之覩乎何爲使我心憂而弗釋也如此者乆之因以永思題諸堂楣以志無窮之悲先生願爲記之濂曰不然也子之父固亡子􅄑有母夫人存承候顔色問衣燠寒而進退之弄雛其側以恱之依依嫪戀如羊之跪乳鳥之反哺其樂􅀅無涯視五䁀万鍾若不能過之子何乃自苦日慘然以悲父固當思也思或欝陶成疾獨不計貽母之憂乎得仁曰堪輿之間當其青年父母俱存者何限雖閭閻小夫亦知割鮮具醪醴稱曰具慶榮始二十又七獨與毋居如之何勿思吾父生我之劬勞欲報之德􅀁謂昊天罔極者也一乘馭則思為其執鞭一就􅆍則思為其扇枕一有疾則思為其嘗藥今皆不可得已觸目之間無非可感如之何勿思濂曰不然也人心若不知是得隴且望蜀濂也父母皆殁乆矣其分當永思乎雖曰偏侍不獨愈於濂乎為子謀者當思尽孝以養母致思貴冨以顯父使人稱之曰某氏之子斯為永思也巳得仁曰非此之謂也尽孝養母榮豈不知之奚俟先生之言若曰致思於冨貴冨累於千金貴為三事大夫縱可以慰母心而吾父不知享焉終有不惬吾情者事不得其全故也如之何勿思濂曰子之言羙矣善矣而又有一􅀃願為子陳之夫為孝子者不當為無益之思而思不死其親可也其謂不死者何子於事君之際則必自思曰此當罄厥忠不可溺扵邪侫恐辱吾父也能思是子之父雖死其不死矣乎涖官之時則必自思曰此當㢘且勤不可習於貪怠恐辱吾父也能思是子之父雖死其不死矣乎鞫獄之頃則必自思曰此當欽且恤不可務於苛刻恐辱吾父也能思是子之父雖死其不死矣乎交友之中則必自思曰此當主於信不可待以浮偽恐辱吾父也能思是子之父雖死其不死矣乎出言之間則必自思曰此當合於正不可流於詖遁恐辱吾父也能思是子之父雖死其不死矣乎觸􅁼而長之如此可思者甚衆雖更㒒不能盡也子能力行之方可盡永思之道也於子何如榮復泫然流涕曰斯言也榮未之前聞也敢不夙夜祗奉濂既退嘉得仁之能孝也因次第問荅之語記諸堂壁云宋學士文集卷第四十八芝園集卷第八
