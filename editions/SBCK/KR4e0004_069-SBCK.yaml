body:
  text: 杭州天龍寺石佛記濂自休致以來頗一至杭憇永明慧日􅈐下天龍寺與永明相去不五里而近其主僧月舟禪師行滿要濂出㳺寺乃唐天龍尊者駐錫之地宋乹德三年吳越王錢氏爲建寳坊囙名天龍王之女曾刻木作觀音像􅂌之至今猶存大中祥符元年改額爲感業建炎三年毀于兵元泰定元年擇基於寺南一百歩仍重建寺曰天龍焉寺後皆山相傳爲越王䑓竒石峭秀如瑪瑙森列從寺西斜迤而上僅三十歩小塔出灌莽中盖蔵天龍舎利處又斗折而北入妙荘嚴境門又西行六十歩平巖幽􅃉鐫成無量夀佛像塗以黄金累甓為洞户作攔楯護之香華之噐咸刻􅅚像右刻般若心經繫以太平興國六年左峙石洞􅀹竒傍勒饒雲齋三字詩一章不能全辯嚴前地夷曠月舟云欵此即寺故基柱礎尚在􅀼按錢氏造寺在太祖乹德二年至太宗太平興國三年方納土上距建立之時巳一十七年又三年方有刻像未必其􅀄置寺於此也又東折二十歩有慈氏如朱暨天親無着侍衛七像其荘嚴一如無量壽又東折三十歩又有寳陀大士像石壁上刻天龍寺光明石六字月舟云石能夜現光恠故名其莊嚴一如慈氏三處仍勤佛􅃅於石以金填之濂既周覧徘􅆦太息頋月舟問其故月舟云斯事甚異國朝洪武七年秋七月十又一日野燈發延及寺山風挾之為聲􅀔光熖射天黒􅃄巳􅇁殿廬行滿大懼向木觀音像哀􅃅期與殿俱燼或力解之乃脱三衣祝而焚巳而反風滅火􅁇之以􅀨明日行山中藤􅟵榛􅁄盡㓜爲灰始見石像呈露或井沒塵土間行滿驚喜為之剜剔澡滌命工繪飾嚴護如此實其年之冬十月也先是有神光起寺西四十歩久而愈明因掘地驗之􅀗石觀音像舁歸奉之東廡旱潦疵癘榮禱立應由是依歸者衆寺得重振逮今五十六春秋矣今諸像畢出似非偶然之故然寺無一肘之田毎乞食以為飬而黑白之衆幾二千指非􅌳靈於大雄氏其能致然歟不可無以示來者明公以文辭爲佛事願爲書諸碑仍累甓為室以障􅀨風使與石像同為無極不識可乎濂聞佛之肖像古無有也有之自優填主始東土衆生兢則効之恒聚土以擬􅆊形或謂土不能悠乆復易之以木又慮木可致朽而更之以石石固堅矣亦難期於無壊乃因山而鑿之庻㡬與天地同畢大則數十㝷小則六七尺在在有之如來以慈憫之故感其精誠時變㓜景光以歆動之􅃬釐䘏㣧無􅀁不至誠難量功徳海也雖然天地亦一物也物必有壊唯本然之物佛超絶萬彚而不可以成壊言人具有之而或未能思故濂之為此記使讀者内􅀚之􅀁重在此而不在乎彼也寺之興復别自有記非像之所繫兹不詳書大慈山乕跑泉銘乕跑泉在杭之大慈山廣福定慧禪院距城南十里而近唐元和十四年性空大師來㳺兹山樂其􅂕氣欝盤縳庵其中㝷以無水􅀅他之忽有神人言曰自師之來我等繳惠者甚大奈何棄去南嶽童子泉當遣二乕來移師無患也翼日果見二乕以􅀲跑山出泉甘洌勝常大師囙留止建立伽藍蘇文忠公守杭日為之賦詩有乕移泉眼趰行脚之句盖紀實也大師諱寰中蒲坂盧氏子得法於百丈海一時龍象如臨濟玄趙州諗南泉願嚴頭奯雪峰存咸來咨叩道要則其德服􅄦神彰灼􅂕異有不難致者嗚呼㧞劍刺山水為之湧折腰拜井泉乃仰流武夫健􅀅一誠之所格尚􅀂此况大師心悟無際者乎洪武戊午冬十有一月濂朝京師道經山下今主僧定嚴戒有道之士也亟要濂􅀚泉且􅀍法衣率其徒同舉􅆊呪乆之泉觱沸而出若聮珠然巳而微作湧􅀔濂心異之定嚴遂來謁銘銘曰天一所形厥質乃凝潜行重淵與氣俱升至人來居地不愛寳誰信淸冷生於乕蚤山后川君與道為謀肻􅀻一勺不師之留師既留止化泉為雨式沛且旁潤于千里幻此荒墟遂成寳坊群生依之為正法幢命世大才猶能􅁼象來㳺來咨如山荅嚮伐祀雖􅊬聲華弗􅃜至今草木尚􅀍餘輝我於世縁逢觸輒礙泉特相知獻萬珠琲擾擾征􅆖風埃􅄅瀰有素者衣化而為緇願挹才波如習禪定洗滌根塵一時淸净元故寳林禪師桐江大公行業碑銘古浮屠之道以堅􅃘刻苦為先故其慮澄欲寡而入般􅀂為最易􅀁以雲居誨人為巳不貪世榮翠嚴日走聚落食或不􅁇此無他重内而􅁿外也濂今得一人焉曰寳林桐江師其視榮名利飬亦澹然無動于中瓶鉢之外絶無長物􅀁服布􅂁或十餘年不易臨殁維􅄼來發遺篋欲行倡衣故事唯􅁓衾一具而巳大咲而去嗚呼㨿位十刹之間而􅂂行危峻若此視翠嚴雲居其爲人也何殊可不書以爲學佛者之法乎師吳氏子世居嚴之桐江故因以為􅃅諱紹大父善母李氏師神觀􅀌潔不樂處塵􅝙中一觸世氣唯恐有以涴之入同里鳳山寺為沙彌稍長祝髮升壇納滿分戒􅀻自計曰化龍之魚肻於蹄涔求生乎即日杖䇿而出上雙徑山謁大辨禪師陵公公據席攝衆道價傾東南一見師大喜授以達摩氏卑傳心印相與詰難者乆之師退復自計曰如來大法天地所不能覆載其止如斯而巳乎􅃍辭去歴三吳之墟宿㽞建業經匡廬泝大江之西還止湖湘漢􅃆間名伽監所在必往叅焉諸尊宿告之者不異徑山時師復慨然曰吾今而後知法之無異味也乃歸見公公俾給侍左右師益加􅁬勵脇不沾席者數載朝叩夕咨􅀁以悟疑辯惑者無一髮遺憾遂得自在無畏法陵公喜傳授有人毎形之於言時東海歟公以天目嫡孫唱道净慈爲法擇人如沙中淘金鮮有慊其意者㑹藏室闕主者乃曰必如大兄方可耳師乃起涖其職㝷以心法既明而世出世智不可不竟手繙具藥寒暑俱忘毎夜敷席於地映像前長明燈讀之一大藏敎凡陸千二百二十九卷閱之至三過遂皆通其旨趣師之志猶未巳儒家言及老氏諸書亦擇取而擩嚌之自是内外之學兩無所愧矣元之至順壬申廣教都緫管府新立未乆宋諸輿論命出世嚴之烏龍山景德禅寺興廢􅀘壊善譽流衍至正􅉝巳行宣政院遷主金華山智者廣福禅寺寺近郡城十有餘里而城中爲㢘訪使者治􅀁持節而來者多朝廷老臣及文學之士休沐之日恒入山諏詢内與故持法者頗難其人自師之至􅀂貴􅀂賤小􅀂大靡不嚮風恱服四方學子翕集座下甚至無席受之一時法會􅃅爲極盛戊戌之秋院中復徇群請移住義烏雲黄山寳林禅寺師堅不欲行使者凡三往返然後承命明年巳亥八月朔覺體中不佳至苐七日日􅀅殁鳴皷集衆告以永訣即歛目危坐或請書偈接筆擲于地曰縱書到彌勒下生寕復離此邪翛然而化服沙門衣五十八春秋享報身夀七十有四越五日行闍維之法􅀗舎利羅如紺珠色齒牙貫珠不壞以某年月日建塔於某處藏焉師廣額髙眉正容悟物使人妄意自消生平以弘法匡徒為巳任敲唱􅀟舉鍾皷交叅未嘗少􅈈有求文句者操筆立書貫穿經論而歸之苐一義諱間㳺戯翰墨發為聲詩和冲簡逺亦有唐人遺風至於有􅀁建造甃石運甓躬任其勞以為衆倡手未甞捉金帛悉屬之知因果者或􅀹之則曰吾知主法而已甞患􅆡下疾拭浄不􅃘用厠􅁓摘菽葉充之其刻苦盖人之􅀁不能堪非見觧正力弘量豈易致是㢤三㑹語有録其上首弟子兠率行勤己為編集行世永明戒茂復以塔上之久未述為愧乃數来徴濂銘濂昔見師於金華山中共蠅頭細書戯問之曰師年耄矣其眼尚如月耶師􅀏曰頼有此耳别後復録近作詩一卷來􅀉師之意似相知者濂自後奔走西東弗能再徃今師則不復見矣因從永明之請歴序師之苦行并其證悟之深者勒諸穹碑假佛法而饕貴冨者過而讀焉其有􅀁觸也夫銘曰夫辨之道白如日一照便入光明域幻為嚴瀑㵼千尺珠璣散落龍為惜寳林師子亟返擲歴編名山絶瓜迹大海震蕩接天碧醎味由來同一滴三蔵玄文宻如織映灯夜讀廢􅆍食差别從今㑹于一欲求隻字不可得三鎮名山道充斥太空無雲雷下擊龍象人天俱辟易􅀌髙有同泰華色茹苦不翅餐崖􅁡偉㢤德人麟鳳質特為時來誰復識長風滿水感古思今意何極故金處士墓碣予精神既衰囊筆櫝硯諱言作文事忽同郡金生仁泣而請曰仁之先人善裝裭之藝嘗􅀗􅀻於執事秦漢以來金石刻悉􅂌之交疊無跡而匡郭合度執事為之喜毎延譽閭右之族先毎人歸言仁雖在髫齓中耳熟之迄今弗忘先人年五十二不􅄑以元至正十八年十二月二十日終乆未克塟今以國朝洪武某年月日􅉎于某山之原執事儻存夙昔之故哀而銘之雖死且不朽復泣不止予曰爾父予知之最詳何忍靳一言不慰其九泉下邪爾父諱永字仲明㓜從許文懿公㳺長贅女氏遂襲為其藝余忠宣公來持部使者節命治法書恱之􅂐山堂處士四字以賜人以為榮爾父沈謐有守人也且鍳辦名畫絶精以運筆柔勁設色明晦定其乆近真僞多服之無異辭今亡矣可念爾父世姓劉避錢鏐嫌名更爲今㜈人也曾祖筞宋雷州通判祖曄某官父祐元白鹿書院山長爾父故衣冠裔也故與他裝褫家不􅁼君子之澤其有可徴㢤娶王氏生子男三仁寳安仁即求文者女二歸張譲張弘孫男八人女六人銘曰藝之欀業之良藏諸宻名弗逸元故王府君墓志銘余來讀書浦陽江上凢遇惇厚之善士必礼貌之又稍與之㳺縣之深溪有王府君絲岀義烏鳳林先世嘗有􅂋者府君雖肥遯不仕其為人也好善郷人服之至不􅃘欺􅀊儉出粟貸人不求其息或屢不能償又復􅁛貸府君亦從之人咲其迂府君曰吾誠迂彼豈有餘力而不我歸㢤人有鬻産者必增其直以足其意鑿石錬􅁅以􅃾稼者既即府君山復飲食之而始收其利寠人無田藝富民之田而中分其粟乏力者粟輒不登在他人必易藝者府君卒不變人􅀏其愚府君曰我誠愚教吾子孫為寛仁之人耳里中有池塘延袤可二十畮其二㛰家力争之數訟于有司不决府君􅁣然曰􅀁貴為士者能爲閭井觧紛耳况與之有連乎乃耴内子金條脱質錢若干緍刺羊豕以合之酒半酣捧錢而跪進之各驩然而忘其訟向之􅀏者至是咸服府君為有德君子愧曰吾儕小人棼棼爾營營爾安足以窺其中㢤予嘗與府君合飲香嚴佛祠既稔聞其善行數審視之其衣冠不詭于人其發言和而有則其飲酒至百觴不亂且執予手曰子文辭誠羙矣惜不識酒中之趣耳予爲之驚喜嗚呼此豈所謂惇厚之善士者非邪府君晚年以家事屬諸子幅巾杖􅋰夷猶大山長谷間秋髪繽紛翛然如物外人年七十三忽嬰微疾呼家人謂曰吾􅀅逝矣爾等當法我儉勤更效同里鄭氏九葉聚居吾暝目泉下矣言畢形神乃離實元至正辛已八月十五日也壬午十二月二十四日塟于大様山之原距家西三里而近府君諱澄字德輝其姓王氏曽祖某祖某父某母某氏娶鄭周二氏子三人子覺子麟子偉皆周岀也子麟岀於仲父汶後孫八人應念憲㦛懃慶念恩女三人義門鄭渙同里周資張侃其婿出曾孫二十人澤涇浙江温淇湝瀏溶瀾潜瀹溥潚沇淦涯泓濠㳙女五人未行嗚呼大檏之散乆矣􅄝利之徒唯思肥己而瘠人恨不搤其亢而監其腦尚有如府君者乎勒石墓門用以為􅂆也銘曰行修於身惠洽于人名行乎薦紳天之報施􅁉其沒昆合筵而食以孝義聞斯何愧於樊張之倫凢樂善者視兹刻文吳門重建幻住禅庵記姑蘇幻住庵者元普應國師中峯和上本公􅀁建立也國師既得法於髙峯妙公唯恐人知而挽其出世深自韜晦往㳺三吳間大德庚子國師年三十又八甞憇閶門之西麓見松檜蔚然成林問名於居人則曰此鴈蕩也國師喜曰永嘉有鴈蕩山乃􅀿真諾矩羅示下現之􅀁名與之同其般若之當興邪吳士陸德􅃳聞其言􅃍以地施之國師縛草庵三間以居趙魏公孟頫為扁之曰棲雲國師趺坐其中而問道者連翩而來至於五百指之多乃創精舎一區僧俗趨㓛不三月而就􅀁謂堂房門廡咸具乃請名於國師國師曰澄澄水鏡能規之幻體昭昭影象􅀁現之幻跡幻與幻盡覺與覺空斯則超悟之極至也吾儕依此如幻三昧而住冝以幻住名之當是時若南詔之無照鑑西江之定叟泰荆南之鐡印權冀北之指堂月􅃅為一時麟鳳咸集輪下幻住之名籍籍於四方矣又明年壬寅松江瞿霆發延主天目山大覺正等禅寺國師不俟終日避走南徐而向之相從者皆水流雲散唯絶際中玉亭立二師素掌庵政相守於寥莫之濱自時厥後二師復入寂立之徒湛源止止之徒用庵照􅀘苴隙漏而思􅁇承為􅀹謹元季兵亂一旦蕩為塵埃而不可致詰矣用庵日憂之圖為興建之計僅四三年皆次苐就緒而復國師舊觀實國朝洪武戊申之春也庭曲之碑乆未有刻文㑹濂朝京師道過吳中用庵以記為請濂聞國師之道東行三韓南及六詔西連印度北極龍沙莫不躡屩擔登咨决法要然其心未嘗自以為足屢􅁍名山而不居飄蕩竆崖􅀌洲之上誅茅結廬在在以幻住名之其故何耶蓋謂主持宗教必無上大道必夙植福縁必明智通變具是三者然後可其意誠有􅀁激欲以身捍大法俾之去澆而還淳也用庵思祖武是繩木茹澗飲夙夜䆒明本心其亦可謂無泰於國師孫曾者乎嗟夫諸法固幻也而住者亦幻也知住者之非住始知幻而非幻也幻而非幻則如幻三昧在焉雖然非幻亦幻也是為記余氏宗譜序俗之不羙有志者鮮也今卋之士論法道不古若則以無位為觧及既得位卒不能有􅀁為豈特無位之罪㢤先王經天下之法深逺矣大者信非無位之所能行至於族師閭胥之事獨不可推行於州里之間乎州里之間茍未睱為獨不可親以聮其族生􅁇成之益脩其遺文甚完譜固睦􅁉之本也然無法以行之安能乆而無懐乎欲其久而無懷舎吾言不可也吾是以有言焉嗚呼恂苟能行之孰謂有志者之果鮮㢤重建龍德大雄殿碑佛法之入中夏始於漢明帝永平八年此說殆非也中夏知有佛盖己久矣周穆王時西域有化人來能出入水火王爲築中天之䑓列禦冦之書􅀁載西方有大聖人不治而不亂不言而自信不化而自行雖不明言其爲佛其事固皆佛也况乎天竺室利房等持經來秦而始皇謝去之漢武帝詔霍去病討匈奴􅀗休屠王􅀕天金人祠之甘泉成帝命劉向校書天禄閣往往多見佛書哀帝遣景憲使大月氏得其王口授浮屠經而還是則明帝以前經之與像中夏皆有焉至於永平以後而其教法始恢弘耳然而中州之人奉佛者雖多江南塔廟則自吳大帝赤烏四年康僧㑹所造建初寺始㜈之浦江從仙華山降􅀔而下其東支蜿蜒而來曰龍峯峯之麓龍德寺在焉乃法壊禪師道􅂣􅀄名乾元宋大中祥符元年更今名嘉定中寜宗親書寺額以賜之寺無碑碣可徴不知何時建立相傳為赤烏中予􅀼惑之僧㑹之化方行建業而浦江在千餘里外何縁􅃍有興蘭若事乎乾元乃唐肅宗紀年以年名寺其殆或肇于唐歟寺廢􅀅圯元大德九年住持僧善興及其徒永鎮悉撤其舊而新之先是龍峯之上有塔七成宋天聖三年僧咸若募兵部侍郎胡公則捐錢五十萬􅀁建至是亦一新之且造塔院一區湧殿飛樓雄麗華煥為一郡佛宫之冠􅀊時祝􅁵縣之諸浮屠悉萃焉元末兵亂一夕皆為煨燼寺之二比丘至德守約衋然傷心乃合謀曰前人之功吾儕不可不􅁇也而力未能徧及冝先其大者以為衆倡樂善之士豈無從而和之者乎於是黜衣縮食重剏大雄殿五楹間其廣一百一十尺深北廣閷二十尺崇比深復閷其四十尺經始於洪武九年之十月落成於十三年之三月匠以日計者八千米以石計者一千錢以貫計者五千而所就之夫弗與焉二比丘以成功之孔艱也欲使嗣人知所保護介予學子吳誠來請記嗚呼乆逺刼來諸佛出世其化度前後固不可以詳知而先儒則謂穆王之世中夏己昉見之越一千六十餘年至明帝法始盛行又越一百七十餘年至吳大帝江南方知有佛秘藏之莫顕至道之難聞亦巳甚矣今也祗園梵林交接乎東西琅函玉笈充牣于左右則其證􅁱冝若易易然者而闡提之人猶日衆多自非僧崇其像變宏侈其寳坊何以新其瞻視而祛其疑妄者㢤此二比丘􅀁以恊力起廢而不敢緩也真如妙智含生本具當有􅁇􅁤轍而興事功者不數年間一復大德舊觀予安敢謂無其人㢤故因作記特稽佛法縁起而嘆其不易遭逢意􅀅起人之敬信苟謂泛引而續言之非知子者也絲之以詩曰西方大聖天人師降本垂迹攝羣機五色神光貫太微九龍行水香襲衣六齡寂黙和天倪明星一岀絶去來大音演法寳華垂像教東漸自蒼􅁎秘藏弗顯昧若黟後千餘􅀊䆮光煇白馬䭾經息鴻盧從此祠廟覃夏夷仙華名山如曵旂靑龍東逝􅀔欲飛穹塔為角卉木鬐掩映樓􅀚聳巍巍髣髴兠率中天移刼火洞熾風皷威盡化丹雘為荒椔二十見之心酸嘶欲符西土化人為弹指勿使神􅀑窺四阿凌虚截絳霓一倡當知百和随千楹萬礎列參差行看規制踰昔時調御丈夫示弘慈擿埴索塗哀世迷手擎日月耀九馗疾歩長趨絕險􅇖歴刼難値心勿疑浦陽長江流􅄅瀰江水可竭道無􅃜興作起壊屬之誰尚告繼者徴斯碑洪武十三年夏四月八日前翰林學士承㫖嘉議大夫知制誥兼修國史兼太子賛善大夫縣人宋撰
