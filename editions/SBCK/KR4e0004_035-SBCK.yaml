  text: 宋學士文集卷第三十五翰􅁐别集卷第五
  hash: sha256:b1b0df9d927dac24c069870e39024e08559b6ad311fd568347908b903dac42e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_035-1a}
body:
  text: 趙氏時思菴記晋府録事趙君徳懐其名為古皐有請扵予曰古皐世居括昔嘗有属籍于宋大父諱􅀂順字和卿實魏悼王之十世孫通前古載籍之言論義下上􅀂玉屑傾吐然恬扵進取視銀黄焜燿漠然無動于中當時和景妍􅀍古􅃣服徜徉烟霞泉石間心曠神怡超然扵塵塧之表有不知白雲之移隂而夕陽之在􅀣也逢賔朋滿座相與流連不􅃘舎雖不觧飲見其酣嬉淋漓觥籌交錯浩浩然與之同適人􅃩之者且曰王孫家之故習也或曰遺落世事其逹士也㢤扵是州里皆稱為有徳之士凡忿争不直者悉来質焉交觴之酒使其各釋憾而去人至今䏻道之大母胡氏宋吏部侍􅀰絃之六世孫女婦道母範皆两無􅀁愧尤篤扵訓子古皐生也時年已六十為之喜而不􅄰甫髫齓親自鞠育之節其燠寒時其饍羞及稍長使􅀙名進士林彬祖學治經惟恐有􅈈怠意瀕卒猶執古皐手属曰吾幸見兒成立􅀅含􅀏八九泉矣雖然學無止法勗之㢤朂之㢤遂􅊕年八十矣大父先卒年視大母而少六􅀊大父卒扵某年月日大母卒扵某年月日以某年月日塟麗水縣北四十里和樂鄊之大平里遂建菴廬以為妥靈之􅀁名之曰時思古臯蒙國寵恩􅂙􅀍任使今又受新命􅀅為縣繁昌官書有程不䏻持一觴走酹墓下願􅂌文刻諸菴中垂示孫子庻以著懸懸之思予聞之經曰春秋祭祀以時思之言不忘乎其親也不忘乎親孝矣孝之為道非一而足也徳懐行矣持已以㢘清潔如氷雪庸非孝乎治民辯訟使各得其平又非孝乎業精于躬而名昭于時道足扵已而文垂扵後又非孝乎如是者徳懐思之而日思之是則時思之大者不必時省塋域而後為孝也它日入躋法􅀙出刺方州華軒結軫佩綬懸魚過家上冡以為一族光榮使人􅃌之謂趙氏之有孫不亦羙乎予之有望扵徳懐者如是而巳徳懷本名古臯今以字行􅀶學有識以䏻古文鳴其爲人也恂恂樂易􅀁謂温其如玉者云贈林經厯赴武昌都衞任序莆有林君士衡由進士起家署爲比部主事政成遷武昌都衛經歴中朝士大夫相率賦詩餞之而以首簡授予序序曰昔者艾軒林文節公謙之有慕伊洛之學聞吴中陸子正得和靖尹氏之傳因徃􅀙之自是專心扵聖賢踐􅂂之事一言一動莫不以禮逺近學者翕然尊事之􅀯渡後以伊洛之學倡東􅀯者實自艾軒始也艾軒嘗言曰道之全體全乎大虚六經既發明之後世註觧固已支離􅀂復増加道益逺矣嗚呼其言不亦至㢤艾軒既沒其道一傳扵林文介公學可􅄪傳扵陳文逺公元潔前承後引重徽疊照新學小生咸有􅀁師法非先王之言弗道非先王之行弗行人號之爲小鄒魯云迄今垂三百年流風遺俗猶有存者家談仁義而恱詩書夐然非它郡􅀁可及君子之澤何其深且長㢤今吾士衡固艾軒諸孫也其家學漸濡不俟言矣文行之謹􅃙亦􅀙可知矣其治獄刑曹用法寛恕士君子復許之矣今擢為戎府元僚則其恊比師率輯和兵民脩治戎器用戒不虞此特其􅀁優為者爾雖然未可䡖也武昌為湖湘一大藩障其行中書􅀁轄凡二十七府府各置衞或千夫長戍之而都衞總其凡其職與省臣鈞禮地連数千里戍兵数拾萬其練閱之方征調之節唯元戎䏻制之元僚䏻賛之其任之重也較然矣自道學不明學者纒蔽傳註支離之習不復見諸實用談兵之家尤以白面書生訾之士衡宜知􅀁自重庶㡬乎其可也雖然予惡用是呫呫為㢤昔也艾軒提􅀧刑獄廣東親􅊾郡兵破殄嶺􅀯群醜阜陵聞之恱曰林某儒生乃知兵耶特加直寳謨閣是知有用之學可以治兵可以撫民可以興禮樂可以移風易俗無􅀁徃而不當士衡尚推家學而行之其有不􅀗者㢤况當聖皇御㝢四方無㶻燧之警皡皡熈熈不異扵唐虞之世士衡日與大帥共論文武忠孝之道使勲在盟府之臣保其寵榮以終其身以遺其子孫暇則雅歌投壷發舒性情窹􅄰群絰一惟伊洛之是趍俾人人咸􅁛之曰是子也無愧艾軒之後人者也顧不盛歟士衡之行吾言止此而巳故封承事􅀰給事中王府君墓版文惟王氏􅀁出不一有􅁎姓者二族有媯姓子姓者各一族有虜姓者析四族餘未睱論述然􅁎姓二族皆出扵周其一始扵王子晋之子司徒宗恭其後則太原瑯琊爲􅀹盛其一始扵畢公髙之子畢萬其後則京兆河間爲龍蕃二者皆以其王族故氏之扵王云太原之族自秦漢以至于唐最多顯著與清河之崔隴西之李滎陽之鄭范陽之盧天下號爲五姓載扵史牒者班班可考也太原之裔有分居光之固始者自東晋􅀯渡来遷泉之晋江温陵里圖牒喪不知其為㡬世至唐恊律􅀰普又自晋江遷黄陽之延興里協律生宋大理評事文郁大理生校書􅀰訥校書生大理評事保􅂭評事生莆田縣尉仁暅縣尉生睿睿生連連生􅈼􅈼生郷貢進士贈奉直大夫國光進士生給事中晞亮給事生長溪東尉桂東尉生贈奉直大夫􅃳之奉直生禮部侍􅀰太冲禮部生知􅀯海縣事應麟知縣生元莆田縣典史子春則府君父也母任氏府君諱公榖字徳良生三年而典史君亡稍長問其母曰吾父何在母曰􅀂父死巳乆墓木今􅀅拱矣府君擗踊號慟即製斬衰絰帯追行三年䘮事兄􅇰樂先生朝有如其父絲毫不違其教今先生時號名儒以古文著聞亦盡心扵府君鞠育導迪無不備至群族内外姻皆􅁛之府君肄業郡庠精勤越流軰夜􅀅半鄰齋燈火盡㓕府君獨焚膏挾冊几坐如枯株自是䏻通一經發為大義亦整比可觀郡愽士命題招弟子群試于堂府君特居首列㑹􅀊當大比同舎生皆踊躍入家状期赴鄊闈府君獨漠然􅀂無聞或􅂆之府君泣曰予生髮未燥先公棄􅂢一念及兹肝膽為之折裂雖幸母夫人存鶴髪鬅鬙而疾疢撓之恨不化一刻為一朝尚􅃘斯湏離􅂰下乎杜門不出日以色養為事及夫人卒塟祭一遵禮度哀號不暫舎性好施家雖單窶聞人飢凍􅂺觧衣减食濟之不然夜不得􅅴􅆍君子以為賢元季政大亂七閩之豪挾兵威以擅生殺割土疆徃徃致書交辟之府君度其無成皆峻辭已而亂愈亟府君挈妻孥避地仙逰山中曵杖盤桓而烟霞泉石日與之相親及皇明御暦六合載清而府君則頺然老矣乃謂其長子寅曰不仕無義吾非不知也苐迫扵親老且病耳爾當力學淬行以􅁇其門寅遂以尚書中鄊貢第九名上􅀯宫未及㑹試擢為給事中尋兼靖江相府録事階承事􅀰朝廷推恩封府君承事􅀰給事中府君之配陳氏先卒已十年至是亦贈孺人寅方攝監察御史按劾山西忽官書至驛言府君已殁寅匍匐奔還􅀯京詣予􅂘曰寅罪逆深重禍延先子以洪武八年十月三十日長逝夀僅五十又八寅􅀅馳歸擇地縣􅀯香山里白石峯之原以九年某月日㐮兹大事而起母孺人之骨合塟焉惟先生職在太史中朝名公卿之墓無不藉雄文傳信于世敢奉䠂府伴讀陳子晟状再拜以請惟先生􅂌矜之予聞閩多故族雖歴年千餘而其文獻猶有足徵者府君善承家學豈不思出就功名之㑹獨以親故不敢蹞歩捨去則其敦厲孝行絶扵人逺甚孝為百行􅃣冕􅀁関􅃔倫者甚大此而不銘嗚呼銘寅䏻汲汲孜孜顯露潜徳惟恐人之不聞府君亦可謂有子矣府君六子長即寅次曰同曰􅂹曰祥曰載曰龍同􅂹載龍夭女一未行孫一􅁜生銘曰人􅀁貴者身身之􅀁本曰親呼吸相通實一氣之分柰何離而去之􅀯則之越西則去秦䏻敦本而厚倫者豈不在扵斯人豈不在扵斯人徐貞婦鄭氏傳徐貞婦鄭名妙静衢之西安人其父頥本簮纓家娶周無它男子惟産四女而貞婦居其三年十齡粗通孝經大義沉毅如成人諸女或與之狎􅂺厲聲叱之皆畏讋不敢近父竒之慎擇􅀁歸聞同郡徐思誠乃宋忠壮公徽言之七世孫代有􅂋人而思誠又習進士業燁燁而文扵是慨然許之及合􅈟成禮貞婦巳十九矣時舅天祥與姑朱氏春秋皆髙貞婦靡曰靡夜事紡磚惟謹由是羞服備給上􅀗舅姑心凡遇賔祭亦悉意助集不足則質簮珥供事及其自奉䟽食水飲􅅴之􅀂飴舅歿貞婦出􅀁畜布泉爲含禭衰絰諸費始得成䘮思誠出卜蔵地舟覆溺死上航溪貞婦􅂘慟㡬欲無生不憚勞勩􅌾舅與夫先塋之側飬姑髙堂日問起居察時燠寒爲衣進之退撫二子謙貞俾􅀙醇儒學而與勝已者交非其􅀋者絶之雖寒燈凉幌人不䏻堪貞婦䖏之􅁉如父母及諸姊憫其年少欲使其更醮貞婦曰吾夫固亡有二子在斯不謂之亡矣脫􅀂無子其如姑老何義亦不忍去也具人之形而犬彘其行妾肯爲之乎即引交股刀截去䯻誓不二夫聞之者懼不敢撼貞婦見二子成立謙以行義察舉爲部使者􅁺以政事聞擢爲瀧水丞貞婦喜曰吾今而後可以見吾夫地下矣謙當之官㑹恩例覃及扵親受文綺細繒之賜貞婦益喜召謙至出白金盤八授之曰國家寵恩至矣爾居官宜氷蘗自守禄或不給則售此用之慎母瀆貨爲也洪武二年知縣何忠以貞婦年三十夫亡寡居二十八年氷清玉潔可以厲民風乃上其事扵府知府王珎加覆覈焉浙江按察僉事張思立復㢘其非誣然後具牒上行中書以次逹之中朝三年四月得旌表其門如令貞婦今踰六十又四康強無它疾甞有田宅為強族􅀁㩀屡訟不得直夫歿讓弗與兢及宅轉鬻它姓貞婦贖居之識者謂貞婦知大體云史官曰禮始夫婦者何盖有夫婦而後有父子有父子而後有君臣三者雖殊其道一而已矣􅀂使婦不二其夫子不辱其親臣䏻忠扵君天下其有弗長治者乎柰何世教淪胥士大夫誦法先王徃徃或至扵悖君父有如一女婦之㣲不甚知書乃䏻抗節自守足以増扵五倫之重亦可慨也夫故予扵徐氏之事特為著傳文一通不少譲􅀅以厲子職􅀣臣節重名教非曰徒作也有来讀者毛髪􅀅聳然而立矣元故湛淵先生白公墓銘嗚呼是惟湛淵先生白公之墓先生諱珽字廷玉白其姓也出扵宋丞相時中之裔世居文水時中之􅀙子翼扈蹕南渡官至防禦使生武畧大夫良輔食邑携李因家焉武畧之後又至武功大夫顯始占籍扵錢唐生修武􅀰必騰修武生通武􅀰嶸先生父也妣方氏先生本四明名儒舒少度遺腹子通武育以為嗣五􅀊䏻属對八􅀊䏻賦詩十三受經太學習為科舉業轟然有聲塲屋間一時貴人争欲出其門下甫及壮元丞相伯顔平江南聞先生賢檄為安豊丞辭不赴乃容授蔵書之家晝繙夜誦燈墜花穴㡌不知也如是者一十七年程文憲公鉅夫劉中丞伯宣前後交薦之復以疾辭中􅀊嘗出㳺梁鄭齊魯歴覧河山之勝豋臨弔古訊人物風土慨然有尚友千載之意及至燕王公貴人見􅂺賔禮或欲舉為東宫官者先生復引義固辭􅀯北􅀌逺士乆困逆旅則必昌言甄㧞之自是學益充文益富而家益貧宣慰都事鮮于公樞師一時名士援杜甫邵堯夫故事共買屋使之居㑹李文簡公衎出􅀅使指喟然歎曰有才如是坐視其窮可乎力挽起之授太平路儒學正先生不得巳應命未㡬攝行教授事悉心官政修建天門采石二書院政成當時事例可貢行㙜令史逹官勸之行先生􅀏曰吾守章逢爾它何覬㢤尋轉常州路儒學教授兵燹之後禮殿與堂廡皆廢弗治祭器載籍亦闕先生為完之且復侵􅆠三千餘畆俄再遷教授慶元未上翰林集賢两院謀曰白先生淹囬下列吾儕不啓齒一言可謂汗顔矣共尉薦之陞江浙等䖏儒學提舉司副提舉階􅀅仕佐􅀰時鄧文肅公文原實為之長與先生志氣脗合舉刺得宜文化大行秩既滿銓曹有不知先生者署淮東塩倉大使先生自以塩筴非􅀁諸習不俟終更即謝事養痾海陵逺近學徒檐䔲相􅀙者殆無虚月先生已六十又七及再遷􅀙事􅀰婺州路蘭溪州判官則不復有䆠情矣曰與韻朋勝友曵杖㳺衍衘杯賦詩唯恐日之易夕􅀁居西湖有泉自天竺来及門而匯榜之曰湛淵因以自號晚歸老栖霞又號棲霞山人以天暦元年九月十五日卒年八十一其年十一月二日塟錢唐縣􅂂㤗鄊棲霞山之陽其子遵治命題曰西湖詩人白君之墓云先生性至孝母病刲股和藥起瀕死者再及歿號慟自擲嘔血至数升父感竒疾醫言必得兎矢可療先生踏氷雪縁崖穴求之三日不得父死抱屍􅂘絶而復蘇􅁇母虐不子􅍏子先生事之愈恭既而改適它氏無儋石之儲先生爲營朝夕且􅀒其避兵迄免扵難然汲汲行義尤不顧家之窶􅀌嫠不䏻昏者嫁之死而無􅀁歸者稁殯之遒中拾遺珠待其人訪索審而還之或以質劑假金匱乏不􅀗償焚而慰之生平無驕辭怠色一以謙抑爲事聞人善未聞不􅃩慕見􅀭人過掩耳亟避去奉先之外不惑異端不謟瀆􅀑神疾疢憂患之来一委之扵天自㓜至老無一日廢問學故䏻長扵詩文􅂵陽方公囬稱其􅃣絶古今有英雄大丈夫氣剡源戴公表元謂其註波五經之淵披條百氏之畹廬陵劉公辰翁又言其不爲雕刻苛碎蒼然者不惟極塵外之趣兼有雲山韶􅇴之音皆確論也翰墨雖有餘事亦有晋魏風酒酣命二童持􅁓懸筆一揮疾如雨風聲光翕然四逹而先生素志丘壑以退為進故位不逮名君子惜之先生娶沈氏有賢行前二十七年卒子二賁文林􅀰􅀯安路總管府經歴采温州路永嘉縣鎮海東寨廵撿女一歸常州路儒學正鄭禾孫四栩越東明皆蚤世孫女一適平陽宋􅁢恒􅁢恒由紹慶路儒學正借授新州新興縣福縁寨廵檢賁以子夭命􅁢恒仲子範為後範有學而文䏻􅁇其家者也範生子二弦弢女三先生􅀁著書曰詩曰文曰經子􅀋訓曰集翠裘曰静語皆二十卷嘗鋟諸􅎚四方多傳誦嗚呼先生已矣濂也晚出雖不䏻識先生幸􅀙鄊先生黄文獻公逰聴談杭都􅃇事有如淮隂龔公開嚴陵何公夢桂眉山家公之㢲莆田劉公􅇴西秦張公楧虎林􅄷公逺齊東周公宻凡十餘人相與倡明雅道而先生齒為最少乃與群公相頡頏􅀯北两山間其遺迹班班故在僅踰五十春秋而先軰流風遺韻弗可復見不亦悲夫嗚呼死者固不可作􅀂并其言行而不彰􅀅何以為聳善扶俗之􅂆扵是徇範之請鉅細畢書之嗚呼先生之名其果待文而後傳㢤銘曰虎林有哲夫􅀆秉徳良優柔􅄝義如􅄝利􅀆避名如避讎指退以為進􅀆謙抑毎自修知分中自定􅀆不假外物求天經況􅀁惇􅀆血淚交頥流冠冕百行先􅀆倫品庶不偷發越見聲詩􅀆笙鏞間鳴球律吕素和恊􅀆八音交相繆雄章落四海􅀆虹氣日夜浮棲霞有名山􅀆草木光如油紀徳薦石章􅀆千古振諸幽著存軒辭并序瑞安裴中季和以學行推舉典簿成均扁其軒居曰著存不忘乎親也御史中丞劉君伯温嘗為賦詩以寫其情予復師伯温之意演為琴操三觧使季和援琴而皷之琴悲而不成聲聲信不䏻成也嗚呼孝子之思親果有終極否乎其辭曰人孰無親􅀆我親歸于黄土六合之間􅀆莫過我最苦風獵獵􅀆成音雲族興􅀆晝隂我親何在􅀆涕泗霑􅁭我親雖死􅀆我心不死開目則見􅀆威儀孔邇何俟當祭􅀆始如見之彼蒼者天􅀆悠悠我思求親􅄀茫􅀆􅂚求扵身我身即親􅀆一體之分戰兢保持􅀆􅍏徳日新毫髪不敢愆􅀆懼傷乎親上慎旃㢤􅀆此謂著存端木府君墓誌銘予友端君以善既卒之一年其子智衰絰踵門泣拜而請曰智也罪釁深重禍延先公以洪武癸丑三月乙夘卒于􅀯京之官舎夀僅五十又三遂以是年某月某日蔵于巉山東村之原􅀼惟先公自少有志事功其善政在人者今多䏻言之又十年則言之者或寡矣又十年則無人䏻言之矣此無它人逺者其言湮世易者其事晦亦恒理爾一念及兹寕不使人興懐乎然而托名文辭者可以垂之無窮千百􅀊猶夫一日也此為人子者􅀁恃以無恐願先生進之按學子劉剛状君諱復􅀄以善其字也姓端木氏其先為衞人出扵孔門弟子子貢之裔今獨以端稱氏者􅀙省文也一遷扵大梁再遷金陵烏衣巷三遷扵溧水縣之巉山其詳􅇱見譜圖記中曽祖時中祖安父􅀖逹妣某氏君有逺志不肯寂寂落人後至正􅀄以儒試吏江􅀯行御史臺同列多貴逰子弟争事表襮君獨㤗然不失其恒行乆咸畏服之俄遷書吏海右憲部君佐部使者行州縣彰善瘅􅁖威聲獨著聞㑹四方兵動東􅀯為尤甚君䄂䇿言時政之急如此則可守如此則可戰否則有歛手就䧏而巳上官聞之皆落落不合君仰天歎曰彼以吾發狂言耶時事􅀙可知矣扵是悵然有鄊土之思溧水道絶不䏻歸僑居金華日以書史自娱至正已亥皇上親御六軍取金華命常忠武王錢之王聘君至幕下未㡬君辭去㑹有言扵朝者癸夘三月召為徽州府經歴徽為江東大郡政繁而賦殷君悉力佐治百廢具舉功則歸扵其長田賦乆不均民不堪命君即城東建局使民自實田集為圖籍覈盈朒驗虚實而定科繇吏民隂為欺弊痛謫之不数月而畢由是民無逋租官無横歛三皇孔子廟皆築㙜門旅之制亦廢君或葺或建咸中程式賦不及民皆􅀂不知者丙午冬改通判吉州府吉俗尚譁訐素號難治民召父老子弟戒之曰予聞爾民尚豪侈樂訟闘朝廷子恵元元春雨秋露無不霑濡爾􅂚為良民以報上徳寕梗化以自成耶梗化弗祥天刑􅀁不貸爾其識之民皆惴惴無敢執牒妄訴者丁内艱服除洪武辛亥春􅀍召赴京除磨勘司丞時官署新立凡泉粟之出納刑法之是非物貨之變易無􅀁不當讞君􅀙本逹支自流徂源勾稽􅀮伏纎芥軒露毎一奏對上􅂺廷譽之未㡬升為令君嚴扵限域人見􅂺畏不敢有􅀁請托俄僚属皆以貪墨敗磔首東市唯君􅀎獨存清白之行益表見朝著間冬十一月超授嘉議大夫刑部尚書君之用刑本諸法律而持以平恕老扵議法者咸以為􅁢杭州馬甲飛粮事覺逮繫者百餘人詔君徃治其獄分郡囚别􅀁人各鞠之合其辭参焉同多者情真否則偽郡守以下皆服罪壬子春三月拜湖廣等䖏􅂙知政事階中奉大夫湖廣素號重鎮属兵戈蹂踐之餘土曠民稀君首下属州民復叢者復其賦一年次閱官書凡粮儲轉輸錢幣出入與夫軍装工役皆預為計畫且㑹官属問事不集者其故何繇皆曰一省􅀁轄府州縣二百有餘逺者在千里外毎官多闕其事因不集君奏請于朝擇在職賢良吏攝其政不数月無事不舉民驚以為神既而以事召還京師俄以疾卒先配石氏前卒􅁇王氏子四仁義禮智皆石産也仁先卒君天性甚孝自逰䆠四方不䏻奉驩􅂰下心常慊慊然􅀁得禄賜恒歸以娱親其奉巳則泊如也母既卒一念及之􅂺澘然泣下居官䏻守貧甞著座右銘曰為官實難貧然後安事有不可急中存寛又曰心契上天脚踐實地人謂其䏻自警云君状貌秀􅊆羙􅂡髯音􅄍鴻暢或治政弗暇休夜則焚膏命諸子環侍取書之嘉言善行歴歴訓戒至夜分乃止故翰林學士朱升甞謂君為人其謙退似懦夫其專謹似腐儒瞻視精悍似俠客掀髯談世事似辨士而其精神超越又似逸人仙者君子謂為實録予托交扵君頗乆而著勲焯䏻固後死者之責銘嗚呼辭然而年日巳邁文日以衰無以􅀿四方之求近因燔毀筆硯一切謝絶之而中心猶以為未慊也雖然智之􅀁謂則有不得而忘情者遂􅇱采剛之􅀁録而繫之以銘銘曰惟士也良有志則剛如挾干􅀅始晦而夷出遇而熈一躍而飛筮仕府僚因賦定繇功而不驕轉佐方州革俗以媮訓言繭抽磨勘設曹蚕絲牛毛孰得而逃進領秋鄊􅀖憲是經中乎凖繩徃莅大藩以執政原江漢又安材長如河夀則弗多其如命何有子治經足繼簮纓縦死猶生巉山之原木古泉寒銘在不刋正誼堂銘三代而下惟漢董仲舒􅇰為醇儒其輔江都易王也告之以正誼明道之語千載之逺人猶誦而法之此無它慕之也長樂有士名時貢其姓亦董氏以文行入選亦充椘王府伴讀朝夕執遺經侍王􅄏陳内聖外王之道遂慕仲舒之言取正誼名堂徴予銘銘曰惟仲舒氏其徳之醇其四方之􅀁則傚其有間扵越秦矧同出扵巳姓􅍏􅀄亦一氣之分雖􅂀别而枝殊比之異族而尤當親其􅀁親親之伊何正義是遵赫明命之在目思制事之有倫豈絲髪之敢􅀻察夫人之相因廓然大公一歸至仁此􅀁以務為􅋌正鄙其詐力不足稱扵大君子之門更生之許王佐㫁不爲夫而孟堅之著論乃徒致扵紏紛有羙董生文行孔馴當侍經扵帷幄曰摩切扵典墳苟拾級而漸升又安知不爲王􅀓之尊名􅀂同而實同􅀅何愧乎古人彼峻者堂聳以華棻我銘其楹用代書紳仁和圓􅀿菴記杭之仁和去城東五里􅀁有浮屠菴曰圓􅀿乃雪菴禪師之􅀁築也其地當元季爲戰闘之區莽無居人及歸職方而後遺民稍集徃徃好勇􅄝利屠羊豕以成肆師惻然憫之托鉢行化有禇道真與金薌者首迎禮之先是道真之家人夢異僧至其廬倡偈爲贈及見師容貌服飾儼然與夢中不殊道真即言之扵衆翕然􅀙化遂與薌日乞食饋師且請扵右族胡國材共建精舎一區葉氏婦聞之􅂢地爲基以尺計者縦袤􅀂干横延􅀂干扵是道真因之鳩工前敞脩門中峙佛殿後聳堂宇翼以两廡而外則垣墉四周庀事扵洪武甲寅春二月甲子至秋七月某甲子􅃍訖㓛焉屋以間計者二十粟以斛計者一百工以日計者五百師欲垂爾後人乃不逺千里介予學子童徽来請記予􅀼疑之當兵戈始息創殘猶未起何暇􅀙事扵佛乎縦師言之而疇􅀅聴之徽曰不然師之事則有異扵人者師本辨章寳寳公之子生有異徴年十五慨然慕道思以善法度人徃依帝師法子朶兒班大師薙落為僧遂杖􅃬􅀯㳺偏􅂙閩浙諸尊宿得法扵伏龍山千岩長公去棲越之范蟸岩岩有虎一夕避去師􅀄不知書静㝎之乆發為頌賛自然與道合以是之故人愈趨之而庵成無難者予因歎曰人苦無志耳果䏻以善導人而人孰不化之豈惟浮屠氏㢤然而浮屠氏以荘嚴楼閣為有為縦有福報亦人天小果耳其中必有無為之道存􅀁謂無為之道者無小無大無内無外無成無壊無欠無餘不為諸佛而有􅀁増不為凡夫而有􅀁减淵黙不言而聲如恐霆凝㝎未起而身徧沙界是則􅀁謂圓􅀿者也一庵云乎㢤惟師􅀎契事理之不二者必知予言為有㩀徽歸尚以是語之師舊名孛羅帖木児今改可傅字無授髙昌人雪庵乃其徒􅀁號盖尊之也題氷壺子傳後松陽周世英其名為繹祖通􅀴書有長者行凡遇過客匱乏者必傾貲濟之客去藐然不記其姓氏然扵利養榮名尤視之泊如也近舎二十里有火光發山中上燭霄漢連夕不㓕有精其藝者宻告世英曰此白金之祥也唯姜氏之地其鑛獨夥公片言可得之慎毋􅂥也公叩諸姜氏果見􅀙遂㝎劵持泉與之擇日􅀅鑿石取鑛或譏姜氏曰爾家就其地軋麻為油数世矣利孰大焉柰何鬻之鬻之果義乎非義乎世英聞之歎曰不義在我非彼之罪也乃折劵棄泉以其地還姜氏姜氏亦固請曰長者固寛厚宵人􅀅何以自寕敢辭世英深拒之乃已姜氏後知其故歸采白金滿籝當元之季有以縣丞告身􅀙驛逓中至者啓視之則世英氏名州里也莫知其􅀁􅀙来盖世英遇士有恩故薦諸朝署而授之官世英曰吾白髪垂領已焉用此為㢤竟不上惟優㳺林􅊤間卜地以為樂丘作繭菴一區時招朋命觴以自娱世英之賢行甚多今姑舉一二餘則可以例知也士大夫以世英㓗清號曰氷壺傳之歌詠之且成卷軸矣􅀋多綺綉其辭以為工而無関其實行予不敢效尤特書此扵卷末使周氏子􅀂孫蔵之時出而􅀚之不有蹶然而興起者吾未之信也宋學士文集卷第三十五翰􅁐别集卷第五
