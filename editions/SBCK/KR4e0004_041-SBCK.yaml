body:
  text: 洪武十年二月十二日翰林學士承㫖嘉議大夫知制誥兼脩國史兼太子賛善大夫臣宋濂謹上表致政謝恩箋翰林學士承㫖嘉議大夫知制誥兼脩國史兼太子賛善大夫臣宋濂誠忭誠忭頓首頓首上言近者欽蒙聖恩追贈二代許臣致仕還鄊臣自正月􅀄六日陛辭十日發舟二十七日至家二月􅀄三日詣墓􅀁祭告昭宣制命龍光烜赫下燭泉壌鄊里親朋一時畢㑹相與嘆慕以謂天朝待士如此之至莫不感激思􅁬此皆皇上之大徳殿下之􅀷恩頋臣區區何以圖報於萬一臣聞古聖人有言曰爲君難其􅀁謂難者何也然以四海之廣生民之衆受􅀉於一人敬則治怠則否勤則治荒則否親君子則治近小人則否其機甚微其發至於不可遏不可不謹也􅀁以二帝三王相傳心法曰徳曰仁曰敬曰誠無非用功於此也治忽之間由心之存不存何如耳臣誠忭誠忭頓首頓首恭惟皇太子殿下仁孝温恭出言制行動合至道中外無不仰望而臣猶以二帝三王相傳心法爲言者誠以爲君之難也臣雖退居田里而忠愛之心彌切旦夕不忘於是敢貢蒭蕘之言伏望殿下察臣􅀁言而篤行之則天下幸甚臣無任瞻仰激切屏營之至謹奉箋稱謝以聞臣誠忭誠忭頓首頓首謹言洪武十年二月十二日具官臣宋濓謹上箋進賢朱府君碣先王之法不行於後世道􅀮民散仁鄙夀夭貧賤強弱爲吏者多弗暇問於斯時也百里之邑苟有忠信之士􅋍善扶誼以禆助於政教不亦空谷跫音之可喜乎如府君者誠可銘巳府君諱志同字與可姓朱氏進賢朱方里人曽祖仁無嗣其妹適宋某年進士豊城􅀽某生梓梓遂来為仁後府君之祖也父粹中字㓜純漕貢進士有材畧徳祐世變􅀎聚兵立堡以衛一鄊㓂􅄡不敢近府君天資亮直􅀹好赴人之難科繇或不平視其力单者佽􅂇之閭右作威福鉗刼細民不敢少􅄍氣府君􅁬然為直於上官人人敬畏不敢作非義事縣大夫聞之嘆曰是剛介不羣者也是有􅀘政教者也遇以賔禮民間利病必一一詢之府君為之傾盡邑以治最聞天曆已巳大儉民有菜色部使者行縣延府君于庭叩以勸分之䇿府君曰進賢雖小邑其藏粟者何翅百家計其飽妻孥外有餘則輸于官分給餓夫使者一磬咳間􅀁活數十萬不難也然示之以至仁布之以大公衆􅀅樂於􅀙化願力行之行之當自志同始使者曰君言是也命即爲之三百里間無填溝壑者府君義聞彰著􅁥察御史有嘉其􅀎者首以茂才薦府君自度不􅀎随俗浮湛力辭不就築室白湖嶺之隂鑿池種􅀣若􅀅終身掲文安公爲扁堂曰真村文白先生范公亦爲賦詩江右學者多傳誦府君篤於訓子闢舘舎聘名師使其子渙就學族婣子弟貧而無資者悉聽已而渙學大進如水湧山出復使褁粮逺逰以充其學識東脯装錢之費雖鬻産給之無倦色不幸渙早世府君嗚嗚而泣復召諸孫夢炎訓之如訓渙夢炎晝夜􅁬勵雖􅄰不敢忘學既成登至正辛卯進士苐奉觴爲夀府君喜曰爾不􅀒吾􅀁属矣元季兵起夢炎奉府君辟地南昌之蜀溪未㡬以疾終癸巳春正月某日也壽六十六秋八月某日始自蜀溪奉柩還塟白湖嶺之白楊阬􅀄府君愛白楊風氣囬旋有卜藏兆之意及是見夢於人曰吾􅀅寧魄此地矣衆咸異之府君性耿介人有過必詰責之雖面頸發赤不少恕家政嚴肅闔門千指罔敢有違教條其於􅀔利分華之􅁒則澹然無動於中皷琴吹簫酣咏水光山色間有不知老之􅀅至也娶􅆇溪吴氏子男二長即渙卒時年三十五􅀎古文辭虞文靖公甚噐重之遺槀若干卷其門人􅀽鑣鍥梓以傳次紹信後府君四月亦卒女二舒某胡某其壻也孫男六曰和曰夢炎通歷代文獻之學如指諸掌禮樂家賴之曰良曰厚曰碩曰惠曽孫九則以進以任以武以應云云也府君塟後二十五年濂待罪國史夢炎官于儀曹實與之同朝夢炎自状府君行持来告曰李翶有云先祖有羙而不知不明也知而不傳不仁也夢災竊為此懼願吾子有以􅂌矜之墓門有石亦旣琢而礲之矣濂不敢辭銘曰剛腸斥邪勁弗折一見未語心已􅅥庻㡬今逄古遺直義聞如泉漸洋溢勸分有䇿昭厥績繡衣使者加薦辟堅臥不起志非激膏肓乆矣縈泉石少微皇昏風夜黑白楊有祥閟玄室孰不霣涕何嗟及有孫文章成五色君子於茲觀世徳先大夫碑隂記惟我顯考府君宋公􅀣善深長不自食其報持以覆燾後人致使不肖濂獲際昌辰忝以文墨事上授經青宫當侍講禁林之日特膺寵數錫贈顯考府君中順大夫禮部侍􅀰顯妣陳氏徳人濂時侍上左右不敢稍離於是遣殿廷儀禮司序班曽孫慎􅐚奉制書展告墓次曽未㡬何陞濂翰林學士承㫖例得追封二代更贈顯考嘉議大夫禮部尚書顯妣淑人顯祖考贈亞中大夫太常少卿顯祖妣金氏淑人而其誥辭乃上􅀁親製褒錫有加焉濂亦􅂪恩致政而歸方克躬詣兆域奠告如􅀄惟是皇仁如天溥愽無際澤及九泉夐絶前比深懼無以垂示悠久因請前丞相汪公朝宗大􅂐其􅀁贈官封勒石冡前一以侈上賜一以昭先徳使後世萬子孫思忠思考永不忘乎君親斯盖濂惓惓之深望也洪武十年夏四月前翰林學士承㫖嘉議大夫知制誥兼脩國史兼太子賛善大夫介子濂再拜謹記介孫中書舎人璲書丹􅂐題故葉夫人墓碣銘山西提刑按察司僉事張孟兼請余銘其大母葉氏之墓凡三年矣予時供奉詞林日以文墨事上竟弗暇為今􅂪恩休致家居而孟兼亦予告省親道過予門又復以前事為属其言極慘戚予何忍不為孟兼一銘之乎孟兼之言曰大父年踰六袠而未有孫及生孟兼具牢醴饗賢士大夫且曰吾衰矣不意垂殁之年獲抱孫焉於是賢士大夫咸起舉觴為夀未㡬大父亡大母見孟兼輙泣􅀹愛憐之孟兼病創􅅑浸􅁋􅀍體晝夜啼不休大母與乳母范鞠諸房中親為􅀓藥節宣其食與衣見其學歩學言每為喜動顔色巳而嘆曰恨不令汝大父見之年十九禮冝授室始離大母左右逰學城南師事聞人先生辯析六藝采刺為篇章久之乃歸大母喜倍于前已而復嘆曰恨不令汝大父見之􅀊乙已朝廷下詔求賢以圖治安州縣不以孟兼為不敏交章薦之孟兼􅀅赴京大母執孟兼手泣而言曰汝大父念汝甚唯􅄰忘之不幸不見汝之成立汝今􅁒入官當夙夜盡心以奉公上庶㡬不辱于前人老身雖即􅊕目無憾巳孟兼謹佩服之弗敢違既至􅂪恩擢國子録轉主事儀曹遷丞奉常凡歴八春秋屢思謁告覲省動有物尼之洪武五年十一月二十曰嚴君以書来曰汝大母以今日終臨終無他言唯曰吾年七十又四分當死百無􅀁慊干中獨惜不與吾孫一相見耳孟兼讀巳五内分裂恨不即死相􅀙於地下禮部尚書陶公白干丞相府遂以上聞獲還哭於墓次時大母祔塟大父徐山兆域距卒時巳三十四日矣自時厥後孟兼出為今官㝷陞山東提刑按察副使痛念禄􅁕以充養而大母遽捐舘舎衋然傷心然非辭章無以白大母之行而􅂥孟兼無窮之悲焉􅀁以不避譴呵而頻凟於執事者職是故也予聞之亦為之愴然嗚呼余何忍不為孟兼一銘之乎葉氏諱某杭之仁和人父信母某氏世以種善聞年三十歸浦陽張府君鎮􅀄府君娶同縣陳氏無子葉氏来為之側室性慈惠柔順事陳氏如事姑復好施與逄单窶無􅀝者􅂢􅀁有物資之弗靳三族翕然稱其賢生一子垕二孫長即孟兼次善一孫女適某四曽孫鈞朝幹全予自少齡恒得驚風疾數渉阽危頼祖妣金淑人保抱携持以全性命􅀼禄熈朝位躋法従常思有以􅀤􅀭潜徳而一時故老號稱􅀎文辭者先後凘盡竟無􅀙求之方戰􅅥不自寧而孟兼乃惓惓徴銘弗􅈈亦可謂知其􅀁重而竭報本之誠者予頗愧焉嗚呼余何忍不為孟兼一銘之乎雖然孟兼以文章政事著聞當世繡衣直指威讋暴彊其大父母雖不獲見亦􅁕以慰九泉之望銘與不銘未􅁕深議也銘曰君子抱孫以其繼宗也斯勤斯恩奚暇計其瘝恫也珠之藏槖玊之藴􅒄寳之俾有終也為盤為敦光燭於外大顯厥庸也樂石勒銘􅀣之林塋馬鬛其封也䟦張孟兼文槀序後濂之友御史中丞劉基伯温􅀒氣甚豪恒不可一世士常以屈強書生自命一曰侍上於謹身殿偶以文學之臣為問伯温對曰當今文章第一輿輪􅀁属實在翰林學士臣濂華夷無間言者次即臣基不敢他有􅀁讓又次即太常丞臣孟兼孟兼才甚俊而竒氣燁然既退往往以此語諸人自以為確論嗚呼伯温過矣濂以無根葩澤之文何敢先伯温今伯温之言若此其果可信耶否耶縦使伯溫非謬為推譲者才之優劣濂豈不自知耶伯温誠過矣唯言孟兼才之與氣則名稱其實爾今觀􅀁造孟兼文槀序嘉其語粹而辭逹他日必耀前而光後其惓惓猶前意也伯温作􅁟中人􅀅二載俯仰今古不􅀎不慨然興懐孟兼請濂題識序後因書伯温昔日之言以表吾愧操觚之時淚落􅁓上洪武十年三月二十五日重題玊兎泉卷後泉地産􅀄何與人事世目之爲貪爲盗不過藉其名以厲人行泉固自若也金􅁜有泉曰玉兎甘潔異常或者悼其不幸爲姦檜􅀁􅀤或者以檜之惡無汚泉之清爭出巧辯嘵嘵不自休嗚呼安得荘生齊物之㫖語之者㢤部使者張君孟兼將上山東出示此卷請重題其後題巳孟兼曰先生可爲調人之官矣一咲而别題苦寒詩後亡羊先生多與余論詩大㮣以句豪韻險爲工此篇法韓退之而􅀹務出竒者也精於詩者必􅀎辨之報恩􅀃爲罕無聞沙門作如来􅀁􅀃父母恩難報經云父母於子有大増益設使右肩􅀒父左肩􅀒母經歷千年正使便利背上未􅁕報父母之恩佛言如是則凡有父母者不問在家出家皆當報恩何以故我之䏎膚筯骸非父母不生我之飢飽寒燠非父母不節我之出入勞逸非父母不念我之就安避危非父母不分我之循理屏􅁒非父母不教我之離俗學道非父母不成父母恩徳至廣至大雖竭恒河沙筭數亦不􅀎盡天台有一沙門名愛如虎狼􅆶牙銛利􅀎吞噉一切有生等􅀋窺伺搏噬最可怖愕􅀎割愛者乃菩提道愛如魑魅幻化不一􅀎迷惑一切脩善之土傎倒錯繆䘮其本真􅀎割愛者乃菩提道愛如敗航檣傾檝弊􅀎沉溺一切渡河海者漂流轉徏不到彼岸􅀎割愛者乃菩提道愛如枳􅁄叢生道傍􅀎鈎罣一切塗行商旅冠服綻裂惱人心意􅀎割愛者乃菩提道愛如傾崖摧堕無時􅀎壓碎一切動植諸物有識無識皆爲虀粉􅀎割愛者乃菩提道愛如蚖蛇口噴毒火􅀎􅆷賊一切血肉身軀裂膚堕指受其毒苦􅀎割愛者乃菩提道以是思惟愛之爲害不可具言沙門汝善念之汝􅀎割愛即可破妄汝􅀎破妄即是返真直入菩提之路福徳􅀁􅀍無量無邉雖聚七寳髙如蘇迷盧山待用布施不是過也是爲大功徳力是爲不思議勝力是為十方大覺如来三昧神力報父母恩孰出於此沙門聞巳得大饒益頓然了知恩愛本空法塵清淨雲寓軒詩并序龍虎山錬師張君仲毓􅄝學而攻詩􅀹善皷琴甞汗漫逰于湖江自謂若白雲出入空谷杳無㝎蹤遂以雲寓名其軒命弟子上官若冲来請余言夫膚寸而起倐然􅇈乎太虚者雲也英英份份資一氣之流行固凝而聚矣已而飄忽乎東西歛跡藏形􅀋若不知􅀁之此無他雲無心也方外有道之士茹术餐霞􅂢去塵俗之累翩翩然御風而逰玄間来無􅀁縶去無􅀁繫絶如雲之寓乎太空此無他亦無心也仲毓取寓雲以名軒不亦宜乎予聞至人不物夫物然後􅀎齊於物仲毓自比於雲善矣而未免物於雲也物於雲則有礙有礙則不虚不虚則靈明不通矣我不為靜而動何形焉我不為動而靜何容焉是則動靜一如也我不為雲則夫卷也孰􅀙而舒之舒也孰􅀙而卷之是則卷舒亦一如也仲毓試澄心黙坐存神於欝羅簫㙜間冲莫無朕而萬象森列其中而吾神未甞形也未甞形而雲果孰寓乎予當約仲毓逰金庭委羽之墟勺松華泉擘麟脯而食之且請仲毓出琴彈白雲之詩琴調清越群仙或有驂鸞来聴者矣寓雲與否非􅀁敢知其詩曰雲溶溶􅀆無根儵聚曶散􅀆不知其門變化罔測􅀆契乎道真龍虎名區􅀆列仙之倫剪雲製衣􅀆結雲以為神超然髙潔􅀆日與雲而相鄰歩虚九天上􅀆不沾世氛水火交媾􅀆日月􅄍吞雲􅀆雲􅀆予寓爾以終其身史處士墓版文四明有宋􅌠相家史氏世居鄞縣六世祖詔政和中舉八行不就詔生師仲父子俱贈太師追封越國公師仲生浩以􅃇學相孝宗官至太師保寜軍節度使封同魏國公追封越王謚忠㝎越王生彌逺相寜宗理宗官至太師保寜軍昭信軍節度使封㑹稽郡王贈中書令追封衛王謚忠獻衛王生宇之官至正奉大夫􅀚文殿學士封奉化郡公郡公生熹卿入元不仕熹卿生處士諱佾孫字列父潔白如玉顴輔秀整風神皎如也賔客至輙岸㥽咲咏終日或出壼觴共酌獻酬疊舉意度􅈺雅如晝及酒酣耳􅀬稽史談經雑以前朝典故蟬聮弗絶聞者曰此故王孫也冝其􅀶習文藝度越恒人㢤由是逺邇賢大夫無不與處士㳺而􅀽文清公噐之􅀹深竟以女妻之元故事宋􅌠臣之孫多因門第􅀘官者或憐處士才髙勸投牒自進處士嘆曰吾家三世相宋開國嗣王入居臺寺爲九卿爲法􅀙者不翅二十軰出膺郡二千石縣大夫之􅀉復簮組星列可謂極盛也已盈虚損益天之道也貴與富豈專萃吾一門耶國之守􅀛尚或不保於吾家何有自是益韜光歛彩繫情名山水間或采芝巖阿或藝蕳川澨世上升沉事若無聞知晚年貧􅀹甚飲水著書超然􅀎忘其憂君子謂處士􅀋知道者􅀄處士早䘮親弟與妹絶㓜處士育之使成傾貲為昏婣之費儀物充衍人以為不失文獻之􅃇􅀊時奉􅀕事甚謹盥薦陟降儼若祖考昭格于上竣事而燕宗黨子姓咸集處士備舉累世徳業懇懇言情辭悃愊無華聽之者興起生平宅心樂易喜怒不形於色卑抑謙退如懦夫然識與不識皆稱為善人君子云洪武八年秋九月十七日處士以疾卒夀七十八九年某月日塟縣之陽堂鄊金􅓝先墓兆次妻即􅀽氏先四十六年卒子二人公敬公襲公襲為弟佑孫後女一人歸余思永公敬之子六人欽祖靖祖端祖暗祖暉祖明祖欽祖暉祖蚤世女一人歸樓守誠公襲之子四人㝎祖獻祖文祖復祖文祖夭女一人歸張守義曽孫男三人必寜必玄必和處士卒後之三年㝎祖􅂪恩特除中書舎人與予子璲為同官乃持國子録張欽􅀁撰事行介璲求予為之銘嗚呼伐閲之家非世其禄為艱而世其徳為艱使其鮮克由禮以蕩􅁜徳實悖天道雖紆朱拖紫上􅁇祖父論者不以為貴苟恪守儀則縦没身於韋布間孰謂其非賢㢤若處士者有􅁕尚巳嗚呼八行君􅀮約布衣而啓三相國之盛處士之徳􅀅無忝於君者也公侯必復其始尚當於其後人徴之銘曰淛河之東史稱名門三世􅌠輔榮光燉燉為其後者非賢孰􅁇伊處士君執謙蹈義人爵或来實命之由天爵之貴敢不自脩我言旣飭我行又方誰云荷衣不比繡裳有虚有盈天之恒道安分而行樂善為寳既享上夀復多子孫濟濟彬彬必復其原金􅓝之里陽堂之鄊有墳八尺王孫之藏贈助教文集序臨川曽先生旦􅀄􅀁為文凡若干篇其門人某􅀋編成書而以首簡請余序序曰天地之間萬物有條理而弗紊者莫非文而三綱九法􅀹為文之著者何也君臣父子之倫禮樂刑政之施大而開物成務小而禔身繕性本末之相􅉼終始之交貫皆文之章章者也􅀁以唐虞之時其文寓於欽天勤民明物察倫之具三代之際其文見於子丑寅之異建貢助徹之殊賦載之於籍行之於當世其大本既備而節文森然可觀傅有之三代無文人六經無文法無文人者動作威儀人皆成文無文法者物理即文而非法之可拘也秦漢以下則大異於斯求文於竹帛之間而文之功用隠矣雖然此以文之至者言之爾文之爲用其亦􅄎慱矣乎何以見之施之於朝廷則有詔誥􅁽祝之文行之師旅則有露布符檄之文託之國史則有記表志傳之文他如序記銘箴賛頌歌吟之屬彂之於性情接之於事物随其洪纎稱其羙惡察其倫品之詳盡其彌綸之變如此者要不可一日無也然亦豈易致㢤必也本之於至靜之中叅之於􅁒動之際有弗養焉養之無弗充也有弗審焉審之無不精也然後嚴體裁之正調律吕之和合隂陽之化攝古今之事􅀋人已之情著之篇翰辭㫖皆無􅀁畔背雖未造於至文之域而不愧於適用之文矣嗚呼文乎其可易言矣乎今吾先生淹貫羣􅀴􅀁謂三綱九法其文理之粲然者加體索而擴充焉甞以春秋連貢于郷科目旣廢益寓意於古文辭用功於動靜者乆聲光燁然起士林中予取而讀之藻火黼黻之交輝金聲玊振之迭奏魚龍波濤之驚迅一一可以適於世用信夫萬物各有條理者於先生之文亦可以見之余在詞林先生方助教成均朝夕相與論文甚驩故因其門人􅀁請推原文之至者而為之序著源委之真􅁒體用之兼舉也復古堂記􅁥察御史虞泰魯瞻甞奉諸父玄佐之命請記其􅀁名復古堂者予以不文固辭而魯瞻請之益勤乃叩之曰子之􅀁謂復古者以為上古乎上古之時巢居而穴處汗樽而柸飲茹毛而飲血子今有室廬噐用之羙稲梁羊牛之饒决不􅀎復之以爲中古乎中古之制冠弁裳衣以定其分䁀􅃔罍爵以稱其用門奥屋漏以嚴其居筵榻格几以殊其度雖曰異於上古有可法者子今狃於久安必随世而變遷想亦未易以復之也然則子之復古者将何居魯瞻咲曰非是之謂也虞氏之居餘姚自漢日南太守以来代有顯人至唐永興文懿公爲􅀹著文懿公實泰之逺祖流裔至今二十七世矣嶼山之南有虞家城周圍一百五十丈相傅以爲故宅之基尚巋然獨存諸父毎相與登眺白烟凉草觸目悽然輙彈指嘆曰虞氏之先甞光著矣柰何無迓續徽猷者乎復古之名盖以此也予曰繼志述事孝子慈孫􅀁當為况思追紹於七百餘年之前此其見之􅃀行之厲是􅁕尚已第不知復於古者果止於斯否乎魯瞻曰何謂也予曰文懿公之為人外謹懦而中抗烈固以文學政事圖形􅇒烟而為唐代名臣較之同時孔司業之􅀴術杜莱公之政業議者有未􅁕焉孔之與杜然矣較於漢之㽞侯及董江都其運籌之良宅心之純或猶未􅀎無遺憾焉以此例之古今人物其優劣不倫雖更㒒未􅀎盡也􅁒師古者冝取則於上上賢者在古亦衆矣何獨􅀻於一家㢤魯瞻曰先生之言侈矣㽞侯之與江都信􅁕法歟余曰不然也古之人以道徳為師者有孔子焉有孟氏焉以政業居輔弼者有伊尹焉有周公焉人而不為孔孟伊周其學皆苟焉而已子􅀅復古必如斯而後可爾魯瞻曰敢問復之之功奚先余曰載藉之存者莫古於易伏羲之卦文王之􅂏周公之爻孔子之繫於是乎悉備姑摘一二陳之風自火出家人君子以言有物而行有恒此身正而家齊之象也洊雷震君子以恐懼脩省此自治之象也山附扵地剥上以厚下安宅此安養人民之象也雷電皆至豊君子以折獄致刑此聴訟之象也自此而推一卦一爻皆開物成務之道也魯瞻父子夙夜䆒心於斯此則􅀁謂真復古者過則聖不及則賢逹則兼善於人窮則獨善諸已復古之功不亦大㦲若曰沾沾焉取則於一家不㡬於自隘矣乎請以是記諸屋壁魯瞻母以余言為誇而棄之玄佐名某以經學教授于鄊言行有師法魯瞻學有端緒自給事中遷今官正氣盖凛然云故鄭貞婦頼氏墓志銘貞婦汴頼氏子故為聞人家宋南渡後有仕于温者遂遷焉父諱某母某氏貞婦生有淑質父母慎擇配偶㑹深之鄭君信與其妻王氏亦寓于温素稱有家法其子曰誠字文質復俊爽異常倫俾歸之貞婦年二十矣貞婦奉尊章無違禮身蹈儉素不習流俗侈靡事三族以為􅀎生二子徳善而鄭君自李陽河巡檢遷廬之稅使乃徙合肥居乆之鄭君殁反塟于深王氏念之弗置􅁒歸省丘墓誠飾板輿送其還未㡬王氏殁誠亦以哀毁終深之宗人曰是母子者不􅁒忘其郷土者歟盍同塟焉因相地􅁲時成禮貞婦聞之大慟㡬絶即服惡笄服朝夕哭奠人有慰之者輙對曰我未忘人耳尚何言誓不再適以􅀣立鄭氏之門如此者五十餘年如嚴霜烈日可畏可仰善旣不幸早夭刻意訓徳􅀙名儒逰迄于有成今擢太醫院判官階保冲大夫世稱其為有子貞婦生于至元壬午四月五日卒于至正辛丑七月十七日夀八十􅀊二子唯有一存孫一人素孫女二人適太原護衛鎮撫金華吴翰舒城宋謙曽孫一人天保徳念母恩如天之罔極􅁒圖不杇扵文子間介安次王普状徴余為之銘銘曰鄭婦之行可謂貞矣其恒如松之不變其潔􅀋玊之無瑕􅀁以得令子以昌其宗嗚呼此非易􅀁謂安節之亨者乎劉母賢行詩集序劉賢母王氏諱某太原崞人也年十八歸䖏士仲安踰再期生一子溥又八年䖏士君殁賢母自誓曰吾聞貞婦不二夫生爲劉家婦死爲劉家􅀑無子當爾况有子者乎􅃀守其志堅如鐵石家素貧逮䖏士卒貧益甚治􅁝枲自給衣僅蔽身曰唯一食艱瘁不可言䖏之恒裕如也里豪武氏子知賢母貧或可撼使猾嫗誘而且脅賢母痛詈斥之終不移􅀁守親督溥􅀙鄊貢進士趙惟賢國子助教張傳霖逰師若友有益溥者賢母遇之厚不以貧而廢禮溥後以文行聞卒爲名士賢母性儼恪有烈丈夫風未甞輕扵咲語契家子姓見之輙敬畏下拜人因􅃅爲鐡面夫人云里婦有􅁋行招揺行市中賢母知其􅀁􅀙来以􅀁曵杖擊之婦哭訴扵夫夫曰劉夫人何故撻爾耶慚服不敢言有姑適賈氏老而䘮明其子某毎咈其意姑必泣告賢母賢母造門而喻之輙踰垣避去某䖏士之外弟也亦嚴憚之如此他盖可知也年七十餘而殁當時南北名士大夫咸作詩文以羙之命曰賢行詩集云嗚呼詩者􅀤乎情而止乎禮義也感事觸物必形之扵言有不能自巳也昔者衛共伯早死其妻共姜賦柏舟以自誓一則曰之死矢靡他二則曰之死矢靡慝至今讀者為之感激􅁬勵豈非有繫􅃔倫之重者乎今也賢母之志與共姜同雖不自賦詩而世之士大夫推其意而代之言此盖出扵民之性而先王之澤也是宜刻梓傳世以為人婦者之勸雖然詩人之吟咏夥矣􅀋多烟霞月露之章草木蟲魚之句作之無􅀁益不作不為欠也華編巨􅁽摹印而行者比比有之其視賢母之詩有􅀘名教者為何如㢤知道之士必有擇焉刪烏城誌元至正七年冬嘉禾城西有烏數千營巢於地圍八尺崇五尺晝夜弗休􅀋有物督迫之者未㡬大盗弄兵海上紅巾􅁇起江淮皆繹騷朝廷遂詔州郡築城築城自嘉禾始亦異㢤唐貞元中田緒境内烏銜木成城其崇則縮五之二其圍則至數里之廣􅀁以徳宗有播遷之禍今元亦馴致䘮亡先儒謂社宇啼天津橋南方地氣先應亦是􅀋歟吴僧本誠著烏城誌五百餘言予愛其文特刪之以附集中本誠字道原以􅀎文名宋學士文集卷第四十一芝園集卷第一
