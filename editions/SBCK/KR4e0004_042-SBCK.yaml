body:
  text: 方氏族譜序惟方姓出自方雷氏方雷者西􅁜氏女軒轅之正妃是爲嫘祖或曰榆岡之子曰雷封扵方山後人因以方爲氏未詳孰是周宣王時方叔食邑扵洛故世望于河南至西漢末新莾􅀅篡位司馬府長史紘官扵吴中度天下必大亂即避去歙之東鄕囙家焉生一子雄雄生三子儕儲儼儕􅀜内矦行南部太守儼大都督儲字聖明一字頥真太守周歆舉為孝㢘又舉賢良方正第一累官太常兼洛陽令封黟縣矦和帝時下郊忤上意飲鴆而卒儲􅀎役使􅀑神故鄕人立廟祀之稱其為僊翁云僊翁生三子纉之弘之􅀚之一云覿洪􅀚盖􅀓文之異辭爾子孫分爲三族其布列扵諸州者纉之之後則嚴衢婺越弘之之後則徽宣池秀湖常􅀚之之後則莆田九江滁陽至今繫盛纉之逺裔曰文亮仕陳爲散􅀐常侍生南昌令倫倫生随秘書􅀰祚祚生太中大夫伸伸生唐太子中舎孚孚生右衛􅀅軍始興始興生二子尊逄逄考功􅀰中秦州刺史生皓皓生吏部員外􅀰苗苗生三子堂常禇禇宣逺􅀅軍堂永陽令生二子逹讓逹生三子引文引武引祖引文生道屬道屬生四子聦尊甲乙聦生四子道和令興令安令保令興生世雄世雄生道明道明生二子赦講講生君讃君讃生三子公懇公平公郁公郁生二子整漢衞史中丞生刑部尚書景漢生四子宗宷􅌠宥宗淅東􅀚察推官生三子永珍永符永豊永豊生十子可榮可昭可暉可浚可瓔可齊可同可度可剛可法可暉生肅肅生玄英䖏士干干字雄飛世居睦州白雲原以詩名後􅀮越之鑑湖以終生二子翼嚴翼小字託兒無嗣嚴生二子甲述甲亡其名生景先述生三子景珍景珣傳景先生二子彦超彦安景珍生三子彦誠彦暉彦瓊復自越還居睦景珣生三子承俊承􅀖承威傳生一子承招自彦超而下􅃅為九房諸孫復布列于淅河之東多仕吴越錢氏宋太平興國三年錢俶納土有自睦徙台州黄巖者曰二四府君雖宗之述不知繫之何房之下旣而君又􅁲遷明之象山未㡬又自象山徙寧海侯城里始㝎居焉至熈寧元豊間其族漸大讀書為文辭者後先相望迄予宋季不衰同郡縣而居若臨海之鮫􅄘天台之亀􅄘寧海之愛山皆號詩書之宗其先同出於睦載諸家乗者甚詳不幸元􅀄毁扵兵今皆不可知矣府君十四代孫文大為是而懼不可知者則畧之其稍可知者不問親踈而惓惓並着之成書一篇以傳扵後嗣文大之􅀙子孝懦􅀙余學經因命来求序予聞方之族自長史南遷蔓延數郡以科目􅀤身登法􅀙膺郡􅀉者在在而是北則濶廖罕聞近世遂指為希姓然㩀新㝎别譜則謂長史晋元熈間人仙翁仕梁在武帝時而文亮乃為之子也唐􅁥察御史張友成􅀁造仙翁廟碑及莆田譜圖記復謂長史官扵西漢之季則仙翁實長史之孫距梁當甚逺史傳無明文未敢妄加臆㫁而姑以碑爲正大抵江南之方要皆仙翁苗裔自雉山而分者又為睦州刺史亮之派自白雲原而分者多為玄英䖏士之支雉山屬淳安亮則汪華之􅀅武徳四年舉睦州附唐者也今文大之先出扵玄英雖曰圖諜䘮亡稍闕其􅀁繫屬當無可疑者故予爲稽玄英也譜特著承傳次第以􅀘其闕畧猶文大之前志也好古􅀶雅君子尚是正焉洪武十年夏四月十五日前翰林學士承㫖金華宋濂謹序予按方囬桐江集􅀁載天下之方姓皆出於歙縣歙縣之東鄕今析為嚴之淳安盖予鼻祖紘西漢不仕王莾避地時􅀁居仙翁儲之墓在縣學前廟祀則徽嚴山中皆有之曰真應廟徽嚴之方莆之方信之鵝湖之方屢出名卿顯人又按秘書省正字方翥莆田譜圖記􅀁紀王莾之際衣冠流離有名紘字子纓者渡江而宅吴中以二􅀃參之皆本於張友成仙翁廟記􅀁以先後如出一轍獨新㝎别譜謂仙翁爲新㝎人祖紘晋元熈間爲郡功曹父雄生三子長儕娶司空謝安女次即仙翁季曰儼字叔威當南齊世與仙翁皆􅀮不仕及梁武帝即位仙翁始舉秀才終官大常卿􅀼意謝安卒扵晋孝武太元十年卒後三十餘年始至㳟帝之元熈又歷宋齊八十餘年而至梁度其時儕必尚存相去如此之乆而曰娶安之女似無斯理也儕事且然不知仙翁仕梁之事其果􅁕信矣乎又謂仙翁三子長曰觀次曰覿季曰洪而著作􅀰方仁傑閩系録則云仙翁三子讃之􅀪之觀之譜圖記亦然蓋觀字正同弘則避宋宣祖諱改為洪以弘與洪音義相近唯覿與讃稍異耳無乃傳聞之易訛耶惟方氏固為江南望族而玄英之支子孫􅀹衆其九世孫􅁥察御史􅂪自記白雲原之族時有二十三院實治平之四年至淳熈􅀄吕太史伯㳟見扵文辭又云雲源枝葉甚蕃一源數百家聮譜合牒衣􅃣文物之盛鄕人紀之嗚呼亦可謂昌且熾矣今文大􅀁譜又略不知其源流之詳頗閱勾無譜其稱玄英弟三世諱述之下註云子孫遷寜海之侯城因㩀之爲正且爲牽引諸書而一辨之亦􅀘闕之義也至若莆田之方則唐昭宗時守長史諱琡始遷琡生御史中丞殷符殷符生七子延康延年延範延逺延英延輝延滔最號貴顯延安户部侍􅀰子孫或家滁陽延滔左僕射其後人或遷饒信江蘇諸郡琡亦出觀之之裔因爲玄英異支謂其徙扵光之固始者則非予恐讀兹序者有疑而不釋謾一䟽之不覺其辭之縷縷也是月十八日濂又題鄭母􅃽夫人墓志銘有序鄭母􅃽夫人諱某字某其先居光之光山五代末有諱光者徙毗􅁜再徙鄞今爲鄞人光生宗覇宗覇生侃侃生贈金紫光禄大夫浚明光禄生崇寧某甲子進士某官贈宣奉大夫珫宣生奉通判台州贈中奉大夫楩中奉生南昌通判贈太中大夫如愚太中生峴嶸峴慶元丙辰進士刑部尚書寳章閣學士階正奉大夫嶸􅀮居弗仕夫人之曽大父也大父遜父某􅃅䖏士善孫妣趙氏夫人生簮纓家進退皆有度䖏士愛之不肯與凡子􅀄䖏士之女弟歸同郡某路學録鄭方叔生某路教授覺民覺民字以道居弱齡時文行流聞䖏士喜曰吾乆擇婿無踰此甥也遂歸之夫人旣至事舅姑甚㳟謹衣之燠寒食之早莫咸懸懸入念慮唯恐有弗及姑患睬目教授君日候床下以舌䑛之夫人必與俱問姑􅀁􅁒爲而退姑殁舅春秋髙卧痾不􅀎興在袵席者數年夫人烹鍊藥劑候火性剛柔必盡其功乃進乆而愈䖍舅常謂人曰吾聞孝婦當産佳兒有若􅃽婦其子􅀅亢吾宗乎舅旣殁教授君令譽日廣貴人家曁閭里之族競以厚幣聘爲塾師家政悉仰扵夫人夫人不動聲色具有條序米鹽細故日親涖之而不憚煩雖貧賤患難有不恤也教授君有妹適趙某生一子一女病手􅁕拘攣殊若甚夫人遣介候問無虚月及卆鬻環釧爲具棺歛且不避塗潦送之塟􅀁未㡬其子亦卒歛之如其母竭力嫁其女扵士族中外皆稱其賢教授君殁夫人衰慟㡬致隕絶戒􅀙者治塟具必誠必信無毫毛可憾旣塟􅀊時躬自省視且􅀅結廬墓左以俟同穴一旦無疾而卒洪武三年十月十九日也夀六十九四年十月五日祔塟教授君墓墓在鄞縣西奥山之原􅀄塟教授君時啓殯而雨執紼者衣爲盡濕夫人泣曰雨不克塟書于春秋故在廟未發之時得爲雨止今既在塗矣如之何異日􅀗􅀙夫子使果雨也其必少止矣乎及是天日清朗送者縞素􅂘泣盡哀而去人以爲遂夫人之願云夫人子男子三長曰駒義烏縣學教諭次曰真鄕貢進士臨濠縣學教諭皆以文學稱于時季曰鳯某縣主簿子女子二一適同郡劉濬一適天台葉亮元季兵禍作死扵節義孫男五翁㫒同昇東昇􅁢昇復昇孫女三皆㓜惟四明䆠族莫乆扵􅃽氏重珪疊組㡬與宗室相始終故其賢女之可書有如此者禮義􅆂濡之功誠不可誣㢤濂與故太史危君素㳺備聞教授君之行與夫人之賢教授君之墓危君甞銘之獨夫人未有􅀁傳前年之冬扈􅀙皇太子㳺荆山真迎拜道左惓惓以爲言今年春􅂪恩致政而歸駒復来謁哀請如真有過無不及焉濂故特書其世裔之詳俾勒扵墓碑以見君子之澤乆傳而不斬庻可少爲流俗之勸嗚呼夫人亦可謂之有子矣夫銘曰其徳肫肫其行以孝聞其訓子熾然而文其無忝伐閱之子孫洪武十年夏四月具官宋濂撰􅀟桂軒記濂侍經青宫時四明桂君彦良實爲正字朝夕同出入禁中怡怡然侃侃然異姓兄弟也彦良間謂濓曰吾家在慈溪世舉進士或知望縣或司六察或帶閣職連綰郡章聲明文物固甞盛矣故昔人稱其􅀁居爲攀桂里㑹宋亡爲元業書詩者猶不廢區區雖不文亦以學詩􅀗與鄊貢之選二子冢曰慎介曰全今逄盛時復耆學不厭思􅁒趾前人遺芳顧南榮有桂一章雙榦直上始合于一又復岐而旁逹妍茂紛㽔香滿戸庭私竊以爲桂吾姓也其殆符二子文字之祥乎讀書之室遂以􅀟桂命焉慎甞􅀙吾子受經幸有以記其事夫桂之爲木歷代頗貴之至唐重進士科貴之􅀹甚每藉之以爲喻蓋俗傳月中有桂桂苟在月孰得而攀之其意若曰擢苐之難猶平地而升青霄云爾非實指夫桂也元豊之末新㝎有二倪生曰直侯曰直儒相􅁇中進士苐郡守因表其坊曰􅀟桂非惟新㝎之爲然也彦良之鄕有􅃽氏伯仲焉曰璿曰珫陳忠肅公之弟子也紹聖崇寧間亦先後發髙科公因號其堂曰連桂由是而觀以桂旌坊又以名其堂則前􅀁謂桂者似實而非虚也雖然古之人立言而比興爲多其在楚辭則桂與申椒木蘭並稱此無它芬香之物􅁕以􅂑譬君子也芬香之物當以􅀋相應而卉木又得氣之最先者庸詎知􅀟桂不爲二子之祥乎今慎也端毅自持而辭章後麗全也趨善若水而期扵無息皦然􅀟璧光彩交映馴而致之二倪兩􅃽之問學直易易耳連捧貢凾同策大廷亦冝也未見其爲難也然而名者造物之􅀁深忌桂氏自先世以来多以科目發身聞譽􅂭蔚逹于遐邇至于彦良猶且不墮其業二子復􅀅起而􅁇之斯􅀁謂難也視彼倐榮忽悴父不能及子者果何如㢤果何如㢤桂之爲祥兆又見扵斯惡得不爲彦良喜楊伯子有言曰桂之􅀟人之祥濂扵彦良亦云遂書之以爲記郭考功文集序國家當興王之運其人才必超出常倫訏謨㝎命􅁕以創業而垂綂奉􅀅天罰􅁕以威加乎海内至扵文學侍􅀙之臣亦皆愽習經藝彰露文綵􅁕以備顧問資政化􅀁以竭其彌綸輔翼之責作其􅀤楊蹈厉之勇攄其獻替賛襄之益致其黼黻藻㑹之盛此皆天也天意巳㝎扵􅄀􅄀之中楚生材而晋實用之撥亂世反之正昭宣人文而風動四方夫豈細故也㢤洪武七年秋濂侍皇上升武樓賜坐其側􅀙容問曰天下雖㝎朕猶垂意宿學之士卿􅀎知其人乎濂對曰㑹稽有郭傳者其字爲文逺􅀉迹釋氏法中其學有淵源其文雄贍新麗而精魄焜煌其論議崇谹皆根㩀乎六經波瀾相推若不知其􅀁窮誠一代竒才也上頷之未㡬復召濂謂曰郭傳之文卿可持至朕􅀅親覧焉時文逺偶以文一卷来貺因􅀁以進上覧巳􅀏曰誠如卿言會丞相暨御史大夫来朝命内使出示之且褒嘉至再即日召見於謹身殿奏對稱㫖詔銓曹擢爲應奉翰林文字於是文逺日侍左右以備顧問賜予便蕃不一而􅁕每命題俾撰文若詩輙見賞愛文逺自以受知之深精白一心以承休徳凡可以獻替者咸無􅀮情巳而陞修起居注遷考功丞而眷注益􅂭矣今年春濂􅂪特恩謝事東歸􅀅與文逺别文逺盡出􅀁爲文請濂序其首嗚呼古今辭章之士未甞之人第患知之者鮮爾州里中知之巳􅂓􅁕自慰况於卿大夫乎卿大夫知之則聲聞漸著亦可表見于世况於諸侯乎諸侯知之則光輝四逹十百之中僅一二見焉人且􅃩之曰是夫也爲人不翅􅁕矣况上簡聖天子之知而屢見褒辭者乎然聖人之言即天也文逺之文天且知之矣則其際遇有道之朝㳟承寵靈可謂千載一時者矣昔宋之孝宗甞扵禁中觀蘇子瞻文史臣書之以爲至榮此異世尚爾今文逺親受知扵聖明其爲榮輝又當何如㢤他日文逺道益行文益顯史臣必爲立傳與經國諸臣同載簡册以見興王之運人材之出皆非細故豈不爲盛典歟濂也不敏齒日衰而學日落縦曰以文自娱其視文逺殆猶􅁟鉶之扵殷敦序諸首簡􅀎不自愧乎雖然濂知文逺之文者也相知者不一言疇􅀅言之因不敢牢譲文逺冝刪正焉可也恒齋銘考功丞李君名永永為恒乆之義遂以守恒爲之字復自􅃅其藏脩之􅀁曰恒齋易有之恒乆也蓋恒之爲卦震上而巽下雷震風發二者􅀔必相湏􅀁恒乆而不已也李君有學有守之人也既取是義爲字與名又掲以命齋其篤扵信道常而􅀎乆者歟爲着銘曰天地之道恒而不窮剛柔相應雷動風􅀙君子觀象随時變易終始循環唯道之適苟執一塗子莫之中無􅁠以行是謂真㐫日月在天旋運不息􅄤次􅀁經罔有差忒陽隂代謝寒暑迭更盪摩呼吸萬物乃成唯乆故恒動有常則唯恒故乆靜不留物聖有明訓􅀣此教基逐物而遷有愧巫醫侃侃李君􅀁學淵奥立不易方大中是蹈彼不度􅀔獨浚之求或䖏非㩀無禽致羞孰正孰偏有若白黒慎而行之永保終吉三益軒記明之昌國徐君元凱􅄝古好脩鄊􅀖稱為善士生子男子三長曰友直字孟益次曰友諒字仲益又次曰友聞字季益家雖貧徐君􅀎使其頌詩讀書弗輟且因其字名軒曰三益以勵之友聞自郡諸生貢入成均近奉㫖受事中書頗與予相親時来執經問難遂以軒記爲請夫益之爲卦其象為風雷風雷激則風怒風激則雷迅二者不待相期而相益者也君子觀之見善則吾􅀅遷焉有過則吾􅀅改焉而其爲益也大矣然則何以知過而改之曰必得直友焉友􅀎直則加以箴規矣何以知其善而遷之曰必得諒與多聞之士焉友􅀎諒則舎虚而􅀙實友多聞則察理明而擇善精矣嗚呼此以取友扵外者言之爾今季益家庭之内兄弟熈熈賄善則相資有過則相告曽不出戸而講習之功勝州里之人莫不慕􅃩而交之其益􅀅非止扵三至扵十朋之亀弗克違亦有之矣他日徳茂才顯若河東之三薛江東之三岑其有不齊􅁤而馳者㢤雖然予昔甞取友矣始也自一家群􅀙之間朝夕摩切之然不敢自謂已􅁕也復取之鄊人焉如是者乆之亦不敢自謂巳􅁕也又求之國人焉如是者又乆之間有謂曰學無止法也我安敢自畫于斯復求諸天下之人焉今􅂄矣秋髪􅌭紛而垂領矣尚孜孜弗􅈈益求古簡書之間見問學之優廣者質實而無偽者則云我未之􅀎及也凾遷而􅀙之志􅄶而行僻與過失而文飾者則云我寧或有之乎脱有之凾改而正諸此無它知益之爲象若此自近而及逺期終身行之也季益兄弟其果以余言爲然乎季益通經而􅀎文已出㳺扵成均是友天下之人矣予尚何言儻或東歸見二兄焉冝以予文勒諸軒中庻不􅀒扵翁名軒之意云抑余聞昌國古㑹稽之翁洲也東控三韓日本北抵海泗登莱土地幽邃風俗撲茂人材往往多著聞予時今又􅀅扵季益兄弟観之上慎㫋㢤大般若經通􅀜法序大般若波羅􅁡多經凡六百卷唐三藏法師玄奘􅀁譯卷帙紛紜浩如烟海學者未易倍之鳯城雪月大師大􅀮發其巧智創爲通􅀜之法而四明演忠律師省悟重爲編㝎而益加精嚴其法畫十二圖用十三法二十九界八十四科爲之都凢諸圖􅀁列或齊行或各行或單位或避位或間位或加法或鈎鎻連環或廣略不過一千言間揔攝􅀄分難信觧品一百三卷無一字或違噫亦異矣先是浙水東見者甚鮮逮宋淳熈中有異僧載經行甬東暗誦弗休大姓沃承璋以為疑抽一二卷試之其誦如􅀄且出関法以授承璋承璋乃刻板流通元至正􅀄黄巖沙門絶璘琚公獲拾儀真歸刋雲峯證道院未㡬燬扵火雪山成公甞受經扵絶璘思繼前志復重刋而行之增以佛國白禪師􅀁觧名相繫諸􅀜後使人了知義趣云惟般若尊經乃綂攝世出世間色心諸法皆歸實相其功用不可思議譬如四大海水茫無邉際攝之入一毛孔無􅀁增减而彼大海本相如故􅀁謂舒之則大包無外卷之則小入無内者也雪月以方便智造是通関之法一彈指頃􅀎背其經六分之一其饒益羣生甚大雪山父子又􅀎篤意傳布唯恐或後皆不􅀒先佛囑累者矣雖然真覺性者中一辭不立光明殊勝洞照無礙大阿難等結集八藏諸文一一自光明中發現讀是関者儻􅀎扵此求之則山河大地有情無情咸成文句身不待較䌓簡扵卷帙之間也雪山徧叅諸方甞主藏鑰扵靈􅀮景徳禪寺其衛道之志蓋皦然云洪武十年春正月具官宋濂序般若松賛有序千岩大師扵元泰㝎之冬度濤江而来憇止烏傷伏龍山山有龍夀寺廢基大師遂􅅞庵以居手植一松庵前誓曰此地般若當興吾松其茂乎自時厥後大師之道盛行遂化瓦礫之區爲伽藍松亦䆮長析爲二榦詰曲紏蟠如虬龍夭矯􅀔􅁒飛動至正丁酉春南枝忽悴其夏大師示寂嗚呼松雖植物其有知興衰死生之意者㢤後植松五十一年為國朝洪武丁已住山龍門海公同太師之上首良􅂎請吴興林君子山繪􅀞成圖求濂命名濂因稽太師之言以般若􅃅之且爲之賛大師諱元長㑹稽人賛曰大師東来化導有情青松手植用表真乗観爾榮悴以占廢興有聲四逹播徳維馨爲法来者霧滃雲蒸樓閣頓現儼如化城松亦有知森勁摩􅄀夭矯􅁒􅁬虬龍騫騰孰謂卉木本乎無情有感斯應壹出乎誠惟誠之至通神致靈勗爾龍象慎母敢櫻視松如師是儀是刑天髙月白風度成聲恍如演法誨言􅀄聆太史作賛勒扵岩扃百世之下庶㡬可徴其年五月五日前翰林學士承㫖金華宋濂撰三老圖頌浦江鄭氏以孝弟爲政一門五十餘室不别槃案而飯者垂三百年靈和􅂶牣發爲祥徴三夀作朋形扵同氣孟曰伯陽父年七十有二叔曰仲徳父年視孟而縮其四季曰仲舒父年比叔又劣其五惟是三老人者身載明徳聿昭前聞天休滋錫精神熈康羣􅀙子姓趨翼乎後先仁聲義聞流􅄛扵倫類誠可謂備享百福而綏有遐齡者矣濂􅀼聞之南極有老人之星占者謂其光明潤則下多夀考是則天人之間氣化孚浃同流上下閱世靈長似若不偶然者况扵孝弟之家通扵神明者乎冝其人瑞之􅂦立景貺之川臻也濂也不敏覧圖興嗟斯頌之􅀁由作其辭曰維天降康其福穣穰斯夀之祥其祥何徴非景之星非雲之卿非三秀之榮鍾我夀朋大冠緇衣載肅其儀其神孔熈其樂孔皆叶燕居之耽時盍其簮如􅂦之安如星之參恊數于三孰不式且瞻旌門有侐孫子之􅅚有百斯集雅雅魚魚振振蟄蟄或馮或翼弗徐弗亟唯歩武是式􅀊時宴饗叶肆筵于堂籩豆大房曰殺羔羊其醪苾芳鍾皷喤喤笙簧洋洋多士鏘鏘更獻夀觴祝鯁于前執酳扵傍人士来觀有嘆有言維此旌門徳義之尊維此壽朋景福攸臻積之既蕃受之弗諼錫羡于後昆其羡之都孰侈孰舒孰形匪圖古亦有諸其年曰耆或至于期頥是繪是摹儷羙而同趨九藍之山有石巖巖白麟之水其流亹亹眉壽無有害與之同體夀俊之良髮素而眉龎苐禄具慶叶流榮于鄊匪榮于鄊實􅀖家之光洪武十年七月望日前具官宋濂述義烏樓氏家乗序東陽著姓載扵方册者有八曰斯曰留曰路曰駱曰厲曰哀曰苗而樓居其一焉樓本妙姓夏少康之後周封杞東樓公支孫以樓為氏亦􅃅東樓氏城陽諸縣有婁鄊是其地也氏族家以婁鄊之故遂謂婁與樓姓同殊不知婁乃邾婁氏之裔其姓曰曹判然不相屬也漢之季世樓泰字􅁢恭者始自譙郡徙㑹稽其子苗建安中又自㑹稽遷烏傷苗字秀實生三子孟曰恭仲曰侍中玄季曰散􅀐常侍畯皆仕扵吴畯生宣威􅀅軍陟陟生康樂今㣧㣧生豊其下世次不可復知矣至南齊時有居烏傷竹山里者曰靈璨􅀉迹釋氏法中梁武帝賜􅃅曰智者大師今義烏之智者鄊實因此而得名其地多樓氏居之宋南渡後諱奭府君生二子四孫六曽孫而玄孫之繁數登扵十其中諱大年者嘉㝎癸未進士通判吉州大年􅀙子諱子固嘉熈戊戌進士嚴州桐廬尉自是蔚爲衣􅃣之望宗矣府君十世孫璉懼其族大而譜逸也扵是撰爲家乗二卷一倣司馬遷年表之法畫而爲圖字名卒塟咸具䟽之一輯先世墓誌家傳􅀕文之屬而通判君遺詩之僅存者亦附著焉與宗人謀􅀅刻諸梓以傳而請予序之予知樓氏之族甚乆而弘若永康若武義若東陽皆自義烏而分其居縣之東門者􅀹爲近屬實同出扵秀實之裔而四明之支則祖秀實之子恭恭之逺孫宣獻公鑰甞述髙祖先生事畧自謂其先婺人但不詳徙居之始耳此皆鑿鑿可信無疑苐智者大師附錄以婁㓜瑜乃樓玄之裔而合樓婁爲一音者似為氏族家􅀁誤證諸史傳甚爲不然也嗚呼凡言姓氏者皆原於世本公子譜二書二書則本春秋左氏傳左氏傳則因生賜姓胙土命氏及以字以謚以官以邑五者而已後世得姓受氏者多至三十二類益淆亂而難明况襲氏冐姓之不一者乎無怪乎附録之不􅁕徴也今璉也爲斯而懼惓惓扵譜事而不敢忘亦可謂賢也已因爲辨析繫諸篇首使其子孫有考焉璉字士連甞􅀙予學經國朝洪武壬子試吏部中選授􅀅仕佐莭大同府宣寧縣主簿遷成都府仁夀縣云丁已秋八月具官金華宋濂序諸暨孝義黄氏族譜序黄為嬴姓十四氏之一出扵陸終氏後受封于黄今光州㝎城西十二里猶有黄國故城黄旣爲楚􅀁併子孫散之四方以國為氏至漢尚書令香居江夏故世之黄氏咸以江夏爲望隋開皇間有自江夏遷㜈之金華者其諱曰苾歷十九傳至縈生二子洪浩洪生二子瑕珌浩生三子琛玘璞其子孫析爲五大族瑕之枝則豊城珌之枝則剡琛之枝則􅁥利玘之枝則分寧璞之枝則弋陽皆自金華而遷稽之金華豊城二譜及黄庭堅魏了翁李心傳諸儒􅀁采著者頗同當可信不誣諸暨孝義之黄氏實出于珌珌之季弟玘有子曰瞻以策干南唐用爲著作佐􅀰知洪之分寜縣珌與之俱遂同家縣之雙井江南兵起珌之冢子惠自雙井遷于剡尋􅀙剡遷今􅀁惠之曽孫宋贈衛尉少卿振仁及于鄊待之舉火者数十家其妻仁夀縣君劉氏斥嫁貲以規義田均給婣族故其三子十孫多躋膴仕而十孫之中廣西提刑育爲最顯育之􅀙子朝請􅀰汝楫當方臘之亂罄家藏金帛以贖􅀁俘者數百人汝楫生八子開閌閣同登紹興甲戌進士苐而聞與誾亦相􅁇擢紹興庚辰乹道已丑乙科闛復占特奏名終荔浦丞闡􅀘官􅀅仕􅀰閎修職􅀰兄弟一時榮貴文墨彬蔚人比之荀氏八龍云自時厥後子孫益䌓庻與禄食者代不乏人而書詩之澤至于今不衰少卿之裔孫周爰輯舊譜而續爲新圖釐爲若干卷而徴予序之嗚呼氏族之學難言者乆矣他未暇深論姑以黄氏言之有謂出扵髙陽氏自伯醫賜姓嬴而其後有江黄諸國為楚􅀁㓕有謂出扵金天氏自㙜駘封于汾川而其後為沈姒蓐黄諸國為晋􅀁㓕皆以黄為氏今去唐虞以前殊為極逺其􅀁出難稽猶可言也黄氏之望非止江夏而已若櫟陽若安㝎房􅁜若漢東上谷譙郡如此之􅀋多至四十餘房而五大族不與焉氏族之書雖或志之何以不表其􅀁自出今去漢亦已逺其轉徙之未易明猶可􅀃也孝義之譜以鍾為始遷之祖而以瑕之五昆季為其子豊城之譜則以五昆季繫於洪浩之下且謂自秀州崇徳而遷金華新昌之譜又謂江浙之黄皆出建之浦城而遷金華黄魯直則又謂七世以上失其譜而各譜乃推至十二世若合符節近世有聚庭堅諸行作山谷老人傳則又謂六世祖瞻如分寜縣瞻實生玘抑又何邪今去五季宋􅀄其時為甚邇其事冝可徴何為紛紜而莫之有㝎也盖因圗譜局廢而無官以涖之民間以􅀁傳聞論著不􅀎旁捜廣覽以㑹通其故矛盾不齊冝無􅁕恠予甞侍先師黄文獻公相與論及譜事公之先亦自金華析居浦江洊遷義烏其上世之諱亦曰珪曰琳豈亦榮之􅀙孫耶竊意榮之兄弟必衆支裔實䌓譜􅀁不及者則亦無如之何要之江夏之後金華實為黃氏之望故余歷考羣譜參以諸儒之論備書之扵首簡信其􅀁可信疑其􅀁可疑在覧者之自擇焉周字思文羣􅀙子姓至一百餘人敦厚而善施皆無忝扵先世云宋學士文集卷第四十二芝園集卷第二
