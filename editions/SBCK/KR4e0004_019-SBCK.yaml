  text: 宋學士文集卷第十九鑾坡集卷第九
  hash: sha256:c1c1fb1084ad34da2dbd2fa7a1f2473727ab45ef754ee9092fbb87a7e698348e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_019-1a}
body:
  text: 恊晨中寥辭一首􅀑谷仙人畫列禦㓂御風圖以獻其師四十二代天師真人真人號冲虚子而唐封禦㓂之號實曰冲虚此其圖之􅀁以作歟濓􅀼􅀚之髯松􅁬張有風泠泠然起扵其中霞光發舒閃鑠無定禦㓂方乘飈回旋龍裳鵉帶􅇒亂不可止遥見神山隱起大瀛海上旭日一􅀧如火海濤噴薄迎之濺沬而舞珠景物遼夐令人情塵銷霣直超鴻濛間嗚呼仙人之畫竒絶矣蓋以嫓真人非果在扵禦㓂也真人或飛神上謁太清排空馭氣靡􅀁不之將真人之似禦㓂乎抑禦㓂之同真人乎是未可知也濓因造恊晨中寥辭一篇真人或咏扵淵精之區九都衆真當有彈八瓊太璈耒和之者庶㡬後天而終可以凋三光者乎至􅀂禦㓂寓言旬有五日而後反者微㫖巳備見其書兹可畧云辭曰帝青洞真陽太飈恒鬰敷凝神歘上征行與灝氣俱飛輪入溟涬九光開翠荂腰佩白琥囊吻薦紫琳􅃾曲龍有丈人持節下明都㖟以八辰秘攝御萬象􅀄陟彼方文䑓大招許瓊暉廓落黃演炁陽堂明梵樞開明戊已功玄契曲晨機羲娥俯倒景流光駐熈夷靈集動千載視之􅀂斯須稽首方諸君同餐燕胎芝請授長生籙浩刼以為期予老矣諸書皆忘去此卷雖乆留齋中不克題就今日退朝稍早逍遥禁林凉颸飄飄然吹衣神情爽朗有􅀂慿虚而行歌天上遂濡毫賦此他日煉丹仙華山中九轉功成當與冲虚神㳺八極握手一咲何翅三千年也冲虚室銘冲虚二言廼玄門之􅀜鍵道學之符徵也嗣天師張公取以自號復名其齋居金華宋濂為掇其義而為之銘銘曰惟其冲足以全玄黃之功惟其虚可以幹造化之樞盖和以盎扵四體而空以􅆂夫中􅃾壹脗契乎自然曽弗爽扵無為迎扵先而不見其合推扵後而不見其離雖恍惚其有物竟孰探其㡬微彼專氣如伏雌抱一若嬰児以大道之難言姑假象而示斯神明之胄為世玄師約萬言之喉衿貫一理之妙機瓊䑓小史執筆受書掇三洞之􅀮文請掲之扵座隅題金書法華經後右金書法華經七卷廼一軍校破燕都時􅀁􅀗欲焚經取金以資日用其苐七卷巳燬軍校之父愀然弗寕􅃍持前六卷售于銕塔禪師禪師傾衣盂酬之未幾髙麗蔡洪司丞匍匐求觀觀已􅏰然泣曰此洪􅀁書以報父母之恩者也戎馬紛紜逃難觧散豈意扵此重見之禪師益神異其事乃粉黄金為泥介舊友穆庵康公請􅀘書其亡予既書巳合爪言曰是經在䖏天龍護持􅀅燬而弗之燬垂亡而弗之亡此何以故盖􅀅放如来之慧光破衆生之重昏也雖然經之功德不繫有無洞照十方􅀄無一字火不能􅌊金不能書一渉有為即苐二義學佛之士又當扵此而參之也禪師名善慶號雲房古林茂公之法嗣年己八十純實無偽行舊主正􅁴禪師院今退栖蔣山之西菴云洪武癸丑冬十一月二十九日冬至翰林侍講學士金華宋濓記瑶芳樓記瑶芳樓者常孰虞君子賢燕居之􅀁也瑶芳者何古桐琴之名子賢以重購得之間一撫弄其聲翏翏然如出金石如聞鸞鳯鳴如與仙人劒客共語扵千載之上子賢樂焉則以謂世之名樓者衆矣高駢之迎仙謂其泝遐情也其失也誕張建封之燕子謂其興新懐也其失也靡韓建之齊雲謂其􅇒髙清也其失也侈吾皆弗敢蹈其非欲專斯樓之羙者舎斯琴也其孰能當之遂以瑶芳名其樓而列圗書扵中當風物清朗白月獨照神情遐冲夐出世外子賢㯶冠鶴氅自凾道而升復取琴鼓一再行乆之演而爲紫琳之操其辭曰有堅者石中含精矣其白如肪爗有瑛矣五音繁㑹鏘然而鳴矣客有與子賢同志者􅀙而賡之曰􅃩質􅀆非華陽卉􅀆非奢折秋馨􅀆遺􅀁思望羙人􅀆天涯歌巳相視而􅀏金華宋濂聞其事唶曰古之人好樓居者豈欲夸靡麗而為榮􅀚㢤盖臨隂幽之室則其情歛以揫䖏陽明之居則其情暢以舒隨境而遷因物而著其亦人理之常者乎况夫宫角之相參羽徴之互奏禁其忿慾之邪宣以中龢之正其扵學問之功又未必為無􅀁􅂇􅀁以先生長者無故不去之盖有以也雖然君子盖不物扵物不物扵物則凡紛然而来前者皆吾性情之發舒或懸崖􅃉壑或平墅曠林雖非層構可以闔闢陽隂而清風徐来萬􅄜皆動曲澗流泉復􅂇之為聲勢五音泠然愜心而溢耳太龢融浹内外無間有不翅聽子賢之琴扵兹樓之上矣此無他逹人大觀無地不為樓無聲不為琴也苟局滯於一室之間適其意則有之而蹈道則未也有􅀂子賢盖學道而有􅀁得者故濂敢以是􅀃告之子賢愽雅好古絶出流俗之上吾友楊君㢘夫極稱其爲人謂䔍扵士行而􅀹孝其親云佛性圓辯禪師净􅄌順公􅊇川瘞塔碑銘有序濂自㓜至壮飽閱三蔵諸文粗識世䧺氏􅀁以見性明心之㫖及㳺仕中外頗以文辭爲佛事由是南北大浮屠其順世而去者多以塔上之銘爲属衰遅之餘諸習皆空凡他有􅀁請輙峻拒而不爲獨扵鋪叙悟縁評騭梵行毎􅀂不敢後者盖欲表般􅀂之勝因啓衆生之正信也有如佛性圓辨禪師者濂安得而不銘諸按其嗣法苐子行圓􅀁造年譜師諱智順字逆川温之瑞安陳氏子也有翁媪精脩白業旣没蓮華現門屏間師之大父母也翁生道羡娶婁氏屢至哭子其情不勝哀乃塑智者大師像事之一夕夢僧頂有圎光逆江流而上招婁氏謂曰吾當為汝之子及窹而有娠師旣生羙質夙成年五􅀊即􅀙季父學季父引生徒渡溪抵萃墅師力欲相隨季父怒麾之還已而溪􅁀漲季父生徒皆溺死然自少不喜畜髪翛然有塵外趣婁氏弗能留七􅀊俾依仲父慧光扵崇興精舎稍長受具戒扵天寕禪院其父亦樂脩凈觀俄離俗同居精舎中精舎􅀅圯師即恊衆力葺之時年甫十八君子固知其為適用之材暨習法華􅀴歴三月通誦其文慧光􅀹噐之使出㳺永嘉無相院􅁴源法師愛師俊朗挽其為嗣會橫雲岳法師大弘三觀十乘之旨扵水心法明寺師徃而受其說衆推為上首居亡何走鴈山􅀟峯不契􅀁言復走千佛寺毒海清法師方開演長出御講請師為綱維之職軌範為之肅然毒海入寂師感世相無常嘆曰義學雖益多聞難禦生死即禦生死舎自性􅀅奚明哉遂更衣入禪復走閩之天寳山叄鐡􅀜樞公公圎悟八世孫也授師以心要遵而行之似有階漸欲依公而住公叱曰丈夫不扵大叢林與人相頡頏局此蠡殻中邪拂䄂而入師下旦過寮􅏰然而泣或憫之慰曰善知識門庭髙峻拒之即進之也公聞其事咲曰吾知其為法噐姑相試爾乃廷入僧堂中師壁立萬仞無􅀁回撓雖晝夜明暗亦不􅀎辨踰月因如厠便旋覩中園匏􅀲觸發妙機四體輕清如新浴出室一一毛孔皆出光明目前大地倐爾平沈喜幸之極亟上方丈求證適公入府城師不往見水濵林下放曠自如巳而歴抵諸師皆不合又聞千巖長禪師鳴道烏傷伏龍山師徃叩之其􅀁酬􅀿者皆渉理路飄然東歸燃指作發願文細書扵紳必欲見道乃巳復自念非公不足依洊走閩中見焉公偶出逰遥見師喜曰我子今来也越翼日師舉􅀁悟求證公曰此第入門耳最上一乘則邈在萬里之外也乃嘱之曰汝可悉棄前觧專扵參提上致力則􅀅自入閫奥矣師􅀙公言踰五閲月一日􅀅晚參擬離禪榻忽豁然有省如虗空玲瓏不可湊泊厲聲告公曰南泉敗闕今巳見矣公曰不是心不是佛不是物是何物師曰地上磚鋪屋上瓦覆公曰即今南泉在何䖏師曰鷂子過新羅公曰錯師亦曰錯公曰錯錯師觸禮一拜而退公曰未然也公披大衣鳴鍾集四衆再行勘驗師咲曰未吐辭之前已不相渉和上眼目何在又爲此一塲􅃧劇邪公曰要使衆皆知之遂􅀅宗門諸語一一訊師師一一具荅公然之復嘱曰善自護持勿􅁿泄也乆之令掌蔵室㝷請分坐說法公旣􅂢舘師嗣住院事非惟舉唱宗乘寺制有未備悉􅀘足焉甓驛道逹扵山門踰六七里擇地搆亭以増勝㮣衆方頼之忽爾棄去過杉􅀜抵百丈上迦葉峯渡江入淮禮諸祖之塔經建業回浙中超然如野鶴􅀌雲無􅀁留礙㝷返永嘉㑹王槐卿造報恩院扵瑞安大龍山首延師爲之主參徒寖盛至八百指師建僧堂棟居之石室巖禪師主江心􅃩師之爲復以苐一座䖏師師翩然而徃未㡬又以何山精舎棟宇湫隘不足以容衆拓之為大伽藍為建大雄寳殿及法堂三門兩廡方丈庫院之属而塐像繒壁諸荘嚴事亦次第告完平陽呉德大創歸源寺原援報恩之例請師開山師慈憫心切亦不欲拒旣至為造小大皷鐘魚板法噐而叩撃之授職分班升堂入室皆按清規而行時東海有警元帥逹忠介公帥師鎮台遣使聘師入行府師以逹公方有事干戈絶之弗見逹公慕咏弗置􅂐􅊇川二字遺之師因飯囚戒其勿萌遁逃心即重見日月不乆而赦書至周呉二囚以師為神其後山㓂􅀼發二囚實為渠魁􅀁絰之䖏焚毀欲盡歸原報恩以師故獨存師終不遑寕䖏避入無礙菴又還歸原朝廷為絳院額賜師今號及金襴法衣師曽不以為恱悉散其衣盂􅀁畜退居一室掘地以為爐折竹以為箸意澹如也温城凈光塔䧺鎮一方年乆􅀅壞方叄政􅀄甞戍其城欲賦民錢葺之命師蒞其事師曰民力凋敝乆火􅆋炎炎而復加薪吾安忍為之必欲見用官中勿擾吾事若無􅀁聞知可也方諾之師乃定計城中之户餘二萬户捐米月一升月􅀗米二百石陶甓掄材若神運􅀑輸紛然四集鎮心之木以尺計者其長一百五十最難致之師談咲趣辦七成既粗完其下仍築塔殿宏敞壮麗九斗之勢益䧺一旦􅄓風作其上一成挾之以入海濤衆咸傷之師曰塔終不可以就乎持心益固遣其徒如閩鑄露盤輪相及􅆋珠之􅀋日就月將闌楯硐户一一就緒金鮮碧明猶天降而地湧也縻錢過十萬而工役弗與焉辦章燕只不花出鎮閩省道過東甌夜觀塔燈熒煌知師􅀁造乃謁師問道并談般若經師用漢言而直觧之辨章甚恱顧謂左右曰西天諸師授我以􅁡義尚不􅀎相恊今聞逆川師言則心地開明矣亟呼舟同載入閩宣政分院請師住東禪癈刹不一載間殿堂矗如門廡森如蔵庫燁如摶土以設諸像梵容穆冲各隨相變現靈山一㑹儼然未散畢功之日省院臺府諸官與大毗丘衆共落其成師則曰未也復甃東南二門通逵若干丈營福城東際花蔵海南叄􅀄地三牌門營普庵堂以施茗飲浚湯泉二􅀁以利浴者限以垣墉縈紆其徑路而馬牛無自而入􅀘刋􅄏元蔵􅀴板仍印施之其可以弘濟人者無不為也先是净業慶成東報國舶塔寳月松峯諸寺兵燹之餘莾為荒榛福建行中書􅀅籍其産于官師言於辨章􅀗仍其舊辨章欲閱大蔵尊􅀴于家或以几席什器難具為辭師令浮屠一百七十人為什分辦扵各刹表以題號一時畢聚仍畫為圖使按圗序次列之給役扵飲饌間者亦更畨而進毎以鐘皷為節後先不紊辨章恱曰使吾師揔戎則無敗北之患矣師俄散財如歸原時恬然而退辨章留之不􅀙㑹雪峯虗席辨章強師􅀘其䖏師不得巳啓行未行先鳩工師二十人徃拯室廬之欹側者旣至􅁝毫之費咸自巳出緇素莫不從化有徐子剛者㩀寺之安仁荘收粟萬斛聞師至亟輸還之部使者橐驩自負通楞嚴寳積二􅀴􅁿視諸人師以􅀜鍵詰之歛袵而去已而思還温方叄政具船迎之千佛院災無有起其廢者師彈指頃千佛閣成未㡬前門左右廡又成俄東甌内附師潜居林泉􅀂􅀅終身江心蘭􅀮逸禪師市材扵山欲建萬佛閣而年耄力不勝遂以属師師起而應之亦不日而成且為砌釋迦寳殿創觧脫門以至蒙堂􅀴室無不不具足􅀄師采材扵山道􅀴普安院院燬已乆唯山門巋然煙雨中師見之􅀏曰吾為爾移山門為佛殿何如衆皆合􅀲指謝之師為撤瓦輦致故基一毫無􅀁損徐取寺山之木重完僧堂而後返皇上尊尚佛乘召江南髙行僧十人扵鐘山建無遮法㑹師與其列升座演􅀃聽者數千大駕幸臨慰問備至號為一時寵遇竣事還錢唐清逺渭公方主净慈舉師以為代師􅀄不􅀙􅁇而嘆曰􅀁貴沙門行者隨縁􅀿世何􅀁容心哉乃振錫而徃浄慈當兵後凋落殊甚師亟還郷召匠計傭竭其筐篋而来欲大有設施而諸僧負官逋者係累滿庭師為之出涕悉代償之㑹中朝徴有道浮屠以備顧問衆咸推師師至南京僅四閱月沐浴書偈而逝實洪武六年八月二十日也世壽􅀂干僧臘􅀂干二十一日闍維扵聚寳山􅀗設利無筭得其法者曰文顯曰興富曰某其一即行圎扵是持靈骨而歸建塔扵某䖏以明年月日蔵焉師有五㑹語若干卷善財五十三參偈一卷皆傳于世大雄氏之道不即世間不離世間烏可岐而二之我心空邪則凡世間諸相髙下洪纎動静浮沈無非自妙性光中發現苟為不然雖法王􅀁􅀃􅀴教與夫諸祖印心宻旨皆為障礙矣嗚呼道䘮人亡埃風􅄅瀰焉得逄理事不二有無􅀟泯者相與論斯事哉師自得道之後坐紫檀座既巳設法度人出其餘力往往荘嚴塔廟使人為逺罪遷善之歸斯盖近之矣或者不知專委為人天有漏之因夫豈可哉夫豈可哉銘曰大法雖無外􅀆􅀵攝在一門玄漠不可象􅀆視之儼􅀂存了不分精粗􅀆無對乃為尊􅀂涉有情見􅀆雜糅成贏􅉻理事本不二􅀆縦横隨􅀁之渾􅆂造大同􅀆徧照光陸離東甌見休徵􅀆蓮華出屏間異僧佩圎光􅀆逆流􅂿波瀾玄符既夐㧞􅀆何能滯塵寰峩峩天寳山􅀆鑄鐡為􅀜扉􅁬迅一朝入􅀆窺破生死機盡洗結習垢􅀆真体露巍巍方知有為相􅀆不離無為宗彈指幻塔廟􅀆毗盧樓閣同因敬乃生悟􅀆自外而廓中歴坐古道塲􅀆手執青楊枝􅅴露恒四灑􅀆餐之􅅴􅀂飴木石􅀍霑􅃳􅀆談玄分五時大明麗中天􅀆佛日同輝昭􅀁資生育功􅀆欲使隂泠消爰集清凈衆􅀆梵音撼海潮唯師􅀁􅀃法􅀆無耳亦當聞一言歴耳根􅀆千劫不作塵天光下照爥􅀆恩寵何便蕃卷舒毎隨時􅀆􅀌雲本何心生㓕巳兩空􅀆遺蹤邈難㝷勒辭在中林􅀆振德無古今鄭仲􅆂墓志銘鳴呼自道廢民散之後世之爲師弟子者朝離書帷夕若秦肥之視越瘠比比而是有如仲􅆂之扵予義則師友情如父子也仲􅆂之死予寕得不哀乎仲􅆂􅀄年學舉子業把筆爲文春葩滿林色澤明鮮而生意津津敷暢予意仲􅆂必先登再踐塲屋皆不合有司繩尺仲􅆂歎曰吾惡用是爲哉乃棄去益潜心秦漢以来諸文章大家無􅀁不窺亦無􅀁不辨畜之既深發之亦盛啇敦周􅃔籍以五采五就陳列天禄石渠間人見之者􅀟目輙運眩仲􅆂復歎曰吾惡用是爲哉又棄去取羣聖人之􅀴而燖温之窮其道德性命之秘質扵濂洛􅀜閩之􅀃乆之充然如有􅀁得仲􅆂復嘆曰車成矣輪轅羙矣不行何以渉扵逺道乎益思明體而適諸用母夫人病逾年仲􅆂保抱扶持終日不離側夜則泣禱于天請以身代忽臋患惡疽不􅀎坐跪鍊藥劑以進􅂰為生胝夫人病革思食西域􅀲既食而卒仲􅆂見􅀲終身弗忍食因懸懸念毋不置氣鬰結弗舒遂得瞶疾迨居父䘮拊膺悲號絶而再蘇者數四杖而後起服雖闕凡遇諱辰却酒肉弗御者七日至期哭奠如􅀄䘮癸夘之夏諸暨戌􅀅謝再興以城叛浦陽與諸暨鄰壌訛言㓂且至群􅀙兄弟皆避地東陽或移金華是年冬㓂壓東陽囊橐皆無遺仲􅆂時在金華聞之泣盡持􅀁服衣衾徃分之雖身罹寒沍不䘏也􅀙弟澧與妻蚤夭三女傫傫然無依仲􅆂鞠育盡道各選名胄而配供張之豊逾扵巳女仲􅆂家義居十世族属頗衆或有疾不擇䟽戚夜必四三起視遇有死䘮急難不顧利害身任之至扵周旋事為之間條理粲然必期扵集且不與人較曲直或以非理相譲但俯首黙受而已其在内之行如此逹之扵其外者􅀹夥也蘄春王烈家燬扵紅巾帥其族五十乞食浙河之右仲􅆂舘之數月而後去同縣騷人貧不􅀎飬母来愬扵仲􅆂仲􅆂曰吾何無母可養邪厚周之仲􅆂負笈􅀙師道遇十餘人襁􅀒其子且行且泣試叩焉則山水暴溢室廬漂沒欲求給縣大夫不食者日再周矣仲􅆂亟傾篋中錢與之村氓王氏患多男子仲􅆂至其家聞児啼聲甚悲盖氓􅀅溺之扵水仲涵為陳父子至情且惠以粟氓大感悟生之並舎三里􅀁溪流湍悍遇雨則人蹤絶仲􅆂造舟渡之金華洞溪其悍為􅀹甚舊有石梁乆壊而弗葺仲􅆂捐白金八百一十八銖為倡衆翕然而和未㡬而梁成當夏五六月赤日流金道多病暍者仲􅆂設湯􅀂濟之冬大雪仲􅆂晨出見寒士衣不掩脛齒相擊下上仲􅆂呼酒飲之􅅡火温之仍觧自衣纊裘為贈又甞禱扵廟寡嫗困卧廟門無衣愈扵寒士仲􅆂與妻周寯謀製衣一襲與之凡納交仲􅆂者無不曰此古仁人也或又曰其内外行如一者㢤仲􅆂自試藝不中遂不復有仕進意有薦爲月泉書院山長者仲􅆂辭不就及入國朝㑹求賢之詔下郡府絡繹致請仲􅆂􅂺以耳瞶爲辭巳而部使者趙君壽奉㫖蒐材浙水東以薦紳交譽力迫仲􅆂就道仲􅆂冠帶謁君辭意悃欵君察其誠也不敢强仲􅆂禀賦孱弱雖癯然若不勝衣而其精神緊峭矩度峻整人莫不親而愛之其扵倫品之間驩然相聚睦然相惇有如春氣流浹不知㤗和之襲人也性雖好施與􅁝毫事必咨禀扵長者不敢􅀻奔走兵燹中人見其䄂二書以行頃刻弗少離及事平還家取而視之乃宗譜家範也仲􅆂􅀁著書有遂􅀄齋槀十卷續文􅀋五十卷蔵于家嗚呼仲􅆂之死予安得不哀乎􅀄予讀書浦陽山中仲􅆂即􅀙余㳺先後十有餘年予􅀄無益扵仲􅆂而仲􅆂之相􅂇余者恒多時予執􅀴山長呉公待制柳公侍講黄公之門仲􅆂毎侍予往拜三公見其文亦以逺大期之自時厥後人事不齊不聚首者數載及予赴名揔􅁱元史與仲􅆂約曰子非青年矣予春秋亦漸髙行當侯汰而歸與子婆娑一丘一壑間聖賢心學之祕尚相與窮之史事雖畢復待罪禁林留南京者四年仲􅆂忽不逺千里来見且申前言予諾之而未及踐豈意仲􅆂先予而逝乎仲􅆂之子楷自為状来求􅃁上之銘其詞􅆞綿悲愴􅀹足以動予之哀思毎一讀之淚潸然下􅀁以乆而不􅀎成文雖然子扵仲􅆂忍不抆淚而言乎昔者徐仲車以孝行著稱惜以聾廢而仕不大顯君子以節孝謚之今仲􅆂之事無媿仲車者也冝􅀻謚以貞孝䖏士勒石墓門而埋予文墓中庶㡬少慰仲􅆂扵九泉之下乎仲􅆂姓鄭氏淵其名也其先世遷徙之詳見譜圖記曽祖德璋宋青田尉祖文轟父鉅毋周氏配室即周寯生一子楷也以文學稱女二一適吕堂一未行孫一燿生扵元泰定丙寅九月十三日卒扵今洪武癸丑正月十一日壽四十八以其年某月日塟某山之原禮也銘曰質珪璋􅀆絺繡文旣姱麗􅀆又栗温宜叄雅樂􅀆献明庭胡淪巖穴􅀆鏟其英匪進則退􅀆道之常保家肥􅀆譽彌章民同胞􅀆􅀔弗殊使我心側􅀆軫寒與饑少微煌煌􅀆雲掩之隂雲英英􅀆又不􅀎霖何前古􅀆後何今思羙人􅀆涕泗沾襟恭題御和詩後洪武六年八月十六日皇上特詔臣及翰林學士承旨詹同編􅁱日暦既而中書亦奏㫖徵浙東西及江右之士七人分年纂輯而臣與曰爲之揔裁九月四日開史舘禁中日輪寺人守閽太官進饍羞其事甚嚴且祕臣等昧爽而入至日曛始出復㑹宿扵詞林虞有宣􅂥盖不敢不慎也即成槀思得俊秀有文者通攷義例而繕書之扵是遴選二生具名氏以聞上可其奏其一則義烏黄昶昶時以春秋中浙江行省第十七名文觧肄業成均因移文􅀶士徴之十月二十六日昶至臣引見上扵西苑慰問良乆且曰爾何人之裔邪臣對曰文獻公溍昶之􅀙曽祖也上恱復見皇太子扵大本堂勉勞有加焉未㡬上遣侍臣出尚方綺裘革履以賜十一月十五日前御史中丞誠意伯劉基偕臣與同侍上燕乾清宫之便閣同􅀍酒而還愛昶有俊才揮毫賦一詩贈之字大如斚少選奉御傳宣召臣等赴右順門㑹上適乘歩輦而至同餘醒猶未觧上謂同曰卿醉未醒邪同對曰臣雖醉猶能賦詩贈黃秀才秀才謂昶也上曰詩何在同對曰在史舘中上曰濂宜亟取之臣旣上奏且􅀏謂臣曰朕即和同詩卿當為朕書之臣書訖歸與昶言昶自草莱賤士一旦遭逄盛際奎璧之光下照幽􅀮扵是粉黃金為泥寫上賜和之章飾以黃綾玉軸而以同詩附其後昶甞􅀙臣學臣又親見其事請記之左方傳諸悠乆臣伏見皇上聖神天縦形諸篇翰不待凝思而成自然度越今古非積學者􅀁可及然亦未嘗䡖發其俯和侍臣之詩豈非樂育菁莪以開萬世太平之基者歟詩不云乎肆成人有德小子有造古之人無斁譽髦斯士此之謂也昶尚朂之㢤昶尚朂之㢤昶字叔暘能古文辭善繼其家學者也是􅀊十有二月八日具官宋濂稽首頓首謹記水北山居記古之君子其居朝市也雖繁華之膠􅁑恬然視之而却有山林之遐思焉今之君子其在山林雖清曠有餘徃徃􅅓鄙為不足而數興朝市之外慕唯恐失之豈人之􅃔性或固然歟抑習俗相仍之乆而弗克變歟有能特立而不為􅀁移者殆􅀁謂盆盎中之古罍洗也湖府􅀴歴葉君伯􅌈世居永嘉城中永嘉為海右名郡南引七閩東連二浙䆠車士轍之􅀁憇止蕃舶夷琛之􅀁填委氣勢薫酣聲光淪浹人生其間孰不聞雞而興奔走扵塵土􅁳茫中以求遂其尺寸之欲伯敀則不然結廬蜃江之北茅檐竹扉僅蔽風日名之曰水北山居間與二三友携酒壷出由白鹿城登華盖名山持盃浩歌聲振林木或擢短具笭箵埀綸於江水中或呼小奚奴相隨行吟夢艸堂上詩句不逼古人不欲休當其適意時乾坤空闊竟不知榮辱之代遷而寒暑之徃来也人皆曰賢㢤吾伯旼髙情逸韵皦皦霞外迹雖朝市而心實山林其近扵古之君子㢤然予竊有疑焉使伯旼為布衣時假此以洗心滌慮庶㡬可也今佐大府為元僚任七品之職􅋍四民之望亦云重矣而猶不忘乎山居無乃不可乎試以伯􅌈之意􅊇之官書叢脞不暇爬梳戴星出入猶以為不足其能索句扵􅓦寞之濵乎上承乎府公下轄乎􅁺曹不敢抗之以爲高不欲抑之以爲卑慮冝詳矣其能釣滄波而出白魚乎民情真偽而莫之辨官事鞅掌而莫之集凝思入乎芒杪精析極乎毫厘其又能漱醪看山而流連光景乎是三者伯旼今咸無之而猶道之不置者􅀅馮夢以見之邪或志之以示不能忘也我知之矣士君子不以出䖏二其心故賤貧不􅀎攝貴富不䏻驕始終一節卓爲名臣伯旼之賢􅀁可稱道者盖如是而巳其視朝得簮笏暮厭雲泉者賢不肖果何如㦲雖然予猶有一􅀃爲伯旼告焉當大明麗天萬物畢照名一藝者必收占一才者必庸有如伯旼之學之羙誰不羡之其有不登扵樞要者乎泊敀冝悉屏江湖之念而益存魏闕之思俟它日功成名遂歸老扵水北山居岸巾而坐與三二友追叙平生舊㳺烹鮮酣觴􅀙容而賦詩尚未晚也賛禮郎張生子翊甞􅀙予㳺力與伯旼求記其事故相與一言之送徐大年還淳安序觀人之法當察諸心不可泥其跡仕不仕有弗暇論苟其心在朝廷雖居韋布操觚染翰􅁕以鋪張鴻偉上禆至化脫或志不在斯雖綰銅章佩墨綬朝受牒訴暮閲獄案政績藐然無稱古昔君子盖獨􅀼慎之予扵徐君大年之歸不能無􅀁感大年生淳安萬山中載籍兼該而辭藻豊縟有聲扵浙河東西當皇上龍興招延儒雅大年驩然􅀍山人服趨輦轂之下同􅁱前代史史成㑹有詔集諸儒議禮大年復與其事廷議將命官大年以宿疾辭去年秋中書奉㫖纂􅁱日暦朝紳各薦􅀁知予以大年知本末義例可以觀㑹通而無首尾衡决之患䟽其名以聞使使者持書下郡國大年即驩然􅀿命詣闕入舘之後俛首􅊥刺唯恐一事有遺記注者􅀜畧悉􅀘足為完文日暦成廷議又􅀅錫之官大年固辭如􅀄嗚呼使大年􅀄受命為一縣令長不過簿書期㑹爾招徕撫綏爾又其大者教化行百里爾一旦白身召入史舘大書特書使聖天子宏模駿烈烜赫萬古與天無極此其功與試􅈗者孰重孰䡖雖不仕猶仕也藉令自兹終老山林可謂無􅀒扵國亦可謂無􅀒扵學世之好議論者見其辭禄而歸摇脣鼓喙詡匕相夸奨不曰潔身而自髙則曰獨善以固窮夫士遭不願治之世披腹呈琅玕無有㪯目晲之者故不得已引退今當堯舜在上䕫龍滿朝之時以此疑大年者謂之誣士不斈則巳學則必期世用有如大賈行廢舉術寳貨填溢市區乃振鐸號諸人曰我不售我不售萬􅎅無有此理以此窺大年者謂之矯匕與誣要皆非知其心者雖然在昔宋室盛時布衣入史舘者僅六七人皆两制八座􅀁薦引其任甚不􅁿大年雖不受禄􅃂靈􅀁􅀍溥愽汪洋有加往昔大年􅀅有何以自效且春秋猶未髙沈痾容有郤薬之時行當杖䇿造朝門盡展􅀁藴以驚動世俗使向之疑有窺者瞠目不敢吐氣一辭則出䖏兩無憾不然長徃山林而弗思返日與猿鶴為友餐霞雲而潄泉石高固髙矣如不仕無義何洪武七年春正月一日金華宋濓引劉府君碣烏傷劉君大音字韶父凝貌寡辭撫世一以誠人至扵不忍欺當四筵合座􅅝聲撼屋居處其間黙如也或岀一言輙中肯綮而萬理皆觧且才識夐絶人多嗜􅃾田設巧穽期必􅀗焉君曽不舉目睨之世咸以病君君曰吾􅀅利吾㣧耳子柰何欲䧟之邪未幾多田夫苦賦歛䌓荷械赱氷雪中咤曰劉君其智人也㢤􅀊侵盗夜半入君舎攫金以去君揣知其人帥子姓蹤跡于野遥見一家燈熠匕紅君曰此是巴隔虎落偵之盗方轟飲昧爽縛送于官盗爲衰止即欲盗齚舌相戒曰劉家翁在何地容吾属乎族人瀕死子方乳以業劵泣授君曰非君仁厚不􅁕以保此有子與無子同願爲盡心焉君蔵劵篋􅄛􅀱子長召而觴之枚數以還祖揆弗逮事父訓復蚤世君每思之必潸然飲泣奉毋李夫人唯懼有咈其志君之弟晋継扵别宗夫人愛之甚泉􅀂布君縦其欲弗敢靳其焚劵周急拯難嫁􅄔又不一而􅁕嗚呼非古之􅀁謂􅁻士者邪君之傳裔有家牒中奉大夫公亮五世祖也家甞顯矣君雖不登仕版其行無慊者娶余生誠剛魯道四男子及女二賈叔文宋慎其壻也卒以洪武辛亥十二月三日塟以癸丑十二月某日夀七十三墓在潚溪黄垣之原􅀙先兆也剛既􅀙予學經有文聲而君女又歸于冡孫義當銘銘曰玉孕于山其木華滋淵産靈珠水則有輝郷有吉士俗醇而熈一旦死矣吁其悲題韓幹馬臨本余頗􅀗覩東觀􅀁蔵圖畫中有長安韓幹花騘圖真跡其糜砕已甚四􅁕自腕以下皆缺猶行水中然神采煥發如生似欲振鬛而長鳴者子意陳閎方䏻與之比肩而孔榮軰要不􅁕窺其髣髴也今觀此卷之筆法與之絶􅀋而紈素幸完豈不􅀹爲珍玩也邪題郭熈隂崖宻雪圖河陽郭熈以善畫山水寒林名盖得營丘李咸熈筆法其􅀁作隂崖􅁡雪圖大隂霮䨴而皓素淋漓使人玩之肌膚纍纍然起粟矣或者强指爲楊士賢相􅀋者殆未見其衝氣機也題趙大年鶴鹿圖趙令穣與其弟令松以宋宗室子精扵文史而旁通藝事􅀁以皆無塵俗之韵今觀令穰􅀁畫鶴鹿圖叢竹幽汀長林豊草其思致宛如生成余􅀮居仙華山中時與麋鹿爲友毎坐白雲磴上教鶴起舞故得其情性爲真開卷視之使人恍然自失書闘魚予客建業見有畜波斯魚者俗訛爲師婆魚其大如指鬐鬛具五采两顋有小􅀧如黛性矯悍善􅋐人以二􅇲畜之折藕葉覆水面飼以蚓若蠅魚􅄍泡菜畔知其勇可用乃貯水大缶合之各􅀭鬐鬛相鼓視怒氣􅀁乗體拳曲如弓鱗甲變黒久之忽作秋隼擊水泙然鳴濺珠上人衣連数合復分當合如矢激絃絶不可遏巳而相紏􅆞盤旋弗觧其一或負勝者􅁬威逐之負者懼自擲缶外視其身純白云予聞有血氣者必有争心然則斯魚者其亦有争心否歟抑􅄀頑不靈而至扵是歟哀㢤然予􅀁哀者豈獨魚也歟題趙魏公書大洞真經此卷乃趙魏公六十三􅀊􅀁書至精至妙非言辭賛羙可盡盖公之字法凡屡變􅀄臨思陵後取則鍾繇及羲獻末復㽞意李北海此正􅀁謂學羲獻者也舊甞􅀗見周侍御家侍御旣坐貶竄􅀼意必歸天上不知復流落人間今得披玩累日抑何幸㢤殷卣周彜可得而此卷不可得愽雅君子尚思謹祕而傳焉題龍眠居士􅀞馬李公麟􅀞如雲行水流固當爲宋代第一其􅀁畫馬君子謂踰扵韓幹者亦至論也丁晞韓趙景升雖極力學之僅僅得其形似而其天機流動者則無有也觀此卷􅁕以見之矣題周文矩畫狄梁公諌武后圖右狄文惠公諌天后圖相傳爲長安周景元作以筆法重輕較之盖建業周文矩爾非景元也予扵祕府多見二子真跡故敢鍳㝎􅀂此未知賞識之家以爲何如也若夫狄公拳拳有唐之忠史書之天下士大夫皆䏻道之予尚何言㢤題徐浩書徐季海之書本扵其父嵪之􅀁謂四十一幅屏者諸體皆備而草書􅀹工余頗􅀗見之至扵騰躍􅁬迅誠怒猊之抉石渴􅂹之奔泉也世徒見其變化不測如此非可以力致珠不知其一出扵真今觀此帖盖可見矣近代趙魏公筆法多效之誠可寳玩也題張旭真跡唐人之書蔵扵祕閣者頗多唯顛張真蹟甚鮮今觀􅀁書酒徳頌出幽入明殆􅀋􅀑神雷電不可測度其真􅀁謂草聖者邪題松雪翁􅀚音經後右趙魏公中年􅀁書雖若散緩而神趣油然充􅁕必索扵驪黄牝牡之外者方􅀎知之凡夫肉眼要不􅁕以識此也䟦德禪師舡居詩後右舡居詩十章唯菴然禪師􅀁賦盖禪師嗣法千巖長公千巖則普應國師之弟子也普應證道之後因欲避世多好舡中居至大已酉泊儀真􅉝亥泊呉江延祐丙辰泊南潯故咏舡居者頗多而廣録中􅀁載者僅一二耳今唯菴亦有斯咏其殆有􅀁本歟然舡非水則不可行水非舡則不可居必二者相資而後成也無相居士則不謂然我非舡何䖏不可行豈特水㢤我非水何䖏不可居豈特舡㢤是􅀅有不假迹而見不依形而存者矣唯庵以為何如唯庵之詩托物為喻無非發明宗門心要有益學者予故惟其祖孫相承之故喜而為之書翰林學士金華宋濂題宋學士文集卷弟十九鑾坡集卷第九
