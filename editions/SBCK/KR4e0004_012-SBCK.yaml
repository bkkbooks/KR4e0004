  text: 宋學士文集卷第十二鑾坡集卷第二
  hash: sha256:bb69e043e81c687fe70437e72d637b547f483b0e02ed08df623dcca84b6fa14e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_012-1a}
body:
  text: 題郝伯常帛書後霜落風高恣􅀁如歸期囬首是春􅀄上林天子援弓繳窮海纍臣有帛書中綂十五年九月一日放鴈􅀗者勿殺國信大使郝經書于真州忠勇軍營新舘右郝文忠公帛書五十九字􅀶二寸髙五寸背有陵川郝氏印方一寸文透扵靣可辨識盖中綂元年三月辛夘元世祖登極欲告即位定和議于宋妙柬廷臣唯公最冝四月丁未授公翰林侍講學士佩金虎符􅂶國信使以行宋相賈似道拘㽞儀真不遣至元十一年六月庚申下詔伐宋問執行人之罪時公在儀眞已十五載以音問久不通乃扵九月甲戍用蠟丸帛書親繫鴈足祝之北飛十二月丙辰伯顔南征之師竟渡大江十二年二月庚午似道懼命総管叚祐送公歸國三月虞人始􅀗鴈扵汴梁金明池四月公至燕都而七月辛未遂卒年僅五十三爾其書中綂十五年即至元十一年南北隔絶但知建元爲中綂也十三年正月甲申宋亡帛書爲安豊教授王時中􅀁得延祐五年春集賢學士郭貫出持淮西使莭頗見焉遂奏于朝􅃙中使取之十一月太保曲岀集賢大學士李􅀖寕以其書上仁宗詔装潢匠成卷翰林集賢文臣各題識之藏諸東􅀚而王約吳澄􅀽桶蔡文淵李源道鄧文原虞集皆有􅀁作矣昔蘇武使匈奴匈奴詭稱武死漢昭帝使􅎅者諭云天子射上林得鴈足有帛書言武牧羝澤中武因􅀗還此特出一時假托之辭非有事實也今當一介行使不通之際鴈乃䏻逺離矰繳而􅀅公書至汴其殆天欲􅂋公之忠莭邪㑹公巳北歸故􅀗者不以聞不然則是書之􅀁繋豈細故也㢤或謂世祖見書有四十􅀐㽞江南曽無人如鴈之嘆遂興師伐宋皆好事者􅀓㑹之談而不知有信史者也濂修元史既録詩入公傳今復書􅀊月先後扵卷末以見鴈誠􅀎傳書云王弼傳王弼字良輔秦州人㳺學延安北遂爲龍沙宣慰司奏差龍沙即世謂察罕腦兒者也弼以剛正忤上官去􅀮扵醫至正二年吉巫王萬里與從子尚賢賣卜龍沙市冬十一月弼徃謁焉忿其語侵坐折辱之萬里恚甚驅􅄦物懼弼弼夜坐讀金縢萹忽聞窓外悲嘯聲啓户視之空庭月明無有也翼日晝哭于門且稱􅁈弼召視鬼者厭之弗䏻勝弼乃祝曰豈予藥殺爾邪苟非予當白爾􅁈􅄦曰兒閱人多唯翁可託故来訴翁非有他也翁若果白兒􅁈冝集夀俊十人爲之徴弼曰可人既集􅄦曰兒周氏女也居大同豊州之黒河父和卿毋張氏生時月在庚故小字爲月西年十六毋疾父召王萬里占之因識其人毋死百有五日當重紀至元三年秋九月丙辰父醉卧兄樵未還兒偶歩墻隂萬里以兒􅀁生時日禁呪之兒昏迷瞪視不䏻語萬里􅀒至栁林反接于樹先髴其髪􅆞以綵絲次穴􅅐割心若肝暨眼舌耳鼻􅀲指之属粉而爲丸納諸匏中復束􅁓作人形以呪刼制使爲奴稍怠舉針刺之蹙額而長號昨以翁見辱乃遣報翁兒心弗忍也翁尚憐之勿使衘􅁈九泉兒誓與翁結爲父子在坐諸父慎毋􅂥􅂥則禍􅀅及言訖􅂘愈悲弼共十人者皆灑涕備書月西辭聮署其名潜白于縣縣審之如􅀄急逮萬里叔姪鞫之始猶撑拒月西與之相反覆甚苦且請録其行橐遂􅀗符章印尺長針短釘諸物萬里乃引伏云萬里廬􅁜人售術至興元逢劉錬師授以採生法大槩如月西言萬里弗之信劉扵嚢間觧五色帛中貯髪如彈丸指曰此咸寕李延奴天曆二年春二月爲吾􅀁録爾䏻歸錢七十五緡當令給侍左右萬里欣然諾劉禹歩焚符祝之延奴空中言曰師命我何之劉曰爾當􅀙王先生㳺先生仁人也殊無苦萬里如約酬錢并盡受其術復經房州遇鄺生者與語意合又􅀗奉元耿頑童奴之其歸錢数如劉今與月西爲三人矣劉戒萬里終身勿近牛犬肉近忘之因啖牛心炙事遂敗尚復何言縣移文豊州追和卿爲左驗和卿頗疑之雜處稠人内弼陽問誰爲爾父月西從壁􅂩呼曰黒衣而蒲冠者是也和卿慟月西亦慟慟巳歴叩家事慰劳如平生官爲具成案上大府萬里瘦死于獄部使者慮囚召月西置對弗荅吏罵曰獄由爾興今反不語邪月西曰殺我者既伏􅇳矣喋喋􅀅何爲尚賢竟以賂免􅀄弼訴縣歸親賔持壼觴樂之忽聞對泣聲弼詢之􅄦曰我耿頑童李延奴也月西􅁈已伸翁寕不憫我二人邪弼難之頑童曰月西與翁約爲父子而吾獨非翁児女邪何相遇厚薄之不齊也弼不得已再徃縣入牒官逮頑童父徳宝延奴父福保至其􅀁驗皆如和卿而鄺與劉不知其里居竟莫致云自是三􅄦㽞弼家晝相随行夜同弼卧起雖不見形其聲琅然也弼因從容問曰衛門當有神爾曷從入月西曰無之但見繪像懸戸上耳曰吾欲爇􅁚泉賜爾何如曰無􅀁用也曰爾之精氣能久存扵世乎曰数至則散矣二僧見弼一華衣一衣弊服華衣者居右月西曰爾為某􅁖行萌某邪心尚敢據人上乎彼服雖弊終為端人耳命易其位僧失色起去頑童善歌遇弼飲則唱漢東山及他樂府爲夀弼連以酒酹地頑童􅂺醉應對皆失倫客戯以醯代之頑童怒曰幾蜇吾喉吻矣何物小子􅁖􅇵至此嘵嘵然数其隂事不止客慙而遁月西􅀹號􅃛慧時與弼諸子相謔言辭多滑稽諸子或理屈向有聲處撃之月西大􅀏曰􅄦無形兄何必然徒見其不知也凡八閱月始寂寂無聞翰林學士承旨李好文節官中獄案造記而燕南梁載又爲序其事二文互有得失子乃合為一傳而其辭不雅馴者痛刪去之弼尚存年六十八矣有司誤以其􅀎異術貢之南亰上賜衣一􅊞遣還時洪武四年冬十二月庚辰也史官日司馬遷云漢武帝置壽宫以奉神君神君非可得見其音與人言等時去時来来則風肅然也予􅀼疑焉音麗乎形者也無形矣音何從岀㢤今周女無形而􅀎人言何其與神君􅁼欤且自重黎絶地天通人鬼始分禹鑄鼎􅁚物其政益備矣後世姦巫􅀑師乃使之瀆亂常經其咎尚誰執㢤雖然􅁻巫之術狡矣而卒􅀍􅀑􅀁殺人禍天刑終不可逭爲惡者盍少知懼乎抑剛正若王生􅀑不敢害之反敬畏之是知君子挺立天地間仰不愧也俯不怍也妖得而侮諸奈之何棄君子而弗學者衆也悲夫元故廬􅁜周府君墓碣銘有序濂校文南宫􅀗讀江右周子諒􅀁對策燁燁有竒䇿因㧞寘前列未幾子諒擢進士苐主事起曹日與之周旋乃出古文辭相示予復愛其峻潔而雋永􅀼意淵源之来必有􅀁自巳而子諒奉廬􅁜教授李處敬状請銘其先府君之墓扵是又信其家學相承之懿雖不䏻文憫其羙之弗章也庸因状之􅀁述而列之府君諱鼎字仲恒姓周氏其先自安成徙廬陵奕葉爲儒至府君益刻厲自􅁬思趾羙扵前人每試藝鄕校立論必超群彦右見之者矍然自失府君復以􅂣屋之業不足爲乃去從湜溪郭氏㳺湜溪名正表得静春劉氏三傳端緒静春實考亭之學也府君因與聞伊洛関閩之微旨六經中有􅀁疑􅆡從横扣撃唯􅂲其弗明積功既久多超特之見且謂詩分正變之􅀃固肇扵漢儒然而正中有變變中有正不可執一而求况其體製音節夐然不侔若虗心玩之䇿書紊亂瞭然可見必各從其􅁼然後可辨世道升降之由其詩雖非盛時之作其人既賢其音猶近扵古必附小大雅之正者􅂆懲之義庻有托焉先王以禮樂化成天下而扵詩之用見之其效至扵恊和人神之應非空言比也府君之名自是絶出四方執經問難者戸外之屦恒滿府君坐臯比爲敷繹性名之說析其顯微約其異同徃徃神怡心醉而去年逾四十出逰江漢間同里范君匯方提舉江西儒學延致府君爲豫章學者師其劍舄奔湊如家居時東南良二千石多名公卿岀受承宣之􅀉欲猗府君以爲重玄纁束帛交致扵門府君皆不受間一徃應九江之聘既至處以賔師之位亡何復棄去方嶽大臣馳書與幣請考試鄕闈府君辭又舉府君晦迹丘園府君庋其文髙閣漫若不復省當是時天下承平士大夫耻及􅁁事府君獨憂之力言四海大􅀔日趍扵亂一夫操戈而起則江南無駐􅁕之地此正可慟􅂘之時奈何􅁏食者不知慮邪遂著濟時十二策及戰守之書数千言􅀅走􅆣下獻之或指府君爲狂府君􅀏曰吾非狂吾言後當驗耳瀕行思毋夫人春秋髙遂止後五年辛夘汝頴兵動江南受禍最酷一一如府君言南昌學徒因乞府君䇿上之中書亦授九品官以歸初府君甞出應鄕書不肯少貶以就繩墨故不得志扵有司及赴部使者􅀻試輙在首選評文者虞文靖公也甚加噐重且有安得起成周樂工共論斯文之嘆府君言禮樂之化有契虞公意故不覺慕咏之􅀷也不幸年甫五十又八竟以一疾不起實至正乙未十月十六日也天乎命邪府君之先曰世徳生甫三􅀊其父汝正求兄漢中不知􅀁終其毋彭氏年未三十以節自守至九十一而亡世徳生天和天成皆以通經爲人師有不逺千里而就學者天成生浩􅀎讀父書尚書禹貢洪範甞重正其訛舛其扵春秋則盡黜三傳而獨遡求孔子之旨人尊之稱爲鐡石先生天和生冕蚤以推擇爲郡曹􅁺遷海北憲史着㢘直聲則府君之父也妣郭氏湜溪從女弟婦道毋儀两無􅀁媿配室李氏継室李氏王氏于男子三長恂蚤世次愷即子諒今以字行承事􅀰工部主事次孜子女子二歸郭遅郭經皆先卒孫男一圎女二以某年月塟府君扵里之楊梅原堪輿家謂非吉兆又改塟于屏山之麓實洪武四年正月之甲申也府君天資純孝憲史君殁扵廣東府君奉柩舟東還水陸数千里冐巖壑之險絶濤瀬之危每涕泣呼天卒頼以濟􅁼有物隂相之者為人俊爽􅀒氣節長身羙髯昻然玉立盖偉丈夫也賔朋滿座􅀹喜論史或觸其辭􅄡上下古今蝉聮不䏻休復曰如此則治否則亂如有用我者舉而措之耳性􅄝古文一洗宋季刻削纎弱之弊委蛇曲折各極其事情六經皆有論著未及完獨詩經辨正若干卷藏于家詩文曰貞一藁者又若干卷傳學者其孟子管子商鞅諸論為最偉云濂聞王文憲公每疑秦火之餘詩多錯簡今世􅀁􅀓决非孔子􅀁刪之舊欲􅁵正之有志未就而亡府君之生未甞與王公同時又未甞習聞其論􅀃而其􅀁見若合符節雖曰卓識逾常人逺甚而至理之在人心者終不可誣也昔者歐陽氏頗疑扵河圖洛書始亦自信其獨見既而得衡山廖偁朱􅁜編􅀚之其說絶與之􅁼故為序其書扵心之同者屡致意焉夫圖書者本無可議尚以渉扵神恠而非之况詩之音節體製不可強同辨而正焉方謂有功扵經學者溺扵久習之􅀓反譁然而疑之抑亦過矣王公已不可作謹列府君之行銘諸墓門用以慰夫九泉之下使知死雖未久猶有識其心者則夫千百世之逺未必無其人餘盖不􅁕恨也銘曰秦火之烈六經中絶我心䀌傷􅀆汗簡散落後先叅錯乃理之常􅀆廬􅁜有儒世守經畬有燁其芒􅀆疊矩重規擿幽發微無䀲不明􅀆伊君斯継益􅄛弗墜其出愈卭􅀆閩南之學日星昭灼我知其方􅀆察體審音載咏載吟别􅁼分章􅀆􅀔或犬牙正變紛拏大潴失防􅀆詩用斯著禮明樂備王道孔昌􅀆其學之暐有聲四起衿佩瑲瑲􅀆濡嚌聖謨敷繹道樞孰敢弗蘉􅀆譬如衢尊飲者欲奔何用不􅆇􅀆卓爾先見即知治亂覆謂爲狂􅀆材不時用道則彌重孰短孰長􅀆學有子傳􅄍辭淵然五色焜煌􅀆八尺之塋有山列屏千載其蔵􅀆故龍南一峰先生鍾府君墓碣銘有序府君諱柔字元剛姓鍾氏其系出扵魏侍中繇繇之十代孫紹京字可大事親孝自爲童時凡得􅀲果必先進最工書人號爲小鍾盖以繇爲大鍾也甞直鳯閣後從唐元宗平内難拜中書侍􅀰始居贑其諸孫曰某㳺䆠龍南復爲龍南人傳至諱伷字少㳺者擢元豐五年進士第􅊗二廣轉運使以功烈聞性􅀹至孝父殁哀慟擗踊聲不絶于口群烏助之哀嗚人爲建感烏堂府君則其裔孫也曾祖淳祖徳賢皆抱道潜耀以自樂父克俊在宋之季􅀘國學上舎生聞三宫北遷紏集義旅爲勤王之舉勢既不可爲乃登贑之馬祖岩遥望中原白雲􅄅瀰而翠華不可復見悲歌激烈聞者涕下巳而痛憤益􅀷誓不食元之粟賦詩壹章有自許有身埋漢􅁟終憐無淚哭秦庭之句遂赴龍頭江而死其忠義之志盖皦然云府君生甫一􅀊宋􅀄改物兵燹猶未息祖母吳氏與其母劉夫人挾之走南雄艱難險阻莫不備歴府君幸既長俾歸從鄕先逹雷州推官劉公震㳺夫人月自程督之府君性既頴㧞復知以紹述爲事昧爽即興抉冊映簷光而讀至夜漏下二十刻亦弗休由是融貫扵經子史集諸家握筆為决科之文頃刻千餘言長風驅濤而雷電與之相後先也夫人喜曰吾有子如是吾夫子爲不亡矣夫人或與府君語及龍頭江事府君輙長號弗輟幾欲無生及祖母與夫人相継而逝府君竭誠扵塟􅀕之禮觀者咸曰鍾氏世有孝子感烏堂之作不得專羙扵前矣府君􅀄娶田州判官􅇒君昌任之女生一子而卒興寕尹馬君良竒府君之爲人復以女妻之遂同之官凡馬君之善政􅀁以鋤姦扶懦滌􅁈䟽滯者皆府君有以發之廣東帥閫及海北㢘訪使者聞府君學行之懿交薦之署爲雷州路學正府君以海濵非久處之地力辤而歸下簾講授從者数百人咸共推尊之號曰一峯先生云府君儀觀偉然終日正􅁭危坐人莫􅀎窺其際晚益刋落英華窮極根抵􅀁居僅蔽風雨􅀁入僅足饘粥而處之怡然至扵赴人之急雖蹈水火有不暇顧者君子􅀹稱之府君生于至元丁亥正月某甲子殁于重紀至元辛巳十月某甲子得夀僅五十又五瀕卒無佗言唯属子力學厲行毋墜家聲而已􅀁著書有諸經纂􅀃易書詩􅄛義弊帚集若干卷蔵于家府君凡三娶􅀄凌氏生一子即恕字以行至正癸巳鄕貢進士署濂溪書院山長不赴次馮氏無子次􅓸氏生二女一早世一􅃴􅇒徳祥孫男三人曰肅曰緝曰熈女一人􅃴某曾孫女二人尚㓜府君之卒也塟干龍山之南洪武庚戌秋八月某甲子再遷于仙女湖之西與凌氏合塟焉實縣南之五里也惟府君生于忠孝之門耳濡目染巳䏻立乎其大者及求諸六經驗諸躬行􅀁見益真切􅀁􅀗益粹凝雖不見用于時而弟子從之者皆知􅀁謂孝悌忠信其有功名教甚多是亦爲政也中州君子恒言䖍南爲遐荒之地賢才鮮少有若府君者其裔胄之悠久家學之盛著文行之隆蔚􅀄亦何减扵中州人之好論議徃徃如是是重可嘆也因按鄱陽董先生之状大書以銘府君之墓庶幾白府君潜徳扵逺邇䖍南之士讀余文者亦當有􅀁􅁬勵而興起焉銘曰媺人之班班乎而忠信以爲冠乎而佩純知而鞶華文乎而光彩之如璊乎而長才詘而弗信乎而􅞽政而屏奸乎而柔之立而強之刓乎而皐比設而師道尊乎而反澆凉而為龎惇乎而一鄕之善士質其玉温乎而岐有鳴鳯魯有祥麟禹而天之生賢無方何暢復何屯乎而勒銘墓門乎而庻昭昭其永聞乎而承事卽彰州府彰浦縣知縣張府君新墓碣銘有序張之爲著姓尚矣自軒轅第五子青陽生揮爲弓正􅀚弧星始制弓矢因姓張氏歴代以来勲賢軒冕未甞乏人其居饒之徳興吳闡里者諱鵬仕唐爲節度使至五季時子孫猶授節􅃏宋天聖中龍圖閣直學士燾甞同文潞公諸賢爲洛社􅂄英之㑹暨還饒見旁縣安人有山名若嶺林樾蒼􅃳靈氣迴合因移居其下五世孫一清中特科進士第一與同邑湯文清公最相友善推究經傳反覆詰難必得肯綮乃已自時厥後族日以蕃讀書之聲琅匕乎西東擢上第者凡十預薦送者二十又七薦紳以爲榮一清若干傳至宣義􅀰某宣義生某舉進士上南宫歴斥時政之弊有忤執政遂下第某生英肥遯終身飲水著書以自樂有春秋属辭若干卷蔵于家英之兄國學上舎某當宋籙􅀅訖帥安仁義師從謝枋得勤王及戰敗家遂爲􅇕英子禹受方在㓜最號􅀌貧後􅀎遵廢舉之術大振其宗田貨悉逾扵前人􅀄無嗣育仲兄某之子璵爲後年四十七始生府君府君諱理字玉文十􅀊通經史十五䏻属文父恱曰吾宗書種弗絶矣爲築義湖精舎扵室之南偏聘明經老生爲師遐邇之士皷篋而来咸食飲之由是㳺從者日衆而府君聞見益廣縣令長嘉之旌其里曰儒賢云府君以累世科名欲起而踵其後復徃􅀙廬􅁜王君充耘習爲程試之學較藝江浙鄕闈不中遂學詩扵翰林學士承㫖張公翥張公見府君􅁭度冲曠􅀷噐之悉授以詩家之法府君窹􅄰不忘虞文靖公集覽其􅀁賦擊莭嘆賞不少置至正壬辰蘄黄妖㓂相挻爲亂破饒州已而安仁継䧟殺戮到雞犬府君携家避去臨川時江浙行省左丞老老公江西行省丞相亦憐直班公屯兵信之弋陽營壘相望府君遣張世英請檄起兵遂同弟瑑間道歸安仁聞外孫陳政養甲士三百以自衛府君召政與計事命伏兵于戸内椎牛釃酒誘僞帥二十四人醉飲干庭縳送于官斬之復諭其部曲曰爾帥已成擒即冝改圖稍緩成􅉁􅊽矣衆翕然歸乃研墨汁署其衣曰興安義兵二日之間得徤児四千金溪白砂盗周謙入境鈔掠府君命瑑􅀅徤児徃逐斬首数百㝷殱之白砂盗平丞相出兵平饒號一十萬至貴溪瑑以兵迎一皷而安仁復瑑受命攝縣事僞􅀅軍彭浩擁七萬衆逼丞相扵團湖丞相兵欲退瑑部􅀐卒執麾前驅丞相􅃍下令出戰浩大改斬首三萬級積屍如山瑑導丞相前進復饒州軍士乏食且重以疫癘府君率縣大姓輸粮一萬二千斛散之時㓂盗充斥南通閩北􅃴燕唯安仁爲便使者乗傳而来絡繹不絶皆仰給府君家爲之貧江西􅇵盗黄濂舉猖獗不可制左丞大你赤公檄瑑共平之府君授瑑計焚其窟穴賊遁去别據岩險爲拒守設伏于道瑑乗勝􅀷入賊突起而蹴之瑑力闘而殁府君失聲哭曰折吾右臂矣吾當上告方伯以復爾仇下命介子以奉爾祀庻幾盡吾心爾遂急攻廉舉㢘舉懼别降江西行中書未幾復叛府君與王伯羙夾攻大敗之殺其兄廉靖㢘舉夜走菘溪吳友文械送府君献諸幕府屍于市且求殺瑑者五人烹之而以中子爲瑑後里嵗儉人多相食府君移粟以振仍禁山谷氓勿出鈔道商賈懋遷如承平時四方辟地者三百餘家皆依府君以爲安五年之間號爲小康辛丑嵗八月天兵取九江九江與旴江連府君知天命有􅀁属徃賛其守臣王公漙以全城内附皇上召府君至南京擢知徽州黟縣事黟在萬山中自近代来髙􅁜鉅壑皆有賦民不堪命㑹部使者至府君力陳之言與淚俱使者以其事聞下营田司核實惟田輸粮餘皆置不問黟民得以少舒秩滿改知漳州漳浦縣及行民争擁馬垂泣而送之漳浦接連溪洞民善􅅍舊扵其地置汀漳屯田萬户府及入職方詔徴屯田軍赴京萬戸吳世榮遂叛府君集民兵攻世榮戮之具上奏中朝免其徴海㓂林仲明鄭惟明鄭君長恃􅀎出入海濤先後爲背叛漳州衛兵雖嘗剪除而渠魁逸不可捕府君悉用謀致之磔裂以徇民畏威不復敢爲􅅍俗尚妖術呪物食人久則成形扵腹中物動人輙死云役其魂爲奴府君㢘知之毀其滛祠数十區其害遂熄邑多良田其隄防爲潮水􅀁齧鞠爲草莱之區府君脩築之百里之間皆化爲沃壌􅁟豪羅季二族黨與甚衆恒持官府短長府君徒其家逺方事始帖帖府君且謂蠻夷不知禮義無善教以牖其良心爾乃爲脩學聘師集子弟而誨􅅚之三年之間政教大洽府知事孫希顔甞有求而弗􅀗及以􅂍墨敗誣府君以白金百二十銖爲贄刑曹逮府君坐以不冝與事巳􅇚􅀅趣装南還忽遘心疾恒怦怦若絃目不暇􅊕遂卒實主扵江寕欒氏其時則洪武五年三月五日壬子也年五十九同門友夏君通爲稱貸􅊞歛以某月日􅁠厝干聚寳山府君娶臨州王氏出荆國文公之後􅁻水州判官某之孫女也先七年卒子男尚徳次九徳即爲瑑後者次報徳女常徳􅃴臨川許􅀚孫男三人桐木東府君天性孝友父病亟夙夜􅈼天祈以身代仍刲股和藥以進疾乃瘳後二年卒事兄璵唯恐弗􅀗其驩心然操􅂂剛介不諧扵流俗而非義之財絲髪不取故居官之日命其子􅀒販以自給及其殁也槖無一錢識者頗哀焉濂為左史時見府君清溪上府君方以意氣自豪醉墨淋漓有鸞蹌鳯翥之勢頗異其爲人自是数與之㳺暨别去爲縣聲跡不相聞者六七年遇與府君交者輙詢之皆不􅀎道其詳今年夏忽有衰絰踵門者則府君之子尚徳也驚而問焉府君死且殯巳逾月矣嗟夫十数年来朋舊凋落殆盡如府君康強者亦復棄去人間世則夫沉酣聲利自恃以爲久長者果何如也因爲泣下数行既而尚徳􅀅奉柩歸故鄕以某月日塟于某山之原持夏君􅀁狀群行請爲文勒墓上濓府君之友也不爲之銘孰冝爲之銘銘曰維其文五色絪緼揚葩而􅄍芬維其武扼彼妖旅退縮莫予侮維才孔臧􅂚施弗良維邑之試變􅇵如易維澤之滂然維民之龎然維聲之锵然維神之難言胡不永其延吁嗟乎賢吁嗟乎賢曽學士文集序翰林直學士臨川曾先生既殁其子中衛經歴仰發其平日􅀁著望周山金石齋青華閩海昭囬從政丙午居賢前後編凡九藁及逾海逾遼二志通􅁼爲若干卷介其同年進士雷燧徴濓序其首濓時竊禄詞林脩史事嚴雖諾之而未暇爲後三年仰之弟儕復走南京申前請爲􅀹切濂􅀅焉辭惟曾氏出扵郕國公自都鄕侯㨿南徙代有顯人至扵文定公鞏文肅公布文昭公肇起扵南豐遂以文章名天下文定之製熛鷙奔放雄渾瑰偉文昭之作簡嚴平實温潤雅馴最爲學者之􅀁同慕不翅景星之與卿雲而文肅之子司農少卿紆固守家法亦以辭章稱君子謂如魯殿秦碑見者珎惜自可􅀌行扵二公之後司農従孫季貍蚤􅀙吕居仁徐師川㳺又􅀎大肆扵文其文言質而義正乹道淳熈間群公多畏敬之自時厥後作者􅁇􅁤要不可以一二数嗚呼何南豊曽氏之多賢㢤先生之裔分自南豐父祖皆宋進士書詩之業逺有端緒先生既承家庭之訓又出􅀙元夫鉅儒㳺鑚研六經孳孳唯恐弗力聞吳文正公講道華盖山褁粮徃叩之胷中疑難一旦氷􅇚自是逹之扵文􅁬迅馳騁皆足以如其志至正辛已甞舉扵鄕明年試禮部報罷當路惜之連薦爲校官皆不赴後十四年甲午始擢進士第助教國子修撰翰林出任江西行省􅀰官入成均為丞遂升司業進詳定副使拜監察御史已而復爲副使改今官而殁先生名位既顯海内求文者接踵而至凡得片言隻簡不翅拱壁之貴盖先生之文刻意以文定公爲師故其駿發淵奥黼藻休烈起伏歛縦風神自逺王良執御節以和鑾而驅馳蟻封也朱絃䟽越大音希聲而一唱三嘆也濤起阜湧飊行雲流力有餘而氣不竭也擅一代之英名作四方之楷則先生其有之矣濂也不敏幸識先生扵建鄴欲以古文辭就正焉而先生亡矣故因仰之求文歴序南豐曾氏世學相仍之盛書于首簡使讀之者知先生無沗前人則爲先生之子若孫必􅀅感激􅁬勵期無媿扵先生者矣先生名堅子白其字也剛明正直政事多可書已見其婣家危公素􅀁撰墓銘兹不書皇明雅頌序皇明雅頌者鄱陽劉仔肩之􅀁集也其曰雅頌者何雅者燕饗朝會之樂歌頌則羙盛徳告成功扵神明者也今詩之體與雅頌不同矣猶􅊞其名者何體不同也而曰賦曰比曰興者其有不同乎同矣而謂體不同者何時有古今也時有古今也柰何今不得爲古猶古不䏻爲今也今古雖不同人情之發也人聲之宣也人文之成也則同而已矣然則曷爲謂之同江河沼沚有不同也水則同陵巒岡阜有不同也􅁟則同人動乎物有不同也感則同趍其同而舎其異是之謂大同曷爲知其爲大同期歸于道焉爾歸扵道焉爾者何世之治聲之和也聲之和也柰何天聲和于上地聲和于下人聲和于中則體信逹順至矣體信逹順其亦有應乎曰有三秀榮朱雀見􅀛龍岀騶虞至嘉禾生何徃而非應也應則烏可巳也烏可巳則有作爲雅頌被之弦歌薦之郊廟者矣是集之作其殆􅁠輿者歟觀世音菩薩􅀞像賛梵稱阿􅅞盧枳伐羅唐言觀世音也其觀世音菩薩與南閻浮提衆生有大因縁凡衆生有急難者一稱菩薩名號皆得觧脫凡諸􅀁求亦復如是是故奉其像者十室而九各出巧思荘嚴妙相永嘉林一清爲上原尹治政之餘稽首參禮用清净毫畫東大瀛海水􅀔噴湧傍有磐石菩薩見天人相翹其一足坐彼石上護法大神身􅀍寳鎧駢立扵左善財童子乗蓮葉舟合􅀲遥禮自右而至其上日輪正照雲氣杳澷其下龍女持珠仰首而献品物咸秩􅀚者動容如親見菩薩扵􅀘怛洛迦山也比丘似桂乃孚中信公之上足也耽􅄝般若如飲醍醐以濂信嚮佛乗持像請賛濂􅀚一清運筆皆有􅀁表見非徒為虚飾而已中繪菩薩現大悲相表慈憫衆生故在大瀛海中表香水法界故日輪正照表本性圓明故雲影交重表塵沙無盡故大神威嚴表降伏魔軍故善財瞻禮表正信不囬故龍女獻寳表地無􅀁愛故惟􅀚此像者目擊道存不以像視像而以法視像瞻禮之頃三十七道品一時證入八萬四千塵勞門悉皆降伏則是像者其扵進道亦不為無􅀁助也胡跪作禮而說賛曰稽首大士天人師神通變現扵一切㝷聲救我衆生苦是則名爲􅀚世音大東瀛海洛迦山岩洞時時發光彩示以澎湃海潮音或因音聲而入者即得見佛了無二有一宰官施善巧䏻以繪畫作佛事大士寳相毫端現翹足而坐衣􅄶褼慈容顒顒屹不動紅光下照日正中雲影交加無盡蔵善財南詢􅃍作禮脚􅂿蓮花以爲舟龍女持珠向空獻種種皆爲法􅂬喜上有威神金剛王護持佛法極嚴猛我知大士無形相有相當與虗空等虗空廓落徧十方胎􅆑濕化皆含攝以至河沙諸品􅀋一一皆扵相中現中求一髪不可得願執湏彌以爲毫舒卷六合以爲􅁓畫此無􅁁相好身大地衆生眼皆見見者人人皆作佛百千刼罪悉消除不許役役從外求一彈指頃皆究竟陳氏譜圖記越之陳氏其先岀自頴州一遷扵光之固始再遷扵泉之南安􅀓若干世有諱如􅅛者生宋光禄卿舜華光禄生太常少卿知信州侁三遷扵越州府山新河之濵大常生朝散大夫彦弼朝散生七子知同安監詗㝎逺知縣訢國子司業諲餘則讜訓柔中季亡其名同安生文林卽仲錫㝎逺生四子仲彜仲粹仲寛仲賔仲賔魏王府記室讜生宗正寺簿大顯司業生四子大中大成大中大理寺簿長與季亡其名訓生二子名亡柔中及季其後無􅀁聞文林生恪自恪而下子孫富多今不可復知大理生宗正寺􅀶士頌頌亦生七子太學上舎嗣慶文林卽一新龍圖閣直學士知衢州又新次則艮柔蟾晉多亡嗣一新生二子麒麟麟爲艮之後麒左宣教􅀰生徳星徳元徳元爲麟之後徳星生二子元市舶都目克和及勝之勝之復爲徳元後都目生五子源敬復升瑞敬仕于國朝福建行省員外卽升金華縣學教諭勝之生四子仁遜貞禮自時厥後源生烈敬生煦吳府伴讀煦復生黙升生熊烝仁生燠燁焴遜生爟其繁且行盖未可量也予􅀼聞之自受姓命氏以来孰非神明之胄稽諸載籍煥然可覩􅀓世稍逺徃徃䆮非其舊而降爲皁􅀠者有之世德之傳固不可謂無人其衰微不振者抑亦多矣有如陳氏自宋以来擢進士第者先後相望功業顯融名著當世逮至于今而其流風遺澤尚有􅄛而無替不亦盛㢤光禄十一世孫曰敬與升咸與予交而敬之子煦復来受經遂以譜圖記爲屬子因効史傳世表序著之而不敢上遡其本源者盖氏族之學難言久矣析支分裔唯唐爲􅆟盛而國姓無㝎論林寳作元和姓纂而自姓不知􅀁由来今人􅀋􅀎非之予記譜如􅅛之上不欲妄加攀附誠懼後来者相非亦猶今人之非前人也継今而徃陳氏子孫當代加纂􅁱而弗墜庻幾其事核其言真而不昧扵春秋傳信之義云浦江戴府君墓誌銘濂弱齡時師事淵頴先生吳公扵浦陽江上先生素有林泉之思以五􅂥七十二􅈐之勝特徃㳺焉時某實侍杖屦之側未至五􅂥二十里日􅀅莫乃抵戴府君之居宿焉府君大布冠衣風神峻潔超然有前代遺風設筵以饗先生直至夜分四座皆摧竭不􅀎支府君危坐肩背竦直曾無動摇意濂􅀼異之因質扵先生先生曰府君之行可稱譽者甚衆姑與爾一二言之當徳祐丙子之變􅁖少年相梴而起執白挺暮夜擊傷民咸不䏻自保府君用計安之卒􅀎飬厥父母無他虞府君徃㳺浙水西或妄言府君道卒毋夫人朱氏􅂘之䘮明府君還念毋不置夜露禱扵天摘木葉曰冬青者浸水䑛之期年目復明人以爲孝感􅀁致朱氏既殁其継毋􅀓氏生子惠方秉爲政府君漫若不及知凡貲産一聽惠􅀁取弗與之較惠與郷井不相􅀎人欲求􅂩加害府君資其逺仕閩嶠避之貧民有貸錢不􅀎償者府君出質劑悉焚去婣族之無以自存者生使其䏻養殁使其自蔵汲汲如不􅁕􅀙祖毋盛氏張氏各生子而寡居府君養事之盡禮以全其節其子先長悉稽前人土田均予之此事尢卓異扵人人者濂聞已􅀼謹識之後三年應書郷闈識府君之子性中遂與性中㝎交又十年性中之子灝􅀙濂學經扵郡庠濂一一叩之其事皆如先生言則府君殁已久矣今年春濂有千里之役性中要濂扵道且泣且言曰知先人之詳者莫過扵吾子吾子倘不銘之孰冝銘之濂不敢辞府君姓戴氏諱珵字君玉世爲㜈之浦江人曽祖某祖某父子道府君享年八十有四咸淳丁卯某月日生至正庚寅某月日卒以某月日塟于止戴宅之原先配許氏生長明再配薛氏無嗣三配李氏生􅀙善思誠性中用和孫男灝某某嗚呼若府君者可謂一郷之善士㢤爲之銘曰其生也全其殁也安君子知其然而不知其􅀁以然請視斯阡宋學士文集卷第十二鑾坡集卷第二
