  text: 宋學士文集卷第二十鑾坡集卷第十即翰􅁐後集
  hash: sha256:41971e81c221dca638553cc2774771affdec0e062d863e351bbe116acfc0f704
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_020-1a}
body:
  text: 皇明寳訓序皇帝繼天岀治御大歴服七緯順度九圍敉寕爰自龍飛之􅀄以迄今茲金匱之蔵􅀊益月増乃徇翰林詞臣之請纂􅁱日暦以成昭代之大典粤洪武癸丑之秋八月甲午帝御東黃閣召臣詹同臣樂韶鳳臣宋濂俾選海内文學之士開局西華門内相與編摩成書而命臣同臣濂為之揔裁九月壬寅臣等旣蒞事發􅀁蔵而繙閱之仰窺神機􅌖㫁逺猶吿辰足以明徴定保嘉惠􅀖家者充牣乎其間臣等因相與言曰日暦之成蔵諸天府人有欲見之有不可得者盍如太宗貞􅀚政要之書編集以傳詢謀既同扵是輯成四十􅀋自敬天至制蠻夷􅁵為五卷揔四萬五千五百餘言皆􅀙記注之真不敢以巳意􅁿為損益云臣等􅀼聞之自古開基創業之君其設心也弘其慮事也周一言一動皆可為天下後世法治忽􅀁繫甚為不輕􅀁以大舜有􅃙天之誡武王有衣鑑之銘埀示于後炳若丹青歴代寳之用為大訓盖慎之至也肆惟皇上恭膺天命經營四方康濟兆民惟日不􅁕故凡戒􅅚臣工訓誓􅀅士出經入史亹亹弗勌必欲使其心領神㑹而後巳嗚呼日月之無􅀻也容光其必照焉雨露之無私也百物無不􅃳焉皇上法天而行覆燾無際恒恐一夫不􅀍其澤故精神之􅀁㑹訏謨之􅀁定誠與虞夏啇周之文相為表裏非太宗􅀁能企及此無他聖學緝熈内外一本扵誠而太宗則飾之以詐術故也貞􅀚政要尚傳之扵今則夫寳訓一書垂法扵千萬世盖無疑者非惟􅁇體守文之主􅀁當朝夕誦詠以知創業之艱難而三事暨大夫誠能佩而行之亦可以盡安上治民之責矣翰林學士承㫖嘉議大夫知制誥兼􅁱國史兼吏部尚書臣詹同翰林侍講學士嘉議大夫知制誥同􅁱國史臣樂韶鳯翰林侍講學士中順大夫知制誥同􅁱國史兼太子賛善大夫臣宋濂等上進大明律表特進榮禄大夫中書右丞相臣等誠惶誠懼稽首頓首謹言臣聞天生蒸民不能無欲欲動情勝詭偽日滋彊暴縦其侵陵柔懦無以自立故聖人者出因時制治設刑憲以為之防欲使惡者知懼而善者􅀗寕傳􅀁謂獄者萬民之命􅀁以禁􅁀止邪飬育羣生者也譬諸禾黍必刈其稂莠而後苗始茂方扵白粲必去其沙礫而後食可飡苟梗化敗俗之徒不有以誅之雖堯舜不能以為治矣夫自軒轅以来代有刑官而五刑之法漸著其詳弗可復知逮魏文侯師扵李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晋賈充又參漢魏律為二十篇唐長孫無忌等又取漢魏晋三家擇可行者定為十二篇大㮣皆以九章為宗歴代之律至于唐亦可謂集厥大成矣洪惟皇帝陛下受上天億兆君師之命登大寳位保乂臣民孳孶弗怠其訓迪羣臣諄􅃨數千言唯恐其有犯慈愛仁厚之意每見扵言外是大舜惟刑之恤之義也矜憫愚民無知䧟于罪戾法司奏讞輙惻然弗自寕多􅀁寛宥是神禹見辠而泣之心也唯貪墨之吏承踵元弊不異白粲中之沙礫禾􅁰中之狼莠乃不得巳假峻法以繩之是以臨御以来屢詔大臣更定新律至五六而弗倦者凢欲生斯民也今又特􅃙刑部尚書臣劉惟謙重㑹衆律以恊厥中而近代比例之繁姦吏可資為出入者咸痛革之毎一篇成輙繕書上奏揭扵西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也昜曰山上有火旅君子以明慎用刑而不留獄言獄不可不謹也書曰刑期于無刑言辟以止辟而民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代之凖繩實有合易書之㫖行見好生之徳洽干民心凡日月􅀁照霜露􅀁隊有血氣者莫不上承神化改過遷善而悉臻雍熈之治矣何其盛㢤臣惟謙以洪武六年冬十一月受詔明年春二月書成篇目一凖之扵唐曰名例曰衛禁曰職制曰户婚曰廐庫曰擅興曰賊盗曰闘訟曰詐偽曰雜律曰捕亡曰㫁獄采用巳頒舊律二百八十八條續律一百二十八條舊今改律三十六條因事制律三十一條掇唐律以􅀘遺百二十三條合六百有六分爲三十卷其間或損或益或仍其舊務合重輕之冝云謹俯伏闕廷投進奉表以聞臣等誠煌誠懼稽首頓首謹言洪武七年月日具官臣等上表元故文林郎同知重慶路瀘州事羅君墓誌銘有序嗚呼士君子立志孰不欲建功名垂竹帛哉或不能逢其時時逢矣或剛正忤物坎􅇄至死卒無以逹其志志弗逹矣使其名復宋寂無聞其􅀑不靈則巳脫稍有知未必不欝悒扵九泉之下操觚任紀載之責者寕不為一動心邪此予扵廬陵羅君殊惻然也嗚呼君諱文莭字仲正姓羅氏羅為江西右族唐肅宗時自洪都遷廬陵之秀川入宋以来家談仁義而人恱書詩以通經上南宮對大廷者㡬無虗􅀊朱紫相承照耀州里起綰郡章者四人而邑之令佐􅀹夥焉曽祖時誠祖宗􅁠郷貢進士父履泰字以通為元之鉅儒著書滿家春秋禮記周禮三經皆為之集觧復衍河洛圖書之義列圖三十多前􅁱􅀁未發出其餘力􅀘正戰國䇿舛誤數百條且為年表以次其先後行丞相府聞其名署東湖書院山長盖世號通齋先生者也君始能言其父抱就書室抽一卷授之祝其疾讀君指挿架牙籖曰吾齒稍長雖盡通之未慊也其父驚喜暨肄小學􅂺以氣䧺諸生莫敢與其齒後􅀙宦東湖賢士大夫咸折軰行為忘年交問學日進水湧而山出撫州判官燕君某辟為郡吏郡有獄疑不决守二争以為問君歴階而升摘其案語曰如此則為直如此則為枉儕􅀋大慙出竒計沮君㑹朝廷有詔造鹵簿器仗遣君至属縣督其成君至樂安憇縣􅇬中羣吏更謁互諌以為􅀑物􅀁馮不宜居君􅀏曰惡有是乃酣飲而寝夜漏下十刻月色微明見丈夫長而青立與檐齊君􅁬起執之曰爾来矣爾来矣應時而㓕黎明視之並􅇬有豫章穹􅂭而敷􅃾縣人祀以為神君曰其怪在爾矣歴數其罪用竹揳釘之未㡬豫章枯死怪遂息郡有織錦工甞籍于官竟遁入武昌出入辨章温公門温勢􅆋熏灼莫敢誰何復嗾君捕之縣知之不敢受君牒君直訴辦章辦章曰爾胡不求之府公乎君如言而往府公摇手相戒亦不復出一語君怒洊走辦章門辦章厲色斥之曰業已属爾矣復来何邪君曰工合􅀿官繇府􅀂縣謂其為社䑕城狐不能詰區區小人固不知何􅀁指明公乃方嶽大臣不􅂇半指之力如廢王法何辨章語塞即下令捕與之衆益譁曰是尚不畏温辦章其有我軰乎謀出之益急君懼禍及褁粮馳燕都燕都貴人亦忌君峭直髙門縣薄無可投足者遂入成均為弟子員一日方挾冊諷詠有相者謂君曰君兩顴入􅁂當邊徼建功無以乆淹為也君遂用國子􅂇教姚公登孫之薦上扵集賢集賢移文雲南行中書署君昆明州學正秩滿陞授孟傑府君列蠻夷子弟曉之以君臣父子之懿辭氣激烈􅃪者􅋍然轉普定府知事㢘行彌厲大理金齒宣慰司辟為令史豪酋侵人疆畎持黄金數鎰為君夀乞君勿右愬者君麾之去酋怒曰君賽天赤邪乃不納吾金也賽天赤鎮雲南之名相云君卒奪田歸愬者乾崖湎里當賦金使者至蠻人納賂往往過􅀁賦之數而金又不可免君至憫其愚反覆開導之蠻人鼓舞于庭曰微使者之㢘孰能恤我至是亟輸金而還俄入􅁺雲南行中書雲南驛􅀐皆官中給直官吏乾沒之以市馬責土酋君曰為天子牧元元者顧􅀂是邪痛懲其􅁦朝廷以雲南在萬里外下吏部凖循舊比行銓選之法使者至選君承其事君知積弊未去且曰王者無外敢不靈承上命以正其法乎獻五䇿扵使者吏受民賕者官不稱職者􅅒蔵不㑹者月日不登者居制未終者皆不調使者大恱悉􅀙之倖門遂塞滇池有神蛇能興雲雨㑹大旱民屢走池上若無聞者君為檄責之片雲歘然興雨因霑足南詔海中積葑成􅌎而浮㳺水上夷獠耕稼之號曰葑田田如不繫舟西東無定人交相為盗君命紀字為號䟽其歩畮及四畔􅀁届上于官官為給劵使者􅀁馮復植木􅍻海岸嚴其畛域不相淆亂或海潮漂蕩有藉以為奸者俾出劵環證之竟歸其田夷獠指示子姓曰此羅􅁺􅀁賜也否則人盗之乆矣監察御史至毎召君于庭事難定者必待君言而後决雲南王亦熟君行命陞為提控􅁺史提控掌六房之政人多畏縮不前君益淬濿弗少怠適中朝大臣喜意以失宰相意出參省事銳意更張庶事悉心任君君知無不言言無不聽名聲翕然動蠻夷中先是蠻夷有鐡甲郎者負固不服至是讙曰天子遣賢輔臣至矣柰何不降帥未附者皆来歸君之功為多鎮戍萬夫長伯胡行事多不法憲府繩之急伯胡擁兵以叛累􅀊不􅀎討曲靖宣慰使􅀑宗亦蠻酋也􅂇兵一萬夾攻之伯胡就􅅞莫府上功擢􅀑宗參知政事􅀅上省臣上下莫不與之君力爭曰雲南親王臨蒞之地辨章而下多八座大臣何得有蠻酋位邪茍録其功使以參政之名自鎮其􅁟足矣不然國體其謂何空一府咸曰微羅􅁺㡬失之矣􅀑宗懼托君鄕人囊金以獻君怒曰腕可㫁案不可署􅀑宗恚而止君疾惡如􅄷讎聞部使者徳住貪暴賦虎神詩以為風德住銜之賂西行臺御史以專權自恣劾君君走愬中臺遂擊德住去之夷人大快君以常調除承事􅀰同知彌勒州事政成謁選吏部遇鄕友羅玉扵逆旅乃勸君曰君以剛毅取嫉于人致齟齬一世秋髪巳􅌭紛􅀍肩何不謝事以佚老乎君慨然曰子言誠是也乃上乞骸骨之請以文林郎同知重慶府瀘州事致仕年僅六十三耳居數年中原道澁乃犯鯨波之險由海道至閩中而江西兵􅆋方亟遂不可還以至正二十六年十二月壬戍終于福州之民舎君未終謂其友曰此正吾死􅀁也夫何憾時閩猶奉元正􅃋云其壽八十洪武五年冬君之丧始還明年某月日始祔􅁙先兆􅀛山之原君長身而瘠胷􅁭磊落如青人白日喜面折人過雖王公貴人無􅀁避故有過者常畏君知亦有幸其知以自改者民事有屈而不伸君㢘得其實忿忿見乎色必以告司法吏因得白者甚衆知識􅀹絶人毎言某地當有兵變時承平人竸指􅀏之其後果然始服其先見生平急患難重倫義族叔􅁇賢乆居燕頗饒扵貲與妻柳皆老而無㣧嗣乃迎羣􅀙子觀逺為後觀逺至甫七日而􅁇賢夫婦死其服役者羅叅出而呼曰我甞為子矣觀逺何人乃欲與吾事邪􅀚逺弱噤不能對君亟告公府逐叄盡囊括其貲授􅀚逺且具舟車使扶二䘮還江南不特此也凡遘疾疢貧窶及死䘮無依流離不能歸者君必捐金倡義士周之􅀄不知其為何如人也君娶劉氏子男二人長大紀有文學而剛介酷肖君次次炳贈畨禺縣主簿􅀄次炳為奏差廣東宣慰府宣慰使釋迦班甞招峒丁三千即遣征連州峒丁怒至清逺􅀅為變衆憚弗敢往次炳請前峒丁彎弓相向次炳紿之曰宣慰命我来賞汝彎弓何為也峒丁退與清逺令歛繒帛散之乃率以往至連為㓂􅀁敗次炳􅀍擒備極慘酷竟不屈而死致有今贈女二人長適郭滋蘭先卒次復為其􅁇室孫男一人儆曾孫男一人某君塟後二年大紀汲汲圖君扵不朽以國史編􅁱趙君壎􅀁為状請譔墓門之銘鳴呼予昔揔􅁱元史毎求剛正之士在下位而不伸者載焉盖以謂雖不能㧞之扵當時􅂓使其暴白扵後世庶㡬死者無憾而生者不媿惜乎有司不上君之事也扵是徇大紀之請執筆而具書之百世之下必有因予文而知君者雖然予何人㢤文之傳不傳固不可必也􅀁可恃者世人􅃩君之行頗多多必則傚之則傚之必相與謹視之文其有不傳者乎信有人如君終至湮没無聞則夫天理人心皦如出日者果為何􅀃也嗚呼銘曰堪輿之間正氣烈烈在人為剛在物為鐡鐡尚可鎔剛則弗屈挺然常伸欲不可湼其一惟君之生能以志䧺遵飬以時日擴以充百壬􅀁忌吾惟正􅀙譬彼川流萬折必東其二古惟正人妖不敢干芃芃豫章變為枯菅誰鎮大藩乃復蔽奸我往折之聞者膽寒其三夷人何知椎結卉服宣厥􅃔經丕變其俗爾金我辭我直爾曲凡施惠利惟日不􅁕其四威靈既震叛民来歸鐡甲侁侁棄戈而嬉有聲洸洸有澤輝輝有知即爲不識位卑其五繡衣孔􅀭其貪若狼我斧我斨莫不加其亢形之聲歌庶懲而蘉覆謂我狂訾我以凉其六持此而行何適不艱坎􅇄其躬恬夷其顔胡不爾庸以豕爲冠鷹隼一出狐䑕盡跧其七賢否昜位􅂚以爲政君亦何傷人爲嗟咏禾黍離矣凉颸􅁄矣吉士亡矣何嗟及矣其八故文明海慧法師塔銘能仁氏之教流入中夏愈傳愈熾扵是諸師各有􅀁建立譬如一燈分爲十燈燈之用雖殊而光明則一也天台四教法性􅀚行之宗自南嶽以来開空假中三􅀚丕闡三千性相百界千如之妙一念之間具足無减其說尊勝宏特縦歴百千萬刼洸洸乎皦皦乎不可尚巳某竊怪方􅂁之士幸得與聞其教多視爲空言卒局扵小智之域良可悲也其真見實踐有若文明海慧法師者某安得不喜談而樂道之哉法師諱善􅁇字絶宗族婁氏越之諸暨人考某妣王氏當有姙夢神人授白美蕖法師乃生始能言見毋舉佛號合爪隨聲和之年稍長季父客授山隂靈秘寺􅀙治春秋經稍竊窺三蔵諸書喟然嘆曰春秋固佳乃世間法欲求岀世間非釋氏􅀅疇依此身不實有如芭蕉穹官峻爵縦因書而致寕得㡬何時邪大德乙巳投其寺僧思恭祝髪明年受具戒從西天竺大山恢公習天台教􅀚大山甚器重之毎言數百人中唯􅁇上人爾暨大山遷雲間延慶法師復往南天竺􅀙湛堂澄公湛堂器之如大山間問之曰入不二門属何􅀚法法師曰三種􅀚法属對三部此文既與止觀同成􅀚體的是從行湛堂又問諸􅀴之體為迷為悟法師曰體非迷悟迷悟由人顧􅀁詮經之㫖何如耳湛堂喜溢顔色曰法輪之轉他日􅀅有望扵斯子乎宗周文公時住集慶寺􅃩法師之學延主賔朋㝷領其懴事湛堂復速法師還俾居苐一座南天竺素稱教海法師提唱宗乘有聲絶出扵四方㑹湛堂迁上竺而玉岡􅃳公来􅀘其䖏仍留法師居其職學徒四集無不􅆂􅃾飲醇充足而後去天暦已已法師出世主良陼大雄教寺日講金光明經感法智見夢謂之曰爾􅀁談經與吾若合符節􅌚乎􅀁踐猶未逮其言耳法師遂益篤精進之行至正壬午浙省乎章髙公納璘兼領行宣政院移住天竺薦福教寺某甲子左丞相朶児只公繼領院事陞主天台能仁教寺法師凡三主伽藍執􅀴輪下者多豪俊之士宏闡法華妙玄文句朝講暮觧五章四釋奥義昭晣且䇿勵之曰吾祖有云止􅀚一部即法華三昧之筌蹄一乘十􅀚即法華三昧之正体須觧行並馳正􅂇兼運則圓位可登而不􅀒吾祖命宗之意矣盖法師抉剔􅀴髓敷繹祖訓如山川出雲頃刻變化而雨澤滂然四施若諸草木纎洪短長無不霑丐識者咸謂慈雲神照之再世云辛卯之春俄謝事超然獨往時薙落師與湛堂歸寂巳乆法師旣扵靈祕葺舊廬以奉祠事又往居南山明静院洒掃湛堂之塔其報本之念􅀹惓惓也魯未㡬何兵難荐作其高弟是乘請法師東還華徑池深木寒法師驩然就之且以無常􅌺速嚴􅁱净業繫念佛名晝夜不輟一夕集衆而言曰佛祖弘化貴乎時節因縁縁與時違化焉托乎吾􅀅歸矣遂索筆書偈端坐而逝時丁酉􅀊七月二十二日也世壽七十有二僧臘六十又三火化牙齒及舌根弗壊舎利纍纍然滿地其徒以某月日歛骨塔于靈祕之西坡􅀁度弟子三十二人嗣其法者則靈夀懐古延慶自朋崇壽是乘廣福大彰雷峯淨昱演福如玘報忠嗣璡車溪仁譲香積曇胄也法師氣局衍􅁉行履淳固山家諸書無不精徹而大江東南恒推爲教中之宗􅊰演妙法華金光明諸部􅀴凡若干㑹主􅁱法華浄土懴凡若干期􅀁感靈異不一而足是乘甞請著書以淑後人法師曰吾宗本離言說不得巳而有言為彰授受也是故意以至章安結集之後不過代相緘授而巳其間或有斥邪衛正者亦豈好辨㢤今大􅀴大法粲如日星之懸汝軰宜􅁱習不暇奚俟予言聞者咸服其一時士大夫若趙文敏公孟頫黄文獻公溍周内翰仁榮李著作孝光張錬師天雨皆結法師為方外交時相唱和扵風月􅓦寥之郷晚與黄張二公欲結樓煩浄社未果而法師殁當没之日叢林中皆相哀慕曰吾宗法幢仆矣後十七年演福件繫法師梵行徴濂為塔上之銘濂甞㳺文獻公之門聞公談法師之德之盛以為無譲古人恨不得映白月而濯泠風今法師不可見矣幸其嘉猷茂行猶得聞其梗㮣此無他遺光之􅀁照者尚有人言之後三十年則言之者鮮矣又後三十年則誰復知之者此金石之勒不可不致謹也因􅀙衍福之請歴叙而鋪張之千載之下有来讀斯文者儼然如見法師於定慧光中其有不蹶然興起而惕然自厲者乎銘曰姓具之正宗􅀆一念具三千三十即一念􅀆不後亦不先正依及假名􅀆各含空假中攝歸扵一妙􅀆互具而互融七祖旣善闡􅀆諸佛復靈承洞照六合内􅀆日月行大清慧命之攸􅀉􅀆文明得其宗揔攝大化機􅀆正受究始終法輪左右旋􅀆晝夜如環循隨其利鈍根􅀆導入不二門開􅁠以􅂋實􅀆懇懇為敷辭一多曁小大􅀆非即亦非離明暗色空相􅀆事法皆􅓦然真勝在妙圖􅀆非可以言詮談辯析玄微􅀆人天皆共聽幽通扵至神􅀆現夢􅂋祥徴三坐大道塲􅀆手執青楊枝灑物了無迹􅀆物得鬯其􅀻結期􅁱靈懴􅀆瑞異駢然臻吾法本無作􅀆有作即為塵啇飊一朝興􅀆吹仆正法幢清浄大海衆􅀆䀌然為増傷􅁇述幸有子􅀆龍􅁚方駿奔建塔為西坡􅀆庶以表化源贈雲林道士鄧君序臨川有山曰雲林列三十六峯延亘五十餘里其降􅀔旁魄壓閩嶠而凌麻姑拱華相而望龍虎靈氣叄㑹非樂道者莫能居之在唐之􅀄有鄧師䢿自鄱陽来采藥山中築瑞雲􅀚以爲錬大丹之􅀁既没且􅄟忽􅀙羅浮􅀉書還啓棺而視之唯劍履存其後裔多岀羽人􅀂仲􅁱君亦其諸孫也仲􅁱生有出塵之趣遂入上清宫爲道士􅊥規中天根之冗及抽􅄈沐浴之􅀱遵而行之用志不分忽遇異人仙巖之上出青臺靈書増益其􅀁未能太乙真人知其然又授以清净無爲之􅀃使合諸至道仲􅁱欣然言曰吾本粗云立矣當思有以利扵物乎乃習召雷役􅀑神之術晝夜存心若與明靈居􅀊丙申錢浦大旱􅁟毛盡焦縣大夫徧走郡望日愈赤如火仲􅁱杖劍登八卦壇叩齒集神飛符空􅄥中雲膚寸而起頃刻霮䨴㡬不辯色迅霆一聲起壇東大雨如㵼自時厥後六七年間東浙則蘭溪西浙則嚴􅁜江東則貴溪或值亢陽越部風紀之賢揔戎鎮戍之􅀅州邑長貳之官無不致辭仲脩仲脩出而􅀿之其致雨咸如錢浦時人竒仲􅁱謂有弭災之功云洪武四年秋八月上召嗣天師冲虚真人至京仲􅁱實輔行九月晦入覲賜食禁中旣而辭還山五年三月復詔中書徴有道之士六人而仲􅁱與焉未㡬遂選仲􅁱專祝祠之事留居朝天宫㑹天不雨京尹請仲􅁱禱之仲􅁱入室凝神而坐雷雨又隨至上恱出尚方白金以賜焉嗚呼天地之間不過隂陽二氣而巳有能知其化機而轉移之則雨暘可得而求矣昔者董仲舒以春秋災異之變推隂陽􅀁以錯行故求雨閉諸陽縦諸隂其止雨反是行之當時未甞不得其􅀁欲此盖吾儒之事也奈何古學失傳章甫逢掖之徒棄而不􅊰而道家者流得以倣而行之亦可以一慨矣夫然而天地一太極也吾心亦一太極也風霆雷雨皆心中􅀁以具苟有人焉不叄􅀻僞用符天道則其應感之速揵扵桴皷矣由是可見一心之至靈上下無間而人特自昧之爾仲􅁱㳺方之外得諸師秘文行之之乆翛翛然不為物役其能感􅄦神禦災難也宜㢤􅀁以昭􅀍􅃂渥道光前人而令聞長世也且不忘其本以雲林自號不芒尊師繪三十六峯圖遺之予因為叙文繫扵圖後盖圖以昭其先而序以著其行云䖏州福林院白雲禪師度公塔銘師諱智度號白雲因以為字䖏之麗水人族呉氏年十五􅁣然有出塵之趣欲就浮屠學其父徳大與毋葉民咸鐘愛師峻辭拒斥之師不火食者累日􅀂􅀅㓕性者父母知志不可奪使歸禪智寺空中假公薙髪受具戒即寺側楞伽庵深習禪定毎跌坐逹旦不寐如是者四三春秋巳而歎曰六合之大如此頽然滯一室可乎遂出㳺七閩徧歴諸山無有契其意者復還郡之白雲山因澄禪師道塲遺址築福林院以為牙數珠等法弟大賢上􅁕仁喆奉骨以某年月日􅄟于院西若干歩善女人唐净徳為建塔其上禪師静謐寡言機用莫測臨衆無切督之威嚴厲之色唯以實相示人􅀁至之處人皆傾慕如見古徳􅂉持香華供養􅂉繪師像事之不可以數計空中無見殁師皆為建塔求名公卿撰銘表之師度弟子凡二十人平日隨機開導􅀁作偈頌不容人録故今無傳者予聞信心為一切功徳之母苟䏻信焉奚道之不造奚法之不明自圓悟八傳至于無見究其􅀁得􅀁證何莫不由扵此也師自㓜齡即䏻信吾佛之道决可脫離死生一息不少怠􅀁以卒䏻徹究心源而縦横自在也世之知師者孰不曰無見有子而方山有孫者乎誠可尚也予甞接師護龍河上無懈容無蔓辭有問則言無則終日澄坐而巳因語二三子曰其􅀁謂信人也㢤今弟子某奉道巖之狀求予為銘予頗知師銘盖不可不作也銘曰華頂之峯有道􅀁居隨時演法大音鏗如入其門者無非獅子我福林師聞風而起當機一喝兩耳為聾法體如如情識頓空歷觸諸師見者驚愕言出霆奔無蟄不作振錫而歸我亦何心舉首睇之白雲在岑形雖遁蔵文采日露學徒烝烝雲輸川赴解爾􅆞縳祛爾翳昏其心濯濯其容誾誾乗運而㳺􅂉出􅂉䖏葉落歸根古今一􅁤塵縁既盡翛然而化叶擲筆坐脫如人赴家世相有㓕其性常在若謂師亡靑山可改東雒山房序有詩東雒山房者上清羽客周君雒之􅀮居也雒字彦愽嗜學而􅀎文其先居伊雒之上故彦􅀶以雒為名而又以東雒扁其居不忘乎本也盖彦愽之先南遷廣信者多歷年􅀁矣雖然彦􅀶學神仙之道者也他日披丹霞乗青鸞北升嵩髙之巔而俯瞰舊鄕寜不重丁令威之􅀁感乎金華宋濂為賦㳺仙之歌使書山房之素壁云歌曰飛騰太微共持瑶華玉管凌雲吹贈清源上人歸泉州覲省序大雄氏躬操法印度彼迷情翊天彜之正理與儒道而並用是故四十二章有最神之訓大報恩中有孝親之戒盖形非親不生性非形莫􅀉凡見性明心之士篤報本反始之誠外此而求離道逾逺清源上人曩自蚤􅀊即􅃩空門鬀落扵鳳皇之峯典蔵扵􅀟檮之刹無㣲不探有顯皆窮繼出世扵龍華俄分座扵天界宜了苦空之相庶盡有漏之因蓼莪忽咏陟屺成思贍巖雲之易孤歎春暉之莫報癡鈍翁之􅀉像終亦何心陳尊宿之編蒲願終其志扵是儒門席上之珍法苑同􅂁之彦察其誠慤各繫聲􅁔且徴題扵首簡用攄發其中情昔者栁州刺史投分濬師及覲省扵淮􅀯法鄭商之先犒屬為文采烜著叢林顧予末學焉敢效顰然而見善不揚非君子之操澆俗弗勵豈逹賢之為有若上人歴抵大方期扵深詣其􅁒明心見性者歟雖嘗絶學不廢明倫其知反始報本者歟契經最神之訓如来孝親之戒其䏻服行而弗悖者歟魯典竺墳本一塗轍􅂉者􅄮而二之失則甚矣自慚蹇􅿟馳逐章逢知本迹之不殊思内外之兩盡嘉斯篤行脗合道謨聿増名教之重不昧原本之義表而岀之以為世觀焉爾閱江樓記金􅁜為帝王之州自六朝迄于南唐􅀋皆偏據一方無以應山川之王氣逮我皇帝㝎鼎于兹始􅁕以當之由是聲教􅀁暨罔間朔􅀯存神穆清與道同體雖一豫一㳺亦思為天下後世法京城之西北有獅子山自盧龍蜿蜒而来長江如虹實蟠繞其下上以其地雄勝詔建樓扵巔與民同㳺觀之樂遂錫嘉名為閱江云登覽之頃萬象森列千載之祕一旦軒露豈非天造地設以俟大一統之君而開千萬世之偉觀者歟當風日清羙法駕􅄑臨升其崇椒凭欄遥矚必悠然而動遐思見江漢之朝宗諸侯之述職城池之髙深關阨之嚴固必曰此朕沐風􅌨雨戰勝攻取之􅀁致也中夏之廣益思有以保之見波濤之浩蕩風帆之下上蕃舶接跡而来庭蠻琛聮肩而入貢必曰此朕徳綏威服覃及外內之􅀁及也四夷之逺益思􅀁以柔之見兩岸之間四郊之上耕人有炙膚皸􅁕之煩農女有將桑行饁之勤必曰此朕㧞諸水火而登于袵席者也萬方之民益思有以安之觸􅀋而推不一而􅁕臣知斯樓之建皇上􅀁以發舒精神因物興感無不寓其致治之思奚止閱夫長江而巳㢤彼臨春結綺非弗華矣齊雲落星非不髙矣不過樂管絃之􅁋響蔵燕趙之􅃩姫一旋踵間而感慨係之臣不知其爲何􅀃也雖然長江發源岷山委蛇七千餘里而始入海白湧碧翻六朝之時徃徃􅀝之爲天塹今則南北一家視爲安流無􅀁事乎戰争矣然則果誰之力歟逢掖之士有登斯樓而閱斯江者當思帝徳如天蕩蕩難名與神禹䟽鑿之功同一罔極忠君報上之心其有不油然而興者耶臣不敏奉㫖撰記故上推宵旰圖治之切者勒諸貞岷他若㽞連光景之辭皆畧而不陳懼䙝也劉真人傳劉真人思敬吉之青原人少落魄不覊嗜酒好長年術及長㳺蜀中􅀙靈寳陳君受丹砂訣行混元之法徧歴海内諸名山年垂五十始入龍虎山爲道士自號爲真空子㝷出主毓和道院遂依訣鍊鈆乘爲丹砂得服之者疾良愈至元十八年世祖遣御史中丞崔彧至江南搜訪異人遂以真人應詔召對延閣語頗稱㫖上恒苦􅁕疾真人進六甲飛雄丹上吞之瘳復召問曰卿夀幾何對曰踰七十矣曰卿顔何童邪對曰亡思亡慮勿撓其氣唯一唯純以守吾真油油與大化俱有不知春秋之髙矣上恱賜葡萄酒飲之後毎賜飲輙醉醉輙仆地而臥上亦不之責由是出入殿􅋝無禁上與群臣言以真神仙稱之時有賜予辤不受居八年乞還山中上憐其老許之賜以銅簡銕笛及百衲􅂁之屬且曰此旌卿之素志也陛辭上方以金甌飲馬湩亟輟以賜之暨還結八卦庵扵琵琶峯后神情超朗當月白夜夝時岀坐磐石上持銕笛吹之依稀作鸞鳯鳴間鑿浴丹池䟽水一􅂀入池冷然也二十八年八月日正中呼陳錬師與之劇飲飲已曰我明日􅀅死故今與子醉别爾明日叩門無應者力排而入真人巳側臥而逝矣夀盖八十又一􅀁傳丹經十二方授弟子章希平等迄今行之至正間玄教宗師董公上其事制贈凝妙靈應真人云史官曰周禮訓方氏誦四方之傳道􅀁謂傳道世世傳說往古之事也史傳之得名殆法于此豈細故之云㢤夫事不可傳而傳之者非也可傳而不傳者亦非也要在精察之而巳矣真人之殁李君存爲序其書方君􅀙義又屬予作傳二君精察皆勝扵余必􅃀然有徵因為著諸簡牘以俟他日修元史者同虗山房記臨川傅鍊師若霖謁予扵鑾坡揖而言曰玄黄之間􅀁貴者虚廓落無象空洞無偶火不䏻􅅡水不䏻濡玄精攸宅仙靈􅀁都參之扵身脗合無殊南乾北坤西坎東離其中軒然如懸􅁰珠一氣闔闢萬化發舒非跡􅀁繫無形可拘真人㳺行精光燁如而虚之為義亦大矣㢤赱自得斯祕凝神扵静室間三田流鬯而百靈為之翕集既而受洞玄之文傳太乙之書驅雲役雷以􅂫旱暵布氣分神以禜除人災靈響頗著是皆虚之功用使然其或窒塞弗通則麄濁蕪􅁾􅅍之何以接溟涬而極髙明乎近者乙已之秋建山房東山故居遂以同虚扁之昭其義也先生以爲何如玄真子辴然咲曰幾則幾矣然猶不至也二而未􅀎一也離而未􅀎合也有迹而未􅀎無間也夫同者異之對也同虚者謂其虚相似而不異也而非純虚者也純霊則合合則一一則無間無間則凝扵道矣若霖曰夫􅀁謂凝扵道者何居曰至道無形契真于天後􅀚無後前􅀚無前不欲泊之聽其自全不欲張之懼其或愆貫乎窈㝠凝乎太玄出其遺餘亦可延年瑶池之曲具茨之顛餘奨茹芝飄如蛻蟬其視驅役禜除之法其尚何言㢤然而事有大小道無精粗皆吾一神之􅀁管攝欲升則升欲況則沈皆随其力之􅀁加與其時之􅀁届及其成功則亦一而已矣若霖恬淡而好讀書皦皦霞外誠韵勝之士也屡随嗣天師朝京師天師還龍虎山中若霖獨㽞侍祠扵竹宫則其超詣者可知矣予故創爲新􅀃以記其山房至若荘周之論玄徳有謂同乃虚虚乃大者不敢蹈襲而陳之也或曰同虚之義非是之謂也盖大同而玄虚云宋學士文集卷第二十鑾坡集卷十
