body:
  text: 鳯陽府新鑄大鍾頌皇帝既正大綂建都江表徳綏威讋萬邦咸臣用羣臣奏臨濠為龍飛之地賜名曰鳯陽南北民大和㑹百族錯居動十萬數然而物大而盛不假噐齊一之無以嚴昏旦之禁乃詔江隂侯呉良監鑄大鍾以㝎衆志以禆治化侯旣受詔遣使者至富春山中徴金工何成諭以天子明命成即日帥其屬十六人以從相地鳯陽城東三里搏泥成範畫其欒銑角衡之度侈弇惟良篆帶以方候其燥剛始穿冶一十又三錬青赤銅六萬五千斤筮以洪武乙卯冬十一月己已涖事厥明侯具法服以牛一羊一豕一祝告先冶之神禮旣成槖籥咸興皷動風氣炎光赫㬢上貫霄漢絳液旣澄氣憤雲洩循竇而入肅肅有聲陽施隂凝勁質斯具越二日辛未乃發復取牲血塗其釁隙以厭除不祥鍾髙十六尺有五寸厚洗濯八荒神物攸起是為帝里從者如雨扵焉萃止物大而豊往来憧憧節之以鏞罔敢弗恭乃飾鳬氏乃具鑪錘乃烹乃鬻化金為水赤氣夜明如日之升流凾而頳入竇有聲彬彬斐斐功同神鬼不鉏不鋙輪圓順軌旣啓其型敢愛斯性塗釁禮成榮光如星千夫齊力㙜搆懸植交杠孔奭載考載擊宅兮囷囷觸兮賁賁摩乹盪坤以警昕昏發攄靈氣昭融品彚物無疵厲年糓攸遂博碩而龎聲與政通拓羡集祥熏于家邦惟皇建極福之敷錫制噐有赫式和民則稽樂之原鍾實為先律呂以宣功垂不刋小臣作頌有羙無諷爰咨于衆是傳是誦題宋髙宗賜荅羅尚書手詔右思陵所荅新安羅公彦濟手詔一通其諸孫宣明装潢成卷不逺數百里特至浦陽江上請濂識之濂聞公自政和二年擢進士第𥘉監登聞皷院五遷至起居郎兼侍講兼權中書舎人公常上章控辭曽未㡬何再遷御史中丞故事中丞侍御史不並置乃更除侍御史公復求去甚力及改吏部尚書公復引疾奏乞宮觀及𥙷外郡思陵不忍公去故優詔荅如此由是觀之公之難進易退之風亦人臣所鮮能㢤况其經營淮南之策表章春秋法天生敘之言闢南雄守欲罪和議之䟽焯焯著于當時無志事功者恐不足以致斯或者以遂胡編脩岳太師爲公病是知其一而不知其二者也濂因徇宣明之請題諸左方而稍及公之行事使来者有所考焉詔中所謂擢冠常伯者唐龍朔二年改六部尚書皆爲太常伯然吏部爲諸部之首故行詞者據其事而謂之冠云玄英處士方公遺像賛予學子方孝孺玄英處士之諸孫也持處士像来請賛賛曰振騷雅扵江南混漁樵扵玊笥諫垣天近雖屢形州牧之童牛衣夜寒終不奪煙霞之志凛然亢直之風可折謟䛕之氣遵真曜之遺則造玄英之私謚唯其畜厚而發弘所以繼隆而傳熾紳笏蟬聮勲庸赫著蔓延閩浙之間莫匪雲原之裔敢申賛辤式昭瞻企觀心亭記昊天純佑九有民全以所覆卑我大明皇帝執符御曆撥亂世而反之正化行人流臻于秦寜然猶孜孜夙夜敬厥徳奉若天道赫如上帝鍳臨乃洪武十年冬十月丙午朔復勑工曹造觀心之亭于宮城上設甓為墉塗以赭泥中寘黼坐前闢彤户越七日壬子落成上親幸焉召臣濂語之曰人心虚靈乗氣機出入操而存之為難朕罔敢自遐自逸譬魚之在井雖未免乎跳擲終不䏻度越範圍况有事扵天地廟社尤用祗惕致齋之日必端居亭中返視却聽上契冲漢體道凝神純一弗貳庻㡬将事之際對越在天洋洋乎臨其上卿為朕記之傳示來裔咸知朕忘俾弗懈愈䖍臣拜手稽首而揚言曰書有之惟天無親克敬為親民罔常懐懐于有仁鬼神無常享享于克誠曰敬曰仁曰誠皆忠心所具非由外鑠我也此心若存則動靜合道建中保極之原清而弗擾庻績咸熈否則天飛淵淪凛乎若朽索之馭六馬唯欲之從而罔克攸濟治忽之㡬其始甚微不可不慎也欽惟皇帝陛下法天啓運乹乹終日不遑暇食十有五年大綂斯集政平人和休祥屢應斯皆觀心之明驗古先哲王相傳心法所謂精一執中之訓亦不過此聖子神孫必来取法當有不言而諭者矣雖然靡不有𥘉鮮克有終臣願陛下存神内居常如亭中時則心與天為一祥形敷正壹出自天衍億萬年無疆之休亦永無疆之聞不亦顯㢤臣不倿旣承詔㫖輙稽古書而為之記别有觀神亭與斯亭東西對峙其制同其義亦無異云扶宗宏辨禪師育王𥙿公生塔之碑有序我如来設教騁威神妙智之力示超絶極致之理視萬刼爲旦暮刹那之頃三際現前是故以生㓕爲一雖出入靡常而真如之性烔然長存旣無染淨亦無寡多習其學者往往深入禪㝎後天地而不凋不知孰謂之死孰謂之生也扶宗宏辨禪師現坐玊几道塲說法度人而絶去来之相預建塔扵盧山石耳峯下期他日爲設利之藏其上首弟子師秀持岳林佳山良珵所聚事行徴濂爲銘勒諸塔上嗚呼有若師者其殆䏻齊死生晝夜之理者乎師名崇𥙿字約之毗陵陳民子其母氏夢龎眉異僧乗肩輿直叩寢門呼曰吾将假舘扵斯母覺時有娠十月而生四歲始學歩七歲入小學資識趋羣童上十六觧通儒家言然體素尫弱十日而九疾毎覩佛菩薩像輙互跪瞻禮依戀不忍舎父母以其應夢冀徼靈釋氏愈之命從夀昌院東林暁公爲沙彌院有大梨木三十年不發花及師之来花開滿枝結實大如斚東林知爲祥徵度為大僧俾受具足戒俄蓬累而出登雙徑山謁寂照端公鞠明究矄唯以觀心為急務閲二年未有所證入偶逰東坡池因操觚成一偈寂照見之喜云此龍象噐也命為侍者使其便扵咨叩師弗從復走天目山見佛慧義公佛慧受以萬法歸一語師淬礪益力雖金墻鐡璧必欲拓𨳩乃巳佛慧亦期師有立所以警發者甚至又二年師急扵求證復歩中天笁山參廣智訢公一造户庭如膠􅃮相入即決以超脫死生大事廣智為舉臨濟無位真人之言且詰之云爾還知否師不斍下拜廣智云爾何所見而作禮耶師荅云拜者非是佗人廣智云從門入者豈家珎耶師云和上慎母欺人也廣智首肯者乆之越五年元文宗詔建大龍翔集慶寺于金陵起廣智為開山第一世師復往依焉選充維那之職未㡬陞主藏室留廣智左右者十餘年盡得其所為道御史中丞張公起巖問廣智云選佛塲中僧伽如此衆多其有弗悖般若者乎廣智云戒律精嚴言行不相背馳唯崇𥙿一人自受度以来脅不沾席者三十載矣張公深加奨嘆師之聲光自是日起叢林中朶兒只國王時以江浙行省右丞相領行宣政院事遴選諸方住持名旣上猶恐其未公也投鉤而㝎之師始出世太平南禪報恩光孝禪寺辨香之祝盖嗣廣智云師以誠遇物黒白翕然宗之一日令圬人塓璧璧中隆然如有物凾抆之已而復然扶之獲悉逹多太子像乃佛牙所刻成師召工傳以黄金金迸製設利從中涌出寺僧覺阜雕小香殿奉之遐邇施者日新月盛數載之内百廢具舉名聞于朝帝師大寳法王錫以金號尋遷九江圓通崇勝禪寺宋之𥘉有神僧道濟徳公将示寂累青石為塔語其徒曰此塔若紅即吾再来曁圓機旻公来鎮法席塔果紅色人異之旻公人號于古佛及其臨終復爾懸記有三百年後大興佛事之䜟師入院之夕衆僧夢旻公至而其塔燁然有光者彌月人尤異之先是寺之獅子巖大樹皆枯澗泉亦竭至是樹則重榮泉則再湧識者謂自旻公至師正踰三百之數其能動物蓋不徒然也寺當菑毁之後唯佛殿法堂粗立餘皆瓦礫之區師㑹歲之入庀匠傭工創僧堂旃檀林以居學子新梵音閣七間中塐觀音大士傍列二十五圓通像若三門鯨音樓經藏寳閣及上下塔院屬勤舊恊心而成之時榮國公火你赤以朝之重臣總戎江西慕豔師之慈行洊請敷宣大法申弟子之禮受持五戒而退洪武元年上即皇帝位發號施令雷動雲合開善世院以統攝釋教命大浮屠主之諸方以師名聞移主四明阿育王山廣利禪寺寺居五山之一領其事者若大閣璉公大慧果公無凖範公横川珙公俱一時名徳風動四方繼之者頗難其人聞師之臨少長咸恱香華逺迎者接踵于道時當仲冬見恬日妍天樂四聞萬口稱頌争言見未曽有及其接引未悟專指單提句上之功棒喝縦横逄者膽落兩序之衆自慶獲所憑依相與勠力凢宮室之傾仆者起之缺者補之䵝昧而剥蝕者完飾之五彩彰施赫奕亦既羙矣而元輿智起二師復營田七千餘畒以資食輪議者謂猶慈明之有楊岐宏智之有石窓也五年秋上勅儀曹建廣薦法會扵鍾山遣使者徴髙行僧十人而師居其首師至召至便殿問以佛法大意師以偈獻上覧之大恱因命師畫天界寺額賜食上前師或假寐鼻息㣲有聲隣坐引裾覺之上嘆曰此老人無機心誠善知識也師容貌魁梧日用之間服麄食糲一出扵天性無所勉强生扵大徳甲辰今年七十有五而康寧如六十餘人屢欲撾皷而退為衆所擁留而止三會語各有録行之于學者所度弟子曰某曰某云惟我昭覺大師上紹臨濟正傳得法者固多而虎丘大慧為最盛虎丘四傳而為破庵為松源二宗角立子孫䌓庻大慧五傳至佛智晦機師大辨明慧洞徹心源實與二宗抗衡而太中大夫廣智全悟大禪師出承其後師表人天上膺帝眷而聲名愈彰矣師以敦篤之資凝㝎之學當皇明建國之初作鎮名山續佛慧命歷十春秋輝光益衍非有大福徳者不能與扵斯也古佛乗願輪而再至意者或其然乎是冝有以昭示方来不當拘泥常情而弗預圖之也濂耄矣以辭章為口業有来謁者力拒閉之今特徇師秀所請而爲之者嚮真乗之善果締般若之正因也銘曰廣智人天師普度有情衆天華散毫端無非作佛事明光覆一切盛大莫與等若非古佛生㝎無䏻繼者懸記若燭照皦皦不可誣不然龎眉者何以叩吾寝庭棃乆絶華何以發祥徴歷抵扵諸家氣如獅子王一聲哮吼間頓使百獸伏出世方為人佛牙薦靈異脫彼泥塗内設利自然露俄入圓通頂種種示方便俯視九江水欲以一口吞塔放百寳光彌月光益熾起行庭宇間故物若宛然巖樹與澗泉本是無知物誰知枯竭餘重榮亦重涌譬諸籥中灰時至氣斯應不假扵外求實由因中起言言有徴驗建立大道埸所以彈指湏宮殿而一成移住玊几峯非惟緇素某鬼神若相迎天樂半空聞咸謂未曽有以法作布施有如大雲興徧周河沙界震雷􅊒􅊒鳴甘雨沛然下大根與小莖無不頼霑潤大乗境界中諱言神異事我今備說之欲警闡提者植此窣堵波不異青蓮花上品上生者佗時来示現洪武十一年云亡友陳宅之墓銘嗚呼吾宅之死矣銘非濂孰能為之初濂讀書浦陽江上宅之侍其舅氏呉徴君長卿来逰濂始識之徴君淵澄山聳發言不繫而咸中肯綮宅之氣象雍容楫譲合節鳯和嗚而玊鏘如也濂心異之進謁徴君退必與宅之言問其所從師則韓荘節公性黄文獻公溍也問其所學則治經為進士之業也濂時頗有志應舉相與詰難經義連日夕弗休迨别去猶依依南望至日落乃止自時厥後宅之聲譽日起大夫士唯恐内交之晚㢘訪使者行部舉爲稽山書院山長宅之辭宅之意氣方豪謂朱子可以引手致及試藝有司數上數不利乃撫几嘆曰慈親年髙矣予髮亦種種安能逐三五少年竸一日短長耶即退隱大山中朝夕親側不敢少離去濂聞而悲之至正戊戌濂避兵徴君家已而遷宅之之西軒濂携室人賈專及仲子璲長孫慎三世爲四人爾心膽戰掉若䘮家之犬宅之煦嫗而軫存之視濂猶弟兄遇遂與慎有若子孫宅之内子蔣夫人亦視專如妯娌然濂安之百里之外忘其流離顛沛之苦者宅之夫婦力也浦陽旣入職方濂挈妻孥西還庚子之夏朝廷遣使者来召濂趣装上南京擢爲王官與宅之别者閱十春秋其依依之懐猶浦陽南望時曁以病予告東歸思宅之之心逾切病間竟騎驢往見宅之大喜屐齒殆将折留連浹旬椎羊豕以爲嚮當夜半酒酣叙兵也仍娶于呉遂依女氏以居為流子里人宅之夀七十有七卒之日乃癸亥十一月六日閏月二十三日塟于戈溪之源娶黄氏夀十前十年卒繼配即蔣夫人有婦徳鄊人稱之壽七十四後五年卒子男四銕鋘鏞鎰鋘亦前年卒女二適吴義吳鐩鐩徴君長孫孫男六濟温浦潤浩潽女二尚㓜曽孫男四樟權梓橡宅之性雅飭行乎患難能以理自遣室廬蕩扵兵燹凾遷别墅曽無㡬微見扵顔色毎速故人飲酒賦詩以自適其詩䪨度深婉一篇出人競持去閭井之間恒樂親之乆而不厭徴君家将合族為義居宅之左右徴君為㝎科條以齊子姓至今守之嗚呼宅之已矣而徴君亦作土中人矣上距避兵之歲僅二十年人事變遷何所不有未知後二十年又為何如也唯有善名著予時述作傳扵人雖殁猶不殁也如宅之者是已銘曰五彩弗施不如赭泥我哀乎宅之受才則丕其數則竒我哀乎宅之歛其奮飛發扵聲詩我哀乎宅之墓門有碑太史勒辭尚足慰多士之思故筠西吳府君墓碑洪武二年冬十月二十有五曰筠西府君以一疾不起聞夀年雖八十有八其州里之人更相弔哭以爲義士亡矣吾屬将何所依頼十數里中聲嗚鳴不絶四年春正月六日塟于孝義里戈溪之源其孫鐩以濂知府君最深請張君辰件右功世取文刻碑文曰府君字長卿諱宗元號筠西其氏曰吳吳出泰伯苗裔初遷㑹稽之山隂唐大中間有諱翥者以學行聞門人私謚文簡先生先生逺孫少邽咸通𥘉復遷諸暨開化鄊之峽上少邽九世孫泗宋崇寕中復由峽上遷孝義里世有顯人其祥具見譜圖記曽祖蘭祖元祐父護母斯氏府君馮出也孕二十四月而生㓜發智如成人蚤䘮父事母夫人甚㳟黎明至寝所候起居躬進饍羞必待竟食乃退母常戒之曰我有媵侍自足備給使勿勞苦我兒也府君頓首謝及母有疾府君遑遑不自寕夜参半泣禱上下神祗籲以身代乆弗驗府君心益苦一夕母夢白衣人謂曰汝夀止扵斯今以汝子之孝特延一紀疾果瘳忽都魯忽公宣慰浙東聞君之孝辟爲奏差受事僅數月嘆曰我母年已耄苟力田以為養不翅足矣何以仕為竟拂衣而歸日在親側視其顔色為進退歷十二年母以髙夀終府君號慟㡬致隕絶服闋雖已乆但語及之輙哽咽流涕如新䘮見者憫之府君自念父母殁唯敎子孫母析居乃可以繼先志聞浦陽鄭順卿家十世同㸑特往謁焉順卿示以家範數千言府君如獲寳璐而歸力遵行之十有餘年家政蔚然可觀戸庭之間穆如春風人無間言者和氣所感有犬病足其子銜食哺之犬得不死文人競為歌詩羙之府君益堅為善之志製家教一篇誨飭剴切洪纎無不及而惠利鄰族之事居多召子孫示之曰天之卑矜吾者厚矣脫有餘財可坐視顛連而弗之䘏乎吾就地之日近故惓惓爲爾軰言之府君晚年耳益聰目益明健歩如強年人及見玄孫之生士君子减集府君危坐中堂一子康髮盡白帥諸孫曽雁鶩行以進次弟舉觴爲夀府君抱玄孫寘膝上衘杯盡歡蒼顔酡暈望之者謂爲神仙中人繪史遂爲髙玄聚慶圖以傳後三年府君遘竒疾陽道閉澁不復能小遺醫者云病在隂氣絶藥不能及法當噏而通之其孫曰鉅者遽如醫言僅得汚血一勺終不治府君度疾不可爲呼家人與訣以義居不分爲屬其耿耿猶前志云府君娶陳錢二氏皆先卒繼楊氏後府君亦卒子男子二長庸先卒次即康子女子一適同里斯文孫男四鐩銓鉞鉅孫女一花亭黄鏞其婿也曽孫男十源滉濤海汝治瀚渡淇曽孫女二在室玄孫男橚梓桷植府君性恬冲與物亡忤貌熈熈常如春未甞少見憂戚之容頗嗜音樂自造短簫長可六七寸遇風日清羙輙箕踞而吹之聲振林木而胷中之自信者一假是以洩之故當時之賢者多樂與之逰且惜其不沾一命之禄以展所藴終無以暴白扵世然而生受備物之養殁則朞㓛緦麻千指就位而祭雖古之封君亦不過此尚奚憾㢤濂也不敏頗甞獲拜床下與聞緒論及東出逃難及蒙授舘致餼如忘年交府君今不可覩矣俯仰今古悪得無情乎扵是掇其大者而製銘曰有夫之嬴如發行之真如家聞之馨如條敎惟程孰得而京如影端于形孰得而傾如蟄如繩如彚如烝如将歴世而弘如故諸暨陳府君墓碣惟陳氏逺有世序其先居襄陽之宜城有諱璿者生磐磐生斌斌生甸甸生宋國子助教旦始自宜城徙杭之萬松嶺旦生慤字公寔有文學一時名人如范元卿陸務觀辛棄疾咸與之㳺論者謂其氣節度量有郭元振之風官至承事郎知餘姚縣復自杭徙諸暨陶朱里慤生樵樵生載又自陶朱里徙開元横山之西載生國子監主簿瑞生嶨嶨生清清生徳興字克明從子洙嗜學如不及克明資之使受經名師食或告絶躬事杵臼市米以遺之卒成鉅儒克明娶曹氏生府君諱大倫字彦理自㓜岐嶷學易扵洙旣而更春秋年甫喻冠敷繹義例揮毫輒雲烟滿紙自度功名易如拾芥屢試藝埸屋不䏻中繩尺恚曰吾文視舉進士者何逺今不與之並驅造物困予矣将何言扵是棄絶益攻古文辭浦陽淵頴先生吴公莱以奥學雄文知名當代府君從之講學下及秦漢以来諸文章大家章有其法句有其㫖青燈夜懸或至逹旦不寐府君之學大進逺近歆豔之交聘為家塾師留富春山中者最乆富春右族多負氣善闘府君周旋其間每以訟終㐫為戒言辭悃愊無華聞者皆心醉俗為丕變馮士頥将合族為義食不問耄倪一聴府君言府君量其可行者樹䂓約如干則防範甚宻其家頼之狂士呉子中文而好訐歛怨于鄊羅山人集亡頼男子縛致幽室将樸殺之府君徑趨山人家揚言白爾曹欲殺吳子中邪子中無大罪豈可以嫌隙之細遽害之具耳目者恐不為也吾當白之扵官山人聞之懼觧縳與其俱来伏地謝罪府君諭遣之子中因得不死元季兵亂江浙行中書徴兵儲于饒饒之判官方沂實部其凡及押運吏入江爲敵人所襲上官将致辟扵沂逮捕甚急沂潜徃見府君泣訴其故抽刃欲自刎府君奪其刃藏沂山澤間且觧之曰兵儲之失罪在押運吏判官何與焉尋獲免沂見府君跪而語曰生死肉骨之恩隕身不足以為報府君張目大言曰方判官乃以市道交我乎沂不敢復言府君知時事不可為遂絶意仕進時江南行御史㙜移治㑹稽中丞呉鐸監察御史督烈圖王偲競欲挽府君扵州縣文學椽府君力以疾辭且䇿西師旦夕必大至决不暇安居乃遁鄰縣之東陽已而果然諸暨下髙郵欒鳯来爲州與李叅軍希白謀迎還府君以事師之禮事之州兵爲變鳯與希白皆𬒳害府君又避入流子里流子里在州東長谷中府君當两山夾澗作脕香亭三楹間日與賔客暢飲爲樂酒酣府君捉筆咏詩脱㡌髙歌擊几案爲莭座人每爲絶倒或氣候和適戴華陽巾服寛愽布衣支􅟏行古石細路間遇泉石佳處㳺目思視意若與之相忘人問其故府君嘆曰吾生平無他嗜唯攻文成癖孳孳矻矻垂四十年昔之人如此者何限今皆安在㢤毎搔首自傷但得適意時竟與萬物齊冥當不計有明日也識者服其曠達後三年以疾卒于家實吴元年十一月二十一日享年七十十二月十八日塟于某鄕吕塘之原府君娶樂氏生二女適傳某胡驥繼配張氏生一子曄善古文辭能紹家學者孫男五可牧可蕘可漁可農可仕府君長身羙髯性垣夷吐言露肝膽雖髪巳班白手不釋卷天文地里老釋氏之書莫不攬其英華尤善寫竹樹蕭蕭有蒼勁之意寫巳競取爲清玩所著書有春秋手鏡尚雅集各若干卷尚雅盖府君之自號也府君殁其友張辰既状其行復慟然謂人曰府君之才之羙設用于時當無適不宜奈何歛財操勢者銖黍不合度輙斥而不取遂俾甘心丘壑老死而不悔甚可謂當世有司弔若府君者無榮無辱全其所有而歸扵造化奚翅足矣尚復何說㢤曄持状来徵銘濂雖素知府君未必有加扵辰之言也謹備識之而爲之銘銘曰天之夢夢孰得而論賦才孔多乃卒堙瀹偘偘夫君纓㽔之門風措孤鶱所凝者神五彩成章随氣吐吞其光爛然可燭翳昏欝而弗施結爲氤氲彼狂者生取尤扵人将扼殺之不翅孤豚奮襼一呼兇徒裭魂有友阽危逮者星奔将蹈白刃誰欲命存匿之山樊慰言複諄平脫其生矢不以恩少見事為已復有聞假使大用何物不春惜丁亂離戎馬紛紜鶚書雖上荷衣莫焚咲咏烟霞傲晲乹坤時命所拘有志弗伸七尺之墳吕塘之原昭懿廓潜太史有文金華清隱禪林記清隱禪林在婺城西三里所禪林而謂之清隱者何昔者郡人士劉主簿嶠甞隱居扵此嶠字子淵事親極孝家雖貧力學聚徒以養非道義錙銖不取蓽門上鉶怡愉如也老扵埸屋一試吏而止風節行義翕然為邦人所稱說齋先生唐公仲友父子王荘敏公師心尤敬慕之宋淳熈𥘉文閣侍制南澗韓公元吉来守婺訪主簿君扵隱所愛其林壑幽清而汲甚逺為鑿井竹間名之曰君子泉泉至今猶存後一百七十餘年為元之至正壬辰有大比丘蘭室馨公既得法扵千巖長禪師乃與同𫀆古道猷公飛錫而来欲建禪林說法度生扵是月溪壽公聞二師之賢詣前作禮亟損兹地以為之基而里中樂善者曰章夀之倡衆聚貲為建殿宇及雕飭諸佛尊象已而棲僧之堂㑹食之所與夫門廡庖庫諸室次第告完皆二師同心化導之所致而名之曰清隱者盖不忘其故云當是時五山十刹鍾魚絶響㳺方之士至無憇足之所君子為之慨焉永嘆猶此禪林僻處斗隅往来者憧憧弗絶靡所不容多或一二千指皆使其忘行役之勞飽香積之味是誠何理㢤盖二師以誠感人以勤率物故施者川至而日用不匱也予聞佛說毗奈耶律云父母扵子有大勞苦護持長養資以乳哺假使一肩持父一肩持母亦未足報父母㤙由是観之大雄氏言孝盖與吾傳不異夫名區勝地世豈無之二師不彼即而来卓錫扵兹誠欲表主簿君之髙風而以孝道化度衆生庻㡬弗悖如来説律之本㫖也嗚呼賢㢤圓頂方𫀆之士入斯林者談空說有之餘尚思感發奮勵有以念其親可也蘭室既巳示寂古道今主持其事堅苦清峻為四衆所傾慕云故王母何夫人墓銘門人王綬䘮其母夫人何氏衰衣稽顙求造墓隧之文予與綬之父翰林待制君學為同師官為同朝揆義不可辭夫人諱妙音婺之義烏人大父仁父智母傳氏父早世傳厄于窮重醮金華俞氏俞故名閥夫人随母鞠其家逮長大父噐之撫其頂曰是女柔嘉其凡子儷耶時同里𥘉齋王府君良玊家居講授受業者百人大父為夫人擇配環視諸弟子心自計曰無有出王禕右者禕即待制君府君之仲子也府君揣其意乃命行媒相知名片言成姻夫人旣歸事君舅君姑甚恭待娣姒壹以和勝三族競誦其賢待制君方從黄文獻公學絶不為家謀夫人挺身任之不以一髮貽其憂待制君䏻以文辭嗚海内者夫人之助為多待制君出佐方州入官禁林恒挾少房與俱夫人安之謂世之當然自後待制君持節諭西南夷六載不返夫人攻苦食淡㷀㷀然與二子綬紳居歲時具牢醴祭王氏祖若禰奉巵酒前酹命二子拜後曰我王氏老主婦也禮則宜然聞者爲悲之夫人訓二子成人且爲授室抱二女孫宜㝎宜亦許適予孫恂夫人猶日治絲枲不廢經畫内政斬斬中度雖偉丈夫有所不能由是家寖𥙿然以待制君乆未還積憂成疾羣醫不可藥紳衋焉心傷凾刲股作麋以進竟不逾洪武十年二月十一日遂殁夀五十六其年十一月二十八日塟于縣南崇徳鄊青巖里之象鼻岡禮也嗚呼若夫人者其盡爲人婦爲人母之道者乎銘曰夫學方弘婦徳維貞同聲而相應也鷄號而興絲枲作朋克勤扵内政也青燈霄明顧影􅑏􅑏能安扵義命也國史著銘焯行幽扃欲其辭之稱也春日賞海棠花詩序春氣和煦海棠名花競放浦陽鄭太常仲舒開宴觴客扵衆芳園時日巳西没乃列燭花枝上花旣姢好而燭光映之愈致其妍扵是衆賔咸恱銜盃咏詩亹亹不自休酒半酣金華宋濂乃揚言曰李格非書洛陽名園記後謂園圃之興廢為天下盛衰之候其故何繇憶昔𤇺火之際冐雨風竄匿巖穴聞人歩履聲心怔忡若舂花草紅青何處無之有目不顧睱欲求濁醪一巵以澆渴吻尚可得邪今者衣冠雍容倡酬扵爼豆間花雖不觧言亦𣪚影婆娑若相與為娱樂者不知何自而致之亦曰聖天子在上廓清四海化呻吟為謳歌所以有斯樂爾帝力所𬒳如天開日明萬物熈熈皆有春意其視昔日之事為何如世道之盛其兆巳見苟不能詩則止能則烏可巳也雖然經有之無巳太康職思其居吾儕今夕無乃過扵大康矣乎宜知好樂之無荒而為良士之瞿瞿可也所賦詩自太常君而下凡三十人其三則賔客餘皆其君昆弟子姓云徽州羅府君墓誌銘府君諱旦字希明姓羅氏其先出扵祝融之裔受封于羅子孫遂以羅為氏始扵房陵繼遷䂊章長沙間歙之有羅則又自䂊章而分其居西鄊在宋為著姓有諱汝楫者政和二年進士官至龍圖閣學士知巖州以終生六子曰顥曰籲曰頡曰頌曰願曰頮皆曄然有文願字端良尤號雄深雅健為當時所稱有爾雅翼新安志鄂州小集等書傳于世府君盖龍圖之裔孫累傳至諱綺者官承節郎娶某氏有子四人而府君最㓜季兄迪禄乃馬氏所出娶汪氏年十九而亡無子馬氏傷之請扵承節君命府君為之後遂禰其兄而祖其父府君事馬氏如大母奉汪氏若生巳者歲時坐二母堂上帥婦子奉觴為壽邕邕如也其䖏同氣間尤盡禮訥然似不能言諸兄有酒而或使氣凌轢之府君咲曰兄真大醉耶兄慙而去䟽逺人困厄不能生府君飯之二十年及其終也復為歛薶之推而逹扵州閭貧不能蔽手足形造槥櫝以給之闘争弗觧将赴愬扵有司具籩豆酒漿呼而平之社祠壞民禜禳無地倀倀號諸野為屋而像之環秀橋敗往来者危顧視不敢度倡衆市巨木構之春和木氣萌農父入山刈新條以奮田刈者家單往往不食而作困頓道上役傔人舁淖麋食之府君之好施不特此也四方䆠㳺有過歙者皆假舘于府君乆而彌恭行復有所贐士大夫言及府君必同辭稱之曰惠人惠人云至正辛卯蘄盗起蔓延至歙府君謂諸子曰國家養肓汝曺乆矣今大盗攻城邑正赤心報上時也汝曺母以老身為念當思為破盗計扵是諸子募健兒數百人整其隊五部領詣轅門請自效旣而盗日熾家竟以此蕩毁至正丙申春府君避兵山谷盗兵卒至執府君禠其所服衣府君罵曰天子何負扵汝而反邪行将作𦵔醢矣罵不絶口盗怒以戈舂之府君堕澗中時諸子在軍無知者惟一女奴侍側扶至家而卒正月二十六日也享壽六十三府君娶吴氏諱月字徳明休寕人閑禮法甚得婦道亦以其年十二月十八日卒年視府君而加二齡子男三人守正宣明祖安宣明仕扵國朝累官将仕佐郎知淮安府山陽縣事以治化稱然孝行醇至甞刲股肉以起府君之疾女子五人適汪道原吴履仁程欽文汪士傳吴宗善孫男十人斗應潤祖韺童儀童山陽童喜童貴童貞童州童添童曽孫男七人茂保萬保忠保恕保犅保維漢保賀保府君卒之明年某月日與吴氏合窆里之官倍山禮也人之號丈夫者身都重禄而無毫芒之可紀徒見其湏鬛森張而已冠服委蛇而已是果何為者㢤府君以一韋布之士其行乃彰彰如是孰得孰失當必有辨之者矣宣明乆與于㳺素知府君之事遂為之銘曰惠利之施無間親踈是為仁之推赤心徇國白眼詈賊斯乃義之激吁嗟乎羅君非行之絶倫曷以致吾文吁嗟乎羅君宋學士文集卷第四十四芝園集卷第四
