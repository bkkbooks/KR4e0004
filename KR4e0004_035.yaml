  text: 宋學士文集卷第三十五翰苑别集卷第五
  hash: sha256:588bb0b3d3847c33386a7e04c28e8aebb3f5b9e9674cf7fbc743bbd684587748
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_035-1a}
body:
  text: 趙氏時思菴記晉府録事趙君德懷其名為古皋有請于豫曰古皋世居括昔嘗有屬籍于宋大父諱若順字和卿實魏悼王之十世孫通前古載籍之言論義下上若玉屑傾吐然恬于進取視銀黃焜耀漠然無動于中當時和景妍𬒳古冠服徜徉煙霞泉石間心曠神怡超然于塵塧之表有不知白雲之移隂而夕陽之在樹也逢賔朋滿座相與流連不忍舍雖不解飲見其酣嬉淋漓觥籌交錯浩浩然與之同適人豔之者且曰王孫家之故習也或曰遺落世事其逹士也哉于是州里皆稱為有德之士凡忿爭不直者悉來質焉交觴之酒使其各釋憾而去人至今能道之大母胡氏宋吏部侍郎絃之六世孫女婦道母範皆兩無所愧尤篤于訓子古皋生也時年已六十為之喜而不寐甫髫齓親自鞠育之節其燠寒時其膳羞及稍長使從名進士林彬祖學治經惟恐有懈怠意瀕卒猶執古皋手屬曰吾幸見兒成立將含笑八九泉矣雖然學無止法勗之哉朂之哉遂暝年八十矣大父先卒年視大母而少六歲大父卒于某年月日大母卒于某年月日以某年月日葬麗水縣北四十里和樂鄊之大平里遂建菴廬以為妥靈之所名之曰時思古臯蒙國寵恩參𬒳任使今又受新命將為縣繁昌官書有程不能持一觴走酹墓下願卑文刻諸菴中垂示孫子庶以著懸懸之思豫聞之經曰春秋祭祀以時思之言不忘乎其親也不忘乎親孝矣孝之為道非一而足也德懷行矣持已以廉清潔如氷雪庸非孝乎治民辨訟使各得其平又非孝乎業精于躬而名昭于時道足于已而文垂于後又非孝乎如是者德懷思之而日思之是則時思之大者不必時省塋域而後為孝也它日入躋法從出刺方州華軒結軫佩綬懸魚過家上冡以為一族光榮使人指之謂趙氏之有孫不亦美乎豫之有望于德懷者如是而巳德懷本名古臯今以字行博學有識以能古文鳴其為人也恂恂樂易所謂溫其如玉者云贈林經厯赴武昌都衛任序莆有林君士衡由進士起家署為比部主事政成遷武昌都衛經歷中朝士大夫相率賦詩餞之而以首簡授豫序序曰昔者艾軒林文節公謙之有慕伊洛之學聞吳中陸子正得和靖尹氏之傳因往從之自是專心于聖賢踐履之事一言一動莫不以禮逺近學者翕然尊事之南渡後以伊洛之學倡東南者實自艾軒始也艾軒嘗言曰道之全體全乎大虛六經既發明之後世注解固已支離若復增加道益逺矣嗚呼其言不亦至哉艾軒既沒其道一傳于林文介公學可再傳于陳文逺公元潔前承後引重徽疊照新學小生咸有所師法非先王之言弗道非先王之行弗行人號之為小鄒魯云迄今垂三百年流風遺俗猶有存者家談仁義而恱詩書敻然非它郡所可及君子之澤何其深且長哉今吾士衡固艾軒諸孫也其家學漸濡不俟言矣文行之謹敕亦從可知矣其治獄刑曹用法寬恕士君子復許之矣今擢為戎府元僚則其協比師率輯和兵民修治戎器用戒不虞此特其所優為者爾雖然未可輕也武昌為湖湘一大藩障其行中書所轄凡二十七府府各置衛或千夫長戍之而都衛總其凡其職與省臣鈞禮地連數千里戍兵數拾萬其練閲之方征調之節唯元戎能制之元僚能贊之其任之重也較然矣自道學不明學者纒蔽傳注支離之習不復見諸實用談兵之家尤以白面書生訾之士衡宜知所自重庶幾乎其可也雖然豫惡用是呫呫為哉昔也艾軒提點刑獄廣東親􅊾郡兵破殄嶺南群醜阜陵聞之恱曰林某儒生乃知兵耶特加直寶謨閣是知有用之學可以治兵可以撫民可以興禮樂可以移風易俗無所往而不當士衡尚推家學而行之其有不獲者哉况當聖皇御宇四方無烽燧之警皡皡熙熙不異于唐虞之世士衡日與大帥共論文武忠孝之道使勳在盟府之臣保其寵榮以終其身以遺其子孫暇則雅歌投壷發舒性情窹寐群絰一惟伊洛之是趍俾人人咸稱之曰是子也無愧艾軒之後人者也顧不盛歟士衡之行吾言止此而巳故封承事郎給事中王府君墓版文惟王氏所出不一有姬姓者二族有媯姓子姓者各一族有虜姓者析四族餘未睱論述然姬姓二族皆出于周其一始于王子晉之子司徒宗恭其後則太原琅琊為尤盛其一始于畢公髙之子畢萬其後則京兆河間為龍蕃二者皆以其王族故氏之于王云太原之族自秦漢以至于唐最多顯著與清河之崔隴西之李滎陽之鄭范陽之盧天下號為五姓載于史牒者班班可考也太原之裔有分居光之固始者自東晉南渡來遷泉之晉江溫陵里圖牒喪不知其為幾世至唐協律郎普又自晉江遷黃陽之延興里協律生宋大理評事文郁大理生校書郎訥校書生大理評事保隆評事生莆田縣尉仁暅縣尉生睿睿生連連生籲籲生鄉貢進士贈奉直大夫國光進士生給事中晞亮給事生長溪東尉桂東尉生贈奉直大夫潤之奉直生禮部侍郎太沖禮部生知南海縣事應麟知縣生元莆田縣典史子春則府君父也母任氏府君諱公榖字德良生三年而典史君亡稍長問其母曰吾父何在母曰若父死巳久墓木今將拱矣府君劈踊號慟即製斬衰絰帶追行三年喪事兄最樂先生朝有如其父絲毫不違其教今先生時號名儒以古文著聞亦盡心于府君鞠育導迪無不備至群族內外姻皆稱之府君肄業郡庠精勤越流輩夜將半鄰齋燈火盡滅府君獨焚膏挾册几坐如枯株自是能通一經發為大義亦整比可觀郡博士命題招弟子群試于堂府君特居首列會歲當大比同舍生皆踊躍入家狀期赴鄊闈府君獨漠然若無聞或勸之府君泣曰豫生髮未燥先公棄捐一念及兹肝膽為之折裂雖幸母夫人存鶴髮鬅鬙而疾疢撓之恨不化一刻為一朝尚忍斯須離膝下乎杜門不出日以色養為事及夫人卒葬祭一遵禮度哀號不暫舍性好施家雖單窶聞人飢凍輒解衣減食濟之不然夜不得井寢君子以為賢元季政大亂七閩之豪挾兵威以擅生殺割土疆往往致書交辟之府君度其無成皆峻辭已而亂愈亟府君挈妻孥避地仙逰山中曵杖盤桓而煙霞泉石日與之相親及皇明御曆六合載清而府君則頺然老矣乃謂其長子寅曰不仕無義吾非不知也苐迫于親老且病耳爾當力學淬行以繼其門寅遂以尚書中鄊貢第九名上南宫未及會試擢為給事中尋兼靖江相府録事階承事郎朝廷推恩封府君承事郎給事中府君之配陳氏先卒已十年至是亦贈孺人寅方攝監察御史按劾山西忽官書至驛言府君已殁寅匍匐奔還南京詣豫哭曰寅罪逆深重禍延先子以洪武八年十月三十日長逝夀僅五十又八寅將馳歸擇地縣南香山里白石峯之原以九年某月日襄兹大事而起母孺人之骨合葬焉惟先生職在太史中朝名公卿之墓無不藉雄文傳信于世敢奉楚府伴讀陳子晟狀再拜以請惟先生卑矜之豫聞閩多故族雖歷年千餘而其文獻猶有足徵者府君善承家學豈不思出就功名之會獨以親故不敢蹞步捨去則其敦厲孝行絶于人逺甚孝為百行冠冕所關彛倫者甚大此而不銘嗚呼銘寅能汲汲孜孜顯露潛德惟恐人之不聞府君亦可謂有子矣府君六子長即寅次曰同曰驥曰祥曰載曰龍同驥載龍夭女一未行孫一陵生銘曰人所貴者身身之所本曰親呼吸相通實一氣之分奈何離而去之南則之越西則去秦能敦本而厚倫者豈不在于斯人豈不在于斯人徐貞婦鄭氏傳徐貞婦鄭名妙靜衢之西安人其父頥本簮纓家娶周無它男子惟産四女而貞婦居其三年十齡粗通孝經大義沉毅如成人諸女或與之狎輒厲聲叱之皆畏讋不敢近父竒之慎擇所歸聞同郡徐思誠乃宋忠壯公徽言之七世孫代有顯人而思誠又習進士業燁燁而文于是慨然許之及合卺成禮貞婦巳十九矣時舅天祥與姑朱氏春秋皆髙貞婦靡曰靡夜事紡磚惟謹由是羞服備給上獲舅姑心凡遇賔祭亦悉意助集不足則質簮珥供事及其自奉疏食水飲井之若飴舅歿貞婦出所畜布泉為含禭衰絰諸費始得成喪思誠出卜藏地舟覆溺死上航溪貞婦哭慟幾欲無生不憚勞勩􅌾舅與夫先塋之側飬姑髙堂日問起居察時燠寒為衣進之退撫二子謙貞俾從醇儒學而與勝已者交非其類者絶之雖寒燈涼幌人不能堪貞婦處之𥙿如父母及諸姊憫其年少欲使其更醮貞婦曰吾夫固亡有二子在斯不謂之亡矣脫若無子其如姑老何義亦不忍去也具人之形而犬彘其行妾肯為之乎即引交股刀截去髻誓不二夫聞之者懼不敢撼貞婦見二子成立謙以行義察舉為部使者掾以政事聞擢為瀧水丞貞婦喜曰吾今而後可以見吾夫地下矣謙當之官會恩例覃及于親受文綺細繒之賜貞婦益喜召謙至出白金盤八授之曰國家寵恩至矣爾居官宜氷蘗自守祿或不給則售此用之慎母瀆貨為也洪武二年知縣何忠以貞婦年三十夫亡寡居二十八年氷清玉潔可以厲民風乃上其事于府知府王珍加覆核焉浙江按察僉事張思立復廉其非誣然後具牒上行中書以次逹之中朝三年四月得旌表其門如令貞婦今踰六十又四康強無它疾嘗有田宅為強族所據屢訟不得直夫歿讓弗與兢及宅轉鬻它姓貞婦贖居之識者謂貞婦知大體云史官曰禮始夫婦者何蓋有夫婦而後有父子有父子而後有君臣三者雖殊其道一而已矣若使婦不二其夫子不辱其親臣能忠于君天下其有弗長治者乎奈何世教淪胥士大夫誦法先王往往或至于悖君父有如一女婦之微不甚知書乃能抗節自守足以增于五倫之重亦可慨也夫故豫于徐氏之事特為著傳文一通不少讓將以厲子職樹臣節重名教非曰徒作也有來讀者毛髮將聳然而立矣元故湛淵先生白公墓銘嗚呼是惟湛淵先生白公之墓先生諱珽字廷玉白其姓也出于宋丞相時中之裔世居文水時中之從子翼扈蹕南渡官至防禦使生武略大夫良輔食邑携李因家焉武略之後又至武功大夫顯始占籍于錢唐生修武郎必騰修武生通武郎嶸先生父也妣方氏先生本四明名儒舒少度遺腹子通武育以為嗣五歲能屬對八歲能賦詩十三受經太學習為科舉業轟然有聲場屋間一時貴人爭欲出其門下甫及壯元丞相伯顔平江南聞先生賢檄為安豐丞辭不赴乃容授藏書之家晝翻夜誦燈墜花穴帽不知也如是者一十七年程文憲公巨夫劉中丞伯宣前後交薦之復以疾辭中歲嘗出遊梁鄭齊魯歷覽河山之勝登臨弔古訊人物風土慨然有尚友千載之意及至燕王公貴人見輒賔禮或欲舉為東宫官者先生復引義固辭南北孤逺士久困逆旅則必昌言甄拔之自是學益充文益富而家益貧宣慰都事鮮于公樞師一時名士援杜甫邵堯夫故事共買屋使之居會李文簡公衎出將使指喟然歎曰有才如是坐視其窮可乎力挽起之授太平路儒學正先生不得巳應命未幾攝行教授事悉心官政修建天門采石二書院政成當時事例可貢行臺令史逹官勸之行先生笑曰吾守章逢爾它何覬哉尋轉常州路儒學教授兵燹之後禮殿與堂廡皆廢弗治祭器載籍亦闕先生為完之且復侵疆三千餘畝俄再遷教授慶元未上翰林集賢兩院謀曰白先生淹回下列吾儕不啓齒一言可謂汗顔矣共尉薦之升江浙等處儒學提舉司副提舉階將仕佐郎時鄧文肅公文原實為之長與先生志氣吻合舉刺得宜文化大行秩既滿銓曹有不知先生者署淮東鹽倉大使先生自以鹽策非所諸習不俟終更即謝事養痾海陵逺近學徒簷䔲相從者殆無虛月先生已六十又七及再遷從事郎婺州路蘭溪州判官則不復有宦情矣曰與韻朋勝友曵杖遊衍銜杯賦詩唯恐日之易夕所居西湖有泉自天竺來及門而匯榜之曰湛淵因以自號晚歸老栖霞又號棲霞山人以天曆元年九月十五日卒年八十一其年十一月二日葬錢唐縣履泰鄊棲霞山之陽其子遵治命題曰西湖詩人白君之墓云先生性至孝母病刲股和藥起瀕死者再及歿號慟自擲嘔血至數升父感竒疾醫言必得兔矢可療先生踏氷雪緣崖穴求之三日不得父死抱尸哭絶而復蘇繼母虐不子􅍏子先生事之愈恭既而改適它氏無儋石之儲先生為營朝夕且負其避兵迄免于難然汲汲行義尤不顧家之窶孤嫠不能昏者嫁之死而無所歸者稁殯之遒中拾遺珠待其人訪索審而還之或以質劑假金匱乏不獲償焚而慰之生平無驕辭怠色一以謙抑為事聞人善未聞不豔慕見揚人過掩耳亟避去奉先之外不惑異端不諂瀆鬼神疾疢憂患之來一委之于天自幼至老無一日廢問學故能長于詩文𬗋陽方公回稱其冠絶古今有英雄大丈夫氣剡源戴公表元謂其注波五經之淵披條百氏之畹廬陵劉公辰翁又言其不為雕刻苛碎蒼然者不惟極塵外之趣兼有雲山韶濩之音皆確論也翰墨雖有餘事亦有晉魏風酒酣命二童持𥿄懸筆一揮疾如雨風聲光翕然四逹而先生素志丘壑以退為進故位不逮名君子惜之先生娶沈氏有賢行前二十七年卒子二賁文林郎南安路總管府經歷采溫州路永嘉縣鎮海東寨巡撿女一歸常州路儒學正鄭禾孫四栩越東明皆蚤世孫女一適平陽宋允恆允恆由紹慶路儒學正借授新州新興縣福緣寨巡檢賁以子夭命允恆仲子範為後範有學而文能繼其家者也範生子二弦韜女三先生所著書曰詩曰文曰經子類訓曰集翠裘曰靜語皆二十卷嘗鋟諸􅎚四方多傳誦嗚呼先生已矣濂也晚出雖不能識先生幸從鄊先生黃文獻公逰聽談杭都舊事有如淮隂龔公開嚴陵何公夢桂眉山家公之巽莆田劉公濩西秦張公楧虎林仇公逺齊東周公密凡十餘人相與倡明雅道而先生齒為最少乃與群公相頡頏南北兩山間其遺迹班班故在僅踰五十春秋而先輩流風遺韻弗可復見不亦悲夫嗚呼死者固不可作若并其言行而不彰將何以為聳善扶俗之勸于是徇範之請巨細畢書之嗚呼先生之名其果待文而後傳哉銘曰虎林有哲夫兮秉德良優柔嗜義如嗜利兮避名如避讎指退以為進兮謙抑每自修知分中自定兮不假外物求天經況所惇兮血淚交頥流冠冕百行先兮倫品庶不偷發越見聲詩兮笙鏞間鳴球律吕素和協兮八音交相繆雄章落四海兮虹氣日夜浮棲霞有名山兮草木光如油紀德薦石章兮千古振諸幽著存軒辭并序瑞安裴中季和以學行推舉典簿成均扁其軒居曰著存不忘乎親也御史中丞劉君伯溫嘗為賦詩以寫其情豫復師伯溫之意演為琴操三解使季和援琴而鼓之琴悲而不成聲聲信不能成也嗚呼孝子之思親果有終極否乎其辭曰人孰無親兮我親歸于黃土六合之間兮莫過我最苦風獵獵兮成音雲族興兮晝隂我親何在兮涕泗霑襟我親雖死兮我心不死開目則見兮威儀孔邇何俟當祭兮始如見之彼蒼者天兮悠悠我思求親冥茫兮曷求于身我身即親兮一體之分戰兢保持兮􅍏德日新毫髮不敢愆兮懼傷乎親上慎旃哉兮此謂著存端木府君墓志銘豫友端君以善既卒之一年其子智衰絰踵門泣拜而請曰智也罪釁深重禍延先公以洪武癸丑三月乙卯卒于南京之官舍夀僅五十又三遂以是年某月某日藏于巉山東村之原竊惟先公自少有志事功其善政在人者今多能言之又十年則言之者或寡矣又十年則無人能言之矣此無它人逺者其言湮世易者其事晦亦恆理爾一念及兹寧不使人興懷乎然而托名文辭者可以垂之無窮千百歲猶夫一日也此為人子者所恃以無恐願先生進之按學子劉剛狀君諱復𥘉以善其字也姓端木氏其先為衛人出于孔門弟子子貢之裔今獨以端稱氏者從省文也一遷于大梁再遷金陵烏衣巷三遷于溧水縣之巉山其詳備見譜圖記中曽祖時中祖安父邦逹妣某氏君有逺志不肯寂寂落人後至正𥘉以儒試吏江南行御史臺同列多貴逰子弟爭事表襮君獨泰然不失其恆行久咸畏服之俄遷書吏海右憲部君佐部使者行州縣彰善疸惡威聲獨著聞會四方兵動東南為尤甚君袖䇿言時政之急如此則可守如此則可戰否則有斂手就降而巳上官聞之皆落落不合君仰天歎曰彼以吾發狂言耶時事從可知矣于是悵然有鄊土之思溧水道絶不能歸僑居金華日以書史自娛至正已亥皇上親御六軍取金華命常忠武王錢之王聘君至幕下未幾君辭去會有言于朝者癸卯三月召為徽州府經歷徽為江東大郡政繁而賦殷君悉力佐治百廢具舉功則歸于其長田賦久不均民不堪命君即城東建局使民自實田集為圖籍核盈朒驗虛實而定科繇吏民隂為欺弊痛謫之不數月而畢由是民無逋租官無橫斂三皇孔子廟皆築臺門旅之制亦廢君或葺或建咸中程式賦不及民皆若不知者丙午冬改通判吉州府吉俗尚譁訐素號難治民召父老子弟戒之曰豫聞爾民尚豪侈樂訟鬪朝廷子惠元元春雨秋露無不霑濡爾曷為良民以報上德寧梗化以自成耶梗化弗祥天刑所不貸爾其識之民皆惴惴無敢執牒妄訴者丁內艱服除洪武辛亥春𬒳召赴京除磨勘司丞時官署新立凡泉粟之出納刑法之是非物貨之變易無所不當讞君從本逹支自流徂源勾稽隱伏纎芥軒露每一奏對上輒廷譽之未幾升為令君嚴于限域人見輒畏不敢有所請托俄僚屬皆以貪墨敗磔首東市唯君能獨存清白之行益表見朝著間冬十一月超授嘉議大夫刑部尚書君之用刑本諸法律而持以平恕老于議法者咸以為允杭州馬甲飛糧事覺逮繫者百餘人詔君往治其獄分郡囚别所人各鞠之合其辭參焉同多者情真否則偽郡守以下皆服罪壬子春三月拜湖廣等處參知政事階中奉大夫湖廣素號重鎮屬兵戈蹂踐之餘土曠民稀君首下屬州民復叢者復其賦一年次閲官書凡糧儲轉輸錢幣出入與夫軍裝工役皆預為計畫且會官屬問事不集者其故何繇皆曰一省所轄府州縣二百有餘逺者在千里外每官多闕其事因不集君奏請于朝擇在職賢良吏攝其政不數月無事不舉民驚以為神既而以事召還京師俄以疾卒先配石氏前卒繼王氏子四仁義禮智皆石産也仁先卒君天性甚孝自逰宦四方不能奉歡膝下心常慊慊然所得祿賜恆歸以娛親其奉巳則泊如也母既卒一念及之輒澘然泣下居官能守貧嘗著座右銘曰為官實難貧然後安事有不可急中存寬又曰心契上天腳踐實地人謂其能自警云君狀貌秀偉美鬚髯音吐鴻暢或治政弗暇休夜則焚膏命諸子環侍取書之嘉言善行歷歷訓戒至夜分乃止故翰林學士朱升嘗謂君為人其謙退似懦夫其專謹似腐儒瞻視精悍似俠客掀髯談世事似辨士而其精神超越又似逸人仙者君子謂為實録豫托交于君頗久而著勳焯能固後死者之責銘嗚呼辭然而年日巳邁文日以衰無以應四方之求近因燔毀筆硯一切謝絶之而中心猶以為未慊也雖然智之所謂則有不得而忘情者遂備采剛之所録而繫之以銘銘曰惟士也良有志則剛如挾干將始晦而夷出遇而熙一躍而飛筮仕府僚因賦定繇功而不驕轉佐方州革俗以偷訓言繭抽磨勘設曹蠶絲牛毛孰得而逃進領秋鄊邦憲是經中乎凖繩往蒞大藩以執政原江漢又安材長如河夀則弗多其如命何有子治經足繼簮纓縱死猶生巉山之原木古泉寒銘在不刋正誼堂銘三代而下惟漢董仲舒最為醇儒其輔江都易王也告之以正誼明道之語千載之逺人猶誦而法之此無它慕之也長樂有士名時貢其姓亦董氏以文行入選亦充椘王府伴讀朝夕執遺經侍王開陳內聖外王之道遂慕仲舒之言取正誼名堂徴豫銘銘曰惟仲舒氏其德之醇其四方之所則效其有間于越秦矧同出于巳姓􅍏𥘉亦一氣之分雖派别而枝殊比之異族而尤當親其所親親之伊何正義是遵赫明命之在目思制事之有倫豈絲髮之敢私察夫人之相因廓然大公一歸至仁此所以務為匡正鄙其詐力不足稱于大君子之門更生之許王佐斷不為夫而孟堅之著論乃徒致于紏紛有美董生文行孔馴當侍經于帷幄曰摩切于典墳苟拾級而漸升又安知不為王傳之尊名若同而實同將何愧乎古人彼峻者堂聳以華棻我銘其楹用代書紳仁和圓應菴記杭之仁和去城東五里所有浮屠菴曰圓應乃雪菴禪師之所築也其地當元季為戰鬪之區莽無居人及歸職方而後遺民稍集往往好勇嗜利屠羊豕以成肆師惻然憫之托鉢行化有禇道真與金薌者首迎禮之先是道真之家人夢異僧至其廬倡偈為贈及見師容貌服飾儼然與夢中不殊道真即言之于衆翕然從化遂與薌日乞食饋師且請于右族胡國材共建精舍一區葉氏婦聞之捐地為基以尺計者縱袤若干橫延若干于是道真因之鳩工前敞修門中峙佛殿後聳堂宇翼以兩廡而外則垣墉四周庀事于洪武甲寅春二月甲子至秋七月某甲子遽訖㓛焉屋以間計者二十粟以斛計者一百工以日計者五百師欲垂爾後人乃不逺千里介豫學子童徽來請記豫竊疑之當兵戈始息創殘猶未起何暇從事于佛乎縱師言之而疇將聽之徽曰不然師之事則有異于人者師本辨章寶寶公之子生有異徴年十五慨然慕道思以善法度人往依帝師法子朵兒班大師剃落為僧遂杖錫南遊偏參閩浙諸尊宿得法于伏龍山千岩長公去棲越之范蟸岩岩有虎一夕避去師𥘉不知書靜㝎之久發為頌贊自然與道合以是之故人愈趨之而庵成無難者豫因歎曰人苦無志耳果能以善導人而人孰不化之豈惟浮屠氏哉然而浮屠氏以莊嚴樓閣為有為縱有福報亦人天小果耳其中必有無為之道存所謂無為之道者無小無大無內無外無成無壞無欠無餘不為諸佛而有所增不為凡夫而有所減淵默不言而聲如恐霆凝㝎未起而身遍沙界是則所謂圓應者也一庵云乎哉惟師能契事理之不二者必知豫言為有據徽歸尚以是語之師舊名孛羅帖木兒今改可傅字無授髙昌人雪庵乃其徒所號蓋尊之也題氷壺子傳後松陽周世英其名為繹祖通經書有長者行凡遇過客匱乏者必傾資濟之客去藐然不記其姓氏然于利養榮名尤視之泊如也近舍二十里有火光發山中上燭霄漢連夕不滅有精其藝者密告世英曰此白金之祥也唯薑氏之地其礦獨夥公片言可得之慎毋泄也公叩諸薑氏果見從遂㝎劵持泉與之擇日將鑿石取礦或譏薑氏曰爾家就其地軋麻為油數世矣利孰大焉奈何鬻之鬻之果義乎非義乎世英聞之歎曰不義在我非彼之罪也乃折劵棄泉以其地還薑氏薑氏亦固請曰長者固寬厚宵人將何以自寧敢辭世英深拒之乃已薑氏後知其故歸采白金滿籝當元之季有以縣丞告身從驛遞中至者啓視之則世英氏名州里也莫知其所從來蓋世英遇士有恩故薦諸朝署而授之官世英曰吾白髮垂領已焉用此為哉竟不上惟優遊林􅊤間卜地以為樂丘作繭菴一區時招朋命觴以自娛世英之賢行甚多今姑舉一二餘則可以例知也士大夫以世英潔清號曰氷壺傳之歌詠之且成卷軸矣類多綺繡其辭以為工而無關其實行豫不敢效尤特書此于卷末使周氏子若孫藏之時出而觀之不有蹶然而興起者吾未之信也宋學士文集卷第三十五翰苑别集卷第五
