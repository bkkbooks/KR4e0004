body:
  text: 鄭節婦黃氏傳黃為浦江著姓自隋唐以來即有聞而宋隆興癸未進士度亦其族也其居􅉝山者曰德清有女曰琇字守貞生賦淑姿不失故家遺範父母愛之為其選良配元至正已丑冬十二月歸同縣鄭氏瀛字仲容守貞年甫二十奉上接下無愆禮人稱其賢明年仲容髀患疽流注肌核間一潰一興纍纍如連珠百藥弗驗守貞扶掖卧起附膏於𥿄而更敷之雖甚久無懈怠意又六年仲容殁守貞自矢不再適且曰生為義家婦死為義家鬼敢失節以玷旌門乎其志堅凝屢有撼之者不少動寒燈孤幌淡然能自安遂命仲容從子柎為其後守貞今四十九矣及見柎授室生二子熛煁朝夕受其孝養云昔者孔子稱宓不齊之善而歸於魯國之多賢蓋觀感而興非有資於賢者要亦未易以成名也今鄭氏之家十葉聚食至大􅉝亥嘗旌為義門其規度整肅如嚴霜烈日可畏而可仰其德義之涵濡又如春風和氣之薰蒸不自知其入人之深故其化行教洽過其門者猶率德勵行而乖戾之慮消况為其家之婦者乎宜守貞執節之堅而循禮之謹也傳曰一家仁一國興仁其理誠不誣哉豫官儀曹時郡國多以節婦事行來上輒聞報下褒異其門閭觀風使者或以守貞為言甚有不彰明之者乎異日烏頭雙表之樹與旌門後先輝映不亦一家之盛美哉豫故輯其事為傳文一通衣冠之士儻有扶植彛倫為任者尚見諸賦咏以同其傳焉故愚庵先生方公墓版文嗚呼自我齊國文公紹伊洛之正緒號為世適益衍而彰傳道受業者幾遍大江之南而天台為極盛時則有潘子善氏林叔恭氏趙幾道氏兄弟以及杜仲良氏如此者不能遍舉皆見而知之推原體用之學敷化弘治而風動於四方重徽疊照於斯為至流風遺俗迄今猶有未泯若我愚菴先生方公其殆聞而知之者歟先生諱克勤字去矜姓方氏其裔出睦州玄英處士于宋初十五世祖草四府君某始遷寧海侯城里曾大父重桂鄊貢進士大父子野父烔元鄞縣儒學教諭母葉氏宋丞相夢鼎從曾孫女也先生幼而端凝五歲知讀書自辨章句十歲暗記五經諸老先生嘖嘖愛賞目為神童年埀弱冠遍窮濂洛關閩遺書及尋鄊先逹授源委凡涉性命道德之祕窮研探索寢食為之幾廢因喟然嘆曰為學必合天人而後可舍是非學也至正甲辰嘗一踐場屋言國家利害峭直無所顧忌有司不敢取飄然東歸益閉户潛心于一卦一爻必欲驗諸事為至於天文地形禮樂刑政及制度名物之屬亦辨析歸於至當如指諸掌會海民為變江浙行中書檄吳江同知金剛奴募民為水兵先生詣金剛奴謂曰民計窮而為盜未為盜者亦挻挻欲動奈何授之以兵是謂增盜非禦盜也金剛奴怒不答既而水兵果於中道殺護吏逃去從盜金剛奴踰垣走折一足始悔曰吾不從方先生言以至於此未幾侍御史左答納失里至郡招諭劉都事基為之副先生上書陳勦殄之略不宜姑息都事韙其言而不能用遂致郡縣陷沒民罹塗炭先生發憤入山谷採松柏食之纍日不返當路延先生入幕府先生謝曰我辟穀久矣弗足與人間事也吳元年冬大明兵取台州先生欣逢真主之出乃大有為之時疏舉賢才安人心黜豪強除暴斂明教育十餘事將上之未果洪武二年詔立郡縣學以訓導辟先生樂於育才即起應命負笈來從者至百餘人先生據經陳義曲暢旁通幾無毫髮遺憾聞者皆淪肌浹髓薰為善良俄以母夫人春秋髙力辭而歸諸生追之者踵相接學舍為空四年夏朝廷聞先生賢欲致之部使者袁君宏以書幣來徴先生以母老不忍離左右辟去旁縣郡承使者風旨雜逮姻連督索之先生上京師兩詣執政固辭執政竒先生材命就銓曹試考核入格名列苐二上特命知濟寧府事階朝列大夫錫之冠帶以行先生至官為書一通懸於康衢諭上愛養元元之意民有所不平詣府自言禁吏胥不得呵問日引耆耋坐語訊以得失郡學官缺孔子廟堂頽圯聘前進士為師弟子貟有未備者選輔之役浮屠以葺廟堂廟南鑿為泮池傍列兩序闢射圃於廟北造弓矢樹正鵠日一再視學親為正句讀較中否屬縣之內社各立學學凡數百區學子繫籍者二千人兵浚號為最盛始有詔民闢廢田者閲三載乃稅吏徼近功不俟期斂之復以田定起科繇民益隋田不增闢先生與民約定為簡書列為丁産為上中下三算等復折為三每有徴發恆視書為則吏不敢並緣為姦歲且暮轉戎衣于燕時有令役民舟者有誅别郡以牛車從事天雨雪牛僵死于道破産者十八九民請以舟就役僚佐畏令難之先生曰吾知從民便抵法非所辭也即載以舟具白山東行中書省省義不問郡倉絶糧省檄民七百里轉粟靑州民病不能適漕運者自淮安輸濟南道出郡境先生欲就輸郡倉而俾濟南致靑州告于行省弗聽即以聞户部户部奏可行省臣愧之郡城壞故事築以兵指揮使挾貴人勢當五六月聚民萬餘治之民不得田哀號而即工聲聞數里先生奮曰民病不救惡用二千石為密聞中書同官疑且得罪不敢署名先生獨署之胡丞相惟庸以聞即日詔罷先是不雨先生袒跣遍禱群祠涕泣卧祠下誓不雨不還至是詔下民歡呼而散大雨如注是歲五穀俱熟民歌曰孰罷我役使君之力孰成我黍使君之雨使君勿去我民父母自是連二歲三禱皆有年五年秋鄰境盡蝗先生省愆變食稽首告天夜聞空中甍甍聲燭之乃飛蝗蔽天而過郡獨有年民有赴訴者隨事則決大者笞辱小者諭遣之不留案牘尤慎於庶獄月録日省不使久淹或文有未具時作麋遍食之夏秋之稅每命斛卒持槩髙下出其手或至纍旬不收民兢指倉為穽先生令民自概斛卒斂手不敢出氣遇將西成預移文與民期民爭來輸不遣一吏而稅當先登江西浙西二行省運糧百萬濟寧水陸數千里先生視如部民不使有錙銖怨懟舊比每斛益四升以禆蠧耗先生憫其道逺言于朝蠲之府召州縣官屬皆役皂隸往往索賂無厭先生下信符置郵無敢不至者信符之籍以印識而中分之吏托月日稽違以媒利先生私藏之緩急有程一自巳出復行其法於封內一以信符召民民得竟并力耕桑襁負來歸者相望于道𥘉赴官時户僅三萬稅萬餘石三年之後稅以石計者十四萬四千七百户亦增至六萬有竒二州二十縣家有積粟野無餓莩羊牛雞犬散𬒳郊坰富庶充實如承平之世至於社稷山川諸祀先生修崇壇壝嚴飾器服或樹名水於周垣之外如儀制無有所闕水驛在西門內􅋻陋汚濕居者弗寧先生料㨂材木候農之隙更作於城南庭堂室房弘敞逾昔冬寒河涷驛舟不行今舟人伐木為炭穿土穴藏氷因其餘力以成事功泗水經郡城南通淮江北引河濟地勢髙㵼搆石為閘而時畜泄之魯橋棗林二閘歷歲久壞石滇河中舟道難之役閘丁絙壞石治灰而甓之故以葦囷庤糧大屢為災教民為陶瓦營屋百餘間申戒火令編民居為曹伍遞相救恤其患遂止大將軍魏國徐公達副將軍曹國李公文忠統士馬十萬之燕駐郡稍久要官勢吏爭索糧芻相膠葛于前先生依序酬決無不如意一軍稱能永嘉侯朱公亮祖將舟師數百艘北征河水涸舟膠不可動脅先生曰即趣五千夫浚河否則以軍法論日且暮先生不忍煩民泣禱於天夜二鼓天雨黎明水起數尺舟竟去莫有言者先生為政以風化為急務以德勝佐二始雖倨慢先生委誠待之卒自愧服武夫悍將不知禮久亦化戢在官縱無事終日冠衣坐堂上召諸吏授以書詩法律或公牘堆几群辨方譁先生片言折之各心恱而去性不喜近名常自誦曰近名必立威立威必至害人吾不忍為也府庭之間不陳杻械革鞭懸楹間示不妄罰省憲考績為六府最八年春入朝皇上以為善治民錫燕儀曹使踐其舊職瀕行奬諭有加且曰政成當顯用卿秋八月知曹縣事程貢嘗以不職不笞心銜之上封事言狀詔御史楊某廉按楊通程故人恐程坐誣罪易民服潛索先生過事踰兩月無所得乃捕府中卒吏盡繫之傍掠無完膚無一可問者楊更與其吏謀誣先生用倉中灰葦時十月固未嘗附火而葦則苫公宇垣實無私用者先生不與辨遂就逮民號呼填道隨行百餘里者將千數先生次子孝孺上書政府大臣願以身為軍贖父罪不報竟謫役江浦會空印事起吏又誣及之孝孺復草疏將伏闕上訴而先生殁於京師九年冬十月二十四日也夀僅五十又一孝孺與兄孝聞奉柩東歸十年春二月二十四日窆於縣東北深灣章施山之原禮也先王娶林氏諱姬婦道為一族冠先十五年卒至是合葬生子二人即孝聞孝孺孝聞年十三居母之喪不肉食至服除人以純孝稱之女一人再娶王氏諱在生女一人未彌月而王卒少房董氏育之董氏生子一人曰孝友二女皆在室未行先生靣白如玉須眉秀整不妄笑語動容周旋必合禮法兵亂負母逃入深谷兩踵血流遇二弟訓育備至終身未嘗失色與人交率真任質不事表襮不以久近為冷熱立談之頃洞見肝膈南冠過郡者必以米醪饋之不能步者僦舟車送之萊蕪丞陳川欲迎母為養厄於無資出錢五千助之同列以事奪祿買布帛給其用且日延之對食久而不衰脫逢其飲醉投案大詬而去待之益恭及酒解來謝陽若不知者曰昔之夜吾亦醉矣不識君何謝也生平奉養簡素不服紈綺御一布𫀆數年載不易日不再肉不治官事輒却肉不食所守廉甚絲毛不取諸人每行縣以物自隨杯湯不肯受兖州守因童進二水瓜笞童十召州吏還之鄉人有為饒陽令者以燖雁侑書力却去乃巳𥘉至官時祿米一斛可易金三兩以軍食告乏月取十斗為食餘悉儲于倉或尤其迂不恤也晚年益加畏慎晝所為之事夜則白於天俯仰皆無愧怍榮辱利害恆視之若一坦然不疑古所謂體道成德之人先生誠庶幾焉其為文章質而不華平而中理有汗漫集若干卷傳學者云濂私自念齊國文公之薨始一百七十又九年而其學寖微譁世取寵者徒剽掠為談辨誇多鬪靡者務組織為篇章文公所以扶世教淑人心者率棄為空言故其臨事之際仰攫俯拾唯恐利不入槖至有庸夫賎豎之不屑為者嗚呼可嘆也已有如先生聞風而興乃能誠求實踐參前倚衡儼若上帝鑒臨􅉼養既純發舒自異仁民善俗之政至今人人能道之夫命雖正於斯而其率性會道無愧於文公者尚皎然弗誣也孝孺久從濂受經頗知先生行事之詳於是歷敘其故而繫之以銘銘曰堂堂齊公命世之雄伊洛正傳實為大宗入天出人完傳翼經有遏必疏無幽不明疇不鼓篋千里來過燦如聚星惟台獨多流光所及寧有翳昏揭彼日月輝于天門逝者沄沄滅景銷聲不有人豪聞風孰興倚歟先生行知尊聞養氣弗餒克乾塞坤實孚名隨上徹九天鶴書翩翻降於丘園爰自布韋專城以居象笏朱衣於赫其儀寵恩之加其廣無垠曷以報之誓不顧身敷宣帝仁逹于齊氓以煦以嫗以致其亨民或勞只如魴之頳乃平更繇俾遂其生黠胥舞文其貪若狼乃障乃防而扼其亢人相告言久嬰亂離父母孔爾我胡弗歸千百為群其來如雲操厥耰鋤以播以耘我行其原萬桑沃然俯瞰于隰黍苗芊眠鄰多孽蝗刺天而飛避不入境絶類有知真儒之效小試則殷誰曰漢吏專美其循太和薰蒸郁紛輪囷自此而升何澤弗臻天命止斯傷如之何視天方髙淚如懸河我又傒嘆數竒則然中心無慊生順死安善人殄瘁斯道之衰顧瞻無依胡寧不哀崔崔者岡渺渺者陂其中有墳千載之悲金華安化院記金華安化院在縣東二十里舊號安國宋治平二年更今名嵩頭陀法師所立道場稽諸傳記法師名逹摩西域人梁天監十七年自金陵携鐡魚磬耒烏傷之香山尋於龍腋置寺普通元年南行經余山江水大溢法師張蓋水中亂流而濟至稽亭塘發善慧大士神迹創伽藍于來山已而西入金華建龍盤寺以及今院後入滅於龍丘資政殿學士洪文安公作郡志時既失於搜輯不載院之緣起而復謂法師以吳赤烏二年實建龍盤夫赤烏二年係已未嵗天監十七年則戊戌也凡歷二百八十年當是時法師之齒又不知其幾矣何其夀耶他不足徴者蓋可知已院既多歷年所其佛菩薩護法天神諸像乃唐貞觀元年所雕宋慶歷三年重加藻繪國朝洪武十年冬十月郡之善士唐良胡貞及比丘宣政各飾其一悉塗以黃金良又勸聚群力以畢其餘其釋迦寶殿舊構於宋淳熙三年歲久弊壞元至正十七年冬十二月住持元厚新之其潮音堂至正四年冬十二月主僧宗旨作之其七佛殿建于太㝎三年秋七月三解脫門造於至正元年秋九月皆住山祖良成之其兩廡仍宋德祐元年之舊庫院復營於元延祐元年冬十一月則諸僧捐資之所致也精進沙門彌堅今巳甲乙嗣輔其處念院故無碑碣詢謀于衆命其徒永琇齊賢詣青蘿山中徴文以為記濓聞之西域之僧來中夏者自攝摩滕竺法蘭之後代不絶人往往以宣譯教相建置𣑽宇為急如法師者亦其一人也菩提逹摩之耒在普通二年正與法師同時雖曰絶去文字以矯末流之弊而其理行二人固兼取籍教悟宗之言奈何後世岐而二之禪則直究心源以文句為支離教則循序進修以觀空為虛妄互相訾嗸去道逾逺然以密意言之依性説相非息妄修心者乎破相顯性非泯絶無寄者乎以顯示言之真心即性非顯明心性者乎軌轍雖若稍殊究其歸極則一而巳奈何後世岐而二之此濂之於法師不能無所感也斯院乃法師肇立歷代嗣守遺緒隨成至保雕像於七百餘年之久外籍勝因內修覺觀理事雙至不即不離其於逹摩氏之道固未始有異也嗚呼悕矣是尚可與俗人言哉濂嘗過院中見二豫章圍可十五尺許欎欎然如車蓋屹立於門氣象森邃不問知其為古招提矧居是者多樂善好施而永琇等又頗注意禪教不敢墮於一偏有足嘉者故勉從其請而發吾之所感授之以文非為輔郡志之闕緇素讀之必有蹶然而興起者具官縣人宋濂記毗盧寶藏閣碑烏傷之墟有山鬱盤名伏龍山山顛有寺號為龍夀宋治平中又更聖夀寺廢巳久莾為荆榛元泰定末有大道師千嚴長公飛錫而來從者如雲一彈指頃幻成樓閣導師示寂後十二載北丘如海來輔其處四象悅服如公在時十二時中常作思惟金口所宣十二分教受時之者發明自性此烏可闕乃與勤舊良𣏌是圖西往姑蘇扣諸檀度所施白金數將十鎰奉以為贄於福嚴院請致毗盧大藏尊經滿六百軌稛載而歸鄉之善士至四三千奔走往迎爰自山麓以逹殿堂約二里所來道耦立各各合掌次弟受經而傳遞之縱橫錯綜無弗及者琅函既登頭靣接足禮佛而退海之與𣏌又復思惟有經無閣與無經同何以自表啓人敬心孜孜持曆遍走民間欲聚銖黍以成丘陵𣏌弟德鄰素樂真因盡心化導惟日不足又有僧修宣勞其間歷七年久始見功緒乃撤舊堂載築載營均齊合度無有傾陊於是命工伐木於林琢石于山造陶於原煆鐡于冶總總林林不戒而趨而其􅎚人曰陳新氏亦絶葷肉率涖役國朝洪武龍集丁已陽月斯屆其日乙卯始奠梁楹閲六十旬乃訖厥功閣敝五間髙七尋周以明軒觚騫飛蚩尾衝霄猶如化宫影落天半中像大悲具千手眼左右千佛飾以黃金種種莊嚴華侈勝特東西相嚮列以長龕櫕布庋格妥至諸都索怛覽藏毗奈邪藏阿毗曇藏其為功德微妙難思邦定因果窮究性相埀範四儀嚴制三業研真顯正核為摧邪無所不具無所不感有信禮者如聞世雄出大音聲天風海潮震蕩空際一歷耳根萬劫不磨重閣之下仍設髙座演説妙法以聳人天龍鬼之聽遐邇之人來遊來瞻舉手加額歎未曾有海復來謁請述記文用告來者是纘是葺永久不壞我聞法藏總為五千四十八卷以别計之凡六百億三萬一千八百八十八字之多於一字中各有點畫於點畫中各備形聲是名為字積字至於三百四百或千萬言是名為經積經以至恆河沙數無有窮極悉會于一是名為心譬之於佛自一至十自十至百自百至千千佛千身於一身中各具手眼是名為佛一有不具於相則乖大慈悲父以一佛身用表千身示現神變出千千眼傎到捧執靡不如意是名大慈大悲之道是名法藏或微或顯不越一心心外無法法外無物千佛各具不見其少大悲通具不見其多此何以故淸淨海中微塵剎土佛身充滿無有限域天地日月河山草木飛走遊泳洪纎髙下有情無情或出或沒在佛身中舉無外者雖其手眼至那由他及無算數亦不見余况止一千由此而觀手眼同遍於虛空界不見一隻亦猶契經充塞宇宙不覩一字無體之體無文之文終日里露遍照十方斂藏于密𥘉無一髮茍以凡情妄加度量如刀割水非狂則愚金華居士逢此勝緣歡喜踊躍記閣成事意有未盡復説謁曰我聞善慧師善巧度迷情建立大機輪中含三乘教運行才一周功與持誦齊後代踵遐軌嚴飾日益勝黃金暨丹砂栴擅衆香等合成大寶藏湧現􅌡海中大龍負之出天魔鬼神衆手持刀劍具護法禦不祥苟一撼動之循環不復停光色聲香類一一相奮軋如談若空義聞者得殊利誠以寶輪轉衆法與之俱法轉心亦轉頓悟在剎那此以何因緣乃獨尊閣之膠執於一隅森列衆星比如如屹不動曷以發群機其於立法𥘉寧不稍乖戾當知一切法本來常寂靜靜為動所基非靜動奚寄動靜二俱泯始不為轉來升斯閣者日見衆寶函周遭逐心旋不翅風雨疾回視他轉輪昭昭涵萬象清淨若止水毫髮不動搖方知非動靜不受有相攝若人以相求執燈入寶山竭力若窮探得一而遺十紅日行中天衆寶皆現前一覽心目了無有隱遁者此豈有竒因不為相縳故我今稽首禮作此法藏偈千佛為證明同歸大悲海金剛般若經新解序金剛般若經世尊第四時所説中更六繹互有不同唯童壽本詳略適中甚得義趣名僧達賢箋之者亡慮千餘家唯天親無著二論師探索微隱不失説經本意無著以一十八住為義天親以二十七疑為宗發明理觀事行之詳破一切執斷一切疑至於智境相耶能所俱妙三觀之圓融三諦之冥泯即一而三即三而一蓋有不可思議者矣其經之至中夏殆將千年或顯或晦各繫其時若論遭逢之盛則未有如今日者也欽惟皇帝陛下𢡟昭大德建中于民欲使感發自新一歸至化嘗以三界大師行深願重其利濟群生為甚急演説言教雖多而金剛經專言住修降伏而與心經楞伽二經大旨略同其舉揚心學最切乃詔天界禪師季潭泐公會江南禪教有學諸師參用古注而定其説於是季潭與演福法師大璞玘公同加箋釋且懼二論師文旨玄奧學者未能卒䁱因據二十七疑而革蕭統分弟之陋仍推問答深意而究脈絡之貫通務令明白簡切而免纏繞支離之患既成諸師重加校訂始入奏於華蓋殿皇上覽而可之勑同新箋二經鍥􅎚流通季潭貽書俾濂序其事濂以昏耄為辭雙林住持南翁凱公復來請之甚力乃為言曰西方聖人以一大事因緣出現於世無非覺悟群迷出離苦輪中國聖人受天眷命為億兆生民主無非化民成俗而躋於仁夀之域前聖後聖其揆一也金剛經凡五千八百二十四言揭之篇端從長老須菩提以至菩薩但應如所教住不過三百九十六耳三問三答之間其大體咸具已無餘藴矣而乃躡前語迹斷後疑情展轉滋多直至二十有七方止其諄諄善誘欲啓人信解者為何如哉皇上自臨御以耒宵衣旰食勵精圖治禮樂刑政粲然備舉所以裁成天地之道輔相天地之冝以左右民者既無所不用其極今又彰明內典以資化導唯恐一夫不獲其所其設心措慮實與諸佛同一慈憫有情所謂仁之至義之盡者也於戲盛哉濂幼齡時輒讀金剛感應傳見其所紀神異事甚衆然皆持誦精誠之所格持誦猶爾况通其義趣者乎又况達性相二空而歸於一實境界者乎殊盛之利誠未易窺測也誦是經者冝思皇上之太德孳孳焉以進道為念斯可也不然則天龍鬼神實鑒臨之可不畏哉洪武十一年六月􅉝丑朔前某官金華宋濂謹序佛心普濟禪師緣公塔銘有序我佛如來演説三乘十分三教蓋欲利益有情絶類離倫直躋覺路固涉不思議妙境至有插一莖茅設一淨食亦號為佛事者夫事有大小而心無大小一念之起即遍二千三千融攝終歸實際又烏可以形迹論哉豫於佛心普濟禪師之事不能忘言焉師諱自緣其號曰會堂俗姓陳氏台之臨海人父某以書詩為業人稱為石泉處士母某氏感竒夢而生師氣骨不凡翛然有出塵之趣每入招提見像變𣑽夾必互跪合爪作皈依狀處士君見之謂其母曰是子如靑蓮花水不能沾豈俗能淹邪乃命從四明白雲寺觀公為弟子觀公愛其容止修雅言辭溫簡出內典授之讀年十七剃髮受具足戒趺坐一室日以縳禪為事已而還台謁同郡天寧日溪泳公泳公一見輒加獎豫使居右右為執侍尋升掌鑰泳遷住杭之淨慈師從其行淨慈居五山之列號大叢林四方龍象咸耒棲止師自是咨決心要知解且日至漸息群念期造人天宮矣事聞于朝授師金襴法衣及錫今號仍卑報恩寺額以寵異之師既受命復自念曰上之恩侈矣顧塵居雜遝塵氛襲人無以稱淸淨宏偉之觀爰擇地縣北五里而近大橋之陽林樾蒼潤蔚為神靈之壤新建報恩禪院一區晨夕帥其徒以祝釐報上為務由是兩地之間鐘魚互答有若西東家焉元季政亂海上兵動烽火漲天三閣與寺皆鞠為茂草之場師䀌然傷心又以興復為已任持鉢行化聚落中隨其地建華嚴傳經之會演説因果屠沽為之易業於是施者四集師仍於桃源夾河兩提悉甃以石建傑閣三楹間命工塑佛菩薩天神諸像畢工未久而師厭世矣師一旦早作無疾如平時索浴更衣屬諸弟子以見性為急且曰吾明日將逝至期呼筆書偈怡然委順時國朝洪武戊申三月某日世壽五十九僧臘四十二龕留七日顔貌如生茶毗得舍利無算其上首祖溢智榮正圭等以其年六月二十一日奉遺殖樹塔於寺界相之西北偏祖溢以鄉先生夏克復所序行業介豫學子方孝孺耒徴銘豫聞華嚴有四種法界其三曰理事無礙所謂理事無礙者在有而不廢無雖動而不離靜譬如水與波焉真空不礙幻有即水以辨波幻有不礙真空即波以明水緣生假有二相雙存者也師今熾然建立雖墮事為而能無所染著競全於真理其有得華嚴者歟銘以昭之以示後之人銘曰臨海有上士夙依如耒智自著福田衣晝夜為佛事憫諸求法者經行山澤中倀倀無所依乃就古伽藍汛掃得清淨床第及衾枕以至觸器等無不皆現前來者一如歸了不生怖畏非惟身安穩飢虛獲充實雜華與淨土最是方便門建閣造經像俾人生敬信更闡大伽藍普施無量法入者輒攝受共趨涅槃城豈知劫火起盡化為煨燼中心鐵石堅誓圖興復計未能暢本懷竟歸宗滅海四衆悉悲慟大法無繫故奉此設利羅樹塔安置之龍鬼當訶護時現大神通有如住世時不示生滅相生滅二皆空是名三昧力淨慈山報恩光孝禪寺住持仁公塔銘佛滅度後波羅奈王收佛舍利用七寶造塔為作銘記名曰逹舍婆陵迦有塔之有銘尚矣後世學佛者道尊行崇其殁也因刻石以表其藏自大法入中國晉宋以來嘗間一見焉碑版焜煌始盛於唐宋之際及今淨慈禪師之示滅既葬舍利靈骨於金華北山隨世變遷理則然也山之麓其上首弟子件繫得悟出世之因耒徴塔上之文其義實應古法濂不敢辭師諱普仁字德隱族趙氏㜈之蘭溪人文端母楊淑貞皆名宦家師生有出塵之思年十歲往依金華寶石演法院月公月公號秋潭嘗主閩之囊山於人慎許與獨以逺大期師俾習讀東魯西笁諸書師性爽朗即能領解義趣十四祝髮受具足戒二十有慨然求道之志危坐逹旦期息妄緣時鄰院智者住山了然義公以大辨之子慧朗之孫丕振臨濟之宗師往造焉入室問答機鋒遞相奮觸電掣霆奔義公命為侍香久之出遊閩浙江湘凡名剎所在必求諸尊宿以證其所悟無不改容禮之東陽輝公方主湖之道埸豔師之能文請掌外記自是聲稱籍籍起叢林間武林雙徑江南諸寺之最主僧南楚説公召師分座説法及説公遷化古鼎銘公來輔其處益推敬師且謂相見之晚師猶不敢自足聞月江印公在育王雲外岫公居天童亟走四明見之相與辨詰無虛日徴以宗門機緣大而沙界小而毫芒無不收攝巳而還浙水西相羊於名山水間逹人勝士日遊衍而激正法旁及於辭章者唯覺隱誠公笑隱欣公為最密風簷月牖語蟬連不能休至忘寢食元至正乙丑始遷寶石山中乙未從部使者之請出世金華西峯淨土禪寺瓣香酬恩實歸於義公蓋表其所自得也時天下大亂師知事不可為鳴鼓而退戊戌冬大明皇帝親帥六師取婺州巳亥春幸智者禪寺見其山川深秀而法席上虛特詔師主之一坐十五夏唱道之外小大室宇咸為輔葺一新别築燕居於寺之西麓曰潛庵將有終焉之志吳元年丁未處之連雲持公府檄起師主持不聽洪武戊申韶之南華不逺三千里致州侯之命耒聘亦不從杭之中笁其請如南華又加勤焉師惠然欲往郡守鍾某意惜其行從容問師曰佛法有重輕邪曰否曰佛法既無重輕師位寧有崇卑邪師一笑而止淨慈居五山之一非耆學碩望莫堪尸之甲寅之秋使者自武林凡三至師乃起而應之開法筵之日黑白環聽者于人各挹深飲醲嘆咏而去師尤以興壞起廢為急時有化主安淨者頗有人緣施者麋至師以禮延致之方將大見設施乙卯春祕書事起有誣智者寺僧購名盡以歸者事下刑曹刑曹以師舊主智者當知其是非逮而質焉事將白師忽示微疾於京師寓舍屈指計曰今夏五月矣左右曰然曰此八月八日最良吾將逝矣至期整衣端坐而逝雖當溽暑容色不變其徒用茶毗法從事收骨還葬其年某月日也僧臘五十世夀六十有四師風措孤峭不樂與非類狎逢學行之士輒敬之如賓師縱無儋石儲亦必久留不厭故薦紳服其偉度樂與過從如王御史叔善故教授仲申二公名德重當世尤與師為金石交善談論終日不倦玉實珠聮纚纚絶可聽尤能汲引後進隨資誘掖克底于成有三會語若干卷山居詩一百首傳于世其嗣法上首智者志文景德原昭云云所度弟子懋建云云云濂竊惟大辨之道門庭森嚴氣局苞斂故出其輪下者多內衷誠慤而直趨最上菩提𥘉不假葩澤衒鬻於外如義公者亦其人也師既因之得法見其真實可信不疑於是出世度人聲聞流布無間北南雖以百越之逺亦願一臨其地師之為人所企慕者從可知矣晚涖南屏道價益重巋然如魯之靈光奈何緣業僅止於斯而師無意於人世矣惜哉濂與師交者頗久歸為序其盡靈語以傳復書其事俾鐫諸塔其不可知者不敢妄意而勦入之也銘曰大辨之門總攝群機棒喝交施飈旋雲飛誰為之孫乃克肖似奮迅直前是真獅子大方巖巖髙風莫攀一彈指間衝破命關掌記集雲分席雙徑出世西峯大施政令繼遷靈源芳泉可㪺灑以楊枝普潤焦枯聲光四達爭相挽致百越之區亦耒交疏南屏崔崔名列五山龍鬼護經非賢孰干四衆歡呼迎師往住幡華塞塗觀者如蝟擊大法鼓出大音聲百蟄方冥一雷盡驚我法將隆我緣已滅生滅何心紅爐飛雪寶幢之仆聞者心推翠竹黃花亦若茹哀實際如如衰則何有仰瞻中天白月在斗故樓母吳氏墓銘豫既銘先友樓釐君之墓樓君妻吳氏復卒其子仁與恕泣而請曰先母極孝于姑姑年耄氣逾弱左右手不能用先母夙興持櫛具以往請姑坐榻上親理髮施膏沐訖鞠躬揖而退旦旦如之雖遇寒之折膠暑之流金不廢復聞宗老言爾母之賢也胡可及也蘋蘩之薦無不蠲潔閫內之政無不雍順輿臺媪御之賎未嘗聞叱吒之聲相爾父治家不恤勞勩時粥環釧以佐饗賓之􅲺彼知飾珠玉侈衾衣以相夸詡其視婦道為何事世非無女婦也如爾母者幾何人仁等日夜腐心恐斯言聞者鮮也盍若登之於文乎敢以墓上銘為請豫曰吾母陳淑人其賢與爾母正類常思樹表墓道而一時故老凋喪竟無從求文爾之情為可矜實與豫同也因不敢以荒陋為辭嗚呼爾母固賢矣使爾兄弟自言終涉乎愛私今則出於宗老之口其有不誠者邪嗚呼爾母始得隂之正德而無幽吝之氣者邪金之精者聲必宏以爾母之賢又何患不逺聞邪吳氏諱正字德貞義烏人吳樓世通昏姻父泗母頴吳氏年二十一來歸享夀七十又九以洪武丁巳十二月二十五日卒其月二十九日合祔夫墓在縣之鄊西山之原三子仁恕願仁恕皆從豫受經良儒也一女適將仕郎鄱陽縣主簿方良玉孫一椿女二適吳榮丁宗元云銘曰女位乎隂孰乘乎陽婦德惟柔孰亢乎剛苟不失厥常乃家之慶叶西山之岡是為賢母之藏後千百年慎母變更國史研銘濂為國史遂以官名硯勒銘于隂誕敷帝制宣人文赤光如虹爥軋坤後千百載傳愈新宋學士文集卷第四十七芝園集卷第七
