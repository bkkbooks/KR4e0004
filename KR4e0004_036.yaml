body:
  text: 吕府君墓志銘府君姓吕氏諱文福字夀卿其先光州人宋季光為極邉戎馬蹂踐無寧嵗遂避去金剛臺上尋遷黃之黃岡為黃岡人曽大父某大父某父某妣某氏府君幼喪父鞠于大母谷氏大毋性嚴厲夙夜飭導必期底于有成府君年十四從事法家之學稍長唐律義疏皆精原其意比類相從支分脈貫必允契乎人情遂以抑剛茹柔洗冤澤物為已任時承平日久未易得祿食乃俯首試吏巡檢之司會部使者申公蕳夫持節淮西聞府君名召與計事衆咸愕曰夀卿之名何以逹上官之聽乎府君笑不答黃州守脫因不花及萬夫長脫脫皆怙勢受賕貪墨之聲載道府君白曰不去此稂莠禾稼安得而茂乎申公然之皆捕置于獄正之以罪申公名震淮西者府君之力也升麻城縣吏邑民𬒳強盜所掠訴之久未克獲元律獲強盜至五者輔一官里豪陳兾徼其利縛駱和尚等賂麻城尉煆煉成獄文上縣縣懼尉與守有連不敢問府君知其冤竟平反之縣令長搖手相戒曰毋生事腕可斷此牘也不敢署也府君從容抱案歷階而升請曰明公即冝署人命至重豈玩戲具耶令長相顧遲回不決府君曰不署則已當申郡司獄直逹憲府矣于是不得已從之活者五人已而厭煩囂杜門不出忽野峻台出綰郡章野峻台名臣趙魯公子也尤愛敬之力辟為其府吏伶優趙良卿以利誘民家女子教之歌舞用媒衒上官執權行賕無所不至府君又曰不去禍本其能清政源乎白府公悉傳于法從良者數十人董曩歌以爭田誤傷人至死議者欲當之重辟董辭輒不伏訴于慮囚使者使者漫不經意疑不決者幾十載府君知其冤竟為白之俄遷蘄州未幾即辭歸謝絶人事築存𥘉堂圃中延明師􅚨教子為舉子業一飲一食必與師俱時大母猶在程勸尤篤嘗刻日晷于磗戒家奴授食惟恐後師亦感其禮遇有知無不告之四方號士大夫以術業逰者久館之弗厭頻行必有贈遺人稱為黃之名孰云至正壬辰黃陷于盜府君携家走南昌尋為偽漢所據偽漢之謀士多府君之弟子欲邀致之府君戟手嫚罵衆知其不可而止入我國朝其子熙出仕為縣淅水西府君防閉訓迪尤篤蚤出則使扄鐍其戶莫歸必歷叩其所行事且曰某事當如斯不當如斯諄諄千百言弗止熙受教為清白吏府君事毋孝遇人也以惠姻友不能婚嫁者助之死無葬者為給槥櫝雖屢求弗厭性剛直或有過眚必靣折不少恕然逺近皆惟為吏師從學者森森立左右獄辭鈎連有不可決君片言之間如庖丁刺牛皆迎刃而解與之逰者皆敬而憚焉不幸以洪武庚戌三月二日卒于鎮江丹徒縣寓舍壽七十二以是年五月九日葬縣東大慈鄉馬鞍山之原禮也元配葉氏先十三年卒繼配姚氏子男一人即熙嘉義大夫吏部尚書孫男三人謙讓安山女一人李希顔其壻也豫聞之魏文矦時有李悝者撰次諸國之法為法經六篇漢蕭何增之為九自時厥後世益代增直至三百有餘為之章句者十有餘家家數十萬言凡斷罪所當由用者合二萬六千二百七十二條七百七十三萬二千二百餘言嗚呼律豈易言哉自非府君才識之明斷決之審孰能中其肻綮者哉是冝銘銘曰法乃司命懸于重輕脫不獲于簡孚將枉物而傷生故慘核者類貽于隂禍而哀矜者必兆于尊榮嗚呼如府君者其殆善用而得其平者歟漢天師世家敘嗣漢四十二代天師張真人以世家一卷命上清道士傳同虛徴濂序其首蕳濂聞古者名世諸臣史官必為序其世系表以傳所以敦本始昭㓛伐也况于神明之胄理有不可得而闕者今所輯世家但始于留文成侯而其上則無聞焉濂因據氏族羣書輔之復用史法略載其相承之緒使一閲輒知大都而其詳别見于左方云序曰張出自姬姓軒轅子青陽氏苐五子揮為弓正始造弓矢張羅以取禽獸主祀弧星世掌其職賜姓張氏周宣王時有卿士張仲其後裔事晉為大夫張矦生老老生君巫君巫生躍躍生骼其孫曰抑朔至三卿分晉張氏事韓韓相開地相韓昭侯宣惠王襄哀王開地生平相釐王悼惠王平生良字子房漢太傳留文成矦居沛之豐邑生二子侍中辟強及不疑不疑嗣侯生二子典髙典生默默生大司馬金金生陽陵公乘千秋千秋字萬年生嵩嵩生五子壯讃彭睦述其後多以功烈著傳至於唐列為安定范陽太原南陽燉煌修武上谷沛國梁國榮陽平原京兆等四十三望族中出宰相凡十七人髙生通通生無妄無妄生里仁里仁生覺覺生起起生桐柏真人大順大順生漢天師道陵是為玄教之宗其傳緒悠長倍前望族之盛論者弗察見留矦再世國除即意其絶嗣殊不知流裔南北如斯之繁也道陵字輔漢建武十年生于吳之天目山暨長博習群書從學者千餘人尋中直言極諌科拜巴郡江州令棄官隱洛陽北邙山修煉形之術章帝以博士徴不赴和帝即位召為太傳封冀矦亦不就乃杖䇿逰淮入鄱陽上龍虎山合九天神丹訪西仙源獲制命五嶽攝召萬靈及神虎祕文于璧魯洞俄往嵩山石室得黃帝九䁀丹書及道既成聞巴蜀沴氣為人災鋭意入蜀𥘉居陽平山遷鶴鳴山感玄元老君屢授以經籙之法于是分形示化復立二十四治增以四治以應二十八宿妖厲為之衰熄如發醎泉破鬼城之事甚多不能備載永夀二年復遷渠亭山出三五斬邪雌雄劒二陽平治都功印一授嗣天師衡使世世相傳乃乘雲上升夀蓋一百二十又三云衡字靈真有長材詔徴黃門侍郎辟隱居陽平山誓以忠孝導民君子謂其有繼宗開緒納俗安善之功衡生京師魯字公祺益纘前人之烈以鬼道教人自號師君其來學道者𥘉皆名鬼卒受本道已信虎祭酒各領部衆多者為治頭大祭酒皆教以誠信不欺詐有病者自首其過復設義倉置義米肉其中任人量腹取飽過取則有禍人歸者日益衆遂雄據漢中詔授鎮民中郎將領漢寧太守其後歸魏太祖拜鎮南將軍封閬中侯五子皆為烈侯女歸太祖子彭祖魯死諡原侯生盛字元宗魏大祖封都亭侯弗受始自漢中還龍虎山創三元日升壇授籙盛生昭成字道融端坐石室虎豹逢之皆伏暨化去或見騎鶴逰空中􅢳冡驗之唯冠履留耳昭成生椒晉安帝召之不至椒生回回生逈逈生苻苻生祥祥字麟伯隨洛陽尉能吐丹置掌中光芒穿屋復吞之祥生通玄嵗大疫以標植水中汲飲者咸愈通玄生恆唐髙宗問治國恆對曰能無為則天下治矣上嘉之恆生光光生慈正慈正生士龍士龍忘玉印長安酒家一少年盡力舉之不動明日士龍笑而携去士龍生應韶應韶生頥頥生士元字仲良瘠而多髯居應天山四十年山多虎人莫敢謁焉每大風雨遙見乘黑龍往來諸峰間士元生翛翛生諶諶生秉一字溫甫目光如電夜能視物嘗負劒行山澤間叱一老樹雷即震裂之擊死二巨蟒及小蛇餘百秉一生善善生季文五代之季受其籙文者頗衆乃鑄鐡環劵數萬繼之季文生正隨宋大中祥苻八年召至闕賜號曰真靜先生後凡稱先生者皆賜號也吏部尚書王欽若為奏立授籙院正隨生澄素先生乾曜乾曜生虛白先生嗣宗嗣宗生象中字拱辰生三月能行五月能言七嵗朝京師錫以𬗋衣象中生葆光先生敦復無子從子葆真先生景端嗣景端亦無子從弟虛靖先生繼先嗣繼先字嘉聞五嵗不解言聞雞鳴忽失笑賦詩人異之崇寧𥘉解池鹽水溢遣使者召見書鐡苻投之怒霆磔蛟死于水裔一日隨上入寢殿宫嬪競以扇求書繼光以經語書之皆密契其意中舉一握稽手書曰保鎮國祚與天長存乃上所御者也上竒之命禱雨三日乃止授大虗大夫不拜詔江東漕臣即山中度地遷建上清觀改為上清正一宫從其學道者恆數十百人靖康𥘉上復召時金人犯汴行至泗州天慶觀索筆寫詩隱几而化葬于龜山之麓後十六年西河薩守堅逰青城山相遇于峽口繼先以書一封赤舄一隻令逹嗣天師家嗣天師大驚使人􅢳龜山之窆唯一舄存繼先無嗣以象中之孫時修嗣時修曰繼先從子也吾烏得後之衆曰法統所在孰得而姦乃從時修生正應先生守真守真在母胎歷十九月始産毗陵有妖憑樹詔劾之一夜風雷拔去後㝎濤江衝決高宗賜以象蕳寶劒清靜隂苻二經守真生景淵景淵生慶仙張公洞有井甚深慶仙戲折木葉擲之俄波濤騰湧有一老翁從中出慶仙呵戒之而去慶仙無子從子觀妙先生可大嗣可大守真之曾孫其祖伯瑀父天麟皆常攝教事鄱陽水漲壞民廬無數袁提刑甫請可大治之殛死大白蛇水遂平尋又遇旱蝗可大禜之雨作而蝗殪敕受提舉三山苻籙兼御前諸宫觀教門公事主領龍翔宫時當宋季元世祖聞其神異密遣間使訊之可大授以靈詮且謂使者曰善事爾主後二十年當混一天下逮至元十三年果驗可大生宗演字世傳世祖平宋憶其父言有徴應遣兵部郎中王世英刑部郎中蕭郁賫詔召之賜玉冠玉圭冠以靈應沖和真人之號仍給三品銀印令主江南道教事得自出牒度人為道士宗演生與棣字國華世祖時宣授體玄弘道廣教真人賞賚優渥竟卒于京師與棣子弟與材嗣與材字國梁元貞𥘉入見大明殿制授大素凝神廣道大真人大德二年海鹽鹽官兩州潮水大作沙岸百里蝕齧殆盡延及州城下與材投鐵苻于水苻踊躍出者三雷電晦冥殱怪物魚首龜身其長丈餘隄復故常五年冬無雪上曰冬無雪民間得毋有災害乎與材為建壇禱之是夜雪下盈尺上大喜命近臣賜酒曰卿能感神明一至此耶八年録平潮㓛加授正一教主兼主領三山苻籙給以銀印視二品九年崇明州海隄崩俾弟子持苻往劾之民夢有神填海者遂安至大𥘉加賜寶冠金服制授金紫光祿大夫封留國公給以銀印視一品與材生太玄子嗣成嗣成卒弟嗣德嗣嗣德卒其子正言嗣正言卒太玄之子正常嗣正常字仲紀即今天師國朝六覲京師洪武𥘉制授正一護國闡祖通誠崇道弘德大真人領道教事給以銀印視二品上復賜以褒文稱其瞳樞電轉法貌昻然人以為榮蓋歷代相傳以眼圓而巨者為玄應故上因及之云濂聞文成侯年少時學禮淮陽東謁蒼海君蒼海君先儒學士以為海神是也後又見異人黃石公下邳圯上則其未逹之際固已能交通于神明至其晚年名遂功成乃欲辟榖從赤松子遊實其𥘉志非曰托之以自逃也故其九傳至漢天師感慕興起學輕舉延年之術祓除隂慝一以善道化民而嗣師系師繼之修其業而弗墜唯恐有人橫遭夭閼者當漢之季天下雲耰唯巴漢之間民生晏然行者不褁糧居者不捍關官府賴以成治如此者垂二十年其㓛之及物可謂侈矣冝其世有令人出俾至化奚翅古諸矦之國天之報施不亦彰明者哉或者􅌹歸于名山神氣之結故能演迤盛大如斯其論亦淺矣嗚呼文成侯子孫南北在在有之其以㓛烈顯著者小則充法從大則至宰輔非不光明俊偉也曾未幾何降為皂隸者有不免焉其視玄裔相仍歷千二百有餘嵗而未巳者為何如蓋必有其道矣嗣是而興者尚知朂哉尚知朂哉跋樗散生傳後樗似椿人呼為山椿或呼為虎目桐以其葉脫處有䀶如之故名材極易大而不中器用故又以散材稱之同郡許君存禮有長材而不輕于世用托樗散生自號雖其執德之謙要亦有激云爾然而白玉在璞而中夜吐光若虹雖欲自閟終不可得存禮今用薦者教授于燕將自此而升為徂徠之松新甫之柏建明堂搆清廟為棟為梁無所不冝樗𣪚云乎哉樗散云乎哉題永新縣令烏繼善文集後世之學者必有師雖百工伎藝之微亦必有以相授然後能造其閫粵况為文者發造化之祕貫今古之統茍無以管攝而闔闢之則何以盡其變化不惻之妙其不傳之于師奚可哉吾鄉修道先生胡公以光明正大之學發于精深嚴蕳之文訓迪學子篇章句字皆有法往往從之者多得文之旨趣其所造固有淺深髙下之殊而體裁終不失于古四明夢堂噩師雖居浮屠中能久與先生遊先生為文之法實與聞之烏君繼善自幼學文于夢堂凡先生所指授者悉以語烏君故烏君之為文峻潔如明月珠起伏如春江濤因語二三子曰必如烏君然後可以言文也若無師授其可易致是哉豫常譬之有美錦焉使朝市縫人製之則能中度而適體委于巖穴之粗工則左低而右昻上侈而下斂錦固錦矣其如不合何文之無師授者亦若斯而巳豫老且多病文字一切謝去不作縱有一二多仰手于人獨喜烏君之文親題後而歸之嗚呼子生也雖居先生之鄉而不能傳先生之學其于烏君又豈能無慊于中哉烏君名斯道繼善字也明之慈溪人嘗知化之石龍縣令調吉之新水其為人溫然如玉蓋與相稱云琅琊山遊記洪武八年十有一月壬子皇上以皇太子暨諸王久處宫掖無以發舒精神命西幸中都沿道校獵以講武事濂實奉詔扈㴀十有二月戊午次滁州驛濂進􅢳曰臣聞琅瑘山在州西南十里晉元帝潛龍之地帝常封琅琊王山因以名頗聞秀麗偉拔為淮東竒觀願一逰焉而未能也敢請皇太子歡然可之即約四長史同行秦王府則林伯恭晉王府則朱伯賢楚王府則朱伯清靖江王府則趙伯友遂自驛西南出過平臯約三里所望豐山盤亘雄偉出琅琊諸峰上唐梁載言十道志又云豐亭山山上有漢髙皇祠又有飲馬池世俗妄傳髙祖曾飲馬于此國朝以山麓為畜牧之場别鑿池飲馬仍揭以舊名居人指云山下有幽谷地形低窪四靣皆山其中有𬗋微泉宋歐陽公修所發泉上十餘步即豐樂亭直豐樂之東數百步至山椒即醒心亭由亭曲轉而西入天寧寺今皆廢唯涼煙白草而巳濂聞其語為悵然者久之山東南有柏子潭潭在深谷底延袤畝餘色正深黑即歐陽公賽龍處上有五龍君祠皇上𥘉龍飛屯兵于滁會旱暵親挾雕弓注矢于潭者三約三日雨如期果大雨及御寶曆為作欄楯護潭且新其廟廟側有時若亭濂坐亭上問潭側雙燕洞及其南白鴿洞以肆窮覽人無知者乃止復西行約三里所有泉㵼出于兩山之間分流而下曰釀泉潺湲清激可鑒毛髮傍岸有亭曰漸入佳境今亦廢唯四大字勒崖石間淳熙中郡守張啇卿等題名尚存沿溪而上過薛老槗入醉翁亭亭久廢名人石刻頗夥兵後焚煉為堊殆盡亭後四賢堂亦廢亭側有玻璃泉又名六一泉石闌覆之闌下壓以巨石中疏一竅通泉徑可五六寸手掬飲之溫是日天隂雪花翩翩飄伯清亟倡曰雪作矣不還將何為濂逰興方濃掉頭去弗顧其步若飛歷石徑一里所至回馬嶺伯友追而至伯清繼之伯友曰二客足力弱不能從矣二客伯賢伯恭也其謂回馬者建炎寇盜充斥郡守向子及因山為寨植東西二門西曰太平東乃回馬也嶺之東有醴泉又其東南有栲栳山山之南有桃花洞又南有丫頭山山之下有熙陽洞皆未暇往蛇行罄折黃茅白葦間莽不知所之宋熙寧𥘉僧崇㝎獲佛舍利六百壘石為四十九塔于道隅纍纍如貫珠塔雖廢幸有遺址可憑徑行無疑其路若窮又復軒豁蓋峯回路轉九鎖而至開化禪院院在琅琊山最深處惜乎山皆童而無蔚然深秀之趣唐大曆中刺史李幼卿與僧法深同建此院即張文㝎公方平寫二生經處三門外有觀音泉入院皆瓦礫之區唯新構屋三楹間中施佛像僧紹寧出速坐方㝎龍興院僧德學同太子贊善孟益秦王伴讀趙鐄吳王伴讀王驥椘王伴讀陳子晟聞濂入山咸來會晟云太子正字桂彥良憩六一泉上亦足弱不能進恐隨二客歸矣寧具飯飯客飯巳學引觀庶子泉泉出山罅中乃幼卿所發李陽氷所篆銘巳亡張億書三字碑亦斷裂卧泉下石崖上多諸儒題名陷石為一方鎸勒其中自皇祐淳熙乾道以來皆有之字或篆或隸或楷或可辨或不可辨山之東西在在皆然不特此泉也泉之南有白龍泉禱雨多驗童行堂下有明月溪稍南有吳道子畫觀音及須菩提像刻石壁上傍鎸淮東部使者八八舜臣琅琊山記頗不合文體為之破顔一笑又稍南有華嚴池由明月而上入歸雲洞訪千佛塔遺址過石屏路俯窺大曆井井亦幼卿所鑿沿山腰陟磨拖嶺逺望大江如練鍾阜若小青螺在遊氣冥茫中聞嶺下有琅瑘洞洞廣兩室中有一穴深不可測名人題識無異庶子泉懼日夕復不暇往然自幼卿博求勝迹鑿石引泉以為溪左右建上下坊作禪室琴臺後人頗繼其風山中之亭幾二十所而日觀望月為尤勝今荊榛彌望雖遺迹亦無從求之可嘆哉夫亭臺廢興乃物理之常奚足深慨所可慨者世間竒山川如琅瑘者何限苐處于偏州下邑無名勝士若幼卿者黼黻之故潛伏而無聞焉爾且幼卿固能使琅琊聞于一方自非歐陽公之文安足以逹于天下或謂文辭無關于世果㝎論邪然公以道德師表一世故人樂誦其文不然文雖工未必能久傳也傳不傳亦不足深論獨念當元季繹騷竄伏荒土朝不能謀夕今得以厠迹朝班出陪帝子巡幸而琅琊之勝遂獲窮探豈非聖德廣𬒳廓清海宇之所致邪非惟濂等獲沾化育生成之恩而山中一泉一石亦免震驚之患是冝播之聲歌以侈上賜遊觀云乎哉因取醉翁亭記中語風霜髙潔水落石出字為韻各賦一詩授主僧紹廣刻諸山石云故龍泉縣學教諭湯府君墓志銘有序處之龍泉有簮纓族曰湯氏自宋婺國公載八傳至望望生鏞鏞生濵濵生龍泉縣學教諭府君諱楷字文則三世皆以尚義著稱元至正間嘗下令旌為義門至府君益厲志惇行石末忠愍公宜孫御史中丞誠意伯劉公基御史中丞章公溢王府參軍胡公深皆愛敬之而忠愍公相知尤深力薦起為教官免強就職未幾輒辭年五十三以至正乙巳四月十一日卒家其年八月二十日葬于麗水縣雲和鄊德廣里梓坊原有詩文若干卷思誠録一卷藏于家府君配吳氏無子季弟梅次子燧來為後燧生二于綰績女一適王德厚孫女一未行燧嘗以濂銘其諸祖之墓復奉同郡季宗起狀不逺千里來徴銘嗚呼府君位卑不得上其行史官苟墓門之文抑而不與尚何以為扶世導民計哉銘曰惟湯受姓其出自商以諡為姓源鴻流長譜逸宗堙莫究厥詳徙于括者至宋寢昌簮纓蟬聮義聞赤奕府君承之祖武是式粵自弱齡嗜學尤棘褁糧從師不憚逺役下而百子上而群經心涵口詠必啄其精寒燈在壁夜分猶青無末不詠無本不凝發為詞章奔放莫禦五色交絢不可正視亦持貢函應書而起議茍不合退修于己吾有天爵不假外求秉心制行期履大猷自我先人唯義之逑闢孰建莊群族之繇養或有愆益田以百居或䵝昧加以塗飾明揭教條皎如星日以究以繹以衍其澤往聘碩師用緝教功曰優曰柔式昭式融春秋舍菜執禮愈恭疇意漓俗獲還淳風豈恤吾宗不逹州里仍嵗大侵我心如燬我糶我粟爾哺爾匕繼以釐牟惠及終始元季兵興海內繹騷青田群凶是歡是呶彼􅤒悍者虎擲鼠跳欲起應之屠劉恣驕君登于庭曉以順逆不見禍首身膏矛戟妻孥蒙戮鬼不血食爾盍自固以禦寇賊衆皆羅拜願如君言我刀我淬我柵我完我謀既叶孰敢來干威聲大振寇膽遂寒唯忠愍公統馭三郡麗陽遺孽負逆姦命公欲刈之以揚大政怒如雷霆疇敢與競君跽轅門慷慨陳辭䝱從罔治渠魁當誅蚩蚩小氓惡得盡夷公因聞納降者釋之里之三農越河種藝載耜與牛資舟以渡官有海禁吏因羈􅎗步如千望絶莫赴君聞衋然是何忍為即日戒行囊有長書徑詣大官歷斥其非卒復其舊民憂以攄君性至純兼以沈毅惡欲如讐嗜義如利服不及華食無重味履氷臨淵惟恐失墜事親從兄允為世模柔容愈顔張拱而趍行孚于家德則有餘大衣長𥚑見者翼如嵗時蒸嘗尤極慎慤出就齋室心存沖漠洋洋如臨式是昭格鄉鄰化之孝思油若撫事接物盎然春熙楊淑隱慝欲道之歸里有􅐁爭爰質爰稽茍聞話言如聽父師其形之端由表之正况能周急以蘇羸病友有寄金沒于兵穽家惟一牛償之弗靳君德之施漸漬益真人為弗滋智熄紏紛及聞其死孰不沾巾僉謂斯世不復斯人嗚呼哀哉成周之世畫區而耕量夫授地孰富孰貧孰有餘利盎然太和何有窮匱阡陌既開單公為私大將連圻微無卓雖民散無繫民冝是綏仁鄙壽夭乃政之基奈何棄諸藐若蛙龜不有君子誰復斯憫聳善扶義其利維永成慤之心實重耿耿菉葹縱橫申椒之馨鴟梟晝呼長離曶鳴誰不改容誰不鬯情殁而不旌為善者懲彼有穹爵吾棄弗顧此惟布韋發吾艷慕大書塋間表厥中素此吾直茟𥘉非諛墓思逺樓記盱江有湕湖周圍凡若干步涵日星而蕩風煙四時之景無不冝者大姓胡氏世居湖濵以詩禮為學至吾永年人益稱其賢以薦者起家為吉水幕職遷海北鹽課司白石倉副使未及大用而終其弟永實其子原鳯原鵬原駒皆號善繼大夫士恆集其門永年欲建樓以藏先世遺書不幸責志以殁原鳯兄弟請于永實因竭力成之名之曰思逺示不忘乎親也介前進士曾君仰來徴豫記豫問之曰思逺之義何居原鳯對曰不幸先人即世一念及茲精神遐漂無所戾止有時樞衣升高極目四顧見雲煙之卷舒星河之出沒泫然流涕曰吾先人果何所之精爽或有靈庶幾乘雲龍而一下焉斯思逺之所以名樓也豫曰是固然矣而其義未盡也原鳯又曰今人邇矣而逺者莫若古之人古之人隕魄黃壚泯然不可見其迹其精神心術之近存者賴遺言見于書爾大則聖次則哲次則忠與孝往往形諸載籍一展卷間神交冥漠有不知千載之為長一日之為短者孶孶焉悃悃焉日致力于斯庶幾契先人之所志爾是或思逺之義乎豫曰逺固逺矣而未切于身也盍更言之原鳯于是研精覃思大周六合小入一髮默然良久忽楊眉吐氣而顧豫曰我知之矣先生所謂逺者不在今人亦不在古人在吾之一身爾吾身非突然而中有也前之千萬年自地闢天開繩繩相承以迄于吾身後之千萬年又自吾身亹亹相續以至于無終不可以數計不可以智推庸非至逺者乎吾身一有失焉則前焉而弗能繼後焉而弗能延其責果安歸乎是以君豫懼其學之有爽也惕惕然如履淵冰恐其行之弗軌也惴惴焉如馭六轡此無它逺之不可不慎也若是何如豫乃喟然歎曰子言今得之矣頗苻先子之所望矣嗚呼逺固逺矣而甚邇也古之人有三太上立德其次立功其次立言若而人逺者數千年邇者亦一二百年其人固不得而覩矣玩其遺文想其德業儼然若與之周旋堂序之上未嘗知其死也所謂人雖死而有不死者存此之謂歟原鳯誠知此則又能以逺為邇無難矣永嘉之勝亦有樓名思逺者彼蓋慕浮屠之學此則篤于彛倫而有關于名教世必有能辨之者豫與原鳯言不過如此而止若夫湕湖之風物與斯樓之雄麗賢士大夫當有為原鳯賦咏者豫則可略也金溪縣義渡記撫州金溪縣南若干里旴水與清江合流入于汝名曰東溪其地為四逹之衢人之所負物之所載咸出焉溪廣不可梁必籍舟亂流以濟當氣升水起篙師艤棹以徼金錢踰時不能遽􅍱或水落氣縮氷霜寒沍類揭跣以進若履刀戟然人病之溪濵質行士曰何有華惻然以為已憂伐堅木造舟置諸衝往者聚數十人輒渡之來者亦然割田食舟子自朝抵夕不敢斯須逺去舟敗更新之周語曰辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁此有司濟人常事爾𥘉不責民也有華以編泯能佐官政之不及可不謂賢哉有華字祥瑞周窮扶難甓塗架橋其事蓋不一而足云建寧黃母夫人陳氏墓版文子門弟子黃仁詣前泣曰仁也生九嵗而失毋晝夜􅈱􅈱以啼惟我大母夫人是賴鞠我迪我式克至于今日忝𬒳官使竊祿于朝未知所以圗報而大母棄捐館舍叩地號天無所逮及幸稱道淑德勒石墓門猶或可為之已請晉府左相陶公凱評隲群行列為事狀一通願先生賜之銘死且不朽矣按狀夫人諱善足姓陳氏建寧西甌人幼喪母馮氏嶷然能自植立不與同類遊敖父某心竒之有問名者多弗答同縣黃氏世衡知其賢聘為其子義夫妻未及笄輒來歸上承尊章下恤媪御靡不逹其情曲三族咸歡稱曰黃氏有婦矣生四男子二女子義夫以疾終夫人哀慟欲從死不可得諸孤恆煢煢無依蓋藏漸盡朝虀暮鹽至不能時給夫人深憂之雞𥘉鳴秉燭起御紡磚伊軋之聲逹旦不絶如是者餘五齡誓以氷雪自守至于終身外伯父馮翁恐其中僨無策生群雛力諭之曰爾勞勩逾節尚不濟旦暮急苟緣是致疾辟猶鵲巢霣地母子無完理奈何使黃公為餒鬼乎夫人泣不對翁重言之聲色俱厲夫人不獲巳再適義夫同姓寒潭君君無子頗饒于資乃聘經師以教夫人之子夫人亦時警斥之曰汝衣冠胄也汝父望振其門惟寐忘之今不力異日何面目相見九泉乎凡一動靜一云為皆痛約之以禮稍有違忤靣發赤如赭諸子惴惴不敢前或遇節序相率詣先祠奠謁畢出坐中堂子孫以次奉觴為夀雖不解飲亦必使沾醉盡歡而止夫人長身而羸靣恆作頳玉色春秋雖髙康疆無疾見子普保以易經試藝銓曹中選擢合州石照丞石照以民稀并入州改忠之鄷都丞階將仕郎孫仁亦通周易領福建行省第四名文解上南宫未試除太常贊禮郎階將仕佐郎今升靖江王府奉祠正夫人時移書戒厲曰爾等既食君祿當夙夜靡懈以效精忠慎勿以貪墨敗非惟喪身實貽先人羞夫人年八十四不幸以洪武九年正月六日卒其年某月日葬于金籠山之原禮也所謂四男子曰同壽曰衆嘉皆夭曰如滿曰普保二女子一適范員一夭四孫男曰仁曰義曰貴曰炯二孫女未行豫聞女婦為隂類往往多柔順少剛明事或因循姑息苟有人焉能嚴以馭衆如竒丈夫則其家蕃盛無疑如夫人者是已豫祖母金夫人最號有家法先侍郎朝夕侍左右不敢失聲嚏咳唯恐弗其意且督子兄弟之學尤急每夜懸燈呼次第來前取倣書以驗惰勤事頗與夫人類宰木巳拱而懸繂之碑未有刻文而仁于新喪之際乃能汲汲以圖不朽得非賢耶仁為賢則豫有愧多矣銘曰家之盛衰繫于婦柔暗剛明隨所取彼美夫人資獨阜巳以委禽奉箕帚竭力秉誠事姑舅中外稱賢出一口威髙鳯翔日將久獨遺孤凰在林藪衆雖嗷嗷弱如桞鞠之育之比瓊玖遺胤不絶吾敢負凛若嚴師加善誘業就材成獻明后繡襮朱衣佩懸綬龍光貤贈恩當厚丘隧尊榮名弗朽豫言若誣有如酒
