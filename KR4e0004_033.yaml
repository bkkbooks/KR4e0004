body:
  text: 故永豐劉府君墓志銘府君諱庚金字竒相姓劉氏世家廬陵之永豐劉為江右簮纓之胄自唐迄宋擢進士第者後先相望入則登臺省出則蒞郡邑人稱為名門曽大父某大父某雖不與仕版而皆能繼書詩之業父某宋季嘗舉于鄊試南宫輒不利用持恩授新淦丞母周氏府君八歲善屬文未加冠巾五經誦之甚習年既長執經來從者户外之屨常滿多有去為名進士唯府君纍踐埸屋卒就擯斥時學校多私試府君漫起應之即在前列元至治癸亥又臨試期府君試以上古之書既而獲在選升名春官陳論過髙知貢舉者疑不敢取繼以龍飛恩例中書署為吉州路儒學正丁內艱而歸泣血三年未嘗見齒雖祥琴斯御諱日之至必反𬒮拭淚不已府君性忠厚遇異母兄竒可尤盡和孺之樂每聞將授衣問周夫人曰兄之衣何如夫人曰已先授之矣及夫人歿葬祭之禮獨盡瘁為之不忍毫髮煩其兄銓曹稽其年勞轉臨江路儒學教授命既下而府君病且革矣遼陽等處儒學提舉劉君嶽申名重當世與府君交二十年如一日其稱府君有曰溫柔而慎密明辨而近恕優優乎有士君子之風識者未為實録府君為文無宿搆下筆滔滔頃刻龍蛇滿𥿄間似欲飛動郡縣大夫士慕其聲光踵門求見者無虛日平生嗜酒飲至數斗不亂拱手端坐而為禮益恭此皆人所難者生于乙酉二月十三日歿于元統甲戌九月十五日享年五十以至正丙戌十二月二十二日葬于折桂鄊烏江金牛臺之左禮也府君配某氏子男子四宜立宜明俱早世宜謹元江西行中書省左右司都事宜正入仕國朝為起居注轉僉浙江提刑按察司事子女子二柔嘉適傳若曽柔恭歸彭宗徐孫男五服孫思紹見珠海珠繹珠孫女三徐元袁同其壻也一幼未行宜正字貴遒今以字行其為左史也余方司業成均相與論文甚歡逮出使浙部詣余拜且泣曰昔者先大父嘗自念言自十三世祖司空府君以來多決策發身而獨愧以特恩入官所以戒飭先君子者尤力先君子丕承前訓唯寐少忘之卒以儒而成名及其終也而呼宜正兄弟戒之曰吾才非不如今人而至于此命也爾曹當自勗以文學亢􅍏宗即亢􅍏宗吾死目亦瞑貧賤不足論也宜正時始十齡巳深知其言之悲幸夙夜戰兢不致顛隮獲從士君子之後忝𬒳官使至今二十九年而墓木且拱懸繂之碑未有所刻豈非至闕歟願先生文之豫憐其志而不敢辭銘曰家有世科子才又多胡負志而媕婀命也奈何命也奈何耘庵銘良鄊丞陳謙益仲東甌人也嗜學弗倦慨然有志于事功陳翰林元逹以飛白書其憩止之室曰耘菴夫耘之為義媷治蕪穢之謂也種而能耘黍苗芄芄然興矣益仲其知自治者哉作耘庵銘銘曰伊人之情譬彼良田嘉種誕布黍苗芊綿耘耔不加載蕪載穢既茁而軋長莫之遂我田我耘我苗日豐有實其同迄于穫功記禮之家人以為奧得奧斯理失則罔效和其柔剛修禮以耕陳義而種善道乃亨耨在講學去非存是合其所盛本仁以聚感之使堅播樂以安五者既至學功始完惟益仲氏孜孜好禮以耘名室義或取此古訓洋洋觸類而通母拘一曲滯而不融太史作銘勒于坐側上慎􅏧哉服之無􅑯古愚齋銘延陵韋侯彥芳吳中書僕射侍中弘嗣之四十七世孫夙以文學著聞亦既受薦于臨江别乘會二千石闕侯實行守事情孚化洽民宜之然猶不忘進修以古愚銘其齋居侯殆有志古者乎志于古美矣古學之可決者頗衆奈何獨有取于愚乎有取于愚斯其所以為不愚也歟是宜銘銘曰惟古之愚如彀斯弩直矢一發奮往弗顧惟今之愚如履多岐詭祕變化曽不測其所之古故為疾今復非古致宣尼之所傷奈人偽兮旁午我情鬱紆曷日而攄豈惟賢不逮昔愚亦不如遡埃風而屹立懷􅍇人于千載不有君子善則誰采彼焉多詐睢睢盱盱心自以為智人觀則愚我愚我守直情徑行孰不愚我我智斯亨以愚而名豈無栁氏為激而過中同于自諡我將何從聖謨孔邇終日不違晞顔則是王生致逺冠字祝辭虎林王生其幼也父命之名曰驥及年寖長加元服于首大賔字之曰致逺蓋取梁徐勉所謂人中騏驥必致千里之言也按説文驥千里馬也孫陽所相者其字從馬冀則諧聲夫千里馬不常有以謂世之竒才亦未嘗數見也以生名若字觀之則父師所期望者不亦深且長哉豫雖不及與聞三加酌醴敢抽蕪思而弘敷其義生宜聽之母忽其辭曰古者體物取義孔殷麟紀其瑞鳯揚其文表􅍏茂實載敷清芬其一惟馬之族本非一類八尺為龍千里曰驥因生有别挺材見異其二伊驥斯何墮地不毛虎文彪炳龍骨陂陀天機趫騰絶山飲河其三當其奮飛神行電逝若滅若沒一日千里晨燕晡越視同遊戲其四誰其似之渥窪之姿肉角飛黃逸氣纎離天間翶翔玉臺裴回其五奚官善馴是澡是拂秣以美薦飫以香粒筐惡蜃溲慮無弗及其六物尚有兹人胡不如天賦權竒孰不自攄口噴紅光長鳴九衢其七豈無王良俾其振迅未必鹽車能厄神駿三羸五駑過者誰問其八生遊藝府逸思超群剪水為神製霞作文亦既應書名逹帝宸其九侍經藩王出入禁籞宫𫀆時頒太官致餼寵賚之隆揆古無愧其十以利天下易經有辭取譬奔踶漢詔以之任重道逺生寧勿思其十一曷以思之朝夕兢惕匪力足矜所稱惟德豫言非誣勗之無斁其十二寄和右丞溫迪罕詩卷序有志之士豈無鄊土之思哉昔者楚人鍾儀為晉所留晉侯與之琴遂操楚音越人莊舄仕于楚雖富貴矣乃嘗為越吟此無它不忘本也夫晉椘與越皆同中國也語言相通也嗜好弗殊也尚為之抑鬱發于音聲如此况在絶域去中國數千里者哉宜其見諸咏歌而不能自已也右轄溫迪罕公居于汴梁資稟素美嘗從恕齋班先生學為詞章久遊淮海元季亦躋膴仕隨冡宰逺行遂留西域今見天朝使者至不勝鄊土之思舊嘗賦絶句以寄治書瑣納兒加繼作唐律一章獻丞相胡公其憂深思逺若不能勝情者想其親屬睽離莾無一人四顧蕭條與影為侣極目之頃但見獵獵胡沙茫茫塞草而巳右轄必慨然曰吾昔居江淮錦親朋胥會以敘離合之情庶幾重覩天日以享承平之福當此時發于性情無非雅頌正音以欹咏朝廷之盛德其視向日憂深思逺之作霄壤不侔矣右轄勉乎哉右轄勉乎哉洪武八年十月壬辰具官宋濂序題李節婦傳後婦人以節稱乃其至不幸也與其執之死靡他之誓曷若咏君子偕老之辭哉然而一與之醮終弗改其操身雖不幸而其苦節則有可尚者已若朱氏婦璹豈非其人哉嗚呼婦以節旌者固多而其事則殊有慕夫家貴富而不忍去者有年壯多子而不易割恩者有不能氷雪其行姑盜名以欺世者璹之父母納季實為贅壻合卺甫十日實賈遼東遂溺死于海璹誓不更適飬父母終身且依弟珍以居信誓堅確其皎如出日者歟揆前三者其無一之可疑者歟斯所謂真節婦矣張侍講以寧傳以顯之孰謂非宜或者猶以未得旌褒為恨然旌表朝廷事也題新修李鄴侯傳後余讀歐陽子等所修新唐書事多舛繆如紀中載膠東郡公降封縣公而傳中乃稱郡公傳中敘天平節度四人而紀中則云七人此猶可也宰相載于世系表而于惟謙相中宗鄭綮相昭宗武什万相武后乃皆棄而不録此猶可也觀其述作繁者失于支蔓略者過于簡率以致渙而無統鬱而弗章則其所繁者重矣劉昫舊史義例無法固不足責豈意新史亦復爾邪吳縝紏繆蓋不得不作也有若李泌在唐建謀猷輕爵祿髣佛漢之留侯新舊史皆略其事且譏其好縱橫大言以鬼道媚人主取宰相何其悖耶晉王府長史朱君讀而病焉因據泌之子繁所録家傳十卷參考群書倣前賢刪正陶潛諸葛亮二傳芟繁托華重為泌傳一通泌之事始大白于天下後世嗚呼微朱君泌不銜冤于九泉之下乎然而唐史之繆不止于此而已縝之所未紏者尚多朱君宜推類以盡其餘哉余總修元史及皇明日曆朱君皆與其事余見朱君有良史之才故為題識傳後而屬望之如此若余之耄則無能為矣朱君名右字伯賢天台人佛真文懿禪師無夢和上碑銘洪武六年二月甲申佛真文懿禪師年已八十有九一旦無疾忽戒浴易衣出器物分遺叢林諸友命弟子曰三界空華如風捲煙六塵幻影如湯澆雪亘古亘今唯一性獨存吾將入滅聽吾偈曰吾有一物無頭無面要得分明涅槃後看言訖斂目危坐而逝當是時師寓象山瑞龍之别室其嗣法住持能仁寺智巖與所度弟子全體等共闍維之以是年某月日窆于天台國清某山體懼無以昭示來裔請恕中愠公評隲羣行成書介方外友用堂楩公虛白杲公詣余求塔上之文師諱曇噩字無夢自號為酉庵慈溪王氏子也祖申宋某年進士真州六合縣主簿父祿元慶元路稅課大使母周氏夫人師生六年而稅課君歿夫人命從鄊校師遊氣岸髙騫有一日千里之意洎長窮覽儒籍徹其義髓人有叩者竭其始終而語之蟬聮不能休自以為無書不探知解且至遂學文于修道先生胡公胡公諱長孺其文為時所宗見師大加賞識久之藻思濬發縱橫順􅊇隨意之所欲言聲名頓出諸老生上已而心有所感彈指歎曰攻書修辭此世間相爾曷若求出世間法乎乃白夫人走奉化廣法院禮子文良公為師聞雪庭傅公主真之長蘆乃往依焉遂剃除須髮為大僧師之春秋二十有三矣繼受具足戒于杭之昭慶凡釋氏契經與台衡賢首慈恩諸文晝夜摩研不知有飢渴寒暑已而復歎曰教相如海苟執著不回是覔繩自纏爾曷若求明本心乎于是篤意禪觀又久之雪庭遷住靈隱師往侍左右雪庭示寂元叟端公由中天竺來輔其處元叟風規嚴峻非宿學之士莫敢闖其門師直前咨叩了無畏懼機鋒交觸情想路絶迅電一掣怒庭隨擊內外如一靡間豪忽自一轉至于六七語愈朗烈元叟欣然頷之命掌內記延祐𥘉詔建水陸大會于金山二浙名浮圖及賢士大夫皆集師佐元叟敷陳法要及與羣公辨論義趣英發莫不推敬鎮南王聞之延師至廣陵尊禮偹至彌年方遣徑山虛谷陵公道價傾東南慎選書記之職絶難其人既得師緇白交慶重紀至元五年浙東帥閫合府公邑令請師出世慶元之保聖再遷慈溪之開夀三轉于國清帝師大寶法王嘉師之髙行錫以令號師之所至皆以擔荷大法為已任煆煉學徒孶孶如不及多有開悟之者瑞龍院欲易甲乙住持為禪剎師為開山院因賴以增重直與名伽藍相齊海上颶風發驟雨如注層樓修廊俱仆師所居亦就壓人意作韲粉矣亟撤其覆索之一巨木橫搘榻上師危坐其下若神物為之者師凡四坐道場去留信緣皆略無凝滯不久引退叢林中慕其名德之髙每闢室以居之師數戒諸徒曰吾與爾等研究空宗當外形骸忘寢食以消纍劫宿習然後心地光明耳自是日惟一食終夜凝坐以逹于旦國朝洪武二年詔徴江南有道僧而師與焉館于天界寺既奏對上憫其年耄放令還山越四年而終師修身廣顙昻然如野鶴之在雞群文思泉湧有持卷軸求詩文者積如東筍當風日清美師從容就席縱筆疾揮須臾皆盡長短精粗無不合作鄊先生袁文清公桷指師謂人曰此阿羅漢中人也觀其所作驃騎山疊秀軒列清軒三賦駸駸逼古作者渡江以來諸賢蹈襲蘇李學以雄快直致為誇相師成風積弊幾二百年不意山林枯稿之士乃能自奮而能至于斯也翰林學士承旨河東張公翥曰噩師儀觀偉而重戒行嚴而潔文章簡而古禪海尊宿今一人耳其為縉紳所推許類若此日本國王雖僻在東夷亦慕師道行屢發疏迎致之師堅不往王與左右謀欲劫以歸浙東宣慰使完者都藏之獲免自時􅍏後凡遇師手迹必重購之而去且詫其能放異光云師平生製作甚富悉不存稿晚年重修歷代髙僧傳鍥􅎚行世筆力遒徑識者謂有得于太史遷嗚呼真如性海無不含攝妙用流行見諸文句其與實相不相違背苟欲岐而二之失之逺矣唯師逹理事之無礙本性既明所寓皆法辭章散落于四方者俊偉光明無非佛事特用表而著之以見不二門中本來一體無分别異同者猶未能泯本迹而忘物我也其視師為何如哉銘曰惟釋迦文説法如雲雨彼大千百物咸仁弟子結集為一藏教言之不文曷資化導末流相承纏蔽語言所以逹摩直探心源救弊扶衰吾道爾翼豈以饐故并忘其食師生名閥研究儒書洊攻竺典無幽不攄終入空宗縛習禪㝎出抵諸方以正性命如獅子兒哮吼一聲凡情盡喪何有死生剎那之頃法身呈露以何因緣為無著故曰吾有作依佛為師敷宣大法非文孰宜咳唾之間無非妙義或縱或橫理事不二有文之文人所易知無文而文識者其誰四坐道場機用由此無舌而談震驚百里颶風揚威裂屋駕濤梁木其壞不損絲毛古云有道靈物呵護豈惟人欽神亦歆慕世相有盡起滅空華白月在天一塵不遮我施文辭以作佛事書窣堵波庶幾無愧跋西臺御史蕭翼賺蘭亭圖後豫幼時聞文皇遣蕭翼賺蘭亭敘于辨才事頗疑之以為文皇天縱人豪未必為是瑣屑也及覽劉餗傳記云蘭亭敘因梁亂流落人間陳天嘉中為僧智永所得至太建中獻之宣帝隋平陳又獻之晉王廣即煬帝也帝不之寶僧智果從帝借榻及登極竟不從果索果死弟子辨才獲焉文皇為秦王日見榻本驚喜乃貴價市羲之書蘭亭敘終不至及知在辨才處使歐陽詢求得之以武德二年入秦王府由此而觀辨才之師乃智果非智永求蘭亭敘者乃歐陽詢非蕭翼也汝隂王銍性之采餗所載謂餗父子世為史官是正文字尤精其言當不妄遂詆蕭翼之事鄙妄狹陋僅同兒戲且云秦邸不能遣臺臣文皇始㝎天下威震萬國尫殘老僧亦何敢靳一𥿄書其意正相合豫疑于是頓釋或者猶云辨才所居雲門寺有翼留題二詩秦朝黃三公皆信而不疑此固不足取以為據至若閻立本會辨才蕭翼圖則出于何延之等傳會謂為立本當時之所親見尤非也今閲此卷遂執筆詳識如此年耄神昏未必能中乎理又俟博雅君子定之居易齋銘衢之常山有簮纓世族曰魯氏蓋出于宋參知政事肅簡公貫之之後自亳而來遷舊藏玉刻傳宗印可驗其逺孫濬文念祖德深長思繼承之甚力種學績文惟恐有弗逮州縣察舉其才貢之中書中書奏濬文才行稚飭擢為侍儀舍人遷秦王府典儀將行詣詞林請曰濬文讀書之齋名曰居易鄱陽周先生伯溫為書三大篆揭之願以銘文為屬子謂居易乃素位而行外物之來一歸之于天君子進德之方有出于此者乎是宜銘銘曰君子守分如守百職出位以思乃德之賊銀黃三組庾粟萬鍾我合受之不以為豐衡門棲遲藜糗是食我則安之不見其嗇此非在我皆天所為天則孔邇我敢悖之或逆或順視之若一心以道寧不纍于物徇而弗察非怨則驕惟外之願而中則搖觸類而推何往非正其正伊何安于義命侃侃魯生文獻之家夙夜以思揭德振華齋居深沉蛟螭作篆前陳回溪右撑翠巘爾居爾易勿險與難上慎􅏧哉德將不刊林伯恭詩集序詩心之聲也聲因于氣皆隨其人而著形焉是故凝重之人其詩典以則俊逸之人其詩藻而麗躁易之人其詩浮以靡苛刻之人其詩峭厲而不平嚴莊溫雅之人其詩自然從容而超乎事物之表如斯者蓋不能盡數之也嗚呼風霆流形而神化運行于上河嶽融峙而物變滋殖于下千態萬狀沉冥發舒皆一氣貫通使然必有頴悟絶特之資而濟以該博宋偉之學察乎古今天人之變而通其洪纎動植之情然後足以慿籍是氣之靈彼局乎一才滯乎一藝雖欲捷騁橫騖以追于古人前之而愈却培之而愈低幾何不墯于鄙陋之歸此濂于伯恭之詩不能無感焉伯恭博極羣經而尤長于春秋嘗應書鄊闈實冠多士伯恭年始二十餘一旦名動海內自時􅍏後學益加修遂擢至正甲午進士第歷佐省憲二府正色直言百壬畏懾時出竒計剪三􅊇竪如烹狐兔則其所養之充是氣浩然弗撓弗屈故其發于詩也沉鬱頓挫渾厚超越大雅奏而黃鍾獨鳴也武庫開而五兵森列也洪濤怒張而魚龍出沒也一展卷間呈珍獻異可欣可愕精神為之震眩濂前所謂聲因于氣皆隨其人而著形者豈非然邪豈非然邪世之學詩者衆矣不知氣充言雄之旨往往局于蟲魚草木之微求工于一聮隻字間真若蒼蠅之聲出于蚯蚓之竅而已詩云乎哉永嘉舊傳四靈詩識趣凡近而音調卑促近代或以為清新者競摹倣之濂每謂人曰誤江南學子者此詩也聞者且疑而且信焉今吾伯恭之詩出一洗習俗之陋信知豪傑之士自有其人也故敢執筆直題于首簡世有知言者必深有取焉伯恭名溫姓林氏溫之永嘉人跋一雨大師塔銘後豫觀朱長史所撰一雨大師塔銘不覺為之嘆曰嗟乎精誠之至何所不應哉鄒衍慟哭六月降霜魯陽揮戈白日退舍夫以匹夫之微尚能感天象之變况學浮屠者志念專一而外物不足以汨其真乎大師焚身而甘露降亦其理之恆爾長史乃疑大師之制行庸庸爾碌碌爾何以致是也豈亦有宿因乎豫則曰是固不可知然亦有説當大師從容就火之時一心唯知有雨爾而無絲毛私意之干是則純乎天矣純乎天天惡有不應哉在唐之時浦陽江上有僧曰祖登榮雨三日不應登康侯山墜崖而死大雨即隨至其事亦猶是爾租登之歿鄊人至今尸祝之有如大師者長史寵以雄文且勒石焉是皆嘉其有功于民也嗚呼浮屠木茹澗飲者爾亦何與世事其憂民之憂尚如此則夫有民社之寄而尸位素餐者可愧哉可愧哉題甘節卷後地天為泰純剛純柔之卦也節自泰來則柔來節剛剛上節柔恐其剛柔過盛而無節也故當節之然節至于苦則不能常決非貞之道又必至于井節從容恱豫而無窘束之意乃為人情之所尚也易之所謂井節者其大意蓋如此鹽城孫君子章僑居吳郡井節里因以井節老人自號然孫君篤厚長者居鄊多善行而每事有當節者輒節之自苦以至于井婆娑嬉遊以至終身然亦未嘗過也揆于易卦所謂節者施之一身不幾亦有合歟孫君之子化以能古文辭名世朝廷聞其賢徴為侍儀使名聞之升正騰騰未巳是則井節之亨又當復見于此矣題柏庵圖後上黨馬君庭堅其幼也父名之以柏長遂築室而居曰柏庵及主事勳曹轉閩省檢校官不至庵中者頗久乃命盰江藍瑜畫為圖時展玩之而其僚友員外郎王彥和實為之記庭堅來京復請濂題其後傳有之鬯􅍫以掬説者謂掬柏也掬柏性堅緻有脂而香故古人破為􅍫用以搗鬱嗚呼柏之德與申椒胡繩同又不特歲寒後凋而巳庭堅之父托此而訓名其知之深而望之至哉庭堅不惟奉以自名且以名其室是跬步不忘乎親矣不忘乎親者庸非孝乎昔者蘇文公命其二子曰軾轍且知軾之不外飾而車仆馬弊患不及轍其後咸如文公之言今庭堅所守貞徑而芳譽逺聞有無愧于柏者知子莫若父信哉或謂庭堅樹柏築庵乃為肥遁之計非至論也日本夢窗正宗普濟國師碑銘洪惟大明皇帝執金輪以御寶曆聲教所授與如來化境相為逺邇乃洪武八年秋七月日本國遣使者來貢方物考功監丞華克勤奏曰日本有髙行僧夢窗禪師其入滅已若干年而白塔未有勒銘其弟子中津法孫中巽有慕中華文物之懿特因使者而求之然人臣無外交非奉敕旨不敢遽從所請敢拜手稽首以聞皇上欣然可其奏特詔詞臣宋濂為之文濂按其弟子住持善福寺周信狀云禪師諱智曤姓源氏勢州人宇多天王九世孫父某其母某氏無嗣默禱觀音大士夢吞金色光而孕歷十又三月始生有祥光盈室之異九歲出家依平鹽教院以居授之羣書一覽輒能記暨長繪死尸九變之相獨坐觀想知色身不異空華慨然有求道之志十八為大僧禮慈觀律師受具足戒尋學顯密二教垂三年未久然恐執滯名相建修期道場以求玄應滿百日夢逰中國踈山石頭二剎一龎眉僧持逹摩像授之曰爾善事之既窹拊髀嘆曰洞明吾本心者其唯禪觀乎遂更名踈石字夢窗謁無隱範公于建仁寺繼至相州巨福山山之名院曰建長錙錫之所萃止時一山寧公主之一山見師甚相器重令為侍者朝夕便于咨決俄出遊奧州聞有講天台止觀者師往聽之且曰斯亦河礙實相乎自是融攝諸郡昭揭一乘之旨辨才無礙然終以心地未明悵倀然若無所歸洊修懴摩法期至七日感神人見空中益加振拔時一山自建長遷主圓覺寺師復蓬纍而往備陳求法之故至于涕泣一山曰我宗無語言亦無一法與人師曰願和上慈悲方便開示一山曰本來廓然清淨雖慈悲方便亦無如是者三返師疑悶不自聊結跏澄坐視夜如晝目絶不交睫久之往萬夀禪師寺見佛國髙峯日公扣請如前髙峯曰一山云何師述其問答語甚悉髙峯厲喝曰汝何不云和上漏逗不少師于言下有省辭歸舊隱常牧山唯分隂是競誓不見道不止嘉元年夏五月一夕坐久偶作倚壁勢身忽仆去師豁然大悟平生礙􅈾之物氷解雪融心眼爛然如月佛祖玄機一時爍破乃作偈自慶有等間擊碎虛空骨之句亟見髙峯求印可髙峯喜溢顔面囑曰西來密意汝今已得之善自護持出其師師光無學元公手書一通俾之以寓相傳付囑之意師回棲甲州龍山庵髙峯招住上野州之長樂寺師力辭卓庵濃州古溪都元帥平公某之母覺海夫人某氏慕師有道欲一見之師竟入五臺山縛吸江庵既而遁入海嶼夫人遣使索得之俾出世雲岩寺師復辭搆泊船庵于卧龍山退耕庵于捴州有終身立􅊤之志正中二年師春秋五十一國主後醍醐天王命宫使起師領南禪禪寺入見王賜坐師自言志在煙霞出世非所願王曰吾心非有他欲朝夕問道耳師不巳應命王時幸臨之相與談玄竟日乃去將及期王遜位師又引退道經勢州會新建善應寺成延師開山未幾棄去抵相州樞府郡公逼主淨智寺尋歸錦屏山營瑞泉蘭若元德元年圓覺四衆必欲致師師為勉強一出又復棄去二年羽州守藤道藴𥘉創慧林寺迫師涖其事元弘元年逹官貴人又有以建長請師者師復辭二年瑞光寺援善應故事求師為第一代三年王既復辟召師入見以介子都督親王之邸更為靈龜山臨川禪院命師為其長賜以國師之號建武元年秋王妃薨王留師宫中二七日罷政而講法因請師宣説大戒執弟子之禮彌謹及還強師再入南禪王親率羣臣至山見羣臣入禪定秩然有序次第行食靜而不譁王恱師升坐提唱音聲鴻朗辭意警策王愈喜給腴田若干畒以飯僧先是近臣有毀斥禪宗者王舉問師師以自性三寶何必強生分别為對王巳信之至是益知禪學為貴謗言無自而入忽退處兜率內院而建仁樿寺又欲逼起之師笑不答曆應二年攝州守某革西芳教寺為禪僉言非師無以厭衆望師振錫而往舉揚逹摩氏之道聽者改容為建無縫閣以水晶寶塔安置舍利萬夥其中他若竒勝之地多冠以亭榭以憩四方遊士規制燦然可觀師夢王作沙門相乘寶車往靈龜山已而即世征夷大將軍源公某造天龍資聖禪寺以助冥福聘師住持遂與前夢協阿州守源公某新立輔陀院師亦俯徇其意為之説法即還天龍康永元年春太倉天王親往受戒願為弟子三年建八幡菩薩靈廟于寺側貞和元年王復帥羣臣來聽法敷宣之際有二星降于庭光如白日賜以金襴𬗋衣二年春令弟子志玄輔其處退歸雲居庵冬召師入宫加以正覺之號觀應元年春兩宫國母請師于仙洞受五戒二年春師謂左右曰天龍宫室幸皆就緒唯僧堂猶闕當力為之堂成可容七百人廷議重師名德復強師入天龍師行百丈清規聲振朝野王遣使復加心宗普濟之號且遺以手書其略有曰道振三朝名飛四海主天龍席再轉法輪秉佛祖權數摧魔壘國中以為榮師以年髙又復引退兜率內院九月朔召門弟子曰吾世夀七十又七僧臘亦六十矣旦夕將西歸凡有所疑可頻叩焉于是集坐下者如雲師隨機開示皆充然有得而去越七日示以微疾兩宫洊臨問起居師為陳攝心正因精神不少衰至二十九日遺誡授門人作偈别大將軍源公囑今外護復書辭世頌一首三十日鳴鼓集衆告别翛然而逝顔色不變時有白氣一道橫貫師之寢室黑白二萬餘人皆哀慟不能勝以某年月日奉全身塔于內院之後分存日所剪瓜髮瘞于雲居髮中纍纍生舍利云其嗣法上首天龍曰志玄曰妙葩建長曰慈永南禪曰通徹曰周澤所度弟子載名于籍者一萬五千有餘師儀觀髙朗慧學淵深舉揚正殺如密雲廣布甘雨頻澍凡具生性者隨其根器小大皆獲成就上自國王宰臣下逮士庶無不頂禮敬信凡所涖止如見七佛出世香華供養唯恐或後故管領源公賴之嘗與人言曰我從先人聽國師劇談佛法頗逹真乘遂能死生如一臨事不懾而先人竟死于忠吾亦知委身以事君者皆國師化導之力由是而觀師之道非特究明心學實足增夫世教之重况其內外之功兩得祛縛釋粘起廢輔壞以安輯清淨海衆人患不能有其一師獨兼之然其抗志髙明視榮名利養淡若無物唯欲棲身林泉屢典大利皆迫于王命而起世稱大善知識者非師孰能當之嗚呼宋南渡後傳逺摩氏之宗于日本者自千光禪師榮西始厥後無學元公以佛鑑範公之子附海舶東遊大振厥宗髙峯纂而承之師為髙峯之遺㣧益有顯于前烈重徽疊照光于海東止惡防非有禆朝政功用丕闡人思弗忘濂因奉敕撰文卑中津等歸鑱樂石以見佛性無內外皇化無逺邇昭示千載俾勿壞銘曰逹摩之學傳至真丹一花五葉其支寢繁臨濟名宗昭于佛鑑有子如龍乘桴東泛海東有國接于榑桑民惇俗龎環水為疆膜拜奉迎若佛之至四衆聞之其從如雨伊誰繼之心境兩融日出髙峯海水皆紅金光見夢長虹不滅篤生異人丕照先烈何文不搜何義不求孰授厥像截斷衆流其心倀倀有淚如霰感彼神人白晝而見本來清淨一法實無疾馳索首非迷即愚一喝之中真靈獨露朗月中天其色純素我歸我山與雲往還豈意聲華落彼世間文彩彰疇不歆慕巨剎名藍非住而住説法于座緇素共聆天見祥徴二星墜庭百廢具興我敢用逸寶華樓閣重重兜率上自君公下逮黔黎稽首作禮如天人師屢出屢退泊然無礙終與實相不相違背吾緣垂盡預告化期爾母懈怠來質所疑遺戒諄諄續佛慧命言巳即化若入禪定覺照至圓體性本空生滅不二唯道之從若見若聞同喪考妣法幢既摧大衆何倚孰為佛乘孰為衆生縱有言説皆是強名勒此塔銘龜趺螭首焯德序功以示不朽日本瑞龍山重建轉法輪藏禪寺記我佛如來其正法之流通者有三藏焉一曰修多羅藏二曰阿毗曇藏三曰毗尼藏惟此三藏諄諄化導使一切有情滅妄趍真誠昏衢之日月苦海之舟航也琅函玉軸多至五千四百四十八卷衆生根純莫能融貫善慧大士以方便力造為毗盧寶藏函經其中一運轉間則與受持讀誦等無有異攝大千于機輪所聚功德不可思議由是薄海內外凡有伽藍者必設置藏室焉日本沙門文圭介鄉友令儀來告豫曰本國平安城北若干里有禪寺曰轉法輪藏舊名寶福廢壞巳久無碑碣可徴莫知其何時建立正應元年肻庵全公從周防法眼藤道圓之請嘗就遺址而一新之而僧本覺及梅林竹春巖玪相繼來􅊩法席自時􅍏後風雨震凌又復摧塌弗支白草荒煙芻蕘之迹交道矣貞治三年衆以文圭或可以起廢力舉主之𥘉寺無正殿唯有藏室一區藏之八楹皆刻蟠龍作升降之勢數著靈異因祀之為護伽藍神至應安三年文圭欲建殿于其前忽神降于一比丘曰我神泉苑善如龍王也伽藍神來云大藏將傾乃視之漠如而欲有事于殿功是棄所急而不知務也宜亟易為之否則我足一搖此地當為湖茍遵吾言改奉王家神御則國祚佛法皆悠長矣言訖仆地覺而詢之絶無所識知事聞于王王大恱曰余憶幼時乳母時禱八龍之神事正相符即遣中納言藤元賜今額元之行有雙白鷺飛翔前導至寺而止人異之未幾王遜位號太上天皇給地若干畝以廣寺基文圭殫􅍏智慮出衣盂之資簡材陶甓使其堅良崇室上覆機輪下承巨木中貫方格層列經匭櫛比繪像精嚴神君鬼伯翼衛後先所謂楹上八龍者塗以金泥鱗介焜耀角鬛森張隂飈肅然似欲飛動國人聚觀無不慶愜文圭復奉今王之命請贖一大藏經安置中規制整飾視舊有加焉經始于某年月日訖功于某年月日縻錢若干貫米若干斛役人若干功太上既棄群臣文圭别于寺東若干步建盤龍院以奉神御如神之所言云文圭近受王命出持使節貢方物于上國大明皇帝嘉其逺誠寵賚優渥文圭敢藉是有請于執事願為文持歸勒諸堅珉以示無極豫聞七佛尊經實貯龍宫海藏在昔龍樹尊者嘗入其中覩華嚴經上中下三本因記下本以歸西土是則天龍雖以戒緩在龍種中而其向乘之急得于華嚴會上圍繞廬舍那弗與聞大乘圓頓之教終非他族可及經藏所在其能擁護而顯靈異也宜哉日本𥘉無輪藏有之其從茲寺始文圭承國君之命孜孜弗懈以起廢為巳任亦可謂流通大法者巳豫既為記其事且演説藏中真實了義為偈以繫之文圭字廷用篤志禪觀善繼大林育公之學者也偈曰世尊大慈父憐憫諸有情自從鹿野苑直至跋提河説無量妙法普度于人天根雖有利鈍隨機獲饒益弟子所結集汗牛復充棟善慧施善巧收攝在轉輪圓樞運動間地軸相回旋法王所説法一一皆現前譬如日月燈能放大光明無非真般若不見有一法似兹功德聚盡在轉移內一轉結習空淨如青琉璃二轉加精進直入智慧海三轉到彼岸安住涅槃城以至千百轉轉轉俱一同循環若弗停我輪未嘗動此以何因緣動靜無相故瑞龍有精藍重建毗盧藏中函貝葉多字如恆河沙沙沙各具佛不翅那由他還以一佛攝攝盡無復餘大包于無外小則入無內是謂神通藏萬劫終不磨非比有漏因成壞每相仍所以天龍衆在在悉護持有時著靈異雷電倏變幻守此清淨域外道不敢干我持如意輪讃此大乘法告爾諸佛子晝夜須勤行有悟片言間全體即呈露不著前後際廓然無聖凡豈惟佛子等龍神亦當聽乘戒二俱急共成無上道
