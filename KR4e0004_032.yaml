body:
  text: 故金母翟氏夫人墓志銘洪武乙卯七月三日故金母翟氏夫人以疾卒于南京之寓舍夀七十六卜以其月二十四日奉柩還葬故居無為州巢縣之槖臯鎮其子朝興既備書卒葬歲月刻石以置玄堂復介豫友錢顒狀其羣行請立銘于墓門按狀夫人世居無為州城偃月池上今遷于槖臯父大成巢縣稅務副使母徐氏夫人自幼溫醇莊重嶷然如成人父母有命毫髮不敢違事姊若兄亦盡其愛敬之道故一家竒之皆言慎擇所居不可與凡子年十六始歸同縣金君斗輔今封鎮國將軍僉大都督府事夫人既歸孝養舅姑甚至婉愈其容色唯恐有咈其意晝食之間未饋食不敢先飯或遇有疾具鼎烹藥齊嘗而後獻其于四時祭祀之禮尤謹祭器必親滌濯瀕祭心存目著儼乎若有覩者助鎮國公以節儉植家凡為伉儷者六十年相敬如一日未嘗以片言相加遺人以為難遇諸內外姻族一循禮節若鄰曲若傔媵亦皆有恩惠故稱夫人之德者無間言生子男四人長溫次良次恭皆先卒季即朝興驍勇而有謀當元季兵亂四海鼎沸歲乙未從皇上渡江與諸將削平江東取淮浙下湖湘定中原收西蜀十五年間與有勞烈遂由同知振武衛親軍指揮使司事升為本衛指揮使階昭勇大將軍改鎮國將軍僉大都督府事于是司勳援例上聞夫人致有今封鸞誥賁臨人皆為夫人榮不幸以一疾終嗚呼夫人其飭躬也儉其奉上也孝其事夫也敬其迪子也嚴其使下也惠五者備矣其無愧婦道母儀者乎銘曰葆貞則兮循天經叶篤孝敬兮奉尊章親滌濯兮慎蒸嘗事夫以敬兮終身不爽叶子為武臣兮從征四方斬將搴棋兮紀功太常鸞誥自天兮燁其寵光夫人雖歿兮令名不亡槖臯之原兮山秀水明叶太史作銘兮薦此石章佛心了悟本覺妙明真淨大禪師寧公碑銘有序臨濟正宗九傳至于東山演公全機大用譬猶日月行天罅隙畢照其弟子上承法印開拓覺源固不可以一二數就其傳派尤著者言之其一為圓悟勤其一為天目齊其一為開福寧圓悟而下又岐而為三曰􅍑丘隆曰此庵元曰大慧果其道多行于南天目六傳至海雲簡開福六傳至金牛真其道多行于北佛性無南北而佛法亦然其融通混合覃𬒳無際震蕩鏗鍧靡間幽顯論者未易多此而少彼也金牛世適實大湖無用寬其又鐡中之錚錚者歟無用之子則吾一源師其人也師諱永寧一源字也自號虛幻子俗姓朱氏淮東通州人世為䆠族父某母隴西李氏師既生舅氏吉安郡守某愛其黠慧命為嗣年六歲入鄉校經籍即䏻暗記且了其大意然非性之所樂也聞人舉佛陀號遽注耳聳聽九歲懇求離俗父母弗之許輒連日不火食乃使依族姻摸上人于利和廣慧寺利和州之望剎宋有淮海肇禪師說法度人聲聞當世前一夕寺衆同夢迎禪師次日而師至識者異之謂禪師乘願輪而再世焉十二歲遊揚之雍熙寺㑹主僧來峰泰編禪林類聚成師覽之笑曰此古人糟粕耳點檢何為河南王童童竒其幼而器之屬僧録司給牒剃度為沙門尋受具足戒自時􅍏後蓬纍出遊浙河西見諸大老下語無所契中峯海方柄法蘇之萬夀留之經年巳而入穹窿山謁克翁紹克翁察其志不凡俾掌藏室時年巳十九矣一旦欲歸鄊行省覲禮至毗陵約明極昶于焦子山精修禪㝎稍涉睡昏則戴沙運甓懸版坐空如是者五年明極曰藏主見解且至宜往參人遂至淮西太湖山求印可于無用無用門庭嚴峻師方入户厲聲叱出之師作禮于門外合爪而立久之乃許入見問曰何處人師曰通州曰淮海近日盈虛若何曰沃日㴞天不存涓滴曰不著㷮道曰請和尚道無用便喝師退就禪室徹夜不寐一旦聞無用舉雲門一念不起語聲未絶而有省急趨入堂無用便打然知師頓悟令造偈拈趙州師立成曰趙州狗子無佛性萬家森羅齊乞命無底藍兒盛死蛇多添少减無餘剩無用嗒然一笑復舉證道偈問師曰掣電飛來全身不顧擬議之間聖凡無路速道速道師曰火迸星飛有何擬議敵面當機不是不是無用振威一喝師曰喝作麼無用曰東瓜山前吞匾擔捉住清風剝了皮師不覺通身汗下亟五體投地曰今日方知和尚用處無用曰閉著口自是侍左右者三年且以斷崖義所贊己像親署一花書授師曰汝緣在浙逢龍即住遇池便居師遂還浙時虛谷陵元叟端瀨翁慶幻住本天如則各據名山遞展化機師皆往扣擊道相吻合而幻住尤譽師弗置元祐庚申延師往廣德縛苑于大洞中洞左有實相寺馬祖弟子澄公道埸師為起廢重新之同時有無一全遁跡于石溪石溪與大洞相望人謂廣德二井露門至治癸亥宜興之龍池請師建立禪居師以名符懸記欣然赴之作室以間計者凡數十命之曰禹門興化庵先是山顛有龍池其深叵測龍出每大水民甚苦之師召龍受三歸依戒龍不復出師居之久復厭其未幽邃也擇絶巘作室以居至壁立如削處斫木為棧鉤環連鎖棲板于空中不日告成師足不越戶限者二年學徒聞風遐邇坌集師亦不䏻悉拒也帝師大寶法王稔師之道行降師號曰弘教普濟禪師泰定乙丑州西之九里有地曰青山山明水秀前僧副周某延師之至為創寺一區因以九里名之師曰善則善矣僅二紀必當變遷時人蓋不之信也至順庚午出世住李山禪寺瓣香酬恩卒歸之于無用俄有詔集桑門千七百人閲毗盧大藏經一七日師升座敷繹正法天降井露之祥甫三年退歸龍池時元叟主雙徑月江印主雲峯皆招居第一座辭不赴元統甲戌浙西江東道廣教總管府具疏請主常之天寧萬夀州守戍將敦勸尤力師漠若無聞或激曰大法火冷灰寒師乃欲自睱自逸耶師為蹶然而起寺常灾方議經營前住持幽岩靜夢殿楹仆地師以隻手搘之暨師之至果為新釋迦寶殿塑佛菩薩天神諸像雄冠諸剎踰八年有言師于順帝者錫號曰本覺妙明真淨禪師至正壬午江南行宣政院命師主大華藏寺師舉龍門膺伐之明年復命𥙷天童景德禪寺師堅以疾辭又退歸龍池宜興銅官山舊有北嶽菩提院燬于㑹昌士潘敬之重搆焉師以九里寺助建法堂文室之屬以年稽之正二紀矣人益嗟愕謂師䏻前知戊子有㫖趣入覲說法于龍光殿上恱賜金襴法衣兼以玉環加師號曰佛心了悟大禪師帝師亦有綘𫀆毳帽之賜居無何奉㫖函香至五㙜山曼殊大士為現祥光五道明年陛辭南還道過維揚鎮南王波羅普化率妃嬪等延師入官禀受大戒賜以白金盂及僧伽黎衣遣司馬護還龍池庚子師為慕道者所逼出領善卷寺寺巳弊師施塗塈丹雘之功且甓其寶街明年募善士萬人為萬善同歸會二晝夜及瘞兵後枯骨至無萬數壬寅又退歸龍池癸卯廣德大旱師徇鄊民之求結壇誦呪焚㖵未終大雨如瀉歲乃登衆愈知師有道不容其還強住麻蕻山慈慧禪庵未幾成大叢林國朝洪武戊申又退歸龍池巳酉夏六月師示微疾屬弟子宗珦栽𥿄製內外衣且曰吾將逝矣或以藥劑進麾去之十五日自興化庵移龕至絶巘所居十七日昧爽師起沐浴服𥿄衣索茟書偈云七十八年守拙明明一埸敗闕泥牛海底翻身六月炎炎飛雪書畢側卧而化停龕七日容貌如生先一月龍池水忽涸及師順寂噴湧異常時君子知為異徴黑白戀慕各衣衰麻繞龕悲啼如喪考妣至有然頂灼臂以為供養者執紼之人盈萬茶毗有五色光現齒牙舌輪及所持數珠皆不壞設利無算烟到中林亦纍纍然生人競折枝取之至于灰土亦掬取淘汰獲者亦衆于是門人志舜志思等各分餘骨與不壞者以某年同日就龍池太平齊山𬗋雲山麻蕻山五所建塔藏焉世夀七十又八僧臘六十有五師氣貌雄偉身長七尺有餘音吐鴻亮其接物也不以貴賤異其心所至有無不傾向若中書右丞相朵兒只若江浙行省左丞相别不花若趙文敏公孟俯若馮內翰子振尤所賔禮者也四民來獻薌幣衣履者肩摩而𬒮接既無虛日師既受即以施人曾無毫髮係吝其自處則布𫀆糲食沛然若有餘凡發為文偈了不經意引𥿄行墨而空義自彰有四㑹語行于世其嗣法弟子則季山之仁奉報本之紹洪芙蓉之志恭顯德之紹善也其所度弟子已出世者則祥符之紹密之寧之仁性竹山之祖瑛南禪之祖勤也未出世者則祖珉維祖宗㑹紹仁祖瑜祖林等也師之道德所霑丐者可謂侈矣師示寂後之七年仁性親撰行業記一通同祖珉謁余于禁林以塔上之銘為囑嗚呼古之學者孳孳為已及覺門巳證懼失其傳無以續佛慧命不得已而出世為人後世乃藉是以為榮觀豪攘巧取無所不用其極果何為者耶有若師者得法之後固拳拳以度人為急及主大剎屢退養龍池雖天童實厠五山亦搖首弗顧其髙風峻節如祥麟威鳯可望而不可即何其賢耶人疑為淮海之後身信不誣也聞師之風者可以自省矣是宜銘銘曰東山紹法統大弘臨濟宗一燈百千燈充滿于南北大湖鬱葱蘢中有善知識怒罵作佛事見者輒畏縮唯師膽如山深入了不礙振威聞一喝有若霹靂飛凡情亦喪失通身汗如雨縛茅巖洞居說戒毒龍聽文彩漸彰露屢典大伽藍蔚為人天師敀依者如雲師以方便力破除煩惱障沃沃甘露漿隨量各充足况示莊嚴相隨處起樓閣五色空中現若兜率天宫人見稱有為我以無為故應物而見形中心儼不動孤雲本無著動靜皆自然不識世間事何者為聲利但觀龍池水如我性清淨預言化期至剪𥿄以為衣坐脫目微瞑入彼寂滅埸茶毗顯祥異神光互旋繞白烟及林木皆生設利羅四輩悉號慟五處藏靈骨以表正法幢千古無壞者此以何因緣木無生滅故我出廣長舌贊述師功德鑱諸無縫塔鬼神共訶護具官金華宋濂撰連州黃府君墓志銘有序湖之德清縣令黃以貞自造大父府君行狀徴余為塜上之銘余以耄辭繼捧幣而進余益以諛墓受金為嫌辭然以貞請之益切或至于灑泣孰無父母也不覺為之感傷因返幣而叙之曰府君諱慧字志髙黃氏廣東連州人世居城南龍津門上曽祖某祖某父粱宋大理評事母蔣氏府君凝重端慤一以誠遇人發言未嘗弗踐善貨殖之道致家殷盛或侔于素封然立心仁恕出內布帛權度如一不敢髙下其手衆物驟貴輒殺直以平之人有竒窮不自振者具羞服以起之雖釋老氏其宫弊壞為之苴𥙷嚴飾所費甚夥弗靳也歲序之間又率循其教蕆法事設醮祠為民徼福其天性嗜善類如此州里之人賴之一則曰寬厚長者黃君也二則曰寬厚長者黃君也年七十又八不幸以元至正巳丑九月五日以一疾不起上距所生之歲則宋咸淳壬申也卒後之明年庚寅某月日葬于州西髙良鄉之原既而寇侵兆域堪輿家謂不利復以某年月日改瘞小水山之陽禮也府君配文氏婦德母儀皆有可稱子男一人懋女二人歸李某文某孫一人即以貞明經修行由陽山教官召試吏部選授今官階升承務郎以政事聞曽孫男二人某某昔者李文公習之自為其租實録乞銘于昌黎韓公其言有曰先祖有美而不知不明也知而不傳不仁也後世論者未嘗不美習之之孝今以貞之行當無愧于習之特以余文非昌黎無以慰其請不能不欿然也然雖徇孝孫之志發潜德之光尚可以人而廢之乎于是忘其鄙陋為序其事而造銘曰以誠勤物其行孚于人也以善遺後其德參于天叶也孫枝茷骫其進欲凌雲也本根發舒碩大且蕃也無善不報皎皎若朝曒也太史勒銘樹之于墓門也題唐太宗哀冊文後天台詹君國器嗜古如嗜利近于汴梁市中購得禇登善所撰唐太宗哀冊文一卷舊嘗藏相㙜嶽珂倦翁家後有北燕喬簣成所題定為唐人書詹君既自識其左復請濂一言之濂聞唐故事哀冊國之大典也非職載筆至司鈞衡者不敢為之登善自貞觀二十二年九月已亥為中書令二十三年三月丁卯太宗不豫四月己亥幸翠微宫五月已已崩于含風殿庚午奉大行御馬輿還京師當是時登善秉政中書緝熙帝載者已九月哀冊必屬之蓋無疑也此卷當為命槀之第二故于二十三年下闕歲次已酉五月甲辰八字嗣皇帝下不書治字家傳縉雲下無髙祖配天一人有慶八字遡悲風于長下闕術字然特其闕文耳徴之大詔令蘿圖琬琰集文粹文苑諸書其更改又各有同異殆不䏻悉數也濂竊按正史雜史咸謂太宗以八月庚寅日葬與大詔令等書並同庚寅則八月之十八日也今獨云庚子則是月之二十八日不知何以有一旬之差將史誤耶或藁本之筆訛也嗣皇帝之名不書懼瀆也其理固當太宗之崩既書二十六日已已矣年月甲子𥘉何足隱諱而懸空之耶尤有不可得而曉者相去七百餘載其事不可臆度未可以遽言也若論字畫當為登善所書登善𥘉師虞世南晚入右軍之室故唐之䏻正書者僅二十八人而登善居三四之間此卷溫潤似虞其結體則多法右軍世之人徒見登善所書或與薛稷類者遂疑之殊不知先哲有兼人之才而其作字𥘉不拘一體張㒹善草書至其小楷極端謹有法傳其學者唯顔真卿得之爾觀登善者宜以是求之簣成雖號䏻鍳古其言似不足徴也國器尚永寶之翰林學士金華宋濂題贈蕭子所養親還西昌序天下之道唯孝與忠是謂秉彛萬古攸同矧惟成均首善之地風動四方罔不從化其居是職者其有不惕然自省者乎昔陽成之為司業也立諸生館下而誨之曰人之為學忠與孝耳諸生有久不省親者乎明日謁城還養者二十人諸生且爾况為其師者苟鶴髮之親在堂其心又將何如乎此余于西昌蕭君之事不䏻忘言也蕭君名執字子所居武山之西山形拔起如旌旗浩翠淋漓積自古𥘉土沃而泉腴蕭君朝樵于白雲之岑暮而言旋買鮮于溪過濁醪于東鄰婆娑起舞親側奉觴上夀親既醉蕭君亦微酡抃手歌曰武山崔崔有雲英英止武山如藍川流不停止我奉我親其樂莫與京止樂兮樂兮我衣之翩我顔之頳止蕭君之樂無日不然若將終身焉㑹科目之興有司強赴江西秋闈名在前列巳而上南宫選授國子録所授經皆公俠家之子見蕭君䏻古文辭皆心服之業將成蕭君獨有不䂊色然人問其故輒潸然墮淚曰吾親髮盡白矣臚氣下上不自寧矣武山夜鶴曉猿遲余歸久矣于是走白丞相府其辭甚切吏㧦于文墨往來參稽閲一歲而始報可蕭君治行李將歸激者曰蕭君之所見一何果哉抱卓犖之才當用才之時何不一試而歸今蕭君之同官或拜御史或擢縣令矣使蕭君少忍須臾銅章青綬豈不足以榮其親哉贊善大夫宋濂曰是惡足以知蕭君蕭君不忘孝于親其有不忠于君者乎惟念成均為首善之地故不敢冒爵祿以失菽水之歡爾不然是有愧陽城之諸生矣尚何足以言蕭君乎銅章青綬之榮子謂蕭君他日不為之乎激者無以對于是出酒飲蕭君率同志賦詩一章成則蕭君為之欣然引滿頺然就醉片帆西上抗手而别洪武六年六月二十四日金華宋濂序廬陵劉徐生墓銘翰林編修官振唯奉詔攝御史行縣北藩舟泝黃河忽夢內兄劉徐生相逢里中穫溪上脫冠命酒曰徐生與弟為結髮友恨輸先著鞭耳其情歡甚及覺悵然興懷賦楚辭一章擊楫而歌之暨還南京將寫辭以寄或有告者曰徐生亡矣唯不勝其悲居亡何徐生之父作書遺唯曰徐生相從至郢者久遣歸謁先塋竟溺景陵之深川越九日得尸又八日旅殯郢城東子胥㙜下嗚呼肺肝盡割裂矣老身將何以䏻存耶自造權厝志一通幸請銘金華宋先生先生嘗見徐生頗愛焉當不靳于辭即弗靳徐生不死矣唯泣為余言余也不敏無以塞其父之悲頗聞徐生曰記萬言為文有竒氣頃刻風雲變化雷㫪雨澤有不可測度者而古今詩尤嘉人稱為詩伯州里器之謂廬陵有二俊其一唯也唯舉進士河南第一人八仕于朝徐生益自愛祕期久積而大振方嶽重臣及部使者咸遇以賔禮欲辟為屬辭弗就見唯受經于余亦欲負笈來相從今死矣豈直其父與唯之悲余亦為泣下霑襟何也牛毛非不多而麟角獨䏻專也嗚呼生死之機伊誰執之而顛倒若是耶嗚呼徐生字子卿卒時實洪武八年三月十日年二十有六耳曽祖某祖某父說以進士起家官承事郎安陸府通判母蕭氏妻曽氏二女皆在幼其父俟報政返骨􅌾廬陵水豐之故鄉且為立嗣嗚呼徐生之卒為善者或懼矣夫銘曰將鬯而遏之茞不如薋方出而折之麟不如麛爾之生也不幸絶類之已而已而大化之冥茫吾將尤誰莆陽王德暉先生文集序給事中王寅敬伯詣濂玉堂之署殷勤請曰寅之伯父最樂翁諱朝字德暉莆田人也其學出于同安尹陳公仁伯莆田之先逹有二陳焉一則仁伯一則國子丞衆仲皆以文鳴于時實兄弟也其學又出于南塘趙氏之孫祕書公伯暐祕書公二陳之外主父也翁之所學淵源既正而其支流之相承遇奔石怒崖則噴薄如雷霆及至演迤平曠則煥然成文若綺縠之乍舒一翕一張類有物以司其柄者養之深而積之厚期大振于時奈何其數之竒再試鄊闈皆不利竟以布衣教授州里以終遺文散落于兵燹十不存一寅愳其泯沒而不傳也求得詩文若干首釐為十卷翁之友方君烔門人陳君虛中將刻􅎚以傳願先生為之序濂受而讀之詩則森嚴踔厲有蒼淵之色文多簡古峭奧而其有餘不盡之意恆見于言表人䏻玩繹之久方始得之其淵源有自誠如敬伯所言不宜以無傳頗求翁之致是者亦由其養氣之充積學之宏乎蓋翁家甚貧或併日一炊每揚揚有喜色臨財甚介毫髮不苟取所見一定屹如丘山力憾弗䏻動儻涉非義舁金遺之不遷也唯遊心古𥘉思欲起聖賢而與之周旋故嘗以止分為樂人叩其自得則曰守隂之宅蹈陽之庭風行雨集金㫪玉鳴庳非吾窒崇豈我榮夷夷于于而獨適其適不亦可乎嗚呼翁之所見若此其殆有德必有言者乎濂未冠輒授經學文于鄉先逹若淵頴吳公立夫內翰栁公道傳文獻黃公晋卿皆天下名士悉得供灑掃之役其淵源非不正也第以受資平凡無以深詣而逺到年周甲子而踰六齡猶不䏻自振視翁之作不幾于有愧哉雖然濂不䏻文而評文恐未有先之者世之骫骳萎弱之文不脫埸屋之故態者反足以襲取髙位而翁卒終于布衣戴章甫衣逢掖者不知果有公議否乎濂特徇敬伯之請妄置品評于篇端其有激也夫其有感也夫恭題御賜文集後洪武八年歲次乙卯春三月壬辰皇帝御乾清宫召臣至問前御史中丞劉基何曰成行臣以翌日對繼問病勢不革否還可自力至家否臣復具以聞時基有霜露之疾上憫其為開國舊勳特降手敕令起居注郭傳宣示之俾還山以便侍養然聖衷猶念之弗置於是延臣扣其詳語畢上步出宫門臣從後至丹墀上忽顧內史張淵曰汝往取新刋文集一部賜學士宋濂臣謹叩頭謝淵引臣至典禮紀察司與司副李彬言紀臣氏名于籍始頒受焉蓋文集係御製凡三帙入􅎚雖訖尚祕藏禁中當時受賜者唯太師李韓公善長中書右丞相胡惟庸與臣為三人故內臣致謹之如是也臣仰惟聖學髙逺猶天之不可階而升也其發為宸章麗日卿雲照臨下土固非蟣虱小臣讃詠所䏻盡至于寬仁峻德優遇舊勳及寵異文學侍從之臣恩意兩盡尤非前代帝王之所可企及也臣抃蹈之餘故備書應對之語與獲是寵賜之由于篇末俟他日歸田當造為􅊮笥飾以雙金龍尊閣于山中云是月三日癸已午時具官臣宋濂盥手謹記故奉訓大夫僉提刑按察司事王府君墓志銘濠梁王佐其先府君之歿越六年矣今奉工部主事杜君環狀來徴墓門之銘不覺為之愴然而悲蓋當皇上飛龍淮甸定鼎江表弓旌四出旁招俊又濂時應聘而起擢典儒㙜而府君亦杖策轅門思以勛業自砥礪薦紳之士多劀目禮之濂雖不泛與人交聞府君崇論谹議亦未嘗不傾耳而聽及退每自愧自歎以為弗䏻及自後離合靡常逮濂再召入禁林府君已作土中人載感疇昔銘欲不作可乎按狀府君諱謙字習古濠州定逺人曽大父某大父某皆肥遁丘園人號善士父子良敏給而多智㝎逺令酷愛之俾為書佐未幾𥙷吏尉司遷霍丘縣以積勞升安豐府史逹官知其䏻辟為河南行省理問掾未命而終母蔣氏府君嗜讀書知彛倫大義習為聲詩音節韻趣皆有法推擇為定逺縣吏出謀發慮皆中肯綮令長以賔禮遇之元季政乖豪傑並起府君拊髀歎曰事急矣保宗族以拯黎民可也乃走頴毫說其軍帥曰民罹虐政不得已起為亂矣當思有以靖之䖍劉人以逞所謂如水益深如火益熱者也無乃不可乎軍帥聞其言以為才交薦之擢萬夫長五轉至工部尚書非其所好也當是時盜稱名字者皆烏合之衆散漫無統所經之處唯務焚掠千里為荒墟府君察之度必無所成謂所親曰區區豈欲從戎哉奮不顧身出編虎鬚者志欲生蒸民也今若是猶魚遊釡中耳竈火已然尚自謂得計耶吾聞真主已建都金陵寬仁愛人四方之民爭引領望之不去禍將及于是乘間挈家南渡府君之婦兄太師李韓公善長時已在上左右亟言之召見于青龍殿與語大恱㑹新設執法議理司方將選人以授遂詔為執法官府君悉心詳讞務協厥中人稱為平允丹陽令白齊因公致罪當棄市府君以情可矜恕敷奏上前得貸死知應天府王子謙坐事械繫者久府君惜其材議從末减由是上簡注之深升為中書貟外郎轉遷提刑按察司事階奉訓大夫府君巡行郡縣見貪墨􅗜民者必擊去之唯恐弗亟餘則務存大體觀風宣化而已一日天大風晝晦上下詔求直言府君歷述灾傷之病民竟為之罷徴俄得末疾家居者久之以洪武三年四月二十七日卒于京城之寓舍夀五十又七以九年二月日葬于某山之原娶李氏子男二人作曰驥先十八年卒仲曰􅴈即來徴文者篤學好古凡法帖名畫多䏻鍳㝎且善虞世南書以材選充忠顯校尉飛㷱衛千户所鎮撫女二人適魯某孫志逺髙某孫男一人寧安府君軀幹昻聳而容貌潤澤恂恂儒者也或共其論議輒掀眉吐氣指方畫圓衮衮數千言不休臨大事之際神采精緊毅然有不可奪之色與人交愈久愈敬遇急難必蹈湯赴火授之若行事有過差復面折不少恕性又慈惠凡貸泉布者不納息弗䏻庚則皆置不問遇凍餒者如身受其病思輟粟帛濟之乃巳其在戎行􅌹務以不殺為勸且導人辟兵之方賴以生者數百人至于事親盡孝奉意承顔唯恐毛髮有違故鄊邦尤稱之咸曰孝如王習古庶幾無愧嗚呼為士者內行修于家外行有以澤諸人可謂不負所志者矣銘曰民吾同胞不幸亂離䖍劉之何為我務生之海寓載清式簮且纓正色立于庭我竭其誠嗚呼唯行之腴契道之符不亟不徐循序而詳趨其亦有識之吉士也歟王宗器字說王生璉字宗器其先大原人今家濟南之長山器局沉凝而學問精密洪武五年以易經舉進士山東名列第三既上南宫未試皇上召見便殿親命題賦詩詩成稱㫖擢史館編修賜以冠服選入禁中文華堂肄業詔翰林老臣為師同時而進者凡十又七人車駕時臨策勵之且取其文品評其優劣日命光祿寺給膳羞酒漿每當食青宫暨親王迭為之主而璉等侍飯于左右冬夏賜衣各一襲復有白金弓矢鞍馬之頒蓋不一而足近又使璉攝御史廉察河南逮歸奏對益稱㫖上恱謂近臣曰文華堂諸生如璉等者皆朕異曰將相材也其期望之重如此璉嘗從余學故來以字辭為請豫因序璉遭逢之盛于首而著命名制字之義于辭璉䏻聽之必上不負于國恩下不負于所學矣辭曰宗廟之器貴重實殊夏有四璉殷稱六瑚周云八簋異名同符其貴斯何珠玉為飾其重斯何盛以黍稷嚴奉明禋人鬼是格惟端木氏才堪三卿文章外見以言語稱汝器見許載諸聖經今生既長局度純亮發為辭章大河奔放器字璉名父師所望出逢盛治講學禁中天日照臨以煦以融以逹其衷用廓其䝉學之茂矣川之流矣材之秀矣木之修矣蚤夜孜孜唯道是求矣豸冠巍峩巡行洛河貪夫夜逃良士笑歌君子之為君子之多學無止功勿畫斯善辟彼行塗足不留踐百里至千所見逾逺志安于近行局一偏笙罔為鏞豆難充籩規模卑狹世則病旃德藏于身動無不彼􅍏用䏻周由體斯具生尚勗焉庶幾不器題趙子昻臨大令四帖趙魏公留心字學甚勤羲獻帖凡臨數百過所以盛名充塞四海者豈無其故哉後生小子朝學操觚暮輒欲擅書名者可以一笑矣今觀張唯編修所藏臨大令四帖耶書其末以示解事者全室禪師像贊笑隱之子晦機之孫具大福德足以荷擔佛法證大智慧足以攝伏魔軍悟四喝三玄于彈指合千經萬論于一門向上關如塗毒鼓撾之必死殺活機類金剛劍觸之則奔屢鎮名山教孚遐邇詔升京剎名溢朝紳夙受記于靈山之㑹今簡知于萬乘之尊雲漢昭回天章錫和于全帙寵恩優渥玉音召對于𬗋宸屹中流之底柱轉大地之法輪信為十方禪林之所領䄂而與右德同道同倫者耶墨鞠圖贊建安蘇照為學子黃叔暘作墨鞠圖侑之以竹石豈以其氣莭之相同歟禁林散吏宋濂為造贊曰我本中黃鐵為肺腸精神外章不自知形貌之􅉳歟緑竹猗猗白石瑳瑳貞而匪阿斯為月下之友歟萬色齊冥洞察物情雖暗而明豈陶令沉昏而託之酒歟宋學士文集卷第三十二翰苑别集卷第二
