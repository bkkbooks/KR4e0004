front:
  text: 宋學士文集卷第七十芝園續集卷第十賦詩
  hash: sha256:24659ea16470e7d19535a31511729f89830ffc350fd15e2df25a38d653a579a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_070-1a}
body:
  text: 崆峒雪樵賦見翰苑集飛泉操浦陽玄麓山有飛泉濂與鄭源先生數觀之造飛泉操鼓之琴書諸崖石其辭曰飛泉兮瀏瀏洗耳固非兮誰斂我牛覆謂我汙兮移彼上流具人之形兮奈何忘人之憂靑山辭靑山崔崔白雲溶溶我凝其中仙人所宫風馬雲輿霓旌羽幢遊行太空翩然相從望而不見使我心忡我本金華牧羊之童口誦蘂笈有聲如鍾震憾岩壑無礙不通謫居下土黃塵濛濛五色之文布滿西東秋高露淸陟彼危峯呼吸元氣精神內融嘨傲萬物後天而終題方方壼畫鍾山隱居圖豫十年不作詩見方壼子此圖不覺逸興頓生㑹仲修請題欣然命筆第塵土襲人者久殊不能佳耳詩曰飄飄方壼子本是仙者倫固多幻化術筆下生白雲白雲縹眇間拔起靑嶙峋似是朱湖洞笙鶴遙空聞豈無許飛瓊烹芝吸華芬錬師從何來面帶山水文相期守規中結庵在雲村心遊象帝先神棲太乙根我㖟上淸訣衛以龍虎君內涵玄命祕一氣中夜存行當去菜藥共入無窮門題李白觀瀑布圖長庚燁燁天之章精英下化為酒狂匡廬五老森開張銀河萬丈掛石梁下馬傲睨立欲僵聳肩䄂手神揚揚憶昔開元朝上皇宫中賜食七寶床淋漓醉墨交龍襄人疑錦繡為肝腸麾斥力士如犬羊營營靑蠅集于房金鑾不復承龍光并州可識郭汾陽不可丹陽逢永王大風吹沙日為黃酸狖哀啼聞夜郎蒼天欲使詩道昌頓挫萬物㱕奚囊何處更覔延年方北海天師八尺長芙蓉作冠雲為裳授以蘂笈青琳琅蓬萊屹起􅌡海洋羣仙遲汝相徊翔誰將粉墨啚縑緗顧我一見心倀倀詩成仰視天蒼茫夜半太白生寒芒哀王御史詩并序鄉先逹監察御史王公餘慶字叔善仕元至正間赫赫有聲持節廣州卒且葬之矣後為亂兵所發適三衢徐煥自韶移守是州而東陽趙侃方知印廣東行中書於是合謀改􅌾城東悟勝寺之原實洪武庚戌三月三日也豫既從侃請大篆其爵位姓字刻之墓門復為詩哀之哀之所以歎鄉學之凋謝而斯文之無係也煥字炳文侃字希貢皆義士云詩曰剪𥿄難招御史魂蠻烟瘴雨但空墳縱然有石題新篆誰守楊雄死後文送黃伴讀東還故里濂黃文獻公老門人也嘗恨無以報深恩一旦諸孫昶從子學經為之喜而不寐㑹其還家覲省賦詩十四章為贈然絶吟事者巳十餘年矣詩曰我昔弱齡時輒侍而翁遊經畬日耕穊藝圃兼旁搜泰山一以頺欲仰將安從豈意麒麟兒復出楜水東爾年踰二拾文采照青秋燦燦五色錦孰肻填道周一朝捧貢函羣彥讓先登氊墨新題處祥雲為之升南宫雖免試成均復漸摩庭中猼且葉幾厭寒雨多天子坐法宫詔翻金匱書爾獨當青年執筆與之俱九天遊降勑持經贊藩王出入禁闥中衣分沉水香有時獻新文跽誦黼扆前帝曰爾小臣才思何蟬聮聲名落人間一如潮水生蛟龍助氣勢坐使汀洲平雙親在烏傷不見今三年靑宫為奏請即日乘舟旋顧我髮種種與爾㑹神京懸燈青照夜不翅父子情别言不忍出况𣸪為新吟吟成意莫盡一字一寸心别去期早來立業繼而翁翁名亘天地不見𥘉與終持此贈爾行櫂發龍江麋官書有嚴程勿戀故出薇蛟龍春曉圖歌并序句章王君景行嗜學好修之君子也其所居曰蛟門正臨大海巨濤舂撞頃刻萬變平旦東望霞光燭天紅日大如篩冉冉上升誠海東苐一偉觀也王高士叔明為作蛟門春䁱圖景行出以示豫使人飄飄然有凌三山跨十洲之意故為賦長歌一篇而於神仙之事獨多雲其辭曰􅌡海無浪波濤吐吞涵浴日月三契鬼神怪山如雲自天墜萬丈璧立蛟為門南有金雞之俯啄北有猛乕之雄蹲值獰飈兮奮揚束怒潮兮騰奔擲玉毬兮干霄麗輕霧兮飛塵雪山氷崖之可悕可愕兮帆檣簸蕩不可遏恍疑下上於星辰農雞一鳴海色白層霞絢彩光如璊縱橫閃鑠縛不定每神推上黃金盆靈境飄搖在世外髣佛直至榑桑村何人結屋於其間雲是甬東才子開瓊關云間吹簫雙鶴下坐聆環佩聲珊珊有時共談三十六洞之祕笈緑文赤字可以鐫蒼頑猿拾花兮春片魚泳書兮晴灣日媚嫣紅桃點點風入凉翠松翻翻中襟濯盡万斛之黃埃子不知聲利是何物便思𬗋府躋真班黃鶴山人列仙儒九霞為冠靑綃𥚑手提五色珊湖株出一幅真形圖令人毛骨動颯爽思乘灝氣超淸都清都中有十二樓住來盡入瓊姬儔金符玉節錦臂韝白台度曲彈坎佚雙成按柏歌莫愁我愁正孤絶我興欲飛越矯首東望神光發蓬壼春淺蓞草殷麟洲芝生翠環結我愛仙人萼緑華靣如蓮花雙鬢雅幾年相期飯胡麻至今不徠雲路遐何須龍乕䁀中求丹砂何須天河穩泛牛斗槎但令坎離交媾翻三車氣母不動生黃芽我賦蛟門歌細看銅狄時摩抄長繩孰為羈羲娥白石應酒金還磨不學長生將奈何不學長生將奈何和蘇編修遊東明山詩并簡同遊諸友東明勝槩實佳哉圖畫天然八靣開雲影入簾紛似絮巒光染𬒮碧於苔學書猶憶臨池寫采藥曾經帶雨栽秪為魚龍期變化致令猿鶴互驚猜數莖白髮雖侵鏡百錬丹心不作灰中使傳宣承顧問東朝進講每低佪月移禁掖藏書署花壓􅌡洲視草臺豈意衰齡霑異渥因兹勝賞得重陪丁寧杉桂無竒句約束溪山屬駿才倚杖指林尋故跡賜衣濕雨借新焙叶名編遞玩叢如笋嘉卉當筵粲若杯松鼠㳂窗行且偃山禽窺客去仍來但知笑齒時頻啓何事愁腸日九回寄語山靈休厭我有花莫待作詩催遊仙篇贈鄧尊師往嵗鄧尊師以高行道士𬒳召至京寵遇優渥遂留主祈禜之事蓋尊師通混亢大道而尤加意九還寶丹之法數著竒驗役使鬼物特其餘技耳於是不還龍乕山中者頗人儀曹以其事上聞詔許之尊師來別且徴豫片言夫道貴於無名奚假言宣哉豫方溫繹真誥輒擬羣真倡咏之體造一章以遺之方壼真人必辴然笑云是夫也何其狡獪之若此邪詩曰真人契玄冲翻翻泠風俱遊行一氣中流耀周人區丹雀銜白環來授寶祕圖內藏炎靈方欲采三素腴鋉成赤明液鬱華凝黍珠蒼龍為濯氣上玄來辟非將期學真侣度之升𬗋虛自知滯塵凡何能應玄符頗聞琵琶峯肉芝發瓊荂玉掌如嬰兒列日暴不枯定當分刀圭成此列山儒題宗忠簡公誥王黼特為少宰書名誥上靑城妖祲連雲赭犬羊在都龍遁野百年藝祖舊河山萬騎長驅若氷解京城留守一世豪仰天雪涕風蕭騷起扶白日照河北赤手欲障三秋濤義旗戞天天為泣四方猛士聞風集自期狥國與天通豈謂忠言反難入披肝上疏留至尊乘輿不顧東南巡拊床三呌大星落非天棄宋良由人㓛業無成志可紀古來英傑多如此君侯心事漢武侯偉氣英聲冠千祀我來己恨生世遲不得親觀忠勇姿每過鄉邑髮猶竪綸誥况是當時為却憶前朝司馬死章蔡群姦乘間起國雖未亂政先亡萬里蒙塵從此始吁嗟黼輩真奴臣賊君致寇肥其身姓名汙眼尚欲嘔君侯在位能無嗔侯乎侯乎慎勿嗔誰使彼奴操國鈞君不見汴京禮樂正金盛江南杜宇啼天津和王內翰見懷韻并序余與王君子充舊同師逮入國朝復同官詞林同總裁元史史成子充出使甘肅又使西南夷久而未還余尋以年高納緑歸金華獨遊山水間追數平生故人未嘗不深念吾子充也去年其子紳以子充往甘肅時道上寄余詩二章求和久未能成今者聖天子敷大惠於四海與斯民更始蠻夷之酋庶幾感化請罪闕下而子充亦殆將來㷌耶此余之至願也次其韻以致斯意以示知子充者洪武十三年七月十一日同郡宋某帝德如天覆萬邦定期歸棹到龍江竒才不換金城百寵命當簮白華雙喜極欲持如意舞醉來應使軟輿扛此情縱切何由遂吟對西南月滿窗才名老去愜休官聖澤高深只自歎侍燕每容親繡衮從遊偏許近和鑾久知琛贄來殊俗漸喜寰區洽治安惟有張騫猶未返玉關秋早節旄寒王內翰詩附誤抄在後再録冝移于此題李易安所書琵琶行後樂天謫居江州聞商婦琵琶抆淚悲歎可謂不善處患難矣然其辭之傳讀者猶愴然况聞其事者乎李易安圖而書之其意蓋有所寓而永嘉陳傅良題識其言則有可異者余戲作一詩止之於禮義亦古詩人之遺音歟其辭曰佳人薄命紛無數豈獨潯陽老商婦青衫司馬太多情一曲琵琶淚如雨此身已失將怨誰世間衰樂常相隨易安寫此別有意字字似訴中心悲永嘉陳候好竒士夢裏謬為兒女語花顔國色草上塵朽骨何堪汙唇齒生男當如魯男子生女當如夏侯女千年穢跡吾欲洗安得潯陽半江水題李西山古木圖薊丘雲昏翔風急老蛟墮地作人立震雷怒電破杳置山鬼野狐皆夜泣李侯城南射虎歸手裂生絹吞墨汁狂呼袒臂寫此圖雲霧晦冥元氣濕回看荒原萬枯樹顔色慘淡神盡戢乃知妙奪玄化㓛庸史如林豈能及當時二李如二龍謂西山父子俊氣英聲動都邑百年災變不復有驥去圖存安可縶君不見風流人物今巳徂豈特丹青絶代無東雒山房詩東雒山房者上淸羽客周君雒之隱居也雒字彥博嗜學而䏻文其先居伊雒之上故彥博以雒為名而又以東雒扁其居不忘乎本也蓋彥博之先南遷廣信者多歷年所矣雖然彥博學神仙之道者也他日披丹霞乘青鸞北升嵩髙之顛而俯瞰舊鄉寧不重丁令威之所感乎金華宋濂為賦遊仙之歌使書山房之素壁云歌曰東雒山人羽為衣腰懸寶劔光陸離超然乘天遊曠蕩八極隨颷馳俯視嵩高三十六一一秀出紫金翠羽之華芝中有少室八百六十丈頷倒元氣􅉼晨霏毿毿緑毛仙濯足淸泠淵見人不肯折腰拜手擲緑黍化作天花旋天花旋舞連姢玉女從東來頭戴雲翹足跰􅓷試持秋帛搗寒石中夜靈嚮凄緊如霜弦不知龍穴有石髓大乙月鼎將同煎勞生任飄匆誰復相流連天雞一鳴天下白齊州九點凝靑煙朝㪺瀍澗之靈泉夕漱伊洛之寒川雖知城郭尚依舊華表鶴唳應千年大江東流浴龍虎丹光掩月夜吞吐故鄉何處人不歸人間一笑成今古三素雲髙弗可攀仰見群仙出沒於其間勿使明鏡雕朱顔顧我魁礧徒無由扣瓊關我不能鼻息吹虹霓頓挫萬物歸新題我不能白間兀坐惜居諸時翻枯竹除白魚但得三才舌赤如蓮花淨於雪高談蘂珠經旦夕聲不絶聲不絶造玄徽美蓉峯前金虎要人騎山人當相求飛飛騰太微共持瑶華玉管凌雲吹送方生還寧海并序洪武丙辰豫官禁林寧海以文為贄一覽輒竒之館置左右與其談經歷三時乃去明年丁巳豫䝉恩謝事還浦陽生復執經來侍喜動于中凡理學淵源之統人文絶續之寄盛衰幾微之載名物度數之變無不肆言之離析於一絲而㑹㱕於大通生精敏絶倫每粗發其端即能􅊇推而匠于極本末兼舉細大弗遺見於論著文義森蔚千變萬態不主故常而辭意濯然常新滚滚滔滔未始有竭也細占其進修之㓛日有異而月不同僅越四春秋而已英發光著如斯使後四春秋則其所至又不知為何如以近代言之歐陽少師蘇長公輩姑置未論自餘諸子與之角逐於文藝之埸不識孰為後而孰為先也豫今為此說人必疑子之過情後二十餘年當信其為知言而稱許生者非過也雖然豫之所許於生者寧獨文哉庚申之秋生以不見太母者久將㱕省焉豫深惜其去為賦是詩既揚其素有之善而復朂以逺大之業雲詩曰昔在詞垣時英材常駿奔水碧與金膏價重駭兒聞終然無根蒂斂散空中雲方生海上來玉立而春溫䄂携絺繡書面帶黼黻紋揖遜入禮域陳義凌秋旻同餐太倉米共勘典與墳潜將索幽邃穹欲攀嶙峋踏雪忽言别􅍱險濤江津梅花似相憐沿途慰孤顰湛息來九天憫吾髮如銀特勑還故山許與烟霞親生聞抱經來處此寂寞濱莾蒼叩太始𬈑涬窮無垠宇宙所管攝載籍所敷陳巨細鈎鉗之若天樂建均律吕按髙下宫商肅若臣鬯和免帖懘疊奏㱕繹純桑濮俟麾斥淫哇竟何存黃鐘壓瓦釡庭燎滅荒憐似兹稽古力可敵龕㝎勳濡毫寫雄皓勢足移峨岷漏泄混沌竅出入造化神變幻波起伏淸溫玉璘珣盡抽神竒祕不墮臭腐塵所以日出之愈見光景新山鬼當灑泣湘靈且逡巡振古著作家後先胡繽紛豈知萬牛毛難嫓一角麟古今二千載有如星在辰豈意荒䃯中獲此席上珍豫生髮未燥立言鄙河汾結交一世士墓齒越七旬妍蚩與苦良入目無留痕自非病狂易傎倒甲為􅚙寧因一學徒諛辭浪云云大言心不怍秪為所見真生今有行其序飲松竹根笑摘黃金花起泛青瑶尊酒酣雙耳熱劇論如抽緍豈無贈别言有意須當遵真儒在用世寧能滯彌文文繁必喪質適中乃彬彬有虞號多士九官展經綸惟時亮天㓛外夷悉來繽不聞有著書鼓蕩摩乾坤生乃周容刀生乃魯璵璠道貴器乃貴奚須事空言孳孳務踐形勿負七尺身敬義以為衣忠信以為冠慈仁以為佩廉知以為鞶特立睨千古萬象昭無昏此意竟誰知為爾言諄諄無徒謂強聒一一冝書紳題送别圖便星一點照閩堧驛舍春濃酒易乾官柳似知離别意故將翠縷拂雕鞍題隱居圖樓臺倒影浸虛泓嘉樹擎寒不盡青何日過橋分半景傍雲同築草玄亭和鄭博士見贈韵秋霜染得鬢成絲秪為煙霞勞夢思誰料杜陵埀白後得同鄭老合襟期荷衣荇帶煩新製澗草巖花逞故知便欲隨君同點檢歸裁水繭寫成詩題常牧溪五燕圖誰描乳燕落晴空筆匠能回造化㓛髣佛謝家池上見栁絲煙暖水溶溶題長白山居圖滿地雲林稱隱居燕泥汚我讀殘書五更風急鳥聲散時有隔花來賣魚題張子璿畫林泉幽趣圖翩翩公子實仙才尺師之子筆下雲泉潑翠開若是人間逢此景定應呼作小蓬萊宜興強如心避地而歸扁其居曰復𥘉齊來徴豫詩昔日欃槍照五兵今時喜見泰階平春風緑酒扶踐醉斜立官橋聽早鶯辟地歸來景物遷白煙凉草思凄然摩挲為問庭前樹不見蒼髯巳十年送葉明府之官郫縣文華才子之官去見說郫筒酒正醲飲罷細觀循吏傳莫緣山色憶美蓉王內翰詩附芙蓉峯下是鄉邦未許歸帆泝浙江天下文章寧有巳斗南人物恐無雙心期久與三乘契筆力真能九䁀扛投老著書渾不倦頗聞中夜坐燈窗同門同里復同官心事相同每共歎衮斧並操裁玉牒絲綸分演直金鑾名齊伯仲吾何敢義重師資分所安重㑹定知頭更白肯令歲晏舊盟寒題李息齊竹方存雅題詩其上别駕聲名逺先生節行尊百年耆舊盡二老典刑存巳返遼城鶴難招楚客魂人間留翰墨不獨重璵璠送錢允一還天台台送黃尊師還九宫山二首皆見翰苑集灘哥石硯歌朱舍人芾雅士也近見灘哥石硯禁中遂摹搨一本裝裭成軸懸之書齊命豫作歌填其空處歌曰朱君嗜古米黼同三代彛器藏心胸灘哥古硯近獲見驚喜奚翅逢黃琮研煤敷𥿄巧摹搨訪我一一陳始終有唐四葉崇象教𣑽僧航海來畨禺手持貝葉寫健相翻譯華笁談玄空辭義幽深衆莫識當時筆受唯房融硯中淋漓墨花濕助演真乘誠有功愛其厚重為題識七月七日元神龍鬼工雷斧琢削古天光電影生新容袤將四尺廣踰半作鎮弗遷猶華嵩涉唐入宋嵗五百但見寶氣浮晴虹南渡群公兢賞識氏名環刻縈秋蟲朔元雖巳實內府棄置但使煙埃封方今聖人重文獻氊蒙舟載來江東風磨雨濯露精彩奉勑舁入文華宫宫中日昃萬幾睱侍臣左右咸雲從𬗋端玄歙盡斥去欣然為此回重瞳重瞳一顧光照日天章奎畫分纎穠有才沉薶恨巳久石如能語誇竒逢維昔成周全盛日兊戈㣧衣並大弓藏諸天府遺孫子用以鎮國昭無窮願將斯硯傳萬世十襲不下古䁀鐘上明文德化八極下書寬詔蘇疲君方執筆掌綸誥願以此言聞帝聰老臣作歌在何日洪武戊午當嚴冬宋學士文集卷第七十芝園續集卷第十
