  text: 宋學士文集卷第二十六翰苑續集卷之六
  hash: sha256:c5758b5a44fdc68a23228efd6573fe44a115e5f0815c0bdbb6fc528ed0d9b899
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_026-1a}
body:
  text: 阿育王山廣利禪寺大千禪師照公石墳碑文西方聖人示現世間百億三昧無非度門而禪定之實為之錧轄蓋覺性圓朗本來充滿包三界而不礙窮萬劫而不昏非涉善惡了無顯晦巖栖澗飲之士能泯諸塵剎那之頃證入一實境界光明殊勝與虛空同體不起不滅所以其教熾然常盛而不衰有能知之而又能遵行之者其我大千師乎師諱慧照大千其字也永嘉麻氏子麻號積慶之家冝生上士父均母黃氏既誕育師寶之勝摩尼珠師自童年亦駿利倍常堅欲入道聞人誦習契經合瓜諦聽年十五往依沙門了定于縣之瑞光院了定師從兄也長老良公知為法器即剃落為弟子明年禀持犯於處之天寧蟬蛻萬緣誓究大不思議事首謁晦機熙公於杭之淨慈未契圓證一日閲真净語至頭陀石擲筆峯處默識懸解流汗浹背時東嶼海公以石林鞏公世嫡提唱于蘇之薦嚴師杖錫往謁東嶼問曰東奔西走將欲何為師曰特來參禮爾東嶼曰天無四壁地絶八荒汝於何地措足耶師抵掌於几而退東嶼知其夙有所悟尋復召至反覆勘辦師如冝僚擲丸飛舞空中東嶼甚嘉之遂留執侍左右師以為心法既通不閲修多羅藏無以闡揚正教聳人天之聽乃主藏室於郡之萬壽及東嶼遷净慈邀師分座以表儀四衆巳而無言宣公主溫之江心豔師髙行招復師至處之如淨慈天曆戊辰出世樂清之明慶據師子坐集諸僧伽而誨之曰佛法欲得現前莫存知解縛禪看教未免皆為障礙何如一物不立而起居自在乎所以德山之棒臨濟之喝亦有甚不得巳爾聞者說繹而去至正乙未遷四明之寶陀先是寺以搆訟而廢師以訟興在乎辨難太迫一處之以寬慈絶弗與較且曰我佛得無諍三昧所以超出羣品我為佛子可不遵其教耶衆服其化寶陀僧夢一神人衣冠甚偉飛空而來僧作禮問之神人曰我從阿育玉山來欲請大千師赴供耳未幾行宣政院署師住是山識者以為玄應師既至羣疑景附逺衆響臻師亦憫大法陵夷孳孳誘掖不遺餘力嘗埀三關語以驗參學其一曰山中猛虎以肉為命何故不食其子其二曰虛空無向背何緣有南北東西其三曰飲乳等四大海水積骨如毗富羅山何者是汝最𥘉父母此苐三關最為峻切惜未有契其機者居九年退於妙喜泉上築室曰夢庵因自號為夢世叟掩關獨處凝塵滿席不顧也洪武癸丑十月朔召門弟子曰吾將西歸汝輩有在外者宜趣其還越七日屬後事於住持約之𥙿公沐浴更衣索𥿄書記書已恬然化滅在菩提位中歷七十夏示人間壽相八十五年經三日用茶毗法焚之牙齒眼睛及數珠不壞餘成設利羅五色爛然約之因造四偈贊之且竭力為治喪事云師三坐道場有語録若干卷行世凡一燈所傳一雨所潤雖淺深有殊各得分願弟子某等若干人得法上首某某等若干人是年十二月九日葬靈骨於夢庵之後者至大也師智度冲深機神坦邁晝則凝坐夜則兼修淨業真積力久至於三際不住覺觀湛然非言辭之可擬議且服用儉約不如恆僧雖不與時俗低昻賢士大夫知其誠實不事矯飾多傾心為外護其遇學徒亦以真率或以事忤之而聲色不變動出語質朴不尚葩藻而指意超於言外名聞燕都帝師𬒳以佛德圓明廣濟之號師略不少動于中𥘉橫川珙公入滅之年師始生及其受業又同在瑞光至於歿也又同住阿育王山君子或異之嗟夫禪定之宗至宋李而敝膠滯局促無以振拔精明使直趍於覺路橫川當斯時密受天目法印持降魔杵樹真正幢升堂入室者不翅受靈山之所付囑佛法號為中興橫川之同門有石林者奮興實角立東西其幹化機西來之道于斯為盛師蓋石林之諸孫也故其死生之際光明盛大有如此者豈無自而然哉某雖不敏每以文辭為佛事今因文妥之請故歷序師之行業勒諸琬琰而復繫之以銘用勸方來繼師而興起焉者世當有其人乎銘曰萬緣紛紜逐物而競曷以攝之實惟禪定禪定斯何言辭罔宣浮翳盡斂月輪在天𥘉分一燈千𦦨交映如百錬餘金色逾勝師之挺生鋭思絶塵萬里只尺欲趍頓門片簡雖微中具全體瞥爾觸之凡情盡死從抵碩師勇决其私振迅奮擲類獅子兒出世為人澍大井雨法雷轟轟震驚百里海岸孤絶潮音吐吞與此大法殊流同源神人飛空持疏來謁孰知玄微若合符節彼舍利羅寶塔晝扃助我發機靈光晶熒翩然西歸趺坐而滅示不壞相火中珠結生死之關鮮執其樞坦然弗惑如人歸廬前修漸遐後武思厲不有昭之遺則淪墜太史著銘勒石山樊虛空有盡師道永存風樹亭詩有序風樹亭者嘉禾潘孝子之所建也孝子之親殁每對人言輒嗚咽流涕然無以寓其罔極之思取韓詩外傳樹欲靜而風不止之言表其墓亭嗚呼孝子之意至是為可悲矣夫人孰不欲飬其親􅎅則不子待也所以昔者臯魚立泣而死者孔子蓋傷之也憫之也以其志為可悲而無所用其力也嗚呼若孝子者念􅎅不忘乎茲其亦知沒齒慕親之道哉為之詩曰山有嘉樹油然發榮豈不欲靜風撓之鳴我思我親顔貌日改子欲飬之親不子待嗚呼噫􅐵我懷孔悲山髙海深孰堪喻之內而九藏外而四體皆親之枝同一根柢根既撥矣而枝獨存夙夜哀號莫逹九原白楊瀟􅎅泉扃夜閟我親我思得無蕉萃親不可見音容是求求之不得血淚交流作亭墓隅是曰風樹仰之瞻之心焉孔瘁右詩八章章四句書虞宗齊常熟虞宗齊字思訓世居芝溪在勝國時祖安澤任德清尹故號宦家暨入國朝以鄉師統諸閭長坐法當死縣録其父德良與兄某下獄宗齊私自念此涉科繇事誰當正坐之父春秋髙萬萬無就逮之理兄為冢嗣宗祀攸繫且無子吾幸有子儻得代父兄含笑入九泉矣即詣吏自白曰宗齊精力彊凡官中事身專任之不自意陷于刑辟父若兄誠不知也吏不疑按章訊之一一引伏嶽案具斬之東市容貌不少變時洪武辛亥夏六月也宗齊之年甫二十又二云史官曰子者親體之分也形雖殊其氣則通癢痾疾痛其有不切者哉辟諸木焉本實既撥枝葉未有不害者故宗齊之代父死非異也理之當然也嗚呼然則然矣世之臨患難固有舍父而逃者其視宗齊果為何如哉若宗齊者知有親不知有身從容就義絶無幾微不足之色可謂特立而弗愧者矣嗚呼四海之內孰非人子哉題危雲林訓子詩後古之人教子多發為聲詩何哉蓋詩緣性情優柔諷詠而入人也最深韓昌黎之子符讀書城南嘗作詩送之曲盡其意至今讀者猶蹶然興起豈曰小𥙷之哉雲林先生危公冡子字於􅎻自檢討奉常遷佐薊州先生時辭嶺北行省左丞獨居房山聞於􅎻將之官賦四言詩一章勉之嗚呼先生之詩固無愧於昌黎而符能讀父書䇿名南宮今於􅎻以明經擢進士苐君子亦竊謂似之或言古今人不相及者其果可信歟雖然先生所作於修已治人之道反覆備至是有關名教甚大不特可施於訓子而巳其視誘之利祿而以惜居諸為念者又為何如哉知言之士必能辨之送趙彥亨之官和陽詩并序吳興趙彥君亨魏國文敏公從孫也通周易至正乙已試藝江浙鄉闈獲與薦送值元改物遂退隱林壑國朝文治大興濠梁侯公彥良以中書參知政事出守吳興力舉教授郡庠彥亨以飬親辭侯公移鎮山東已而入覲以為彥亨之材誠不能多致復言於銓曹選為楚府紀善久之調同知和州事將行豫酌酒謂之曰彥亨以故家文獻自藩府出佐方州有民人社稷之重蚤夜冝孳孳自厲有不待豫言其欲言者自識彥亨已數月矣因纂修國史之冗凡四聖傳心之祕諸家異同之辨欲求彥亨發之卒未能得而彥亨以别告嗚呼古語有云為政易而講學難豫於彥亨又烏可已於辭乎序而詩之情在其中矣詩曰倬彼魏公文獻之家經畬秋實藝苑春華既質以熙復豔而葩遺澤所𬒳英名載加弓治有傳詩禮與聞匪資竹素盍䇿文勛如提健槊去衝中軍勇蓋萬夫氣摩青雲賢書得貢淡墨新題材評龍虎星應璧奎理將奮迅事或不齊海桑變幻岩穴幽棲大明麗天萬國咸臣搜羅智哲逮及隱淪上名楚邸接跡朝紳無善不紀有道必陳眷茲和陽瀕于大江帝鉞𥘉涖天威孔揚既混寰區視此沛豐叶建侯擇佐維俊及良竭子素藴攄子逺猷照嫗民隱靈承天休薄言我私起與子謀十翼多奧九師焉求子今有行孰析其精别𥚑徒牽離觴重傾泱泱中流搖搖去旌瞻望弗及實勞我情清齊偈并序義中勝禪師結室於中天竺取契經語名之曰清齊詞林宗工各出新意侈張而斧藻之意亦至矣全室翁同雲巢丈人以義中證修近道必欲得豫言豫學日墜何足以與此然而清齊者香嚴妙悟之所義中既豔其名則法其道亦宜也不然何取於清哉無相居士為說偈曰中竺有虛室八窗皆洞然觸目無礙者有境皆攝入煙霞草木石鳥獸昆蟲等以至世間事何物不可狀此以何因緣獨名為清齊纎塵了不生正以清淨故昔有一童子嘗居清淨室冥寂於至道見焚沉水香由是作思惟香雖根於水非火則不發火縱能燎原熾然不可遏苟非遘香木香氣從何起因知木為自煙火乃為他自他共和合無因能行空觀兹四相義幻有即空相四大所合成其法亦復然又况木火聚烟氣未曽升鼻觀已先通緣我有鼻故香乃從鼻入我若無鼻時墻壁瓦礫等瓦礫與墻壁未聞知有香皆由自性起不假外物故又况二物者斯須即變滅唯存灰燼餘欲求是香者去來杳無跡畢竟性空故吾性本來空雖空無不攝不落有無間妙香無去來因兹悟密圓發明無漏果得證香嚴號二十五玄聖各說最𥘉事成道由圓通七大十八界各各有所入久近雖兩異偏圓或二殊其教已開顯偏行即圓融悟理既一同誰復分逺近聖性無不通順􅊇皆方便主伴實相濟後先了不别敷演真實義普度有情衆聞者當悟省勝師取契經揭名其齊居當行無上道真證圓通智若外而不內如龜毛兔角欲見不可得居士說偈巳忽見清齊東爛然大月輪躍出瀛海中光明悉照燭清徹無纎翳持為作證明表此清淨法日本硯銘夷而華四海一家此非文明之化邪送部使者張君之官山西憲府序天地正氣絪緼輪囷不折不回行乎太虛在物受之則為解豸為屈軼在人受之則為剛烈之士剛烈之士貴勢莫能加威力不能變參乎氣化關乎治體其重於物又不翅千百焉嗚呼正邪不兩立正氣伸則邪沴廓清矣我國家始建國江左輒從秦元之請立按察司設官分職彈劾百僚所以伸正氣也迄今埀二十年憲度益嚴遴官益精有若山西憲僉張君孟兼尤號稱職者也孟兼性鯁亮不善為依阿人有曲必靣白之雖慚沮羞縮不暇顧然亦無它腸當良朋盍簮酒酣耳熱抵掌笑談胸中森然芒角必盡吐出乃已其氣衮衮不衰名上中朝選教胃子久之遷南宫奉常奉常南宫掌禮儀郊祀之事無以攄其耿耿及今出持使節知孟兼者歡曰孟兼行哉民生休戚無不得言吾見軺車夕至而封章朝上也貪賕舞法吏吾見望風畏讋解印綬而避去也民冤之不伸戾氣鬱結吾見渙然而氷釋也孟兼行哉雖然鷙鳥之揚揚不如威鳯之􅗳􅗳狄猊之疆疆不如祥麟之容容刑法之堂堂不如德化之雍雍人不務德則巳茍有德焉又何檢壬之不革行哉檢壬革行正氣之復正道之行也孟兼盍於此而留意哉吾鄉先逹自宋以來繡衣持斧赫赫見稱于時者凡六七人嗣芳猷而繼遐軌竊於孟兼望之孟兼行矣孟兼精於古文辭前御史中丞劉公極稱道之尤深名理之學其與李證應奉往復論性書上徹九重之聽蒙召對左掖門士林以為光榮云勑賜開國輔運推誠宣力武臣榮祿大夫柱國淮安侯華君神道碑銘自古以來人臣事君始終一心以上承明德所以保勳烈於不刋熙令譽於無窮此丹書所謂敬勝怠者吉是也其或遭時擾攘攀龍鱗而附鳳翼自赴於功名之㑹一旦封重爵享厚祿志盈氣驕唯欲之是從遂致壞法亂政蓋有其𥘉而鮮克有終此丹書所謂怠勝敬者滅是也嗚呼敬怠之間善惡之所由分禍福之所由繫臣某於淮安侯之事不能無深感焉侯諱雲龍字某姓華氏安豐人世為農家圖譜喪不知其先世遷移之詳三代皆以侯貴纍膺贈典曽大父六二府君中奉大夫北平等處行中書省參知政事妣王氏夫人大父凡三友諒受矢斃于舟中龍江彭蠡二役侯在行中復以功升豹韜衛指揮使繼從伐荆州又同征江北郡縣而泰州髙郵淮安次苐平轉淮安衛指揮使就留鎮之吳元年丁未大將軍徐逹奉詔征中原侯復在行中齊魯既定河南之民簞食壼漿以迎王師暨入燕元君棄都而逃立北平等處行中書省授侯鎮國上將軍僉大都督府事分府北平拜資善大夫燕王府左相兼北平行省參知政事及天下大定論功行賞加開國輔運推誠宣力武臣之號官榮祿大夫勳柱國爵封淮安侯食祿一千五百石前職如故尋兼燕山衛都揮使時北平新入職方非勳舊大臣不足以厭服之上以侯為鄰郡子且恩遇之深不趐骨肉至親必能為國宣力故特託以方面重任豈期侯昧於理動違邦憲據元丞相脫脫大第居之凡元宫龍榻鳯䄄及金玉寶器非人臣可僣者皆用之弗疑巳而以其第髙曠菑害屢生復役戰疲之士創殘之民唯新室是圖奢麗過制特甚此猶可也先是元故都破其逹官之女多與我師為婚媾幼主尚竄沙漠諜者因倚之傎我事情上明照數千里外屢勑中書移文北平凡舊仕於元者悉遣發江南毋使為民患害侯皆廢格不行及至征虜副將軍李文忠北征獲間諜數人始知故䆠之家有官兵馬司者相率構姦僞作文榜𣣔為變托姦人以為巡邏之職將焉禦冦此非侯之過歟上猶念其功不忍置于法趣中書令其盡遣侯仍弗之聽上怒詔內官往歷指其主名諭之侯始不得已奉詔侯自是益怠於政日從事歌舞燕飲遂得嬴疾疾寖劇上召還南京以洪武七年六月二十八日卒享年四十又三娶繆氏纍封淮安夫人子二人長曰忠次曰關住女一人以七月十日葬京城之西石灰山之陽上親御翰墨製文一通遣中官致奠焉惟侯奮起戎行出遇真人乘六龍御天從征四方粗著勞效𥘉無獨建竒功駿烈照耀人之耳目然而封以大郡錫之侯爵寵恩之加不為不重矣奈何靡恩𥙷報狥欲敗度絶無憂國恤民之心乃知往古韓彭之流佑功自專卒至夷滅皆其自取焉爾所賴聖天子推天覆地載之量保全功臣唯恐有毫髮不至故侯得令終于家享榮名歿世豈非幸歟故事生封侯者沒必加之以公於是勑葬以侯禮聊示簿罰可謂仁之至義之盡者也臣濂奉勑撰神道之碑稽諸天理之正察乎人心之公不敢用昔人志墓常法特取春秋直筆褒貶之義勒文穹碑以為千萬世人臣之勸戒云銘曰人臣事君兮猶如事天寅畏是將兮終日乾乾慎終如始兮曷敢弗䖍一或怠逸兮明命在前侯起戎行兮有力如虎逢時繹騷兮擇歸真主四征弗庭兮無役弗與斬將搴旗兮所向披靡帝用嘉錫兮龍光日殷疏以侯爵兮作鎮北藩兵民二柄兮付之旬宣鞠躬盡瘁兮冝報國恩胡酲爾心兮動違國憲僣侈是崇兮群生胥怨峻宇雕墻兮朝夕沉湎是非倒置兮大分莫辨皇仁如天兮覆之幬之録其勛庸兮崇之君恩固弘兮臣行或虧生弗為善兮死其忸怩春秋直茟兮善惡莫掩萬世取法兮納人于檢墓門有石兮可比琬琰史臣勒文兮以示褒貶恭跋御製勑文下方皇帝臨御之七載益弘敷教治優老禮賢孳孳如弗及時則有若翰林學士承旨臣同春秋七十猶以文學在侍從論思之列其意以為幸逢有道之君何忍去之休致之請久而不敢發上見同皓首蒼顔與白面少年旅進旅退於班行中惻然憐之八月甲辰特降致仕之命續杜期年且官其一子魯召同入賜坐從容慰勞之夜漏下十刻始敕內官扶掖而還乙已上親製文一篇以賜同仰瞻天藻之華無任欣躍既奉表詣殿庭稱謝又以副墨勒諸真珉昭示悠久臣濂聞之君臣遇合自古為難非道之符契情之感孚鮮有善始而善終者今同年雖耄拳拳戀闕之心皎如出日忠欵自將不替往𥘉上憫其衰暮不欲煩之以事令優遊田里以終天年恩數便蕃視昔有加上下之間可謂兩盡其道猗歟盛哉昔宋孫宣公奭自翰林侍講學士乞致其事仁宗嘗賜詩一首詞臣尚載之簡冊至今以為美談矧我皇上睿思天成神文炳煥其功侔造化經緯圖書足以昭明政體用風厲四方詩云乎哉是將傳之億萬斯年永永無斁而同之名氏在奎壁光芒之中亦因是不朽誠千載之一逢也傳曰王言如絲其出如綸天下之士聞之有不鼓舞而淬礪者乎臣職在國史謹巳備載日曆復因同之請恭書于下方云是月癸丑翰林侍講學士知制誥同修國史兼太子贊善大夫臣金華宋濂恭跋神仙宅碑處士之州並城三里所有山曰少微山之下有觀曰𬗋虛觀之南一峰巉然挺出曰眉巖西南諸山拱挹周衛而二水蜿蜒起伏來匯其下登髙望之萬象呈露儼若天開圖畫不知者以為真蓬壼員嶠之絶景也宋南度後仙翁章思廉自遂昌𬗋極夀光宫來隱觀中蓬首垢面日𥘉升輒東向吐納凝然澄坐久之絶粒唯日飲水一盂形神分合人莫測其變幻乾道丙戌冬沭浴坐蛻肌膚柔潤如生弟子瘞諸眉岩下後有見於濤江之濵手携一舄飄飄然遡風而行衆異其事啓棺視之唯隻履存焉先是主觀事者嘗作亭墓前壞於風雨道士王有大日徘徊其間悵然有上清笙鶴之思歸與其師梁惟適謀自墓左開曲徑一千餘尺直至巖顛誅榛剪荆造祠宇七楹間名之曰神仙宅中祠處士星及仙翁諸像東室曰藝香藏書其中西室曰橘樂為娛賔奕棊之所宅之前二石岩拔起其蟠若龍其踞若虎各搆亭其上左曰來鶴右曰留舄而山之景愈勝矣經始於至正丙午春正月某甲子落成於其年夏六月甲寅贊其功者楊一寧王性存也惟適復捐腴田若干畝歲收其入度子弟世守之介同郡吳府録事吳從善微豫為之記豫聞括之名山上直少微天文家所謂處士之星也靈輝下燭凝粹敷和修錬者居之去滓穢而來清虛雖曰內功之加要亦山川淑靈所助為多也今以𬗋虛言之遍遊海內名山招白鶴而翩然化去豈無盧仲璠者乎道遇至人授以遊戲翰墨之法卒吹鐡笛與之同往豈無徐虗寂者乎不止仙翁一人而巳且琳宫祕館無處無之何少微所照而超然霞舉之士至三人焉當有不言而喻者矣仙翁靈迹固不可不表見于世自非惟適父子篤志玄學孰肯一顧於寒煙衰草之墟哉化荒曠而為居處功亦大矣修真之士當世繼之俾勿壞可也嗚呼塵坌膠葛豫不知秋髮之𬒳肩安得攀仙翁之逸駕共吸沆瀣於寥陽之上耶惟適麗水人宋户部尚書汝嘉諸孫有大青田人亦簮纓家能文辭及隸書皆髙士云系之以詩曰少微之星燁燁埀芒降魄名山充鬱沛􅗈結為靈和其中含黃覔之無形發休吐祥孰其尸之有道之士來涵清寧度世不死皎出東方其大如篩我啄其精以洗吾髓錬虛凝真惚恍若神冠劍既藏神遊江濱豈伊幻化身外有身出入河嶽下上星辰靈蹤猶存木老亭仆芳草離離誰復來顧有巋者士父子同慕皓鶴不來馳情雲輅乃陟崇椒乃建瓊宫羽蓋飈輪庶或一逢靈風泠然白月正中𬈑涬無際遐思何窮况乎遙矚境與心㑹羣峰攢藍二水縈帶萬象粲然如列珠具一嘯間敻超物外巖巖者山匪仙不名不有玄搆曷棲其靈水火有鼎龍虎有經疇非采真浮遊黃庭神君捧劍鬼伯持㦸呵衛弗祥固此仙宅法古為碑麟廽鳯翼太史勒辭式昭罔極宋學士文集卷第二十六翰苑續集卷之六
