body:
  text: 協晨中寥辭一首鬼谷仙人畫列禦寇御風圖以獻其師四十二代天師真人真人號沖虛子而唐封禦寇之號實曰沖虛此其圖之所以作歟濓竊觀之髯松奮張有風泠泠然起于其中霞光發舒閃鑠無定禦寇方乘飈回旋龍裳鵉帶凌亂不可止遙見神山隱起大瀛海上旭日一點如火海濤噴薄迎之濺沫而舞珠景物遼敻令人情塵銷霣直超鴻濛間嗚呼仙人之畫竒絶矣蓋以嫓真人非果在于禦寇也真人或飛神上謁太清排空馭氣靡所不之將真人之似禦寇乎抑禦寇之同真人乎是未可知也濓因造協晨中寥辭一篇真人或咏于淵精之區九都衆真當有彈八瓊太璈耒和之者庶幾後天而終可以凋三光者乎至若禦寇寓言旬有五日而後反者微旨巳備見其書兹可略云辭曰帝青洞真陽太飈恆鬱敷凝神歘上征行與灝氣俱飛輪入溟涬九光開翠荂腰佩白琥囊吻薦紫琳腴曲龍有丈人持節下明都㖟以八辰祕攝御萬象𥘉陟彼方文臺大招許瓊暉廓落黃演氣陽堂明梵樞開明戊已功玄契曲晨機羲娥俯倒景流光駐熙夷靈集動千載視之若斯須稽首方諸君同餐燕胎芝請授長生籙浩劫以為期豫老矣諸書皆忘去此卷雖久留齋中不克題就今日退朝稍早逍遙禁林涼颸飄飄然吹衣神情爽朗有若慿虛而行歌天上遂濡毫賦此他日煉丹仙華山中九轉功成當與沖虛神遊八極握手一笑何翅三千年也沖虛室銘沖虛二言乃玄門之關鍵道學之符徵也嗣天師張公取以自號復名其齋居金華宋濂為掇其義而為之銘銘曰惟其沖足以全玄黃之功惟其虛可以幹造化之樞蓋和以盎于四體而空以涵夫中腴一吻契乎自然曽弗爽于無為迎于先而不見其合推于後而不見其離雖恍惚其有物竟孰探其幾微彼專氣如伏雌抱一若嬰兒以大道之難言姑假象而示斯神明之胄為世玄師約萬言之喉襟貫一理之妙機瓊臺小史執筆受書掇三洞之隱文請揭之于座隅題金書法華經後右金書法華經七卷乃一軍校破燕都時所獲欲焚經取金以資日用其苐七卷巳燬軍校之父愀然弗寧遽持前六卷售于鐵塔禪師禪師傾衣盂酬之未幾髙麗蔡洪司丞匍匐求觀觀已􅏰然泣曰此洪所書以報父母之恩者也戎馬紛紜逃難解散豈意于此重見之禪師益神異其事乃粉黃金為泥介舊友穆庵康公請輔書其亡豫既書巳合爪言曰是經在處天龍護持將燬而弗之燬垂亡而弗之亡此何以故蓋將放如來之慧光破衆生之重昏也雖然經之功德不繫有無洞照十方𥘉無一字火不能􅌊金不能書一涉有為即苐二義學佛之士又當于此而參之也禪師名善慶號雲房古林茂公之法嗣年己八十純實無偽行舊主正覺禪師院今退栖蔣山之西菴云洪武癸丑冬十一月二十九日冬至翰林侍講學士金華宋濓記瑶芳樓記瑶芳樓者常孰虞君子賢燕居之所也瑶芳者何古桐琴之名子賢以重購得之間一撫弄其聲翏翏然如出金石如聞鸞鳯鳴如與仙人劒客共語于千載之上子賢樂焉則以謂世之名樓者衆矣高駢之迎仙謂其泝遐情也其失也誕張建封之燕子謂其興新懷也其失也靡韓建之齊雲謂其凌髙清也其失也侈吾皆弗敢蹈其非欲專斯樓之美者舍斯琴也其孰能當之遂以瑶芳名其樓而列圗書于中當風物清朗白月獨照神情遐沖敻出世外子賢棕冠鶴氅自函道而升復取琴鼓一再行久之演而為紫琳之操其辭曰有堅者石中含精矣其白如肪燁有瑛矣五音繁會鏘然而鳴矣客有與子賢同志者從而賡之曰豔質兮非華陽卉兮非奢折秋馨兮遺所思望美人兮天涯歌巳相視而笑金華宋濂聞其事唶曰古之人好樓居者豈欲夸靡麗而為榮觀哉蓋臨隂幽之室則其情斂以揫處陽明之居則其情暢以舒隨境而遷因物而著其亦人理之常者乎况夫宫角之相參羽徴之互奏禁其忿欲之邪宣以中和之正其于學問之功又未必為無所助所以先生長者無故不去之蓋有以也雖然君子蓋不物于物不物于物則凡紛然而來前者皆吾性情之發舒或懸崖邃壑或平墅曠林雖非層構可以闔闢陽隂而清風徐來萬籟皆動曲澗流泉復助之為聲勢五音泠然愜心而溢耳太和融浹內外無間有不翅聽子賢之琴于兹樓之上矣此無他逹人大觀無地不為樓無聲不為琴也苟局滯於一室之間適其意則有之而蹈道則未也有若子賢蓋學道而有所得者故濂敢以是説告之子賢博雅好古絶出流俗之上吾友楊君廉夫極稱其為人謂篤于士行而尤孝其親云佛性圓辨禪師淨慈順公􅊇川瘞塔碑銘有序濂自幼至壯飽閲三藏諸文粗識世雄氏所以見性明心之旨及遊仕中外頗以文辭為佛事由是南北大浮屠其順世而去者多以塔上之銘為屬衰遲之餘諸習皆空凡他有所請輒峻拒而不為獨于鋪敘悟緣評騭梵行每若不敢後者蓋欲表般若之勝因啓衆生之正信也有如佛性圓辨禪師者濂安得而不銘諸按其嗣法苐子行圓所造年譜師諱智順字逆川溫之瑞安陳氏子也有翁媪精修白業既沒蓮華現門屏間師之大父母也翁生道羡娶婁氏屢至哭子其情不勝哀乃塑智者大師像事之一夕夢僧頂有圎光逆江流而上招婁氏謂曰吾當為汝之子及窹而有娠師既生美質夙成年五歲即從季父學季父引生徒渡溪抵萃墅師力欲相隨季父怒麾之還已而溪暴漲季父生徒皆溺死然自少不喜畜髮翛然有塵外趣婁氏弗能留七歲俾依仲父慧光于崇興精舍稍長受具戒于天寧禪院其父亦樂修淨觀俄離俗同居精舍中精舍將圯師即協衆力葺之時年甫十八君子固知其為適用之材暨習法華經歷三月通誦其文慧光尤器之使出遊永嘉無相院覺源法師愛師俊朗挽其為嗣會橫雲嶽法師大弘三觀十乘之旨于水心法明寺師往而受其説衆推為上首居亡何走鴈山雙峯不契所言復走千佛寺毒海清法師方開演長出御講請師為綱維之職軌範為之肅然毒海入寂師感世相無常嘆曰義學雖益多聞難禦生死即禦生死舍自性將奚明哉遂更衣入禪復走閩之天寶山叄鐡關樞公公圎悟八世孫也授師以心要遵而行之似有階漸欲依公而住公叱曰丈夫不于大叢林與人相頡頏局此蠡殼中邪拂袖而入師下旦過寮􅏰然而泣或憫之慰曰善知識門庭髙峻拒之即進之也公聞其事笑曰吾知其為法器姑相試爾乃廷入僧堂中師壁立萬仞無所回撓雖晝夜明暗亦不能辨踰月因如厠便旋覩中園匏瓜觸發妙機四體輕清如新浴出室一一毛孔皆出光明目前大地倐爾平沈喜幸之極亟上方丈求證適公入府城師不往見水濵林下放曠自如巳而歷抵諸師皆不合又聞千巖長禪師鳴道烏傷伏龍山師往叩之其所酬應者皆涉理路飄然東歸燃指作發願文細書于紳必欲見道乃巳復自念非公不足依洊走閩中見焉公偶出逰遙見師喜曰我子今來也越翼日師舉所悟求證公曰此第入門耳最上一乘則邈在萬里之外也乃囑之曰汝可悉棄前解專于參提上致力則將自入閫奧矣師從公言踰五閲月一日將晚參擬離禪榻忽豁然有省如虗空玲瓏不可湊泊厲聲告公曰南泉敗闕今巳見矣公曰不是心不是佛不是物是何物師曰地上磚鋪屋上瓦覆公曰即今南泉在何處師曰鷂子過新羅公曰錯師亦曰錯公曰錯錯師觸禮一拜而退公曰未然也公披大衣鳴鍾集四衆再行勘驗師笑曰未吐辭之前已不相涉和上眼目何在又為此一場戲劇邪公曰要使衆皆知之遂將宗門諸語一一訊師師一一具答公然之復囑曰善自護持勿輕泄也久之令掌藏室尋請分坐説法公既捐館師嗣住院事非惟舉唱宗乘寺制有未備悉輔足焉甓驛道逹于山門踰六七里擇地搆亭以增勝概衆方賴之忽爾棄去過杉關抵百丈上迦葉峯渡江入淮禮諸祖之塔經建業回浙中超然如野鶴孤雲無所留礙尋返永嘉會王槐卿造報恩院于瑞安大龍山首延師為之主參徒寖盛至八百指師建僧堂棟居之石室巖禪師主江心豔師之為復以苐一座處師師翩然而往未幾又以何山精舍棟宇湫隘不足以容衆拓之為大伽藍為建大雄寶殿及法堂三門兩廡方丈庫院之屬而塑像繒壁諸莊嚴事亦次第告完平陽吳德大創歸源寺原援報恩之例請師開山師慈憫心切亦不欲拒既至為造小大鼓鐘魚板法器而叩擊之授職分班升堂入室皆按清規而行時東海有警元帥逹忠介公帥師鎮台遣使聘師入行府師以逹公方有事干戈絶之弗見逹公慕咏弗置篆􅊇川二字遺之師因飯囚戒其勿萌遁逃心即重見日月不久而赦書至周吳二囚以師為神其後山寇竊發二囚實為渠魁所絰之處焚毀欲盡歸原報恩以師故獨存師終不遑寧處避入無礙菴又還歸原朝廷為絳院額賜師今號及金襴法衣師曽不以為恱悉散其衣盂所畜退居一室掘地以為爐折竹以為箸意淡如也溫城淨光塔雄鎮一方年久將壞方叄政𥘉嘗戍其城欲賦民錢葺之命師蒞其事師曰民力凋敝久火𦦨炎炎而復加薪吾安忍為之必欲見用官中勿擾吾事若無所聞知可也方諾之師乃定計城中之户餘二萬户捐米月一升月獲米二百石陶甓掄材若神運鬼輸紛然四集鎮心之木以尺計者其長一百五十最難致之師談笑趣辦七成既粗完其下仍築塔殿宏敞壯麗九斗之勢益雄一旦颶風作其上一成挾之以入海濤衆咸傷之師曰塔終不可以就乎持心益固遣其徒如閩鑄露盤輪相及𦦨珠之類日就月將闌楯硐户一一就緒金鮮碧明猶天降而地湧也縻錢過十萬而工役弗與焉辦章燕只不花出鎮閩省道過東甌夜觀塔燈熒煌知師所造乃謁師問道并談般若經師用漢言而直解之辨章甚恱顧謂左右曰西天諸師授我以蜜義尚不能相協今聞逆川師言則心地開明矣亟呼舟同載入閩宣政分院請師住東禪廢剎不一載間殿堂矗如門廡森如藏庫燁如摶土以設諸像梵容穆沖各隨相變現靈山一會儼然未散畢功之日省院臺府諸官與大毗丘衆共落其成師則曰未也復甃東南二門通逵若干丈營福城東際花藏海南叄𥘉地三牌門營普庵堂以施茗飲浚湯泉二所以利浴者限以垣墉縈紆其徑路而馬牛無自而入輔刋開元藏經板仍印施之其可以弘濟人者無不為也先是淨業慶成東報國舶塔寶月松峯諸寺兵燹之餘莾為荒榛福建行中書將籍其産于官師言於辨章獲仍其舊辨章欲閲大藏尊經于家或以几席什器難具為辭師令浮屠一百七十人為什分辦于各剎表以題號一時畢聚仍畫為圖使按圗序次列之給役于飲饌間者亦更畨而進每以鐘鼓為節後先不紊辨章恱曰使吾師揔戎則無敗北之患矣師俄散財如歸原時恬然而退辨章留之不從會雪峯虗席辨章強師輔其處師不得巳啓行未行先鳩工師二十人往拯室廬之欹側者既至絲毫之費咸自巳出緇素莫不從化有徐子剛者據寺之安仁莊收粟萬斛聞師至亟輸還之部使者橐歡自負通楞嚴寶積二經輕視諸人師以關鍵詰之斂袵而去已而思還溫方叄政具船迎之千佛院災無有起其廢者師彈指頃千佛閣成未幾前門左右廡又成俄東甌內附師潛居林泉若將終身江心蘭隱逸禪師市材于山欲建萬佛閣而年耄力不勝遂以屬師師起而應之亦不日而成且為砌釋迦寶殿創解脫門以至蒙堂經室無不不具足𥘉師采材于山道經普安院院燬已久唯山門巋然煙雨中師見之笑曰吾為爾移山門為佛殿何如衆皆合瓜指謝之師為撤瓦輦致故基一毫無所損徐取寺山之木重完僧堂而後返皇上尊尚佛乘召江南髙行僧十人于鐘山建無遮法會師與其列升座演説聽者數千大駕幸臨慰問備至號為一時寵遇竣事還錢唐清逺渭公方主淨慈舉師以為代師𥘉不從繼而嘆曰所貴沙門行者隨緣應世何所容心哉乃振錫而往淨慈當兵後凋落殊甚師亟還鄉召匠計傭竭其筐篋而來欲大有設施而諸僧負官逋者係纍滿庭師為之出涕悉代償之會中朝徴有道浮屠以備顧問衆咸推師師至南京僅四閲月沐浴書偈而逝實洪武六年八月二十日也世壽若干僧臘若干二十一日闍維于聚寶山獲設利無算得其法者曰文顯曰興富曰某其一即行圎于是持靈骨而歸建塔于某處以明年月日藏焉師有五會語若干卷善財五十三參偈一卷皆傳于世大雄氏之道不即世間不離世間烏可岐而二之我心空邪則凡世間諸相髙下洪纎動靜浮沈無非自妙性光中發現苟為不然雖法王所説經教與夫諸祖印心密旨皆為障礙矣嗚呼道喪人亡埃風渺瀰焉得逄理事不二有無雙泯者相與論斯事哉師自得道之後坐紫檀座既巳設法度人出其餘力往往莊嚴塔廟使人為逺罪遷善之歸斯蓋近之矣或者不知專委為人天有漏之因夫豈可哉夫豈可哉銘曰大法雖無外兮收攝在一門玄漠不可象兮視之儼若存了不分精粗兮無對乃為尊若涉有情見兮雜糅成贏虧理事本不二兮縱橫隨所之渾涵造大同兮遍照光陸離東甌見休徵兮蓮華出屏間異僧佩圎光兮逆流踏波瀾玄符既敻拔兮何能滯塵寰峩峩天寶山兮鑄鐡為關扉奮迅一朝入兮窺破生死機盡洗結習垢兮真體露巍巍方知有為相兮不離無為宗彈指幻塔廟兮毗盧樓閣同因敬乃生悟兮自外而廓中歷坐古道場兮手執青楊枝井露恆四灑兮餐之井若飴木石𬒳霑潤兮談玄分五時大明麗中天兮佛日同輝昭所資生育功兮欲使隂泠消爰集清淨衆兮梵音撼海潮唯師所説法兮無耳亦當聞一言歷耳根兮千劫不作塵天光下照爥兮恩寵何便蕃卷舒每隨時兮孤雲本何心生滅巳兩空兮遺蹤邈難尋勒辭在中林兮振德無古今鄭仲涵墓志銘鳴呼自道廢民散之後世之為師弟子者朝離書帷夕若秦肥之視越瘠比比而是有如仲涵之于豫義則師友情如父子也仲涵之死豫寧得不哀乎仲涵𥘉年學舉子業把筆為文春葩滿林色澤明鮮而生意津津敷暢豫意仲涵必先登再踐場屋皆不合有司繩尺仲涵歎曰吾惡用是為哉乃棄去益潛心秦漢以來諸文章大家無所不窺亦無所不辨畜之既深發之亦盛啇敦周彛籍以五采五就陳列天祿石渠間人見之者雙目輒運眩仲涵復歎曰吾惡用是為哉又棄去取羣聖人之經而燖溫之窮其道德性命之祕質于濂洛關閩之説久之充然如有所得仲涵復嘆曰車成矣輪轅美矣不行何以涉于逺道乎益思明體而適諸用母夫人病逾年仲涵保抱扶持終日不離側夜則泣禱于天請以身代忽臀患惡疽不能坐跪鍊藥劑以進膝為生胝夫人病革思食西域瓜既食而卒仲涵見瓜終身弗忍食因懸懸念毋不置氣鬱結弗舒遂得瞶疾逮居父喪拊膺悲號絶而再蘇者數四杖而後起服雖闕凡遇諱辰却酒肉弗御者七日至期哭奠如𥘉喪癸卯之夏諸暨戌將謝再興以城叛浦陽與諸暨鄰壤訛言寇且至群從兄弟皆避地東陽或移金華是年冬寇壓東陽囊橐皆無遺仲涵時在金華聞之泣盡持所服衣衾往分之雖身罹寒沍不恤也從弟澧與妻蚤夭三女傫傫然無依仲涵鞠育盡道各選名胄而配供張之豐逾于巳女仲涵家義居十世族屬頗衆或有疾不擇疏戚夜必四三起視遇有死喪急難不顧利害身任之至于周旋事為之間條理粲然必期于集且不與人較曲直或以非理相讓但俯首默受而已其在內之行如此逹之于其外者尤夥也蘄春王烈家燬于紅巾帥其族五十乞食浙河之右仲涵館之數月而後去同縣騷人貧不能飬母來訴于仲涵仲涵曰吾何無母可養邪厚周之仲涵負笈從師道遇十餘人襁負其子且行且泣試叩焉則山水暴溢室廬漂沒欲求給縣大夫不食者日再周矣仲涵亟傾篋中錢與之村氓王氏患多男子仲涵至其家聞兒啼聲甚悲蓋氓將溺之于水仲涵為陳父子至情且惠以粟氓大感悟生之並舍三里所溪流湍悍遇雨則人蹤絶仲涵造舟渡之金華洞溪其悍為尤甚舊有石梁久壞而弗葺仲涵捐白金八百一十八銖為倡衆翕然而和未幾而梁成當夏五六月赤日流金道多病暍者仲涵設湯若濟之冬大雪仲涵晨出見寒士衣不掩脛齒相擊下上仲涵呼酒飲之爇火溫之仍解自衣纊裘為贈又嘗禱于廟寡嫗困卧廟門無衣愈于寒士仲涵與妻周寯謀製衣一襲與之凡納交仲涵者無不曰此古仁人也或又曰其內外行如一者哉仲涵自試藝不中遂不復有仕進意有薦為月泉書院山長者仲涵辭不就及入國朝會求賢之詔下郡府絡繹致請仲涵輒以耳瞶為辭巳而部使者趙君壽奉旨搜材浙水東以薦紳交譽力迫仲涵就道仲涵冠帶謁君辭意悃欵君察其誠也不敢強仲涵稟賦孱弱雖癯然若不勝衣而其精神緊峭矩度峻整人莫不親而愛之其于倫品之間歡然相聚睦然相惇有如春氣流浹不知泰和之襲人也性雖好施與絲毫事必咨稟于長者不敢私奔走兵燹中人見其袖二書以行頃刻弗少離及事平還家取而視之乃宗譜家範也仲涵所著書有遂𥘉齋稿十卷續文類五十卷藏于家嗚呼仲涵之死豫安得不哀乎𥘉豫讀書浦陽山中仲涵即從余遊先後十有餘年豫𥘉無益于仲涵而仲涵之相助余者恆多時豫執經山長吳公待制柳公侍講黃公之門仲涵每侍豫往拜三公見其文亦以逺大期之自時厥後人事不齊不聚首者數載及豫赴名揔修元史與仲涵約曰子非青年矣豫春秋亦漸髙行當侯汰而歸與子婆娑一丘一壑間聖賢心學之祕尚相與窮之史事雖畢復待罪禁林留南京者四年仲涵忽不逺千里來見且申前言豫諾之而未及踐豈意仲涵先豫而逝乎仲涵之子楷自為狀來求冡上之銘其詞纏綿悲愴尤足以動豫之哀思每一讀之淚潸然下所以久而不能成文雖然子于仲涵忍不抆淚而言乎昔者徐仲車以孝行著稱惜以聾廢而仕不大顯君子以節孝諡之今仲涵之事無愧仲車者也冝私諡以貞孝處士勒石墓門而埋豫文墓中庶幾少慰仲涵于九泉之下乎仲涵姓鄭氏淵其名也其先世遷徙之詳見譜圖記曽祖德璋宋青田尉祖文轟父巨毋周氏配室即周寯生一子楷也以文學稱女二一適吕堂一未行孫一耀生于元泰定丙寅九月十三日卒于今洪武癸丑正月十一日壽四十八以其年某月日葬某山之原禮也銘曰質圭璋兮絺繡文既姱麗兮又栗溫宜叄雅樂兮獻明庭胡淪巖穴兮鏟其英匪進則退兮道之常保家肥兮譽彌章民同胞兮勢弗殊使我心側兮軫寒與飢少微煌煌兮雲掩之隂雲英英兮又不能霖何前古兮後何今思美人兮涕泗沾襟恭題御和詩後洪武六年八月十六日皇上特詔臣及翰林學士承旨詹同編修日曆既而中書亦奏旨徵浙東西及江右之士七人分年纂輯而臣與曰為之揔裁九月四日開史館禁中日輪寺人守閽太官進膳羞其事甚嚴且祕臣等昧爽而入至日曛始出復會宿于詞林虞有宣泄蓋不敢不慎也即成稿思得俊秀有文者通考義例而繕書之于是遴選二生具名氏以聞上可其奏其一則義烏黃昶昶時以春秋中浙江行省第十七名文解肄業成均因移文博士徴之十月二十六日昶至臣引見上于西苑慰問良久且曰爾何人之裔邪臣對曰文獻公溍昶之從曽祖也上恱復見皇太子于大本堂勉勞有加焉未幾上遣侍臣出尚方綺裘革履以賜十一月十五日前御史中丞誠意伯劉基偕臣與同侍上燕乾清宫之便閣同𬒳酒而還愛昶有俊才揮毫賦一詩贈之字大如斚少選奉御傳宣召臣等赴右順門會上適乘步輦而至同餘醒猶未解上謂同曰卿醉未醒邪同對曰臣雖醉猶能賦詩贈黃秀才秀才謂昶也上曰詩何在同對曰在史館中上曰濂宜亟取之臣既上奏且笑謂臣曰朕即和同詩卿當為朕書之臣書訖歸與昶言昶自草萊賤士一旦遭逄盛際奎璧之光下照幽隱于是粉黃金為泥寫上賜和之章飾以黃綾玉軸而以同詩附其後昶嘗從臣學臣又親見其事請記之左方傳諸悠久臣伏見皇上聖神天縱形諸篇翰不待凝思而成自然度越今古非積學者所可及然亦未嘗輕發其俯和侍臣之詩豈非樂育菁莪以開萬世太平之基者歟詩不云乎肆成人有德小子有造古之人無斁譽髦斯士此之謂也昶尚朂之哉昶尚朂之哉昶字叔暘能古文辭善繼其家學者也是歲十有二月八日具官宋濂稽首頓首謹記水北山居記古之君子其居朝市也雖繁華之膠葛恬然視之而却有山林之遐思焉今之君子其在山林雖清曠有餘往往嗤鄙為不足而數興朝市之外慕唯恐失之豈人之彛性或固然歟抑習俗相仍之久而弗克變歟有能特立而不為所移者殆所謂盆盎中之古罍洗也湖府經歷葉君伯􅌈世居永嘉城中永嘉為海右名郡南引七閩東連二浙宦車士轍之所憩止蕃舶夷琛之所填委氣勢薰酣聲光淪浹人生其間孰不聞雞而興奔走于塵土冥茫中以求遂其尺寸之欲伯敀則不然結廬蜃江之北茅簷竹扉僅蔽風日名之曰水北山居間與二三友携酒壷出由白鹿城登華蓋名山持杯浩歌聲振林木或擢短具笭箵埀綸於江水中或呼小奚奴相隨行吟夢草堂上詩句不逼古人不欲休當其適意時乾坤空闊竟不知榮辱之代遷而寒暑之往來也人皆曰賢哉吾伯旻髙情逸韻皎皎霞外迹雖朝市而心實山林其近于古之君子哉然豫竊有疑焉使伯旻為布衣時假此以洗心滌慮庶幾可也今佐大府為元僚任七品之職聳四民之望亦云重矣而猶不忘乎山居無乃不可乎試以伯􅌈之意􅊇之官書叢脞不暇爬梳戴星出入猶以為不足其能索句于􅓦寞之濵乎上承乎府公下轄乎掾曹不敢抗之以為高不欲抑之以為卑慮冝詳矣其能釣滄波而出白魚乎民情真偽而莫之辨官事鞅掌而莫之集凝思入乎芒杪精析極乎毫釐其又能漱醪看山而流連光景乎是三者伯旻今咸無之而猶道之不置者將馮夢以見之邪或志之以示不能忘也我知之矣士君子不以出處二其心故賤貧不能攝貴富不能驕始終一節卓為名臣伯旻之賢所可稱道者蓋如是而巳其視朝得簮笏暮厭雲泉者賢不肖果何如哉雖然豫猶有一説為伯旻告焉當大明麗天萬物畢照名一藝者必收占一才者必庸有如伯旻之學之美誰不羡之其有不登于樞要者乎泊敀冝悉屏江湖之念而益存魏闕之思俟它日功成名遂歸老于水北山居岸巾而坐與三二友追敘平生舊遊烹鮮酣觴從容而賦詩尚未晚也贊禮郎張生子翊嘗從豫遊力與伯旻求記其事故相與一言之送徐大年還淳安序觀人之法當察諸心不可泥其迹仕不仕有弗暇論苟其心在朝廷雖居韋布操觚染翰足以鋪張鴻偉上禆至化脫或志不在斯雖綰銅章佩墨綬朝受牒訴暮閲獄案政績藐然無稱古昔君子蓋獨竊慎之豫于徐君大年之歸不能無所感大年生淳安萬山中載籍兼該而辭藻豐縟有聲于浙河東西當皇上龍興招延儒雅大年歡然𬒳山人服趨輦轂之下同修前代史史成會有詔集諸儒議禮大年復與其事廷議將命官大年以宿疾辭去年秋中書奉旨纂修日曆朝紳各薦所知豫以大年知本末義例可以觀會通而無首尾衡決之患疏其名以聞使使者持書下郡國大年即歡然應命詣闕入館之後俯首探刺唯恐一事有遺記注者關略悉輔足為完文日曆成廷議又將錫之官大年固辭如𥘉嗚呼使大年𥘉受命為一縣令長不過簿書期會爾招徠撫綏爾又其大者教化行百里爾一旦白身召入史館大書特書使聖天子宏模駿烈烜赫萬古與天無極此其功與試宰者孰重孰輕雖不仕猶仕也藉令自兹終老山林可謂無負于國亦可謂無負于學世之好議論者見其辭祿而歸搖脣鼓喙詡匕相夸奬不曰潔身而自髙則曰獨善以固窮夫士遭不願治之世披腹呈琅玕無有舉目晲之者故不得已引退今當堯舜在上夔龍滿朝之時以此疑大年者謂之誣士不學則巳學則必期世用有如大賈行廢舉術寶貨填溢市區乃振鐸號諸人曰我不售我不售萬􅎅無有此理以此窺大年者謂之矯匕與誣要皆非知其心者雖然在昔宋室盛時布衣入史館者僅六七人皆兩制八座所薦引其任甚不輕大年雖不受祿寵靈所𬒳溥博汪洋有加往昔大年將有何以自效且春秋猶未髙沈痾容有郤藥之時行當杖䇿造朝門盡展所藴以驚動世俗使向之疑有窺者瞪目不敢吐氣一辭則出處兩無憾不然長往山林而弗思返日與猿鶴為友餐霞雲而潄泉石高固髙矣如不仕無義何洪武七年春正月一日金華宋濓引劉府君碣烏傷劉君大音字韶父凝貌寡辭撫世一以誠人至于不忍欺當四筵合座囂聲撼屋居處其間默如也或出一言輒中肯綮而萬理皆解且才識敻絶人多嗜腴田設巧穽期必獲焉君曽不舉目睨之世咸以病君君曰吾將利吾㣧耳子奈何欲陷之邪未幾多田夫苦賦斂繁荷械赱氷雪中吒曰劉君其智人也哉歲侵盜夜半入君舍攫金以去君揣知其人帥子姓蹤迹于野遙見一家燈熠匕紅君曰此是巴隔虎落偵之盜方轟飲昧爽縛送于官盜為衰止即欲盜齚舌相戒曰劉家翁在何地容吾屬乎族人瀕死子方乳以業劵泣授君曰非君仁厚不足以保此有子與無子同願為盡心焉君藏劵篋衍候子長召而觴之枚數以還祖揆弗逮事父訓復蚤世君每思之必潸然飲泣奉毋李夫人唯懼有咈其志君之弟晉繼于别宗夫人愛之甚泉若布君縱其欲弗敢靳其焚劵周急拯難嫁婺又不一而足嗚呼非古之所謂吉士者邪君之傳裔有家牒中奉大夫公亮五世祖也家嘗顯矣君雖不登仕版其行無慊者娶余生誠剛魯道四男子及女二賈叔文宋慎其壻也卒以洪武辛亥十二月三日葬以癸丑十二月某日夀七十三墓在潚溪黃垣之原從先兆也剛既從豫學經有文聲而君女又歸于冡孫義當銘銘曰玉孕于山其木華滋淵産靈珠水則有輝鄉有吉士俗醇而熙一旦死矣吁其悲題韓幹馬臨本余頗獲覩東觀所藏圖畫中有長安韓幹花驄圖真迹其糜碎已甚四足自腕以下皆缺猶行水中然神采煥發如生似欲振鬛而長鳴者子意陳閎方能與之比肩而孔榮輩要不足窺其髣佛也今觀此卷之筆法與之絶類而紈素幸完豈不尤為珍玩也邪題郭熙隂崖密雪圖河陽郭熙以善畫山水寒林名蓋得營丘李咸熙筆法其所作隂崖蜜雪圖大隂霮䨴而皓素淋漓使人玩之肌膚纍纍然起粟矣或者強指為楊士賢相類者殆未見其衝氣機也題趙大年鶴鹿圖趙令穰與其弟令松以宋宗室子精于文史而旁通藝事所以皆無塵俗之韻今觀令穰所畫鶴鹿圖叢竹幽汀長林豐草其思致宛如生成余隱居仙華山中時與麋鹿為友每坐白雲磴上教鶴起舞故得其情性為真開卷視之使人恍然自失書鬪魚豫客建業見有畜波斯魚者俗訛為師婆魚其大如指鬐鬛具五采兩腮有小點如黛性矯悍善鬪人以二缶畜之折藕葉覆水面飼以蚓若蠅魚吐泡菜畔知其勇可用乃貯水大缶合之各揚鬐鬛相鼓視怒氣所乘體拳曲如弓鱗甲變黑久之忽作秋隼擊水泙然鳴濺珠上人衣連數合復分當合如矢激絃絶不可遏巳而相紏纏盤旋弗解其一或負勝者奮威逐之負者懼自擲缶外視其身純白云豫聞有血氣者必有爭心然則斯魚者其亦有爭心否歟抑冥頑不靈而至于是歟哀哉然豫所哀者豈獨魚也歟題趙魏公書大洞真經此卷乃趙魏公六十三歲所書至精至妙非言辭贊美可盡蓋公之字法凡屢變𥘉臨思陵後取則鍾繇及羲獻末復留意李北海此正所謂學羲獻者也舊嘗獲見周侍御家侍御既坐貶竄竊意必歸天上不知復流落人間今得披玩纍日抑何幸哉殷卣周彜可得而此卷不可得博雅君子尚思謹祕而傳焉題龍眠居士畫馬李公麟畫如雲行水流固當為宋代第一其所畫馬君子謂踰于韓幹者亦至論也丁晞韓趙景升雖極力學之僅僅得其形似而其天機流動者則無有也觀此卷足以見之矣題周文矩畫狄梁公諌武后圖右狄文惠公諌天后圖相傳為長安周景元作以筆法重輕較之蓋建業周文矩爾非景元也豫于祕府多見二子真迹故敢鑒㝎若此未知賞識之家以為何如也若夫狄公拳拳有唐之忠史書之天下士大夫皆能道之豫尚何言哉題徐浩書徐季海之書本于其父嵪之所謂四十一幅屏者諸體皆備而草書尤工余頗獲見之至于騰躍奮迅誠怒猊之抉石渴驥之奔泉也世徒見其變化不測如此非可以力致珠不知其一出于真今觀此帖蓋可見矣近代趙魏公筆法多效之誠可寶玩也題張旭真迹唐人之書藏于祕閣者頗多唯顛張真迹甚鮮今觀所書酒德頌出幽入明殆類鬼神雷電不可測度其真所謂草聖者邪題松雪翁觀音經後右趙魏公中年所書雖若散緩而神趣油然充足必索于驪黃牝牡之外者方能知之凡夫肉眼要不足以識此也跋德禪師船居詩後右船居詩十章唯菴然禪師所賦蓋禪師嗣法千巖長公千巖則普應國師之弟子也普應證道之後因欲避世多好船中居至大已酉泊儀真􅉝亥泊吳江延祐丙辰泊南潯故咏船居者頗多而廣録中所載者僅一二耳今唯菴亦有斯咏其殆有所本歟然船非水則不可行水非船則不可居必二者相資而後成也無相居士則不謂然我非船何處不可行豈特水哉我非水何處不可居豈特船哉是將有不假迹而見不依形而存者矣唯庵以為何如唯庵之詩托物為喻無非發明宗門心要有益學者豫故惟其祖孫相承之故喜而為之書翰林學士金華宋濂題宋學士文集卷弟十九鑾坡集卷第九
