body:
  text: 故茶陵貞母陳夫人談氏墓志銘共薑守義賦詩以自誓孟母訓子斷機而示警貞節昭乎閫範誨言翼乎隂教傳芳往古垂則方今况乎百世之下聞風而起勵志于蚤齡收榮于暮景其操若金石而弗渝其訓類氷蘖而加飾朂厥令子為時名臣有若貞母陳夫人者其亦卓乎不可及巳惟夫人諱某字某姓談氏談為茶陵巨族真隱遺曹雲陽之山如翠旗之開張紫微之峰若鐵馬之馳突勢綿延而蟠結氣絪緼而鬯逹清淑所鍾嘉徴攸賴故夫人之生也髫稚之年婉慧絶品剪綴之工不學自能絲枲之習共事惟謹特鍾愛於親閭蚤擇配于君子時則有如陳府君諱某世載徽美生同里開雅稱詩書之府允為簮纓之裔盟言既訂童幼來歸祥禎之應日臻溫煦之福自至逮及笄齡益增遐識祗事舅姑備敬養之道敦睦夫黨致雍肅之義主中饋知修潔之方佐蒸嘗盡怵惕之敬見稱耉長表厲宗門不幸年甫三十遽隕所天澧水秋竭嘆蘭蕙其可馨嶺松冬稿悵女蘿其焉托未亡之稱弗絶于口一醮之義不改其節有子曰某賦資頴拔稟識剛明寤寐群經欲明體以適用三錯諸務思致君以澤民元之季世四海興戎乃﨑嶇于兵間尋盤旋于江表適值聖主龍飛群雄川赴慶風雲之嘉會喜魚水之相逢試以檄文辭意雄偉聽其談辨籌䇿深弘遂署為東曹掾當大將四征之日正羽書交馳之時酬答整睱事無凝滯會淮安納𣢾奉命徴兵甫髙郵之斯屇俄偽吳之見縶杭論弗屈陳義益髙因讋服其強悍獲遣還于朝署由是入贊省垣出掌邦憲協恭而庶政惟和震蕩而百壬自避其典守劇府也剗纍政之極弊登難集之積賦政令所及精采一新其參預機務也立經陳紀期砥隆平之治獻可替否益盡匡弼之忠泊乎執法中臺澄清諸道白簡紏刻而物無遁情赤墀敷奏而廷無留議蓋持巳清白潔如氷雪遇事果決捷如風雨所以姓名逹于寰宇政事書于竹帛信無愧古之名臣者矣先是兵燹方張毋子睽隔皇上録賢念功俾從間道迎養賜之以金繒居之以室廬恩寵便蕃焜煌無比動薦紳之慕豔形騷人之歌咏僉謂夫人德積于躬祿𬒳嗣續身具􅈾于五福養不減于三牲安受尊榮以及考終衣食賻禭之厚棺槨宅兆之隹亦云備矣夫人曽祖某祖某父某妣某氏所生三子長即某中奉大夫御史中丞次曰克寬壯年而夭次曰復克荷家政一女曰慕貞未嫁而亡夫人以洪武辛亥十有一月戊午殁于京師之寓舍壽六十九中書省臣以其事聞特降勑旨俾歸葬于故鄉發引就道祭以牲牢哀榮之禮允謂兼至明年壬子某月日柩還用堪輿家言卜地于某山以某月日窆焉禮也豫竊聞之人材固因山川而生山川必籍人材而顯眷此茶陵舊稱良郡得名肇自于漢侯高隱但聞于唐哲年祀雖遐簡册靡載終無宏偉之才符比高深之氣惟中丞公生逢景運展謀猷才略以佐興王之業用忠貞鯁亮上結萬秉之知勳伐炳朗聲華赫奕理應有待名始不誣庸因造銘并紀嘉績使知枝葉敷腴必有資于本支流暢逹必逺藉乎源云爾銘曰雲陽之山聚靈孕釐篤生賢毋蔚為女師其一侃侃德容溫溫令則尊章是共先後惟式其二中道遘屯良人棄捐哭聲摩雲血淚迸泉其三爰從青年以迄白首抱蓈自誓終天獨守其四寒燈夜織秋稗晨炊棲志益勵茹苦若飴其五欲亢其宗唯迪厥子熊膽成丸雞聲趣起其六積學既冨受材復雄竟乘青雲去從真龍其七臬司騰英藩府效績如鳯斯鳴如鷹斯擊其八三預政路司憲臺端正氣一暢姦膽自寒其九綵衣趍庭牲鼎就養天寵日加人榮莫讓其十慶綏福履年覬期頥風木不停薤露增悲其十一非有毋儀曷成令㣧勒銘岩阿以表貞正其十二劉兵部詩集序詩緣情而托物者也其亦易易乎然非易也非天賦超逸之才不能有以稱其器才稱矣非加稽古之功審諸家之音節體製不能有以究其施功加矣非良師友示之以軌度約之以範圍不能有以擇其精師友良矣非雕肝琢膂宵咏朝吟不能有以驗其所至之淺深吟咏侈矣非得夫江山之助則塵土之思膠擾蔽固不能有以發揮其性靈五美云備然後可以言詩矣蓋不得助于清睴者其情沉而鬱業之不專者其辭蕪以厖無所授受者其制澀而乖師心自高者其識卑以陋受質蹇鈍者其發滯而拘古之人所以擅一世之名雖其格律有不同聲調有弗齊未嘗有出于五者之外也濂于職方郎中劉君之詩其殆無所愧矣夫劉君名嵩字子高故為西昌大族前代以科第發身者三十七人劉君亦以明經舉進士而其志之所嗜尤在于詩况劉君天分甚高自為童子時輒有驚人之句比長益淬礪弗懈上自詩騷下從魏晉以來迄于唐宋凡數十百家皆鑽研考核窮其所以言用功既深精神參會絶無古今之間巳而曰此固可矣然猶未也乃束書走豫章與辛敬萬石周湞楊士弘鄭大同遊而此五人者負能詩名見劉君皆驚異之相與楊確風雅夙夜孜孜或忘寢食反徴之于古瞭然白黑分矣已而又曰此固善矣然猶未也復痛自䇿督日賦一篇雖沍寒之折膠熾暑之流金劉君擁鼻鼓膝時作嗚嗚聲不成章不止也數年之間卷軸盈几巳而又曰此固若有得矣然猶未也復具布襪行纏臨釣臺上三顧山陟虎鼻峰眺龍門或竟日冥搜或終月忘返然以州里之近未足以窮耳目之遐觀環江右之境有竒山川不論道途之逺必一至焉襟宇向廣終若未能舒暢厥志復度廋嶺勺曲江玩韶石過清逺峽登越王之臺㪺蒲間泉遊石室歷觀海北名山再涉鯨波覽瓊臺雙泉之勝而還劉君之詩于是乎大昌矣濂幸獲讀之凌厲頓迅鼓行無前所謂緩急豐約隱顯出沒皆中乎繩尺至其所自得則能隨物賦形高下洪纎變化有不可測置之古人篇章中幾無可辨者嗚呼前千年而往者吾已知其人矣後千年而興者孰敢謂無其人乎苟謂有其人非劉君之作將能行之于逺乎世無劉君五美之具而徒諉詩為易易者其果可信乎濂也以繆悠之資玩時揭日不能成一章性雅好登臨又無濟勝之具雖于諸家詩無所不讀終不及窺其藩籬有負師友多矣其視劉君不亦重可愧乎雖然濂雖不善詩其知詩決不在諸賢後故因作序而相與一言之使郊愈復生當不易吾言矣劉君之詩十九嵗以前皆焚去二十至四十九之所存亦十之七八耳今其門人簫翀所編者凡若干卷翀字鵬舉亦嗜于詩蓋得劉君之傳者也弔忠文弔忠文者為豫章新吳黃君翊作也夫人臣盡忠事君之常經也忠其可弔乎使忠可弔則世之不忠者有可憾焉矣黃君字孟翔翊其名也通春秋工于屬文每以奕葉為儒錚錚思自見會進士科罷去作江西部使者屬亡何又棄去司計廬陵學宫滿一考冀可循例補校官廷議改法以錢粟吏不可為人師更辟大府椽君不得已受事廬陵郡君性剛徑不可回撓事礙于法輒抱案歷階而升摘其語與上官議反覆相鈎連上官怒斥之䇄立不少動已而卒如君言安成土豪暴甚州縣畏之如鬼一旦殺人上下相目莫敢逮同列嫌君木強嗾君行豪樹柵自固君命拔去抵其門惡少年數十執刃譁而出君叱曰爾欲反耶少年曰反則不反汝足稍前即刳汝腸矣君曰爾主自殺人何與爾事顧乃同族滅耶少年色動君挺身呼而入曰爾即殺我爾即殺我少生皆投刃走君趍坐堂上索豪豪知事急出見君求解且誘以重賂君陽諾之與其俱來置諸法人見君咸戟手指曰此健吏不可犯也至正壬辰大盜起蘄黃將及郡郡二千石與官屬皆雲烏逝君獨止孔子廟堂盜獲之知其為府掾強之仕使行官書君罵曰死狗奴我死即死其能官于賊邪盜怒反接于樹歷一日意其自悔抽刀礪頸曰從則祿汝不從則血涴吾刀矣君大罵愈于𥘉賊斫首而去嗚呼事君竭忠固以死繼之然亦視其位之何如耳當是時統制閫外者宜死之專城而居者冝死之荷戈禦侮者冝死之然皆未嘗死君以一府掾之微可以不死也即不死物議當不及乃能瞋目詈賊視死如歸使其當前三者之任其激揚奮厲足以有為可知矣此不為而彼為之悲夫君之子載以文學擢第奉常間拜豫泣道君事請為文然君之死孰不以為忠至其從容就義則鮮有察其詳者豫因造文一首托之椘聲纏綿悲愴以白君之情君雖在九泉必當以豫為知巳使世之不忠者讀焉其亦有所愧夫君之友廬陵蕭彜翁鄉貢進士也參謀軍事于省府偽漢陷廬陵赴井死婦弟同縣鄧摏為臨江府吏臨江陷椿集廬陵義軍千百濟以舟偕萬夫長楊瓛等與賊大戰城下三日兵潰投江死其志與君同俱人傑也法冝牽聮得書文曰緊委質以事君兮秉忠貞而不墮斯天經與地義兮位無間于尊卑當海嶽之塵昏兮鼓腥風于干戈譬巨瀦之失防兮泛搖搖之大波悲何山之不懷兮復何陵之不襄舞魚龍而跳罔象兮孰舉手以閼其狂倚長劍于天外兮豈豫力有不任瞻九關之莫通兮誰屬豫以三軍矧祕計之屢出兮復掩耳而不豫聽婦人難與圖謀兮徒有淚以沾膺慟哭而叩蒼旻兮豫倀倀而安之或危蹙而無所聘兮將誓死以為期胡妖氛之日熾兮綘帕首而狂呼冠切雲而佩蔥珩兮棄堅城而長逋豫雖賤為府史兮頗嘗與于祿食縱一粟其亦君恩兮敢曰職卑而莫恤毁車殺馬而遐逝兮人孰得而非豫君有急而臣背去兮其自揆為焉如彼王蠋本齊民兮雖君祿有不享尚一死以報君兮植後世之大防况豫結髮而好修兮聞聖謨于父師臨難而求苟免兮非禽獸而鬚眉豫豈異夫人人兮甘惡生而樂死唯殺身以成仁兮免君子之所鄙望巍煌之宫墻兮實宣尼之祕祠亟攝衣以從之兮依嘉樹之嵾嵯中心皎如白日兮即萬死其奚惜與淵騫遊于地下兮亦豫情之深懌瞋目而詈賊兮經百折而弗變卒從容以就義兮誠遺言之堪踐爾死固若傷夭兮凛萬世而猶生較喪節而久存兮歷百齡其何榮吾知爾精魄之攸化兮下醴泉而上卿雲之一物固為休禎兮豈爾心之所訴必震蕩為風霆兮叱列缺以施鞭殛不忠而為虀粉兮使天威之昭宣嗟鄧蕭之二生兮眼見義而不見水冝與爾為三忠兮享百世之明祀悼余生之蹇􅿟兮力不足以振之悲風瀟瀟而四來兮謾含哀而􅞽辭周尊師小傳周尊師名玄真字玄𥘉世居嘉禾後遷于姑蘇其父月心通隂陽家言用逹官薦為其學教授毋林氏玄𥘉生八歲教授君殁獨隨毋以居踰四年忽有龎眉翁類道人劍客者過之愛玄𥘉精神諡目不類塵中人製道家冠服𬒳之玄𥘉果喜又二年會上真道院施如意囊囊貯諸物集四方人使採鈎取之玄𥘉欣然仰天祝曰我誠探得第一即離俗無疑已而果然乃走嘉禾紫虗觀從李拱瑞為道士拱瑞南谷杜真人高第以道行聞既得玄𥘉授劾召鬼神之術開元寺沙彌為狐所媚羸瘁垂死玄𥘉噓氣禁呪之狐即躍出衆殺狐其疾輒愈范庭芳之子曰孟奎庭方鍾愛如重璧蛇鬼侵之沈痼不能脫玄𥘉飛符往劾蛇鬼遂絶玄𥘉不以為巳足尋受靈寶大法于曹桂孫會吳越𬒳兵遊魂出為厲玄𥘉建壇陳醮祠白鸐五十回翔壇上久而後去及浮河爇燈二燈飛起髙懸栁枝人驚以為神功萬夫長沈實母殁痛念之弗置聘玄𥘉修祠事實因問曰聞君能召鸐有諸玄𥘉曰然遂趣神要之素羽翩翤自空而來凡四十又二若果屬其指呼者實喜復問曰君能致吾毋魂魄乎曰可即剪紙為旌令童子執之玄𥘉左右顧視作叱嘯聲旌重將壓地毋降于童音聲威儀如平生實與家人環之以泣𥘉霅川有神師曰莫洞乙呼雲役雷狎褻如兒戲晚授其徒王繼華繼華授張善淵善淵授步宗浩宗浩欲授人無契意者見玄𥘉因以其祕示之自時厥後雨暘有弗若郡二千石縣大夫俱致書稱弟子請玄𥘉禜之屢有竒應其尤異者洪武戊申京師旱夏五月至于秋七月不雨太師李韓公方秉鈞軸亟命左司郎中劉允中迎玄𥘉致雨是月庚寅設雷壇于冶城山研朱書鐡符投揚子江中波濤遽興玄𥘉夜坐斗下存神窈冥電光燁燁繞身逹旦􅉝卯玄𥘉握劍上壇召風師霆伯誓之俄隂雲蔽空大風拔木雨降如翻盆韓公曰此法師雨也四民觀者僉曰此法師雨也玄𥘉曰未也明日辰時再降雨乃足爾至期復果然有黑龍蜿蜒見西方逮午始霽韓公以幣贈玄𥘉玄𥘉不受竟拂袖東歸朝紳嘉之以文辭道其功者不可悉數明年庚戍上欲問鬼神情狀于道家者流嗣天師張真人與玄𥘉皆𬒳召錫燕于光祿寺禮遣其還又明年􅉝亥秋九月巳卯上召玄𥘉至亰見于武樓從容賜坐訪雷霆所以神之故玄𥘉對曰天地之間無踰隂陽者因其運轉故有神神與人合者也雷非人無以知雷之天人非雷無以知人之天天人相孚本同一理爾上悅今年壬子春三月不雨中書右丞相汪公命玄𥘉致禱仍于冶城山建壇其應如𥘉玄𥘉為人多內功兼好澤物葑門石橋廢費將巨萬計玄𥘉談笑成之𥘉主丹霞道院嘗一新其祠廟繼住持常熟致道觀觀有丹井蕪沒且久玄𥘉求得之重甃以甓作亭覆其上玄𥘉嘗搆來鶴軒于丹霞密林間披鶴􅌁衣執黃庭經一卷焚香默坐人競稱之為鶴林高士云太史公曰豫遊江南見玄𥘉鳯皇臺上方瞳燁然長眉聳然傲聣于萬物之表竊意緱山仙人乘鶴吹笙而徠下也亟往叩長生久視之要玄𥘉乃言曰混沌之時一氣孔神無形與聲入之無門子盍索于呼吸之根乎其體中虛玄象之𥘉不依物以居枝扶而葉踈能黜其知守其愚則群隂盡銷而純陽獨舒矣子盍慎諸豫敬受之以還而未之能行也然而玄𥘉之役使鬼神者其能斡天道之樞歟抑玄𥘉孝于親一日不見輒懸懸如飢欿欿然若有所疑經曰孝悌之至通于神明玄𥘉所以能變化者其或有繫于是歟非歟人多內功兼好澤物葑門石橋廢費將巨萬計玄𥘉談笑成之𥘉主丹霞道院嘗一新其祠廟繼住持常熟致道觀觀有丹井蕪沒且久玄𥘉求得之重甃以甓作亭覆其上玄𥘉嘗搆來鶴軒于丹霞密林間披鶴􅌁衣執黃庭經一卷焚香默坐人競稱之為鶴林高士云太史公曰豫遊江南見玄𥘉鳯皇臺上方瞳燁然長眉聳然傲聣于萬物之表竊意緱山仙人乘鶴吹笙而徠下也亟往叩長生久視之要玄𥘉乃言曰混沌之時一氣孔神無形與聲入之無門子盍索于呼吸之根乎其體中虛玄象之𥘉不依物以居枝扶而葉踈能黜其知守其愚則群隂盡銷而純陽獨舒矣子盍慎諸豫敬受之以還而未之能行也然而玄𥘉之役使鬼神者其能斡天道之樞歟抑玄𥘉孝于親一日不見輒懸懸如飢欿欿然若有所疑經曰孝悌之至通于神明玄𥘉所以能變化者其或有繫于是歟非歟沖默齋記保寧禪師以沖默號其齋居來徴豫記豫按字書沖者虛也默者靜也即佛氏空寂之義也惟其沖也故默則沖為體而默為用惟其默也故沖則默為本而沖為末二者之理恆若相因未有默而不沖沖而不原于默者也夫太虛寥廓從橫自如陽運隂行真宰不動此兩間之沖默也自無生有從有入無外雖紛紜中實有定此萬象之沖默也靈光洞然出入無礙諸緣自忘大用常寂此一心之沖默也我念不生法從何起生滅本空而况于法此諸法之沖默也沖默之義大矣哉嗚呼有情之類亦云夥矣奈何營營逐妄擾擾迷真竭晝夜而實其所無反覆膠滯不求脫離是不知有沖者也風性所激運轉不停歘焉凝氷倐焉焦火十二時中無一息少寧是不知有默者也非大覺真人出而救之將何所底止乎然而妙明真性不涉三際元自沖虛本由默靜無所不容無所不具因無所不容故萬有歷然而未嘗有窒于虛因無所不具故群動森然而未嘗有離于靜靜固非動動亦靜也虛固非實實亦虛也沖乎默乎其造道之樞要乎彼李伯陽所謂致虛極守靜篤者若近乎沖默而涉乎有為也韋應物所謂隱拙在沖默者欲藉是處世以保和為沖寡言為默者也而非其至者也然則何以為至乎必也入不二之門而後真知默也真知默者則無所事乎沖也禪師汲汲求法者也嘗揭沖默以自勵故為略疏體用本末而言之然亦未嘗有所言也禪師名覺慧字敏機吳興人出世嘉興之祥符近從四輩之請分座説法于大天界寺尋主寶寧禪剎蓋有志之士也送張禮部兼晉相府録事序皇明御天區宇敉寧文化洽熙罔間內外聖天子猶旰食宵衣欲圖治安如黃虞時在野之賢無不遣使羅致于庭當是時錫山張籌惟中用監察御史薦上名銓曹四方來者雲擁而林布銓曹各因其才命題試之而惟中前進士乃以經學對𥘉覆考僉謂良才遂列為首選又明日丞相引見于奉天門上親御翰墨疏其名下曰翰林應奉其次而下悉用奉天選授官則惟中特𬒳簡注可知矣已而惟中視草北門文辭雅馴而能弗悖上意于是日侍左右或講説經史或應制賦古今詩未嘗不再三稱善甫一載特授禮部主事未數日會晉相府録曹闕官復命蕪之命既下六曹之士咸曰學者當明體而適用苟學矣而不施之于政是玉巵之無當也奚輔焉上之摩厲惟中者厚矣詩人頌文王作人之盛有曰肆成人有德小子有造其今日之謂乎三館之士又曰詞林之設官自學士而下曰侍講曰侍讀曰直學士凡若干人而待制修撰編修之屬不論焉夫以賢才如此之多其事始集惟中以一人獨當其任亦未嘗見其有缺敗非其才之果良乎苟使議禮于儀曹贊畫于宗藩其有不稱職者乎傳有之君子學之在躬當無施而不冝惟中其有焉金華宋濂則曰二者之論固當矣濂則以為天下才良者衆矣能致萬乘之知者幾何人哉縱知矣論説或不合沈沒于下僚十年不調者有矣縱調矣或處間曹冷局首尾拘畏不能展其志者有矣今惟中以一布衣之微上􅈾宸選未久而三遷官官皆清要之重寄不知惟中何以報上之賜乎奔走承順以為恭非報也出入謹飾而自防非報也唯精白一心以承休德常如天日之照臨有知無不為為之無不竭盡其智慮庶幾稍無愧耳他日名存竹帛功在國家不于惟中之望而誰望乎會上錫晉王土田于吳惟中將履畒而實之過家上冡以為鄉邦榮濂惟中老友也故于其行不敢倿而以規杭州靈隱寺故輔良大師石塔碑銘有序洪武四年正月十六日靈隱釋氏大師滅度報年五十又五僧夏四十龕留五日頂有䁔氣體貌如生又二日用闍維法從事齒牙堅潔舌根紅潤皆無壞者及火既滅諸設利羅珠圓玉皎將至盈升四衆爭取灰燼為盡其弟子某等涕淚悲泣攀號無從于是俯從世禮以是年某月日瘞骨于歸雲塔中實在寺東偏若干步𥘉大師未告寂之先以書屬後事于其同門今天界善世禪師泐公曰吾大期已至子冝速還若稍遲遲不復相見矣時公留姑蘇謂大師精神尚強豈遽如其所言及治任來歸大師火化已數日矣公于塔前自誓必期有以白大師之行傳芳不朽垂範將來乃加評隲輯成簡編持示其友金華宋濂曰是大師也始終俊偉不愧龍象子通吾宗其言當見信于世盍為文揭之塔上然公以叢林碩德位冠五山護持正法不翅堅城乃不屬之他人而惟區區是托非相知之至深邪其又何辭大師諱輔良字用貞其號曰介庵蘇州吳縣人姓范氏文正公之十葉孫也父諱伯和母鄭氏大師誕鍾粹氣聰悟夙發見浮圖氏書輒躍然朗誦若所素習有挾相形術者謂其父毋曰是兒骨骼清聳緊峭恐非世間法可縳若使之學佛必能弘大宗乘矣父毋方鍾愛不信其言大師之里多阿蘭若大師日與群童遨逰其間徘徊愛慕終日不忍去父察其志與相者言合乃謂之曰在昔范蜀公好與名僧交嘗勉圓悟勤公參叩道要卒為天下禪宗吾能惜爾而不使遂其志乎年十五俾從同里迎福院僧夀彌剃落及受其戒即慨然曰學佛將以明心心非師無以示肯綮終日墻面可乎去從北禪澤法師習天台教觀所謂三乘十二分研其精華攝其密微充然若有所契士瞻杓公時住天平山白雲寺寺蓋范氏所建以奉先者大師數至其間士瞻誨之曰教乘固當學若沈溺不返如入海算沙徒自困耳何不更衣以事禪寂乎大師曰吾將焉從曰笑隱欣公見主龍翔集慶寺其道大𬒳東南緇白信從如子歸毋朝廷嘉之賜以廣智全悟大禪師之號汝曷不往依焉于是大師往見廣智即以全器法寶期之問答之際棒喝兼施弦發而箭馳雷㫪而電掃剎那之頃凡情頓喪雖未至清淨覺地而所入正塗超然出于物表他日廣智再有所問大師發言愈厲廣智笑曰得則得矣終居弟二義也大師弗懈益虔久之遂契其心法雲空川流了無留礙尋掌藏鑰于四明阿育王山與住持石室瑛公縱橫相叩擊石室極推譽之至正壬午行宣政院檄大師出世嘉興資聖寺升座説法終歸恩于廣智云時大師年始二十又六衆頗易之大師殺衣黜食為修建之計崇基廣構文甓雕甍金碧燁然前後相照往來觀者始皆信服居十三年遷越之天章僅閲四春秋移杭之中天竺其傾嚮者益多有踰資聖天章時會海內大亂兵燹相仍南北兩山諸剎皆化于烈熖靈隱古稱絶勝覺埸涼煙白草凄迷于夕照之間過者為之慨嘆康里公為江浙行省丞相妙東名僧能任起廢者莫大師為冝遣使者命居之既至剪剔荆叢葺茅為廬以棲四方學者雖當凋零之秋開示徒衆語尤激切其言有曰逹摩一宗陵夷殆盡汝等用力如救頭然可也然百千法門無量妙義于一毫端可以周知如知之變大地為黃金受之當無所讓否則貽素餐之愧矣嵗月流電向上之事汝等急自進修參學之士多有因其語而入者化緣既周手疏衣資入公帑散交遊及治喪斂之事顧謂左右曰翼日已時吾將逝矣及期澡浴端坐書偈而殁大師四坐道埸解結發覆如利刃之破罥索甘露之灑稠林無不斷絶無不霑潤故所度弟子心杲等若干人説法住山明宗等若干人頗號繼迹重輝者也大師性簡直雖靣拆人過而胸中無留物與人交無少長一以誠相遇所造偈辭𥘉不經意而語出渾成有若宿搆舉揚大法不務緣飾而西來之旨自明復以淨土觀門苦海舟航時兼修之未嘗少怠其所見蓋卓然云嗚呼道行無迹妙極無象求而即之吻契本真未㝎之先則萬緣鼎沸發慧之後則一性洞虗所謂不用其力而無所不力則神器化于玄冥而忠信發乎天光矣有如大師和粹外形淵懿內朗造請之間因言懸解證不染不遷之域泯差别次弟之門非上智宿植惡乎至此哉濂也不敏蚤從諸老遊欲假般若為宅心之地夙障巳深竟為世諦文字之所纏縳雞鳴而起唯倀倀逐物而已操觚而銘大師之塔豈不惕然以自憐悵然而遐思者乎銘曰真體如如絶待離紛妄識所膠攪為法塵譬猶飈風鼓埃揚氛化畫作夜觸目重昏佛啓覺塗髙懸慧曰白光爛然下銷群慝破相玄門最為勝特能㝎諸緣即超祕密昭昭大師上承禪宗一真歸源萬幻咸空染淨兩寞本迹俱融廣智之傳其學遂東昭昭大師為法出世嬉笑怒罵皆真實諦湧殿崇峩飛樓弘麗假相以昭非與道戾昭昭大師變通弗拘緣盡即滅視世為虗死生者誰出沒在吾化為舍利如摩尼珠來也非留去焉非逝白雲在天周流無滯法象既亡勒石為偈式播徽音用垂南裔題天台三節婦傳後余修元史時天台以三節婦之狀來上命他史官具藁親加刪定入類列女傳中奉詔刻梓行世先是會稽楊廉夫為之作傳其事頗多于史官蓋國史當略私傳冝詳其法則然也近與台士遊嘗詢之則廉夫所載猶有闕遺者因托其言輔之杜思絅娶沈沈生三女及子勤而死繼室宗媛祕書丞陶誼女兄也生一女思絅亦亡宗媛棄膏沭而御上奉七十之姑獲其歡心下視沈之子不翅親育十八年間悉畢其婚姻歲丁未九月壬寅台城陷火𦦨燭天宗媛護姑柩不忍他適為兵所𣙗驅之行宗媛不從兵怒剚刃于頸深入二寸餘不見血而沒瀕死無他言唯念勤不置曰勤苟不存吾尚何望哉宗媛妹宗婉歸周本亦同日死于水誼婦王淑見事急抱其子名長巳者屬傳姆曰持以歸其父長已存吾不死矣乃𬒳髮亂走明日事㝎求之不得淑見夢媵人曰吾義不辱身赴南鄰杜氏井死矣所懷簮珥亦投其中可聞漢生知之漢生其夫字也媵人以告黎明覔之皆在焉實十月乙巳也然人之受刃無無血者宗媛則以之淑雖死其精靈猶能動物不亂是知貞節之人其超絶誠與常人殊薦紳家相訾嗸者輒斥曰女子婦人女子婦人猶有是嗚呼孝經集善序孝經一也而有古今文之異者蓋遭秦火之後出于漢𥘉顔芝之子貞者為今文凡十八章而鄭玄為之注至武帝時得于魯恭王所壞孔子屋壁者為古文凡二十二章而孔安國為之注後世諸儒各騁意見尊古文者則謂孔傳既出孔壁語其詳正無俟商確揆于鄭注雲泥致隔必行孔廢鄭于義為允况鄭玄未嘗有注而依倣托之者乎尊今文者則謂劉向以顔芝本參校古文省除繁惑而定為今文無有不善為之傳者縱曰非玄所作而義旨實敷暢若夫古文並安國之注其亡已久世儒欲崇古學妄撰孔傳又偽為閨門一章文句凡鄙不合經典將何所取徴哉二者之論雖莫之有定然皆並存于時各相傳授自唐玄宗注用今文于是今文盛行而古文幾至廢絶宋司馬溫公始專主古文撰為指解上之且憫流俗信偽疑真諄諄見于言辭之間以豫觀之古今文之所異者特辭語微有不同稽其文義𥘉無絶相逺者其所甚異唯閨門一章耳諸儒于經之大旨未見有所發揮而獨斷斷然致其紛紜若此抑亦末矣自伊洛之學興子朱子實起而繼之于是因衡山胡氏玉山汪氏之疑而就古文考㝎分為經傳去其衍文及不合經旨者千載是非遂㝎于一元室之𥘉吳文正公出于臨川又以今文為正頗遵刋誤章目重加訂㝎而為之訓解其旨益明而無遺憾矣東廣孫君蕡讀而恱之因增以諸家所注名曰孝經集善而其大義則以朱子及吳公為之宗蕡通經而能文辭采擇既精而又發以巳意其書當可傳誦故余為疏歷代所尚之異同序于篇端蕡字仲衍洪武壬寅鄉貢進士今為織染局使云丹井銘海虞有虞山梁天監𥘉漢天師十二代孫張道𥙿來隱其下建招真之治鑿丹井焉宋淳熙中道士李正則浚井得藏丹石䃭啓之化為雙紅鴿飛入上湖至今湖中丹光煜煜然邇年井且廢莫知其所周尊師玄真窮日力尋獲之重加以甓構亭覆其上時皇明洪武元年也然仙家煉丹必以井故名山多有之其在今海虞者舊廢而新治豈玄學復興之徴與銘曰太隂委精自天一融而為液養萬物神丹浴之赤如日有夫玄巾發我室雙禽衝霞飛翐翐靈泉重噴甘逾蜜飲焉夀與天地畢故義士胡府君壙銘府君諱嘉祐字玄祚姓胡氏其先出于文定公安國之裔有諱志寧者宋宣和𥘉來知㜈之永康縣遂家焉今為永康人曽祖某宋通直郎祖時孫父文字質甫皆隱德弗耀妣張氏府君幼失怙恃嶷然思自樹立蚤夜孜孜無毫髮自懈意卒使資産逾于前人然積而能散遇貧窶不能自存者多與之泉布無靳色人有急難百計救之至勢不可為乃已以信接物如金石弗變里黨有期約咸屬府君一聞府君言則曰胡玄祚斷不可欺矣歲丁酉括蒼盜起殺官吏焚府庫蔓延至永康浙水之東騷動縣逹魯花赤曰也速逹而聞府君有竒才即薦上海右憲府廉訪使劉公禎亟召府君與語大恱命府君集鄉里健兒給以鎧甲俾領之以殄寇府君勒成部隊教以攻戰之法頗可用一旦寇大至府君列陳于占田衆寡不敵遂死之是嵗二月二十三日也江南行御史臺聞其事遣使致奠材士大夫亦嘉府君之義而悼其不幸多為詩文以傳府君得壽四十有八元配章氏無嗣繼室趙氏宋格庵先生順孫五世孫女也子男四人𥙿禊祐禔女二人長𥘉適鄭某次禎未行孫男二人榮祖正祖孫女三人忠昭清皆幼𥙿等既以丙午之嵗九月壬午􅌾府君于鯉溪山之原復具府君羣行徴豫銘而納諸玄堂之南𥘉豫受經于凝熙先生聞人夢吉始識府君蓋府君之女兄實歸先生而先生之女又適府君之子𥙿府君之事行故先生數道之以厲人人豫頗得與聞之惜乎府君百不一試而竟賫志以殁然而君子有取之者其捍衛鄉井之心皎皎然不可誣也人孰不死君死于義可以無恨矣銘曰人孰不死得死則難此惟義士胡君之基千載之下過者式焉重建龍興奧源寺記龍興奧源寺在撫之金溪縣北一里後枕鷓鴣之岡前有一峯鋭如卓筆上插霄漢而幕阜雲關兩山對峙乎西東若駐若馳若起若伏其秀拔逮難名狀靈宫祕宇之所托也固宜唐元和中有大比丘某飛錫而來徘徊顧瞻縛茅栖止于其中厥後漸成巨剎樓閣峥嶸鍾魚互答于山光水色間一時龍象固嘗盛矣宋崇寧𥘉蕪壞弗治已而復興元至正中江右兵起官署民廬盡罹焚毀寺亦不能以獨存金碧之區倐幻為瓦礫之場荒煙野磷更互明滅使人有悽然之思束曉大師自幼受經斯地喟然嘆曰在我法中有為無為皆第一義諦起廢之任吾可不究心乎其徒十有一人歡然相之閭右之族亦間有施資者于是伐木于林攻石于山徴瓦于陶衆工雲興罔敢後時大師躬程督幾忘食寢遂卜厥日以成功告寶殿中峙邃堂後居旁挾二廡前敞三門以至庫庾庖逼之屬罔不就緒復搏土肖佛菩薩暨護法金剛神諸像𣑽相嚴穆見者生敬經始于某年月日訖功于某年月日𥘉刑部司門員外郎王君經二世與大師遊凡大師有所營為皆捐財倡之大師知刑部君與豫友善因請具其事狀求豫為之記豫聞大雄氏説法耆闍崛山有重閣講堂之壯麗所以奠安其形軀庇覆其徒衆𥘉未聞其露坐于日星風雨之中也世之昧者弗之察悉諉諸興造為人天有漏之因倀倀然曰吾志諸內不騖諸外彼役志于事功者果何為也哉殊不知般若場中理事無礙內外混融遍覆一切不即世間不離世間苟徒拘泥而墮斷滅之見則違道逺矣今大師耽恱禪味有所證入熾然建立無非佛事其智識過人殊甚備著其事勒諸堅珉庶可為馳騁空言者之深戒歟大師名嗣暹字某族王氏東曉其號也有長材所涖之處廢無不起既創安樂院于蓋竹原復重造金禪師塔庵恢其土田已而庵爇于火又搆成之及今奧源之役其功為尤偉所謂十有一人則行真希警希晏希住希誠法旭法吾法昶法摏法睿慧澄其學行皆有可稱云宋學士文集卷第十三鑾坡集卷第三
