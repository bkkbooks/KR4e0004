front:
  text: 宋學士文集卷第六十八芝園續集卷第八
  hash: sha256:4ae84b447a4b28d1e09337cac5df461c4f33ed5ff2b707c3fc25037302905e36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_068-1a}
body:
  text: 元故國子祭酒孔公神道碑堯舜禹湯文武及孔子德皆聖人惟孔子不得位而功最盛天於恆人有一善且昌其後昆况德充天地功施萬世而身不食其報者乎堯舜禹湯文武皆王天下故子孫受其祉有限孔子無位故餘慶遺澤𬒳其子孫者無窮自斯民之生未有若孔子之德而無位者也亦未有孔子之傳世久逺而襲為封君者也嗚呼天之報聖人其在兹乎公諱克堅字璟夫世家魯之曲阜孔子五十五代孫也曾祖曰之厚贈大夫濟寧路總管輕車都尉祖曰浣纍贈通議大夫禮部尚書上輕車都尉皆追封魯郡矦父曰思晦嘉議大夫襲封衍聖公纍贈通奉大夫河南江北等處行中書省參知政事護軍追封魯郡公諡文肅曾祖妣女真氏祖妣李氏妣張氏皆追封魯郡夫人公少廓逹通敏日誦千餘言始冠逰學成均通春秋左氏傳文肅公薨襲封衍聖公階嘉議大夫元重紀至元五年上疏請修飾廟像順帝可其奏賜山東曆日錢之半給其費命監察御史族人思立持楮幣二萬五千緍勒碑以紀成績至正六年中書謂公爵與階不稱奏升之制授中奉大夫易銅章以銀十五年􅊭章政事逹世帖木爾薦公明習禮學徴為同知太常禮儀院事以子希學襲公爵是年冬帝親郊公攝太常使盛服襜然登降有容觀者稱為達禮御史大夫雪雪言公才冝近侍左右拜中臺治書侍御史公辭歸明年拜山東道肅政廉訪使既受詔復辭會山東兵亂公率家人北行次藁城丞相賀太平奏召公為集賢直學士希學為祕書卿遣使者即藁城起之公至燕都處盜毛貴犯畿甸且逼廷議棄燕遷關中公曰天子當社稷宗廟俱為存亡烏可棄而它之今勤王之兵頗衆與之決戰盜可平也如公言盜果敗去十九年遷禮部尚書知貢舉時四方士避亂多集都邑公請設流寓科以取之是年冬權陜西行臺侍御史李思齊及察罕帖木兒二軍爭秦隴相攻朝廷不能制陜西行省丞相帖里帖木爾納思齊降將命張良弼禦之公及中丞袁渙諍曰不可二軍不敢舉兵犯奉元豈其力不足哉特以無名耳今納其叛將而出兵禦之是引乕使噬也丞相不從渙亦𬒳劾去公怒曰謀之不善亂且至矣遂自劾而歸月餘二軍及良弼戰干鹿臺奉元果陷二十二年除國子祭酒帝賜上尊太子書大成殿額以賜公以世亂不樂居位竟謝病歸闕里營别業城南以居後起公為集賢學士資善大夫不就復以公為山東廉訪使卒不起二十八年皇上手䛇趣公入覲待以賓禮而不名賜以廪祿不煩以職郊祀必致膰肉撫勞甚至洪武三年春以疾告遣中使存問疾篤詔還公于家給驛以行賜白金百兩文綺八端它錢物稱是三月二十八日次下邳新安驛薨于舟中壽五十有五希學奉喪歸以六月十三日葬于孔林去孔子墓若干步公寬厚樂易事親有禮遇族黨有恩與人交不為掩覆計度一以誠信豐下美髯容止甚都順帝以福人稱之公娶張氏濟寧路總管子仁女封魯郡太夫人丈夫子九人長即希學次希説希範希進希麟希鳳希順希尹皆元國子生希贇其季也女一人適某某孫男九人曰訥曰證曰某某女五人希學今資善大夫襲封衍聖公每歲朝正于京師上寵錫之甚厚以袁渙狀來請曰先公沒今十年而墓道之石無文以刻恐休德不聞于來世人其謂何濂嘗獲識公且與希學善雖老矣其忍不銘銘曰天命大聖為萬世師廓幽昭潛雨施日輝功加堯舜位則不有斂其遺澤以昌厥後歷年二千有興有亡五千餘世封君相望自矦而公愈逺彌貴桓圭衮衣肅將祀事惟公紹家敦大且文人曰休哉聖師之孫入為秩宗左禮右樂格于幽明上下允若亂兵趨燕宗社震騫君臣合謀棄而西遷公曰不然君死社稷以正伐亂勝不以力王師焞焞如乕如貔盜遁難夷公實啓之關陜之間將驕胥噬彼謀不臧以水止潰公謂元戎世方興亂無失厥防以速其叛言臧不從不臧是為禍將逮身云何弗歸璽書迎拜俾掌邦教大訓宏謨敷聖之道土宇曰隳位其可居退修于家琴瑟詩書皇明御極取聖為則陟降帝庭禮儀有翼生享其榮死篤其承云誰致然聖澤休明惟聖之澤如山如川有址有源以求厥傳繼聖惟賢守位惟德昭績垂聲後嗣是式觀音石贊乕林翁君祥卿得圓石一大可五六寸上現圓通大士妙嚴寶相坐寶蓮華善財童子合瓜侍側蓋大士住不可思議解脫門能以神變作諸佛事攝受衆生大則示化真身於陀怛洛迦山小則寄影像於一木一石不假人為自然天造無非自慈愍中發現祥卿因請濂作贊以顯神功以示闡提生我慢者贊曰玄黃既肇分白石即受質斯時未有佛云何能應現千劫皆佛化難以時節拘劫𥘉與劫終常居寂光上石本無情物其頑無與等𥘉無感通者云何佛示像微塵剎土中塵塵皆是佛有情與無情本來同一體諸佛亦無數動曰那由他云何圎通佛獨此示神變圎通於支那夙有大因緣所以不會捨如母之憶子如來談諸相皆是虛妄集云何自著相曷以釋迷網由相以悟性正如指指月見月指則忘寧有繫執故以此四者觀唯知佛願弘聖凡盡融攝調御菩提心假石顯云異超出思慮表既非圖繪力又匪鐫勒功幻成妙嚴相七寶作瓔珞瞑目結跏坐正以慈愍故用警闡提者徒爾增我慢當知神通力乃復有斯事始悔未見時口出不淨語如仰首唾天唾還著面故愚癡誠可念寧忍加斥逐我願大地人無不知三依見石非見石見佛亦非佛但見無量光各自心中發編照十方界明如日月燈十方諸品類盡得諸佛智夕佳樓頌夕佳樓在乕林西山中去城僅五里所文明海慧法師始作之法師修習西方觀想當日如懸鼓時必面西作禮舉唱佛號滅妄歸真不使毫髮散亂其命名夕佳雖取陶潛氏語意蓋他有所屬也法師之子具庵玘公復能丕弘父業法華一宗恆籍之為大法船獲濟度者甚衆具庵以樓徴文為述頌曰大雄妙嚴清淨海攝受無邊有情衆生念念在散亂猶如火生積薪間倏忽起滅不暫停乃以神通方便智教之繫念專於一惟彼西方安飬土無量夀佛之所住琉璃宫殿黃金地九品蓮臺池中生衆鳥寶林能演法極樂永斷一切苦其土正值日沒處衆生知用日為觀舉頭見日如見佛開目閉目盡明了佛光解破諸暗故心定如山不可移性中如如顯日相四教修行隨解進能想所想各異證三藏有見皆生滅通則無寶如幻化二教皆以事定故别知本性元是佛次苐觀中可馴致圓門妙解􅳋然殊心具一切依正法以具緣即心日現法界心起法界日此則名為空假中非三非一即三一用智破惑顯自性猶大醫王出良藥入口熱惱變清涼種種觀法斯苐一奧從大法來真丹修者習者無量衆冥覩如來親接引身乘七寶金剛臺一彈指頃生彼國海慧尊者發弘誓嚴潔斯樓建道場每當山氣夕佳時遙注西方作禪觀尊者行成生上品有子夙具大乘器本性之日常在目妙朦光明時發見我生本是菩提種誤嬰世網未解脫暮年遘比殊特事如飲醍醐生慶快願結樓煩淨社緣西向落日志心禮唯心唯色妙難思當處顯現無非佛了圜銘嗣漢天師張真人宇𥘉築室龍乕山中修錬瓊丹動靜兩忘巳而神聚氣凝混含為一至和坱圠返乎太𥘉真人既獲覩內景之祕因題其室曰了圜所以識也玄貞道士為原玄牝之旨而勒銘曰髙上洞玄陽隂之根凝和攝真是謂昆侖中有三關七㽔守閽上絶霞表下淪洞冥遡而索之黃房絳庭靈明潛通空澄淨泓真人之居規中為城龍帔鳳舄靈裙飛翻左挾元英右衛白元仰睨太朦噓氣成雲化生萬神合妙為真升真玉虛朗契洞淸哀厥下士粗穢莫澄神隨形化降于北隂乃勑雷電指麾六丁授以赤書制魄攝魂還乎混沌閉絶九門南陽熙真爽朗秀英三靈發曜八素啓瓊出入泥丸翺翔紫淸羽葆先導􅸯臺後登與天為徒振古長存濂既作是銘或謂假象取喻而多廋辭曷若著明言之嗚呼斯豈言之可明哉然而人身之內有至虛焉絲絡之所群湊命蒂之所由生不倚八偶巍然中居此謂神之庭氣之母真息之根也人能存神於兹則性自復飬氣於兹則命自正神與氣未始相離分之為二合之為一其殆化源也歟然欲了之則未易為功也鳥之伏鷇不足以言溫陶之烹瓦不足以言凝鑑之照形不足以言明勝是三者庶幾氣神混合自然成真而猶未忘乎迹也蓋有非神之神而行乎九天非氣之氣而超乎九地方所不能拘小大不能計而了之名且不立矣了之名茍未泯如隔紗縠而觀明月耳著明之言固無越於此然亦精粕而巳爾土苴而巳爾何是以言了哉或者一笑而去因不欲棄而書諸銘後趙子昻像贊文運中微頽波日靡公起東南作天一柱天人之表帝王之孫麟遊鳯翔珠明璧溫歷試中外遂居禁密其名之升與日同出彼檢邪者腐鼠敗豚何能病公臭穢自聞三百年間西東萬里雄嗚一代如公者幾公貌如玉公文如金變化莫測照耀古今吳道玄觀音贊觀音妙智力頓超塵沙界吳生縱善晝徒能具凡體我假六神通欲寫光明藏須彌以為筆太虛以為𥿄經歷無量劫但成一隻眼此眼若開時十方俱照了一塵一沙中有眥觀自在雲谷偈雲出谷中境也氣之所寓也道陵師沙門也其以雲谷自號是寓乎寓者也若以一真法界言之凡所寓者皆妄也况妄之人妄者乎一旦心空法空則諸妄皆真矣何雲谷之有哉為説偈以明之偈曰白雲出空谷此是山中境上士以自號是心隨境轉我日本無雲雲出亦非谷終日遍太虛不著於一處我心能轉之一一皆自在此為空谷義上士當聽聞聞聞了不聞頭頭皆是道苟著於邊但見谷中雲𥘉如一縷絲漸成兜羅綿敷布於四方遂成澤物功此是苐二門𥘉非真實義勿謂老書生妄意談般若宋學士文集卷第六十八芝園續集卷第八
