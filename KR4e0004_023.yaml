front:
  text: 宋學士文集卷第二十三翰苑續集卷之三
  hash: sha256:e3447bcf4f4c36284642f834801f211b8670c32ce9e63a27acbf80091fd96e6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_023-1a}
body:
  text: 饒氏杏庭記臨川曾先生旦𥘉助教成均嘗以其鄉友饒君孟持杏庭記為請豫年踰六望七精神衰耗四方求文者接踵于門心極厭之則作而固辭先生之請至六七而不倦豫以先生有學之士其言之勤如此意必有所屬因詢其詳先生曰孟持故詩書家其先祖手植文杏一章于所居之西兵燹之餘風枝露幹屹然蒼煙中疑有百靈訶衛之者孟持因樹亭其側名曰杏庭然孟持之意非以為觀美也唯汲汲乎先祖是思當春陽和煦生氣鬯逹自本而末咸周流而無間則思其與道為體精神發舒無往而不在也秋髙氣清葉脫而色不澤所謂歸根復命返于沖漢則思其順時斂藏不誇能不矜寵也朝露其沐浥乎其容則思其盥漱而興正衣冠而屹立也夕颸作涼冷然其音則思其出坐中堂若誨語之𥘉聆也一動靜一云為之間見杏則如見其先祖焉所以聳動其心志警戒其昏惰者大有資于學功視彼拈葩摘豔以為耳目娛者其語哉此誠有關于彛倫之重不避再三之瀆職此故聞之嘆曰孟持亦可謂孝子矣乎昔者召伯循行南國以布文王之政或舍甘棠之下其後人思其德尚愛其樹而不忍傷矧先祖手所親植者乎宜乎孟持之不能忘也孟持不忘于杏且如斯則夫手澤之在書口澤之在杯捲其所感又當何如哉孟持可謂孝子者矣雖然逺取于物不若近取諸身孟持之身內而心膂外而髮膚非先祖一氣之所分者乎一氣之所分則是身乃先祖之有也葆嗇失宜非孝矣登高臨深非孝矣言行弗擇非孝矣忠節有爽非孝矣涖事不勤非孝矣孟持可不慎乎雖然杏一物耳孟持以先祖手植如或見之則其于身殆有不言而諭者矣豫之云云不置無乃過于思慮矣乎先生曰子之言善不專為孟持頌且有規焉苟以此意為記不徒作矣豫遂不辭次弟其語而歸之孟持名盈清修雅操讀書而嗜文薦紳之間翕然稱之為君子儒云跋東坡寄章質夫詩後蘇文忠公子瞻為翰林學士日章莊簡公質夫以直龍圖閣出知慶州二公素友善質夫以崔徽真為寄者頗寓相謔之意蓋徽乃河中倡婦寫真寄裴敬中而元微之所為作歌者也故子瞻賦詩有知君𬒳惱更愁絶及未害廣平心似鐡之句實解嘲云然二公相謔初不止此質夫作廣帥時送酒六壺書至而酒不逹子瞻作詩戲之且謂青州從事化為烏有先生蓋亦猶前意也質夫乃髙州刺史檢校太傳西北靣行營制置使仔鈞諸孫非惟立功邉徼為國家保障至于辭章亦非人所易及嘗咏栁花撰水龍吟寄子瞻瞻嘆其妙絶來者無以措辭則其尊尚為何如所以善謔者特出于相愛之至情耳非若後人流連狎褻而不知止者也論二公者當以濂言為不誣子瞻之書此詩年已五十又二實元祐二年丁邜故其老氣尤森然云方外老友全室翁出示徵題因走筆識之題馬華甫手帖後右宋參知政事馬莊敏公手書與處州吳府君諱某者也公以寶慶二年王會龍榜下擢第進士六轉而差知處州又四轉自右曹郎官再出知處州政成加直祕閣浙東提舉常平公頻行及遺此書蓋府君以醫名公家有病府君時以藥劑調之故書中有一家老稚恃君以為安之語公之母夫人梁氏春秋已髙先是公嘗奉雲臺祠至是復有陳乞之意不圖改持庾節故書中有親老且病歸心甚切之語當是時措置銅錢且用鹽收楮幣已而又稱提會子以五析二十七界會子五道凖十八界二道故書中有鹽楮更令民聽未孚之語惟公出忠入孝乃其素誠為政寬猛適宜務存大體此固不待後學之所言至于不忘故舊移書致謝詞氣謙抑風義藹然又豈淺丈夫之可企及哉捧玩遺墨徒慨仰者久之府君諸孫從善為工部主事與濂同朝裝潢此卷求題其後因不辭而書之公諱光祖字華父金華人吳濰州文集序唐子西云六經之後便有司馬遷班固六經不可學學文者舍遷固將奚取法嗚呼斯言至矣濂嘗諷二家書遷之文如神龍行天電雷惚恍而風雨驟至萬物承其􅐮澤各致餘妍固之文類法駕整隊黃麾後前萬馬夾仗六引分旌而循規蹈矩不敢越尺寸嗚呼法之固堪法其能以易致哉然而淵沖之容可以攬結雄毅之氣可以掇拾古語有云取法者冝上固當有潛心而願學者矣濂猶恨未見其人豈逸駕奔馳實不可攀歟抑去古逾逺聲光不可得而襲歟吾友吳復德基同郡人也自幼抱逸才一下筆間飄飄有竒崛氣逮長日取二家書玩繹弗倦超然若有得揚揚出謂人曰我知學司馬遷爾我知學班固爾諸子蓋不足多也濂頗畏之疑之自後德基去丞南康令安化今將出守濰州與濂胥會南京持所製文一編且讀且譁曰我此文近遷固否濂見其徑硬如屈鐡竒悄如削懸崖澤媚山暉如藴珠􅉼璧始而大驚中而釋所疑終則益畏之而發不可企及之嘆嗚呼善學遷固者世久罕聞今乃見其人哉雖然立言如六經此濂夙夜所不忘者德基尚朂之毋徒泥子西之言而自沮也書前定三事永嘉林君伯恭為濂言溫生延祐丁巳八月八日至三歲父命名榮祖又十二嵗更今名又十嵗當至正辛巳以春秋經試江浙鄊闈溫名第一董彛第四董朝宗第五朱公遷第二十八實殿榜後榜中孔暘王孔文髙祿鄉潘如圭四人皆再薦溫上南宫不利以恩例置奉化州學正丁亥始之官會董彛亦為學正慶元交談之頃彛慨然曰吾父諱伯大嘗出應書大父得竒夢記諸籍云丁巳年九月七日夜夢林溫作魁宋姓人鎖榜第四第五人連姓董內四名用朱筆點云是舊請舉者稽之于今無有不合其最異者溫之生甫一月爾奉新王君文博復與濂言載夢與劉鑄到南昌經江西省署見放鄊貢進士榜諦視之髙懸朱牌十枚上書金字日光炫耀不可讀忽一隸卒前白曰第一名南昌熊誼汝居第六遙呼鑄曰爾名亦在後須臾有紅英佩刀者十餘人自省中歡而出似相迫逐載驚窹明發與人言皆大笑當是時大都督朱公鎮南昌干戈方殷謂安有貢舉之事後八年為洪武庚戌始設科江西四十名額南昌占其十十名中熊誼冠首正符朱牌之數載却在通榜第六鑄居十九及試大廷載又中第二甲第六名一一皆驗濂聞此二事頗異之且言于金溪吳君伯宗伯宗曰豈惟是哉庚戌之夏五月二十二日臨川通判王黻夢城中作樂迎狀元黻甚訝之二十五日忽聞使者來頒科舉之詔其年秋伯宗濫充江西鄊試第一衆已為與夢叶至廷對之日復擢置榜首鄊里至今以為美談濂觀傳記所載前定事如此類者甚衆未敢信也今親聞三君子之言其有不可信者乎姑書之以見人囿氣化中誠有一定之數不可以智求不可以計免也自修之外一聽于天而巳送黃贊禮涖祀閩省詩序帷洪武七年十有一月庚辰皇帝御奉天殿視群臣早朝太常卿唐鐸奏曰臣昔受明詔天下行中書其祠山川百神或未致恪虔冝令朝士涖之臣于浙鄂齊汴暨于豫章已嘗奉命從事若晉若燕陜若閩蜀若廣東嶺南逺者七千里近亦不下四三千冝預遣使者期以明年春二月集事臣眛死以上制曰可於是遴選奉常官屬及儀曹主事凡七人時贊禮郎建安黃淵靜實與其列越三日癸未陛辭上諭之曰敬恭明神古今恆道也况瀕祭之時乎祭在他人亦所當慎况職在奉常乎已盡其職猶難况欲涖人而使其莊敬乎皆不可不察也爾等聞命之後雖跋涉乎險阻一言一動有赫其臨參前倚衡無乎不在勿使一髮非僻之干庶幾不廢朕命不然人非鬼責將不可逭矣衆皆稽首至地而退既退復敕儀曹各賜衣一襲又明日甲申啓行前御史中丞劉公伯溫參知政事陶公中立吏部尚書詹公同文今禮部尚書牛公上良咸以為淵靜遭際昌期獲將使指以臨蒞祠事可謂寵榮也已各賦詩以為贈而文學法從之臣藩府成均之賢與夫方外岩穴之士亦見諸聲歌以華其行淵靜請豫序其作者之意肆惟皇上宅中圖治其對越昊天毖祀干上下齋袚一心凝神于惚恍之中如將見之群臣之助祭者丁逮胞翟之賤亦皆有孚顒若以致鴻休荐臻甘露霄降三秀呈瑞彩霞結鳯白烏翔飛和氣充牣化為豐年此蓋精明之德放諸四海而凖無不駿奔走執豆籩以薦德馨然猶慮藩垣之臣未盡體內廷之意遣使四出以監視之方于古昔帝舜之望山川遍群神姬周之咸秩無文下是過也有君如此其忍負之今淵靜之往也冝精白志慮靈承上訓壇廟有缺圯者葺之服器有弊汙者易之牲牷有不肥腯者罰及之將祭之夕端笏垂紳正立壇之左右申以聖天子成命使百司及執事之人祗奉明畏有若天威咫尺升降俯伏穆然無聲牲爼苾芬庭燎有輝神靈洋洋昭格于上則夫藩釐之錫淵靜亦當與有之矣淵靜行哉雖然神人相依者也南閩當兵燹之餘黎民創殘其或有未起者乎縱曰起之其興利去弊之政或未能盡行乎淵靜冝廉知之歸告于上此于人神之道所謂兩盡者也淵靜行哉重建繩金寶塔院碑南昌之城南有佛剎曰千福相傳唐天祐中異僧惟一之所建也當經營之初發地得鐡函四周金繩界道中有古劒一設利三百餘顆青紅間錯其光燁然于是建寶塔取設利藏焉改千福為繩金塔院落成之日爇梅檀香香氣鬱結空濛中僧伽大士顯形于其上正與塔輪相直萬目咸覩君子疑異僧蓋大士之幻化云𥘉郡多火災堪輿家謂塔足以厭勝之巳而果驗宋治平乙巳知軍州事程公某以其有關于民最為吉徴鳩錢二十五萬修之紹興庚午尚書張公某來佩郡符復倡衆洊葺之一旦塔影倒現于冶工遊氏家上廣下鋭層級明朗寶輪重蓋一一具足元至正壬寅戎馬紛紜院宇鞠為椔翳雖兹塔巋然獨存瓴甓亦且摧剝殆盡乙巳夏六月院僧自貴與弟子匡弘同𫀆善慧各抽衣盂之資創庫堂于東偏日夕以興復為已任國朝洪武戊申夏四月清泉蘭若僧道𬈑與前三比丘披伽黎衣手執熏爐向塔前發大弘願曰惟塔廟之建起信心而入菩提今廢壞若是不可以不圖溟等誓盡今生為之惟威力加護焉誓畢持曆走民間施者多應其月癸丑衆工皆興趨附如蟻忽有巨甓自顛墜稠人中咸無所損傷又明日乙邜五色光起塔間豳豳熒熒圍繞良久而殁冬十一月某甲子塔完塔凡七成成各六稜環以峻宇前敞小殿以奉僧伽大士欄檻堅緻洞户玲瓏簷牙翬飛寶鐸如語觀者以為帝釋天宫所造化現人間己酉春正月道溟示寂匡弘等嘆曰院役其可不終事乎益聚施者之財于冬十有二月造釋迦寶殿一所摶土以肖三世諸佛殿後復􅌟屋三楹間直逹僧伽之殿中塑曼殊師利普賢觀自在三尊像莊嚴岩岫從璧湧出挾以兩廡前至于三門門內甃以方池紺緑可鑑一如大伽藍之制訖功之日則甲寅冬十一月某甲子也惟我如來弘開度門樹塔立廟所以使其見像起信信為一切功德毋萬善皆自此生非徒聳觀瞻而巳也矧能助地形之勝消弭災害隂隲生民廢而不興是豈人情也哉道溟之與三比丘精進弗懈終能遂所志而後止非其才有過人者不致是也匡弘等不逺千餘里來請豫記因為歷序其事而絲之以贊曰稽首大慈父利益于群生塔婆之所建種種諸方便聳起霄漢間有如蒼龍角人有遙觀者至誠皈命禮不待登伽藍已足攝憍慢所以四大海無處不建立異僧何國人杖錫來洪都指地發鐡函中有設利羅光耀奪人目其數過三百封緘重瘞之樹塔鎮其上四衆方作禮香霧空濛中乃見僧伽像作彼慈憫相身𬒳鬱多羅手執青楊枝欲關甘露門以解熱惱故成壞雖相尋神幻終不滅影倒冶工家下鋭而上弘化導于衆生示以順􅊇故忽遭戎馬興鞠為椔翳埸巋然撼風雨中有不壞者溟等發弘願誓加莊嚴力熒熒五色光出現于塔表萬目皆瞻仰以為未曾有施者如川至不日告成功欄楯互周匝洞户各軒敞帝網日交參寶珠仍絢爛繪畫諸菩薩以及天龍衆擁護于後先生獰若飛動自茲彈指間湧殿及崇閎一一皆現前鎮茲清淨域福遍一切處畢方不敢見永無鬱攸孽人見有為迹不知皆無為會事歸一心無非無上道我今作贊辭筆下起樓閣內有無縫塔光覆大千界一涉思惟間即墮外邪見黃仁淵靜字辭有序建安才俊士曰黃生名汶仁負超群之資朝出受易于部使者陳孟龍至暮抵舍復質所疑於仲父居德亦竒男子年十六時中私試髙等諸老生不中譁于庭居德因請靣試上官前譁者執筆不能下面頸發赤以出以故生內外皆得師學之日進如水湧雲集洪武辛亥秋有司賢之以生名上福建行中書試藝棘闈八府之士充貢者二百而司文衡者又前進士林以順吳尚志郭麟江惟志也取舍甚嚴或懼不獲在茲選及榜出三十人中而生名居其四遂為易經諸義之冠生之年始若齡耳明年會試南宫銓曹急于用才不俟再試擢奉常贊禮郎階入八品有識之士無不為生榮雖余亦愛生甚時以問學朂之生因執經從余學間拱手而言曰仁𥘉名文仁有司援例以文犯周西伯之諡加水于其左及解名上中書吏以白右丞相汪公公曰仁之義甚弘無所不包其可冠以汶字乎冝去之先逹因取魯論仁者靜之言字以淵靜願先生詳發其義嗚呼考亭朱子釋此至矣余向以言為雖然不可無以答生之意生之賦資固超羣而求仁之方不可不力也為序其事而申之以辭曰仁體凝重屹弗遷振古雄峙如山然生意周流踵至顛一息有虧用則愆爾生心澄靜若淵萬象森列具不偏返觀沖漠無後先其機或動矢發絃雲行雨施出自天神功不宰超虛玄全體大用昭以宣上師周孔下淵騫縱不及聖肯下賢流光不駐若電煽生其夙夜加勉旃宋學士文集卷第二十三翰苑續集卷之三
