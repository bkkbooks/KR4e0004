body:
  text: 洪武十年二月十二日翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫臣宋濂謹上表致政謝恩箋翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫臣宋濂誠忭誠忭頓首頓首上言近者欽蒙聖恩追贈二代許臣致仕還鄊臣自正月𥘉六日陛辭十日發舟二十七日至家二月𥘉三日詣墓所祭告昭宣制命龍光烜赫下燭泉壤鄊里親朋一時畢㑹相與嘆慕以謂天朝待士如此之至莫不感激思奮此皆皇上之大德殿下之深恩顧臣區區何以圖報於萬一臣聞古聖人有言曰為君難其所謂難者何也然以四海之廣生民之衆受寄於一人敬則治怠則否勤則治荒則否親君子則治近小人則否其機甚微其發至於不可遏不可不謹也所以二帝三王相傳心法曰德曰仁曰敬曰誠無非用功於此也治忽之間由心之存不存何如耳臣誠忭誠忭頓首頓首恭惟皇太子殿下仁孝溫恭出言制行動合至道中外無不仰望而臣猶以二帝三王相傳心法為言者誠以為君之難也臣雖退居田里而忠愛之心彌切旦夕不忘於是敢貢芻蕘之言伏望殿下察臣所言而篤行之則天下幸甚臣無任瞻仰激切屏營之至謹奉箋稱謝以聞臣誠忭誠忭頓首頓首謹言洪武十年二月十二日具官臣宋濓謹上箋進賢朱府君碣先王之法不行於後世道隱民散仁鄙夀夭貧賤強弱為吏者多弗暇問於斯時也百里之邑苟有忠信之士聳善扶誼以禆助於政教不亦空谷跫音之可喜乎如府君者誠可銘巳府君諱志同字與可姓朱氏進賢朱方里人曽祖仁無嗣其妹適宋某年進士豐城袁某生梓梓遂來為仁後府君之祖也父粹中字幼純漕貢進士有材略德祐世變能聚兵立堡以衛一鄊寇鋒不敢近府君天資亮直尤好赴人之難科繇或不平視其力單者佽助之閭右作威福鉗劫細民不敢少吐氣府君奮然為直於上官人人敬畏不敢作非義事縣大夫聞之嘆曰是剛介不羣者也是有𥙷政教者也遇以賔禮民間利病必一一詢之府君為之傾盡邑以治最聞天曆已巳大儉民有菜色部使者行縣延府君于庭叩以勸分之䇿府君曰進賢雖小邑其藏粟者何翅百家計其飽妻孥外有餘則輸于官分給餓夫使者一磬咳間所活數十萬不難也然示之以至仁布之以大公衆將樂於從化願力行之行之當自志同始使者曰君言是也命即為之三百里間無填溝壑者府君義聞彰著監察御史有嘉其能者首以茂才薦府君自度不能隨俗浮湛力辭不就築室白湖嶺之隂鑿池種樹若將終身揭文安公為扁堂曰真村文白先生范公亦為賦詩江右學者多傳誦府君篤於訓子闢館舍聘名師使其子渙就學族姻子弟貧而無資者悉聽已而渙學大進如水湧山出復使褁糧逺逰以充其學識東脯裝錢之費雖鬻産給之無倦色不幸渙早世府君嗚嗚而泣復召諸孫夢炎訓之如訓渙夢炎晝夜奮勵雖寐不敢忘學既成登至正辛卯進士苐奉觴為夀府君喜曰爾不負吾所屬矣元季兵起夢炎奉府君辟地南昌之蜀溪未幾以疾終癸巳春正月某日也壽六十六秋八月某日始自蜀溪奉柩還葬白湖嶺之白楊坑𥘉府君愛白楊風氣回旋有卜藏兆之意及是見夢於人曰吾將寧魄此地矣衆咸異之府君性耿介人有過必詰責之雖面頸發赤不少恕家政嚴肅闔門千指罔敢有違教條其於勢利分華之𣣔則淡然無動於中鼓琴吹簫酣咏水光山色間有不知老之將至也娶臧溪吳氏子男二長即渙卒時年三十五能古文辭虞文靖公甚器重之遺槀若干卷其門人袁鑣鍥梓以傳次紹信後府君四月亦卒女二舒某胡某其壻也孫男六曰和曰夢炎通歷代文獻之學如指諸掌禮樂家賴之曰良曰厚曰碩曰惠曽孫九則以進以任以武以應云云也府君葬後二十五年濂待罪國史夢炎官于儀曹實與之同朝夢炎自狀府君行持來告曰李翶有云先祖有美而不知不明也知而不傳不仁也夢災竊為此懼願吾子有以卑矜之墓門有石亦既琢而礲之矣濂不敢辭銘曰剛腸斥邪徑弗折一見未語心已惕庶幾今逄古遺直義聞如泉漸洋溢勸分有䇿昭厥績繡衣使者加薦辟堅臥不起志非激膏肓久矣縈泉石少微皇昏風夜黑白楊有祥閟玄室孰不霣涕何嗟及有孫文章成五色君子於茲觀世德先大夫碑隂記惟我顯考府君宋公樹善深長不自食其報持以覆燾後人致使不肖濂獲際昌辰忝以文墨事上授經青宫當侍講禁林之日特膺寵數錫贈顯考府君中順大夫禮部侍郎顯妣陳氏德人濂時侍上左右不敢稍離於是遣殿廷儀禮司序班曽孫慎􅐚奉制書展告墓次曽未幾何升濂翰林學士承㫖例得追封二代更贈顯考嘉議大夫禮部尚書顯妣淑人顯祖考贈亞中大夫太常少卿顯祖妣金氏淑人而其誥辭乃上所親製褒錫有加焉濂亦蒙恩致政而歸方克躬詣兆域奠告如𥘉惟是皇仁如天溥博無際澤及九泉敻絶前比深懼無以垂示悠久因請前丞相汪公朝宗大篆其所贈官封勒石冡前一以侈上賜一以昭先德使後世萬子孫思忠思考永不忘乎君親斯蓋濂惓惓之深望也洪武十年夏四月前翰林學士承㫖嘉議大夫知制誥兼修國史兼太子贊善大夫介子濂再拜謹記介孫中書舍人璲書丹篆題故葉夫人墓碣銘山西提刑按察司僉事張孟兼請余銘其大母葉氏之墓凡三年矣豫時供奉詞林日以文墨事上竟弗暇為今蒙恩休致家居而孟兼亦豫告省親道過豫門又復以前事為屬其言極慘戚豫何忍不為孟兼一銘之乎孟兼之言曰大父年踰六袠而未有孫及生孟兼具牢醴饗賢士大夫且曰吾衰矣不意垂殁之年獲抱孫焉於是賢士大夫咸起舉觴為夀未幾大父亡大母見孟兼輒泣尤愛憐之孟兼病創瘍浸淫𬒳體晝夜啼不休大母與乳母范鞠諸房中親為傳藥節宣其食與衣見其學步學言每為喜動顔色巳而嘆曰恨不令汝大父見之年十九禮冝授室始離大母左右逰學城南師事聞人先生辨析六藝采刺為篇章久之乃歸大母喜倍于前已而復嘆曰恨不令汝大父見之歲乙已朝廷下詔求賢以圖治安州縣不以孟兼為不敏交章薦之孟兼將赴京大母執孟兼手泣而言曰汝大父念汝甚唯寐忘之不幸不見汝之成立汝今𣣔入官當夙夜盡心以奉公上庶幾不辱于前人老身雖即暝目無憾巳孟兼謹佩服之弗敢違既至蒙恩擢國子録轉主事儀曹遷丞奉常凡歷八春秋屢思謁告覲省動有物尼之洪武五年十一月二十曰嚴君以書來曰汝大母以今日終臨終無他言唯曰吾年七十又四分當死百無所慊干中獨惜不與吾孫一相見耳孟兼讀巳五內分裂恨不即死相從於地下禮部尚書陶公白干丞相府遂以上聞獲還哭於墓次時大母祔葬大父徐山兆域距卒時巳三十四日矣自時厥後孟兼出為今官尋升山東提刑按察副使痛念祿足以充養而大母遽捐館舍衋然傷心然非辭章無以白大母之行而泄孟兼無窮之悲焉所以不避譴呵而頻瀆於執事者職是故也豫聞之亦為之愴然嗚呼余何忍不為孟兼一銘之乎葉氏諱某杭之仁和人父信母某氏世以種善聞年三十歸浦陽張府君鎮𥘉府君娶同縣陳氏無子葉氏來為之側室性慈惠柔順事陳氏如事姑復好施與逄單窶無倚者捐所有物資之弗靳三族翕然稱其賢生一子垕二孫長即孟兼次善一孫女適某四曽孫鈞朝幹全豫自少齡恆得驚風疾數涉阽危賴祖妣金淑人保抱携持以全性命竊祿熙朝位躋法從常思有以發揚潜德而一時故老號稱能文辭者先後澌盡竟無從求之方戰惕不自寧而孟兼乃惓惓徴銘弗懈亦可謂知其所重而竭報本之誠者豫頗愧焉嗚呼余何忍不為孟兼一銘之乎雖然孟兼以文章政事著聞當世繡衣直指威讋暴彊其大父母雖不獲見亦足以慰九泉之望銘與不銘未足深議也銘曰君子抱孫以其繼宗也斯勤斯恩奚暇計其瘝恫也珠之藏槖玊之藴璞寶之俾有終也為盤為敦光燭於外大顯厥庸也樂石勒銘樹之林塋馬鬛其封也跋張孟兼文槀序後濂之友御史中丞劉基伯溫負氣甚豪恆不可一世士常以屈強書生自命一曰侍上於謹身殿偶以文學之臣為問伯溫對曰當今文章第一輿輪所屬實在翰林學士臣濂華夷無間言者次即臣基不敢他有所讓又次即太常丞臣孟兼孟兼才甚俊而竒氣燁然既退往往以此語諸人自以為確論嗚呼伯溫過矣濂以無根葩澤之文何敢先伯溫今伯溫之言若此其果可信耶否耶縱使伯溫非謬為推讓者才之優劣濂豈不自知耶伯溫誠過矣唯言孟兼才之與氣則名稱其實爾今觀所造孟兼文槀序嘉其語粹而辭逹他日必耀前而光後其惓惓猶前意也伯溫作土中人將二載俯仰今古不能不慨然興懷孟兼請濂題識序後因書伯溫昔日之言以表吾愧操觚之時淚落𥿄上洪武十年三月二十五日重題玊兔泉卷後泉地産𥘉何與人事世目之為貪為盜不過藉其名以厲人行泉固自若也金陵有泉曰玉兔甘潔異常或者悼其不幸為姦檜所發或者以檜之惡無汚泉之清爭出巧辨嘵嘵不自休嗚呼安得莊生齊物之㫖語之者哉部使者張君孟兼將上山東出示此卷請重題其後題巳孟兼曰先生可為調人之官矣一笑而别題苦寒詩後亡羊先生多與余論詩大概以句豪韻險為工此篇法韓退之而尤務出竒者也精於詩者必能辨之報恩說為罕無聞沙門作如來所說父母恩難報經云父母於子有大增益設使右肩負父左肩負母經歷千年正使便利背上未足報父母之恩佛言如是則凡有父母者不問在家出家皆當報恩何以故我之䏎膚筯骸非父母不生我之飢飽寒燠非父母不節我之出入勞逸非父母不念我之就安避危非父母不分我之循理屏𣣔非父母不教我之離俗學道非父母不成父母恩德至廣至大雖竭恆河沙算數亦不能盡天台有一沙門名愛如虎狼瓜牙銛利能吞噉一切有生等類窺伺搏噬最可怖愕能割愛者乃菩提道愛如魑魅幻化不一能迷惑一切修善之土傎倒錯繆喪其本真能割愛者乃菩提道愛如敗航檣傾楫弊能沉溺一切渡河海者漂流轉徏不到彼岸能割愛者乃菩提道愛如枳棘叢生道傍能鈎罣一切塗行商旅冠服綻裂惱人心意能割愛者乃菩提道愛如傾崖摧墮無時能壓碎一切動植諸物有識無識皆為虀粉能割愛者乃菩提道愛如蚖蛇口噴毒火能戕賊一切血肉身軀裂膚墮指受其毒苦能割愛者乃菩提道以是思惟愛之為害不可具言沙門汝善念之汝能割愛即可破妄汝能破妄即是返真直入菩提之路福德所𬒳無量無邉雖聚七寶髙如蘇迷盧山待用布施不是過也是為大功德力是為不思議勝力是為十方大覺如來三昧神力報父母恩孰出於此沙門聞巳得大饒益頓然了知恩愛本空法塵清淨雲寓軒詩并序龍虎山錬師張君仲育嗜學而攻詩尤善鼓琴嘗汗漫逰于湖江自謂若白雲出入空谷杳無㝎蹤遂以雲寓名其軒命弟子上官若冲來請余言夫膚寸而起倐然羃乎太虛者雲也英英份份資一氣之流行固凝而聚矣已而飄忽乎東西斂跡藏形類若不知所之此無他雲無心也方外有道之士茹术餐霞捐去塵俗之纍翩翩然御風而逰玄間來無所縶去無所繫絶如雲之寓乎太空此無他亦無心也仲育取寓雲以名軒不亦宜乎豫聞至人不物夫物然後能齊於物仲育自比於雲善矣而未免物於雲也物於雲則有礙有礙則不虛不虛則靈明不通矣我不為靜而動何形焉我不為動而靜何容焉是則動靜一如也我不為雲則夫卷也孰從而舒之舒也孰從而卷之是則卷舒亦一如也仲育試澄心默坐存神於鬱羅簫㙜間冲莫無朕而萬象森列其中而吾神未嘗形也未嘗形而雲果孰寓乎豫當約仲育逰金庭委羽之墟勺松華泉擘麟脯而食之且請仲育出琴彈白雲之詩琴調清越群仙或有驂鸞來聽者矣寓雲與否非所敢知其詩曰雲溶溶兮無根倏聚曶散兮不知其門變化罔測兮契乎道真龍虎名區兮列仙之倫剪雲製衣兮結雲以為神超然髙潔兮日與雲而相鄰步虛九天上兮不沾世氛水火交媾兮日月吐吞雲兮雲兮豫寓爾以終其身史處士墓版文四明有宋宰相家史氏世居鄞縣六世祖詔政和中舉八行不就詔生師仲父子俱贈太師追封越國公師仲生浩以舊學相孝宗官至太師保寧軍節度使封同魏國公追封越王諡忠㝎越王生彌逺相寧宗理宗官至太師保寧軍昭信軍節度使封㑹稽郡王贈中書令追封衛王諡忠獻衛王生宇之官至正奉大夫觀文殿學士封奉化郡公郡公生熹卿入元不仕熹卿生處士諱佾孫字列父潔白如玉顴輔秀整風神皎如也賔客至輒岸㥽笑咏終日或出壼觴共酌獻酬疊舉意度􅈺雅如晝及酒酣耳熱稽史談經雜以前朝典故蟬聮弗絶聞者曰此故王孫也冝其博習文藝度越恆人哉由是逺邇賢大夫無不與處士遊而袁文清公器之尤深竟以女妻之元故事宋宰臣之孫多因門第𥙷官者或憐處士才髙勸投牒自進處士嘆曰吾家三世相宋開國嗣王入居臺寺為九卿為法從者不翅二十輩出膺郡二千石縣大夫之寄復簮組星列可謂極盛也已盈虛損益天之道也貴與富豈專萃吾一門耶國之守龜尚或不保於吾家何有自是益韜光斂彩繫情名山水間或采芝巖阿或藝蕳川澨世上升沉事若無聞知晚年貧尤甚飲水著書超然能忘其憂君子謂處士類知道者𥘉處士早喪親弟與妹絶幼處士育之使成傾資為昏姻之費儀物充衍人以為不失文獻之舊歲時奉祭事甚謹盥薦陟降儼若祖考昭格于上竣事而燕宗黨子姓咸集處士備舉纍世德業懇懇言情辭悃愊無華聽之者興起生平宅心樂易喜怒不形於色卑抑謙退如懦夫然識與不識皆稱為善人君子云洪武八年秋九月十七日處士以疾卒夀七十八九年某月日葬縣之陽堂鄊金􅓝先墓兆次妻即袁氏先四十六年卒子二人公敬公襲公襲為弟佑孫後女一人歸余思永公敬之子六人欽祖靖祖端祖暗祖暉祖明祖欽祖暉祖蚤世女一人歸樓守誠公襲之子四人㝎祖獻祖文祖復祖文祖夭女一人歸張守義曽孫男三人必寧必玄必和處士卒後之三年㝎祖蒙恩特除中書舍人與豫子璲為同官乃持國子録張欽所撰事行介璲求豫為之銘嗚呼伐閲之家非世其祿為艱而世其德為艱使其鮮克由禮以蕩陵德實悖天道雖紆朱拖紫上繼祖父論者不以為貴苟恪守儀則縱沒身於韋布間孰謂其非賢哉若處士者有足尚巳嗚呼八行君隱約布衣而啓三相國之盛處士之德將無忝於君者也公侯必復其始尚當於其後人徴之銘曰浙河之東史稱名門三世宰輔榮光燉燉為其後者非賢孰繼伊處士君執謙蹈義人爵或來實命之由天爵之貴敢不自修我言既飭我行又方誰云荷衣不比繡裳有虛有盈天之恆道安分而行樂善為寶既享上夀復多子孫濟濟彬彬必復其原金􅓝之里陽堂之鄊有墳八尺王孫之藏贈助教文集序臨川曽先生旦𥘉所為文凡若干篇其門人某類編成書而以首簡請余序序曰天地之間萬物有條理而弗紊者莫非文而三綱九法尤為文之著者何也君臣父子之倫禮樂刑政之施大而開物成務小而禔身繕性本末之相􅉼終始之交貫皆文之章章者也所以唐虞之時其文寓於欽天勤民明物察倫之具三代之際其文見於子丑寅之異建貢助徹之殊賦載之於籍行之於當世其大本既備而節文森然可觀傅有之三代無文人六經無文法無文人者動作威儀人皆成文無文法者物理即文而非法之可拘也秦漢以下則大異於斯求文於竹帛之間而文之功用隱矣雖然此以文之至者言之爾文之為用其亦溥慱矣乎何以見之施之於朝廷則有詔誥冊祝之文行之師旅則有露布符檄之文託之國史則有記表志傳之文他如序記銘針贊頌歌吟之屬彂之於性情接之於事物隨其洪纎稱其美惡察其倫品之詳盡其彌綸之變如此者要不可一日無也然亦豈易致哉必也本之於至靜之中參之於𣣔動之際有弗養焉養之無弗充也有弗審焉審之無不精也然後嚴體裁之正調律吕之和合隂陽之化攝古今之事類人已之情著之篇翰辭㫖皆無所畔背雖未造於至文之域而不愧於適用之文矣嗚呼文乎其可易言矣乎今吾先生淹貫羣經所謂三綱九法其文理之粲然者加體索而擴充焉嘗以春秋連貢于鄉科目既廢益寓意於古文辭用功於動靜者久聲光燁然起士林中豫取而讀之藻火黼黻之交輝金聲玊振之迭奏魚龍波濤之驚迅一一可以適於世用信夫萬物各有條理者於先生之文亦可以見之余在詞林先生方助教成均朝夕相與論文甚歡故因其門人所請推原文之至者而為之序著源委之真𣣔體用之兼舉也復古堂記監察御史虞泰魯瞻嘗奉諸父玄佐之命請記其所名復古堂者豫以不文固辭而魯瞻請之益勤乃叩之曰子之所謂復古者以為上古乎上古之時巢居而穴處汗樽而柸飲茹毛而飲血子今有室廬器用之美稻梁羊牛之饒决不能復之以為中古乎中古之制冠辨裳衣以定其分䁀彛罍爵以稱其用門奧屋漏以嚴其居筵榻格几以殊其度雖曰異於上古有可法者子今狃於久安必隨世而變遷想亦未易以復之也然則子之復古者將何居魯瞻笑曰非是之謂也虞氏之居餘姚自漢日南太守以來代有顯人至唐永興文懿公為尤著文懿公實泰之逺祖流裔至今二十七世矣嶼山之南有虞家城周圍一百五十丈相傅以為故宅之基尚巋然獨存諸父每相與登眺白烟凉草觸目悽然輒彈指嘆曰虞氏之先嘗光著矣奈何無迓續徽猷者乎復古之名蓋以此也豫曰繼志述事孝子慈孫所當為况思追紹於七百餘年之前此其見之確行之厲是足尚已第不知復於古者果止於斯否乎魯瞻曰何謂也豫曰文懿公之為人外謹懦而中抗烈固以文學政事圖形凌烟而為唐代名臣較之同時孔司業之經術杜萊公之政業議者有未足焉孔之與杜然矣較於漢之留侯及董江都其運籌之良宅心之純或猶未能無遺憾焉以此例之古今人物其優劣不倫雖更㒒未能盡也𣣔師古者冝取則於上上賢者在古亦衆矣何獨私於一家哉魯瞻曰先生之言侈矣留侯之與江都信足法歟余曰不然也古之人以道德為師者有孔子焉有孟氏焉以政業居輔弼者有伊尹焉有周公焉人而不為孔孟伊周其學皆苟焉而已子將復古必如斯而後可爾魯瞻曰敢問復之之功奚先余曰載藉之存者莫古於易伏羲之卦文王之彖周公之爻孔子之繫於是乎悉備姑摘一二陳之風自火出家人君子以言有物而行有恆此身正而家齊之象也洊雷震君子以恐懼修省此自治之象也山附于地剝上以厚下安宅此安養人民之象也雷電皆至豐君子以折獄致刑此聽訟之象也自此而推一卦一爻皆開物成務之道也魯瞻父子夙夜䆒心於斯此則所謂真復古者過則聖不及則賢逹則兼善於人窮則獨善諸已復古之功不亦大㦲若曰沾沾焉取則於一家不幾於自隘矣乎請以是記諸屋壁魯瞻母以余言為誇而棄之玄佐名某以經學教授于鄊言行有師法魯瞻學有端緒自給事中遷今官正氣蓋凛然云故鄭貞婦賴氏墓志銘貞婦汴賴氏子故為聞人家宋南渡後有仕于溫者遂遷焉父諱某母某氏貞婦生有淑質父母慎擇配偶㑹深之鄭君信與其妻王氏亦寓于溫素稱有家法其子曰誠字文質復俊爽異常倫俾歸之貞婦年二十矣貞婦奉尊章無違禮身蹈儉素不習流俗侈靡事三族以為能生二子德善而鄭君自李陽河巡檢遷廬之稅使乃徙合肥居久之鄭君殁反葬于深王氏念之弗置𣣔歸省丘墓誠飾板輿送其還未幾王氏殁誠亦以哀毁終深之宗人曰是母子者不𣣔忘其鄉土者歟盍同葬焉因相地卜時成禮貞婦聞之大慟幾絶即服惡笄服朝夕哭奠人有慰之者輒對曰我未忘人耳尚何言誓不再適以樹立鄭氏之門如此者五十餘年如嚴霜烈日可畏可仰善既不幸早夭刻意訓德從名儒逰迄于有成今擢太醫院判官階保冲大夫世稱其為有子貞婦生于至元壬午四月五日卒于至正辛丑七月十七日夀八十歲二子唯有一存孫一人素孫女二人適太原護衛鎮撫金華吳翰舒城宋謙曽孫一人天保德念母恩如天之罔極𣣔圖不杇于文子間介安次王普狀徴余為之銘銘曰鄭婦之行可謂貞矣其恆如松之不變其潔類玊之無瑕所以得令子以昌其宗嗚呼此非易所謂安節之亨者乎劉母賢行詩集序劉賢母王氏諱某太原崞人也年十八歸處士仲安踰再期生一子溥又八年處士君殁賢母自誓曰吾聞貞婦不二夫生為劉家婦死為劉家鬼無子當爾况有子者乎確守其志堅如鐵石家素貧逮處士卒貧益甚治絲枲自給衣僅蔽身曰唯一食艱瘁不可言處之恆裕如也里豪武氏子知賢母貧或可撼使猾嫗誘而且脅賢母痛詈斥之終不移所守親督溥從鄊貢進士趙惟賢國子助教張傳霖逰師若友有益溥者賢母遇之厚不以貧而廢禮溥後以文行聞卒為名士賢母性儼恪有烈丈夫風未嘗輕于笑語契家子姓見之輒敬畏下拜人因號為鐡面夫人云里婦有淫行招搖行市中賢母知其所從來以所曵杖擊之婦哭訴于夫夫曰劉夫人何故撻爾耶慚服不敢言有姑適賈氏老而喪明其子某每咈其意姑必泣告賢母賢母造門而喻之輒踰垣避去某處士之外弟也亦嚴憚之如此他蓋可知也年七十餘而殁當時南北名士大夫咸作詩文以美之命曰賢行詩集云嗚呼詩者發乎情而止乎禮義也感事觸物必形之于言有不能自巳也昔者衛共伯早死其妻共姜賦柏舟以自誓一則曰之死矢靡他二則曰之死矢靡慝至今讀者為之感激奮勵豈非有繫彛倫之重者乎今也賢母之志與共姜同雖不自賦詩而世之士大夫推其意而代之言此蓋出于民之性而先王之澤也是宜刻梓傳世以為人婦者之勸雖然詩人之吟咏夥矣類多烟霞月露之章草木蟲魚之句作之無所益不作不為缺也華編巨冊摹印而行者比比有之其視賢母之詩有𥙷名教者為何如哉知道之士必有擇焉刪烏城志元至正七年冬嘉禾城西有烏數千營巢於地圍八尺崇五尺晝夜弗休類有物督迫之者未幾大盜弄兵海上紅巾繼起江淮皆繹騷朝廷遂詔州郡築城築城自嘉禾始亦異哉唐貞元中田緒境內烏銜木成城其崇則縮五之二其圍則至數里之廣所以德宗有播遷之禍今元亦馴致喪亡先儒謂社宇啼天津橋南方地氣先應亦是類歟吳僧本誠著烏城志五百餘言豫愛其文特刪之以附集中本誠字道原以能文名宋學士文集卷第四十一芝園集卷第一
