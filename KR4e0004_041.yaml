front:
  text: 皇帝陛下以布衣混一四海如漢髙祖以仁義化𬒳萬方過唐太宗宵衣旰食孜孜圖治𣣔使天下蒼生無一夫不𬒳其澤雖以臣之愚陋無尺寸之功亦蒙寵遇如此之至銘心􅍢骨誓不敢忘自度無以效犬馬之誠唯朝夕焚香上祝千萬歲夀及以忠勤教子孫俾世世母忘陛下深仁厚德而己臣無任瞻天仰聖激切屏營之至謹奉表稱謝以聞臣濂誠歡誠忭稽首頓首謹言
