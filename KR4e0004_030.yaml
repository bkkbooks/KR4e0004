front:
  text: 宋學士文集卷第三十翰苑續集卷之十
  hash: sha256:339bdd8a60b6c1adc69ac0d14ed983acdd13a4d6aaf75a9f7375a65f9eb1c095
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_030-1a}
body:
  text: 傳法正宗記序表大法之真傳起羣生之正信宜莫如書然而真丹身毒相去絶逺梵語華言重譯或殊况屡遭㓕斥之禍生乎其後者必蒐羅墜逸徧觀㑹通然後能定是非之真謏聞之士苟獲窺其一偏遂執為確然之論斯亦過矣嗚呼闢邪說之膠固伸正議於千載之下不有先覺學者将何所從㢤昔者濂讀湼槃經及智度論頗知釋迦文佛以正法授迦葉世世相傳具有明證故自前魏支彊梁樓至洛邑譯續法傳自七佛至二十五祖婆舎斯多而止東晋佛䭾䟦陀羅至廬山所譯禪經自迦葉至二十八祖逹摩多羅而止逮夫後魏之時崇道屏釋而沙門曇曜蒼黄逃竄單録諸祖之名匿岩穴間僅及二十四祖師子尊者而止佛運重啓曇曜進為僧綂吉迦夜等遂因之為付法藏傳其去前魏巳一百九十餘年東晋亦六十二年矣東魏那連耶舎至鄴復備譯西域諸所傳授事跡其次第與禪經不差毫髮則全闕之分有不待辯而自明矣唐興曹溪大弘逹磨之道傳布益衆義學者忌之而神清為甚乃㩀法蔵傳所列謂師子遭難絶嗣不傳猶以為未足誣迦葉為小智不足承佛心印指禪經實後来傳㑹難以取徴而好論議之徒紛紛而起矣宋明教大師契嵩讀而病之博采出三蔵記洎諸家紀載釋迦為表三十三祖為傳持法一千三百四人為分家略傳而旁出宗證継焉名曰傳法正宗記復畫佛祖相承之像明其世系名曰定祖圖申述禪經及西域諸師為證以闢義學者之妄名曰正宗論共十二卷其衛道之嚴凛凛乎不可犯也濂竊聞之太平真君之七年魏太武用崔浩言宣告征鎮佛像胡書皆擊破焚燒當是時諸種經論多煨燼之末屋壁之深蔵盖至扵乆而後出以此觀之曇曜之流固未必能見禪經至扵諸師之論義學者亦未必得盡聞之顧執一時單録不全之文而相為垢病猶将十指而掩日月之光一口而吸滄𬈑之水多見其不知量也大師之辨析夫豈得已者㢤甬東祖杲禪師以誠䔍契道汲汲焉唯恐法輪不運合衆縁重刻以傳嗚呼書不流通與無書等大師固有功扵宗乘而杲公之為則又有功扵大師者也皆不可以不紀因追序其作者之意扵首簡云西甌黄氏家牒記黄本陸終之後受封扵黄若春秋所書黄人是也其後為楚所㓕散居江淮間以囯為氏在宋之季有諱定者家揚之六合為兵馬副都監元兵攻揚定同大将與之鏖戦敗績挈妻孥踰濤江居䖏之龍泉㑹㐮愍公唆都帥師攻䖏定復隨州兵出戦至九里潭力屈就擒唆都命褫其衣反接于樹彎弓而向之曰速降速降不降矢貫汝心矣定毅然弗為動定季女南金聞之獨泣曰女子緩急無用理誠不誣妾雖不才忍見父入鬼籙乎乃脫簮珥蓬首垢面走馬謁唆都曰将軍平江南一才一藝冝不忍棄妾父有大将之畧柰何寘之死地即死愈堅池敵心扵将軍甚無益也故妾含恥耒言將軍苟不聽妾請與父同死誓不獨生也唆都義之即命釋其縳俾􅊢麾下同掠地閩中權授忠武校尉建寕路下千戸且命統精兵擊延平之沙縣定嘆曰吾宋臣也不能死其顙有泚矣柰何加兵向之乃引疾固辭寓建寕之甌寕将終老焉後五年復擢泗州五河縣尹階承務郎未及代又棄官歸以壽考終塟城南蓮華池上定娶某郡連氏生四子世部世衡世得世虎世衡郢復翼緫把緫把軍職也世虎有勇力能以手握巨竹破之世衡獨有後餘皆無傳世衡亦娶連氏生三子義夫老柱細良歿塟夀山之原義夫字世忠娶建安陳善足生四子同壽衆嘉如滿普保歿塟聖佛壇之岡同壽衆嘉蚤夭如滿字子謙娶建安張鼐生四子仁義智貴仁字淵静以易經舉鄕貢進士名列苐四以温純能詞章選為太常賛禮郎階將仕佐郎娶泰州張蕙義字永宜智夭貴字用和王氏出也普保字居德年十六郡庠私試輙先列巳而深通易經應書鄕闈遂有薦于朝者授忠州鄷都丞娶某郡張㳤壽生二子炳烔炳蚤夭老柱好武藝娶某氏生一子閭其所習如其父歿于軍細良娶某氏生一子某𥘉義夫既歿如滿八歲普保四歲家事絶艱辛陳氏以黄乃䆠族氷雪自守越五年其外伯父馮翁力奪其志適里之同姓黄清字寒潭實桂甫之子宋孔目官某之孫鞠育二子擇名師傳授以詩書不翅親父二子亦感其恩能孝飬之生事塟祭終身無違者清之弟浄旣生子珉珉復生子福慧矣孔目之宗當不墜如滿乃還奉五河君之祀其子仁甞從予學明經間脩其家牒使後人有所扵考請予序之予聞氏族之學昔人所甚重所以明同異辯親踈别是非也盖氣血相貫喘息相通唯正系之傳則然儻以他氏參之此即莒人之㓕鄫不可不慎也寒潭固同姓其家承胤旣有其人子謙之自禰其父斯近禮巳况五河君以武顯而居德及仁方以詩書起家易武以文尤可見能亢其宗者其顯融盖未艾也故弗辭而爲之記詩有云子子孫孫勿替引之黄氏之後人益思其自慎者㢤故麗水葉府君墓銘括之葉氏世居松陽卯山至唐銀青光禄大夫越國公法善始以道術顯宋𥘉有諱備者從夘山迁麗水之東里又至崇信軍莭度使贈檢校少保夢得始以政學著夢得字少藴世稱石林先生者也府君諱元顥字子西先生之十世孫氣宇凝慤沉酣於六籍而旁溢諸史百家折衷羣聖人之說故其學粹然不雜以他岐端居若思喜怒不形于色一動一静咸撿押無違度雖經鑠石流金之候未甞離冠衣而䖏下帷講授弟子執經者環立左右府君爲敷繹奥㫖攝其粗踈入於宻微無不盎然充足若蒙大霧而行不知身之沾潤也然其躬行尤力在父母側和婉其聲氣進退有容恒恐弗勝其依戀慕愛之情津津然洋溢扵外暨歿哀毁骨立㡬至扵㓕性終身孝慕不衰四時祭享必極其豊腆獲一珍品不薦不敢食遇諱日之臨設席奠酒漿籩豆𦵔醢哭盡衰追想容聲竟日乃已延平守項君棣孫郷友也毎稱之曰吾交人多矣生事塟祭求無愧古昔者惟吾子西耳人聞之無異辭家雖貧殺衣縮食塟宗黨十餘䘮有告急者輙視其有無給之過庭之間尤善扵訓迪甞曰吾家自石林益衍書詩之澤接武䋲䋲至今十餘世矣吾祖吾父挺然扵其中尤以種學績文自任其遺編所存者可見巳故郷旦之評必曰儒紳之聮軌者東里葉氏也吾朝夕以思唯寐始忘之爾等毋怠事累吾無以見先人地下諸子聞之更相勸勵皆為文行士里閭取府君以為則焉年旣高幅巾大衣𥚹裷扵烟霞泉石間嘯詠自娱其樂道循理一出乎惟分之正士大夫多慕艶之故相率號之為樂隱翁一旦遘疾復呼諸子謂曰吾今幸得全歸矣生不離父母死安可侼去之乎爾當歸吾骨先墓之側魂魄或有知當謹執饔具之禮死且不恨言訖而氣絶至正甲辰十二月十二日也壽六十八以某年月日塟墓在喜康郷上黄之原曽祖懿生祖㤗亨宋太學生父浚母某氏娶趙氏先九年卒生四子宗道守禮寅清冝壽守禮以明經貢銓曹拜監察御史予雖不識府君幸與御史中丞青田劉先生㳺先生盛稱府君歴世相仍之懿未甞不以為襲簮紱者不難而能傳經業者為難豈惟所習有轉移或不同盖亦有天道焉自非畜之深發之逺未易以致於斯也善人之報吾将扵府君徴之雖然府君端人也善士也孝足以奉親行足以厲俗學足以覺後進古所謂郷先生歿則祭之者其在斯人歟其在斯人歟銘曰括之顯族葉最有聞奕世書詩以逮于君式遵遐軌載揚清芬隠趣恬漠文氣欝煴内外脩飭寤寐克勤彼皷篋者從之如雲揚確古訓辯詰道原爾𣏌爾􅎚我鋸我釿小大異施期集于勲天道謂何少微夜昏八尺之塋上生蘭蓀采以醸酒用酻君墳棣州髙氏先塋石表辭高氏出自姜姓氏族書謂齊太公六世孫文公赤生公子高其孫傒為齊上卿與管仲合諸候有功桓公命傒以王父字為氏考之春秋傳髙傒乃天子命卿其得氏在桓公前非有合諸侯之功而後得氏也傒之前巳有髙渠彌高克為鄭大夫則齊之高氏其先巳仕鄭亦非待傒而賜氏也氏族之學乆廢其書要不足深信所可信者但知高氏出扵齊而已其後裔滋蕃分布京兆河南華隂者為最多而棣州之有高氏又自河南分也當金源之季有諱温者善騎射膂力絶人元兵攻棣州温集民為軍搗退之以功授漢軍謀克佩銀印巳戍平江玉因引疾歸山東力田以奉親如温之為或強起之取世襲為子孫計輙笑而不荅娶岳氏生子曰珪字君章以力本尚義稱其扵榮利淡然無所好族人負官中錢至數百緍計不知所出珪傾貲代償或貧無衣及饑餓不能出户者多周之汲汲若不足有所貸者不收其子錢且戒子孫學耕稼勿為吏胥其有惡德者不共兆域而蔵家教峻整清風凛然也娶韓氏生男子三次子翥字伯舉讀書頗通大義輙棄去遇駿馬不問直之髙下必市之挾弓矢跨行如飛中正鵠不失毫髪有將家子之風事母能孝食飲必親甞衣衾則視時燠寒而進退之元統癸酉歲儉大疫且四起道殣相望翥買槥櫝瘞之其未死者作淖糜給之甞以泉布貸人人乆不能償取其約劑焚去漫若不復省至正中江浙行中書察知翥之才行命隨石抹将軍捕冦海上翥屡建竒䇿将軍不能聽巳而盗不可制方悔不用其言翥寡言笑與人交不為翕翕熱乆而益親人自不忍厭之甞教其子云我家近海濵以弓馬植門户田桑供衣食雖不多知書禮法素謹至今弗敢墜爾曹益務為善毋貽祖考羞使它人稱汝為善士我死目亦瞑不然雖日宰百羊馬享吾吾将不食而吐之矣世以為名言娶呉氏生二子𥙿桂榮生甫一月而母亡懐孟馬氏来繼其室為出装奩求保母乳之其視𥙿尤篤不翅若巳所生北兵戍南土者宗族給其衣費謂之封椿錢歲乆困不支馬氏勸翥曰君雖在戍家既粗立矣又何以仰此為一族咸稱為仁人至正壬辰秋翥移戍當塗桂榮勇冠一軍後三年戰死金陵馬痛之亦成疾卒先是諸妣姚岳韓三氏皆以孝事舅姑見稱而馬事繼母尤加撫弟妹至成人三十餘始嫁生一子暉日夜迪以書詩至質衣以為束脩暉乃以學名逮今六合載清大明御暦遂入侍青坊乆之擢囯子助教移磨勘司令陞太子賛善大夫轉刑曹郎中遂為福建行省參知政事累階中奉大夫云惟髙氏三世大墓皆在棣州樓博務南其原曰髙家庒唯翥死扵亂離㩲瘞建業西門之外郊叢塜纍纍莫能辯其真其卒時則歲丙申四月某日壽五十六馬之卒頗先扵翥實二月十九日壽五十又三兵燹之餘又用浮屠法付之水火暉日夜念之淚落不䏻收將從近代之禮蔵衣冠祖墓之側既請薦紳先生為之銘而又徴予之文通志其詳予惟先祖有善而不能知不知也知矣而不能揚之不仁也仁矣而紀載過於實不信也信矣而不能要諸禮義則不可銘諸鼎彛而傳於孫子也有若髙氏三世以来皆以武顯至暉始以文易武名位日致顯融而扵先德之念尤懸懸如饑可不謂之賢乎其賢謂何予前所謂五者殆皆無愧者也暉之子若孫異日升諸塋域知世德之不易必思有以奮發為武者則思横予樹纛折衝扵千里之外為文者則思建綱叙倫而昭熈朝之盛典斯不負暉之所望也不然讀兹碑者其顙寕不有泚也㢤是為表莆田四如先生黄公後集序濂成童時即讀四如先生諸經說見其立論精微鑿鑿過人逺甚未甞不慕豔之稍長歴求先生之事迹然後知其淵源之所自而凝道之有方也盖先生居莆陽唐御史㴞十二代孫世為儒家其父績師事瓜山潘公柄復齋陳公宓二公實考亭朱子勉齋黄公之高第弟子也先生夙承父訓年十二試舉子業鄊校多占前列後二十九年始擢咸淳辛未進士第調監瑞安府比較務未上名公鉅卿争聘之為講師而丞相江公萬里挽之尤力聲譽翕然動扵一時德祐乙亥冬始之官與簽樞陸公秀夫遇陸公一見極噐之明年丙子杭都巳䧟囯事不可為陸公趣先生至行都充益王府撰述官兼䖏置使司幹辦公事改刑工部架閣以通直郎陞武學諭遂轉朝奉郎囯子監簿兼福建路招捕使司都參議官先生皆辭不就宋既改物歸隱重山宻林不與世接四方有受學者先生為敷繹濂洛關閩之說而開導之其為文詞務以理勝不睱如它文士馳騁葩藻以為工而當時求者紛如也門人武夷詹清子類次六經四書講義為六卷刋之而先生之子元汀州路總管府知事􅎚又分記序墓銘字訓之属為五卷而刋之先生年八十二而終遺文流落扵薦紳者尚多其曽孫鄊貢進士至又裒集為十卷将刻諸􅎚介楚王府伴讀陳子晟徴濂為序以傳濂聞㾾洛中微考亭未興艾軒林公光朝獨倡道莆陽從之者如歸市紅泉東井之學乃聞扵天下網山林公亦之實紹艾軒之傳網山之後樂軒陳公藻又起而継之樂軒家長樂網山居福清咸来講學東井而風聲所𬒳氣習所薰人皆有鄒魯之行及乎瓜山復齋之起推闡考亭經訓東西角立化行而教孚文質尤彬彬可觀先生産扵艾軒之鄊耳目之所濡染固己先立乎其大者復因父師之故矻矻窮年遂探考亭之正緒則其所著皆六經之微所宣皆天地之秘誠有未易涯涘者柰何道未及行而宋祚已移識者不能不爲之惜也先生之所藴與不可傳者固巳隨物俱化若并其遺文同就泯滅不亦重可惜㢤先生之子若孫孜孜以傳世爲務可謂不死其親者矣濂年耄而昏避求文者如避讎敵甚不得已多令學子代之今以童年慕豔之乆勉徇至等所請而躬序之如此然先生之集自能行世亦不藉區區之文而後傳也先生姓黄氏諱仲元字善父後改名淵字天叟别號韵郷老人云重榮桂記廬陵周氏奕葉以書詩爲業有字孟聲者與其子學顔皆以文鳴薦紳間故廬在吉水之泥田邨門墉之内桂樹一章扶䟽而離褷晝日成隂縦衡可二畝逺望之童童若車盖然元至正壬辰紅巾盗起廬舎皆化爲煨燼桂亦焚死剪取其枝柯為薪唯幹獨存越五年甲申桂怱發緑芽膚間已而怒長不數年間蓊欝若雲布東南有小桂者二亦壊扵兵至是萌蘖出自根柢枝葉沃如也閭師里尹過之㦸手指曰此非祥也妖也物及常則為妖烈火之所焮灸津枯于内枝焦于外生意安能貫之生意不貫而萌蘖惡乎生苟謂其生為祥則倒竪之槐僵起之柳不亦祥之大者歟或曰非也此祥也天地之間有開必先其機之動間不容髪菜公之感挿竹生筍田氏之聚枯荊再華蓋草木最得氣之先者也大化流衍占盛衰者毎扵斯觀其兆焉唐人以擢弟者為折桂此殆周氏科目之徴乎二者之論乆未有所定囯朝洪武庚戍學顔之子仲方以明經舉于郷㑹試南宫除侍儀使出為中牟令以政事聞然後始知桂之重榮非為妖也實祥也予甞聞之人事之與天道誠相表裏有感必有應始終循環無窮今以兹桂徴天而驗人其祥固無疑者然而君子之論祥當在人不可使物得以專之仲方益率徳勵行使徳馨逺聞旣以華其躬又以燾其後人周氏之興其殆未艾也歟係之以詩曰維桂之良其色中黄其氣苾芳有士治經藝之于庭比德之馨帕額執殳来爇我廬桂亦變枯椔翳屹然自踵至顛氣絶弗聮胡彼緑苞怒長如毛有華其膏日益以崇車盖童童敷隂正濃大化絪緼何屈不伸瑞應之純孰讙孰呶為祥為妖匪徳曷要徳将何徴搴其芳榮以契其貞天昌其家悴而復華厥兆孔嘉勿剪勿傷是培是封沃以靈漿君子有云瑞當在人其福乃臻我陳我詩其辭則巵匪頌以規趙氏族塟兆域碑銘有序金華趙君古愚學而好脩以其先世遭家孔艱歿者多塗殯於郊乃與二弟古怡古忱謀黜衣殺食歴十年之乆始克族塟於縣之慶雲鄊青岡山之原鄊先生衢州教授胡公翰旣爲撰文表諸阡古怡復以爲昭示後嗣辭不厭其繁力請濂申言之濂以古怡存心愿慤行義如古人不欲重違其意頗諾之自時厥後竊禄于朝徒以未成之學操觚染翰無以應求文者之紛紜由是不及爲者盖八年于兹矣古怡又介宗叔嗣泰請之愈堅遂案其圖狀而序之趙氏扵宋有属籍廣陵康簡王徳雍實魏悼王之苐四子五傳至太中大夫堅之始自汴徙干衢古愚七世祖也特遷之於中穴餘則分左右而序列焉右則髙大父遂昌令旴夫大父永濟倉副使若磬伯父嗣淇嗣鴻叔父嗣淵也左則曽大父時尭叔祖父若隆父某州路學録嗣滋及弟某縣某䖏巡檢古恒也太中公碩人田氏髙祖母曽祖母二徐氏祖母陳何李三氏叔祖母童氏母葉氏叔母張氏嫂張氏皆祔從夫穴而太中公之子常熟丞公傳常熟之子長溪丞彦鉷皆不迁以長溪君窆蘭溪常熟君塟衢者乆也今所葬者始自太中公即継以遂昌君者遂昌長溪之子也八世之中凡二十䘮昭穆惟叙尊卑不亂厲限有截羡道中度神靈載寕人道朂順郷之大夫士過之者咸相與慕咏而去盖大江以南拘泥於堪輿家謂其水土淺薄無有族塟之者他未遑深論雖以父子至親其兆或相去近或十里所逺乃至扵踰百夫以一氣所生喘息之相通魂神之相依乃使之曠絶䟽逺如此豈人心天理之所安㢤周官有墓大夫掌凡邦墓之地域為之圖令國民族塟而掌其政令正其位掌其度數使皆有私地域釋者曰位謂昭穆也度數謂爵等之大小也古者萬民墓地同䖏分其地使各有區域得以族塟嗚呼它姓尚爾况同族同氣者乎何為離而異之何為離而異之古愚兄弟一即乎義理之正而弗蹈夫流俗之失不亦行古之道㢤行古之道可謂君子者矣抑聞之趙氏既家衢常熟君又迁蘭溪副使君又迁婺城人遂為金華府人其世德宗系各見公所述墓銘其族塟之時則洪武戊申歲冬十月壬午日也銘曰人之生也聚族而居朝焉暮焉胥㑹扵堂序之上冠衣濟濟而咲語嘻嘻柰何其歿也則異而蔵之設其有知也未必能瞑目扵泉下若其無知也揆諸人情而胡乃忍為自堪輿家倡扵禍福之論舉世紛紛遂瀾到而波隨縱曰其理之所必有狥利而忘孝亦昔賢之所嗤况渉扵茫昧恍惚弗能使智者之無疑不有君子孰覺其非今昭穆有序塋域具宜其安死者如生又悪知不順夫秉彛予所以取之而樂道之者亦中心深有感慨乎而噫虞文靖公像賛朱明之墟離火降精也丹鳥䙰褷為駕綵軿也手握化樞人文昭明也𥙷帝衮衣五色熒熒也上凌霄漢下瞩九溟也無幽不啓無芳不榮也頓挫萬彚配合三靈也獨騎元氣棲神窈冥也之死弗沒隨物流形也疑為矞雲燦為德星也琬琰所勒鬼祕神扄也命世之材一代之英也三竒石後銘有序三竒石後銘為呉士朱孟辯作孟辯獲石聚寳山間製為山玄膚玉芝朶㫁雲角三名其友王蒙先生圖而銘之銘䆳甚至不容繼孟辯強子述之信乎珠玉在側覺我形穢也其辭曰山玄膚割𬗋蕤星霣魄石抱膄蒼水使者佩失琚山鬼環守目睢盱内蔵一升白龍酥餐之凌霄躡雙鳬奮迅八極㳺清都山玄膚玉為徒右一玉芝朶自天墮量翠霞裁猗儺燬以九陽真澒火有聲泓噌玉之瑳不學三秀脆而夥韓終欲攓意仍叵青鳥傳信似需我玉芝朶青嫷嫷右二㫁雲角鬼斧琢秀􅏢􅏢文斮斮霓旌難攀泝寥廓手析祥㢙一握尚帶蛟龍氣旁魄神母變幻資槖籥上衝牛斗光如濯㫁雲角鎮書幄右三洪武聖政記序自古帝王創業埀統方有事于征伐而於彌綸天下之治具執或未遑及其大統旣集亦不過振厥宏綱而萬目未盡舉焉如漢之髙帝得囯最正雖曰筭無遺䇿而施之政令猶乏精詳故史臣賛之亦但云規模宏逺而已夫以髙帝之雄傑尚如此則其餘從可知矣洪惟皇上以布衣受天命蓋與髙帝同雖當開拓士疆之際停戈講藝息馬論道夜以繼日無一時之寕迨夫正天位朝萬囯孳孶圖治恒若不足於是綱舉于上目備於下誠有非髙帝所可反是故郊廟以及百神之祭禮文咸秩則祀事嚴矣御極之日即立儲位以正青宫則大本定矣衆建諸王列封功臣則大分昭矣兵戎之衆自京師逹于郡府率皆設衛權一出於朝廷而為将者不得私而軍政肅矣中外官有定制一革冗濫之弊而倖位絶矣冠服有别防範有嚴而民志自定無僣侈矣他如申禁令覈實效育人才優前代正禮儀之失去海嶽之封嚴宫壼之法勵忠節之訓剗積歲之弊如斯之類不一而足或前王所未得或行之有未至者皆煥然有條可以埀法後世此其故何㢤蓋自近代以來習俗圯壊殆将百年而天生大有為之君首出庶物一新舊染之俗與民更始是故睿思所㫁動契典則度越千古咸無與譲此正所謂錫勇智而正萬邦也臣備位詞林以文字為職業親見盛德大業日新月著扵是與僚属謀取其有關政要者編集成書列為上下卷凡七類合若干條名曰洪武聖政記然而天之髙明也萬物莫不覆焉地之博厚也萬物無不載焉聖人之作也萬物咸興欣覩焉故凡金科之頒玉條之列著之於簡書刻之於琬琰傳之於聖子神孫者将與天地相為無窮書曰惟天聦明惟聖時憲詩曰詒厥孫謀以燕翼子此之謂矣其所以致四海雍熈之治比隆於唐虞三代者豈不在於兹乎豈不在於兹乎臣不佞請以是序于篇端極知僣踰無任隕越之至洪武八年歲次乙卯正月甲子翰林侍講學士中順大夫知制誥同脩國史兼太子賛善大夫臣宋濂拜手稽首謹序宋學士文集卷第三十翰苑續集卷之十
