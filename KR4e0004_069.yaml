body:
  text: 杭州天龍寺石佛記濂自休致以來頗一至杭憩永明慧日峰下天龍寺與永明相去不五里而近其主僧月舟禪師行滿要濂出遊寺乃唐天龍尊者駐錫之地宋乾德三年吳越王錢氏為建寶坊因名天龍王之女曾刻木作觀音像卑之至今猶存大中祥符元年改額為感業建炎三年毀于兵元泰定元年擇基於寺南一百步仍重建寺曰天龍焉寺後皆山相傳為越王臺竒石峭秀如瑪瑙森列從寺西斜迤而上僅三十步小塔出灌莽中蓋藏天龍舍利處又斗折而北入妙莊嚴境門又西行六十步平巖幽邃鐫成無量夀佛像塗以黃金纍甓為洞户作攔楯護之香華之器咸刻飾像右刻般若心經繫以太平興國六年左峙石洞尤竒傍勒饒雲齋三字詩一章不能全辨嚴前地夷曠月舟云欵此即寺故基柱礎尚在竊按錢氏造寺在太祖乾德二年至太宗太平興國三年方納土上距建立之時巳一十七年又三年方有刻像未必其𥘉置寺於此也又東折二十步有慈氏如朱暨天親無著侍衛七像其莊嚴一如無量壽又東折三十步又有寶陀大士像石壁上刻天龍寺光明石六字月舟云石能夜現光怪故名其莊嚴一如慈氏三處仍勤佛號於石以金填之濂既周覽徘徊太息顧月舟問其故月舟云斯事甚異國朝洪武七年秋七月十又一日野燈發延及寺山風挾之為聲勢光熖射天黑煙巳罩殿廬行滿大懼向木觀音像哀號期與殿俱燼或力解之乃脫三衣祝而焚巳而反風滅火繼之以雨明日行山中藤􅟵榛棘盡幼為灰始見石像呈露或井沒塵土間行滿驚喜為之剜剔澡滌命工繪飾嚴護如此實其年之冬十月也先是有神光起寺西四十步久而愈明因掘地驗之獲石觀音像舁歸奉之東廡旱潦疵癘榮禱立應由是依歸者衆寺得重振逮今五十六春秋矣今諸像畢出似非偶然之故然寺無一肘之田每乞食以為飬而黑白之衆幾二千指非􅌳靈於大雄氏其能致然歟不可無以示來者明公以文辭為佛事願為書諸碑仍纍甓為室以障雨風使與石像同為無極不識可乎濂聞佛之肖像古無有也有之自優填主始東土衆生兢則效之恆聚土以擬𣑽形或謂土不能悠久復易之以木又慮木可致朽而更之以石石固堅矣亦難期於無壞乃因山而鑿之庶幾與天地同畢大則數十尋小則六七尺在在有之如來以慈憫之故感其精誠時變幼景光以歆動之錫釐恤㣧無所不至誠難量功德海也雖然天地亦一物也物必有壞唯本然之物佛超絶萬彚而不可以成壞言人具有之而或未能思故濂之為此記使讀者內觀之所重在此而不在乎彼也寺之興復别自有記非像之所繫兹不詳書大慈山乕跑泉銘乕跑泉在杭之大慈山廣福定慧禪院距城南十里而近唐元和十四年性空大師來遊兹山樂其靈氣鬱盤縳庵其中尋以無水將他之忽有神人言曰自師之來我等繳惠者甚大奈何棄去南嶽童子泉當遣二乕來移師無患也翼日果見二乕以瓜跑山出泉甘洌勝常大師因留止建立伽藍蘇文忠公守杭日為之賦詩有乕移泉眼趰行腳之句蓋紀實也大師諱寰中蒲坂盧氏子得法於百丈海一時龍象如臨濟玄趙州諗南泉願嚴頭奯雪峰存咸來咨叩道要則其德服鬼神彰灼靈異有不難致者嗚呼拔劍刺山水為之湧折腰拜井泉乃仰流武夫健將一誠之所格尚若此况大師心悟無際者乎洪武戊午冬十有一月濂朝京師道經山下今主僧定嚴戒有道之士也亟要濂觀泉且𬒳法衣率其徒同舉𣑽呪久之泉觱沸而出若聮珠然巳而微作湧勢濂心異之定嚴遂來謁銘銘曰天一所形厥質乃凝潛行重淵與氣俱升至人來居地不愛寶誰信淸冷生於乕蚤山后川君與道為謀肻私一勺不師之留師既留止化泉為雨式沛且旁潤于千里幻此荒墟遂成寶坊群生依之為正法幢命世大才猶能類象來遊來咨如山答嚮伐祀雖邈聲華弗虧至今草木尚𬒳餘輝我於世緣逢觸輒礙泉特相知獻萬珠琲擾擾征驂風埃渺瀰有素者衣化而為緇願挹才波如習禪定洗滌根塵一時淸淨元故寶林禪師桐江大公行業碑銘古浮屠之道以堅忍刻苦為先故其慮澄欲寡而入般若為最易所以雲居誨人為巳不貪世榮翠嚴日走聚落食或不繼此無他重內而輕外也濂今得一人焉曰寶林桐江師其視榮名利飬亦淡然無動于中瓶鉢之外絶無長物所服布𫀆或十餘年不易臨殁維那來發遺篋欲行倡衣故事唯𥿄衾一具而巳大笑而去嗚呼據位十剎之間而履行危峻若此視翠嚴雲居其為人也何殊可不書以為學佛者之法乎師吳氏子世居嚴之桐江故因以為號諱紹大父善母李氏師神觀孤潔不樂處塵􅝙中一觸世氣唯恐有以涴之入同里鳳山寺為沙彌稍長祝髮升壇納滿分戒私自計曰化龍之魚肻於蹄涔求生乎即日杖䇿而出上雙徑山謁大辨禪師陵公公據席攝衆道價傾東南一見師大喜授以達摩氏卑傳心印相與詰難者久之師退復自計曰如來大法天地所不能覆載其止如斯而巳乎遽辭去歷三吳之墟宿留建業經匡廬泝大江之西還止湖湘漢沔間名伽監所在必往參焉諸尊宿告之者不異徑山時師復慨然曰吾今而後知法之無異味也乃歸見公公俾給侍左右師益加奮勵脅不沾席者數載朝叩夕咨所以悟疑辨惑者無一髮遺憾遂得自在無畏法陵公喜傳授有人每形之於言時東海歟公以天目嫡孫唱道淨慈為法擇人如沙中淘金鮮有慊其意者會藏室闕主者乃曰必如大兄方可耳師乃起涖其職尋以心法既明而世出世智不可不竟手翻具藥寒暑俱忘每夜敷席於地映像前長明燈讀之一大藏教凡陸千二百二十九卷閲之至三過遂皆通其旨趣師之志猶未巳儒家言及老氏諸書亦擇取而擩嚌之自是內外之學兩無所愧矣元之至順壬申廣教都總管府新立未久宋諸輿論命出世嚴之烏龍山景德禪寺興廢輔壞善譽流衍至正􅉝巳行宣政院遷主金華山智者廣福禪寺寺近郡城十有餘里而城中為廉訪使者治所持節而來者多朝廷老臣及文學之士休沐之日恆入山諏詢內與故持法者頗難其人自師之至若貴若賤小若大靡不嚮風恱服四方學子翕集座下甚至無席受之一時法會號為極盛戊戌之秋院中復徇群請移住義烏雲黃山寶林禪寺師堅不欲行使者凡三往返然後承命明年巳亥八月朔覺體中不佳至苐七日日將殁鳴鼓集衆告以永訣即斂目危坐或請書偈接筆擲于地曰縱書到彌勒下生寧復離此邪翛然而化服沙門衣五十八春秋享報身夀七十有四越五日行闍維之法獲舍利羅如紺珠色齒牙貫珠不壞以某年月日建塔於某處藏焉師廣額髙眉正容悟物使人妄意自消生平以弘法匡徒為巳任敲唱雙舉鍾鼓交參未嘗少懈有求文句者操筆立書貫穿經論而歸之苐一義諱間遊戲翰墨發為聲詩和沖簡逺亦有唐人遺風至於有所建造甃石運甓躬任其勞以為衆倡手未嘗捉金帛悉屬之知因果者或尤之則曰吾知主法而已嘗患滯下疾拭淨不忍用厠𥿄摘菽葉充之其刻苦蓋人之所不能堪非見解正力弘量豈易致是哉三會語有録其上首弟子兜率行勤己為編集行世永明戒茂復以塔上之久未述為愧乃數來徴濂銘濂昔見師於金華山中共蠅頭細書戲問之曰師年耄矣其眼尚如月耶師笑曰賴有此耳别後復録近作詩一卷來寄師之意似相知者濂自後奔走西東弗能再往今師則不復見矣因從永明之請歷序師之苦行并其證悟之深者勒諸穹碑假佛法而叨貴冨者過而讀焉其有所觸也夫銘曰夫辨之道白如日一照便入光明域幻為嚴瀑㵼千尺珠璣散落龍為惜寶林師子亟返擲歷編名山絶瓜迹大海震蕩接天碧醎味由來同一滴三藏玄文密如織映燈夜讀廢寢食差别從今會于一欲求隻字不可得三鎮名山道充斥太空無雲雷下擊龍象人天俱辟易孤髙有同泰華色茹苦不翅餐崖蜜偉哉德人麟鳳質特為時來誰復識長風滿水感古思今意何極故金處士墓碣豫精神既衰囊筆櫝硯諱言作文事忽同郡金生仁泣而請曰仁之先人善裝裭之藝嘗獲私於執事秦漢以來金石刻悉卑之交疊無迹而匡郭合度執事為之喜每延譽閭右之族先每人歸言仁雖在髫齓中耳熟之迄今弗忘先人年五十二不幸以元至正十八年十二月二十日終久未克葬今以國朝洪武某年月日窆于某山之原執事儻存夙昔之故哀而銘之雖死且不朽復泣不止豫曰爾父豫知之最詳何忍靳一言不慰其九泉下邪爾父諱永字仲明幼從許文懿公遊長贅女氏遂襲為其藝余忠宣公來持部使者節命治法書恱之篆山堂處士四字以賜人以為榮爾父沈謐有守人也且鑒辦名畫絶精以運筆柔徑設色明晦定其久近真偽多服之無異辭今亡矣可念爾父世姓劉避錢鏐嫌名更為今㜈人也曾祖策宋雷州通判祖曄某官父祐元白鹿書院山長爾父故衣冠裔也故與他裝褫家不類君子之澤其有可徴哉娶王氏生子男三仁寶安仁即求文者女二歸張讓張弘孫男八人女六人銘曰藝之欀業之良藏諸密名弗逸元故王府君墓志銘余來讀書浦陽江上凡遇惇厚之善士必禮貌之又稍與之遊縣之深溪有王府君絲出義烏鳳林先世嘗有顯者府君雖肥遁不仕其為人也好善鄉人服之至不忍欺歲儉出粟貸人不求其息或屢不能償又復稱貸府君亦從之人笑其迂府君曰吾誠迂彼豈有餘力而不我歸哉人有鬻産者必增其直以足其意鑿石錬灰以腴稼者既即府君山復飲食之而始收其利寠人無田藝富民之田而中分其粟乏力者粟輒不登在他人必易藝者府君卒不變人笑其愚府君曰我誠愚教吾子孫為寬仁之人耳里中有池塘延袤可二十畝其二婚家力爭之數訟于有司不決府君慨然曰所貴為士者能為閭井解紛耳况與之有連乎乃耴內子金條脫質錢若干緍刺羊豕以合之酒半酣捧錢而跪進之各歡然而忘其訟向之笑者至是咸服府君為有德君子愧曰吾儕小人棼棼爾營營爾安足以窺其中哉豫嘗與府君合飲香嚴佛祠既稔聞其善行數審視之其衣冠不詭于人其發言和而有則其飲酒至百觴不亂且執豫手曰子文辭誠美矣惜不識酒中之趣耳豫為之驚喜嗚呼此豈所謂惇厚之善士者非邪府君晚年以家事屬諸子幅巾杖屨夷猶大山長谷間秋髮繽紛翛然如物外人年七十三忽嬰微疾呼家人謂曰吾將逝矣爾等當法我儉勤更效同里鄭氏九葉聚居吾暝目泉下矣言畢形神乃離實元至正辛已八月十五日也壬午十二月二十四日葬于大樣山之原距家西三里而近府君諱澄字德輝其姓王氏曽祖某祖某父某母某氏娶鄭周二氏子三人子覺子麟子偉皆周出也子麟出於仲父汶後孫八人應念憲㦛勤慶念恩女三人義門鄭渙同里周資張侃其壻出曾孫二十人澤涇浙江溫淇湝瀏溶瀾潛瀹溥潚沇淦涯泓濠涓女五人未行嗚呼大檏之散久矣嗜利之徒唯思肥己而瘠人恨不扼其亢而監其腦尚有如府君者乎勒石墓門用以為勸也銘曰行修於身惠洽于人名行乎薦紳天之報施𥙿其沒昆合筵而食以孝義聞斯何愧於樊張之倫凡樂善者視兹刻文吳門重建幻住禪庵記姑蘇幻住庵者元普應國師中峯和上本公所建立也國師既得法於髙峯妙公唯恐人知而挽其出世深自韜晦往遊三吳間大德庚子國師年三十又八嘗憩閶門之西麓見松檜蔚然成林問名於居人則曰此鴈蕩也國師喜曰永嘉有鴈蕩山乃應真諾矩羅示下現之所名與之同其般若之當興邪吳士陸德潤聞其言遽以地施之國師縛草庵三間以居趙魏公孟俯為扁之曰棲雲國師趺坐其中而問道者連翩而來至於五百指之多乃創精舍一區僧俗趨㓛不三月而就所謂堂房門廡咸具乃請名於國師國師曰澄澄水鏡能規之幻體昭昭影象所現之幻迹幻與幻盡覺與覺空斯則超悟之極至也吾儕依此如幻三昧而住冝以幻住名之當是時若南詔之無照鑑西江之定叟泰荆南之鐡印權冀北之指堂月號為一時麟鳳咸集輪下幻住之名籍籍於四方矣又明年壬寅松江瞿霆發延主天目山大覺正等禪寺國師不俟終日避走南徐而向之相從者皆水流雲散唯絶際中玉亭立二師素掌庵政相守於寥莫之濱自時厥後二師復入寂立之徒湛源止止之徒用庵照輔苴隙漏而思繼承為尤謹元季兵亂一旦蕩為塵埃而不可致詰矣用庵日憂之圖為興建之計僅四三年皆次苐就緒而復國師舊觀實國朝洪武戊申之春也庭曲之碑久未有刻文會濂朝京師道過吳中用庵以記為請濂聞國師之道東行三韓南及六詔西連印度北極龍沙莫不躡屩擔登咨決法要然其心未嘗自以為足屢却名山而不居飄蕩窮崖孤洲之上誅茅結廬在在以幻住名之其故何耶蓋謂主持宗教必無上大道必夙植福緣必明智通變具是三者然後可其意誠有所激欲以身捍大法俾之去澆而還淳也用庵思祖武是繩木茹澗飲夙夜究明本心其亦可謂無泰於國師孫曾者乎嗟夫諸法固幻也而住者亦幻也知住者之非住始知幻而非幻也幻而非幻則如幻三昧在焉雖然非幻亦幻也是為記余氏宗譜序俗之不美有志者鮮也今卋之士論法道不古若則以無位為解及既得位卒不能有所為豈特無位之罪哉先王經天下之法深逺矣大者信非無位之所能行至於族師閭胥之事獨不可推行於州里之間乎州里之間茍未睱為獨不可親以聮其族生繼成之益修其遺文甚完譜固睦𥙿之本也然無法以行之安能久而無懷乎欲其久而無懷舍吾言不可也吾是以有言焉嗚呼恂苟能行之孰謂有志者之果鮮哉重建龍德大雄殿碑佛法之入中夏始於漢明帝永平八年此説殆非也中夏知有佛蓋己久矣周穆王時西域有化人來能出入水火王為築中天之臺列禦冦之書所載西方有大聖人不治而不亂不言而自信不化而自行雖不明言其為佛其事固皆佛也况乎天竺室利房等持經來秦而始皇謝去之漢武帝詔霍去病討胸奴獲休屠王祭天金人祠之甘泉成帝命劉向校書天祿閣往往多見佛書哀帝遣景憲使大月氏得其王口授浮屠經而還是則明帝以前經之與像中夏皆有焉至於永平以後而其教法始恢弘耳然而中州之人奉佛者雖多江南塔廟則自吳大帝赤烏四年康僧會所造建初寺始㜈之浦江從仙華山降勢而下其東支蜿蜒而來曰龍峯峯之麓龍德寺在焉乃法壞禪師道埸𥘉名乾元宋大中祥符元年更今名嘉定中寧宗親書寺額以賜之寺無碑碣可徴不知何時建立相傳為赤烏中豫竊惑之僧會之化方行建業而浦江在千餘里外何緣遽有興蘭若事乎乾元乃唐肅宗紀年以年名寺其殆或肇于唐歟寺廢將圯元大德九年住持僧善興及其徒永鎮悉撤其舊而新之先是龍峯之上有塔七成宋天聖三年僧咸若募兵部侍郎胡公則捐錢五十萬所建至是亦一新之且造塔院一區湧殿飛樓雄麗華煥為一郡佛宫之冠歲時祝釐縣之諸浮屠悉萃焉元末兵亂一夕皆為煨燼寺之二比丘至德守約衋然傷心乃合謀曰前人之功吾儕不可不繼也而力未能遍及冝先其大者以為衆倡樂善之士豈無從而和之者乎於是黜衣縮食重創大雄殿五楹間其廣一百一十尺深北廣閷二十尺崇比深復閷其四十尺經始於洪武九年之十月落成於十三年之三月匠以日計者八千米以石計者一千錢以貫計者五千而所就之夫弗與焉二比丘以成功之孔艱也欲使嗣人知所保護介豫學子吳誠來請記嗚呼久逺劫來諸佛出世其化度前後固不可以詳知而先儒則謂穆王之世中夏己昉見之越一千六十餘年至明帝法始盛行又越一百七十餘年至吳大帝江南方知有佛祕藏之莫顯至道之難聞亦巳甚矣今也祗園梵林交接乎東西琅函玉笈充牣于左右則其證修冝若易易然者而闡提之人猶日衆多自非僧崇其像變宏侈其寶坊何以新其瞻視而祛其疑妄者哉此二比丘所以協力起廢而不敢緩也真如妙智含生本具當有繼軌轍而興事功者不數年間一復大德舊觀豫安敢謂無其人哉故因作記特稽佛法緣起而嘆其不易遭逢意將起人之敬信苟謂泛引而續言之非知子者也絲之以詩曰西方大聖天人師降本垂迹攝羣機五色神光貫太微九龍行水香襲衣六齡寂默和天倪明星一出絶去來大音演法寶華垂像教東漸自蒼姬祕藏弗顯昧若黟後千餘歲䆮光輝白馬馱經息鴻盧從此祠廟覃夏夷仙華名山如曵旗靑龍東逝勢欲飛穹塔為角卉木鬐掩映樓觀聳巍巍髣佛兜率中天移劫火洞熾風鼓威盡化丹雘為荒椔二十見之心酸嘶欲符西土化人為彈指勿使神鬼窺四阿凌虛截絳霓一倡當知百和隨千楹萬礎列參差行看規制踰昔時調御丈夫示弘慈擲埴索塗哀世迷手擎日月耀九馗疾步長趨絶險巇歷劫難值心勿疑浦陽長江流渺瀰江水可竭道無虧興作起壞屬之誰尚告繼者徴斯碑洪武十三年夏四月八日前翰林學士承旨嘉議大夫知制誥兼修國史兼太子贊善大夫縣人宋撰
