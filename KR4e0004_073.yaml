body:
  text: 送東陽馬生序余㓜時卽嗜學家貧無從致書以觀毎假借扵蔵書之家手自筆録計日以還天大寒硯氷堅手指不可屈伸弗之怠録畢赱送之不敢稍逾約以是人多以書假余余因得徧觀羣書旣加冠益慕聖賢之道又患無碩師名人與㳺甞趍百里外從鄕之先達執經叩問先達德隆望尊門人弟子填其室未甞稍降辭色余立侍左右授疑質理俯身傾耳以請或遇其叱咄色愈恭禮愈至不敢出一言以復俟其欣恱則又請焉故余雖愚卒獲有所聞當余之從師也負篋曵屣行深山巨谷中窮冬烈風大雪深數尺足膚皸裂而不知至舍四支僵勁不能動媵人持湯沃灌以衾擁覆久而乃和寓􅊇旅主人日再食無鮮肥滋味之享同舍生皆𬒳綺繡戴朱纓寳飾之㡌腰白玉之環左佩刀右􅍯容臭燁然若神人余則緼𫀆弊衣處其間略無慕豔意以中有足樂者不知口軆之奉不若人也蓋余之勤且艱若此今雖耄老未有所成猶幸預君子之列而承天子之寵光綴公卿之後日侍坐僃頋問四海亦謬稱其氏名况才之過扵余者乎今諸生學扵太學縣官日有廩稍之供父母歳有裘葛之遺無凍餒之患矣坐大厦之下而誦詩書無奔赱之勞矣有司業博士爲之師未有問而不告求而不得者也凡所冝有之書皆集于此不必若余之手録假諸人而後見也其業有不精德有不成者非天質之卑則心不若余之專耳豈他人之過㢤東陽馬生君則在太學巳二年流軰甚稱其賢余朝京師生以鄕人子謁余譔長書以爲贄辭甚暢達與之論辨言和而色夷自謂少時用心扵學甚勞是可謂善學者矣其將歸見其親也余故道爲學之難以告之謂余勉鄕人以學者余之志也詆我夸際遇之盛而驕鄕人者豈知予者㢤元嘉議大夫泉州路總管朱公墓誌銘濂少時卽見莆士朱公廷試文數篇巳歎其不可及後二十年聞公官閩中所歴有聲尤慕服之及今又閱二十餘年公之孫潚以墓銘為屬問公之死已十七年而濂亦老矣嗚呼其何忍辭公諱文霆字原道姓朱氏九歳能文十三從進士林君岡孫學經毎日暮湏諸生出獨援疑義難其師其師驚歎之元至治癸亥以尚書舉進士丁外艱去至順壬申再舉遂上名南宫對大廷名列第十賜進士出身擢同知瑞安州事階承事郎改汀州路總管府推官轉承務郞調甌寧縣尹進奉訓大夫御史交薦于朝除福建宣慰司都事丁內艱起知瑞安以大臣奏授奉議大夫福建儒學提舉遷同知泉州路總管府事陞奉議為奉政至官引年辭歸遂以嘉議大夫泉州路總管致仕命未下以至正癸卯八月九日卒于家年六十九公同知瑞安大府􅊾公均瑞安平陽永嘉之役不為權沮財奪民服其平為甌寧行均役法上官以其舍人為屬請緩之公格不奉命上官怒誣構公罪部使者㢘其非辜獲免且以訟牒三百委公治之公從容剖荅而退不能有言其知瑞安盜起㫄境䧟陶山天門諸堡募壯士攻破之斬其酋以徇颶風挾海水漂民廬舍公彂官廩按行漂所賑之其提舉學事遂其苟職者易以􅚨􅚨恱之公孝友切至以父不迨禄養言輒涕泣事母惟恐咈其意撫五弟教而有恩居官無癈事公暇講授不輟學者因所居稱葵山先生甞考閩浙江西三省士所取得美材為文本扵理不為浮辭曲辨陳監丞旅稱之有集若干卷蔵于家公之先建安人曽祖德誠宋潭州駐泊祖治安元河南等處醫學提舉父世英始遷莆以公貴贈奉議大夫同知興化路事驍騎尉追封仙㳺縣子母林氏贈仙㳺縣君夫人池氏封如其姑年若干以丁酉某月日卒于瑞安是年十二月十六日歸葬常泰里雙牌山之原及公卒穿夫人之墓合葬焉甲辰七月二十一日也男一人鏞古田丞六女適校官林敏中漳州路同知王謹惠安尉胡顯祖及黃孔脩李某王某孫男一人卽潚國朝卿貢進士能世其家銘曰在元中世士患無位持經挾筞就有司試試者為誰或哲或愚或以微纇弃照乗珠及其旣獲爾州爾邑有所不通為吏侮執有美朱公洊薦而豋左律右經吏駭且偵剔蠹平徭如衝稱物有撓之者正色不屈旣典方州亦司儒臺黙士之贋誅盜之魁曷其致然維學知要學以為政天下猶小彼何弗思訾儒為迂刀筆拘拘視公何如公政在民無銘亦存銘匪銘公告其後昆維尔後昆扵公是效公德孔多尚食其報玄潤齋記信之龍虎山爲漢天師裔孫傳道之所四方之士從其學者無虚時元重紀至元已夘山之耆德朱君某以謂學者之來為求道也不博以文則道何由成博文必有師不有田以養之則師弟子之羞服百需之具奚所取給而賴以不壊乃捐腴田若干畝為學田莊俾其曽孫李弘範主之越十三年朱君卒兵亂事寝至正甲辰朱君之門人史君由直懼不克繼師志復益以私田百四十畝命弘範興學事弘􅚘亦自感奮斥田五十畝卽山中易隙地闢齋舍為講誦之區以一百五十畝増為學田授齋之長者世守之名其齋曰玄潤扵是弘範曰斯可以戊二師之志矣然吾居番昜兄弟皆夭死無嗣不圗祖禰將無所食吾責可辭復選從弟之子義實為嗣作室數楹扵琵琶山之陽扁之曰思堂以奉其先堂之㫄搆齋題曰玄潤以教其後人亦以田百五十畝隷焉弘􅚘復曰斯可以延吾親之祀矣師之德不可廢也入田七十五畝扵上淸宫之祠附祀其師某而以其禰配之弘範又曰吾志稍行矣然不托之文烏足以知朱史二師嘉惠學者之仁後人繼緝之力㢤乃屬其友鄧君仲脩來請文記其玄潤齋𣣔著二師之績也道家祖老子老子之學該愽閎闊而尤深扵禮當世大􅚨咸北面師之夫其學之博必非守一術以違世其習禮之本必不弃人倫以忘親後世或失之去老子之道遠矣朱史二君獨能以博文誨學者固為善扵學道弘􅚘旣述二師之事又圖其親與師之祀不亦達禮之本矣乎非知道者不能也夫學扵斯齋者學道而巳余嘉弘􅚘之所為近道而得先後之序也幷書以為學者法焉金陵杜府君墓銘金陵有孝義之士曰杜君諱元字一元其先居吉之吉水與㑹稽正獻公衍同宗至君始逰江東樂金陵土俗遂居之而為金陵人君苦學有材氣能為詩元重紀至元中張文穆公起巖為江南行臺中丞見君詩願掾君君不可𣣔以茂材異等薦又不從年若干卒以布衣終君少時父患噩疾夜數驚君冠帶伏父榻㫄父驚起輒抱持曰兒在斯父疾数月君目不敢瞑至愈乃已母沒服䘮得古禮甚聲問日起貴人賢士多樂與君㳺君未甞以事干之及有罷黜失志者則為之力不怠行臺都事楊惠𬒳劾去人莫造其門君獨持酒與飲而送之趙弘中為御史掾㘴法罷君徒歩與俱行百餘里僦屋居之􅚨學教授張鉉以事黜君出金帛資其行其子四歳失母君命婦鞠之不異巳子兵部主事常允恭家人夜失火允恭方醉臥衆怖懾散赱無頼子利其貲將刼之君率少年数十軰為出其篋笥寳貨于外允恭泣謝曰微君吾其死乎隣人陳鼎舉室死于兵二兒匿舍側怨家復害其小者君曰脫幷殺大兒則陳氏絶矣卒為抱匿它所以免吉之部運吏輸粮金陵不足者三千斛吏受笞榜號泣莫為計君閔之為貸扵大賈以償吏德君以物來謝君却之蔣山僧為御史所誣夜竄君室求救君蔵之故人家僧獲全宋楊忠襄父邦乂廟在城南君以公吉人歲時率吉士㳺寓者具牲酒祭之君之為義多類此君甞攻醫尤良扵治證疾病造君者不問有無必予藥藥必擇精善者服之必瘳金陵大疫君和藥赱給之不得食者以薪米餽之賴君以生者甚衆由是人多稱君美及兵亂士卒相戒不忍犯君卒扵至正丙申七月九日以丁酉三月十日權厝金陵清涼山右國朝洪武壬子十二月九日復改葬南門外之鍾家山夫人劉氏祔焉君曾祖若海祖懋父文燁母周氏君二男子曰珙曰環珙早卒環承事郞晋根府録事賢而能文精扵書得晋人筆意二女適蕭伯高鄧世良孫男二某某孫女四人皆在室環與余交頗久以銘為請余惑乎世之交友者利之所在則趋有小害則避去不肯㽞目一頋或道上相値輒引𬒮掩面陽為不識倘以事過其門筞馬疾馳惟恐為所汙况望其拯䘏乎若君者可謂無讓扵古君子者矣烏可不銘之以為世勸乎君所為詩凡若干卷蔵于家銘曰杜裔孔鉅支著吉水其在金陵則自君始君才旣多胡不禄仕非不樂仕義不屈巳養氣為文五色有煒孰非公卿接跡交軌彼徼其權權銷志沮吾守吾義夷險一揆章服之加鞶帶之禠所交者心加榹何與拯難濟危存孤起死匪名之求惟義所止兵戈如林白骨千里君若不知左孫右子斯豈人為天錫嘉祉天曷私君惟善之致貴有不聞賤有足恃刻文昭美以諗多士㑹稽陳君墓誌銘監察御史陳煦述其先祖之行拜且請曰煦之先本儒族至于先祖遭家多艱始屈身為吏卓卓有可稱者先祖年六十有七以元至正巳亥十二月十八日卒于婺之金華越一年辛丑正月某日權厝金華照水里之原今將以某年月日歸葬㑹稽某山先隴之次然先祖之卒今二十年矣相去日遠人之及見先祖者日益微稱先祖之美者當愈䟽矣儻又越十餘年安復有知而稱之者乎惟托文辭之傳可以不朽而文辭之不美者又不足以傳煦甞聞人咸推先生所為文必傳先生文傳則先祖之事愈久而不墜惟先生閔焉而賜之銘余曰余文豈足傳而祖耶然而祖之事信有可稱者乃受而銘之君諱克和字惟中陳姓陳為固始著姓唐末有遷泉之南安者宋太常少卿侁始自泉遷會稽君七世祖也曽祖一新文林郎祖麒左宣教郎父德星母李氏君六歳䘮母十九而父卒能自振㧞讀書學法律挺挺不肯出人下元元貞初𥙷三江鹽塲吏覈故所積鹽得羡餘數十百引以代亭戸貧不能輸賦者流亡相率復還旣而調􅌘縣吏縣民誣鄰人盜其先塋珠君曰珠入土必壤汝先塋葬幾何年矣豈有完珠耶冨族偽為劵書奪細民田君辨其劵曰是歳某月改元何謂正月耶皆無以應而退轉吏上虞㑹歳饑民道死相望君言于今尹發公蔵易粟勸巨室啓廪賑貸存活者甚衆上虞下蓋湖廣百餘里漑上虞餘姚二縣田夏旱二縣民争決水至相歐撃君白尹立石表湖上而中分之争遂止復有梁湖者漑民田甚博右族利其腴將堙以爲田民病暵君浚復之改平凖鈔庫司庫爲㑹稽縣吏紹興路聞君能辟爲掾山隂塛埭塘圯海水禍稼郡公屬君治君役多田家斲巨石穴其中貫以堅木築之歳乃有秋録事吏闕君攝其事樊氏叔姪争先廬不决相訟前吏利其貲故緩之不爲析君登之扵庭告以古孝弟禮譲事投鈎于地使各取之叔姪悔悟叩首泣謝譲其廬不必居踰年移吏婺州守熟君名不敢以吏待君毎相可否論事民隂受其惠武義民𣣔誘饑民爲亂事斍𣣔悉捕誅之武義大擾君赱告㢘訪副使伯嘉訥曰謀亂者一狂竪耳餘人果何罪今不因而輯㝎之亂且見矣賴以生者三千餘家義烏徐氏率少年七十餘剪髮爲信劫其仇家旣而仇遁其黨怒遂火縣治而去郡議以為亂律置之死君復告伯嘉訥曰愚民負氣縦火罪雖有之豈如議者之重耶且剪髪者皆脅從耳𣣔置之死不已酷乎七十人者皆頼以免聲績益彰至正乙未江浙行中書省以君為慶元路市舶提舉司都目戊戌奉檄使泉還道婺㑹國兵圍城君縋以出間道之㑹稽遇剪髮民相率􅌽致其家出婦子拜曰生我者君也争具肩輿護君歸眀年之金華訪其二子敬升遂卒卒時告其子皆善言聞君卒者為之歎息君為吏至老毫毛無所私家無儋石儲弗䘏也然遇事敢言言必當乎理故所為輒可稱道娶呂氏生五男子長源國朝知完縣事次卽敬福建行省員外郞次復元山隂縣儒學教諭次郎升今為儀封縣儒學教諭其一曰瑞出後上虞梁氏女一適同郡王克常孫男六人長卽煦由太學生為吳王府伴讀擢今官次曰杰烈黙熊烝孫女五人古之仕者將以行道也非以榮其身也然而所居卑則所𬒳者狹故君子樂得夫時位焉苟幸時竊位以冨貴其身而無所益扵世則君子何取乎若君者雖老死扵下位然所至而民受其惠其過扵世之食厚禄而無善可稱者遠矣使天道可必君其有後㢤銘曰萬鍾無聞彼為何人吁嗟乎君下位終身雖則位卑善政孔殷誰曰不信視其子孫莆田方時舉墓銘余始銘莆田方君應元之墓則知方君有二賢子其長諱槐生字時舉尤以文名心固識之後聞時舉以郡守辟為郡校師人尤稱之余愈熟其名而以未及見之為恨然頗自意余官京師去莆不甚遠以時舉之才校師豈足以老之㢤余雖耄見之必有日及余引年吿歸有以状徵銘署其後曰文焴者則時舉之子省其狀當銘者則時舉而時舉以洪武六年六月六日已死矣及考論其死故編民有怨其郡丞者誣訟之于部使者辭蔓連時舉已白其誣遣歸及上官疑其獄有贓再逮之時舉恐遂拜辭孔子廟及其先祠遍與朋友訣夜半紿其妻子就寢沈井中嗚呼其可哀也乎按状時舉儒者也少資稟過人受業于進士方君德至及鄕貢進士鄭君稑通春秋書詩三經年二十輒為人師善講說為文辭元至正中方岳大臣交章以學行隱逸薦之不起擢為漳州路北溪書院山長不赴授泉州路儒學教授卒不從及國朝以校師辟辭不獲乃就軄為師七年惟以推所學淑髦士為務恬不以禄薄勢卑動其心嗚呼時舉之所守如此豈非君子㢤時舉嗜義如飢渴蔡忠惠公㐮之祠林文節公光朝劉文㝎公克莊之墓皆圯壊時舉請于有力者葺完之其先宋光禄卿偕為郡名人則祠之于學官晋江知縣深道墓為盜彂則治而瘞之其族祖族父及外王父母四䘮未舉則葬之莆之郡乗自宋南渡以降廢而不脩則陳于上而脩之其家譜諜未僃則僃之嗚呼時舉之所為如此豈非君子㢤時舉謹慤有禮平居未甞去衣冠出言秩秩有章與人交薫然和翼然恭悠然久而不變聞人善則揚之不置有不愜意者必論折之使合理而後巳其務德如此而年僅四十有五寧不誠可哀乎與時舉同時之人有學不若時舉文不若時舉言論不若時舉而都顯位享豊禄得上夀以死者矣而天獨窮時舉之身又閼其壽豈非命也耶然命者出扵天惟君子能安之而小人皆反之安乎命以行而所遇有横逆者雖夭猶壽也雖賤猶貴也以能全其天也不能安乎命所為戾乎天而僥倖得福者雖壽猶夭也雖貴猶賤也以弃其天也然則時舉雖不獲一命不登下壽而所受扵天者白于鬼神而無愧質于聖賢而可徵又何足悲乎辨而銘之所以慰時舉亦以慰其子也時舉娶朱氏故䆠挨二子長卽文焴次文烜二女適柯㢘龔璠曽祖諱寓孫宋某官祖諱塾翁父則諱應元其世見應元墓銘兹不著時舉之葬以某年月日墓在某山之原銘曰麟或死于斤豚或𬒳繡紋天道棼棼孰知其門命之方屯雖賢哲莫伸目昔皆然豈獨乎君君勿尤乎人惟命是信我銘君墳以列清芬以告鬼神以貽爾後昆尚其不泯嚴陵汪氏家譜序周之文盛矣在春秋時周禮在魯故魯為文獻國及秦火之餘廢亡畧盡所僅存者自五經左傳之外無聞焉以太史公之傳迄不能自有所論載盖愼之也况去今又千五百載之久者乎吾讀巖陵汪氏家譜未甞不歎其紀述之遠且詳也盖汪氏出扵魯成公之次子汪其後遂以汪為氏有名錡者以童子死扵郞之戰與孔子同時見扵禮記其來邈矣而其子孫自汪以下咸述其字名官位壽年墳墓所在他若墓中之銘朝廷之命為汪氏出者咸無所遺歴秦漢以下至于今七十有餘世粲如目見而耳受此不惟過乎太史公天下之述姓氏者未有若斯之備者也豈周公之子孫固多文㢤雖然汪固祖周公南方之汪自越公華而大著越公之後以詩書起家而顯于宋登政府列侍從者不可勝數其盛固異扵它族矣冝其譜之脩非它族所能比也然譜者記其名以傳不亡其先之義也而君子之不忘其先者不特脩譜之為難而脩其身之為難譜或不脩其為患小身或不脩則辱其先矣汪氏之先莫大扵周公周公之禰文王斯二人者身為天下凖言語為後世法為其子孫者豈易易㢤今夫閭巷驟興之人身賤宗微其所為或有不至人將貸之曰其先亦若是耳以文王周公之裔列扵斯譜之前人閱之則曰若聖人之冑也聖人之行事若彼而若猶未免如是何以為聖人之後㢤則豈不尤難矣乎然則汪氏之子孫脩身愼行宣昭令聞以法周公為志者上也善守先訓不為匪彜以辱先者次也苟㢮然雜扵衆庶不能自異扵人斯為下矣與余交者國子助教中自言為汪七十二世愽學能文其所謂宣昭令聞者歟其以譜請叙也余故樂為之言平陽林氏祠學記禮之由生非天作而地設制之者人也太古無事之時固未有所謂禮禮之立起扵人情之變人情之變如洪水之潰制禮者猶禹治水然左瀹而右䟽排險而導下惟適水之性使各順其道而巳不可以一法拘也水勢有古今之殊苟執禹之遺法而治千載以下之水則不合者多矣奚可乎㢤傳曰三王不同禮言禮因時而變也古者墓無祠庻人惟祭其禰禮也至漢甞祠墓矣祭甞及高祖矣不可謂之非禮也今平陽蓋竹之林氏立祠扵其始遷之祖之墓而祭之烏得謂之非禮乎時不同禮亦不同禮雖不同而其因人情而立教者未甞不同也𥘉林氏之居蓋竹自名䉞者始䉞卒葬于華蓋山子孫至今數百家散處鄕閭服微情㢮者久矣其十二世孫元陽江縣尹淳懼其愈遠而不知所自出也𣣔立祠于墓而未果淳卒其子今刑部主事陞遂作祠奉䉞之主朔望必謁歳時必祭皆率一族之人以從事祠後為齋曰思孝以㑹其族人復立祠扵左偏祀晦菴朱子之像以其先宋吏部侍郎拱辰知信州千之知南劍州起鰲及其父陽江君配祀卽祠之前為學聘鄕人之賢者為師使族人子弟就學焉凡其所為未必皆合扵古而余獨有取焉者以其得禮之意也禮之目以千百數求其意不過禁邪止慝導人以善而巳人情之變也無禮以治之雖日刑千人而不足教之以禮可以使之立化扵爼豆間豈刑罰之威不若爼豆㢤制之以其所畏不若因其所易知而教之之為速也夫以旣遠久踈之族有貧冨弱强之殊苟提其耳授以法令使無相乖背必有不可止者今也立一祠于始遷祖之墓率族人以祭踈者可以復親逺者可以不散富强者必不敢以是私其身而貧弱者必有所仰濟矣其族寧有壊乎况扵有學以為之教有先賢之祠以為之則其為族人慮者可謂備矣林氏之嗣人祭于祠學于學而能脩其身睦其親者善為人後者也苟不能過扵它族之人豈不負陞之望㢤陞字若髙敏事有才能故其所為能合扵禮其徴記扵余也遂推其意使歸而刻焉蒼雲軒銘世皆稱嚴子陵不屈光武以為高士之問學固求所以行之耳苟得賢君事之而行所志君子之所樂也光光武素知子陵㢤子陵之不以隱為髙也審矣其隱蓋有所為爾人之志意材量明者能燭之扵事為之先子陵光武少相交善使光武能任人可為盡力子陵何所苦而不出旣出而决去㢤盖光武察察自用其後宰輔多不以禮退子陵預知其如此故決然避去而不疑以全故舊之義此子陵所以為髙也苟徒以隱為髙孰不可為子陵㢤子陵裔孫居餘姚者曰宗道取范文正公祠堂記蒼雲語名軒余恐其昧乎出處之義也告之故系以銘銘曰維士為學志大行予時孰肯樂隱屈而弗為卓㢤子陵識時之幾幾不可以出甘耕釣以嬉此為百世之師苟時可行而飾隱以欺是弃其天而失時冝嗟吾子陵志豈在斯爾冝則之勿執固以違視時推移如雲在山何滯歛與施或不盈握或雨四垂庶乎于道之歸拙菴記京口徐君德敬為中書管勾居京師處一室不堊不華僅禦雨風環庋圖書置榻其中毎退食卽從歩歸宴坐誦古人言賔客不交請托不通自號曰拙菴􅊞封衍聖公魯國孔矦希學書拙菴字以遺之德敬復徴文扵余余天下之拙者也德敬豈若余之拙乎世之人舌長且圓捷若轉丸恣談極吐如河出昆侖而東注適冝中理如斧斲木炭就火猱援木以升兎走壙而攫之以鶻也其巧扵言也如此余則不能人問以機謝以不知人示以祕瞪目頋視莫達其旨人之所嘉余縦𣣔語舌大如杵不可以舉聞人之言汗流顙泚人之所諱余不能止開口一發正觸禁忌人皆駭咲余不知耻余言之拙海內無二他人有識洞察纎微揭首知尾問白意緇未入其庭已覘其形始瞷其貌巳盡其肺肝而究其緼奥福來熒熒出身以承禍方黙黙預防而避匿其巧扵識也如此余夢夢不知憒憒無所思人之咲吾吾以為喜人之怒吾吾徑情而直趍網羅當前吾以為織絲虎豹在後吾以為犬貍吾識之拙當為舉世師此二者乃吾所大拙其餘癡經戅緯錯綜紛披良平不能筞其數㳺夏不能述以辭德敬豈有之乎然吾亦有不拙者聖人旣没千載至今道存扵經嶽海崇深茫乎無涯窅乎無塗衆人逰其外而不得其內䑛其膚而不味其腴吾則捜摩刮剔視其軌而足其跡入孔孟之庭而承其顔色斯不謂之巧不可也生民之叙有政有紀離為六府合為三事周公旣亡本摧末弊秦刻漢駁而世以不治吾握其要而舉之爬瘍擇類取巨捐細德脩政舉禮成樂備廣厦細旃毎資之以獻替吾扵斯藝雖管仲復生猶将扼其吭而鞭其背是不謂之巧不可也而德敬豈有是乎蓋人有所拙者必有所巧有所巧者必有所拙拙扵今必巧扵古拙扵詐必巧扵智拙扵人者必巧扵天蘇張巧扵言而拙扵道孟子拙扵遇合而巧扵為聖人之徒晁錯號稱智囊而拙扵謀身萬石君拙扵言語而為漢名臣余誠樂吾之拙蓋將全吾之天而不暇恤乎人也今德敬居位處勢誦古人之言而以拙自晦其殆巧扵天者歟巧扵智者歟巧扵古者歟然則德敬之巧也大矣過扵人也遠矣爵禄之來有不可辭矣烏可以不記送王文冏序上旣立太學以育才俊士六七年間竒能足用之人駢興錯出布列乎内外為政咸有可稱已而慮文學之臣未多見也乃詔丞相御史大夫擇弟子員質羙而能文者得三十有五人命博士躬與之講說日程其業而歳望其功丞相召諸生喻上㫖以為古之有文學者若㳺夏以降漢之司馬遷班固唐之諱愈宋之歐陽脩蘇軾皆傑然自立扵世後世從而師之至今不衰諸生何異於斯人㢤烏可以不勉皆謝而退莫不思自奮㧞以稱上意上猶恐待之或未至也十二年春復詔大臣曰朕甚𣣔尊顯諸生慮其未悉吾意諸生入學之日久矣其今歸省其親賜其二親帛各四端有妻孥者携以來月與粟錢務得其歡心勿惜有司費扵是㑹稽王生文冏承命将還造余請曰上之恩諸生者至矣文冏未知所報願有以教之自昔國家之興駿功溢宇内盛氣薄日月天地為之磅礴山嶽為之動揺必有異才之士出而宣之然後上下得其序神人和而庶物育否則災害生焉皇上有天下今一紀憲章文物無譲古昔思得異才出而宣揚盛羙播于無窮而諸生適逢其時一何休㢤是詔一出凡含聲鼓喙者皆當奮躍以效才技況諸生躬承其寵而目覩其盛烏可不思報也士之有文者患不逢治世逢治世患乎無位不得𬒳扵人諸生以羙才際盛時顯位可必取誠能以㳺夏自視如上之所期豈非誠有志者㢤文冏歸見余友梁先生故太學師也尚從而質焉樗散生傳樗散生者錢唐人李氏名詗字孟言少受學越人楊君維禛負氣尚節善為詩賣藥金陵市中名其室曰樗亭而自號為樗散生市人病者趍其門買藥無不與所與必善人人談樗散生羙不置口或問樗散生今人莫不願為材有寸夸尺有尺夸㝷惟恐人不已才不卽用旣用又恐不得大任以為戚之技居無用之名以自適㢤扵是問者謝之咸稱樗散生爲知道者余聞扵建安黄仁云史官曰樗散生之傳不虚矣生豈果知道者㢤君子之道貴乎食焉而無愧吾觀世之人有愧者多矣生豈無見者乎孔子强漆雕開仕開自以爲未信而不願爲孔子恱之樗散生豈學漆雕開者耶然則謂生爲知道豈不然耶或謂生慕樗以不才而壽彼荘生寓言生盖不取云南海髙君墓銘廣州南海之蟾溪有士曰髙君瑛字季卿年六十有四以今洪武十年十月三日卒于家其存時南海人稱其爲長者旣沒舉邑聞之咸哀痛曰長者亡矣其冡子彬居金陵聞訃哭服䘮來請銘曰先考之徳多彬不能悉舉縦悉舉恐人以彬私其親不之信言之公者莫如衆人衆人知先考者莫扵南海人之悉也南海人之稱先考者彬亦不能盡言惟常稱曰長者長者彬自少聞而熟焉碩有以昭之使弗失墜又曰先考居家寛愿愛人貧者有以濟之患難者隨力所至必䘏之故人稱長者不虚口惟先生哀焉夫長者之名莫盛扵漢或曰以其有長民之德可為人長故云或曰其德和善化人如長養萬物之為故云或曰君子之别稱其義之重如是在漢時大臣惟曹參周勃稱長者萬石君之流亦可為長者其他以蕭韓張陳之功業不得以長者稱賈誼董仲舒司馬相如之文章亦不得以長者見稱其不易以許人如此髙君一布衣人交口以長者稱之則其德足以化人而然不可以位論輕重也自古國家必以用長者而興蓋其敦厚可以鎮俗和易可以近民其所為若遲鈍而知大體似無能而有遠效非刻薄軰􅗲目前功者比故賢者貴之若髙君者未甞有禄位且感人若是使稍假之位其功德豈少㢤是宐銘之以為流俗勸君曾祖某祖寳録寳録之兄天禄仕宋季為茶塩司舉父與立母黄氏娶李氏先十六年卒子男三人冡卽彬次曰晋蚤死次曰宏女三人二適邵伯齡黃仲賢一在室孫男若干人震節某孫女若干人彬尚氣節元季甞集民為兵衞其鄕旣而遷金陵将以某年月日歸塟君于某山之原銘曰漢治尚質多任長者淳風茂德化成天下長者之化喬嶽大川莫知其功生物資焉世頺俗壊小智利口取效目前遑恤其後我思髙君長者是銘告尔子孫維德之程方氏譜序方氏出扵榆岡之裔方雷比它姓為最先黄帝時有曰明者在七聖之列其後有囬為帝舜友歴二代方氏不顯至周宣王時叔為將伐叛有大勲烈詩人歌之然皆顯河洛間至西漢末曰紘者為司馬府長史河南尹會王莾篡國遂弃宫徙江南居歙扵是方氏始來江南紘生三子儕儲儼其後子孫甚衆大抵江南之方氏皆紘後而歙其宗邑也今歙山間猶多有方氏祖廟云武昌之有方氏則自元廵檢漢祥始繇九江來遷漢祥之先本莆人而莆之方氏又本閩閩本泉州長史達達歙裔也漢祥之孫鼐以國子生仕于朝三轉為通政司叅議輯其先之可知者為譜而徴余序嗚呼天下之姓多矣孰有若方氏之最先者乎以唐虞以前之氏子孫蔓延江南宐其大顯非它姓比然而今北方之人以方氏為鮮有之姓論姓氏者反不熟方氏何㢤盖姓貴乎後世子孫之賢彼李氏王氏鄭氏崔氏其先非必若方氏得姓之早也以其代有偉人出乎其間人習聞其功名之盛故皆灼然著人耳目方氏自叔以後雖未甞衰絶特以無大顯名之人生乎其裔故迄兹不甚著聞然則為之子孫者烏可不勉哉使一宗之中得一人以顯其先自奮他宗之中亦必有慕效而起者慕者愈多知所勉者滋衆則顯于世垂于後者可得也方氏雖𣣔無傳于人不可掩矣如是而立扵世上以昭前人之緒下以開後嗣之基豈非賢丈夫㦲鼐有學問多才能善爲其軄朝廷咸稱之自兹以往使後世謂方氏顯于今者自鼐始武昌之方自鼐而著其將在斯乎其將在斯乎太古正音序余少時則好琴甞學之而患無善師與之相講說雖時按書布瓜滌堙欎而暢懣憤心弗白是也後聞冷君起𣣔以善琴名江南當時學琴者皆趋其門余尤慕之以爲安得一聽以償夙昔之好乎及入國朝余旣𬒳命起仕而冷君亦繼至時天子方注意郊杜宗廟之祀病樂音之未復乎古與一二儒臣圖所以更張之冷君實奉明詔定雅樂而余預執筆製歌辭獲數與冷君論辨冷君間抱琴爲余鼓數曲余瞑目而聽之悽焉而秋清盎焉而春煦寥寥乎悲鴻吟而鸛鶴鸞鳳追而和之也砯砯乎水合萬壑瀑布直㵼其上而松桂之風互答而交衝也懇懇乎如虞夏君臣上規下諷而不傷不怒也熈熈乎如漢文之時天下富實而田野耆耄乘車曳屣嬉遊咲語弗知日之夕也余倦為之忘寝不自知心氣之平神情之適閱旬日而餘音繹繹在耳誠知其羙𣣔從而學焉而余已老耄不可勉矣旣而冷君出其所次琴譜曰太古正音者示余且曰子之所聞者皆出乎此所未聞者可按譜而學也子可以序之重余有感焉樂之為敎也大矣古之人自非居䘮服有異故則樂未甞違乎左右所以攝忿戾之氣通神明之德其助豈為細㢤後世古樂寖久䆮亡今之所存若琴者無幾士大夫又鮮能而寡聽之雖如余之有志扵學猶有耄老無聞之悔况不若余之質固者乎誠以有其噐而無其譜有其譜而其制不全故也今冷君獨不自私其藝將使人人可按譜而學豈非古人之用心㢤然余恐人見其易而忽之也故道願學之意以見其為術之難述所聞者以告之使人知冷君之用志扵琴甚久非特空言而巳也冷君名某某郡人今為恊律郞嚴宗奭小傳嚴盛宗奭者會稽餘姚人也其裔扵漢隱士子陵家姚江之西性坦質待物無町畦善飮酒然未甞與庸俗人飮薦紳先生過其門不問識否必􅌽致其家為具飮之妻子告無貲宗奭觧衣付酒家奴持去取酒酒至撫掌曰吾無憂矣傾所有奉客務得其歡不為它日計或勸宗奭仕不應朋曹招與飮酒卽著巾往往輒盡醉而返宗奭作軒于舍西號曰臨淸而自號曰客星樵隱且曰山水吾所樂也亦將以矯夫汙濁而冒利者喜讀陶靖節詩撫卷謂人曰是翁可人意或疑宗奭樂隱宗奭曰靖節豈隱者㢤或又疑宗奭自放扵酒宗奭曰舉世無知我者惟酒知我吾與世人言口液乾不領吾意與酒未交口心已相醉故吾得酒寝加安食加旨神充而氣完酒誠我益友何謂放耶疑者愧之宗奭今老矣吾聞扵上虞魏彛仲云為說者曰吾始讀陶靖節詩恠其喜飮酒而又時時稱嚴子陵之為人以為子陵清苦髙勁如喬松秀竹豈飮酒者比㢤及求靖節之志固不為酒特托酒以自適耳無害其為同也今宗奭以子陵之裔而又慕乎靖節其事與靖節不甚相類也豈亦靖節慕子陵之意耶非耶且宗奭謂酒為知巳其亦有所見而云耶抑有所激耶列之以示好事者辨焉危雲林像賛文繼虞歐之盛位居廊廟之尊天下譽之而不為喜衆人毁之而若無聞此公所以為大雅之君子傳百世而長存者乎陳思禮以其讀書像求題作讀書葴以告之古今千載天下萬理曷由知之存乎經史道散文繁歲益月增欲窮其全厥惟難能在昔先覺示我要旨挈其宏綱衆目咸舉苟弃其本而披其枝力瘁心勞弥久卒迷仁恕于民孝慈于家終身有餘道豈在多惟尔陳生嗜學克孝不形于言巳達其要尚虚厥心以誠爾躬聖賢何人敢不慎恭宋學士文集卷七十三朝京槀卷苐三
