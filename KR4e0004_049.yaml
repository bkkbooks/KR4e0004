  text: 宋學士文集卷第四十九芝園集卷第九
  hash: sha256:5892a96680a614e550a3904a44a0fa531bab0cfe7f68724e0a87101b80768dea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_049-1a}
body:
  text: 故詩人徐方舟墓銘庚子之夏皇帝遣使者奉書幣起濂于金華山中時則有若青田劉君基麗水葉君琛龍泉章君溢同赴召遂出雙溪買舟沂桐江而西忽有美丈夫戴黃冠服白鹿皮喪腰綰青絲繩立于江濵揖劉君而笑且以語侵之劉君亟延入舟中葉章二君兢來歡謔各耴冠服服之竟欲載上黟川丈夫覺之乃止濂疑之問于劉君曰此何人斯諸公乃愛之深耶劉君曰此睦之桐廬徐舫方舟也濂故聞方舟名亦起而鼓噪為歡共酌酒而别聲迹不相聞者久矣自時厥後葉君出守南昌殁于王事後五年章君為御史中丞以卒又後十年劉君亦官至御史中丞受封伯爵投老于家復以一疾不起又二年濂亦乞骸骨還山白髮垂領頽然成老翁矣今年冬來朝京師忽方舟之子膺持中書舍人史靖可之狀來謁隧道之銘則知方舟之死已歷一十二年嗟夫人生如寄石火電光真不堪把玩如此良可悲哉濂因語膺以舊事為之悽惻者久之乃序述其事曰方舟故簮纓家自幼有俠氣好馳馬試劍兼善攻毬踘之戲視拘拘法度士如無物稍長幡然悔曰此豈君子道哉即從師受章句為進士業操觚為文輒爛然成章巳而又悔曰是如蠧書蟬出入于故𥿄中何有終期哉人生貴適意曷習古歌詩以吟咏性情庶幾少遂其願耳先是睦多詩人唐有皇甫湜方干徐疑李頻施肩吾宋有髙師魯滕元秀世號為睦州詩派方舟悉取而諷咏之鈢肝劌賢期超邁之乃巳積之既久圓熟璀璨明珠走盤而玉色交映也方舟猶以為未足出逰江漢淮浙間與明士相摩切而詩道益昌江浙行省參知政事蘇君天爵聞其賢力尉薦之方舟曰吾詩人爾其可縻以章􅌧耶竟避築室江皋曰苦吟於雲煙出殁間翛然若與世隔因自號曰滄江散人天大雪獨泛舟釣江中終日戀戀若不忍舍去見者疑其非世間人元季兵亂益韜閉不出易為隱者服人莫知其蹤迹所在有瑶林滄江二集各若干卷唐詩通考若干卷藏于家云方舟平居喜怒不形于色無急步無疾呼罔測涯際性尚風義宛陵羅氏率五百指來避兵方舟衣且食之病者注藥死無所歸則擇地藏之久而弗懈事平具巨舟載其還家至正丙午正月九日方舟以疾卒夀六十八其年某月日葬于某縣霞川之原君子稽其自號題曰詩人滄江徐方舟墓表其志也方舟髙祖某宋四川制置使曽祖某某路提舉常平公事祖某始自淳安遷桐廬今為桐廬人父子竒元中順大夫平江路總管府治中致仕妣皇甫氏妻張氏有婦道前二十九年卒子三人長曰行蚤世次曰鼎次即膺以文學受薦授淮安桃源丞女二人適某某孫男九人曰某曰某云云孫女二人未行濂謂君子出處固立志之不同然亦有命焉當劉君之出也銜方舟以隱自髙數欲挩起之會有故而止方舟獲終老于山林亦起偶然之故哉豫思方舟其人而不可得俯念疇昔衋然傷情乃歷序其故而銘之曰有才不施一發乎詩日星月露草木走飛人事變遷可愕可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化魂無不之非湧醴泉定生靈芝昭德之符千載弗戲洪武丁巳冬十一月具官宋濂造故假母夫人劉氏石表辭濂朝京師有儒其衣冠者介翰林典籍羅奎上謁容止儼雅言辭有倫粲然經緯交錯無龎雜乖牾意心竊竒之叩其姓則廬陵假氏其名則德輔也于是延之上座以傾其所𣣔言德輔避席而請曰德輔先子之殁也歐陽文公實銘其墓先夫人繼喪巳十九年而懸繂之碑未有刻文惟執事者期焉豫既竒德輔意其母有賢行使然及覽周靖所述狀果與見符乃為之序曰夫人劉氏諱妙福字某其先居臨江祖大叔始遷長沙父仕隆存心澤物施槥櫝以千計母吳氏夫人幼敏彗剪製紉結之事不學而能終日不出閨門即出足迹有恆度可坐而數也執父喪哀戚甚不御酒肉至于服終州里慕其人爭致行媒欲聘以為婦父皆辭去假氏初家廬陵龍溪與臨江鄰郡逮子開者亦徙長沙聞其子士龍又賢乃歸之夫人奉尊章處先後咸中禮節媪御率其化無有暴戾之行內外斬斬九族同辭譽之曰懿哉若婦假氏其彌昌乎尊章亦安之家政小大悉屬之夫人絲髮不以縈懷夫樂與才士大夫遊夫人喜見顔色戒媵侍具酒漿脯醢以燕饗之唯恐其亟去父家諸子析㸑分以上田夫人謝不受及其衰也百物多取給無厭辭毋喪葬薶祭祠諸費皆自夫人出夫既先卒夫人恐或廢斁以為前人羞益加整比而家遂大穰夫人生德輔其弟德文則李氏所産夫人撫育如一體人見綵衣翩翩雙舞夫人之側盎然入春風中不識其為異母也二子長亦克自負荷撫世酬物本于一誠子弟無公庭之迹諸事不欲上煩夫人夫人至是春秋亦髙歲時坐中堂子若孫鴈行立堂下前後進觴為壽歡如也至正壬辰兵大變夫人同德輔避還廬陵德文留長沙守先世兆域越六年而亂愈熾夫人復往南昌以德文在長沙也日夕出涕遙望曰吾兒德文何時而來歸乎德文亦泣禱上下神祗謺不見母不肉食戊戌春二月德文忽從間道而至母子相見喜極翻成悲慘八月移吉水潼江庚子六月移梅林渡夫人病暑而卒其月之某日也年七十一辛丑正月十八日祔葬龍溪之先塋夫人二子即德輔德文奉夫人盡孝屢于刀戟叢中傾資以救母群寇義之嘆息而去人稱為二孝子女一人胡氏出也適聶孟宣廣東宣慰副使以道之子也孫男六人毅礪徵鳯溥盛孫女一人適某曾孫男一人辛祐曾孫女五人皆在室豫聞婦人無非無儀故其賢行不出于閨門必得令子而後著如夫人者是巳豫年耆而神昏言且不能成章凡有求文者輒俯首控辭今于德輔獨不然者以有關彛倫之重也銘曰夫人之行貞且則左蹈矩彠右繩尺何以致斯在慎敕秉心如絃絶偏蝕內外肅穆儼若一陽明煦嫗銷隂慝九族觀感亦歸德仁賢上聞天為惻豺虎交橫不敢迫况有令子文五色溫溫出言有倫脊幽光丕昭勒貞石黃金可銷兮銘不泐題危太朴隸書歌後學必慱而後所見精非惟諸經奧旨皆當研摩至于隸書之學漢魏以來其運筆結繩多不同苟不歷考其變何以充其知識而祛流俗之陋哉吾友危先生太朴作隸書歌一篇贈四明汪君大雅備括諸碑之所自且歷疏之亹亹千餘言不休嗚呼世以空虛之學浮談強辨如蜂起泉湧者視此曷知愧哉大雅方以隸學知名于時復能惓惓于先生之詩裝潢􅊞藏惟謹則其尚德之心為不可及巳跋徐氏譜圖後余在幼時聞金華有韋齋徐公諱澄字清伯宋淳熙丁未進士起家教授邵州官至中大夫福建路提點刑獄公事風節行義與義烏徐文清公僑並稱世號二徐韋齋生知南陵縣事靜孫南陵生嚴州司戶參軍木潤咸淳辛未進士號能繼父學者與弟咸淳戊辰進士文潤夀皆百歲司戶生應虎應虎人稱為文蔚先生通諸經尤長于詩且善書立碑碣者多求焉鮮于奉常樞極器重之纍應進士舉不利遂授徒以終其身先生生季泰亦善讀父書以文學稱季泰生敏文采英發縣自諸生貢入成均為弟子員敏間來謁問之乃知先生之介孫豫常拜先生于菱湖上先生所期望者甚大今見敏如見先生焉豫竊怪其書詩之澤何能數世不替如此及敏以譜系圖相示則知韋齋之父贈大中大夫瓊大中之父太府尹綸太府之父九府君衡皆積德樹善有以致之其所由來非一日矣嗚呼賢哉敏悼譜牒厄于兵燹無以知其詳悉心搜訪得數𥿄于蠧蝕之餘欲重為編輯奉父之命求豫為之題識故書其所聞者系于末簡徐氏𥘉居汴梁其遷金華自九府君始云葉氏先祠記昭武葉存恕詣豫再拜求記其先祠豫不得辭記曰惟葉氏世為著姓自宋𥘉則然南渡後有諱武子字誠之者是為息庵先生受業于新安子朱子之門淳熙中擢進士第歷官至祕閣修撰出知處州以終在郡有異政感召至和一年嘉禾生二年麥秀兩岐三年瑞芝産于庭郡人士琢石紀德麗陽祠中處士生主管機宜文字伯憂機冝生修職郎宏銑修職生將仕郎安將仕生光祖興祖有文行用薦者署建寧縣學教諭數世以來祭祀之節並依朱子家禮從事興祖慨念先祠舊在所居之東偏規制淺陋無以展其孝思乃即中堂分為龕室者四以奉息庵而下神主傍親之無後者以其斑祔祭以四仲月正至朔望則三謁焉郡士黃鎮成實為之記元季毁于兵興祖哀慕不能自已復捐私田百畝入樵溪書院以祔祀息庵逮至國朝凡學校之田悉籍于官而祠又廢興祖之志猶不怠卜地于城東三十里曰虗壇築先祠一區奉之如禮經始于洪武四年六月落成于明年正月屋以間計者五錢以貫計二十千且歸田四十畝收其入以給牲醪之用功適成而興祖卒光祖之子存恕興祖之子夀孫思先德之當報念諸父之艱勤宗微㣧薄或不足以負荷恐涉不孝復入田以畝計者六十通前為百畝擇宗人之良者掌之春秋之祭因得不廢其承先志以𥙿後昆者蓋甚切也嗚呼三代盛時大夫士有位于朝者始有田祿以享其親後世之俗不皆三代若也葉氏之家乃能以義起禮因地之利建祠以祀其先不亦孝子仁人之用心也哉豫因為之記使刻于真石為其子孫者尚思引而勿替以延祐于無窮也桂氏家乘序桂本姬姓魯公族季孫後也相傳周末有季楨者與其弟桂挾䇿以干諸侯楨為秦博士𬒳害桂懼禍且及遂謀詭姓遁身因即其名取字異而音畫不同者各命四子為姓示不忘厥𥘉也伯子曰桂奕居幽州守墳墓仲子曰昋突遷冀南朱虛叔子曰炅奬徙齊之歷山季子曰炔裝移河南城陽自後四族流布多見諸紀載或謂睦與桂同音而出睢弘者固非或謂東漢末衛尉昋橫分其四子各係以姓者亦失之也奕之子孫仍居幽燕五代之亂劉仁恭據幽州兵連禍結乃扶携南渡散居廣信上饒九江興國池陽豫章成都諸郡而居信之貴溪者曰仔鄉任南唐為靜邉總轄使至宋加檢校國子祭酒兼殿中侍御史有功于世鄉人廟而祝之其後人擢科第躋顯仕者凡數十人而興國之永興明之慈溪皆自貴溪分而慈溪一族則出于祭酒之孫可升亦多由進士入官至今支系尤盛逮我國朝德稱以明經為太子正字升晉王傳受知兩宫令望隆蔚德稱從弟仲權擢忠之鄷都令孟誠知惠州河源縣復皆以政學聞仲權家食時乃合諸族譜圖及行狀碑志遺文釐為九卷曰桂氏家乘命德稱之子中書舍人慎徵豫序之慎嘗從豫學因為撮其樞要冠于篇端嗟夫氏族之學古昔所甚重浹漈鄭漁仲著為通志其中二十略唯氏族最備然而墨台氏逃難而改為墨牛金之子亦因避害而易為牢漁仲謹識之而不敢忽重變古也豫故特書桂之所出為魯公族者其意亦猶是爾桂氏之嗣人尚思有以謹其傳焉豫既作此序巳客有以秦之篆隸與後世正秸異未必其畫之同疑出好事者之傳會殊不知隸書出于秦之先而與今之楷書正類要不可以此而遽少之也因并及之故朱府君文昌墓銘豫居浙水東時得朱君好謙之文嘆其善于修辭惜未及與其交而好謙殁于兵及來京師又得好謙從弟文昌詩閲之沖淡類漢魏雄健如盛唐復嘆曰何朱氏一門之多賢哉未幾國子助教曽君旦𥘉同文昌冡子堅持知嘉定州事張􅰱狀來謁墓道之銘蓋文昌之死巳四年矣豫重違曽君之請不敢辭文昌諱嗣榮文昌字也姓朱氏出唐散騎常侍滿之後滿本歙人來徙金溪明暘里世為衣冠甲族宋道州營道丞登生太學上舍生恢之恢之生銓銓生貴清貴清生仲梓文昌父也元初避地桃峯復遷家焉文昌治舉子業甚精通毛氏詩訓故折衷于朱子之説毫分縷析唯恐不合情性之真下筆千餘言不休走試江西鄉闈立論與有司不合即棄去一假古律詩以自見歷代諸大家皆探微索隱必𣣔得其旨趣而後已用工之深出語輒驚人然不特精于詩甚輕財仗義尤人不易及少時嘗以錢粟貸于人一旦自責曰蠅頭之利其能汨沒男子之志邪悉集受貸者于庭取其所留質劑面焚之其後家單無旦夕之儲恬不為怪人有憫其貧畀良田百畝者文昌疑其不義辭弗受鄉友罹患難屬文昌為之解紛餽白金一鎰為文昌壽文昌笑曰吾雖貧亦惡用是哉卒直其事而還其金至正壬辰江淮兵動里之無賴少年相挺為變其首禍者頗與文昌遊乃來説曰公藏器于身不以此時取富貴尚何俟耶文昌叱之去遂與絶交未幾竟敗沒文昌宗黨知事變不測椎牛釃酒起兵為堡障屹然孤立數年而群寇不敢犯文昌之謀為多偽漢陳友諒犯南昌諸郡相繼陷文昌曰此非吾輩之力可攴盍各逃死乎乃挈一族入閩中雖備嘗險阻略無怨悔意後五年國兵取江西州縣皆入職方文昌始還鄉里卜居澄源上遺落世故絶無毛髮縈心所不忘者唯詩耳因扁其室曰嘯雲軒云東平穆敬來為縣欲起文昌為縣學師文昌曰吾老矣唯消搖林壑為冝耳橫經講道豈所堪哉因固辭而去性愛佳山水自謂得堪輿家不傳之祕稍暇輒布襪青鞋登陟不少倦不幸以洪武七年二月十四日卒夀五十六所著書有政鑒若干卷燬于兵尚存詩詞三百餘首題之曰燹餘集娶王薑二氏王先十九年卒子二曰堅曰重堅即請銘者孫二曰振振曰繩繩孫女一某年月日卜葬明暘里長岡山文昌所自擇也夫詩之為教務欲得其性情之正善學之者危不易節貧不改行用捨以時夷險一致始可以無愧于兹如君者蓋近之矣世之人不循其本而競其末往往拈花摘豔以為工而謂詩之道在是惜哉銘曰詩之為教著于禮經溫柔敦厚本諸性情君子讀之豈惟多識玩其指歸感善懲逸我甑生塵我衣懸鶉非義之物肯受諸人如斯學經庶可無愧留連光景敢曰吾事彼蒼者山秀色可餐洗心滌慮是躋是攀髮猶未皤嗒然觀化何有短長無晝不夜長岡之原桂老水寒魂魄未歸兹焉是安惇史造銘詒爾孫子慶源方深其流瀰瀰故贈奉議大夫磨勘司鄭公墓志銘溫之平陽有剛毅之士曰曲全公諱采字季亮姓鄭氏賦性分特唯道之從不屑屈人下年二十而其先人捐館州里群少年怙其氣勢因公少孤欲肆其狎侮公奮然自勵曰大丈夫有髯如戟肯受狗鼠輩侵凌乎束書出門遊浙河之東西道經金華金華為部使者治所使者聞公至請見之既見竒其才將辟為府史公以為辱巳力辭而出時仲兄講授崑山公趨就之年巳二十有四矣仲兄勉公以學公始肆力于六經群史間冬大雪輒擁重衾厚懞而坐夏熱蚊蚋且噆人則習之陋志卑而氣歉撫世酬物一以詭隨為務公之剛毅凛凛不逐物變移其君子之人歟雖然申棖親遊孔子之門尚不以剛許之剛在古人亦甚以為難有如公者其君子之人歟縱不得享人爵以行其志而天爵之在躬固皎然無愧也是冝銘銘曰哲人立志以剛為質遵道而行不詘于物不屈者誰東歐之賢其賦自天其直如弦狗鼠肆欺翩然東去歷覽山川發舒壯氣繡衣使者一見稱竒爭言可吏謝而去之乃潛厥心乃遊六藝乃騁辭章聊以俯殉繩尺往試有司意我矯亢黜去不疑大笑而歸肥遁不出英英白雲生我几席淫林化水殺我黍苗生民嗷嗷孰地可逃走白上官雙淚如注中誠感通卒蠲乃賦化此呻吟而為謳歌仁人之言計功實多室如懸罄心則好施視彼顛連如巳顛躓解衣恤寒縮食濟飢貪夫聞之寧不愧而俗衰民散師道不立冝留一鑑為世楷則胡為長逝魂入九泉獨留遺文虹光燭天餘慶所鍾有子能令出鎮方嶽敷政柄隧道之章載揚清芬佞人讀之當為裭魂故贈承事郎大府斷事官尹府君墓志銘國朝之制凡入官者自七品而至于第一咸得推恩及其先人官有崇卑故其恩有隆殺焉今刑部尚書尹性其為大都督府斷事官時嘗請于朝得贈其父府君如某官階承事郎母章氏封宜人性既虔奉命書櫝置惟謹復用黃綾謄為副墨具冠服佩綬如法焚燎于府君墓下性竊自念皇靈如天覆燾九圍惠澤沛滂兼𬒳存殁苟不圖文勒諸琬琰何以上昭帝力下示後昆乃屬其友鄭君思先采掇群行成狀而徴濂為之銘濂按狀府君諱元良字子貞會稽人也世為簮纓巨族曾祖某祖嗣宗父恂元溫州路平盈庫副使妣李氏府君溫而克毅卓識異于人事二親鞠躬盡瘁惟恐逆其志副使君殁于溫府君不憚二千里之逺涉濤江而往艱難險阻莫不備嘗雙足為之皴裂扶櫬而歸卜宅兆藏焉當是時二弟某某尚幼府君聘致名講師訓之以經朝夕督䇿之恩意備至及長各為授室巳而乞析㸑甚力府君止之曰兄弟同一氣而生猶手足之為四體其可分之乎弗聽府君指田之磽瘠者曰此豫之所愛也指器之苦窳者曰此豫之所嘗用也盍歸我腴土嘉具悉讓與之閭井以為難能先是府君之從父兄既耄且貧仰食于府君家二妹亦未有所適至是各異居咸倀倀無所之幾欲墮淚性甫七歲告府君以其故且曰非吾父是依將疇從邪府君喜曰爾真吾兒也正符吾志遂獨養耄者終身飾奩資以嫁其妹性後入官尤以廉勤戒之其言踰千百云府君雖老耆學不厭六經群史罔不研究之每晨興挾册映簷光而讀稍倦輒拄頰看雲出入巖岫間夏然如在塵外有嘉賔至令庖丁治酒殽相與劇飲酣觴淋漓燭不見跋不止也故為之姻連者則曰尹公其吉人哉為鄉鄰者則曰尹公信端士也大氐皆得其歡心云府君壽七十又一以洪武己酉正月甲寅卒于家其年九月丙申葬會稽縣廣陵鄉黃龍山之原禮也配即宜人男三人長即性近擢今官階通議大夫次權次𥘉女二人適同郡司馬升金傑孫男四人經質敏學經早卒女一人豫早聞性名知其制行之卓其居官也如氷清玉潔誘以黃金滿槖弗顧也今幸與之同朝又知其精于法家之學操心平恕不使有冤民非府君家教之篤其能致然耶若府君者其可銘巳性今位居六卿之中于法得加贈他日榮光下燭泉壤重榮又當濡毫為性紀之銘曰越有君子篤行于家涖事必誠質而不華事親如天跬步不忘洞洞屬屬唯敬是將親殁于溫蒲伏往迎扶襯夜哭水為失聲鞠育諸季竭其恩勤扶翼覆護如親之存耄者養之弱者嫁之營之經之以遂我私春秋既髙謝絶塵氛拄頰凝視山川出雲賔至如歸劇飲而歡夜深月落聲出戶間積善之餘無鬱不舒有子升朝朱衣金魚皇明如天恤典攸崇澤漏九泉于以勸忠廣陵之鄉嘉樹鬱蒼太史勒銘永世其藏元故湖州路德清縣尹陳府君墓銘吏部主事陳咨詣豫言曰咨試藝京畿時先生實為主司屢欲求銘先府君墓已而授河南行中書檢校官書有程竟弗獲遂前志及仕銓曹而先生謝事東歸晝夜恆懸懸入思今逢先生朝京師敢奉同郡宇文材所托事狀以請惟先生卑矜之豫按狀府君諱嗣字仲貞姓陳氏世居湖之長興其先出自漢太丘長實實傳若干世曰某宋臨安丞臨安生某遷居郡城之南以資雄于鄉年九十乃終生某積學勵行有聞于時自號為庸齋庸齋娶施氏無子擇從子為之繼惟府君風指孤鶱足以當其意因後之府君性軒豁開口吐肝膽好傾資結賔客或有急難輒捐金以濟之既而曰人不可以無教不教惡足以明彛倫乃建義孰聘致名師州里子弟願從者悉聽其入材多有成元季汝頴兵發蔓延浙水西髠鉗盜販者相挻為變府君推牛釃酒聚年少健兒授以控扼之䇿盜不敢侵其境會朝廷遣使者詔民入粟拜爵府君慨然曰國家有急豈臣子顧私時邪首往應詔輸粟二千斛使者大恱即以上聞著府君德清縣主簿德清湖之屬邑府君素知其土俗視事始閲歲吏懾人懷曽未幾何張士誠據姑蘇兵陷湖州城守臣退居德清府君曰杭為東南方面之寄德清實杭之北門德清破則杭無置足之地矣冝急保之遂與上下謀竭力死守軍食或不繼以身仕之江浙行省平章政事買术丁方總兵事上其功狀升為尹逹識帖木爾時以行省右丞相承制行事欲招士誠降命府君持檄諭湖州偽師以離其黨與府君慷慨請行既至偽帥延之上坐府君為敷陳大義何者為順何者為逆逆則罹禍順得受福繩繩千餘言偽帥不覺屈膝城遂來歸丞相大恱而府君不幸以母憂去自時厥後府君度時事不可為纍辟不起以至正某年某月日卒于歸安縣之寓舍享年四十又五以某年月日葬于烏程縣三碑鄉賢子塢先塋之次娶吳氏有賢行頗涉獵書史至于隂陽醫卜種樹之書皆通其義後府君若干年卒遂合葬焉子男子四長即咨次某次某次某孫男二某某嗚呼府君以卓犖之才少見諸用巳焜耀鏗鍧若此况使盡其所藴者乎然而炳于幾先長往山林而不之返非賢而能爾乎今逢六合載清禮樂文物之盛比隆唐虞而府君巳逝不及見君子寧不為之太息乎雖然府君有子以科目入官政迹昭著府君雖死其不死矣乎銘曰天之生材或塞或通秪繫于時所以不同有倬陳君氣岸弘整表裏一如錙銖無隱里有急難捐金如泥蹈彼水火必思救之欲明􅉓倫我建我孰載揚師訓開其耳目元季政龎亂如沸羔浙河之疆烽火煌煌奮襼大呼聚厥勇士持爾干戈捍我鄉里出粟輔官勾稽簿書隱然堅城寇不可踰封豕長蛇據我大府奉檄往諭氣可攝虎義嚴辭徑直中其機不覺屈膝請降恐遲相臣嘉之謂為俊傑軍威大振孰得而遏君則曰噫此胡可為大厦將傾一木莫支尋以憂去遂臥不起朝餐煙霞暮采蘭芷令終于家州里咸嗟有材莫展時乎命耶靈風肅然吹彼樹魂兮來歸妥此幽隧修慎齋記修慎齋者中書掾葉杞孟堅之所自名也孟堅之言曰𣏌居括州麗水之陽父母俱存兄弟無故足迹皆不出里門一家之和其祥氣殆可掬而有也頃因鄉里推擇習刑法之學于大府遂充貢來南京季弟孟年實與之偕行朝夕奉承甚謹既而中書選為刑曹史閲一載升為令史父在家聞之有書來曰刑曹決天下之獄獄情萬變爾勿使有寃民朝夕洗心滌慮以承上官不可循一髮私羞服之用當于我乎給之苟違我言必將辱于吾矣自時厥後有從括來者輒致書一年之中不下五十畨書中之言無異于前時所云父猶恐書不能盡逹也復使仲弟孟才來致備用諸物且申言之留連再月依依不忍别既别歸吾父問其狀甚悉喜曰爾往終勝簡牘之往還然又不若吾親見爾兄為稍慰耳時赤日如火即詣縣給過所直抵南京一相見頃悲喜交集晝夜訓飾之比前為尤詳且曰今朝廷清明廉吏無不登乎樞要尓當氷雪其操他日衣繡還鄉以慰慈母倚門之望豈不華哉亦留連再月而歸杞亦念父不置越數月適年勞及考急謁告東歸諸弟聞之歡迎三十里外杞升堂展拜問起居父子相抱持喜極不能成語曽未幾何部檄下州中趣𣏌上道父不忍子行潛然出涕乃陽謂𣏌曰幸因爾行得為錢唐一遊庶攬湖山之勝𣏌知其故力止之不從既至杞又止之還父復曰姑蘇抵此三百六十里耳其風物比錢唐尤勝吾何可還必至彼乃與爾别既至𣏌又止之還父復曰姑蘇至南京不逺矣我之情事尚未與爾畢之可遽先還耶杞遂不敢言于是同至又再踰月而别嗚呼世之為父者孰不知愛其子如吾父之深切十百之中不知寧幾見耶𣏌夙夜佩服戒言惟恐辱其先因耴經中修身慎行之語名其寓居之齋曰修慎願為𣏌記之豫聞仁人孝子之思其親何時而能巳耶山不足為之髙海不足為之深此無他昊天罔極之恩終不可得而喻也𣏌能不忘此時之思朝夕以之一動也修慎一靜也修慎則無負尓父之望矣杞尚朂之哉故倪府君墓碣銘吳郡有名世之醫曰倪府君諱維德字仲賢其先家于汴梁曽大父某宋某州防禦使生秀文值宋籙既訖乃挾醫術遊大江之南遂擇郡之吳縣居焉秀文生鼎亨能紹家學有聞彥修之殁豫已銘其墓今府君之子亦復惓惓為豫安得固辭耶因歷其行事而銘之銘曰醫者之學素問為宗猶儒治經専門是攻寒暑溫涼升降浮沉或􅊇或順制治最深隨時立方始與疾同正氣既攄邪沴乃融粗工蚩蚩守一不移執中無權罔契其機羣昏方酣苟不力扶冥冥夜行摘植索塗三家者興上窺本原如揭日月照耀天門伊誰承之作世范模東則有朱西則有倪宋學士文集卷第四十九芝園集卷第九
