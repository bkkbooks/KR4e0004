  text: 宋學士文集卷第十二鑾坡集卷第二
  hash: sha256:bb69e043e81c687fe70437e72d637b547f483b0e02ed08df623dcca84b6fa14e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_012-1a}
body:
  text: 題郝伯常帛書後霜落風高恣所如歸期回首是春𥘉上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放鴈獲者勿殺國信大使郝經書于真州忠勇軍營新館右郝文忠公帛書五十九字博二寸髙五寸背有陵川郝氏印方一寸文透于靣可辨識蓋中統元年三月辛卯元世祖登極欲告即位定和議于宋妙柬廷臣唯公最冝四月丁未授公翰林侍講學士佩金虎符充國信使以行宋相賈似道拘留儀真不遣至元十一年六月庚申下詔伐宋問執行人之罪時公在儀真已十五載以音問久不通乃于九月甲戍用蠟丸帛書親繫鴈足祝之北飛十二月丙辰伯顔南征之師竟渡大江十二年二月庚午似道懼命總管假祐送公歸國三月虞人始獲鴈于汴梁金明池四月公至燕都而七月辛未遂卒年僅五十三爾其書中統十五年即至元十一年南北隔絶但知建元為中統也十三年正月甲申宋亡帛書為安豐教授王時中所得延祐五年春集賢學士郭貫出持淮西使莭頗見焉遂奏于朝敕中使取之十一月太保曲出集賢大學士李邦寧以其書上仁宗詔裝潢匠成卷翰林集賢文臣各題識之藏諸東觀而王約吳澄袁桶蔡文淵李源道鄧文原虞集皆有所作矣昔蘇武使胸奴胸奴詭稱武死漢昭帝使􅎅者諭云天子射上林得鴈足有帛書言武牧羝澤中武因獲還此特出一時假托之辭非有事實也今當一介行使不通之際鴈乃能逺離矰繳而將公書至汴其殆天欲顯公之忠莭邪會公巳北歸故獲者不以聞不然則是書之所繫豈細故也哉或謂世祖見書有四十騎留江南曽無人如鴈之嘆遂興師伐宋皆好事者傳會之談而不知有信史者也濂修元史既録詩入公傳今復書歲月先後于卷末以見鴈誠能傳書云王弼傳王弼字良輔秦州人遊學延安北遂為龍沙宣慰司奏差龍沙即世謂察罕腦兒者也弼以剛正忤上官去隱于醫至正二年吉巫王萬里與從子尚賢賣卜龍沙市冬十一月弼往謁焉忿其語侵坐折辱之萬里恚甚驅鬼物懼弼弼夜坐讀金縢萹忽聞窗外悲嘯聲啓户視之空庭月明無有也翼日晝哭于門且稱冤弼召視鬼者厭之弗能勝弼乃祝曰豈豫藥殺爾邪苟非豫當白爾冤鬼曰兒閲人多唯翁可託故來訴翁非有他也翁若果白兒冤冝集夀俊十人為之徴弼曰可人既集鬼曰兒周氏女也居大同豐州之黑河父和卿毋張氏生時月在庚故小字為月西年十六毋疾父召王萬里占之因識其人毋死百有五日當重紀至元三年秋九月丙辰父醉卧兄樵未還兒偶步墻隂萬里以兒所生時日禁呪之兒昏迷瞪視不能語萬里負至栁林反接于樹先佛其髮纏以綵絲次穴胸割心若肝暨眼舌耳鼻瓜指之屬粉而為丸納諸匏中復束𥿄作人形以呪劫制使為奴稍怠舉針刺之蹙額而長號昨以翁見辱乃遣報翁兒心弗忍也翁尚憐之勿使銜冤九泉兒誓與翁結為父子在坐諸父慎毋泄泄則禍將及言訖哭愈悲弼共十人者皆灑涕備書月西辭聮署其名潛白于縣縣審之如𥘉急逮萬里叔姪鞫之始猶撑拒月西與之相反覆甚苦且請録其行橐遂獲符章印尺長針短釘諸物萬里乃引伏云萬里廬陵人售術至興元逢劉錬師授以採生法大槩如月西言萬里弗之信劉于囊間解五色帛中貯髮如彈丸指曰此咸寧李延奴天曆二年春二月為吾所録爾能歸錢七十五緡當令給侍左右萬里欣然諾劉禹步焚符祝之延奴空中言曰師命我何之劉曰爾當從王先生遊先生仁人也殊無苦萬里如約酬錢并盡受其術復經房州遇鄺生者與語意合又獲奉元耿頑童奴之其歸錢數如劉今與月西為三人矣劉戒萬里終身勿近牛犬肉近忘之因啖牛心炙事遂敗尚復何言縣移文豐州追和卿為左驗和卿頗疑之雜處稠人內弼陽問誰為爾父月西從壁隙呼曰黑衣而蒲冠者是也和卿慟月西亦慟慟巳歷叩家事慰勞如平生官為具成案上大府萬里瘦死于獄部使者慮囚召月西置對弗答吏罵曰獄由爾興今反不語邪月西曰殺我者既伏辜矣喋喋將何為尚賢竟以賂免𥘉弼訴縣歸親賔持壼觴樂之忽聞對泣聲弼詢之鬼曰我耿頑童李延奴也月西冤已伸翁寧不憫我二人邪弼難之頑童曰月西與翁約為父子而吾獨非翁兒女邪何相遇厚薄之不齊也弼不得已再往縣入牒官逮頑童父德寶延奴父福保至其所驗皆如和卿而鄺與劉不知其里居竟莫致云自是三鬼留弼家晝相隨行夜同弼卧起雖不見形其聲琅然也弼因從容問曰衛門當有神爾曷從入月西曰無之但見繪像懸戶上耳曰吾欲爇象泉賜爾何如曰無所用也曰爾之精氣能久存于世乎曰數至則散矣二僧見弼一華衣一衣弊服華衣者居右月西曰爾為某惡行萌某邪心尚敢據人上乎彼服雖弊終為端人耳命易其位僧失色起去頑童善歌遇弼飲則唱漢東山及他樂府為夀弼連以酒酹地頑童輒醉應對皆失倫客戲以醯代之頑童怒曰幾蜇吾喉吻矣何物小子惡劇至此嘵嘵然數其隂事不止客慙而遁月西尤號黠慧時與弼諸子相謔言辭多滑稽諸子或理屈向有聲處擊之月西大笑曰鬼無形兄何必然徒見其不知也凡八閲月始寂寂無聞翰林學士承旨李好文節官中獄案造記而燕南梁載又為序其事二文互有得失子乃合為一傳而其辭不雅馴者痛刪去之弼尚存年六十八矣有司誤以其能異術貢之南亰上賜衣一􅊞遣還時洪武四年冬十二月庚辰也史官日司馬遷云漢武帝置壽宫以奉神君神君非可得見其音與人言等時去時來來則風肅然也豫竊疑焉音麗乎形者也無形矣音何從出哉今周女無形而能人言何其與神君類歟且自重黎絶地天通人鬼始分禹鑄鼎象物其政益備矣後世姦巫鬼師乃使之瀆亂常經其咎尚誰執哉雖然吉巫之術狡矣而卒𬒳鬼所殺人禍天刑終不可逭為惡者盍少知懼乎抑剛正若王生鬼不敢害之反敬畏之是知君子挺立天地間仰不愧也俯不怍也妖得而侮諸奈之何棄君子而弗學者衆也悲夫元故廬陵周府君墓碣銘有序濂校文南宫獲讀江右周子諒所對策燁燁有竒䇿因拔置前列未幾子諒擢進士苐主事起曹日與之周旋乃出古文辭相示豫復愛其峻潔而雋永竊意淵源之來必有所自巳而子諒奉廬陵教授李處敬狀請銘其先府君之墓于是又信其家學相承之懿雖不能文憫其美之弗章也庸因狀之所述而列之府君諱鼎字仲恆姓周氏其先自安成徙廬陵奕葉為儒至府君益刻厲自奮思趾美于前人每試藝鄉校立論必超群彥右見之者矍然自失府君復以埸屋之業不足為乃去從湜溪郭氏遊湜溪名正表得靜春劉氏三傳端緒靜春實考亭之學也府君因與聞伊洛關閩之微旨六經中有所疑滯從橫扣擊唯恐其弗明積功既久多超特之見且謂詩分正變之説固肇于漢儒然而正中有變變中有正不可執一而求况其體製音節敻然不侔若虗心玩之䇿書紊亂瞭然可見必各從其類然後可辨世道升降之由其詩雖非盛時之作其人既賢其音猶近于古必附小大雅之正者勸懲之義庶有托焉先王以禮樂化成天下而于詩之用見之其效至于協和人神之應非空言比也府君之名自是絶出四方執經問難者戶外之屨恆滿府君坐臯比為敷繹性名之説析其顯微約其異同往往神怡心醉而去年逾四十出逰江漢間同里范君匯方提舉江西儒學延致府君為豫章學者師其劍舄奔湊如家居時東南良二千石多名公卿出受承宣之寄欲猗府君以為重玄纁束帛交致于門府君皆不受間一往應九江之聘既至處以賔師之位亡何復棄去方嶽大臣馳書與幣請考試鄉闈府君辭又舉府君晦迹丘園府君庋其文髙閣漫若不復省當是時天下承平士大夫耻及邊事府君獨憂之力言四海大勢日趍于亂一夫操戈而起則江南無駐足之地此正可慟哭之時奈何肉食者不知慮邪遂著濟時十二策及戰守之書數千言將走闕下獻之或指府君為狂府君笑曰吾非狂吾言後當驗耳瀕行思毋夫人春秋髙遂止後五年辛卯汝頴兵動江南受禍最酷一一如府君言南昌學徒因乞府君䇿上之中書亦授九品官以歸初府君嘗出應鄉書不肯少貶以就繩墨故不得志于有司及赴部使者私試輒在首選評文者虞文靖公也甚加器重且有安得起成周樂工共論斯文之嘆府君言禮樂之化有契虞公意故不覺慕咏之深也不幸年甫五十又八竟以一疾不起實至正乙未十月十六日也天乎命邪府君之先曰世德生甫三歲其父汝正求兄漢中不知所終其毋彭氏年未三十以節自守至九十一而亡世德生天和天成皆以通經為人師有不逺千里而就學者天成生浩能讀父書尚書禹貢洪範嘗重正其訛舛其于春秋則盡黜三傳而獨遡求孔子之旨人尊之稱為鐡石先生天和生冕蚤以推擇為郡曹掾遷海北憲史著廉直聲則府君之父也妣郭氏湜溪從女弟婦道毋儀兩無所愧配室李氏繼室李氏王氏于男子三長恂蚤世次愷即子諒今以字行承事郎工部主事次孜子女子二歸郭遲郭經皆先卒孫男一圎女二以某年月葬府君于里之楊梅原堪輿家謂非吉兆又改葬于屏山之麓實洪武四年正月之甲申也府君天資純孝憲史君殁于廣東府君奉柩舟東還水陸數千里冒巖壑之險絶濤瀨之危每涕泣呼天卒賴以濟類有物隂相之者為人俊爽負氣節長身美髯昻然玉立蓋偉丈夫也賔朋滿座尤喜論史或觸其辭鋒上下古今蟬聮不能休復曰如此則治否則亂如有用我者舉而措之耳性嗜古文一洗宋季刻削纎弱之弊委蛇曲折各極其事情六經皆有論著未及完獨詩經辨正若干卷藏于家詩文曰貞一藁者又若干卷傳學者其孟子管子商鞅諸論為最偉云濂聞王文憲公每疑秦火之餘詩多錯簡今世所傳決非孔子所刪之舊欲釐正之有志未就而亡府君之生未嘗與王公同時又未嘗習聞其論説而其所見若合符節雖曰卓識逾常人逺甚而至理之在人心者終不可誣也昔者歐陽氏頗疑于河圖洛書始亦自信其獨見既而得衡山廖稱朱陵編觀之其説絶與之類故為序其書于心之同者屢致意焉夫圖書者本無可議尚以涉于神怪而非之况詩之音節體製不可強同辨而正焉方謂有功于經學者溺于久習之傳反譁然而疑之抑亦過矣王公已不可作謹列府君之行銘諸墓門用以慰夫九泉之下使知死雖未久猶有識其心者則夫千百世之逺未必無其人餘蓋不足恨也銘曰秦火之烈六經中絶我心䀌傷兮汗簡散落後先參錯乃理之常兮廬陵有儒世守經畬有燁其芒兮疊矩重規擲幽發微無䀲不明兮伊君斯繼益衍弗墜其出愈卭兮閩南之學日星昭灼我知其方兮察體審音載咏載吟别類分章兮勢或犬牙正變紛拏大潴失防兮詩用斯著禮明樂備王道孔昌兮其學之暐有聲四起襟佩瑲瑲兮濡嚌聖謨敷繹道樞孰敢弗蘉兮譬如衢尊飲者欲奔何用不臧兮卓爾先見即知治亂覆謂為狂兮材不時用道則彌重孰短孰長兮學有子傳吐辭淵然五色焜煌兮八尺之塋有山列屏千載其藏兮故龍南一峰先生鍾府君墓碣銘有序府君諱柔字元剛姓鍾氏其系出于魏侍中繇繇之十代孫紹京字可大事親孝自為童時凡得瓜果必先進最工書人號為小鍾蓋以繇為大鍾也嘗直鳯閣後從唐元宗平內難拜中書侍郎始居贑其諸孫曰某遊宦龍南復為龍南人傳至諱胄字少遊者擢元豐五年進士第歷二廣轉運使以功烈聞性尤至孝父殁哀慟劈踊聲不絶于口群烏助之哀嗚人為建感烏堂府君則其裔孫也曾祖淳祖德賢皆抱道潛耀以自樂父克俊在宋之季輔國學上舍生聞三宫北遷紏集義旅為勤王之舉勢既不可為乃登贑之馬祖岩遙望中原白雲渺瀰而翠華不可復見悲歌激烈聞者涕下巳而痛憤益深誓不食元之粟賦詩一章有自許有身埋漢土終憐無淚哭秦庭之句遂赴龍頭江而死其忠義之志蓋皎然云府君生甫一歲宋𥘉改物兵燹猶未息祖母吳氏與其母劉夫人挾之走南雄艱難險阻莫不備歷府君幸既長俾歸從鄉先逹雷州推官劉公震遊夫人月自程督之府君性既頴拔復知以紹述為事昧爽即興抉册映簷光而讀至夜漏下二十刻亦弗休由是融貫于經子史集諸家握筆為決科之文頃刻千餘言長風驅濤而雷電與之相後先也夫人喜曰吾有子如是吾夫子為不亡矣夫人或與府君語及龍頭江事府君輒長號弗輟幾欲無生及祖母與夫人相繼而逝府君竭誠于葬祭之禮觀者咸曰鍾氏世有孝子感烏堂之作不得專美于前矣府君𥘉娶田州判官凌君昌任之女生一子而卒興寧尹馬君良竒府君之為人復以女妻之遂同之官凡馬君之善政所以鋤姦扶懦滌冤疏滯者皆府君有以發之廣東帥閫及海北廉訪使者聞府君學行之懿交薦之署為雷州路學正府君以海濵非久處之地力辭而歸下簾講授從者數百人咸共推尊之號曰一峯先生云府君儀觀偉然終日正襟危坐人莫能窺其際晚益刋落英華窮極根抵所居僅蔽風雨所入僅足饘粥而處之怡然至于赴人之急雖蹈水火有不暇顧者君子尤稱之府君生于至元丁亥正月某甲子殁于重紀至元辛巳十月某甲子得夀僅五十又五瀕卒無他言唯屬子力學厲行毋墜家聲而已所著書有諸經纂説易書詩衍義弊帚集若干卷藏于家府君凡三娶𥘉凌氏生一子即恕字以行至正癸巳鄉貢進士署濂溪書院山長不赴次馮氏無子次􅓸氏生二女一早世一適凌德祥孫男三人曰肅曰緝曰熙女一人適某曾孫女二人尚幼府君之卒也葬干龍山之南洪武庚戌秋八月某甲子再遷于仙女湖之西與凌氏合葬焉實縣南之五里也惟府君生于忠孝之門耳濡目染巳能立乎其大者及求諸六經驗諸躬行所見益真切所獲益粹凝雖不見用于時而弟子從之者皆知所謂孝悌忠信其有功名教甚多是亦為政也中州君子恆言虔南為遐荒之地賢才鮮少有若府君者其裔胄之悠久家學之盛著文行之隆蔚𥘉亦何減于中州人之好論議往往如是是重可嘆也因按鄱陽董先生之狀大書以銘府君之墓庶幾白府君潛德于逺邇虔南之士讀余文者亦當有所奮勵而興起焉銘曰媺人之班班乎而忠信以為冠乎而佩純知而鞶華文乎而光彩之如璊乎而長才詘而弗信乎而􅞽政而屏姦乎而柔之立而強之刓乎而皋比設而師道尊乎而反澆涼而為龎惇乎而一鄉之善士質其玉溫乎而岐有鳴鳯魯有祥麟禹而天之生賢無方何暢復何屯乎而勒銘墓門乎而庶昭昭其永聞乎而承事即彰州府彰浦縣知縣張府君新墓碣銘有序張之為著姓尚矣自軒轅第五子青陽生揮為弓正觀弧星始制弓矢因姓張氏歷代以來勳賢軒冕未嘗乏人其居饒之德興吳闡里者諱鵬仕唐為節度使至五季時子孫猶授節鉞宋天聖中龍圖閣直學士燾嘗同文潞公諸賢為洛社耆英之會暨還饒見旁縣安人有山名若嶺林樾蒼潤靈氣回合因移居其下五世孫一清中特科進士第一與同邑湯文清公最相友善推究經傳反覆詰難必得肯綮乃已自時厥後族日以蕃讀書之聲琅匕乎西東擢上第者凡十預薦送者二十又七薦紳以為榮一清若干傳至宣義郎某宣義生某舉進士上南宫歷斥時政之弊有忤執政遂下第某生英肥遁終身飲水著書以自樂有春秋屬辭若干卷藏于家英之兄國學上舍某當宋籙將訖帥安仁義師從謝枋得勤王及戰敗家遂為墟英子禹受方在幼最號孤貧後能遵廢舉之術大振其宗田貨悉逾于前人𥘉無嗣育仲兄某之子璵為後年四十七始生府君府君諱理字玉文十歲通經史十五能屬文父恱曰吾宗書種弗絶矣為築義湖精舍于室之南偏聘明經老生為師遐邇之士鼓篋而來咸食飲之由是遊從者日衆而府君聞見益廣縣令長嘉之旌其里曰儒賢云府君以纍世科名欲起而踵其後復往從廬陵王君充耘習為程試之學較藝江浙鄉闈不中遂學詩于翰林學士承旨張公翥張公見府君襟度沖曠深器之悉授以詩家之法府君窹寐不忘虞文靖公集覽其所賦擊莭嘆賞不少置至正壬辰蘄黃妖寇相挻為亂破饒州已而安仁繼陷殺戮到雞犬府君携家避去臨川時江浙行省左丞老老公江西行省丞相亦憐直班公屯兵信之弋陽營壘相望府君遣張世英請檄起兵遂同弟瑑間道歸安仁聞外孫陳政養甲士三百以自衛府君召政與計事命伏兵于戶內椎牛釃酒誘偽帥二十四人醉飲干庭縳送于官斬之復諭其部曲曰爾帥已成擒即冝改圖稍緩成𦵔醢矣衆翕然歸乃研墨汁署其衣曰興安義兵二日之間得健兒四千金溪白砂盜周謙入境鈔掠府君命瑑將健兒往逐斬首數百尋殱之白砂盜平丞相出兵平饒號一十萬至貴溪瑑以兵迎一鼓而安仁復瑑受命攝縣事偽將軍彭浩擁七萬衆逼丞相于團湖丞相兵欲退瑑部騎卒執麾前驅丞相遽下令出戰浩大改斬首三萬級積尸如山瑑導丞相前進復饒州軍士乏食且重以疫癘府君率縣大姓輸糧一萬二千斛散之時寇盜充斥南通閩北適燕唯安仁為便使者乘傳而來絡繹不絶皆仰給府君家為之貧江西劇盜黃濂舉猖獗不可制左丞大你赤公檄瑑共平之府君授瑑計焚其窟穴賊遁去别據岩險為拒守設伏于道瑑乘勝深入賊突起而蹴之瑑力鬪而殁府君失聲哭曰折吾右臂矣吾當上告方伯以復爾仇下命介子以奉爾祀庶幾盡吾心爾遂急攻廉舉廉舉懼别降江西行中書未幾復叛府君與王伯美夾攻大敗之殺其兄廉靖廉舉夜走菘溪吳友文械送府君獻諸幕府尸于市且求殺瑑者五人烹之而以中子為瑑後里嵗儉人多相食府君移粟以振仍禁山谷氓勿出鈔道商賈懋遷如承平時四方辟地者三百餘家皆依府君以為安五年之間號為小康辛丑嵗八月天兵取九江九江與旴江連府君知天命有所屬往贊其守臣王公漙以全城內附皇上召府君至南京擢知徽州黟縣事黟在萬山中自近代來髙陵巨壑皆有賦民不堪命會部使者至府君力陳之言與淚俱使者以其事聞下營田司核實惟田輸糧餘皆置不問黟民得以少舒秩滿改知漳州漳浦縣及行民爭擁馬垂泣而送之漳浦接連溪洞民善亂舊于其地置汀漳屯田萬户府及入職方詔徴屯田軍赴京萬戶吳世榮遂叛府君集民兵攻世榮戮之具上奏中朝免其徴海寇林仲明鄭惟明鄭君長恃能出入海濤先後為背叛漳州衛兵雖嘗剪除而渠魁逸不可捕府君悉用謀致之磔裂以徇民畏威不復敢為亂俗尚妖術呪物食人久則成形于腹中物動人輒死云役其魂為奴府君廉知之毀其淫祠數十區其害遂熄邑多良田其隄防為潮水所齧鞠為草萊之區府君修築之百里之間皆化為沃壤土豪羅季二族黨與甚衆恆持官府短長府君徒其家逺方事始帖帖府君且謂蠻夷不知禮義無善教以牖其良心爾乃為修學聘師集子弟而誨飾之三年之間政教大洽府知事孫希顔嘗有求而弗獲及以贓墨敗誣府君以白金百二十銖為贄刑曹逮府君坐以不冝與事巳釋將趣裝南還忽遘心疾恆怦怦若絃目不暇暝遂卒實主于江寧欒氏其時則洪武五年三月五日壬子也年五十九同門友夏君通為稱貸􅊞斂以某月日權厝干聚寶山府君娶臨州王氏出荆國文公之後吉水州判官某之孫女也先七年卒子男尚德次九德即為瑑後者次報德女常德適臨川許觀孫男三人桐木東府君天性孝友父病亟夙夜籲天祈以身代仍刲股和藥以進疾乃瘳後二年卒事兄璵唯恐弗獲其歡心然操履剛介不諧于流俗而非義之財絲髮不取故居官之日命其子負販以自給及其殁也槖無一錢識者頗哀焉濂為左史時見府君清溪上府君方以意氣自豪醉墨淋漓有鸞蹌鳯翥之勢頗異其為人自是數與之遊暨别去為縣聲迹不相聞者六七年遇與府君交者輒詢之皆不能道其詳今年夏忽有衰絰踵門者則府君之子尚德也驚而問焉府君死且殯巳逾月矣嗟夫十數年來朋舊凋落殆盡如府君康強者亦復棄去人間世則夫沉酣聲利自恃以為久長者果何如也因為泣下數行既而尚德將奉柩歸故鄉以某月日葬于某山之原持夏君所狀群行請為文勒墓上濓府君之友也不為之銘孰冝為之銘銘曰維其文五色絪緼揚葩而吐芬維其武扼彼妖旅退縮莫豫侮維才孔臧曷施弗良維邑之試變劇如易維澤之滂然維民之龎然維聲之鏘然維神之難言胡不永其延吁嗟乎賢吁嗟乎賢曽學士文集序翰林直學士臨川曾先生既殁其子中衛經歷仰發其平日所著望周山金石齋青華閩海昭回從政丙午居賢前後編凡九藁及逾海逾遼二志通類為若干卷介其同年進士雷燧徴濓序其首濓時竊祿詞林修史事嚴雖諾之而未暇為後三年仰之弟儕復走南京申前請為尤切濂將焉辭惟曾氏出于郕國公自都鄉侯據南徙代有顯人至于文定公鞏文肅公布文昭公肇起于南豐遂以文章名天下文定之製熛鷙奔放雄渾瑰偉文昭之作簡嚴平實溫潤雅馴最為學者之所同慕不翅景星之與卿雲而文肅之子司農少卿紆固守家法亦以辭章稱君子謂如魯殿秦碑見者珍惜自可孤行于二公之後司農從孫季貍蚤從吕居仁徐師川遊又能大肆于文其文言質而義正乾道淳熙間群公多畏敬之自時厥後作者繼軌要不可以一二數嗚呼何南豐曽氏之多賢哉先生之裔分自南豐父祖皆宋進士書詩之業逺有端緒先生既承家庭之訓又出從元夫巨儒遊鑽研六經孳孳唯恐弗力聞吳文正公講道華蓋山褁糧往叩之胸中疑難一旦氷釋自是逹之于文奮迅馳騁皆足以如其志至正辛已嘗舉于鄉明年試禮部報罷當路惜之連薦為校官皆不赴後十四年甲午始擢進士第助教國子修撰翰林出任江西行省郎官入成均為丞遂升司業進詳定副使拜監察御史已而復為副使改今官而殁先生名位既顯海內求文者接踵而至凡得片言隻簡不翅拱壁之貴蓋先生之文刻意以文定公為師故其駿發淵奧黼藻休烈起伏斂縱風神自逺王良執御節以和鑾而驅馳蟻封也朱絃疏越大音希聲而一唱三嘆也濤起阜湧飊行雲流力有餘而氣不竭也擅一代之英名作四方之楷則先生其有之矣濂也不敏幸識先生于建鄴欲以古文辭就正焉而先生亡矣故因仰之求文歷序南豐曾氏世學相仍之盛書于首簡使讀之者知先生無沗前人則為先生之子若孫必將感激奮勵期無愧于先生者矣先生名堅子白其字也剛明正直政事多可書已見其姻家危公素所撰墓銘兹不書皇明雅頌序皇明雅頌者鄱陽劉仔肩之所集也其曰雅頌者何雅者燕饗朝會之樂歌頌則美盛德告成功于神明者也今詩之體與雅頌不同矣猶􅊞其名者何體不同也而曰賦曰比曰興者其有不同乎同矣而謂體不同者何時有古今也時有古今也奈何今不得為古猶古不能為今也今古雖不同人情之發也人聲之宣也人文之成也則同而已矣然則曷為謂之同江河沼沚有不同也水則同陵巒岡阜有不同也土則同人動乎物有不同也感則同趍其同而舍其異是之謂大同曷為知其為大同期歸于道焉爾歸于道焉爾者何世之治聲之和也聲之和也奈何天聲和于上地聲和于下人聲和于中則體信逹順至矣體信逹順其亦有應乎曰有三秀榮朱雀見龜龍出騶虞至嘉禾生何往而非應也應則烏可巳也烏可巳則有作為雅頌被之弦歌薦之郊廟者矣是集之作其殆權輿者歟觀世音菩薩畫像贊梵稱阿縛盧枳伐羅唐言觀世音也其觀世音菩薩與南閻浮提衆生有大因緣凡衆生有急難者一稱菩薩名號皆得解脫凡諸所求亦復如是是故奉其像者十室而九各出巧思莊嚴妙相永嘉林一清為上原尹治政之餘稽首參禮用清淨毫畫東大瀛海水勢噴湧傍有磐石菩薩見天人相翹其一足坐彼石上護法大神身𬒳寶鎧駢立于左善財童子乘蓮葉舟合瓜遙禮自右而至其上日輪正照雲氣杳漫其下龍女持珠仰首而獻品物咸秩觀者動容如親見菩薩于輔怛洛迦山也比丘似桂乃孚中信公之上足也耽嗜般若如飲醍醐以濂信嚮佛乘持像請贊濂觀一清運筆皆有所表見非徒為虛飾而已中繪菩薩現大悲相表慈憫衆生故在大瀛海中表香水法界故日輪正照表本性圓明故雲影交重表塵沙無盡故大神威嚴表降伏魔軍故善財瞻禮表正信不回故龍女獻寶表地無所愛故惟觀此像者目擊道存不以像視像而以法視像瞻禮之頃三十七道品一時證入八萬四千塵勞門悉皆降伏則是像者其于進道亦不為無所助也胡跪作禮而説贊曰稽首大士天人師神通變現于一切尋聲救我衆生苦是則名為觀世音大東瀛海洛迦山岩洞時時發光彩示以澎湃海潮音或因音聲而入者即得見佛了無二有一宰官施善巧能以繪畫作佛事大士寶相毫端現翹足而坐衣𥚹褼慈容顒顒屹不動紅光下照日正中雲影交加無盡藏善財南詢遽作禮腳踏蓮花以為舟龍女持珠向空獻種種皆為法歡喜上有威神金剛王護持佛法極嚴猛我知大士無形相有相當與虗空等虗空廓落遍十方胎卵濕化皆含攝以至河沙諸品類一一皆于相中現中求一髮不可得願執須彌以為毫舒卷六合以為𥿄畫此無邊相好身大地衆生眼皆見見者人人皆作佛百千劫罪悉消除不許役役從外求一彈指頃皆究竟陳氏譜圖記越之陳氏其先出自頴州一遷于光之固始再遷于泉之南安傳若干世有諱如瓌者生宋光祿卿舜華光祿生太常少卿知信州侁三遷于越州府山新河之濵大常生朝散大夫彥弼朝散生七子知同安監詗㝎逺知縣欣國子司業諲餘則讜訓柔中季亡其名同安生文林即仲錫㝎逺生四子仲彜仲粹仲寬仲賔仲賔魏王府記室讜生宗正寺簿大顯司業生四子大中大成大中大理寺簿長與季亡其名訓生二子名亡柔中及季其後無所聞文林生恪自恪而下子孫富多今不可復知大理生宗正寺博士頌頌亦生七子太學上舍嗣慶文林即一新龍圖閣直學士知衢州又新次則艮柔蟾晉多亡嗣一新生二子麒麟麟為艮之後麒左宣教郎生德星德元德元為麟之後德星生二子元市舶都目克和及勝之勝之復為德元後都目生五子源敬復升瑞敬仕于國朝福建行省員外即升金華縣學教諭勝之生四子仁遜貞禮自時厥後源生烈敬生煦吳府伴讀煦復生默升生熊蒸仁生燠燁焴遜生爟其繁且行蓋未可量也豫竊聞之自受姓命氏以來孰非神明之胄稽諸載籍煥然可覩傳世稍逺往往䆮非其舊而降為皂隸者有之世德之傳固不可謂無人其衰微不振者抑亦多矣有如陳氏自宋以來擢進士第者先後相望功業顯融名著當世逮至于今而其流風遺澤尚有衍而無替不亦盛哉光祿十一世孫曰敬與升咸與豫交而敬之子煦復來受經遂以譜圖記為屬子因效史傳世表序著之而不敢上遡其本源者蓋氏族之學難言久矣析支分裔唯唐為最盛而國姓無㝎論林寶作元和姓纂而自姓不知所由來今人類能非之豫記譜如瓌之上不欲妄加攀附誠懼後來者相非亦猶今人之非前人也繼今而往陳氏子孫當代加纂修而弗墜庶幾其事核其言真而不昧于春秋傳信之義云浦江戴府君墓志銘濂弱齡時師事淵頴先生吳公于浦陽江上先生素有林泉之思以五泄七十二峰之勝特往遊焉時某實侍杖屨之側未至五泄二十里日將莫乃抵戴府君之居宿焉府君大布冠衣風神峻潔超然有前代遺風設筵以饗先生直至夜分四座皆摧竭不能支府君危坐肩背竦直曾無動搖意濂竊異之因質于先生先生曰府君之行可稱譽者甚衆姑與爾一二言之當德祐丙子之變惡少年相梴而起執白挺暮夜擊傷民咸不能自保府君用計安之卒能飬厥父母無他虞府君往遊浙水西或妄言府君道卒毋夫人朱氏哭之喪明府君還念毋不置夜露禱于天摘木葉曰冬青者浸水舐之期年目復明人以為孝感所致朱氏既殁其繼毋傳氏生子惠方秉為政府君漫若不及知凡資産一聽惠所取弗與之較惠與鄉井不相能人欲求隙加害府君資其逺仕閩嶠避之貧民有貸錢不能償者府君出質劑悉焚去姻族之無以自存者生使其能養殁使其自藏汲汲如不足從祖毋盛氏張氏各生子而寡居府君養事之盡禮以全其節其子先長悉稽前人土田均豫之此事尢卓異于人人者濂聞已竊謹識之後三年應書鄉闈識府君之子性中遂與性中㝎交又十年性中之子灝從濂學經于郡庠濂一一叩之其事皆如先生言則府君殁已久矣今年春濂有千里之役性中要濂于道且泣且言曰知先人之詳者莫過于吾子吾子倘不銘之孰冝銘之濂不敢辭府君姓戴氏諱珵字君玉世為㜈之浦江人曽祖某祖某父子道府君享年八十有四咸淳丁卯某月日生至正庚寅某月日卒以某月日葬于止戴宅之原先配許氏生長明再配薛氏無嗣三配李氏生從善思誠性中用和孫男灝某某嗚呼若府君者可謂一鄉之善士哉為之銘曰其生也全其殁也安君子知其然而不知其所以然請視斯阡宋學士文集卷第十二鑾坡集卷第二
