body:
  text: 日本建長禪寺古先源禪師道行碑禪師諱印原字古先世居相州姓藤氏藤為國中貴族父某母某氏禆師生有異徴垂髫時輒刻木為佛陀像持以印空父竒之曰是兒於善提有緣宜使之離俗學䆒竟法甫八歲歸桃溪悟公執童子之役年十三即剃髮受具足戒自時厥後遍歷諸師户庭咸無所證入乃慨然嘆曰中夏乃佛法淵藪盍往求之乎於是不憚鯨波之險奮然南逰𥘉參無見覩公於天台華頂峯公語之曰汝之緣不在於斯中峯本公以髙峯止足現說法杭之天目山爐鞴正赤逺近學徒無不受其煆錬此真汝導師也汝冝急行禆師即蓬纍而出往見中峯中峯一見遽命給侍左右禆師屢呈見解中峯呵之曰根塵不斷如纏縛何禪師退涕淚悲泣至於飲食皆廢中峯憐其誠懇乃謂之曰此心包羅萬象迷則生死悟則涅槃生死之迷固是未易驅斥涅槃之悟猶是入眼金塵當知般若如大火聚近之則焦首爛額唯存不退轉一念生與同生死與同死自然與道相符脫使未悟之際千釋迦萬慈氏傾出四海大水入汝耳根總是虗妄塵勞皆非䆒竟之事也禪師聞之不覺通身汗下無晝無夜未嘗暫捨積之之久一旦忽有所省現前境界一白無際急趨杖室告中峯曰原巳撞入銀山鐡壁去也中峯曰既入銀山鐡壁來此何為禪師超然領解十二時中觸物圎融無纎毫滯礙禪師辭去中峯再三囑之曰善自護持當是時虗谷靈公古林茂公東嶼海公月江印公各據髙座展化於一方禪師咸往謁焉諸大老見其證悟親切機鋒頴利以叢林師子兒稱之㑹清拙澄公將入日本建立法幢禆師送至四明澄公曰子能同歸以輔成我乎禆師曰雲水之縱無住無心何不可之有即攝衣升舟其後澄公能化行於遐邇者皆禪師之力也禪師出世甲州之慧林瓣香酬恩的歸之中峯黑白來依猶萬水之赴壑古山源公議革城州等持教寺為禪物論非禪師無以厭伏衆心竟迎師主之俄住州之真如又遷萬壽又遷相之淨智巳而謝事行化于奧州禪師之兄藤君新建普應寺延師為第一住持禪師起而應之關東連帥源公建長夀院於相州復請師開山兼主圎覺俄遷建長禪師說法度人孜孜弗解一如慧林時俄退歸長夀有終焉之志歲甲寅春正月禪師示疾至二十三日夜參半召門人謂曰吾今日逝矣爾等即入龕瘞之母徇世俗行祭奠之禮更可遍語諸剎舊弟子恪守吾平日所訓使法輪永轉可也黎明賔朋候問起居應接如平常及午呼侍者曰時至矣可持觚翰來及至復曰吾塔巳成唯未書額耳大書心印二字入室端坐泊然入滅世夀八十僧臘六十又八弟子遵成命即日奉全身瘞于某處塔下𥘉禪師敷以流通大法建立𣑽宫為事若丹州之碩勝津州之保壽江州之普門信州之盛興房州之天寧皆鬱然成大蘭若而建長之西復創廣德庵命其徒守之故前後所度比丘一千餘人云禪師端嚴若神雖燕坐之時儼若臨衆目光炯炯射人見者若未易親炙及聞其誨言溫若春陽莫不心恱誠服而去人有來求法語偈頌者濡毫之頃翩翩數百言曾不經意皆契合真如禪師不自以為是也取語録并外集投於火中曰吾祖不立文字單傳心印留此糟粕何為門人欲畫師像預索贊語禪師作一圎相題其上曰妙相圎明如如不動觸處相逢是何面孔其方便為人皆類此嗚呼佛法之流于日本者台衡祕密為最盛禪宗雖僅有之將寥寥中絶矣千光院有大善知識曰榮西和上以黃龍九世嫡孫握佛祖正印唱最上一乘飈馳霆鍧逢者瞻落逹摩氏之道藉是以中興其示寂之時且曰吾入滅後五十餘年禪宗當大興今禪師承天目之正傳見道分明契悟精深則其懸記之足徴若合符節然而自天目泝而上之至楊枝十有二世楊枝黃龍則同宗慈明者也其道固同矣道之同則凡嗣其學者先後奮發其有不言而喻者乎豫早歲屢閲一大藏教晚獨慕乎心宗因其徒大宣介􅚘堂儀上人持狀請銘禪師之塔有不得辭也銘曰天目之峯髙嶙峋隂陽變幻割明曛中有導師人天尊白眉青眼照秋旻西江欲以一口吞流傳法印千子孫日本有國右海濵逹摩示現留圎墳或晦或顯道則存黃龍奮迅瓜攫興九世宏開靜慮門千光炫耀接朝暾師雖後起乘碩輪佛印印空了無㾗法派端自天目分致令執拂誨諄諄涅槃生死俱幻塵有壁積鐵山如銀一朝直入不見身大千世界琉璃勻出世秉法如握􅚙左擊右刺伏魔軍出其餘力智巧􅞽飛樓湧殿聳輪囷奈何無縫塔既新大字題額即反真此道本來無詘信我於般若曽與聞大書偉行沃言根元無隻字鐫蒼珉陳方都督像贊桓桓俊英矯矯虎臣心雄萬夫才佚三軍爵列崇階功在盟府圗像雲臺流芳千古住持淨慈禪寺孤峯德公塔銘古者住持各據席說法以利益有情未嘗有崇􅋻之位焉逮乎宋季史衛王奏立五山十剎如世之所謂官署其服勞於其間者必出世小院候其聲華彰著然後使之拾級而升其得至於五名山殆猶仕宦而至將相為人情之至榮無復有所增加緇素之人往往歆豔之然非行業敻出常倫則有未易臻此者矣此濂於淨慈禪師之事頗碩識焉師諱明德其號為孤峯族姓朱氏世家明之昌國父有成母黃氏父與𥙷恆洛迦山僧玠公交玠聞雞聲入道凡說法必鼓翅為雞號玠亡巳久母夢玠來託宿覺而有娠歷十四月而生在童幼兒不好嬉弄每結跏端坐不動天童司藏慧明師諸叔也乃訶之曰童子不知頌詩讀書癡坐將焉求師曰欲學坐禪求作佛爾時竒之挾至鄞縣金鵝院俾給灑掃之役時師年十二矣越五載得度為大僧為橫山錫公弟子巳而詣五臺受具足戒慨然有求道之志杖錫而出首謁竺西坦公於天童竺西問云汝從何方來曰金鵝來曰金鵝山髙多少曰不見其頂竺西斥之師益自䇿厲以必證為期竺西一日升座舉世尊拈花之事師於衆中聞之忽若有解遽造偈以呈竺西竺西頷之而師弗自是也復如淨慈見晦機熙公晦機道價傾東南湊其門者如蝟晦機見師至問曰什麼人恁麼來師曰胡張三黑李四又問汝從朝至暮著衣喫飯還認自已否師又曰胡張三黑李四晦機拈捧欲打師拂䄂竟出抵雙林見明極俊公一見之頃塤箎協應而了無障礙命歸侍司繼付藏鑰令掌之㑹日本遣使迎明極為國師師送至海濵而竺田霖公亦自雪竇至見師氣貌不凡延歸山中以第一座處之竺田上堂敷揚正法眼藏舉隱山泥牛入海公案諄諄誘掖音聲如雷師不覺慶快群疑頓釋因以偈呈竺田竺田嘆曰人天眼目儼然猶在自是提唱宗乘稱性而說且邀仲方倫公結庵於桃花塢相與激楊暇則翻閲華嚴大經足不踰戶限者凡五春秋名稱日聞䆮不可掩行宣政院請住松江之東禪禪寺師起應之然香以嗣竺田不忘所證也久之再遷集慶之保寧師一座十五夏煆錬來學曲盡善巧有餘力則為之興廢𥙷壞細大不遺帝師聞師之令譽授之圎明定慧之號副以金襴法衣大司徒楚國文公歐陽玄亦賦詩逺寄且為作內外録序一時名薦紳莫不碩與之交三遷湖之道場閲二年寺災僧徒無以自寧托鉢四出造祖師堂暨伽藍神祠而蒙堂前資寮亦次第就緒方將大施營造之功㑹抗之淨慈虗席江浙行省丞相康里公以謂淨慈乃五山之一非師不可居固請主之時當元季戎馬紛紜國事已不可為矣逮入聖朝師以耄年謝歸道場竹林庵一日示微疾戒其徒曰吾身雖微一真圎性與如來等世相起滅無異石火電光晝夜勤行母生退轉吾殁後當遵佛制付之茶毗勿令四衆衣麻而哭也言畢索觚翰寫頌一首泊然入滅時洪武五年二月二十七日也世壽七十又九僧臘六十有二烈火之餘頂骨不壞舍利羅纍纍出灰燼中某月某日建塔瘞靈骨於東岡所度弟子若干人得法分居列剎者若干人四㑹語有録行於學者後四年其弟子大用恐其師之名不傳持佛頂康公所聚群行一通介保寧慧公謁余詞垣請為塔上之銘嗚呼從無始來人於其間生化出殁無數矣何者為名何者為相何者為真我若復計我我所將以何者為定乎銘勿作焉可也雖然師之行業敻出常倫致位名山垂芳當世苟不有以顯著之則無以表大法之寄慰來學之思也雖欲勿銘惡得而勿銘銘曰我觀禪那之所至即是一乘圎頓㫖其中無二亦無三真體無粗悉玄妙秪緣根性分利鈍所以造詣有異同曹溪而下分五家震動鏗鍧獨臨濟至今子孫如星繁執持大法使弗墜如師說白金鵝山歷抵諸方苦參叩孰知枘鑿不相投東西遑遑競奔走其後乃自音聲入却見泥牛鬪入海桃花開時春滿塢更了雜花六相義文采漸彰不可遏出世說法度有情四遷直上南屏山作大獅王日哮吼一起一滅世間相終然變幻如煙雲盡付闍維三昧火一彈指頃等虗空虗空無盡難名言苟加讃咏遇且惑太史述辭鐫白塔不過欲慰學子思有無雙遣入玄門言至無言乃真際故陳府君墓志銘靖江王府伴讀陳發痛其父母俱亡屬于學子平騭衆行成書謁余於詞垣且拜且泣曰先子居閩縣客授將樂伍氏不幸以疾終伍氏為殮且殯發年幼弗克奉柩歸葬與弟英奉母夫人朱氏以居家甚窶夫人嘗泣曰爾父之骨塗殯異鄉魂神無知則已脫有知月苦霜凄之夜寥寥將焉依吾一念及慈淚滿枕上而繼以血爾等冝自强庶有以遂吾志夫人親治絲枲坐發兄弟膝下手授書使讀讀至雞𥘉號乃巳發亦謹識之期允蹈夫人之言時天下大亂干戈充斥發間行至將樂中道為亂兵所掠陷乕口數四夫人以為無相見期及發遁還夫人撫頂曰吾以汝發死矣今幸一見其天也耶圗欲再往俄夫人又不幸以殁發痛心疾首將欲無生今獲事賢王於藩邸奉令南旋隻影徒步走三千里躬負先子之骨臥起與之俱既抵家與夫人合􅌾阮山之陽言訖嗚咽流涕既而又曰發之先光州固始人五季末來遷閩縣有諱套者再遷長樂傳九世至德瑜復返閩縣之嘉興里德瑜長樂儒學教諭有文行學者號為端質先生教諭生大父諱棣孫至先子皆儒學子承藉遺休而用志不分遂通上古之書期以取功名巳而齟齬輒棄去而精研堪輿曆數之學方嶽大臣薦為邵武校官謝不受先子生平有大志不得少見事為齎志以死發大懼德聲不逺聞然聞不聞在執事爾願哀矜賜之銘言訖又復嗚咽流涕余聞發言為惻然傷之爾父為志士而發顧不得為孝子矣乎冝為銘君諱廷臣字以忠夀四十九以至正􅉝丑七月二日卒其葬之日則今洪武乙邜正月十三日也銘曰其志之疆時則匪臧軋而或傷有子之良亦可謂之不亡送趙侍制致仕還鄉詩序洪武九年冬十一月丙申皇上御奉天門御史左大夫汪公右大夫陳公以國子博士趙先生本𥘉年踰七十跽而奏曰傅士臣俶以詩經施教成矣天子召見親加玉音而勞問焉則無之也升之以官俾為鄉人榮同矣出內藏之錢從而賜焉則無之也此蓋皇上勵精圖治雖天下之廣四海之衆老者皆欲安之使躋于仁夀之域非特寵其致事之臣而巳斯所以度越前古而無所與讓也先生之歸也見鄉之子弟導宣上德俾習為孝弟忠信之行出為時用是亦報國之一端若區區效賀季真盤旋於鑑湖一曲間自逸之計則得矣豈士君子之所望哉濂亦耄矣詔許獻歲歸田乃於先生之行歷叙其故非惟贈先生也亦竊思以自朂焉忠孝堂銘忠孝堂者飛熊衛指揮使司僉事徐將軍之所建也將軍名桂字庭芳宿遷人也自幼負英氣稍長荷戈從軍開平忠武王北伐中原馮宋公南征西蜀太傅徐魏公逺討朔漢將軍皆在行間當戰陳之間勇氣百倍搴旗斬將奮不顧身近臣以其事聞皇上壯之自散騎舍人即升為今官命既下將軍舉手加額慨然太息曰桂也遭逢盛際忝𬒳官使方愧不能效犬馬之力一旦上承寵渥自八品超居第四雖天之覆燾地之持載莫可比喻私竊以為報君唯在乎忠凡於國事近則服勞禁禦逺則捍禦邉陲無一絲不盡于忠庶幾少竭人臣之義然而五藏百骸從親所分鞠育訓迪之艱勤日擢髮而數之亦不足計其生全之德事君固當忠飬親其又可忘於孝乎桂得以忠孝二言揭為堂顔出入日見之日見之則心不忘之矣將軍言既畢復請濂為之銘濂聞忠孝者天地之間大經大法也為子克盡其孝為臣克盡其忠始合乎物則民彛之正無是者非人也古之聖賢多矣著之為經箋之為傳雖曰千萬言之多無非舉此以防民也將軍今知務此則先立其大者矣然言之非難行之實艱將軍尚思勉之能勉之異日為將為相亦冝也非僥幸也銘曰上下兩間參之者人若非孝忠能與之鈞其忠斯何務宣其力報國一誠皎如出日其孝伊何如事神明視聽之際先於形聲有能孜孜日親不匱覆載之中俯仰無愧一失其道是謂薄夫犬彘雖賤不食其餘洸洸徐君其力如乕談笑折衝疇敢豫侮北伐南征靡役不從鋭欲建功名徹九重遂從散騎超掌禁旅出入佩劍以資還衛帝德如天罔敢弗欽何以報之終始一心髙堂有親况臨白髮愛日之誠於焉實切崇搆舒舒圗史紛如粉版玄書蟠蛟結螭是顧是瞻赫若明命毫絲弗愆一純乎正孰謂二者不得而兼所施雖殊實本一源碩守此心堅如鐵石太史作銘勒諸坐側查林曾氏家牒序曾氏出自姒姓夏少康封其少子曲烈于鄫魯襄公六年莒人滅鄫太子巫仕魯去邑為曾氏居南武城巫生夭為季氏宰夭生阜為叔孫氏家臣阜生點字子哲生參字子輿參生元元生西西生欽欽生㝵㝵生羡羡生遐遐生盈盈生漢山隂縣都鄉矦樂樂生浼浼生㫋㫋生嘉嘉生寶寶生琰琰生據避王莾亂渡江居廬陵縣之吉陽鄉據生闡闡生植植生橫橫生興興生丞丞生三子圭舊略圭仍居吉陽鄉舊遷雲益鄉略居撫州南豐自略十四傳至唐冝州刺史可徒江南西道觀察使洪立鎮南軍節度使弘立是為三兄弟號曰三祖大江之西咸宗之弘立生延鐸延鐸生四子仁昭仁皓仁旺仁光仁旺生大師密國公致堯致堯再傳為文定公鞏又六傳至觀察推官國平國平復自南豐徙居查林查林去臨川城五十里又五傳至山甫山甫有九兄弟列為九支自是子孫繁衍分三十五房人將及千散處江源西源丘方陽城樓下五郟之間在宋季時燈火熒熒而讀書之聲相聞擢進士第者三十餘人中鄉貢者七十餘人分治六經及賦詩之科多著名于當時逮至元朝流風遺韻猶存有名士朂字旦𥘉通春秋至正癸巳復為江西鄉試第一入我國朝用薦者除國子助教濂時承㫖禁垣與旦𥘉交甚洽間來言曰吾曽氏之系甚盛幾遍南北廬陵臨川之外又有所謂扶風河內青冀襄陽南陽吳郡㑹稽江夏長沙蜀郡及泉䖍韶交諸州非如民族書所載正譜之外别有九祖而巳也惟我查林有譜兵燹之後散亡殆盡間有藏者寶祕不以示人因命族生王晋竊録以歸訛者正之缺者𥙷之重編為書願為序諸篇首以傳濂聞而嘆曰聖賢之㣧祚何其演迤而深長哉昔者顔淵出於顓帝之孫祝融氏至淵而生歆歆生儉儉生威威生芃芃生億自是而大昌若師古若真卿者皆其後人北則齊鄭梁宋南吳越越甌閩至今多子孫其盛與曾氏頗相類嗚呼聖賢之㣧祚何其演迤而深長哉旦𥘉以文學行義知名于時其惓惓於是而弗忘者欲惇本支序親疏而為崇孝廣敬之歸也視彼寶祕而為一巳之私者其隘不亦甚乎濂因以所聞疏其概如此而其詳則具見圖譜焉鳳陽陳方氏封贈二代碑銘皇帝龍興臨濠一時英傑雲合韾應人人有攀龍附鳯之願于時則有陳方將軍亮年未弱齡即隨大駕飛渡長江及駐蹕金陵日侍帝之左右出入則佩劍扈從有餘間詔令攻習書史唯恐其懈怠也且親程督之巳而任為千夫長遂掌禁旅升宣武將軍羽林衛親軍指揮使援例得封贈二代大父祿翁贈明威將軍僉親軍指揮使司事妣楊氏追封德人父成宣武將軍僉親軍指揮使司事騎都尉追封穎川郡伯配方氏追封頴川郡君先是頴川公本姓陳氏世居濠州之定逺濠則今改為鳯陽公少年時神爽秀發行事允蹈規矩同里方翁無嗣唯育一女見公賢竟以一女妻之翁遇公不翅親子然公亦深感其恩翁沒祀之於别室皇上聞之賜姓曰陳方所以明繼二家之宗緣人情以起禮也公忠厚長者其奉明威公夙夜孳孳唯恐咈其意溫凊之節滫瀡之供咸無愆於時且端慤儼重若未昜親炙撫世酬物輒藹然如春風和氣之襲人子孫環列每開之以善道歷陳古今成敗某也賢某也不肖言辭有精魄聽者為之聳耳無不率德改行者晚遇六合載清子若孫與有祿食者四人方將婆娑嬉遊以享盛報而不幸亡矣實洪武二年正月十一日也享年六十又四其年二月某日與方郡君合葬江寧縣歸善鄉彈塘山之原方郡君先卒至是蓋七年矣男子四人長伯理蚤世次即亮今升鎮國將軍僉大都督府事次庸明威將軍僉薊州衛指揮使司事次煜孫男十四人長忠明威將軍僉西安護衛指揮使司事次信忠顯校尉金吾左衛千户所鎮撫次文次武次智次仁次勇次孝次敬次謙次恭次禮次義次誠豫聞天開昌運必生俊偉之臣以光贊鴻業如漢髙帝起於豐沛光武肇於南陽精靈翕聚號為帝鄉當時元夫志士無不拏風躍雲吐陽噓隂致身於九霄之上優渥之澤延及先世書功盟府傅信䇿書如陳方將軍者其亦異世而同符也哉然將軍剛介醇厚上簡帝衷寵錫便蕃罔間存殁一門之內拖紫紆朱龍光所及照映泉壤於是可見皇靈溥𬒳生榮死哀者矣夫紀載上德勒諸金石以示來裔者太史之職也因第其事而為銘曰濠梁巨族氏維陳以善為寶世相因孰知久詘勢必信有子趫勇冠等倫明良胥㑹際風雲長矛大劍思䇿勳六合既淨無妖氛帝曰汝亮武且恂掌吾禁旅護九閽桓䝘果敢皆乕賁貤封二代渥澤均五色鸞誥書緑文昭功焯德推前人黃繒謄副燎告勤焄蒿凄愴應感神塋間樹色亦欣欣精白一心答寵恩非忠與勤吾曷云太史勒銘表墓門贈承事郎吏部侍郎張府君墓志銘國朝之制凡官階自七品至於第四皆贈封其父母與妻上德至渥也于時吏部侍郎張度官品居四從例贈其父府君吏部侍郎母林氏德人命書既下度録其副楮焚祭墓下復請一介蟣蝨之臣待罪銓曹恩榮溥博逮及二親鸞陵金軸下賁泉壤度深懼無以侈上賜而垂示來裔莫堅匪石碩吾子為文之濂謹按狀府君諱復禮字禮庭姓張氏廣之番禺人番禺有鄉曰黃岐角皆張姓環居之室廬櫛比當秋宵月白燈火連椄而讀書之聲相聞宋紹興間有諱堮者始遷於禮園社堮生飛一通周易能㑹粹諸家之說而折衷之廣之士大夫推為宗師號曰黃岐張氏易沒葬社之南山配麥氏生二子彬甫鄰甫皆善傅父經既葬父晝夜念之弗置􅌟堂曰永思兄弟躬耕以奉歲時祀事彬甫娶羅氏生丈夫子三其次即府君也府君薰炙家庭之教而於易學尤精發為大義頃刻千餘言出入程朱二氏無乖盩者漢儒拘泥不通或流於術數痛麾斥之當是時科目方盛行鄉人士咸謂府君爵祿可以引手致府君笑曰學易者為知吉凶悔吝而已何以官為獨念居村疃諸子見聞孤陋乃築室都城中俾就名師儒遊見其成立輒喜動顔色已而度舉茂才去而為肇慶路髙要縣學教諭迎飬甫六齡而府君殁矣時至正二十一年辛丑四月二十三日也享年六十又一國朝洪武元年戊申十月十五日度奉柩葬于增城縣西之章山因遷家焉四年􅉝亥度受薦入朝拜監察御史以至今官風采凛然貪墨為之屏迹君子賢之府君四子長即度次輔次峻次熙輔峻俱蚤世孫男二曰原潔曰吉祥女五人昔人有云為善者譬猶藝禾世世能令嘉種不絶則其發育也益昌且碩矣信哉斯言也府君世為儒積善之聞播於海南實合於易善積成名之義今度位居法從其聲益大以宏是皆府君遺休垂祉之所致度方欲為親榮而府君不及見矣悲夫此墓門有碑其銘固不可不勒也銘曰一屈一伸其理孔神易道之門君子之攸遵冝文而彰乃韜其光不露而揚俾後胤之昌有命自天寵靈昭宣鬱葱而綿延是為張氏之阡故資善大夫廣西等處行中書省左丞方公神道碑銘洪武七年三月某日資善大夫廣西等處行中書省左丞方公殁于京師鍾山里之私苐既巳襄事而墓門之石未有刻文九年冬十一月其子禮恐公群行堙沒無傅請于大都督府移文中書中書下禮部於是尚書臣籌以其事聞制曰可遂勑翰林學士承㫖臣濂為之銘臣謹按留守都衛經歷天台詹䁀狀公之行曰公諱珍避廟諱更名真因字谷貞姓方氏其系分自莆田再遷台之仙居三遷於黃岩遂占籍焉公長七尺壯貌魁梧而身白如瓠有偉丈夫量未嘗宿怨識者已知其為貴人至正𥘉李大翁嘯衆倡亂出入海島劫􅟃漕運舟殺使者時承平日久有司皆驚愕相視捕索久不獲因從而綏輯之劇㭗蔡亂頭聞其事謂國家不足畏復效尤為亂勢鴟張甚濵海子女玉帛為其所掠殆盡民患苦之中書參知政事朵兒只班發郡縣兵討蔡寇公之怨家誣搆與其通逮繫甚急公大恐屢傾資賄吏尋捕如𥘉公度不能繼且無以自白謀於家曰朝廷失政統兵者玩寇區區小醜不能平天下亂自此始今酷吏藉之為姦媒蘖及良民吾若束手就斃一家枉作泉下鬼不若入海為得計耳咸欣然從之郡縣無以塞命妄械齊民以為公民亡公所者旬日得數千久屯不解朝臣察其非罪奏為慶元定海尉使散衆各安其居自時厥後汝頴兵大起海內䁀沸齊國忠襄王李察罕保釐河洛晋兾李思齊張思道號令關陜陳友諒明玉真分有江漢荆益張士誠據淮浙公亦有慶元台溫三郡之地同縣章子善者好從橫之術走說公曰夷狄無百年之運元數將極不待知者而後知今豪傑並起有分裂之勢足下奮襼一呼千百之舟數十萬之衆可立而待浙江而上則南北中絶擅餽運之粟舟師四出則青徐遼海閩廣歐越可傅檄而定審能行此人心有所屬而伯業可成也公曰君言誠是然智謀之士不為禍始不為福先朝廷雖無道猶可以延歲月豪傑雖並起智均力敵然且莫敵為主保境安民以俟真人之出斯吾志也願君勿復言子善謝去公自是其官纍遷至江浙行中書參知政事㑹有詔徴兵討張士試公遂出師士誠知公且至遣其將史文炳吕真統十將軍兵七萬禦公於崑山崑山去姑蘇七十里士誠之僞都在焉文炳真陳兵城中仍以步騎夾岸為陳士誠命遊兵往來旌旗數十里不絶氣勢甚盛公曰濵海之地非四逹之衢乃復參用步騎兵雖衆不足畏也公舟師僅五萬身率壯士數百趨奣子橋文炳真使十將軍薄水戰矢石如雨公戒其衆持葦席藉塗泥冒矢石急奮夾岸之軍以火箭亂射公燎及鬚鬢橫刀大呼而入殺兩將軍及十餘人軍大潰若禽鳥散去公與壯士追擊趨其中堅文炳真接戰公出入陳中所嚮輒披靡橋左右水騎訖不得成列而岸上軍又散北文炳真棄馬走亡七將軍溺死者萬計公乃次兵於岸明日又戰士戰士捷直至城下士誠得報遣使者送欵請奉元正朔公還遂以節鉞鎮浙東開治于鄞元之君臣多公之勳復數加爵賞俄至太尉江浙行省左丞相賜衢國公印章昆弟子姓賔客皆至大官當是時今上皇帝龍興臨濠定䁀金陵天戈所指無不簞食壼漿以迎王師上親取婺州而衢處相繼降公曰吾聞順天者昌逆天者亡今臨濠兵精甚所至無堅城此殆天命之所在也逆天不祥即遣豫完入侍上喜曰自古英雄以義氣相許當如青天白日事成同享富貴何以質于為遂使完歸公復遣使者碩守城邑如錢鏐故事歲貢白金以給軍資上許之然猶自海道輸粟元都時群雄方爭上方勵志中原公獨屏蔽江海使者交于二境上唯求庇民而已苗軍劉震蔣英等叛婺州殺首師胡大海持其首來曰碩隸麾下衆皆賀獨公不許曰吾昔遣使效錢鏐言猶在耳今納其叛人是見小利而忘大信也且人叛主而歸我即他日叛我又安可必耶遂帥師擊之仲兄中流矢而沒上遣使臨祭且慰撫其遺孤越數載上詔大將軍徐魏公平姑蘇縛士誠獻京師公以久疾不視事又莫府賔客無所陳說失朝賀禮上怒大軍且壓鄞公憂懼不知所為乃封府庫具氏數使城守者出迎躬挈妻孥避去海上使完奉表謝曰臣聞天無所不覆地無所不載王者躰天法地於人無所不容臣荷陛下覆載生成之德久矣安敢自絶於天地敢一陳愚衷惟陛下財幸臣本庸才處平季世保境安民非有黃屋左纛之念曩者陛下霆擊雷掣之師至于婺州臣愚以為天命有在遣子入侍于時固巳知陛下有今日矣所謂依日月之末光望雨露之餘澤者也而陛下開誠布公賜手書歸質子俾守郡縣如錢鏐故事十年之間與中吳角立皆陛下之賜戢也逮天兵下臨吳㑹臣嘗上書謂朝定杭越則暮歸田里不意今年以來老病交攻頓成昏昧而弟兄子姪志慮不齊致煩陛下興問罪之師方懷憂懼未能自明而大軍已至台溫今臣計無所出雖遣使再三而承詔之師勢不容已是以封府庫開城郭以俟王師之至然猶未免為浮海之計者昔有孝子於其親也遇小杖則受大杖則走臣之事適與相類雖然臣一介草莾亦安敢自絶於天地故每自思欲面縛待罪闕庭復恐陛下萬一震雷霆之怒天下後世議者不謂臣得罪之深將謂陛下不能容臣豈不纍天地之大德哉謹昧死奉表以聞俯伏俟命上覽表趣公入覲公至京師上且喜且讓曰若來何晚也公即叩首謝罪上以公誠慤遇之特厚每賜宴饗皆與功臣列坐未幾有廣西左丞之命俾奉朝請一日侍上燕坐不能興輿至苐則成末疾矣上數遣中使賜問官其二子禮宣武將軍僉廣洋衛親軍指揮使司事完忠顯校尉虎賁衛千戶所鎮撫令公得親見之已而公疾革上遣中使問所欲言公指使者中坐良久曰臣荷陛下厚恩無尺寸之功而子孫椎魯絶不知人間事臣所憂者獨此耳幸陛下以臣故曲加保全則臣感恩九泉為犬馬報陛下矣言畢而逝壽五十又六上聞哀憫之親御翰墨為文命官致祭皇太子暨親王亦如之中書省大都督府御史臺亦皆奉上㫖臨祭成禮而去先是公病時嘗屬諸子曰我即死母歸葬海濵主上遇我過厚可求京城外之地埋焉且使後人習於禮義及是卜城東二十里玊山之原惟食禮部為奏請上欣然可之於是以某年某月某日葬禮也公世為善人而其父尤柔良人弱之屢致侵蝕父笑曰吾諸子當有興者母久苦我其後五子果貴顯元季以公之貴得屢贈三代曾祖天成榮祿大夫湖廣等處行中書省平章政事祖宙光祿大夫福建等處行中書省平章政事勳皆杜國爵皆卦越國公父伯竒銀青榮祿大夫淮南等處行中書省左丞相上柱國仍追封越國公曽祖妣陶氏祖妣潘氏妣周氏妻兩董氏皆封越國夫人子男五人其二即禮與完其三曰本曰則曰安女五二適士族餘在室孫男六隋大業未海內紛紜江華聚衆保民據有歙宣杭睦婺饒六州之境雖屢受隋爵及唐髙祖有天下遂封府庫籍民數以歸職方擢為歙州刺史殁于長安其事與公似無大相逺者蓋公以豪傑之姿庇安三路六州十一縣之民天兵壓境避而去之曾無一夫𬒳乎血刃其有功於生民甚大然而天寵所𬒳賜官丞轄享有祿食而二子皆列崇階赫奕光著視唐則有加焉於是歷序其故著為銘詩以宣朗國家之鴻烈而及公保民之偉績云爾銘曰元季紛紜群雄相吞公據海濵志欲靖民黃屋左纛我非敢覬綏定一隅以俟真主大明煌煌出自東方天威奮張孰敢不來王乃籍土乃封府庫大開城門委之而去皇帝詔還喜動龍顔卿能庇民朕數嘉嘆卿居海邦倚水為强旌旗揚揚武夫洗洸舳艫數千橫行海中諸蕃畏威莫越其卦炳乎幾先能順天命卒全黎元兵不血刃何哉暴強驅民鋒鏑酣戰弗禁身乃就殛以此較彼卿實為能爵之崇階祿給子孫天語褒嘉金宣玉奏公拜稽首天子萬夀惟公挺生人中之豪功在三府其惠孔昭華之保歙事與公類至今廟食春秋不廢公雖殁矣德曷忘矣太史銘矣發幽光矣
