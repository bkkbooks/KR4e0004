body:
  text: 大明故王府參軍追封縉雲郡伯胡公神道碑銘上天既革元命皇帝㝎鼎金陵遣大將下浙河東諸郡而婺衢處三州相繼平時當草昧之初上思得智勇之才用之于是處之胡公仲淵躍然而起以自赴功名之會入陪廟算出鎮鄉邦言聽計從寵遇無比浙東之俊彥攀龍鱗而附鳯翼者皆自公始若公者可謂犖卓不羣之士矣公諱深仲淵其字也系出漢安㝎宋初有諱棟者自潤之丹陽遷處之龍泉因家焉棟生璠璠生文虎文虎生竦竦生晟晟生滂滂生衢州録事參軍松年松年生鄉貢進士應辰應辰生溫州樂清令㻑㻑生江南西路兵馬都監見大則公之曾大父也大父諱堂父諱鈺仕元為征東行中書省左右司員外郎母趙氏生三子公其長也次曰潭曰海繼母季氏生一子曰溥員外府君蚤歲宦逰京師公始十齡而大毋季夫人與母夫人相繼亡公侍大父奉繼母撫幼弟艱難刻厲以自植立未弱冠走京師侍府君適府君使髙麗復往候焉居久之府君棄捐館舍公﨑嶇萬里奉柩南還舟行一日泊大崖下夜夢人語之曰此崖且崩宜急避驚覺趣移舟俄傾大風雨至崖果崩聲如萬雷既歸葬于縣北之圍源遂廬于墓左悉取諸子百氏天官地志兵謀術數醫藥卜筮老釋之書而研究之發為文辭操筆可立就當元之季江淮俶擾蔓延閩浙間盜由建之浦城松溪入龍泉公嘆曰浙水東地氣白矣􅍔將及乃集鄉兵結寨于湖山巳而處州之民相挻為盜江浙行中書省調萬户石抹公冝孫戍處州辟公參謀軍事檄所隸諸縣募壯士為軍浹日間得數千公引之屯竹口下令賊中曰爾皆良民也因驅迫故為亂棄仗即仍良民矣賊以公長者其言不欺盡毁旗械肉袒請降溫州戍卒韓虎陳安國殺主帥據城叛行省命宣慰使恩寧普公討之道由處州與公語意合帥府軍事復辟公參謀之公曰溫城叛者唯一二人耳若破其城玉石必俱焚如平民何遣辨士入城説其黨曰韓虎悖􅊇亂常今王師四集旦夕且攻城雖金湯無不破者若輩胡為與賊守自取作虀粉耶將軍未忍即加兵苟能去逆效順悉從原宥或稔惡不悛城一破悔無及巳其黨相向泣曰吾屬自度旦暮鬼耳儻獲復生敢不唯命乃殺韓虎等以城降溫城頻海民以漁為業時城閉者三月民病甚公請發粟賑之歡呼之聲載于道路宣慰欲列公功聞于朝公辭既而宣慰以行省參政總兵征鄱陽復邀公俱行戎務無巨細悉屬之青田潘惟賢聚衆為叛龍泉長吏聞風遁去賊遂焚縣治公之師曰王毅先生與門弟子集義兵搗退之里中惡少年疾其功因害先生公在鄱陽馳而歸執害先生者盡殱之縉雲之黃村松陽之白巖遂昌之大社麗水之浮雲泉溪無賴之氓咸為盜根勢蟠結不可禦行省丞相康里公承制以石抹公為行樞密院判官分院鎮處州既至假公分院行軍都事統兵討麗水攻泉溪賊寨拔之未幾又平浮雲白巖賊懼遂來降縉雲盜亦就平乃移師攻遂昌賊酋周天覺方友元傾其精鋭出迎敵公望見笑曰賊若堅守不出未易即殄滅今兹之來豈非天授我乎分部諸校以正陳接戰以竒兵夾擊之别遣遊軍入山搜其伏匿比戰賊三面受擊輒大敗斬首數千級生擒八百人獲方友元梟之乘勝直攻大社周天覺降復移兵討青田賊黨金德安殺潘惟賢兄弟以降先是國兵取浙東婺衢既下獨處州為石抹公所守不降歲巳亥今上皇帝遣僉樞密院事胡公大海由間道取處州石抹公出戰敗北大軍入城而分兵取屬邑未附者公時以假元帥統龍泉慶元松陽遂昌四縣兵欲閉關為拒守計四縣士民咸請于公碩內附以全民命且曰君治兵殆十年勤勞亦至矣而朝廷無一命之錫國家負君君何負于國哉公知時事巳去乃解甲出見胡公四縣因不受兵上素聞公名召至南京待以殊禮居亡何擢中書左司員外郎上日與公論天下事公有言未嘗不稱善也遂詔公還處州招集舊所部將校兵卒以從征西上既平江西命公以親軍指揮守吉安會浙東苗軍為變婺守將既𬒳害而處城亦為所據上遣公復處州比至城已復除公浙東行省左右司郎中總制處州軍民事郛郭甫𬒳兵民物凋瘵而山寇乘間竊發人情未固公隨方招捕凡首惡即誅之然猶慮戍兵之寡日募之獲勝卒萬餘人諗于衆曰兵少不足禦敵師衆又無以食之奈何衆皆曰飬兵所以衛民苟不為禦備計子女玉帛且不保况于食乎公乃因民之産以權宜增帛賦之沿海軍素驕橫及是以復城有功橫益甚公擇其尤無良者斬之衆乃讋服江西食東浙鹽而有司十分稅一販者鮮至公請以二十分收一商賈遂通城南枕大溪浮橋之廢巳久橋隄當水之衝亦為所齧蝕幾盡公即上流比舟為梁以濟行者州學敝壞講舍僅存用以貯官粟公撤而新之薦新進士吳世昌為郡文學以司教事城中民廬多為戎士所據混淆而處公度間曠之地建營屋數十區使别居之縉雲官田其稅額甚重執里役者恆以私粟代償公以新沒入之田實其數其害乃除諸暨守將謝再興兵犯東陽平章李公文忠擊走之公引兵為援建議以謂諸暨浙東藩障若諸暨不守則衢處不支矣乃度地去諸暨六十里並五指岩新築一城不旬日而成樓櫓濠柵靡不畢備上聞諸暨叛遣使來議别為城守計暨至城巳完上嘆賞不已其後浙西將李伯貞大舉入寇兵號二十萬頓城下城堅不可攻敗績而去上念公立城功以名馬賜之青田之蘆茨地接閩徼人素獷得葉仲賢恃其險屢服屢叛乘我師在外復來寇公怒還軍深入禽其渠魁少壯者皆籍為兵二十年逋誅之盜一旦就平溫州方明善攻我平陽公出偏師復之并復瑞安所侵地而親統正軍攻溫州明善勢蹙與其仲父國珍議納歲幣詔公還師明善繼以鹽若干來貢上命處州易銀以入內蕆上怒銀色惡責守令使償公曰此吾過也守令祿薄何能償乃售龍泉田以銀九百兩代輸公尋入覲上欲留公且柄用之以邊事未輯碩還守外上時巳即王位乃擢王府參軍仍總制處州等翼陛辭上喻之曰俟閩浙盡平當還汝中書矣福建陳有㝎擾邊公奉命征之遂取建之浦城而崇安建陽二縣亦下上賜以所乘駿馬建之守將阮德柔兵四萬屯錦江實出我師後公還兵擊之破其二柵有㝎大愳帥鋭卒亟圍我營公突陳與決戰馬蹶因𬒳執有㝎既得公頗禮遇之公具道天子仁聖四海歸心羣雄樂為之用且援竇融歸漢故事撼之有定𥘉無殺公意會元使至督迫之遂遇害于福州實歲乙巳之春也享年五十有二上痛悼不巳命使者即其家祭之復詔中書議加恤典追封縉雲郡伯有爵而無階官職勳者有司之制未備也公天資頴拔智識絶倫藝術弗學則巳學之無不精性倜儻好施豫賢士有貧乏傾槖以周之弗吝也其守鄉郡凡五載馭衆一以寬厚用兵十餘年未嘗妄戮一人恩惠在人甚多故其殁也聞者莫不流涕鄉人為立祠宇祀之公元配同里項氏先五年卒生二子長曰楨宣武將軍僉處州衛指揮使司事次曰樞女一人適章存原繼室滁陽楊氏前中書左司郎中元杲女弟也公既沒之二年楨等乃刻木為象具衣冠以葬實附于圍源之左􅌾巳來徴濂為之文昔濂侍上于白虎殿忽顧問曰胡深何如人濂對曰文武才也上曰誠如卿言浙東一障朕方賴之則上所以倚公者至矣然公亦知宸眷之深而無以圖報嘗謂人曰區區承詔鎮處城皇靈覆冒幸巳寧謐誓將挈全閩之地以入版圖庶展犬馬之微衷也奈何功業未就而死及之其非命也夫濂辱公交者五六春秋見公酒酣耳熱指揮三軍而雄姿奮揚不可遏及與薦紳之流論文評詩則欿然布衣書生也濂未嘗不服其勇而愛其謙今公不可作矣敢用備著公之事揭諸墓門以告世之知公者銘曰洸洸胡公萬人之英一劍橫空莫之敢攖浙河之東地氣盡白此為兵徴見于龜策尓衆荷戈來入我堡置而枕席拔而水火公師如風鼠冦如雲一鼓之餘散為埃塵莭鉞出鎮􅍱歷五年桴鼓不驚雞犬晏然誰登叛人陷我諸暨公遷其城寇至輒敗皇用嘉錫使車絡繹天閩龍馬于公弗惜公感主知酣歌慨慷誓提八閩以歸職方旄纛所屇勢如破竹天未厭亂三軍夜哭公材孔多公志弗阿月出如赭公命奈何丈夫之澤流于異方孰能行之父母之邦匪公之臨千里枯胔公雖止斯庶亦無愧廟堂有嚴肖象其中精靈翕然上與天通栝蒼之山其翠𣣔滴公名配之有永無斁大明敕賜開國輔運推誠宣力武臣榮祿大夫柱國廣德侯加贈特進榮祿大夫右柱國進封巢國公諡武莊華公神道碑銘自古興王之際天既生真人拯民塗炭之中必有如虎之將弘展其丕猷弼成其大業此如燭照而龜卜蓋無疑者以漢唐言之則雲臺二十八將凌煙閣二十四人是巳洪惟皇帝當四海逐鹿之秋龍飛淮甸噓陽吸隂反掌之間廓清八極夷荒蠻徼罔不臣妾當是時謀臣猛士效忠宣力其衆如雲若和陽華公亦其一人也歟公諱髙姓華氏字則未聞所謂和陽則其所居之郡也曾大父汝德贈中奉大夫湖廣等處行中書省參知政事護軍追封武陵郡公曾祖妣張氏追封武陵郡夫人大父某贈資善大夫湖廣等處行中書省夫湖廣等處行中書省平章政事逮夫大統既集帝念將帥百戰之勞㝎功行賞上則公爵次則侯封各錫以鐡劵金書傳示子孫俾世其祿于是授公開國輸運推誠宣力武臣榮祿大夫柱國封廣德侯食祿六百石公未及受劵請命往廣海巡視城陴整飾軍隊行次崖州以疾薨于官舍年五十又九實洪武四年三月二十七日也訃聞帝懷悼不巳詔有司迎公之柩以是歲六月某日還葬于黃墩先墓之次藏劵墓中以慰公于九泉且進封巢國公諡曰武莊階加特進勳加右柱國褒崇之意無不備至公一子景春蚤世竟無嗣續其配澧國夫人蔣氏先薨至是與公合􅌾焉既葬禮部以聞帝若曰其令國子司業宋濂製為碑銘樹諸神道尚書臣陶凱即日傳命授臣臣不敢辭臣聞傳記所稱用世之士非才勇為難而炳于幾先者為難公當羣雄疊奮之時亦欲以一障自效見帝之頃即知天位之有在人情之所屬統其部曲歡然來歸非有先幾之識者能之乎其建樹功烈安享尊榮爵封上公位躋極品亦宜也雲臺凌煙之衆又豈得專美于前乎臣既歷序公之戰功次苐于右復繫之銘辭曰士之所貴炳干幾先誠獲所依身名兩全當元之季王綱解紐羣雄虎爭鹿知誰手維武莊公家于和陽依水建寨以遏寇攘皇帝龍興知為真主仗劒相從率先多士帝曰俞哉爾兵我從即麾義旗同渡大江牛渚既殱于湖亦捷溧水洋洋視如一髮天兵載楊翔颷震霆秣陵南徐次苐而平况此江隂勢如破竹兵鋒所向無強不衄鄰有勍豎據浙連淮來撼大樹何哉蚍蜉叶皇赫斯怒命將行伐鏟破連營洊除窟穴復敕雄師㝎淮之東載綏載寧載約其同凡斯諸役公無不與展力攄誠亦云備至天清地寧六合一家大統既㝎論賞有差黃金鏤書鑄鐡為劵作誓剖符千齡弗變皇恩下𬒳將􅈾寵榮訃來海南聞者涕零宸衷憫惻為詔郡縣旋其柩車就鄉而窆崇階峻爵極于上公龍光有赫賁及幽宫儒臣作銘播揚嘉績百世之下視此貞刻元故嘉義大夫禮部尚書致仕贈資善大夫江浙等處行中書左丞上護軍追封譙國郡公諡文節汪先生神道碑銘濂奉敕總修元史凡忠義循吏之事天下郡縣悉上送官而宛陵汪先生獨闕既而先生族子克寬來與纂修始以其門人汪文炳所托事狀相示濂既命史官刪削立傳克寬以為史乃一代成書其法當略墓文乃私家所撰其紀宜詳復致其孫德垕之言請濂揭銘于隧上嗚呼先生之德之盛海內孰不知而所讞錢珍之獄泰㝎實録中嘗書之其可不備載以昭示方來乎先生澤民字叔志姓汪氏其先新安歙縣人自唐以來為官族五季之𥘉兵馬使都虞候道安始自歙遷婺源之還珠里又歷八世至宋天禧巳未進士祕書丞贈光祿少卿震生慶曆癸未進士都官員外郎贈中大夫宗顔都官生皇祐壬辰進士左奉議郎知漢陽縣贈少傅榖又自婺源遷饒州德興之龍溪少傳生贈通奉大夫槃崇寧癸未進士正議大夫端明殿學士藻藻以文學政事為時名臣通奉生紹聖丁丑進士朝散大夫江西轉運使愷知合肥縣贈中散大夫慥又自德興遷宣州之宣城子孫遂為宣城人中散生紹興庚辰進士通判隆興府鴻舉鴻舉之弟修舉則先生髙祖也曽祖諱宰臣贈朝奉郎祖諱夢雷淳祐􅉝丑進士纍官知靖州元贈翰林直學士亞中大夫輕車都尉追封新安郡侯父諱鼎新用父廕輔將仕郎元贈嘉議大夫工部尚書上輕車都尉追封新安郡侯工部之兄鼎亨景㝎壬戍進士官池州大軍酒庫然自少卿至先生奕世科名蟬聮不絶先生自幼融通經史亦鋭然思繼承之會科目之法行遂領延祐甲寅江浙鄉薦上南宫不利有司用恩例署寧國路儒學正暨再舉遂擢戊午進士苐授嶽州路同知平江州事階承事郎時先生之母譙國郡夫人王氏春秋巳髙先生以平江道逺不可迎飬上書丞相府乞降一二階就銓鄰州不報竟奉太夫人之官州有健民曰張以利餌長吏持其隂私使不敢問遂視閭井民若蟣虱頥指氣使輒奔走不暇稍忤其意即繫送于官人懼呼為張雷公先生曰弗治我民將無生即發其姦屏諸蠻夷不使與良民齒李氏有兄弟者三素豐于資季弟未有子而沒其婦傷季之夭也誓終身不再適孟仲利其財數設計撼之婦堅不動乃嗾亡賴男子誣以姦私婦不禁搒掠自引伏先生見其色有冤間行廉察之悉得其情白而出焉轉承務郎南安路總管府推官戍將朵兒赤跋扈自用扼有司之掔俾不得詘信其姻家王某為郡府史藉其威尤鴟張無忌擅箠大庾縣令縣令訴諸府同官懼戍將之威相視以目無人發一辭先生毅然捕王下獄會監察御史行郡戍將結以厚賂御史召先生于庭詰其獄狀聲色俱厲先生徐曰王之姦賂人所知也御史𣣔屈法邪御史慙夜半馳馬去王卒伏罪居亡何戍將以贓敗部使者知其故檄先生推讞杖罪之廣州歲侵民大飢疫癘洊臻死亡相枕藉其毒氣所薰蒸鮮有能生者江西行中書屬先生行振荒之政先生絶無所畏懾命大姓發廩以哺尫羸其病癘方熾者召醫注善藥親走其廬給之活者數萬先生暨從者亦無他虞將還送者歡曰我父母也奈何去之馬擁不能前潮州府判官錢珍挑推官梁楫妻劉氏不從誣楫冒糴官中米殺之獄中事連海北廉訪副使劉安仁逮繫者二百人中書移問者凡六各懷顧忌事終不白先生讞之獄立具時珍巳飲藥死詔戮其尸安仁坐受珍賂除名時朝廷遣奉使宣撫江西聞先生名命巡南安章貢二郡事得專決聲績尤著擢承直郎信州路總管府推官丁內艱不赴服除遷平江路總管府推官階承德郎𥘉浮屠甲與鄰僧乙有隙久不相周旋衆約其輸平乙因邀甲飲酒至醉遂寢其室甲弟子沈安素苦甲鞭笞且期速紹其業幸甲宿于讎夜持刀往殺之明日訴諸縣乙虐于考訊輒誣服獄上先生閲其刀有鐡工氏名召公驗焉曰此沈安刀也逮安一訊即承脫乙械械之嘉定地瀕海朱管二姓為姦利于海中致資巨萬及以他事敗上下受其賂莫敢捕獄久不決先生與總管道童公適至徑縛以來竟籍其家及徴其倀曆備列省憲郡邑受賂之數唯先生及總管名下疏曰不受升奉議大夫知濟寧路之兖州兼管本州諸軍奧魯勸農事磁陽負郭之縣也孔子廟學久不建先生以為風教所繫買地作之殿堂門廡及齋序之屬無不具飭襲封兖聖公職止三品先生以宣尼之胄不可以弗崇上跣請增其秩廷議韙之奏升品為苐二錫以銀章居一年政化大行絃誦之聲周達乎西東圜扉之間可設爵羅嘉禾生于縣郊瑞麥孕于洸水君子謂有漢循吏之風焉廉訪使者行部將壓境還曰汪兖州在吾可無往矣至正癸未詔修遼金宋三史拜先生朝列大夫國子司業俾分修兵志及宋理宗本紀史成有上尊束帛之賜巳而除集賢直學士太中大夫未數月亟上納祿之請以嘉議大夫禮部尚書致其事先生既歸僦屋以居門生弟子援洛中諸賢故事為築室宛水之濵先生日督諸孫讀書以自娛不知其貧歲壬辰蘄黃紅巾彭黨祖搆亂其餘孽自徽冦宣州江東部使者道童問䇿于先生先生語以收人心振士氣築城浚濠儲糧簡卒凡數十事冦再至再擊退之乙未夏六月長鎗叛帥瑣南班程述等挾兵渡江欲犯宣城城中兵不滿數百或勸先生去之民曰先生忠孝人也天必相之當相與守城若果去之吾屬亦隨之爾部使者不八沙周伯琦二公復申民言以為請先生曰昔江萬里寓鄱陽大軍逼城衆皆赱散猶坐守以為民望况宣民離合視吾去留吾何忍棄父母之邦乎時軍費不給加以嚴刑弗之集先生從容一言獲鈔一萬錠米三千斛民心翕然𣣔為固守計屢戰輒屢勝八月丁丑江浙行省參政吉尼哥兒遣兵來援城內恃援至戍守頗懈是夜三鼓長鎗軍攀堞而上城遂陷戊寅偽萬户丁堅使前鋒葛義執先生逼降不屈遂遇害將死罵猶不絶口瑣南班雅敬先生名為具冠衾􅌾于某山之原得夀八十又三事上于朝贈資善大夫江浙等處行中書省左丞上護軍追封譙國郡公下太常定諡曰文節云先生娶戴氏纍封譙國郡夫人先八年卒子男二人用敬以子貴封敦武校尉常州路冝興州判官用和國子生辟充侍儀司舍人不赴兄弟痛憤不食相繼卒女一人適劉士禮孫男五人德宣以門資輔官敦武校尉善盈庠副使德垕國子生曲阜宣聖林廟司樂德崇癸已鄉貢進士湖州路德清縣學教諭德正德進孫女一人適吳愈曾孫男五人禧源傳源鳳源書源清源先生軀幹修聳髙凖踈髯風裁峻如也其為學本諸六經真知實踐無一不本于道義其奉親也丁工部公之憂則三年獨處于外弗御酒肉每遇諱日悲慟不自勝至老不變事母夫人則板與方舟迎侍之官熙熙承顔唯恐少違其意婺源三大墓為強家所侵辨理于有司經四十年必復之乃巳其事君也一飯不敢忘懷保小民甚如赤子革弊除姦有知殆無不為然于律巳則玉潔氷清毫髮之私又無自而入故其至也民戀愛之其去也民慕思之至有為生立祠者嘗重構美章亭于兖賊至不忍焚之且曰此汪公遺澤也嗚呼不知先生何以能致于斯哉由其立心之正不為勢利所誘擇術之精不為不義所屈忠孝大莭所以暴白于天下揆古無讓于今無愧可謂不負于科目者矣先生為文不事絺章繪句而義理自足詩亦清婉有魏晉風尤以善書名家單削片牘人咸藏為榮所著書有巢深燕山宛陵三藁傳之于學者當賔興之歲江南三行省屢聘先生司其文衡士論尤服其精允至今人道之不忘也夫自壬辰之亂四方瓦解其能執節不回者往往于學士大夫見之如余闕之死于舒李黼之死于江泰不花之死于台尤號傑然者也有如先生無城郭封疆之守或保身于山澤君子亦未必深議之先生不以仕止為間孜孜汲汲思衛斯民于危亡之際遂及于難非事君無二心者能之乎使人人皆先生若國家其有敗亡之􅍔乎悲夫系之以銘曰仁皇建科璽書四布濟濟多士雲集川赴猗歟汪公遊舉于鄊對揚大庭乃苐奉常筮仕遐邦不遑將毋上疏廟堂碩從近授孝聲載昭如水東馳公聞曰噫吾分之宜鋤強擊貪鷹隼橫騖去之弗亟我民之蠹疊為理官為獄立平起彼朽骨化而為生魯有名邦待公為政瑞麥嘉禾發為祥應䇿書載登金匱啓封衮斧之寄有詔倚公尋教成均六館咸恱復直集賢進班邇列公曰止哉吾懸我車秩宗之加以華其歸拄笏看山宛水之涘遘時艱屯四郊多壘氓之蚩蚩非公疇依公苟我留執戟以隨一鼓作氣爭相奮躍刈冦如麻血汚秋鍔孰援我兵夜柝不鳴彼乘吾懈遂無堅城毒霧四塞殺戮以逞執公使降白刃磨頸嚼齒大罵我實王官咄哉賊奴敢正之干公雖遇害之死弗屈孤忠凛然皎如出日事聞中朝當寧嘆嗟莭惠易名恩寵有加所貴君子行為民望薄俗瀾奔障之東向非孝無親非忠無君凡百在位視公為人故懷逺大將軍同知鷹揚衛親軍指揮使司事于君墓志銘惟于氏逺有世序多以文學為業族居南康之都昌至君益顯融于時大父德仲贈明威將軍某衛親軍指揮使司副使上騎都尉追封河南郡伯大母王氏追封河南郡君父祥英贈懷逺大將軍同知鷹揚衛親軍指揮使司事輕車都尉追封河南郡侯母余妙真封河南郡太夫人君幼知讀書通大義縉紳先生稱之既長磊落有大志不屑為變情徇勢之行會元政大亂天下兵動江東西化為盜區分寧徐夀輝建偽號曰宋都九江使其將張福夏彰據湖口元將三旦八駐師鄱陽都昌適當其衝要交互殺掠民倀倀不知所從君召父老子弟謂曰吾等皆良民順冦兵官軍以為叛從官軍則寇兵又將屠我行見無噍類矣其計安出父老子弟咸叩頭曰微君不能生我君乃集諸少年趫健者列為隊伍朝暮教以擊刺之法旬月間整整可用乃握劒坐庭中下令曰賊兵有入吾境共擊之不用命者斬衆皆股栗賊聞不敢犯同列有忌君能者數潛通搆害君皆先機而梟其首人以為神歲乙未徐兵破鄱陽君之勢遂孤都昌繼陷徐聞君名急搜訪獲之命為江東宣尉元帥鎮鄱陽歲庚子徐之柄臣陳友諒殺徐而自立更偽號曰漢君乃泣曰我與陳皆徐君之臣陳不道乃尓我可北面而事之邪當是時皇上龍飛臨濠定鼎建業豪傑之士爭相奔走君遣使者奉幣以浮梁降上恱而受之君輕騎謁上于龍江詔宰臣燕饗之禮意優渥賜以金雕頂帽暨錦袍一襲授通議大夫行樞密院判官戍徽州永平翼遣之鎮行十里所復趣還解金連環並縧授之且曰豫賜卿冠衣不可少此故又召卿來爾君感知遇之深誓殫報效上疏曰于光之心鞠躬盡力報國一忠死而後巳上命左右藏曰此于光誓書也君察偽漢國政不一兵出于外潛獻搗虛之䇿上親征九江君與郡將皆從飈行電疾友諒以為自天而下棄城宵遁君將兵下黃梅瑞昌諸居亡何助攻建昌拔之出戍鄱陽友諒攻洪都上親往救大戰彭蠡湖友諒斃于流矢其子理假息武昌詔常忠武王追攻之理遂輿櫬衝璧出降君皆在行中與有功焉轉同知振武衛親軍指揮使司事遷鷹揚衛進階懷逺大將軍時偽吳張士誠據浙西淮東數州之地君從大將軍徐魏公往討泰興髙郵淮安安豐皆下張之徑卒皆聚湖之舊館魏公督諸將及君破之遂平湖州下姑蘇士誠就擒及魏公征中原君統鋭兵以從益都沂棣登萊諸州次苐平乃入汴梁克洛陜攻下潼關君與郭將軍守之元將王左丞自河中帥衆來奪關兩兵方挾戰君舞戟橫貫其中大呼殺入元兵奔潰追斬之積尸盈野越六月進擊河中拔其城魏公命戍鞏昌元將擴廓帖木兒屢引兵來戰君輒搗赱之敵兵不敢東向遂合諸部兵圍安㝎州君急分兵往救兵少不能戰退屯三十里復與元别軍會君腹背皆受攻遂𬒳執百計誘其降不屈韓將軍戍蘭州元兵來圍城擁君行城下使誘將君降君呼曰我不幸被縛誓死不辱國爾輩受大明皇帝厚恩當堅守以伺大軍之至勿信其甘言所誘也元兵大怒批其頰擁之使去尋聞被害上悼之錫以布帛令其家成服行喪遣祠部官祭以少牢奉其神主配享雞籠山功臣廟中君諱光字大用于其姓也自二十五歲起兵至四十三而殁氣貌修整善鼓琴能吟古今體詩多古雅不凡兼通醫學針灸科人望之翩然貴介公子也及持戟上馬輒鷹揚虎視所向不敢當逢者莫不改容太夫人性剛嚴君事之孜孜盡禮唯恐稍違其意遇氣有未平君長跽于前移時不敢起君子尤稱焉娶鄱陽劉淑姬通書史封河南郡夫人子男二人蕃與宣也君生于天曆戊辰九月十四日殁于洪武庚戍其月日則不可復知矣􅉝亥某月日蕃用招魂禮葬君衣冠于某山之原前葬一月其外舅建德令劉君爆狀君之行引蕃來拜于庭請為銘揭諸墓門嗟夫君以一書生嬰亂世乃能倡義旅以捍鄉邦繼而率衆歸有道之朝四方征伐為前鋒幕府上其功殆無虛歲惜乎安㝎之役孤軍深入不能制勝遂致陷于虎口天乎命耶有識者蓋悲之也然君能執莭不回視死猶生卒不負誓書死而後巳之言亦可謂夷險一節者矣銘曰麟之師師鳳之儀儀治世之竒有力如虎長戟徑弩才堪用武惟君之生丁時搶攘六合虎爭投筆而起集厥師旅以障州里真龍天飛大明赫喜杖劒來依帝曰嗟汝爾鎮歙土以安黎庶大軍長驅何戰不隨翦漢縛吳借籌決勝山東受令洛汴亦㝎潼關置屯鑄鐡為閽敵不敢捫靈旗西伐如火烈烈所向皆捷多寡勢殊視敵如無卒捐厥軀赤心如日以身徇國死又何恤皇寵有輝少牢祭之餟食崇祠寰字一統不為麟鳳使人增慟冠衣具存大招爾魂藏之山樊山氣鬱鬱護此玄室魂兮來宅故江南等處行中書省左司郎中贈奉直大夫浙東等處行中書省左右司郎中飛騎尉追封當塗縣子王公墓志銘洪武戊申春正月皇帝正位宸極布告中外念及舊勳例頒恤典于是故江南等處行中書省左司郎中王公之殁巳七年矣𥘉公之既殁上詔有司議贈公奉直大夫浙東等處行中書省左右司郎中飛騎尉追封當塗縣男且俾與享雞籠山功臣廟中上猶未慊其情至是復仍其舊縣進爵為子以寵之公之子文感皇靈之洊被也虔奉命書副墨焚告于墓下明年巳酉冬十一月持翰林待制王君褘所具事行求濂為銘以侈上之賜濂辱與公遊不敢讓知遂按狀而序列之公諱愷字用和姓王氏太平當塗人幼有大志沉酣六經諸史間必欲見之于用起應府公之辟為府史疏讞獄訟人服其平歲乙未上取江南兵臨當塗即召公至幕府上方為元帥命為掾以參決戎事丙申春從王師下建業又下京口京口民新附杌隉不安公慰撫之始㝎上為中書平章政事建江南行中書省于建業升公左右司都事公遇事善于彌綸日以薦賢為先元戎宿將咸器倚之唯公言是信戊戍秋貓獠兵數萬自杭來降待命嚴陵境上上遣公馳入其軍喻以禍福偕其渠帥來朝是年冬上將征浙東時婺之蘭溪巳下僉樞密院事胡公大海戍之上命公與胡公㝎議取婺親帥師圍其城守將出降公審察民情而奠綏之歷言上前無有不聽者已亥春王師攻越久不下夏六月師還上留胡公鎮婺而民賦軍器之務咸以屬公冬王師克三衢擢公左司郎中總制衢州軍民事公增城浚濠置遊擊軍募保甲翼餘丁及舊民兵得六百人以益戍守兵食不足則斥並城廢田五萬七千畒使之耕以自給民有田力弗能藝者聽軍士貸耕而為輸糧縣官籍江山常山龍遊西安四縣丁壯凡六丁之中簡一以為兵置甲首部長統之丁壯八萬有竒得兵一萬一千八百無事則為農脫有警則兵者出攻戰而五丁者資其食開平忠武王屯兵金華其部將或來侵民公偵知之械而撻諸市王使人讓公公對曰民者國之本將軍天子股肱肯令傷其本乎撻一部將而萬民安計將軍所樂聞也王嘆美之開化馬宣差挾舊邑印章誘編氓為變江山楊明恃寨柵之險叛服靡常公皆㝎計擒之梟首以徇衆部內帖帖無譁民飢疫相仍死者枕籍道路公出倉粟使作糜哺餓夫修惠濟局居藥以注病者所活不可勝數學校廢于兵公為浚泮池築杏壇建極髙明亭設博士弟子貟孔子家廟之在衢者公亦為新之退食之暇輒集薦紳之徒摩切道藝人士翕然恱服諸暨戍將謝再興與部帥王甲有違言幾致亂上今公調解之公善于説辭二人之歡如初邉鄙以寧同僉樞密院事李公文忠以國之懿親握重兵鎮嚴陵上命公往來佐其軍庚子夏六月偽漢冦龍江上召嚴陵帥葛俊搗廣信以牽其師道過衢公謂俊曰廣信偽漢門戶彼既傾國入冦寧不以重兵為守非大將統全軍以往不可若出偏師撓之未見其利設有挫衄吾衢先繹騷矣乃止俊而請胡公行胡公至而廣信潰一如公言辛丑夏拜胡公江南行中書省參知政事分省于婺以控制東浙公仍以左司郎中分治省事金華婺劇邑役民無藝公令民自實田請都以糧多者為正里長寡者為副正則以一家或二家充副則合四三至七八而止通驗其糧而均賦之有一斗者役一日賤與貴皆無茍免者金華周泰義烏栁昌恃俠以蠧民公逮至于獄皆痛懲之自是畏避不敢吐氣猾胥潘立道操金華一邑田賦之柄飛寄詭遁並緣為姦利公廉其罪狀以聞置于法胡公日治軍旅以略􅌘縣禦諸暨為巳任分省之政皆公統之公挈綱布紀風采凛然偽吳將吕珍侵諸暨𣣔堰水以灌我城胡公奪其堰反決水灌珍珍勢蹙乃馬上折矢與胡公誓請各解兵公聞之移書謂胡公曰彼狡謀尓慎毋聽今珍在重圍是天授首之日也胡公不忍食言竟從之珍果敗盟而去先是貓獠軍來降胡公分其衆萬餘戍婺其帥劉震等相挻為亂胡公被害公亦及于難當難作時貓帥多公恩欲擁之而西公正色叱曰吾天子大吏設不幸義當死寧能從賊反耶賊初縮首不敢犯拘縶一日而罵賊聲愈厲命左右取酒引滿竟日達夜旁若無人賊知不可屈遂刃之壬寅春二月七日也享年四十有六上駐蹕江西聞公之死為之嗟悼良久親為文祭之及返柩金陵上復率羣臣往城南致奠乃以其年四月十一日葬江寧縣鳳臺西鄉聚寶山之原公狀貌龎偉氣局堅凝善謀而能斷嘗以事入諌上弗聽公却立戶外既暮猶不去上出怪問其故公從容諫如初上慨然從之公于吏事尤長據律按比而飾之以儒術案牘經其裁削辭簡而意周喜為詩歌與賔朋談笑樽爼間更倡迭和情意豁如也故于其殁也人莫不傷之公父諱榮母孫氏配張氏子男子三人長即文有學行今為侍儀使階承直郎次行賊害公之際行方侍側或勸其去行曰棄親而求生吾不為也卒隨公以卒次升童孫女一人濂為左史時侍上左右嘗與濂論佐運之臣以字稱公曰王用和經濟之材也吾將大任之惜平早殁于難則上所以簡注公者為何如使公之存至于今必躋政府歷憲臺澤及于民者將益廣不特前所書而巳人之患也有才而無其時今公雖有其時未能大顯而命止于斯不亦悲夫雖然公之贊治外垣為賢賔佐及臨患難詈賊而死為忠臣天恩所加便蕃優渥名亦足以不杇矣在公可無憾銘曰真人之興肇自濠梁白旄黃鉞指四方桓桓豪英雲合響應維時王公杖䇿出迎龍旗所屇靡役弗前借箸以謀燭于幾先莫徭嚮風帥徒內附公往撫之謂公來莫浙河之東婺為名邦六師一臨完城以降奏凱而旋留將戍守公持文墨參其臧否姑蔑遺墟既入版圖兵民二柄孰斡其樞帝詢在廷非公疇可公拜稽首即日上道城增而髙復浚其濠遊擊置戌金柝夜囂孰為頑民嘯呼搆亂誘而縶之邉烽晏晏出粟哺荒注藥起尫民豫且康弗教則狂乃新泮宫乃置博士乃設爼豆乃經乃史金華建蕃控于海東還公來治若疚在躬科繇匪度均之平之閭右奪政辟之刑之民樂其生親若父兄敵畏其威望如長城豈期妖豎相挻為變大詈不屈遂罹于難人孰無死公死則忠正氣不沒凌厲秋虹皇情衋傷親御翰墨摛文祭之龍光赫赩受才孔多竟不盡施清風宰木凄其餘悲不杇維文大書深刻後百千齡過者必式元故翰林待制朝散大夫致仕雷府君墓志銘府君諱機字子樞姓雷氏其先出萬春之後傳至五代時有諱鸞者由光州固始遷建寧之建安曾大父時宋太學內舍生大父龍濟鄉貢進士當宋之亡帥義師抗元兵遂殁于難父德潤入元為福州路儒學教授積學庾之餘買田三百餘畝以給貧士昏喪老疾者號義士莊人為建祠學宫改將仕郎福州路長樂縣主簿未上卒後以子貴贈朝散大夫祕書少監母遊夫人贈建安郡君夫人善書而有文無子默禱于神夢黑熊行天遂有娠及生府君頴悟異恆兒九歲能詩賦十歲九經皆成誦十二著明經解題十七試論郡庠選為第一二十受大官薦為邵武縣學教諭二十五登延祐戊午進士苐授福州路古田縣丞自詔行科目閩人擢第者從府君始未幾丁朝散公憂服除遷延平路總管府知事沙縣陳氏豐于財身沒而子幼族有強暴者欲據其業賄于上下訟久弗能㝎府君下他廉吏鞠之竟白其事時經歷司獄二司暨照磨所皆闕官府君攝其印印置西樓几上夜有靈龜尾如鼠潛伏几下不動若護之者浹旬始不見或以為瑞應改邵武路總管府經歷郡長官乃西域人恃與憲部有連其猛若虎與守議稍不合遽引杖擊之守俯首遁去府君獨不為屈每曰苟如此天子法將何在獄有不平抱案與之庭辨辭順理直雖怒形于色不敢沮調興化路興化縣尹有豪大姓數家隂持公府短長挾勢以戕民府君曰此猶苗之有螣不去苗將稿矣悉置于法燭見毫髮無遁情皆以雷神稱之闤闠之衢甃以如卯小石犖確不可行府君令諸浮屠鑿石為版易之人呼為雷公路先是賦役屢不均府君察知之率吏民焚香祝天曰為民㝎賦當以公有徇私撓法者神降酷罰無恕言巳令民自實田隨其高下為㝎日選一吏主其官書每一鄊畢具其姓氏揭之民大恱仙遊莆田二縣民訴于郡曰民苦賦不平者久碩乞我雷侯録事司之民又訴于郡曰非雷侯不足以平吾民之役盍假之郡檄府君行凡三辭乃往民皆大恱舉手加額曰雷侯其豈苐君子矣乎遊夫人嬰微疾府君聞之愀然不寧曰先君殁不得在左右致抱終天之恨毋年耄矣忍縻好爵而不歸飬乎即日抗章辭職民涕泣留之不從羅拜馬前而去歸僅五月丁遊夫人憂服闋轉湖廣等處儒學副提舉府君招徠弟子員羅知名之士相與迪導之月書季考具有成法文風為之一振擢延平路總管府推官順昌舟師因利覆舟取人財獄成父子皆坐死府君以子從父令白部使者杖遣之尤溪有死獄株連者二十五人纍歲不得釋府君推罪之輕重亦杖遣之囚至感泣相聚僧坊誦佛書以為報沙縣織工子與張甲鬪鬪散子失足墮塹死吏入甲故殺罪府君出之南平浮屠殺其主寺僧浮屠之徒方九齡官以知情論死會朝廷遣使者宣撫八閩府君力言其非辜竟得釋府君患民不知教建義學鐔津延鄉貢進士陳竑碩開之以五倫之學久之士有與鄊薦者羅天凌反汀州汀境與屬邑尤溪接府君立堡柵數區以扼其險要招集強丁為禦守刁斗之聲達旦不絶盜聞不敢犯升泉州路惠安縣尹惠安之民嗜勢利而少禮讓府君究心學校𣣔以變其俗兼立社學十所俾分教之縣西登科岩先賢盧瞻故宅也舊因宅為祠巳廢府君為新之使民知所勸先是公田之入每斛收錢百緡民大病府君既至減其直之半居三歲政通人和遂為諸邑之最部使者及良二千石爭賔禮之或剡薦于朝及代還民倀倀若有所失赱大府遮留者日以千數不可乃為生立祠樹碑以紀遺愛碑幾遍鄊井焉除汀州路總管府推官汀民強悍易為變府君與上官議築城開濠以為堡障且請躬董其役上官韙之府君為量功授期使民爭趍民不擾而事成申屠公駉時為閩部僉事行郡至汀稔知府君之賢凡郡縣有赴訴者悉下之府君即為決治如律無不慊乎人心者巳而不俟引年遽上休致之請朝廷以其廉退升翰林待制階自將仕郎九轉至朝散大夫未幾卒于官實至正辛卯冬十月二十三日也享年五十有八府君軀幹魁梧方面美髯見者聳然起敬事親生能盡孝既死其葬祭之凡悉依朱子家禮從事居官尤盡心于獄事夜參半孤燈熒熒猶翻閲成案不休且曰人命至重吾可不盡心乎江西鄊闈試多士省府致書幣請持文衡府君之所甄拔皆通經藝者為人嚴而不苛和而不流稍暇集良朋嘯傲林泉間命壼觴以徑醉其視生産作業之事蔑如也所著文辭森嚴而演迤有龍津龍山鄞川環中黃鶴磯梅易齋碧玉環七藁共若干卷藏于家娶樵溪危氏諱淑馨字蘭玉宋禮侍郎春山先生某之曽孫女元江西儒學提舉徹之孫女也贈建安郡君通書記作字有楷法善治家事不以煩府君人謂婦道母儀皆可無愧先十年卒男二人燧至正癸卯進士從仕郎大都路香河縣尹燦鄉貢進士會閩中亂起兵以助王師死之贈汀州路上杭縣主簿孫男五人燧之子伯埏至正丙午進士從仕郎福州都轉運鹽使司知事次仲垙仲階燦之子仲墉仲堪府君之墓在縣之元祐鄊黃孫里龍山之原以至正壬辰四月某日葬危夫人祔禮也既葬十餘年燧自狀其行實謁濂為之銘濂在弱齡頗有事科目之學輒聞閩中雷氏兄弟以易經相傳授所為經之大義流布四方多取之以為法蓋府君與仲弟杭皆苐奉常而聲譽燁然久矣雖歆豔之有志弗強不及摳衣從府君遊以折衷諸傳之是非逮今四十春秋顛毛種種尚忍執筆以銘府君之墓乎雖然聲光之盛僅著于當時文辭之載可勸于來裔有如府君道德積于厥躬政教𬒳于民人所至是愛所去見思揆之于前古儒宗吏師似無所讓理冝大書深刻表諸墓門使為士者知所勸涖官者知所法不可以濂之蕪陋而遂廢也謹序而銘之曰閩有碩士雷作氏自幼學易探聖髓亦既決科拾青紫政行州邑平如砥鋤擊暴民仁懦起姦吏聞風潛若鬼獄命至重心盡爾一夫銜冤顙有泚漢之循吏當可擬玄龜護印曳其尾穹石序功文燁煒魂升魄降吁死矣四民會哭動成市遺文􅌭紛滿千𥿄虹光夜發玄笥裏孫子繩繩襲休美不信豫言有如水故宋迪功郎慶元府學教授魏府君墓志銘洪武三年秋八月亰畿多士較藝于鄊闈豫時𬒳旨與魏君潛與聞考試事既入院復同館舍每閲卷相與共論㝎所見頗吻合將還潛跽而請曰曾大父之殁七十又八年矣下棺之石有竅而無辭今幸得陪末議者踰旬敢藉寵靈以發其幽光死且不朽矣豫不能辭府君諱新之字德夫姓魏氏世居睦之桐廬曾大父子才大父演父國賢皆隱約田里以善人稱至府君始以力學自奮與兄升龍從子雲潭受書易于鄉先生王公某巳而三人皆薦于鄊而府君繼擢宋咸淳􅉝未進士苐𥘉授慶元府學教授階迪功郎未上轉運司檄府君考試永嘉竣事同列即治裝行府君問故皆曰士之𬒳黜者將生譁不如避之府君笑曰有是哉毅然獨留果有一士頎然而長鬛揭簾問去取之意辭色甚厲府君曰爾文固佳如犯不考何士猶撑拄弗服府君曰某行某字正係廟諱吾以墨圈之今猶在命左右取示之士慙沮衆皆引退及至官以濂洛關閩正學為已任推明中庸性道教奧旨反覆殆無餘藴𥘉鄞士多宗金溪二陸氏之學聞府君之學翕然信服之學録劉光尤所畏敬光嘗集解孝經自謂無所憾府君為刋正十有一條皆有關物則民彛之大者光不覺下拜曰先生之言其于聖經深有合哉鄞人有粥新書者府君閲之不忍釋手粥者曰君欲默記乎府君曰然曰所閲幾何曰將盡卷矣曰能記憶乎曰然遂琅然成誦不遺一字人驚以為神以書遺焉浙東提舉黃公震一見府君器之遂以文學孝廉薦于朝會國事日非不果召德祐丙子元兵入臨安遊軍至鄞鄞學時設兩學教授號東西廳西廳教授王櫸懼甚奔告府君曰吾儕死生決于今日矣府君從容答曰非止今日有生之𥘉巳㝎不若聽之顔色不少變及事平間關歸故鄊家素單乏虀鹽或不繼府君負薪而炊扣角而歌歡如也所居有垂雲洞因倡嗜義之士建垂雲書院開迪新學孜孜如不及講經之暇與蛟峯方公逢辰潛齋何公夢桂盤峯孫公潼發為泉石之遊間賦詩以見其志學者尊之號為石川先生元至元間詔王御史某求賢大江之南縣大夫楊得藻舉府君應命力辭而不就其風節凛然人至今仰之年五十有二殁于元貞癸巳某月日以某年月日葬于柯阜之原其徒誄之謂府君精思而陋詭隨之習知至而黜偏駁之非自窮而達不改其操運去物改弗涅以緇蓋實録云府君娶王氏子男子三人良恭儉子女子三人姚秦俞某張某其壻也孫聖作訓五典行開蒙蔀著光晶盍稽之為法程性由繕𣣔莫攖睦有士尊遺經宋物改遁巖扄霞作幌雲為屏皎弗緇莭逾貞非窮研行何成丗􅌭紛競華聲文滅質實慚名苟視此面發頳柯阜山八尺塋序令德鎸新銘故承直郎刑部司門貟外王君墓志銘豫聞王君孟逺名者頗久恨弗之識洪武庚戌秋待罪詞林聞有命徴孟逺至京師召對謹身殿授刑部司門員外郎豫悅甚將修刺通謁適修史事嚴未遑也孟逺尋𬒳上旨與監察御史慮囚淮浙之間及其既還始胥會成均孟逺曰未見君子悠悠我思今既見矣喜將何如豫曰僕之心即孟逺之心也孟逺大笑巳而别去暨再見又屬豫曰先人殁四年墓上之銘未樹已歷繫善行成狀矣旦夕重有請碩吾子卑之也自是厥後旅進旅退于班行中每遙見孟逺各注目相視彼此雖無言而情好躍躍然也當是時孟逺貌羸甚身弱如不能勝衣豫頗疑其不久樂人世者復自解曰昔張谷官河南與尹師魯謝希深二公遊二公方康強谷獨唾血垂斃孰知二公既殁而谷猶未死邪此殆難以常情測也幸亥夏孟逺出為鞏昌隴西縣令復來與豫别惓惓以銘文為請豫熟視孟逺心益疑雖自解如前終不能釋去因勉之曰孟逺宜自愛此別未知何時重見也余方戴星出入不能執一觴餞至都門外每一念孟逺為之戚然弗寧越三月忽孟逺之子興來告曰先君得腸澼疾至泗州加劇以五月二十六日死矣豫病瘍在告聞興言淚落枕上嗚呼孟逺固羸弱豈應遽止于是乎相聞餘十齡而晤言不數四豈意真無重見之期乎賢者夭而不賢者或夀天之夢夢抑自古而然乎嗚呼孟逺諱經孟逺其字也姓王氏其先家鐘陵宋𥘉有諱忠者來撫州為金溪場官遂為金溪人曽祖榮彰祖實父善毋曽氏孟逺習科目之業甚勤夜坐恆至四鼓目睫未及交而雞巳再號矣亟曰天其昧爽乎復披衣而起挾册映􅉉光而讀之尋患家居叢紛遷于梧山又遷于雲林皆有别墅在焉崖光澗影飛落戶庭間孟逺得以清其神思益自放于文沛然有不可遏之勢松滋陳氏建議孰曰墨濤聘余太史貞為五經師松滋去金溪將二千里孟逺徒步往從之悉傳其二戴禮之學他諸生所造經之大義太史命孟逺竄㝎且曰是不異吾所為者人讀之亦以太史言為誠然非溢美也至正癸已丙申科孟逺兩以是經取江右鄊貢文解值天下亂不得上南宫退隱􅃮溪芟禮記疏為纂要若干卷其于名物制度多有折衷入國朝以來侯君元善以重臣出膺重寄屢𣣔辟孟逺弗之就巳而歎曰聖天子在上我可終老山林邪適徵命至即憣然而起擢為今官詳刑鞫獄人自不以為冤朝廷鋤剗吏弊悉用儒術士更張之乃選孟逺為令方期孟逺有澤物功奈何死之奈何死之同知泗州事樂宋學士文集卷第三鑾坡集卷第三
