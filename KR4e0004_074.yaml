body:
  text: 葛孝子詩序清苑葛孝子守德仲謙事母有聞薦紳多其行頌美甚殷其胤師曾請序以文余謂孝子云何曰母病痿痺四體莫能屈伸衣帶筋七孝子必躬事不屬諸人匑匑色養如是者終其身母耄性嚴或少失其意叩顙謝過務取其歡欣身處疏淡奉養極旨溫假貸勞勩口不稱難母弗知其貧燕南部使者高其行𣣔薦名于朝辭疾不起不忍違其親貴臣知之俾師鄉校後教授中山保㝎二郡車載母以行徒步推挽見者稱其賢出逰于外獲味頗珍必持以遺母已不敢先嘗醉而歸母不恱以嗔輒戒不飲非尊者賜未嘗染唇母以壽終哀號頓劈治葬與祭必傳于禮哭泣三年孝子有兄母沒求分力諍不能得恣其所取不忍與論兄寠且老迎以歸養死嫁其孤女待之有恩姊貧無子事之如兄而弥敦惠于同姓施及外姻鄉人稱孝子之行父以訓子祖以語孫曰若葛孝子古篤行與倫元至正之季盜起中原舉家避亂唐明府山采椹以餐忽逢大風西南來勢若萬馬奔家人懼赱逃匿既而兵至餘皆遇害孝子家獨存人咸謂孝子至行可感鬼神嗚呼人孰無母孰無弟昆何獨孝子生有美名既死而不眠嗟哉恆民逐逐生耳死生無可稱死則澌盡何異于萬蚋與蚊孝子之名冝載國史冝勒貞珉光明炳耀有若景星縣彼高旻嗟爾後人勿謂孝子之行不可以臻天衷萬古炯如朝暾周君墓銘周君諱德驥字仲良其先汴人宋靖康亂諱詢者始遷杭之新城曽祖諱曽國學生授迪功郎祖諱藝父諱誠孫母汪氏君少喪父能自力學問事母貧無以養去就吏得祿以奉母及母患危疾遂弃歸躬調煮藥物問所苦好而順適之晨夕涕泣叩顙天夢神語以禳禜之法亟如其言疾果愈念母已耄絶意不復謀仕有薦之者不應惟日以求母豫恱為事食必俟母舉筋然後食夜俟其就寢然後寢見其色和即喜以告妻子或有憂戚輒懼自外歸倘不見母驚赱問故家人曰在臥所趨床下問體安否安則恱否必如疾在身終日不食平居必稱名有問起而對髮班白未嘗言老及母年八十餘終君哀號頓劈過者不忍聞居喪治葬咸如古禮君有兄亦老病足不良行嫂喪明無子事之如父母元末兵亂奉兄嫂以逃不辭勞勩沒皆卜地葬之人服其行稱其為孝弟及年五十八而卒復以節孝私諡之君娶武都章氏其孝儉如君年六十哭君過哀而終生一子昉養君如君事母一女嫁白釗側室龔氏遇盜不屈死生二子一夭一死于亂昉既葬君耒請曰先子之卒以元至正巳亥三月四日吾母亦卒于後十五日𥘉合葬潘村先隴之左今洪武甲寅正月三十日復遷葬于昌西鄉下汪山之原而墓石無辭敢請銘余曰節孝君之行如古人固冝有後眆真其人也烏可以辭銘曰人咸樂乎生而愧于苟生人咸惡乎死而尚于有名生以孝稱其生不苟死以孝名其死不朽昉以為之子是謂天道而余以銘之告于悠久敦睦堂記台黃巖之西三十星有澧水澧水之上大姓張氏居焉故有堂曰樂善至諱遂者屬其子光祖與璣為歲時合族之所諸孫若奎等五人謹守之而不敢廢元至正壬辰堂燬于盜嘗𣣔作之而未能越二十六年為國朝洪武丁巳若奎之子昭與群從兄弟謀以為自斯堂之廢久而不復則親義踈而友悌乖將始諸此可不亟圖乃各出錢粟材木金石之費合作同謀弗怠弗息如營其私越明年堂成既行㑹族之禮復更其名曰敦睦其在京師者太學生升遂來徵余記昔者先王盛時制民之具既僃又為井田以聮其心為鄉黨州閭以同其俗為學校以化其暴戾而樂其善良又有月書歲考之法以紏其不率教者而取人之際又必察其孝弟姻睦之行焉故當是時凡比屋鄰井之人喜相慶戚相吊疾病患難相賙恤如至親然脫有災􅍔非常之事狠虐不軌之人皆無所自而彂彂則親戚鄰保隨而擈滅之故其時天下無亂民以百姓皆相親睦故也世遠法墮人自為家鄉自為俗甚者兄弟父子不通假貸憂喜不相問逸樂不同情事觸于中則勃然操戈而相逐父不能以禁其子弟不能以諍其兄往昔之亂多起于此非民性異于古也制民之具不若耳制民之事非無位者所得為有志之士能睦其族化其鄉而不陷于非義豈非善學古者乎若張士之為蓋近之矣賢人君子豈必皆假乎位而後行道居乎家而使同姓之親少長知禮讓而不爭壯者知勉于學而篤于行頑嚚化為純慤愚昧者不失其性是亦道之推也豈細事哉張氏之孫多賢能其鄉咸稱之它日海東之邑聞有民淳俗厚如鄒魯者必張氏之化也歟試記其堂以俟焉連槐堂銘有序人事無與于草木乎孝友之徴古多記之矣草木果符于人事乎則大舜閔曽之行未聞形于草木之祥也然則將何所㝎歟人之于天體異而氣同養吾氣以感之寒暑可自我而平日月可自我而明山川可自我而不震驚鳥獸可育四靈可致况草木乎然而有得有不得者變也物隨以應者常也變者天之權常者天之經天以經示人而以權教人以聖賢之德盡為人之道固其職也雖勿報焉可也未至于聖賢而能不悖于道烏可以弗旌乎足權也或因物以著戒或設象以假義又權之教人者也苟逐逐焉而報之仍仍焉而見之智者可以理推愚者可以幸得則不足以為天矣天道之權吾于㑹稽周氏有徵焉周氏兄弟曰彛允皆賢而文居新昌彩烟山中事毋甚孝入其門少長秩秩有序其氣穆然若陽春然鄉人稱之為孝弟舍㫄樹槐一章髙尺餘岐為二幹及肩交合為一左右之枝各三上挺可數尺再合而再交焉于是觀者咸歎其異以為彛允孝友之徵乃以連槐字其堂其友王宗成來京師為之請銘槐之為音近于懷懷者思也所以旌其孝友而教其後人以思也後人視斯槐寧不有思乎其枝歲繁而時茂時子孫之愈久而多也子孫雖多其本于祖則一而已猶槐之衆枝本於幹也嗚呼周氏後人視於斯槐孝友之思其能忘乎此天之所以教也烏可以無銘銘曰周氏孝友德斯植天旌厥槐世希覿巨本數圍去地尺岐為雙幹挺雄特及肩而交交復副既副群枝合如織鄊氓里耋歎以嘖炯哉竒祥古未識吾知玄化彰爾德俾尓後嗣思作則枝繁幹别勢莫抑同氣殊分麗千億槐枝能連人可析李疑傳金陵之俗以逆旅為利旅至授一室僅可榻俯以出入曉鍾動起治他事遇夜始歸息盥濯水皆自具然月責錢數千否必詆誚致訟或疾病輒遣出病危氣息尚屬目睊睊未瞑即輿弃之而􅐁其資婦孕將産者以為不祥擯不舍其少恩如此非其性固然地在輦轂下四方人至者衆其勢致爾也獨李疑以尚義名于其時疑字思問居通濟門外閭巷子弟執業造其家得粟以自給不足則以六物推人休咎固貧甚然獨好周人急金華范景淳吏吏部得疾無它子弟人殆之不肯舍杖踵疑門告曰我不幸𬒳疾人莫舍我聞君義甚髙能假我一榻乎疑謝許諾延就㘴汛除明爽室具床褥爐竈使寢息其中徵醫師視脉躬為煮糜煉藥旦莫執其手問所苦如事親戚既而疾滋甚不能起溲矢汙衾席臰穢不可近疑日為刮摩浣滌不少見顔面景淳流涕曰我纍君矣恐不復生無以報厚德囊有黃白金四十餘兩在故逆旅邸願自取之疑曰患難相恤人理宜爾何以報為景淳曰君脫不取我死恐為它人得何益乎疑遂求其里人偕往携以歸面彂囊籍其數而封識之數日景淳竟死疑出私財買棺殯于城南聚寶山舉所封囊寄其里人家往書召其二子及二子至疑同彂棺取囊按籍而還之二子以米饋郤弗受反贐以貨遣歸平陽耿子廉械逮至京師其妻孕將育衆拒門不納妻臥草中以號疑問故歸謂婦曰人孰無緩急安能以室廬自隨哉且人命至重倘育而為風露所感則母子俱死吾寧舍之而受禍何忍死其母子乎俾婦􅌽以歸産一男子疑命婦事之如疑事景淳踰月始辭去不取其報人用是多疑名士大夫咸喜與疑交見疑者皆曰善士善士疑讀書為文亦可觀嘗以儒舉辭不就然其行最著云太史氏曰吾與疑往來識其為人疑姁姁願士非有竒偉壯烈之姿也而其所為事乃有古義勇風是豈可以外貌决人材皆哉語曰舉世混濁淸士乃見吾傷流俗之嗜利也傳其事以勸焉題夀昌胡氏譜後君子之所為貴乎有徵昔者孔子修五經書斷于唐虞詩起于關雎春秋自隱公始或餘繫以辭或從而㝎之未嘗敢增益也其慎且敬如此故孔子之經傳百世而人莫能非之及司馬遷作史記遠泝博索于孔子所不敢述者皆采而實之其事雖備而去闕疑之意遠矣其備也適足以為誣何取其能慱哉族之有譜所以紀所自出實則為尊祖僞則為誣其先而亂其類不孝莫甚焉近世之士不察乎此多務華而衒博或妄為字名加于千載以上不可知之人或援它郡異族之貴顯者以為觀美其心非不以為智卒陷于至愚而弗悟也夀昌胡氏則不然于既逺者皆不敢有所載獨自其有徵者録之得十有五世詳親而略踈考訛而傳信附其遺文及當時所受制命之詞皆蔚然有叙是可謂善學孔子者矣嗚呼不知而妄作者其能無愧于斯哉修譜者名榮來京師而以示余者名翰皆善士云贈鄭院判序有其術而無所于用值可用之機而人不能任之欲望其以有成者百家之所難也惟醫為甚扁鵲華他天下固不常有也使有之而值淺易之疾遇難語之人上之不足展吾術次之不能從吾所𣣔為法冝針而責我以砭法冝實而命我以虛乖忤拘執卒之與恆醫無異是豈醫之罪哉勢使然也誠有善任人者惟吾所用而不較期以成效而不泥于私謀人人皆可得而勉矣故疾有死于過愛而生于達理遇愛者恐其危而不肯任人達理者知非已之所能為則信人而求其成效其逹者乃所以生之而愛乃所以殺之也若福建承宣布政使陳君彥銘其達理者與陳君之妻免身得寒疾羸弱已甚徴太醫院判官鄭君某藥之鄭君請曰愈否在吾幸無撓我陳君許諾鄭君乃視脉所冝集藥之良而療之或謂藥性與疾戾以語懾陳君君不聽任之不變已而果愈陳君出金帛謝之鄭君辭曰子善任我故爾使子不我任而自用雖𣣔愈可得耶且金帛非所𣣔子嘗善太史宋公得其文卑我足矣陳君以其言告余謂陳君之善任人鄭君之不伐其事皆可稱且類古之為治者蕭曹房杜雖為俊傑之士使其時不善任之黎庶何以享隆平之澤而其名聲事業何以垂至于今乎然則二君之事取喻則遠矣序而傳之豈特可為任醫者之勸乎送陳庭學序西南山水惟川蜀最竒然去中州萬里陸有劔閣棧道之險水有瞿唐灔澦之虞跨馬行篁竹間山髙者纍旬日不見其顛際臨上而俯視絶壑萬仭杳莫測其所窮肝膽為之掉栗水行則江石悍利波惡渦詭舟一失尺寸輒縻碎土沈下飽魚鱉其難至如此故非仕有力者不可以逰非材有文者縱逰無所得非壯彊者多老死于其地嗜竒之士恨焉天台陳君庭學能為詩由中書左司掾屢從大將北征有勞擢四川都指揮司照磨由水道至成都成都川蜀之要地楊子雲司馬相如諸葛武矦之所居英雄俊傑戰攻駐守之跡詩人文士逰聎飲射賦咏歌呼之所庭學無不歷覽既覽必彂為詩以紀其景物時世之變于是其詩益工越三年以例自免歸㑹余于京師其氣愈充其語愈壯其志意愈髙蓋得于山水之助者侈矣余甚自愧方余少時嘗有志于出逰天下顧以學未成而不暇及年壯可出而四方兵起無所投足逮今聖主興而宇內㝎極海之際合為一家而余齒巳加耄矣𣣔如庭學之逰尚可得乎然吾聞古之賢士若顔回原憲皆㘴守陋室蓬蒿沒户而志意常充然有若囊括于天地者此其故何也得無有出于山水之外者乎庭學其試歸而求焉苟有所得則以告余余將不一愧而已也贈承事郎知吳縣事周君墓銘蘇之吳縣有士曰周君諱文敬字敬之少攻詩書法律食吏祿于浙河東西晚為平陽州吏目滿歸元末盜據吳遂居崑山年七十四以至正壬寅十一月十五日終有男二人克讓備女四人𥘉君之夫人張氏以先十五年戊子八月十八日年五十而終君擇地于吳天平山隂之龍池塢將葬之卜于玄武神自始擇至啓壙三卜􅊞吉其繇曰利爾後人忠孝且賢遂葬及君卒之明年克讓將合葬復卜得前繇乃以某月某日穿壙葬焉元亡國朝有天下次子備以才薦為和順令三遷為通政司經歷得推恩贈君承事郎知吳縣事張氏為孺人于是咸謂玄武之繇有徴也僃詣余泣告其故且曰先君之善甚衆備不能詳其居家妻子未嘗見其過行接士大夫有禮字矜寡有恩常教備曰吾惟不思自立以陷于吏耄老無所成惟修身治人恆道莫大于儒爾其朂焉以顯爾前人否亦足為善士無效吾為也備謹服于心不敢怠至于今藉以祿食于朝皆先君之訓而先君巳不逮養矣今既𬒳寵命爵為鄉邑大夫倘不刻文于墓何以侈國恩而昭先德願卑之銘余曰吳縣君生雖不遇于時然善格鬼神而告以吉壤德遺于後而享兹寵贈其得于天者不亦厚耶爾後人能繼忠孝以承以昭斯可以銘矣君曾祖某祖某考必亨孫男曰庠孫女二一適顧某一在室銘曰挺挺令士世不祿之巍巍佳城神具告之世雖爾遺神不尓欺厥㣧孔良榮命是推善格于天亶若蓍龜有不信者來考豐碑栁氏二節婦傳栁氏二節婦者上虞栁宗遠妻唐及其子桂之婦陳也𥘉唐年二十三歸宗遠事其姑孝越二年生一子桂而宗遠卒或少唐恐其難寡居也以語試之唐忿曰吾喪夫命也婦不二醮義也命天使然義出于人心吾縱不畏天能昧吾心而負義乎且吾姑老吾子少吾去之將安求乎益苦心瘁力營粟帛以養姑命桂學詩書于鄉先生姑年八十餘乃終而桂長遂娶陳女為婦陳歸桂逾年桂亦卒陳年甫二十四或閔陳無子且少也勸其再配陳哭曰此豈人所言乎吾姑不負吾舅吾敢負吾夫乎吾寧即死栁氏牗下不碩聞此語也乃去膏沐屛華靡與其姑相依以居姑食然後食姑寢然後寢家內外事必告而後行姑婦孝愛如母子歲時具殽醪祭栁氏亡人二婦㷀然拜階下輒涕泣不能相視後以某子某為桂後今唐年六十陳亦四十鄉人咸稱為二節婦云史官曰夫婦者相扶以生者也相扶以生者人道之常也不幸遇夭折臨患禍夫不獲婦其婦婦不得夫其夫是豈人情所碩也哉斯變故也夫人處平居無事雖至暗劣皆可以勉事有出于難處者雖竒偉丈夫時時猶有失焉况婦人哉若栁氏姑婦皆在少年喪夫處人之所難堪以至于老余讀其事未嘗不為之歎息也人常患後世俗不逮古是烏可槩言乎二婦之所為擬之古賢婦何讓乎余因門人朱瑾請為列其事使繼此執筆者有取焉畨禺蒙氏譜序太學生番禺蒙安以其譜圖請曰安之先齊人秦時恬􅐧兄弟俱士𬒳信任後皆死扶蘇之難其子孫散處天下甚衆然千餘載未有大顯著動人耳目者畨禺之蒙始于有宋諱甄者自北方來知廉州遂家畨禺之海陽里至安八葉矣在宋世有祿仕自元得國始無仕者今閲三世而安復以儒生貢太學為弟子貟竊懼不能承其緒嘗考次八葉字名枝裔為譜使後人知所自碩先生序之以昭吾先余告之曰姓氏固人之所甚重也然其著于時者不以其受氏之貴而顯亦不以有人稱之而傳在乎孫子之賢耳論受氏之貴則貴于王矦之裔而今世載之簡䇿以為甲族者非必皆姚姒子嬴燕齊氏也苟以人稱之而顯則左丘明太史遷班固之所書其苗裔未必俱顯于今也今天下之人語道德必曰孔孟顔閔周程邵朱氏論政事必曰伊傳管晏蕭曹房杜韓冨氏語文章則其人名氏彰著者尤多三者皆由其身善自振拔而然未嘗恃于其先假之于人也蒙氏自恬􅐧始顯恬􅐧雖賢然其所為未能皆當于人心而卒死于亂邦其名猶且傳而不廢况有過于恬􅐧者乎方恬􅐧𬒳禍時呼天地神明而自列其意豈自虞不遂泯滅哉而太史氏悼其忠悲其志尚不忍廢而著之史傳况夫道德之士仁聲義聞足以厲俗而化人者何患其無傳乎安溫而有文愼而逹禮可謂有學道之質矣前之三者茍知所勉焉未有不至者也况于恬􅐧乎其名誠顯于當世而著于方冊後之人必曰此番禺之蒙氏也蒙氏之後人必曰此吾蒙氏之聞人也番禺之人必曰此昭吾邑者也若是則非惟可以顯其先且可以顯其鄉邑矣何患譜之無傳乎又何以余言為乎安曰此足以序斯譜矣請書之以告族人使知勉焉送會稽金生序余居京師十餘年四方賢士從余逰者衆矣晚得某生之才余愛之既甚凡見其鄉里及所與交逰之人無不愛也今年某生以其友太學郭生濬來見郭生與某生同邑出其文數十篇讀之善馳驟可喜與之語義理蔚然余又愛之既而郭生又以其同舍㑹稽金文舉訪豫且稱文舉交朋友有義見人有才者事之惟恐不至善為詩太學之論詩者必稱之余又以愛郭生者愛焉天下之人不肖者常多而材者常少不肖者如野蒿山櫪不培而自長才者如靈芝瑞木舉世不一二見靈芝瑞木之不易得如此見者茍不愛之非無目之人必無識者也是豈人情哉自昔國家盛時材士布列于朝與其同時者且猶愛之况今喪亂之餘斯道之不絶者如髮則才之生于此時者尤不易得也其可不加愛乎豫怪世之士為識不弘見有才者位尊則忌其蔽吾名年少則惡其分吾譽交排競訐傷至公之道益知某與郭之交薦其友為可愛而喜文舉愛才之心為足取也及文舉將歸省其親某生為之求言余故以愛才之說告之使見文舉者若覩靈芝瑞木然而毋蹈余之所怪也遁耕軒記畨昜樊君德新以美材擢為戶部主事每欿然有不勝任之言題其舍曰遁耕而謂人曰吾昔避地荆南有宅一區有田數十畝躬耕以養吾親甚自得也今繫官于此材薄不足以勝祿位勢微不能以施惠澤吾心未嘗不念躬耕時也行將陳于上乞身而歸反乎故廬此名所以識之耳聞者疑之曰署居與氓㕓孰安章綬與民服孰華耒耜耘耔之業與簿書之政孰勞事人主而友卿大夫與居閭巷孰榮而曰遁且耕非有激而然耶且君子出處何常惟不失乎義而巳昔之居田里共民之業義也今仕乎朝共乎仕之職亦義也以民而有祿位之思則為僣以仕而懷其故土碩為齊民庸非過乎天之生人不皆賢不皆不肖將使才者治不才者爾故細民者耕且𧖟為粟帛以奉上者也君子者出智謀計畫均之使勿爭􅐁教之使知禮義者也使人皆欲為細民則誰為治使皆欲為君子則上安養今樊君以治人之才居乎位冝也而必欲為遁且耕何歟樊君曰仕之優于農吾豈不知之然國之祿位非以優仕者也使仕者勞其心以優細民耳故祿者出于民所以傭我之心力位者出于上所以使我自别于細民夫位髙于細民之上而德不稱則為尸位受民之傭而無功以報之則為苟祿告惟是二者之懼愧交于心而不釋思其易稱無愧者而為之以為莫農若也故以見吾志焉且世之居位而肆虐者不知稼穡者也吾今不忘乎耕使目之見者耕也心之思者耕也烏敢自逸哉他日或得舍此而去放乎山澤之間求抱甕丈人之徒而友焉作為謳歌以慶夫天下之平此吾之志也云云者吾何暇計哉于是金華宋濂聞之嘉其存心之仁自待之薄異乎患失者也記其事以為仕者鍳焉毛德玄傳毛聚德玄者萊之掖縣人也幼有異質事繼母秦盡孝里中嘗冦至衆驚赱秦老不良行聚獨侍左右弗去寇問曰爾不畏死耶何為不避我也聚泣曰我老母在安敢自求活乎冦義之不忍犯父嘗病疫居崑嵛山中夜渴求酒山深多狼乕聚弗憚跣赱出山乞酒以還父飮而愈與兄弟分財恣其所取而受其弃遺者長兄葬柩將及壙訛言盜且至人懼𣣔奔匿聚曰兄柩在斯忍弃之力圖生卒掩壙而還再從毋殯城隅人取其磚殆盡聚買地瘞之族女六人貧不能嫁聚出私財嫁之族中不克葬者十餘喪聚皆為葬之歲食有餘粟則推以濟鄰里貸不償者則焚其劵有客宿其舍旦遺錢數百緡而行聚徒步追五十里還之鄰人耕侵其畔或以告聚聚曰寧知非彼地耶其居家待人無長幼皆以誠久而人咸信之稱為善士聚生二子蔚炳蔚生二子紘綖皆好學紘今由國子生為殿廷儀禮司序班與余孫愼同官相友善史官曰孝弟慈愛人性所彂也寧係所習哉萊在東海上其俗從古號為難治禹書春秋外之今去古二千載乃有毛君之行是烏可以習俗古今論耶語曰為善必有後毛君之善卓然可稱矣其子孫殆將有昌者耶臨海方府君墓銘君諱濬字德明姓方氏台之臨海人五代時有以武顯者居臨海仙華山之東號東山方氏君其後也曾大父仲大父賢父奎母韓氏君少孤能自拔擢超出流輩中誦書不求多解務見于用持身有威儀不妄譁笑儇薄子過其家蹐步傾耳不敢出聲喜延攬賢士至則沽酒與飮取其歡欣不顧惜資費人有過弗匿于心輒面折之遇流俗則不肯舉目視至門亦不與語是以所交皆台之有名者無季或薦名于朝授江浙等處儒學副提舉不赴會方左丞據海上賤儒多倚之求利祿君獨避匿日與里中故老緣躋山水間歌吟忘返庭有巨檜每醉餘盤旋其下晚乃别號檜屏翁一旦得疾正衣冠危坐抗手與視疾者訣頃之乃逝年六十時至正二十六年二月十日也娶牟氏諱巽事姑孝宗族稱之年五十有八以今洪武二年二月二十一日終五年十二月九日合葬于仙華山之原四男子仁義禮本禮本為浮屠本以才薦擢起居注遷徽州府通判改知金壇縣事有政譽一女適董宏孫男六人組忠良桓金瑰女三人長適韓載二尚幼本為起居注時與余同朝屢以銘為請未果為及余致政朝京師本至自金壇重以為言退則自狀群行使忠來速銘其辭文甚于是知君善教子也銘曰維蔓方氏本于方雷事軒與舜曰明曰回叔佐周宣功侔尚父紘在西漢始徙南土南土之方皆祖于紘派别支繁維歙為宗台之方氏始自歙分或昭或泯不大有聞君之先人嘗以武顯君隱不仕乃篤為善善積在人彰善者天其將熾然㣧子孔賢新雨山房記諸暨為紹興屬邑與婺鄰國𥘉得婺時伐僞吳張氏相持未决兵守諸暨界上張氏恃諸暨為藩籬乘間出兵侵掠兩軍屠􅓍無虛時故諸暨𬒳兵時甚崇甍巨室焚為瓦礫灰燼竹樹花石伐斫為樓櫓戈炮樵薪之用民懲其害多徙避深山大谷間弃故址而不居過者傷之今國家平定巳十餘年生民各安其業吾意其中必有修飭室廬以復盛時之觀者而未之見今年邑士方伯修為余稱其友張君仁傑居諸暨北門之外故宅昔巳燬及兵靖事息始闢址夷穢創屋十餘楹㫄植修竹數百四時之花環藝左右琴床酒爐詩畫之具咸列于室仁傑未亂時嘗有祿食至今郡縣屢辟之輒辭不赴以文墨自娛甚適號其室曰新雨山房願得余文記之一室之廢興為事甚微然可以占世之治亂人之勞逸非徒然也方兵革之殷人有子女金帛懼不能保雖有居室寧暇完葺而知其安乎糗糧芻茭之需呌號徵逮者填于門雖有花木之美詩酒之娛孰能樂之乎今仁傑獲俯仰一室以察時物之變窮性情之安果誰使然也非上之人撥亂致治之功耶自古極治之時賢且能者運于上隴畝之民相安于下而不知其所由然飫飽歌呼秩然成文成周盛時之詩是也安知今不若古之時耶仁傑其試為之余它日南歸駕小車過北門求有竹之家而問焉仁傑尚歌以彂我余當鼓缶而和焉送李生序善觀璞者不觀其形而觀其色善觀人者不于其材而于其氣形可僞也色不可僞也材可强也氣不可强也摩其外輝然而溫栗然而潤人雖賤之吾必以為良玉矣叩其氣肆然而直浩然而正雖未措于用吾必以為美才矣古之育才者不求其多才而惟養其氣培之以道德而使之純厲之以行義而使之髙節之以禮而使之不亂薰之以樂而使之成化及其氣充而才逹惟其所用而無不能加之以天下之大事而不勞優之于廟堂之上而不變窮之于荒陬陋巷而不憂其中有所受而然也故惟有所受者然後能有所為譬之大海然百川之灌千載之積受之而不辭然後能培萬彚載舟楫而不難汙潢之水一葉加之則勝浮之以柸則沉矣故君子貴乎有養也臨海李生宗魯在太學侃侃自許不逐時輩俯仰囊無一金之資處之恆無憂色是非其氣之足恃能然耶彼見寶貨而喜者死于寶貨者也以困貧為憂者終于困貧者也故惟安貧賤而後能脫貧賤輕冨貴而後能享冨貴安貧賤而輕冨貴非善養氣者烏能尓耶生之氣美矣能養之以道吾未見其終貧賤也今年生歸拜其親其友某為之請且言生以布衣歸未有以慰其親請以言榮之余言不足以榮生或者因余之言以求生則知生之所得者過于人遠矣持敬齊銘吏部員外郎翟君大年謂余曰大年頃詿于吏議繼蒙大宥預有祿食列于英俊之後追思舊愆未嘗不惕然惴栗因以持敬名所居齊庶或善其後也請為銘以自勵焉銘曰坦途不戒驥或蹶羊腸畏惴駑可越靈臺孔微役萬物物來不制昏以逸持之以敬志斯一古之明訓作自哲曰人敬勝怠則吉心不特敬中蕩潏四體不敬形縮瑟不敬而言枝以怵行而不敬遭僨跌矧兹有職紛轇轕上有嚴臨下群列苟或不敬衆尓呾鬼神遼哉愡恍語之無聞罔由詰敬以格之迅如驛况均為人視聽徹事之以敬寧弗恱告爾持敬久愈晣德樹名彰底崇秩貞白堂銘古君子于治身之道詳矣而居室未嘗有名近世之士略于自治至于居室之名則務極其美昭而日月風雲雨雪霜露大而江河山嶽林泉丘壑細而竹樹草卉鳥獸魚蟲凡可以托情而比德者皆取以為名名則美矣于身何𥙷哉誠能揭仁義道德之要著之于目而存之于心禁邪而止慝服之以終身而不蹈流俗之弊此不猶得古君子之意乎臨川許仲孚篤志耆古以貞白名其堂蓋將矯夫側媚汙濁之弊以治其身是可謂善為學矣其友芒文縝來徵銘銘曰天不貞天柱傾地不貞地軸騰日月不貞乃蝕其明隂陽不貞寒暑潜行况伊人斯敢不貞有不貞者殞厥生天以白物罔惑地以白庶物育日月以白四海昭燭隂陽以白民用弗􅑯人苟弗白為暗為僻彼何人敢弗白有弗白者戕身喪德維許子學孔腴褐貞白銘堂隅豈銘尓堂將銘爾軀匪徒飾外冝銘諸心矢弗渝爾心之貞為道之樞爾心之白為德之居勿側以欹勿以汙持之永久為聖徒贈張致中序銜轡衡䇿工之所以御馬也馬非此則不足以致遠然苟不用其力焉未有能至者也爵祿名器人主所以御天下賢才之具也有才之士非假爵位固不足以立功然苟恃焉而不修其職其能成名者鮮哉余嘗讀漢將相表見四百年間登名于簡冊者以千百計而余能熟其名者僅數十人他或無事功不見于列傳或不久輒罷不及有所為至于今則寂然無聞矣余每為之掩卷竊歎方其人在時皆位乎朝廷之上與人主相唯諾可否其威權勢力可以禍福一世使一世之人低首側足不敢視其前驅當其氣酣意得語其故人賔客亦未嘗不自必以為傳世無疑而今雖博聞多識者且不能知之況庸常之人乎此其恃焉而不知修職之過也及觀卓茂魯恭之名皆彂于邑令唐之元德秀宋邵子張子之流皆厄于下位或布衣終其身而名聲赫赫照宇內雖小子婦人皆習知而能道之後世或跡其里居官守所及之地為之立廟奉祀與其人尚存不異然後始大悟鄙陋無能者雖爵位不能顯其名豪桀之士自立于天下者固不待外物而後著也而世戒恃之以夸于人則豈不惑哉四明張君致中學甚冨義甚偉有志于功名思推其所得以澤物其意甚美繇奏差上書闕下論事天子才之擢為宛平知縣余嘉致中之賢而𣣔見其功名之成也故以所嘗歎者告之使致中勿以位卑自忽而益致思焉然余固以德薄位尊為懼者亦可以為戒也傅幼學字說四明傅君其名曰行而字曰幼學問其字之說于余余告之曰子學後世之學歟將三代之學也後世之學士有以理財為學者矣有以聽訟為學者矣有以治兵為學者矣有以交章為學者矣有以訓詁為學者矣然皆非所謂學也夫辨章析句剔抉細碎若馬鄭之流訓詁之學也研精極深融理放辭若栁劉之類文章之學也貴變務竒奮智鼓勇若孫吳曹操治兵之學也以察為明以刻為公若商鞅韓非聽訟之學也箕斂口稅不遺毫厘若桑弘羊之徒理財之學也是皆得一而遺十或不適于用或用之而不足以致治故君子弗貴焉三代聖人之所學者大參乎天地而小不遺乎事物妙可以贊化機而近不離乎云為其本仁義其具禮樂政教其說存乎經而學之存乎人人皆知學之而不能行之者惑于後世之學故也後世之學譬猶梯稗然藝之易成而獲之不可以食食必有霍亂泄嘔之疾人恱其易而不顧疾之在後不亦惑乎聖人之道粟菽也用之于身則氣充而體安用之于家則家𥙿國用之則治天下用之則四夷格而庶物育而後世未嘗大行者或有其人而無其時或遇其時而不能盡其才通患然也幼學材敏而色和志篤而有容庶乎學聖人之道者矣而人生乎今之世其殆將有合乎夫不學道而妄行者無責也學道而不以行者自賊其心也得乎君而不以斯道事之者欺其上者也是恆人之所不敢為況幼學之名若字出于父師之訓者乎幼學益自勉焉他日佐朝廷有以經術致治者吾知必幼學也夫題甘氏三友堂文後禮部主事甘君友諒以三友名堂蓋取孔子之言也余嘗怪友道壞缺諛侫以為容詐諼以為智遇不若已者則狎而愛之聞人有善則怒而變于色于是大異于古之所云矣甘君獨有志于此其過于人遠哉雖然三友世常有之貴乎有取友之資耳苟不虛中而拒人則直者之言不可得而聞矣不能自治以誠則諒者將不顧之矣不能謙卑自下則多聞之士不告我以善矣無是三者雖日益月增而求友其可致乎然吾聞甘君善士居官有美名非能取友殆不能尓也然猶以為未至而以名其堂其于治身之道得矣余雖耄尚將內交焉默齊銘陵川和君原德以文行稱趙晋間嘗𬒳薦入朝稱疾辭去結廬太行之顚題曰默齊其友湯子上為之請銘銘曰昊穹上運玄壚下處風雨霜露得其平日月星辰順其軌江河山嶽以流以峙百物以生萬彚咸叙不彂一言而莫敢失其恆職者以其本乎至誠之理也維人之生內則五性七情外則三綱六紀所以彂于中而應乎事者𣣔其酬酢適冝辨析非是固不能歸之于一默而巳然苟無誠慤存乎心徒欲以三寸之舌取勝角靡上陳為諛下喻為詭隂謀規利邪說夸已其去遒不亦愈遠矣乎昔者孔子嘗𣣔無言顔氏如愚亟譽其美彼由與賜侫口多言弃弗之取其所尚可知也絳灌不文外若椎鄙而功茂績偉朝氏之子號稱智囊卒啓戎兵身斃于市惟躬行之為貴何言語之足恃晋有和君力學未仕期實踐以自修獨默默而無語此蓋將矯便侫之陋習而庶幾乎顔氏者非耶宋學士文集卷七十四朝京槀卷苐四
