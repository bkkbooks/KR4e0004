body:
  text: 跋日本僧汝霖文稿後右日本沙門汝霖所為文一卷子讀之至再見其出史入經旁及諸子百家固已嘉其博贍至于遣辭又能舒徐而弗迫豐腴而近雅益歎其賢頗詢其所以致是者蓋來遊中夏者久凡遇文章巨公悉趍事之故得其指教深知規矩凖繩而能使文字從職無難也汝霖今泛鯨波東還以文鳴其國中蓋無疑矣嗚呼汝霖禪家之流也蕩空諸相視五藴四大猶為土苴况身外之文乎苟執此而不遷或將與道相違矣雖然汝霖遍參名山精于彈觀其于此義未嘗不知之特以如幻三昧遊戲于翰墨間爾遊戲翰墨非難而空其心為難所謂心空則一切皆空視諸世諦文字雖有粗迹而本無粗迹雖有假名而實無假名惟一惟二惟二惟一𥘉何礙于道哉觀汝霖之文者又當于此求之汝霖名良佐逺州髙園人姓藤氏嘗掌書記于蘇之承天寺繼同五山諸大老入鍾山點校毗廬大藏經其同𫀆皆畏而愛之云洪武九年春三月翰林學士宋濂跋贈傳神陳德顔序余方退朝忽起曹員外郎劉君宗文同一儒生見過指曰此吾學子松陽陳德顔也德顔善貌真小與大咸冝請為先生試之余所遇畫神者亡慮數十有絶不得形似者有僅得髣佛而弗能全者形雖肖矣又有不得其風神如道家所繪仙靈者竟無以稱吾心不欲咈宗文之意姑諾之德顔反覆睥睨之而去越明日德顔持一小像來余不能自見揭諸壁間傔隸見之歡曰此吾主翁也俄門弟子至又爭曰此我家先生也自時厥後僚友好我者聚而觀之僉曰此龍門子宋君也子亦自笑因叩之一云是舍杖而趨觀水潛溪時歟一云非也是破顔微笑肆口論文時歟一云亦非也是冥心合道與造化遊時歟余曰有是哉脫如三客言非惟其形逼真抑且并性情而傳之矣曽未幾何宗文又再至余因與道客語宗文曰京都之間天下藝能之所萃止如德顔者十百之中僅一見焉先生既愛之矣盍為文以張之乎余自近嵗以來為求文者肩摩𬒮接而至一切謝絶已久聞宗文言欣然揮毫為之藩府宰輔之賢詞林胄􅐭之英臺閣清流之選以余延譽之故亦競賦詩卑之德顔何以得此于人哉蓋君子所業但憂心弗純不患藝不精但患藝弗精不憂名不揚理之常也古之人以畫鬼神為易狗馬為難狗馬人皆識之不類則非之鬼神不與人接竒形佹狀可怖可愕任其意為之况人為物靈其變態千萬一毫不類則他人矣不其尤難哉非德顔之藝精者不能與為斯也余于德顔竊有所感焉史氏之法不溢美不隱惡必務求其人之似焉一毫不類亦他人矣奈何世道不古楊之則升青霄抑之則入黃壚問其氏名則是矣其行事則非也嗚呼一藝且然而操直筆者乃不能然豈不有愧于德顔哉余論激矣宗文以為何如題湯處士墓銘後豫觀老友陶先生所撰湯處士墓銘歎其制行淳厚何其絶于人哉竊求其故處士之諸祖嘗置義田以贍宗族積纍深長故其孫子多賢此固天佑善人理當報施者如是抑亦家庭之間耳濡目染之所致也昔者范文正公吳文肅公皆有志義田及登二府祿賜豐厚方能遂其所願儒先學士每豔其事且謂劉暉簽判家無餘資能于𥘉仕亦置義田數百畝實有難于二公者嗚呼暉亦食君之祿矣今湯氏以布衣之家𥘉無祿賜之入其于義事乃能上與二公相抗可不謂尤難哉能為其人之所難故天之所報亦出于尋常之表冝其處士之賢有足稱道也湯氏之興固將未艾後世之顯豈無范吳其人哉豫將望之金華山中人宋題陳生宗譜後氏族之學難言也久矣陳本媯姓禹封舜子商均于虞城至周武王以元女太姬配胡公而封諸陳其後子孫有奔齊者遂以國為氏傳裔既久乃至混淆有本姓陳氏而更為田氏王氏者有本姓白氏髙氏而冒為陳氏者此固失之成安君陳餘自大梁起兵從劉項陳嬰自東陽以兵屬項梁二人雖曰同時本非父子唐表却以為嬰生餘尤為無稽之甚史家且爾千有餘嵗之後為孝子慈孫者欲求譜系之真其果何如乎不若信以傳信疑以傳疑可也豫學子陳生晟自著譜圖記一篇書其所可知而闕其所不知真有識之士哉雖然公侯之興寧有定世生知種學續文有聞于多士爵祿之來將有不可禦者使後世子孫藉其遺耀允有所攸賴不亦美乎生尚朂焉可也清風亭記清風亭者撫州金溪鄧彥誠之所築也彥誠世居雲林三十六峯之陽其先世多以志節著當宋之季天下大亂嘗集義兵以護鄉社助國家宋亡為元七十又七年是為至正壬辰天下復大亂撫州不守彥誠歎曰寇將至吾可不衛宗人使及於難乎即召鄉里少年分隊伍樹寨柵于雲林山金鼓之聲晝夜不絶寇來輒敗衄而去薦紳之流依之以免者百數十家事平會府上其功將爵祿之彥誠謝曰吾之挺身禦寇不忘先世之明訓爾敢藉是以媒利耶掉頭去不顧乃于堂之西偏藝竹數萬竿引泉為池而築是亭其中彥誠戴華陽巾𬒳鶴氅衣日逍遙亭上遊情物表淡然與塵慮相忘人見之者疑為古仙人御風而行可望而不可即僉曰是功成而不居者其視富貴利逹何有哉冝名亭曰清風以勵衰俗彥誠笑而不答嗚呼志節之士世不多見矣昔聞有田疇者遭幽州始擾蕩析離居疇率宗人避難于無終山百姓歸之者五千餘家且數立竒勳以自見魏太祖論功封為亭侯邑五百戶疇謝曰疇自以始為居難率衆遁逃志義不立反以為利耶固辭不受至今言疇者慕其清風若神龍遊于玄間欲一見之而不可得其視未建尺寸之功輒欲重徼名爵者其為混濁蓋亦甚矣今彥誠之行事皎皎不誣有足多者豫雖未敢遽謂如疇察其志之所存寧不髣佛似之耶然君子之論觀其志而不較其功功固有小大志豈有崇卑耶志苟同功亦同也彥誠不必不如疇者昭昭矣後之人聞彥誠之風者豈不蹶然興起耶抑豫聞撫為文獻之邦士出其間多以道德忠義著聞載諸方䇿者斑斑可考彥誠以劬然一布衣又能竭力捍寇如此豈雲林三十六峯委靈隤祉以致然耶不然何其生賢之多也豫因為著清風亭記刻置亭上使人知所自立頗謂有禆于政化文之不工固不暇計也彥誠名諒江西提點刑獄諱元觀之諸孫來請記者其族人知南陽縣行父也氣節亦森然可尚云環翠亭記臨川郡城之南有五峯巍然聳起如青芙蕖鮮靚可愛其青雲第一峯雉泄實繞乎峯上旁支曼衍蛇蟠磬折沿城直趍而西如渴驥欲奔泉者是為羅家之山大姓許氏世居其下其居之後有地數畝餘承平之時有字仲孚者嘗承尊公之命植竹萬竿而搆亭其中當積雨𥘉霽晨光熹微空明掩映若青琉璃然浮光閃彩晶熒連娟撲人衣𬒮皆成碧色沖融于北南洋溢乎西東莫不紺聮緑涵無有虧欠仲孚嘯歌亭上儼若經翠水之陽而待笙鳯之臨也虞文靖公聞而樂之曰此足以抗清寥而冥塵襟乃以環翠題其顔至正壬辰之亂𤇺火相連非惟亭且毀而萬竹亦剪伐無餘過者為之彈指永慨及逢真人龍飛六合載清仲孚挈妻孥自山中歸既完其闔廬復構亭以還舊貫而竹之萌孽亦叢叢然生三年而成林州之壽後與其有連者咸詣夫仲孚舉觴次第為壽且唶曰江右多名宗右族昔時甲第相望而亭榭在在有之占幽勝而挹爽塏非不美也兵興以來有一僨而不復者矣有困心衡慮僅脫于震凌者矣有􅐡梳不暇遷徙無寧居者矣况所謂逰觀之所哉是亭雖微可以卜許氏之有後足以克負先志前承後引蓋未有涯也酒且酣相與歌曰五山拔起兮青蕤蕤六千君子兮何師師鳯毛褵徙兮啄其腴秋風吹翠兮實纍纍邈千載兮動遐思歌已而退夀陵中有陳聞先生者謂不可無以示後人乃同仲孚來詞林請豫為之記嗚呼昔人有題名園記者言亭榭之興廢可以占時之盛衰余𥘉甚疑之今徴于仲孚其言似不誣也向者仲孚出入于兵車蹂踐之間朝兢暮惕雖軀命不能自全今得以安乎耕鑿崇乎書詩而于暇日怡情景物之表豈無其故哉蓋帝力如天撥亂而返之正四海致太平己十有餘年矣觀仲孚熙熙以樂其生則江右諸郡可知江右諸郡如斯則天下之廣又從可知矣是則斯亭之重搆非特為仲孚善繼而喜實可以卜世道之向治三代之盛誠可期也豫雖不文故樂為天下道之非止記一亭而巳仲孚名仲麗嗜學而好修士大夫翕然稱之贈簡中要師遊江西偈序方外範堂儀公來言同𫀆有原要字簡中者日本之人也姓藤氏為其國貴族年九嵗依能仁國濟國師給灑掃之役久之國師為剃落受具足戒尋往建仁與聞在菴禪師大法要旨遂使侍香左右每慕中夏禪宗之盛洪武甲寅夏不憚鯨波之險航海而來憩止南京大天界寺聞江右多祖師道場欲往禮其靈塔頗聞古有贈言之禮世恆相因先生能不廢之乎豫曰此吾俗間事也簡中學絶俗之道文字且不當立况豫之賸語邪範堂曰請為一偈何如豫曰杳冥之中其光如暾不依形立常與道存雖偈亦奚以為範堂曰此姑置之第二門中何事不可説先生自通一大藏教乃欲遇絶𥘉機之士乎豫曰本自現成誰為𥘉機一且不有孰居第二強生分别去道滋逺也範堂曰先生辨固辨矣吾無以酬之簡中必欲徼片言之賜慈悲者果能拒耶子笑曰如此則或庶幾也于是合十指爪而唱偈曰諸法本無滅是故無所生其意果云何本性不變故衆生墮虛妄常見有生滅因緣十二支猶如玉連環鉤鎖不可斷正滯無明根根斷枝葉枯豈復能滋生若能斷其生而死自然滅不見有一法滅將從何起如來最方便示此思惟修蕩相而明空功德難思議如執金剛劍寒鋩湛秋水斬除諸煩惱智慧即現前轉移剎那間不見有真妄如種鉢特摩出自淤泥中華雖未敷滎其實巳全具雙舉復雙收不見有先後如然長明燈于彼昏暗室明生暗即亡非暗往它所明暗本無二不見有出入沙門汝當知此乃真實義回光自返照照性亦并亡前滅既不接後起亦不引前後際皆斷無思心正住所謂諸因緣銷霣無餘者江右多古塔骨朽巳千載塔前諸樹林晝夜談妙法熾然雖不停無耳乃得聞沙門汝當知勿墮于色聲有佛與無佛不可生執著行行早休歇契彼無上道題顧主簿上蕭侍御書後嗚呼君子之制行毫末不可不謹一行有玷則衆善皆墮雖其後痛自剋責而覆水不可反瓶矣此濂于侍御史蕭振之事不無感焉振字德起溫之平陽人本趙忠簡公鼎所薦因秦檜引之入臺遂親檜而疏鼎蓋主和議者檜也鼎與劉太中毅然不從振劾太中以搖鼎鼎竟罷相及乎物議不可屈振頗自悔乃與檜時相異同聞楊煒上書責李光徇檜議和振因薦煒改秩意將藉此以自洗滌殊不知適為池陽之謪矣嗚呼振之治政歷歷可紀其在西蜀尤有聲故高宗為發前有胡世將後有蕭振之歎使無劾鼎一事振能不得為君子矣乎後世公論之定卒儕之何鑄王次翁樓照勾龍如淵羅汝楫之間號為檜黨立身一敗萬事瓦裂豈不信然哉振之友同里顧岡次鳯時為錢塘縣主簿移書于振其辭雖甚柔婉隱然有主鼎不附和議之意當是時主桐廬簿賈廷佐亦疏檜纍數千言桐廬與錢唐其地密邇豈或相為謀邪然廷佐劇論讎恥不可忘名分不可貶和約不可信請誅王倫拘虜使決意用兵其言尤壯烈又可見一時士大夫忠義所激雖小官且然不特李綱張燾曽開胡銓諸公而巳惜乎岡之書不附戊午讜議中豫故備論之使讀者知戴天履地為人一刻弗忘君而不失足權姦之門庶幾仰不愧俯不怍所以然者既深為振惜亦以振為大戒也岡五世孫元龍請白野忠介公繕寫其書成卷而歐陽文公黃文獻公余忠宣公咸為題識元龍之第仲華復來徴濂文不巳岡亦多賢子孫也哉篷軒銘有序新安胡君寧之作室城東隅旁中寬翼以欄楯而其制類舟招弟子肄業其間楊內翰剛中曰是期以濟川者也冝名汝舟寧之之子英復搆軒于前以篷為字篷者舟蔽也雍虞文靖公白野忠介公宣城汪文節公咸為賦詩壬辰兵變化為椔翳之墟英亦避地城北𡵨陽山及四海底寧英擇地山陽洊造書室而軒亦繼完書云若考作室既底法厥子乃不肻堂矧肻搆古亦有是言矣今若英者能承先志而弗墜可不謂賢乎哉為作篷軒銘銘曰歙多大山下瞰平陸嶺接峯聮前奔後逐如瀛海內波濤起伏有美君子搆室山因水取象揭以汝舟功期濟川朂之進修維舟之用視篷為急籍以葦蒲紉以靲篾障除雨風奠安袵席豈無桂棹艤河之洲亦有蘭橈載泛載浮匪篷斯完厥用焉求父唱于前子和于後兵燹之餘聿親良構寧事般遊思學之懋學功伊何夙夜無愆拯夫顛連如涉大川脫彼墊溺升諸堂筵誰無齋居乃名為舫以燕以娭以速官謗警戒或怠其心則放斯堂暨軒間間言言有瑟有琴有典有墳春誦夏絃啓迪後昆凡厥苐子泳涵聖髓一葦杭之母或中止大書軒楹銘者太史故宣武將軍僉留守衛親軍指揮使司事楊公壙志公諱信姓楊氐世為開封鄢陵人在元朝時以膽略聞選充湖廣炮手翼百戶戍鎮江元末四海大亂天兵㝎建康江南州郡莫不震動嵗丙申公帥師旅來歸命仍領銃手軍從征常宣二州有功權授親隨帳前萬戶扈從取婺州奪城門懸橋復隨大將取三衢繼又扈駕親征九江南昌等郡下之實授管軍千戶及陳友諒來南昌上怒下詔親征公帥鋭手軍以隨從戰彭蠡湖及陳友諒戰沒遺孽假息武昌公又從破之既而克合肥援安豐拔永新亦與有力焉張士誠據姑蘇常忠武王奉詔致討公又從戰有功賜以文綺三皆有副升僉虎賁左衛親軍指揮使司事出戍蘄州遂轉僉蘄州衛指揮使司事階宣武將軍調戍武昌遷永州已而僉永州衛指揮使司事俾其子孫世襲其職洪武八年冬十一月詔還京九年春二月改僉留守衛親軍指揮使司事散官如故夏五月七日以疾終享年五十又七其子觀音保始三嵗二女尤幼上聞之憫悼不已特遣內臣祭以牲醴旦勑中書大都督府御史臺次苐致奠復命工部造塋聚寶山之原以其月十九日葬恩意甚優渥也曽祖考忘其名祖考柱考彬妣李氏妻四人正室王氏側室馬氏彭氏王氏觀音保側室王氏出也惟公幸際興王之運臨適不懾故能立顯功受榮爵殁且不朽矣豈非竒男子哉玄堂有志今不敢廢也于是乎書孝子丘鐸傳丘鐸字文振汴之祥符人故御史中丞劉基先生弟子也通儒書兼習醫家言流聲動一時至正末父誠為湖廣等處儒學提舉鐸侍母馬夫人留吳越欲御車往從江右兵大起武昌陷二浙繹騷鐸憂懼不知所為急避地四明暨江南皆歸職方復奉母至南京每西向翹首曰武昌有來者庶幾知吾父之所在乎巳而其父果至自武昌父子相見悲喜交集鐸賣藥市中以自給親歡然忘其貧曾未幾何母弟鈞擢會稽上虞巡檢鐸與父母皆同赴官夫人疾鐸晝夜泣禱上下神祗乞以身代及殁鐸哀慟幾絶卜葬鳴鳯山之原哭曰鐸生也只尺不離吾母膝下今逝矣可委體魄于無人之墟乎乃結廬墓側朝夕上食如生時當寒夜月黑悲風蕭颼如臨鬼神鐸恐母岑寂也輒巡墓號曰鐸在斯鐸在斯其地多虎聞鐸哭聲輒避去故會稽人異之稱為真孝子云先是鐸在四明從祖父母居汴者八人貧不能自存鐸咸迎飬之死皆返葬先塋人以為難其姑適河南匡氏者年十八夫亡誓不再適鐸義之飬其終身凡二十年如一日然其制行峻絶它皆類此文不能盡載也為説者曰豫聞鳴鳯山當白馬上妃二湖間人迹罕至白晝虎狼旁午鐸煢然獨處心無畏懾者豈不以親之體重于身乎然身者親之枝也可不敬乎敬其身斯孝其親矣鐸情固迫切當知以禮自節哉當知以禮自節哉杜詩舉隅序詩三百篇上自公卿大夫下至賤隸小夫婦人女子莫不有作而其托于六義者深逺玄奧卒有未易釋者故序詩之人各述其作者之意復分章析句以盡其精微至于東山一篇序之尤詳且謂一章言其完二章言其思三章言其室家之望女四章樂男女之得及時一覽之頃綱提領挈不待注釋而其大旨煥然昭明矣嗚呼此豈非後世訓詩者之楷式乎杜子美詩實取法三百篇有類國風者有類雅頌者雖長篇短韻變化不齊體段之分明脈絡之聮屬誠有不可紊者注者無慮數百家奈何不爾之思務穿鑿者謂一字皆有所出泛引經史巧為傳會楦釀而叢脞騁新竒者稱其一飯不忘君發為言辭無非忠國愛君之意至于率爾咏懷之作亦必遷就而為之説説者雖多下出于彼則入于此子美之詩不白于世者五百年矣近代廬陵大儒頗患之通集所用事實别見萹後固無繳繞猥雜之病未免輕加批抹如醉翁寐語終不能了了其視一者相去何逺哉會稽俞先生季淵以卓絶之識脫略衆説獨法序詩者之意各析章句具舉衆義于是粲然可觀有不假辭説而自明嗚呼釋子美詩者至是可以無遺憾矣抑豫聞古之人注書往往托之以自見賢相逐而離騷解權臣専而衍義作何莫不由于斯先生開慶已未進士出典方州入司六察其冰孽之操諒直之風稟然聞于朝著不幸宋社巳屋裴回于殘山剩水之間無以寄其罔極之思其意以為忠君之言隨寓而發者唯子美之詩則然于是假之以泄胸中之耿耿久而成編名之曰杜詩舉隅觀其書則其志之悲從可知矣先生既殁其玄孫安塞丞欽懼其湮滅無傳將鍥諸梓而來求序文甚力子居金華與先生為鄰郡及從黃文獻公遊備聞先生之行事可為世法因不辭而為之書先生名浙季淵字也晚以默翁自號所著有韓文舉隅而孝經易書詩禮記春秋離騷各有審問不但箋杜詩而已也題李伯時畫孝經圖後右李公麟所畫孝經圖一卷至正中著作郎永嘉李孝光進入祕府順帝詔翰林學士承旨臨川危素逐章輔書經文元社既屋皇明受命圖入晉王邸王下教俾濂題識其左濂聞史皇作畫倉頡制字夲出于一源聖人因字以著經而善繪事者則因經而作圖故古之人或繪詩與春秋或像論語或畫爾雅而圖孝經尤多人觀之者有若親逢其事感恱而歆慕不待辭説而意趣自顯則其于經似不為無助也公麟集顧陸張吳諸家之長為宋畫苐一其圖是經蓋取法于顧愷之勢如雲行水流自然有起伏之熊誠希世之寶也然而王者之所寶在孝不在畫也歷代賢王其聲光流于無窮鮮不以能孝而致之載諸史册尚可考見經曰昔者明王事父孝故事天明事母孝故事地察長幼順事故上下治斯言至矣願王日加之意焉題桞公權書度人經後正書之檀名者自魏鍾繇而至于宋僅得四十四人而唐桞誠懸實錚錚乎其間則夫墨妙筆精有不待贊矣其入宋祕府凡六帖而書度人經者二此卷特其一爾是經乃晉宋人偽作至誠懸時相傳稍久故信而書之近代紫陽方回則謂五季蜀王建時道士王喬始造且確然弗自疑不幾于甚可笑歟使回見誠懸書此吾知其顙有泚矣跋韓忠獻王所書義鶻行後右韓忠獻王琦所書杜甫畫鶻行端嚴厚重古所謂顔筋桞骨殆無以過之展卷熟視則夫垂紳正笏不動聲色而措天下于泰山之安者其氣象猶可想見其倣佛也朱文公有云韓公書迹雖與親戚卑幼未嘗有一筆作行草勢以此觀之王之為人由中逹外無斯須不本于誠故其建功立事凝㝎不搖德在生民而名著史册冝也視彼傾欹偃仆常若大忙中書者則其躁急寬易相去何如哉黃氏恱親堂銘親可恱乎曰可悅之以道恱也非其道不恱也恱之之道奈何溫與清無爽也㝎與省勿愆也可也而未至也視于無形也聽于無聲也日用三牲之飬也可也而未至也寶厥身也若愛瓊玖也慎所履也如在淵冰也跬步不忘乎孝也可也而未至也然則何為之至也身之顯也親名之彰也親名之彰也族姻之所豔也僚友之所願也州里之所榮也恱也然則斯恱也外也非內也是何言也是何言也外自內出也有諸內必形諸外也不可二之也建安黃居德飬親之堂題之曰恱親居德以文辭致身為鄷都長其身將顯也豫故援此以告之也孟氏所謂恱親也人習而察也豫不敢勦説也銘曰恱乎親在顯乎身所以揚乎人人曰誰氏之子親譽因茲而有聞身者親之技斯須不敢毀傷始為行之醇天經地義吾敢弗之惇嗚呼揚乎人顯乎身所以恱乎親輔臨川危安子定加冠祝辭有序冠者責成人之道其禮自天于至于諸侯卿大夫士各有隆殺之節儀文雖已失傳唯士冠禮獨存告廟筮期宿賔命贊辨有皮爵之等裳有黃玄之錯器有尊甒伵觶之用鼎有乾胏離肺之實三加而彌尊制字以敬名其為禮甚嚴矣夫何故事親從兄忠君敬長之行望其有所成也古昔盛時以冠為諸禮之首者其職此之由歟自冠禮久廢風頽俗靡冥然夜行如擲埴而索塗君子未嘗不為之永慨也臨川危生安清敏好修為文辭亦整緻可觀嘗從郡諸生肄業成均學士大夫多延譽之其師曾先生旦𥘉為字曰子定來謁禁林求于為之説豫謂字之有説説文解字備述之矣何假人言哉然三加成禮之後既命之字必造辭以祝之是猶可為也于是歷序冠禮之嚴定字代名者為甚重繼掇大學知止之義而申之以辭生慎聽之其將躋君子之域矣乎其辭曰人之𥘉生父命其名弱齡攸屆乃以字稱此非彌文實厚彛經四行之責用底于成其一爾生名安以定為字稽諸聖經敷列其義必先知止始奠厥志射有正鵠直趨而遂其二方其未定逐物而搖紛紜舛戾水湧風飄及既定只類鑒孔昭事至則應順而不膠其三曷為致斯因靜之故靜為動基理罔弗具辟地博厚發育萬彚區萌畢逹隨風而布其四靜主乎內靈扃廓然靡隱靡顯隨寓而安天光昭煥人滓將刋漸獲所止斯不為難其五惟古之學明體適用出輔邦家瑞若麟鳯逮及後世葩藻是弄誇多鬪靡有如聚訟其六昔我臨川學者所宗仰視陸子其猶神龍駕風鞭霆雨于太空𬒳其澤者碩大而充其七憫彼夸毗以華喪質直究本心皎如出日微言猶存可以尋繹生居其鄉敢不自力其八爾生長矣燁如秀榮濯濯而明英英而貞從師受經啄其至精亦既有文五色交縈其九我後賔贊不與酌醴今輔祝辭庸申規厲行固冝篤知亦須至安定其中聖域可企其十贈承事郎工部主事劉府君墓版文濂家食時嘗如烏傷其校官劉君浩卿來見浩卿諱演美容儀晢白如冠玉有鵠峙鸞停之狀聆其谹議推闡王霸欲見之開物成務建瓴注而健鶻飛也求所著文閲之氣充而聲雄風雨晦冥雷電恍惚若鬼神之出入也濂甚豔其人數與之遊蓋浩卿受經玉山鄭録事明善録事精通伊洛之學望重當世浩卿獲其傳為多濂意浩卿非文墨可羈必騰迅以升巳而浩卿秩滿去濂亦潛伏大山長谷聲迹絶不聞會元籙告終皇明御極濂應聘而起纍遷入禁林浩卿之子彬亦典儀晉王府既胥會亟問浩卿安否則宰木拱矣濂失聲哭曰浩卿止于是耶不覺為潸然出涕彬才猷日著轉承事郎工部主事改員外郎間謂濂曰彬幸藉先子明訓沗任官使近得援例贈先子如彬官母葉氏亦贈孺人先子卒時年五十又四乃元至正癸已三月九日後七年已亥十月二十二日始葬麗水縣孝行鄉之桐嶺原迄今洪武丙辰越十八載而懸官之石無文非不孝歟願先生卑矜之言訖泣下既而又曰先生之行多可書彬不能記其詳先子事父孝生能盡飬暨沒廬墓左者三年廉訪使者遂以孝廉舉教諭義烏移龍泉興輔百廢孶孶如嗜欲升明善書院山長以毋耄辭先子性謹飭非大寒不襲重裘雖暑鑠金正衣冠而坐挾册諷詠終日與人期在百里外風雨必赴之一日行桃山中見涕淚赴溺者先子止問之曰吾母亡未葬質先廬得錢二十千今遺之欲生奚為先子陽謂曰爾勿憂誠吾拾之爾力挽歸家償錢如其數其人知非貞拜受感泣而去先子瀕殁謂彬曰金華宋先生最知我我死當以墓文相纍彬敢銜哀以請願先生卑矜之言訖復泣下濂曰濂實知爾父爾父有經濟才志不獲施以卒耆舊凋落冝爾不能詳濂故掇其概言之繫之以銘劉氏世居栝曾祖某祖桂好施與州里嵗儉亦賴之父德澤好施如先人母葉氏子男子三長師曾南康都昌丞次師夏郎彬次師雍孫男子一輝女子四梁松朱某湯謹其壻也一未行銘曰丹穴之鳯五色離褷不高翔于千仞乃戢翼而威蛇命也奈何振古如茲噫宋學士文集卷第三十七翰苑别集卷第七
