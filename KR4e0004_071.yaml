body:
  text: 臨濠費氏先塋碑皇帝登大位之三年覩四方之旣平嘉諸將之勲烈迺十一月丙申大封功臣為公矦錫以鐵劵俾傳諸子孫於是臨濠費矦自僉大都督府事進開國輔運推誠宣力武臣榮禄大夫柱國平源侯旣而復謂賢豪之生基德累仁必繇于其先乃推榮其三世矦之曾大父五一府君贈驃騎將軍都指揮使護軍追封靈璧縣子大父六三府君贈鎭國將軍僉大都督府事護軍追封江夏伯顯考七五府君贈榮禄大夫同知大都督府事柱國追封平源矦曾祖妣季氏祖妣及妣兩何氏皆從其夫爵邑為夫人命書既下矦用牲醴詣五河告祭于先塋榮光赤然照燭泉壤山雲宰木飛揚燁奕皆有異氣自是歳時奉祀惟恭矦間謂余曰吾世齒恒氓至于吾躬遭時遇主奮自戎行奉命克敵或專或禆凡十八年始于江淮中扵閩浙至扵㝎中原舉関陜皆與諸將之列取城邑以數十計其艱且勤亦至矣藉聖主之德念録微勞爵為列矦名載冊書人臣之榮無所與比顧豈吾材之能致㢤實我祖考遺休餘澤之所及也惟我祖考皆有厚德為鄕邦所稱宏址深源誕唘厥後恩數之加允稱不虚兹欲歌頌先德敷揚聖恩樹石墓道俾後嗣知所自出非子孰宜余甞待罪國史撰次功臣勞烈知矦為人仁勇有智畧事上御下以忠以誠今又弗忘其先以顯著遺德為事可謂知所先後善為臣子者矣矦名聚字士英其詩曰帝乘六龍起江淮東濠泗之間為漢沛豊維時費矦貙吼乕雄壯馬長矛為帝股肱既㝎泗濵遂剗霛璧維滁及和一舉而踣孰謂大江可限南北萬馬飛渡不以羽翼巍巍建業扼江而城既入其郛帝庸作京廣德旣綏遂平長興軍聲轟轟四方震驚蠢彼偽吳假息于蘇愚弗量能自干天誅將命以行以翦以刳獲其大醜歸寞質鈇帝德如曰愈久而晣孰倚氷雪以詫弗㧞何閩何浙何勍何劣如朽之折如藩之撤閩浙既淸載征中原巨壘連營望風而奔或奔或降追刖其根中原卒平萬方來臻帝嘉治平曰誰之功鐡劵冊書錫爵命邦矯矯費矦平涼是封豈惟其身榮迨祖宗矦有峻爵上推扵父維祖甚仁伯于江夏江夏之先霛璧是子㫄及其嬪咸有爵土費矦曰咨小子無良祖考之休積厚而昌旣有土田又蕃牛羊維曰薦奠以致孝享大登如几牲碩酒旨費矦涖祀陳豆奠斚擊鼓駭駭焚幣煒煒費矦克孝祖考咸喜濠民謂矦勇不失身委質聖君為社禝臣濠民謂矦貴不遺親玉佩貂冠為賢孝孫四海旣同爵勲旣崇曷以承之維孝興忠忠以于朝孝以于家繼德無愆茀禄是荷贈中順大夫鎮江知府徐公墓碑皇上卽位之十年詔曰光禄卿徐興祖慎事小心在朕左右二十又五年未甞有過非其祖父之教曷以致斯其凖恒制寵贈之官以勸奉職者扵是吏部承詔贈其大父餘慶中順大夫應天府丞父景福中大夫鎭江府知府祖妣朱氏贈德人妣髙氏贈淑人興祖旣祗奉制書告于墓下復謂余曰吾祖父世有醇德祖之事稍遠弗能悉知知而悉者惟吾父而巳吾父之德吾知之吾子雖知之弗悉也至扵吾孫又不若吾子之知則遂忘矣苟不托扵文辭何以示後之人使知所自敢以累執事焉余與興祖同朝甚久不獲辭徐氏世為建康人國初易建康為應天府今為應天之江寧人公諱景福字某諱餘慶之子諱守禮之孫平居愿貌寡言事親先事揣意取其歡欣兄眉壽析産出居朝夕往省問其缺乏及所好而饋進之並市肆備百物以通時之有無不過求銖兩息遇人不問長少卑躬恱色懇䔍誠信出言惟恐傷之一揖垂首幾𣣔及膝久之然後起與俗無怨聞喧詈聲輒引避人告以求利則曰苟足可矣非敢求也或尤其太同則曰誠以待物同非所知也由是里閭咸稱之爲善士公旣以此自治生子亦以是教之年若干以某年某月日卒某年月日葬干聚寳山府丞墓側妻卽淑入高氏祔焉高氏柔嘉有則年若干以某年月日卒子男三人長紹祖次卽與祖次敬祖興祖淳䔍遜謹由尚食局副使四遷至今官階中大夫爲上所信任賜以苐宅土田而孫男五人欽鑑鈞仁義皆謹飾習禮欽復擢爲從仕郎掌醢署丞曽孫男女又十餘人君子扵是知公積善之報未已也嗚呼爲善者觀扵徐公可以知勸矣乎銘曰天博而穹厥聽孔聦善祥慝殃咸以類從孰囂不知訾其幽遠弃不爲善其胤卒殄有察其然善集于身身或弗昌昌在後人懿惟徐公嗜善忘利豈必多言躬行扵事純孝篤誠于父于兄小智私謀我則不能里譽閭稱公誠善士不顯其身以遺厥子厥子如何氷潔璧温玉食是司以奉聖君帝嘉舊勲俾長光禄金帶朱衣其儀甚肅殿門嚴嚴不敢顧瞻退食于家黙無一談帝曰尔賢祖父善教錫以峻爵以勸忠孝廼贈徐公守彼鎭江徐公有父佐于鄕邦制書煌煌册璽如日宰木祠垣燁然動色鄕鄰歎咨始實弗知積善致斯胡寕不爲徐公有善子食其報人孰非公賢者是效景祐廟碑景祐廟者宋殿前司統制祖公廟也公諱琙字真夫其先閩人後徙明奉化之松溪公有文武才建隆中以剛毅稱居鄕黨遇歳飢發私廩以賑餒夫所活以千計里有昏䘮貧不能成禮出財帛周助之子弟不能學者爲招師儒使就學焉邑人咸德之旣没皇祐二年遂作廟于忠義鄕之福慶里有故必相率趋禱滅火愈疾屡著竒徵元祐中漁者鄧祺徐寳泛海値風舟起立者数四懼死呼神求救公忽見于空中應之俄而火光如斗墜檣下風頓息起視所在舟已至公廟下矣建炎四年高宗南奔御舟次崎頭金人将舟師追其後将及見赤旗数萬蔽海上金人沮懼而退是夕提領海舟張公𥙿夢神人乕䩨魚服奏對上前自稱官位姓名公𥙿以聞髙宗多公之績制封文惠矦賜廟額為景祐元大德十二年大疫死者相枕民禱公公降于人指廟東井命民飲病者飮水立愈明年蝗發境上官督民捕蝗日以斗斛徴之民泣訴于公頃之蝗飛積廟前高数丈民取以輸遺蝗亦皆自投于海禾不為災至正十一年海盗起将剽掠邑民會大風楊沙晝晦不可辨盗迷失道而退後盗復至鈔民財無所得怒𣣔火廬舍至廟若聞弦誦聲驚駭相頋卒不敢犯二十二年有巨蝶集里巷螫民膚即死民神事之迎置于廟公復降于廟巫手擈殺之耆耊卓在明汪敬行等列其事聞于朝二十六年加以昭烈之號皇上有天下以為凡神之封爵冝命于天非人所敢與洪武四年乃詔儀曹易公號為故義士祖公之神毎歳季春縣令用剛鬛行祀事著為恒制敬行之弟敏學復謂公自宋𥘉至于今四百年功烈及于民者甚久而未有文辭昭霛焯羙垂之無極甚非事神之道乃遣從子正来請傳其事于碑夫公以一將之微其生也非有公矦之貴萬鍾之冨而獨能惠其鄕旣死數世復能濟其君于艱難而保鄕邑之民扵無窮非烈丈夫能然㢤是可歌也已其詩曰斗牛之南大海堧羣山嵂崒植翠􅎶乾霛坤秀欎不宣䔍生祖公維俊賢乕眉虬髯高兩顴右握寳刀左屬鞬指揮豼貅立殿前晩辭天子歸林泉傾萬金貲振顛連聞人急難刺在肩有弗能拯食不咽曰生施惠靡遑平死為明神參化權爵攸肆虐焚氓㕓揮唾沃之不敢煽颶風掀浪𣣔拍天漁舟葉沱立以旋火𦦨如日隋檣端手提白骨出重淵鑾輿狩南濟大川追者十萬犬羊羶身率以君將樓船赤幟塞島虜愕然璽書褒忠禮弥􅐚㘴秉躬圭冠貂蟬癘鬼跳踉民告瘨以藥投井飮輒痊飛蝗𬒳野禍大田神氣一嘘舞翩翩如蛾赴火積成山立使凶歳為有年海盜操矛口垂涎揚沙擈面懾以還退奔相蹂行蹁躚鉅蝶為妖大如鳶家趋巷祭陳豆籩以掌擊之民害蠲邑民戴公綏以安歳時扶携謁廟門清酤在觴几蒸豚鍾喧鼓考雜管絃公騎蒼麟手執鞭龍旂獸盾衛者千来如旋風止如烟頋民𣣔去不忍言民拜碩公毋我捐俾禾如茨􅎟蛇蟠疾害不作福祐緜公名不朽同坤乾惠州何氏先祠碑英傑之士立大功而享爵位者非其先之基仁累善何能自致㢤然其先有德而子孫不知報祀者有矣知報祀其祖而弃蔑其祖之子孫者有矣是皆不達禮義之弊也若山東行中書省叅政何公其䔍於禮義者乎公名眞字邦佐世居廣之東莞至公始遷惠州祖諱發藻元贈中奉大夫廣東道宣慰使都元帥護軍追封盧江郡公父諱叔賢贈資善大夫江浙等䖏行中書省左丞上護軍追封盧江郡公祖妣鄒氏母葉氏皆封盧江郡夫人公祖暨父世有潜德鄕稱善士公生八年而䘮父母夫人守志不奪慈鞠嚴教少偉然有志當元至正中中原兵𧺫廣民王成亦搆亂公為小官即請而討之已而觧惠州之圍逐叛將黄常復恵州會賊陷廣州公以兵復之由惠州府判五遷為江西䓁處行中書省左丞階資善大夫分省治廣公弟迪以從征功擢中奉大夫廣東道宣慰使都元帥兼僉樞密院事遂推㤙封其二代後合福建江西為一省改拜公資德大夫江西福建行中書省左丞仍治廣州歳乙巳九月賊挾廉訪司副使廣寧等叛圍廣公禦之踰十月部将與賊通絶粮道公出避城䧟丁未五月復克之明年制授公榮禄大夫自左丞陞右丞未拜而皇明兵平江西詔至諭公公舉廣東之籍以降上嘉公保民順命之績授中奉大夫江西等處行中書省參知政事洪武庚戌移山東行省越七年以老致其政初公追思顯融之盛由扵先世旣扵東完率族人建祠置田以祀群祖復與弟迪謀悉以其先所遺田儲祖入以祭其禰公猶未慊於心乃以恵州城西之私第爲義祠斥所有私田百餘頃爲義田世俾宗子主祀事恐族人不知學也有塾以教之恐其羞服或乏也有粟帛歳賑之嫁娶䘮葬有以助之疾病疲癃有以養之懼其久而失其意也爲書以訓之俾嗣弗壊而來請銘嗚呼先王所以親民善俗之道遠矣賢人志士𣣔推之扵世而勢有所不能𣣔退而恵一族化一鄕而力有所不逮者有之至扵勢足以爲而不爲力可以至而不至者亦有之此所以越數十世而其事曾不一二見也惟公奮自韋布夷盗保民鎭寧南服致位尊顯卒能識幾效順戢歛干戈爲民請命使粤南之民不易市肆又能推本反始孝于祖宗恵及族人所踐所言允可為法其扵富貴可謂不茍處矣視彼恃險而賊民私厥身而忘其所自者其賢豈不多㢤是宜紀行載勲著之樂石以為後嗣式其銘曰維昔至正德否亂生海沸山崩靡人不兵頟頟粤南在嶺之外猖豎嘯呼民罹其害何公曰嗟我民何辜告于太藩請行天誅廼戈廼殳廼糗廼糧大斾脩斨人莫敢當叛將肆凶賊我守邦鞭門疾呼䑕拱以䧏曷以褒功躋于左轄巨鉞良弓左旄右節豈惟其身錫爾祖考峻爵崇勲以顯忠孝祖考榮矣子弟孔多寳帶銀章威儀甚都邦人聚觀拜伏稽首按轡徐驅詢其耆老耆老有言大㢤公勲元衰不君公其我臣公曰吁㢤我志巳㝎待彼有德為汝請命赫赫大明洸洸仁聲震于南溟勢無全城公束干戈載封板籍錦韜龍函獻于京國帝嘉厥功不勞我師錫燕彤庭重曈屢回大江之西岱宗之東禄食十年執政廟堂寅畏恭勤髯鬢盡白詔優老臣勿勞以軄公歎謂人我德何為祖考之恵幸以弗墮豐湖之西有苐奕奕玄楹文牅旣蠲且侐亦有土田𬒳隰包原重穋荐年歳登百千我第以祠我田以祀祖考之休敢恤吾嗣池有穹魚圃有嘉䟽以炰以𦵔丹荔清酟刲豕擊羊来烝来甞孫子咸臻有雝㕐行或授以罍或奠以斚登降肅然莫敢叱咤数具禮全陳几布筵孰為弟昆孰為子孫公曰族人亦孔之夥揆本追原咸由扵祖祖病在指四軆靡寧奈何一身曾莫胥矜爾餒爾寒我有粟帛尔昧弗通我學爾迪尔有災害我則戚之或有燕曰則慶樂之我有爵禄我祖之故不私吾身弘祖之祐豈無鄙夫爵禄是荷惟家之肥遑恤其他維公克仁仁以保民惟公克孝尊祖睦親嗟尔後人惟公是師繼承無忘公有訓辭元贈開府儀同三司上柱國録軍國重事江西等䖏行中書省丞相追封咸寧王謚忠肅星吉公神道碑銘今上皇帝旣有天下憫元忠肅公星吉死莭之忠擢其子吉昌官內廷遷監察御史俄超山東按察司副使昌將行詣濂泣曰先公薨于蘄盗盗有義先公者具棺葬于蘄水縣鳯凰山下家人弗聞知時兵末蜻各守其境道阻不通昌將服跳赱数千餘里瀕死者数矣遇今上克蘄始獲至詢蘄人啓棺北還以某年月日葬于某地而昌又獲禄食于朝皆上之至仁先公之遺德也先公之忠旣載在元史惟是墓道之碑未有刻文敢惟先生是請翌日濂以聞詔曰然星吉之忠朕實知之卿其勿辭乃考論其事曰謹按元贈開府儀同三司上柱國録軍國重事江西等處行中書省丞相追封咸寧王謚忠肅星吉字吉甫河西人贈榮禄大夫河南江北等處行中書省平章政事上柱國追封秦國公改封雍王朶吉之曽孫贈榮禄大夫甘肅等處行中書省平章政事上柱國追封代國公改封凉王搠思吉朶児只之孫贈榮禄大夫陜西等處行中書省平章政事上柱國追封趙國公改封邠王搠思吉之子其先三世以言語材藝事太祖憲宗世祖為怯烈馬赤譯諸國言後皆以公貴封王曽祖妣倫徹徹祖妣阿掜妣順祖皆從其夫封國為夫人改封王夫人公兄弟六人扵次為三少騫然不可犯武宗時召見便殿襲怯烈馬赤事仁宗扵潜邸仁宗即位雅宜公久不改官英宗知公材延祐七年十二月授承直郎中尚監丞賜中統鈔千貫給校尉十人專道而行監尚御用物公謹持出納下可勢屈中官貴巨手無符敕絲毫不放英宗竒之至治二年二月遷右侍儀同脩𧺫居注命龍慶州逹魯花赤脫歡以女妻公賜鈔三萬貫為聘資䆮得眷近公毎侍側中外利害乗間進說無虚時秦㝎帝元年六月拜監察御史階奉直大夫丞帖木迭児紛更朝政御史大夫倒刺沙狼據中臺公奮章敕之朝廷凜然畏公三年七月陞朝列大夫引進使知侍儀事四年九月進侍儀使階朝請大夫文宗天暦二年八月拜江南行御史臺治書待御史時大夫阿思児蘭海涯有能聲公至萬口移譽扵公大夫聲煩寝詔賜衣一􅊞上尊二朋鈔五千貫至順元年遷河東山西道肅政廉訪使薅姦剔穢煦其朽枯境内帖息三年二月復拜治書侍御史治陜西行臺未至召還同知中政院事六月改同知功徳使司事順帝元統二年四月淮西江北道肅故㢘訪使告闕僉擇其良以公為之一道稱治明年徴拜大都路緫管府達魯花赤輦轂之下權倖肆横法滯不行公操其紀綱風追雷㫁不問誰何姦軌帖然屏伏至元二年六月擢嘉議大夫太府卿太府近且貴其敢鈎覈閹豎攘竊歛散無籍吏緣為私公較擿隱蔽立簿計数吏畏若神将作院累歳乾没綺綉之屬萬五千縑悉責償之知崑山州事管某上書誣平江路緫管道童詭報歳灾帝命公察情否𥘉道童以㢘正治其屬官不能堪故誣之且倚前翰林學士阿魯恢為援公驗得其状以聞卒㘴二人罪三臺交章薦公五年二月特授資善大夫大都㽞守仍兼太府卿益䖍於軄談其美者日以上聞帝曰不可無旌以勸奉軄者六年三月就加榮禄大夫未幾帝幸太府見公所為條法精宻諸蔵皆盈有黄金束帶之賜時微雨公立階下命待臣取御服油衫加公身至正二年十二月陞宣徽院使四年二月改湖廣等䖏行中書省平章政事省控治五溪洞蠻土酋􅎷馴豕暴變幻百岀毎視省臣臧否以為叛服公禁戢內兵勿擾其境布約敷恵化其悍猾效貢奉軄比扵近縣十二月以中政院使召還六年六月賜金虎符轉海西遼東哈思罕等處打捕鷹房怯怜口万戸府達魯花赤十月遷将作院使後二月太府闕卿再入大府兼将作使階超光禄大夫七年十月遷宣政院使明年三月拜江南行臺御史大夫時承平日久官恬吏怠漫無倫紀公至擇剛明御史行十道紏劾貪邪䟽㧞宪滯憲司隷卒盤據為雪者甚衆公下令屏斥之俾州縣之卒更月入直民歡樂之建康城北有宋丞相荆國王公墳寺寺僧世守旣久視為巳有王氏孫伐山木僧執送官官將以盜論事上公公怒曰王氏山王氏孫伐之何謂盗耶即歸山于王氏而逐僧出之秦檜裔孫􅐁民田羣訟不决公問寮属曰秦檜何人僚属以姦臣對公閱檜傳大属其狀者檜之誤國千載有餘戮矧兹遺㣧敢為民害盡㫁其田扵民公之明决皆此類湖東道僉事三寳注㢘介不阿御史以私謁之不聽輒以事劾之章至公所公曰鴞敢擊鳯耶奏杖御史脫脫丞相與御史有連衘公十年五月移湖廣行省平章政事湖廣地並江北威順王寛徹不花田獵蹂踐榢穡起廣樂園萃名倡巨賈以罔利有司莫敢問公至求見王閽唘右扉入公公引䋲床向中門㘴叱閽曰吾受天子命為藩大臣烏可以小門入我閽懼吿王乃啓中門導公入公拜謁畢起言曰王帝室之冑與國同軆不為天子養民而獵野獸恱婦女以為民病臣竊為王危之王投几降座執公手謝曰非公不知此悉罷其所為有胡僧持官府柄横甚公捕其妻妾十有八人籍于官窴僧于法由是民得吐氣十一年妖賊徐眞一等起汝頴蔓延湖湘間勢甚熾時武備久㢮公咨于衆或以老將鄭萬户有材略對公乃令募土兵繕城池脩戈甲起鄭属以禦賊事賊聞有僃遣其黨千餘詣軍門降公謂鄭曰此誣也鄭設伏受降誘而殱之縛其酋六百人獄以俟命會公召為大司農平章和尚受賊賂繫鄭而釋其縛縦之明年正月賊乘懈􅊞武昌六百人自內為應城遂陷中人泣曰星吉平章在吾属豈為俘乎公至都入見陳致賊状帝喜賜食及錢三萬貫脫脱不恱奏為江西省平章政事員外置吏卒趣遣之官至江東有詔會浙江平章政事不顔帖木兒南臺中丞蠻子海牙守江州時江州巳破江以西道不通公開省太平募人間道持羽書赱江西徴兵未返而賊熖漸逼調廣德寕國之兵僅一百五十人賊號百萬衆皆沮懼公曰勿憂彼賊我王師彼豈吾敵乃貸冨民財募彊壮為兵初行臺募兵人給十五千無至者公予五十千三日從者逾二千人公曰可矣即擐甲冑二千人鼓行泝江而上四月與賊黨戰池州斬首數萬復其城至魯港威順王之兵亦至士氣益張賊據銅陵㧞栅夜遁去又復銅陵蒐其黨得二千餘盡􅓍之復遣禆將陸行遇賊白馬灣又敗之賊走淮西公部分諸將率兵躡其後及于白湄賊窮列陳迎戰公麾左右䇿馬雜射薄其軍擒僞相周驢賊潰不能列俘其衆五千奪舟六百艘乗勝奔擊之賊溺死者蔽江江水為白由是道稍無阻巳而賊擾池公率衆至池遇五㳺騎于苦竹嶺斬其二鞫賊安在聞其衆三百屯貴池􅊞之散去復其邑賊復攻䧟石埭殺尉公夜趋之賊陳其衆三千扵縣西岳溪槁有三酋一乗驢二躍馬突前挑戰乗驢賊驍勇無敵軍中常畏之公引弓射之應弦而仆再彂再斃二酋後師乗之賊弃城赱其散卒千餘焚掠縣西鄕公復追岀境賊忽将舟師二百艘順流来攻公命萬户王惟恭禦之戰方酣麾舴艋從㫄横擊賊破走乗勝進望江清水灣㞐三日偵者告賊舟四百順風引帆直指我軍諸將失色公曰無傷吾有以勝之乃偃旗伏横港中風急水駛賊舟不得泊奄忽電過過且盡命舉旗掣帆鼓譟出其後賊驚駭不能弓官軍奮擊遂敗之禽卒二百獲其舟艦噐械甚衆進克建德縣時賊久圍安慶聞其黨敗而蠻子海牙亦且至焚營觧去公且行且戰復湖口及江州賊巢據彭澤公𣣔攻之而江州倉無一日粮乃諭民輸財賚士卒俾惟恭守小孤山而自駐畨昜口扼江湖要衝以圖恢復然亂巳久湖廣江浙多故江西亦無援助者轉戰六月餘所将兵日衰耗困疲財粟亦且殫匱或請去就食東南圖再舉公曰吾受命守江西此江西地也死則死此去將何之九月二十日賊知公兵食俱竭帥大舶載葦蔽江而下杜上下流縦火夾攻公麾兵殊死戰死且盡從子伯不花将親兵数千人戰亦死公猶堅㘴大呼曰殺賊殺賊俄而賊射公中目仆舟中賊素識公名不忍害輿置宻室中明旦少蘇賊饋食公臥叱去或以刄脅公降公罵曰狂賊我國之大臣恨不能殺爾而為爾獲命也何謂降為大罵不巳賊終不敢害環卒守公凡不食九日忽自力起北面再拜曰臣力竭不能報國敢不死以辱命言畢而絶時十二年九月二十九日也年五十有七卒後二年監察御史巙巙等請褒其義乃贈今官而謚忠肅云公先娶卽脫歡女諱奴倫生一子而卒後娶郭氏中書平章政事不花之女俱封趙國夫人子男子五人曰刺哈咱識理公卒後特授榮禄大夫利國監太卿曰荅兒麻八大中大夫僉遼陽行樞宻院事其三卽吉昌𥘉名達尓麻識里上賜今名曰寳山曰寳座女一人濂昔論次元史未甞不歎其敗亡之易由扵內外壅絶將相非人使然也當亂之始興誠得数萬之兵使一猛士將之可立見其擈㓕而頋依違不斷養致大釁其中有足任如公者又卒俾之孤危無援不足以成功豈非自致㢤惟公忠義果敢出扵天性歴踐要軄聲績彰明提千百未試之卒轉戰湖江間復城破邑懾敵人之膽雖勢孤力微大功不竟然忠義之氣猶足以立萬世之防範使亂臣賊子懼冝乎皇上褒其後人而以銘文命濂也其辭曰朔河之西正氣烈烈摩盪日月乃生英傑其人謂何為忠肅公偉貌長髯猶人中龍當元盛時出入禁闥壹志小心不自矜伐歴事三宗登于顯融正色厲言以折姦凶旣司行臺亦尹京邑貪邪宵遁鬼神晝泣湖湘之間名王所都納貨掄姝烝黎告瘏公聞蹙頞盛服往謁以笏畫地再拜辨說弛其嚴威謝以巽辭予實無良非公不知盛極而弛孽生釁起帕頞持戈蔓延千里公駭而咨聘帥與謀始剪始屠天子召予疋馬北馳狐䑕相賀大城巖巖一蹴而破民泣且號吾實不辰公如在斯豈爲盜人當宁載詢亂實誰致稽首告言權臣喪氣公喪其氣彼斥公身朝辭暮行禦魑魅辟公曰予家世承國㤙先臣在天敢負吾君我兵二千以義爲勇盜雖如林􅊇不能衆旣復池陽遂徇銅陵呼聲如雷江水晝凝左馘右禽轉戰日亟扼江湖咽以掃南極氣吞逆雛奈力之痡孰謂猛乕制于群狐人或謂公盍往它所公曰受命死則于此烈熖燭雲勢無全軍志在誅夷罵聲益振群酋羅拜来饋飮酒叱之不御以死報國公死者身不死者名相贈王封以愧茍生豈惟當時愈久愈著元廟既墮公尚有子公子克孝天子是庸匪惟私公以勸盡忠惟公至忠天子至仁刻辭豊碑垂訓萬年故江南等處行省都事追封丹陽縣男孫君墓銘君諱炎字伯融姓孫氏金陵句容人曽祖某祖文嗣父顯卿皆為儒母洪氏君身長六尺餘面黒如鐡一足偏跛扵書少所不通善雄辨累累数千言常窮一座人人莫不畏其口長扵歌詩元至正中天台丁君復同郡夏君煜皆以詩名君逰此兩人間日夜相切劘益得其旨趣下筆快掃百𥿄可立盡辭彩爛然驚動江東雅好飮酒常與夏君對飮賦詩各務岀奇相勝毎得一雋語槌案大呼譁聲撼四隣所與交皆當時豪俊間出逰四方君旣以氣自負常輕視章句儒衆中常自許曰孫炎豈齷齷軰伍耶然卒無容之者竟困而歸歳乙未今皇帝渡江来金陵開江南等處行中書省聞君名召見語君陳元運將終勸上延攬智能士以圗大業上甚恱辟為掾毎問以事慷慨激烈所謀多合上心上愈嘉重以為可用戊戌從征浙東以勞擢同知池州府事尋改池為華陽府即拜君為知府皆有聲明年十一月召為省都事㑹處州降擇鎭安之者咸以處在山海間盗賊憑結非君莫可治上亦才君入省月餘遂命為處州總制錢榖兵馬之柄悉委之不取中報且以省符未署者付之聽其自辟任君疋馬入處州時城外七里卽賊营老酋黠蠻狼嘷乕踞不奉官府約束君至㘴㕔事驅城中民跽皆下諭以元將亡及上起兵意謂民奉法則生否必為虀粉語甚剴切民皆叩頭流血誓不敢二心退則轉告其鄕民以為孫使君仁且武不比舊官可玩狎君亦下􅊾屬縣徧諭之由是投兵来降者相繼于門数月皆化為良民君復擇其驍勇者練為兵時時肄習之㧞其服衆者為長有宼則率以禽㓂事罷散歸為農有所警彂馳一符立至軍門無敢或後姦吏巨族素驕横者歛手吐舌畏之如神不敢出聲語雖在數百里外皆縮氣屏息如臨其家郡民頼以安皆謂得孫使君治郡晚時上欲用人而秀民有材能者見方戰争勝負未分皆伏匿山谷中不肯出君患之鈎致一二人問有材者為誰今皆安在録其姓名為書遣使者招之而劉君基章君溢葉君琛尤為處士所推劉君最有名亦豪俠負氣與君類自以仕元耻為它人用使者再往返不起以一寳劔奉君君作詩以為劔當獻之天子我人臣不敢私用封還之為書數千言開陳天命以諭劉君劉君無以荅逡巡就見君窴酒與飮論古今成敗如傾河决峽略無凝滯劉君乃深歎服曰基始自以為勝公觀公論議如此基何敢望也君旣以口舌安反側郡上方征伐無一兵與君壬寅二月苗将賀甲李乙叛􅊞君而所練卒亦應之君無援𬒳禽幽空室中列卒環守脅君降君紿之曰若生吾吾能成若事賀李知非其本心恐㽞自遺患遇夜以燖㕐斗酒饋君曰以此與公訣君㧞佩刀割㕐舉巵酌酒仰天飮曰嗟乎丈夫乃為䑕軰禽然我死死義爾賊死肉臭狗且不尓食卒怒持劔瞋目擬之君飮酒自如食竟叱其觧衣君罵曰此紫綺裘乃上賜吾者賊勿解吾當服以死引枕而卧賊俟其睡乃害之時某日也年三十又事聞上嗟悼久之是年某月日以其喪歸葬金陵南門外聚寳山之陽後二年贈徵事郎戊申上卽帝位念君死事之忠追封丹陽縣男仍命有司復其家君先娶王氏𥘉國兵入金陵不屈死生一子毅繼平氏君事親孝與人交緩急可仗有古烈士風遭時遇變所為可稱道守死不二卒成羙名可謂俊傑雖位不大顯生不永年然忠義之士當與天地長存不足為君憾也君所為詩若干卷門人蔣敬編次傳于世銘曰元季政亂盗若􅑣戈矛相劉河漢紅江淮中間飛一龍誰其輔之惟羣雄維時孫君起章逢齒牙差差萬劔鋒陛前論事聲震鏞帝一見之為動容俾知大府佐幕中鋤姦剔􅗜别罪功括蒼告降內猶訌詔君持節總兵戎疋馬三矢韔一弓徐行直火如渉空羣酋噤伏傴且恭大開城門㓕燧㶻口宣􅊾告焌頑兇敢有弗悛屠其宗銷兵鑄鐡耕以農生民有如魚脫罿㧞諸水火哺飱饔莫徭內蝕據崇墉乘其不備􅊞且攻君氣吞賊兵力窮長蛟在陸制蟻蟲仰天叱月月為東義不負國徇以躬游䰟上天化白虹下壓賊營賊眼矇大軍四来若雷舂祈骸解頥殱彘豵死事上聞帝哀恫贈官復戸頒爵封生氣燁然薄蒼穹生為偉人死則忠位卑壽嗇名譽豊脱令耆艾登矦公死而無聞鬼猶懜取彼弃此孰纎洪史臣焯行鎭幽宫名與天地期無終獅子山徐將軍廟碑帝王受天命而興黙運玄化施陽歛隂日月為之却行山嶽為之震疊川君水伯咸聽其命令而效軄獻霛理勢則然也今皇帝之都金陵伐亂討逆遣將出師旌旄所向鉦鼓所戒巨城大邑無不降順時則有若徐將軍者亦著神功將軍烏程人晉時行賈江淮間道廬之巢湖溺死死而為神巢民奉之甚謹上𥘉渡江諸將多祀神舟中所向克捷或以事聞于上歳戊戌某月命南安矦俞某卽龍江盧龍山為廟祀焉擇清脩道士汪與權駱徳輝徐善誠三人主其事及旣登大位之六年為洪武癸丑九月大駕幸盧龍時與㩲已化去詔德輝葺廟室樹名木且勑改盧龍為獅子山德輝等承詔奉祀益恭甲寅某月復相與建祠奉其教所謂玄武神于廟左殿堂門廡畧具咸以為斯廟與國同興將軍之功格知聖主耿耿不誣其本始固不冝無考而玄武之祠威霛日著亦冝牽聮得書乃來請銘其銘曰帝興江淮賢豪景從叱咤而雷麾斥而風豈惟人同鬼神争助水伯川君罔不来赴維巢有湖神之所都隂翊王師鼉鼓龍旟敵城頟頟大將攸克示以神兵暗裭其魄軍聲如霆日無全城一日十勝蘄宼率平帝詢將臣成功孔速疑有神助使之順伏將臣有言非惟戰功維巢有神實張兵戎帝曰異㢤何以勸賞爵非所安俾其廟享龍江之陽山逥岡翔作鎭于京以綏四方有廡有堂有筵有几神之戻止冷風如水都人来觀天子聖仁天子褒功及于鬼神都人来言神之威武洞于幾微以佐明主上天垂象龜蛇合形佑我下民功尤難名並洞實冝精神上通合慶同體以賛化工時清歳康㶻燧不芒都人薦奠􅎟稷豆觴人神相依其德弗慆扵千萬年彌久彌昭李都尉字辭皇上卽位之九年以順德公主下嫁于太師李韓公之子駙馬都尉祺𥘉祺小字為緫至是詔曰其易以羙名翰林諸臣乃㝎今名以進且字之曰子祺旣而子祺請曰祺之名實㝎扵先生祺扵先生少甞受業有師弟子義將何以教之余惟一代之興必有元勲厚徳之人出扵其間始則佐帷幄决勝負終則㘴廟堂而賛治化成大功而享榮名為國家之柱石係天下之重輕若漢之蕭鄼矦宋之趙韓王皆若是矣至扵連􅊚帝室若今太師則未之有也今太師極人臣之尊為上公之貴而都尉子祺獨能好學慎行敦厚下人發為篇章動有意趣是可謂富貴而好禮又難能也祺之為義為祥為吉子祺固有以致之矣為字實冝雖然尚父有云敬勝怠者吉此守位之事也敢以為勉焉辭曰氣合運凝天地載清君聖臣明以階治平惟臣謂誰實時元老運籌建略致天之討四方旣帖乃戢干戈執政廟堂如漢蕭何匪惟執政胙以大國冊書金劵俾首百辟爵則崇矣職則大師左右天子以鎭四夷四夷旣安君臣交歡上降下承煥乎榮觀彬彬都尉大寵是膺太師之子天子之甥際兹風雲依彼日月侃侃都尉不自矜伐文駟錦衣其儀記都出入金門不敢咲譁躚躚公子交趋兢諾都尉屹如山嶽斯時之人以恩爲祥祥則旣多惟敬乃將都尉之名曰祺是命何以承之告爾克敬庻民不敬且潰乃家况兹世臣不敬謂何凡人有身咸有嗜𣣔敬以攝之形莊氣肅自身而推孝親尊君動無弗敬乃有譽聞敬勝者吉古有弘訓敬以承祺萬楅咸順爾克敬矣罔弗盛矣爾之祺天罔尓違矣太師之勛山崇川長敬㢤勿忘以繼耿光馮擇善都督字辭自昔帝王啓跡之地天必儲精聚靈使英雄謀略之士生乎其間以備其驅䇿而佐其設施及大業旣㝎爵號之隆冠于當世褒寵之澤流于子孫若漢唐之豊沛晋陽君臣同休盖蔚乎其盛矣今上皇帝龍飛江淮光啓神祚于時文武才俊鷹揚􅍑躍或秉鉞岀征或執筆帷幄率多江淮之人論功剖符公國矦郡者以數十計若郢國馮公其一也郢公㝎遠人𥘉從上為帳前總制親軍都指揮使立功草昧時不幸早卒及上旣位追爵為公命其子誠侍青宫執業讀書及誠旣冠三擢遂僉大都督府事而誠之季父𥘉􅊞郢公軄累建大勲亦啓封宋國一門二公誠又位在樞府敏事慎軄為上信任天下榮之誠䔍好問學能為詩章以甞受學于予間来請曰誠之字曰擇善未達其義願有以教之乃為之辭曰江淮之間眞主生焉乘風附雲實惟英賢侃侃郢公熊乕之姿大劔良弓指麾義師孰與其才不賦以壽騏驥萬里僨于中道夀雖不延有弟克膺有子克承以宏厥聲烈烈宋公為郢公弟惟都督誠又克為子為他人子名實易稱保國承家厥惟難能上則天君下有衆庻苟弗以誠曷以宅位惟誠之德貫通于天何感弗應何欎弗宣天以至誠庻物乃肓光無愆四序靡瀆苟或不誠冝暑而寒人其怨嗟歳功斯癏况我伊人不誠其可矧爾世臣爵禄是荷爾或不誠民胥爾尤誠而無擇為僻為􅍝古訓孔多維人攸踐我將曷從維擇其善惟忠與孝則允蹈之維悖維悪絶而弗為蹈之匪艱服以悠久木升川増山立海受旣擇衆善乃立爾誠乃保厥家乃篤鴻慶以之事君為臣之良以之立身為邦之光匪光于邦丕爾先人郢公有子聖主有臣宋學士文集卷七十一朝京槀卷苐一
