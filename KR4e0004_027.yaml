front:
  text: 宋學士文集卷第二十七翰苑續集卷之七
  hash: sha256:b08f922d1e3021c1bbd5f3c2976b9d134e86da2f2087f5406a9b97c238ad9671
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0004_SBCK_027-1a}
body:
  text: 送無逸勤公出使還鄉省親序皇帝廓清四海遂登大寶遣使者播告諸蠻夷俾知元運巳革而中夏歸于正統其稱臣者髙句驪最先交趾次之流求瑣里又次之于時日本良懷亦令僧祖來奉表而至上嘉其逺誠詔以天寧禪僧祖闡瓦官教僧克勤為使護其還國克勤字無逸通儒釋書湛堂法師諸孫也上召見端門與闡同受法衣軍持錫杖諸物之賜筮日啓行先是日本王統州六十有六良懷以其近屬竊據其九都于太宰府至是𬒳其王所逐大興兵爭及無逸等至良懷巳出奔新設守土臣疑祖來乞師中國欲拘辱之無逸力爭得免然終疑勿釋守臣白其事于王王居洛陽欲延闡住持天龍寺無逸獨先還無逸奉揚天子威德諭以禍福必期與闡俱王聞其志不可奪命輿馬來迎經涉北海時近六月大山髙插霄漢積雪如爛銀行一月始至館于洛陽西山向陽精舍執國政者猶申天龍之請無逸曰我使臣爾非奉帝命不敢從王如欲闡敷宣大法冝同往請于朝否則有死而巳君臣聞之皆大慙服議遣揔州太守圓宣及净業喜春二僧從南海下太宰府備方物來貢所虜中國及髙句驪民無慮百五十人無逸化以善道悉令具大舶遣歸無逸等自太宰府登舟五晝夜即逹昌國州巳而赴南京仍見上端門無逸備陳其故闡亦附奏曰島夷不知禮義微勤臣不能再瞻龍顔矣上恱召對者非一或賜食禁中自時厥後各賚白金百兩文綺二皆有副上忽顧侍臣曰勤一沙門爾乃能不辱君命如此學孔子者未能或之先也親賜手詔諭其父華毅使其加冠巾出仕無逸亦念去國三年將還鄉行省覲之禮中朝大夫士幸無逸遭逢盛際競賦詩餞之而以首簡授豫序豫聞大雄氏設教門雖廣其推仁及物要與二帝三王不大異是故昔之名僧或籌䇿藩閫或輔弼廟堂事業稱於當時勳名埀於後世其載於史冊者蓋班班可考逹人大觀𥘉無形迹之拘儒釋之異也方今堯舜在上治具畢張無逸出將使命言論慷慨已足落倭奴之膽若使施之有政大綱小紀粲然有序他日將與皋䕫稷卨比肩是亦法如來行證菩薩道而巳大雄氏或親生斯時亦未必不韙無逸之所為也無逸之東還也雲漢昭回之章照臨東越東越人士無不舉手加額以為天光下燭為禎為祥而無逸尊公祗奉璽書當誨之以父子君臣之懿豫尚何言哉姑托其出使之績序以為贈春向和無逸將戴笠而來豫則具壼觴俟于龍江之上矣元故婺州路儒學教授季公墓銘濂待罪國史兼職青坊日趨大本堂與晋府典儀劉彬數相遊衍彬處人也其先公諱演實濂之故人彬以契家子之故間來言曰外舅季教授之死已十三年墓石且無文其子逺居於浙河東埀姓名無由自通敢持福建行省員外郎王錡狀介彬以請惟當今名公卿大夫無不得先生文以發幽潜者願卑矜之按狀公諱仁夀字山甫其先處州龍泉人後徙居州城中宋殿中侍御史棠以骨鯁著聞公之十四世祖也曽祖泰享祖文明父德巽母某氏公之父以學行知名越郡凡兩辟不就公幼漸家學長益自奮厲文辭如水湧而山出重紀至元𥘉用薦者起教諭慈溪公為徴逋租新禮殿建教諭㕔事部使者暢公某行縣他校官獲罪者相望唯深器公命往黃岩鑄祭器之未完者慈溪先正寶章閣學士黃公震著書滿家公以狀上府祠之學官設課試法以待後進鼓舞激勵唯恐有懈怠竟有二士獲江浙文解人多之秩滿遷處之松陽其訓迪學者一如慈溪郡守徐君思讓請公定鄉飲酒禮公為斟酌古今筆為儀注徐恱鋭意欲行之會徐卒乃罷升饒之雙溪書院山長以親年髙辭時丁元季州郡多繹騷藩方大臣多有辟公起者公力辭龍泉湯京好義之士也捐田為義莊以惠其族復開義孰以教鄉子弟以公為一郡之望延為師公悉心開道孳孳如不及㑹近臣李國鳳經略江南承制得專除拜憫公位不滿德特轉教授婺州公嘆曰仕所以行志也志不行曷若肥遁終身乎遂放情肆志於雲林煙壑間翛然如在物外遂自號為春谷處士云𥘉公承家學治易暨春秋通其奧義及上饒鄭先生原善來為郡録事公獲從之遊受書詩二家先生名進士故公之所造益精由是四方從之者衆號為四經師後多有知名者其為文詞不事剽竊而自成一家豳國忠宣公余闕過栝索而觀之其稱道不置公為學至勤群書無不歷覽覽輒手節鈔之為春谷讀書記二百卷其所著者易書詩春秋皆有衍義共若干卷四書質疑若干卷䇿樞通覽若干卷詩林鉤玄若干卷弓冶録三十卷文集若干卷兵燹之餘皆鮮有存者不幸夀六十有一以至正壬寅八月某甲子卒其年九月辛酉葬于龍泉縣安仁里麻丘灣先配吳氏生子二宗起宗憲皆善繼其學宗憲一名觀將仕佐郎漢中府褒城縣主簿女二長適彬今遷承事郎工部主事即速銘者次適湯欣繼室潘氏廣東道肅政廉訪司照磨弼孫女也生男一宗義女一適湯柱孫男三同紹褒豫惟人處霄壤間有異蚩蚩之徒以其自立也所以自立者非假功名以自見乎或命與時違齟齬而不能進則托辭章以寫其所志庶幾古者立言之義二者之外則無所容力矣以公之德之才於功名乎何有浮沉庠序中逮沾一命亦且巋然老矣期表著者唯在乎有言六丁雷電又從而取去之其果何為邪如公者蓋可悲也雖然治國有道政與教爾而教為尤重公雖不及為政而位為人師橫經講道霑丐後學為多其視懷銀黃埀三組而無益於人者賢不肖果何如也尚爽悲銘曰隂陽雜糅兮莫測端倪人生值之兮萬有不齊有美君子兮厥德孔嘉祿位之卑兮蔑以振其華摛文自耀兮出史入經鬼神靈異兮雷霆震驚忽斥豪英兮囿于醇熙敷繹六藝兮蔚為人師日坐臯比兮唯先民是程誨言淪浹兮學維蒸蒸師道既立兮善人斯多剗刮染汙兮丕冒至和視彼㴞㴞兮三組銀黃徒曠厥官兮是謂自戕道隱世澆兮懷古而悼今哲人不可作兮䀌然而傷心麻丘之灣兮水環而岫張太史勒銘兮用播遺芳題蔣山廣薦佛㑹記後右蔣山廣薦佛㑹記豫嚮為儀曹諸君所請而作一則鋪張帝德之廣一則宣揚象教之懿意雖有餘而文不足以發之叢林之間往往盛傳徒增愧赧而已葦舟上人留意宗門樂善如不及近來南京亦繕書一通持歸吳中求豫題識左方嗚呼佛法之流通靈山付屬恆在國王大臣讀豫記者當知王化與真乘同為悠久猶如天地日月萬古而常新猗歟休哉跋七佛偈後右七佛世尊慈憫群迷弘開頓門各說妙偈一首黃庭堅稱為禪源者也偈蓋中天竺沙門支彊梁樓所譯前魏陳留王時始至洛陽遂傳中國其辭雖七不翅華嚴偈十萬之多三世諸佛傳心要指盡在是矣𥘉因吳僧道袼誦出不具翻譯人名義學者往往指為謗議沈酣名相之深冝無怪者四明祖杲禪師嘗閲齊祐律師所著出三藏記其薩婆多部紀載甚明謂此乃禪門之宗勒石大天界寺流布四方嗚呼禪師其能體佛之慈行者哉蒲庵禪師畫像贊蒲庵禪師豫章豐城人名來復字見心以日南至生故取易卦語識之有志行清净行欲絶塵獨立遂歸釋氏與同𫀆恭肅翁誓屏諸緣直明涅槃妙旨久之窺見全體無礙然未以為至走雙徑謁法喜大師楚公自陳厥故當機鋒交觸如鶻落兔走不間一髮法喜深然之留司內記越三載復約標士瞻修西方净土於吳天平山刻期破障比禪觀尤力浙省左丞相逹公九成慕師精進起住蘇之虎丘辭不赴㑹兵起避地㑹稽山中慈溪與㑹稽鄰壤中有定水院直東海之濵幽聞遼敻可以縳禪復延師出主之師為起其廢禪門典禮依次舉行瓶錫翩翩來萃乞食養之共激揚苐一義諦尋以干戈載塗不能見母作室寺東澗取陳尊宿故事名為蒲菴示思親也自時厥後鄞人士請師居天寧寺時寺為戍軍營子女􅚽雜其䙝穢尤甚師言於帥閫移其屯斥群奴汛掃建治其弊壞一還舊貫師望日以重大夫士交疏勸主杭之靈隱適有詔徴髙行僧師兩至南京賜食內廷慰勞優渥洎建大㑹鍾山師奉敕升座說法辭意剴切聞者咸有警云師敏朗淵毅非惟克修內學形於詩文氣魄雄而辭調古有識之儒多自以為不及其推師者李諭德好文則曰任道德為住持假文辭為遊戲陳狀元祖仁則曰禪源妙悟教部精探內充外肆僧中指南至於楚國歐陽文公玄潞國張公翥見諸觚翰間者奬豫為尤至言多不載師之徒鍠嘗畫師像求豫贊豫知師頗詳故倣近代儒宗之例歷舉其行而繫之以辭者將以厲夫人人也辭曰大法如如流于旃丹不有君子荷之實難慧照正宗世濟其美一十九傳至于法喜據蓮花座大振玄風師承一喝三日耳聾聾極而聰至聞蟻戰祗為圓虗物無不見既入悟關可廢學功妄滅方真慧極則通乃即天平棲神淨域禪觀混融不二不一方嶽致聘耳若不聞優鉢曇花却見海濵有典必行無墜弗舉鐘魚互答笠鞋川委移錫州城歸者紛紜轉穢為淨載揚清芬有峯飛來千載不起師復主斯法筵重啓聲華逺揚逹于帝宸有詔起之說法如雲錫饌禁中恩遇優渥四衆傾仰秋空孤鶚形請辭章太隂四垂雷舂飈揚鬼神晝馳人爭傳寶如襲芳茞師笑受之吾遊戲爾內外兩克如師幾人暗室非燈曷𣅿羣昏學徒歆艷丹青肖像我作􅐌詞毋住于相空同外史傳空同外史者翛然物外人也故以空同自號或者疑之曰空同山名在禹跡內有三曰臨汝曰臨洮曰安定雖其名相符而其實則異外史為人善飬生昔軒轅氏問廣成子養生之道於汝之空同外史之所志豈謂是耶外史笑曰子求空同山於目者邪吾則以其心爾吾目雖不見山而吾心未嘗無山一凝之間平巖邃林森森而列吾前顒顒而俟豫後矣彼以目而求山者有山而始有山未嘗能無山而有山蓋有山則為山所礙無山則何往而非山邪吾心之所存不翅千空同之多奚止禹迹之內有三而巳或者愈疑之曰外史言若此蓋近道巳盍語豫以抱一不二之道乎外史曰天地之真其體貴虗一氣孔神闔闢以機毋抗而崇勿按而痺若水之流晝夜一如若雲之行時而卷舒混然黃寧乃契道符我尚無我矧空同者歟豫之粗言巳泄天地之機矣子幸毋溷我或者再有問外史暝目不答人遂指外史為幽人逸士外史弗是也時戴棕葉冠服大布寬衣日與仙翁釋子遊當得意時抵掌嘯咏間出古萹章示人類皆超軼塵壒若不餐煙火食者家無儋石之儲不顧也外史嘗從華相山人危雲林學雲林歿恤其孤甚至近又出入秦淮河上發劉河間祕術注藥起人疾求者輒與絶不問氏名益莫測其為何如人余侍講禁林外史亦時時相過若樂豫者欲叩其玄旨外史輒謝曰子自知之子自知之豈樂山林而不返者邪抑托此自祕而不欲人泄其機邪皆不可知也外史姓王名溥其字為宗溥元居安次今遷吳祖若父皆為顯仕云史官曰莊周有云其耆欲深者其天機淺若外史者其深於天機者歟豫悲世人往往為欲所因何異桎梏其脫然無纍者幾何人歟所以喜與外史談飄飄然有雲卧八極之意不獨見諸空文而巳讀外史傳者其亦知豫欲守規中者歟葬書新注序堪輿家之術古有之乎周禮墓大夫之職其法制甚詳也而無所謂堪輿家禍福之說然則果起於何時乎蓋秦漢之間也漢藝文志有宫宅地形書二十卷既有其書斯有其術矣術果人人能之乎官有其書而不行之民間及至晋時方始盛傳而葬書遂號為郭景純所作豫嘗讀之真確簡嚴意非景純不至此實宜為相地之宗也後世葬巫競起而蕪穢之至於二十篇之多西山蔡季通氏深覺其妄增刪去十二而存其八草廬吳伯清氏又病蔡氏未盡藴奧擇至精至純者為內篇精粗純駁相半者為外篇粗駁當去而姑存者為雜篇誠可謂無遺憾矣新喻劉則章親受之吳氏為之注釋頗有所發明金華鄭君彥淵其尊吳氏不下於則章晝夜研精單思正其句投觀其㑹通探其旨趣粲然若燭照而龜卜其視則章蓋過之矣彥淵既鍥􅎚以傳復介學子劉剛請余序豫謂葬書尚矣别有葬經八卷蕭吉所撰者又二卷號為地脉經者又二卷大抵與郭氏不異唯八卦五行經托於黃帝所作或者遂謂為地理之源豈黃帝之時巳有其術歟信如此說諸經之中或云辨方正位或云卜澗東瀍西或云相其隂陽觀其流泉固有之矣不過趨人事之利何故無禍福之說歟是未可知也在唐之時楊翁筠松與僕都監俱以能隂陽隸司天監黃巢之亂翁竊祕書中禁術與僕自長安來奔至贑州寧都懷德鄉遂定居焉後以其術傳里人廖三傳三傳以通春秋故名廖傳其子禹禹傳其壻贈武功郎謝世南世南復傳其子武功大夫海惠州巡檢使永錫遂祕而不授世之言地形者其盛無踰此數人然其遺書或存今世多行之往往其說皆與郭氏合而無悖去之者豈相地者實宜宗之歟縱青囊有傳其妙亦不越于是歟嗚呼世不信地理之術則已設信之舍此將何從求之歟冝彥淵留意於兹而不暇自釋也然是書雖經蔡氏刋定至吳氏方為精密其注之者雖有則章發揮于前又至於彥淵而後大備注書之士後出者益勝其言誠可信歟豫春秋且髙文采益衰落四方求者每踵武相接類峻却而不顧而獨為彥淵序此者非以其大有益於世歟彥淵名謐北山先生忠愍公之九世孫自號玄默居士博通儒書而能文其於內丹之訣尤有所得云元故祕書著作郎芳洲先生蕭府君阡表先生諱雷龍字作霖姓蕭氏蕭為江右著姓絲出唐宰相復復長子儉家長沙六傳至居生遭馬氏亂與三兄弟始來廬陵娶吉水文昌鄉虎溪劉氏復遷焉其季子琛生勝勝四傳至大理評事文叔以資雄于鄉娶宋宗室女趙氏祐陵賜以一官大理生應通應通生逹逹生登仕郎餘慶餘慶生滋滋生大德先生之父也先生童丱時輒嗜學弗厭夜漏下二十刻其毋王夫人往傎之見危坐曲房方張燭觀書未寢也比長而業成宋社已屋無所試竒氣兀硉遇事輒奮發凌厲不可挫折及元平江南束書逰燕都諸公貴人見其魁梧頴異執禮雍容不迫固已竒之及觀其辨析古今陳義甚髙操觚為詞章頃刻千言有長江萬里之勢無不聳敬近臣聞之有言於世祖者即遣使者召見奏對稱㫖翼日復條崇學校進賢才薄賦斂均徭役禁驅奴革和買六事以聞有㫖賜白金盂下其事中書議行之仍敕就邸舍以俟後命大臣有弗便已者沮之不報先生翩然西遊關陜時國子祭酒蕭真敏公㪺負一時才望於人物極慎推與先生謁之於京兆即倒屣出迎留連不少置且曰如君氣岸文采自當為南士之冠由是四方名士大夫逢其至皆為之傾動先生與之登髙弔古悲歌慷慨呼大白望天而飲浩然有尚友千載豪傑之意宗藩安西王聞而竒之欲辟為府屬辭不就杖䇿南還至大𥘉有薦為衛喂院大使者不拜或曰君命也復至燕都至則改祕書監著作郎矣未幾馬忽蹶于門意以為不祥即日投牒謝去趙魏公孟俯苦留不得乃序而送之其後同列皆坐廢人服其先識久之親友有勸其遊出者先生嘆曰吾周遊南北數千萬里裘馬傔從豪宗戚里迎勞如東西家視功名探囊中物爾奈何事㑹之來輒齟齬如是其命也夫其命也夫遂絶意於仕進𥘉先生家多資至宋季而貧乃折節治貨區不數年間竟倍加於昔然積而能散人有緩急不問識不識苟請焉千金可立捐天雨雪族里有弗炊者載薪粲巡戶周之逺邇賔客聞其豪邁善施填咽弗之絶皆足取欲而去先生事親能盡孝調御井㫖必躬為之俟親嘗而後去朝夕問衣燠寒而進退之諸弟有凉落不振者三皆分財析産以為飬致有雙竹並根之祥族子性敏厄於貧弗克進學招與諸孫為師友後為名儒積世藏書頗多鄉之先逹若忠簡胡公文莭楊公文忠周公之屬凡十餘人其所著書共數百卷恐其廢棄不傳搆竹林精舍發舊藏共庋之所居溪山秀蔚髙閣崇榭連岡跨陌叢錯如畫先生𬒳古冠服徜徉其中觀者謂為有道仙翁晚年搆堂西偏扁為芳洲魏國李文忠公孟嘗為之記因自號為芳洲云先生生於宋寶祐戊午十一月某日歿於元泰定丁卯十月某日享壽七十有文集若干卷藏于家娶宋氏子男子二長來復由伴讀成均授順州儒學正次來有用薦者授某州路儒學録皆先卒孫男四人孟權孟武孟福洵洵鄉先生劉公嶽申髙苐弟子博通羣經以善古文辭名世入我皇朝應詔而起擢為虞部主事階從事郎孟權等以某月日葬先生于州之蘆村之原葬後四十年洵痛念先生歿時六歲今五十餘矣深懼群行泯泯無以暴白于天下後世每一思之淚落不自禁乃請同郡奉議大夫兵部職方郎中劉嵩狀乞豫為之銘豫惟成周封建之時統尊於天王化宣於五等之國上下相維欲以兼安元士抱致用之器咸思有以行其道之魯不遇則之齊之齊又弗遇則之秦之晋之楚必期有所合焉自古制廢而為郡縣萃天下群才悉掌於銓曹縱有邁往之資俯首抑志出於其間雖獲乎上而下或沮之亦不能以自逹槁項黃馘歿于蒿藜之下比比有之如先生者蓋誠可悲也雖然是有命焉不足為先生憾豫竊觀貴胄名閎其勢𦦨薰灼炙手可爇身死肉未寒已無有道其名者今先生物故將踰四紀其哲孫方托行焯能圖傳於不朽由是觀之士君子自立不繫於窮逹尚矣苟不有繫於窮逹則聞先生之風者蹶然興起確然期蹈夫道是進亦榮退亦榮無所入而不自得也是宜表見於世而繫之以銘銘曰天挺俊英拔類超倫一吐一吞有氣絪緼發為文辭萬馬四馳揚塵􅌭紛道絶走飛束書遊燕見者改顔風雷翻翻忽生舌間流聲逺聞逹于帝聰召至法宫瀝血攄忠臣雖布衣頗知政幾再拜稽首􅞽于龍墀帝曰俞哉爾誠爾輸爰勑中書亟行弗徐蠢彼狂惛惡帝有聞白日雖白障之浮雲公即翩然乃西其轅乃涉大河乃入秦關竒氣莫磨陟彼巍峩白眼望天呼酒放歌陳跡漫漫風髙木寒昔人何在慨其增歎誰其起之東觀委蛇公謂止期我數之竒我家之豐令胡淪荒折莭事之其資日穰有積必施叶孰顛孰隮我或遘之視金如泥有芳者洲中孕杜蘅寄情適物欲搴其榮斂藏豪華敷為天葩飲水著書樂無津涯觀化既融以就窆封以紀始終以鎮幽宫故榮祿大夫中書平章政事李公權厝志公諱思齊字世賢姓李氏世為汝寧人當元之季汝頴兵起公招集義旅數平郡縣由是進保關陜歷官自中順大夫知汝寧府至銀青光祿大夫太尉中書平章政事兼知樞密院事全境安民衛元社稷其功為多當是時元政愈亂公度不可為㑹洪武二年我大將軍魏國公統兵定中原公駐軍臨洮遂帥士馬數萬來歸召赴京師授資善大夫江西行省左丞三年從大將軍征定西復漢中除榮祿大夫中書平章政事六年公復從大將軍征大同至代縣得疾而還寵勞備至遣醫官絡繹治療且幸其弟視之尋賜新苐一區官其子世昌懷逺將軍同知金吾右衛指揮使司事甥鄭玉武略將軍羽林衛鎮撫以慰其心豈期公荏苒沈痾竟弗能瘳以七年九月四日卒於正寢夀五十二卒之日側室臨汝陳氏年始三十三義不獨生亦自經而死事聞皆親製文遣使者祭之且贈陳氏淑人諡以貞烈恩禮至渥是月二十日與公合殯京城上元縣之向村以俟它日歸葬先塋之次禮也公曽祖茂贈中奉大夫中書參知政事妣王氏贈夫人祖章資善大夫中書右丞妣姜氏贈夫人父成贈榮祿大夫中書平章政事妣盧氏贈夫人公娶王氏封夫人子二人一即世昌一安夀女二人定童華童皆在室惟公守土保民以歸有德克享祿位施及子孫至于令終眷賚尤厚可謂生榮死衰者矣謹為疏其秩里世行友權厝歲月用納諸壙云宋學士文集卷第二十七翰苑續集卷之七
